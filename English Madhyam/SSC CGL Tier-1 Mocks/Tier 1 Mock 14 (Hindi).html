<script id="theme-toggle-handler">
(function() {
    var savedTheme = 'dark';
    try {
        savedTheme = localStorage.getItem('portal-theme') || 'dark';
    } catch (e) {}
    if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        var observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('light-theme');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('themeToggle');
        if (btn) {
            var newBtn = btn.cloneNode(true);
            newBtn.removeAttribute('onclick');
            btn.parentNode.replaceChild(newBtn, btn);
            
            var currentTheme = 'dark';
            try {
                currentTheme = localStorage.getItem('portal-theme') || 'dark';
            } catch (e) {}
            
            var icon = newBtn.querySelector('i');
            if (icon) {
                icon.className = currentTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            newBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isLight = document.body.classList.toggle('light-theme');
                document.documentElement.classList.toggle('light-theme', isLight);
                var nextTheme = isLight ? 'light' : 'dark';
                try {
                    localStorage.setItem('portal-theme', nextTheme);
                } catch (err) {}
                
                var currentIcon = newBtn.querySelector('i');
                if (currentIcon) {
                    currentIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        }
    });
})();
</script>

they left for Mexico, their house was in <ins><strong>good</strong> </ins>condition than it is now", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> better", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> excellent", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> more good", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> best"], "correct_answer": 0, "solution": "The word 'better' will be used as the comparative degree of 'good' because the sentence is making a comparison. For the comparative degree of 'good', the correct form is 'better'. The sentence means that when they left for Mexico, their house was in a better condition than it is now. Therefore, the correct answer is 'better'. For example— The food is better today than it was yesterday."}, {"id": "141210", "question": "<strong>Select the best express Antonym of the given underlined word.</strong></p> <p>The manager's decision to cut bonuses this year was met with <ins><strong>displeasure</strong> </ins>from the employees, leading to widespread discontent.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Contentment", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Annoyance", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Irritation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Anger"], "correct_answer": 0, "solution": "<strong>Antonym: Contentment</strong> (noun) – A state of happiness and satisfaction, peace, pleasure. संतोष<br> <strong>Annoyance</strong> (noun) – The feeling or state of being annoyed, irritation, vexation. खिझ<br> <strong>Irritation</strong> (noun) – The state of feeling annoyed, impatient, or slightly angry, annoyance. चिढ़<br> <strong>Anger</strong> (noun) – A strong feeling of annoyance, displeasure, or hostility, rage. क्रोध"}, {"id": "141222", "question": "<strong>For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the appropriate sentences for S2 and S3, respectively.</strong><br> <strong>S1) </strong>The news about China’s economic slowdown has caused mixed reactions.<br> <strong>P) </strong>China's sovereignty and maritime claims based on the nine-dotted line on the map are \"invalid,\" said the statement, which cited Pham Thu Hang, the spokesperson for Vietnam's foreign affairs ministry<br> <strong>Q)</strong> China released the map so publishers, companies and others have an official version to reference.<br> <strong>R)</strong> China, for long, had been worried about fears of a slowdown and a middle-income trap.<br> <strong>S) </strong>Now, there are fears of deflation which may bring bad news for China and the rest of the world.</p> <p><strong>S4) </strong>Thus, understanding the causes and the magnitude of China’s present-day economic challenges is essential.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and Q", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and R", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> R and S", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Q and S"], "correct_answer": 2, "solution": "Based on the theme set by S1 and S4, sentences R and S (Option C) seem to be the most appropriate choices for S2 and S3 respectively. They provide context about China's longstanding concerns and the potential implications, fitting in with the theme of the economic slowdown."}, {"id": "141215", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>I always prefer a small, cosy cottage ______ a high-rise apartment.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> from", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> for", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> than"], "correct_answer": 2, "solution": "<strong>'To'</strong> will be used because with \"prefer,\" when comparing two things, the correct preposition is 'to'. The sentence conveys that a \"small, cosy cottage\" is preferred over a \"high-rise apartment,\" making 'to' appropriate here. Whereas 'from' refers to a source, 'for' is used for purpose, and 'than' is used with comparatives, which don't fit in this context."}, {"id": "141205", "question": "<strong>Select the most appropriate synonym of the word given in brackets to fill in the blank</strong>.</p> <p>Despite her exhaustion, Emily managed to maintain a(n) _____ (persistent) attitude throughout the day.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ephemeral", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> transient", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> tenacious", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> evanescent"], "correct_answer": 2, "solution": "<strong>C)</strong> <strong>tenacious</strong> (adjective) – persistent, determined, resolute, dogged, unyielding दृढ़"}, {"id": "141214", "question": "<strong>Select the option that rectifies the spelling error of the underlined word.</strong></p> <p>Preserving our planet's biodiversity is essential for the health and <ins><strong>susteinability</strong></ins> of ecosystems and human life.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> sustanbility", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> sustainability", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> susteinabelety", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> sustainabelity"], "correct_answer": 1, "solution": "B) The correct spelling of the underlined word \"<strong>susteinability</strong>\" is \"<strong>sustainability</strong>,\" which means “the ability to be maintained at a certain rate or level, especially without depleting natural resources” (स्थिरता, टिकाऊपन)."}, {"id": "141216", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>Gandhi’s ways of life, if followed in their entirety, will aid us in the creation of a society of peace and _______.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> discord", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> agitation", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> harmony", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> cacophony"], "correct_answer": 2, "solution": "‘<strong>Harmony’</strong> is the correct choice because it means a state of peaceful coexistence and agreement, which aligns with the idea of a peaceful and ideal society as described in the sentence. The word “peace” and “harmony” complement each other, making this option contextually appropriate. Discord: It means disagreement or conflict, which is the opposite of “peace” and does not fit the positive tone of the sentence. Agitation: It refers to unrest or disturbance, which contradicts the concept of “peace” and is inappropriate here. Cacophony: It means a harsh, discordant noise, which again opposes the idea of a peaceful society."}, {"id": "141204", "question": "<strong>Select the most appropriate meaning of the underlined word in a sentence</strong></p> <p>Her <ins><strong>adroit</strong> </ins>management of the situation defused a potentially explosive argument</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Haphazard", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Skillful", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Clumsy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Inconsistent"], "correct_answer": 1, "solution": "B. <strong>Skillful</strong>"}, {"id": "141213", "question": "<strong>Select the INCORRECTLY spelt word.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> written", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> lying", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> tabular", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> calender"], "correct_answer": 3, "solution": "D) The correct spelling of \"<strong>Calender</strong>\" is <strong>Calendar</strong>, which refers to a chart or series of pages showing the days, weeks, and months of a particular year, or a schedule of events. In Hindi, it means पंचांग या तिथि तालिका."}, {"id": "141211", "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>A system of government by one person with absolute power", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Democracy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Anarchy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Bureaucracy", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Autocracy"], "correct_answer": 3, "solution": "D) <strong>Autocracy</strong> (noun) – A system of government by one person with absolute power एकतंत्र"}, {"id": "141203", "question": "<strong>Select the most appropriate synonym of the underlined word.</strong></p> <p>The protagonist of the novel was known for <ins>hisperspicacity </ins>in solving complex problems", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Insolence", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Clumsiness", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Intelligence", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Timidity"], "correct_answer": 2, "solution": "<strong>C) Perspicacity</strong> (noun) – Intelligence, acuity, sharpness, कुशाग्र, बुद्धिसंपन्‍नता"}, {"id": "141207", "question": "<strong>Select the most appropriate phrase that can substitute the underlined segment in the given sentence.</strong></p> <p>The question paper was<ins> <strong>very easy to complete</strong></ins>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> the last straw", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> fair and square", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> a piece of cake", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a snowball effect"], "correct_answer": 2, "solution": "A) The last straw – The final problem that makes a situation unbearable </strong><strong>आखिरी</strong><strong> </strong><strong>और</strong><strong> </strong><strong>असहनीय</strong><strong> </strong><strong>समस्या"}, {"id": "141218", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</strong></p> <p>The train is running / late by six hours / so it / cannot make over the time.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The train is running", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> so it", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> cannot make over the time", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> late by six hours"], "correct_answer": 2, "solution": "'cannot make up the time' will be used instead of 'cannot make over the time' because 'make up time' means to compensate for lost time, whereas 'make over' means to transfer ownership or renovate something, which is incorrect in this context; Like— The train is running late by six hours, so it cannot make up the time"}, {"id": "141208", "question": "<strong>Select the most appropriate idiom that can substitute the underlined segment in the given sentence.</strong></p> <p>The manager decided to <ins><strong>disclose a secret</strong> </ins>and address the issue at the team meeting.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> spill the beans", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> sweep it under the rug", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> bury the hatchet", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> hit the nail on the head"], "correct_answer": 0, "solution": "<strong>Sweep it under the rug</strong> – Hide or ignore a problem समस्या को छिपाना या अनदेखा करना"}, {"id": "141206", "question": "<strong>Select the most appropriate idiom to fill in the blank.</strong></p> <p>We hear the judges from their ________ that only CNG buses should run in Delhi", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> look sharp", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> square meal", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> melting pot", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ivory tower"], "correct_answer": 3, "solution": "No solution available"}, {"id": "141219", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</strong></p> <p>He sings good / among all the / contestants in / the singing competition.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> the singing competition", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> among all the", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> contestants in", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He sings good"], "correct_answer": 3, "solution": "Well का प्रयोग Adverb के रूप में होता है, जो यहाँ सही विकल्प है। जैसे— He plays well (वह अच्छा खेलता है)।"}, {"id": "141220", "question": "<strong>Change the following sentence into positive degree.</strong></p> <p>Ramesh is not stronger than Mahesh", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mahesh is strongest than Ramesh.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Mahesh is as strong as Ramesh.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.i const posMarks=2.0, negMarks=0.5;
let ci=0,tl=20*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=20*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
