<script id="theme-toggle-handler">
(function() {
    var savedTheme = 'dark';
    try {
        savedTheme = localStorage.getItem('portal-theme') || 'dark';
    } catch (e) {}
    if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        var observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('light-theme');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('themeToggle');
        if (btn) {
            var newBtn = btn.cloneNode(true);
            newBtn.removeAttribute('onclick');
            btn.parentNode.replaceChild(newBtn, btn);
            
            var currentTheme = 'dark';
            try {
                currentTheme = localStorage.getItem('portal-theme') || 'dark';
            } catch (e) {}
            
            var icon = newBtn.querySelector('i');
            if (icon) {
                icon.className = currentTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            newBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isLight = document.body.classList.toggle('light-theme');
                document.documentElement.classList.toggle('light-theme', isLight);
                var nextTheme = isLight ? 'light' : 'dark';
                try {
                    localStorage.setItem('portal-theme', nextTheme);
                } catch (err) {}
                
                var currentIcon = newBtn.querySelector('i');
                if (currentIcon) {
                    currentIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        }
    });
})();
</script>

<script>
const qs=[{"id": "132806", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>“What are you going to call the puppy, Jane?” the boy asked.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Jane asked the boy what is he going to call the puppy.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The boy wondered what Jane were going to call the puppy.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The boy told Jane what she was going to call her puppy.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The boy asked Jane what she was going to call the puppy."], "correct_answer": 3, "solution": "Direct Speech:<br> <strong>“What are you going to call the puppy, Jane?” the boy asked.</strong>"}, {"id": "132788", "question": "<strong>Select the most appropriate Antonym of the given word.</strong></p> <p>After years of effort, she finally reached the pinnacle of her career, celebrating her <strong>triumph</strong> with colleagues who admired her dedication.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mend", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Vindictive", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Defeat", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Revengeful"], "correct_answer": 2, "solution": "<strong>Antonym:</strong> <strong>Defeat</strong> (noun) – Loss, failure, setback, downfall. हार"}, {"id": "132809", "question": "<strong>For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the appropriate sentences for S2 and S3, respectively.</strong></p> <p><strong>S1</strong>: Space is constituted and constructed by the social interactions within society.</p> <p><strong>P:</strong> Space is actively used in determining and maintaining social power relations such as gender, class, and ethnicity.</p> <p><strong>Q</strong>: Henry Lefebvre has said that space is not only a “neutral container waiting to be filled, but is a dynamic, humanly constructed means of control, and hence a domination of power”.</p> <p><strong>R</strong>: This ambitious project is part of the third phase of India's comprehensive crewed lunar mission roadmap, marking a significant leap forward in the nation's space capabilities.</p> <p><strong>S:</strong> The lunar space station initiative comes on the heels of India's successful Chandrayaan-3 mission, which saw the country become the fourth to achieve a soft landing on the Moon.</p> <p><strong>S4:</strong> The Sustainable Development Goal 11.7 mandates that by 2030, countries need to “provide universal access to safe, inclusive and accessible, green and public spaces, in particular for women and children, older persons and persons with disabilities”.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> P and Q", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and R", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and S", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Q and S"], "correct_answer": 0, "solution": "Q comes next, providing a theoretical perspective by quoting Henry Lefebvre: \"Space is not only a 'neutral container waiting to be filled, but is a dynamic, humanly constructed means of control, and hence a domination of power',\" further emphasizing the idea of space as a socially constructed concept"}, {"id": "132805", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>The traveller said to a passerby, \"Can you help me find my way, please?''", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The traveller asked the passerby that he can kindly help him find his way.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The traveller requested to the passerby if he can help him find his way.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The traveller asked the passerby could you kindly help me find my way?", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The traveller asked the passerby if he could kindly help him find his way."], "correct_answer": 3, "solution": "“The traveller said to a passerby, ‘Can you help me find my way, please?’” को Indirect Speech में बदलते समय:"}, {"id": "132807", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>Rahul said to his mother, \"Can I go out and play now?\"", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Rahul asked his mother if he could go out and play then.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Rahul asked his mother that could he go out and play then.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Rahul asked his mother if can he go out and play now.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Rahul asked to his mother could he go out and play now."], "correct_answer": 0, "solution": "\"Rahul said to his mother, 'Can I go out and play now?'\" को Indirect Speech में बदलते समय:"}, {"id": "132803", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>Diwali sweets were being prepared by our grandmother.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Our grandmother prepared Diwali sweets.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Our grandmother was preparing Diwali sweets.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Our grandmother is preparing Diwali sweets.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Our grandmother prepares Diwali sweets"], "correct_answer": 1, "solution": "“Diwali sweets were being prepared by our grandmother.” Passive Voice में है।<br> इसे Active Voice में बदलते समय—"}, {"id": "132792", "question": "<strong>Select the INCORRECTLY spelt word</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Strangled", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Dominion", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Solitory", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Persecution"], "correct_answer": 2, "solution": "<strong>C) </strong>The incorrectly spelt word in the options provided is 'Solitory'. The correct spelling is <strong>'Solitary'</strong> एकांत, अकेला."}, {"id": "132799", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</strong></p> <p>He(A)/is having many(B)/friends here. (C)/No Error. (D)", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> is having many", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> friends here.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No Error."], "correct_answer": 1, "solution": "'has' will be used instead of 'is having' because 'have' is not used in Continuous Tense when it means 'own' or 'possess'. It is used in Simple Present Tense for the meaning of present; Like- He has many friends in this town."}, {"id": "132802", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>Parker has been bitten by a rare species of spiders.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A rare species of spiders had bitten Parker.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A rare species of spiders is biting Parker.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> A rare species of spiders has bitten Parker.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A rare species of spiders bit Parker."], "correct_answer": 2, "solution": "वाक्य \"Parker has been bitten by a rare species of spiders.\" Passive Voice में है। इसे Active Voice में बदलने के लिए 'has been bitten' को 'has bitten' में बदलना होगा, और Object-Subject को क्रमश: बदला जाएगा; जैसे—"}, {"id": "132804", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>The vendor sold the vegetables in the market", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The vegetables are sold by the vendor in the market.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The vegetables were being sold by the vendor in the market.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The vegetables were sold by the vendor in the market.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The vendor had sold the vegetables in the market"], "correct_answer": 2, "solution": "“The vendor sold the vegetables in the market.” Active Voice में है (Simple Past Tense)। Passive Voice बनाने के लिए—"}, {"id": "132789", "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>Hospital for people with mental illnesses", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hangar", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Shelter", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Asylum", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Druggist"], "correct_answer": 2, "solution": "C) <strong>Asylum</strong> (noun) – A hospital for people with mental illnesses. मानसिक चिकित्सालय"}, {"id": "132784", "question": "<strong>Select the most appropriate meaning of the underlined idiom</strong></p> <p>The stadium was <ins><strong>bursting at the seams</strong></ins> during the final match of the championship.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Overflowing with people", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> In complete chaos", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Well-organized and orderly", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Falling apart due to old age"], "correct_answer": 0, "solution": "A) <strong>Bursting at the seams</strong> (phrase) – Overflowing with people लोगों से भरा हुआ"}, {"id": "132790", "question": "<strong>Select the option that can be used as a one-word substitute for the given group ofwords.</strong></p> <p>The state or condition of not being in agreement, accordance, or in harmony", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Diplomacy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Liquidity", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Congeniality", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Incongruence"], "correct_answer": 3, "solution": "D) <strong>Incongruence</strong> (noun) – The state or condition of not being in agreement, accordance, or in harmony असंगति"}, {"id": "132793", "question": "<strong>Select the correctly spelt word</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Experienses", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Immersive", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Institutionalsed", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Tremandous"], "correct_answer": 1, "solution": "B) Immersive is correctly spelt wordआप्लावन"}, {"id": "132798", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</strong></p> <p>They are standing(A)/at the gate of the auditorium(B)/ as there is no place inside. (C)/No Error. (D)", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They are standing", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> at the gate of the auditorium", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> as there is no place inside", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No Error."], "correct_answer": 2, "solution": "किन्तु 'place' का प्रयोग किसी 'area' (क्षेत्र), 'city' (नगर), 'town' (शहर), 'building' (भवन) आदि के लिए 'स्थान' के अर्थ में किया जाता है जहाँ कोई चीज घटित होती है या जहाँ किसी विशेष चीज का आयोजन किया जाता है; जैसे-"}, {"id": "132797", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>______ the boys were afraid at heart, they decided to stay on in the jungle.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Although", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Because", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> In case", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> So that"], "correct_answer": 0, "solution": "<strong>Although'</strong> should be used because it means despite the fact or however. The sentence indicates that despite being afraid, the boys decide to stay on in the jungle, making 'Although' the correct choice here. 'Because' implies a reason, showing why something happens, 'In case' is used to refer to preparing for a potential situation, and 'So that' indicates a purpose or outcome, all of which don't fit in this context"}, {"id": "132787", "question": "<strong>Select the most appropriate Antonym of the given word.</strong></p> <p>Their efforts to change his mind were <strong>futile</strong>, as he remained adamant on his decision.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Effective", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Unfaithful", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Daring", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cheerful"], "correct_answer": 0, "solution": "<strong>Antonym: Effective</strong> (adjective) – Successful in producing a desired or intended result. प्रभावी"}, {"id": "132794", "question": "<strong>Select the most appropriate option to fill in the blanks.</strong></p> <p>(Ø = No article)</p> <p>_____ road to Taj Mahal passes through ___ forest.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A; a", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A; the", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ø; Ø", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The; a"], "correct_answer": 3, "solution": "' और 'a' का प्रयोग होगा क्योंकि 'The road to Taj Mahal' एक विशेष सड़क को संदर्भित करता है, इसलिए यहाँ 'The' का प्रयोग करना उचित है। दूसरी ओर, 'a forest' का प्रयोग इसलिए किया जाएगा क्योंकि यहाँ कोई विशेष जंगल का उल्लेख नहीं है, बल्कि सामान्य रूप से एक जंगल की बात हो रही है। जैसे— The road to Taj Mahal passes through a forest."}, {"id": "132796", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>If you want good seats, I ______ you buy the tickets in advance.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> imply", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> intend", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> claim", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> suggest"], "correct_answer": 3, "solution": "<strong>Suggest'</strong> should be used because it means to give advice or a recommendation. The sentence is advising that if you want good seats, it is recommended to buy the tickets in advance, making 'suggest' the correct choice here. 'Imply' means to suggest something indirectly, 'Intend' means to have a plan or aim, and 'Claim' means to assert something as a fact, none of which are appropriate in this context"}, {"id": "132785", "question": "<strong>Select the most appropriate idiom to fill in the blank given the underlined segment in the following sentence</strong></p> <p>The CEO issued a ______________, <ins><strong>a clear and strong request to take action</strong></ins>, urging all employees to contribute towards the company's sustainability goals.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cold shoulder", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cry over spilled milk", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Feather in one’s cap", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Clarion call"], "correct_answer": 3, "solution": "D) <strong>Clarion call</strong> (idiom) – A strong and clear request for people to take action स्पष्ट और मजबूत आह्वान"}, {"id": "132782", "question": "<strong>Select the most appropriate synonym of the given word.</strong></p> <p>Vigorous", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Energetic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Guarded", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Furious", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Academic"], "correct_answer": 0, "solution": "<strong>Synonym</strong>: <strong>Energetic</strong> (adjective) – Showing or involving great activity or vitality; lively, dynamic, vigorous. ऊर्जावान, जोशीला"}, {"id": "132810", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>O. Recently, I travelled from the Old Delhi railway station to Dehradun in a two-tier, air-conditioned train compartment.</p> <p>P. I had an upper berth, while the lower berth was occupied by a man.</p> <p>Q. It was a deeply unsettling experience.</p> <p>R. Around 4 a.m., abruptly woken up, I found him standing barely an inch away from me, his face alarmingly close to mine.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ROPQ", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> OPRQ", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> OQRP", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ROQP"], "correct_answer": 1, "solution": "O starts the paragraph and introduces the primary setting using a clear sentence that sets the scene: “Recently, I travelled from the Old Delhi railway station to Dehradun in a two-tier, air-conditioned train compartment.”"}, {"id": "132808", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>P. We don’t know how long he inhabited that hole but he had made himself pretty comfortable and contented with mat lt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> inequity", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> vicinity"], "correct_answer": 2, "solution": "No solution available"}, {"id": "132811", "question": "<strong>Comprehension:</strong></p> <p>If sport is war minus the shooting, cricket involving India and Pakistan takes it to another level. And finally all those whispers in the corridors of power and cricketing maidans over the last few months were found to be true when on Saturday it came to light that India has officially informed the International Cricket Council (ICC) about its inability to travel to Pakistan to participate in the Champions Trophy. The tournament, scheduled next year from February 19 to March 9, with Pakistan as the lone host, was always grappling with the ‘India-question’, considering the political and diplomatic unease between the sparring neighbours on either side of the Radcliffe Line. It is a fact that since the 2008 Asia Cup in Karachi, India has not toured Pakistan. Bilateral series involving the two have ground to a halt and the sporting face-off is restricted to ICC events at a neutral venue or in India. Pakistan had used its participation in the ICC World Cup match in Ahmedabad in 2023 to get India to reciprocate the gesture, but the view from Delhi was different. Pakistani officials were also open to the idea of India playing only in Lahore while staying in India.</p> <p>However, just as in the 2023 Asia Cup, in which India played all its games in Sri Lanka, including the final, while avoiding a trip to primary host Pakistan, this time around the request is for a similar arrangement. India may prefer its Champions Trophy games and the final, if it lasts the distance, to be held in the United Arab Emirates (UAE). That the Indian Home Minister Amit Shah’s son Jay Shah is the ICC chairman-elect while being the Board of Control for Cricket in India’s (BCCI) Secretary for now, may have added a political twist. But even under the earlier Congress-led United Progressive Alliance government till 2014, Pakistan remained a ‘no-go-area’ after the terror strikes in Mumbai. Among former India cricketers too, the overwhelming view is that a trip past the Wagah border should be avoided. The Pakistan Cricket Board is miffed, but a tournament split between Pakistan and the UAE remains a possibility. The security angle in Pakistan has stirred debate since the 2009 shooting incident against the Sri Lankan team bus at Lahore. But since then much water has flowed down the Indus and other nations have resumed tours to Pakistan. In all this subcontinental frost, it is sad that star players, including Virat Kohli, have not played a single Test against Pakistan, a statistic that seems set to remain that way.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optimistic and encouraging", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Critical and lamenting", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Humorous and sarcastic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neutral and factual"], "correct_answer": 1, "solution": "No solution available"}, {"id": "132812", "question": "<strong>Comprehension:</strong></p> <p>If sport is war minus the shooting, cricket involving India and Pakistan takes it to another level. And finally all those whispers in the corridors of power and cricketing maidans over the last few months were found to be true when on Saturday it came to light that India has officially informed the International Cricket Council ( style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The author feels that it is unfortunate that star players have not played a single Test against Pakistan due to ongoing tensions.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The author suggests that cricketing ties between India and Pakistan are improving despite political issues."], "correct_answer": 2, "solution": "No solution available"}, {"id": "132819", "question": "<strong>Comprehension:</strong></p> <p>The suggestion for the introduction of electronic tracking of prisoners granted parole or furlough may merit consideration as a viable means of decongesting prisons. The idea of having a pilot programme to make undertrials who pose low or moderate risk wear devices that will track and restrict their movements has been mooted in a research report of the Supreme Court of India’s Centre for Research and Planning. This is not the first time the use of electronic tracking has been considered, though. The Model Prisons and Correctional Services Act, 2023, contains a provision that says “prisoners may be granted prison leave on the condition of their willingness to wear electronic tracking devices” so that their movement and activities may be monitored. It speaks of cancelling the leave in case of any violation. The study points out that Odisha was the first State to propose the use of tamper-proof electronic trackers on undertrials accused of non-heinous offences to reduce congestion in jails. Such a measure would extend the concept to grant of bail. However, it also points out correctly that there are no guidelines or minimum standards for when and how the technology can be deployed without violating the prisoners’ rights. The use of technology for tracking the movement of those allowed to leave prison on some conditions does raise such concerns.</p> <p>The Court, earlier this year, disapproved of imposing bail conditions that would infringe their right to privacy of the accused. The context in that case was a bail condition that the accused should pin his location on Google Maps and share it with the investigating officer. However, it ought not to mean that electronic tagging should be rejected out of hand. A Parliamentary Standing Committee had approved of cost-effective devices being used with the consent of the accused, citing the possible gains of avoiding rights violation, reducing administrative costs and decongesting prisons. Rising occupancy in prisons has been a matter of concern in the last few years. Official statistics put the number of prisoners in the country’s jails at 5,73,220 on December 31, 2022, amounting to 131.4% of the total capacity. Therefore, any move that will reduce the occupancy, including the use of tracking technology, ought to be a welcome measure. Several jurisdictions in the world deploy devices to track the movement of certain categories of offenders. It would be logical to use them to ensure that prisoners released recently do not approach their victims again or enter locations associated with their crimes. If the trackers were to be compact in terms of size and visibility, it could also make the beneficiaries of bail shed their reluctance to wear them for fear of stigmatisation.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Analytical", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Critical", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sarcastic"], "correct_answer": 1, "so elfish purpose except humans. Only human beings suffer from anxiety and stress. Krishn says emphatically in the Gita – work unselfishly, and you will attain success, happiness, and spiritual growth. Selfishness only gives misery. Everyone is born with a distinctive gift, an inborn talent. What’s yours? Identify your talent. This can be a game-changer. The world would have lost iconic sportspersons if Sachin Tendulkar had become a CA or Nadal had taken to business. Set a lofty, audacious goal in the area of your passion. Then put in hard work, grit and perseverance to achieve your objective. Set aside your favourite movies, dining out, or hanging out with friends. Direct all your actions towards your goal. There is no easy way to success. Kobe Bryant, the legendary basketball player, would start training at 4am every day. Cricketers, athletes, and musicians work hard to achieve their dreams. Are you ready to put in the effort?</p> <p>Sharpen your intellect. The intellect thinks, reasons, and navigates life’s challenges. When the intellect directs your actions toward the goal, you generate energy. Feel deeply for your goal, be devoted to it, love it, and work consistently for it. Concentrate on every action without meandering to past worry or future anxiety. The results will be astounding. Nobody can achieve greatness alone. Recognise the pivotal role of teamwork in achieving success. Inspire others with a higher purpose. Reach out to them with love and affection. Give them a reason to come to work excitedly, for the cause, not just their paycheque. Empathise, appreciate and applaud.</p> <p>They will rise to the occasion and serve the cause. They will do their best to achieve the goal. The positive impact will be profound. Share the spoils with your team members. Give them the credit they deserve. You will achieve outstanding results.</p> <p>Society equates success solely with money. Is it restricted to material riches? The Gita teaches us that true success goes beyond mere wealth. It’s about happiness and fulfilment. Invest in your happiness and personal growth, and wealth will follow effortlessly. Are you ready to tap into your limitless potential? Start today by shifting your focus from profiteering to offering. Identify your passion, work hard, and engage with others meaningfully. Embrace the journey of self-discovery. You have the power to change your life and inspire those around you. Let’s unleash that greatness together. Each step brings you closer to becoming the extraordinary person you were meant to be. Whether through your work, relationships, or creative pursuits, the world is waiting for what you can offer.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Inspirational", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Critical", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Informative", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Satirical"], "correct_answer": 0, "solution": "No solution available"}, {"id": "132824", "question": "<strong>Comprehension:</strong></p> <p>In today’s fast-paced world, life can feel overwhelming. Many of us need tranquillisers to get through the night and mood boosters to brighten our days. The thought of self spoils the show. Obsessing over self drains your energy, enthusiasm, and creativity. It leads to errors, mediocrity, and failure.</p> <p>The Bhagwad Gita encourages you to work in a spirit of yajna – service and sacrifice – for a higher cause. The universe seems to work in a spirit of yajna.</p> <p>The Sun gives valuable light and heat. Flowers give fragrance, birds sing, peacocks dance, rivers give life. No element i oad\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To gain fame and recognition through others' success"], "correct_answer": 0, "solution": "No solution available"}],ans={};
const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
