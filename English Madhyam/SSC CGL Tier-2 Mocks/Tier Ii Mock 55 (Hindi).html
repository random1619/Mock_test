<script id="theme-toggle-handler">
(function() {
    var savedTheme = 'dark';
    try {
        savedTheme = localStorage.getItem('portal-theme') || 'dark';
    } catch (e) {}
    if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        var observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('light-theme');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('themeToggle');
        if (btn) {
            var newBtn = btn.cloneNode(true);
            newBtn.removeAttribute('onclick');
            btn.parentNode.replaceChild(newBtn, btn);
            
            var currentTheme = 'dark';
            try {
                currentTheme = localStorage.getItem('portal-theme') || 'dark';
            } catch (e) {}
            
            var icon = newBtn.querySelector('i');
            if (icon) {
                icon.className = currentTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            newBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isLight = document.body.classList.toggle('light-theme');
                document.documentElement.classList.toggle('light-theme', isLight);
                var nextTheme = isLight ? 'light' : 'dark';
                try {
                    localStorage.setItem('portal-theme', nextTheme);
                } catch (err) {}
                
                var currentIcon = newBtn.querySelector('i');
                if (currentIcon) {
                    currentIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        }
    });
})();
</script>

<script>
/* DYNAMICALLY IDENTIFY AND ALIGN MATH EQUATIONS */
(function() {
  function processImage(img) {
    if (img.classList.contains('processed-math')) return;
    img.classList.add('processed-math');
    const hasLargeAttr = (img.getAttribute('width') && parseInt(img.getAttribute('width')) > 100) ||
                         (img.getAttribute('height') && parseInt(img.getAttribute('height')) > 60);
    const src = img.src || '';
    const isMath = src.includes('parserImages') || 
                   src.includes('equation') || 
                   img.classList.contains('eq-img') ||
                   (!hasLargeAttr && (img.align === 'bottom' || img.align === 'middle' || !img.align));
    if (isMath && !hasLargeAttr) {
      img.classList.add('math-eq');
    }
  }
  
  function initMathAligner() {
    document.querySelectorAll('img').forEach(processImage);
    const observer = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
          if (node.nodeType === Node.ELEMENT_NODE) {
            if (node.tagName === 'IMG') {
              processImage(node);
            } else {
              node.querySelectorAll('img').forEach(processImage);
            }
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMathAligner);
  } else {
    initMathAligner();
  }
})();

y migration of workers anywhere in the world.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DECAB", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> CBDEA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABED", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CBEDA"], "correct_answer": 1, "solution": "<strong>C:</strong> Sentence C introduces the issue of Indians being duped by unscrupulous travel agents to travel to conflict zones<br> <strong>B:</strong> After introducing the problem of exploitation, sentence B shifts the focus to the positive contributions of Indian migrants in West Asia. This creates a contrast between the positive impact of Indian labor and the exploitation mentioned in sentence C.<br> <strong>D:</strong> Following the discussion of Indian migrants' contributions in West Asia, sentence D broadens the scope to include their contributions in Europe and North America. This continuation maintains the positive tone set by sentence B.<br> <strong>E:</strong> Sentence E further elaborates on the virtues of the Indian migrant community, which were hinted at in sentences B and D. It serves as a summary of the positive aspects of Indian labor migration.<br> <strong>A:</strong> Finally, sentence A brings the focus back to the exploitation mentioned in sentence C. It explains how the virtues of the Indian migrant community, praised in sentences B, D, and E, make them vulnerable to traffickers."}, {"id": "76581", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong>.</p> <p>Rashi was writing a letter to her husband", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/pu </strong> Farewell is being bid to their seniors by the first-year students"}, {"id": "76588", "question": "<strong>Select the most appropriate option to fill in the blank</strong>.</p> <p>The underlying reason for the prolongation of the war is _____________ on all sides", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Intransigence", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Disruption", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Encroachment", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Phenomenon"], "correct_answer": 0, "solution": "<strong>'Intransigence'</strong> should be used because it means refusing to change one's views or to agree about something. The sentence mentions that the underlying reason for the prolongation of the war is stubbornness on all sides, making 'intransigence' the correct choice. Whereas, 'Disruption' means disturbance, 'Encroachment' means intrusion, and 'Phenomenon' means an event, which don't fit in this context"}, {"id": "76589", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong>.</p> <p>Financial problems have been <ins><strong>plaguing</strong> </ins>their new business partners", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Afflict", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Meet", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Settle", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Facilitate"], "correct_answer": 3, "solution": "Antonym: <strong>Facilitate</strong> (verb) – To make an action or process easy or easier. सुगम बनाना"}, {"id": "76590", "question": "<strong>Select the most appropriate meaning of the highlighted idiom</strong></p> <p>The management is <ins><strong>tightening the screw</strong></ins> on the project team to ensure the work is completed on schedule.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Loosening restrictions", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Providing more resources", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Increasing pressure or demands", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Decreasing the workload"], "correct_answer": 2, "solution": "<strong>C) Tightening the screw</strong> (phrase) – To increase pressure, demands, or control in a situation सख्ती करना"}, {"id": "76591", "question": "<strong>Select the homonymous word from the given options that can be correctly used in both the sentences</strong>.</p> <p>(i) He seems fairly ____________ with (his) life.</p> <p>(ii) All this cool ______________ is available to subscribers only.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pleased", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Content", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Information", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ideas"], "correct_answer": 1, "solution": "<strong>'Content'</strong>, is the correct answer because 'content' can mean both satisfied and material or information. In the first sentence, 'content' is used to express the feeling of being satisfied with life, whereas in the second, it refers to the material or information available to subscribers. Therefore, 'content' correctly fits both sentences. The other options, 'Pleased' (expressing happiness), 'Information' (specific knowledge), and 'Ideas' (thoughts or concepts), do not fit correctly in both contexts"}, {"id": "76592", "question": "<strong>Select the most appropriate synonym of the word given in brackets to fill in the blank</strong>.</p> <p>An attempt to ______________ (Ascertain) the cause of the accident", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Determine", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Outline", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Embrace", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Eradicate"], "correct_answer": 0, "solution": "<strong>Determine'</strong> should be used because it means to establish the cause or truth of something. The sentence mentions an attempt to ascertain the cause of the accident, making 'determine' fitting here. Whereas, 'Outline' means to provide a general description, 'Embrace' means to accept, and 'Eradicate' means to completely remove, which don't fit in this context"}, {"id": "76593", "question": "<strong>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select ‘No substitution required’</strong>.</p> <p><ins><strong>Many peoples</strong></ins> were brought to safety by the army helicopters from the flood hit area", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Many a people", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Many people", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Many a peoples", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No substation required"], "correct_answer": 1, "solution": "'Many people' will be used because 'people' is already plural and 'peoples' is an incorrect usage when referring to many individuals. 'Many a' is used with singular nouns, thus 'Many a people' and 'Many a peoples' are both incorrect. 'Many people' is the correct option as it indicates many individuals. Therefore, the correct answer is option B."}, {"id": "76594", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong>.</p> <p>The new report <ins><strong>concurs</strong> </ins>with previous findings.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Harmonise", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Disagree", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Coincide", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Acquiesce"], "correct_answer": 1, "solution": "ANTONYM<strong>: Disagree</strong> (verb) – To have a different opinion, to not agree. असहमत होना"}, {"id": "76595", "question": "<strong>Select the CORRECTLY spelt word</strong>.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Vacuum", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Vaccuum", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Vaccum", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Vacume"], "correct_answer": 0, "solution": "<strong>A)</strong> The correct spelling of the word in question is 'Vacuum, शून्यक"}, {"id": "76596", "question": "<strong>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select ‘No substitution required’</strong>.</p> <p>I had gone only a little way down the street, when I realized that I <ins><strong>had not lock</strong></ins> the door", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Will not lock", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Has not locked", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Had not locked", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No substitution required"], "correct_answer": 2, "solution": "'Had not locked' will be used because the sentence is in Past Perfect Tense. When the action 'I realized' is in the Past Tense, the action that occurred before it (not locking the door) is indicated using Past Perfect ('had not locked'). 'Will not lock' is in Future Tense, 'Has not locked' is in Present Perfect Tense, both are inappropriate in this context. Therefore, the correct answer is option C."}, {"id": "76597", "question": "<strong>Select the option that expresses the given sentence in indirect speech</strong>.</p> <p>Madhurima explained, “I am planning to quit my graduation.”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Madhurima explained that she were planning to quit her graduation.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Madhurima explained that she planned to quit her graduation.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Madhurima explained that she was planning to quit her graduation.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Madhurima explained that she had been planning to quit her graduation."], "correct_answer": 2, "solution": "<strong>C) </strong>Madhurima explained that she was planning to quit her graduation."}, {"id": "76598", "question": "<strong>Select the most appropriate SYNONYM of the underlined word</strong>.</p> <p>A situation which <ins><strong>entails</strong> </ins>considerable risks", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Counteract", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Involve", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Compromise", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Discourage"], "correct_answer": 1, "solution": "SYNONYM: <strong>Involve</strong> (verb) – To include or contain as a necessary part; to require as a part of the conditions or necessities. शामिल करना"}, {"id": "76599", "question": "<strong>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don’t find any error, mark ‘No error’ as your answer</strong>.</p> <p>Mammoths were a species of elephants /who lived millions of year ago /but are now extinct", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mammoths were a species of elephants", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> who lived millions of year ago", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> but are now extinct", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No error"], "correct_answer": 1, "solution": "The error is in the segment 'who lived millions of years ago' because the use of 'who' is incorrect for animals. The correct usage should have been 'that' or 'which'. 'Who' is used for people, whereas 'that' or 'which' is appropriate for non-human objects or creatures. Therefore, the segment containing the error is B."}, {"id": "76600", "question": "<strong>Select the most appropriate option to fill in the blank</strong></p> <p>People are earning more, but when inflation is__________, they are no better off", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Shone a light on", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Factored in", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Coming down heavily on", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Going hand in hand"], "correct_answer": 1, "solution": "<strong>factored in'</strong> will be used because it refers to considering or including inflation in the equation. When inflation is considered, people's financial improvement is nullified. 'Factored in' means to include something in one's calculations or considerations, which is appropriate in the context of discussing the effects of inflation. Hence, the correct sentence is: \"People are earning more, but when inflation is factored in, they are no better off."}, {"id": "76601", "question": "<strong>Select the most appropriate option to replace the underlined word in the given sentence</strong></p> <p>The porters relied on tips, rather than their <ins><strong>small</strong> </ins>salary, to earn a living.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> minor", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> slight", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> meagre", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> little"], "correct_answer": 2, "solution": "<strong>meagre'</strong>, should be used because it means very little or insufficient, which in the context of salary, fits here. The sentence states that theporters relied on tips rather than their small salary to earn a living, making 'meagre' the appropriate choice. 'Minor' means less important, 'Slight' means light or minor in degree, and 'Little' also denotes a small amount, but 'meagre' best captures the inadequacy of the salary in this context"}, {"id": "76602", "question": "<strong>Select the option that expresses the given sentence in direct speech</strong></p> <p>He said that something might be missing in there.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He said, “Something may be missing in here.”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said, “Something had to be missing in there.”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said, “Something is been missing in here.”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said, “Something could be missing in here.”"], "correct_answer": 0, "solution": "<strong>A) </strong>He said, “Something may be missing in here.”"}, {"id": "76603", "question": "<strong>Select the correct homonym from the given options to fill in the blank</strong></p> <p>The actor's work for charity has recently been ______________in the press as an attempt to get publicity", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> dispatched", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> disparaged", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> detached", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> distracted"], "correct_answer": 1, "solution": "<strong>disparaged'</strong> should be used because it means to criticize or belittle something or someone. The sentence mentions that the actor's work for charity has been portrayed in the press as an attempt to seek publicity, making 'disparaged' the correct choice here. Whereas, 'Dispatched' means to send off, 'Detached' means to be separated ions": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She said to me, “Why were you smoking today?”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She said to me, “Why are you smoking today?”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She said to me, “Why you smoke today?”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She says to me, “Why were you smoking this day?”"], "correct_answer": 0, "solution": "<strong>A)</strong> She said to me, “Why were you smoking today?”"}, {"id": "76607", "question": "<strong>COMPREHENSION</strong></p> <p>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p> <p>In 2023, India experienced a ____________surge in unemployment rates, impacting both rural and urban areas. Particularly concerning was the rise in urban unemployment, escalating from 8.5% in October to 9.3% in November and further climbing to 10.1% in December, mirroring levels from a year prior. This surge has _____________ heightened stress among the younger generation, actively seeking job opportunities, with thousands applying for each available position. In the age of technology, however, a paradigm shift is encouraged—from job seekers to job providers.</p> <p>The youth ____________unemployment challenges are urged to redefine their goals and leverage their potential and skills. Sayyed Toiba Kousar, a 22-year-old resident of the border district Poonch in Jammu and Kashmir, emphasises the transformative role technology can play in the employment landscape. Through the strategic use of technology, the younger generation can not only secure employment ___________venture into bec re. The early atmosphere largely contained water vapour, nitrogen, carbon dioxide, methane, ammonia and very little of free oxygen. The process through which the gases were outpoured from the interior is called degassing. Continuous volcanic eruptions contributed water vapour and gases to the atmosphere. As the earth cooled, the water vapour released started getting condensed. The carbon dioxide in the atmosphere got dissolved in rainwater and the temperature further decreased causing more condensation and more rains. The rainwater falling onto the surface got collected in the depressions to give rise to oceans. The earth’s oceans were formed within 500 million years from the formation of the earth. This tells us that the oceans are as old as 4,000 million years. Sometime around 3,800 million years ago, life began to evolve. However, around 2,500-3,000 million years before the present, the process of photosynthesis got evolved. Life was confined to the oceans for a long time. Oceans began to have the contribution of oxygen through the process of photosynthesis. Eventually, oceans were saturated with oxygen, and 2,000 million years ago, oxygen began to flood the atmosphere.</p> <p><strong>What was the primary reason for the formation of the Earth's oceans according to the passage</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Melting of polar ice caps", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Condensation of water vapour released during the cooling of the Earth", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Import of water from other celestial bodies", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> None of the above"], "correct_answer": 1, "solution": "No solution available"}, {"id": "76614", "question": "<strong>Comprehension</strong></p> <p><strong>Read the following passage and answer the questions given after it</strong>.</p> <p>The present composition of earth’s atmosphere is chiefly contributed by nitrogen and oxygen. You will be dealing with the composition and structure of the earth’s atmosphere in Chapter 8. There are three stages in the evolution of the present atmosphere. The first stage is marked by the loss of primordial atmosphere. In the second stage, the hot interior of the earth contributed to the evolution of the atmosphere. Finally, the composition of the atmosphere was modified by the living world through the process of photosynthesis. The early atmosphere, with hydrogen and helium, is supposed to have been stripped off as a result of the solar winds. This happened not only in case of the earth, but also in all the terrestrial planets, which were supposed to have lost their primordial atmosphere through the impact of solar winds. During the cooling of the earth, gases and water vapour were released from the interior solid earth. This started the evolution of the present atmosphere. The early atmosphere largely contained water vapour, nitrogen, carbon dioxide, methane, ammonia and very little of free oxygen. The process through which the gases were outpoured from the interior is called degassing. Continuous volcanic eruptions contributed water vapour and gases to the atmosphere. As the earth cooled, the water vapour released started getting condensed. The carbon dioxide in the atmosphere got dissolved in rainwater and the temperature further decreased causing more condensation and more rains. The rainwater falling onto the surface got collected in the depressions to give rise to oceans. The earth’s oceans were formed within 500 million years from the formation of the earth. This tells us that the oceans are as old as 4,000 million years. Sometime around 3,800 million years ago, life began to evolve. However, around 2,500-3,000 million years before the present, the process of photosynthesis got evolved. Life was confined to the oceans for a long time. Oceans began to have the contribution of oxygen through the process of photosynthesis. Eventually, oceans were saturated with oxygen, and 2,000 million years ago, oxygen began to flood the atmosphere.</p> <p><strong>Which of the following can be inferred about the role of photosynthesis in the evolution of Earth's atmosphere</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> It was primarily responsible for the formation of the Earth's oceans.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> It contributed significantly to the increase of oxygen in the atmosphere.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> It had little impact on the composition of the atmosphere.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> It was responsible for the initial formation of the Earth's atmosphere."], "correct_answer": 1, "solution": "No solution available"}, {"id": "76615", "question": "<strong>Comprehension</strong>:</p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>Bharhut sculptures are tall like the images of Yaksha and Yakhshini in the Mauryan period, modelling of the sculptural volume is in low relief maintaining linearity. Images stick to the picture plane. In the relief panels depicting narratives, illusion of three-dimensionality is shown with tilted perspective. Clarity in the narrative is enhanced by selecting main events. At Bharhut, narrative panels are shown with fewer characters but as the time progresses, apart from the main character in the story, others also start appearing in the picture space. At times more than one event at one geographical place is clubbed in the picture space or only a single main event is depicted in the pictorial space. Availability of the space is utilised to the maximum by the sculptors. Folded hands in the narratives as well as single figures of the Yakhshas and Yakshinis are shown flat clinging to the chest. But in some cases, especially in later times, the hands are shown with the natural projection against the chest. Such examples show how artisans who were working at a collective level had to understand the method of carving. Initially, dressing the surface of stone slabs appears as the main concern. Later the human body and other forms were sculpted. Due to shallow carving of the picture surface, projection of hands and feet was not possible, hence, the folded hands and awkward position of the feet. There is a general stiffness in the body and arms. But gradually, such visual appearance was modified by making images with deep carvings, pronounced volume and a very naturalistic representation of human and animal bodies. Sculptures at Bharhut, Bodhgaya, Sanchi Stupa-2, and Jagayyapetta are good examples.</p> <p><strong>Which of the following statements best describes the modelling of sculptural volume in Bharhut sculptures</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> High relief with pronounced depth", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Low relief maintaining linearity", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Three-dimensional with naturalistic representation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Deep carving with exaggerated features"], "correct_answer": 1, "solution": "No solution available"}, {"id": "76616", "question": "<strong>Comprehension</strong>:</p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>Bharhut sculptures are tall like the images of Yaksha and Yakhshini in the Mauryan period, modelling of the sculptural volume is in low relief maintaining linearity. Images stick to the picture plane. In the relief panels depicting narratives, illusion of three-dimensionality is shown with tilted perspective. Clarity in the narrative is enhanced by selecting main events. At Bharhut, narrative panels are shown with fewer characters but as the time progresses, apart from the main character in the story, others also start appearing in the picture space. At times more than one event at one geographical place is clubbed in the picture space or only a single main event is depicted in the pictorial space. Availability of the space is utilised to the maximum by the sculptors. Folded hands in the narratives as well as single figures of the Yakhshas and Yakshinis are shown flat clinging to the chest. But in some cases, especially in later times, the hands are shown with the natural projection against the chest. Such examples show how artisans who were working at a collective level had to understand the method of carving. Initially, dressing the surface of stone slabs appears as the main concern. Later the human body and other forms were sculpted. Due to shallow carving of the picture surface, projection of hands and feet was not possible, hence, the folded hands and awkward position of the feet. There is a general stiffness in the body and arms. But gradually, such visual appearance was modified by making images with deep carvings, pronounced volume and a very naturalistic representation of human and animal bodies. Sculptures at Bharhut, Bodhgaya, Sanchi Stupa-2, and Jagayyapetta are good examples.</p> <p><strong>Why are folded hands shown flat and clinging to the chest in Bharhut sculptures</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To enhance the narrative clarity", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To utilize the available space to the maximum", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To depict the stiffness in the body and arms", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To represent the natural projection against the chest"], "correct_answer": 2, "solution": "No solution available"}, {"id": "76617", "question": "<strong>Comprehension</strong>:</p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>Bharhut sculptures are tall like the images of Yaksha and Yakhshini in the Mauryan period, modelling of the sculptural volume is in low relief maintaining linearity. Images stick to the picture plane. In the relief panels depicting narratives, illusion of three-dimensionality is shown with tilted perspective. Clarity in the narrative is enhanced by selecting main events. At Bharhut, narrative panels are shown with fewer characters but as the time progresses, apart from the main character in the story, others also start appearing in the picture space. At times more than one event at one geographical place is clubbed in the picture space or only a single main event is depicted in the pictorial space. Availability of the space is utilised to the maximum by the sculptors. Folded hands in the narratives as well as single figures of the Yakhshas and Yakshinis are shown flat clinging to the chest. But in some cases, especially in later times, the hands are shown with the natural projection against the chest. Such examples show how artisans who were working at a collective level had to understand the method of carving. Initially, dressing the surface of stone slabs appears as the main concern. Later the human body and other forms were sculpted. Due to shallow carving of the picture surface, projection of hands and feet was not possible, hence, the folded hands and awkward position of the feet. There is a general stiffness in the body and arms. But gradually, such visual appearance was modified by making images with deep carvings, pronounced volume and a very naturalistic representation of human and animal bodies. Sculptures at Bharhut, Bodhgaya, Sanchi Stupa-2, and Jagayyapetta are good examples.</p> <p><strong>What kind of perspective is used in the relief panels depicting narratives in Bharhut sculptures</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Linear perspective", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Tilted perspective", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Aerial perspective", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Isometric perspective"], "correct_answer": 1, "solution": "No solution available"}, {"id": "76618", "question": "<strong>Comprehension</strong>:</p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>Bharhut sculptures are tall like the images of Yaksha and Yakhshini in the Mauryan period, modelling of the sculptural volume is in low relief maintaining linearity. Images stick to the picture plane. In the relief panels depicting narratives, illusion of three-dimensionality is shown with tilted perspective. Clarity in the narrative is enhanced by selecting main events. At Bharhut, narrative panels are shown with fewer characters but as the time progresses, apart from the main character in the story, others also start appearing in the picture space. At times more than one event at one geographical place is clubbed in the picture space or only a single main event is depicted in the pictorial space. Availability of the space is utilised to the maximum by the sculptors. Folded hands in the narratives as well as single figures of the Yakhshas and Yakshinis are shown flat clinging to the chest. But in some cases, especially in later times, the hands are shown with the natural projection against the chest. Such examples show how artisans who were working at a collective level had to understand the method of carving. Initially, dressing the surface of stone slabs appears as the main concern. Later the human body and other forms were sculpted. Due to shallow carving of the picture surface, projection of hands and feet was not possible, hence, the folded hands and awkward position of the feet. There is a general stiffness in the body and arms. But gradually, such visual appearance was modified by making images with deep carvings, pronounced volume and a very naturalistic representation of human and animal bodies. Sculptures at Bharhut, Bodhgaya, Sanchi Stupa-2, and Jagayyapetta are good examples.</p> <p><strong>What is the tone of the passage describing Bharhut sculptures</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Critical", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Persuasive", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Humorous", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Descriptive"], "correct_answer": 3, "solution": "No solution available"}, {"id": "76619", "question": "<strong>Comprehension</strong>:</p> <p>Read the given passage and answer the questions that follow</p> <p>According to a report in this newspaper, the Central Board of Secondary Education (CBSE) has proposed a major overhaul in the academic framework for secondary and higher secondary education. Students will be required to study three languages — instead of two — till Class X, at least two of which must be native Indian languages. At the higher secondary level, students will have to study two languages instead of one, at least one of which must be a native Indian language.</p> <p>Secondary-level students will now have to clear 10 subjects, as opposed to the current requirement of five. Graduating from high school will require clearing six subjects, instead of five. The shift is in accordance with NEP 2020’s objective of doing away with the rigid separation between academic and extracurricular streams. A credit bank system will ensure that the student is rewarded for skills obtained outside the classroom.</p> <p>The CBSE’s plan gives the learner the space to combine academic training with vocational education. It is, therefore, a welcome departure from pedagogic strategies that have contributed to the country’s skill deficit by devaluing hands-on training. The examination authority must, however, make sure that the new system does not impose an extra burden on already stretched students.</p> <p>A wealth of scholarship has underlined that knowledge of multiple languages improves learning outcomes and helps skill acquisition. At the same time, the three-language formula remains a politically fraught issue, especially in South India, which has a long history of language-based sub-nationalism. The Tamil Nadu government, for instance, has opposed the NEP even though the policy does not require non-Hindi-speaking states to include the language in school curricula.</p> <p>Linguistic activists in the state fear const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
