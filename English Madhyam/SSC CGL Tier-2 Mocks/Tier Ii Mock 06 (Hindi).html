<script id="theme-toggle-handler">
(function() {
    var savedTheme = 'dark';
    try {
        savedTheme = localStorage.getItem('portal-theme') || 'dark';
    } catch (e) {}
    if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        var observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('light-theme');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('themeToggle');
        if (btn) {
            var newBtn = btn.cloneNode(true);
            newBtn.removeAttribute('onclick');
            btn.parentNode.replaceChild(newBtn, btn);
            
            var currentTheme = 'dark';
            try {
                currentTheme = localStorage.getItem('portal-theme') || 'dark';
            } catch (e) {}
            
            var icon = newBtn.querySelector('i');
            if (icon) {
                icon.className = currentTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            newBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isLight = document.body.classList.toggle('light-theme');
                document.documentElement.classList.toggle('light-theme', isLight);
                var nextTheme = isLight ? 'light' : 'dark';
                try {
                    localStorage.setItem('portal-theme', nextTheme);
                } catch (err) {}
                
                var currentIcon = newBtn.querySelector('i');
                if (currentIcon) {
                    currentIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        }
    });
})();
</script>

ic/exam-panel/img/check.png\"/></p> Coveted"], "correct_answer": 3, "solution": "No solution available"}, {"id": "85034", "question": "Agriculture grew 6.2 per cent in 2019-20 and 4.1 per cent in 2020-21 when the Indian economy’s overall output increase was just 3.9 per cent and minus 4.2 per cent in the two years. The farm sector posted a respectable growth of 3.5 per cent and 4 per cent even in the following two fiscals. The Covid period was, indeed, one of Indian agriculture’s finest moments, as farmers harvested bumper crops while much of the country was locked out of economic activity.</p> <p>The first quarter of 2023-24, too, has seen the sector grow 3.5 per cent year on year. Agriculture acted as a shock absorber for the millions who had to reverse migrate to their villages. Between 2018-19 and 2021-22, agriculture’s share in the total workforce rose from 42.5 to 45.5 per cent. Indian farmers also ensured plentiful grain availability for the public distribution system, which was the most effective social safety net during the pandemic-induced crisis.</p> <p>The above run was significantly enabled by good monsoons — four in a row from 2019 to 2022. That seems set to end this year. Rainfall during the southwest monsoon season (June-September) has so far been 10.7 per cent below normal, with India experiencing the driest ever August since 1901. A strengthening El Niño can aggravate the situation.<br> Thus, even as other sectors, particularly services and construction, are doing well along with clear signs of a private capital expenditure revival, agriculture is threatening to be a drag on the economy. El Niño may well be the biggest risk to growth for the rest of this fiscal.</p> <p>But it isn’t agriculture’s impact on growth that would be a worry as much as that on inflation. The harvesting of the rabi crop in April-May would coincide with the Lok Sabha. Even before that is the kharif crop, whose market arrivals will start from this month-end. Their size will influence the course of food inflation that is already at 11.5 per cent.<br> Any hit to rural incomes and increased inflationary pressures can affect not only private consumption, but also voter mood. The Narendra Modi government is obviously aware of this, which explains the various supply-side measures it has resorted to in recent months. Many of these — from export curbs to stocking limits — have been regressive, which only shows how agriculture remains an outlier in the Indian economy.</p> <p><strong>Based on the passage, which of the following statements best describes the performance of the agriculture sector in India during the Covid period?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Agriculture struggled to match the performance of other sectors.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Agriculture's growth remained stagnant throughout the Covid period.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Agriculture served as a stable force in the economy during times of economic downturn.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Covid period was detrimental to Indian agriculture's overall growth."], "correct_answer": 2, "solution": "No solution available"}, {"id": "85035", "question": "Agriculture grew 6.2 per cent in 2019-20 and 4.1 per cent in 2020-21 when the Indian economy’s overall output increase was just 3.9 per cent and minus 4.2 per cent in the two years. The farm sector posted a respectable growth of 3.5 per cent and 4 per cent even in the following two fiscals. The Covid period was, indeed, one of Indian agriculture’s finest moments, as farmers harvested bumper crops while much of the country was locked out of e tors have always been reliant on agriculture.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> El Niño has had a consistent negative effect on agriculture since 2019."], "correct_answer": 1, "solution": "No solution available"}, {"id": "85037", "question": "Agriculture grew 6.2 per cent in 2019-20 and 4.1 per cent in 2020-21 when the Indian economy’s overall output increase was just 3.9 per cent and minus 4.2 per cent in the two years. The farm sector posted a respectable growth of 3.5 per cent and 4 per cent even in the following two fiscals. The Covid period was, indeed, one of Indian agriculture’s finest moments, as farmers harvested bumper crops while much of the country was locked out of economic activity.</p> <p>The first quarter of 2023-24, too, has seen the sector grow 3.5 per cent year on year. Agriculture acted as a shock absorber for the millions who had to reverse migrate to their villages. Between 2018-19 and 2021-22, agriculture’s share in the total workforce rose from 42.5 to 45.5 per cent. Indian farmers also ensured plentiful grain availability for the public distribution system, which was the most effective social safety net during the pandemic-induced crisis.</p> <p>The above run was significantly enabled by good monsoons — four in a row from 2019 to 2022. That seems set to end this year. Rainfall during the southwest monsoon season (June-September) has so far been 10.7 per cent below normal, with India experiencing the driest ever August since 1901. A strengthening El Niño can aggravate the situation.<br> Thus, even as other sectors, particularly services and construction, are doing well along with clear signs of a private capital expenditure revival, agriculture is threatening to be a drag on the economy. El Niño may well be the biggest risk to growth for the rest of this fiscal.</p> <p>But it isn’t agriculture’s impact on growth that would be a worry as much as that on inflation. The harvesting of the rabi crop in April-May would coincide with the Lok Sabha. Even before that is the kharif crop, whose market arrivals will start from this month-end. Their size will influence the course of food inflation that is already at 11.5 per cent.<br> Any hit to rural incomes and increased inflationary pressures can affect not only private consumption, but also voter mood. The Narendra Modi government is obviously aware of this, which explains the various supply-side measures it has resorted to in recent months. Many of these — from export curbs to stocking limits — have been regressive, which only shows how agriculture remains an outlier in the Indian economy.</p> <p><strong>What can be inferred about the government's recent actions towards the agricultural sector?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The government has been promoting export opportunities for farmers.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The government has been focusing on improving the monsoon patterns.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The government has been proactive in implementing measures to combat inflation.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The government has shown a consistent approach in handling all sectors of the economy."], "correct_answer": 2, "solution": "No solution available"}, {"id": "85039", "question": "Roughly a week after the Indian Space Research Organisation (ISRO) soft-landed a robotic lander and rover on the moon’s south polar region, it launched India’s first space mission dedicated to studying the sun, in the form of a spacecraft named Aditya-L1. Barely half a day after the launch, ISRO announced that its lunar rover had completed the surface studies it had planned and that it had been “parked” ahead of the two-week-long lunar night. This vignette illustrates a certain maturity on the part of the Indian space programme: it enters a phase where its growth from strength to strength becomes indistinguishable from international leadership in space exploration, even as it carries forward an old tradition of studying the sun, exemplified by the Kodaikanal Solar Observatory. Aditya-L1 will study the sun in multiple wavelengths with its suite of seven instruments: four remote-sensing and three in situ (i.e., by directly sampling a particular volume of space). Even though it is the star closest to the earth and has been and continues to be observed by a panoply of telescopes, the sun still holds many secrets. Some of them are simply waiting to be discovered, although that is easier said than done given the brutality of the star’s influence on its immediate surroundings. One example is the particulars of the solar wind, a stream of charged particles that stream out from the sun into space. Considering the solar wind affects space weather and in turn the digital components of spacecraft, Aditya-L1’s findings could inform future space missions as well. Others are mysteries — bundles of facts not yet fully explained by scientific theories. The archetypal example is the coronal heating problem: why the uppermost layer of the sun’s atmosphere is a thousand times hotter than the sun’s surface.<br> In the next four or so months, Aditya-L1 will travel to the L1 Lagrange point, a point 1.5 million kilometres from the earth, where the spacecraft will have an unobstructed view of the star while it stays in a halo orbit around the point. To deepen its relevance, Aditya-L1 will also have to record and transmit data to earth as quickly as possible, where the data downlink and analysis pipeline will have to operate with similar haste, so that scientists can piece toge ps://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Skeptical", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Critical", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Celebratory", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Indifferent"], "correct_answer": 2, "solution": "No solution available"}, {"id": "85043", "question": "The release of all eight former Indian naval personnel from Qatar, just about three months after they were ordered a shocking death sentence, is a matter of great relief. Ever since the eight men — seven senior retired naval officers, and a sailor — who worked for the Qatar-based Dahra technologies, were arrested in 2022, the details of their case have been sparse. While their families denied reports that the men had been accused of espionage, possibly for a third country, namely Israel, the charges must have been serious enough to have invoked the death penalty. An appeals court did, in December, commute the death penalty to imprisonment terms, but upheld the conviction. It is to the government’s credit that it was able to bring about the release of all the eight, seven of whom have now returned. The success seems attributable to the strategies New Delhi employed: to pursue the case in court, showing respect to the Qatari legal system, while providing the accused with full legal support and counsel; avoid all escalatory rhetoric and public sparring; and, to take the case to the highest levels, with Prime Minister Narendra Modi discussing it with the Qatari Amir, Sheikh Tamim bin Hamad Al-Thani, during a meet in Dubai in December. That Mr. Modi announced an unscheduled leg of travel to Doha on Wednesday, after his ongoing trip to the United Arab Emirates, signifies his personal involvement and his desire to thank the Qatari Amir.</p> <p>The Qatar case is a timely reminder of the importance of quiet diplomacy at a time of brinkmanship and geopolitical conflict, particularly when it comes to relationships where so much else is at stake. For India, Qatar is an important West Asian power, with increased heft during the Israel-Gaza conflict as an important interlocutor between the West and Hamas. For Qatar, ties with India are historic and dependable, consistent even when Qatar was boycotted by its Gulf neighbours some years ago. Qatar supplies India with a third of its natural gas import needs, and the signing of a $78 billion LNG deal last week may have been an early sign that the deal for the prisoners’ release had been sealed by then. More than 8,00,000 Indians provide important services to Qatar and bring in critical remittance earnings for India. New Delhi’s decision not to seek international intervention, as it did in the case of former naval commander Kulbhushan Jadhav, who has been convicted of espionage and terror charges in Pakistan, nor to counter Qatar’s charges with the kind of harsh diplomatic countermeasures seen in the aftermath of the Nijjar assassination case in Canada, eventually provided an outcome satisfactory for all.</p> <p><strong>What was the primary reason for the arrest of the eight former Indian naval personnel in Qatar?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They were accused of theft and robbery.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> They were accused of espionage, possibly for a third country.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They were involved in a violent protest against the Qatari government.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishm const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
