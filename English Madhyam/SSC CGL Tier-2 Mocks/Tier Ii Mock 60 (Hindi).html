<script id="theme-toggle-handler">
(function() {
    var savedTheme = 'dark';
    try {
        savedTheme = localStorage.getItem('portal-theme') || 'dark';
    } catch (e) {}
    if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        var observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('light-theme');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('themeToggle');
        if (btn) {
            var newBtn = btn.cloneNode(true);
            newBtn.removeAttribute('onclick');
            btn.parentNode.replaceChild(newBtn, btn);
            
            var currentTheme = 'dark';
            try {
                currentTheme = localStorage.getItem('portal-theme') || 'dark';
            } catch (e) {}
            
            var icon = newBtn.querySelector('i');
            if (icon) {
                icon.className = currentTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            newBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isLight = document.body.classList.toggle('light-theme');
                document.documentElement.classList.toggle('light-theme', isLight);
                var nextTheme = isLight ? 'light' : 'dark';
                try {
                    localStorage.setItem('portal-theme', nextTheme);
                } catch (err) {}
                
                var currentIcon = newBtn.querySelector('i');
                if (currentIcon) {
                    currentIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        }
    });
})();
</script>

const qs=[{"id": "125714", "question": "<strong> Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> P. which assign ranks to universities across the world every year<br> Q. In this digital age, we reduce everything to numbers<br> R. India has its own National Institutional Ranking Framework to rank universities in the country<br> S. This trend has consumed the education ecosystem, as seen in the rise of global ranking agencies, <br>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RSPQ", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> QSPR", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QRPS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RQPS"], "correct_answer": 1, "solution": "Q: The paragraph begins with Q, as it introduces the general idea that in the digital age, we tend to reduce everything to numbers. This sets the context for the discussion and hints at the ranking systems that are prevalent today."}, {"id": "125715", "question": "<strong>Some sentences are given below. While the first and the last sentences (1 and 2) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>1. Cognitive inconsistency and axiomatic irrationality become evident when a few put forth the view that the spirit behind and the structural reforms advocated by the National Education Policy (NEP) 2020 are unsuitable.</p> <p>A. The National Credit Framework (NCrF) is one of several transformative reforms that are derived from the NEP, providing a flexible template for educational institutions offering school, higher, vocational, and skill education.</p> <p>B. Using the NCrF, higher education institutions (HEI) can give a unified accumulation and transfer of credits across multidisciplinary education, including skill education.</p> <p>C. The NCrF is an enabling framework rather than a regulatory one.</p> <p>D. The NEP is a vision document that provides a broad contour of how education can be transformed in India while getting away from the clutches of the colonial mindset.</p> <p>2. When HEIs adopt the NCrF, students can earn credits in various activities provided they undergo an assessment.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BADC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DBAC", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> DABC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCAD"], "correct_answer": 2, "solution": "D sentence पहले आता है क्योंकि यह NEP (National Education Policy) को introduce करता है। यह बताता है कि “The NEP is a vision document that provides a broad contour of how education can be transformed in India while getting away from the clutches of the colonial mindset.” यानी, NEP का vision education को colonial mindset से दूर ले जाना है। यह 1st sentence में दिए गए विचार को विस्तार से समझाता है।"}, {"id": "125716", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>a. There have also been calls to replicate the United Kingdom’s coal phase-out globally.</p> <p>b. But this has by no means been a frictionless transition, as it has been portrayed in much of the press.</p> <p>c. While Britain’s experiment could hold good for a few developed economies, a far more tailor-made approach would be required for developing and least-developed nations.</p> <p>d. The shuttering of Britain’s last coal-fired power plant, in Nottinghamshire, is a milestone and indicates the hastening of an ongoing paradigm shift in energy production globally.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> d, b, a, c", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, a, b, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, c, a, b", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, c, b, d"], "correct_answer": 0, "solution": "b, d के बाद logically fit होता है क्योंकि यह “But this has by no means been a frictionless transition” के माध्यम से एक contrast प्रस्तुत करता है, यह बताते हुए कि transition उतना smooth नहीं रहा जितना बताया गया है। इससे d में बताए गए milestone को एक real-world context में रखता है।"}, {"id": "125725", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong></p> <p>At different points of time, come events that have the ____1____to shape the future. ____2____ these catalysts fulfil that potential to the fullest ____3____or not is in the hands of the people in their vortex. The Justice K. Hema Committee report that studied the issues faced by women in cinema, ______4_____ well be one such catalyst. </p> <p><strong>Select the most appropriate option to fill in blank number 1.</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Potential", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Essential", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Obligation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Crucial"], "correct_answer": 0, "solution": "No solution available"}, {"id": "125726", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong></p> <p>At different points of time, come events that have the ____1____to shape the future. ____2____ these catalysts fulfil that potential to the fullest ____3____or not is in the hands of the people in their vortex. The Justice K. Hema Committee report that studied the issues faced by women in cinema, ______4_____ well be one such catalyst. </p> <p><strong>Select the most appropriate option to fill in blank number 2.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> However", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Whenever", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neither", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Whether"], "correct_answer": 3, "solution": "No solution available"}, {"id": "125727", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong></p> <p>At different points of time, come events that have the ____1____to shape the future. ____2____ these catalysts fulfil that potential to the fullest ____3____or not is in the hands of the people in their vortex. The Justice K. Hema Committee report that studied the issues faced by women in cinema, ______4_____ well be one such catalyst. </p> <p><strong>Select the most appropriate option to fill in blank number 3.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Enlargement", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Extent", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Extant", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Opulent"], "correct_answer": 1, "solution": "No solution available"}, {"id": "125728", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong></p> <p>At different points of time, come events that have the ____1____to shape the future. ____2____ these catalysts fulfil that potential to the fullest ____3____or not is in the hands of the people in their vortex. The Justice K. Hema Committee report that studied the issues faced by women in cinema, ______4_____ well be one such catalyst. </p> <p><strong>Select the most appropriate option to fill in blank number 4</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> could", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> can", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> would", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> must"], "correct_answer": 0, "solution": "No solution available"}, {"id": "125729", "question": "<strong>Comprehension:</strong><br> The National Film Awards appeared to be facing a credibility crisis in recent years following some questionable choices and glaring omissions. For instance, last year, the award for ‘Best Feature Film on National Integration’, for The Kashmir Files, encapsulated the general political thrust of the awards, where, during the screenings, cinema theatres became platforms for communal sloganeering. Thus, the 70th National Film Awards, declared earlier this week, came as a sort of surprise, somewhat redeeming the prestige associated with the highest cinematic honours. Malayalam film Aattam, directed by debutant Anand Ekarshi, became an interesting choice for the Best Feature Film, Best Screenplay and Best Editing winner, especially in the era of the #MeToo movement. Without ever slipping into preachiness, the film-maker uses the subtle chamber drama to analyse male behaviour after a woman raises an allegation of sexual abuse within a theatre group. The award also comes at a time when protests and debates are roiling the country after the rape and murder of a doctor in Kolkata. Kannada film Kantara, which won Best Popular Film, and also fetched its director Rishab Shetty the Best Actor Award, taps into folk traditions to raise contemporary environmental concerns. Bhoota Kola, a tribal ritualistic performance from coastal Karnataka, is the centrepiece, with Shetty’s frenzied interpretation in the climax going a long way towards the film’s success as well as getting him the national award.</p> <p>One commonality between these films is the lack of a formula, especially the kind dictated by corporate studios. Aattam, in fact, originated from a theatre group, giving its working-class members a chance at cinema; they play themselves in the film. Nithya Menen’s Best Actress award is also an unconventional choice — as the effervescent Shobhana in Thiruchitrambalam, hers is not a typical award-bait role. Yet, within the film’s scheme, it was a stunning performance which raised its overall effect by several notches. The awards reinforce the recent trend of South Indian cinema surpassing Bollywood, which, despite its humongous budgets, has been finding it hard to match the consistent quality of content from regional industries. It is also heartening that the juries and the larger public have started discovering more meaningful content from the southern industries. The National Awards in the 70th edition seem to have fulfilled, to an extent, the purpose for which they were instituted: to celebrate good cinema.</p> <p><strong>Which of the following can be inferred from the passage about the 70th National Film Awards?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The awards had always maintained their prestige and credibility.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The 70th National Film Awards marked a significant improvement in the selection process.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Aattam, a Malayalam film, won an award for highlighting communal issues.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The National Film Awards always prioritize popular films over socially relevant cinema."], "correct_answer": 1, "solution": "No solution available"}, {"id": "125730", "question": "<strong>Comprehension:</strong><br> The National Film Awards appeare s. The awards reinforce the recent trend of South Indian cinema surpassing Bollywood, which, despite its humongous budgets, has been finding it hard to match the consistent quality of content from regional industries. It is also heartening that the juries and the larger public have started discovering more meaningful content from the southern industries. The National Awards in the 70th edition seem to have fulfilled, to an extent, the purpose for which they were instituted: to celebrate good cinema.</p> <p><strong>What is the central theme of the Malayalam film Aattam that won multiple awards at the 70th National Film Awards?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> An analysis of male behavior in the context of sexual abuse allegations.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A romantic drama set in a small town.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A historical drama focusing on a legendary king.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A story highlighting environmental conservation through tribal traditions."], "correct_answer": 0, "solution": "No solution available"}, {"id": "125731", "question": "<strong>Comprehension:</strong><br> The National Film Awards appeared to be facing a credibility crisis in recent years following some questionable choices and glaring omissions. For instance, last year, the award for ‘Best Feature Film on National Integration’, for The Kashmir Files, encapsulated the general political thrust of the awards, where, during the screenings, cinema theatres became platforms for communal sloganeering. Thus, the 70th National Film Awards, declared earlier this week, came as a sort of surprise, somewhat redeeming the prestige associated with the highest cinematic honours. Malayalam film Aattam, directed by debutant Anand Ekarshi, became an interesting choice for the Best Feature Film, Best Screenplay and Best Editing winner, especially in the era of the #MeToo movement. Without ever slipping into preachiness, the film-maker uses the subtle chamber drama to analyse male behaviour after a woman raises an allegation of sexual abuse within a theatre group. The award also comes at a time when protests and debates are roiling the country after the rape and murder of a doctor in Kolkata. Kannada film Kantara, which won Best Popular Film, and also fetched its director Rishab Shetty the Best Actor Award, taps into folk traditions to raise contemporary environmental concerns. Bhoota Kola, a tribal ritualistic performance from coastal Karnataka, is the centrepiece, with Shetty’s frenzied interpretation in the climax going a long way towards the film’s success as well as getting him the national award.</p> <p>One commonality between these films is the lack of a formula, especially the kind dictated by corporate studios. Aattam, in fact, originated from a theatre group, giving its working-class members a chance at cinema; they play themselves in the film. Nithya Menen’s Best Actress award is also an unconventional choice — as the effervescent Shobhana in Thiruchitrambalam, hers is not a typical award-bait role. Yet, within the film’s scheme, it was a stunning performance which raised its overall effect by several notches. The awards reinforce the recent trend of South Indian cinema surpassing Bollywood, which, despite its humongous budgets, has been finding it hard to match the consistent quality of content from regional industries. It is also heartening that the juries and the larger public have started discovering more meaningful content from the southern industries. The National Awards in the 70th edition seem to have fulfilled, to an extent, the purpose for which they were instituted: to celebrate good cinema.</p> <p><strong>What aspect of Kantara contributed significantly to its success and led to it winning national awards?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Its detailed exploration of urban life and modernization.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The lead actor's portrayal of a historical figure.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Its integration of tribal rituals into contemporary environmental concerns.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The use of advanced CGI to depict futuristic themes."], "correct_answer": 2, "solution": "No solution available"}, {"id": "125732", "question": "<strong>Comprehension:</strong><br> The National Film Awards appeared to be facing a credibility crisis in recent years following some questionable choices and glaring omissions. For instance, last year, the award for ‘Best Feature Film on National Integration’, for The Kashmir Files, encapsulated the general political thrust of the awards, where, during the screenings, cinema theatres became platforms for communal sloganeering. Thus, the 70th National Film Awards, declared earlier this week, came as a sort of surprise, somewhat redeeming the prestige associated with the highest cinematic honours. Malayalam film Aattam, directed by debutant Anand Ekarshi, became an interesting choice for the Best Feature Film, Best Screenplay and Best Editing winner, especially in the era of the #MeToo movement. Without ever slipping into preachiness, the film-maker uses the subtle chamber drama to analyse male behaviour after a woman raises an allegation of sexual abuse within a theatre group. The award also comes at a time when protests and debates are roiling the country after the rape and murder of a doctor in Kolkata. Kannada film Kantara, which won Best Popular Film, and also fetched its director Rishab Shetty the Best Actor Award, taps into folk traditions to raise contemporary environmental concerns. Bhoota Kola, a tribal ritualistic performance from coastal Karnataka, is the centrepiece, with Shetty’s frenzied interpretation in the climax going a long way towards the film’s success as well as getting him the national award.</p> <p>One commonality between these films is the lack of a formula, especially the kind dictated by corporate studios. Aattam, in fact, originated from a theatre group, giving its working-class members a chance at cinema; they play themselves in the film. Nithya Menen’s Best Actress award is also an unconventional choice — as the effervescent Shobhana in Thiruchitrambalam, hers is not a typical award-bait role. Yet, within the film’s scheme, it was a stunning performance which raised its overall effect by several notches. The awards reinforce the recent trend of South Indian cinema surpassing Bollywood, which, despite its humongous budgets, has been finding it hard to match the consistent quality of content from regional industries. It is also heartening that the juries and the larger public have started discovering more meaningful content from the southern industries. The National Awards in the 70th edition seem to have fulfilled, to an extent, the purpose for which they were instituted: to celebrate good cinema.</p> <p>What is the synonym of the word \"<strong>unconventional</strong>\" as used in the passage?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Traditional", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Innovative", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Predictable", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Standard"], "correct_answer": 1, "solution": "No solution available"}, {"id": "125735", "question": "<strong>Comprehension:</strong><br> The ambitious goal of eradicating wild-type poliovirus type-1 (WPV1) by 2026 appears to have become tougher. WPV1, which is endemic only in Pakistan and Afghanistan, is showing signs of a resurgence since 2023. With Afghanistan and Pakistan reporting six WPV1 cases each in 2023 — there were two cases in Afghanistan and 20 cases in Pakistan in 2022 — the total incidence of type-1 cases in both countries in 2023 might appear to have nearly halved. But with six cases in Afghanistan and five cases in Pakistan already this year, there appears to be an uptick. If this continues, the total cases being reported from the two countries might be close to or even surpass the 2022 numbers. The concern about WPV1 is not limited to the number of cases in children. The circulation of the virus in the environment is seen to be rising, and, most importantly, after a gap of two years, positive environmental samples have been increasingly collected in Pakistan, in 2023 and till early June this year, from cities which have been historical reservoirs for the virus. Last year, 125 positive environmental samples were collected from 28 districts in Pakistan. Of these, 119 belonged to a genetic cluster (YB3A), which suggests that these were imported from Afghanistan. By June 1 this year, there have been 153 positive environmental samples from 39 districts. As of April 8, 2024, 34 positive environmental samples were collected from Afghanistan.</p> <p>According to the World Health Organization, the presence of positive environmental samples in “epidemiologically critical areas and historical reservoirs” such as Karachi, Quetta and the Peshawar-Khyber blocks in Pakistan, and Kandahar in Afghanistan, represents a significant risk to the gains made in the past. Rising positive environmental samples are a reflection of polio campaigns not really achieving their desired coverage; fake finger marking sans vaccination is a persisting problem. Though children in Pakistan’s cities are largely immunised, there is a heightened risk of the virus striking any unvaccinated or not fully vaccinated children — in 2023, two of the six cases were from Karachi city. The situation in Pakistan appears worse than it is in Afghanistan with the actual spread of WPV1 seen “predominantly in Afghanistan in 2022 now being detected in Pakistan in 2023 and 2024”. There is also the grave risk of international spread from Pakistan, particularly to Afghanistan. With over 0.5 million Afghan refugees forced to leave Pakistan, and an estimated 0.8 million to be evicted soon, there is an increased risk of cross-border spread of the virus. There is a large pool of unvaccinated and under-immunised children in southern Afghanistan, increasing the risk that returning refugees can pose.</p> <p><strong>What does the increase in positive environmental samples collected from Pakistan and Afghanistan indicate about the spread of wild-type poliovirus type-1 (WPV1)?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The number of positive environmental samples suggests that the spread of WPV1 is under control due to effective containment and vaccination efforts.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The increase represents routine fluctuations in virus detection, not necessarily correlating with actual case numbers.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> It signifies that the polio virus has been completely eradicated from other regions, focusing only on Pakistan and Afghanistan.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The rising number of environmental samples indicates a likely resurgence and geographical spread of WPV1, given the historical context of virus reservoirs in these regions."], "correct_answer": 3, "solution": "No solution available"}, {"id": "125736", "question": "<strong>Comprehension:</strong><br> The ambitious goal of eradicating wild-type poliovirus type-1 (WPV1) by 2026 appears to have become tougher. WPV1, which is endemic only in Pakistan and Afghanistan, is showing signs of a resurgence since 2023. With Afghanistan and Pakistan reporting six WPV1 cases each in 2023 — there were two cases in Afghanistan and 20 cases in Pakistan in 2022 — the total incidence of type-1 cases in both countries in 2023 might appear to have nearly halved. But with six cases in Afghanistan and five cases in Pakistan already this year, there appears to be an uptick. If this continues, the total cases being reported from the two countries might be close to or even surpass the 2022 numbers. The concern about WPV1 is not limited to the number of cases in children. The circulation of the virus in the environment is seen to be rising, and, most importantly, after a gap of two years, positive environmental samples have been increasingly collected in Pakistan, in 2023 and till early June this year, from cities which have been historical reservoirs for the virus. Last year, 125 positive environmental samples were collected from 28 districts in Pakistan. Of these, 119 belonged to a genetic cluster (YB3A), which suggests that these were imported from Afghanistan. By June 1 this year, there have been 153 positive environmental samples from 39 districts. As of April 8, 2024, 34 positive environmental samples were collected from Afghanistan.</p> <p>According to the World Health Organization, the presence of positive environmental samples in “epidemiologically critical areas and historical reservoirs” such as Karachi, Quetta and the Peshawar-Khyber blocks in Pakistan, and Kandahar in Afghanistan, represents a significant risk to the gains made in the past. Rising positive environmental samples are a reflection of polio campaigns not really achieving their desired coverage; fake finger marking sans vaccination is a persisting problem. Though children in Pakistan’s cities are largely immunised, there is a heightened risk of the virus striking any unvaccinated or not fully vaccinated children — in 2023, two of the six cases were from Karachi city. The situation in Pakistan appears worse than it is in Afghanistan with the actual spread of WPV1 seen “predominantly in Afghanistan in 2022 now being detected in Pakistan in 2023 and 2024”. There is also the grave risk of international spread from Pakistan, particularly to Afghanistan. With over 0.5 million Afghan refugees forced to leave Pakistan, and an estimated 0.8 million to be evicted soon, there is an increased risk of cross-border spread of the virus. There is a large pool of unvaccinated and under-immunised children in southern Afghanistan, increasing the risk that returning refugees can pose.</p> <p><strong>Why is the goal of eradicating WPV1 by 2026 considered increasingly difficult, as suggested by recent data on polio cases and environmental samples?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The consistency in the number of polio cases year-over-year suggests that eradication efforts are already successful, simplifying the path to achieving the 2026 goal.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ongoing conflicts and instability in the region have likely improved public health infrastructure, making it easier al samples from 39 districts. As of April 8, 2024, 34 positive environmental samples were collected from Afghanistan.</p> <p>According to the World Health Organization, the presence of positive environmental samples in “epidemiologically critical areas and historical reservoirs” such as Karachi, Quetta and the Peshawar-Khyber blocks in Pakistan, and Kandahar in Afghanistan, represents a significant risk to the gains made in the past. Rising positive environmental samples are a reflection of polio campaigns not really achieving their desired coverage; fake finger marking sans vaccination is a persisting problem. Though children in Pakistan’s cities are largely immunised, there is a heightened risk of the virus striking any unvaccinated or not fully vaccinated children — in 2023, two of the six cases were from Karachi city. The situation in Pakistan appears worse than it is in Afghanistan with the actual spread of WPV1 seen “predominantly in Afghanistan in 2022 now being detected in Pakistan in 2023 and 2024”. There is also the grave risk of international spread from Pakistan, particularly to Afghanistan. With over 0.5 million Afghan refugees forced to leave Pakistan, and an estimated 0.8 million to be evicted soon, there is an increased risk of cross-border spread of the virus. There is a large pool of unvaccinated and under-immunised children in southern Afghanistan, increasing the risk that returning refugees can pose.</p> <p><strong>What is the tone of the last paragraph in the passage discussing the polio situation in Pakistan and Afghanistan?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Indifferent", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Concerned", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Skeptical"], "correct_answer": 2, "solution": "No solution available"}, {"id": "125739", "question": "<strong>Comprehension:</strong><br> Books have long served as companions to humanity, bridging the present with the past and future through a rich tapestry of historical narratives and fiction. Each book, a product of its time, reflects the sociocultural nuances prevalent in the society of its era. They serve as invaluable archives, documenting the thoughts, experiences and ideas of past generations, offering us a wellspring of wisdom to draw from and learn. By delving into literature spanning different epochs, we glean insights into the beliefs, values and perspectives of our predecessors, acting as conduits for the transmission of ideas across generations and cultures. Moreover, books kindle the flames of imagination, inspiring us to envision and strive for the seemingly impossible.</p> <p>As repositories of knowledge, wisdom and creativity, books provide solace in solitude and guidance in uncertainty. A singularly remarkable tome possesses the power to transport us to distant realms, broadening our horizons and fueling our imaginations. They serve as windows to diverse societies and cultures, offering immersive experiences that transcend geographical boundaries. Whether through captivating novels or enlightening travelogues, books possess the remarkable ability to transport us to unexplored territories, fostering empathy and understanding.</p> <p>In the realm of creativity and innovation, books serve as catalysts, igniting the flames of imagination and propelling us towards new frontiers. They enable us to visualise and conceptualise in ways that transcend the limitations of our physical reality. Moreover, in the preservation of cultural heritage, books play an indispensable role, in safeguarding languages, traditions and values for posterity. one\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> from a unwieldy domestic and commodity-centric", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> leviathan to a global and consumer-facing conglomerate,", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> cementing its eminence in the post-liberalisation era."], "correct_answer": 1, "solution": "B) <strong>'a unwieldy'</strong> के बदले 'an unwieldy' का प्रयोग होगा क्योंकि 'unwieldy' का उच्चारण स्वर 'u' से होता है, इसलिए 'a' की जगह 'an' का प्रयोग किया जाएगा। उदाहरण— He is an honest man."}, {"id": "125569", "question": "<strong>sentence has been given with a blank to be filled with an appropriate option. Choose the correct alternative</strong></p> <p>Social media is _____ to market products", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> used", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> uses", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> use", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> using"], "correct_answer": 0, "solution": "<strong>'Used'</strong> should be used because it indicates how social media is utilized to promote products in the market. 'Used' is in the passive form, fitting the context appropriately. 'Uses' and 'use' are in the active form and the requirement here is for the passive form. 'Using' is also incorrect for this context as it denotes present continuous tense, which isn't suitable here"}, {"id": "125554", "question": "<strong>Select the word which means the same as the group of words given.</strong></p> <p>A system of government in which power is held by the people", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Bureaucracy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Autocracy", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Democracy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Monarchy"], "correct_answer": 2, "solution": "<strong>C) Democracy</strong> (noun) – A system of government in which power is held by the people लोकतंत्र"}, {"id": "125565", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>\"What a good idea!\", Seema remarked.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Seema exclaimed that the idea is good.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Seema exclaimed that it was a very good idea.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Seema told what an idea!", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Seema said what a good idea it is"], "correct_answer": 1, "solution": "Direct speech को Indirect speech में बदलने के लिए exclamatory sentences में Reporting Verb को exclaimed से बदला जाता है। साथ ही, exclamatory शब्दों (What, How आदि) को वाक्य में जोड़कर उनका भाव व्यक्त किया जाता है। वाक्य \"What a good idea!\" Seema remarked. को Indirect Speech में बदलते समय: Exclamation (What a good idea!) को सामान्य वाक्य में परिवर्तित किया जाता है।<br> Verb ‘is’ को Past Tense में बदलकर ‘was’ किया जाता है।<br> Reporting Verb ‘remarked’ को ‘exclaimed’ से बदला जाता है।<br> To convert Direct Speech into Indirect Speech for exclamatory sentences, the Reporting Verb is changed to exclaimed. The exclamatory phrase (What a good idea!) is converted into a declarative sentence. The verb ‘is’ is changed to its past tense ‘was’."}, {"id": "125568", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>During tough times, she had to lean _________________ her close friends, choosing to depend, rely, rest on, trust, and count on them for emotional support and guidance.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Up", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> On", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> For", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> About"], "correct_answer": 1, "solution": "'On' should be used because \"lean on\" means to depend or rely on someone, especially for support, which fits well with the context of emotional reliance. Whereas, 'Up' is used to indicate direction, 'For' is used to indicate purpose, and 'About' refers to a topic or matter, none of which are appropriate in this context."}, {"id": "125570", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>What customs officials are asking for are not things that ______ their own personal titles.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> aggrandize", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> accede", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> acerbic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> advocate"], "correct_answer": 0, "solution": "<strong>'Aggrandize'</strong> should be used because it means to increase the power or importance of something, especially in a grand or significant manner. The sentence implies that what customs officials are asking for does not serve to enhance their personal positions, making 'aggrandize' the correct choice here. On the other hand, 'Accede' means to agree or to accept, 'Acerbic' implies being sharp or bitter, and 'Advocate' means to support or to be in favor of, which don't fit in this context"}, {"id": "125551", "question": "<strong>Choose the most appropriate meaning of the underlined phrase.</strong></p> <p>He's still <ins><strong>keeping his chin up</strong> </ins>despite all his health problems", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To keep one’s chin clean and moist", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To stay safe during difficulty", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To stay cheerful during difficult times", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To save others during difficult times"], "correct_answer": 2, "solution": "<strong>C)</strong> <strong>keeping his chin up</strong> (phrase) – To stay cheerful during difficult times कठिन समय में खुश रहना"}, {"id": "125546", "question": "<strong>Select the most appropriate synonym of the given word.</strong></p> <p>Social media platforms must take steps to prevent the <strong>stigmatisation</strong> of individuals based on their personal choices.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Crave", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Disgrace", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Disguise", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Compel"], "correct_answer": 1, "solution": "<strong>Crave</strong> (noun) – Longing, desire, yearning, appetite, urge लालसा"}, {"id": "125552", "question": "<strong>Select the most appropriate meaning of the given idiom.</strong></p> <p>On thin ice", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> In a risky position", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Communicating with friends", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> On a summer vacation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> On an investigating job"], "correct_answer": 0, "solution": "<strong>A)</strong> <strong>On thin ice</strong> (idiom) – <strong>In a risky position</strong> जोखिम भरी स्थिति में"}, {"id": "125555", "question": "<strong>Select the word which means the same as the group of words given.</strong></p> <p>Drawings or writing scribbled on walls in public places", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sketches", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Graffiti", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Posters", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hoardings"], "correct_answer": 1, "solution": "<strong>B) Graffiti</strong> (noun) – Drawings or writing scribbled on walls in public places भित्तिचित्र"}, {"id": "125564", "question": "<strong> Select the option that expresses the given sentence in passive voice.</strong></p> <p>I need to evaluate all the options available by the end of this month", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> All the options available will be needed to evaluate by the end of this month.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I needed to evaluate all the options by the end of this month.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> All the options will be needing evaluation with the end of this month.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> All the options available need to be evaluated by me by the end of this month."], "correct_answer": 3, "solution": "To convert Active Voice into Passive Voice in <strong>Modal or Need-based Sentences</strong>, the structure <strong>(Object + Auxiliary Verb + to be + Past Participle + by + Subject)</strong> is used. In the sentence <strong>‘I need to evaluate all the options available by the end of this month’</strong>, the object <strong>‘all the options available’</strong> is placed at the beginning. The verb <strong>‘need to evaluate’</strong> is changed to <strong>‘need to be evaluated’</strong>. The subject <strong>‘I’</strong> is placed at the end as <strong>‘by me’</strong>."}, {"id": "125563", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>Teachers love their students", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Students are being loved by their teachers.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Students are loved by their teachers.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Students have been loved by their teachers", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Students will be loved by their teachers."], "correct_answer": 1, "solution": "To convert Active Voice into Passive Voice in the <strong>Present Simple Tense</strong>, the structure <strong>(Object + Auxiliary Verb + Past Participle + by + Subject)</strong> is used. In the sentence <strong>‘Teachers love their students’</strong>, the object <strong>‘their students’</strong> is placed at the beginning. The verb <strong>‘love’</strong> is changed to <strong>‘are loved’</strong>. The subject <strong>‘Teachers’</strong> is placed at the end as <strong>‘by their teachers’</strong>."}, {"id": "125549", "question": "<strong>Select the most appropriate Antonym of the given word.</strong></p> <p>The fallen tree <strong>hindered</strong> the flow of traffic and caused a delay in reaching the destination.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Facilitate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Productive", "<p style=\"display:none\"><img alt=\"reload\" new batch of officers is being trained by me."], "correct_answer": 3, "solution": "To convert Active Voice into Passive Voice in the <strong>Present Continuous Tense</strong>, the structure <strong>(Object + Auxiliary Verb + Being + Past Participle + by + Subject)</strong> is used. In the sentence <strong>‘I am training a new batch of officers now’</strong>, the object <strong>‘a new batch of officers’</strong> is placed at the beginning. The verb <strong>‘am training’</strong> is changed to <strong>‘is being trained’</strong>. The subject <strong>‘I’</strong> is placed at the end as <strong>‘by me’</strong>."}, {"id": "125547", "question": "<strong>Select the most appropriate Antonym of the given word.</strong></p> <p>The <strong>immense</strong> support from the community had a tremendous impact on the project’s success.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Salvation", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Tiny", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Immortal", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mortal"], "correct_answer": 1, "solution": "<strong>Antonym:</strong> <strong>Tiny</strong> (adjective) – Very small in size, minute. बहुत छोटा"}, {"id": "125544", "question": "<strong>Select the most appropriate synonym of the given word.</strong></p> <p>His <strong>indifferent</strong> attitude toward the team's efforts disappointed his colleagues.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Detached", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Stark", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Betray", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Relish"], "correct_answer": 0, "solution": "<strong>Stark</strong> (adjective) – Harsh, clear, severe, blunt सख्त और स्पष्ट"}, {"id": "125553", "question": "<strong>Select the most appropriate one-word substitution for the given group of words.</strong></p> <p>Lack of feeling", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Empathy", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Apathy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Telepathy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sympathy"], "correct_answer": 1, "solution": "<strong>B) Apathy</strong> (noun) – Lack of feeling or emotion; indifference. उदासीनता"}, {"id": "125545", "question": "<strong>Select the most appropriate synonym of the given word.</strong></p> <p>The surgeon warned that delaying the operation could have <strong>fatal</strong> consequences.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Innuendo", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Insinuation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Prose", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Lethal"], "correct_answer": 3, "solution": "<strong>Innuendo</strong> (noun) – An allusive or oblique remark or hint, typically a suggestive or disparaging one. अप्रत्यक्ष संकेत, ताना"}, {"id": "125558", "question": "<strong>Select the INCORRECTLY spelt word.</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ettiquete", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> rationalisation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> elopement", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> occasion"], "correct_answer": 0, "solution": "<strong>A) </strong>The correct spelling of <strong>'ettiquete'</strong> is 'etiquette' which means \"the customary code of polite behavior in society or among members of a particular profession or group\" शिष्टाचार, सदाचार."}, {"id": "125566", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>\"What a rare flower!\" she said.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She exclaimed what a rare flower it is.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She exclaimed that it was a very rare flower.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She asked if it was a rare flower.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She told that what a rare flower it was."], "correct_answer": 1, "solution": "Direct speech को Indirect speech में बदलने के लिए exclamatory sentences में Reporting Verb को exclaimed से बदला जाता है। साथ ही, exclamatory शब्दों (What, How आदि) को वाक्य में जोड़कर उनका भाव व्यक्त किया जाता है। वाक्य \"What a rare flower!\" she said. को Indirect Speech में बदलते समय: Exclamation (What a rare flower!) को सामान्य वाक्य में परिवर्तित किया जाता है।<br> Verb ‘is’ को Past Tense में बदलकर ‘was’ किया जाता है।<br> Reporting Verb ‘said’ को ‘exclaimed’ से बदला जाता है।<br> To convert Direct Speech into Indirect Speech for exclamatory sentences, the Reporting Verb is changed to exclaimed. The exclamatory phrase (What a rare flower!) is converted into a declarative sentence. The verb ‘is’ is changed to its past tense ‘was’."}, {"id": "125548", "question": "<strong>Select the most appropriate Antonym of the given word.</strong></p> <p>The boy’s <strong>stutter</strong> made him feel embarrassed, but he overcame his hesitancy with regular practice.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Brisk", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Exceptional", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Fluency", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Quick"], "correct_answer": 2, "solution": "<strong>Antonym</strong>: <strong>Fluency</strong> (noun) – The ability to express oneself easily and articulately, smoothness. धाराप्रवाह"}, {"id": "125567", "question": "<strong>Select the correct indirect narration of the given sentence.</strong></p> <p>She said, \"We visited Uttarakhand in the summer vacation.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She said that they will visit to Uttarakhand in the summer vacation.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She said that they had visited Uttarakhand in the summer vacation.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She said that we visited Uttarakhand in the summer vacation.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She said that they have visited Uttarakhand in the summer vacation."], "correct_answer": 1, "solution": "Reporting Verb <strong>‘said’</strong> को यथावत रखा जाता है क्योंकि यह एक कथन को दर्शाता है।"}],ans={};
const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
