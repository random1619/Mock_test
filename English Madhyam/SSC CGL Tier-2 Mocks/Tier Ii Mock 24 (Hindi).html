<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 24 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>
    <!-- START: Unified Premium Dark Mode Overrides -->

: 1, "solution": "B) 'Visionary' का use होगा क्योंकि \"visionary\" का अर्थ होता है आगे की सोच वाला या नवाचारी। sentence में mention किया गया है कि राम की नेतृत्व की प्रशंसा की गई है, इसलिए 'visionary' यहाँ सही है। जबकि 'Imaginary' का अर्थ है कल्पनिक, 'Magical' का अर्थ है जादुई, और 'Broad' का अर्थ है विस्तृत, जो इस context में सही नहीं है।"}, {"id": "35709", "question": "<strong>Q3. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>A. </strong> The Centre had earlier projected full-year GDP to contract by 8%. There was a 3.7% growth in fourth-quarter gross value added, with all but two of the economy’s eight broad sectors posting expansions.<br> <strong>B. </strong> Still, the pandemic’s crushing impact over the preceding three quarters meant that only the agriculture, forestry and fishing and the utility services recorded full-year growth.<br> <strong>C. </strong> Mining and quarrying and the worst-hit contact-intensive omnibus services category of trade, hotels, transport, communications and broadcasting contracted 5.7% and 2.3%, respectively.<br> <strong>D. </strong> GDP expanded by 1.6% in the final quarter of the last fiscal, an acceleration from the 0.5% growth in the preceding three-month period, that marginally softened the extent of the full-year’s record contraction to 7.3%.<br> <strong>E. </strong> The national income estimates released by the NSO posit an economy that appears to have found some footing in the January-March quarter before the pandemic’s second wave hit.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> EDACB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DBAEC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CBDAE", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BADEC"], "correct_answer": 0, "solution": "<strong>E -&gt;</strong> Refers to the national income estimates released by the NSO that suggests the economy found some footing before the pandemic's second wave. This provides an introduction."}, {"id": "35710", "question": "<strong>Q4. Some sentences are given below. While the first and the last sentences (1 and 2) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>1. </strong> India’s inflation based on the consumer price index quickened to 6.01% in January, breaching the central bank’s upper tolerance limit of 6%.<br> <strong>A. </strong> Oils and fats quickened the fastest at 18.7%.<br> <strong>B. </strong> Provisional estimates show the hinterland, with its greater proportion of the country’s poor, bore the brunt of rising food prices with rural food price inflation sprinting to 5.18% from December’s 3.39%.<br> <strong>C. </strong> While the headline number was no surprise given that the RBI had forecast the acceleration, the official data merit scrutiny.<br> <strong>D. </strong> Though the RBI had been expected to start normalising its pandemic-era policy stance in February’s monetary policy meeting and reaffirm its resolve to contain inflation, the central bank retained the status quo in order to support economic growth.<br> <strong>2. </strong> Governor Shaktikanta Das has defended the RBI’s projection for inflation to slow to 4.5% in FY23 by citing the base effect as the cause for higher headline inflation this fiscal, and predicted that a similar base effect would help enable a downtrend in the coming months.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png the most appropriate ANTONYM of the underlined word</strong>.</p> <p>For the aspiring East India company that looked at every opportunity for expansion and <strong>self-aggrandisement</strong>, the century had to be projected as one of instability</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> humility", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> exaggeration", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> upliftment", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> elevation"], "correct_answer": 0, "solution": "<strong>Antonym</strong>: <strong>Humility</strong> (noun) – Modesty or lack of pride, a quality of not thinking you are better than other people. विनम्रता"}, {"id": "35713", "question": "<strong>Q7. Select the most appropriate ANTONYM for the word 'assertion' in the following sentence</strong>.</p> <p>There was a combination of agrarian colonising tendencies with the assertion of local landlord power that was able to assimilate pioneer peasants.</p> <p>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> insistence", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> averment", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> statement", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> denial"], "correct_answer": 3, "solution": "<strong>Antonym</strong>: <strong>Denial</strong> (noun) – The action of declaring something to be untrue, contradiction, negation, disavowal. अस्वीकार"}, {"id": "35714", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong></p> <p>An unexpected call disturbed Maria terribly which compelled her to stop the performance.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Maria disturbed terribly by an unexpected call which compelled her to stop the performance.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Maria could be disturbed terribly by an unexpected call which compelled her to stop the performance.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Maria was disturbed terribly by an unexpected call which compelled her to stop the performance.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Maria had been disturbed terribly by an unexpected call which compelled her to stop the performance"], "correct_answer": 2, "solution": "<strong>Active से Passive Voice में बदलने के लिए, </strong>Active वाक्य का <strong>Object</strong> Passive वाक्य का <strong>Subject</strong> बन जाता है। <strong>Verb</strong> को Active से Passive में बदलते समय सही <strong>Tense</strong> का प्रयोग किया जाता है। Active वाक्य में \"<strong>An unexpected call</strong>\" (Subject), \"<strong>disturbed</strong>\" (Verb in <strong>Past Simple</strong>), और \"<strong>Maria</strong>\" (Object) है। Passive में बदलने पर <strong>Object \"Maria\"</strong> (Subject) बन गया है, Verb को \"<strong>was disturbed</strong>\" (<strong>Past Simple Passive</strong>) में बदला गया है और \"<strong>by an unexpected call</strong>\" के रूप में प्रयोग किया गया है।"}, {"id": "35715", "question": "<strong>Q9. Select the most appropriate option to fill in the blank</strong>.</p> <p>The doctor directed the nurse to administer an __________ medicine to the patient.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> official", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> eminent", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> alternative", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> insightful"], "correct_answer": 2, "solution": "C) 'Alternative' का use होगा क्योंकि \"alternative\" का अर्थ होता है वैकल्पिक या प्रतिस्थापित। Sentence में mention किया गया है कि डॉक्टर ने नर्स से किसी अन्य औषधि को देने के लिए कहा है, इसलिए 'alternative' यहाँ सही है। जबकि 'Official' का अर्थ है आधिकारिक, 'Eminent' का अर्थ है प्रमुख या प्रसिद्ध, और 'Insightful' का अर्थ है समझदार या गहरी समझ वाला, जो इस context में सही नहीं है।"}, {"id": "35716", "question": "<strong>Q10. Select the correct collocation from the options and complete the sentence</strong></p> <p>It is very difficult for her to ___________.</p> <p>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> keep a secret", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> touch a secret", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> make a secret", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> cry a secret"], "correct_answer": 0, "solution": "A) 'Keep a secret' का use होगा क्योंकि \"keep a secret\" का अर्थ होता है रहस्य को छुपा के रखना। Sentence में इसे इस तरह से प्रयोग किया जा सकता है कि किसी को कोई रहस्य छुपा कर रखना मुश्किल है। इसलिए 'keep a secret' यहाँ सही है। जबकि 'touch a secret', 'make a secret', और 'cry a secret' इस context में सही नहीं हैं।"}, {"id": "35717", "question": "<strong>Q11. Select the option that can be used as a one-word substitute for the given group of words</strong>.</p> <p>A person in love with himself</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Narcissist", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Lunatic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Stoic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Polyglot"], "correct_answer": 0, "solution": "A) <strong>Narcissist</strong> (noun) – A person who has an excessive interest in or admiration of themselves. आत्ममुग्ध"}, {"id": "35718", "question": "<strong>Q12. Select the option that can be used as a one-word substitute for the given group of wo</strong>rds.</p> <p>Giving the worrying impression that something bad is going to happen</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Desolate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Suspicious", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Ominous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Bleak"], "correct_answer": 2, "solution": "C) <strong>Ominous</strong> (noun) – Giving the worrying impression that something bad is going to happen अशुभ"}, {"id": "35719", "question": "<strong>Q13. Select the option that expresses the given sentence in reported speech</strong>.</p> <p>She said, ”I called yesterday, but there was no response”.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She said that she had called the day before, but there was no response.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She said I called yesterday, but there was no response.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She said that I called day before, but there was no response.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She said she called yesterday, but there was no response."], "correct_answer": 0, "solution": "A) She said that she had called the day before, but there was no response"}, {"id": "35720", "question": "<strong>Q14. Select the INCORRECTLY spelt word</strong>.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Finery", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Hiest", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cringe", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Defer"], "correct_answer": 1, "solution": "B) The INCORRECTLY spelled word among the options provided is option B \"Hiest\". The correct spelling is \"Heist\" which means “a robbery or theft”, especially one involving a large haul of stolen goods चोरी, डाकैती."}, {"id": "35721", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <strong>A) </strong>This has forced India to match the Chinese deployment, leading to an extraordinary build-up on a scale not seen since 1962.<br> <strong>B) </strong> That India and China have agreed to stop sending more troops to the frontline is a welcome step towards hitting pause on the rising tensions along the LAC.<br> <strong>C) </strong> The new agreement of September 21, at the sixth round of Corps Commander talks since June, will put a stop to this build-up, that is, if it is implemented sincerely.<br> <strong>D) </strong> Indeed, the genesis of the tensions lies in China’s large-scale deployment of troops to forward areas in May, and subsequent multiple transgressions in the Galwan Valley, Pangong Lake, Gogra, Hot Springs, and Depsang plains that have violated almost every core tenet of the four border agreements that have helped keep the peace since 1993.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ACBD", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BDAC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ACDB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDCA"], "correct_answer": 1, "solution": "B. This seems like a statement that describes a decision or resolution between India and China. It doesn't follow from another statement, making it a potential starting sentence."}, {"id": "35722", "question": "<strong>Q16. A sentence has been given with a blank to be filled with an appropriate word. Choose the correct alternative</strong>.</p> <p>If you are the one who is planning to lose weight, remember to keep your snacking _______.</p> <ol> </ol> <p>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> outgoing", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> prejudiced", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> uncontrolled", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> moderate"], "correct_answer": 3, "solution": "D) 'Moderate' का use होगा क्योंकि \"moderate\" का अर्थ होता है संतुलित या सीमित रखना। Sentence में यह कहा गया है कि अगर आप वजन घटाने की योजना बना रहे हैं, तो अपने नाश्ते को संतुलित रखें, इसलिए 'moderate' यहाँ सही है। जबकि 'Outgoing' का अर्थ है बाहर जानेवाला, 'Prejudiced' का अर्थ है पक्षपाती, और 'Uncontrolled' का अर्थ है अनियंत्रित, जो इस context में सही नहीं है।"}, {"id": "35723", "question": "<strong>Q17. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>a. </strong> A month after the Congress government in Puducherry was brought down through engineered resignations of its legislators, the Union Territory is preparing for an Assembly election that could transform its political landscape.<br> <strong>b. </strong> A political non-entity till then, the BJP had only token political representation through three nominated MLAs.<br> <strong>c. </strong> It is a battle that would primarily test a wounded Congress’s ability to woo the electorate by playing the victim card and the BJP’s strength on the ground.<br> <strong>d. </strong> Five years ago, 29 of its 30 candidates forfeited their deposit. Now, it is contesting in nine seats in an alliance led by the All India N.R. Congress (16 seats); the AIADMK gets five seats. The Congress has ceded ground to its allies, allotting 13 seats to the DMK and one each to the CPI and the VCK.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> acbd", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> bdac", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> bdca", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> dcba"], "correct_answer": 0, "solution": "A) <strong>acbd</strong>"}, {"id": "35724", "question": "<strong>Q18. For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the appropriate sentences for S2 and S3, respectively.</strong><br> <br> <strong>S1:</strong> The suicide attack at a Shia mosque in Peshawar, killing at least 62 people, is a grave reminder of Pakistan’s growing security challenges after the Taliban’s return to power in Afghanistan and the continued persecution that the Shia minority is facing in the Af-Pak region.<br> <strong>S4: </strong>The IS’s sectarian animosity towards the Shias is well-known. In Iraq and Syria, the IS has carried out systematic attacks against the Shias, who they call “rejectionists” of Islam just because they belong to a different branch of the faith.<br> <strong>P. </strong> The Islamic State terrorist organisation, which has carried out a number of suicide attacks in Afghanistan ever since the Taliban captured Kabul in August 2021, has claimed responsibility for the bombing.<br> <strong>Q. </strong> If it does not check the widespread anti-Shia narrative and find a way to tackle the security challenges posed by both the TTP and the IS-K,<br> <strong>R. </strong> This was the deadliest attack in Pakistan since the 2018 bombing of Quetta, killing 149 people.<br> <strong>S. </strong> its borderlands could once again turn to anarchy and sectarian bloodletting.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> S and R", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> R and P", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Q and R", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and S"], "correct_answer": 1, "solution": "B) <strong>R and P</strong>"}, {"id": "35725", "question": "<strong>Q19. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>P. </strong> This has been the case with much of the Sahel region, a 5,900-km-long semi-arid territory. It has seen terrorist groups expanding their networks and stepping up attacks on civilians and soldiers.<br> <strong>Q.</strong> The massacre of at least 160 people in a border village in Burkina Faso over the weekend is a grim reminder of the threat the Sahel region faces from Islamist terrorism.<br> <strong>R.</strong> Nobody has claimed responsibility, but Burkinabe authorities have named the Islamic State in the Greater Sahara (ISGS), which has carried out hundreds of terror strikes in recent years.<br> <strong>S. </strong> The security situation in Burkina Faso, which saw its first major Islamist terrorist attack in 2015, has deteriorated steadily, especially along the borders with Niger and Mali.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RSQP", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RPQS", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> QRSP", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> SQPR"], "correct_answer": 2, "solution": "C) <strong>QRSP</strong>"}, {"id": "35726", "question": "<strong>Q20. Select the most appropriate meaning of the given idiom</strong>.</p> <p>To smell a rat</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To have reason to know the presence of a rat", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To have reason to suspect", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To know the smell of a rat", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To learn the smell of a rat"], "correct_answer": 1, "solution": "B) <strong>To smell a rat</strong> (idiom) – To have reason to suspect संदेह करने का कारण होना"}, {"id": "35727", "question": "<strong>Q21. Select the most appropriate synonym of the underlined word</strong>.</p> <p>They successfully <ins><strong>defused</strong> </ins>the situation.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> mitigated", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> mediated", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> activated", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/> fo/public/exam-panel/img/reload.png\"/></p> errauneous"], "correct_answer": 1, "solution": "B) The correct option is B. 'No error'. The word 'erroneous' is spelled correctly in the given sentence. It means “wrong or incorrect” गलत या अशुद्ध."}, {"id": "35731", "question": "<strong>Q25. Select the option that expresses the given sentence in reported speech</strong>.</p> <p>He said he was going for shopping and asked if he might get me anything.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said, “I will be going for shopping. May I get you anything?”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said, “I will go for shopping. Do you want anything?”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said, “I’m going for shopping. Can I get you anything?”", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He said, “I’m going for shopping. May I get you anything?”"], "correct_answer": 3, "solution": "D) He said, “I’m going for shopping. May I get you anything?”"}, {"id": "35732", "question": "<strong>Q26. Select the option that expresses the given sentence in indirect speech</strong>.</p> <p>The passenger says to the railway clerk, “Is the train late?”</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The passenger asks the railway clerk was the train late.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The passenger asked the railway clerk was the train late.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The passenger asks the railway clerk if the train is late.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The passenger has asked the railway clerk whether the train is late."], "correct_answer": 2, "solution": "C) The passenger asks the railway clerk if the train is late."}, {"id": "35733", "question": "<strong>Q27. Select the most appropriate meaning of the underlined idiom in the given sentence</strong></p> <p>Being an ardent professional, the lawyer always kept his clients<ins> <strong>at an arm’s length.</strong></ins></p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Away from each other", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> At a distance", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Under wraps", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Alert and prepared"], "correct_answer": 1, "solution": "B) <strong>At an arm’s length </strong>(phrase) – At a distance दूरी पर"}, {"id": "35734", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong></p> <p>Rick was completing graduation last year.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Graduation was being completed by Rick last year.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Graduation were completed by Rick last year.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Graduation was completed by Rick last year.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Graduation is being completed by Rick last year."], "correct_answer": 0, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong>, Active वाक्य का <strong>Object</strong> Passive वाक्य का <strong>Subject</strong> बन जाता है। <strong>Verb</strong> को Active से Passive में बदलते समय सही <strong>Tense</strong> का प्रयोग किया जाता है। इस वाक्य में <strong>\"Rick\"</strong> (Subject), <strong>\"was completing\"</strong> (Verb in <strong>Past Continuous</strong>), और <strong>\"graduation\"</strong> (Object) हैं। Passive में बदलने पर, <strong>\"Graduation\"</strong> (Object) को <strong>Subject</strong> बनाया गया है, और Verb को <strong>\"was being completed\"</strong> (<strong>Past Continuous Passive</strong>) में बदला गया है, तथा <strong>\"by Rick\"</strong> जोड़ा गया है।"}, {"id": "35735", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong>.</p> <p>The mother loves the baby.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The baby is loved by the mother.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The baby has been loved by the mother.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The baby was loved by the mother.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The baby will be loved by the mother"], "correct_answer": 0, "solution": "Active से Passive Voice में बदलने के लिए, Active वाक्य का <strong>Object</strong> Passive वाक्य का <strong>Subject</strong> बन जाता है। <strong>Verb</strong> को Active से Passive में बदलते समय सही <strong>Tense</strong> का प्रयोग किया जाता है। दिए गए Active वाक्य में <strong>\"The mother\"</strong> Subject है, <strong>\"loves\"</strong> Verb (Present Simple) है और <strong>\"the baby\"</strong> Object है। Passive में बदलने पर Object <strong>\"The baby\"</strong> Subject बन गया है, Verb को <strong>\"is loved\"</strong> (Present Simple Passive) में बदला गया है और <strong>\"by the mother\"</strong> के रूप में प्रयोग किया गया है।"}, {"id": "35736", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank</strong>.</p> <p>Lightning is unlikely to strike the same place twice, but the Nipah virus is again _____1______in Kozhikode, the fourth outbreak of the disease in Kerala over the last five years. Caused by a zoonotic spillover, the transmission of pathogens from animals to humans, the closest ______2______ of the virus is fruit bats. With two persons dying of Nipah this week in Kozhikode, and three more persons, two of them relatives of one of the victims, testing positive, and being hospitalised, disturbing memories from the terrifying outbreak of 2018, in which 21 of 23 infected people died, _____3______surfaced. The situation remains very much the same, in terms of treatment options: there is no cure, and supportive care remains the only way to handle Nipah infection even in a hospital _______4______.</p> <p><strong>Q30. Select the most appropriate option to fill in blank number 1.</strong><span id=\"cke_bm_605C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Put to rest", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Wreaking havoc", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/relo  at one-fourth (around Rs 60 lakh) the cost of the rating systems available at present in just four other countries, the NCAP should spur more carmakers to get crash tests and evaluation of other safety parameters done for their vehicles. These assessments will, in turn, enable car buyers to make informed choices based on the safety factor. Even as this is likely to propel the auto sector to pull up its socks, it would also brighten the chances of Indian cars marked with good safety grades bagging international orders.</p> <p>The latest WHO data points to road accidents as being the leading cause of death among youth and children in the age group of five to 29 years. Ensuring safety standards of a car cannot be emphasised enough in our country as India accounts for the world’s highest number of road accidents, which claim about 1.5 lakh lives annually. The ratings are vital for meeting the goal of the Brasilia Declaration — to which India is a signatory — to cut by 50 per cent the number of global deaths (1.3 million annually) and injuries due to road accidents by 2030.</p> <p> However, these car safety measures would amount to little in India if not complemented by equally rigorous adherence to traffic norms. For, among the top causes of road mishaps and resultant deaths or injuries are blatant violations of the rules of lane driving and speed limits. The importance of safe driving must be etched in every child’s mind so that s/he grows up to be a responsible driver</p> <p><strong>Q34. Based on the passage, what is the primary purpose of implementing the Bharat New Car Assessment Programme (NCAP)?</strong><span id=\"cke_bm_543C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To increase the price of cars in India.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To compet be a responsible driver</p> <p><strong>Q37. What is the tone of the passage?</strong><span id=\"cke_bm_611C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Indifferent", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pessimistic", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Critical"], "correct_answer": 2, "solution": "No solution available"}, {"id": "35744", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>There are times when a brand acquires a symbolism that far exceeds its real significance. Consider the global political excitement surrounding the BRICS on the eve of the just concluded Johannesburg summit. Many in the Global South have seen the summit as an opportunity to build a new platform to address their economic concerns after the Covid-19 pandemic and the war in Ukraine. If rising resentment in the Global South led to the investment of new hopes in the BRICS, there were fears in the West about the BRICS upending the post-World War II global order. Both the hope and the fear appear misplaced. All the pre-summit hype about a common BRICS currency to replace the dollar, for example, ended in tame statements about trading in national currencies — which are, in any case, pegged against the US dollar.</p> <p>Although it may not shatter the current global order, the BRICS brand has attracted many countries that want to demonstrate their strategic autonomy and stand up to western pressures. The clamour to join the BRICS became intense as 22 countries applied for membership. The Johannesburg summit took a major decision on expanding the forum. It invited six countries — Argentina, Egypt, Ethiopia, Iran, Saudi Arabia, and the United Arab Emirates — to become full members starting early 2024. This is the first expansion since the 2010 admission of South Africa into the BRICS and there could be further expansion of membership and creation of a new category of “partner states”. The BRICS foreign ministers have been tasked to develop criteria and norms for further institutional expansion of the forum.</p> <p>There is a widespread perception that the expansion is a political triumph for China and Russia, which want to see the BRICS become a counter to the G7, and a setback to India, which was said to be unenthusiastic about expansion. This is a misreading of the situation. There is no doubt that China was the one that initiated the expansion move. India did not oppose this but wanted clarity on the criteria. The real bargaining in the BRICS is about whom to admit; current members appear to have got their special friends in. This is unlikely to make the BRICS more efficient. The larger membership will make it harder to produce a purposeful common agenda. If the Johannesburg summit produced a joint statement — a laundry list that ran into 94 paras — imagine what a more diverse group of 11 countries might do when they gather at a summit. The BRICS began nearly two decades ago as a forum with one clear objective — to promote a multipolar world. Given the wide range of differences among its current and incoming members, however, it could well turn into a sack of potatoes that is impossible to turn into a sharp geopolitical instrument. China might have had its wish for expansion granted, but the results could be very different from Beijing’s expectations. Many present and new members have strong ties to the West and are unlikely to toe the Chinese line. Meanwhile, one major impact of the BRICS brand is already here: The growing recognition in the West that it must end the prolonged political neglect of the Global South.</p> <p><strong>Q38. Based on the passage, which of the following best describes the status and perception of BRICS in the context of global expectations?</strong><span id=\"cke_bm_772C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BRICS has already changed the post-World War II global order by introducing a new global currency.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Global South views the BRICS summit as the sole solution to their economic issues post the Covid-19 pandemic.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> There is a widespread belief that BRICS is an entirely coherent and established platform with clear objectives.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Both the hope and apprehensions surrounding BRICS are exaggerated when compared to its actual impact and decisions."], "correct_answer": 3, "solution": "No solution available"}, {"id": "35745", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>There are times when a brand acquires a symbolism that far exceeds its real significance. Consider the global political excitement surrounding the BRICS on the eve of the just concluded Johannesburg summit. Many in the Global South have seen the summit as an opportunity to build a new platform to address their economic concerns after the Covid-19 pandemic and the war in Ukraine. If rising resentment in the Global South led to the investment of new hopes in the BRICS, there were fears in the West about the BRICS upending the post-World War II global order. Both the hope and the fear appear misplaced. All the pre-summit hype about a common BRICS currency to replace the dollar, for example, ended in tame statements about trading in national currencies — which are, in any case, pegged against the US dollar.</p> <p>Although it may not shatter the current global order, the BRICS brand has attracted many countries that want to demonstrate their strategic autonomy and stand up to western pressures. The clamour to join the BRICS became intense as 22 countries applied for membership. The Johannesburg summit took a major decision on expanding the forum. It invited six countries — Argentina, Egypt, Ethiopia, Iran, Saudi Arabia, and the United Arab Emirates — to become full members starting early 2024. This is the first expansion since the 2010 admission of South Africa into the BRICS and there could be further expansion of membership and creation of a new category of “partner states”. The BRICS foreign ministers have been tasked to develop criteria and norms for further institutional expansion of the forum.</p> <p>There is a widespread perception that the expansion is a political triumph for China and Russia, which want to see the BRICS become a counter to the G7, and a setback to India, which was said to be unenthusiastic about expansion. This is a misreading of the situation. There is no doubt that China was the one that initiated the expansion move. India did not oppose this but wanted clarity on the criteria. The real bargaining in the BRICS is about whom to admit; current members appear to have got their special friends in. This is unlikely to make the BRICS more efficient. The larger membership will make it harder to produce a purposeful common agenda. If the Johannesburg summit produced a joint statement — a laundry list that ran into 94 paras — imagine what a more diverse group of 11 countries might do when they gather at a summit. The BRICS began nearly two decades ago as a forum with one clear objective — to promote a multipolar world. Given the wide range of differences among its current and incoming members, however, it could well turn into a sack of potatoes that is impossible to turn into a sharp geopolitical instrument. China might have had its wish for expansion granted, but the results could be very different from Beijing’s expectations. Many present and new members have strong ties to the West and are unlikely to toe the Chinese line. Meanwhile, one major impact of the BRICS brand is already here: The growing recognition in the West that it must end the prolonged political neglect of the Global South.</p> <p><strong>Q39. Based on the passage, which of the following best represents the transformation of BRICS?</strong></p> <p>(i) BRICS is steadily replacing the current global order.<br> (ii) BRICS is essentially a static forum with no potential for growth.<br> (iii) BRICS is evolving as a symbol of strategic autonomy against western pressures.<br> (iv) BRICS has always had a clear and coherent agenda from its inception.<br> (v) BRICS has declined in its attraction, as evidenced by few countries showing interest in joining.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (i) and (ii)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Only (ii)", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Only (iii)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Both (ii) and (iii)"], "correct_answer": 2, "solution": "The passage provides evidence that BRICS is growing in its attractiveness and influence, with many countries wanting to join to showcase their strategic autonomy and resist western pressures. The claim that 22 countries applied for membership and the decision to include six new countries as members substantiates this point. Options A, B, D are either not mentioned in the passage or are contrary to the passage."}, {"id": "35746", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>There are times when a brand acquires a symbolism that far exceeds its real significance. Consider the global political excitement surrounding the BRICS on the eve of the just concluded Johannesburg summit. Many in the Global South have seen the summit as an opportunity to build a new platform to address their economic concerns after the Covid-19 pandemic and the war in Ukraine. If rising resentment in the Global South led to the investment of new hopes in the BRICS, there were fears in the West about the BRICS upending the post-World War II global order. Both the hope and the fear appear misplaced. All the pre-summit hype about a common BRICS currency to replace the dollar, for example, ended in tame statements about trading in national currencies — which are, in any case, pegged against the US dollar.</p> <p>Although it may not shatter the current global order, the BRICS brand has attracted many countries that want to demonstrate their strategic autonomy and stand up to western pressures. The clamour to join the BRICS became intense as 22 countries applied for membership. The Johannesburg summit took a major decision on expanding the forum. It invited six countries — Argentina, Egypt, Ethiopia, Iran, Saudi Arabia, and the United Arab Emirates — to become full members starting early 2024. This is the first expansion since the 2010 admission of South Africa into the BRICS and there could be further expansion of membership and creation of a new category of “partner states”. The BRICS foreign ministers have been tasked to develop criteria and norms for further institutional expansion of the forum.</p> <p>There is a widespread pe line. Meanwhile, one major impact of the BRICS brand is already here: The growing recognition in the West that it must end the prolonged political neglect of the Global South.</p> <p><strong>Q41. Which of the following best describes the tone of the passage regarding BRICS?</strong><span id=\"cke_bm_586C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Critical", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neutral", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Admiring"], "correct_answer": 1, "solution": "No solution available"}, {"id": "35748", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>When I was 15, my skills as a thief had already been honed. During a wrestling match, I met Anil, a man in his mid-20s who radiated kindness and simplicity. Trying to gain his trust, I flattered him, but he playfully responded. We spoke, and I managed to convince him to employ me, even if he couldn't pay. I lied about my culinary skills, but Anil soon realized my cooking was atrocious. However, he found humor in the situation and instead decided to teach me.</p> <p>Anil also introduced me to the world of letters, teaching me to write my own name, and promised to expand my knowledge to sentences and arithmetic. I was intrigued. I understood that literacy was a key to unlimited opportunities.</p> <p>Working for Anil was an interesting experience. I was responsible for buying daily supplies, often managing to pocket some change. Although Anil's income was unpredictable, it didn't bother him. He earned by writing for magazines, an occupation I found odd. One evening, Anil brought home a sum of money from selling a book. That night, I noticed him hide the notes beneath his mattress.</p> <p>Despite Anil’s trust, which he manifested by giving me a key to our shared room, the temptation was hard to resist. I pondered over the thought of robbing him. To my reasoning, Anil would waste the money anyway, and he never really paid me. One night, with the moonlight as my witness, I took the money and ran towards the station. With 600 rupees, the world was mine. But a hesitation at the station, a missed train, and a moment of introspection made me question my choices.</p> <p>The reality of my theft began to weigh on me. I imagined Anil's face, not angry or scared, but simply sad at the betrayal. On a rainy night, as the wet notes clung to me, I thought of the lessons and the promises of a brighter future. Maybe stealing was easy, but to be respected was a greater ambition.</p> <p>With a heavy heart, I decided to return the money. Sneaking back into the room, I placed the notes back under the mattress, hoping Anil wouldn't notice. The following morning, Anil casually handed me a wet 50-rupee note, stating it was my pay. His actions, though silent, spoke volumes. He was aware of my midnight escapade but chose understanding over anger.</p> <p>Anil's subtle gesture wasn't just a monetary transaction but a reaffirmation of trust. As he spoke of our writing lessons for the day, my gratitude and hope grew. I smiled genuinely, knowing that life had much more to offer than the contents of a stolen wallet.</p> <p><strong>Q42. Why did the narrator return the stolen money to Anil</strong>?<span id=\"cke_bm_597C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Because he was caught by the police and forced to return it.", "<p style=\"display:none\"><img ice. The following morning, Anil casually handed me a wet 50-rupee note, stating it was my pay. His actions, though silent, spoke volumes. He was aware of my midnight escapade but chose understanding over anger.</p> <p>Anil's subtle gesture wasn't just a monetary transaction but a reaffirmation of trust. As he spoke of our writing lessons for the day, my gratitude and hope grew. I smiled genuinely, knowing that life had much more to offer than the contents of a stolen wallet.</p> <p><strong>Q45. How did the narrator justify the thought of robbing Anil before actually committing the theft</strong>?<span id=\"cke_bm_661C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He believed Anil had plenty of money and wouldn’t notice.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He felt entitled to the money as he hadn’t been paid.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He thought Anil would easily forgive him.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He thought it would make him respected among thieves."], "correct_answer": 1, "solution": "No solution available"}],ans={};
const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
