<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 57 (hindi) (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>
    <!-- START: Unified Premium Dark Mode Overrides -->

oad.png\"/></p> brush off"], "correct_answer": 2, "solution": "C) 'Brush up on' का प्रयोग होगा क्योंकि \"brush up on\" का अर्थ होता है पढ़े हुए को दोहराना (विशेषतः परीक्षा की तैयारी के लिए);। जबकि 'Brush about' में कोई विशेष अर्थ नहीं होता है, 'Brush on' का अर्थ है लागू करना या लगाना, और 'Brush off' का अर्थ है अनदेखा करना या नकार देना, जो इस संदर्भ में सही नहीं है।"}, {"id": "30265", "question": "<strong>Q5. Select the most appropriate meaning of the given idiom</strong>.</p> <p>Hit the nail on the head</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Do something without having planned beforehand", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Take advantage of a good situation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Do something pointless", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Do something exactly right"], "correct_answer": 3, "solution": "D) <strong>Hit the nail on the head</strong> (idiom) – Do something exactly right बिल्कुल सही काम करना"}, {"id": "30266", "question": "<strong>Q6. Select the correct homonym from the given options to fill in the blank</strong>.</p> <p>The chef’s culinary creations were infused with a distinctive ________ that set them apart from typical restaurant fare.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> flair", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> fair", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> flere", "<p style=\"display:non iate choices for S2 and S3 respectively. They provide context about China's longstanding concerns and the potential implications, fitting in with the theme of the economic slowdown."}, {"id": "30268", "question": "<strong>Q8. The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don’t find any error, mark ‘No error’ as your answer</strong></p> <p>Neither of my sisters / are interested to come / on a vacation with me</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No error", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> on a vacation with me", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> are interested to come", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neither of my sisters"], "correct_answer": 2, "solution": "C) 'are interested' के बदले 'is interested' का प्रयोग होगा क्योंकि 'Neither of my sisters' एक singular subject के रूप में माना जाता है।"}, {"id": "30269", "question": "<strong>Q9. Select the most appropriate option to fill in the blank</strong>.</p> <p>You must employ additional hands ___________________</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> in completing the project in time", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> for completing the project of time", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> in complete the project in time", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> to complete the project on time"], "correct_answer": 3, "solution": "D) 'to' का प्रयोग होगा क्योंकि 'employ' के बाद Purpose बताने के लिए 'to + verb' का प्रयोग होता है। इसलिए 'to complete the project on time' सही विकल्प है"}, {"id": "30270", "question": "<strong>Q10. The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don’t find any error, mark ‘No error’ as your answer</strong>.</p> <p>Can you not / knock so louder / in the morning?</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No error", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> knock so louder", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> in the morning", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Can you not"], "correct_answer": 1, "solution": "B) The correct segment is \"knock so loud\" because the combination of \"so\" with the comparative form \"louder\" is grammatically incorrect. We either use \"so\" with an adjective in its base form or the comparative form without \"so\"; Like— \"It is so hot today\" or \"Today is hotter than yesterday\"."}, {"id": "30271", "question": "<strong>Q11. Select the INCORRECTLY spelt word</strong>.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Persistent", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Repetition", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Overwelming", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Audacious"], "correct_answer": 2, "solution": "C) The incorrectly spelt word among the given options is 'Overwelming'. The correct spelling is ‘Overwhelming’. It means \"very great in amount or degree\". अत्यधिक, अधिक प्रमाण में."}, {"id": "30272", "question": "<strong>Q12. Select the option that expresses the given sentence in reported speech</strong>.</p> <p>Mona said to me, “Are you planning a trip to Disneyland?”</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Mona enquired of me if I was planning a trip to Disneyland.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mona asked me that was I planning a trip to Disneyland?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mona enquired of me that was I planning a trip to Disneyland.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mona asked me if I had been planning a trip to Disneyland?"], "correct_answer": 0, "solution": "A) Mona enquired of me if I was planning a trip to Disneyland"}, {"id": "30273", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong>.</p> <p>Aspirations give us the clarity of our goals.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The clarity of our goals has been given by aspirations.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The clarity is given of our goals by aspirations.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The clarity of our goals are given by aspirations.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The clarity of our goals is given by aspirations"], "correct_answer": 3, "solution": "<strong>Active से Passive Voice में बदलने के लिए,</strong> Active वाक्य का Object Passive वाक्य का Subject बन जाता है। Verb को Active से Passive में बदलते समय सही Tense का प्रयोग किया जाता है। Active वाक्य में <strong>\"Aspirations\"</strong> Subject है, <strong>\"give\"</strong> Verb (Simple Present) है और <strong>\"the clarity of our goals\"</strong> Object है। Passive में बदलने पर Object <strong>\"The clarity of our goals\"</strong> Subject बन गया है, Verb को <strong>\"is given\"</strong> (Simple Present Passive) में बदला गया है और <strong>\"by aspirations\"</strong> के रूप में प्रयोग किया गया है।"}, {"id": "30274", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong>.</p> <p>Throw the jacket.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Let us throw the jacket", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The jacket was thrown by you.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Let the jacket be thrown.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The jacket must thrown by you."], "correct_answer": 2, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong>, Active वाक्य का <strong>Object</strong> Passive वाक्य का <strong>Subject</strong> बन जाता है। <strong>Verb</strong> को Active से Passive में बदलते समय सही <strong>Tense</strong> का प्रयोग किया जाता है। Active वाक्य में \"<strong>Throw</strong>\" (Verb - Imperative), और \"<strong>the jacket</strong>\" (Object) है। Passive में बदलने पर <strong>Object</strong> \"<strong>The jacket</strong>\" <strong>Subject</strong> बन गया है, <strong>Verb</strong> को \"<strong>Let the jacket be thrown</strong>\" (Imperative Passive) में बदला गया है।"}, {"id": "30275", "question": "<strong>Q15. Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select ‘No substitution required’</strong>.</p> <p>The movie Jumanji <ins><strong>is base on</strong> a</ins> children’s book of the same title.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No substitution required", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> is based of", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> is based upon", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> is being based by"], "correct_answer": 2, "solution": "C) 'is base on' के बदले 'is based upon' का प्रयोग होगा क्योंकि यहाँ 'base on' का सही रूप 'based upon' है जो एक चीज की आधार पर होने के अर्थ में प्रयुक्त होता है।"}, {"id": "30276", "question": "<strong>Q16. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph</strong><br> <br> A. The exodus of a large chunk of Gurugram’s industrial workforce following the recent communal clashes is a huge setback to this commercial hub of North India.<br> B. The communal tension has not only exposed the religious fault-lines but also put the booming industry in a precarious position.<br> C. As businesses and companies come to grips with an atmosphere of distrust, both the Haryana and the Central governments have a challenging task at hand to restore public confidence.<br> D. At a time when New Delhi is going all out to seek more investment, the violence sends out all the wrong signals.<br> E. Safety concerns need to be addressed on priority. Any delay on this count or allowing activities that could be detrimental to peace and security will adversely affect the business sentiment and the hard-won economic gains.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABDE", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ABDCE", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABCED", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CBEDA"], "correct_answer": 1, "solution": "\"A\" appears to introduce the problem (the exodus) and its cause (communal clashes). It sets the tone for the paragraph. Hence, \"A\" is a suitable starting sentence."}, {"id": "30277", "question": "<strong>Q17. Select the most appropriate ANTONYM of the word</strong>.</p> <p>Sumptuous</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Unremitting", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Lucrative", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Inexpensive", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Delectable"], "correct_answer": 2, "solution": "<strong>Antonym</strong>: <strong>Inexpensive</strong> (adjective) – Not costing a lot of money, cheap, affordable. सस्ता"}, {"id": "30278", "question": "<strong>Q18. Select the most appropriate option to fill in the blank</strong></p> <p>We won't have discussions with this group unless they _______________ violence.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Eschew", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Venture", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Veer", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Flounder"], "correct_answer": 0, "solution": "A) 'Eschew' का प्रयोग होगा क्योंकि \"eschew\" का अर्थ होता है परहेज करना या टालना। जबकि 'Venture' का अर्थ है जोखिम में डालना या प्रयास करना, 'Veer' का अर्थ है तेजी से दिशा बदलना, और 'Flounder' का अर्थ है संघर्ष करना या अस्थिरता महसूस करना, जो इस संदर्भ में सही नहीं है।"}, {"id": "30279", "question": "<strong>Q19. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> a. This morning too dawned as any other.<br> b. It was the morning after a hectic last day which drew curtains on my career in public service. It sank in slowly that today was a little different and that I had retired the previous day!<br> c. It takes some time for us to get grounded to reality on awakening every morning.<br> d. Sleep benumbs the senses and the cognition transiently for a purposeful rejuvenation and repair process of our DNA.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, b, a, c", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, a, b, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, b, c, d", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> d, c, a, b"], "correct_answer": 3, "solution": "<strong>d:</strong> d begins with a general statement about sleep and its function. The topic is broad and doesn't directly reference any of the other sentences, so it serves as an introductory statement."}, {"id": "30280", "question": "<strong>Q20. Select the option that expresses the given sentence in reported speech</strong>.</p> <p>The child says, “I do not want to go to school.”</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The child say that I do not want to go to school.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The child says that I do not want to go to school.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The child says that he do not want to go to school.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The child says that he does not want to go to school."], "correct_answer": 3, "solution": "D) The child says that he does not want to go to school"}, {"id": "30281", "question": "<strong>Q21. Select the option that can be used as a one-word substitute for the given group of words</strong></p> <p>A person who has features of extrovert and introvert</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Stoic", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Ambivert", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ambiguous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Dual"], "correct_answer": 1, "solution": "B) Ambivert (noun) – A person whose personality has features of both extrovert and introvert. उभयवृत्ति"}, {"id": "30282", "question": "<strong>Q22. Identify the INCORRECTLY spelt word</strong>.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mischievous", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Monologe", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Maintenance", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Millionaire"], "correct_answer": 1, "solution": "B) The incorrectly spelled word is 'Monologe'. The correct spelling is 'Monologue' which means “a long speech by one actor in a play or movie, or as part of a theatrical or broadcast program” एक अभिनेता द्वारा नाटक या फिल्म में, या थियेटरिकल या प्रसारण कार्यक्रम के हिस्से के रूप में एक लंबी भाषण."}, {"id": "30283", "question": "<strong>Q23. Select the most appropriate synonym of the underlined word</strong>.</p> <p>The teacher was accused of <ins><strong>brazen</strong> </ins>favouritism in assigning the grades.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Modest", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Shy", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Unashamed", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ashamed"], "correct_answer": 2, "solution": "<strong>Synonym</strong>: <strong>Unashamed</strong> (adjective) – Not feeling or showing shame or guilt; lacking any sense of shame. शर्म न होना"}, {"id": "30284", "question": "<strong>Q24. Select the most appropriate meaning of the given idiom</strong>.</p> <p>To be in the driving seat</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To be in charge or control of a situation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To avoid speaking up on something", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To be able to drive a vehicle", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To allow other people to go past yourself"], "correct_answer": 0, "solution": "A) <strong>To be in the driving seat</strong> (idiom) – To be in charge or control of a situation जिम्मेवार होना या स्थिति का नियंत्रण रखना."}, {"id": "30285", "question": "<strong>Q25. Some sentences are given below. While the first and the last sentences (1 and 2) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>1. </strong> On April 6, 2023, the Union government introduced a new set of measures with a view to crushing fake news and misinformation on the Internet.<br> <strong>A.</strong> These introductions came through an amendment made to the Information Technology (Intermediary Guidelines and Digital Media Ethics Code) Rules, 2021, or IT Rules<br> <strong>B</strong>. Should social media intermediaries fail to prevent users from hosting or publishing information that have been flagged as false by the fact check unit, they stand to lose their “safe harbour” immunity<br> <strong>C. </strong> Online content that concerns the central government’s business in any manner<br> <strong>D</strong>. The amendment grants to the Union Ministry of Electronics and Information Technology (MeitY) unbridled power to create a “fact check unit”, which will identify false or misleading<br> <strong>2.</strong> In other words, any protection that online platforms might have enjoyed against criminal prosecution will be withdrawn.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ADCB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ACDB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CDAB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CADB"], "correct_answer": 0, "solution": "<strong>1:</strong> \"On April 6, 2023\" is a time-based introduction, indicating that it starts the sequence."}, {"id": "30286", "question": "<strong>Q26. Select the most appropriate option to fill in the blank</strong>.</p> <p>The sales forecast is predicated ____________ the assumption that the economy will grow by four percent.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> of", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> on", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> about", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> for"], "correct_answer": 1, "solution": "B) 'on' का प्रयोग होगा क्योंकि ‘predicated’ के साथ ‘on’ का प्रयोग होता है जब किसी धारणा पर कुछ आधारित हो। जैसे— The theory is predicated on the idea that all humans have basic rights."}, {"id": "30287", "question": "<strong>Q27. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>A. </strong> In a book completed shortly before his passing, former Special Envoy Satinder Lambah made several revelations about the India-Pakistan dialogue process he once squired<br> <strong>B</strong>. But the stand-off with the judiciary that erupted in Pakistan in 2007, and the Mumbai 26/11 attacks in 2008 came in the way, effectively shelving any plans to revive it<br> <strong>C</strong>. Lambah confirmed that the agreement on the Line of Control (LoC) in Kashmir, was indeed ready<br> <strong>D</strong>. To be signed by then Prime Minister Manmohan Singh and Pakistan President General Musharraf", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDAC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DBCA", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ACDB"], "correct_answer": 3, "solution": "<strong>A:</strong> Sentence A sets the context by introducing the main subject, \"Satinder Lambah\" and his book where he made several revelations. This is an ideal introductory statement to set the context for the entire paragraph."}, {"id": "30288", "question": "<strong>Select the option that expresses the given sentence in active voice</strong></p> <p>By whom was Hindi taught to you?</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> By whom were you taught Hindi?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Who teaches you Hindi?", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Who taught you Hindi?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Who were you taught Hindi by?"], "correct_answer": 2, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong>, Active वाक्य का <strong>Object</strong> Passive वाक्य का <strong>Subject</strong> बन जाता है। <strong>Verb</strong> को Active से Passive में बदलते समय सही <strong>Tense</strong> का प्रयोग किया जाता है। दिए गए Passive वाक्य <strong>\"By whom was Hindi taught to you?\"</strong> में <strong>\"Hindi\" (Object)</strong>, <strong>\"was taught\" (Verb in Past Simple Passive)</strong> और <strong>\"you\" (Indirect Object)</strong> है। इसे Active में बदलने के लिए, <strong>\"Who\"</strong> को Subject बनाया गया, <strong>\"taught\" (Past Simple Active Verb)</strong> को उचित रूप में रखा गया, और <strong>\"you Hindi\" (Object and Indirect Object)</strong> के रूप में प्रयोग किया गया।"}, {"id": "30289", "question": "<strong>Q29. Select the option that expresses the given sentence in indirect speech</strong>.</p> <p>The beggar woman said, “What will I do with so much money, my dear Prince?”</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The beggar woman told the Prince what she would do with so much money.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The beggar woman said to the Prince what she could do with so much money.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The beggar woman said to the Prince what would she do with so much money.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The beggar woman asked the Prince what she should do with so much money"], "correct_answer": 3, "solution": "D) The beggar woman asked the Prince what she should do with so much money."}, {"id": "30290", "question": "<strong>Comprehension</strong>:</p> <p>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank</p> <p>Prime Minister Narendra Modi offered what he described as an account of his two consecutive terms in office, delivering his 10th customary address to the nation on Independence Day. His last address on August 15 before the general election next year also ______1_____to be a campaign speech in effect, as he expressed confidence of winning a third term. _____2______ the achievements and initiatives of the country since 2014 — the year he became the Prime Minister — Mr. Modi suggested that it was a new beginning for the country which was until then unstable and aimless even though Independence from British imperialism was won in 1947. Mr. Modi cited demography, democracy and diversity as the three core strengths of the country, before lauding young entrepreneurs, farmers, and sportspeople who overcome the ______3______. He cited three challenges that _____4_______the progress of India — corruption, dynastic politics and appeasement politics.</p> <p><strong>Q30. Select the most appropriate option to fill in blank 1</strong>.<span id=\"cke_bm_523C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Break out", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Turned out", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Played out", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Carried out"], "correct_answer": 1, "solution": "B) \"turned out\" का प्रयोग होगा क्योंकि \"turned out\" का अर्थ होता है किसी समस्या या स्थिति का परिणाम या नतीजा कैसे निकला। जबकि 'Break out' का अर्थ है अचानक प्रकट होना, 'Played out' का अर्थ है किसी घटना को सम्पूर्ण रूप से घटित होना, और 'Carried out' का अर्थ है किसी कार्य को पूरा करना, जो इस context में सही नहीं है।"}, {"id": "30291", "question": "<strong>Comprehension</strong>:</p> <p>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank</p> <p>Prime Minister Narendra Modi offered what he described as an account of his two consecutive terms in office, delivering his 10th customary address to the nation on Independence Day. His last address on August 15 before the general election next year also ______1_____to be a campaign speech in effect, as he expressed confidence of winning a third term. _____2______ the achievements and initiatives of the country since 2014 — the year he became the Prime Minister — Mr. Modi suggested that it was a new beginning for the country which was until then unstable and aimless even though Independence from British imperialism was won in 1947. Mr. Modi cited demography, democracy and diversity as the three core strengths of the country, before lauding young entrepreneurs, farmers, and sportspeople who overcome the ______3______. He cited three challenges that _____4_______the progress of India — corruption, dynastic politics and appeasement politics.</p> <p><strong>Q31. Select the most appropriate option to fill in blank 2</strong><span id=\"cke_bm_523C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Resembling", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Inspiring", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Appealing", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Cataloguing"], "correct_answer": 3, "solution": "D) 'Cataloguing' का प्रयोग होगा क्योंकि \"cataloguing\" का अर्थ होता है विवरण या सूची बनाना। प्रधानमंत्री ने देश की प्रगतियों और पहलों की सूची बनाई है जो 2014 से हुई। जबकि 'Resembling' का अर्थ होता है समान दिखना, 'Inspiring' का अर्थ है प्रेरित करना और 'Appealing' का अर्थ है आकर्षित करना, जो इस context में सही नहीं है।"}, {"id": "30292", "question": "<strong>Comprehension</strong>:</p> <p>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank</p> <p>Prime Minister Narendra Modi offered what he described as an account of his two consecutive terms in office, delivering his 10th customary address to the nation on Independence Day. His last address on August 15 before the general election next year also ______1_____to be a campaign speech in effect, as he expressed confidence of winning a third term. _____2______ the achievements and initiatives of the country since 2014 — the year he became the Prime Minister — Mr. Modi suggested that it was a new beginning for the country which was until then unstable and aimless even though Independence from British imperialism was won in 1947. Mr. Modi cited demography, democracy and diversity as the three core strengths of the country, before lauding young entrepreneurs, farmers, and sportspeople who overcome the ______3______. He cited three challenges that _____4_______the progress of India — corruption, dynastic politics and appeasement politics.</p> <p><strong>Q32. Select the most appropriate option to fill in blank 3</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Tedious", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Odds", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Curbs", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Consequences"], "correct_answer": 1, "solution": "<strong>B</strong>) 'Odds' का प्रयोग होगा क्योंकि \"odds\" का अर्थ होता है मुश्किलें या चुनौतियाँ। यह शब्द उस स्थिति को दर्शाने के लिए उपयुक्त है जब किसी को किसी मुश्किल स्थिति का सामना करना पड़े। 'Tedious' का अर्थ है उक्तावश, 'Curbs' का अर्थ है प्रतिबंध और 'Consequences' का अर्थ है परिणाम, जो इस context में सही नहीं हैं।"}, {"id": "30293", "question": "<strong>Comprehension</strong>:</p> <p>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank</p> <p>Prime Minister Narendra Modi offered what he described as an account of his two consecutive terms in office, delivering his 10th customary address to the nation on Independence Day. His last address on August 15 before the general election next year also ______1_____to be a campaign speech in effect, as he expressed confidence of winning a third term. _____2______ the achievements and initiatives of the country since 2014 — the year he became the Prime Minister — Mr. Modi suggested that it was a new beginning for the country which was until then unstable and aimless even though Independence from British imperialism was won in 1947. Mr. Modi cited demography, democracy and diversity as the three core strengths of the country, before lauding young entrepreneurs, farmers, and sportspeople who overcome the ______3______. He cited three challenges that _____4_______the progress of India — corruption, dynastic politics and appeasement politics.</p> <p><strong>Q33. Select the most appropriate option to fill in blank 4</strong><span id=\"cke_bm_523C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> End up", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Hold back", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Set up", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Set back"], "correct_answer": 1, "solution": "B) 'Hold back' का प्रयोग होगा क्योंकि \"hold back\" का अर्थ होता है किसी प्रगति को रोकना या विलंबित करना। इस context में, इसका अर्थ होता है कि भ्रष्टाचार, वंशवादी राजनीति और तुष्टिकरण राजनीति ने भारत की प्रगति को रोका। 'End up' का अर्थ होता है अंत में होना, 'Set back' का अर्थ है प्रतिघातित करना, जो इस context में सही नहीं है।"}, {"id": "30294", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>Over the past few weeks, several firms have released their financial results for the first quarter (April-June) of the ongoing fiscal year. These results provide some clues on the prevailing economic scenario. Three broad trends emerge. One, FMCG major HUL witnessed an uptick in volume growth in rural areas, perhaps indicative of a pickup in rural demand. Two, IT major Infosys has lowered its revenue guidance for the ongoing financial year to 1-3.5 per cent from 4-7 per cent earlier, pointing towards considerable uncertainty in major global markets. Three, banks seem to be posting healthy numbers, as credit growth remains strong. These are, however, only preliminary trends. A more comprehensive picture will emerge once a larger number of firms in the listed space unveil their results.</p> <p>Sluggish rural demand has been a cause of concern. However, after witnessing double digit declines in the past, with inflation moderating, HUL is seeing an uptick. Alongside, data from FADA also shows that sales of two-wheelers picked up in May and June, after contracting in April. These trends sit uncomfortably with other data points. For instance, the number of households availing work under MGNREGA in the first quarter of the year was higher than in the same period last year, indicating the absence of other more productive forms of employment. Further, a recent RBI report had also pointed towards a moderation in real wages in rural areas. However, HUL’s results also signal a resurgence among smaller players in some categories — in product categories such as tea and detergent bars, small players are seeing much faster growth than larger players. This is a healthy sign considering the concerns over smaller players being squeezed out, and bigger firms cornering a larger share of the market. But, alongside, the commentary accompanying IT firms points towards slowing demand for services in developed markets. For instance, Infosys expects some clients to stop or slow “transformation programmes and discretionary work”. Perhaps reflecting this slowdown, the country’s services exports have already begun to see a moderation.</p> <p>For firms, the operating environment, both external and internal, remains shrouded with uncertainty. Across developed markets, there is ambiguity over the extent of further monetary policy tightening, and the implications for growth. There are expectations that the US Federal Reserve will raise rates when it meets next (its next meeting is scheduled for July 25-26). However, with growth being healthy, expectations of a soft landing are gaining traction. On the domestic front, while the RBI expects the economy to grow at 8 per cent in the first quarter, growth is expected to taper off thereafter to 5.7 per cent in the fourth quarter. Inflation is expected to remain within the central bank’s target range, though the risks from weather related events will require close monitoring. During this period of uncertainty, policy should be guided by the objective of maintaining macroeconomic stability</p> <p><strong>Q34. Which of the following statements best describes the trend observed in the rural demand as per the given passage?</strong><span id=\"cke_bm_645C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The rural demand has been consistently decreasing over the past few months.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> HUL has seen a decline in volume growth in rural areas.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> There was a rise in rural demand as observed in HUL's volume growth in rural areas.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Rural areas have witnessed a consistent rise in demand throughout the year.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> There is no clear indication regarding rur passage specifies that the 2011 study by a British medical journal found that \"up to 1.2 crore female foetuses had been aborted in India in the previous three decades\"."}, {"id": "30301", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the given passage and answer the questions that follow.</strong></p> <p>ONCE notorious for its skewed sex ratio and deep-seated cultural preference for the male child, Haryana has over the years managed a steady improvement in the sex ratio at birth (SRB). But as it has now slipped to a six-year low, triggering alarm bells, reports of misuse of technology for pre-natal sex determination warrant a statewide clampdown. The January-June SRB has come down to 906 female births per 1,000 males from 917 in December last year. Though officials claim a year-long appraisal is a more precise barometer, the 11-point half-yearly dip is a setback to the efforts for curbing female foeticide. It is imperative for the district officers to take proactive measures. A close scrutiny of the factors at work is required.</p> <p>An inter-state racket busted in Rajasthan two years ago brought to the fore the use of a phone-sized ultrasound machine to conduct illegal sex-determination tests. The same modus operandi is suspected in Haryana. The authenticity of the results of the not-so-costly gadget may be debatable, but not of its wide use. Stringent punitive action for detecting the sex of a foetus and sex-selective abortion has been an effective strategy, but social change requires an attitudinal shift. That remains a challenge. The Beti Bachao Beti Padhao programme is engineered as a collective inter-departmental initiative. A robust response to the latest figures is the way forward.</p> <p> A 2011 study by a British medical journal found that up to 1.2 crore female foetuses had been aborted in India in the previous three decades. In 2014, the United Nations said the dwindling number of Indian girls had reached ‘emergency proportions’. Tr ied when a wall, weakened by age, fell on him during a burglary attempt. His brother sought justice, blaming the owner of the house, who in turn blamed the bricklayer that constructed the weak wall. This led to a comical blame game involving a dancing girl and a goldsmith, with the fault eventually coming full circle back to the original homeowner. The king, in his foolishness, decided to execute someone for the death of the thief. But the rich merchant, deemed the prime culprit, was too thin for the stake they had prepared for the execution. The fattened disciple, now plump and sizable, was deemed a perfect fit.</p> <p>As the disciple awaited his unfair fate, he prayed to his guru who, having mystical powers, arrived in time. The guru cunningly convinced the king that the first person to be executed on the stake would be reincarnated as the next king. Both the guru and disciple feigned a desire to be executed first. Believing them, the king and his minister, hoping to be reborn into their current positions, secretly went to the execution ground and met their demise.</p> <p>The next day, when their bodies were discovered, the city was in turmoil. The guru and disciple, on the verge of leaving the chaotic city, were begged by the people to become their new rulers. They agreed, but only if they could change the nonsensical laws. The kingdom returned to normalcy under their wise leadership, with the day and night resuming their usual roles and sensible economic practices reestablished.</p> <p><strong>Q42. Why did the disciple choose to stay in the kingdom despite the guru's advice</strong>?<span id=\"cke_bm_542C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He wanted to see the foolish king.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He wanted to become the next king. const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
