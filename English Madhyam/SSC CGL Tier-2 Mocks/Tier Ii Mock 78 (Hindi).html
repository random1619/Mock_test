<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 78 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

ong></p> <p>The mother said to her son, “Why are you not doing your homework?”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The mother asked her son why was he not doing his homework.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The mother asked her son why he was not doing his homework.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The mother asked her son why he did not do his homework.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The mother asked her son why he is not doing his homework."], "correct_answer": 1, "solution": "The mother asked her son why he was not doing his homework."}, {"id": "91262", "question": "<strong>Select the most appropriate word to fill in the blank.</strong></p> <p>Priya has a very ______ nature and does not accept financial help even from her ownparents", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Independent", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Biased", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Impartial", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Disinterested"], "correct_answer": 0, "solution": "<strong>'Independent'</strong> should be used because it means being self-reliant or not dependent. The sentence mentions that Priya does not accept financial help even from her own parents, indicating her independent nature. Whereas, 'Biased' means showing prejudice, 'Impartial' means fair, and 'Disinterested' implies a lack of interest, which don't fit in this context."}, {"id": "91268", "question": "<strong> In the following questions, a sentence has been given in Direct/Indirect Speech. Out of the four alternatives suggested, select the one which best expresses the same sentence in Indirect/Direct Speech.</strong></p> <p>The doctor said to my mother, “Take your medicines regularly.”", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The doctor advised my mother to take her medicines regularly.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The doctor told my mother take her medicines regularly.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The doctor ordered my mother to take your medicines regularly.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The doctor told my mother to take his medicines regularly"], "correct_answer": 0, "solution": "The doctor advised my mother to take her medicines regularly."}, {"id": "91271", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in theright order to form a meaningful and coherent paragraph.</strong></p> <p>A. The word Jama means 'a robe or shawl' and War means 'Yard (the measuring unit)'.</p> <p>B. Jamawar (also spelled as Jamavar) is a fabric that has its roots in Kashmir.</p> <p>C. People in the earlier times used to buy a yard of the shawl to protect them selves from the chilly winter.</p> <p>D. The Jamawar is an adulterated form of Pashmina silk since it contains a blend of cotton and wool", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BACD", "<p style=\"displa lishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To use false promises to pull people on one’s side", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Make an audience laugh uncontrollably", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To have a dispute with someone", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Willing to do something immediately"], "correct_answer": 1, "solution": "<strong>B) Have people rolling in the aisles</strong> (idiom) – Make an audience laugh uncontrollably हंसी से लोटपोट हो जाना"}, {"id": "91265", "question": "<strong>Select the most appropriate active form of the given sentence.</strong></p> <p>The movie was directed by the famous filmmaker and produced by the studio", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The famous filmmaker directed the movie and the studio produced it.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The movie was being directed by the famous filmmaker and produced by the studio.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The movie was directed and produced by the famous filmmaker and the studio.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The famous filmmaker and the studio collaborated to make the movie."], "correct_answer": 0, "solution": "A) The famous filmmaker directed the movie and the studio produced it."}, {"id": "91272", "question": "<strong>Select the most appropriate option to substitute the underlined segment in the givensentence. If there is no need to substitute it, select ‘No substitution required’.</strong></p> <p>Lavanya was happy to see that the tree they had planted the previous year <ins><strong>has grow quite taller</strong></ins>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No substitution required", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> had grow quite taller", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> had grown quite tallest", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> had grown quite tall"], "correct_answer": 3, "solution": "<strong>'had grown quite tall'</strong> will be used instead of 'has grow quite taller' because in 'that' clause the verb 'had planted' is in Past Perfect Tense, so in Relative Clause also Verb will be in Past Perfect Tense; and the Past Participle of 'grow' is 'grown'. When talking about height or growth, 'tall' is more appropriate than 'taller', as there is no comparison being made here. Like— It was the tree they had planted the previous year that had grown quite tall."}, {"id": "91274", "question": "<strong>In the following question, out of the given four alternatives, select the alternative which best expresses the meaning of the Idiom/Phrase.</strong></p> <p>Pig in a poke", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To bring something to an end", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A brave man amongst all the cowards", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Something that is bought without examining properly", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To obstruct someone’s work"], "correct_answer": 2, "solution": "<strong>C) Pig in a poke</strong> (idiom) – Something that is bought without examining properly बिना ठीक से जांच किए खरीदी गई चीज"}, {"id": "91263", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>The mice were chased by the cat.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The cat chased the mice.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The cat is chasing the mice.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The cat are chased the mice.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The cat chases the mice"], "correct_answer": 0, "solution": "A) The cat chased the mice"}, {"id": "91260", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>Of all the emotions that ______ through me as I stood on the summit of Everest, the dominant one, I think, was humility.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> surged", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> slammed", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> heaved", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> pitched"], "correct_answer": 0, "solution": "<strong>Surged'</strong> should be used because it means a strong and sudden rise in a feeling or wave. The sentence mentions that standing on the summit of Everest, a lot of emotions surged through, making 'surged' fitting here. Whereas, 'Slammed' means to shut forcefully, 'Heaved' means to lift something heavy, and 'Pitched' implies tilting or throwing, which don't fit in this context."}, {"id": "91289", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</strong></p> <p>Ronaldo is / a famous / player of / the football.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a famous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ronaldo is", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> the football", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> player of"], "correct_answer": 2, "solution": "<strong>C) </strong>The error is in segment C, 'the football'. In English, when referring to sports in a general context, the definite article 'the' is not used. Therefore, the correct phrase should be 'player of football', not 'player of the football'. The use of 'the' before 'football' is unnecessary and grammatically incorrect in this context. The corrected sentence should read: \"Ronaldo is a famous player of football.\""}, {"id": "91287", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</strong></p> <p>She had resign / from the / post before / he apologised.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She had resign", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> he apologised", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> post before", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> from the"], "correct_answer": 0, "solution": "<strong>A)</strong> The error is in segment A: 'She had resign'. The correct form should be 'She had resigned', as the verb needs to be in the past participle form when used with 'had' in a past perfect tense construction. In the given sentence, 'had' indicates a past perfect tense, which requires the verb to be in its past participle form, i.e., 'resigned'. Therefore, the corrected sentence should be: \"She had resigned from the post before he apologized.\""}, {"id": "91269", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in theright order to form a meaningful and coherent paragraph.</strong></p> <p>A. Humans work because they have to; they play because they want to.</p> <p>B. The most useful definitions are those that clarify the relationship of sports to play, gamesand contests.</p> <p>C. “Play,” wrote the German theorist Carl Diem, “is purposeless activity, for its own sake, theopposite of work.”</p> <p>D. Sports are part of every culture, past and present, but each culture has its own definitionof sports", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BADC", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> DBCA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABCD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DCBA"], "correct_answer": 1, "solution": "Sports are part of every culture, past and present, but each culture has its own definition of sports The most useful definitions are those that clarify the relationship of sports to play, games and contests. Play,” wrote the German theorist Carl Diem, “is purposeless activity, for its own sake, the opposite of work.” Humans work because they have to; they play because they want to"}, {"id": "91261", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>We had our time of peace and goodwill, a time I will ______ as long as I live.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> think", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> cherish", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> esteem", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> care"], "correct_answer": 1, "solution": "<strong>cherish'</strong> should be used because it means to hold something dear and treasure it. The sentence mentions a time of peace and goodwill that will be remembered forever, making 'cherish' fitting here. Whereas, 'Think' means to contemplate, 'Esteem' means to respect, and 'Care' means to have concern, which don't fit in this context."}, {"id": "91273", "question": "<strong>Select the most appropriate option to substitute the underlined segment in the givensentence. If there is no need to substitute it, select 'No substitution required'.</strong></p> <p>India has identified <ins><strong>a nose-based vaccine</strong></ins> against Covid-19 that could be a ‘game-changer’.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/e in countries where vaccination is widespread have never personally experienced vaccine-preventable disease. Thus, the focus of concern for some people shifted from the negative effects of vaccine-preventable disease to the possible negative effects of the vaccines (4) __________.</p> <p><strong>Select the most appropriate option to fill in blank number 4.</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> themselves", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> yourself", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ourselves", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> itself"], "correct_answer": 0, "solution": "No solution available"}, {"id": "91298", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the given passage and answer the questions that follow.</strong></p> <p>Latest factsheet on the disease is encouraging. Much more needs to be done to defeat the scourge</p> <p>A major challenge for any country’s TB elimination programme is to make sure that cases are reported. A patient falling outside the screening and treatment network is not only harmful to the individual concerned, it also exposes her contacts to the risk of infection.</p> <p>Under-reporting of cases has, for long, been a major hurdle for India’s anti-TB programme. It’s, therefore, assuring that the latest factsheet on the disease in the country, the India TB Report 2024, shows that the gap between the estimated number and actual TB cases is closing. India has attained its 2023 target of initiating treatment in 95 per cent of patients diagnosed with the infection.</p> <p>The government has set an ambitious target to eliminate the disease in the country by next year. Despite the anti-TB programme’s appreciable success in the past two years, the country does not seem to be on course to attain this target. The disease’s multi-drug resistant (MDR) version has assumed epidemic proportions.</p> <p>The latest India TB Report shows significant progress in charting this severe version of the disease. Close to 60 per cent of those diagnosed were offered a test to check whether their infection was resistant to the first-line drugs, an increase from 25 per cent in 2015.</p> <p>In the coming months, the health authorities should reach out to more patients to ascertain the numbers of those whose illness requires the administration of second-line drugs.<br> In recent years, experts have been recommending the use of molecular testing because microscopy cannot detect all MDR cases. But by all accounts, this state-of-the-art diagnostics is still not the predominant testing method in the country.</p> <p>Although several drug regimens are available for MDR-TB, these are demanding on patients. A growing body of scholarship shows that less than 60 per cent of patients who require a second-line treatment complete the full course of medicines. Experts, therefore, suggest a transition to the short-duration drug, bedaquiline.</p> <p>India’s patent office’s decision, last year, to not renew Johnson and Johnson’s copyright on this drug should enable the domestic industry to step in and develop cheaper generic versions. In recent years, mental healthcare has increasingly been seen as a critical part of TB treatment and epidemiologists have been advising physicians to handhold patients through the exacting therapy — this rarely happens in the country. Though TB can affect all social classes, records show that the poor, slum dwellers, and HIV/AIDS patients are the most affected. In the coming months, the country’s planners should deploy a combination of state of the art technology and humane methods to build on the gains of last year.<br> <strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Critical", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neutral", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pessimistic"], "correct_answer": 0, "solution": "No solution available"}, {"id": "91299", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the given passage and answer the questions that follow.</strong></p> <p>Latest factsheet on the disease is encouraging. Much more needs to be done to defeat the scourge</p> <p>A major challenge for any country’s TB elimination programme is to make sure that cases are reported. A patient falling outside the screening and treatment network is not only harmful to the individual concerned, it also exposes her contacts to the risk of infection.</p> <p>Under-reporting of cases has, for long, been a major hurdle for India’s anti-TB programme. It’s, therefore, assuring that the latest factsheet on the disease in the country, the India TB Report 2024, shows that the gap between the estimated number and actual TB cases is closing. India has attained its 2023 target of initiating treatment in 95 per cent of patients diagnosed with the infection.</p> <p>The government has set an ambitious target to eliminate the disease in the country by next year. Despite the anti-TB programme’s appreciable success in the past two years, the country does not seem to be on course to attain this target. The disease’s multi-drug resistant (MDR) version has assumed epidemic proportions.</p> <p>The latest India TB Report shows significant progress in charting this severe version of the di r.</p> <p><strong>What is a major challenge for any country's TB elimination programme as highlighted in the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ensuring that all TB patients receive the latest medication to prevent the spread of the disease.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Making sure that cases are reported so that patients do not fall outside the screening and treatment network, thereby preventing exposure to others.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Developing a vaccine that is effective against all strains of TB, including the multi-drug resistant version.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Increasing public awareness about TB to reduce the stigma associated with the disease and encourage more people to get tested."], "correct_answer": 1, "solution": "No solution available"}, {"id": "91301", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the given passage and answer the questions that follow.</strong></p> <p>Latest factsheet on the disease is encouraging. Much more needs to be done to defeat the scourge</p> <p>A major challenge for any country’s TB elimination programme is to make sure that cases are reported. A patient falling outside the screening and treatment network is not only harmful to the individual concerned, it also exposes her contacts to the risk of infection.</p> <p>Under-reporting of cases has, for long, been a major hurdle for India’s anti-TB programme. It’s, therefore, assuring that the latest factsheet on the disease in the country, the India TB Report 2024, shows that the gap between the estimated number and actual TB cases is closing. India has attained its 2023 target of initiating treatment in 95 per cent of patients diagnosed with the infection.</p> <p>The government has set an ambitious target to eliminate the disease in the country by next year. Despite the anti-TB programme’s appreciable success in the past two years, the country does not seem to be on course to attain this target. The disease’s multi-drug resistant (MDR) version has assumed epidemic proportions.</p> <p>The latest India TB Report shows significant progress in charting this severe version of the disease. Close to 60 per cent of those diagnosed were offered a test to check whether their infection was resistant to the first-line drugs, an increase from 25 per cent in 2015.</p> <p>In the coming months, the health authorities should reach out to more patients to ascertain the numbers of those whose illness requires the administration of second-line drugs.<br> In recent years, experts have been recommending the use of molecular testing because microscopy cannot detect all MDR cases. But by all accounts, this state-of-the-art diagnostics is still not the predominant testing method in the country.</p> <p>Although several drug regimens are available for MDR-TB, these are demanding on patients. A growing body of scholarship shows that less than 60 per cent of patients who require a second-line treatment complete the full course of medicines. Experts, therefore, suggest a transition to the short-duration drug, bedaquiline.</p> <p>India’s patent office’s decision, last year, to not renew Johnson and Johnson’s copyright on this drug should enable the domestic industry to step in and develop cheaper generic versions. In recent years, mental healthcare has increasingly been seen as a critical part of TB treatment and epidemiologists have been advising physicians to handhold patients through the exacting therapy — this rarely happens in the country. Though TB can affect all social classes, records show that the poor, slum dwellers, and HIV/AIDS patients are the most affected. In the coming months, the country’s planners should deploy a combination of state of the art technology and humane methods to build on the gains of last year.</p> <p><strong>Which of the following can be inferred about the current state of TB testing in India?</strong></p> <p><strong>(i) </strong> Molecular testing is widely used as the primary method for TB detection.</p> <p><strong>(ii) </strong> The use of first-line drug resistance tests has significantly increased since 2015.</p> <p><strong>(iii) </strong>Microscopy is still a commonly used method for TB diagnosis, despite its limitations.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> i only", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ii only", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ii and iii", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> i and iii"], "correct_answer": 2, "solution": "No solution available"}, {"id": "91302", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the given passage and answer the questions that follow.</strong></p> <p>A new working paper by World Inequality Lab, a Paris-based research organisation, has come out with estimates that suggest that economic inequality in India has “skyrocketed since the early 2000s”. The paper titled “Income and Wealth Inequality in India, 1922-2023: The Rise of the Billionaire Raj” states that “the ‘Billionaire Raj’ headed by India’s modern bourgeoisie is now more unequal than the British Raj headed by the colonialist forces”. It ends with a warning: “It is unclear how long such inequality levels can sustain without major social and political upheaval.”</p> <p>Indeed, the data quoted in the paper is sobering. The four authors, including Thomas Piketty, claim to have combined national income accounts, wealth aggregates, tax tabulations, billionaire rankings, rich lists, and surveys on income, consumption and wealth to create data series going back to 1922 for income inequality and 1961 for wealth inequality. On the income inequality front, their calculations suggest that in 2022-23, 22.6 per cent of India’s national income went to just the top 1 per cent; this is the highest level recorded in the data series since 1922 — higher than even during the inter-war colonial period.</p> <p>In a global perspective, India’s top 1 per cent income share appears to be among the very highest in the world based on the World Inequality Database, behind only perhaps Peru, Yemen and a couple of other small countries. On the wealth inequality front, the top 1 per cent wealth share stood at 40.1 per cent in 2022-23 — also at its highest level since the start of the data series. The paper also notes that in India wealth is highly concentrated even within the top 1 per cent. The last but not the least remarkable aspect of the findings is that these estimates of inequality are likely to represent “a lower bound” of the actual inequality levels. That’s because, the authors say, “the quality of economic data in India is notably poor and has seen a decline recently”.</p> <p>If these assessments are correct, the authors’ policy prescriptions — such as a super tax on Indian billionaires and multimillionaires, restructuring the tax schedule to include both income and wealth etc — might sound reasonable. But that is a big if. That’s because some other economists look at data and reach exactly the opposite conclusions. For instance, in a recent article, economists Surjit Bhalla and Karan Bhasin look at the latest consumption expenditure survey results to say that India has registered an “unprecedented decline in both urban and rural inequality” between 2011-12 and 2022-23. Clearly, the issue of economic inequality requires a deeper inquiry and a broader debate.</p> <p><strong>According to the World Inequality Lab's working paper titled \"Income and Wealth Inequality in India, 1922-2023: The Rise of the Billionaire Raj,\" what is the primary reason for the skyrocketing economic inequality in India since the early 2000s?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The increase in the number of billionaires and the concentration of wealth within the top 1% of the population.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The decline in the quality of economic data in India, making it difficult to accurately measure inequality levels.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The lack of social and political upheaval in response to rising inequality levels, allowing the situation to persist.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The shift from a colonialist-led economy to a modern bourgeois-led economy, resulting in a more unequal society."], "correct_answer": 0, "solution": "No solution available"}, {"id": "91303", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the given passage and answer the questions that follow.</strong></p> <p>A new working paper by World Inequality Lab, a Paris-based research organisation, has come out with estimates that suggest that economic inequality in India has “skyrocketed since the early 2000s”. The paper titled “Income and Wealth Inequality in India, 1922-2023: The Rise of the Billionaire Raj” states that “the ‘Billionaire Raj’ headed by India’s modern bourgeoisie is now more unequal than the British Raj headed by the colonialist forces”. It ends with a warni ted in Socialism in Europe and the Russian Revolution Chapter II2024-25 India and the Contemporary World favour of one religion or another (Britain favoured the Church of England, Austria and Spain favoured the Catholic Church). Liberals also opposed the uncontrolled power of dynastic rulers. They wanted to safeguard the rights of individuals against governments. They argued for a representative, elected parliamentary government, subject to laws interpreted by a well-trained judiciary that was independent of rulers and officials. However, they were not ‘democrats’. They did not believe in universal adult franchise, that is, the right of every citizen to vote. They felt men of property mainly should have the vote. They also did not want the vote for women.</p> <p>In contrast, radicals wanted a nation in which government was based on the majority of a country’s population. Many supported women’s suffragette movements. Unlike liberals, they opposed the privileges of great landowners and wealthy factory owners. They were not against the existence of private property but disliked concentration of property in the hands of a few.</p> <p>Conservatives were opposed to radicals and liberals. After the French Revolution, however, even conservatives had opened their minds to the need for change. Earlier, in the eighteenth century, conservatives had been generally opposed to the idea of change. By the nineteenth century, they accepted that some change was inevitable but believed that the past had to be respected and change had to be brought about through a slow process.</p> <p>Such differing ideas about societal change clashed during the social and political turmoil that followed the French Revolution. The various attempts at revolution and national transformation in the nineteenth century helped define both the limits and potential of these political tendencies</p> <p><strong>Why did the liberals oppose the power of dynastic rulers?</strong>", "options": ["<p style=\"display:no ainly should have the vote. They also did not want the vote for women.</p> <p>In contrast, radicals wanted a nation in which government was based on the majority of a country’s population. Many supported women’s suffragette movements. Unlike liberals, they opposed the privileges of great landowners and wealthy factory owners. They were not against the existence of private property but disliked concentration of property in the hands of a few.</p> <p>Conservatives were opposed to radicals and liberals. After the French Revolution, however, even conservatives had opened their minds to the need for change. Earlier, in the eighteenth century, conservatives had been generally opposed to the idea of change. By the nineteenth century, they accepted that some change was inevitable but believed that the past had to be respected and change had to be brought about through a slow process.</p> <p>Such differing ideas about societal change clashed during the social and political turmoil that followed the French Revolution. The various attempts at revolution and national transformation in the nineteenth century helped define both the limits and potential of these political tendencies</p> <p><strong>Which of the following best describes the overall impact of the various social and political ideas mentioned in the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They led to the complete collapse of monarchies across Europe.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> They helped to define the limits and potential of different political tendencies during the nineteenth century.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They resulted in the widespread acceptance of communism throughout Europe.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They had no significant impact on European political landscapes."], "correct_answer": 1, "solution": "No solution available"}],ans={};
const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
