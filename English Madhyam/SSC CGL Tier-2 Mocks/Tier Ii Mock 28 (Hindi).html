<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 28 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

const qs=[{"id": "114911", "question": "<strong>For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the appropriate sentences for S2 and S3, respectively.</strong></p> <p><strong>S1</strong>: With the southwest monsoon drawing to a close, north India, particularly the States in the Indo-Gangetic plains, brace themselves for the annual spike in winter pollution.</p> <p><strong>P:</strong> Earlier this week, a top functionary in the Prime Minister’s Office convened a meeting with representatives from Delhi, Haryana, Punjab, Rajasthan and Uttar Pradesh, along with the heads of several ministries in Delhi.</p> <p><strong>Q</strong>: In its meeting held on August 14, 2024, the Punjab cabinet decided to remove the requirement of PUDA NOC for the sale of plots in the unapproved residential colonies.</p> <p><strong>R</strong>: The brief was to take stock of the steps in place to prevent air quality from deteriorating catastrophically in Delhi.</p> <p><strong>S:</strong> The onus for ensured development should be on the regulator rather than on the buyer of a plot.</p> <p><strong>S4:</strong> While pollution from vehicular emissions, road and construction dust, solid waste management, and diesel sets have over the years been counted as key sources of emissions, the burning of paddy stubble in Punjab and Haryana is known to be responsible for as much as 40% of the pollutant load during October and November.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and Q", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> P and R", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and S", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Q and S"], "correct_answer": 1, "solution": "P: Sentence P को S2 के रूप में चुनना appropriate है, क्योंकि यह S1 के बाद logically fit होता है। P में कहा गया है कि हाल ही में प्रधानमंत्री कार्यालय (Prime Minister’s Office) के एक उच्च अधिकारी ने दिल्ली, हरियाणा, पंजाब, राजस्थान और उत्तर प्रदेश के प्रतिनिधियों के साथ एक बैठक आयोजित की। इससे स्पष्ट होता है कि प्रदूषण को रोकने के लिए प्रशासनिक स्तर पर तैयारी हो रही है।"}, {"id": "114852", "question": "<strong>Select the most appropriate idiom for the underlined segment in the following sentence</strong>.</p> <p>She <ins><strong>ignore</strong> </ins>her career to devote her life to animals", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> In peril", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Have a chilling effect", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Join the ranks", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Turn one’s back"], "correct_answer": 3, "solution": "D) <strong>Turn one’s back</strong> – To ignore or abandon someone or something intentionally. पीठ फेर लेना, अनदेखा करना"}, {"id": "114914", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</strong><br> <br> The Ministry of Women and Child Development is / set to launch a revamped portal under the Vatsalya Mission / that will integrated various child protection services / currently spread across multiple platforms.<br>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Ministry of Women and Child Development is", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> set to launch a revamped portal under the Vatsalya Mission", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> that will integrated various child protection services", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> currently spread across multiple platforms."], "correct_answer": 2, "solution": "<strong>'integrate'</strong> will be used instead of <strong>'integrated'</strong> because with 'will', the base form of the verb is always used. The correct usage is 'will integrate'; Like— The government will integrate new policies into the existing framework."}, {"id": "114910", "question": "<strong>Select the correct option to form a meaningful sentence.</strong></p> <p>Recently (a)/ descended (b) / one day (c)/ the Mayor (d)/ of the picturesque Santorini (e) / had to declare (f) / on the island (g) / as 17000 tourists (h) / an emergency (i) / in (j) / Island in Greece (k)", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, d, c, e, f, i, h, g, k, j, b", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> a, d, e, k, f, i, h, b, g, j, c", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, b, e, f, i, h, c, g, k, j, a", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, c, e, g, f, i, h, b, k, j, a"], "correct_answer": 1, "solution": "a) Sentence starts with “Recently”, which sets a temporal context, indicating when the event happened. (Sentence की शुरुआत “Recently” से होती है, जो घटना के समय (time context) को दर्शाता है कि यह घटना हाल ही में हुई है।)"}, {"id": "114912", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</strong><br> Recent media pieces have speculated on whether India’s fraught relations with China / are headed towards a relative thaw / and suggestions are being put down for a more liberal attitude / towards foreign direct investment (FDI) from that country.<br>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Recent media pieces have speculated on whether India’s fraught relations with China", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> are headed towards a relative thaw", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> and suggestions are being put down for a more liberal attitude", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> towards foreign direct investment (FDI) from that country."], "correct_answer": 2, "solution": "<strong>'put forth'</strong> will be used instead of <strong>'put down'</strong> because 'put forth' means 'to present or propose something', while 'put down' means 'to criticize or humiliate someone'. Hence, the correct phrase is 'suggestions are being put forth'. Like— Suggestions were put forth by the committee for the new policy."}, {"id": "114908", "question": "<strong>Select the correct passive form of the given sentence.</strong></p> <p>Sheetal might have misplaced Mohan’s wallet in their rush.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Mohan’s wallet might have been misplaced by Sheetal in their rush.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mohan’s wallet may have been misplaced by Sheetal in their rush.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mohan’s wallet might be misplaced by Sheetal in their rush.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mohan’s wallet may be misplaced by Sheetal in their rush"], "correct_answer": 0, "solution": "• 'might have been misplaced' का प्रयोग किया जाएगा क्योंकि Active Voice में 'might have misplaced' का उपयोग Perfect Modal Tense में हुआ है। Perfect Modal Tense को Passive Voice में बदलने के लिए 'might/may + have been + V3' का प्रयोग किया जाता है।<br> • Subject 'Sheetal' को Passive Voice में 'by Sheetal' के रूप में प्रयोग किया जाएगा और Object 'Mohan’s wallet' को Subject के रूप में प्रयोग किया जाएगा।<br> • 'in their rush' यथावत रहेगा क्योंकि यह एक Prepositional Phrase है, जो Action की Additional Information देता है।<br> जैसे— He might have forgotten the keys. -&gt; The keys might have been forgotten by him."}, {"id": "114856", "question": "<strong>Select the most appropriate word to fill in the blank</strong>.</p> <p>After several allegations of misconduct, the CEO decided to ___________ from his position.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Promote", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Reinstate", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Demit", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Expand"], "correct_answer": 2, "solution": "C) 'Demit' का प्रयोग होगा क्योंकि \"demit\" का अर्थ है त्यागना या पद से इस्तीफा देना, जो इस संदर्भ में सही बैठता है। 'Promote' का अर्थ है पदोन्नति देना, 'Reinstate' का अर्थ है पुनः स्थापित करना, और 'Expand' का अर्थ है विस्तार करना, जो इस संदर्भ में सही नहीं है।<br> • 'Demit' should be used because it means to resign or relinquish a position, which fits the context of leaving due to allegations. 'Promote' means to elevate, 'Reinstate' means to restore, and 'Expand' means to increase in size, which are incorrect in this context."}, {"id": "114904", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>He said, “I had gone to Shimla.”", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He said that he had gone to Shimla.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said that he went to Shimla.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He says that he had gone to Shimla.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said that he has gone to Shimla"], "correct_answer": 0, "solution": "• 'had gone' का प्रयोग यथावत रहेगा क्योंकि Reporting verb 'said' Past Tense में है और Direct Speech में 'had gone' Verb का उपयोग Past Perfect Tense में है। Indirect Speech में भी 'had gone' Past Perfect Tense ही रहेगा।<br> • Indirect Speech में Past Perfect Tense का रूप नहीं बदलता है, चाहे Reporting Verb Past में हो या Present में।<br> जैसे— She said, \"I had finished my work.\" -&gt; She said that she had finished her work."}, {"id": "114907", "question": "<strong>Select the option that is the passive form of the sentence.</strong></p> <p>Jiya wrote the research paper with the help of her tutor.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The research paper can be written by the tutor with the help of Jiya.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The research paper was written by Jiya with the help of her tutor.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The research paper was wrote by Jiya with the help of the tutor.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The research paper is being written by Jiya with the help of her tutor."], "correct_answer": 1, "solution": "• 'was written' का प्रयोग किया जाएगा क्योंकि Active Voice में Verb 'wrote' का उपयोग Past Simple Tense में हुआ है। Past Simple Tense को Passive Voice में बदलने के लिए 'was/were + V3' का प्रयोग किया जाता है।<br> • Subject 'Jiya' को Passive Voice में 'by Jiya' के रूप में प्रयोग किया जाएगा और Object 'the research paper' को Subject के रूप में प्रयोग किया जाएगा।<br> • 'with the help of her tutor' यथावत रहेगा क्योंकि यह एक Prepositional Phrase है, जो Action की Additional Information देता है।<br> जैसे— The teacher taught the students. -&gt; The students were taught by the teacher."}, {"id": "114909", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>a. This results in 32% of global food production being discarded.</p> <p>b. In a world where more than 700 million people suffer from hunger, this scale of waste is unacceptable.</p> <p>c. Food loss and waste represent one of the most pressing challenges to sustainable global food systems.</p> <p>d. According to the estimates of the Food and Agriculture Organization of the United Nations (FAO) and United Nations Environment Programme (UNEP), 13% of food produced globally is lost before it reaches the retail stage, while an additional 19% is wasted at the retail, food service, and household levels.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, b, a, c", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, a, b, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, b, c, d", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> c, d, a, b"], "correct_answer": 3, "solution": "c: Paragraph की शुरुआत sentence c से होती है, क्योंकि यह विषय को प्रस्तुत करता है और बताता है कि food loss और waste वैश्विक खाद्य प्रणालियों (global food systems) के लिए एक महत्वपूर्ण चुनौती है। यह पूरी discussion के लिए context सेट करता है।"}, {"id": "114853", "question": "<strong>Select the most appropriate idiom to fill in the blank</strong>.</p> <p>If you think I'm responsible for the mistake, you're ____________________ , I'm not the one who handled that task.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> In a jiffy", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Bark up the wrong tree", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sweep under the carpet", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Double-edge sword"], "correct_answer": 1, "solution": "<strong>B) </strong>Bark up the wrong tree – To make a wrong assumption about someone or something; to accuse the wrong person. गलत व्यक्ति या चीज़ पर आरोप लगाना, गलतफहमी होना"}, {"id": "114848", "question": "<strong>Select the word which means the same as the group of words underlined in the given sentence</strong>.</p> <p>The authority <ins><strong>a country possesses to govern itself and make its own decisions</strong></ins> is the power that ensures its independence in the global arena.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Integrity", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Sovereignty", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Unity", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Wholeness"], "correct_answer": 1, "solution": "<strong>Sovereignty</strong> (noun) – The authority of a state to govern itself and make its own decisions. संप्रभुता<br> •<strong> Integrity </strong>(noun) – The quality of being honest and having strong moral principles; the state of being whole and undivided. अखंडता<br> • <strong>Unity </strong>(noun) – The state of being united or joined as a whole. एकता<br> <strong>• Wholeness</strong> (noun) – The state of forming a complete and harmonious whole. संपूर्णता<br>"}, {"id": "114854", "question": "<strong>Select the most appropriate meaning of the underlined idiom</strong></p> <p>State regulators will <strong><ins>go the extra mile</ins> </strong>to ensure that this settlement is as investor-friendly as possible", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Be willing to accept additional risks for the investors’ benefit.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Make a significant extra effort to achieve a favorable outcome.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Consider several alternative solutions before settling.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Follow established guidelines strictly without deviations."], "correct_answer": 1, "solution": "B) The idiom \"go the extra mile\" means to make more effort than is expected or required to achieve something. अधिक प्रयास करना, अतिरिक्त मेहनत करना"}, {"id": "114857", "question": "<strong>Select the most appropriate word to fill in the blank</strong>.</p> <p>During the critical presentation, she began to ____________, losing the audience’s confidence.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Thrive", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Falter", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Persist", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Engage"], "correct_answer": 1, "solution": "B) 'Falter' का प्रयोग होगा क्योंकि \"falter\" का अर्थ है हिचकिचाना या लड़खड़ाना, जो आत्मविश्वास की कमी को दर्शाता है। 'Thrive' का अर्थ है प्रगति करना, 'Persist' का अर्थ है दृढ़ता से जारी रखना, और 'Engage' का अर्थ है सम्मिलित या आकर्षित करना, जो इस संदर्भ में सही नहीं है।<br> • 'Falter' should be used because it means to hesitate or stammer, reflecting a lack of confidence. 'Thrive' means to prosper, 'Persist' means to continue steadfastly, and 'Engage' means to involve or attract, which are not suitable for this context."}, {"id": "114903", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>Gloria said, “His relatives are landing tomorrow.”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Gloria said that his relatives are landing the next day.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Gloria said that his relatives were landing the previous day.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Gloria said that his relatives were landing the next day.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Gloria said that his relatives have been landing the next day."], "correct_answer": 2, "solution": "• 'were landing' का प्रयोग होगा क्योंकि Reporting verb 'said' Past Tense में है और Direct Speech में 'are landing' Verb का उपयोग Present Continuous Tense में है, जिसे Indirect Speech में बदलने के लिए Past Continuous Tense 'were landing' का प्रयोग किया जाएगा।<br> • 'the next day' का प्रयोग 'tomorrow' के स्थान पर Indirect Speech में होगा क्योंकि 'tomorrow' को Indirect Speech में बदलने पर 'the next day' होता है।<br> जैसे— He said, \"I am going tomorrow.\" -&gt; He said that he was going the next day."}, {"id": "114861", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>The company’s management decided to eliminate positions that were marked by <ins><strong>redundancy</strong></ins>.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Relevance", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Incongruity", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Excess", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Repetition"], "correct_answer": 0, "solution": "A) <strong>Redundancy</strong> (noun) – The state of being no longer needed or useful, superfluity, excess, repetition. अनावश्यकता<br> <strong>Antonym: Relevance</strong> (noun) – The quality or state of being closely connected or appropriate, importance, pertinence. प्रासंगिकता<br> • <strong>Incongruity </strong>(noun) – The state of being out of place or inconsistent, discrepancy, mismatch. विसंगति<br> • Excess (noun) – An amount of something that is more than necessary, surplus, overflow. अधिकता<br> • <strong>Repetition</strong> (noun) – The action of repeating something, reiteration, recurrence. पुनरावृत्ति"}, {"id": "114851", "question": "<strong>Select the most appropriate spelling of the underlined word in the given sentence</strong>.</p> <p>She felt <ins><strong>desparate</strong> </ins>to complete her assignment.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> desparete", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> desperate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> despirate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> desperete"], "correct_answer": 1, "solution": "B) The correct spelling of 'desparate' is 'desperate', which means \"feeling or showing a hopeless sense that a situation is so bad as to be impossible to deal with\" (निराशाजनक, हताश)."}, {"id": "114858", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence. </strong></p> <p>The issue at hand is quite <ins><strong>pressing</strong> </ins>and requires immediate attention.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Pivotal", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mundane", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Onerous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Peremptory"], "correct_answer": 0, "solution": "A) <strong>Pressing</strong> (adjective) – Demanding immediate attention or action, urgent, critical. अत्यावश्यक<br> <strong>Synonym: Pivotal </strong>(adjective) – Of crucial importance in relation to the development or success of something else, central, critical, key. अत्यावश्यक<br> • <strong>Mundane</strong> (adjective) – Lacking interest or excitement, dull, routine, ordinary. साधारण<br> • <strong>Onerous</strong> (adjective) – Involving heavy obligations, burdensome, cumbersome. कठिन<br> • <strong> Peremptory</strong> (adjective) – Leaving no opportunity for denial or refusal, authoritative, imperative. अनिवार्य"}, {"id": "114860", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>She claimed to <ins><strong>despise</strong> </ins>dishonesty in all its forms.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Abhor", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Detest", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Revere", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Condemn"], "correct_answer": 2, "solution": "C) <strong>Despise</strong> (verb) – Feel contempt or a deep repugnance for, hate, abhor, loathe. घृणा करना<br> <strong>Antonym: Revere</strong> (verb) – Feel deep respect or admiration for something, venerate, admire. सम्मान करना<br> • <strong> Abhor</strong> (verb) – Regard with disgust and hatred, detest, loathe. घृणा करना<br> • <strong>Detest </strong>(verb) – Dislike intensely, hate, abhor. नफरत करना<br> • <strong>Condemn</strong> (verb) – Express complete disapproval of, criticize, denounce. निंदा करना"}, {"id": "114849", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a spelling error</strong>.</p> <p>Please acknowlege / the receipt of this letter / at your earliest convenience / to proceed further.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Please acknowlege", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> the receipt of this letter", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> at your earliest convenience", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to proceed further."], "correct_answer": 0, "solution": "A) The correct spelling of 'acknowlege' is 'acknowledge', which means \"to accept or admit the existence or truth of something\" (स्वीकार करना, मान लेना)."}, {"id": "114846", "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words</strong>.</p> <p>A difficult situation in which you cannot make progress easily because there are too many things to do", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Boycott", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Censorship", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Barrier", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Logjam"], "correct_answer": 3, "solution": "D) <strong>Logjam</strong> (noun) – A situation in which no progress can be made due to a number of difficulties or obstacles. गतिरोध"}, {"id": "114915", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</strong><br> <br> Two years after cheetahs were introduced in Kuno National Park, / Madhya Pradesh, the country has at least 24 of the big cats. / These striped animals were declared extinction from India in the early 1950s and the population in Kuno could herald / the revival of the species in the country.<br>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Two years after cheetahs were introduced in Kuno National Park,", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Madhya Pradesh, the country has at least 24 of the big cats.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> These striped animals were declared extinction from India in the early 1950s and the population in Kuno could herald", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> the revival of the species in the country."], "correct_answer": 2, "solution": "<strong>'extinct'</strong> will be used instead of <strong>'extinction'</strong> because 'extinction' is a noun, and in this context, the adjective 'extinct' is needed to describe the state of the species being no longer present. The correct sentence is— \"These striped animals were declared extinct from India\"; Like— The dodo bird was declared extinct in the 17th century."}, {"id": "114913", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</strong><br> The Periodic Labour Force Survey (PLFS) for the period between July 2023 or June 2024, released by the Labour Bureau on Monday (September 23, 2024), / reported no major change in the unemployment rate, and / there is minor increase in the distribution of workers in agriculture and the manufacturing sector shows / no growth in giving jobs compared to past years.<br>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The Periodic Labour Force Survey (PLFS) for the period between July 2023 or June 2024, released by the Labour Bureau on Monday (September 23, 2024),", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> reported no major change in the unemployment rate, and", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> there is minor increase in the distribution of workers in agriculture and the manufacturing sector shows", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> no growth in giving jobs compared to past years."], "correct_answer": 0, "solution": "<strong>'and'</strong> will be used instead of <strong>'or'</strong> because when indicating a time period with 'between', 'and' is used to connect two points of time. 'Between' always indicates a relation between two points, so the correct phrase is 'between July 2023 and June 2024'. Like— The project will take place between January and March."}, {"id": "114855", "question": "<strong>Select the most appropriate word to fill in the blank</strong>.</p> <p>The manager’s decision to cut bonuses provoked widespread _____________ among the employees.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Regret", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Ire", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sympathy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Agreement"], "correct_answer": 1, "solution": "B) 'Ire' का प्रयोग होगा क्योंकि \"ire\" का अर्थ है अत्यधिक क्रोध या गुस्सा, जो कर्मचारियों की प्रतिक्रिया को दर्शाने के लिए उपयुक्त है। 'Regret' का अर्थ है खेद या पछतावा, 'Sympathy' का अर्थ है सहानुभूति, और 'Agreement' का अर्थ है सहमति, जो इस संदर्भ में सही नहीं है।<br> • 'Ire' should be used because it means intense anger, which appropriately reflects the employees' reaction. 'Regret' means sorrow or remorse, 'Sympathy' means compassion, and 'Agreement' means consent, which do not fit in this context."}, {"id": "114847", "question": "<strong>Select the word which means the same as the group of words underlined in the given sentence</strong>.</p> <p>The lack of resources was <ins><strong>a thing that prevented</strong></ins> us from completing the project on time.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Bar", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Control", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Impose", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Lockdown"], "correct_answer": 0, "solution": "A) <strong>Bar</strong> (noun) – A circumstance or obstacle that prevents or hinders progress. रोक"}, {"id": "114859", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong>.</p> <p>She was overwhelmed with <ins><strong>anguish</strong> </ins>after hearing the tragic news.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Torment", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Elation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Gaiety", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Apathy"], "correct_answer": 0, "solution": "A) <strong>Anguish</strong> (noun) – Severe mental or physical pain or suffering, agony, torment, distress. पीड़ा<br> <strong>Synonym: Torment</strong> (noun) – Severe physical or mental suffering, agony, pain. यातना<br> • <strong>Elation </strong>(noun) – Great happiness and exhilaration, euphoria, joy. उत्साह<br> • <strong>Gaiety</strong> (noun) – The state of being lighthearted or cheerful, joy, happiness. आनंद<br> • <strong>Apathy</strong> (noun) – Lack of interest, enthusiasm, or concern, indifference. उदासीनता"}, {"id": "114905", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>The father said to his daughter, “Your mother will be waiting for me.”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The father told his daughter that her mother was waiting for me.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The father told his daughter that her mother would be waiting for him.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The father told his daughter that my mother would be waiting for him.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The father told his daughter that her mother will be waiting for him."], "correct_answer": 1, "solution": "• 'would be waiting' का प्रयोग होगा क्योंकि Reporting verb 'said' Past Tense में है और Direct Speech में 'will be waiting' Verb का उपयोग Future Continuous Tense में है, जिसे Indirect Speech में बदलने के लिए Future in the Past 'would be waiting' का प्रयोग किया जाएगा।<br> • 'her mother' का प्रयोग 'your mother' के स्थान पर होगा क्योंकि Indirect Speech में Pronoun 'your' का रूप 'her' में बदल जाएगा, जो ‘daughter’ के लिए उपयुक्त है।<br> • 'for him' का प्रयोग 'for me' के स्थान पर होगा क्योंकि Indirect Speech में 'me' का रूप Reporting Subject 'the father' के हिसाब से 'him' हो जाएगा।<br> जैसे— He said to his son, \"Your friend will be waiting for me.\" -&gt; He told his son that his friend would be waiting for him."}, {"id": "114850", "question": "<strong>There is a spelling error in the given sentence. Select the option that contains the INCORRECTLY spelt word</strong>.</p> <p>The polar bears are native to the artic regions of the world.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Artic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Polar", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Native", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Regions"], "correct_answer": 0, "solution": "A) The correct spelling of 'Artic' is 'Arctic', which refers to \"the regions around the North Pole\" (उत्तरी ध्रुवीय क्षेत्र)."}, {"id": "114906", "question": "<strong>Select the correct passive form of the given sentence.</strong></p> <p>My mother is watching a new serial about the life of Dr. Ambedkar.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A new serial about the life of Dr. Ambedkar was being watched by my mother.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> A new serial about the life of Dr. Ambedkar is being watched by my mother.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A new serial about the life of Dr. Ambedkar is watched by my mother.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A new serial about the life of Dr. Ambedkar will be watched by my mother"], "correct_answer": 1, "solution": "• 'is being watched' का प्रयोग किया जाएगा क्योंकि Active Voice में 'is watching' का उपयोग Present Continuous Tense में हुआ है। Present Continuous Tense को Passive Voice में बदलने के लिए 'is/am/are + being + V3' का प्रयोग किया जाता है।<br> • Subject 'My mother' को Passive Voice में 'by my mother' के रूप में प्रयोग किया जाएगा और Object 'a new serial about the life of Dr. Ambedkar' को Subject के रूप में प्रयोग किया जाएगा।<br> जैसे— He is cleaning the room. -&gt; The room is being cleaned by him."}, {"id": "114916", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank</strong>.<br> The young seagull was alone on his ____1_____. His two brothers and his sister had already flown away the day before. He had been afraid to fly with them. Somehow when he had taken a little run forward to the brink of the ledge and attempted to flap his wings he became afraid. The great expanse of sea stretched down ______2_____, and it was such a long way down — miles down. He felt certain that his wings would never support him; so he bent his head and ran away back to the little hole under the ledge where he slept at night. Even when each of his brothers and his little sister, whose wings were far shorter than his own, ran to the brink, flapped their wings, and flew away, he failed to muster up courage to take that plunge which appeared to him so desperate. His father and mother had come around calling to him shrilly, upbraiding him, threatening to let him starve on his ledge unless he flew away. But for the life of him he could not move. That was twenty-four hours ago. ____3_____then nobody had come near him. The day before, all day long, he had watched his parents flying about with his brothers and sister, perfecting them in the art of flight, teaching them how to skim the waves and how to dive for fish. He had, in fact, seen his older brother catch his first herring and devour it, standing on a rock, ____4_____his parents circled around raising a proud cackle. And all the morning the whole family had walked about on the big plateau midway down the opposite cliff taunting him with his cowardice.</p> <p><strong>Select the most appropriate option to fill in blank number 1.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Abridge", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Nudge", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Upsurge", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Ledge"], "correct_answer": 3, "solution": "No solution av e winter. Whenever he encountered them, he would speak with them and affectionately call them ‘Hiawatha’s chickens.’</p> <p>Similarly, Hiawatha became familiar with the habits and languages of all the animals. He learned how beavers constructed their lodges, where squirrels hid their acorns, how reindeer ran so swiftly, and why rabbits were so timid. He would converse with them whenever they crossed paths and referred to them fondly as ‘Hiawatha’s Brothers.’ In this manner, Hiawatha’s wisdom and bond with nature grew stronger each day, making him a friend to every living creature in the wilderness.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Critical", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Appreciative", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Melancholic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Satirical"], "correct_answer": 1, "solution": "No solution available"}, {"id": "114921", "question": "<strong>Comprehension:</strong><br> Hiawatha was a young Native American boy who lived with his elderly grandmother, Nokomis, in a wigwam. Nokomis taught Hiawatha about the wonders of the world around them. She shared her knowledge of the stars, trees, insects, birds, animals, and many other natural elements.</p> <p>As Hiawatha grew older, he developed a deep love for nature and all its creatures. He learned to communicate with birds and animals, and they responded to him in return. He knew every bird's language, their names, and their secrets. He understood how they built their nests during the summer and where they hid themselves in the winter. Whenever he encountered them, he would speak with them and affectionately call them ‘Hiawatha’s chickens.’</p> <p>Similarly, Hiawatha became familiar with the habits and languages of all the animals. He learned how beavers constructed their lodges, where squirrels hid their acorns, how reindeer ran so swiftly, and why rabbits were so timid. He would converse with them whenever they crossed paths and referred to them fondly as ‘Hiawatha’s Brothers.’ In this manner, Hiawatha’s wisdom and bond with nature grew stronger each day, making him a friend to every living creature in the wilderness.</p> <p><strong>What would be the most appropriate title for the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Wisdom of Nokomis", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Hiawatha and His Love for Nature", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Secrets of the Wilderness", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A Boy's Journey with His Grandmother"], "correct_answer": 1, "solution": "No solution available"}, {"id": "114922", "question": "<strong>Comprehension:</strong><br> Hiawatha was a young Native American boy who lived with his elderly grandmother, Nokomis, in a wigwam. Nokomis taught Hiawatha about the wonders of the world around them. She shared her knowledge of the stars, trees, insects, birds, animals, and many other natural elements.</p> <p>As Hiawatha grew older, he developed a deep love for nature and all its creatures. He learned to communicate with birds and animals, and they responded to him in return. He knew every bird's language, their names, and their secrets. He understood how they built their nests during the summer and where they hid themselves in the winter. Whenever he encountered them, he would speak with them and affectionately call them ‘Hiawatha’s chickens.’</p> <p>Similarly, Hiawatha became familiar with the habits and languages of all the animals. He learned how beavers constructed their lodges, where squirrels hid their acorns, how reindeer ran so swiftly, and why rabbits were so timid. He would converse with them whenever they crossed paths and referred to them fondly as ‘Hiawatha’s Brothers.’ In this manner, Hiawatha’s wisdom and bond with nature grew stronger each day, making him a friend to every living creature in the wilderness.</p> <p><strong>What can be inferred about Hiawatha’s relationship with nature?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hiawatha viewed nature merely as a source of knowledge and information.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hiawatha saw nature as something to be conquered and controlled.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Hiawatha developed a harmonious and affectionate bond with nature.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hiawatha was indifferent to the natural world and its creatures."], "correct_answer": 2, "solution": "No solution available"}, {"id": "114923", "question": "<strong>Comprehension:</strong><br> Hiawatha was a young Native American boy who lived with his elderly grandmother, Nokomis, in a wigwam. Nokomis taught Hiawatha about the wonders of the world around them. She shared her knowledge of the stars, trees, insects, birds, animals, and many other natural elements.</p> <p>As Hiawatha grew older, he developed a deep love for nature and all its creatures. He learned to communicate with birds and animals, and they responded to him in return. He knew every bird's language, their names, and their secrets. He understood how they built their nests during the summer and where they hid themselves in the winter. Whenever he encountered them, he would speak with them and affectionately call them ‘Hiawatha’s chickens.’</p> <p>Similarly, Hiawatha became familiar with the habits and languages of all the animals. He learned how beavers constructed their lodges, where squirrels hid their acorns, how reindeer ran so swiftly, and why rabbits were so timid. He would converse with them whenever they crossed paths and referred to them fondly as ‘Hiawatha’s Brothers.’ In this manner, Hiawatha’s wisdom and bond with nature grew stronger each day, making him a friend to every living creature in the wilderness.</p> <p><strong>Choose the most appropriate option to complete the following sentence:</strong></p> <p>\"Hiawatha’s growing bond with nature made him __________.\"", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> distant from other human beings", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> disconnected from reality", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> a friend to every living creature", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> fearful of animals"], "correct_answer": 2, "solution": "No solution available"}, {"id": "114928", "question": "<strong>Comprehension:</strong><br> A bright light fell on the extent of the world’s dependence on information technologies when on July 19, supermarkets, banks, hospitals, airports, and many other services in between suffered a simultaneous blackout after a common software solution they used glitched. Between then and the time at which the solution’s developers rolled out a fix, news of the problem and the resulting downtime spread around the world through the same networks that have been erected to facilitate communications between these systems. Technological advancements are inevitable and desirable, but the concurrent responsibility to set up failsafes and emergency protocols is often less glamorous. These gaps are exacerbated in societies where the adoption of new technologies is concentrated in sectors competing in the global market and in piecemeal fashion vis-à-vis services provided in local markets. Thus, for example, the glitch may have caused an airline operator to suffer greater monetary losses but it would have been more debilitating for cardiac facilities at a tertiary care centre, or a computer trying to access a thermal power facility during peak demand.</p> <p>Such glitches are more common than people realise thanks to otherwise trivial process- or business-level failures. The focus must instead be on the network interconnections that allow these technologies to be useful and the implementation of life-saving redundancies. Unfortunately, unlike most other technological enterprises, information technologies are yet to develop a mature self-awareness of their pansocial character and the impetus to adjust for this rudiment lies with the state. This requires a ‘Digital India’ push that is cognisant of software solutions’ relationship with digital privacy and data sovereignty, layered over the challenges that income inequality and political marginalisation impose on communities navigating more socially interconnected settings. For example, public distrust in electronic voting machines, stoked by an incomplete understanding of software security among the political class, the judiciary, and civil society, could have been restored with open-source software and modes of integrity testing that violate neither physical nor digital property rights. The July 19 outage offers a similar opportunity: to rejig the software that public sector institutions need to provide their essential services and to incorporate redundancies, including moving away from single-vendor policies, that preserve the links between these institutions and people engaged in informal economies in the event of a network-level outage. The state was previously duty-bound to develop democratic digital infrastructure. Now, cognisant of more powerful interlinks among social, economic, and cultural realities, it is also duty-bound to ensure that this infrastructure is shock-proof<strong>.</strong></p> <p><strong>What can be inferred about the consequences of technological advancements from the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The responsibility to establish failsafes and emergency protocols is less emphasized", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Technological advancements always lead to significant monetary losses.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Technological advancements are only desirable in global markets.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> All sectors suffer equally from technological glitches."], "correct_answer": 0, "solution": "No solution available"}, {"id": "114929", "question": "<strong>Comprehension:</strong><br> A bright light fell on the extent of the world’s dependence on information technologies when on July 19, supermarkets, banks, hospitals, airports, and many other services in between suffered a simultaneous blackout after a common software solution they used glitched. Between then and the time at which the solution’s developers rolled out a fix, news of the problem a c digital infrastructure. Now, cognisant of more powerful interlinks among social, economic, and cultural realities, it is also duty-bound to ensure that this infrastructure is shock-proof<strong>.</strong></p> <p><strong>What is one of the reasons that glitches in digital infrastructure are more common than people realize, as mentioned in the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Lack of funding for technological enterprises", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Failure to develop mature self-awareness of their pansocial character", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Overreliance on single-vendor policies", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Public distrust in electronic voting machines"], "correct_answer": 1, "solution": "No solution available"}, {"id": "114932", "question": "<strong>Comprehension:</strong><br> As Paris is ready to host its third Olympics after a century, the 117 Indian athletes are gearing up earnestly to increase the country’s medal count in the post-COVID Games, kicking off on the banks of the majestic river Seine on July 26. When the pandemic-delayed Olympics were staged behind closed doors in Tokyo three years ago, India claimed seven medals to record its best-ever tally. With the country aiming to bid for the 2036 Games, it is understandable that the government, pumping in money into sports promotion, is optimistic about double-digit medals. World and Olympic champion javelin thrower Neeraj Chopra is the brightest medal contender for India. The second Indian individual gold medallist after shooter Abhinav Bindra, he is fourth among the leading throwers this season with a mar o. An improved medals tally in Paris would lift the country’s profile as a sporting nation and help build the momentum for India’s aspirations to embrace the Olympic movement in the near future.​</p> <p><strong>Who among the following athletes is attempting to secure a third consecutive Olympic medal in the upcoming Paris Olympics?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> P.V. Sindhu", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neeraj Chopra", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mirabai Chanu", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Lovlina Borgohain"], "correct_answer": 0, "solution": "No solution available"}],ans={};
const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
