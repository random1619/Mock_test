<script id="theme-toggle-handler">
(function() {
    var savedTheme = 'dark';
    try {
        savedTheme = localStorage.getItem('portal-theme') || 'dark';
    } catch (e) {}
    if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        var observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('light-theme');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('themeToggle');
        if (btn) {
            var newBtn = btn.cloneNode(true);
            newBtn.removeAttribute('onclick');
            btn.parentNode.replaceChild(newBtn, btn);
            
            var currentTheme = 'dark';
            try {
                currentTheme = localStorage.getItem('portal-theme') || 'dark';
            } catch (e) {}
            
            var icon = newBtn.querySelector('i');
            if (icon) {
                icon.className = currentTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            newBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isLight = document.body.classList.toggle('light-theme');
                document.documentElement.classList.toggle('light-theme', isLight);
                var nextTheme = isLight ? 'light' : 'dark';
                try {
                    localStorage.setItem('portal-theme', nextTheme);
                } catch (err) {}
                
                var currentIcon = newBtn.querySelector('i');
                if (currentIcon) {
                    currentIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        }
    });
})();
</script>

<script>
const qs=[{"id": "29230", "question": "<strong>Q1. Select the most appropriate homophone to fill in the blank.</strong></p> <p>Even animals find it difficult to ______ the loss of their loved ones.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> bear", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> wear", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> where", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> bare"], "correct_answer": 0, "solution": "A) 'bear' का प्रयोग होगा क्योंकि \"bear\" का अर्थ होता है सहना या झेलना। जबकि 'wear' का अर्थ है पहनना, 'where' का अर्थ है कहाँ, और 'bare' का अर्थ है नंगा, जो इस संदर्भ में सही नहीं है।"}, {"id": "29231", "question": "<strong>Q2. Select the option that expresses the given sentence in reported speech</strong></p> <p>I said to my father, “Don’t worry! I will complete all the work by tomorrow.”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I assured my father that I would have completed all the work by the following day", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I assured my father that I will complete all the work by the following day.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> I assured my father that I would complete all the work by the following day.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I told my father do not worry I would complete all the work by tomorrow."], "correct_answer": 2, "solution": "C) I assured my father that I would complete all the work by the following day."}, {"id": "29232", "question": "<strong>Select the option that expresses the given sentence in active/passive voice.</strong></p> <p>These kinds of stories are written by Peter.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Peter writes these kinds of stories.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Peter has written these kinds of stories.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Peter can write these kinds of stories.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Peter write these kinds of stories"], "correct_answer": 0, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong>, Active वाक्य का Object Passive वाक्य का Subject बन जाता है। Verb को Active से Passive में बदलते समय सही Tense का प्रयोग किया जाता है। दिए गए वाक्य में <em>\"These kinds of stories\"</em> (Subject), <em>\"are written\"</em> (Verb - Present Simple Passive), और <em>\"by Peter\"</em> (Agent) है। इसे Active Voice में बदलने के लिए, <em>\"Peter\"</em> (Subject) वाक्य की शुरुआत में आएगा, और <em>\"writes\"</em> (Present Simple Active) का प्रयोग होगा।"}, {"id": "29233", "question": "<strong>Q4. Select the most appropriate ANTONYM of the word given in brackets to fill in the blank.</strong></p> <p>Since she had never travelled abroad, she was both _______________ (CALM) and nervous for her upcoming trip.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hyped", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Apathetic", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Excited", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hopeful"], "correct_answer": 2, "solution": "<strong>Antonym</strong>: <strong>Excited</strong> (adjective) – Very enthusiastic and eager, agitated, animated. उत्तेजित"}, {"id": "29234", "question": "<strong>Q5. Select the most appropriate option to fill in the blank.</strong></p> <p>He lost his mother when he was seven and his father when he was thirteen, ______which the orphan boys were sent off by guardian uncles to a grammar school at Hawkshead", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> upon", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> before", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> on", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> against"], "correct_answer": 0, "solution": "A) 'Upon' का प्रयोग होगा क्योंकि जब \"upon\" का अर्थ लिया जाता है तो यह \"के तुरंत बाद\" को दर्शाता है, जिससे यह स्थिति में फिट बैठता है। जबकि 'Before' का अर्थ है \"से पहले\", 'On' का अर्थ है \"पर\" या \"तारीख के रूप में\", और 'Against' का अर्थ है \"के खिलाफ\", जो इस संदर्भ में सही नहीं है।"}, {"id": "29235", "question": "<strong>Q6. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>P. </strong> Yet, and this is among the many feats that the Mumbai-based author pulls off, the novel brings alive the emotional depth and drama of women’s lives in such a milieu.<br> <strong>Q</strong>. Mainly to fulfill men’s physical needs and elders are always right, one which eternally dangles the threat of shame over women and periodically inflicts violence on them.<br> <strong>R.</strong> The Woman Who Climbed Trees takes readers into the heart of a social world in which women exist.<br> <strong>S.</strong> As she unfolds her gripping story, she describes household chores, physical surroundings, relationships, thoughts, and feelings in loving detail, her luminous passages filled with empathy, insight and unflinching candour.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RSPQ", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QPRS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QRPS", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> RQPS"], "correct_answer": 3, "solution": "<strong>R:</strong> This sentence introduces the subject, which is \"The Woman Who Climbed Trees\". It gives an overview of the subject matter of the book."}, {"id": "29236", "question": "<strong>Q7. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>A</strong>. Kerala was often touted as a hostile investment destination with active trade unionism regularly supported by pro-labour policies.<br> <strong>B</strong>. Until recently, the dominant narrative has been the inability of the State to provide a suitable investment climate, especially in the industrial sector.<br> <strong>C.</strong> The incongruence between Kerala’s social and economic development has been a part of discourses on development trajectories.<br> <strong>D. </strong> A combination of right policies, institutional support and the ramping up of necessary infrastructure could mark the beginning of a new Kerala story that of a State pursuing late industrialisation.<br> <strong>E.</strong> This perception seems to be fading away, as Kerala has been attracting investments in the industrial sector.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DECAB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CBDEA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABED", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> CBAED"], "correct_answer": 3, "solution": "<strong>C:</strong> This sentence introduces a general topic about Kerala’s social and economic development and its incongruence. It seems like a starting point for the discussion."}, {"id": "29237", "question": "<strong>Q8. Select the most appropriate meaning of the highlighted idiom</strong></p> <p>The new electric car <strong>costs an arm and a leg</strong>.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Needs physical strength to drive", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Is very expensive", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Is very cheap", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Has no gears"], "correct_answer": 1, "solution": "B) <strong>Costs an arm and a leg</strong> (idiom) – Is very expensive बहुत महंगा"}, {"id": "29238", "question": "<strong>Q9. Identify the INCORRECTLY spelt word</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Acknowledgment", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Accomodate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Address", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Acquire"], "correct_answer": 1, "solution": "B) The correct spelling is ‘Accommodate’ which means “to provide lodging or sufficient space for” स्थान प्रदान करना, अधिकृत करना."}, {"id": "29239", "question": "<strong>Q10. The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</strong></p> <p>Babbal is / a oldest member / in our / Black Ice Club.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> in our", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Black Ice Club", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Babbal is", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> a oldest member"], "correct_answer": 3, "solution": "D) 'a oldest member' में error है क्योंकि 'oldest' एक superlative degree है और इससे पहले 'the' का प्रयोग होता है, न कि 'a'. इसलिए, सही वाक्य होगा: \"Babbal is the oldest member in our Black Ice Club.\""}, {"id": "29240", "question": "<strong>Q11. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>a</strong>. The South Asian Association for Regional Cooperation (SAARC) summits ended in 2014, but the Secretariat somehow keeps itself busy.<br> <strong>b. </strong> The Non-Aligned Movement (NAM) and G-77 had their heyday in the Cold War era. Later they lost their relevance, but they still exist.<br> <strong>c. </strong> Despite serious policy divergences on China and Myanmar, the Association of Southeast Asian Nations (ASEAN) continues to function, consuming reams of paper to issue long communiqués.<br> <strong>d.</strong> Mysterious are the ways in which multilateral groupings prosper and wither away.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> d, b, a, c", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, a, b, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, b, c, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, c, b, d"], "correct_answer": 0, "solution": "<strong>Starting with d:</strong> It introduces the topic of the paragraph, which seems to be the rise, relevance, and decline of multilateral groupings."}, {"id": "29241", "question": "<strong>Q12. Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select ‘No substitution required’.</strong></p> <p>No sooner <ins><strong>did we arrived at</strong></ins> the airport than we got onto our flight to Atlanta.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> did we arrive at", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No substitution required", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> have we arrived at", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> had we arrive at"], "correct_answer": 0, "solution": "A) 'did we arrived at' के बदले 'did we arrive at' का प्रयोग होगा क्योंकि 'did' के साथ base form (V1) का प्रयोग होता है। जैसे— She did not go to school."}, {"id": "29242", "question": "<strong>Q13. Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>Kidney beans were boiled quickly when Nisha added <ins><strong>a substance that speeds up a chemical reaction without being consumed by the reaction itself</strong>.</ins>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> reactant", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> catalyst", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> enzyme", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> solute"], "correct_answer": 1, "solution": "B) <strong>Catalyst</strong> (noun) – A substance that speeds up a chemical reaction without being consumed by the reaction itself. उत्प्रेरक"}, {"id": "29243", "question": "<strong>Q14. Select the most appropriate meaning of the given idiom.</strong></p> <p>Play it by ear</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Obey the rules blindly", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Act as suggested", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Discontinue impulsively", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Perform without any rehearsals"], "correct_answer": 3, "solution": "D) <strong>Play it by ear</strong> (idiom) – Perform without any rehearsals बिना अभ्यास के प्रदर्शन करना"}, {"id": "29244", "question": "<strong>Q15. Select the most appropriate option to fill in the blank</strong></p> <p>In her heart, Sheila knew that her paths with Rahul would _________ soon.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> change", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> end", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> merge", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> cross"], "correct_answer": 3, "solution": "D) 'Cross' का प्रयोग होगा क्योंकि \" CROSS SOMEONE'S PATH\" का अर्थ होता है एक दूसरे से मिलना या भेंट करना। जबकि 'Change' का अर्थ है परिवर्तन करना, 'End' का अर्थ है समाप्त होना, और 'Merge' का अर्थ है मिलाना, जो इस संदर्भ में सही नहीं है।"}, {"id": "29245", "question": "<strong>Q16. Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>As I walked through the old town, I couldn’t help but feel <ins><strong>a sentimental longing</strong></ins> for the simpler times of my childhood.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> affection", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> homesickness", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> inertia", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> nostalgia"], "correct_answer": 3, "solution": "D) <strong>Nostalgia</strong> (noun) – a sentimental longing or wistful affection for the past, typically for a period or place with happy personal associations. भूतकाल की किसी अवधि की याद"}, {"id": "29246", "question": "<strong>Q17. Select the most appropriate option to fill in the blank.</strong></p> <p>With these words Titus began to move, as it were, out of a dream, and doubting whether he heard Gisippus speak, or else saw but a vision, lay still as a man abashed, But when he beheld the tears trickling down by the face of Gisippus, he then comforted him, and thanked him for his _________ kindness, refused the benefit that he offered, saying that it were better that a hundred such unkind wretches as he was should perish, than so noble a man as was Gisippus should sustain reproach or damage.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> passionate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> comparable", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> incomparable", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> sympathetic"], "correct_answer": 2, "solution": "C) 'Incomparable' का प्रयोग होगा क्योंकि \"incomparable\" का अर्थ होता है अतुलनीय या अद्वितीय। इस संदर्भ में, जिस तरह से Gisippus की महानता और उसकी दयालुता को बताया गया है, 'Incomparable' वाक्य में सबसे उपयुक्त है। जबकि 'Passionate' का अर्थ है भावुक, 'Comparable' का अर्थ है तुलनास्पद, और 'Sympathetic' का अर्थ है सहानुभूतिपूर्ण, जो इस संदर्भ में उत्तम नहीं हैं।"}, {"id": "29247", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong></p> <p>Somebody sent him a cheque for a hundred euros as his remuneration.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He was sent a cheque for a hundred euros as his remuneration by someone.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He was been sent a cheque for a hundred euros as his remuneration someone.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He sent a cheque for a hundred euros as his remuneration someone.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He is sent a cheque for a hundred euros as his remuneration someone."], "correct_answer": 0, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong>, Active वाक्य का <strong>Object</strong> Passive वाक्य का <strong>Subject</strong> बन जाता है। <strong>Verb</strong> को Active से Passive में बदलते समय सही <strong>Tense</strong> का प्रयोग किया जाता है। Active वाक्य में <strong>\"Somebody\"</strong> (Subject), <strong>\"sent\"</strong> (Verb in Past Simple) और <strong>\"him\"</strong> (Indirect Object) तथा <strong>\"a cheque for a hundred euros as his remuneration\"</strong> (Direct Object) हैं। Passive में बदलने पर <strong>\"He\"</strong> (Indirect Object → Subject) बन गया है, <strong>Verb को \"was sent\"</strong> (Past Simple Passive) में बदला गया है और <strong>\"by someone\"</strong> का प्रयोग किया गया है।"}, {"id": "29248", "question": "<strong>Q19. Select the most appropriate ANTONYM of the word given in brackets to fill in the blank</strong>.</p> <p>This route cannot get more ____________ (simplified) than it already is.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> uniform", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> convoluted", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> homogenous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> unvaried"], "correct_answer": 1, "solution": "<strong>Antonym</strong>: <strong>Convoluted</strong> (adjective) – Complex, tangled, intricate, complicated. जटिल"}, {"id": "29249", "question": "<strong>Q20. Some sentences are given below. While the first and the last sentences (1 and 2) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>1. </strong> The first thing that comes to mind when speaking of the value of a currency is the exchange rate it commands in international transactions.<br> <strong>A.</strong> Another is its purchasing power within an economy, i.e., whether it can buy the same basket of goods over time. Inflation erodes the value of a currency over time.<br> <strong>B.</strong> For instance, we may ask how many cents is the rupee worth.<br> <strong>C.</strong> But there is a more fundamental sense in which the value of a currency is to be understood, and it has nothing to do with prices.<br> <strong>D</strong>. It has to do with the confidence that citizens have in its continued acceptance as a medium of exchange and store of value.<br> <strong>2.</strong> This confidence is based on the trust that they repose in their monetary authority, which is the central bank", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDCA", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BACD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCDA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCAD"], "correct_answer": 1, "solution": "<strong>1:</strong> 1 is the given first sentence, which talks about the primary concept people associate with currency value: the exchange rate."}, {"id": "29250", "question": "<strong>Q21. The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don’t find any error, mark ‘No error’ as your answer.</strong></p> <p>In course by time, / he was wise enough to realise / the mistakes of his past life.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> In course by time,", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> he was wise enough to realise", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> the mistakes of his past life.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No error"], "correct_answer": 0, "solution": "<strong>In the course of time</strong> (phrase) – as time goes by समय के साथ साथ"}, {"id": "29251", "question": "<strong>Q22. Select the most appropriate option to fill in the blank.</strong></p> <p>Chameleons can change their colour in an instant in order to blend with their background. They also have the ________ to move each of their eyes independently. They are also capable of looking in any direction. Chameleons feed on insects. They catch them with the help of their sticky tongue. Did you know: they can shoot out their tongue farther – more than the _________ of their own head and body combined!</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> power; breadth", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> means; width", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ability; length", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> propensity; span"], "correct_answer": 2, "solution": "C) 'Ability' का प्रयोग होगा क्योंकि \"ability\" का अर्थ होता है किसी कार्य को करने की क्षमता या सामर्थ्य। जबकि 'Power' का अर्थ है शक्ति या ऊर्जा, 'Means' का अर्थ है तरीका, और 'Propensity' का अर्थ है प्रवृत्ति या झुकाव, जो इस संदर्भ में सही नहीं है। वैसे ही, 'Length' का प्रयोग होगा क्योंकि यह चामेलियन के शरीर और सिर की पूरी लंबाई को दर्शाता है। 'Breadth' और 'Width' चौड़ाई को दर्शाते हैं, जबकि 'Span' एक विशिष्ट अवधि या समय को दर्शाता है, जो इस संदर्भ में सही नहीं है।"}, {"id": "29252", "question": "<strong>Q23. Select the option that expresses the given sentence in reported speech.</strong></p> <p>The students said, “We wish we didn’t have to write exams.”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The students say we wish they had not written exams.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The students said they wished they have not written exams.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The students say that we wish we do not write exams.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The students said that they wished they didn’t have to write exams."], "correct_answer": 3, "solution": "D) The students said that they wished they didn’t have to write exams."}, {"id": "29253", "question": "<strong>Q24. Select the option that expresses the given sentence in direct speech.</strong></p> <p>“I will help you,” he will say to me.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He says to me that he would help me.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He will tell me that he will help me.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He tells me that he helped me.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He told me that he will help me."], "correct_answer": 1, "solution": "B) He will tell me that he will help me."}, {"id": "29254", "question": "<strong>Q25. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>A. </strong> Well, you do not have to imagine too hard, because this is the reality of C-20, the official civil society process of G-20, since India has taken over the latter’s presidentship.<br> <strong>B.</strong> The C-20 process has been co-opted by the party in power in a not-so-subtle attempt at furthering its own politico-religious vision, giving it a very thin veneer of civil society respectability.<br> <strong>C</strong>. Imagine a global civil society event in which the first several rows of the audience are occupied by saffron-clad members of a single religion, and whose coordination is in the hands of institutions from the same religion.<br> <strong>D.</strong> This dangerous deception is combined with another one where G-20’s focus on neoliberal economics is attempted to be covered by a green fig leaf called the ‘green economy’, and pliable NGOs are being called in to legitimise it.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CDAB", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> CABD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCAD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABCD"], "correct_answer": 1, "solution": "C: This sentence provides an imaginative scenario. The use of the word \"Imagine\" clearly indicates that it's the beginning of a scenario or explanation. Hence, it makes sense for this to be the starting point"}, {"id": "29255", "question": "<strong>Q26. Select the most appropriate meaning of the given idiom.</strong></p> <p>It's better to get less than what you want than get nothing.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Half a loaf is better than none.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Waste not, want not.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Where there is smoke, there is fire.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A storm in a teacup"], "correct_answer": 0, "solution": "A) ‘Half a loaf is better than none' का प्रयोग होगा क्योंकि इस idiom का अर्थ है कुछ मिलना बेहतर है जब तक आपको कुछ नहीं मिलता। जबकि 'Waste not, want not' का अर्थ है अगर आप सामग्री का सही प्रयोग करते हैं, तो आपको बाद में इसकी कमी महसूस नहीं होगी। 'Where there is smoke, there is fire' का अर्थ है जहाँ संकेत होते हैं, वहाँ कुछ नकारात्मक हो सकता है, और 'A storm in a teacup' का अर्थ है एक छोटी सी समस्या को बड़ा बना देना, जो इस संदर्भ में सही नहीं है।"}, {"id": "29256", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>I bade him write the composition twice.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He was bid to write the composition twice.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He was baden to write the composition twice.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He was bade to write the composition twice.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He was bidden to write the composition twice."], "correct_answer": 3, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong>, Active वाक्य का Object Passive वाक्य का Subject बन जाता है। Verb को Active से Passive में बदलते समय सही Tense और Past Participle का प्रयोग किया जाता है। Active वाक्य में <strong>\"I\" (Subject)</strong>, <strong>\"bade\" (Verb - Past of \"bid\")</strong>, <strong>\"him\" (Object)</strong> और <strong>\"write the composition twice\" (Infinitive phrase)</strong> है। Passive में बदलने पर <strong>\"him\"</strong> को <strong>\"He\"</strong> में बदला गया है और <strong>\"was bidden\"</strong> (Past Participle of \"bid\") का प्रयोग किया गया है।"}, {"id": "29257", "question": "<strong>Q28. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>P. </strong> The establishment of a Quad-led biomanufacturing hub in India will give the necessary fillip to enhance this cooperation.<br> <strong>Q.</strong> In March 2021, the Quad (Australia, India, Japan, and the United States) set up a Critical and Emerging Technology Working Group to facilitate cooperation, monitor trends, and scout<br> <strong>R. </strong> For opportunities related to developments in critical and emerging technologies, that included biotechnology<br> <strong>S. </strong> However, the potential for Quad cooperation in biotechnology remains insufficiently tapped.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RPSQ", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RSPQ", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> QRSP", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QPSR"], "correct_answer": 2, "solution": "<strong>R comes after Q:</strong> Sentence Q ends with the word \"scout\" and it's clear that the sentence is not complete. Sentence R starts with \"For opportunities related to...\" which naturally continues and completes the thought from Sentence Q. The word \"scout\" connects directly to \"for opportunities,\" indicating that the Quad's working group was set up to scout \"for opportunities related to developments in critical and emerging technologies.\" Hence, R is a direct continuation of Q."}, {"id": "29258", "question": "<strong>Q29. Identify the INCORRECTLY spelt word.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Souvenir", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Symbolise", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Suseptible", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sympathetic"], "correct_answer": 2, "solution": "C) The incorrectly spelled word among the given options is 'Suseptible'. The correct spelling is ‘Susceptible’. This word means “likely or liable to be influenced or harmed by a particular thing” असर में आनेवाला, प्रवृत्त."}, {"id": "29259", "question": "<strong>Comprehension</strong>:</p> <p>When the Supreme Court granted legal status to the concept of ‘advance medical directives’ in 2018 and allowed passive euthanasia, _____1_______ stringent safeguards, it was seen as a vital recognition of both patient autonomy over end-of-life decisions and the right to a ____2______ death. However, doctors later found that some of the specific directions turned out to be “insurmountable obstacles”. In a recent order, a Constitution Bench modified the directions to make them more workable and simple. The advance directive no more needs to be ______3_______by a judicial magistrate. Instead, it could be attested before a notary or a gazetted officer. Instead of the magistrate, it is enough if the notary or officer is satisfied that the document is executed voluntarily, without coercion or inducement, and with full understanding. The original guideline that the executor should name a guardian or a close relative who would be authorised to give consent to refuse or withdraw medical treatment, in the event of the executor becoming incapable of a decision, has been modified to name more than one guardian or relative. Instead of the magistrate being _____4_____ informing family members about the document, in case they are not present at the time of its being executed, the onus is now on the persons themselves to hand over a copy of the advance directive to the guardians or close relatives named in it, as well as to the family physician.</p> <p>Fill in the blanks with the most appropriate combinations of words</p> <p><strong>Q30. Select the most appropriate option to fill in blank 1</strong>.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> In order to", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> subject to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> with regard to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> so as to"], "correct_answer": 1, "solution": "B) ‘subject to' का प्रयोग इस context में होता है जब किसी प्रक्रिया या निर्णय को कुछ निर्दिष्ट शर्तों या सुरक्षा उपायों के अधीन रखा जाता है। यहाँ, उच्चतम न्यायालय ने 'advance medical directives' को मान्यता दी है, लेकिन कुछ कड़ी सुरक्षा उपायों के साथ। In order to एक कारण या उद्देश्य दर्शाने के लिए प्रयुक्त होता है, with regard to किसी विषय या मुद्दे को संदर्भित करने के लिए होता है, और so as to एक परिणाम या नतीजा प्राप्त करने के लिए प्रयुक्त होता है, जो इस context में सही नहीं हैं"}, {"id": "29260", "question": "<strong>Comprehension</strong>:</p> <p>When the Supreme Court granted legal status to the concept of ‘advance medical directives’ in 2018 and allowed passive euthanasia, _____1_______ stringent safeguards, it was seen as a vital recognition of both patient autonomy over end-of-life decisions and the right to a ____2______ death. However, doctors later found that some of the specific directions turned out to be “insurmountable obstacles”. In a recent order, a Constitution Bench modified the directions to make them more workable and simple. The advance directive no more needs to be ______3_ mbers about the document, in case they are not present at the time of its being executed, the onus is now on the persons themselves to hand over a copy of the advance directive to the guardians or close relatives named in it, as well as to the family physician.</p> <p>Fill in the blanks with the most appropriate combinations of words</p> <p><strong>Q33. Select the most appropriate option to fill in blank 4</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cope with", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Deal with", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Tasked with", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Darted with"], "correct_answer": 2, "solution": "C) 'Tasked with' का प्रयोग होगा क्योंकि यह इस संदर्भ में इंगीत करता है कि किसी विशिष्ट कार्य के लिए किसी को जिम्मेदार ठहराया गया है। 'Cope with', 'Deal with', and 'Darted with' का अर्थ इस संदर्भ में सही नहीं है।"}, {"id": "29263", "question": "<strong>Comprehension</strong>:</p> <p>With around 400 ecologists, scientists and naturalists forming the latest group of specialists seeking that the Forest Conservation (Amendment) Bill, 2023, not be tabled during the monsoon session of Parliament, Environment Minister Bhupender Yadav and other MPs would do well to heed the advice proffered. Similar sentiments and concerns have earlier been expressed by hundreds of law and forest rights experts, retired civil servants and MPs of Opposition parties. Their demand for more time for the submission of objections to the draft legislation — the deadline for it ended in May — for consideration by the joint committee of Parliament holds water as they have buttressed their fears by pointing out glaring flaws in the content of the Bill.</p> <p>The main contention is over the proposed amendments to the Forest Conservation Act, 1980, leaning towards wanton development rather than strengthening the Act for protecting and increasing the country’s forest cover. Forest conservation cannot be compromised as it is crucial for saving biodiversity, ensuring the rights of tribals and helping arrest climate change as forests are natural carbon sinks. The extreme weather events that the country has been witnessing over the past few years are in part attributed to the depleting forest reserves and consequent rise in temperatures. The current flood situation in the North exemplifies how hills and plains denuded of trees and greenery become prone to erosion by the gushing currents of water, leaving a trail of destruction.</p> <p> It has been pointed out that due process was not followed as the Bill was referred to a select committee dominated by BJP MPs and not the parliamentary panel of the ministries concerned for all-round deliberations. The apprehensions about the loss of forest tracts for commercial ventures must be allayed.</p> <p><strong>Q34. Why did ecologists, scientists, and naturalists urge the Forest Conservation (Amendment) Bill, 2023 not to be tabled during the monsoon session of Parliament</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They believed the amendments did not address the major ecological issues the country faces.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> They felt the Bill leans more towards unrestrained development rather than fortifying the original Act to safeguard and expand the nation's forested regions.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They were representing the interests of th rves and consequent rise in temperatures. The current flood situation in the North exemplifies how hills and plains denuded of trees and greenery become prone to erosion by the gushing currents of water, leaving a trail of destruction.</p> <p> It has been pointed out that due process was not followed as the Bill was referred to a select committee dominated by BJP MPs and not the parliamentary panel of the ministries concerned for all-round deliberations. The apprehensions about the loss of forest tracts for commercial ventures must be allayed.</p> <p><strong>Q35. Why is forest conservation considered paramount according to the passage</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Only because it prevents floods in the northern part of the country.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> It provides commercial ventures with large tracts of land for expansion.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> It plays a pivotal role in preserving biodiversity, ensuring the rights of the tribal communities, and plays a significant part in mitigating the impacts of climate change as forests act as natural carbon reservoirs.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Because forests are simply beautiful to look at and offer recreational opportunities."], "correct_answer": 2, "solution": "C) The passage mentions: \"Forest conservation cannot be compromised as it is crucial for saving biodiversity, ensuring the rights of tribals and helping arrest climate change as forests are natural carbon sinks.\" This explanation is a direct match with option C."}, {"id": "29265", "question": "<strong>Comprehension</strong>:</p> <p>With around 400 ecologists, scientists and naturalists forming the latest group of specialists seeking that the Forest Conservation (Amendment) Bill, 2023, not be tabled during the monsoon session of Parliament, Environment Minister Bhupender Yadav and other MPs would do well to heed the advice proffered. Similar sentiments and concerns have earlier been expressed by hundreds of law and forest rights experts, retired civil servants and MPs of Opposition parties. Their demand for more time for the submission of objections to the draft legislation — the deadline for it ended in May — for consideration by the joint committee of Parliament holds water as they have buttressed their fears by pointing out glaring flaws in the content of the Bill.</p> <p>The main contention is over the proposed amendments to the Forest Conservation Act, 1980, leaning towards wanton development rather than strengthening the Act for protecting and increasing the country’s forest cover. Forest conservation cannot be compromised as it is crucial for saving biodiversity, ensuring the rights of tribals and helping arrest climate change as forests are natural carbon sinks. The extreme weather events that the country has been witnessing over the past few years are in part attributed to the depleting forest reserves and consequent rise in temperatures. The current flood situation in the North exemplifies how hills and plains denuded of trees and greenery become prone to erosion by the gushing currents of water, leaving a trail of destruction.</p> <p> It has been pointed out that due process was not followed as the Bill was referred to a select committee dominated by BJP MPs and not the parliamentary panel of the ministries concerned for all-round deliberations. The apprehensions about the loss of forest tracts for commercial ventures must be allayed.</p> <p><strong>Q36. What can be inferred about the effects of diminishing forest reserves on the country's climate</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Forests have no real impact on the weather patterns of the country.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The sporadic extreme weather incidents over recent years are somewhat a result of the dwindling forest regions and the subsequent temperature elevations.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The degradation of forest areas leads to cooler temperatures and more stable weather conditions.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The current flood situation in the North is entirely unrelated to forest conservation issues"], "correct_answer": 1, "solution": "B) The passage suggests: \"The extreme weather events that the country has been witnessing over the past few years are in part attributed to the depleting forest reserves and consequent rise in temperatures.\" This directly supports the inference made in option B"}, {"id": "29266", "question": "<strong>Comprehension</strong>:</p> <p>With around 400 ecologists, scientists and naturalists forming the latest group of specialists seeking that the Forest Conservation (Amendment) Bill, 2023, not be tabled during the monsoon session of Parliament, Environment Minister Bhupender Yadav and other MPs would do well to heed the advice proffered. Similar sentiments and concerns have earlier been expressed by hundreds of law and forest rights experts, retired civil servants and MPs of Opposition parties. Their demand for more time for the submission of objections to the draft legislation — the deadline for it ended in May — for consideration by the joint committee of Parliament holds water as they have buttressed their fears by pointing out glaring flaws in the content of the Bill.</p> <p>The main contention is over the proposed amendments to the Forest Conservation Act, 1980, leaning towards wanton development rather than strengthening the Act for protecting and increasing the country’s forest cover. Forest conservation cannot be compromised as it is crucial for saving biodiversity, ensuring the rights of tribals and helping arrest climate change as forests are natural carbon sinks. The extreme weather events that the country has been witnessing over the past few years are in part attributed to the depleting forest reserves and consequent rise in temperatures. The current flood situation in the North exemplifies how hills and plains denuded of trees and greenery become prone to erosion by the gushing currents of water, leaving a trail of destruction.</p> <p> It has been pointed out that due process was not followed as the Bill was referred to a select committee dominated by BJP MPs and not the parliamentary panel of the ministries concerned for all-round deliberations. The apprehensions about the loss of forest tracts for commercial ventures must be allayed.</p> <p><strong>Q37. What concern arises from the manner in which the Bill was referred</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Bill was promptly discussed by all relevant parties and passed unanimously.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Bill was forwarded to a diverse committee which provided comprehensive inputs from all sectors.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Due protocol wasn't adhered to as the Bill was sent to a committee chiefly comprising of BJP MPs, rather than the parliamentary committee of the relevant ministries for a holistic discussion.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The public had full transparency into the committee’s discussions and there were no concerns about the bill's implications."], "correct_answer": 2, "solution": "C) The relevant section of the passage states: \"It has been pointed out that due process was not followed as the Bill was referred to a select committee dominated by BJP MPs and not the parliamentary panel of the ministries concerned for all-round deliberations.\" This directly correlates with option C, highlighting the concerns regarding the due process of the Bill's referral."}, {"id": "29267", "question": "<strong>Comprehension</strong>:</p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>The new regulation of UGC making PhD optional in the appointment of assistant professors will attract youngsters towards teaching</p> <p>It’s often said that the quality of higher education in a country rests in the hands of the number PhDs holders produced by her. It is because of PhD scholars we are producing scientific papers and holding the top position in world rankings.</p> <p>With this objective policy makers give more impetus to increase the number of doctoral degree holders every year. Even during various accreditation processes like NAAC, NIRF, DSIR, NBA etc, more thrust is given to the number of PhD holders in an institution. It is at this juncture the recent order amending the essential qualification for the post of assistant professor in higher education institutions has created confusion in the academic community. As per the new regulation PhD has become optional for the post of assistant professor in higher education institutions.</p> <p>There is indeed no correlation between higher degrees of teachers and quality of education or research. Many of our great teachers and scientists didn’t have any doctoral degrees. Degrees or academic grades alone cannot reliably gauge a candidate's research capabilities or potential.</p> <p>However, the new regulation of UGC making PhD optional in the appointment of assistant professors, though will attract youngsters towards teaching, will badly affect the research environment in higher education. The reason for the decline in higher education quality is twofold.</p> <p>The primary reason is the lack of interest among the students towards science courses. The second reason is that syllabus followed in science subjects in many universities across the country is outdated and the students who come out from our universities are not employable in the current global standards. Most of the syllabi in our state universities are prepared for the convenience of teachers.</p> <p>Even though there are provisions for research training during the undergraduate and postgraduate periods, most students and teachers don’t take it seriously. Most of the students depend on private laboratories that prepare readymade dissertation reports without doing any hands-on work, after paying the necessary amount. Even teachers who work in many colleges depend on such laboratories for their doctoral work and publications. The students who come out of such institutions don’t know the fundamentals of research.</p> <p>The marks received by present-day students cannot be taken as a marker of quality, because of the faulty evaluation scheme followed by many universities. If there is a decline in the pass percentage, the management seeks an explanation from teachers. So nowadays evaluation of answer scripts is just to satisfy the management and students. Students pursue a course that is easy to pass, looking at the pass percentage of previous years. The NET examination in the current pattern evaluates the student solely based on multiple-choice questions.</p> <p>Students who are trained by good coaching centres by paying high fees qualify for the NET exam easily. So even the NET examination can’t evaluate the skills needed for a teacher in the higher education sector.</p> <p>A higher education teacher should be able to handle research independently. While exempting people from PhD, one should restructure the NET examination pattern so that it includes ways to evaluate knowledge, research skills and teaching skills. Also, the question patterns of NET should be changed every year so that influence of coaching centres would be reduced and students from every section of society get equal opportunity. If this is not done it may affect the quality of scientific research in the long term.</p> <p><strong>Q38. Which of the following statements is most likely to be inferred from the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The new UGC regulation will attract more youngsters to teaching and thus increase the quality of education in higher education institutions.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> While the new UGC regulation will attract more young teachers, it may also lead to a decrease in the quality of research output from higher education institutions.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The new UGC regulation will not have any significant impact on the teaching profession or research output in higher education institutions.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The primary reason for the decline in quality of higher education is the new UGC regulation making PhD optional for the appointment of assistant professors."], "correct_answer": 1, "solution": "The passage discusses the potential impact of the new UGC regulation that makes a PhD optional for assistant professor appointments. It states that while this move might attract more young individuals towards ours. By morning, everything was submerged, with only a few cement houses standing amidst floating human and animal corpses. Two fallen coconut trees on their roof provided sustenance. After two agonizing days, the rains ceased. Worried about his family, Prashant set out for his village, an eighteen-kilometre journey. Using a sturdy stick to navigate and locate shallow waters, he waded and swam through flooded paths. He joined two acquaintances on the way, and together, they maneuvered through the devastated lands, pushing away floating bodies and debris. Upon reaching his village, Kalikuda, Prashant found his home destroyed. Desperate, he headed to a Red Cross shelter, hoping to find his family. Miraculously, he discovered them, including his grandmother, siblings, uncles, and aunts, who had presumed him dead. Witnessing the dire state of the shelter, Prashant, just nineteen, took charge. He led a group to negotiate for rice from a local merchant. They succeeded, feeding the 2,500 hungry refugees. He organized a cleanup, managed medical care, and signaled helicopters for airdrops using children with utensils to symbolize hunger. Observing traumatized children orphaned by the cyclone, Prashant created a makeshift shelter, enlisting women's aid. To combat escalating grief, he engaged women in a food-for-work initiative by an NGO, while organizing sports for children, including cricket matches. Prashant and volunteers focused on rehabilitating widows and orphans, resisting government plans for institutions which lacked personal touch and empathy. They believed in community-based resettlement, pairing childless widows with orphaned children. Six months post-cyclone, Prashant's selflessness was the beacon of hope for his village's bereaved. He healed not by mourning his losses but by immersing himself in service. The young man's face became the emblem of resilience and hope in the aftermath of tragedy.</p> <p><strong>Q42. How did Prashant and the family he was visiting             if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
