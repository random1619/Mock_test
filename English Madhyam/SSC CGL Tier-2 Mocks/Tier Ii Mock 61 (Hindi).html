<script id="theme-toggle-handler">
(function() {
    var savedTheme = 'dark';
    try {
        savedTheme = localStorage.getItem('portal-theme') || 'dark';
    } catch (e) {}
    if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        var observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('light-theme');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('themeToggle');
        if (btn) {
            var newBtn = btn.cloneNode(true);
            newBtn.removeAttribute('onclick');
            btn.parentNode.replaceChild(newBtn, btn);
            
            var currentTheme = 'dark';
            try {
                currentTheme = localStorage.getItem('portal-theme') || 'dark';
            } catch (e) {}
            
            var icon = newBtn.querySelector('i');
            if (icon) {
                icon.className = currentTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            newBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isLight = document.body.classList.toggle('light-theme');
                document.documentElement.classList.toggle('light-theme', isLight);
                var nextTheme = isLight ? 'light' : 'dark';
                try {
                    localStorage.setItem('portal-theme', nextTheme);
                } catch (err) {}
                
                var currentIcon = newBtn.querySelector('i');
                if (currentIcon) {
                    currentIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        }
    });
})();
</script>

const qs=[{"id": "95586", "question": "<strong>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select ‘No substitution required’.</strong></p> <p>He and his father <ins><strong><em>take a ride</em></strong></ins> every morning to the top of the hill.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> takes a ride", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> takes an ride", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> No substitution required", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> taking a ride"], "correct_answer": 2, "solution": "दो nouns अगर and से जुड़े हों तो verb plural होता है। लेकिन यदि ये दोनों verb एक ही चीज को इंगित करते हों या मिलकर एक unit बनाते हों तो verb singular होगा। दोनों noun क्या एक इकाई बना रहे हैं इस बात से भी इंगित किया जा सकता है कि दोनों nouns के लिए कितने 'the' का इस्तेमाल हुआ है। अगर दोनों nouns के साथ दो 'the' का इस्तेमाल हुआ है तो इससे दो अलग-अलग चीजों या व्यक्तियों का ज्ञान होता है और verb plural रूप में होगा। अगर एक ही the दोनों nouns के लिए है तो verb singular होगा।"}, {"id": "95567", "question": "<strong>Arrange the following sentences to form a coherent paragraph.</strong></p> <p><strong>P. </strong>Any success in curbing illegal mining in the Aravallis would require consolidated efforts at all levels and at all times. </p> <p><strong>Q. </strong>The drive launched by the Haryana Forest Department in Nuh to seal all pathways or forest trails to curb plying of mining vehicles is a step in the right direction.</p> <p><strong>R.</strong> It would be prudent to term it the beginning of a long-drawn process.</p> <p><strong>S.</strong> The scale and sustainability of the crackdown will depend on the political will. If the signal to the official machinery is to put an end to illegal mining and crushing, the task becomes a tad easier to accomplish.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> PQRS", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> QRPS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> SQPR", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> PRQS"], "correct_answer": 1, "solution": "<strong>Q:</strong> The drive launched by the Haryana Forest Department in Nuh to seal all pathways or forest trails to curb plying of mining vehicles is a step in the right direction. This sentence introduces the initiative being discussed, setting the context for the subsequent sentences."}, {"id": "95589", "question": "<strong>Select the option that expresses the given sentence in indirect/direct speech.</strong></p> <p>Anshul said, “Should we go to the Zoo today?”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Anshul told that they should go to the zoo that day.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Anshul wondered if they should go to the zoo that day.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Anshul asked if we should go to the zoo today.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Anshul announced that they would go to the zoo that day."], "correct_answer": 1, "solution": "<strong>B) </strong>Anshul wondered if they should go to the zoo that day."}, {"id": "95585", "question": "<strong>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select ‘No substitution required’.</strong></p> <p> They are cautious about their car <ins><strong><em>as it’s</em></strong> </ins>door is broken</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No substitution required", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> because it’s", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> as it is", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> as its"], "correct_answer": 3, "solution": "<strong>D) ‘as it’s‘</strong> के बदले ‘as its‘ का प्रयोग होगा क्योंकि its (apostrophe के बिना) एक possessive pronoun (जैसे his या her) है उन nouns के लिए जिनका कोई a defined gender नहीं है। इसके विपरीत, it's (apostrophe के साथ) ‘it is or it has’ का छोटा रूप है!"}, {"id": "95587", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong>.</p> <p>Since the beginning of the term, / we are spending / a lot of time / on poetry.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Since the beginning of the term,", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> we are spending", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a lot of time", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> on poetry"], "correct_answer": 1, "solution": "B) ‘are spending' के बदले 'have spent' का प्रयोग होगा क्योंकि वाक्य के प्रारंभ में 'Since the beginning' अर्थात् ‘Since + Point of Time' का प्रयोग है और since+ Point of Time का प्रयोग होने पर वाक्य सामान्यत: Present Perfect Continuous या Present Perfect में होता है; जैसे-<br> a. Since his engagement, he has spent a lot of money on his would be wife.<br> 'have spent' will be used instead of 'are spending' because 'Since the beginning' i.e. 'Since + Point of Time' is used and when since + Point of Time is used, the sentence is usually in Present Perfect Continuous or Present Perfect; As-<br> i. Since his engagement, he has spent a lot of money on his would be wife."}, {"id": "95582", "question": "<strong>Select the option that corrects the misspelt words in the given sentence.</strong></p> <p>We will always rember your contribusion.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> We will always remembar your contributoin.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> We will always remember your contribution.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> We will always remmember your contrabution.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> We will always remembber your contribution."], "correct_answer": 1, "solution": "remember' और 'contribution' का प्रयोग होगा क्योंकि शब्द 'rember' और 'contribusion' गलत वर्तनी वाले शब्द हैं। 'Remember' का अर्थ होता है किसी चीज़ को याद रखना और 'Contribution' का अर्थ होता है योगदान। इसलिए, सही वर्तनी वाले शब्दों का प्रयोग करने पर वाक्य इस प्रकार होगा:"}, {"id": "95571", "question": "<strong>Select the most appropriate option to substitute the underlined segment in the given sentence. If no substitution is required, select No improvement.</strong></p> <p>If I have money, I <ins><strong>purchase</strong> </ins>this house", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I purchased", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No improvement", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I have purchased", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> I will purchase"], "correct_answer": 3, "solution": "'I will purchase' will be used instead of 'I purchase' because according to the structure of Conditional Sentence Type 1, after Present Simple Tense, Future Simple Tense is used; Like— If it rains, I will stay at home."}, {"id": "95578", "question": "Select the most appropriate <strong>synonym</strong> of the given word.</p> <p>Obsession", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Discrimination", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Fascination", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Unconcern", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sympathy"], "correct_answer": 1, "solution": "Synonym: <strong>Fascination</strong> (noun) – The power to captivate or allure; a strong attraction or interest. <strong>सम्मोहन/</strong> मोह"}, {"id": "95581", "question": "Select the most appropriate <strong>ANTONYM</strong> of the underlined word.</p> <p>The patient found the doctor to be <ins><strong>obtuse</strong></ins> and distracted by constant calls on his phone.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> astute", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> obese", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> banal", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> obsolete"], "correct_answer": 0, "solution": "Antonym: <strong>Astute</strong> (adjective) – Having or showing an ability to accurately assess situations or people and turn this to one's advantage; shrewd, clever, intelligent. चतुर"}, {"id": "95583", "question": "<strong>Select the correctly spelt word.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Disstract", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Destarct", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Distract", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Distarct"], "correct_answer": 2, "solution": "<strong>C)</strong> The correct spelling among the options is 'Distract व्याकुल करना"}, {"id": "95568", "question": "<strong> Arrange the following sentences to form a coherent paragraph.</strong><br> <br> P. The insensitivity and lack of compassion pan across the flight spectrum – from lack of clarity of services provided at the time of booking tickets to amenities available at the airport or check-ins, clear boarding rules and in-flight hospitality.<br> Q. Rather, the industry seems to be largely driven by the cold profit motif, giving the cold shoulder to some warmer common-sense instincts needed to deal with the differently abled.<br> R. Standing out are the increasing numbers of niche flyers of the special needs category. However, the corresponding facilities and services required to make these passengers feel comfortable are woefully inadequate.<br> S. Air travel has grown exponentially as it has become more accessible and affordable with the proliferation of private sector airlines and domestic and international airports over the past couple of decades.<br>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RPQS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RSPQ", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> SRQP", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> SPRQ"], "correct_answer": 2, "solution": "<strong>S:</strong> This sentence provides context for the paragraph and sets the tone for discussing air travel in general. It mentions the rise in air travel due to the accessibility and affordability brought about by private sector airlines and new airports.<br> <strong>R:</strong> The sentence R is a logical continuation of sentence S because it narrows down the topic to a specific group of travelers, that is, those with special needs. It also introduces the problem these passengers face - inadequate facilities and services<br> <strong>Q:</strong> After stating the problem in sentence R, sentence Q provides a possible explanation for the issue: the industry's drive for profit leads to a neglect of basic, compassionate services for differently abled passengers.<br> <strong>P:</strong> Finally, sentence P gives examples of how this lack of compassion and insensitivity is manifested across different stages of air travel, reinforcing the points made in the previous sentences and bringing the paragraph to a close."}, {"id": "95563", "question": "<strong>Select the most appropriate homonym to fill in the blank.</strong></p> <p>______________ knowledge in this field is really profound.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> There", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Their", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Dare", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They‘re"], "correct_answer": 1, "solution": "<strong>B) </strong>The most appropriate homonym to fill in the blank in the given sentence is \"Their\". So, the correct option is B. \"Their\"<br> \"There\" is an adverb indicating a place or position, or a pronoun introducing a sentence or clause. In this context, it wouldn't make sense as the sentence is about possession of knowledge, not a location or introduction of a new idea."}, {"id": "95569", "question": "<strong>Some sentences are given below. While the first and the last sentences (1 and 2) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph</strong></p> <p>1. The military coup in Niger last week found an early cheerleader – Russian private militia Wagner’s boss, Yevgeny Prigozhin.</p> <p> A. He also offered up his fighters to restore order there. This leads to two crucial inferences.</p> <p> B. The group also has security contracts in countries like the Central African Republic.</p>  and their famous loaves of bread. Those eaters of loaves might have _____2_____ but the makers are still there. We still have amongst us the mixers, the moulders and those who bake the loaves. Those age-old, time tested ______3_____still exist. The fire in the furnaces has not ______4______ been extinguished. The thud and jingle of the traditional baker’s bamboo, heralding his arrival in the morning, can still be heard in some places. Maybe the father is not alive but the son still carries on the family profession. These bakers are, even today, known as pader in Goa.</p> <p><strong>Select the most appropriate option to fill in blank number 4</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Since", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> When", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Yet", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Far"], "correct_answer": 2, "solution": "No solution available"}, {"id": "95548", "question": "<strong>Comprehension:</strong><br> When Sunita was five years old she saw pictures of Neil Armstrong landing on the moon. In 1969, Neil Armstrong was the first man to walk on the moon. Like any other child, Sunita was also fascinated. Sunita says that when she was a young girl she really loved sports and swimming. She was never too interested in studies. After high school Sunita wanted to become a diver. But she could not get into that course. Instead, she became a helicopter pilot. One day she found out that if she studied and trained for it, she could join the Space Mission. And that is what she did! In 2007 Sunita Williams set a new record for the longest space flight by a woman. Sunita often gives her own example to tell children, “If you want something, but you get something else, do not give up. Do your best, and things will work out!” When Sunita was asked by a child what would she like to do in the future, she answered, “I want to become a school teacher!” So that she could make children understand how science and maths are closely linked to our lives.</p> <p><strong>What motivated Sunita to join the Space Mission?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Her interest in becoming a school teacher in the future.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Her childhood fascination with Neil Armstrong's moon landing.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Her inability to pursue a career in diving.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Her love for sports and swimming."], "correct_answer": 1, "solution": "No solution available"}, {"id": "95549", "question": "<strong>Comprehension:</strong><br> When Sunita was five years old she saw pictures of Neil Armstrong landing on the moon. In 1969, Neil Armstrong was the first man to walk on the moon. Like any other child, Sunita was also fascinated. Sunita says that when she was a young girl she really loved sports and swimming. She was never too interested in studies. After high school Sunita wanted to become a diver. But she could not get into that course. Instead, she became a helicopter pilot. One day she found out that if she studied and trained for it, she could join the Space Mission. And that is what she did! In 2007 Sunita Williams set a new record for the longest space flight by a woman. Sunita often gives her own example to tell children, “If you want something, but you get something else, do not give up. Do your best, and things will work out!” When Sunita was asked by a child what would she like to do in the future, she answered, “I want to become a school teacher!” So that she could make children understand how science and maths are closely linked to our lives.<br> <strong>What does Sunita’s story suggest about dealing with disappointments?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Disappointments should lead one to give up on their initial dreams.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Disappointments are rare and unlikely to affect one's career.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Turning disappointments into opportunities can lead to great achievements.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Disappointments have no impact on personal growth."], "correct_answer": 2, "solution": "No solution available"}, {"id": "95550", "question": "<strong>Comprehension:</strong><br> When Sunita was five years old she saw pictures of Neil Armstrong landing on the moon. In 1969, Neil Armstrong was the first man to walk on the moon. Like any other child, Sunita was also fascinated. Sunita says that when she was a young girl she really loved sports and swimming. She was never too interested in studies. After high school Sunita wanted to become a diver. But she could not get into that course. Instead, she became a helicopter pilot. One day she found out that if she studied and trained for it, she could join the Space Mission. And that is what she did! In 2007 Sunita Williams set a new record for the longest space flight by a woman. Sunita often gives her own example to tell children, “If you want something, but you get something else, do not give up. Do your best, and things will work out!” When Sunita was asked by a child what would she like to do in the future, she answered, “I want to become a school teacher!” So that she could make children understand how science and maths are closely linked to our lives.<br> <strong>Why does Sunita want to become a school teacher?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To promote the importance of physical education.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To encourage children to pursue careers in sports.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To help children understand the relevance of science and math in everyday life.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Because she could not continue her career in space exploration."], "correct_answer": 2, "solution": "No solution available"}, {"id": "95551", "question": "<strong>Comprehension:</strong><br> When Sunita was five years old she saw pictures of Neil Armstrong landing on the moon. In 1969, Neil Armstrong was the first man to walk on the moon. Like any other child, Sunita was also fascinated. Sunita says that when she was a young girl she really loved sports and swimming. She was never too interested in studies. After high school Sunita wanted to become a diver. But she could not get into that course. Instead, she became a helicopter pilot. One day she found out that if she studied and trained for it, she could join the Space Mission. And that is what she did! In 2007 Sunita Williams set a new record for the longest space flight by a woman. Sunita often gives her own example to tell children, “If you want something, but you get something else, do not give up. Do your best, and things will work out!” When Sunita was asked by a child what would she like to do in the future, she answered, “I want to become a school teacher!” So that she could make children understand how science and maths are closely linked to our lives.<br> <strong>What can be inferred about Sunita's academic interests during her early years?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She was highly interested in academic studies.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She was not very interested in her studies.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She excelled in science and mathematics.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She preferred arts over sciences."], "correct_answer": 1, "solution": "No solution available"}, {"id": "95552", "question": "An investigation by this newspaper has revealed significant changes in NCERT’s history, sociology and political science textbooks of classes VI to XII. Revision of learning material should be par for the course in a robust education system. But school curricula in India — especially social science textbooks — have not always kept pace with the latest research. History textbooks, for instance, haven’t done adequate justice to the archaeological findings that have changed understandings of the Indus Valley Civilisation (IVC).</p> <p>Recent historiography on understudied areas, such as the country’s Northeast, is yet to find a way into the school curriculum. Political science textbooks have very little on the new forms of mobilisation enabled by social media. It’s also time that the student is apprised of climate change politics.</p> <p>The NCERT’s latest revisions do not address such knowledge-related imperatives either. Instead, they appear burdened by the ruling dispensation’s anxiety to paper over fraught political moments in the country’s recent history — the demolition of the Babri Masjid, for instance. They underplay social faultlines such as those related to caste. Even the changes that take note of new research on the IVC, seem of a piece with the deeply contested and politically loaded narrative that harps on continuity between the Harappan and Rig Vedic epochs.</p> <p>Last year, another investigation by this newspaper on NCERT textbooks had shone a light on the deletion of key passages on Mahatma Gandhi’s assassination, the Emergency, Gujarat 2002 and protest movements. Of course, social sciences have always been an arena of ideological and political contestation and textbook committees have a long history of being fettered by government interventions.</p> <p>However, the recent revisions belie the hopes raised by the NEP — they go against the policy’s ideologically agnostic approach to education reform. Some of the changes described as “minor editing” — the deletion of the reference on the poverty and powerlessness of Scheduled Caste and Scheduled Tribe communities in the Class XII Sociology textbook, for instance — seem to tie in with a political agenda of playing up the notion of a cohesive Hindu society. Similarly, the removal of a sentence linking big dam projects to the destitution of tribal groups — also in the Class XII Sociology textbook — betrays an unease with argumentative engagements with developmental processes.</p> <p>Young minds today are exposed to a glut of information on culture, history and politics from a variety of sources, including social media. Veracity is often a casualty. Classrooms must, therefore, provide a grounding in objectivity while alerting students to social complexities, with all their diversities, conflicts and inequities. The country’s foremost textbook framing body should be an enabler of this process, not a hurdle in it.</p> <p><strong>Which of the following statements best reflects the concerns raised in the passage about the revisions in NCERT's history, sociology, and political science textbooks?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The revisions are primarily focused on updating the textbooks with the latest archaeological findings and historiography, ensuring that students are exposed to contemporary research and perspectives in social sciences.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The changes in the textbooks are driven by the ruling government's anxiety to downplay contentious political events and social issues, such as the demolition of the Babri Masjid and caste-related faultlines, rather than addressing knowledge-related imperatives.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The revisions have successfully integrated new research on the Indus Valley Civilisation and the political mobilisation enabled by social media, thereby enriching the curriculum with diverse and modern content.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The modifications in the textbooks are a result of a deliberate effort to include understudied areas such as the country's Northeast, thereby broadening the scope of the curriculum and making it more inclusive."], "correct_answer": 1, "solution": "No solution available"}, {"id": "95553", "question": "An investigation by this newspaper has revealed significant changes in NCERT’s history, sociology and political science textbooks of classes VI to XII. Revision of learning material should be par for the course in a unctory note to provide for oral rehydration supplements and mothers to avoid bringing children with them to the polling booths. There is no requirement that polling stations prioritise cooling beyond the confines of the rooms where the officers are seated. There has been, for many years, a suggestion, even by prominent politicians, for elections to be held in the relatively more clement months of February-March or October-November but it is one that loses traction almost immediately after the polls. India’s size and logistical challenges have seen the electoral process innovate and adopt measures such as multi-phase polling and even the use of electronic ballots. With temperature records collapsing every year and the links between heatwaves, climate and health becoming even more explicit, it is time that the electoral process mulls over creative ways to account for the crisis.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Cautionary", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Indifferent", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Encouraging"], "correct_answer": 0, "solution": "No solution available"}, {"id": "95558", "question": "With the advent of summer, the India Meteorological Department (IMD) has warned that more heatwaves are likely than last year. Andhra Pradesh, Gujarat and Maharashtra are expected to be particularly vulnerable. Heatwave days are defined as when day temperatures in a place are at least 4.5° C above normal or greater than 45° C on two consecutive days. For several years on the trot now, the IMD has been fore     disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
