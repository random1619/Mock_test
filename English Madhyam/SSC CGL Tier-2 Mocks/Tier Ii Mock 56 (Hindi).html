<script id="theme-toggle-handler">
(function() {
    var savedTheme = 'dark';
    try {
        savedTheme = localStorage.getItem('portal-theme') || 'dark';
    } catch (e) {}
    if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        var observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('light-theme');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('themeToggle');
        if (btn) {
            var newBtn = btn.cloneNode(true);
            newBtn.removeAttribute('onclick');
            btn.parentNode.replaceChild(newBtn, btn);
            
            var currentTheme = 'dark';
            try {
                currentTheme = localStorage.getItem('portal-theme') || 'dark';
            } catch (e) {}
            
            var icon = newBtn.querySelector('i');
            if (icon) {
                icon.className = currentTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            newBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isLight = document.body.classList.toggle('light-theme');
                document.documentElement.classList.toggle('light-theme', isLight);
                var nextTheme = isLight ? 'light' : 'dark';
                try {
                    localStorage.setItem('portal-theme', nextTheme);
                } catch (err) {}
                
                var currentIcon = newBtn.querySelector('i');
                if (currentIcon) {
                    currentIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        }
    });
})();
</script>

ce meaningfully.</strong></p> <p>He never (talks) the truth", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> narrates", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> utters", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> speaks", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> declares"], "correct_answer": 2, "solution": "'<strong>speaks</strong>' will be used instead of 'talks' because the correct phrase in the context of 'truth' is 'speaks.' 'Speaks the truth' is a commonly used expression that means 'to tell the truth'; Like— He always speaks the truth"}, {"id": "125176", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</strong></p> <p>The priest did not(A)/want to do any(B)/hard work but dreamt(C)/of be rich in one day. (D)", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The priest did not", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> want to do any", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> hard work but dreamt", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> of be rich in one day."], "correct_answer": 3, "solution": "D) 'of being' will be used instead of 'of be' because 'of' is a Preposition and the Main Verb that comes after any Preposition is always in the form V4; like-"}, {"id": "125133", "question": "<strong>Select the most appropriate Antonym of the given word.</strong></p> <p><strong>Consciousness</strong> and awareness of one’s surroundings lead to a deeper understanding of life.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Altruism", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Damnation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Selfishness", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Unconsciousness"], "correct_answer": 3, "solution": "<strong>Antonym:</strong> <strong>Unconsciousness</strong> (noun) – The state of being unaware and unresponsive, insensibility. अचेतन"}, {"id": "125095", "question": "<strong>Select the most appropriate synonym of the given word.</strong></p> <p>Before making a final decision, they took the time to <strong>assess</strong> the project's feasibility and potential risks involved.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Evaluate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Improved", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Participation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Decided"], "correct_answer": 0, "solution": "<strong>Improved</strong> (verb) – Made better or more effective. सुधारा"}, {"id": "125235", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Select the option that gives their correct logical sequence.</strong><br> A. India and China, having more than 1 billion people each, are front runners to become superpowers, but India has an edge over China as the latter has an autocratic rule, while India follows democracy.<br> B. Superpower means a super economy that matches demand and supply.<br> C. That is a welfare economy.<br> D. More products mean more industries, employment, supply of currency, healthy people, and education.<br> E. More human development means more purchasing power and more demand for products.<br>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DECAB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ADEAB", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ABEDC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CBEDA"], "correct_answer": 2, "solution": "<strong>C) ABEDC</strong><br> A: Paragraph की starting A से होती है, क्योंकि यह बताता है कि भारत और चीन, दोनों 1 बिलियन से अधिक जनसंख्या वाले देश, सुपरपावर बनने की होड़ में हैं, लेकिन भारत का लोकतांत्रिक शासन (democracy) उसे चीन के अधिनायकवादी शासन (autocratic rule) से आगे रखता है। <br> B: इसके बाद B आता है, जो superpower की परिभाषा (definition) बताता है—एक ऐसी महान अर्थव्यवस्था (super economy) जो मांग और आपूर्ति (demand and supply) को संतुलित करती है। यह sentence A में बताए गए विषय की व्याख्या करता है।<br> E: इसके बाद E आता है, जो बताता है कि अधिक मानव विकास (human development) से अधिक खरीद क्षमता (purchasing power) और उत्पादों की अधिक मांग (demand for products) होती है। <br> D: इसके बाद D आता है, जो बताता है कि अधिक मांग (more demand) का परिणाम अधिक उत्पादों (more products) के रूप में होता है, जो अर्थव्यवस्था के विभिन्न क्षेत्रों जैसे उद्योग, रोजगार, मुद्रा की आपूर्ति (supply of currency), स्वस्थ लोग, और शिक्षा को बढ़ावा देता है।<br> C: अंत में C आता है, जो बताता है कि यह पूरा चक्र एक welfare economy कहलाता है। <br> <strong>Explanation in English </strong><br> A starts with a clear subject, “India and China,” and introduces the main idea. <br> B follows grammatically as it introduces the term superpower and provides a definition for it. This links directly to the countries mentioned in A, giving a clear explanation of what being a superpower means.<br> E uses a cause-and-effect structure: “More human development means more purchasing power and more demand for products.” This structure is logical after B, as it explains what leads to a super economy.<br> D elaborates on the effect mentioned in E, providing a list of outcomes resulting from more demand. The sequence “more products mean more industries, employment, supply of currency, healthy people, and education” logically follows E.<br> C sums up the entire paragraph with a concluding statement: “That is a welfare economy.” It’s a short, declarative sentence that serves as a conclusion, tying all previous points together."}, {"id": "125233", "question": "<strong>Some sentences are given below. While the first and the last sentences (1 and 2) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>1. On September 20, 2024, Justice A.S. Chandurkar of the Bombay High Court broke a tie that emanated out of a previously split verdict and delivered a ruling in defence of the right to free speech.</p> <p>A. This law, had it been allowed to stand, would have given the Union government an Orwellian carte blanche to decide for us how any news about its operations ought to be carried on the Internet.</p> <p>B. He declared unconstitutional an amendment made to the Information Technology (Intermediary Guidelines and Digital Media Ethics Code) Rules, 2021 (IT Rules).</p> <p>C. The provision in question, Rule 3(1)(b)(v), casts an onerous obligation on intermediaries — companies that facilitate the use of the Internet, ranging from our service providers to social media platforms.</p> <p>D. If the Union government’s “Fact Check Unit” (FCU), which had been created under the amendment, identified any reporting on the government’s business as fake, false, or misleading, intermediaries were required to make reasonable efforts not to host, display, upload, or publish such information.</p> <p>2. Should they choose to ignore a directive they stood to lose their “safe harbour” — an immunity from liability which is integral to the design of the Information Technology (IT) Act, 2000 and the protections it offers both to businesses and to the larger public’s right to free expression.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BADC", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BACD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCDA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCAD"], "correct_answer": 1, "solution": "1:<strong> </strong><strong>(1)</strong> paragraph की introduction है जो बताती है कि Justice A.S. Chandurkar ने 20 सितंबर 2024 को free speech के अधिकार के पक्ष में फैसला दिया। यह starting statement है जो घटना का context देता है और बताता है कि यह फैसला किससे संबंधित है।"}, {"id": "125141", "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>To protect from harm or danger", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Advise", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pretend", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Defend", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Guide"], "correct_answer": 2, "solution": "<strong>C) Defend</strong> (verb) – To protect from harm or danger रक्षा करना"}, {"id": "125096", "question": "<strong>Select the most appropriate synonym of the given word.</strong></p> <p>Tax <strong>evasion</strong> is considered illegal, as it involves the deliberate circumvention of tax laws.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Voluntary", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Dodging", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Shrewd", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Insightful"], "correct_answer": 1, "solution": "<strong>Voluntary</strong> (adjective) – Done, given, or acting of one's own free will. स्वैच्छिक"}, {"id": "125175", "question": "<strong>Select the most appropriate option that can substitute the underlined segment in thegiven sentence.</strong></p> <p>Grasslands should not be<ins> <strong>foraged and some places are to be</strong></ins> closed for grazing.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> grazed and some places is", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> cut and few areas", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> over-grazed and some areas should be", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> planted or"], "correct_answer": 2, "solution": "<strong>C)</strong> '<strong>over-grazed and some areas should be' </strong>का प्रयोग होगा क्योंकि <strong>'should not be'</strong> के बाद आने वाला शब्द 'foraged' का अर्थ होता है 'खोजना', परंतु यहां उपयुक्त शब्द 'over-grazed' है जिसका अर्थ है 'अधिक चरना'। इसके अतिरिक्त, 'are to be' के बदले 'should be' का प्रयोग होगा क्योंकि यह बेहतर रूप से सुझाव देता है कि कुछ क्षेत्रों को बंद किया जाना चाहिए।"}, {"id": "125180", "question": "<strong>Select the most appropriate word to fill in the blank.</strong></p> <p>I will teach you ______ you promise to work hard.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> and", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> so", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> if", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> only"], "correct_answer": 2, "solution": "if' should be used because 'if' denotes a condition or requirement. The sentence indicates that the speaker will teach on the condition that the listener promises to work hard, making 'if' the appropriate choice. Whereas, 'And' connects two ideas, 'So' indicates a cause and effect relationship, and 'Only' specifies a limitation, none of which fit the context"}, {"id": "125134", "question": "<strong>Select the most appropriate Antonym of the given word.</strong></p> <p>His <strong>reluctance</strong> to accept the new technology delayed the project by several months.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sink", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Behind", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Zeal", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Beneath"], "correct_answer": 2, "solution": "<strong>Antonym:</strong> <strong>Zeal</strong> (noun) – Enthusiasm, eagerness, passion, fervor (उत्साह)"}, {"id": "125181", "question": "<strong>Select the most appropriate word to fill in the blank.</strong></p> <p>Those who ______ of their riches aren’t truly rich.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> announce", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> claim", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> boast", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> pretend"], "correct_answer": 2, "solution": "<strong>'Boast'</strong> should be used because it means to talk with excessive pride and self-satisfaction about one's achievements, possessions, or abilities. The sentence implies that those who boast of their riches are not truly rich, making 'boast' fitting here. Whereas, 'Announce' means to make a formal public statement, 'Claim' means to state something as true without proof, and 'Pretend' implies to act as if something is the case when it is not, which don't fit in this context."}, {"id": "125236", "question": "<strong>Comprehension:</strong></p> <p>A reliable population estimate is a basic prerequisite for conserving endangered animals. However, most wildlife, especially large mammals, is not easy to survey — the animals are often camouflaged or on the move. That’s why enumeration methods, across the world, have to be refined frequently. In India, for instance, the tiger crisis of 2005 led to conversations over the procedures to count the majestic animal. Though questions continue to be raised over the exact numbers of the big cat, the Tiger Census today provides a more accurate picture of the status of the animal compared to the early years of this century. Other animals, however, have not received comparable attention. The country’s other charismatic mammal, the elephant, is a case in point. A census is conducted every five years to measure its population. After 2017, the Wildlife Institute of India (WII), the surveying agency, changed its method. From relying on direct headcount or dung count of elephants, the WII adopted the statistical modeling approach used to monitor tigers. Its report, which shows a substantial decline in the animal’s population could well be a reflection of the long-term status of the elephant — and not the five years of the Census. The findings could have led to a debate on the conservation of the animal, which has come into frequent conflict with humans in the last two decades. However, as an investigation by this newspaper shows, government has chosen to shelve the report.</p> <p>The elephant’s habitat has undergone changes in recent years due to the conversion of forest areas to agriculture and development projects. As the WII report points out, fragmentation of habitats “has prompted long-ranging elephants to venture into unoccupied areas.” Unable to find food or dispersal areas, the large animals become crop raiders. Population estimates that map the animal’s distribution and herd structure — not just in reserve forests, but also in human-dominated landscapes — could be the first step to reduce such conflicts. The data can spur discussions on a viable population that can share space with humans. The information can also lay the ground for eco-sensitive developmental planning.<br> In 2010, an Elephant Task Force, constituted by the environment ministry, advocated a “robust science-based assessment and monitoring” of the large mammals. The then UPA government did not do much by way of working on the panel’s recommendations. The NDA government claims that the elephant’s status has stabilised in the country. Its prevarication over the latest survey, however, casts its efforts in conserving the elephant in poor light and also goes against claims of finding solutions to human-animal conflicts.<br> <strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Critical", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Laudatory", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neutral"], "correct_answer": 1, "solution": "No solution available"}, {"id": "125237", "question": "<strong>Comprehension:</strong></p> <p>A reliable population estimate is a basic prerequisite for conserving endangered animals. However, most wildlife, especially large mammals, is not easy to survey — the animals are often camouflaged or on the move. That’s why enumeration methods, across the world, have to be refined frequently. In India, for instance, the tiger crisis of 2005 led to conversations over the procedures to count the majestic animal. Though questions continue to be raised over the exact numbers of the big cat, the Tiger Census today provides a more accurate picture of the status of the animal compared to the early years of this century. Other animals, however, have not received comparable attention. The country’s other charismatic mammal, the elephant, is a case in point. A census is conducted every five years to measure its population. After 2017, the Wildlife Institute of India (WII), the surveying agency, changed its method. From relying on direct headcount or dung count of elephants, the WII adopted the statistical modeling approach used to monitor tigers. Its report, which shows a substantial decline in the animal’s population could well be a reflection of the long-term status of the elephant — and not the five years of the Census. The findings could have led to a debate on the conservation of the animal, which has come into frequent conflict with humans in the last two decades. However, as an investigation by this newspaper shows, government has chosen to shelve the report.</p> <p>The elephant’s habitat has undergone changes in recent years due to the conversion of forest areas to agriculture and development projects. As the WII report points out, fragmentation of habitats “has prompted long-ranging elephants to venture into unoccupied areas.” Unable to find food or dispersal areas, the large animals become crop raiders. Population estimates that map the animal’s distribution and herd structure — not just in reserve forests, but also in human-dominated landscapes — could be the first step to reduce such conflicts. The data can spur discussions on a viable population that can share space with humans. The information can also lay the ground for eco-sensitive developmental planning.</p> <p>In 2010, an Elephant Task Force, constituted by the environment ministry, advocated a “robust science-based assessment and monitoring” of the large mammals. The then UPA government did not do much by way of working on the panel’s recommendations. The NDA government claims that the elephant’s status has stabilised in the country. Its prevarication over the latest survey, however, casts its efforts in conserving the elephant in poor light and also goes against claims of finding solutions to human-animal conflicts.<br> <strong>Which of the following can be inferred from the passage about the Wildlife Institute of India's (WII) census method?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The WII has completely abandoned traditional methods of elephant population estimation.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The current method employed by WII is considered less reliable than previous methods.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The statistical modeling approach used in tiger surveys was adopted to improve accuracy in elephant census.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The WII’s reports are always accepted by the government without scrutiny."], "correct_answer": 2, "solution": "No solution available"}, {"id": "125238", "question": "<strong>Comprehension:</strong></p> <p>A reliable population estimate is a basic prerequisite for conserving endangered animals. However, most wildlife, especially large mammals, is not easy to survey — the animals are often camouflaged or on the move. That’s why enumeration methods, across the world, have to be refined frequently. In India, for instance, the tiger crisis of 2005 led to conversations over the procedures to count the majestic animal. Though questions continue to be raised over the exact numbers of the big cat, the Tiger Census today provides a more accurate picture of the status of the animal compared to the early years of this century. Other animals, however, have not received comparable attention. The country’s other charismatic mammal, the elephant, is a case in point. A census is conducted every five years to measure its population. After 2017, the Wildlife Institute of India (WII), the surveying agency, changed its method. From relying on direct headcount or dung count of elephants, the WII adopted the statistical modeling approach used to monitor tigers. Its report, which shows a substantial decline in the animal’s population could well be a reflection of the long-term status of the elephant — and not the five years of the Census. The findings could have led to a debate on the conservation of the animal, which has come into frequent conflict with humans in the last two decades. However, as an investigation by this newspaper shows, government has chosen to shelve the report.</p> <p>The elephant’s habitat has undergone changes in recent years due to the conversion of forest areas to agriculture and development projects. As the WII report points out, fragmentation of habitats “has prompted long-ranging elephants to venture into unoccupied areas.” Unable to find food or dispersal areas, the large animals become crop raiders. Population estimates that map the animal’s distribution and herd structure — not just in reserve forests, but also in human-dominated landscapes — could be the first step to reduce such conflicts. The data can spur discussions on a viable population that can share space with humans. The information can also lay the ground for eco-sensitive developmental planning.</p> <p>In 2010, an Elephant Task Force, constituted by the environment ministry, advocated a “robust science-based assessment and monitoring” of the large mammals. The then UPA government did not do much by way of working on the panel’s recommendations. The NDA government claims that the elephant’s status has stabilised in the country. Its prevarication over the latest survey, however, casts its efforts in conserving the elephant in poor light and also goes against claims of finding solutions to human-animal conflicts.<br> <strong>The government’s decision to shelve the report indicates its ___________ towards addressing the long-term status of elephant conservat l, which has come into frequent conflict with humans in the last two decades. However, as an investigation by this newspaper shows, government has chosen to shelve the report.</p> <p>The elephant’s habitat has undergone changes in recent years due to the conversion of forest areas to agriculture and development projects. As the WII report points out, fragmentation of habitats “has prompted long-ranging elephants to venture into unoccupied areas.” Unable to find food or dispersal areas, the large animals become crop raiders. Population estimates that map the animal’s distribution and herd structure — not just in reserve forests, but also in human-dominated landscapes — could be the first step to reduce such conflicts. The data can spur discussions on a viable population that can share space with humans. The information can also lay the ground for eco-sensitive developmental planning.</p> <p>In 2010, an Elephant Task Force, constituted by the environment ministry, advocated a “robust science-based assessment and monitoring” of the large mammals. The then UPA government did not do much by way of working on the panel’s recommendations. The NDA government claims that the elephant’s status has stabilised in the country. Its prevarication over the latest survey, however, casts its efforts in conserving the elephant in poor light and also goes against claims of finding solutions to human-animal conflicts.</p> <p>Select the antonym of \"<strong>prevarication</strong>\" as used in the passage.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Honesty", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Evasion", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hesitation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Delay"], "correct_answer": 0, "solution": "No solution available"}, {"id": "125240", "question": "<strong>Comprehension:</strong></p> <p>If West Asia is in the news as a conflict zone, the desert sands of the United Arab Emirates (UAE) may offer some relief over the next fortnight. The ICC T20 Women’s World Cup that commenced at Sharjah on Thursday (October 3, 2024) will oscillate between this venue and Dubai. Featuring 10 teams split into two groups of five each, the championship will conclude on October 20, 2024. The tournament was supposed to be held in Bangladesh, but the unrest of the previous months in Dhaka meant that though India’s eastern neighbour holds the hosting rights, the matches had to be shifted to the UAE. While Australia will step in with the swagger of a defending champion, having seized the cup after vanquishing host South Africa in the 2023 edition, India will walk in with the hope of finally claiming the trophy. In the 2020 final at Melbourne, India wilted against Australia. Cut to the present, Harmanpreet Kaur’s strong unit will clash against New Zealand at Dubai on Friday and a good first outing is essential. India has moved on from the era of Mithali Raj and Jhulan Goswami and those are massive shoes to fill, but Harmanpreet, Jemimah Rodrigues, Smriti Mandhana, and others have tried their best to chart a fresh path.</p> <p>The tournament is also invested with a larger cause layered with gender sensitivity. While male players get accolades and commercial heft through cricket, female players have always fought for their rights. Even in the latest event, despite being pitted against each other as rivals, there is a sisterhood at play. Through interactions with the press, all the leading female players have sought more games and also more Tests. Often the women are resigned to playing just limited-overs cricket. While Mithali turned out in 232 ODIs and 89 T20Is, it is a travesty that she played only 12 ket, female players have always fought for their rights. Even in the latest event, despite being pitted against each other as rivals, there is a sisterhood at play. Through interactions with the press, all the leading female players have sought more games and also more Tests. Often the women are resigned to playing just limited-overs cricket. While Mithali turned out in 232 ODIs and 89 T20Is, it is a travesty that she played only 12 Tests in a long career. Harmanpreet and company have often sought comfort in diverse franchise leagues but there is nothing like a solid bilateral contest to toughen up the stars. Having won the title on six occasions, Australia remains the behemoth. Alyssa Healy and her merry bunch will be the team that most squads, including old rival England, would want to knock off the pedestal. And for those keen on watching neighbourhood rivalry, India and Pakistan are placed in Group A and will face off on Sunday. Diplomatic tensions have ensured that the two nations compete against each other only in global events.<br> <strong>Which of the following statements is incorrect according to the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Australia has won the Women’s T20 World Cup six times.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Mithali Raj has played more T20Is than ODIs.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> India and Pakistan only compete in global events due to diplomatic tensions.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Leading female players are advocating for more Test matches."], "correct_answer": 1, "solution": "No solution available"}, {"id": "125248", "question": "<strong>Comprehension:</strong><br> People often question whether anybody can work sincerely and efficiently without desire. Sincerity becomes natural, and efficiency peaks when actions are no longer motivated by desires. Desire makes the mind cling to future gain or loss instead of the present task. It accompanies expectation, anxiety, and fear and affects attention and performance. We are born with an insufficiency that makes us look for happiness externally. We are born with the delusion that something from the world will fulfil that lack and make us happy. Has anybody ever become permanently happy by gaining anything from the world – money, power, companionship, fame, or appreciation? Even the most overwhelming happiness lasts until the mind picks up some other lack or a fear of losing what we have gained. It is not the fulfilment of our desires that makes us happy. It is the elimination of desires that truly makes us happy.<br> When a desire is fulfilled, the mind becomes ‘desireless’ for a while. It remains contented and peaceful until another desire for gaining something or fear of losing something agitates it again. It is the undisturbed state of the mind that makes us happy. It reveals for a while the placid joy that is always there within as a natural characteristic of our inmost identity, the Self. It is like seeing the bottom of the lake clearly when there are no waves or ripples. That is why we experience unprecedented joy or bliss in meditation, when the whole world is forgotten, and the mind is absorbed in its Source.<br> The day we realise that joy comes from within, it is a natural property of our Self; we understand that desires make us unhappy because they take us away from the Self. If joy lies within, why should we chase external objects that give us pleasure? If we do not expect happiness from the objective result of our work, what will be the motivation for work? The motivation for work will be just the objective result of the action, and not gaining happiness from the desired objective result. Without desire, our mind will be naturally placid and fulfilled. We shall do whatever the circumstances need and what is within our capacity. No more shall we work expecting happiness. We will do whatever is to be done as an expression of joy, and such desireless performance can produce the best objective results.<br> Several activities are constantly going on in the universe. Earth revolves around the Sun, and the Moon revolves around Earth. Rivers flow. Plants grow. Flowers blossom – each with its own colour and beauty. Nowhere is there desire. When desires are diminished, we blossom like flowers in our natural svabhava, nature, spreading joy.<br> <strong>What is the central theme of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The necessity of desires for achieving true happiness.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The role of external achievements in fulfilling our insufficiency.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The elimination of desires as a means to attain genuine happiness.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The inevitability of fear and anxiety in motivating human actions."], "correct_answer": 2, "solution": "No solution available"}, {"id": "125249", "question": "<strong>Comprehension:</strong><br> People often question whether anybody can work sincerely and efficiently without desire. Sincerity becomes natural, and efficiency peaks when actions are no longer motivated by desires. Desire makes the mind cling to future gain or loss instead of the present task. It accompanies expectation, anxiety, and fear and affects attention and performance. We are b ion.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Because it relies on external rewards to drive efficiency."], "correct_answer": 1, "solution": "No solution available"}, {"id": "125252", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong></p> <p>What makes this country unique is that it has never seen God or heaven as the highest aspiration. Instead, it holds mukti or freedom as the supreme goal. To be sitting ___1____ on God’s lap is not our aim. Our aim is liberation. We are a culture of seekers, not believers. Everywhere in the world, people have organised themselves around a religious belief, ideology or philosophy. But it is ____2_____ to believe that people have to share a single belief to stay together. People who believe in one god or one ideology have always been at war everywhere in the world. When there is no fixed set of ideas or beliefs, life becomes your teacher. Such a spiritual _____3_____creates the perfect platform for a democratic process. When freedom is the goal, all _______4______ ideas and identities must be dropped. Spiritually, it makes no difference what your ancestry or karma is. If you are willing, you can aspire to the highest. <br> <strong>Select the most appropriate option to fill in blank number 1.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Comprehensively", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Significantly", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Eternally", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam d select the most appropriate option to fill in each blank.</strong></p> <p>What makes this country unique is that it has never seen God or heaven as the highest aspiration. Instead, it holds mukti or freedom as the supreme goal. To be sitting ___1____ on God’s lap is not our aim. Our aim is liberation. We are a culture of seekers, not believers. Everywhere in the world, people have organised themselves around a religious belief, ideology or philosophy. But it is ____2_____ to believe that people have to share a single belief to stay together. People who believe in one god or one ideology have always been at war everywhere in the world. When there is no fixed set of ideas or beliefs, life becomes your teacher. Such a spiritual _____3_____creates the perfect platform for a democratic process. When freedom is the goal, all _______4______ ideas and identities must be dropped. Spiritually, it makes no difference what your ancestry or karma is. If you are willing, you can aspire to the highest. </p> <p><strong>Select the most appropriate option to fill in blank number 4</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Evacuated", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Deprived", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Preconceived", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Believed"], "correct_answer": 2, "solution": "No solution available"}],ans={};
const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
