<script id="theme-toggle-handler">
(function() {
    var savedTheme = 'dark';
    try {
        savedTheme = localStorage.getItem('portal-theme') || 'dark';
    } catch (e) {}
    if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        var observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('light-theme');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('themeToggle');
        if (btn) {
            var newBtn = btn.cloneNode(true);
            newBtn.removeAttribute('onclick');
            btn.parentNode.replaceChild(newBtn, btn);
            
            var currentTheme = 'dark';
            try {
                currentTheme = localStorage.getItem('portal-theme') || 'dark';
            } catch (e) {}
            
            var icon = newBtn.querySelector('i');
            if (icon) {
                icon.className = currentTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            newBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isLight = document.body.classList.toggle('light-theme');
                document.documentElement.classList.toggle('light-theme', isLight);
                var nextTheme = isLight ? 'light' : 'dark';
                try {
                    localStorage.setItem('portal-theme', nextTheme);
                } catch (err) {}
                
                var currentIcon = newBtn.querySelector('i');
                if (currentIcon) {
                    currentIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        }
    });
})();
</script>

const qs=[{"id": "128193", "question": "<strong>Select the option that expresses the given sentence in future tense form.</strong></p> <p>Since next Friday, the team of three members has been tracking the animal.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> From next Friday, the team of three members have been tracking the animal.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> From next Friday, the team of three members will be tracking the animal.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Since last Friday, the team of three members had tracked the animal.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> From next Friday, the team of three members are tracking the animal."], "correct_answer": 1, "solution": "A incorrectly uses \"have been,\" which is present perfect continuous."}, {"id": "128172", "question": "<strong>Select the option that expresses the following sentence in active voice.</strong></p> <p>The concert tickets were bought by my friend.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My friend buys the concert tickets.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My friend is buying the concert tickets.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> My friend bought the concert tickets.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My friend has bought the concert tickets."], "correct_answer": 2, "solution": "C) My friend bought the concert tickets."}, {"id": "128196", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a spelling error.</strong></p> <p>The dried raisons / have an intoxicating /effect on humans as / well as flora and fauna.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> have an intoxicating", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The dried raisons", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> effect on humans as", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> well as flora and fauna."], "correct_answer": 1, "solution": "B) The correct spelling of ‘<strong>raisons’</strong> is ‘raisins’ which means “a dried grape” किशमिश।"}, {"id": "128192", "question": "<strong>Select the INCORRECTLY spelt word</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ordinance", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Introductory", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Disinterested", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Decendant"], "correct_answer": 3, "solution": "D) The correct spelling of ‘<strong>Decendant’</strong> is ‘Descendant’ which means “a person who is descended from a specific ancestor” वंशज, उत्तराधिकारी."}, {"id": "128194", "question": "<strong>Select the sentence with the most appropriate use of preposition</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Reetu slept all in the history class.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Reetu slept all during the history class.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Reetu slept all through the history class.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Reetu slept all into the history class."], "correct_answer": 2, "solution": "<strong>through'</strong> का use सही होगा क्योंकि ‘slept’ एक continuous activity को दर्शाता है, और ‘through’ preposition का use ऐसी स्थितियों में किया जाता है जब कोई क्रिया पूरी अवधि के दौरान होती है।"}, {"id": "128189", "question": "<strong>Select the most appropriate synonym of the given word.</strong></p> <p>The community gathered to <strong>commemorate</strong> the heroes who sacrificed their lives for the nation.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Observe", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Malign", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Defame", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Impressive"], "correct_answer": 0, "solution": "<strong>Malign</strong> (verb) – Speak about (someone) in a spitefully critical manner, defame, slander, libel. निंदा करना"}, {"id": "128177", "question": "<strong>Choose the option that is the correct direct form of the sentence.</strong></p> <p>Shubham said that his father was playing cricket with him.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Shubham said, “My father played cricket with me.”", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Shubham said, “My father is playing cricket with me.”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Shubham said, “My father was playing cricket with me.”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Shubham said, “My father had played cricket with me.”"], "correct_answer": 1, "solution": "<strong>B)</strong> Shubham said, “My father is playing cricket with me.”"}, {"id": "128185", "question": "<strong>Select the most appropriate meaning of the given idiom.</strong></p> <p>My father's such a <ins><strong>creature of habit</strong></ins> - he always has to have a biscuit and a cup of tea at bedtime.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A bad habit", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A faithful dog", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A mean person", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> One who does same thing in the same way"], "correct_answer": 3, "solution": "D) <strong>Creature of habit</strong> (idiom) – One who does the same thing in the same way, आदतों का दास"}, {"id": "128188", "question": "<strong>Select the most appropriate synonym of the given word.</strong></p> <p>Becoming too <strong>complacent</strong> about small successes can hinder long-term growth.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Entreaty", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Peculiar", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Smug", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Lousy"], "correct_answer": 2, "solution": "<strong>Entreaty</strong> (noun) – Plea, request, appeal, petition विनती"}, {"id": "128190", "question": "<strong>Select the MISSPELT word.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Escalade", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Assence", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ascend", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Exhale"], "correct_answer": 1, "solution": "B) The correct spelling of ‘Assence’ is ‘Essence’ which means “the intrinsic nature or indispensable quality of something” सार, तत्व."}, {"id": "128173", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>Inayat did not greet her.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She was not going to be greeted by Inayat.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She was not at all greeted by Inayat.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She was not being greeted by Inayat.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She was not greeted by Inayat."], "correct_answer": 3, "solution": "Active Voice को Passive Voice में बदलने के लिए (Object + Auxiliary Verb + Past Participle + by + Subject) का use किया जाता है। sentence ‘Inayat did not greet her’ को Passive Voice में बदलते समय Object ‘her’ को Subject के रूप में रखा जाता है। Verb ‘did not greet’ को Passive Voice में बदलकर ‘was not greeted’ किया जाता है। Subject ‘Inayat’ को अंत में ‘by Inayat’ के रूप में रखा जाता है।"}, {"id": "128159", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>O. In this context, the idea of Third-Party Litigation Funding (TPLF) has quickly emerged as a game-changer, potentially opening courtroom doors for many who felt they had been shut out.</p> <p>P. This revolution is not about abrogating colonial laws, drafting new laws, or ensuring speedier verdicts.</p> <p>Q. Instead, it centres on the question — who foots the bill for justice?</p> <p>R. In the heart of India’s legal system, from the Supreme Court in Delhi to modest district courts in rural Bihar, a quiet revolution has been in the making for decades.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> RPQO", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> PRQO", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> OQRP", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ROQP"], "correct_answer": 0, "solution": "<strong>R: Why R comes first:</strong> R sets the context by introducing the ongoing \"quiet revolution\" within India's legal system, preparing the reader for further details about this transformation.<br> <strong>P: Why P follows R:</strong> P uses the pronoun \"this revolution,\" directly referencing the \"quiet revolution\" introduced in R. P explains what the revolution is not about, providing clarity by contrasting it with other legal reforms, which makes the reader curious about the true focus of this transformation. <br> <strong>Q: Why Q follows P:</strong> Q begins with the adverb \"Instead,\" signaling a contrast with P. This provides a transition from what the revolution is not about (as stated in P) to its actual focus, shifting the topic to the question of who finances justice.<br> <strong>O: Why O follows Q:</strong> O uses the phrase \"In this context,\" which directly connects to the preceding discussion about the financing of justice introduced in Q.O introduces Third-Party Litigation Funding (TPLF) as the solution to the financial challenges outlined in Q, and presents it as a transformative concept."}, {"id": "128174", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>The school will hire new teachers", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> New teachers are hired by the school.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The school will be hiring new teachers.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> New teachers will join the school.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> New teachers will be hired by the school"], "correct_answer": 3, "solution": "Active Voice को Passive Voice में बदलने के लिए (Object + Auxiliary Verb + Past Participle + by + Subject) का प्रयोग किया जाता है। sentence ‘The school will hire new teachers’ को Passive Voice में बदलते समय Object ‘new teachers’ को वाक्य की शुरुआत में रखा जाता है। Verb ‘will hire’ को Passive Voice में बदलकर ‘will be hired’ किया जाता है। Subject ‘the school’ को अंत में ‘by the school’ के रूप में रखा जाता है।"}, {"id": "128178", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>“I have heard the podcast before,” Nita says</p> <p> </p> <p> </p> <p> </p> <p>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Nita says that she is hearing the podcast before.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Nita says that she had heard the podcast before.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Nita says that she has heard the podcast before.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Nita says that she had heard the podcast ago"], "correct_answer": 2, "solution": "C) Nita says that she has heard the podcast before."}, {"id": "128183", "question": "<strong>Select the most appropriate meaning of the given idiom.</strong></p> <p>the country was <ins><strong>at a low ebb</strong></ins> due to the recent war", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> In an unemployed mode", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> In a critical moment", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> In a depressed or weak state", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> In a happy state"], "correct_answer": 2, "solution": "C) <strong>At a low ebb</strong> (idiom) – In a depressed or weak state (कमज़ोर या उदास स्थिति में होना"}, {"id": "128182", "question": "<strong>Select the most appropriate meaning of the underlined idiom in the following sentence.</strong></p> <p>Sejal visits the nearby temple <strong><ins>off and on</ins>.</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Periodically", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Regularly", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Continuously", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Constantly"], "correct_answer": 0, "solution": "A) <strong>Off and on</strong> (idiom) – Periodically समय-समय पर"}, {"id": "128170", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>Accepting how wonderful you truly are and incorporating this _______ into your attitude and personality is perhaps one of the most difficult things to do in life.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> folly", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> craziness", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> insight", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> glitch"], "correct_answer": 2, "solution": "<strong>'Insight'</strong> will be used because it means deep understanding or perspective. The sentence discusses accepting a wonderful realization about oneself and incorporating it into personality and attitude, which aligns well with 'insight.' Whereas: Folly means foolishness, which is irrelevant here. Craziness implies madness, which doesn't fit the context. Glitch means a technical error, which is mismatched in this scenario."}, {"id": "128179", "question": "<strong>Select the most appropriate option to substitute the bracketed segment in the given sentence. If there is no need to substitute it, select no substitution required</strong></p> <p>The ban has landed the circus managements in a tricky {situation as they can neither use them for the shows or) abandon them", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> situation as they can neither use them for the shows nor", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> situation as they cannot either use them for the shows nor", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No substitution required", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> situation as them can either use them for the shows or"], "correct_answer": 0, "solution": "<strong>A) 'situation as they can neither use them for the shows or'</strong> के बदले 'situation as they can neither use them for the shows nor' का प्रयोग होगा क्योंकि 'neither' का सही जोड़ 'nor' के साथ होता है।"}, {"id": "128181", "question": "<strong>Select the most appropriate meaning of the given idiom.</strong></p> <p>We thought we'd <ins><strong>let the dust settle </strong></ins>before discussing the other matter.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Wait for the other person to make a move", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To wait for a situation to become clear or certain", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To make a space tidy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To make use of a situation"], "correct_answer": 1, "solution": "B) <strong>Let the dust settle</strong> (idiom) – To wait for a situation to become clear or certain. किसी स्थिति के स्पष्ट या निश्चित होने का इंतजार करना।"}, {"id": "128160", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>The scientist conducted a series of experiments to _______ his hypothesis.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> variable", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> verify", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> vague", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> variation"], "correct_answer": 1, "solution": "'Verify' should be used because it means to confirm or prove the truth of something. The scientist was conducting experiments to validate or confirm his hypothesis. Whereas, 'Variable' means something that can change, 'Vague' means unclear or indefinite, and 'Variation' refers to differences or changes, none of which fit in this context."}, {"id": "128157", "question": "<strong>For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the appropriate sentences for S2 and S3, respectively.</strong></p> <p><strong>S1</strong>: The go-ahead to the first visit by an Indian External Affairs Minister to Pakistan in almost nine years was indication enough that behind-the-scenes diplomacy had been productive.</p> <p><strong>P:</strong> Before going to Islamabad to attend a conclave of the Shanghai Cooperation Organisation, S Jaishankar had declared that India's Pakistan policy was not passive.</p> <p><strong>Q</strong>: New Delhi, the message went, was willing to respond to any positive gestures.</p> <p><strong>R</strong>: However, no executive action has been taken by the White House, which “speaks to the duplicity of the Western world,” says Hasan.</p> <p><strong>S</strong>: In a rare demonstration of bipartisan resolve, the U.S. House of Representatives voted by an overwhelming 368-7 in June for an investigation into alleged poll-rigging in Pakistan, echoing separate calls by the U.K. and E.U.</p> <p><strong>S4:</strong> In the Pakistan capital, he said activities characterised by the three evils of terrorism, extremism and separatism would not encourage trade, energy flows, connectivity and people-to-people exchanges.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> P and Q", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and R", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and S", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Q and S"], "correct_answer": 0, "solution": "S1 (Given):This sentence sets the context for a diplomatic visit and implies some background diplomatic activities between India and Pakistan"}, {"id": "128197", "question": s. Beyond mere numbers, it helps shape government priorities, allocation of resources and the design of welfare programmes. The Census data will be instrumental in addressing India’s complex social issues. Key information, such as household composition, access to basic amenities and employment patterns, will guide policies on healthcare, education, housing and infrastructure. With accurate data, the government can identify areas needing intervention, helping achieve equitable growth across regions. For instance, data from rural regions with high illiteracy and unemployment rates could lead to targeted educational and skill-development programmes.</p> <p>The political implications are equally significant. Linked to the Census is the delimitation exercise. Scheduled to be held after the Census, it will redraw constituency boundaries based on the updated population figures. This impacts fair political representation and is especially relevant for women, as the Census will inform the implementation of the Women’s Reservation Bill, ensuring 33 per cent representation for women in Parliament. Such representation can advance gender-sensitive policymaking, enhancing social equity and economic inclusivity. However, notably, it has raised concerns, particularly among southern states that fear a loss in representation due to their population control efforts. Transparent handling of these demographic shifts is essential to maintain trust and balance regional interests in India’s democratic framework.</p> <p>Meanwhile, the potential inclusion of a caste census has sparked a parallel debate, with calls from various political fronts advocating for better representation and resource allocation based on caste demographics. Ultimately, the Census is more than a population count — it’s a cornerstone of informed governance.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-p  per cent representation for women in Parliament. Such representation can advance gender-sensitive policymaking, enhancing social equity and economic inclusivity. However, notably, it has raised concerns, particularly among southern states that fear a loss in representation due to their population control efforts. Transparent handling of these demographic shifts is essential to maintain trust and balance regional interests in India’s democratic framework.</p> <p>Meanwhile, the potential inclusion of a caste census has sparked a parallel debate, with calls from various political fronts advocating for better representation and resource allocation based on caste demographics. Ultimately, the Census is more than a population count — it’s a cornerstone of informed governance.</p> <p><strong>What concern do southern states in India have regarding the Census 2025 delimitation exercise?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They worry about insufficient data accuracy due to rapid urbanization.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> They fear a reduction in their political representation due to lower population growth.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They anticipate increased challenges in managing gender-sensitive policies.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They believe the Census will negatively impact resource allocation for development projects."], "correct_answer": 1, "solution": "No solution available"}, {"id": "128232", "question": "<strong>Comprehension:</strong></p> <p>India’s seemingly invincible home Test record crumbled in Pune on Saturday (October 26, 2024). Ever since Alastair Cook’s England defeated M.S. Dhoni’s men 2-1 in 2012, India has carved a dominant path at home. Under diverse skippers, 18 bilateral Test series were won, the last being the one against Bangladesh. Seen in the light of this 12-year dominance, the host was expected to reiterate its supremacy against the visiting New Zealanders. The Black Caps also missed the services of an injured Kane Williamson in the first two Tests at Bengaluru and Pune. However, bucking all predictions, it was New Zealand that prevailed twice over to lead the three-match series at 2-0. Having clinched the series and with just one Test remaining at Mumbai where the home squad will try to salvage battered pride, the Black Caps will be seen as cricket’s giant-slayers, a trait they often exhibit in limited overs cricket and one that is now finding a revelation in the longer format too. India lost the first Test by eight wickets and the second contest by 113 runs. These capitulations will raise questions about the much-touted strength inherent in Rohit Sharma’s men, and more so since the tour of Australia is around the corner.</p> <p>At Bengaluru, under low-slung clouds and with the hint of swing, Rohit gambled on the side of optimism by electing to bat on winning the toss. A first innings score of 46 meant that India was resigned to play catch-up. At Pune, even if off-spinner Washington Sundar bagged a seven-for to restrict New Zealand to a 259 in its first innings, the Indian batters struggled, and it was a tale that was repeated despite Yashasvi Jaiswal’s 77 in the second innings. India’s core quartet of skipper Rohit, Virat Kohli, R. Ashwin and Ravindra Jadeja, all pedigreed stars with great career records, are closer to their twilight. Even if all four figure for the tour of Australia, the selectors have to gradually find ideal replacements. The latest series in the Indian backyard also highlighted the home batters’ increasing vulnerability against spin. Calm assurance has been traded for mindless aggression. For New Zealand, left-arm spinner Mitchell Santner kept a tight leash while Rachin Ravindra excelled with the bat. Strangely for India, its spearhead Jasprit Bumrah has not been in his elements while the host spinners have found their counterparts do one better. This series offered a reality check for India.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Disappointed", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Humorous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neutral"], "correct_answer": 1, "solution": "No solution available"}, {"id": "128233", "question": "<strong>Comprehension:</strong></p> <p>India’s seemingly invincible home Test record crumbled in Pune on Saturday (October 26, 2024). Ever since Alastair Cook’s England defeated M.S. Dhoni’s men 2-1 in 2012, India has carved a dominant path at home. Under diverse skippers, 18 bilateral Test series were won, the last being the one against Bangladesh. Seen in the light of this 12-year dominance, the host was expected to reiterate its supremacy against the visiting New Zealanders. The Black Caps also missed the services of an injured Kane Williamson in the first two Tests at Bengaluru and Pune. However, bucking all predictions, it was New Zealand that prevailed twice over to lead the three-match series at 2-0. Having clinched the series and with just one Test remaining at Mumbai where the home squad will try to salvage battered pride, the Black Caps will be seen as cricket’s giant-slayers, a trait they often exhibit in limited overs cricket and one that is now finding a revelation in th e of the scamsters’ modus operandi.</p> <p>On Sunday, in his monthly radio address, Mann Ki Baat, the PM cautioned against “digital arrest fraud”, in which “fraudsters impersonate as police, CBI, narcotics, (and) at times RBI” and exert so much “psychological pressure on the victim that one gets scared.” He noted that “people have lost lakhs of rupees”. Considering the number of such incidents that have come to light recently, the PM’s comments could not have come at a better time. Between January 1 and April 30, 7.4 lakh complaints were made as per the National Cybercrime Reporting Portal. As per the Indian Cybercrime Coordination Centre, there are several types of rackets — digital arrest, trading scam, investment scam and romance/dating scam. Between January-April this year, Indians lost Rs 120.3 crore in digital fraud, Rs 1,420.48 crore in trading scams, Rs 222.58 crore in investment scams and Rs 13.23 crore in romance/dating scams. According to reports, many of the perpetrators can be traced to Myanmar, Laos and Cambodia. In 2023-24, there were also 29,082 card/internet related fraud cases as per the RBI’s annual report.</p> <p>As fraudsters employ methods that are increasingly sophisticated and innovative — from fake documents to fake call centres — the issue needs to be tackled at multiple levels. The PM spoke about the National Cyber Coordination Centre, which will synchronise activities among various agencies. Government needs to investigate such cases and bring the culprits to book in a swift manner. At the same time, greater awareness must be created among the public at large to help protect them against such scams.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Cautionary", "<p st     const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
