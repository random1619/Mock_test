<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 85 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

eload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> SRQP"], "correct_answer": 1, "solution": "<strong>P:</strong> This sentence sets the scene by introducing a specific time (7 a.m.) and describing the activity in the lanes, bylanes, and roads."}, {"id": "29799", "question": "<strong>Q3. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>A</strong>. However, in his address during May Day celebrations in Chennai, the Tamil Nadu Chief Minister, M.K. Stalin, announced the withdrawal of the legislation<br> <strong>B</strong>. In addition to being the starting point of the possible onset of another scorching summer, the month of April also witnessed two important happenings that are tied to the country’s avowed economic-industrial transformation, demanding our attention<br> <strong>C</strong>. This announcement comes on the back of the temporary hold on further action on the Bill by the Tamil Nadu government, after strong opposition; this includes the State government’s alliance partners and trade unions<br> <strong>D</strong>. The first was the passage of a piece of legislation in the Tamil Nadu Assembly that amended the Factory Act of 1948, to extend the number of working hours in a day, from eight hours to 12 hours<br> <strong>E</strong>. A similar piece of legislation was passed in the Karnataka Assembly, a few months ago", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BECAD", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BDEAC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABCDE", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABECD"], "correct_answer": 1, "solution": "Option Elimination:"}, {"id": "29800", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong>.</p> <p>The supermarket may declare a weekend offer for all the food items.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A weekend offer may have been declared by the supermarket for all the food items.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A weekend offer would be declared by the supermarket for all the food items.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> A weekend offer may be declared by the supermarket for all the food items.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A weekend offer may declare by the supermarket for all the food items."], "correct_answer": 2, "solution": "Active से Passive Voice में बदलने के लिए, Active वाक्य का <strong>Object</strong> Passive वाक्य का <strong>Subject</strong> बन जाता है। <strong>Verb</strong> को Active से Passive में बदलते समय सही <strong>Tense</strong> का प्रयोग किया जाता है। Active वाक्य में <strong>\"The supermarket\"</strong> (Subject), <strong>\"may declare\"</strong> (Verb in Modal form), और <strong>\"a weekend offer\"</strong> (Object) है। Passive में बदलने पर <strong>Object</strong> (\"A weekend offer\") <strong>Subject</strong> बन गया है, <strong>Verb</strong> को \"may be declared\" (Passive form of \"may declare\") में बदला गया है और <strong>\"by the supermarket\"</strong> के रूप में प्रयोग किया गया है।"}, {"id": "29801", "question": "<strong>Q5. Given below are four jumbled sentences. Select the option that gives their correct logical sequence.</strong><br> <br> <strong>a</strong>. On May 1, 1886, Chicago in the United States became the major site of a demonstration by labour unions in support of an eight-hour workday.<br> <strong>b</strong>. To condemn anti-worker actions, labour anarchists called for a meeting on May 4, 1886, at the Haymarket Square.<br> <strong>c</strong>. Police brutality and the victimisation of protesting workers by employees did not subdue the spirit of the protesters.<br> <strong>d</strong>. The peaceful meeting turned violent when a bomb exploded in the police ranks, and the police fired in response. The violent confrontation between the workers and the police became a symbol of the international struggle for workers’ rights.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, a, d, b", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, a, b, d", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> a, c, b, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, c, d, b"], "correct_answer": 2, "solution": "a: Starting with \"a\" makes sense as it introduces the context and setting for the other sentences: the demonstration on May 1, 1886. It provides a starting point for the events that unfold"}, {"id": "29802", "question": "<strong>Q6. Select the most appropriate meaning of the given idiom</strong>.</p> <p>To keep a good table</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To offer sumptuous food to one’s guests", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To keep good company", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To have a luxurious home", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To keep one’s home organised"], "correct_answer": 0, "solution": "A) <strong>To keep a good table</strong> (phrase) – To offer sumptuous food to one’s guests अपने मेहमानों को शानदार भोजन परोसना"}, {"id": "29803", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong></p> <p>My friend did not steal my money.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My friend was not stolen by my money.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My money has not been stolen by my friend.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My money is stolen by my friend.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> My money was not stolen by my friend."], "correct_answer": 3, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong>: Active वाक्य का <strong>Object</strong> Passive वाक्य का <strong>Subject</strong> बन जाता है। Verb को Active से Passive में बदलते समय सही <strong>Tense</strong> का प्रयोग किया जाता है। Active वाक्य में <strong>\"My friend\" (Subject)</strong>, <strong>\"did not steal\" (Verb in Simple Past)</strong> और <strong>\"my money\" (Object)</strong> है। Passive में बदलने पर <strong>\"My money\" (Subject)</strong> बन गया है, <strong>Verb को \"was not stolen\" (Simple Past Passive)</strong> में बदला गया है और <strong>\"by my friend\"</strong> के रूप में प्रयोग किया गया है।"}, {"id": "29804", "question": "<strong>Q8. Select the most appropriate option to fill in the blank</strong>.</p> <p>The volcano ____________ and released hot gases.</p> <p>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Interrupted", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Erupted", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Broken open", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ruptured"], "correct_answer": 1, "solution": "B) 'Erupted' का प्रयोग होगा क्योंकि \"erupted\" का अर्थ होता है जब वॉल्केनो से धुएँ और लाव निकलता है। जबकि 'Interrupted' का अर्थ है बीच में रोक देना, 'Broken open' का अर्थ है टूटकर खुल जाना, और 'Ruptured' का अर्थ है फट जाना, जो इस संदर्भ में सही नहीं है।"}, {"id": "29805", "question": "<strong>Q9. Some sentences are given below. While the first and the last sentences (1 and 2) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>1</strong>. Most of us are pretty much concerned about our appearance.<br> <strong>A</strong>. There are ample justifications to be concerned about our looks.<br> <strong>B</strong>. From an evolutionary perspective, appearance does matters in life.<br> <strong>C</strong>. History tells us that people have been interested in enhancing their looks forever.<br> <strong>D</strong>. But the question is, “At what cost?” The billion-dollar industry actively conditions our behaviour to act according to the trends.<br> <strong>2</strong>. This obsession with outward appearance sometimes reaches an unhealthy level", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BADC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BACD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDAC", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BCAD"], "correct_answer": 3, "solution": "<strong>1:</strong> The first sentence (1) sets the context that most people care about their appearance."}, {"id": "29806", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong>.</p> <p>The two old queens are signing the treaty today.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The treaty is signing by the two old queens today.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The treaty is going to be signed by the two old queens today.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The treaty is being signed by the two old queens today.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The treaty is signed by the two old queens today"], "correct_answer": 2, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong>, Active वाक्य का <strong>Object</strong> Passive वाक्य का <strong>Subject</strong> बन जाता है। Verb को Active से Passive में बदलते समय सही <strong>Tense</strong> का प्रयोग किया जाता है। Active वाक्य में <strong>\"The two old queens\"</strong> (Subject), <strong>\"are signing\"</strong> (Verb in Present Continuous), और <strong>\"the treaty\"</strong> (Object) है। Passive में बदलने पर Object <strong>\"The treaty\"</strong> (Subject) बन गया है, Verb को <strong>\"is being signed\"</strong> (Present Continuous Passive) में बदला गया है और <strong>\"by the two old queens\"</strong> के रूप में प्रयोग किया गया है।"}, {"id": "29807", "question": "<strong>Q11. Select the most appropriate option to fill in the blank</strong>.</p> <p>Cheetahs _____________ lions.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> run faster than", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ran faster then", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> are running fast then", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> have ran faster than"], "correct_answer": 0, "solution": "A) 'run faster than' का प्रयोग होगा क्योंकि \"run faster than\" सही तारीक से चीता और शेर की गति की तुलना करता है। जबकि 'ran faster then' में 'then' का प्रयोग गलत है, 'are running fast then' में भी 'then' गलत है, और 'have ran faster than' में verb का रूप गलत है।"}, {"id": "29808", "question": "<strong>Q12. Select the most appropriate ANTONYM of the underlined word</strong>.</p> <p>Science has been trying innumerable methods to prove the existence of the universe, but the biggest <strong>pleasure</strong> of science is its inability to produce a single theory that explains the whole universe.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Inadequacy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Joy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Fear", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Blandness"], "correct_answer": 3, "solution": "<strong>Antonym</strong>: <strong>Blandness</strong> (noun) – The quality of being dull, insipid, or lacking in character or flavor. नीरसता"}, {"id": "29809", "question": "<strong>Q13. Select the most appropriate meaning of the highlighted idiom</strong></p> <p>Grandpa often likes to sit in the balcony and <strong>chew the fat</strong> with me.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Gossip and make small talk", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Play a game", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Chew meat", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Criticise people"], "correct_answer": 0, "solution": "A) <strong>Chew the fat</strong> (idiom) - Gossip and make small talk गपशप करना"}, {"id": "29810", "question": "<strong>Q14. Select the correct spelling from the given options to replace the underlined word in the following sentence</strong>.</p> <p>The new policy will <ins><strong>supplant</strong> </ins>the old one and introduce stricter measures for workplace safety.</p> <ol> </ol> <p>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> overide", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> supersede", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> suceed", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> superseed"], "correct_answer": 1, "solution": "B) The correct spelling to replace the underlined word \"supplant\" in the context of the sentence is \"supersede\" which means “to take the place of or replace.”"}, {"id": "29811", "question": "<strong>Q15. Select the most appropriate synonym of the underlined word in the given sentence</strong>.</p> <p>He lost the golden opportunity due to his habit of <ins><strong>procrastination</strong></ins>.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> indecisiveness", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> impulsiveness", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> inquisitiveness", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> submissiveness"], "correct_answer": 0, "solution": "<strong>Synonym</strong>: <strong>Indecisiveness</strong> (noun) – The quality of being uncertain or hesitant, hesitancy, reluctance, vacillation. अनिश्चयपूर्णता, अनिर्णय की स्थिति"}, {"id": "29812", "question": "<strong>Q16. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> <strong>A</strong>. There is considerable confidence in India becoming the third largest economy in the world over the next decade.<br> <strong>B</strong>. The Prime Minister, Narendra Modi, while addressing the first meeting of Finance Ministers and Central Bank Governors under India’s G20 Presidency, held on February 24-25, 2023, expressed concern that “progress on Sustainable Development Goals (SDG) seems to be slowing down”.<br> <strong>C</strong>. Regardless of the global progress that has been made to date, the sheer population size of India means th ate of one's merits, unpretentious. सादा, शालीन"}, {"id": "29814", "question": "<strong>Q18. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph</strong><br> <br> <strong>P</strong>. Indian soldiers cannot touch 26 of the 65 patrolling points in Ladakh<br> <strong>Q</strong>. Three years later, some of those areas have witnessed disengagement — pulling troops apart by a few miles of buffer zones — while two of them, Depsang and Demchok, remain unresolved<br> <strong>R</strong>. It was in the first week of May 2020 that news broke of ingress by China’s<br> <strong>S</strong>. People’s Liberation Army (PLA) in multiple areas across the Line of Actual Control (LAC) in Ladakh", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> RSPQ", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> SRPQ", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> PQSR", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QPSR"], "correct_answer": 0, "solution": "<strong>When we see sentence R,</strong> it feels incomplete because the noun (China's) needs an object or continuation. The logical continuation to the word \"China’s\" is provided by \"People’s Liberation Army (PLA)\" from sentence S. So, R is followed by S."}, {"id": "29815", "question": "<strong>Q19. Select the correct spelling from the given options to fill in the blank</strong>.</p> <p>The civil engineers are trying to __________ the bridge using the new technology.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> elevate", "<p style=\"display:non hrough MGNREGA. This tends to complicate the design of the scheme. There are also questions over the kind of public works available in urban areas and the capacity constraints of urban local bodies.</p> <p>Though this welfarist agenda may have wide popular appeal, there are fiscal constraints to contend with. Rajasthan is amongst the states with the highest debt burden in the country. The state allocates less on more productive forms of spending. A report by the RBI had estimated that the state announced freebies worth 8.6 per cent of its own tax revenue in 2022-23. While such policies are well intended, they reflect the inability of the economy to create productive forms of employment at the scale required to alleviate social pressures for fiscally stressed states. The focus should be to create greater employment opportunities, especially at the low end of the skill spectrum, ensure access to health and education, and provide paths for upward mobility.</p> <p><strong>Q34. Based on the passage, which of the following is an accurate inference about the Rajasthan state government's initiatives?</strong></p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The state government is moving away from welfare policies and focusing more on industrial development.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The state government aims to strengthen the social security net by amalgamating various initiatives including guaranteed income, employment, and pension.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The primary focus of the state government is to provide welfare for gig workers only.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The state government ai const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
