<script id="theme-toggle-handler">
(function() {
    var savedTheme = 'dark';
    try {
        savedTheme = localStorage.getItem('portal-theme') || 'dark';
    } catch (e) {}
    if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        var observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('light-theme');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('themeToggle');
        if (btn) {
            var newBtn = btn.cloneNode(true);
            newBtn.removeAttribute('onclick');
            btn.parentNode.replaceChild(newBtn, btn);
            
            var currentTheme = 'dark';
            try {
                currentTheme = localStorage.getItem('portal-theme') || 'dark';
            } catch (e) {}
            
            var icon = newBtn.querySelector('i');
            if (icon) {
                icon.className = currentTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            newBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isLight = document.body.classList.toggle('light-theme');
                document.documentElement.classList.toggle('light-theme', isLight);
                var nextTheme = isLight ? 'light' : 'dark';
                try {
                    localStorage.setItem('portal-theme', nextTheme);
                } catch (err) {}
                
                var currentIcon = newBtn.querySelector('i');
                if (currentIcon) {
                    currentIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        }
    });
})();
</script>

<script>
/* DYNAMICALLY IDENTIFY AND ALIGN MATH EQUATIONS */
(function() {
  function processImage(img) {
    if (img.classList.contains('processed-math')) return;
    img.classList.add('processed-math');
    const hasLargeAttr = (img.getAttribute('width') && parseInt(img.getAttribute('width')) > 100) ||
                         (img.getAttribute('height') && parseInt(img.getAttribute('height')) > 60);
    const src = img.src || '';
    const isMath = src.includes('parserImages') || 
                   src.includes('equation') || 
                   img.classList.contains('eq-img') ||
                   (!hasLargeAttr && (img.align === 'bottom' || img.align === 'middle' || !img.align));
    if (isMath && !hasLargeAttr) {
      img.classList.add('math-eq');
    }
  }
  
  function initMathAligner() {
    document.querySelectorAll('img').forEach(processImage);
    const observer = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
          if (node.nodeType === Node.ELEMENT_NODE) {
            if (node.tagName === 'IMG') {
              processImage(node);
            } else {
              node.querySelectorAll('img').forEach(processImage);
            }
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMathAligner);
  } else {
    initMathAligner();
  }
})();

e'।<br> 'Said' के बाद 'that' का प्रयोग किया जाता है।<br> <strong>Explanation in English:</strong><br> In Future Tense of Direct Speech, 'will' is replaced by 'would' in Indirect Speech.<br> Personal pronouns are changed according to the context, such as— 'I' → 'he' and 'you' → 'me.'<br> 'That' is used after 'said.'"}, {"id": "117519", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>Rafael Nadal is a player whom made sweat, toil, endurance and (A)/ sheer effort look fascinating. (B) Watching him run around the court, from (C)/ one extremity to another, was often demanding. (D)", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (C)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (B)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (D)", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> (A)"], "correct_answer": 3, "solution": "'who' will be used instead of 'whom' because 'who' is a subject pronoun, whereas 'whom' is used as an object pronoun. In this case, 'Rafael Nadal' is the subject, so 'who' is appropriate; Like— \"She is the one who made the decision.\""}, {"id": "117515", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>The strict manager would not <ins><strong>brook</strong> </ins>any violation of the company's policies.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Tolerate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Countenance", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Suffer", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Disallow"], "correct_answer": 3, "solution": "<strong>Antonym</strong>: <strong>disallow</strong> (verb) – To refuse to accept नामंज़ूर करना"}, {"id": "117517", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>At sunrise on Sunday, a spaceship, about 90 feet tall than the Statue of Liberty blasted off / from the Boca Chica base in Texas, USA. / Three minutes and 40 seconds into the launch,/ its booster detached from the vessel and made its way back towards the Texas coast.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> At sunrise on Sunday, a spaceship, about 90 feet tall than the Statue of Liberty blasted off", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> from the Boca Chica base in Texas, USA.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Three minutes and 40 seconds into the launch,", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> its booster detached from the vessel and made its way back towards the Texas coast."], "correct_answer": 0, "solution": "'taller' will be used instead of 'tall' because a comparison is being made, and in Comparative Degree, we use 'taller'; Like— \"Mount Everest is taller than K2.\""}, {"id": "117513", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>Her explanation of the theory was so <ins><strong>pedantic</strong> </ins>th one\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Without", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Alongside", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> After", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Throughout"], "correct_answer": 0, "solution": "<strong>Synonym</strong>: <strong>Without</strong> (preposition) – In the absence of something or someone. बिना"}, {"id": "117499", "question": "<strong>Select the option that expresses the given sentence in direct/indirect speech</strong></p> <p>The mayor said to the marshals, “Don’t conduct any drill tomorrow.”</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The mayor ordered the marshals not to conduct any drill the previous day.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The mayor ordered the marshals not to conduct any drill tomorrow.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The mayor ordered the marshals not to conducted any drill the next day.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The mayor ordered the marshals not to conduct any drill the next day"], "correct_answer": 3, "solution": "Direct Speech में समय के शब्दों को Indirect Speech में बदलने के नियमों में ‘tomorrow’ को ‘the next day’ में बदला जाता है।"}, {"id": "117479", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>O. I retired from police service six months ago, after serving for nearly 38 years.</p> <p>P. I am even in the process of acquiring rhododendron saplings from the Himalayas to be planted around an irrigation pond.</p> <p>Q. Right now, I am planting coffee, pepper, areca nut, banana, avocado, forest trees and so on with an almost maniacal frenzy.</p> <p>R. With the happy realisation of having become my own master after half a lifetime, I decided to get into farming in Kodagu.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ROPQ", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RQPO", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> OQRP", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ORQP"], "correct_answer": 3, "solution": "O से starting होती है क्योंकि यह narrator के retirement के बारे में बताता है। \"I retired from police service six months ago, after serving for nearly 38 years\" में past tense (\"retired,\" \"serving\") का use किया गया है, जिससे यह स्पष्ट होता है कि narrator अपने police career के बाद की जिंदगी के बारे में बात करने वाले हैं। यह sentence context सेट करता है कि narrator ने अब क्या किया।"}, {"id": "117500", "question": "<strong>Select the option that expresses the given sentence in reported speech</strong>.</p> <p>My mother said, “I am meeting your father today.”</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My mother said that she were meeting my father that day.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My mother says that she was meeting my father today.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The mother said that she has been meeting my father that day.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> My mother said that she was meeting my father that day"], "correct_answer": 3, "solution": "<strong>D) </strong>My mother said that she was meeting my father that day.<br> Present Continuous Tense में 'am/is/are + verb-ing' को Indirect Speech में 'was/were + verb-ing' में बदला जाता है।<br> Time expression 'today' को 'that day' में बदल दिया जाता है।'Said' के बाद 'that' का प्रयोग किया गया है।<br> <strong>Explanation in English:</strong><br> In Present Continuous Tense, 'am/is/are + verb-ing' is changed to 'was/were + verb-ing' in Indirect Speech. 'That' is used after 'said.'<br> Time expression 'today' is changed to 'that day.'"}, {"id": "117503", "question": "<strong>Select the meaning of the underlined word in the given sentence</strong></p> <p>A suitable <ins><strong>solatium</strong> </ins>in the form of an apology was offered to him", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Compensation for loss", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Plea for mercy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Celebration of success", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Document of agreement"], "correct_answer": 0, "solution": "<strong>A) Solatium</strong> – a thing given to someone as a compensation or consolation. मुआवज़ा"}, {"id": "117508", "question": "<strong>Select themost appropriate idiom to fill in the blank</strong></p> <p>He decided to ______________ and escalate the war", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Wave the red flag", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Tighten the purse strings", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cry foul", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Double down"], "correct_answer": 3, "solution": "D) <strong>Double down</strong> – To strengthen one's commitment to a strategy or course of action, especially one that is potentially risky. अपनी प्रतिबद्धता को और मजबूत करना (खासकर जोखिम भरे कार्य में)।"}, {"id": "117507", "question": "<strong>Select the most appropriate idiom for the underlined segment in the following sentence</strong></p> <p><ins><strong>A lot has been written about</strong></ins> climate change, but effective global action is still a challenge.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Much ink has been spilled on", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Catch someone off guard", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Choppy waters", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Make a stride"], "correct_answer": 0, "solution": "A) <strong>Much ink has been spilled on</strong> – This idiom means that a lot has been written or discussed about a particular topic. इस विषय पर बहुत कुछ लिखा गया है।"}, {"id": "117497", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong>.</p> <p>Do you obey your elders?", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Are your elders obeyed by you?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Are you obeying by your elders?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Have your elders obeyed by you?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Do your elders obeyed by you?"], "correct_answer": 0, "solution": "<strong>Explanation in English:</strong><br> When converting Active Voice into Passive Voice, the <strong>object</strong> is placed at the beginning of the sentence, and the verb is changed into its Passive Voice form. In interrogative sentences, <strong>\"do\"</strong> or <strong>\"does\"</strong> is replaced by <strong>\"is\"</strong>, <strong>\"are\"</strong>, or <strong>\"were\"</strong> to form the Passive Voice. For example: → To Be → are → V³ → obeyed<br> Note: \"your elders\" is placed as the object, and \"are obeyed\" is used in Passive Voice. \"by you\" is added at the end."}, {"id": "117504", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a spelling error</strong></p> <p>His acremony was evident / during the heated discussion / making others uncomfortable / and escalating tensions.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> His acremony was evident", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> during the heated discussion", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> making others uncomfortable", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> and escalating tensions."], "correct_answer": 0, "solution": "A) The correct spelling of ‘acremony’ is ‘acrimony,’ which means “bitterness or ill feeling” कटुता, कड़वाहट."}, {"id": "117506", "question": "<strong>Select the most appropriate spelling of the underlined word in the given sentence</strong></p> <p>He lifted a heavy <ins><strong>dumbell</strong> </ins>at the gym.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> dumbbel", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> dumbbell", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> dumbal", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> dumbel"], "correct_answer": 1, "solution": "B) The correct spelling of the word ‘dumbell’ is ‘dumbbell,’ which means “a short bar with weights on either end, used for exercise” डम्बल."}, {"id": "117495", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>You must have submitted the important documents.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The important documents must have been submitted by you.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The important documents might be submitted by you.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The important documents must be submitted by you.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The important documents must be submitted by you."], "correct_answer": 0, "solution": "Active Voice को Passive Voice में बदलते समय, object को वाक्य की शुरुआत में रखा जाता है, और क्रिया (verb) को Passive Voice के रूप में बदल दिया जाता है। \"must have\" के साथ Passive Voice में \"been\" और verb का तीसरा रूप (V³) का प्रयोग होता है। जैसे— To Be → must have been V³ → submitted"}, {"id": "117477", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Select the option that gives their correct logical sequence.</strong></p> <p>A. Well, 60 years after Bombay bid adieu to its trams (1964), the passenger tramway in Kolkata, India’s last remaining network, has come to an end 151 years after its introduction.</p> <p>B. Contemporary Turkish playwright, novelist and thinker Mehmet Murat ildan may be a little bit fascinated with trams.</p> <p>C. A small stretch from Maidan to the Esplanade, however, will be retained as a heritage for tram lovers for occasional time-machine rides.</p> <p>D. West Bengal’s administrative authorities contend that trams cause unnecessary congestion on roads that are increasingly difficult to manage.</p> <p>E. He said, “Cities who do not have trams always look less literary, less poetic, and less mysterious!”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ECABD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DEABC", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BEADC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCDAE"], "correct_answer": 2, "solution": "<strong>B </strong>sentence से paragraph की शुरुआत होती है क्योंकि इसमें Mehmet Murat Ildan का परिचय दिया गया है, जो एक Turkish playwright, novelist, और thinker हैं। इसमें बताया गया है कि Ildan ट्रामों के प्रति काफी fascinated हैं।"}, {"id": "117524", "question": "<strong>Select the most appropriate option that can substitute the underlined segment in the given sentence. If no substitution is required, select ‘No substitution’.</strong></p> <p>A sharp fall in the price of jute <ins><strong>have led the poor jute farmers</strong></ins> to the brink of starvation", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> have lead the poor jute farmers", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> have led the poor farmers", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> has led the poor jute farmers", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No substitution"], "correct_answer": 2, "solution": "<strong>C)</strong> <strong>'Have led'</strong> के बदले 'has led' का use होगा क्योंकि 'A sharp fall' Singular Subject है अतः Singular Verb 'has' का प्रयोग होगा; जैसे— 'The sharp rise in prices has affected many families.'"}, {"id": "117518", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>On October 14, the strained ties between India and Canada seemed to touch a new low. / In September last year, Prime Minister Justin Trudeau has made / unsubstantiated allegations about India’s involvement / in the killing of Khalistani separatist Hardeep Singh Nijjar on Canadian soil.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> On October 14, the strained ties between India and Canada seemed to touch a new low.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> In September last year, Prime Minister Justin Trudeau has made", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> unsubstantiated allegations about India’s involvement", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> in the killing of Khalistani separatist Hardeep Singh Nijjar on Canadian soil."], "correct_answer": 1, "solution": "'had made' will be used instead of 'has made' because the sentence refers to a specific time 'last year,' and the Past Perfect Tense is used when one action occurs before another. Here, 'had made' is appropriate because it happened before the main event (strained ties); Like— \"He had made a plan before they arrived.\""}, {"id": "117501", "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>The new movie became <ins><strong>something that is striking or has great popular appeal</strong></ins>, attracting huge crowds to the theaters within its first week of release.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mirage", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Obsession", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Showstopper", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Relic"], "correct_answer": 2, "solution": "C) <strong>Showstopper</strong> (noun) – something that is striking or has great popular appeal."}, {"id": "117478", "question": "<strong>For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the appropriate sentences for S2 and S3, respectively.</strong></p> <p><strong>S1</strong>: Lying can profoundly affect one’s happiness, mental well-being, relationships, and peace of mind.</p> <p><strong>P:</strong> If you've been struggling with a particular subject, today is the day to revisit it, as breakthroughs are likely.</p> <p><strong>Q</strong>: No other vice threatens happiness as much as lying does, be it in one’s professional or personal sphere.</p> <p><strong>R</strong>: Happiness will increase at home.</p> <p><strong>S: </strong>Just as a nation may suffer from its leaders’ lying, a family can also suffer from the lying of its members.</p> <p><strong>S4:</strong> Often, we overlook the fact that lies, intended to enhance our happiness, can ultimately destroy it.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and Q", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and R", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and S", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Q and S"], "correct_answer": 3, "solution": "<strong>S1:</strong> The first sentence states that \"Lying can profoundly affect one’s happiness, mental well-being, relationships, and peace of mind.\" This sentence sets the tone for discussing the negative effects of lying."}, {"id": "117505", "question": "<strong>There is a spelling error in the given sentence. Select the option that contains the INCORRECTLY spelt word</strong></p> <p>The new technology became a bellweather for industry trends.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> technology", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> industry", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> bellweather", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> trends"], "correct_answer": 2, "solution": "C) The correct spelling of ‘bellweather’ is ‘bellwether,’ which means “a leader or an indicator of future trends” अगुआ, मार्गदर्शक."}, {"id": "117510", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>In his quest for a simpler life, John decided to _____ unhealthy habits like smoking and excessive drinking.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Embrace", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pursue", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Eschew", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Maintain"], "correct_answer": 2, "solution": "<strong>C) 'Eschew' </strong>का प्रयोग होगा क्योंकि \"eschew\" का अर्थ होता है किसी चीज़ से बचना या उसे त्यागना, जो इस संदर्भ में सही है, क्योंकि वाक्य में जॉन की अस्वास्थ्यकर आदतों को त्यागने की बात हो रही है। जबकि 'Embrace' का अर्थ है अपनाना, 'Pursue' का अर्थ है पीछा करना या जारी रखना, और 'Maintain' का अर्थ है बनाए रखना, जो इस संदर्भ में सही नहीं है।"}, {"id": "117496", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong>.</p> <p>Did the company launch a new product last month?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Did the new product launch the company last month?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Was the company launched by a new product last month?", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Was a new product launched by the company last month?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Did the new product launch by the company last month's?"], "correct_answer": 2, "solution": "Active Voice को Passive Voice में बदलते समय, <strong>object</strong> को sentences की शुरुआत में रखा जाता है, और verb को Passive Voice के रूप में बदल दिया जाता है। प्रश्नवाचक वाक्यों में <strong>\"did\"</strong> को <strong>\"was\"</strong> या <strong>\"were\"</strong> से बदलकर Passive Voice बनाया जाता है। जैसे— To Be → was V³ → launched<br> NOTE: \"a new product\" को object के रूप में sentences में रखा गया और \"was launched\" का प्रयोग Passive Voice में किया गया। \"by the company\" को अंत में जोड़ा गया।"}, {"id": "117511", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The artist sought to _____ his paintings with vibrant colors and intricate designs, making them more visually appealing.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Simplify", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Embellish", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Reduce", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Discard"], "correct_answer": 1, "solution": "B) 'Embellish' का प्रयोग होगा क्योंकि \"embellish\" का अर्थ होता है सजाना या अलंकृत करना, जो इस संदर्भ में सही है, क्योंकि वाक्य में कलाकार अपनी पेंटिंग्स को अधिक आकर्षक बनाने के लिए रंगों और डिज़ाइनों का उपयोग कर रहा है। जबकि 'Simplify' का अर्थ है सरल बनाना, 'Reduce' का अर्थ है घटाना, और 'Discard' का अर्थ है त्याग देना, जो इस संदर्भ में सही नहीं है।"}, {"id": "117480", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong><br> Transitions are always difficult, more so when one is asked to ____1____ from habits formed over an entire lifetime. We are ____2____ towards a certain _____3______ if we do not change and start caring for nature. I used to leave the tap running while brushing my teeth, shaving, or even washing my hands until a few years back. We installed water aerators in our taps to conserve water. I realised that my shave with running tap water without an aerator was resulting in an additional three-fourths of a bucket going down the drain. Even with the aerator it still resulted in some wastage. I had forgotten that my grandfather shaved with just a mug full of water. As I narrated the results of my experiment to others, I realised that _____4_____ were aware and were already into conservation, but many needed that extra push. I remember drinking tap water till much later in adulthood. I moved to Calcutta for my first railway posting. My well-wishers asked me to filter and boil water if I were to survive. The initial filters were simpler devices with candles in the container or those screwed onto the tap.</p> <p><strong>Select the most appropriate option to fill in blank number 1.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/rel nent and equally important to foresee the negative aspects emerging in some quarters and ponder over the preventive steps to be thought of in the ever-changing world of the education system. Thus Information Communication Technology (ICT) in education has become important for imparting quality education that is ethical, transparent and secure.</p> <p><strong>Complete the following sentence from the passage:</strong></p> <p>The Covid-19 pandemic has acted as a catalyst in revolutionising the educational system, leading to _______.\"", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> reduced reliance on technology", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> the development of AI and VR", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> mutually dependent education and technology", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> the decline of traditional teaching methods"], "correct_answer": 2, "solution": "No solution available"}, {"id": "117488", "question": "<strong>Comprehension:</strong></p> <p>The 2024 portrayal guideline of the International Olympic Committee (IOC) has a section on the treatment of sportspeople who do not conform to stereotypes: “Women, like men, are not a homogenous group, nor are they solely defined by their gender identity… Balanced portrayal practices should ensure that the diversity within and among different groups are both considered and reflected… Every person, irrespective of their gender identity or sex variations, has the right to practise sport without discrimination and in a way that respects their health, safety and dignity.” Yet, on all these counts, Algerian boxer Imane Khelif as well as Taiwan’s Lin Yu-ting have repeatedly been let down at the Paris Olympics — from opponents refusing the basic courtesy of a post-match handshake to celebrities, ranging from former US President Donald Trump to writer J K Rowling to entrepreneur Elon Musk, dismissing their victories. The reason: Khelif had failed to pass the gender tests conducted by the now-derecognised International Boxing Association last year, details of which have not been made public, and because neither conforms to the traditional imagination of a female athlete.</p> <p>This disregard of the distinction between biological sex and gender identity is of a piece with the disinformation and ignorance that shroud conversations around women’s sports in general. Since 1936, when the first gender test was conducted at the Olympics, the criteria for classification and rule-setting have been as much about culture, race and prejudice as they have been about science. The current controversy, for instance, stems from a section of people, including feminists such as Rowling, arguing that such a distinction negates the battle for the recognition of women’s rights, insisting on a binary rather than a spectrum to fix identities. For athletes such as Khelif, a biological woman with XY chromosome and high testosterone, or Indian athlete Dutee Chand whose hyperandrogenism led to a long battle to clear her name or the demonisation of multiple Asian Games and Commonwealth Games medal winner Pinki Pramanik in 2012 for being of intersex variation, this means a protracted battle for dignity, acceptance and, recognition both on the sporting field and off it.</p> <p>In any sporting arena, even in ones as vaunted as the Olympics where the focus is on participation and solidarity, victory remains a key arbiter of merit. At the same time, an excessive focus on matters of chromosomes and gender identity cannot — and must not — reduce performances and participants to uninformed conjectures and casual bullying. As Khelif has appealed, “It can kill people’s thoughts, spirit and mind”. That goes against every notion of fair play and sporting spirit.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Critical and informative", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optimistic and encouraging", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sarcastic and humorous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Indifferent and detached"], "correct_answer": 0, "solution": "No solution available"}, {"id": "117489", "question": "<strong>Comprehension:</strong></p> <p>The 2024 portrayal guideline of the International Olympic Committee (IOC) has a section on the treatment of sportspeople who do not conform to stereotypes: “Women, like men, are not a homogenous group, nor are they solely defined by their gender identity… Balanced portrayal practices should ensure that the diversity within and among different groups are both considered and reflected… Every person, irrespective of their gender identity or sex variations, has the right to practise sport without discrimination and in a way that respects their health, safety and dignity.” Yet, on all these counts, Algerian boxer Imane Khelif as well as Taiwan’s Lin Yu-ting have repeatedly been let down at the Paris Olympics — from opponents refusing the basic courtesy of a post-match handshake to celebrities, ranging from former US President Donald Trump to writer J K Rowling to entrepreneur Elon Musk, dismissing their victories. The reason: Khelif had failed to pass the gender tests conducted by the now-derecognised International Boxing Association last year, details of which have not been made public, and because neither const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
