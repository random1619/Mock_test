<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 71 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

const qs=[{"id": "117778", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>The last couple of days have seen two exciting space events. Elon Musk’s SpaceX achieved possibly the most stunning feat in recent years when one of its rocket, on its return journey to Earth, was caught mid-air by the large mechanical arms of its launch tower, demonstrating a major advance towards realising the goal of a fully reusable rocket.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The last couple of days have seen two exciting space events. Elon Musk’s SpaceX achieved", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> possibly the most stunning feat in recent years when one of its rocket, on its return journey", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to Earth, was caught mid-air by the large mechanical arms of its launch tower,", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> demonstrating a major advance towards realising the goal of a fully reusable rocket."], "correct_answer": 1, "solution": "'rockets' will be used instead of 'rocket' because after 'one of its,' the noun is always in plural form. Here, 'rocket' is singular, which is incorrect. The correct word is 'rockets'; like— One of its rockets was launched successfully last week."}, {"id": "117760", "question": "<strong>Select the option that can be used as a one-word substitute to fill in the blanks for the given group of highlighted words.</strong></p> <p>_______________ is a narrow passage of water connecting two seas or two other large areas of water", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Peninsula", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Embankment", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Gorge", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Strait"], "correct_answer": 3, "solution": "<strong>Peninsula</strong> (noun) – A piece of land almost surrounded by water or projecting out into a body of water. प्रायद्वीप"}, {"id": "117800", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Select the option that gives their correct logical sequence.</strong></p> <p>A. The government is also revising the definitions of gig and migrant workers to make them more inclusive and reflective of current employment realities</p> <p>B. offering benefits such as health insurance and retirement savings</p> <p>C. The Union Ministry of Labour and Employment is drafting a national law to incorporate gig workers into social security schemes,</p> <p>D. which would provide health insurance and other benefits</p> <p>E. The government is expected to require aggregators to contribute 1%-2% of their revenue to establish a social security fund,", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DECAB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ADBEC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> EDBCA", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> CBEDA"], "correct_answer": 3, "solution": "C context सेट करता है कि सरकार एक नया कानून बना रही है, जिसमें gig workers को social security schemes में शामिल किया जाएगा। यह paragraph का foundation है।"}, {"id": "117777", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>All the official talk about consumer safety around the Uttar Pradesh government’s decision to bring in two ordinances on food contamination, making the offence cognisable and non-bailable, cannot diverts attention from a disquieting intent, and effect.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> All the official talk about consumer safety around the Uttar Pradesh government’s decision", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to bring in two ordinances on food contamination,", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> making the offence cognisable and non-bailable,", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> cannot diverts attention from a disquieting intent, and effect."], "correct_answer": 3, "solution": "'divert' will be used instead of 'diverts' because with 'cannot' we always use the Base Form (V1) of the verb. 'Diverts' is in the Simple Present (V5), which is incorrect here. The correct word is 'divert'; like— The new rules cannot divert attention from the actual problem."}, {"id": "117779", "question": "<strong>The following sentence has been split into segments. Identify the segment that contains a grammatical error</strong></p> <p>A recent report by the International Labour Organization talks about how jobs growth has been lagging globally due to automation and Artificial Intelligence, and note the massive problem of youth unemployment in India", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A recent report by the International Labour Organization talks about", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> how jobs growth has been lagging globally due to automation and Artificial Intelligence", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> and note the massive problem of youth unemployment in India", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No error"], "correct_answer": 2, "solution": "'notes' will be used instead of 'note' because 'A recent report' is a singular subject, and a singular verb 'notes' is required. 'note' is plural (V1), which is incorrect here. The correct word is 'notes'; like— The report notes the issues in the system."}, {"id": "117775", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>The aroma of freshly baked cookies wafted <ins><strong>tantalisingly</strong> </ins>through the kitchen, tempting everyone.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Entice", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Repulsive", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Tempting", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Provocatively"], "correct_answer": 1, "solution": "<strong>Antonym</strong>: <strong>Repulsive</strong> (adjective) – causing intense distaste or disgust. घृणास्पद"}, {"id": "117764", "question": "<strong>There is a spelling error in the given sentence. Select the option that contains the INCORRECTLY spelt word</strong></p> <p>Regular exercise has many benifit for overall health.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> benifit", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> regular", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> exercise", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> overall"], "correct_answer": 0, "solution": "'benefit' will be used instead of 'benifit' because the correct spelling of 'benefit' is with an 'e', meaning an advantage or profit gained from something; Like— Regular exercise has many benefits for overall health"}, {"id": "117771", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>She launched a <strong>___________</strong> for better environmental policies, hoping to bring about significant change.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ramification", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Swamping", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Submersion", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Crusade"], "correct_answer": 3, "solution": "'Crusade' should be used because it refers to a vigorous campaign for a social or political cause. In this case, it talks about a campaign for better environmental policies, so 'crusade' is appropriate. Whereas, 'Ramification' means consequence, 'Swamping' means overwhelming with something, and 'Submersion' means being submerged, which do not fit in this context."}, {"id": "117774", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>His <ins><strong>vengeful</strong> </ins>attitude towards his rivals led to a bitter feud that lasted for years.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Tremendous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Unorthodox", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Discontented", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Benevolent"], "correct_answer": 3, "solution": "D) <strong>Vengeful</strong> (adjective) – seeking revenge or harm in return for perceived wrong. प्रतिशोधी<br> <strong>Antonym: Benevolent</strong> (adjective) – well-meaning, kind, and generous. परोपकारी"}, {"id": "117776", "question": "<strong>The following sentence has been split into segments. Identify the segment that contains a grammatical error</strong></p> <p>Over the last decade-and-a-half, several cities in India have became hubs for transplant surgeries of organs such as kidney, liver, heart, eyes, brain and pancreas.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Over the last decade-and-a-half,", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> several cities in India have became hubs", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> for transplant surgeries of organs such as kidney, liver, heart, eyes, brain and pancreas.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No error"], "correct_answer": 1, "solution": "'become' will be used instead of 'became' because with 'have' we always use the Past Participle (V3) form of the verb, whereas 'became' is in the Simple Past Tense (V2). Therefore, the correct word is 'become'; like— The cities have become important hubs for trade and commerce."}, {"id": "117761", "question": "<strong>Select the word which means the same as the group of words underlined in the given sentence</strong></p> <p>The Everglades in Florida is <ins><strong>an area of low, soft, wet marshy land</strong></ins>, home to a variety of wildlife.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Desert", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Morass", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Plateau", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hillock"], "correct_answer": 1, "solution": "B) <strong>Morass</strong> (noun) – An area of low, soft, wet ground; a swampy or marshy land दलदल"}, {"id": "117752", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>The contract was grabbed by the biggest telecom company in India.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The biggest telecom company in India grabs the contract.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The biggest telecom company in India grabbed the contract.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The biggest telecom company in India will grab the contract.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The biggest telecom company in India has grabbed the contract."], "correct_answer": 1, "solution": "Passive Voice को Active Voice में बदलते समय, कर्ता (subject) वाक्य की शुरुआत में आता है और क्रिया (verb) के साथ सीधा कार्य करता है। जैसे—"}, {"id": "117762", "question": "<strong>Select the word which means the same as the group of words underlined in the given sentence</strong></p> <p>During the monsoon season, there was a _____________ downpour, <ins><strong>with rain falling rapidly and in copious quantities</strong></ins>, flooding the streets within minutes.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Torrential", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Calamitous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Arid", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Majestic"], "correct_answer": 0, "solution": "A) <strong>Torrential</strong> (adjective) – Relating to or resembling a very heavy downpour of rain मूसलधार"}, {"id": "117765", "question": "<strong>Select the most appropriate spelling of the underlined word in the given sentence.</strong></p> <p>She felt <ins><strong>embarass</strong> </ins>after her mistake.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> embberass", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> embarrass", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> embaress", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> embaraas"], "correct_answer": 1, "solution": "'embarrass' is the correct spelling, with two 'r's and two 's's, meaning to feel ashamed or self-conscious; Like— She felt embarrassed after her mistake."}, {"id": "117770", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>It is important to adhere ______________ the rules if you want to succeed in any organization.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> For", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> On", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Over"], "correct_answer": 2, "solution": "'To' should be used because \"adhere to\" means to follow or stick to the rules. 'For', 'On', and 'Over' are incorrect prepositions in this context as they don't fit the verb 'adhere'."}, {"id": "117769", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The teacher tried to _____________ the students' understanding by asking a few complex questions.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Reinstate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Infest", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Gauge", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Plebiscite"], "correct_answer": 2, "solution": "'Gauge' should be used because it means to measure or assess. Here, the teacher was trying to assess the students' understanding, so 'gauge' fits. Whereas, 'Reinstate' means to restore, 'Infest' means to invade or infect, and 'Plebiscite' means a referendum, which do not fit in this context."}, {"id": "117755", "question": "<strong>Select the option that expresses the given sentence in direct speech.</strong></p> <p>The Colonel said that it gave him great pleasure to be there that evening", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Colonel said, “It gave me great pleasure to be there that evening.”", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The Colonel said, “It gives me great pleasure to be here this evening.”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Colonel said, “It gave him great pleasure to be there that evening.”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Colonel says, “It gives me great pleasure to be there that evening.”"], "correct_answer": 1, "solution": "Indirect Speech को Direct Speech में बदलने के लिए <strong>Reporting Verb + Pronoun Change + Tense Change + Time/Place Expression Change</strong> का प्रयोग किया जाता है। वाक्य ‘The Colonel said that it gave him great pleasure to be there that evening’ को Direct Speech में बदलते समय Verb ‘gave’ को Present Tense के अनुसार ‘gives’ में बदला गया है। Pronoun ‘him’ को ‘me’ और Place Expression ‘there’ को ‘here’ में बदल दिया गया है। Time Expression ‘that evening’ को ‘this evening’ में बदला गया है। इसलिए सही उत्तर <strong>(The Colonel said, “It gives me great pleasure to be here this evening.”)</strong> है।"}, {"id": "117766", "question": "<strong>Select the most appropriate idiom to fill in the blank given the underlined segment in the following sentence</strong></p> <p>The CEO issued a ______________, <ins><strong>a clear and strong request to take action</strong></ins>, urging all employees to contribute towards the company's sustainability goals.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cold shoulder", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cry over spilled milk", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Feather in one’s cap", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Clarion call"], "correct_answer": 3, "solution": "D) <strong>Clarion call</strong> (idiom) – A strong and clear request for people to take action स्पष्ट और मजबूत आह्वान"}, {"id": "117768", "question": "<strong>Select the most appropriate meaning of the underlined idiom</strong></p> <p>Organizing the international conference with such short notice was <ins><strong>a Herculean task</strong></ins>, but the team managed to pull it off successfully.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A task that requires little effort", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> A task that is extremely difficult and requires great strength or effort", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A task that is enjoyable and fun", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A task that can be completed quickly and easily"], "correct_answer": 1, "solution": "B) <strong>A task that is extremely difficult and requires great strength or effort</strong> – Herculean task (idiom) – एक ऐसा कार्य जो बहुत कठिन हो और बहुत शक्ति या प्रयास की आवश्यकता हो"}, {"id": "117753", "question": "Select the option that expresses the given sentence in direct speech.</p> <p><strong>He told me that I could eat from his plate.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said, “ You can eat from my plate.”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said to me, “Can you eat from my plate?”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said, “I can eat from my plate.”", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He said to me, “You can eat from my plate.”"], "correct_answer": 3, "solution": "Indirect Speech को Direct Speech में बदलने के लिए <strong>Reporting Verb + Pronoun Change + Tense Change</strong> का नियम प्रयोग किया जाता है। वाक्य में ‘He told me that I could eat from his plate’ को Direct Speech में बदलते समय Reporting Verb ‘told me’ को ‘said to me’ में बदल दिया गया है। Pronoun ‘I’ को ‘you’ और ‘his plate’ को ‘my plate’ में बदला गया है। Verb ‘could eat’ को Present Tense में बदलकर ‘can eat’ किया गया है। अतः सही उत्तर <strong>(He said to me, “You can eat from my plate.”)</strong> है।"}, {"id": "117750", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>Ishika saw the tiger in the forest", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The tiger saw by Ishika in the forest.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The tiger was seen by the forest in Ishika.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The tiger was seen by Ishika in the forest.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The tiger sees Ishika in the forest."], "correct_answer": 2, "solution": "(C) 'saw' के बदले 'was seen' का प्रयोग होगा। Passive Voice में हमेशा 'To Be' [is/are/am/was/were/be/being/been] + V³ [Verb का Past Participle रूप] का प्रयोग होता है, जैसे—"}, {"id": "117801", "question": "<strong>Some sentences are given below. While the first and the last sentences (1 and 2) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>1. By awarding the Nobel Prize in Literature to South Korean poet and novelist Han Kang this year, the Swedish Academy has done two things.</p> <p>A. It has looked eastwards, after going with European writers Jon Fosse and Annie Ernaux in the past two years; and it celebrates an “innovator in contemporary prose”.</p> <p>B. Her best-known work available in English is her 2007 novel, The Vegetarian, translated by Deborah Smith, and released in 2015.</p> <p>C. While announcing the name, the academy lauded the 53-year-old writer, the first Korean to win the Nobel Prize in Literature, “for her intense poetic prose that confronts historical traumas and exposes the fragility of human life”.</p> <p>D. With the human condition as her muse, specifically the question why and how humanity encompasses unspeakable depravity rt decided to acquit the accused."}, {"id": "117751", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>Lovely tunes are composed by Domnica", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Domnica composed lovely tunes.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Domnica composes tunes lovely.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Domnica will compose lovely tunes.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Domnica composes lovely tunes."], "correct_answer": 3, "solution": "(D) 'are composed' के बदले 'composes' का प्रयोग होगा। Active Voice में हमेशा 'Subject + V¹ [Verb का Base Form] + Object' का प्रयोग होता है, जैसे—"}, {"id": "117767", "question": "<strong>Select the most appropriate idiom for the underlined segment.</strong></p> <p>The rebellious teenager would often flout the school rules, <strong><ins>openly showing contempt and a lack of respect for</ins> </strong>authority.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Cock a snook", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Jump on the bandwagon", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Burn the midnight oil", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> On cloud nine"], "correct_answer": 0, "solution": "A) <strong>Cock a snook</strong> (idiom) – To openly show contempt or disrespect towards authority or ru aged to submit the project the previous night"], "correct_answer": 0, "solution": "Direct Speech को Indirect Speech में बदलने के लिए <strong>Reporting Verb + Pronoun Change + Tense Change + Time Expression Change</strong> का प्रयोग किया जाता है। वाक्य में ‘The employee said, “I somehow managed to submit the project last night.”’ को Indirect Speech में बदलते समय Verb ‘managed’ को Past Perfect Tense के अनुसार ‘had managed’ में बदला गया है। Pronoun ‘I’ को ‘he’ में बदल दिया गया है, और Time Expression ‘last night’ को Indirect Speech में ‘the previous night’ में परिवर्तित किया गया है। अतः सही उत्तर <strong>(The employee said that he had somehow managed to submit the project the previous night)</strong> है।"}, {"id": "117773", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>The detective's quick thinking helped <ins><strong>foil</strong> </ins>the thief's plan to rob the bank.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Tardy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Muddle", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Thwart", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Fortify"], "correct_answer": 2, "solution": "Synonym: <strong>Thwart</strong> (verb) – to prevent someone from accomplishing something, frustrate. विफल करना"}, {"id": "117802", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong><br> The blast at pharma company Escientia’s plant in the Atchutapuram Special Economic Zone (SEZ) in Anakapalli district, Andh  a pharma plant, at the same SEZ, ____2_____ deaths and injuries. The Atchutapuram SEZ, among the State’s largest SEZs, is home to the factories of more than 100 companies. The rash of accidents revives memories of another deadly accident on May 7, 2020 — 12 people died after a styrene monomer vapour leak from a polymers unit at Venkatapuram village on the ____3_____of Visakhapatnam. These accidents raise serious questions about the _____4____ of industrial safety in Andhra Pradesh, more specifically in the SEZ.</p> <p><strong>Select the most appropriate option to fill in blank number 3.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> stronghold", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> outskirts", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> fortress", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> adjacent"], "correct_answer": 1, "solution": "No solution available"}, {"id": "117805", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong><br> The blast at pharma company Escientia’s plant in the Atchutapuram Special Economic Zone (SEZ) in Anakapalli district, Andhra Pradesh, ____1____the worst industrial accident in the region in recent times. Seventeen workers have died and many have been injured. On the same day, about 10 workers suffered injuries in a fire accident at a chemical factory in the same SEZ. Last year, on June 30, a massive explosion rocked a pharma plant, at the same SEZ, ____2_____ deaths and injuries. The Atchutapuram SEZ, among the State’s largest SEZs, is home to the factories of more than 100 companies. The rash of accidents revives memories of another deadly accident on May 7, 2020 — 12 people died after a styrene monomer vapour leak from a polymers unit at Venkatapuram village on the ____3_____of Visakhapatnam. These accidents raise serious questions about the _____4____ of industrial safety in Andhra Pradesh, more specifically in the SEZ.</p> <p><strong>Select the most appropriate option to fill in blank number 4</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Direction", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Outlook", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Terrain", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> State"], "correct_answer": 3, "solution": "No solution available"}, {"id": "117806", "question": "<strong>Comprehension:</strong><br> The southwest monsoon season had a poor start, with all-India rainfall in June 10.9 per cent below the long period average (“normal”) for the month. The rains were subpar everywhere, save the South, Maharashtra, west Madhya Pradesh and east Rajasthan. But as El Niño ebbed and transitioned into a “neutral” phase, July recorded 9 per cent above-normal rains, with all regions, barring the North and East, receiving robust precipitation. The current month has been even better — 26 per cent above normal rainfall, taking the cumulative surplus for the season (June-September) to 6.3 per cent till August 12. The deficiency is now largely in Bihar, Jharkhand and parts of Northwest India where farmers have access to irrigation. In short, the monsoon has been good so far, while also helping recharge groundwater tables and fill up the country’s major reservoir dams to 64.7 per cent of full storage capacity — more than 60.8 per cent last year and the 53.7 per cent 10-year-average for this time.</p> <p>The well-distributed rains, both spatially and temporally, have led to increased area sown under all big-ticket kharif crops — paddy, pulses, maize and oilseeds. There are exceptions like cotton, whose acreage has fallen more due to farmers switching to groundnut, maize or paddy: Pink bollworm insect attacks, and no significant yield-protecting technologies after Bt cotton, have made them hesitant in growing the fibre crop. With global weather agencies predicting a La Niña — El Niño’s “cool cousin” generally known to boost rainfall activity in India — to develop by September and persist through winter and spring, the prospects appear encouraging for the upcoming rabi cropping season as well. The last El Niño from April 2023 to almost May this year not only suppressed the monsoon and post-monsoon rains, but also probably contributed to the winter’s late arrival and higher-than-normal temperatures, especially in Central and South Peninsular India. A La Niña, hopefully, will deliver the opposite.</p> <p>A munificent monsoon and no heat waves will provide welcome relief on food inflation. The latter ruled above 8 per cent year on year for eight straight months from November 2023, falling to 5.4 per cent in July only thanks to a high base inflation of 11.5 per cent last year for the same month. The Reserve Bank of India has refrained from cutting its interest rates — rightly so, knowing how food prices matter in influencing inflation expectations among Indian households and firms. A bumper kharif harvest and benign global prices with no fresh supply shocks could ease food inflationary pressures going forward. That should provide room for the government to lift export and stocking limit curbs on cereals, sugar and pulses, even while keeping the zero/low duty import window open on all major food commodities.</p> <p><strong>Which of the following can be inferred from the passage about the effect of the monsoon on the Indian economy?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The poor start of the monsoon season led to a decline in the kharif crop area.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The improved monsoon conditions may help stabilize food prices", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The monsoon has no significant impact on India’s inflation.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The rainfall deficit is too large to recover this season."], "correct_answer": 1, "solution": "No solution available"}, {"id": "117807", "question": "<strong>Comprehension:</strong><br> The southwest monsoon season had a poor start, with all-India rainfall in June 10.9 per cent below the long period average (“normal”) for the month. The rains were subpar everywhere, save the South, Maharashtra, west Madhya Pradesh and east Rajasthan. But as El Niño ebbed and transitioned into a “neutral” phase, July recorded 9 per cent above-normal rains, with all regions, barring the North and East, receiving robust precipitation. The current month has been even better — 26 per cent above normal rainfall, taking the cumulative surplus for the season (June-September) to 6.3 per cent till August 12. The deficiency is now largely in Bihar, Jharkhand and parts of Northwest India where farmers have access to irrigation. In short, the monsoon has been good so far, while also helping recharge groundwater tables and fill up the country’s major reservoir dams to 64.7 per cent of full storage capacity — more than 60.8 per cent last year and the 53.7 per cent 10-year-average for this time.</p> <p>The well-distributed rains, both spatially and temporally, have led to increased area sown under all big-ticket kharif crops — paddy, pulses, maize and oilseeds. There are exceptions like cotton, whose acreage has fallen more due to farmers switching to groundnut, maize or paddy: Pink bollworm insect attacks, and no significant yield-protecting technologies after Bt cotton, have made them hesitant in growing the fibre crop. With global weather agencies predicting a La Niña — El Niño’s “cool cousin” generally known to boost rainfall activity in India — to develop by September and persist through winter and spring, the prospects appear encouraging for the upcoming rabi cropping season as well. The last El Niño from April 2023 to almost May this year not only suppressed the monsoon and post-monsoon rains, but also probably contributed to the winter’s late arrival and higher-than-normal temperatures, especially in Central and South Peninsular India. A La Niña, hopefully, will deliver the opposite.</p> <p>A munificent monsoon and no heat waves will provide welcome relief on food inflation. The latter ruled above 8 per cent year on year for eight straight months from November 2023, falling to 5.4 per cent in July only thanks to a high base inflation of 11.5 per cent last year for the same month. The Reserve Bank of India has refrained from cutting its interest rates — rightly so, knowing how food prices matter in influencing inflation expectations among Indian households and firms. A bumper kharif harvest and benign global prices with no fresh supply shocks could ease food inflationary pressures going forward. That should provide room for the government to lift export and stocking limit curbs on cereals, sugar and pulses, even while keeping the zero/low duty import window open on all major food commodities.</p> <p><strong>The southwest monsoon started poorly, but as El Niño ebbed and transitioned into a “neutral” phase, July recorded ______ per cent above-normal rains.< iño from April 2023 to almost May this year not only suppressed the monsoon and post-monsoon rains, but also probably contributed to the winter’s late arrival and higher-than-normal temperatures, especially in Central and South Peninsular India. A La Niña, hopefully, will deliver the opposite.</p> <p>A munificent monsoon and no heat waves will provide welcome relief on food inflation. The latter ruled above 8 per cent year on year for eight straight months from November 2023, falling to 5.4 per cent in July only thanks to a high base inflation of 11.5 per cent last year for the same month. The Reserve Bank of India has refrained from cutting its interest rates — rightly so, knowing how food prices matter in influencing inflation expectations among Indian households and firms. A bumper kharif harvest and benign global prices with no fresh supply shocks could ease food inflationary pressures going forward. That should provide room for the government to lift export and stocking limit curbs on cereals, sugar and pulses, even while keeping the zero/low duty import window open on all major food commodities.</p> <p><strong>Which of the following statements is true according to the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The cumulative rainfall for the season till August 12 is below the long period average.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Reserve Bank of India has cut interest rates due to falling food inflation.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Bihar and Jharkhand are among the regions with rainfall deficiencies this season.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> La Niña typically leads to a decrease in rainfall activity in India."], "correct_answer": 2, "solution": "No solution available"}, {"id": "117810", "question": "<strong>Comprehension:</strong><br> India’s return of six medals from the just-concluded Paris Olympics can be termed underwhelming at best. The nation secured one silver and five bronze medals, down from seven at Tokyo 2020 that included a gold and two silvers. At a time when the country is looking to diversify its sporting excellence, has found exuberant support from the government and big corporates, and was aiming for a double-digit medal yield, the Olympic fortnight belied expectations. There were indeed new heroes — shooters Manu Bhaker, Sarabjot Singh and Swapnil Kusale, and wrestler Aman Sehrawat are now household names. The men’s hockey team finishing on the podium for a second straight time and Neeraj Chopra adding a silver to his historic javelin gold from Tokyo are top-notch efforts. But the dependence on a select few to repeatedly deliver, the near-zero presence in disciplines such as swimming and gymnastics, and wrestler Vinesh Phogat being disqualified for being above the weight threshold cast a dark shadow. The need of the hour is thus to broaden the base, increase participation and distribute funding more equitably to usher in a grass-roots revolution. The onus is also on the Union Sports Ministry to bring errant federations — often dens of nepotism and corruption — in line with the National Sports Code, fix accountability and decentralise governance.</p> <p> </p> <p>As much as the Olympics is about winning and the shaping of national identities, it is also the greatest stage on earth to showcase the triumph of human will. This was best exemplified by the Netherlands’ Sifan Hassan, the first since Emil Zatopek in 1952 to collect medals in 5,000m, 10,000m and marathon, Kenya’s Faith Kipyegon, the first woman to win three consecutive 1,500m titles, Cuba’s Mijain Lopez, who won a fifth individual gold on the trot in 130kg Greco-Roman wrestling, Novak Djokovic, who at 37 and with a surgically repaired knee, won the elusive singles gold in tennis, and Algerian boxer Imane Khelif, who braved incendiary attacks on her gender to rise to the top. Sweden’s Armand Duplantis broke the men’s pole vault record for an astonishing ninth time (6.25m) while swimmer Katie Ledecky, gymnast Simone Biles and hurdler Sydney McLaughlin-Levrone achieved transcendence by stretching their numbers to nine, seven and four Olympic golds, respectively. France did well as a host, winning 16 golds, its best figures in a century. The star was 22-year-old swimmer Leon Marchand, who bagged four golds to position himself as the best of this generation. Athletics, in the post- Usain Bolt era, was on the lookout for one such champion, but as Paris proved, that is a tough act to follow.​</p> <p><strong>What does the author suggest as the most necessary step for India to improve its Olympic performance?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Increasing funding for high-performing athletes.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ensuring that government and corporate sponsorships are maintained.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Broadening the base of sports participation and funding distribution.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Emphasizing only on sports where India has traditionally excelled."], "correct_answer": 2, "solution": "No solution available"}, {"id": "117811", "question": "<strong>Comprehension:</strong><br> India’s return of six medals from the just-concluded Paris Olympics can be termed underwhelming at best. The nation secured one silver and five t- Usain Bolt era, was on the lookout for one such champion, but as Paris proved, that is a tough act to follow.​</p> <p><strong>Why is Sifan Hassan’s achievement in the Olympics considered extraordinary according to the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She was the first to win three consecutive 1,500m titles", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She competed in and medaled in multiple long-distance events", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She broke the men’s pole vault record for the ninth time", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She won five individual gold medals in Greco-Roman wrestling."], "correct_answer": 1, "solution": "No solution available"}, {"id": "117814", "question": "<strong>Comprehension:</strong></p> <p>Independent India's first law minister B R Ambedkar often argued that the core purpose of the Constitution was promoting social inclusion. Although he focused on caste hierarchy and didn't address challenges faced by sexual minorities, his words and the Constitution have helped many fight their social, economic and political exclusion. The pace of social change has been glacial since then, but also promising, at times. If the decriminalisation of Section 377 was one such moment, the recent appointment of Anish Gawande, an LGBTQ+ rights activist and first openly gay person to join the Indian political landscape, as NCP(SP)'s national spokesperson is another example of India becoming freer in accepting and normalising sexual diversity. The NCP(SP) leadership must be congratulated for this appointment.</p> <p>Gawande, who founded Pink List India, a database of politicians suppo const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
