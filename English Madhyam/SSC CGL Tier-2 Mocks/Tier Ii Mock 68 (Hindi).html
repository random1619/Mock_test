<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 68 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

 am going) और 'asked if he might get' को 'May I get' में बदला जाएगा।<br> सही वाक्य होगा — <strong>He said, “I’m going for shopping. May I get you anything?”</strong>"}, {"id": "115869", "question": "<strong>The following sentence has been split into segments. Identify the segment that contains a grammatical error</strong></p> <p>The sooner you start preparing for the exam, the fast you will be able to complete the syllabus and achieve better results.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The sooner you start preparing for the exam", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> the fast you will be able to complete", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> the syllabus and achieve better results.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No error."], "correct_answer": 1, "solution": "(i) The more he gets, the more he wants."}, {"id": "115865", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>The company’s reckless decisions could <ins><strong>jeopardise</strong> </ins>its future in the market.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Safeguard", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Endanger", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Impair", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Compromise"], "correct_answer": 0, "solution": "Antonym: <strong>Safeguard</strong> (verb) – To protect from harm or damage; to ensure the safety of something. <strong>सुरक्षित</strong><strong> </strong><strong>करना</strong>"}, {"id": "115867", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>The University of Delhi (DU) will allow students to pursue (A)/two degree programmes simultaneously within the university. (B)/ While the first degree has to be pursue in a regular mode from any DU college or department, (C)/ the other one has to be pursued from an open and distance learning (ODL) mode from the School of Open Learning (D)", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (A)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (B)", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> (C)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (D)"], "correct_answer": 2, "solution": "'pursue' is incorrect because in the sentence 'While the first degree has to be pursue in a regular mode,' the Past Participle form of the Verb 'pursued' should be used after 'has to be.' Hence, the correct sentence would be — 'While the first degree has to be pursued in a regular mode from any DU college or department'."}, {"id": "115863", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>The <strong>vindictive</strong> manager continued to find faults in the employee’s work, even after the issue was resolved.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Spiteful", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Benign", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Scrupulous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Arbitrary"], "correct_answer": 0, "solution": "<strong>Synonym: Spiteful (adjective) – </strong>Showing or caused by malice; wanting to cause harm or suffering to someone. द्वेषपूर्ण"}, {"id": "115852", "question": "<strong>Select the word which means the same as the group of words underlined in the given sentence</strong></p> <p>Due to budget constraints, the management decided <ins><strong>to put the expansion project on hold</strong></ins> until a more favorable time.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Camouflage", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Shelve", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Evasion", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Avoidance"], "correct_answer": 1, "solution": "B) <strong>Shelve</strong> (verb) – To decide not to proceed with a project temporarily स्थगित करना"}, {"id": "115859", "question": "<strong>Select the most appropriate meaning of the underlined idiom</strong></p> <p>The recent economic crisis has <ins><strong>taken a toll on</strong></ins> many small businesses, leading to numerous closures and financial instability.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Had a positive impact on", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Caused severe damage to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Facilitated growth of", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Brought new opportunities to"], "correct_answer": 1, "solution": "<strong>B)</strong> <strong>Taken a toll on</strong> (idiom) – <strong>Caused severe damage to</strong> (गंभीर क्षति पहुँचाना)"}, {"id": "115862", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The increasing pollution levels have become a significant __________ to the health of the city's residents.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Remedy", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Menace", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Panacea", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Jubilee"], "correct_answer": 1, "solution": "'Menace' will be used because it means a threat or source of danger. The sentence mentions that increasing pollution levels have become a significant threat to the health of the city's residents, making 'menace' appropriate here. Whereas, 'Remedy' means a cure, 'Panacea' means a solution to all problems, and 'Jubilee' implies a celebration, which do not fit in this context."}, {"id": "115864", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>The committee is struggling to resolve the <ins><strong>thorny</strong> </ins>issue of budget allocation for the upcoming fiscal year.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Perfunctory", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Problematic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Equitable", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Trivial"], "correct_answer": 1, "solution": "<strong>Synonym: Problematic (adjective) – </strong>Posing a problem or difficulty, challenging, perplexing. समस्याजनक"}, {"id": "115849", "question": "<strong>Select the option that expresses the given sentence in indirect speech</strong>.</p> <p>The passenger says to the railway clerk, “Is the train late?”</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The passenger asks the railway clerk was the train late.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The passenger asked the railway clerk was the train late.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The passenger asks the railway clerk if the train is late.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The passenger has asked the railway clerk whether the train is late."], "correct_answer": 2, "solution": "Indirect Speech में Reporting Verb 'says to' को 'asks' में बदला जाता है और Interrogative Sentence को Indirect Speech में बदलते समय ‘if’ या ‘whether’ का प्रयोग किया जाता है। वाक्य का Tense Reporting Verb 'says' के अनुसार Present में रहेगा, इसलिए 'is' का प्रयोग होगा।<br> सही वाक्य होगा — 'The passenger asks the railway clerk if the train is late.'"}, {"id": "115834", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Select the option that gives their correct logical sequence.</strong><br> A. India and China, having more than 1 billion people each, are front runners to become superpowers, but India has an edge over China as the latter has an autocratic rule, while India follows democracy.<br> B. Superpower means a super economy that matches demand and supply.<br> C. That is a welfare economy.<br> D. More products mean more industries, employment, supply of currency, healthy people, and education.<br> E. More human development means more purchasing power and more demand for products.<br>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DECAB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ADEAB", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ABEDC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CBEDA"], "correct_answer": 2, "solution": "<strong>C) ABEDC</strong><br> A: Paragraph की starting A से होती है, क्योंकि यह बताता है कि भारत और चीन, दोनों 1 बिलियन से अधिक जनसंख्या वाले देश, सुपरपावर बनने की होड़ में हैं, लेकिन भारत का लोकतांत्रिक शासन (democracy) उसे चीन के अधिनायकवादी शासन (autocratic rule) से आगे रखता है। <br> B: इसके बाद B आता है, जो superpower की परिभाषा (definition) बताता है—एक ऐसी महान अर्थव्यवस्था (super economy) जो मांग और आपूर्ति (demand and supply) को संतुलित करती है। यह sentence A में बताए गए विषय की व्याख्या करता है।<br> E: इसके बाद E आता है, जो बताता है कि अधिक मानव विकास (human development) से अधिक खरीद क्षमता (purchasing power) और उत्पादों की अधिक मांग (demand for products) होती है। <br> D: इसके बाद D आता है, जो बताता है कि अधिक मांग (more demand) का परिणाम अधिक उत्पादों (more products) के रूप में होता है, जो अर्थव्यवस्था के विभिन्न क्षेत्रों जैसे उद्योग, रोजगार, मुद्रा की आपूर्ति (supply of currency), स्वस्थ लोग, और शिक्षा को बढ़ावा देता है।<br> C: अंत में C आता है, जो बताता है कि यह पूरा चक्र एक welfare economy कहलाता है। <br> <strong>Explanation in English </strong><br> A starts with a clear subject, “India and China,” and introduces the main idea. <br> B follows grammatically as it introduces the term superpower and provides a definition for it. This links directly to the countries mentioned in A, giving a clear explanation of what being a superpower means.<br> E uses a cause-and-effect structure: “More human development means more purchasing power and more demand for products.” This structure is logical after B, as it explains what leads to a super economy.<br> D elaborates on the effect mentioned in E, providing a list of outcomes resulting from more demand. The sequence “more products mean more industries, employment, supply of currency, healthy people, and education” logically follows E.<br> C sums up the entire paragraph with a concluding statement: “That is a welfare economy.” It’s a short, declarative sentence that serves as a conclusion, tying all previous points together."}, {"id": "115850", "question": "<strong>Select the option that expresses the given sentence in indirect speech.</strong></p> <p>Pawan said, “I am preparing hot coffee for you.”", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Pawan said that he was preparing hot coffee for me.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pawan had said that he was preparing hot coffee for me.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pawan has said that he was preparing hot coffee for me.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pawan says that he was preparing hot coffee for me."], "correct_answer": 0, "solution": "Direct Speech में Present Continuous Tense (am preparing) को Indirect Speech में Past Continuous Tense (was preparing) में बदला जाएगा और Personal Pronouns 'I' को 'he' तथा 'you' को 'me' में बदलना होगा।<br> सही वाक्य होगा — 'Pawan said that he was preparing hot coffee for me.'"}, {"id": "115853", "question": "<strong>Select the most appropriate option to substitute the underlined segment in the given sentence.</strong></p> <p>The company spent millions on marketing campaigns to <ins><strong>residue</strong> </ins>their latest product, hoping to boost sales and attract more customers.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Leftover", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Tout", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Excess", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Remnant"], "correct_answer": 1, "solution": "<strong>Tout'</strong> will be used because 'residue' means 'remaining part', which is not suitable in the context of this sentence. Here, 'tout' means 'to promote or advertise', which aligns with the intention of boosting sales and attracting more customers; Like—The company spent millions on marketing campaigns to tout their latest product, hoping to boost sales and attract more customers."}, {"id": "115858", "question": "<strong>Select the most appropriate idiom to fill in the blank</strong></p> <p>After two years spent teaching overseas, she returned home for a month to ______________ her life.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Stay the course", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Draw to a close", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Take stock of", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Turn a blind eye"], "correct_answer": 2, "solution": "C) <strong>Take stock of</strong> (idiom) – to review or assess a situation carefully. स्थिति का मूल्यांकन करना"}, {"id": "115857", "question": "<strong>Select the most appropriate idiom for the underlined segment in the following sentence</strong></p> <p>Despite the setbacks, the team decided <ins><strong>to press on with even more determination</strong></ins> and complete the project ahead of schedule", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Coil up", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Double down on", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Wean away", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Gain traction"], "correct_answer": 1, "solution": "B) <strong>Double down on </strong>(idiom) – To strengthen one's commitment to a strategy or course of action, especially one that is potentially risky. <strong>जोखिम</strong> <strong>भरे</strong> <strong>कदम</strong> <strong>को</strong> <strong>और</strong> <strong>मजबूत</strong> <strong>तरीके</strong> <strong>से</strong> <strong>लेना</strong>"}, {"id": "115847", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong>.</p> <p>The police had caught the thief on the day before yesterday", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The thief has been caught by the police on the day before yesterday.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The thief was being caught by the police on the day before yesterday.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The thief had been caught by the police on the day before yesterday.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The thief had caught by the police on the day before yesterday"], "correct_answer": 2, "solution": "'The thief' (Object) को पहले रखा गया है और फिर 'had been caught' का प्रयोग किया गया है। Past Perfect Tense में Passive Voice बनाने के लिए 'had been' + Verb की तीसरी (Past Participle) Form का प्रयोग होता है; जैसे—<br> (i) <em>Active</em>: She had finished the work before evening.<br> (ii) <em>Passive</em>: The work had been finished by her before evening.<br> इसलिए, सही वाक्य होगा — 'The thief had been caught by the police on the day before yesterday.'"}, {"id": "115854", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a spelling error</strong></p> <p>His allegaince to the team / was unwavering / even during tough times / and challenges.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> His allegaince to the team", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> was unwavering", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> even during tough times", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> and challenges."], "correct_answer": 0, "solution": "A) The correct spelling of <strong>‘allegaince’</strong> is <strong>‘allegiance’</strong>, which means “loyalty or commitment to a group or cause” <strong>निष्ठा</strong> या <strong>वफादारी</strong>."}, {"id": "115856", "question": "<strong>Select the most appropriate spelling of the underlined word in the given sentence</strong></p> <p>He was stuck in a moral <ins><strong>dilema</strong></ins>.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> dillema", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> dilamma", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> dilemma", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> dilemna"], "correct_answer": 2, "solution": "C) The correct spelling of ‘dilema’ is <strong>‘dilemma’</strong>, which means “a situation in which a difficult choice has to be made between two or more alternatives” — <strong>दुविधा</strong><strong>, </strong><strong>कठिन</strong><strong> </strong><strong>परिस्थिति</strong>."}, {"id": "115845", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong>.</p> <p>The employer paid him the salary.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He was paid by the employer salary.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He was being paid the salary by the employer.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The salary was paid to him by the employer.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He had been paid the salary by the employer."], "correct_answer": 2, "solution": "'The salary' (Object) को पहले रखा गया है और फिर 'was paid to him' का प्रयोग किया गया है। जब किसी वाक्य में दो Objects (Indirect और Direct) होते हैं, तो Passive Voice बनाते समय Direct Object को पहले रखा जाता है, और Indirect Object (him) को ‘to’ या ‘for’ के साथ वाक्य में शामिल किया जाता है।<br> सही वाक्य: 'The salary was paid to him by the employer."}, {"id": "115832", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> P. I knew they were heading towards the finishing line of life’s race, <br> Q. but I did not foresee the race ending so soon<br> R. Two deaths in two weeks — first, my father and second, a close colleague — made me ponder the last rites of passage of humans<br> S. My father was 85, and the colleague was in his late 50s<br>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> RSPQ", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> SPRQ", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> SRPQ", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RQPS"], "correct_answer": 0, "solution": "S: इसके बाद S आता है, जो दोनों व्यक्तियों की उम्र के बारे में बताता है। लेखक का पिता 85 साल का था और सहयोगी की उम्र 50 के दशक के अंत में थी। यह sentence R में दी गई information को expend करता है"}, {"id": "115870", "question": "<strong>The following sentence has been split into segments. Identify the segment that contains a grammatical error</strong></p> <p>The manager suggested that the new plan (A)/ was the more effective than any previous (B)/ strategies implemented by the company (C) / no error (D)", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (A)", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> (B)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (C)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (D)"], "correct_answer": 1, "solution": "(i) He is better than you. [ना कि the better than]"}, {"id": "115868", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>The manager emphasized a significance of the employee's understanding of the policies and procedures to ensure smooth functioning.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The manager emphasized", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> a significance of the employee's understanding", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> of the policies and procedures", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to ensure smooth functioning"], "correct_answer": 1, "solution": "(i) The students of this class are naughty."}, {"id": "115851", "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>An agreement between governments or politicians to work together to achieve a particular aim", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Axis", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Rampage", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ceasefire", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Armistice"], "correct_answer": 0, "solution": "A) <strong>Axis</strong> (noun) – An agreement between governments or politicians to work together to achieve a particular aim. संधि"}, {"id": "115833", "question": "<strong> Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> a. Criticisms on drug abuse, sexual misconduct, and excessive dependence on technology abound.<br> b. In contemporary India, the younger generation frequently finds itself under scrutiny for perceived apathy towards health, career prospects, and social responsibilities.<br> c. However, such concerns often eclipse a fundamental consideration in youth development: the role of parenting.<br> d. As the primary agent of socialisation, the family exerts a profound influence on a child’s future, necessitating a critical examination of whether current parenting practices exacerbate these issues.<br>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> b, a, c, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, a, b, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> b, c, d, a", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, c, b, d"], "correct_answer": 0, "solution": "<strong>A) b, a, c, d</strong><br> b: Paragraph की starting b से होती है, क्योंकि यह introduction देता है कि आज के भारत (contemporary India) में युवा पीढ़ी (younger generation) को स्वास्थ्य, करियर, और सामाजिक जिम्मेदारियों (social responsibilities) के प्रति उदासीनता (apathy) के लिए अक्सर जांच-पड़ताल का सामना करना पड़ता है। <br> a: b के बाद a आता है, जो b में बताई गई जांच-पड़ताल (scrutiny) को और विस्तार से बताता है। इसमें यह कहा गया है कि युवा पीढ़ी पर नशीली दवाओं के दुरुपयोग (drug abuse), sexual misconduct, और excessive dependence on technology जैसे आरोप लगाए जाते हैं। यह वाक्य specific criticisms के उदाहरण देकर आगे बढ़ाता है।<br> c: next c आता है, जो एक counterpoint present करता है। यह बताता है कि ये concerns अक्सर youth development में एक मौलिक मुद्दे—पालन-पोषण की भूमिका (role of parenting)—को नजरअंदाज कर देती हैं। यह sentence चर्चा का focus बदलता है और family के प्रभाव की बात करता है।<br> d: अंत में d आता है, जो बताता है कि परिवार, जो कि primary agent of socialisation है, बच्चे के भविष्य पर गहरा प्रभाव डालता है। यह sentence यह प्रश्न उठाता है कि क्या वर्तमान पालन-पोषण प्रथाएं (parenting practices) इन समस्याओं को और बढ़ावा दे रही हैं।<br> <strong>Explanation in English</strong><br> b: The paragraph begins with b, as it introduces the main context, which is the scrutiny that the younger generation in contemporary India faces. This sentence establishes the issues the youth are perceived to have, such as apathy towards health, career prospects, and social responsibilities. <br> a: a logically follows b, giving examples of the criticisms faced by the younger generation, such as drug abuse, sexual misconduct, and excessive dependence on technology. This sentence builds on the scrutiny mentioned in b by specifying the types of criticisms aimed at the youth.<br> c: c comes next as it presents a counterpoint, suggesting that these concerns often overshadow a fundamental consideration in youth development—the role of parenting. This transition introduces the concept of parenting as a factor that is not given enough attention, shifting the focus from youth behavior to the influence of family.<br> d: d concludes the paragraph by elaborating on the role of parenting, stating that the family, being the primary agent of socialization, has a profound influence on a child’s future. It calls for a critical examination of whether current parenting practices might be contributing to the very issues criticized in a."}, {"id": "115855", "question": "<strong>There is a spelling error in the given sentence. Select the option that contains the INCORRECTLY spelt word</strong></p> <p>They had a heated arguement over the project deadline.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Heated", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Project", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Arguement", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Deadline"], "correct_answer": 2, "solution": "C) The correct spelling of ‘<strong>Arguement</strong>’ is ‘<strong>Argument</strong>,’ which means “a reason or set of reasons given with the aim of persuading others that an action or idea is right or wrong” (तर्क, बहस)."}, {"id": "115860", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The country decided to place an economic __________ on its neighboring nation due to its involvement in unlawful activities.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Embargo", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Encomium", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Zeal", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Foray"], "correct_answer": 0, "solution": "Embargo' will be used because it means an economic restriction or ban on another country. The sentence states that the country imposed an economic __________ on its neighboring nation due to involvement in unlawful activities, making 'embargo' the correct choice. On the other hand, 'Encomium' means praise, 'Zeal' means enthusiasm, and 'Foray' means a sudden attack or raid, which are not suitable for this context."}, {"id": "115846", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong>.</p> <p>The mechanic will repair the bicycle on Sunday", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The bicycle will repaired by the mechanic on Sunday.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The bicycle will be repaired by the mechanic on Sunday.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The bicycle would be repaired by the mechanic on Sunday.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The bicycle will be repairing by the mechanic on Sunday."], "correct_answer": 1, "solution": "'The bicycle' (Object) को पहले रखा गया है और फिर 'will be repaired' का प्रयोग किया गया है। Future Simple Tense में Passive Voice बनाने के लिए 'will be' + Verb की तीसरी (Past Participle) Form का प्रयोग होता है; जैसे—<br> (i) <em>Active</em>: She will complete the project tomorrow.<br> (ii) <em>Passive</em>: The project will be completed by her tomorrow.<br> इसलिए, सही वाक्य होगा — 'The bicycle will be repaired by the mechanic on Sunday.'"}, {"id": "115861", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The regime sought to __________ young minds with its biased ideology through controlled education and propaganda.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Intrigue", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Indoctrinate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Persecute", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Implicate"], "correct_answer": 1, "solution": "'Indoctrinate' will be used because it means to inculcate a particular ideology or belief system in someone's mind repeatedly or forcefully. The sentence states that the regime tried to influence young minds with its biased ideology through controlled education and propaganda, making 'indoctrinate' fitting here. Whereas, 'Intrigue' means to arouse curiosity, 'Persecute' means to oppress, and 'Implicate' means to accuse or involve someone in a crime, which don't fit in this context."}, {"id": "115784", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong><br> Himachal Pradesh’s move to raise the legal age of marriage for girls from 18 to 21 years g the Central Bill that also raised the girls’ age for marriage to 21, ______2_____deliberating ______3______ the matter. Its report is expected to ______4______ various concerns, including cultural sensitivities, socioeconomic factors and the potential impact on women’s rights and personal freedoms. The HP decision to act independently is both progressive and precipitous.</p> <p><strong>Select the most appropriate option to fill in blank number 3.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> in", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> for", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> on", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> by"], "correct_answer": 2, "solution": "No solution available"}, {"id": "115787", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong><br> Himachal Pradesh’s move to raise the legal age of marriage for girls from 18 to 21 years through the Prohibition of Child Marriage (Himachal Pradesh Amendment) Bill 2024 has _______1____ a debate, particularly given the ongoing national discussions on this issue. With the Central Government’s Prohibition of Child Marriage (Amendment) Bill still under review by a parliamentary panel, HP’s law raises questions about the implications of pre-empting the panel’s findings. The panel, tasked with examining the Central Bill that also raised the girls’ age for marriage to 21, ______2_____deliberating ______3______ the matter. Its report is expected to ______4______ various concerns, including cultural sensitivities, socioeconomic factors and the potential impact on women’s rights and personal freedoms. The HP decision to act independently is both progressive and precipitous.<br> <strong>Select the most appropriate option to fill in blank number 4</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Addressed", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Address", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Addressing", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Addresses"], "correct_answer": 1, "solution": "No solution available"}, {"id": "115788", "question": "Comprehension:</p> <p>Quantum physics has long been a source of fascination and wonder, given its profound insights into the fundamental nature of reality. Spirituality, on the other hand, elaborated by ancient texts such as the Vedas, has captured the human imagination for millennia, providing a robust framework for making sense of the universe and our place within it. While these two domains may seem disparate, their intriguing points of connection merit a deeper exploration. Quantum physics, the study of matter and energy dynamics at the smallest scale and the lowest level of granularity, has plausibly challenged conventional notions of reality. It also discusses the key role of consciousness in shaping reality. The double-slit experiment suggests that particles behave differently when observed as if they are responsive to consciousness. Similarly, the Vedas propose that consciousness is not a by-product of the material world but a fundamental aspect of reality, implying that the material and the spiritual are deeply entwined. The introduction of quantum physics added a new dimension to the erstwhile per uidelines underscore the importance of scrutinising labels beyond the attractive health claims. Terms like ‘natural’, ‘whole grain’ and ‘organic’ may not guarantee such qualities in the product. Manufacturers often exploit these terms to capitalise on consumer preferences for healthier options, while the actual contents may fall short of expectations. The ICMR also questions the nutrition claims — terms like ‘low calorie’ or ‘high fibre’ are vague assertions unless backed with concrete facts.</p> <p>Unfortunately, the ICMR’s advisory does not specifically address the needs of food allergy patients. For example, accurate labelling of gluten-free products is crucial to managing celiac disease and ensuring the wellbeing of the patients as even traces of gluten in foodstuffs can trigger adverse reactions in them. The medical body must advocate greater transparency and adherence to regulatory standards in gluten-free labelling. Misleading food labels contribute to the perpetuation of faulty dietary patterns, exacerbating obesity and other problems. The ICMR’s call to action is clear: consumers must exercise caution and diligence while making healthier choices for themselves and their families.</p> <p><strong>According to the passage, why might ‘sugar-free’ foods be misleading for consumers?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ‘Sugar-free’ foods are typically more expensive than regular foods and may not provide any additional health benefits.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Although labeled as ‘sugar-free’, these foods might contain high levels of fats, refined cereals, and hidden sugars, altering their nutritional profile.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ‘Sugar-free’ foods are often high in artificial sweeteners, which can be harmful if consumed in large quantities over a long period.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ‘Sugar-free’ foods often have fewer nutrients and vitamins compared to naturally sweet foods."], "correct_answer": 1, "solution": "No solution available"}, {"id": "115793", "question": "<strong>Comprehension:</strong><br> FOOD labels mention the contents of packaged products. But can they be taken at face value? Flagging the issue of misleading claims on labels that can adversely impact consumers’ choices, the Indian Council of Medical Research (ICMR) has issued a set of dietary guidelines.</p> <p>It points out the glaring example of the deceptive nature of ‘sugar-free’ foods. While these products may seem like a boon for diabetics or those watching their weight, they could be loaded with fats, refined cereals and hidden sugars, significantly altering their nutritional profile. Similarly, packaged fruit juices may have a meagre 10 per cent fruit pulp, with the rest containing added sugars and other additives. The guidelines underscore the importance of scrutinising labels beyond the attractive health claims. Terms like ‘natural’, ‘whole grain’ and ‘organic’ may not guarantee such qualities in the product. Manufacturers often exploit these terms to capitalise on consumer preferences for healthier options, while the actual contents may fall short of expectations. The ICMR also questions the nutrition claims — terms like ‘low calorie’ or ‘high fibre’ are vague assertions unless backed with concrete facts.</p> <p>Unfortunately, the ICMR’s advisory does not specifically address the needs of food allergy patients. For example, accurate labelling of gluten-free products is crucial to managing celiac disease and ensuring the wellbeing of the patients as even traces of gluten in foodstuffs can trigger adverse reactions in them. The medical body must ad ellbeing of the patients as even traces of gluten in foodstuffs can trigger adverse reactions in them. The medical body must advocate greater transparency and adherence to regulatory standards in gluten-free labelling. Misleading food labels contribute to the perpetuation of faulty dietary patterns, exacerbating obesity and other problems. The ICMR’s call to action is clear: consumers must exercise caution and diligence while making healthier choices for themselves and their families.</p> <p><strong>Based on the passage, which of the following can be inferred about the effectiveness of 'sugar-free' labels?</strong></p> <p><strong>(i) </strong> 'Sugar-free' labels can lead consumers to mistakenly believe that such products are universally healthy.</p> <p><strong>(ii) </strong>'Sugar-free' products might compensate for the lack of sugar by including other unhealthy ingredients.</p> <p><strong>(iii) </strong> Consumers should avoid all products labeled as 'sugar-free' to maintain a healthy diet.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> i and ii only", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ii and iii only", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> i and iii only", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> i, ii, and iii"], "correct_answer": 0, "solution": "No solution available"}, {"id": "115796", "question": "<strong>Comprehension:</strong></p> <p>The creation of the National Disaster Management Authority (NDMA) in 2005, prompted by the 1999 Odisha super cyclone and the 2004 tsunami, was a timely decision. Over the years, the NDMA has done commendable work in disaster mitigation, risk assessment and reduction, and post-disaster response, rescue and relief. It has also developed competencies in newer threats like heatwaves. Nearly every state now has a disaster management agency of its own, though some function less effectively than others. But the damage caused by landslides in the Northeast in the aftermath of cyclone Remal that hit the West Bengal coastline on Sunday night is the latest reminder of the urgent need to upgrade and overhaul the disaster management system.</p> <p>The nature of disasters that the country faces has changed drastically in the last 20 years. Disasters, especially those that are a result of extreme weather events, have become more frequent and intense. Climate change has been playing an important role in exacerbating the impacts. Events that were not looked at as potential disasters earlier, like the summer heat, have emerged as new threats. The most worrying development has been the rise in what are known as multi-hazard disasters, one event triggering another, or a series of other disasters, the cascading impacts of which result in a destruction that is much higher in magnitude. Heavy rainfall leads to breach of glacial lakes and landslides in hilly areas which results in flash floods downstream. Or, extreme heatwave triggers largescale forest fires. The recent episode of landslides in the Northeastern region, which has claimed at least 30 lives, was a similar multi-hazard disaster. Cyclone Remal caused heavy rainfall in the area which triggered landslides at several locations.</p> <p>Disaster management agencies need to be empowered to play a more pro-active role in dealing with these. More resources and capacity-building needs to flow in. There is little that can be done to prevent natural events, like extreme rainfall or cyclones or heatwaves. But man-made influences like unregulated construction can certainly be minimised. India is in the process of building infrastructure for its future. Resilience to disasters needs to be built into each of these. Old infrastructure also needs to be retrofitted. India has created an international organisation, the Coalition for Disaster Resilient Infrastructure (CDRI), specifically to promote disaster resilient infrastructure worldwide. It would be helpful to create the right templates at home first.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Urgent", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neutral", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Melancholic"], "correct_answer": 1, "solution": "No solution available"}, {"id": "115797", "question": "<strong>Comprehension:</strong><br> The creation of the National Disaster Management Authority (NDMA) in 2005, prompted by the 1999 Odisha super cyclone and the 2004 tsunami, was a timely decision. Over the years, the NDMA has done commendable work in disaster mitigation, risk assessment and reduction, and post-disaster response, rescue and relief. It has also developed competencies in newer threats like heatwaves. Nearly every state now has a disaster management agency of its own, though some function less effectively than others. But the damage caused by landslides in the Northeast in the aftermath of cyclone Remal that hit the West Bengal coastline on Sunday night is the latest reminder of the urgent need to upgrade and overhaul the disaster management system.</p> <p>The nature of disasters that the country faces has changed drastically in the last 20 years. Disasters, especially those that are a result of extreme weather events, have become more frequent and intense. Climate change has been playing an important const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
