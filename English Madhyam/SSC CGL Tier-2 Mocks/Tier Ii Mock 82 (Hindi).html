<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 82 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

low in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> P. The Government of National Capital Territory of Delhi (NCTD) Act, 1991 that effectively nullified the Supreme Court judgment of May 11 on the powers over bureaucratic appointments in Delhi<br> Q. On May 19 this year, the Union government promulgated an ordinance to amend<br> R. After an eight-year long protracted legal battle, a five-judge Constitution Bench led by the Chief Justice of India<br> S. D.Y. Chandrachud had unanimously held that the elected government of Delhi had legislative and administrative powers over “services”.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RSPQ", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> QPRS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QRPS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RQPS"], "correct_answer": 1, "solution": "<strong>Q - P:</strong> Sentence Q references an action (\"promulgated an ordinance to amend\") taken on May 19. Sentence P clarifies what was being amended, that is, the \"NCTD Act, 1991\", and it also mentions the judgment of May 11. So, P logically follows Q because it provides details on the amendment mentioned in Q and the previous judgment which took place on May 11.<br> <strong>R - S:</strong> Sentence R introduces a \"five-judge Constitution Bench led by the Chief Justice of India\", and Sentence S begins with \"D.Y. Chandrachud\". D.Y. Chandrachud is the Chief Justice referred to in R. Thus, S elaborates on the decision or holding made by the Constitution Bench led by D.Y. Chandrachud, making it the logical continuation of R."}, {"id": "28638", "question": "<strong>Q4. Select the ANTONYM of the word repel to fill in the blank.</strong></p> <p>Her bright blue eyes ________ everyone in the party.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> disgust", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> vacillate", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> attract", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> amenable"], "correct_answer": 2, "solution": "<strong>Antonym</strong>: <strong>Attract</strong> (verb) – Draw or pull someone or something towards them, appeal to, allure, entice. आकर्षित करना"}, {"id": "28639", "question": "<strong>Q5. Select the most appropriate meaning of the highlighted idiom.</strong></p> <p>Meera is not qualified much but has <strong>the art of speaking</strong>.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Gift of the gab", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hope against hope", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> An acid tongue", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A lick of paint"], "correct_answer": 0, "solution": "A) <strong>Gift of the gab</strong> (idiom) – the ability to speak easily and confidently, and to persuade people to do what you want. बातचीत की कला"}, {"id": "28640", "question": "<strong>Q6. Select the correct homonym from the given options to fill in the blank</strong>.</p> <p>I can’t _______ this heat anymore.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> beer", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> bare", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> bear", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> bier"], "correct_answer": 2, "solution": "C) 'Bear' का प्रयोग होगा क्योंकि \"bear\" का अर्थ होता है सहना । जबकि 'Beer' एक प्रकार की मदिरा होती है, 'Bare' का अर्थ होता है नंगा या खाली, और 'Bier' मरे हुए व्यक्ति को ले जाने के लिए एक प्लेटफार्म होता है, जो इस संदर्भ में सही नहीं है।"}, {"id": "28641", "question": "<strong>Q7. Sentences of a paragraph are given below in jumbled order. Select the option that gives their correct logical sequence.</strong><br> <br> A. Two cases of sexual harassment were reportedly registered on April 28, 2023 by the Delhi police against the president of the Wrestling Federation of India (WFI), after the intervention of the Supreme Court of India, based on a petition filed by a few wrestlers.<br> B. The cases were under the Protection of Children from Sexual Offences (POCSO) Act and the relevant sections of the Indian Penal Code (IPC) concerning the outraging of the modesty of a woman and sexual harassment, while the other was with respect to outraging the modesty of a woman under the IPC.<br> C. The protest by India’s medal winning wrestlers has been in the news for long.<br> D. They too offered to undergo a narco-analysis test when the accused offered to undergo any such test to prove his innocence.<br> E. While the investigation of these two cases is under way by the Delhi police, the complainant wrestlers are still consistent in their demand— the arrest of the accused.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DECAB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CBDEA", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> CABED", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CBEDA"], "correct_answer": 2, "solution": "<strong>C</strong>: This sentence seems to be an introduction, setting the context of the protest. We know that wrestlers have been protesting something."}, {"id": "28642", "question": "<strong>Q8. The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don’t find any error, mark ‘No error’ as your answer</strong></p> <p>Methanol is released from pectin, and is therefore many abundant in fermented fruit</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Methanol is released from pectin,", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> abundant in fermented fruit.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No error", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> and is therefore many"], "correct_answer": 3, "solution": "'many' का प्रयोग 'abundant' के पहले गलत है क्योंकि 'abundant' स्वयं में बड़ी मात्रा में मौजूद होने का अर्थ देता है। सही वाक्य होगा, \"Methanol is released from pectin, and is therefore abundant in fermented fruit.\""}, {"id": "28643", "question": "<strong>Q9. Select the most appropriate option to fill in the blank</strong>.</p> <p>My cousin owns a shop of food __________.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> additives", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> addetivis", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> aditives", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> addetives"], "correct_answer": 0, "solution": "A) 'Additives' का प्रयोग होगा क्योंकि \"additives\" का अर्थ होता है जो खाने के उत्पादों में जोड़े जाते हैं ताकि उसकी अवधि बढ़ सके, स्वाद में सुधार हो सके, या अन्य गुणवत्ता सुधार सके। 'Addetivis', 'Adivites', और 'Addetives' गलत spelling वाले शब्द हैं, जो सही नहीं हैं।"}, {"id": "28644", "question": "<strong>Q10. Find the part of the given sentence that has an error in it. If there is no error, choose ‘No error’.</strong></p> <p>Just because I am quiet doesn’t mean I can’t scold you.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Just because I am", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> No error", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I can’t scold you.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> quiet doesn’t mean"], "correct_answer": 1, "solution": "B) No error"}, {"id": "28645", "question": "Q11. Select the <strong>INCORRECTLY</strong> spelt word.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Fulfilling", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Fulfil", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Fulfilled", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Fullfil"], "correct_answer": 3, "solution": "D) The incorrectly spelled word among the given options is 'Fullfil'. The correct spelling is 'Fulfil'. Hence, the answer is option D."}, {"id": "28646", "question": "<strong>Q12. Select the option that expresses the given sentence in reported speech.</strong></p> <p>My friend Ganesh said, “I could solve the biggest problem very easily.”</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My friend Ganesh said that he could solved the biggest problem very easily.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My friend Ganesh said that he can solve the biggest problem very easily.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My friend Ganesh said that he would solve the biggest problem very easily.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> My friend Ganesh said that he could solve the biggest problem very easily."], "correct_answer": 3, "solution": "D) My friend Ganesh said that he could solve the biggest problem very easily."}, {"id": "28647", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>The poor fellow was laughed at by the crowd.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The crowd was laughed at the poor fellow.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The crowd had laughed at the poor fellow.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The crowd is laughed at the poor fellow.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The crowd laughed at the poor fellow"], "correct_answer": 3, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong> Passive वाक्य में <strong>\"The poor fellow\"</strong> <strong>(Subject)</strong> है, <strong>\"was laughed at\"</strong> <strong>(Verb - Past Simple Passive)</strong> है और <strong>\"by the crowd\"</strong> <strong>(Agent)</strong> है। Active में बदलने पर <strong>\"The crowd\"</strong> <strong>(Subject)</strong> बन गया है, Verb को <strong>\"laughed at\"</strong> <strong>(Past Simple Active)</strong> में बदला गया है और <strong>\"the poor fellow\"</strong> <strong>(Object)</strong> के रूप में प्रयोग किया गया है।"}, {"id": "28648", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>Priya washes her clothes in the evening</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The clothes was washed by Priya in the evening.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The clothes are washed by Priya in the evening.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The clothes is washed by Priya in the evening.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The clothes were washed by Priya in the evening."], "correct_answer": 1, "solution": "<strong>Active से Passive Voice में बदलने के लिए,</strong> Active वाक्य का <strong>Object</strong> Passive वाक्य का <strong>Subject</strong> बन जाता है। <strong>Verb</strong> को Active से Passive में बदलते समय सही <strong>Tense</strong> का प्रयोग किया जाता है। Active वाक्य में <strong>\"Priya\" (Subject)</strong>, <strong>\"washes\" (Verb in Present Simple)</strong>, और <strong>\"her clothes\" (Object)</strong> हैं। Passive में बदलने पर <strong>\"The clothes\" (Object → Subject)</strong> बन गया है। <strong>Verb को \"are washed\" (Present Simple Passive) में बदला गया है</strong>, और <strong>\"by Priya\"</strong> का प्रयोग किया गया है।"}, {"id": "28649", "question": "<strong>Q15. Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select ‘No substitution required’</strong>.</p> <p>I had only my class notes<ins> <strong>for which I had to</strong></ins> prepare for my examination.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> from whom I had to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No substitution required", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> with which I had to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> in which I have to"], "correct_answer": 2, "solution": "C) 'for which I had to' के बदले 'with which I had to' का प्रयोग होगा क्योंकि जब हम किसी चीज़ से तैयारी करते हैं तो 'with' का प्रयोग होता है।"}, {"id": "28650", "question": "<strong>Q16. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph</strong><br> <br> a. The European Union’s (EU) key climate law, the Carbon Border Adjustment Mechanism (CBAM), has spooked India.<br> b. While India’s exports may be limited to aluminium, iron, and steel, and affect only 1.8% of its total exports to the EU, India has reportedly decried CBAM as being protectionist and discriminatory.<br> c. New Delhi fears that CBAM will cripple the export of its carbon-intensive products to the EU.<br> d. There is also talk of challenging the CBAM at the World Trade Organization (WTO)’s dispute settlement body. This debate brings to the forefront the inter-linkages between trade and the environment.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, b, a, c", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, a, b, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, b, c, d", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> a, c, b, d"], "correct_answer": 3, "solution": "<strong>a-c:</strong> Sentence 'a' introduces the \"Carbon Border Adjustment Mechanism (CBAM)\" and mentions that it has \"spooked India\". Sentence 'c' picks up from this by mentioning \"New Delhi fears\" (continuing the theme of India's concerns) and elaborating on what specifically they fear about the CBAM. The use of the term \"CBAM\" in 'c' is a clear noun-pronoun relationship that signifies 'c' should come after 'a'."}, {"id": "28651", "question": "Q17. Select the most appropriate <strong>ANTONYM</strong> for ‘<strong>scarcity’</strong> in the given sentence.</p> <p>In spite of having ice glaciers across the globe, people don’t have excess of fresh drinking water.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Excess", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Water", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Glaciers", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Fresh"], "correct_answer": 0, "solution": "<strong>Antonym</strong>: <strong>Excess</strong> (noun) – Surplus, overabundance, oversupply, glut. अधिकता"}, {"id": "28652", "question": "<strong>Q18. Select the most appropriate option to fill in the blank</strong></p> <p>Plastic inhabits the oceans, ______ up in the guts of seagulls and great white sharks.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> building", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> burning", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> provoking", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> sailing"], "correct_answer": 0, "solution": "A) 'Building' का प्रयोग होगा क्योंकि \"building up\" का अर्थ होता है धीरे-धीरे बढ़ना या जमा होना। जबकि 'Burning' का अर्थ है जलना, 'Provoking' का अर्थ है उत्तेजना पैदा करना, और 'Sailing' का अर्थ है जल पर यात्रा करना, जो इस संदर्भ में सही नहीं है।"}, {"id": "28653", "question": "<strong>Q19. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <br> A. He says it is scary to think of what an unbridled AI can do to humanity.<br> B. The best way to predict the future is to invent it and the future so invented is feared by the very person who invented it!<br> C. The reasons given by Geoffrey Hinton, the godfather of artificial intelligence, for leaving the technology giant Google appear similar<br> D. Well, I suppose it includes healthcare.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDAC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABD", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BCAD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABCD"], "correct_answer": 2, "solution": "<strong>B-C:</strong> The \"very person who invented it\" in sentence B is referring to Geoffrey Hinton in sentence C. Hinton is known as one of the pioneers of deep learning, a subfield of artificial intelligence. Therefore, B leads to C"}, {"id": "28654", "question": "<strong>Q20. Select the option that expresses the given sentence in reported speech</strong>.</p> <p>She said, ”I called yesterday, but there was no response”.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She said that she had called the day before, but there was no response.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She said that I called day before, but there was no response.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She said I called yesterday, but there was no response.", "<p style=\"display:none\"><img alt=\"reload\" src=\ ution": "C) <strong>Rub in the wrong way </strong>(idiom) - To irritate or annoy someone. परेशान करना"}, {"id": "28659", "question": "<strong>Q25. Given below are four jumbled sentences. Select the option that gives their correct logical sequence.</strong><br> <br> P. I enjoyed running more than I thought I would actually and got addicted to it quickly.<br> Q. When you work hard in want of something and you do get it, your mind craves for more. The marathon bug bit me too.<br> R. I started running more than a decade ago to achieve sustained fitness.<br> S. Surprisingly, in addition to fitness, I got a meditative experience, which makes running my stress buster. It did not stop there.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> PSQR", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QSPR", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> RPSQ", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QSRP"], "correct_answer": 2, "solution": "<strong>R</strong>: This introduces the topic of the paragraph - the beginning of the narrator's journey in running."}, {"id": "28660", "question": "<strong>Q26. Select the most appropriate option to fill in the blank</strong>.</p> <p>Ashu is a dedicated guy, always ready to _________ for the betterment of his company.</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> snug as a bug in a rug", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> lose his marbles", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> rain on his parade", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> go the extra mile"], "correct_answer": 3, "solution": "D) <strong>Go the extra mile</strong> (phrase) – to make more effort than is expected of you. अतिरिक्त प्रयास करना"}, {"id": "28661", "question": "<strong>Q27. For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the appropriate sentences for S2 and S3, respectively</strong>.</p> <p><strong>S1</strong>: Church Street in Bangalore presents any avid reader with a special opportunity, with many bookshops of diverse formats accessible in a small area.</p> <p><strong>S4:</strong> Booklovers rarely clock more than 100 feet an hour on their fitness watches — hence the term “crawl” seems apt.</p> <p><strong>P:</strong> Writer and historian Ramachandra Guha recently spoke about these booksellers in a riveting lecture, part of a series about the “spirit of Bangalore”.</p> <p><strong>Q:</strong> Almost at the last lap of the cycle called life, I rewind the happenings and code them to evaluate the reason for the strong bond between me and me.</p> <p><strong>R:</strong> He described how he would spend the day going from one bookshop to another and return home with a bag replete with books. My cousin and I were inspired by this account and decided to emulate his “bookshop crawl”.</p> <p><strong>S:</strong> A path loaded with experiences and a process of learning all through.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and Q", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> P and R", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and S", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Q and S"], "correct_answer": 1, "solution": "B) <strong>P and R</strong>"}, {"id": "28662", "question": "<strong>Select the option that expresses the given sentence in active voice</strong></p> <p>The work will be finished by the mason within a short time.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The mason will be finishing the work within a short time.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The mason would have finish the work within a short time.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The mason would finish the work within a short time.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The mason will finish the work within a short time."], "correct_answer": 3, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong>, Passive वाक्य का Subject Active वाक्य का Object बन जाता है। Verb को Passive से Active में बदलते समय सही Tense का प्रयोग किया जाता है। Passive वाक्य में <strong>\"The work\"</strong> (Subject), <strong>\"will be finished\"</strong> (Verb in Future Passive) और <strong>\"by the mason\"</strong> (Agent) हैं। Active में बदलने पर Object <strong>\"The mason\"</strong> (Subject) बन गया है, Verb को <strong>\"will finish\"</strong> (Future Simple Active) में बदला गया है और <strong>\"the work within a short time\"</strong> के रूप में प्रयोग किया गया है।"}, {"id": "28663", "question": "<strong>Q29. Select the option that expresses the given sentence in indirect speech</strong>.</p> <p>Pawan said, “I am preparing hot coffee for you.”</p> <p> </p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" wards them, eager to see.</p> <p>‘Please, take what you like,’ Odysseus said. The girls moved swiftly to the tables, and I watched them fingering the bright trinkets: perfumes in delicate glass bottles stoppered with a bit of wax; mirrors with carved ivory for handles; bracelets of twisted gold; ribbons, dyed deep in purples and reds. Among these were a few things I assumed were meant for Lycomedes and his counsellors: leather-bound shields, carved spear hafts, and silvered swords with supple kidskin sheathes. Lycomedes’ eyes had caught on one of these, like a fish snagged by a line. Odysseus stood near, presiding benevolently.</p> <p>Achilles kept to the back, drifting slowly along the table. He paused to dab some perfume on his slender wrists, stroke the smooth handle of a mirror. He lingered a moment over a pair of earrings, blue stones set in silver wire.</p> <p>A movement at the far end of the hall caught my eye. Diomedes had crossed the chamber and was speaking with one of his servants, who nodded and left through the large double doors. Whatever it was could not be important; Diomedes seemed half-asleep, his eyes heavy-lidded and bored.</p> <p>I looked back to Achilles. He was holding the earrings up to his ears now, turning them this way and that, pursing his lips, playing at girlishness. It amused him, and the corner of his mouth curved up. His eyes flicked around the hall, catching for a moment on my face. I could not help myself. I smiled.</p> <p>“He was holding the earrings up to his ears now, turning them this way and that, pursing his lips, playing at girlishness.”</p> <p>Q34. <strong>What do you infer as the most probable reason for Achilles’ behaviour?</strong><span id=\"cke_bm_740C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Achilles was selecting an ideal gift for Lycomedes.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Achilles was in charge of selecting the best accessories for war.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Achilles was in a woman’s disguise and was playing his part.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Achilles was playing the part of an ideal host."], "correct_answer": 2, "solution": "C) “Achilles was in a woman’s disguise and was playing his part” infer किया जा सकता है क्योंकि उसकी हरकतें और actions महिलाओं के सामान्य व्यवहार से मेल खाती हैं। उसने कानों में बाली धारण करी, इसे इधर-उधर मोड़ा, होंठों को सिकोड़ा, और लड़कियों की तरह खेलना शुरू किया। यह उसकी बहुत आनंदित होने और हँसी उड़ाने का कारण बना।"}, {"id": "28669", "question": "Comprehension:</p> <p>Read the following passage and answer the questions given after it.</p> <p>Read the given passage and answer the question that follows.</p> <p>When the dance had finished, Odysseus stood, his voice raised for all to hear. “We are truly honoured by your performance; not everyone can say that they have seen the dancers of Scyros. As tokens of our admiration we have brought gifts for you and your king.” A murmur of excitement. Luxuries did not come often to Scyros; no one here had the money to buy them.</p> <p>“You are too kind.” Lycomedes’ face was flushed with genuine pleasure; he had not expected this generosity. The servants brought trunks forth at Odysseus’ signal and began unloading them on the long tables. I saw the glitter of silver, the shine of glass and gems. All of us, men and women both, leaned towards them, eager to see.</p> <p>‘Please, take what you like,’ Odysseus said. The girls moved swiftly to the tables, and I watched them fingering the bright trinkets: perfumes in delicate glass bottles stoppered with a bit of wax; mirrors with carved ivory for handles; bracelets of twisted gold; ribbons, dyed deep in purples and reds. Among these were a few things I assumed were meant for Lycomedes and his counsellors: leather-bound shields, carved spear hafts, and silvered swords with supple kidskin sheathes. Lycomedes’ eyes had caught on one of these, like a fish snagged by a line. Odysseus stood near, presiding benevolently.</p> <p>Achilles kept to the back, drifting slowly along the table. He paused to dab some perfume on his slender wrists, stroke the smooth handle of a mirror. He lingered a moment over a pair of earrings, blue stones set in silver wire.</p> <p>A movement at the far end of the hall caught my eye. Diomedes had crossed the chamber and was speaking with one of his servants, who nodded and left through the large double doors. Whatever it was could not be important; Diomedes seemed half-asleep, his eyes heavy-lidded and bored.</p> <p>I looked back to Achilles. He was holding the earrings up to his ears now, turning them this way and that, pursing his lips, playing at girlishness. It amused him, and the corner of his mouth curved up. His eyes flicked around the hall, catching for a moment on my face. I could not help myself. I smiled.</p> <p>“He was holding the earrings up to his ears now, turning them this way and that, pursing his lips, playing at girlishness.”</p> <p><strong>Q35. Why was Odysseus distributing the gifts</strong>?<span id=\"cke_bm_698C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Because he was very generous and wanted to help the people of Scyros who could not afford such gifts.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Because he knew Achilles’ fascination for jewellery and wanted to gift him earrings and other ornaments.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Because he was pleased after witnessing the performance of the dancers of Scyros.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Because he wanted to take Lycomedes to war and had come to gift him swords and shields."], "correct_answer": 2, "solution": "C) 'Odysseus' उपहार वितरित कर रहे थे क्योंकि \"Scyros के नर्तकों\" के प्रदर्शन से वे प्रसन्न थे। उपहारों के वितरण का आयोजन उनकी प्रशंसा का प्रतीक था, और इसके साथ ही यह Scyros के लोगों के लिए एक आश्चर्यजनक समय था, क्योंकि ऐसी सुविधाएं वहां आमतौर पर उपलब्ध नहीं होती थीं।"}, {"id": "28670", "question": "Comprehension:</p> <p>Read the following passage and answer the questions given after it.</p> <p>Read the given passage and answer the question that follows.</p> <p>When the dance had finished, Odysseus stood, his voice raised for all to hear. “We are truly honoured by your performance; not everyone can say that they have seen the dancers of Scyros. As tokens of our admiration we have brought gifts for you and your king.” A murmur of excitement. Luxuries did not come often to Scyros; no one here had the money to buy them.</p> <p>“You are too kind.” Lycomedes’ face was flushed with genuine pleasure; he had not expected this generosity. The servants brought trunks forth at Odysseus’ signal and began unloading them on the long tables. I saw the glitter of silver, the shine of glass and gems. All of us, men and women both, leaned towards them, eager to see.</p> <p>‘Please, take what you like,’ Odysseus said. The girls moved swiftly to the tables, and I watched them fingering the bright trinkets: perfumes in delicate glass bottles stoppered with a bit of wax; mirrors with carved ivory for handles; bracelets of twisted gold; ribbons, dyed deep in purples and reds. Among these were a few things I assumed were meant for Lycomedes and his counsellors: leather-bound shields, carved spear hafts, and silvered swords with supple kidskin sheathes. Lycomedes’ eyes had caught on one of these, like a fish snagged by a line. Odysseus stood near, presiding benevolently.</p> <p>Achilles kept to the back, drifting slowly along the table. He paused to dab some perfume on his slender wrists, stroke the smooth handle of a mirror. He lingered a moment over a pair of earrings, blue stones set in silver wire.</p> <p>A movement at the far end of the hall caught my eye. Diomedes had crossed the chamber and was speaking with one of his servants, who nodded and left through the large double doors. Whatever it was could not be important; Diomedes seemed half-asleep, his eyes heavy-lidded and bored.</p> <p>I looked back to Achilles. He was holding the earrings up to his ears now, turning them this way and that, pursing his lips, playing at girlishness. It amused him, and the corner of his mouth curved up. His eyes flicked around the hall, catching for a moment on my face. I could not help myself. I smiled.</p> <p>“He was holding the earrings up to his ears now, turning them this way and that, pursing his lips, playing at girlishness.”</p> <p><strong>Q36. “Lycomedes’ eyes had caught on one of these, like a fish snagged by a line.” What can be inferred from this statement</strong>?<span id=\"cke_bm_578C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He was attracted to the unique looking sword which looked like a fishing line with a hook.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Being a warrior, he was attracted to the sword and all the more since he could not afford one like that on his own.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He was very cunning and wanted to take the shields and swords in order to fight Odysseus later on.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He was a greedy man and wanted to take the best gifts for himself without sharing anything with others."], "correct_answer": 1, "solution": "B) 'Lycomedes की आँखें उस पर ठहर गई थीं, मानो एक मछली हुक वाली लाइन द्वारा फंस गई हो।' इस बयान से यह अनुमान लगाया जा सकता है कि वह तलवार की ओर आकर्षित था, खासकर तब जब वह खुद ऐसा एक खरीदने के लिए सक्षम नहीं था।"}, {"id": "28671", "question": "Comprehension:</p> <p>Read the following passage and answer the questions given after it.</p> <p>Read the given passage and answer the question that follows.</p> <p>When the dance had finished, Odysseus stood, his voice raised for all to hear. “We are truly honoured by your performance; not everyone can say that they have seen the dancers of Scyros. As tokens of our admiration we have brought gifts for you and your king.” A murmur of excitement. Luxuries did not come often to Scyros; no one here had the money to buy them.</p> <p>“You are too kind.” Lycomedes’ face was flushed with genuine pleasure; he had not expected this generosity. The servants brought trunks forth at Odysseus’ signal and began unloading them on the long tables. I saw the glitter of silver, the shine of glass and gems. All of us, men and women both, leaned towards them, eager to see.</p> <p>‘Please, take what you like,’ Odysseus said. The girls moved swiftly to the tables, and I watched them fingering the bright trinkets: perfumes in delicate glass bottles stoppered with a bit of wax; mirrors with carved ivory for handles; bracelets of twisted gold; ribbons, dyed deep in purples and reds. Among these were a few things I assumed were meant for Lycomedes and his counsellors: leather-bound shields, carved spear hafts, and silvered swords with supple kidskin sheathes. Lycomedes’ eyes had caught on one of these, like a fish snagged by a line. Odysseus stood near, presiding benevolently.</p> <p>Achilles kept to the back, drifting slowly along the table. He paused to dab some perfume on his slender wrists, stroke the smooth handle of a mirror. He lingered a moment over a pair of earrings, blue stones set in silver wire.</p> <p>A movement at the far end of the hall caught my eye. Diomedes had crossed the chamber and was speaking with one of his servants, who nodded and left through the large double doors. Whatever it was could not be important; Diomedes seemed half-asleep, his eyes heavy-lidded and bored.</p> <p>I looked back to Achilles. He was holding the earrings up to his ears now, turning them this way and that, pursing his lips, playing at girlishness. It amused him, and the corner of his mouth curved up. His eyes flicked around the hall, catching for a moment on my face. I could not help myself. I smiled.</p> <p>“He was holding the earrings up to his ears now, turning them this way and that, pursing his lips, playing at girlishness.”</p> <p><strong>Q37. What is the passage based upon</strong>?<span id=\"cke_bm_596C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A palace scene where the king and his counsellors are deciding to give gifts to the poor people who had just completed their dance performance in front of everyone.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A palace scene where the king is distributing gifts to the performers who are very poor and cannot afford to buy such gifts on their own.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A palace scene where a dance performance is taking place and thereafter, gifts are distributed to the performers and their selecting the trinkets are described.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> A palace scene where gifts are being distributed after a dance performance and detailed descriptions of the gifts and the way that people are choosing them are presented."], "correct_answer": 3, "solution": "D) passage एक महल के दृश्य पर आधारित है जहां नृत्य प्रदर्शन के बाद उपहार वितरित किए जा रहे हैं और उपहारों का विस्तृत वर्णन और लोगों के द्वारा चुने जाने का तरीका प्रस्तुत किया जा रहा है। passage में नृत्य प्रदर्शन के बाद उपहारों की वितरण और उन्हें चुनने की प्रक्रिया का विस्तृत वर्णन किया गया है। यहाँ कोई ऐसी जानकारी नहीं है जिससे स्पष्ट हो कि नृत्य कला प्रदर्शक बहुत गरीब हैं या उन्हें ऐसे उपहार खरीदने की सामर्थ्यता नहीं है, या राजा और उसके सलाहकार गरीब लोगों को उपहार देने का निर्णय कर रहे हैं।"}, {"id": "28672", "question": "Comprehension:</p> <p>There is an urgent need to tap the potential of AI for accomplishing national objectives and fulfilling the aspirations of Indian citizens</p> <p>Artificial Intelligence (AI) is the new buzzword in the town and is making too much flutter and scoop around. AI and Machine Learning are being widely discussed and claimed across the board to bring about a revolution in the way things will be performed and looked at in future. AI has revolutionised the method of performing various tasks through its algorithm-based software and has made future predictions possible and accurate. With the use of AI, many tasks have become easier to perform with more efficiency. It is expected that the way AI is advancing it will develop various applications that will be able to do acts the doing of which seem humanly impossible at present.</p> <p>Artificial intelligence is the creation of computer systems that can carry out tasks that traditionally require human intellect, including perception, speech recognition, decision-making, and language translation. Through AI, the goal is to develop intelligent machines that can think, comprehend, and act on their own, modelling some human actions.</p> <p>The invention of AI applications and tools has made it possible to answer questions and write code and poems and books with human-like sensitivity. It is also expected that AI shall become an indispensable tool for carrying out numerous industrial activities. AI has developed and is in the process of developing such tools that will be immensely beneficial in business operations. Against this backdrop, it is not an exaggeration to say that the manner of growth and popularisation of AI would have made it seem like a one-stop solution for all human problems.</p> <p>However, AI tools also have limitations and can generate untruthful and toxic comments and can spread misinformation, and spam, and can write misleading academic literature. At present, India does not have a law on AI. The government of India has already expressed its intention some time back that it is not considering any law to regulate AI. The government had conveyed its position that AI is useful for the digital and innovation ecosystem, but had ethical concerns and associated risks. Various government agencies have started efforts to standardize responsible AI development and are drawing up a blueprint for the development of AI for India.</p> <p>Despite the position taken by the government, successful use of AI technology would require the enactment of legislation that will prevent the misuse of AI in situations that involve, loss to or, infringement of the rights of people. Such a law may permit only authorized persons to utilize the govt recognized AI Platforms, allow limited access to the usage of “Smart AI”, and may have penal provisions to cover cases of malicious use of AI such as blackmailing, morphing and creating false evidence etc.</p> <p>Moreover, such a law may require programmers to take reasonable care and caution while creating AI systems in order to prevent harm to AI users. Businesses using AI ought to alert end users against any potential danger and must attach strong technical safeguards and technological measures of protection with every AI application to minimize their misuse. Failure in complying with such stipulations must entail legal liability for creators, intermediaries and commercial dealers.</p> <p>There is a need to tap the potential of AI positively in order to use this technology for accomplishing national objectives and fulfilling the aspirations of Indian citizens. AI should be used to serve the interests of our created social institutions and economic, legal, and administrative machinery. There can be no doubt that AI has enormous potential to revolutionise many facets of society but to maximise its advantages and minimise its downsides, serious deliberations over ethical/legal frameworks should be initiated.</p> <p>Read the given passage and answer the questions that follow.</p> <p><strong>Q38. What is the main concern expressed regarding the unregulated growth of Artificial Intelligence (AI)?</strong><span id=\"cke_bm_635C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The potential for AI to revolutionize industrial activities", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The lack of laws and regulations governing AI in India", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The ability of AI to perform tasks that are currently impossible for humans", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The development of AI applications and tools with human-like sensitivity"], "correct_answer": 1, "solution": "The passage mentions that at present, India does not have a law on AI and that the government has expressed its intention not to regulate AI. It further states that while AI has potential benefits, there are ethical concerns and associated risks. Therefore, the main concern expressed in the passage is the need for regulating AI due to the lack of laws and regulations governing its development and use."}, {"id": "28673", "question": "Comprehension:</p> <p>There is an urgent need to tap the potential of AI for accomplishing national objectives and fulfilling the aspirations of Indian citizens</p> <p>Artificial Intelligence (AI) is the new buzzword in the town and is making too much flutter and scoop around. AI and Machine Learning are being widely discussed and claimed across the board to bring about a revolution in the way things will be performed and looked at in future. AI has revolutionised the method of performing various tasks through its algorithm-based software and has made future predictions possible and accurate. With the use of AI, many tasks have become easier to perform with more efficiency. It is expected that the way AI is advancing it will develop various applications that will be able to do acts the doing of which seem humanly impossible at present.</p> <p>Artificial intelligence is the creation of computer systems that can carry out tasks that traditionally require human intellect, including perception, speech recognition, decision-making, and language translation. Through AI, the goal is to develop intelligent machines that can think, comprehend, and act on their own, modelling some human actions.</p> <p>The invention of AI applications and tools has made it possible to answer questions and write code and poems and books with human-like sensitivity. It is also expected that AI shall become an indispensable tool for carrying out numerous industrial activities. AI has developed and is in the process of developing such tools that will be immensely beneficial in business operations. Against this backdrop, it is not an exaggeration to say that the manner of growth and popularisation of AI would have made it seem like a one-stop . There can be no doubt that AI has enormous potential to revolutionise many facets of society but to maximise its advantages and minimise its downsides, serious deliberations over ethical/legal frameworks should be initiated.</p> <p>Read the given passage and answer the questions that follow.</p> <p><strong>Q39. Which statement from the passage best represents the idea that Artificial Intelligence (AI) is perceived as a solution to all human problems?</strong><span id=\"cke_bm_662C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> \"There is an urgent need to tap the potential of AI for accomplishing national objectives and fulfilling the aspirations of Indian citizens.\"", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> \"AI and Machine Learning are being widely discussed and claimed across the board to bring about a revolution in the way things will be performed and looked at in the future.\"", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> \"The invention of AI applications and tools has made it possible to answer questions and write code and poems and books with human-like sensitivity.\"", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> \"AI has revolutionised the method of performing various tasks through its algorithm-based software and has made future predictions possible and accurate.\""], "correct_answer": 2, "solution": "C) \"The invention of AI applications and tools has made it possible to answer questions and write code and poems and books with human-like sensitivity.\" This statement suggests that AI has the capability to perform tasks that were traditionally considered only possible by humans, indicating the percept nitiated.</p> <p>Read the given passage and answer the questions that follow.</p> <p><strong>Q41. Which of the following statements regarding Artificial Intelligence (AI) is NOT accurate according to the passage?</strong><span id=\"cke_bm_682C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> AI has revolutionised the method of performing various tasks through its algorithm-based software and has made future predictions possible and accurate.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> AI has become an indispensable tool for carrying out numerous industrial activities.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> AI has developed tools that will be detrimental to business operations.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> AI is the creation of computer systems that can carry out tasks that traditionally require human intellect"], "correct_answer": 2, "solution": "C) AI has developed tools that will be detrimental to business operations. According to the passage, AI is beneficial to business operations, not detrimental. The passage mentions, \"AI has developed and is in the process of developing such tools that will be immensely beneficial in business operations.\" Hence, statement C is incorrect according to the passage. The rest of the statements are correct as per the passage."}, {"id": "28676", "question": "Comprehension:</p> <p>The rush to join BRICS, the grouping that brings together Brazil, Russia, India, China and South Africa and represents 40 per cent of the world’s population and 23 per cent of global GDP, has sometimes been explained as triggered by FOMO, a fear of missing out. The geopolitical shifts in the world from the time of Russia’s invasion of Ukraine, have set off frenetic group shopping as middle-sized countries with decent economies in the global south look for both voice and leverage. Both are potentially possible in BRICS, made up of five regional heavyweights. More than 20 countries are in the queue. If media reports are correct, five applicants — Saudi Arabia, Indonesia, the UAE, Egypt and Argentina — may be granted membership this August at the Cape Town summit. While it is always desirable to have bigger groupings than small clubs, especially when the stated aim of the group is to project the interests of the non-monolithic global south, an increase in membership is also likely to weigh the group in favour of China, the world’s second largest economy. Other than the five possible new entrants this year, those waiting to join are also part of the Chinese Belt and Road Initiative.</p> <p>Inherent in this is the likelihood of such a grouping being projected as a Chinese-led anti-American bloc. Understandably, Delhi, which has in recent days demonstrated a new resolve in taking the bilateral relationship with the US to a new level, has been wary of expansion. Indeed, the long line of aspiring members is seen already as fuelled by China, with the tacit backing of Russia. Last year’s BRICS declaration reflects India’s concern that any addition of new members must follow the carefully thought out objective criteria for membership, mutually discussed among the present members, so that all are on the same page regarding the logic of expansion.</p> <p>At the BRICS foreign ministers’ meeting last month, external affairs minister S Jaishankar called BRICS expansion a “work in progress” that had to take into consideration how the present BRICS countries worked with each other, and how BRICS works with non-BRICS countries. Realising perhaps that it may not be able entirely to stave off an expansion — many of the candidates are friends of India too — Delhi appears to have come to terms with a limited addition of five members. The challenge would be for the original BRICS members — India, Brazil and South Africa (remember IBSA?) — and the new entrants to ensure that the group does not become a Chinese bandwagon.</p> <p>Read the given passage and answer the questions that follow</p> <p><strong>Q42. Based on the passage, why is there a surge in countries seeking membership in the BRICS group?</strong><span id=\"cke_bm_477C\" style=\"display:none\"> </span>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The countries seek to gain a strong military alliance.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The countries are seeking to strengthen their economic ties with China.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The countries aim to increase their voice and leverage on the global stage.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The countries want to retaliate against Russia's invasion of Ukraine."], "correct_answer": 2, "solution": "The passage states that the rush to join BRICS, a group that represents a significant portion of the world's population and global GDP, is driven by middle-sized countries in the global south seeking \"voice and leverage\". There's no mention of these countries aiming for a military alliance, a reaction to Russia's invasion of Ukraine, or a direct counter to the US's influence. While an increased BRICS membership might favor China's economic influence, the passage does not specifically indicate that this is the primary motivation for the countries seeking to join."}, {"id": "28677", "question": "Comprehension:</p> <p>The rush to join BRICS, the grouping that brings toget         // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
