<script id="theme-toggle-handler">
(function() {
    var savedTheme = 'dark';
    try {
        savedTheme = localStorage.getItem('portal-theme') || 'dark';
    } catch (e) {}
    if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        var observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('light-theme');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('themeToggle');
        if (btn) {
            var newBtn = btn.cloneNode(true);
            newBtn.removeAttribute('onclick');
            btn.parentNode.replaceChild(newBtn, btn);
            
            var currentTheme = 'dark';
            try {
                currentTheme = localStorage.getItem('portal-theme') || 'dark';
            } catch (e) {}
            
            var icon = newBtn.querySelector('i');
            if (icon) {
                icon.className = currentTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            newBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isLight = document.body.classList.toggle('light-theme');
                document.documentElement.classList.toggle('light-theme', isLight);
                var nextTheme = isLight ? 'light' : 'dark';
                try {
                    localStorage.setItem('portal-theme', nextTheme);
                } catch (err) {}
                
                var currentIcon = newBtn.querySelector('i');
                if (currentIcon) {
                    currentIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        }
    });
})();
</script>

<script>
/* DYNAMICALLY IDENTIFY AND ALIGN MATH EQUATIONS */
(function() {
  function processImage(img) {
    if (img.classList.contains('processed-math')) return;
    img.classList.add('processed-math');
    const hasLargeAttr = (img.getAttribute('width') && parseInt(img.getAttribute('width')) > 100) ||
                         (img.getAttribute('height') && parseInt(img.getAttribute('height')) > 60);
    const src = img.src || '';
    const isMath = src.includes('parserImages') || 
                   src.includes('equation') || 
                   img.classList.contains('eq-img') ||
                   (!hasLargeAttr && (img.align === 'bottom' || img.align === 'middle' || !img.align));
    if (isMath && !hasLargeAttr) {
      img.classList.add('math-eq');
    }
  }
  
  function initMathAligner() {
    document.querySelectorAll('img').forEach(processImage);
    const observer = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
          if (node.nodeType === Node.ELEMENT_NODE) {
            if (node.tagName === 'IMG') {
              processImage(node);
            } else {
              node.querySelectorAll('img').forEach(processImage);
            }
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMathAligner);
  } else {
    initMathAligner();
  }
})();

g\"/></p> Thankfulness"], "correct_answer": 3, "solution": "<strong>D) Gratitude</strong> (noun) – Thankfulness, appreciation, gratefulness, recognition, acknowledgment कृतज्ञता"}, {"id": "129006", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>The canons are being fired continuously by them.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They fired canons continuously.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> They are firing the canons continuously.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They have fired the canons continuously.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The canons fire continuously."], "correct_answer": 1, "solution": "B) They are firing the canons continuously."}, {"id": "128998", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>The movie was released__________ expected.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> later than", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> most later than", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> later then", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> more later than"], "correct_answer": 0, "solution": "A) <strong>'later than'</strong> का प्रयोग होगा क्योंकि सही structure में, हम \"than\" का प्रयोग \"later\" के साथ तुलना के रूप में करते हैं। विकल्प 'C' और 'D' गलत हैं क्योंकि वे गलत structure और अशुद्ध प्रयोग प्रदर्शित करते हैं। इसलिए, \"later than\" सही और सबसे उपयुक्त विकल्प होगा।"}, {"id": "129076", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>A. It’s not without reason that revisions in the Class XII political science textbook have led to a hue and cry.</p> <p>B. Periodic revision of learning material is par for the course.</p> <p>C.How the National Council of Educational Research and Training (NCERT) is going about it is problematic, ill-advised and smacks of narrow-mindedness.</p> <p>D. Questions are bound to be raised over the strange logic of whitewashing contemporary events, skipping uncomfortable moments in India’s history and choosing to ignore incidents of violence and protest.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDAC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABD", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BCAD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABCD"], "correct_answer": 2, "solution": "B: B is first because it introduces the general concept of periodic revision of learning material."}, {"id": "129074", "question": "<strong>For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the appropriate sentences for S2 and S3, respectively.</strong></p> <p><strong>S1</strong>: On September 9-10, 2023, New Delhi hosted the G-20 Summit, which resolved to accelerate the full and effective implementation of the UN Agenda 2030 for Sustainable Development.</p> <p><strong>P:</strong> On September 18-19, 2023, an “SDG Summit” was convened at the United Nations</p> <p><strong>Q</strong>: With an all-women team, they emphasise sustainable practices and community support, creating timeless pieces that promote responsible consumption and redefine the relationship between style and sustainability.</p> <p><strong>R</strong>: This focus on handcrafting was a deliberate choice from the beginning, they share.</p> <p><strong>S:</strong> headquarters to follow up and review the implementation of the Agenda and the progress of the 17 Sustainable Development Goals (SDGs)</p> <p><strong>S4:</strong> A “Summit of the Future” took place on September 22-23, 2024, at the UN headquarters to build upon the SDG Summit 2023 and its commitments by member nations.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and Q", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and R", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> P and S", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Q and S"], "correct_answer": 2, "solution": "<strong>S2 (P):</strong> This sentence logically follows S1, continuing the focus on sustainability and the UN’s efforts to achieve sustainable development goals."}, {"id": "129025", "question": "<strong>Select the appropriate idiom that can replace the underlined phrase in the following sentence</strong></p> <p>He always threatens to call the police if I don't stay off his lawn, but he's<ins> <strong>all bark and no bite</strong>.</ins></p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Someone who sticks to his words", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Actions are stronger than mere words", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Not being able to understand anything", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Full of talk, but low on action"], "correct_answer": 3, "solution": "D) All bark and no bite</strong> (phrase) – Full of talk, but low on action <strong>कुत्ता जो भौंकता है, काटता नहीं है"}, {"id": "128999", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>The girl was ________ as she was drenched in the rain", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> bolt", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> tight", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> cold", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> gold"], "correct_answer": 2, "solution": "<strong>Cold'</strong> should be used because when someone gets wet in the rain, they feel cold. The sentence mentions the girl was drenched in rain, making 'cold' the appropriate choice here. Whereas, 'Bolt' implies running quickly or fleeing, 'Tight' means to hold or grasp firmly, and 'Gold' is a precious metal, which don't fit in this context."}, {"id": "129030", "question": "<strong>Select the word segment that substitute (replaces) the bracketed word segment correctly completes the sentence meaningfully select the option no correction required if the sentence is correct as given.</strong></p> <p>One of the main climbing routes, approaches th s a ____2______ state of there being distinction, but not division. Past and future are human constructs; they are products of the mind that seeks to understand the sense of separateness that we experience and the _____3_____moments in our timeline – even as we sense our interconnectedness with the rest of creation and with ____4_____. </p> <p><strong>Select the most appropriate option to fill in blank number 1.</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> shrouded", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> fetched", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> intended", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> surrounded"], "correct_answer": 0, "solution": "No solution available"}, {"id": "129078", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong><br> Time is _____1____in eternity; history is shrouded in mystery. It is a ____2______ state of there being distinction, but not division. Past and future are human constructs; they are products of the mind that seeks to understand the sense of separateness that we experience and the _____3_____moments in our timeline – even as we sense our interconnectedness with the rest of creation and with ____4_____. </p> <p><strong>Select the most appropriate option to fill in blank number 2.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Virtuous", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Curious", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ominous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Vicious"], "correct_answer": 1, "solution": "No solution available"}, {"id": "129079", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong><br> Time is _____1____in eternity; history is shrouded in mystery. It is a ____2______ state of there being distinction, but not division. Past and future are human constructs; they are products of the mind that seeks to understand the sense of separateness that we experience and the _____3_____moments in our timeline – even as we sense our interconnectedness with the rest of creation and with ____4_____. </p> <p><strong>Select the most appropriate option to fill in blank number 3.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Discernment", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Dilemma", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Dismissal", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Discrete"], "correct_answer": 3, "solution": "No solution available"}, {"id": "129080", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong><br> Time is _____1____in eternity; history is shrouded in mystery. It is a ____2______ state of there being distinction, but not division. Past and future are human constructs; they are products of the mind that seeks to understand the sense of separateness that we experience and the _____3_____moments in our timeline – even as we sense our interconnectedness with the rest of creation and with ____4_____. </p> <p><strong>Select the most appropriate option to fill in blank number 4</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> one another", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> other", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> another", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> everyone"], "correct_answer": 0, "solution": "No solution available"}, {"id": "129081", "question": "<strong>Comprehension:</strong></p> <p>What else is there to think about? Money is power. Everybody else is thinking of money, don’t be worried. Even those who are thinking of the other world are also thinking of money. Money represents power; with money, you can purchase power. Your saints are also thinking of money – they call it virtue. By virtue, you can purchase a better house in heaven and a better car. A few people are not that greedy: they are thinking only about money. A few people are greedier, they think of the other world. The whole world is thinking in terms of money. Those who think in terms of power politics are thinking in terms of money because money is nothing but a symbol of power. That’s why you can go on accumulating more and more money, but the desire to have still more never leaves you – because thirst for power is unlimited, it knows no end.</p> <p>People are thirsty for power because deep down they are empty. Somehow, they want to stuff that emptiness with something – it may be money, power, prestige, respectability, character, virtue. Anything will do; they want to stuff their inner emptiness. There are only two types of people: those who try to stuff their inner emptiness, and those rare precious beings who try to see the inner emptiness. Those who try to stuff it remain empty, frustrated. They go on collecting garbage; their whole life is futile and fruitless. Only the other kind, very precious people who try to look into their inner emptiness without any desire to stuff it, become meditators. Meditation is looking into your emptiness, welcoming it, enjoying it, being one with it, with no desire to fill it – there is no need, because it is already full. It looks empty because you don’t have the right way of seeing it. If you put your mind aside and look into your emptiness, it has tremendous beauty, it is divine, it is overflowing with joy. Nothing else is needed. Only then a person stops thinking about money, stops thinking about power, stops thinking about paradise – because he is already in paradise, because he is already rich, because he is already power…</p> <p>Live the moment, drop the future, and money will lose its glamour. Live the moment with such totality and abandon, as if there is no other moment to come to you again, as if this is the last moment. Then all desire for money and power simply leaves you. If suddenly you come to know that today you are going to die, what will happen? Will you still be interested in money? Suddenly all desire for money will leave you. I will not tell you to renounce money. That has been told to you over the ages; it has not changed you. I am going to tell you something else: celebrate life, and obsession with money disappears automatically. And when it goes on its own accord, it leaves no scratches, it leaves no wounds behind, it leaves no trace behind.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p prehension:</strong></p> <p>The data for BTech seats across the country is a reason for hope. The All India Council for Technical Education’s (AICTE) approved intake for undergraduate engineering and technology courses for 2024-25 shows a nearly 19 per cent increase from 2021-22, when the total number of seats touched the lowest in a decade. The uptick comes after a year-on-year decline in intake for most of the past decade. This was also a period when reduced demand forced several colleges to shut down. The slump, as underlined by an investigation in this newspaper in December 2017, had much to do with the deficiencies of the institutions and the AICTE’s failings as a regulator and enabler. The analysis had revealed that most colleges were dogged by corruption and did not have facilities — proper laboratories, trained teachers — to nurture talent. The AICTE has clarified that the increase in the number of seats is contingent on the institutions fulfilling infrastructure and faculty-related requirements. It should guard against lapsing into the old ways.</p> <p>The engineering profession in India is riddled with paradoxes. The country produces one of the highest numbers of engineers in the world. Yet, report after report has pointed out that most Indian institutions do not provide state-of-the-art skills. Even the most conservative surveys estimate that about 30 per cent engineering graduates do not have a job — in fact, last year, then NITI Aayog Vice Chairman Rajiv Kumar said that this figure is as high as 48 per cent. Most institutes do not provide practical training that should be fundamental to an applied science such as engineering. That’s why they have failed to provide a springboard for the Centre’s entrepreneurial projects such as Make in India. A part of the problem also stems from low investment in research and development (R&amp;D). India’s R&amp;D expenditure to GDP ratio of 0.7 per cent is very low compared to developed economies — South Korea, for instance, spends more than 5 per cent of its GDP on R&amp;D.</p> <p>The National Education Policy 2020 (NEP) talks about filling such gaps, and forging links between industry and academia to mobilise funds. The AICTE’s latest mandate to institutes to start courses in new technologies — AI, robotics, data sciences and cyber security — is in line with the policy’s vision of turning engineering colleges into nurseries for industry. The challenge will be in helping them recruit quality faculty. A beginning can be made by tapping into the expertise of top institutes such as IITs to train teachers of smaller colleges. In the long run, the AICTE should find ways to give effect to the NEP’s recommendation of setting up training institutes to update teachers’ knowledge.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Critical", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sarcastic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Indifferent"], "correct_answer": 0, "solution": "No solution available"}, {"id": "129086", "question": "<strong>Comprehension:</strong></p> <p>The data for BTech seats across the country is a reason for hope. The All India Council for Technical Education’s (AICTE) approved intake for undergraduate engineering and technology courses for 2024-25 shows a nearly 19 per cent increase from 2021-22, when the total number of seats touched the lowest in a decade. The uptick comes after a year-on-year decline in intake for most of the past decade. This was also a period when reduced demand forced several colleges to shut down. The slump, as etting up training institutes to update teachers’ knowledge.</p> <p><strong>What condition has the AICTE placed on institutions for increasing the number of BTech seats?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Institutions must reduce tuition fees.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Institutions must fulfill infrastructure and faculty-related requirements.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Institutions must guarantee 100% job placement for graduates.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Institutions must eliminate all entrance examinations."], "correct_answer": 1, "solution": "No solution available"}, {"id": "129088", "question": "<strong>Comprehension:</strong></p> <p>The data for BTech seats across the country is a reason for hope. The All India Council for Technical Education’s (AICTE) approved intake for undergraduate engineering and technology courses for 2024-25 shows a nearly 19 per cent increase from 2021-22, when the total number of seats touched the lowest in a decade. The uptick comes after a year-on-year decline in intake for most of the past decade. This was also a period when reduced demand forced several colleges to shut down. The slump, as underlined by an investigation in this newspaper in December 2017, had much to do with the deficiencies of the institutions and the AICTE’s failings as a regulator and enabler. The analysis had revealed that most colleges were dogged by corruption and did not have facilities — proper laboratories, trained teachers — to nurture talent. The AICTE has clarified that the increase in the number of seats is contingent on the institutions fulfilling infrastructure and faculty-related requirements. It should guard against lapsing into the old ways.</p> <p>The engineering profession in India is riddled with paradoxes. The country produces one of the highest numbers of engineers in the world. Yet, report after report has pointed out that most Indian institutions do not provide state-of-the-art skills. Even the most conservative surveys estimate that about 30 per cent engineering graduates do not have a job — in fact, last year, then NITI Aayog Vice Chairman Rajiv Kumar said that this figure is as high as 48 per cent. Most institutes do not provide practical training that should be fundamental to an applied science such as engineering. That’s why they have failed to provide a springboard for the Centre’s entrepreneurial projects such as Make in India. A part of the problem also stems from low investment in research and development (R&amp;D). India’s R&amp;D expenditure to GDP ratio of 0.7 per cent is very low compared to developed economies — South Korea, for instance, spends more than 5 per cent of its GDP on R&amp;D.</p> <p>The National Education Policy 2020 (NEP) talks about filling such gaps, and forging links between industry and academia to mobilise funds. The AICTE’s latest mandate to institutes to start courses in new technologies — AI, robotics, data sciences and cyber security — is in line with the policy’s vision of turning engineering colleges into nurseries for industry. The challenge will be in helping them recruit quality faculty. A beginning can be made by tapping into the expertise of top institutes such as IITs to train teachers of smaller colleges. In the long run, the AICTE should find ways to give effect to the NEP’s recommendation of setting up training institutes to update teachers’ knowledge.</p> <p><strong>Which of the following can be inferred as a primary reason for the unemployment among Indian engineering graduates?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The oversaturation of engineering colleges in India", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Lack of practical training in engineering institutes", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The decline in the global demand for engineers", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> High R&amp;D investment in India"], "correct_answer": 1, "solution": "No solution available"}, {"id": "129089", "question": "<strong>Comprehension</strong>:</p> <p>Ahead of the 29th edition of the Conference of Parties in Baku, Azerbaijan, next month, there is renewed energy in government circles to accelerate Indian industry’s transition to carbon markets. While the broader theme of this edition of the COP is increasing ambition on climate finance, a key item on the agenda is clarity on carbon markets. A specific section under the Paris Climate Agreement of 2015, called Article 6, lays the contours under which carbon markets — or the enabling of trading of prevented greenhouse gas emissions among countries —can be operationalised. Carbon markets incentivise climate action by enabling parties to trade in carbon credits generated by the reduction or removal of greenhouse gases from the atmosphere, such as by switching from fossil fuels to renewable energy or enhancing or conserving carbon stocks in ecosystems such as forests. Subsections within Article 6 provide guidelines on what kinds of carbon-reduction activities and verification mechanisms are permissible, and how countries may enter into bilateral agreements so that emission reductions in one country may be legally claimed by another.</p> <p>While carbon markets came into existence nearly two decades ago, they have been plagued by opacity and criticism that they only created the illusion of emission reductions. Although such markets have revived, confusion remains about how credits may be verified. There is optimism that Baku may see a final resolution of this problem and that the first legal credits may begin to be claimed by countries next year. India, due to its voluntary commitment to generate half its electricity from non-fossil energy sources by 2030, stands to gain as a host of several carbon-reduction projects. Additionally, there are also mushrooming private sector enterprises in India setting up innovative forestry projects that reportedly lock carbon and can be claimed as credits by multinational companies, traded through so-called voluntary carbon markets. India’s iron and steel industries are among the nine types of industries expected to meet emission intensity standards by 2025. By restricting the amount of carbon per unit of production, this will, depending on regulatory enforcement, formally kick-start India’s carbon market. However, this will invite complex calculations and, given the experience of a related energy-efficiency trading scheme, run the risk of not exerting enough pressure on companies to comply. While calculating carbon saved is a fraught exercise, India must aim, through its research institutions and authorities, to evolve a transparent and fair policy that is on a par with the best internationally.</p> <p><strong>Which specific goal does the 29th edition of the Conference of Parties (COP) in Baku aim to address in relation to climate finance</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Increase public awareness about climate finance in developing nations.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Provide clarity on carbon markets and trading of carbon credits.", "<p style=\"display:none s expected to meet emission intensity standards by 2025. By restricting the amount of carbon per unit of production, this will, depending on regulatory enforcement, formally kick-start India’s carbon market. However, this will invite complex calculations and, given the experience of a related energy-efficiency trading scheme, run the risk of not exerting enough pressure on companies to comply. While calculating carbon saved is a fraught exercise, India must aim, through its research institutions and authorities, to evolve a transparent and fair policy that is on a par with the best internationally.</p> <p><strong>What can be inferred about India's approach to carbon markets based on its commitment to renewable energy and emission standards</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> India is actively investing in carbon markets as a primary revenue source.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> India seeks to limit industrial activity to meet carbon emission goals.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> India plans to negotiate with other countries to transfer emissions credits.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> India aims to establish itself as a key player by aligning with global carbon reduction standards."], "correct_answer": 3, "solution": "No solution available"}],ans={};
const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
