<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 73 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

exam-panel/img/reload.png\"/></p> comment", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> appreciate"], "correct_answer": 3, "solution": "Antonym</strong>: <strong>Appreciate</strong> (verb) – To recognize the value or significance of something; to be thankful for, to praise. <strong>प्रशंसा करना"}, {"id": "33650", "question": "<strong>Q7. Select the most appropriate ANTONYM for the word 'foster' in the following sentence</strong>.</p> <p>The emperor as a centralised entity indisputably went beyond regional conflicts and <ins><strong>fostered</strong> </ins>a certain mode of elite culture.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> cultivated", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> endorsed", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> suppressed", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> incubated"], "correct_answer": 2, "solution": "Antonym</strong>: <strong>Suppressed</strong> (verb) – To put an end to, to inhibit or restrain, to stop the development of something. <strong>दमन करना"}, {"id": "33651", "question": "<strong>Select the option that expresses the given sentence in active/passive voice</strong></p> <p>Do not take the coastal road during monsoons.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> You are not taking the coastal road during monsoons.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> You will not take the coastal road during monsoons.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Coastal road is not being taken during monsoons.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Coastal roads should not be taken during monsoons."], "correct_answer": 3, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong>, Imperative sentence में ‘should be’ या ‘should not be’ का प्रयोग किया जाता है। Active वाक्य में \"take\" (Verb) Imperative रूप में है और \"the coastal road\" (Object) है। Passive में बदलने पर Object \"Coastal roads\" (Subject) बन गया है और Verb को \"should not be taken\" (Passive Form) में बदला गया है।"}, {"id": "33652", "question": "<strong>Q9. Select the most appropriate option to fill in the blank</strong>.</p> <p>Ravi remembers the year when there was a ______________ flood.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ravage", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> devastating", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> salubrious", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ameliorative"], "correct_answer": 1, "solution": "<strong>B) </strong>Devastating' का use होगा क्योंकि \"devastating\" का अर्थ होता है भयंकर या विनाशकारी, जो इस context में बाढ़ के साथ मेल करता है। Sentence में बताया गया है कि Ravi उस साल को याद करते हैं जब एक भयंकर बाढ़ आई थी, इसलिए 'devastating' यहाँ सही है। 'Ravage' का अर्थ है तबाही में लाना, लेकिन यह एक verb है; 'Salubrious' का अर्थ है स्वास्थ्यकर, और 'Ameliorative' का अर्थ है सुधारक, जो इस context में सही नहीं है।"}, {"id": "33653", "question": "<strong>Q10. Select the most appropriate option to fill in the blank</strong>.</p> <p>He walked slowly ______ his bandaged leg.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> though", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> because of", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> although", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> in spite of"], "correct_answer": 1, "solution": "<strong>B)</strong> 'Because of' का use होगा क्योंकि 'because of' का अर्थ होता है 'के कारण'. Sentence में mention किया गया है कि वह धीरे चल रहे हैं और उसके पैर पे पट्टी बांधी हुई है, इसका सीधा संबंध उसके धीरे चलने से है। इसलिए 'because of' यहाँ सही है। 'Though', 'Although', और 'In spite of' इस context में सही नहीं हैं क्योंकि वे किसी contradiction या exception को highlight करते हैं, जो यहाँ पे नहीं है।"}, {"id": "33654", "question": "<strong>Q11. Select the option that can be used as a one-word substitute for the given group of words</strong>.</p> <p>A person who is skilled in making maps", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Calligrapher", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Curator", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cacographer", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Cartographer"], "correct_answer": 3, "solution": "D) Cartographer</strong> (noun) – A person who is skilled in making maps. <strong>मानचित्रकार"}, {"id": "33655", "question": "<strong>Q12. Select the option that can be used as a one-word substitute for the given group of words</strong>.</p> <p>Sita loves her <strong><ins>glass container in which she has many fish</ins>.</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> aquarium", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> cannister", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> planetarium", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> museum"], "correct_answer": 0, "solution": "A) Aquarium</strong> (noun) – A transparent tank of water in which fish and other water creatures and plants are kept. <strong>जलजीवन संग्रहालय"}, {"id": "33656", "question": "<strong>Q13. Select the option that expresses the given sentence in reported speech</strong>.</p> <p>The commander ordered his battalion to march on.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The commander says to his battalion, \"Please march on.\"", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> “March on!” the commander said to his battalion.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The commander says to his battalion, “March on!”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The commander gives his battalion order, “March on!”"], "correct_answer": 1, "solution": "<strong>B) </strong>“March on!” the commander said to his battalion."}, {"id": "33657", "question": "<strong>Q14. Select the INCORRECTLY spelt word</strong>.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> immediate", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> iliterate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> implement", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> illogical"], "correct_answer": 1, "solution": "B)</strong> The incorrectly spelled word among the given options is 'iliterate'. The correct spelling is 'illiterate', which means \"unable to read or write.\"<strong> अनपढ़, निरक्षर"}, {"id": "33658", "question": "<strong>Q15. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph</strong>.</p> <p><strong>A. </strong>And this one is that earlier India was part of the problem</p> <p><strong>B.</strong> India is celebrating this Independence Day with an aura of external responsibilities like never before</p> <p><strong>C.</strong> The difference between many previous August 15 celebrations</p> <p><strong>D. </strong>Now, it is trying to be part of the solution", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDAC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABD", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BCAD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DBCA"], "correct_answer": 2, "solution": "B: B should come first as it sets the context – India is celebrating Independence Day with a newfound responsibility"}, {"id": "33659", "question": "<strong>Q16. Select the option that will improve the underlined part of the given sentence</strong>.</p> <p>She is a very good sprinter. I can’t run as fast <strong><ins>as she does</ins>.</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> no improvement", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> like she is doing", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> as she doing", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> as she do"], "correct_answer": 0, "solution": "<strong>A)</strong> No improvement"}, {"id": "33660", "question": "<strong>Q17. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph</strong>.</p> <p><strong>P. </strong>The remaining four vacancies were filled unanimously by their respective regional groups.</p> <p><strong>Q. </strong>There was a contest only against Belarus.</p> <p><strong>R. </strong>The biggest and most immediate beneficiary of the Wagner Private Military Company’s (PMC) rebellion in Russia is Belarus President Alexander Lukashenko.</p> <p><strong>S. </strong>In a week of fast-moving developments — Lukashenko was at the centre of it all — no one remembered his country’s humiliation in the United Nations General Assembly four weeks ago when Belarus was roundly defeated in the Security Council election.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QRPS", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> RSQP", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QSRP", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RPQS"], "correct_answer": 1, "solution": "<strong>R</strong> should come first as it introduces the main subject, Belarus President Alexander Lukashenko, and the context of his benefiting."}, {"id": "33661", "question": "<strong>Q18. For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the appropriate sentences for S2 and S3, respectively</strong>.</p> <p><strong>S1</strong>: After India’s two successful missions — the soft-landing on the moon and the launch of the Aditya-L1 mission to study the sun — some Indian scientists are, ironically, making headlines for the wrong reasons.</p> <p><strong>S4:</strong> Behera had earlier spoken about the existence of ghosts and evil spirits and of keeping menstruating women away from Janmashtami celebrations.</p> <p><br> <strong>P:</strong> A video of Laxmidhar Behera, Director of the Indian Institute of Technology (IIT), Mandi, has gone viral, in which he linked the consumption of meat with the growing incidents of cloudbursts and landsides in Himachal Pradesh.</p> <p><strong>Q</strong>: He has a doctorate from IIT-Delhi, has taught at IIT-Kanpur, and specialises in robotics and artificial intelligence.</p> <p><strong>R</strong>: It was a part of the territory under the Nizam of Hyderabad till 1948 and was used as a military base.</p> <p><strong>S:</strong> Two such observatories are functional at Hanford and Livingston in the US, while two others are in Italy and Japan.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> P and Q", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and R", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and S", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Q and S"], "correct_answer": 0, "solution": "P: This option provides specific information about Laxmidhar Behera, a scientist, making a controversial statement linking meat consumption with natural disasters. This fits well as S2 because it provides an example of a scientist making headlines for the wrong reasons, connecting well with S1."}, {"id": "33662", "question": "<strong>Q19. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph</strong>.</p> <p><strong>P.</strong> Which had cropped up over the years at both places of pilgrimage</p> <p><strong>Q. </strong>Heavy rain and the melting of the Chorabari glacier above Kedarnath unleashed an angry deluge of water, mud and boulders, which raced down from Kedarnath to Badrinath and beyond, destroying several guest houses</p> <p><strong>R.</strong> The river has come down to cleanse Uttarakhand of its greed — this is how a venerable old villager reacted to the horrific disaster which engulfed Kedarnath and Badrinath in 2013</p> <p><strong>S.</strong> There were 12,000 pilgrims at these places and at least 5,000 lost their lives.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RSPQ", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QPRS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QRPS", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> RQPS"], "correct_answer": 3, "solution": "<strong>D) R liked\"</strong> (Passive Verb in Present Simple) में बदला गया है और <strong>\"by teenagers\"</strong> के रूप में प्रयोग किया गया है।"}, {"id": "33673", "question": "<strong>Comprehension</strong>:</p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong></p> <p>The climate crisis intricately wove itself into the G-20 summit in Delhi, particularly during the discussions on clean energy, sustainable development and the collective responsibility necessary to avert it. The United Nations’ Global Stocktake, a report that was released just ahead of the G-20 meet, set out the scope of challenges that awaited the major economies of the world even as it presented little beyond what is already known. This stocktake is to serve as a template to guide discussion ahead of the 28th Conference of Parties scheduled in Dubai this November and is meant to be an official <strong>_____1______</strong> of the work actually done by countries since 2015, in stemming greenhouse gas (GHG) emissions. That year, signatories to the UN convention on climate change agreed in Paris to keep global emissions from rising beyond 2°C and, <strong>____2______</strong> possible, limit it to 1.5°C. Though it acknowledges “some” headway, the world, as of now, <strong>_______3______</strong> emitting gases in a manner that will certainly overshoot the Paris-agreed limit. The report unequivocally states that “much more ambition in action and support” is necessary for implementing domestic mitigation measures to reduce global GHG emissions by 43% by 2030, 60% by 2035 and reach net zero CO2 emissions by 2050 globally. Based on current information submitted by countries, the emissions gap consistent with 1.5°C in 2030 is estimated to be 20.3 billion tonnes–23.9 billion tonnes of CO2. These are gaps unlikely to be filled without a rapid upscaling of renewable energy resources and an <strong>______4___ ill in blank 4</strong>.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Eschewal", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Erroneous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Exacerbate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Impede"], "correct_answer": 0, "solution": "No solution available"}, {"id": "33677", "question": "<strong>Comprehension</strong></p> <p><strong>Read the given passage and answer the questions that follow</strong></p> <p>On Saturday, the Union government imposed a 40 per cent duty on onion exports. The duty, which will remain in place till December 31, is aimed at ensuring sufficient supply of onions in the domestic market at a time when prices are just about inching upwards. The average modal retail price of onions is currently at Rs 30, compared to Rs 25 this time last year, as per the Department of Consumer Affairs’ data. The latest action, which may seem excessive, seems to suggest that the government is concerned about onions going the way of tomatoes: Tomato prices had soared in July, retailing above Rs 200 in parts of the country. While those prices are now hovering around Rs 80, they are still roughly twice higher than their year-ago levels. But, these aren’t the only instances of government intervention in the food market in recent times. It has also banned exports of wheat, non-basmati white rice and sugar, and has imposed stock limits on tur, urad. and wheat. In early August, with wheat and rice continuing to witness inflation, it also decided to offload 5 million tonnes of wheat and 2.5 million tonnes of rice from the Food Corporation of India’s stocks in the open market.The price trends seem to suggest that food inflation is now getting generalised. Data from the National Statistical Office showed that along with higher vegetable prices, inflation in July was elevated in cereals (13.04 per cent), pulses and products (13.27 per cent), spices (21.63 per cent) and milk and products (8.34 per cent). It was this surging food inflation that led to the consumer price index rising to a 15-month high of 7.44 per cent in July, breaching the upper threshold of the RBI’s inflation targeting framework. While the RBI expects the current surge in vegetable inflation to be temporary in nature, risks to the broader food basket remain. Rainfall has been low this month — there are indications that August this year could be the driest August in recent times. And there is an increasing likelihood of El Niño strengthening in the coming months. This could potentially impact the upcoming rabi crop.Sustained high food inflation can influence household inflation expectations, complicating matters for the monetary policy committee (MPC). While the MPC maintained the status quo on rates in its August meeting, looking through this surge in inflation, the government cannot afford to do so. After all, it has an electoral cycle to contend with — a series of state elections will take place towards the end of this year, followed by the general election next year. This supply-side induced inflation shock, which comes after the disruptions from Covid, the Russia-Ukraine war and now El Nino, requires deft economic management. The focus should be more on liberalising imports than imposing domestic trading and export control that have long-term implications. Remember, this is the same government that barely three years ago enacted the three farm reform laws. That has unfortunately been consigned to the dustbin of history, both in letter and in spirit.</p> <p><strong>Q34. Why did the Union government impose a 40 per cent duty on onion exports?</strong>", "options": ["<p style=\"display:none\"><img alt=\" en World Cup to join Germany as one of only two nations to have secured both the men’s and women’s titles. The Guardian reported that an average of 30,000 fans attended each match over the course of a month in Australia and New Zealand and nearly two million tickets — a record — were bought. These are astonishing numbers for a standalone women’s event, the kind of which has suffered from administrator and spectator apathy in the past. Much of it was down to the on-field excellence, with the likes of Spain’s Aitana Bonmati, the player of the tournament, Olga Carmona, who scored the winning goals for Spain in both the semifinal and final, Japan’s Hinata Miyazawa, the highest goal-scorer (5), and England’s Mary Earps, the best goalkeeper, mesmerising the audience.</p> <p>The World Cup also showcased the wide geographic spread of women’s football. Where nations from Europe and South America have been the hegemonic forces among men, in the short nine-edition history of the women’s event, only four times have the winners come from these two regions — Germany twice, Norway and now Spain. In 2023, Germany, apart from being upset by Colombia, crashed out in the group stage. Japan, the 2011 world champion, hammered eventual winner Spain 4-0 in the preliminary round. Morocco made history by qualifying for the round of 16 while hosts Australia’s fourth-place finish was its best ever. Four-time champion United States of America, marshalled by the retiring star Megan Rapinoe, missed the podium for the first time, but it just proved the tournament’s overall depth in quality. As Marta, the legendary Brazilian who played her sixth and final World Cup, said, “When I started there were no idols in women’s football. Twenty years later, we have become a reference for many women....” To harness this positive energy, governing body FIFA has a lot of heavy-lifting to do. Addressing the massive remuneration gap between men and women — a World Cup prize money purse of $440 million against $152 million — can be a good start in the long road towards normalising sporting excellence by women</p> <p><strong>Q38. Based on the passage, which of the following statements best aligns with the author's perspective on the FIFA Women’s World Cup?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Women's World Cup is solely about showcasing football skills of women.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The Women's World Cup acts as a mirror to societal progress towards gender equality.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Men's football is more popular and superior to women's football.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Women's World Cup is not impactful in addressing gender disparities."], "correct_answer": 1, "solution": "No solution available"}, {"id": "33682", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it</strong>.</p> <p>Every global women’s sports competition is more than just a mere sporting spectacle. It is often in the vanguard of creating a more equal society, of seeking to eliminate outdated notions of male exceptionalism and nudging the world at large to embrace broader social reform. The FIFA Women’s World Cup, which ended on Sunday following Spain’s narrow 1-0 victory over England, forms a crucial part of this movement. Under the dazzling Sydney night sky, a whopping 75,784 fans at Stadium Australia witnessed Spain lift its maiden World Cup to join Germany as one of only two nations to have secured both the men’s and women’s titles. The Guardian reported that an average of 30,000 fans attended each match over the co ers in the World Cup."], "correct_answer": 2, "solution": "No solution available"}, {"id": "33685", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>In a quaint town, a cat named Luna and a mouse named Millie decided to cohabit, with Luna singing songs of deep friendship to the timid Millie. As winter approached, Luna wisely proposed, “We must have food stored for the cold days.” They jointly acquired a pot of rich fat but were unsure of its safekeeping. After much debate, Luna suggested the church, believing it was a sanctuary no one would dare rob. The duo hid it beneath the altar, agreeing to access it only in dire need.However, Luna’s temptations got the better of her. Claiming she'd been invited to a christening as a godmother for a cousin's child, she sought Millie’s blessing to leave for the day. Millie, none the wiser, wished her joy and hinted at wanting some christening wine if available. But Luna’s true intentions were darker. She went to the church and indulged in the pot of fat, skimming its top layer. Returning at dusk, she recounted her day to Millie, who curiously asked the baby's name. Luna replied, “Top off!” a truth hidden in a lie. Millie, bemused, wondered if it was a familial name, comparing it to some of her own kin named 'Crumb-stealer'.Luna’s cravings intensified, and soon she used the godmother excuse again. This time, she claimed the child had a unique white neck ring. After Millie's approval, Luna sneakily devoured half of the remaining fat. Upon return, she told Millie the child was named “Half-done”. Millie, ever more puzzled, commented on such unusual names.As Luna's greed grew, she crafted another christening tale, this time for a black kitten with white paws, an event she claimed was rare. Millie, now dubious due to the odd names from before, expressed her skepticism. Luna retorted, blaming Millie’s sheltered life for her overthinking. As Millie tidied their home, Luna, ensnared by gluttony, finished off the entire pot. Returning, she informed Millie the child was named “All-gone”. Millie was now deeply suspicious, questioning the meaning of such a name.When the chilling winds began, Millie, recalling their winter stash, suggested they feast on their stored fat. Luna, masking her guilt with a sly comment, accompanied Millie to the church. But all Millie found was an empty pot. She lamented, realizing Luna's treachery and connecting the names to the depletion of their provision. As Millie uttered, “All-gone,” Luna, threatened and defensive, warned Millie against further accusations. But as the mouse persisted, Luna, in a fit of rage and dominance, devoured her in one swift motion, a grim testament to the often harsh realities of the world.</p> <p><strong>Q42. Why did Luna and Millie store the pot of rich fat in the church?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They wanted to donate it to the church.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> They believed it was a place no one would think of robbing.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Millie thought the church was the warmest place in town.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Luna wanted to be closer to God."], "correct_answer": 1, "solution": "No solution available"}, {"id": "33686", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>In a quaint town, a cat named Luna and a mouse named Millie decided to cohabit, with Luna singing songs of deep friendship to the timid Millie. As winter approached, Luna wi ttps://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Millie left Luna to find a new home.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Luna, in anger, consumed Millie.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Millie forgave Luna and they remained friends."], "correct_answer": 2, "solution": "No solution available"}],ans={};
const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
