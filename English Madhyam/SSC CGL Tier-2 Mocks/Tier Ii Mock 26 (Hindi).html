<script id="theme-toggle-handler">
(function() {
    var savedTheme = 'dark';
    try {
        savedTheme = localStorage.getItem('portal-theme') || 'dark';
    } catch (e) {}
    if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        var observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('light-theme');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('themeToggle');
        if (btn) {
            var newBtn = btn.cloneNode(true);
            newBtn.removeAttribute('onclick');
            btn.parentNode.replaceChild(newBtn, btn);
            
            var currentTheme = 'dark';
            try {
                currentTheme = localStorage.getItem('portal-theme') || 'dark';
            } catch (e) {}
            
            var icon = newBtn.querySelector('i');
            if (icon) {
                icon.className = currentTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            newBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isLight = document.body.classList.toggle('light-theme');
                document.documentElement.classList.toggle('light-theme', isLight);
                var nextTheme = isLight ? 'light' : 'dark';
                try {
                    localStorage.setItem('portal-theme', nextTheme);
                } catch (err) {}
                
                var currentIcon = newBtn.querySelector('i');
                if (currentIcon) {
                    currentIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        }
    });
})();
</script>

<script>
/* DYNAMICALLY IDENTIFY AND ALIGN MATH EQUATIONS */
(function() {
  function processImage(img) {
    if (img.classList.contains('processed-math')) return;
    img.classList.add('processed-math');
    const hasLargeAttr = (img.getAttribute('width') && parseInt(img.getAttribute('width')) > 100) ||
                         (img.getAttribute('height') && parseInt(img.getAttribute('height')) > 60);
    const src = img.src || '';
    const isMath = src.includes('parserImages') || 
                   src.includes('equation') || 
                   img.classList.contains('eq-img') ||
                   (!hasLargeAttr && (img.align === 'bottom' || img.align === 'middle' || !img.align));
    if (isMath && !hasLargeAttr) {
      img.classList.add('math-eq');
    }
  }
  
  function initMathAligner() {
    document.querySelectorAll('img').forEach(processImage);
    const observer = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
          if (node.nodeType === Node.ELEMENT_NODE) {
            if (node.tagName === 'IMG') {
              processImage(node);
            } else {
              node.querySelectorAll('img').forEach(processImage);
            }
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMathAligner);
  } else {
    initMathAligner();
  }
})();

const qs=[{"id": "116780", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>Rekha was very fascinated by the solitude offered by the hillside.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The solitude offered by the hillside fascinated Rekha very much.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The solitude offered by the hillside was fascinating Rekha very much.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The solitude was offering Rekha the hillside fascination very much.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The solitude was offered by the hillside fascinating Rekha very much."], "correct_answer": 0, "solution": "Passive Voice को Active Voice में बदलने के लिए <strong>(Subject + Verb + Object)</strong> का प्रयोग किया जाता है। Passive Voice में ‘Rekha was very fascinated by the solitude offered by the hillside’ में Object ‘the solitude offered by the hillside’ को Active Voice में Subject के रूप में प्रयोग किया गया है। Passive Verb ‘was very fascinated’ को Active Voice में बदलकर ‘fascinated’ किया गया है, और Subject ‘Rekha’ को Object के रूप में रखा गया है। इस प्रकार, सही वाक्य <strong>(The solitude offered by the hillside fascinated Rekha very much)</strong> है।"}, {"id": "116703", "question": "<strong>Select the most appropriate idiom for the underlined segment in the following sentence</strong></p> <p>The new startup managed to <ins><strong>provide established companies with challenging competition</strong></ins> by introducing innovative products and aggressive marketing strategies.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Rush back to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hold one’s ground", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Miss a trick", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Give someone a run for their money"], "correct_answer": 3, "solution": "<strong>D)</strong> <strong>Give someone a run for their money</strong> (idiom) – To compete very well against someone so that it is difficult for them to defeat you. किसी को कड़ी टक्कर देना"}, {"id": "116783", "question": "<strong>Choose the option that is the correct direct form of the sentence.</strong></p> <p>The teacher asked me if I had seen the match.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> \"Did you see the match?\" the teacher said to me.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> \"Did you had saw the match?\" the teacher said to me.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> \"Did you saw the match?\" the teacher said to me.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> \"Did you seen the match?\" the teacher said to me."], "correct_answer": 0, "solution": "Direct Speech को Indirect Speech में बदलने के लिए <strong>Reporting Verb + Pronoun Change + Tense Change + Time/Place Expression Change</strong> का प्रयोग किया जाता है। वाक्य में Reporting Verb ‘explained’ को वैसा ही रखा गया है। वाक्य ‘I don’t belong here’ को Indirect Speech में बदलते समय Verb ‘don’t belong’ को Past Tense के अनुसार ‘did not belong’ में बदला गया \"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> A life of self-control must be adopted by one.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A life of self-control will be adopted by one.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A life of self-control has adopted by one."], "correct_answer": 1, "solution": "Active Voice को Passive Voice में बदलने के लिए <strong>(Object + Auxiliary Verb + Past Participle + by + Subject)</strong> का प्रयोग किया जाता है। वाक्य में ‘One must adopt a life of self-control’ का Passive Voice बनाने के लिए Object ‘a life of self-control’ को वाक्य की शुरुआत में रखा गया है। Modal Verb ‘must’ को Passive Voice में भी वैसे ही रखा गया है और Verb ‘adopt’ को Passive Voice में बदलकर ‘be adopted’ किया गया है। Active Voice का Subject ‘one’ को Passive Voice में ‘by one’ के रूप में प्रयोग किया गया है। अतः सही उत्तर <strong>(A life of self-control must be adopted by one)</strong> है।"}, {"id": "116769", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>A. This year’s General Assembly agenda includes a session on the Treaty on the Prohibition of Nuclear Weapons (TPNW), or the Ban Treaty, as distinguished from the Treaty on the Non-Proliferation of Nuclear Weapons, NPT</p> <p>B. It will be a chance to take stock at a time when the UN is bitterly divided — over the war in Ukraine;</p> <p>C. In the United Nations calendar, September 26 is the International Day for the Total Elimination of Nuclear Weapons</p> <p>D. over the Israel-Palestine conflict; and in responding to accelerating climate change and other related inequalities", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDAC", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> CABD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CDBA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABCD"], "correct_answer": 1, "solution": "C sentence paragraph की शुरुआत करता है क्योंकि यह बताता है कि “In the United Nations calendar, September 26 is the International Day for the Total Elimination of Nuclear Weapons.” इससे पूरे paragraph का main context set होता है, यानी nuclear weapons का मुद्दा और United Nations की भूमिका।"}, {"id": "116707", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The construction costs began to __________ after unexpected delays and material shortages.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Diminish", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Balloon", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Stabilize", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Subside"], "correct_answer": 1, "solution": "<strong>Balloon' </strong>will be used because it means to increase rapidly. The sentence indicates that due to unexpected delays and material shortages, the construction costs started to increase. Therefore, 'Balloon' is the correct choice. Whereas, 'Diminish' means to reduce, 'Stabilize' means to become steady, and 'Subside' means to decrease, which do not fit in this context."}, {"id": "116714", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>She is more confident (A)/ than him when it comes (B)/ to presenting ideas and communicating (C)/ effectively with clients. (D)", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (A)", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> (B)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (C)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (D)"], "correct_answer": 1, "solution": "(i) You are better than I."}, {"id": "116768", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>a. We were flying to Dubai on a Boeing 777.</p> <p>b. As we boarded the huge aircraft, my wife was impressed by the bright, clean, well-kept interiors.</p> <p>c. “New plane,” she commented.</p> <p>d. An airline buff, I knew from the jet’s tail number that it was 18 years old. Aircraft components come with a clear and rigorous replacement timeline, which airlines have to follow meticulously.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, b, a, c", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, a, b, d", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> a, b, c, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, c, b, d"], "correct_answer": 2, "solution": " solution": "P: P logically follows S1 as it provides additional geographical details, explaining that Maldivians know these islands as Foalhavahi, and they are only 300 miles away from the Maldives."}, {"id": "116704", "question": "<strong>Select the most appropriate idiom to fill in the blank</strong></p> <p>The airline industry's difficulties have _______________to already struggling airports in the region.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> reeled under", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> pushed to the corner", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> dealt a heavy blow", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> elephant in the room"], "correct_answer": 2, "solution": "<strong>C) Dealt a heavy blow (idiom) – </strong>To cause serious damage or negative impact. (गंभीर क्षति पहुँचाना)"}, {"id": "116699", "question": "<strong>Select the most appropriate option to substitute the underlined segment in the given sentence.</strong></p> <p>The weekend trip to Las Vegas turned into a wild <ins><strong>euphoria</strong></ins>, filled with spontaneous adventures that broke away from their usual, restrained lifestyle", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Elation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ecstasy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Excitement", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Escapade"], "correct_answer": 3, "solution": "<strong>'Escapade'</strong> will be used because the sentence describes a trip that involved many unpredictable and fun activities, breaking away from their usual, restrained lifestyle. 'Euphoria', 'Elation', 'Ecstasy', and 'Excitement' typically denote joy and enthusiasm, but they do not imply unpredictable and daring activities, as 'Escapade' does."}, {"id": "116705", "question": "<strong>Select the most appropriate meaning of the underlined idiom</strong></p> <p>Economic development and environmental sustainability should <ins><strong>go hand in hand</strong></ins> to ensure long-term prosperity.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Progress in isolation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Be achieved sequentially", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Occur simultaneously", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Depend on external factors"], "correct_answer": 2, "solution": "C) <strong>Go hand in hand</strong> (idiom) – Occur simultaneously (एक साथ घटित होना)"}, {"id": "116708", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The sculpture was designed to __________ the artist’s ideals of freedom and expression.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Embody", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Elude", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Extinguish", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Obscure"], "correct_answer": 0, "solution": "<strong>Embody'</strong> will be used because it means to clearly represent or express an idea, feeling, or quality. The sentence mentions that the sculpture was designed to represent the artist's ideals of freedom and expression, making 'embody' the correct choice. Whereas, 'Elude' means to escape or avoid, 'Extinguish' means to put out, and 'Obscure' means to make unclear, which do not fit in this context."}, {"id": "116713", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>If he was the manager of the company, (A)/ he would have implemented (B)/ several changes to enhance the overall (C)/ efficiency of the business processes. (D)", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> (A)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (B)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (C)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (D)"], "correct_answer": 0, "solution": "(i) I wish I were a bird."}, {"id": "116712", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>The results of the research were not immediately <ins><strong>manifest</strong></ins>, requiring additional analysis to uncover.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Apparent", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> nses", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> and future investments"], "correct_answer": 0, "solution": "A) The correct spelling of ‘<strong>adviseable’</strong> is ‘<strong>advisable</strong>,’ which means “appropriate to be recommended; sensible” उचित या सलाह देने योग्य."}, {"id": "116697", "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>Punishment inflicted on someone as vengeance for a wrong or criminal act.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Proxy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Renouncement", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Relinquishment", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Retribution"], "correct_answer": 3, "solution": "<strong>D) Retribution</strong> (noun) – Punishment inflicted on someone as vengeance for a wrong or criminal act प्रतिशोध"}, {"id": "116784", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>Pritam said, \"The prisoner had slept throughout the journey.\"", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pritam said that the prisoner had been sleeping throughout the journey.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pritam said that the prisoner had sleep throughout the journey.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Pritam said that the prisoner had slept throughout the journey.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pritam said that the prisoner has slept throughout the journey"], "correct_answer": 2, "solution": "Direct Speech को Indirect Speech में बदलने के लिए <strong>Reporting Verb + Pronoun Change + Tense Change</strong> के नियम का प्रयोग किया जाता है। इस वाक्य में Reporting Verb ‘said’ को वैसा ही रखा गया है, क्योंकि यह सामान्य कथन है। वाक्य ‘The prisoner had slept throughout the journey’ में Verb ‘had slept’ को Indirect Speech में भी वैसा ही रखा गया है, क्योंकि <strong>Past Perfect Tense</strong> में Verb को Indirect Speech में बदलते समय कोई परिवर्तन नहीं किया जाता। अतः सही उत्तर <strong>(Pritam said that the prisoner had slept throughout the journey)</strong> है।"}, {"id": "116782", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>I explained, “I don’t belong here.”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I said that I did not belonged here.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> I explained that I did not belong there.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I explained that I do not belong there.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I explained that I did not belong here."], "correct_answer": 1, "solution": "Direct Speech को Indirect Speech में बदलने के लिए <strong>Reporting Verb + Pronoun Change + Tense Change + Time/Place Expression Change</strong> का प्रयोग किया जाता है। वाक्य में Reporting Verb ‘explained’ को वैसा ही रखा गया है। वाक्य ‘I don’t belong here’ को Indirect Speech में बदलते समय Verb ‘don’t belong’ को Past Tense के अनुसार ‘did not belong’ में बदला गया है, क्योंकि यह Simple Present Tense का वाक्य है। साथ ही, Time/Place Expression ‘here’ को Indirect Speech में बदलकर ‘there’ किया गया है। अतः सही उत्तर <strong>(I explained that I did not belong there)</strong> है।"}, {"id": "116706", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The tech company, once a startup, has now transformed into a corporate __________ with influence over the entire industry.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Conundrum", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Behemoth", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Minion", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Endeavour"], "correct_answer": 1, "solution": "<strong>'Behemoth' </strong>will be used because it refers to a large and powerful entity or organization. The sentence indicates that the tech company, once a startup, has now become a dominant corporate entity, making 'behemoth' the appropriate choice. Whereas, 'Conundrum' means a complex problem, 'Minion' refers to a follower, and 'Endeavour' means an effort, which do not fit in this context."}, {"id": "116698", "question": "<strong>Select the most appropriate option to substitute the underlined segment in the given sentence</strong></p> <p>During his <ins><strong>short period when he stays </strong></ins>in Paris, he immersed himself in the city's art and culture.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Summit", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Sojourn", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Convocation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Itinerary"], "correct_answer": 1, "solution": "B) <strong>Sojourn</strong> (noun) – a temporary stay, especially when traveling. अस्थायी प्रवास"}, {"id": "116710", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>Since the contract was already signed, discussing the terms became a <strong>moot</strong> point.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pertinent", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Irrelevant", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Formidable", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pressing"], "correct_answer": 1, "solution": "<strong>Synonym: Irrelevant (adjective) – </strong>Not connected with or relevant to something; unrelated, unimportant. असंगत"}, {"id": "116715", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>The professor who we invited (A)/ to speak at the seminar (B)/ is an expert in climate change. (C)/ No error (D)", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> (A)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (B)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://eng ts employees, meeting their demand halfway, and weakly trying to ____1_____ on to principles of fiscal prudence. Pension schemes around the world, whether contributory and market linked or underwritten by the exchequer, _____2_____facing a crisis, due to multiple factors, including demographic reasons. According to the Reserve Bank of India, the total Budget estimates of various States and Union Territories for pension in 2023-24 was ₹5,22,105.4 crore, which is between 6%-21% of their total revenue receipts. Pensioners argue that it is their ______3_____wages. It can also be argued that pensions from the exchequer are at the cost of future generations. Governments are outsourcing jobs through contracts, and _______4______ innovations such as Agnipath — a short service scheme for the military services — and the ballooning of pension bills is among the reasons that drive such measures.</p> <p><strong>Select the most appropriate option to fill in blank number 4</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> resorting to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> relating to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> pertaining to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> owing to"], "correct_answer": 0, "solution": "No solution available"}, {"id": "116771", "question": "<strong>Comprehension:</strong></p> <p>A farmer was standing completely still amidst the wind-blown wheat field, lost in thought. His wife rushed to him, crying that their only son had just been killed by a cobra. When her husband did not reply, she blurted out, “You are heartless!”</p> <p>“Forgive me, but you don’t understand,” the farmer replied. “Last night I dreamt that I was a king with seven sons, who all were bitten by cobras and died. Now I am wondering whether I should grieve for my seven dead sons in that dream, or for my one son who has died in this dream we are in now.”</p> <p>Our life’s experiences, with all their joys and sorrows, mesmerise us with a sense of undeniable reality. Yet, the truth is that everything is only a thought in the mind of the Divine.</p> <p>Paramhansa Yogananda, who related the story above, explains: “This world seems real to you only because God dreamed you into existence along with His cosmic dream. You are a part of His dream. If, at night, you dream that you bump your head against a wall, you may experience an imaginary pain. The moment you wake up, you realise that there is no pain. The pain you experienced was only in your mind; it was not physical. The same is true of this dream you are dreaming now. Wake up to the one Reality and you will see that this earth life is just a show; it is nothing but shadows and light.” In a small way, this reflects Yogananda’s teaching that all of life’s experiences are for our ‘education and entertainment’. The Supreme dreams a particular dream for each of us and arranges the events in life for our benefit. Though it’s often hard to see amid suffering, it is meant for our welfare and growth.</p> <p>When we get caught up in the pleasure or pain in life, it’s good to remember that we’re not really in charge of our circumstances. We’re only playing our part in God’s dream – be it one of success or failure; health or sickness; love or rejection. With compassion and wisdom, God gives us the roles we are to play, perfectly designed for what we need to learn in this lifetime. Therefore, try to release the anxiety over what has happened in the past, what choices you need to make now, and what the future holds. Let the Divine take charge of your life, for, in fact, He already has. Try to see, in every person and every event in your life, the Dreamer behind the dream.</p> <p><strong>Which of the following best captures the theme of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The unpredictability of life’s challenges.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The concept that life is a divine dream.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The inevitability of pain and suffering.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The importance of human emotions in dealing with loss."], "correct_answer": 1, "solution": "No solution available"}, {"id": "116772", "question": "<strong>Comprehension:</strong></p> <p>A farmer was standing completely still amidst the wind-blown wheat field, lost in thought. His wife rushed to him, crying that their only son had just been killed by a cobra. When her husband did not reply, she blurted out, “You are heartless!”</p> <p>“Forgive me, but you don’t understand,” the farmer replied. “Last night I dreamt that I was a king with seven sons, who all were bitten by cobras and died. Now I am wondering whether I should grieve for my seven dead sons in that dream, or for my one son who has died in this dream we are in now.”</p> <p>Our life’s experiences, with all their joys and sorrows, mesmerise us with a sense of undeniable reality. Yet, the truth is that everything is only a thought in the mind of the Divine.</p> <p>Paramhansa Yogananda, who related the story above, explains: “This world seems real to you only because God dreamed you into existence along with His cosmic dream. You are a part of His dream. If, at night, you dream that you bump your head against a wall, you may experience an imaginary pain. The moment you wake up, you realise that there i ppens by chance.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Surrender to the Divine’s plan for us.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Fight against every adversity with courage.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Seek human solutions to overcome suffering."], "correct_answer": 1, "solution": "No solution available"}, {"id": "116785", "question": "<strong>Comprehension:</strong></p> <p>Manu Bhaker was trolled for failing at the Tokyo Olympics, when she was just 19. Now at 22, her bronze medal which opened India’s account at the Paris Olympics, completes the tale of inspirational push-back of a young woman against those who nearly drove her out of the sport. Considered a hot-headed teen who spoke her mind but couldn’t walk the talk, by medalling at her first Olympics, Manu showed the world just how steely her nerves could be with India’s first shooting medal in 12 years. She slotted in a commanding 10.5 and 10.4 on the crucial shots in the final — where male shooters have regularly choked and missed out on medals in previous editions. In the process, she became India’s first female shooting medalist.</p> <p>At Tokyo, there had been a televised meltdown as her pistol malfunctioned. Because she was hyped as a prodigy, the knives were sharpened even more. Compounding matters, the failure precipitated a public fallout with her coach, Jaspal Rana. Rana had heartbreakingly never had a chance to win his own Olympic medal, and funneled all his energy into training youngsters, keeping them on a tight leash with his stern methods. Manu let the dust settle and returned to a coach who with his harsh words but brilliant technical nous gave her a direction. Books, the Bhagavad Gita, playing the violin and painting calmed her down as she learnt to look failure in the eye.</p> <p> Manu was inspired by the resilience of M C Mary Kom. In becoming India’s first female medalist, the youthful bronze winner also paid homage to the journeys of predecessors and world champions Anjali Vedpathak, Suma Shirur, Tejaswini Sawant, Heena Sidhu and Rahi Sarnobat. As she inspires more youngsters to get into shooting, Manu Bhaker is also likely to become the face of responsible regulation of weapons, an essential for this sport.</p> <p><strong>Q. Which statement best explains the significance of Manu Bhaker's achievement at the Paris Olympics</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She managed to win despite being only 19 years old.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Her victory opened India's account at the Paris Olympics.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She became India's first female shooting medalist, demonstrating resilience against criticism.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Her success was a result of her collaboration with her coach, Jaspal Rana."], "correct_answer": 2, "solution": "No solution available"}, {"id": "116786", "question": "<strong>Comprehension:</strong> </p> <p>Manu Bhaker was trolled for failing at the Tokyo Olympics, when she was just 19. Now at 22, her bronze medal which opened India’s account at the Paris Olympics, completes the tale of inspirational push-back of a young woman against those who nearly drove her out of the sport. Considered a hot-headed teen who spoke her mind but couldn’t walk the talk, by medalling at her first Olympics, Manu showed the world just how steely her nerves could be with India’s first t female shooting medalist.</p> <p>At Tokyo, there had been a televised meltdown as her pistol malfunctioned. Because she was hyped as a prodigy, the knives were sharpened even more. Compounding matters, the failure precipitated a public fallout with her coach, Jaspal Rana. Rana had heartbreakingly never had a chance to win his own Olympic medal, and funneled all his energy into training youngsters, keeping them on a tight leash with his stern methods. Manu let the dust settle and returned to a coach who with his harsh words but brilliant technical nous gave her a direction. Books, the Bhagavad Gita, playing the violin and painting calmed her down as she learnt to look failure in the eye.</p> <p> Manu was inspired by the resilience of M C Mary Kom. In becoming India’s first female medalist, the youthful bronze winner also paid homage to the journeys of predecessors and world champions Anjali Vedpathak, Suma Shirur, Tejaswini Sawant, Heena Sidhu and Rahi Sarnobat. As she inspires more youngsters to get into shooting, Manu Bhaker is also likely to become the face of responsible regulation of weapons, an essential for this sport.</p> <p><strong>Q. What role did Jaspal Rana play in Manu Bhaker's journey to success at the Paris Olympics</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He discouraged her from continuing in the sport after the Tokyo Olympics.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He provided harsh words but brilliant technical guidance.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He was her competitor in the final event at the Paris Olympics.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He was responsible for her pistol malfunctioning at the Tokyo Olympics."], "correct_answer": 1, "solution": "No solution available"}, {"id": "116789", "question": "<strong>Comprehension:</strong></p> <p>One of the biggest pivots in this Budget speech has been a shift in the stance on employment and the sharply higher frequency of mentions it received. ‘Employment’ was the central theme of the Budget, that placed the Prime Minister’s package to facilitate jobs and skills on top of its list of soothing promises. The proposed ₹2 lakh crore package seeks to help 4.1 crore youth over five years with three employment linked-incentive schemes — two of which encourage hiring of fresh entrants in the job market for at least one year with subsidies, while a third attempts to incentivise companies to scale up hiring beyond their previous year’s worker count. To bridge the gap between skill sets and available job roles, a spruce-up of 1,000 industrial training institutes with courses designed in tandem with industry has been promised, along with an ambitious internship programme for a crore youth in 500 top companies. The details of this intern placement programme will be fleshed out, but the Centre has promised to bear a bulk of the stipend involved. Firms can join the scheme on a voluntary basis and tap their mandatory corporate social responsibility funds for the remaining costs. The primacy assigned to tackling the jobs crisis, that the Opposition sought to highlight in the electoral battle, marks an acknowledgement of an issue that the government has otherwise sought to paper over.</p> <p>To be clear, critiques of jobless growth are not unique to this government — even the UPA had faced similar barbs. Part of the problem has been investors’ preference for capital-intensive investments, not in the least because India’s labour laws are yet to catch up with the rest of the liberalised economy, acting as a disincentive against creating larger units with more hands on deck. The distress in recent years has perhap uding filling lakhs of vacancies in its own ranks expeditiously. Fostering conditions to boost consumption is most critical, as the private sector shall neither feel the need to expand capacity, nor hire more people without that trigger just to avail a subsidy.</p> <p>What is the synonym of \"<strong>Expeditiously</strong>\" as used in the passage?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Slowly", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Carefully", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Promptly", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neglectfully"], "correct_answer": 2, "solution": "No solution available"}],ans={};
const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
