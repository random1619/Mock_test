<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 20 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>
    <!-- START: Unified Premium Dark Mode Overrides -->
    <style>

rong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p><strong>A) </strong>In recent years, artificial intelligence’s creative power has challenged preconceived notions about human intelligence and thinking power</p> <p><strong>B) </strong> This dynamic evolution of AI has ushered in a new era</p> <p><strong>C)</strong> In which algorithms generate art, music, and ideas, leaving us to rethink the true extent of AI’s creative prowess</p> <p><strong>D) </strong> After the unveiling of Chat GPT, which created a sensation, different inventions in different sectors questioned the intelligence of the human brain", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ADBC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCAD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABCD"], "correct_answer": 0, "solution": "A: Sentence A introduces the general topic of the paragraph: \"artificial intelligence’s creative power.\" It provides a foundational statement about AI's impact on perceptions of human intelligence and thinking power<br> D: The use of the word \"After\" in D indicates a time sequence or development following something already mentioned, which is the general introduction of AI's creative power in Sentence A.<br> B: Sentence B talks about the \"dynamic evolution of AI\" which logically follows the specific example given in Sentence D<br> C: Sentence C provides details about the \"new era\" mentioned in Sentence B, specifically mentioning the outcomes like algorithms generating art, music, and ideas"}, riting an anthology of poems on childhood."}, {"id": "102056", "question": "<strong>Select the most appropriate word which means the same as the group of words given.</strong></p> <p>The broken parts of objects found in an ancient site", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Defects", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Destruction", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Ruins", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Repairs"], "correct_answer": 2, "solution": "<strong>C) Ruins</strong> (noun) – The broken parts of objects found in an ancient site. खंडहर"}, {"id": "102058", "question": "<strong>Select the most appropriate one-word substitution for the given group of words.</strong></p> <p>An underground place for storing wine", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Cellar", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Loft", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Attic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Niche"], "correct_answer": 0, "solution": "<strong>A) Cellar</strong> (noun) - An underground place for storing wine or other goods. तहखाना"}, {"id": "102041", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>She sings songs in several languages", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Songs in several languages are being sung by her.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Songs in several languages are sung by her.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Songs in several languages were sung by her.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Songs in several languages have been sung by her"], "correct_answer": 1, "solution": "B) Songs in several languages are sung by her."}, {"id": "102038", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>______ he fulfills all the conditions, he should not be given the contract.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Unless", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Since", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Lest", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Whether"], "correct_answer": 0, "solution": "<strong>'Unless'</strong> should be used because in the entire context, the sentence is discussing a condition that needs to be fulfilled. Here, through \"______ he fulfills all the conditions, he should not be given the contract.\", it portrays that unless all conditions are met, the contract should not be awarded. Thus, \"unless\" would be the most appropriate choice"}, {"id": "102201", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p><strong>A) </strong>As we sit for a cup of coffee, he sighs, “No matter how hard I try, it is very difficult to convince him.”</p> <p><strong>B) </strong> But what strikes me the most is his conclusion:</p> <p><strong>C) </strong> My friend is frustrated with his boss.</p> <p><strong>D)</strong> “Definitely, this is not the way he treats everyone.”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDAC", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> CABD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCAD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABCD"], "correct_answer": 1, "solution": "<strong>C:</strong> Sentence C, \"My friend is frustrated with his boss,\" sets the context of the paragraph. It introduces the main subject (the friend) and the problem (frustration with his boss), which is a common starting point in narrative or descriptive paragraphs<br> <strong>A:</strong> Sentence A, \"As we sit for a cup of coffee, he sighs, “No matter how hard I try, it is very difficult to convince him.”\" logically follows sentence C. Here, 'he' refers to the friend mentioned in sentence C.<br> <strong>B:</strong> Sentence B, \"But what strikes me the most is his conclusion:\" follows A. It connects to the previous sentence by indicating a shift in focus to a specific aspect (the conclusion) of what the friend said.<br> <strong>D:</strong> Sentence D, \"“Definitely, this is not the way he treats everyone.”\" serves as the conclusion or specific statement referenced in sentence B."}, {"id": "102199", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</stro ": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong><br> Being present is our definitive _____1_____ in time and space. It transforms our psychological and physical health and opens the door to spiritual growth. But this simple truth gets easily lost. Due to the brevity of life, the Mother noted that men lead ‘harassed’ lives “instead of letting each thing live in its own _____2_____. They are always wanting: forward, forward … And the work is spoilt”.</p> <p>Truly, our consciousness is comprised of many parts and is rarely a unified whole. One observes everything moving in various directions. It is a recipe for psychological imbalance. Our will is dispersed ______3_____ its desires and passions and there seems no unified control. Our inner world is polarised and is vulnerable _____4_____ forces from outside. These fragments come from and project into different time-zones. So the present can be a valuable remedy: it leads us towards a more unified consciousness and will.</p> <p><strong>Select the most appropriate option to fill in blank number 4</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> In", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> For", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> By"], "correct_answer": 0, "solution": "No solution available"}, {"id": "102207", "question": "<strong>Comprehension:</strong></p> <p>On May 30, a start-up named Agnikul Cosmos successfully conducted the first test flight of its rocket ‘Agnibaan’ in a mission called ‘Suborbital Tech Demonstrator’ (SOrTeD). The flight was Agnikul’s fifth attempt after the first four were called off owing to suboptimal launch conditions. ‘Agnibaan’ is a two-stage, 14-tonne launch vehicle designed to lift small satellites to low-earth orbits. Both stages are powered by bespoke semi-cryogenic engines. The test flight flew a ‘minimal’ version of the rocket with one engine (or stage). Notably, many of the vehicle’s components, including the engines, are 3D-printed, and Agnikul has said it will be able to build one rocket a month. With the test flight, Agnikul took ‘Agnibaan’ on its first steps towards being a full-fledged launch vehicle, which will expand India’s commercial launch services offering in keeping with the expanding market for small satellites and the services they can provide. The roster is currently dominated by the Polar Satellite Launch Vehicle (PSLV) and will soon be joined by the Small Satellite Launch Vehicle, both of the Indian Space Research Organisation (ISRO). One blip Agnikul will have to address is the subpar communication of the parameters of the test flight. This is one area in which ISRO has not distinguished itself and it is important for new space startups to steer clear of the same mould.</p> <p>This said, the flights of ‘Agnibaan’ — and Skyroot’s ‘Vikram’ in 2022 — herald two prospects more valuable than commercial fortune. ISRO and/or scientists trained there have shared technical know-how and provided physical systems for many private missions, which these startups are now testing, cutting short the time and expenses required. Likewise, these startups are poised now to light the way for ISRO and others, potentially accelerating innovation in the sector. For example, ISRO has been testing a semi-cryogenic engine of its own that could draw from lessons learnt at Agnikul. The government must ensure that the corresponding bureaucratic and legal frameworks encourage the free flow of knowledge. Second, in April, ISRO said it had developed engine nozzles made of a carbon-carbon composite to replace the Columbium alloy nozzles on the PSLV’s fourth stage. The switch increased PSLV’s payload capacity by 15 kg — a significant amount for an already technologically mature launch vehicle, made possible by education and research opportunities that allowed know-how accrued in some sectors to disperse in others. This privilege is currently most pronounced in India’s spacefaring enterprise. As more innovation enters the fray, it is hoped that the resulting solutions and insights will benefit everything, from aerospace to zoology.</p> <p><strong>Based on the passage, what was the significance of Agnikul Cosmos's successful test flight of 'Agnibaan'?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The successful test flight marked Agnikul's first attempt to launch 'Agnibaan' and established its readiness for commercial satellite launches.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The successful test flight of 'Agnibaan' showcased Agnikul's ability to produce 3D-printed rocket components and confirmed the functionality of its semi-cryogenic engines.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The successful test flight of 'Agnibaan' demonstrated Agnikul's capacity to conduct regular monthly rocket launches, revolutionizing India's space sector.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The successful test flight of 'Agnibaan' indicated the beginning of its journey towards becoming a significant addition to India's commercial launch services alongside ISRO's PSLV and SSLV."], "correct_answer": 3, "solution": "No solution available"}, {"id": "102208", "question" legal frameworks encourage the free flow of knowledge. Second, in April, ISRO said it had developed engine nozzles made of a carbon-carbon composite to replace the Columbium alloy nozzles on the PSLV’s fourth stage. The switch increased PSLV’s payload capacity by 15 kg — a significant amount for an already technologically mature launch vehicle, made possible by education and research opportunities that allowed know-how accrued in some sectors to disperse in others. This privilege is currently most pronounced in India’s spacefaring enterprise. As more innovation enters the fray, it is hoped that the resulting solutions and insights will benefit everything, from aerospace to zoology.</p> <p><strong>What inference can be drawn about the potential impact of private rocket startups on ISRO’s innovation efforts?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Private rocket startups will help accelerate ISRO’s innovation by providing valuable insights and lessons.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The collaboration with private startups will enable ISRO to focus only on high-profile missions.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Private rocket startups will surpass ISRO in terms of technological advancements.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ISRO will become redundant due to the advancements of private rocket startups."], "correct_answer": 0, "solution": "No solution available"}, {"id": "102212", "question": "<strong>Comprehension:</strong><br> Barely a week after the Indian Premier League final (IPL), most of the leading cricketers have already got down to the grind as the ICC Twenty20 World Cup commenced in the United States of America on Saturday (U.S. time). The willow game no longer has an off-season and the championship that would meander through the U.S. and the West Indies, features 20 teams split into four groups and the final will be held in Barbados on June 29. Right through the pedigreed units such as India and Australia to Papua New Guinea and Uganda, the tournament may display an evangelical zeal to promote cricket in a sporting universe that always favours football. Cricket, with its three versions of Tests, ODIs and T20Is, can at times lapse into an identity crisis with the game’s purity and mettle vesting with the five-day format while the commercial muscle almost entirely hinges on the shorter avatars. Even within these layers, the granular issues get complex as T20Is never have the same allure that domestic leagues such as the IPL flaunt. It is in this space that the T20 World Cup hopes to operate and energise the format, once every two years. The ninth edition should offer a cricket of the fast and furious variety while players quickly switch from club loyalties to nationalistic fervour.</p> <p>Hope too floats as Papua New Guinea turned up despite grappling with a massive landslide and the resultant loss of life back home. For India, the long quest for an ICC trophy gets another episode. The last silverware was the Champions Trophy won in 2013, and since then it has often been a case of so close and yet so far. Rohit Sharma’s men get another tilt and there is no mistaking the talent they collectively possess. There may be simmering issues such as the leadership angle following the awkward transition from Rohit to Hardik Pandya as captain of Mumbai Indians. At the national level, Rohit continues to helm while Pandya becomes his deputy and coach Rahul Dravid, always clued into ego hassles right from his playing days, may have to steer the ship away from choppy waters. Placed in Group A, India will open its campaign against Ireland on Wednesday but the big gam const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
