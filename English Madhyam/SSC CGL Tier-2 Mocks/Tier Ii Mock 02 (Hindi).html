<script id="theme-toggle-handler">
(function() {
    var savedTheme = 'dark';
    try {
        savedTheme = localStorage.getItem('portal-theme') || 'dark';
    } catch (e) {}
    if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        var observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('light-theme');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('themeToggle');
        if (btn) {
            var newBtn = btn.cloneNode(true);
            newBtn.removeAttribute('onclick');
            btn.parentNode.replaceChild(newBtn, btn);
            
            var currentTheme = 'dark';
            try {
                currentTheme = localStorage.getItem('portal-theme') || 'dark';
            } catch (e) {}
            
            var icon = newBtn.querySelector('i');
            if (icon) {
                icon.className = currentTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            newBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isLight = document.body.classList.toggle('light-theme');
                document.documentElement.classList.toggle('light-theme', isLight);
                var nextTheme = isLight ? 'light' : 'dark';
                try {
                    localStorage.setItem('portal-theme', nextTheme);
                } catch (err) {}
                
                var currentIcon = newBtn.querySelector('i');
                if (currentIcon) {
                    currentIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        }
    });
})();
</script>
<!-- END: Injected Theme Toggle Immediate -->

<script>
const qs=[{"id": "31342", "question": "<strong>Q1. Select the option that is nearest in meaning to the underlined word</strong></p> <p>He first <ins><strong>convulsed</strong> </ins>and then collapsed on the floor.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> shivered", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> crouched", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> shouted", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> cried"], "correct_answer": 0, "solution": "<strong>Synonym</strong>: <strong>Shivered</strong> (verb) – To shake or tremble with cold, fear, or excitement. कांपना"}, {"id": "31343", "question": "<strong>Q2. Select the option that expresses the given sentence in reported speech</strong></p> <p>She asked Aditi, “Where did you have lunch yesterday?”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She asked Aditi whether she was having lunch yesterday.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She asked Aditi where she was having lunch the previous day.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She asked Aditi if she had lunch yesterday.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She asked Aditi where she had lunch the previous day."], "correct_answer": 3, "solution": "D) She asked Aditi where she had lunch the previous day."}, {"id": "31344", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>I have to stay in Netherlands for a year till I finish my course.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I may be allowed to stay in Netherlands for a year till I finish my course.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> It is suggested that I stay in Netherlands for a year till I finish my course.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> I am obliged to stay in Netherlands for a year till I finish my course.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Let me stay in Netherlands for a year till I finish my course."], "correct_answer": 2, "solution": "<strong>Active से Passive Voice में बदलने के लिए, </strong>Active वाक्य का Object Passive वाक्य का Subject बन जाता है। Verb को Active से Passive में बदलते समय सही Tense का प्रयोग किया जाता है। Active वाक्य में <strong>\"I\"</strong> Subject है, <strong>\"have to stay\"</strong> Verb (Modal + Infinitive) है और <strong>\"in Netherlands for a year till I finish my course\"</strong> Object के रूप में है। Passive में बदलने पर Object को Subject नहीं बनाया जा सकता, इसलिए \"I\" के लिए उचित Passive Construction का प्रयोग किया जाता है। <strong>\"Have to\"</strong> को Passive में बदलते समय <strong>\"am obliged to\"</strong> का प्रयोग किया जाता है।"}, {"id": "31345", "question": "<strong>Q4. </strong>Select the most appropriate <strong>ANTONYM </strong>of the underlined word</p> <p>The <ins><strong>jovial</strong> </ins>host welcomed his guests with a warm smile and a hearty laugh.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cheerful", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Petulant", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Buoyant", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Convivial"], "correct_answer": 1, "solution": "<strong>Antonym</strong>: <strong>Petulant</strong> (adjective) – Irritable, peevish, cross, testy, touchy. चिड़चिड़ा"}, {"id": "31346", "question": "<strong>Q5. Select one of the four options to complete the sentence.</strong></p> <p>A bomb went off in the city centre, but fortunately ­­­­­­­____________________", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Only few hurt", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Somebody was hurt", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Nobody was hurt", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Everybody was hurt"], "correct_answer": 2, "solution": "C) 'Nobody was hurt' का प्रयोग होगा क्योंकि इस वाक्य में यह व्यक्त किया जा रहा है कि बम विस्फोट होने पर भी, आश्चर्यजनक रूप से, कोई भी घायल नहीं हुआ। 'Only few hurt' का अर्थ होता है कि कुछ लोग घायल हो गए, 'Somebody was hurt' का अर्थ होता है कि किसी व्यक्ति को चोट आई है, और 'Everybody was hurt' का अर्थ होता है कि हर कोई घायल हो गया, जो इस संदर्भ में सही नहीं है।"}, {"id": "31347", "question": "<strong>Q6. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p><strong>P. </strong>In several States such as Rajasthan, Chhattisgarh, Himachal Pradesh and Punjab, there has been a return to the OPS.</p> <p><strong>Q.</strong> An estimated 19 lakh government and semi-government employees, including those in schools, colleges, zilla parishads, and government hospitals, to name a few, have been on strike demanding</p> <p><strong>R. </strong>That the government return to the Old Pension Scheme (OPS); they have been on the National Pension Scheme since 2005</p> <p><strong>S.</strong> Employees in Maharashtra desire that their State does the same.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> PQRS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QPRS", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> QRPS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> PSRQ"], "correct_answer": 2, "solution": "<strong>Q:</strong> The sentence Q is introducing a topic, discussing government employees on strike. The logical follow-up to this is an explanation of what they are demanding, which is provided in R. Thus, Q is naturally followed by R."}, {"id": "31348", "question": "<strong>Q7. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p><strong>A.</strong> In this context, this article carries a few suggestions which could boost public policy education in India. The phrase ‘public management’ is used to refer to both public policy and public administration.</p> <p><strong>B. </strong>Good public policies spur economic growth and public welfare and improve ease of living for citizens.</p> <p><strong>C.</strong> Government policies are pivotal in deciding the future of a country.</p> <p><strong>D. </strong>Only a small percentage of policymakers — civil service officers — are exposed to the formal study of public policy and public administration.</p> <p><strong>E.</strong> However, there is little interest in public policy education in India.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DECAB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DEACB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABED", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> CBEDA"], "correct_answer": 3, "solution": "C: \"Government policies\" is a topic introduced in the beginning to provide context about the importance of the subject matter in general."}, {"id": "31349", "question": "<strong>Q8. Select the most appropriate meaning of the idiom</strong></p> <p>Break fresh/new ground", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To build a new house", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To do something that was not done before", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To talk to stranger", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To dig a well"], "correct_answer": 1, "solution": "B) <strong>Break fresh/new ground</strong> (idiom) – To do something that was not done before जो पहले नहीं किया गया था, वह करना।"}, {"id": "31350", "question": "<strong>Q9.</strong> Identify the <strong>INCORRECTLY </strong>spelt word", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Grateful", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Immigrate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ignorance", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Hieararchy"], "correct_answer": 3, "solution": "D) The incorrectly spelt word is 'Hieararchy'. The correct spelling is 'Hierarchy', which means “a system or organization in which people or groups are ranked one above the other according to status or authority” व्यवस्थित तरीके से श्रेणीबद्धता या प्राथमिकता."}, {"id": "31351", "question": "<strong>Q10. The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</strong></p> <p>You should read the newspaper regularly to be update with current affairs", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> You should read", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> to be update", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> the newspaper regularly", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> with current affairs"], "correct_answer": 1, "solution": "B) 'to be update' के बदले 'to be updated' का प्रयोग होगा क्योंकि यहाँ 'be' passive voice के रूप में इस्तेमाल हो रहा है, और passive voice में verb के साथ 'ed' जुड़ता है; जैसे— The book was read by the student."}, {"id": "31352", "question": "<strong>Q11. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p><strong>a. </strong>The word “lawfare” is a portmanteau of “law” and “warfare”</p> <p><strong>b.</strong> Deploying lawfare against their rivals, and are quick to turn back such attempts</p> <p><strong>c.</strong> It refers to the weaponisation of law, and of legal systems, in order to intimidate, harm, or delegitimise an opponent (often, a political opponent)</p> <p><strong>d. </strong>In thriving constitutional democracies, judiciaries are often alert to the possibility of powerful political figures", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> a, c, d, b", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, b, c, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, a, b, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, b, d, a"], "correct_answer": 0, "solution": "Option elimination method:"}, {"id": "31353", "question": "<strong>Q12. Choose the option that best describes the meaning of the underlined idiom/phrase.</strong></p> <p>I always preferred to study Physics and Mathematics, now choosing Economics and Literature for further studies is <ins><strong>another</strong> <strong>kettle of fish</strong></ins>.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Completely different matter", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Slightly different matter", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Completely difficult matter", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Doing things in a hurry"], "correct_answer": 0, "solution": "A) <strong>Another kettle of fish</strong> (idiom) – Completely different matter पूरी तरह से अलग मामला"}, {"id": "31354", "question": "<strong>Q13. Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>The constitutional right to vote", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Franchise", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Polling", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Voting", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Buttoning"], "correct_answer": 0, "solution": "A) <strong>Franchise</strong> (noun) – The constitutional right to vote. मताधिकार"}, {"id": "31355", "question": "<strong>Q14. Select the most appropriate meaning of the underlined word in a sentence</strong></p> <p>They have begun to vaccinate children in an attempt to <ins><strong>check</strong> </ins>the spread of the disease", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> to prevent something from increasing or continuing", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to find out about something", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to make certain that something or someone is correct, safe, or suitable by examining it, him, or her quickly", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to mark items to show your preferences"], "correct_answer": 0, "solution": "A) <strong>Check</strong> (verb) – to prevent something from increasing or continuing रोकना"}, {"id": "31356", "question": "<strong>Q15. In the passage below, four blanks are provided. Four words have been provided below the passage. Choose the correct arrangement of these words to fill in the blanks</strong></p> <p>Social ____________ is now almost always __________ by an internet shutdown, which aims to put a ________ on _____________ or misinformation</p> <p><strong>a.</strong> Accompanied</p> <p><strong>b. </strong>Provocation</p> <p><strong>c.</strong> Lid</p> <p><strong>d. </strong>Strife", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, b, c, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, a, b, c", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, a, d, b", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> d, a, c, b"], "correct_answer": 3, "solution": "D) Social strife is now almost always accompanied by an internet shutdown, which aims to put a lid on provocation or misinformation."}, {"id": "31357", "question": "<strong>Q16. Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>The murder of a king", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sacrilege", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Rebel", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Reticule", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Regicide"], "correct_answer": 3, "solution": "D) <strong>Regicide</strong> (noun) – The act of killing a king. राजा की हत्या"}, {"id": "31358", "question": "<strong>Q17. </strong>Identify the sentence that uses the word '<strong>contain</strong>' in a contextually incorrect manner.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He must contain his hatred", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Documents containing both text and simple graphics can be created", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The need to contain close links between industry and schools", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The cigarettes were thought to contain cannabis"], "correct_answer": 2, "solution": "C) The use of 'contain' in sentence C is contextually incorrect because the meaning of 'contain' is to 'hold' or 'include', whereas sentence C mentions the necessity to establish links, where the use of 'contain' is not apt. Therefore, the correct word would be 'establish' or 'maintain', like— The need to establish/maintain close links between industry and schools."}, {"id": "31359", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong></p> <p>Somebody sent me a gift on my anniversary.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I was surprised to have been sent a gift on my anniversary.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Someone sent a gift on my anniversary.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> I was sent a gift on my anniversary by someone.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I would be sent a gift on my anniversary by someone"], "correct_answer": 2, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong> Active वाक्य में <strong>\"Somebody\"</strong> (Subject), <strong>\"sent\"</strong> (Verb - Past Simple), और <strong>\"me a gift\"</strong> (Indirect Object - \"me\", Direct Object - \"a gift\") हैं। Passive में बदलने के लिए, Direct Object \"a gift\" या Indirect Object \"me\" को Subject बनाया जा सकता है। इस वाक्य में \"me\" (Indirect Object) को Passive वाक्य का Subject बनाया गया है, और Verb को <strong>\"was sent\"</strong> (Past Simple Passive) में बदला गया है। \"by someone\" का प्रयोग किया गया है क्योंकि Active वाक्य में Subject <strong>\"Somebody\"</strong> था।"}, {"id": "31360", "question": "<strong>Q19. </strong>Select the most appropriate <strong>ANTONYM </strong>of the given word from the following sentence.</p> <p>Empowered</p> <p>People feel liberated in modern democracies, yet it is believed they are enslaved in their minds.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> liberated", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> enslaved", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> minds", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> modern"], "correct_answer": 1, "solution": "<strong>Antonym</strong>: <strong>Enslaved</strong> (verb/adjective) – Made into or treated as a slave; shackled, subjugated, chained. ग़ुलाम बनाना"}, {"id": "31361", "question": "<strong>Q20. Some sentences are given below. While the first and the last sentences (1 and 2) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p><strong>1. </strong>For about 25,000 years, we have coexisted with dogs.</p> <p><strong>A.</strong> We are now witnessing a disintegration of this beautiful bond. Intolerance is growing not only towards dogs, but also cats, cows, birds and other creatures.</p> <p><strong>B.</strong> We then extend the same intolerance towards friends, family, neighbours, co-workers, co-passengers and strangers.</p> <p><strong>C.</strong> Dogs protect us, and give us emotional support and companionship.</p> <p><strong>D. </strong>They are loyal, friendly and intelligent.</p> <p><strong>2. </strong>It has been proven that when a person is mean to animals, he is also mean to his own species.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BADC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BACD", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> CDAB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CADB"], "correct_answer": 2, "solution": "<strong>1:</strong> This sentence serves as an introduction to the paragraph, stating a long-standing relationship between humans and dogs. It's clear that this should be the starting statement."}, {"id": "31362", "question": "<strong>Q21. The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don’t find any error, mark ‘No error’ as your answer.</strong></p> <p>Our grandparents will be visited by us this weekend", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Our grandparents", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> will be visited", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> by us this weekend", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> No error"], "correct_answer": 3, "solution": "No Error"}, {"id": "31363", "question": "<strong>Q22. Select the most appropriate option to fill in the blank.</strong></p> <p>Another version of the play based on the text was re-enacted successfully after the prosecution and eventual _________________ of enacting the play in public theatre by the Government", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> prescription", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> proscription", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> proscribing", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> screening"], "correct_answer": 1, "solution": "Government. 'Prescription' refers to a specified procedure or custom, 'Proscribing' A) 'Proscription' का प्रयोग होगा क्योंकि \"proscription\" का अर्थ होता है निषेध या प्रतिबंध। इस संदर्भ में, सरकार द्वारा जन संघटन में नाटक के प्रदर्शन का प्रतिबंध लगाया गया था। 'Prescription' का अर्थ होता है निर्धारित प्रक्रिया या देशाचार, 'Proscribing' निषेध करना है, और 'Screening' का अर्थ है जाँचना या छान-बीन करना, जो इस संदर्भ में सही नहीं है।"}, {"id": "31364", "question": "<strong>Q23. Select the option that expresses the given sentence in reported speech.</strong></p> <p>He said, “I must stay with her as her condition is critical.”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said he would stay with her as her condition is critical.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said that he has to stay with her as her condition has been critical.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He said that he would have to stay with her as her condition was critical.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said he must stay with her as her condition were critical."], "correct_answer": 2, "solution": "C) He said that he would have to stay with her as her condition was critical."}, {"id": "31365", "question": "<strong>Q24. Select the option that expresses the given sentence in reported speech.</strong></p> <p>The manager said to her, “Will you accept the revised salary?”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The manager asked her whether she accepted the revised salary.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The manager asked her whether she would accept the revised salary.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The manager asked her whether she has accepted the revised salary.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The manager asked her whether she will accept the revised salary."], "correct_answer": 1, "solution": "B) The manager asked her whether she would accept the revised salary."}, {"id": "31366", "question": "<strong>Q25. For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the appropriate sentences for S2 and S3, respectively</strong>.</p> <p><strong>S1</strong>: The chequered history of India’s indigenous Advanced Light Helicopter (ALH-Dhruv) touched a low when a Dhruv (IN-709) in the Indian Navy’s newly-acquired fleet of ALH Mk-III MRs was in the news on March 8, 2023.</p> <p><strong>S4:</strong> The three-member crew managed to carry out an unplanned ditching (a forced or precautionary landing on water), exited the craft, and were recovered safely.</p> <p><strong>P:</strong> The ill-fated helicopter was engaged in a training flight when the incident occurred.</p> <p><strong>Q</strong>: The ‘maritime role’ (MR) helicopter, which was on a routine flight, reportedly experienced a “sudden loss of power and rapid loss of height”</p> <p><strong>R</strong>: Close to the coast of Mumbai in the forenoon</p> <p><strong>S: </strong>resulting in the loss of three crew members' lives, media reports said", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and Q", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Q and R", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and S", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Q and S"], "correct_answer": 1, "solution": "A. P and Q: This combination gives a reason for the flight (training) and the circumstances of the incident (loss of power)."}, {"id": "31367", "question": "<strong>Q26. Select the most appropriate meaning of the given idiom.</strong></p> <p>He’s <ins><strong>chicken-hearted</strong></ins>, but I still love him.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Someone who cannot be won over", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Someone who is hypocritical", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Someone who is brave and courageous", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Someone who lacks courage and is easily frightened"], "correct_answer": 3, "solution": "D)<strong> Chicken-hearted</strong> (idiom) – Someone who lacks courage and is easily frightened डरपोक"}, {"id": "31368", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>You must have submitted the important documents.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The important documents must have been submitted by you.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The important documents might be submitted by you.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The important documents must be submitted by you.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The important documents must be submitted by you."], "correct_answer": 0, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong>, Active वाक्य का <strong>Object</strong> Passive वाक्य का <strong>Subject</strong> बन जाता है। <strong>Verb</strong> को Active से Passive में बदलते समय सही <strong>Tense</strong> का प्रयोग किया जाता है। Active वाक्य में <strong>\"You\"</strong> (Subject), <strong>\"must have submitted\"</strong> (Verb - Modal Perfect), और <strong>\"the important documents\"</strong> (Object) है। Passive में बदलने पर <strong>\"The important documents\"</strong> (Subject) बन गया है, <strong>\"must have been submitted\"</strong> (Passive Verb - Modal Perfect) में बदला गया है और <strong>\"by you\"</strong> के रूप में प्रयोग किया गया है।"}, {"id": "31369", "question": "<strong>Q28.Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p><strong>P. </strong>But, as we embrace convenience, we are also generating massive amounts of personal data.</p> <p><strong>Q.</strong> India’s digital economy is set to reach a whopping $1 trillion by 2026.</p> <p><strong>R.</strong> People are going digital rapidly for everything — from shopping and socialising to education and government services.</p> <p><strong>S.</strong> Understanding how this data is handled and protected is fast becoming critical.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QSPR", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> QRPS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RPQS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RSQP"], "correct_answer": 1, "solution": "Q: The sentence Q introduces a time sequence, “by 2026”, which gives us an idea of future prospects, making it a strong opening statement."}, {"id": "31370 anel/img/reload.png\"/></p> In the context of", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Press the advantage"], "correct_answer": 1, "solution": "No solution available"}, {"id": "31376", "question": "<strong>Comprehension</strong>:</p> <p>The United Nations Secretary-General, António Guterres, this week reiterated the consequences of the climate catastrophe that has enveloped the globe. The earth had passed from a warming phase into an “era of global boiling”, he said at the U.N.’s headquarters in New York. His comments come even as scientific evidence converges on the conclusion that July is set to be the hottest month in the last 12,000 years. This was a “disaster” for the whole planet, he said, noting that “short of a mini-Ice Age over the next few days, July 2023 will shatter records everywhere”. Scientists from the World Meteorological Organization (WMO) and the European Commission’s Copernicus Climate Change Service described conditions this month as “rather remarkable and unprecedented”, with July seeing the hottest three-week period on record. Average July temperature so far has been 16.95° Celsius, 0.2° C warmer than in July 2019 — a record in the 174-year observational data of the European Union.</p> <p>With ocean temperatures on the rise and the Central Equatorial Pacific Ocean transitioning from La Niña conditions — where average sea surface temperatures are below normal — to El Niño conditions, the opposite, it was widely expected that temperatures would be warmer than that in the last three years (when La Niña prevailed). However, it is the distribution and impact of the 16.95° C, which includes temperature in northwest China touching 52° C; wildfires in Greece and the baking heat in the United States’ Southwest. The extraordinarily high rains in north and western India, while largely due to prevailing monsoon conditions, were also due to the warm air increasing atmospheric capacity to hold moisture resulting in short torrential bursts, causing floods and devastation. While climate prognostication induces pessimism, Mr. Guterres said that it was still possible to limit global temperature rise to 1.5° C and avoid the very worst of climate change but only with “dramatic, immediate climate action”. At a G-20 ministerial meet in Chennai the same day, the COP28 President-designate, Sultan Ahmed Al Jaber, also emphasised that the world’s largest economies should be more ambitious with emission cuts. While Prime Minister Narendra Modi has promised to make India the “third largest economy” if his party is re-elected in the general election, it will also mean greater pressure on India to take on a greater share of greenhouse gas mitigation responsibilities. This could mean advancing its net zero commitments from 2070 to 2050, as Mr. Guterres says, and generating fossil-free electricity by 2040. While these are the testy points on which climate negotiations hinge, the climate — it bears reminding — waits for nobody.</p> <p><strong>Q34. Which of the following would weaken the author's argument?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The United Nations Secretary-General, António Guterres, suggested that the earth is now cooling down, contrary to previous warnings.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The World Meteorological Organization (WMO) stated that July's temperature records are consistent with the patterns observed over the last 200 years.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Central Equatorial Pacific Ocean is showing signs of returning to La Niña conditions, where average sea surface temperatures are below normal.", "<p style=\"display:none\"><img alt=\"che s net zero commitments from 2070 to 2050, as Mr. Guterres says, and generating fossil-free electricity by 2040. While these are the testy points on which climate negotiations hinge, the climate — it bears reminding — waits for nobody.</p> <p><strong>Q37. Based on the passage, which of the following statements is true regarding the July 2023 temperature statistics?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> July 2023 is expected to be the coolest month in the last 12,000 years.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The average temperature in July 2023 was 5° Celsius warmer than in July 2019.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> July 2023 saw the warmest three-week period on record.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The average July temperature so far has been 15.95° Celsius."], "correct_answer": 2, "solution": "No solution available"}, {"id": "31389", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>Till hardly a couple of years ago, the godowns of the Food Corporation of India (FCI) were overflowing with rice and wheat. It not only enabled the Centre to double the quota of free/near-free grain supplied to public distribution system (PDS) beneficiaries, the country also shipped out record quantities of the two cereals. Further, the FCI, from 2020-21, began selling surplus rice to distilleries for production of ethanol used for blending with petrol. But since January, the Narendra Modi government has restored the PDS quota to the original 5 kg/person/month.</p> <p>Between May 2022 and this month, it has banned exports of wheat and all non-parboiled non-basmati rice. And now, the FCI has halted rice sales to distilleries as well. This, more than a month after the Centre discontinued the supply of FCI grain to states under the open market sale scheme (OMSS).</p> <p>These actions convey a worry over grain availability in general and stocks in public warehouses. While current stocks are more than adequate and the monsoon too has been good so far, the uncertainty pertains to El Niño’s impact down the line on both the 2023-24 rice and wheat crops. The Modi government obviously does not want to take chances ahead of national elections in 2024.</p> <p>Poor and vulnerable families have been largely insulated from retail cereal inflation thanks to the PDS. Ensuring enough stocks to keep that grain flowing would, then, receive topmost priority. Congress-ruled Karnataka may see politics in being denied 2.28 lakh tonnes (lt) of rice to provide poor households in the state an additional 5 kg/person/month — and for which it was willing to pay FCI Rs 34/kg under the OMSS. But what if other states, including those under BJP, were to also make similar demands for additional grain? Nor is the 24.22 lt of rice supplied to ethanol distilleries since 2020-21 particularly huge. However, they all add up.</p> <p>Clearly, the Centre is not in a position to supply grain over and above the requirements of the PDS, which it is obliged to under the National Food Security Act. This wasn’t the case until quite recently. Both states and distilleries need to recognise that — the former before promising more free grain to voters and the latter mainly reliant on supply of FCI rice at Rs 20/kg. Distilleries attached to sugar mills may face fewer issues, as they would have access to molasses once crushing starts from October. Even they must look at alternative feedstock — from maize and barley to millets. The Modi government should stay committed to achieving 20 per cent ethanol blending in petrol, but not through the FCI.</p> <p><strong>Q38.</strong> <strong>Which of the following reasons led to the restriction in grain export and supply</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The godowns of the FCI were not filled with enough rice and wheat.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> There was an uncertainty regarding the El Niño’s impact on the 2023-24 rice and wheat crops.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The FCI wanted to increase its profit by selling more rice to distilleries.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Poor families were not insulated from retail cereal inflation."], "correct_answer": 1, "solution": "No solution available"}, {"id": "31390", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>Till hardly a couple of years ago, the godowns of the Food Corporation of India (FCI) were overflowing with rice and wheat. It not only enabled the Centre to double the quota of free/near-free grain supplied to public distribution system (PDS) beneficiaries, the country also shipped out record quantities of the two cereals. Further, the FCI, from 2020-21, began selling surplus rice to distilleries for production of ethanol used for blending with petrol. But since January, the Narendra Modi government has restored the PDS quota to the original 5 kg/person/month.</p> <p>Between May 2022 and this month, it has banned exports of wheat and all non-parboiled non-basmati rice. And now, the FCI has halted rice sales to distilleries as well. This, more than a month after the Centre discontinued the supply of FCI grain to states under t  Security Act.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Providing states with surplus grain under the open market sale scheme.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Achieving 20 per cent ethanol blending in petrol using FCI grain."], "correct_answer": 1, "solution": "No solution available"}, {"id": "31392", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>Till hardly a couple of years ago, the godowns of the Food Corporation of India (FCI) were overflowing with rice and wheat. It not only enabled the Centre to double the quota of free/near-free grain supplied to public distribution system (PDS) beneficiaries, the country also shipped out record quantities of the two cereals. Further, the FCI, from 2020-21, began selling surplus rice to distilleries for production of ethanol used for blending with petrol. But since January, the Narendra Modi government has restored the PDS quota to the original 5 kg/person/month.</p> <p>Between May 2022 and this month, it has banned exports of wheat and all non-parboiled non-basmati rice. And now, the FCI has halted rice sales to distilleries as well. This, more than a month after the Centre discontinued the supply of FCI grain to states under the open market sale scheme (OMSS).</p> <p>These actions convey a worry over grain availability in general and stocks in public warehouses. While current stocks are more than adequate and the monsoon too has been good so far, the uncertainty pertains to El Niño’s impact down the line on both the 2023-24 rice and wheat crops. The Modi government obviously does not want to take chances ahead of national elections in 2024.</p> <p>Poor and vulnerable families have been largely insulated from retail cereal inflation thanks to the PDS. Ensuring enough stocks to keep that grain flowing would, then, receive topmost priority. Congress-ruled Karnataka may see politics in being denied 2.28 lakh tonnes (lt) of rice to provide poor households in the state an additional 5 kg/person/month — and for which it was willing to pay FCI Rs 34/kg under the OMSS. But what if other states, including those under BJP, were to also make similar demands for additional grain? Nor is the 24.22 lt of rice supplied to ethanol distilleries since 2020-21 particularly huge. However, they all add up.</p> <p>Clearly, the Centre is not in a position to supply grain over and above the requirements of the PDS, which it is obliged to under the National Food Security Act. This wasn’t the case until quite recently. Both states and distilleries need to recognise that — the former before promising more free grain to voters and the latter mainly reliant on supply of FCI rice at Rs 20/kg. Distilleries attached to sugar mills may face fewer issues, as they would have access to molasses once crushing starts from October. Even they must look at alternative feedstock — from maize and barley to millets. The Modi government should stay committed to achieving 20 per cent ethanol blending in petrol, but not through the FCI.</p> <p><strong>Q41. Which tone best describes the overall sentiment of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Neutral and Informative", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Humorous and Light-Hearted", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pessimistic and Worried", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Angry and Frustrated"], "correct_answer": 0, "solution": "No solution available"}, {"id": "31413", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it</strong>.</p> <p>James Herriot, a veterinary surgeon, becomes deeply concerned about a dog named Tricki owned by Mrs. Pumphrey. On seeing Tricki on the street with his owner, he is taken aback by the dog's obesity. His condition reflects a life of overindulgence. Mrs. Pumphrey, a doting owner, admits to pampering Tricki with extra treats like cream cakes and chocolates out of concern for his listlessness. She believes that Tricki might be malnourished, so she supplements his diet with malt, cod-liver oil, and Horlicks. Moreover, the dog's exercise has been minimal since the gardener, responsible for Tricki's play sessions, has been ill.Herriot sternly advises Mrs. Pumphrey to reduce Tricki's food intake and increase his exercise, warning that the dog’s health is in genuine peril. Despite her initial determination, it's not long before Mrs. Pumphrey calls Herriot, distressed. Tricki is now refusing all food, vomiting, and lying around panting.Having anticipated this, Herriot recommends that Tricki be hospitalized for observation. Mrs. Pumphrey is initially resistant, fearing that Tricki would be distressed away from her. Nevertheless, she acquiesces, and Tricki is taken to the surgery, accompanied by a surplus of his belongings, including beds, toys, and coats, most of which are unnecessary.At the surgery, Tricki is initially indifferent to the other dogs. He is placed in a warm box and, for the first couple of days, is given only water. By the third day, Tricki starts showing interest in the other dogs. He begins to engage with them, running and playing vigorously. Through this natural dog-to-dog interaction, Tricki sheds his excess weight and rejuvenates. The once lethargic and sickly pet becomes an energetic, muscular, and happy dog.Throughout Tricki's stay, Mrs. Pumphrey is anxious about his well-being, frequently calling to check on him. To aid in Tricki's \"convalescence,\" she sends fresh eggs, wine, and even brandy. This unexpected bounty becomes a delightful treat for Herriot and his partners, turning their meals into feasts. The vet recognizes the situation's perks, but after two weeks, knowing that Mrs. Pumphrey misses Tricki dearly, he decides it's time for the dog to return home.Upon Tricki's retrieval, Mrs. Pumphrey is overjoyed. She finds it hard to believe the transformation, from an ailing obese dog to a vibrant and healthy one, attributing the change to a \"triumph of surgery.\" As she departs with her rejuvenated pet and the untouched excess of his belongings, Herriot smiles, realizing that sometimes, the simplest solutions, like allowing a dog to be a dog, work wonders.</p> <p><strong>Q42. Why was James Herriot concerned about Tricki</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Tricki was playing too much with the other dogs.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Tricki was losing weight rapidly.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mrs. Pumphrey was not feeding Tricki.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Tricki's obesity due to overindulgence."], "correct_answer": 3, "solution": "No solution available"}, {"id": "31414", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it</strong>.</p> <p>James Herriot, a veterinary surgeon, becomes deeply concerned about a dog named Tricki owned by Mrs. Pumphrey. On seeing Tricki on the street with his owner, he is taken aback by the dog's obesity. His condition reflects a life of overindulg  credited it to the \"triumph of surgery.\"", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She thought Tricki had always been healthy.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She thanked the other dogs for playing with Tricki."], "correct_answer": 1, "solution": "No solution available"}],ans={};
const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
