<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 19 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

ne\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BADC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DBAC", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> DABC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCAD"], "correct_answer": 2, "solution": "D sentence पहले आता है क्योंकि यह NEP (National Education Policy) को introduce करता है। यह बताता है कि “The NEP is a vision document that provides a broad contour of how education can be transformed in India while getting away from the clutches of the colonial mindset.” यानी, NEP का vision education को colonial mindset से दूर ले जाना है। यह 1st sentence में दिए गए विचार को विस्तार से समझाता है।"}, {"id": "116291", "question": "<strong>Select the option that expresses the given sentence in direct speech.</strong></p> <p>The plumber told Ranjit that he had fixed the leaking tap.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The plumber said to Ranjit, \"I have fixed the leaking tap.\"", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The plumber told to Ranjit, \"He had fixed the leaking tap.\"", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The plumber said to Ranjit, \"You had fix the leaking tap.\"", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The plumber told Ranjit, \"Had he fixed the leaking tap?\""], "correct_answer": 0, "solution": "Indirect Speech को Direct Speech में बदलने के लिए <strong>Reporting Verb + Quotation Marks + Pronoun Change + Tense Change</strong> के नियम का प्रयोग किया जाता है। वाक्य में ‘The plumber told Ranjit that he had fixed the leaking tap’ को Direct Speech में बदलते समय Reporting Verb ‘told’ को ‘said to’ में बदला गया है। Indirect Speech में Verb ‘had fixed’ को Present Perfect Tense के अनुसार ‘have fixed’ में परिवर्तित किया गया है क्योंकि Direct Speech में यह वाक्य Present Perfect Tense में होगा। Pronoun ‘he’ को Direct Speech में बदलकर ‘I’ में परिवर्तित किया गया है। अतः सही उत्तर <strong>(The plumber said to Ranjit, \"I have fixed the leaking tap.\")</strong> है।"}, {"id": "116293", "question": "<strong>Select the option that expresses the given sentence in reported speech.</strong></p> <p>The new employee asked the manager, \"When do I have to report for work?\"", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The new manager asked the employee when he would report for work.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The manager told the new employee when to report for work.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The new employee told the manager that when he had to report for work.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The new employee asked the manager when he had to report for work."], "correct_answer": 3, "solution": "Direct Speech को Indirect Speech में बदलने के लिए <strong>Reporting Verb + Pronoun Change + Tense Change</strong> का नियम प्रयोग किया जाता है। यहाँ Reporting Verb ‘asked’ को वैसा ही रखा गया है क्योंकि प्रश्न पूछा गया है। वाक्य में ‘When do I have to report for work?’ को Indirect Speech में बदलते समय Verb ‘do I have to report’ को Past Tense के अनुसार ‘he had to report’ में बदला गया है, क्योंकि यह Simple Present Tense का वाक्य है। Pronoun ‘I’ को ‘he’ से बदला गया है, जो कि Pronoun Change के नियम के अनुसार है। अतः सही उत्तर <strong>(The new employee asked the manager when he had to report for work)</strong> है।"}, {"id": "116288", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>The Board approved my leave", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My leave had been approved.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> My leave was approved by the Board.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My leave is approved by the Board.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My leave was being approved by the Board"], "correct_answer": 1, "solution": "Active Voice को Passive Voice में बदलने के लिए <strong>(Object + Auxiliary Verb + Past Participle + by + Subject)</strong> का प्रयोग किया जाता है। इस वाक्य में ‘The Board’ जो कि Subject है, उसे Passive Voice में ‘by the Board’ के साथ अंत में रखा गया है। Verb ‘approved’ को Passive Voice में बदलकर ‘was approved’ किया गया है, क्योंकि यह Simple Past Tense का वाक्य है और इसके अनुसार <strong>(Object + was/were + Past Participle + by + Subject)</strong> का प्रयोग किया जाएगा। ‘My leave’ जो कि Object है, उसे वाक्य की शुरुआत में रखा गया है।"}, {"id": "116278", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The leader’s __________ vision for the country’s future inspired hope and optimism among the people.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Lofty", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mundane", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Banal", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Grimy"], "correct_answer": 0, "solution": "<strong>Lofty' </strong>will be used because it means having a great, idealistic, or noble vision. The sentence mentions that the leader's vision inspired hope and optimism among the people, which is only possible with a great and noble outlook. Whereas, 'Mundane' means ordinary or common, 'Banal' means ordinary or lacking originality, which are not impactful or inspiring, and 'Grimy' means dirty or covered with grime, which does not fit in this context at all."}, {"id": "116285", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>A large number of students (A)/ is expected to participate (B)/ in the inter-college cultural festival (C)/ scheduled to take place next month. (D)", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (A)", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> (B)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (C)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (D)"], "correct_answer": 1, "solution": "(i) A number of girls have passed."}, {"id": "116287", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>Many of the participants (A)/ was eager to share their experiences (B)/ during the workshop session (C)/ held at the university auditorium. (D)", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> (B)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (D)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (A)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (C)"], "correct_answer": 0, "solution": "(i) Both are happy."}, {"id": "116289", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>I am creating an app to help COVID patients.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> An app is being created by me to help COVID patients.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> An app will be created by me to help COVID patients.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> An app had been created by me to help COVID patients.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> An app was created by me to help COVID patients."], "correct_answer": 0, "solution": "Active Voice को Passive Voice में बदलने के लिए <strong>(Object + Auxiliary Verb + Being + Past Participle + by + Subject)</strong> का प्रयोग किया जाता है, जब वाक्य Continuous Tense में हो। इस वाक्य में ‘I’ जो कि Subject है, को Passive Voice में ‘by me’ के साथ अंत में रखा गया है। Verb ‘am creating’ को Passive Voice में बदलकर ‘is being created’ किया गया है, क्योंकि यह Present Continuous Tense का वाक्य है और इसके अनुसार <strong>(Object + is/are/am + being + Past Participle + by + Subject)</strong> का प्रयोग किया जाएगा। ‘An app’ जो कि Object है, को वाक्य की शुरुआत में रखा गया है।"}, {"id": "116275", "question": "<strong>Select the most appropriate phrasal verb to fill in the blank</strong></p> <p>He has _____________ 450 points in three months.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Racked up", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Called on", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Grappled with", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Broken out"], "correct_answer": 0, "solution": "A) <strong>Racked up</strong> (phrasal verb) – Accumulate or acquire a large amount of something. इकट्ठा करना"}, {"id": "116270", "question": "<strong>Select the most appropriate option to substitute the underlined segment in the given sentence. </strong></p> <p>The politician's speech was filled with <ins><strong>belief</strong> </ins>designed to sway public opinion and gain more support for his policies.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Rhetoric", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Principle", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Creed", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Philosophy"], "correct_answer": 0, "solution": "'Rhetoric' is the correct choice because the sentence suggests that the speech was crafted to influence public opinion. 'Rhetoric' means “the art of persuasive speaking or writing, especially with the use of figures of speech and other compositional techniques.” ‘Belief’ is incorrect here as it refers to convictions or principles, which do not fit the context. Like— The politician's speech was filled with rhetoric designed to sway public opinion and gain more support for his policies."}, {"id": "116276", "question": "<strong>Select the most appropriate meaning of the underlined idiom</strong></p> <p>The proposed policy changes <ins><strong>run counter to</strong></ins> the organization’s long-standing principles of transparency and fairness", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Support and enhance", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Agree and conform", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Contradict and oppose", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Encourage and promote"], "correct_answer": 2, "solution": "C) <strong>Run counter to</strong> (idiom) – Contradict and oppose किसी चीज़ के विपरीत जाना या विरोध करना।"}, {"id": "116279", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The biased trial was a complete __________ of justice, leaving many citizens disillusioned.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Reverence", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Travesty", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Equilibrium", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Plaudit"], "correct_answer": 1, "solution": "<strong>'Travesty' </strong>will be used because it means a distorted or false representation of something, especially when presented in an unfair or improper way. The sentence indicates that the biased trial was a mockery of justice, leaving many citizens disillusioned, making 'travesty' the correct choice. Whereas, 'Reverence' means respect, 'Equilibrium' means balance, and 'Plaudit' means praise, which do not fit in this context."}, {"id": "116284", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>The CEO, along with the board members, (A)/ are planning to introduce new policies (B)/ to improve the company’s performance (C)/ and address the concerns of all stakeholders. (D)", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The CEO, along with the board members,", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> are planning to introduce new policies", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to improve the company’s performance", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> and address the concerns of all stakeholders"], "correct_answer": 1, "solution": "(i) You as well as your sister were in the wrong."}, {"id": "116283", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>After hours of negotiation, the parties reached an <ins><strong>impasse</strong></ins>, unable to find a middle ground.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Conundrum", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Deadlock", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Breakthrough", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Stalemate"], "correct_answer": 2, "solution": "<strong>Antonym: Breakthrough (noun) – </strong>A sudden, dramatic, and important discovery or development; a resolution or advancement. प्रगति, समाधान"}, {"id": "116273", "question": "<strong>Select the most appropriate spelling of the underlined word in the given sentence</strong></p> <p>The outcome did not <ins><strong>dissapoint</strong> </ins>her.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> dessapoint", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> disappoint", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> dissappoint", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> disapoint"], "correct_answer": 1, "solution": "B) The correct spelling of the underlined word is <strong>‘disappoint’</strong>, which means <strong>“fail to fulfill the hopes or expectations of”</strong> — <strong>उम्मीदों</strong><strong> </strong><strong>पर</strong><strong> </strong><strong>खरा</strong><strong> </strong><strong>नहीं</strong><strong> </strong><strong>उतरना</strong>."}, {"id": "116280", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>The student’s mind was <ins><strong>brimming</strong> </ins>with ideas after attending the motivational seminar.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Devoid", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Tenuous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Listless", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Overflowing"], "correct_answer": 3, "solution": "<strong>Synonym: Overflowing (verb/adjective) – </strong>To be so full that the contents spill over the edge; abundant, teeming. उफनता हुआ, प्रचुर मात्रा में"}, {"id": "116282", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>The manager’s harsh <ins><strong>rebuke</strong> </ins>demoralized the team for the rest of the day.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Critique", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Praise", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Reprimand", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Condemn"], "correct_answer": 1, "solution": "<strong>Antonym: Praise (noun) – </strong>The expression of approval or admiration, commendation, compliment. प्रशंसा"}, {"id": "116271", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a spelling error</strong></p> <p>She was allmost ready / to leave for the trip / but decided to stay back / for one more day.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She was allmost ready", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to leave for the trip", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> but decided to stay back", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> for one more day."], "correct_answer": 0, "solution": "A) The correct spelling of <strong>‘allmost’</strong> is <strong>‘almost’</strong>, which means <strong>“nearly; very close to”</strong> <strong>लगभग</strong>. The word \"allmost\" is incorrect because it has an extra 'l'."}, {"id": "116268", "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>The doctrine that all people are equal and deserve equal rights and opportunities", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> parity", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> egalitarianism", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> impartiality", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> equilibrium"], "correct_answer": 1, "solution": "B) <strong>Egalitarianism</strong> (noun) – The doctrine that all people are equal and deserve equal rights and opportunities. समानतावाद"}, {"id": "116296", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>A. In the United Nations calendar, September 26 is the International Day for the Total Elimination of Nuclear Weapons</p> <p>B. This year’s General Assembly agenda includes a session on the Treaty on the Prohibition of Nuclear Weapons (TPNW), or the Ban Treaty, as distinguished from the Treaty on the Non-Proliferation of Nuclear Weapons, NPT</p> <p>C. Over the Israel-Palestine conflict; and in responding to accelerating climate change and other related inequalities</p> <p>D. It will be a chance to take stock at a time when the UN is bitterly divided — over the war in Ukraine;", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDAC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCAD", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ABDC"], "correct_answer": 3, "solution": "B, A के बाद logically fit होता है क्योंकि यह A में बताए गए context को विस्तार से बताता है और उस event के बारे में specific details introduce करता है। यह sentence A से जुड़े facts को जोड़ता है, जिससे paragraph की coherence बनी रहती है। यह sentence A के topic को support करता है और उसे expand करता है।"}, {"id": "116294", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>a. There have also been calls to replicate the United Kingdom’s coal phase-out globally.</p> <p>b. But this has by no means been a frictionless transition, as it has been portrayed in much of the press.</p> <p>c. While Britain’s experiment could hold good for a few developed economies, a far more tailor-made approach would be required for developing and least-developed nations.</p> <p>d. The shuttering of Britain’s last coal-fired power plant, in Nottinghamshire, is a milestone and indicates the hastening of an ongoing paradigm shift in energy production globally.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> d, b, a, c", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, a, b, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, c, a, b", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, c, b, d"], "correct_answer": 0, "solution": "b, d के बाद logically fit होता है क्योंकि यह “But this has by no means been a frictionless transition” के माध्यम से एक contrast प्रस्तुत करता है, यह बताते हुए कि transition उतना smooth नहीं रहा जितना बताया गया है। इससे d में बताए गए milestone को एक real-world context में रखता है।"}, {"id": "116277", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>It took considerable __________ for the young journalist to question the corrupt official in a public forum.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ambivalence", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Subtlety", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Audacity", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hesitancy"], "correct_answer": 2, "solution": "<strong>Audacity</strong>' will be used because \"audacity\" means the courage or boldness to confront a challenging situation. The sentence mentions that the young journalist questioned the corrupt official in a public forum, which indicates his bravery, making 'audacity' fitting here.<br> Whereas, 'Ambivalence' means having mixed feelings, 'Subtlety' means being delicate or tactful, and 'Hesitancy' means reluctance, which are not appropriate in this context"}, {"id": "116269", "question": "<strong>Select the most appropriate option to substitute the underlined segment in the given sentence.</strong></p> <p>Despite his mediocre performance, Jack remained <ins><strong>hostility</strong></ins>, constantly boasting about his skills and dismissing others’ opinions.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Revere", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Venerate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Antipathy", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Conceited"], "correct_answer": 3, "solution": "<strong>Conceited'</strong> will be used because the sentence describes Jack's behavior, where he constantly boasts about his abilities and disregards others' opinions. 'Conceited' means \"having an excessively high opinion of oneself,\" which fits the context of the sentence. Other options like 'Revere' (to show deep respect), 'Venerate' (to honor), and 'Antipathy' (a strong dislike) are not suitable according to the meaning of the sentence."}, {"id": "116281", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>With no alternative solutions in sight, the company’s decline seemed <ins><strong>inevitable</strong></ins>.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optional", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Unavoidable", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Tentative", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Arbitrary"], "correct_answer": 1, "solution": "Synonym- Unavoidable </strong>(adjective) – Impossible to avoid, certain to happen. <strong>अनिवार्य"}, {"id": "116286", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>More than one student (A)/ have expressed their willingness (B)/ to participate in the research project (C)/ that aims to explore innovative solutions to climate change. (D)", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (D)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (A)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (C)", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> (B)"], "correct_answer": 3, "solution": "(i) More than one room is vacant."}, {"id": "116272", "question": "<strong>There is a spelling error in the given sentence. Select the option that contains the INCORRECTLY spelt word</strong></p> <p>She identifies as an athiseet and does not believe in deities.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Athiseet", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Identifies", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Believe", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Deities"], "correct_answer": 0, "solution": "A) The correct answer is <strong>‘Athiseet’</strong> which should be spelt as <strong>‘Atheist’</strong>. An <em>atheist</em> is a person who disbelieves or lacks belief in the existence of God or gods. नास्तिक"}, {"id": "116290", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>We will start the meeting as soon as all the members arrive", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The meeting is going to start as soon as all the members arrive.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The meeting is being started as soon as all the members arrive.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The meeting is going to be started as soon as all the members arrive.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The meeting will be started as soon as all the members arrive"], "correct_answer": 3, "solution": "Active Voice को Passive Voice में बदलने के लिए <strong>(Object + Auxiliary Verb + Past Participle + by + Subject)</strong> का प्रयोग किया जाता है। इस वाक्य में ‘We’ जो कि Subject है, को Passive Voice में ‘by us’ के साथ प्रयोग नहीं किया गया है क्योंकि यह Formal English में आवश्यक नहीं होता। Verb ‘will start’ को Passive Voice में बदलकर ‘will be started’ किया गया है, क्योंकि यह Simple Future Tense का वाक्य है और इसके अनुसार Passive Voice के लिए <strong>(Object + will/shall + be + Past Participle)</strong> का प्रयोग किया जाता है। ‘The meeting’ जो कि Object है, को वाक्य की शुरुआत में रखा गया है।"}, {"id": "116297", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong><br> In the contemporary landscape of the Indian economy, the infusion of disruptive technologies ____1_____ ignited a digital revolution, _____2_____the nation into a global IT powerhouse. India is currently ______3_____ an unprecedented ubiquity of technology, with entrepreneurs leveraging cutting-edge technologies like AI, blockchain, Internet of Things (IoT), machine learning, and data analytics to tackle multifaceted challenges. Today, India _____4____ all the necessary ingredients to become a modern IT-empowered nation: a wealth of educated workforce, technological expertise, supportive government policies, and a collaborative digital ecosystem are driving the nation forward.</p> <p><strong>Select the most appropriate option to fill in blank number 1.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Have", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Had", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Was", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Has"], "correct_answer": 3, "solution": "No solution available"}, {"id": "116298", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong><br> In the contemporary landscape of the Indian economy, the infusion of disruptive technologies ____1_____ ignited a digital revolution, _____2_____the nation into a global IT powerhouse. India is currently ______3_____ an unprecedented ubiquity of technology, with entrepreneurs leveraging cutting-edge technologies like AI, blockchain, Internet of Things (IoT), machine learning, and data analytics to tackle multifaceted challenges. Today, India _____4____ all the necessary ingredients to become a modern IT-empowered nation: a wealth of educated workforce, technological expertise, supportive government policies, and a collaborative digital ecosystem are driving the nation forward.</p> <p><strong>Select the most appropriate option to fill in blank number 2.</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Propelling", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Unsettling", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Handling", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Signaling"], "correct_answer": 0, "solution": "No solution available"}, {"id": "116299", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong><br> In the contemporary landscape of the Indian economy, the infusion of disruptive technologies ____1_____ ignited a digital revolution, _____2_____the nation into a global IT powerhouse. India is currently ______3_____ an unprecedented ubiquity of technology, with entrepreneurs leveraging cutting-edge technologies like AI, blockchain, Internet of Things (IoT), machine learning, and data analytics to tackle multifaceted challenges. Today, India _____4____ all the necessary ingredients to become a modern IT-empowered nation: a wealth of educated workforce, technological expertise, supportive government policies, and a collaborative digital ecosystem are driving the nation forward.</p> <p><strong>Select the most appropriate option to fill in blank number 3.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Alarming", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Progressing", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Underling", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Witnessing"], "correct_answer": 3, "solution": "No solution available"}, {"id": "116300", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong><br> In the contemporary landscape of the Indian economy, the infusion of disruptive technologies ____1_____ ignited a digital revolution, _____2_____the nation into a global IT powerhouse. India is currently ______3_____ an unprecedented ubiquity of technology, with entrepreneurs leveraging cutting-edge technologies like AI, blockchain, Internet of Things (IoT), machine learning, and data analytics to tackle multifaceted challenges. Today, India _____4____ all the necessary ingredients to become a modern IT-empowered nation: a wealth of educated workforce, technological expertise, supportive government policies, and a collaborative digital ecosystem are driving the nation forward.</p> <p><strong>Select the most appropriate option to fill in blank number 4</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pose", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Possesses", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Posses", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Posing"], "correct_answer": 1, "solution": "No solution available"}, {"id": "116301", "question": "<strong>Comprehension: </strong></p> <p>On August 16, a 120-tonne rocket, about five times smaller than India’s largest satellite launch vehicle, took off from ISRO’s Satish Dhawan Centre in Sriharikota, heralding a major milestone in the country’s space research. The Small Satellite Launch Vehicle (SSLV) can carry payloads weighing up to 500 kg. These space capsules had to earlier wait for months, even years, to hitch a ride on vehicles designed for large satellites. But in the past decade, the miniaturisation of satellites has enabled the entry of universities, corporates and even individual innovators in a field once dominated by large enterprises and state institutions such as ISRO and NASA. The SSLV can prove to be a game changer for these micro and nano space stations. The launch vehicle can be assembled in less than a week by a much smaller team. With ISRO planning to transfer technology to private players, the country’s space sector is poised for a significant expansion.</p> <p>The utility of small satellites is increasingly expanding in a variety of sectors, including weather forecasting, communications, defence, urban planning and disaster management. They are also crucial enablers in the growing Internet of Things. There is near unanimity that the market for space tech is set to increase in the next five years. US and EU companies are currently the biggest players, while China, Australia and Russia are beginning to expand their footprint. China plans to launch more than 13,000 satellites by 2030 to establish a network supporting high-speed 6G communications. India currently is a relatively smaller participant — its current share in the space economy is about 2 per cent. With the SSLV and related endeavours, the government aims at a four-fold scale-up in the country’s stakes by 2033. In the past two years, start-ups such as those by the Hyderabad-based Skyroot and the Chennai-based Agnikul have ticked several boxes, including working closely with ISRO. Agnikul, for instance, has built its own launch pad inside the Sriharikota range with ISRO’s help. The IIT-Madras incubated company is working on a launch vehicle to carry payloads smaller than ISRO’s SSLV and it has ambitious plans to launch one rocket every week.</p> <p>India’s space policy, introduced in April last year, recognised the country’s need to transition from the ISRO-dominated ecosystem. At the same time, the policy took care to underline the premier agency’s enabling role in expanding the country’s footprint in the space economy. ISRO’s work remains crucial to diverse social objectives of the government — education, healthcare, agriculture, climate-change mitigation and environment protection. Space tech is also critical to the country’s security objectives. The challenge now is to frame a regulatory mechanism that complements ISRO’s work, enables manufacturers of small satellites and rockets to unlock their potential while also making sure that the country’s welfare imperatives are not crowded out. The SSLV’s launch should be a prelude to conversations on such a mechanism.</p> <p><strong>Based on the passage, which of the following can be inferred about the future of India's space sector?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> India's space sector will continue to be dominated by ISRO with limited participation from private players.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The growth of India's space sector will be driven largely by technological advancements in larger satellite launch vehicles.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The entry of private players and the focus on smaller satellite launch vehicles like SSLV will significantly expand India's role in the global space economy.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The dominance of the US and EU in space technology will prevent India from making significant progress in the sector."], "correct_answer": 2, "solution": "No solution available"}, {"id": "116302", "question": "<strong>Comprehension: </strong></p> <p>On August 16, a 120-tonne rocket, about five times smaller than India’s largest satellite launch vehicle, took off from ISRO’s Satish Dhawan Centre in Sriharikota, heralding a major milestone in the country’s space research. The Small Satellite Launch Vehicle (SSLV) can carry payloads weighing up to 500 kg. These space capsules had to earlier wait for months, even years, to hitch a ride on vehicles designed for large satellites. But in the past decade, the miniaturisation of satellites has enabled the entry of universities, corporates and even individual innovators in a field once dominated by large enterprises and state institutions such as ISRO and NASA. The SSLV can prove to be a game changer for these micro and nano space stations. The launch vehicle can be assembled in less than a week by a much smaller team. With ISRO planning to transfer technology to private players, the country’s space sector is poised for a significant expansion.</p> <p>The utility of small satellites is increasingly expanding in a variety of tion and environment protection. Space tech is also critical to the country’s security objectives. The challenge now is to frame a regulatory mechanism that complements ISRO’s work, enables manufacturers of small satellites and rockets to unlock their potential while also making sure that the country’s welfare imperatives are not crowded out. The SSLV’s launch should be a prelude to conversations on such a mechanism.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cautionary", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neutral", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Critical"], "correct_answer": 0, "solution": "No solution available"}, {"id": "116305", "question": "<strong>Comprehension:</strong></p> <p>Food inflation continues to undermine wider price stabilityApril’s retail inflation data flattered to deceive. The Consumer Price Index (CPI)-based provisional headline print shows year-on-year retail price gains, across the broad spectrum of goods and services that combine to constitute the CPI, slowed fractionally to a 11-month low of 4.83%, from March’s 4.85%. This slowing, however, did little to mask the more disconcerting acceleration in food price gains. Inflation based on the Consumer Food Price Index (CFPI) quickened by 18 basis points from the preceding month’s year-on-year pace to a four-month high of 8.7%, with the month-on-month rate accelerating to 0.74%, from 0.16% in March. Rural consumers fared worse than their urban counterparts with both food and broader headline inflation reflecting faster price gains. The CPI-based reading for the hinterland was still well above the 5% mark at 5.43%, while inflation in urban areas was a sharply lower 4.11%, reflecting the widening divergence in the impact that price gains are having on those already struggling from the hit to the rural economy from a weak monsoon last year and sizzling temperatures this summer. Food price gains at 8.75% for rural consumers, a good 19 basis points faster than the 8.56% faced by urban consumers, is all the more disconcerting as food is an essential expenditure that every household must try and find the means to meet.</p> <p>The pressure on food prices remains wide-ranging, with cereals — the heaviest weight in the food category — witnessing a 26 basis points quickening in inflation to 8.63%. Data from the Department of Consumer Affairs’ Price Monitoring Division shows the average price of rice was 14.3% steeper as on May 14 than on May 14, 2023. And the price of wheat was 6.4% higher from a year earlier, signalling that respite on the cereals front is unlikely in the near term. April’s soaring temperatures also kept inflation in vegetables, particularly vulnerable as perishable produce, in double digits for a sixth straight month at 27.8%. Price gains in pulses too offered little succour as they extended their stay in double digits to an eleventh month. And the Consumer Affairs department’s data show prices of all the five key dals — gram, tur, urad, moong and masoor — continued to rise appreciably as on May 14. With live water storage at the country’s 150 reservoirs dwindling to 27% of capacity as on May 9 and trailing both the year-earlier and 10-year average levels significantly, the outlook for price stability rides almost entirely on the forecast ‘normal monsoon’ delivering spatially and temporally well-distributed rains in the coming months.</p> <p><strong>Based on the passage, what is the chronological order of events leading to higher food price inflation in rural areas?</strong>", "options": ["<p style  have enjoyed unprecedented profits, hiring and salary growth have not kept pace. The government has rightly emphasised that job creation predominantly occurs in the private sector, urging companies to increase hiring and worker compensation. Between FY20 and FY23, the profit before taxes for over 33,000 companies nearly quadrupled. Yet, this financial boon has not translated into corresponding growth in employment or wages. This imbalance poses a risk to India’s long-term economic stability and growth. For sustainable development, it is crucial that corporate profits benefit a broader spectrum of society.</p> <p>The Economic Survey also underscores a collaborative approach between the Centre, state governments and the private sector, which is essential to meet the rising aspirations of Indians and achieve the vision of Viksit Bharat by 2047. It reveals that the road ahead is challenging, with geopolitical shifts, climate change concerns and the advent of artificial intelligence adding layers of complexity to the job market. Finance Minister Nirmala Sitharaman, presenting the survey, noted the Indian economy’s resilience and strong post-Covid recovery. However, she acknowledged that maintaining this trajectory required concerted efforts from all stakeholders.</p> <p>An intriguing recommendation in the survey is for India to seek more foreign direct investment (FDI) from China to boost local manufacturing and tap into export markets. Despite strained ties and ongoing border tensions, greater FDI from China could integrate India into global supply chains and enhance export capabilities. This strategy, as the survey suggests, might be more beneficial than relying solely on trade, given the growing trade deficit with China.<br> <strong>According to the Economic Survey for 2023-24, what is the relationship between corporate profits and employment in India's corporate sector?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Corporate profits have increased while employment growth has not.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Corporate profits and employment have both increased significantly.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> There is no clear relationship between corporate profits and employment.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Employment growth has outpaced corporate profits."], "correct_answer": 0, "solution": "No solution available"}, {"id": "116310", "question": "<strong>Comprehension:</strong><br> The Economic Survey for 2023-24 highlights a concerning disparity within India’s corporate sector. While companies have enjoyed unprecedented profits, hiring and salary growth have not kept pace. The government has rightly emphasised that job creation predominantly occurs in the private sector, urging companies to increase hiring and worker compensation. Between FY20 and FY23, the profit before taxes for over 33,000 companies nearly quadrupled. Yet, this financial boon has not translated into corresponding growth in employment or wages. This imbalance poses a risk to India’s long-term economic stability and growth. For sustainable development, it is crucial that corporate profits benefit a broader spectrum of society.</p> <p>The Economic Survey also underscores a collaborative approach between the Centre, state governments and the private sector, which is essential to meet the rising aspirations of Indians and achieve the vision of Viksit Bharat by 2047. It reveals that the road ahead is challenging, with geopolitical shifts, climate change concerns and the advent of artificial intelligence adding layers of complexity to the job market. Finance Minister Nirmala Sitharaman, prese const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;

function ini(){
    disQ();
    strT();
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
