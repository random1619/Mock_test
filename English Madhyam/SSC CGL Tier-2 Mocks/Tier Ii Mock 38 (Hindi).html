<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 38 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

(function fixPageTitle() {

      if (h1 && h1.textContent.trim()) {

    });

ुभाषी"}, {"id": "129378", "question": "<strong>Choose the option that is the correct direct form of the sentence.</strong></p> <p>He said that he would be taking a leave of absence for two weeks as there had been a death in his family.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said \"I am going to take a leave for two weeks as there had been a death in my family\".", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said, \"I would be taking a leave of absence for 2 weeks as there been a death in my family", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He said \"I will be taking a leave of absence for two week as there is a death in my family\".", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He said, \"I will be taking a leave of absence for two weeks as there has been a death in my family"], "correct_answer": 3, "solution": "<strong>D)</strong> He said, \"I will be taking a leave of absence for two weeks as there has been a death in my family"}, {"id": "129381", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>Serena _________ from fever since the 5th of this month.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> suffered", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> suffers", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> is suffering", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> has been suffering"], "correct_answer": 3, "solution": "<strong>D) has been suffering'</strong> का use होगा क्योंकि \"has been suffering\" का अर्थ होता है कि कोई क्रिया अतीत में शुरू हुई और अभी भी जारी है। Sentence में mention किया गया है कि Serena 5 तारीख से बुखार से पीड़ित है, इसलिए 'has been suffering' यहाँ सही है। जबकि 'suffered' का अर्थ है अतीत में पीड़ित होना और अब समाप्त हो चुका है, 'suffers' वर्तमान में पीड़ित होना दर्शाता है, और 'is suffering' का अर्थ है वर्तमान में जारी क्रिया, लेकिन यह स्पष्ट नहीं करता कि कब से जारी है, इसलिए यह सही नहीं है।"}, {"id": "129383", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>It is the ____________ to reach Delhi.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> quickest route", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> strongest route", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> lowest route", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> fastest route"], "correct_answer": 3, "solution": "<strong>‘fastest route'</strong> will be used because it means the quickest way. The sentence is about the fastest way to reach Delhi, making 'fastest route' appropriate here. While 'quickest route' also means quick, 'fastest' is more commonly used in the context of travel and measuring distance. 'strongest route' means the most robust route, and 'lowest route' means the route with the lowest elevation, which don't fit in this context"}, {"id": "129368", "question": "Select the most appropriate meaning of the given <strong>idiom</strong>.</p> <p>Pull a fast one", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/ mg/check.png\"/></p> Blessing", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Senile", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Old"], "correct_answer": 1, "solution": "<strong>Antonym:</strong> <strong>Blessing</strong> (noun): Something beneficial or good. आशीर्वाद"}, {"id": "129361", "question": "<strong>Select the most appropriate synonym of the given word.</strong></p> <p>Handling hazardous chemicals without proper precautions can be extremely <strong>hazardous</strong> to health.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Dangerous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Adventurous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Vindictive", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Rowdy"], "correct_answer": 0, "solution": "<strong>Synonym: Dangerous</strong> (adjective) – Likely to cause harm, risky, hazardous. खतरनाक"}, {"id": "129390", "question": "<strong>For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the appropriate sentences for S2 and S3, respectively.</strong></p> <p><strong>S1</strong>: The Supreme Court’s recent decision to uphold an appellate tribunal’s ruling on taxing yoga camps organised by the Patanjali Yogpeeth Trust marks a significant stride towards equity and accountability in the realm of service taxation.</p> <p><strong>S4:</strong> It was a reasonable interpretation of the law as the tribunal rightly observed that the services rendered were akin to those provided by health clubs and fitn a conventional attack on Russia by any country that is supported by a nuclear power, Russia would consider that a “joint attack” and presumably, deal with the threat accordingly. He added that Russia could use nuclear weapons in response to a conventional attack posing a “critical threat to [its] sovereignty”, a threat that was repeated by Russian Foreign Minister Sergey Lavrov at the UN General Assembly meet over the weekend, when he said the idea of defeating Russia on the battlefield is “senseless” and a “suicidal escapade” given that Moscow has nuclear weapons. Clearly, the context of Mr. Putin’s nuclear doctrine revision and the comments is Ukraine President Volodymyr Zelenskyy’s visit to the United States, where he attempted to present a new “victory plan” for Ukraine. Mr. Zelenskyy wants the permission of the U.S. and other western countries to use missiles and other heavy weaponry procured from them for attacks deep inside Russia. Thus far, the weaponry, including Storm Shadow and ATACMS missiles, can only be used for Ukraine’s defence, although western capitals turned a blind eye when Ukrainian forces invaded the Russian Oblast of Kursk in August with tanks and weaponry, allowing Mr. Zelenskyy to rack up a symbolic win and possibly some leverage in future negotiations for peace. However, much of the euphoria in Kyiv has since dissipated with Russia hitting back anew, sending in troops to Kursk, and also opening a new front around Ukraine’s Pokrovsk, and western countries remaining loathe to enter the theatre of war. To that end, U.S. President Joseph Biden has now announced nearly $8 billion in additional military aid for Ukraine, but made no reference to the demand for its utilisation inside Russia.</p> <p>It remains to be seen whether Mr. Putin will be assuaged, or if concerns about the war reaching a “nuclear threshold” will grow from this point on, and it is hoped countries, including India, that have committed to finding a path to dialogue and peace, r s evasion of sanctions and target entities in multiple countries, including China, Malaysia, Thailand, Turkey and the UAE, apart from India, for selling “items and other important dual-use goods to Russia, including critical components that Russia relies on for its weapons systems to wage war against Ukraine”. Dual-use goods can be utilised for both civil and military applications. Many such items are part of the Common High Priority List (CHPL) made jointly by the US, the EU, Japan, and the UK. The CHPL lists numerous items that Russia “seeks to procure for its weapons programmes”.</p> <p>In the aftermath, while there may be a temptation to grandstand against the US sanctions, it would help to understand their context, and to assess their consequences for India’s domestic interests. There is a war raging in Europe and there is a growing sense that it is likely to escalate. As such, the West is tightening sanctions to prevent Russia’s military capability from growing. The second critical aspect is that the sanctions have a broad sweep, across several countries. India or Indian firms have not been specifically targeted or singled out. The third key point is that while India has differences with the US on Russia, it is also true that India has a strong partnership with the US when it comes to China.</p> <p>The Indian government should neither take offence at the sanctions, nor ignore them as the decision of an outgoing US President. It should, instead, treat them as a caution. In the past, when it came to crude oil sanctions, the US had provided India some relief but the current restrictions refer to goods the US views as directly boosting Russia’s military capability. Delhi would do well to focus on the need to protect Indian businesses from getting caught in the crossfire. India had set up export control mechanisms as part of the nuclear deal with the US — it is time to update them. The government needs to educate industry about the export restrictions, and possibly even licence some of the critical items, to ensure that Indian businesses are not adversely affected by the ongoing conflict.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Alarmist and confrontational", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Analytical and advisory", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Indifferent and dismissive", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Critical and accusatory"], "correct_answer": 1, "solution": "No solution available"}, {"id": "129404", "question": "<strong>Comprehension:</strong></p> <p>The US imposed sanctions on about 400 entities and individuals across the world, including 19 Indian firms and two Indian nationals, for allegedly helping Russia’s war efforts in Ukraine. Most of the Indian entities sanctioned are suppliers of electronic components, a few supply aircraft parts and machine tools and components, among other items. The US State Department says that the move aims to address evasion of sanctions and target entities in multiple countries, including China, Malaysia, Thailand, Turkey and the UAE, apart from India, for selling “items and other important dual-use goods to Russia, including critical components that Russia relies on for its weapons systems to wage war against Ukraine”. Dual-use goods can be utilised for both civil and military applications. Many such items are part of the Common High Priority List (CHPL) made jointly by the US, the EU, Japan, and the UK. The CHPL lists numerous items that Russia “seeks to procure for its weapons programmes”.</p> <p>In the aftermath, while there may be a temptation to grandstand against t const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

    isPaused=!isPaused;
    if(isPaused){

        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
