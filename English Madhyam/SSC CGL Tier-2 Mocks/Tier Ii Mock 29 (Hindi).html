<title>Tier Ii Mock 29 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

(function fixPageTitle() {
  const genericTitles = ['devgagan', 'CBT Exam - pundits', 'CBT Exam'];
  const currentTitle = document.title || '';
  const isGeneric = genericTitles.some(g => currentTitle.toLowerCase() === g.toLowerCase());
  if (isGeneric) {
    // Try to get title from welcome header h1
    document.addEventListener('DOMContentLoaded', function() {
      const h1 = document.querySelector('.welcome-header h1, .welcome-header h2');
      if (h1 && h1.textContent.trim()) {
        document.title = h1.textContent.trim().substring(0, 80);
      }
    });
  }
})();

vernment is grappling with three economic challenges at the same time.</p> <p><strong>E.</strong> One is management of inflation, interest rates, and exchange rates, for which the Reserve Bank of India is expected to find a solution.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DECAB", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> DEABC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DCBAE", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DECBA"], "correct_answer": 1, "solution": "<strong>D:</strong> This sentence introduces the topic: \"three economic challenges\" faced by the Indian government. It naturally serves as the opening sentence because it provides context for the reader"}, {"id": "31094", "question": "<strong>Q8. Select the most appropriate meaning of the highlighted idiom</strong></p> <p>The new production targets have <ins><strong>stirred up a hornet's nest.</strong></ins>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To raise controversy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To gain prominence", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To preserve one’s energy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To confess without reserve"], "correct_answer": 0, "solution": "A) <strong>Stirred up a hornet's nest</strong> (idiom) – To raise controversy विवाद उत्तेजित करना"}, {"id": "31095", "question": "<strong>Q9. Select the meaningful and correctly spelt word from the given options to fill in the blank</strong>.</p> <p>The most ___________ creature, as far as Amit is concerned, is a walrus.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> dispecable", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> despicable", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> deliberate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> desietful"], "correct_answer": 1, "solution": "B) 'Despicable' का प्रयोग होगा क्योंकि \"despicable\" का अर्थ होता है घृणित, जिसे पसंद नहीं किया जा सकता। जबकि 'Dispecable' गलत spelling वाला शब्द है, 'Deliberate' का अर्थ है जानबूझ कर या सोच-समझकर, और 'Desietful' कोई मान्य शब्द नहीं है, जो इस संदर्भ में सही नहीं है।"}, {"id": "31096", "question": "<strong>Q10. The given sentence is divided into three segments. Select the option that has the segment with a grammatical error. If there is no error, select 'no error' as your answer</strong>.</p> <p>The players / will leaving / the stadium in no time.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The players", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> will leaving", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> the stadium in no time", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No error"], "correct_answer": 1, "solution": "B) 'will leave' का प्रयोग होगा क्योंकि Future Tense में 'will' के साथ base form of verb (leave) का प्रयोग होता है; जैसे— The players will leave the stadium in no time."}, {"id": "31097", "question": "<strong>Q11. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph</strong>.</p> <p><strong>A.</strong> The seemingly innocuous act of consuming salt can have dangerous repercussions when taken in excess.</p> <p><strong>B. </strong>The dangers often lurk undetected, warranting urgent attention and a revaluation of our dietary choices.</p> <p><strong>C. </strong>Excessive sodium intake contributes to the rise of hypertension, heart disease, and stroke.</p> <p><strong>D. </strong>An average Indian’s sodium consumption is more than double the physiological need and dramatically exceeds the World Health Organization’s (WHO) recommended daily intake of &lt;5 g of salt for adults.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, b, a, c", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, a, b, c", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, b, c, d", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> a, c, b, d"], "correct_answer": 3, "solution": "<strong>a:</strong> This sentence introduces the topic which is about the dangers of consuming too much salt."}, {"id": "31098", "question": "<strong>Q12. Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select ‘No substitution required’</strong>.</p> <p>I had only my class notes<ins> </ins><strong><ins>for which I had to</ins> </strong>prepare for my examination", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> from whom I had to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No substitution required", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> with which I had to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> in which I have to"], "correct_answer": 2, "solution": "C) 'with which I had to' का प्रयोग होगा क्योंकि यहाँ 'notes' के साथ सही preposition 'with' है। इसलिए, सही Relative Clause 'with which I had to' होगा।"}, {"id": "31099", "question": "<strong>Q13. Select the option that can be used as a one-word substitute for the given group of words</strong>.</p> <p>The company was<ins> <strong>known for its deserving respect or admiration business practices and honest and fair ethical standards</strong></ins>.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> honourable", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> decent", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> respectable", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> trustworthy"], "correct_answer": 0, "solution": "A) <strong>Honourable</strong> (adjective) – deserving of respect or high regard; characterized by integrity सम्मान योग्य"}, {"id": "31100", "question": "<strong>Q14. Select the most appropriate meaning of the underlined word in a sentence</strong></p> <p>At the same time, they are <ins><strong>erudite</strong></ins>, convincing and thoroughly grounded in strong empirical research, to which the copious footnotes bear witness.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Effervescent", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Scholarly", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Energetic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Serene"], "correct_answer": 1, "solution": "No solution available"}, {"id": "31101", "question": "<strong>Q15. In the passage below, four blanks are provided, marked as (A), (B), (C), and (D). Four words have been provided below the passage. Choose the correct arrangement of these words to fill in the blanks</strong></p> <p>The ______________ part, however, is that the overall food supply situation is _________________ comfortable compared to a year ago at the height of the Russia-Ukraine war, or even two months back, when there was a lot of ___________________ over India’s wheat crop and milk had turned the policymakers’ next big ____________________.</p> <p><strong>A.</strong> Redeeming</p> <p><strong>B.</strong> Fairly</p> <p><strong>C.</strong> Headache</p> <p><strong>D. </strong>Uncertainty", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, c, b, d", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> a, b, d, c", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, d, a, b", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, a, b, c"], "correct_answer": 1, "solution": "B) a, b, d, c"}, {"id": "31102", "question": "<strong>Q16. Select the option that can be used as a one-word substitute for the given group of words</strong>.</p> <p>Done without conscious control; unintentional", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Invincible", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Involuntary", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Invitro", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Invoke"], "correct_answer": 1, "solution": "B) <strong>Involuntary</strong> (noun) – Done without conscious control; unintentional अस्वेच्छिक"}, {"id": "31103", "question": "<strong>Q17. Identify the sentence that uses the word 'address' in a contextually incorrect manner</strong>.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a fundamental problem has still to be addressed", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> she addressed the open-air meeting", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> they exchanged addresses and agreed to keep in touch", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> a newspaper had been addressed beside my plate"], "correct_answer": 3, "solution": "D) ‘newspaper had been addressed beside my plate' का प्रयोग संदर्भ में गलत है क्योंकि \"address\" का अर्थ होता है किसी विषय, समस्या या व्यक्ति को संबोधित करना या विचार करना। 'A' और 'B' में \"address\" का प्रयोग सही संदर्भ में हुआ है। 'C' में \"address\" शब्द का उपयोग पता संबोधित करने के रूप में किया गया है, जो सही है। हालांकि 'D' में \"address\" का प्रयोग असंगत है क्योंकि अखबार को प्लेट के पास 'संबोधित' नहीं किया जा सकता है।"}, {"id": "31104", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong></p> <p>They were watching a movie on TV when their friends came", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A movie on TV was watching by them when their friends came.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> A movie on TV was being watched by them when their friends came.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> When their friends came, a movie on TV was watched by them.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A movie on TV is being watched by them when their friend came."], "correct_answer": 1, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong>: Active वाक्य में <strong>\"They\"</strong> (Subject), <strong>\"were watching\"</strong> (Verb - Past Continuous), और <strong>\"a movie on TV\"</strong> (Object) है। Passive में बदलते समय Object <strong>\"A movie on TV\"</strong> को Subject बनाया गया है, Verb को <strong>\"was being watched\"</strong> (Past Continuous Passive) में बदला गया है और <strong>\"by them\"</strong> के रूप में प्रयोग किया गया है।"}, {"id": "31105", "question": "<strong>Q19. Select the most appropriate ANTONYM of the underlined word</strong>.</p> <p>He took the money with an <ins><strong>enigmatic</strong> </ins>smile", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Comprehensible", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cryptic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ambiguous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Tangible"], "correct_answer": 0, "solution": "<strong>Antonym</strong>: <strong>Comprehensible</strong> (adjective) – Able to be understood; clear. स्पष्ट"}, {"id": "31106", "question": "<strong>Q20.</strong> <strong>Some sentences are given below. While the first and the last sentences (1 and 2) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph</strong>.</p> <p><strong>1.</strong> One of the most frequent questions I faced at academic conferences as soon as people realised that I was an Indian researcher working on autism was this: ‘How many children in India have autism?’</p> <p><strong>A. </strong>At this point, India did not have any systematic estimates of autism prevalence</p> <p><strong>B. </strong>Who came to them, and were eventually given a diagnosis of autism</p> <p><strong>C. </strong>We were looking for available records of the children</p> <p><strong>D.</strong> My collaborators and I set out to answer this question, and found ourselves telephoning a number of government hospitals in India</p> <p><strong>2.</strong> In the absence of a central medical registry, this method seemed reasonable to estimate the prevalence of autism — and had been successfully used in some other countries.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ADCB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABCD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCDA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCAD"], "correct_answer": 0, "solution": "<strong>A:</strong> The sentence 1 ends with a question about the number of children in India with autism. Sentence A provides a direct response to this, explaining why it might be a difficult question to answer. The connector \"At this point\" can be inferred to refer to the time when the question was being frequently posed to the author."}, {"id": "31107", "question": "<strong>Q21. The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong>.</p> <p>He told his friends / that he is gone/ to visit his parents / in the evening.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to visit his parents", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He told his friends", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> in the evening", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> that he is gone"], "correct_answer": 3, "solution": "D) 'that he is gone' में त्रुटि है क्योंकि मुख्य वाक्य 'He told his friends' Past Tense में है, इसलिए 'that' clause में भी Verb Past Tense में होना चाहिए; जैसे— He told his friends that he had gone to visit his parents in the evening."}, {"id": "31108", "question": "<strong>Q22. Select the most appropriate option to fill in the blank</strong>.</p> <p>He peeled __________ apple and cut it into slices.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The", "<p style=\"display:none\"><img alt=\"reload\" src udents for the undergraduate courses in the country’s medical and dental colleges. While the rest of the country is rejoicing _____4______the new mode of the selection process for medical colleges, Tamil Nadu and its DMK have called for a war against NEET.</p> <p><strong>Q33. Select the most appropriate option to fill in blank 4</strong>.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> For", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> With", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> On", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Over"], "correct_answer": 3, "solution": "No solution available"}, {"id": "31120", "question": "<strong>Comprehension</strong>:</p> <p>The Bill to amend India’s Forest Conservation Act (FCA) rightly draws attention to the country’s global warming mitigation targets. Its “Statement of Objectives” underlines the “necessity to broaden the horizon of the Act to… increase the forest cover for creation of carbon sink of additional 2.5 to 3 billion tonnes of carbon equivalent by 2030”. But this tone of ecological appreciation does not resonate in large parts of the legislation that was passed by a voice vote in the Lok Sabha on Wednesday. Diversion of forests for the “construction of roads, railway lines or projects of strategic nature near the country’s international borders” would not require clearance once the Bill becomes law. The country’s security is non-negotiable. But concerns over the de-regulation proposed in the Bill to fast-track military projects require wide-ranging deliberations, especially because most frontier zones of the country are also amongst its most ecologically fragile.</p> <p>The FCA, passed in 1980, extended protection to all lands classified as forests in government records. In 1996, a landmark ruling of the Supreme Court in the Godavarman case extended the Act’s ambit to all lands that satisfied “the dictionary definition of a forest”. The Court’s ruling prevented the deforestation of tracts that government surveys had not marked as forestland. But it also came in the way of removing lands that were no longer forests from the Act’s purview. Despite their stated intent of making the FCA consistent with the “social and economic” realities of the country, the new amendments do not attempt to correct this anomaly. Instead, they go back to the FCA’s original remit. Conservationists fear that this could invalidate the protection accorded by the SC to large tracts of land that have the characteristics of forests but are not notified as such in government records. The Forest Survey of India’s data indicate that about 28 per cent of the country’s forests could lose protection if the Bill becomes law. The legislation proposes to compensate for such losses with clauses that enable plantations. This is a positive intervention from an agro-forestry perspective. Plantations can also sequester carbon to an extent. But they are no substitute for the large gamut of ecological services offered by natural forests.</p> <p>The Bill was placed before the Lok Sabha in March. It was referred to a Joint Committee of Parliament, which endorsed the legislation without any changes. Six Opposition members in the panel, however, dissented. They pitched for environmental audits and suggested that state governments be consulted before forest diversion orders are issued in the geologically-sensitive Himalayan and northeastern regions. Four hundred scientists and academicians and more than 100 former civil servants also expressed concerns about the process being followed in passing the Bill. They reasoned that the overwhelming majority of the BJP in the Joint Committee made the agency’s examination partisan, and requested the scrutiny of the Parliamentary Standing Committee on Science and Technology, Environment, Forests and Climate Change. Such concerns have been ignored. And now, the Lok Sabha has passed the Bill without a meaningful debate. The Rajya Sabha should do better, take all concerns on board</p> <p><strong>Q34. Based on the passage, which of the following inferences can be made about the proposed amendments to the Forest Conservation Act (FCA)?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The amendment will prioritize global warming mitigation targets over other considerations.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The amendment will allow certain construction projects near international borders without the need for clearance.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The new amendments will primarily focus on correcting anomalies from the 1996 Supreme Court ruling.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Forest Survey of India supports the new amendments, believing that plantations are a good replacement for natural forests."], "correct_answer": 1, "solution": "No solution available"}, {"id": "31121", "question": "<strong>Comprehension</strong>:</p> <p>The Bill to amend India’s Forest Conservation Act (FCA) rightly draws attention to the country’s global warming mitigation targets. Its “Statement of Objectives” underlines the “necessity to broaden the horizon of the Act to… increase the forest cover for creation of carbon sink of additional 2.5 to 3 billion tonnes of carbon equivalent by 2030”. But this tone of ecological appreciation does not resonate in large parts of the legislation that was pa e legislation without any changes. Six Opposition members in the panel, however, dissented. They pitched for environmental audits and suggested that state governments be consulted before forest diversion orders are issued in the geologically-sensitive Himalayan and northeastern regions. Four hundred scientists and academicians and more than 100 former civil servants also expressed concerns about the process being followed in passing the Bill. They reasoned that the overwhelming majority of the BJP in the Joint Committee made the agency’s examination partisan, and requested the scrutiny of the Parliamentary Standing Committee on Science and Technology, Environment, Forests and Climate Change. Such concerns have been ignored. And now, the Lok Sabha has passed the Bill without a meaningful debate. The Rajya Sabha should do better, take all concerns on board</p> <p><strong>Q35. Which of the following best summarizes the potential implications of the Bill to amend India's Forest Conservation Act (FCA)?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Bill mainly focuses on mitigating global warming and increasing forest cover.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Bill will provide better protection to all forests as defined in the dictionary.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The Bill seeks to de-regulate the use of forest areas for strategic projects near international borders without environmental clearances.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Bill encourages the growth of plantations while ensuring the protection of natural forests."], "correct_answer": 2, "solution": "No solution available"}, {"id": "3 nt of the country’s forests could lose protection if the Bill becomes law. The legislation proposes to compensate for such losses with clauses that enable plantations. This is a positive intervention from an agro-forestry perspective. Plantations can also sequester carbon to an extent. But they are no substitute for the large gamut of ecological services offered by natural forests.</p> <p>The Bill was placed before the Lok Sabha in March. It was referred to a Joint Committee of Parliament, which endorsed the legislation without any changes. Six Opposition members in the panel, however, dissented. They pitched for environmental audits and suggested that state governments be consulted before forest diversion orders are issued in the geologically-sensitive Himalayan and northeastern regions. Four hundred scientists and academicians and more than 100 former civil servants also expressed concerns about the process being followed in passing the Bill. They reasoned that the overwhelming majority of the BJP in the Joint Committee made the agency’s examination partisan, and requested the scrutiny of the Parliamentary Standing Committee on Science and Technology, Environment, Forests and Climate Change. Such concerns have been ignored. And now, the Lok Sabha has passed the Bill without a meaningful debate. The Rajya Sabha should do better, take all concerns on board</p> <p><strong>Q36.</strong> <strong>If the Bill to amend India's Forest Conservation Act (FCA) as described in the passage becomes law, what could be a probable consequence?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The construction of roads and railway lines anywhere in the country will be prohibited.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> All lands that satisfy the dictionary definition of a forest will automatically be protected, regardless of government records.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The security of the country will be compromised due to environmental concerns.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Large tracts of land with forest characteristics but not notified as such in government records might lose protection."], "correct_answer": 3, "solution": "No solution available"}, {"id": "31123", "question": "<strong>Comprehension</strong>:</p> <p>The Bill to amend India’s Forest Conservation Act (FCA) rightly draws attention to the country’s global warming mitigation targets. Its “Statement of Objectives” underlines the “necessity to broaden the horizon of the Act to… increase the forest cover for creation of carbon sink of additional 2.5 to 3 billion tonnes of carbon equivalent by 2030”. But this tone of ecological appreciation does not resonate in large parts of the legislation that was passed by a voice vote in the Lok Sabha on Wednesday. Diversion of forests for the “construction of roads, railway lines or projects of strategic nature near the country’s international borders” would not require clearance once the Bill becomes law. The country’s security is non-negotiable. But concerns over the de-regulation proposed in the Bill to fast-track military projects require wide-ranging deliberations, especially because most frontier zones of the country are also amongst its most ecologically fragile.</p> <p>The FCA, passed in 1980, extended protection to all lands classified as forests in government records. In 1996, a landmark ruling of the Supreme Court in the Godavarman case extended the Act’s ambit to all lands that satisfied “the dictionary definition of a forest”. The Court’s ruling prevented the deforestation of tracts that government surveys had not marked as forestland. But it also came in the way of removing lands that were no longer forests from the Act’s purview. Despite their stated intent of making the FCA consistent with the “social and economic” realities of the country, the new amendments do not attempt to correct this anomaly. Instead, they go back to the FCA’s original remit. Conservationists fear that this could invalidate the protection accorded by the SC to large tracts of land that have the characteristics of forests but are not notified as such in government records. The Forest Survey of India’s data indicate that about 28 per cent of the country’s forests could lose protection if the Bill becomes law. The legislation proposes to compensate for such losses with clauses that enable plantations. This is a positive intervention from an agro-forestry perspective. Plantations can also sequester carbon to an extent. But they are no substitute for the large gamut of ecological services offered by natural forests.</p> <p>The Bill was placed before the Lok Sabha in March. It was referred to a Joint Committee of Parliament, which endorsed the legislation without any changes. Six Opposition members in the panel, however, dissented. They pitched for environmental audits and suggested that state governments be consulted before forest diversion orders are issued in the geologically-sensitive Himalayan and northeastern regions. Four hundred scientists and academicians and more than 100 former civil servants also expressed concerns about the process being followed in passing the Bill. They reasoned that the overwhelming majority of the BJP in the Joint Committee made the agency’s examination partisan, and requested the scrutiny of the Parliamentary Standing Committee on Science and Technology, Environment, Forests and Climate Change. Such concerns have been ignored. And now, the Lok Sabha has passed the Bill without a meaningful debate. The Rajya Sabha should do better, take all concerns on board</p> <p><strong>Q37. What is the author's primary attitude towards the Bill to amend India's Forest Conservation Act (FCA)?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The author is fully supportive of the Bill as it addresses global warming mitigation targets effectively.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The author is critical of the Bill, suggesting that it neglects significant ecological concerns in favor of expedited military projects.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The author remains neutral, simply outlining the features and history of the FCA and its proposed amendments.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The author appreciates the focus on increasing forest cover but finds the overall legislation lacking in addressing ecological fragility."], "correct_answer": 3, "solution": "No solution available"}, {"id": "31124", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>What was long predicted is now happening. Earth’s weather systems are increasingly disrupted and destructive, as a consequence of the amount of carbon dioxide and other greenhouse gases in the atmosphere. In addition to devastating heatwaves in the northern hemisphere, and their role in igniting forest fires, high sea temperatures over recent months have led scientists to reiterate their warnings that we are moving fast into uncharted, dangerous territory.</p> <p>Climate models have always allowed for uncertainty. For decades, scientists have been certain of the direction of travel: towards increased heat, risk and instability. But how precisely the crisis would manifest, in what order systems would break down, and how the knock-on effects would unfold, remains a subject for research and discussion. Currently, there is a debate between experts about whether the pace of global heating is accelerating or stable. The likelihood of vital ocean currents, known as the Atlantic meridional overturning circulation, collapsing this century is also contested. One new study has suggested that a tipping point could be approaching, and that the analysis of the Intergovernmental Panel on Climate Change has, in this respect, been too conservative.</p> <p>The causes of record-breaking ocean temperatures are also being investigated. While an El Niño weather event was expected this year, it is not regarded as a sufficient explanation of the ocean temperature rises recorded since April. Heat is also thought to be causing oceans’ colour to change from blue to green, due to increased plankton. The situation is particularly concerning because we have relied on the oceans to absorb 90% of the heat trapped by greenhouse gases. Dr Bernadette Sloyan, a marine scientist in Australia, has compared their role to that of an air conditioner.</p> <p>Warmer seas present specific dangers, both to human and marine life: melting ice sheets; sea level rises (because water expands when heated); coral bleaching; more intense storms; lower oxygen levels causing fish to die. But they are also an indication of the overall pressure that global heating is placing on nature. The Earth’s capacity to stabilise the amounts of energy entering and leaving the planet’s system is reaching its limits for current patterns of existence.</p> <p>For many of those focused on what is happening – including activists, scientists and politicians – the inadequacy of national and international responses to the emergency is disorienting as well as disturbing. Despite decades of pledges made under the auspices of the UN’s climate process, global emissions are at an all-time high. It is hard to fathom what further evidence is needed to persuade governments that a drastic change of course is the safest option.</p> <p>But it is clear that the countries and businesses that are most strongly reliant on fossil-fuel profits will not willingly give them up. Whether and how they can be convinced or compelled to do so is the existential question of our times. Last weekend the G20 bloc of nations – which produce 75% of global greenhouse gas emissions – failed to reach agreement on phasing down fossil fuels. This November’s round of UN talks, Cop28, is being held in the United Arab Emirates and led by Sultan Al Jaber, who also heads his country’s national oil company. As forests burn and the sea turns green, the necessity of confronting vested interests – including energy-intensive western-type lifestyles as well as the corporations that depend on fossil fuels for profits – becomes more desperate by the day.</p> <p><strong>Q38. Which of the following statements is currently a debated topic among climate experts according to the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The consequences of greenhouse gases on Earth's weather systems.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The potential for the Intergovernmental Panel on Climate Change to collapse this century.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Whether the pace of global heating is accelerating or stable.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The certainty of the direction of travel towards increased heat, risk, and instability."], "correct_answer": 2, "solution": "No solution available"}, {"id": "31125", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and nce is needed to persuade governments that a drastic change of course is the safest option.</p> <p>But it is clear that the countries and businesses that are most strongly reliant on fossil-fuel profits will not willingly give them up. Whether and how they can be convinced or compelled to do so is the existential question of our times. Last weekend the G20 bloc of nations – which produce 75% of global greenhouse gas emissions – failed to reach agreement on phasing down fossil fuels. This November’s round of UN talks, Cop28, is being held in the United Arab Emirates and led by Sultan Al Jaber, who also heads his country’s national oil company. As forests burn and the sea turns green, the necessity of confronting vested interests – including energy-intensive western-type lifestyles as well as the corporations that depend on fossil fuels for profits – becomes more desperate by the day.</p> <p><strong>Q41. Which of the following statements best summarizes the challenges highlighted in the passage regarding the response to the climate emergency</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The efforts under the UN's climate process have been successful in significantly reducing global emissions.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The countries and businesses that rely heavily on fossil-fuel profits are readily willing to transition to sustainable energy sources.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The G20 bloc of nations, responsible for 75% of global greenhouse gas emissions, recently agreed on phasing down fossil fuels.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Despite growing evidence of the climate emergency, countries and businesses dependent on fossil fuels show resistance to changing their course, posing challenges for international agreements."], "correct_answer": 3, "solution": "No solution available"}, {"id": "31128", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it</strong>.</p> <p>In a kingdom, a tree bore golden apples, and every night one was stolen. The king ordered the gardener to watch the tree. The gardener's three sons took turns. The eldest two fell asleep and failed, but the youngest saw a golden bird trying to steal an apple. He shot an arrow, which didn’t hurt the bird, but it dropped a golden feather and flew away.</p> <p>The king desired the entire golden bird. The two elder sons ventured first and met a fox offering advice. It warned them about two inns they'd encounter and advised them to stay in the less appealing one. Both ignored the fox, choosing the more attractive inn, and both were sidetracked from their quest.</p> <p>The youngest son then went, heeded the fox's advice, and rode on its tail for fast travel. The fox instructed him about a castle with a sleeping army, and a room housing the golden bird in a wooden cage next to a golden one. He was warned not to transfer the bird. However, captivated by the shiny cage, the youngest son ignored the advice. The bird's screech awoke the soldiers, and he was captured.</p> <p>Facing execution, he was given a chance: retrieve the kingdom's golden horse that ran like wind. The fox again guided him, advising him to use the horse's old leather saddle. But, dazzled by the golden saddle, he ignored the counsel, alerting the guards.</p> <p>Another task was set for his life: retrieve a beautiful princess from another kingdom. With the fox's guidance, he met the princess and convinced her to leave with him. Despite being advised not to, the princess visited her parents one last time before departing, resulting in the young man's capture once again.</p> <p>The king demanded he remove a massive hill obstructing his view, seemingly an impossible task. However, the fox magically cleared it overnight, ensuring the young man's safety and his union with the princess.</p> <p>On their journey home, the fox further advised them on retrieving the golden horse and bird from his brothers. However, once near their village, the two elder brothers, turned robbers, tricked and pushed the youngest son into a river. They took the princess, bird, and horse to their kingdom, claiming the treasures as their own.</p> <p>The youngest son, trapped at the riverbed, was rescued by the fox, who warned him of his brothers' intent to kill him. Disguised as a pauper, he entered the kingdom. His presence was indicated by the horse eating, the bird singing, and the princess's cessation of her tears. He revealed his brothers' treachery, and they were punished. He married the princess and became the heir to the throne.</p> <p>Later, during a walk in the woods, the fox, who'd been his guiding force throughout, requested the young king to kill him. Reluctantly, the king agreed, and upon doing so, the fox transformed into a man, revealing another magical twist in this tale of adventure and deceit.</p> <p><strong>Q42. What action of the youngest son led to his initial capture at the castle housing the golden bird</strong>?", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He transferred the golden bird to the golden cage.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He ignored the fox's advice about the inns.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He rode on the fox's tail for fast travel.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/re const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;

function ini(){
    disQ();
    strT();
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
