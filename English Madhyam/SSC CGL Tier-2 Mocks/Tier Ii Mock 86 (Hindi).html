<title>Tier Ii Mock 86 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

(function fixPageTitle() {
  const genericTitles = ['devgagan', 'CBT Exam - pundits', 'CBT Exam'];
  const currentTitle = document.title || '';
  const isGeneric = genericTitles.some(g => currentTitle.toLowerCase() === g.toLowerCase());
  if (isGeneric) {
    // Try to get title from welcome header h1
    document.addEventListener('DOMContentLoaded', function() {
      const h1 = document.querySelector('.welcome-header h1, .welcome-header h2');
      if (h1 && h1.textContent.trim()) {
        document.title = h1.textContent.trim().substring(0, 80);
      }
    });
  }
})();

const qs=[{"id": "127272", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>I will be gifted a fancy doll by them the next day.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> They will gift me a fancy doll tomorrow.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They gift me a fancy doll the previous day.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They gifted me a fancy doll yesterday.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They are gifting me a fancy doll the next day."], "correct_answer": 0, "solution": "Passive Voice को Active Voice में बदलते समय, subject वाक्य की शुरुआत में आता है और क्रिया (verb) को Active Voice के रूप में बदल दिया जाता है। Passive Voice में \"will be gifted\" को Active Voice में \"will gift\" में बदल दिया जाता है, और समयसूचक शब्द \"the next day\" को \"tomorrow\" में बदल दिया जाता है। जैसे— To Be → will gift Object → me"}, {"id": "127125", "question": "<strong>Select the most appropriate idiom to fill in the blank given the underlined segment in the following sentence</strong></p> <p>During the heated debate, she finally ­­­________________ , sharply criticizing her opponent’s policies with unrestrained intensity.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> bared her fangs", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Walked on a tightrope", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Paid attention to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Went back a long way"], "correct_answer": 0, "solution": "<strong>Walked on a tightrope (idiom)</strong> – To be in a situation requiring careful handling to avoid failure or disaster. असंतुलन या खतरे वाली स्थिति में संभलकर चलना"}, {"id": "127275", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>“Do you attend the film festival at Goa every year?” he asked.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He is asking me if I attended the film festival at Goa every year.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He asked me if I attended the film festival at Goa every year.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He had asked me if I was attending the film festival at Goa every year.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He asks me if I attend the film festival at Goa every year."], "correct_answer": 1, "solution": "Indirect Speech में बदलते समय, Reporting Verb \"asked\" को Past Tense में रखा गया है क्योंकि Direct Speech में यह Past Tense में है। Direct Speech में Present Simple Tense \"do you attend\" को Indirect Speech में Past Simple \"attended\" में बदला गया है। interrogative sentence को Indirect Speech में बदलने के लिए \"if\" या \"whether\" का उपयोग किया जाता है और प्रश्नवाचक शब्दों को सामान्य कथन के रूप में व्यवस्थित किया जाता है।"}, {"id": "127271", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>By whom were you injured?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Who had been injuring you?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Who has injured you?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Who had injured you?", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Who injured you?"], "correct_answer": 3, "solution": "To convert Passive Voice into Active Voice for questions, the structure (Question Word + Verb + Subject) is used. In the sentence ‘By whom were you injured?’, ‘By whom’ is changed to ‘Who’, and the passive verb ‘were injured’ is changed to ‘injured’ in the Simple Past Tense. Therefore, the correct answer is (Who injured you?)."}, {"id": "127273", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>The tutor was not teaching the student.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The student was teaching the tutor.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The student was not being taught by the tutor.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The student was not being teaching by the tutor.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The student was not taught by the tutor"], "correct_answer": 1, "solution": "Active Voice को Passive Voice में बदलने के लिए (Object + Auxiliary Verb + Being + Past Participle + by + Subject) का प्रयोग किया जाता है, जब वाक्य Past Continuous Tense में हो। वाक्य ‘The tutor was not teaching the student’ को Passive Voice में बदलते समय Object ‘the student’ को वाक्य की शुरुआत में रखा जाता है। Verb ‘was not teaching’ को Passive Voice में बदलकर ‘was not being taught’ किया जाता है। Subject ‘the tutor’ को अंत में ‘by the tutor’ के रूप में रखा जाता है।"}, {"id": "127251", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Select the option that gives their correct logical sequence.</strong></p> <p>A. My mother had just reached double my age.</p> <p>B. At the dinner party, one of my relatives gave me a piece of advice: after someone turns 50, you start counting their age backwards.</p> <p>C. Recently, my family and I celebrated my mother’s 50th birthday, and a few months ago, I turned 25.</p> <p>D. I guess that’s true — life does have a reverse gear, and it typically kicks in around 50.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DBAC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDAC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABDC", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> CABD"], "correct_answer": 3, "solution": "C starts the paragraph by introducing the context of the celebration, stating that the family recently celebrated the mother’s 50th birthday, and that the speaker turned 25 a few months ago. This provides the foundation and time context for the rest of the sentences."}, {"id": "127129", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>Despite growing up in a poverty-stricken neighbourhood, she worked hard, earned a scholarship, and beat the ____________ to become a successful doctor.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Odds", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Adversity", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hardship", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Difficulty"], "correct_answer": 0, "solution": "Here, \"beat the” is used, which is a well-known idiomatic expression. The context of the sentence indicates that she grew up in a poverty-stricken neighborhood, worked hard, earned a scholarship, and became a successful doctor. \"Beat the odds\" is an idiom meaning achieving success despite difficult or seemingly impossible circumstances. Adversity means difficulties, but it doesn't fit idiomatically here. Hardship and Difficulty also indicate challenges, but they do not form the correct idiomatic expression \"beat the odds.\""}, {"id": "127174", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>A friend of my wife / came to me / yesterday and asked /me for some money.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> A friend of my wife", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> came to me", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> yesterday and asked", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> me for some money"], "correct_answer": 0, "solution": "इसी प्रकार:<br> <strong>Correct Sentence:</strong> A friend of my wife's came to me yesterday and asked me for some money."}, {"id": "127250", "question": "<strong>Select the correct option to form a meaningful sentence.</strong></p> <p>highlights (a)/ volatile Indo-Pacific region (b) / Quad Summit (c)/ The latest (d)/ in Wilmington, (e) / USA, (f) / the four member nations – (g) / of cooperation between (h) / the growing importance (i) / especially in a politically (j) / India, the United States, Japan, and Australia, (k)", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> d, c, e, f, a, i, h, g, k, j, b", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, e, k, f, i, h, b, g, j, c, a", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, b, e, f, i, h, c, g, k, j, a", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, c, e, g, f, i, h, b, k, j, a"], "correct_answer": 0, "solution": "<strong>d. The latest</strong>: The sentence starts by introducing \"The latest\", referring to a recent event."}, {"id": "127252", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>P. This US presidential election is expected to have a record gap between how men and women vote.</p> <p>Q. But the real gap is less between men and women, and more about traditionally masculine men versus everyone else.</p> <p>R. As Kamala Harris goes on a media blitzkrieg, including downing a folksy beer on late-night TV, what demographic is she really trying to woo?</p> <p>S. She has to demonstrate enough ‘masculine traits’ but not too much.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> RSPQ", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QPRS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QRPS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RQPS"], "correct_answer": 0, "solution": "R + S: R में उठाए गए सवाल का S direct जवाब देता है, Kamala Harris के strategy और उनकी traits के balancing act के बारे में बात करके।"}, {"id": "127126", "question": "<strong>Select the most appropriate idiom for the underlined segment.</strong></p> <p>His constant tardiness and lack of preparation <ins><strong>give a bad impression of</strong></ins> his professionalism and work ethic.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Fall prey to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Bear the brunt", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A pipe dream", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Reflect poorly on"], "correct_answer": 3, "solution": "<strong>Fall prey to</strong> (idiom): To become a victim of something or someone.शिकार होना"}, {"id": "127121", "question": "<strong>Select the word which means the same as the group of words underlined in the given sentence</strong></p> <p>The hummingbird is known <ins><strong>to fly or move quickly from one place to another without staying anywhere for long</strong></ins>, making it difficult to observe closely.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Reprove", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Flit", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Covet", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Usurp"], "correct_answer": 1, "solution": "<strong>Reprove</strong> (verb) – To scold or express disapproval. डांटना या अस्वीकृति व्यक्त करना।"}, {"id": "127127", "question": "<strong>Select the most appropriate meaning of the underlined idiom</strong></p> <p>The theory about the origin of the ancient city began <ins><strong>to gain currency</strong></ins> after several historians supported it.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To lose popularity", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To become widely accepted", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To face rejection", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To gain financial profit"], "correct_answer": 1, "solution": "B) <strong>To gain currency</strong> (idiom) – To become widely accepted (लोकप्रिय होना या व्यापक रूप से स्वीकृत होना)"}, {"id": "127130", "question": "<strong>Select the most appropriate preposition to fill in the blank</strong></p> <p>The judge advised the lawyers to refrain _________ making baseless claims that could accuse the defendant_________ crimes unrelated to the charges that pertain _______ the current case.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Of, from, to", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> From, of, to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> From, to, of", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To, of, from"], "correct_answer": 1, "solution": "<strong>'From'</strong> का उपयोग होगा क्योंकि \"refrain from\" एक fixed preposition है। इसका अर्थ है किसी कार्य से बचना। Sentence में जज ने वकीलों को बिना आधार के दावे करने से बचने के लिए कहा है, इसलिए \"from\" सही हैं।"}, {"id": "127173", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>The life of the rich / is not in many ways / as peaceful as / that of the poor's", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The life of the rich", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> is not in many ways", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> as peaceful as", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> that of the poor's"], "correct_answer": 3, "solution": "The life of the rich is not as peaceful as that of the poor."}, {"id": "127134", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>The meaning of the ancient manuscript remained <ins><strong>obscure</strong></ins>, leaving historians puzzled despite years of research.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Palpable", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Catholic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Credulous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Officious"], "correct_answer": 0, "solution": "Antonym: <strong>Palpable</strong> (adjective) – Able to be touched or felt; clear to the mind or plain to see; obvious, evident, noticeable. स्पष्ट, प्रत्यक्ष"}, {"id": "127124", "question": "<strong>Select the CORRECTLY spelt word.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hygene", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hygine", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hiygeine", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Hygiene"], "correct_answer": 3, "solution": "D) The correct spelling is <strong>‘hygiene’</strong> (Option D), which means “conditions or practices conducive to maintaining health and preventing disease, especially through cleanliness.” स्वच्छता"}, {"id": "127131", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>His <ins><strong>impertinence</strong> </ins>during the meeting, marked by rude interruptions and disrespectful remarks, offended everyone present.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Insolence", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Oblivion", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Platitude", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Harbinger"], "correct_answer": 0, "solution": "Synonym: <strong>Insolence</strong> (noun) – Rude and disrespectful behavior, arrogance, impudence. अहंकार"}, {"id": "127133", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>Her <ins><strong>insatiable</strong> </ins>curiosity drove her to read countless books, always seeking more knowledge and deeper understanding.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Innocuous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pedestrian", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Inexorable", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Fulfilled"], "correct_answer": 3, "solution": "Antonym: <strong>Fulfilled</strong> (adjective) – Satisfied, content, pleased, gratified. संतुष्ट, तृप्त।"}, {"id": "127122", "question": "<strong>In the following sentence, a few of the spellings are incorrect. Find out the sentence with correctly spelt words from the given options.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> After a lengthy discussion, the team reached a concensus and decided to implement the plan immediately, leaving no room to address the details at their leisure.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> After a lengthy discussion, the team reached a consensus and decided to implement the plan immediately, leaving no room to address the details at their liesure.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> After a lengthy discussion, the team reached a consensus and decided to implement the plan imediately, leaving no room to address the details at their leisure.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> After a lengthy discussion, the team reached a consensus and decided to implement the plan immediately, leaving no room to address the details at their leisure."], "correct_answer": 3, "solution": "A. Concensus: Incorrect; correct spelling is \"Consensus\" (आम सहमति)."}, {"id": "127119", "question": "<strong>Select the option that can be used as a one-word substitute to fill in the blanks for the given group of highlighted words.</strong></p> <p>The rebels launched <ins><strong>an act of retaliation</strong></ins> against the government forces for the recent attacks on their villages.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Reprisal", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Perfidy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Stratum", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Accolade"], "correct_answer": 0, "solution": "<strong>Perfidy</strong> (noun) – Deceitfulness; untrustworthiness विश्वासघात"}, {"id": "127276", "question": "<strong>Select the option that is the direct form of the given sentence.</strong></p> <p>Explaining her work she said that she made films for posterity to remember.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Explaining her work, she said, “She makes films for posterity to remember.”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Explaining her work, she said, “I will make the films that will remember posterity.”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Explaining her work, she said, “She made films for posterity to remember.”", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Explaining her work, she said, “I make films for posterity to remember.”"], "correct_answer": 3, "solution": "Indirect से Direct वाक्य में बदलते समय, Reported Speech को sentence के original Tense में बदलना आवश्यक होता है। Indirect वाक्य \"she made films\" Past Simple में है, जो Direct Speech में Present Simple \"I make films\" बन जाएगा क्योंकि वक्ता स्वयं के बारे में बात कर रही है। sentence में First-person Pronoun \"I\" का use सही है क्योंकि वक्ता अपनी action का उल्लेख कर रही है।"}, {"id": "127274", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>A lot has been learnt from my experiences.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I will learn a lot from my experiences.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I would learn a lot from my experiences.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> I have learnt a lot from my experiences.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I will have learnt a lot from my experiences."], "correct_answer": 2, "solution": "Passive Voice को Active Voice में बदलने के लिए <strong>(Subject + Auxiliary Verb + Past Participle + Object)</strong> का प्रयोग किया जाता है। वाक्य ‘A lot has been learnt from my experiences’ को Active Voice में बदलते समय Subject ‘I’ को वाक्य की शुरुआत में रखा जाता है। Verb ‘has been learnt’ को Active Voice में बदलकर ‘have learnt’ किया जाता है, और Object ‘a lot’ को रखा जाता है।"}, {"id": "127128", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The politician was accused of trying to pander ____________the public by making unrealistic promises solely to gain votes.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> On", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> For", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Of"], "correct_answer": 2, "solution": "<strong>'To'</strong> should be used because \"pander to\" is a standard collocation in English, meaning to gratify or indulge someone’s desires or whims, especially in a morally questionable way. The sentence indicates that the politician is attempting to fulfill the unrealistic expectations of the public solely to gain votes. Hence, \"to\" is the most appropriate choice. Pander on\" is not a valid phrasal verb in English. It does not convey the intended meaning in this context. <strong>\"For\"</strong>: \"Pander for\" is incorrect because \"pander\" always takes \"to\" to indicate the target of the indulgence. <strong>\"Of\"</strong>: \"Pander of\" is grammatically incorrect and does not form a valid phrasal verb."}, {"id": "127120", "question": "<strong>Select the word which means the same as the group of egment that contains a grammatical error</strong></p> <p>Although these buildings are (A)/ in need of repair, there have (B)/been much improvement in (C)/ their appearance (D)", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (A)", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> (B)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (C)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (D)"], "correct_answer": 1, "solution": "Although these buildings are in need of repair, there has been much improvement in their appearance."}, {"id": "127123", "question": "<strong>There is a spelling error in the given sentence. Select the option that contains the INCORRECTLY spelt word</strong></p> <p>The artist worked tirelessly untill the evening to finish her latest sculpture, a miniature replica of a famous landmark, which was featured in the art magazine's leading column, recognizing her as a bellwether in modern sculpting.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> untill", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> bellwether", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> column", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> miniature"], "correct_answer": 0, "solution": "<strong>A) </strong>The incorrectly spelt word is <strong>'untill'</strong>. The correct spelling is <strong>'until'</strong>, which means \"up to the time of\" or \"before a certain point r> In the contemporary landscape of the Indian economy, the infusion of disruptive technologies ____1_____ ignited a digital revolution, _____2_____the nation into a global IT powerhouse. India is currently ______3_____ an unprecedented ubiquity of technology, with entrepreneurs leveraging cutting-edge technologies like AI, blockchain, Internet of Things (IoT), machine learning, and data analytics to tackle multifaceted challenges. Today, India _____4____ all the necessary ingredients to become a modern IT-empowered nation: a wealth of educated workforce, technological expertise, supportive government policies, and a collaborative digital ecosystem are driving the nation forward.</p> <p><strong>Select the most appropriate option to fill in blank number 4</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pose", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Possesses", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Posses", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Posing"], "correct_answer": 1, "solution": "No solution available"}, {"id": "127257", "question": "<strong>Comprehension:</strong></p> <p>As a psychologist, I’ve seen how health in India isn’t just a battle of the body—it’s a struggle of the mind. Behind every disease is a person dealing with fear, frustration and, at times, loneliness. Whether in rural areas, where diseases like tuberculosis persist or in urban centres where lifestyle illnesses are on the rise, the emotional toll is often invisible but deeply felt.</p> <p>In rural India, patients face challenges that go beyond medical diagnoses. I remember a man from a small village battling tuberculosis, but what weighed on him most wasn’t just his illness—it was the isolation. He felt forgotten and cut off from the world because healthcare facilities were far away, and his family didn’t know how to support him. This emotional isolation is something many rural patients experience, and it can be as damaging as their physical symptoms, compounding their sense of hopelessness. In cities like Gurgaon, the struggles are different but equally profound. I think of Anjali, a young woman overwhelmed by anxiety.</p> <p>To the outside world, she seemed to have it all—a great job, a busy social life, and a bright future. But inside, she was spiralling. She hesitated for months before seeking help, afraid that admitting to her struggles would make her appear weak. This fear of judgment keeps many people from asking for help, and it’s heartbreaking to see how common this is in urban environments.Mental health remains an afterthought in our healthcare system.</p> <p>We focus on physical symptoms—treating heart disease, diabetes, and other conditions—but the emotional weight people carry is often ignored. I’ve seen people suffer for years in silence, feeling their emotional pain isn’t valid because it can’t be measured like a physical illness. There’s an urgent need for change. India’s healthcare system mirrors this divide. In cities, private care offers options, but mental health services are still limited and expensive.</p> <p>In rural areas, mental health is rarely even discussed. Socioeconomic barriers, especially for women, make it even harder to access mental health care. Women often put their health—both emotional and physical—on the back burner, prioritising their families’ needs over their own. One of my patients, a mother of two, delayed seeking help for her anxiety for years. She was exhausted, overwhelmed, and losing her sense of self. But like so many women, she felt guilty for even considering that her health deserved attention.</p> <p>This is a common story—too many women in India silently endure mental health struggles, dismissing their needs as unimportant, further isolating themselves in the process.</p> <p>We need to change this narrative. Mental health is not a luxury or a sign of weakness. It is an integral part of overall well-being. We must make mental health care as important as physical health in our conversations and our healthcare system. Only then can we address the full scope of health challenges in India—because real healing isn’t just about the body; it’s about the mind too.</p> <p><strong>Why do many patients in rural India experience emotional isolation in addition to their physical illness?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They are unaware of mental health issues.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Healthcare facilities are often far away, making them feel forgotten.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Rural communities lack physical diseases like tuberculosis.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They prefer traditional methods of treatment over modern healthcare."], "correct_answer": 1, "solution": "No solution available"}, {"id": "127258", "question": "<strong>Comprehension:</strong></p> <p>As a psychologist, I’ve seen how health in India isn’t just a battle of the body—it’s a struggle of the mind. Behind every disease is a person dealing with fear, frustration and, at times, loneliness. Whether in rural areas, where diseases like tuberculosis persist or in urban centres where lifestyle illnesses are on the rise, the emotional toll is often invisible but deeply felt.</p> <p>In rural India, patients face challenges that go beyond medical diagnoses. I remember a man from a  a country that takes the burden of a population of a billion people. Sadly, the situation is quite grim, because today we see fewer families and more individuals living their lives on their terms with an ‘I care a damn attitude’ which is quite common in the metropolis.</p> <p>Our forefathers were brought up with strong family values, but with passing time and ever-changing scenarios, today those core values have been left behind to adopt new so-called modern values. It’s so unfortunate that today very few of us know the importance of living or growing up in a family. One must understand the fact that a family is the first school where the literate and the illiterate have got their first lessons in the art of living and values, traditions, customs and conventions. Also in a family, everyone feels secure and protected. Everyone feels strong because of the strength of the family. Everyone feels that others welcome him or her. Everyone feels a kind of support, sustenance and encouragement. It is, therefore, essential to help and facilitate the growth of good supportive families for foundation as a family tradition rather than promoting an individualistic lifestyle for the sake of the next Gen &amp; future to come.</p> <p>There is some kind of magnetic force that holds the members of a family together. In other words, it is a feeling of closeness and belongingness in the mind of every person and the feeling of acceptance on the part of the whole group that gives it the nomenclature of a family. This feeling of acceptance is always based on the feeling of mutual love, loyalty and trust and also understanding and accommodation. Today we see that families are splitting up.</p> <p>Certain values like mutual affection, love &amp; genuine caring that make a family work are vanishing because everyone wants to live an independent life without any kind of family interference. However, if the younger ones continue to give regard to the elders and the elders continue to give love to the younger ones, then the family life will continue to be undisturbed and everyone will act responsibly. But, if each one gives up their responsibility and the feeling of concern for others, then cracks would appear and get deeper. Hence to preserve the family structure &amp; tradition, one needs to have tolerance, sobriety &amp; humility because family is very essential to civilised life, be it a spiritual family or the society as a family or of nations. Hence we should consider family as a place where we can work for physical, mental, moral and spiritual growth and can create an environment where others also can grow. A family can change a person into a great leader, disciplinarian, soldier, criminal or scholar by encouraging or discouraging, supporting or condemning certain positive or negative traits in him.</p> <p>We must, therefore, pay attention to the transformation of families because families are the breeding grounds for good or bad human beings. So, let us awaken people to observe family values such as mutual love, trust, acceptance, accommodation, consideration and care for the wellbeing of others, the spirit of adjustment, tolerance, responsibility and cooperation because if these family values flourish, the nation and the whole humankind will flourish too.<br> <strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Concerned", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sarcastic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neutral"], "correct_answer": 1, "solution": "No solution available"}, {"id": "127263", "question": "<strong>Compre n embassy in Damascus or when it launched the Lebanon invasion.</p> <p>The U.S. decision to deploy the Terminal High Altitude Area Defense (THAAD) system also points to the precarious security situation its ally is in. After 12 months of war, Israel is yet to meet its objectives. Hamas still fires rockets into Israel. Hezbollah has stepped up rocket and drone attacks after Israel’s Lebanon invasion. On Sunday, a Hezbollah drone struck an Israeli military base, killing four soldiers. On October 1, Iran launched a massive ballistic missile attack on Israel. While most of the 200 Iranian missiles were intercepted by Israeli and American systems, dozens hit at least two Israeli air bases. With Israel preparing its response to Iran amid Iranian threats of a counter-retaliation, the U.S. finds it necessary to bolster the defences of its ally. The move also underscores the argument that Israel is overwhelmingly dependent on the U.S. for security and defence, which gives Washington substantial leverage over Tel Aviv. For some strange reasons, the Biden administration has, until now, refused to use that leverage as Israel has gone rogue in Gaza, West Bank, Syria and Lebanon. This escalation cycle could drag the U.S. deeper into the conflict, with disastrous consequences for all parties, unless Washington reins in its closest ally.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neutral", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cautiously Optimistic", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Concerned", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sarcastic"], "correct_answer": 2, "solution": "No sol         // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
