<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 15 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

img/reload.png\"/></p> P and R", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and S", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Q and S"], "correct_answer": 3, "solution": "<strong>Q:</strong> This sentence fits well as S2 because it continues the philosophical discussion. It mentions the enigma of life and how philosophers have tried to understand the underlying truths. This aligns perfectly with the context introduced in S1."}, {"id": "121661", "question": "<strong>Select the option that expresses the given sentence in direct speech.</strong></p> <p>Anant said that he was feeling sleepy.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Anant said, “He was feeling sleepy.”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Anant said, “I was feeling sleepy.”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> “I was feeling sleepy,” says Anant.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Anant said, “I am feeling sleepy.”"], "correct_answer": 3, "solution": "Indirect Speech को Direct Speech में बदलने के लिए <strong>Reporting Verb + Pronoun Change + Tense Change</strong> का नियम प्रयोग किया जाता है। वाक्य ‘Anant said that he was feeling sleepy’ को Direct Speech में बदलते समय Reporting Verb ‘said’ को वैसा ही रखा जाता है। Pronoun ‘he’ को ‘I’ में बदला जाता है, और Verb ‘was feeling’ को Present Continuous Tense में बदलकर ‘am feeling’ किया जाता है, क्योंकि यह वर्तमान स्थिति को व्यक्त करता है।"}, {"id": "121663", "question": "<strong>Select the option that expresses the given sentence in reported speech.</strong></p> <p>I said, “They never help anybody”.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I said nobody helped them.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I said they never help anybody", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> I said that they never helped anybody.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I said them never helped anybody."], "correct_answer": 2, "solution": "Direct Speech को Indirect Speech में बदलने के लिए <strong>Reporting Verb + Pronoun Change + Tense Change</strong> का नियम प्रयोग किया जाता है। वाक्य ‘I said, “They never help anybody”’ को Indirect Speech में बदलते समय Reporting Verb ‘said’ को वैसा ही रखा जाता है। Verb ‘help’ को Past Tense में बदलकर ‘helped’ किया जाता है, क्योंकि यह एक सामान्य कथन है। ‘That’ का प्रयोग Indirect Speech में वाक्य को जोड़ने के लिए किया जाता है।"}, {"id": "121659", "question": "<strong>Choose the most appropriate option to change the voice (active / passive) form of the given sentence.</strong></p> <p>I regret the way I treated you", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I regret the way you were being treated by me.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> I regret the way you were treated by me.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I regret the way I am treating you.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I regret the way you treated me"], "correct_answer": 1, "solution": "Active Voice को Passive Voice में बदलने के लिए <strong>(Object + Auxiliary Verb + Past Participle + by + Subject)</strong> का प्रयोग किया जाता है। वाक्य ‘I regret the way I treated you’ को Passive Voice में बदलते समय Object ‘you’ को वाक्य की शुरुआत में रखा जाता है। Verb ‘treated’ को Passive Voice में बदलकर ‘were treated’ किया जाता है, और Subject ‘I’ को ‘by me’ के रूप में वाक्य के अंत में रखा जाता है।"}, {"id": "121647", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The team worked tirelessly to _______________ strong relationships with their clients, aiming to build, form, create, establish, and construct a solid foundation for future collaborations.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Abridge", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Subjugate", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Forge", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Condescend"], "correct_answer": 2, "solution": "'Forge' should be used because it means to build or create strong and enduring relationships, which fits the context of developing solid connections with clients. Whereas, 'Abridge' means to shorten, 'Subjugate' implies to dominate or bring under control, and 'Condescend' means to speak or act patronizingly, none of which are suitable for this context."}, {"id": "121655", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>Despite of (A) / his extensive experience (B) / in the field of medicine, (C) / he could not diagnose the rare disease. (D)", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> (A)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (B)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (C)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (D)"], "correct_answer": 0, "solution": "'Despite' will be used instead of 'Despite of' because 'Despite' is used without 'of.' 'Despite' means 'in spite of' and is complete on its own; Like— Despite his hard work, he did not succeed."}, {"id": "121658", "question": "<strong>Select the correct passive form of the given sentence.</strong></p> <p>The Indian army has inducted several women officers in Infantry and Armoured Corps.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Several women officers will be inducted by the Indian Army in Infantry and Armoured Corps.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Several women officers were inducted by the Indian Army in Infantry and Armoured Corps.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Several women officers are being inducted by the Indian Army in Infantry and Armoured Corps.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Several women officers have been inducted by the Indian Army in Infantry and Armoured Corps."], "correct_answer": 3, "solution": "Active Voice को Passive Voice में बदलने के लिए <strong>(Object + Auxiliary Verb + Past Participle + by + Subject)</strong> का प्रयोग किया जाता है। वाक्य ‘The Indian army has inducted several women officers in Infantry and Armoured Corps’ को Passive Voice में बदलते समय Object ‘several women officers’ को वाक्य की शुरुआत में रखा जाता है। Verb ‘has inducted’ को Passive Voice में बदलकर ‘have been inducted’ किया जाता है, और Subject ‘the Indian army’ को अंत में ‘by the Indian Army’ के रूप में रखा जाता है।"}, {"id": "121660", "question": "<strong>Choose the most appropriate option to change the voice (active / passive) form of the given sentence.</strong></p> <p>I owe a big debt of gratitude to my mentor, Ms. Pallavi Dutta.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A big debt of gratitude had been owed by me to my mentor,Ms. Pallavi Dutta.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A big debt of gratitude was owing by me to my mentor,Ms. Pallavi Dutta.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A big debt of gratitude will be owed by to my mentor, Ms. Pallavi Dutta.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> A big debt of gratitude is owed by me to my mentor, Ms Pallavi Dutta."], "correct_answer": 3, "solution": "Active Voice को Passive Voice में बदलने के लिए <strong>(Object + Auxiliary Verb + Past Participle + by + Subject)</strong> का प्रयोग किया जाता है। वाक्य ‘I owe a big debt of gratitude to my mentor, Ms. Pallavi Dutta’ को Passive Voice में बदलते समय Object ‘a big debt of gratitude’ को वाक्य की शुरुआत में रखा जाता है। Verb ‘owe’ को Passive Voice में बदलकर ‘is owed’ किया जाता है, और Subject ‘I’ को अंत में ‘by me’ के रूप में रखा जाता है।"}, {"id": "121643", "question": "<strong>Select the most appropriate idiom for the underlined segment</strong>.</p> <p>After years of heavy use, the old laptop began to stop functioning properly, <ins><strong>no longer working well</strong></ins> despite repeated repairs.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Double down on", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> let one’s guard down", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Be no cakewalk", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Grind to a halt"], "correct_answer": 3, "solution": "<strong>Double down on</strong> (idiom) – To strengthen one's commitment to a strategy or course of action. अपनी रणनीति पर डटे रहना"}, {"id": "121636", "question": "<strong>Select the word which means the same as the group of words underlined in the given sentence</strong></p> <p>He began to <ins><strong>search unsystematically and untidily through</strong></ins> the old boxes in the attic, hoping to find his childhood photographs buried somewhere under the clutter.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Proletariat", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Chimera", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Clemency", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Rummage"], "correct_answer": 3, "solution": "<strong>Proletariat</strong> (noun) – The working-class people, especially in the context of Marxist theory. सर्वहारा"}, {"id": "121644", "question": "<strong>Select the most appropriate meaning of the underlined idiom</strong></p> <p>It was clear that this testimony could <ins><strong>have a bearing on</strong></ins> the case we were investigating.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To affect or influence something, or to be relevant to it", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To describe something in a way that makes it sound very good or to give the impression that something is promising or hopeful", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To involve somebody or make somebody take part in something, although they may not want to take part at first", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To admit the truth about something, to confess or disclose"], "correct_answer": 0, "solution": "<strong>A) Have a bearing on</strong> (idiom) – To affect or influence something, or to be relevant to it (किसी चीज़ को प्रभावित करना या उस पर असर डालना, या उसके लिए प्रासंगिक होना)"}, {"id": "121648", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>During tough times, she had to lean _________________ her close friends, choosing to depend, rely, rest on, trust, and count on them for emotional support and guidance.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Up", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> On", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> For", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> About"], "correct_answer": 1, "solution": "'On' should be used because \"lean on\" means to depend or rely on someone, especially for support, which fits well with the context of emotional reliance. Whereas, 'Up' is used to indicate direction, 'For' is used to indicate purpose, and 'About' refers to a topic or matter, none of which are appropriate in this context."}, {"id": "121654", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>Two reports, released this week, should made for /sobering reading for the climate negotiators /who will convene in Azerbaijan’s capital Baku / in about 10 days for UNFCCC’s CoP 29.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Two reports, released this week, should made for", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> sobering reading for the climate negotiators", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> who will convene in Azerbaijan’s capital Baku", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> in about 10 days for UNFCCC’s CoP 29."], "correct_answer": 0, "solution": "‘make' will be used instead of 'made' because with the Modal Verb 'should,' the Base Form (Infinitive without \"to\") of the verb is used; Like— You should make an effort to study hard."}, {"id": "121653", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>He has <ins><strong>exaggerated</strong> </ins>the whole event to make it sound rather more dramatic than it actually was.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Understate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Censure", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Litigate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Exemplify"], "correct_answer": 0, "solution": "<strong>Antonym</strong>: <strong>Understate</strong> (verb) – To describe or represent something as being smaller or less important than it really is; downplay, minimize. कम करके बताना"}, {"id": "121640", "question": "<strong>Select the most appropriate spelling of the underlined word in the given sentence</strong>.</p> <p>The <ins><strong>medeval</strong> </ins>castle, with its towering walls and ancient history, stood as a reminder of a time when knights and kings ruled the land.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Medieval", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Medevil", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mideval", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Midevil"], "correct_answer": 0, "solution": "A) The correct spelling of ‘medeval’ is ‘medieval’ which means “relating to the Middle Ages, a period in European history from about the 5th to the late 15th century” मध्ययुगीन."}, {"id": "121649", "question": "<strong>Select the most appropriate synonym of the underlined word to fill in the blank in the following sentence</strong></p> <p>The soup tasted <ins><strong>bland</strong></ins>, leaving everyone disappointed with its ___________ flavour that lacked any memorable zest or spice.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Amorphous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Profound", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Insipid", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Prosaic"], "correct_answer": 2, "solution": "Synonym: <strong>Insipid</strong> (adjective) – Lacking flavor or interest, dull, unexciting, tasteless. बेस्वाद"}, {"id": "121651", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>The sports minister today <ins><strong>capitulated</strong> </ins>to calls for his resignation.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Reiterate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Exult", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Resist", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pre-empt"], "correct_answer": 2, "solution": "<strong>Antonym</strong>: <strong>Resist</strong> (verb) – To stand firm against something, oppose, withstand, fight against. विरोध करना"}, {"id": "121638", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a spelling error</strong></p> <p>The wheather can be difficult to gauge, / but experienced travellers can perceive / an omission in forecasts, such as a sudden /storm that may not have been predicted", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The wheather can be difficult to gauge,", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> but experienced travellers can perceive", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> an omission in forecasts, such as a sudden", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> storm that may not have been predicted"], "correct_answer": 0, "solution": "A) The correct spelling of ‘wheather’ is ‘weather’ which means “the state of the atmosphere at a place and time as regards heat, dryness, sunshine, wind, rain, etc.” मौसम."}, {"id": "121634", "question": "<strong>Select the option that can be used as a one-word substitute for the given group of highlighted words.</strong></p> <p>They recently moved into <ins><strong>a building or complex of buildings containing a number of individually owned apartments or houses</strong></ins>, enjoying the benefits of shared amenities and a close-knit community.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mendicant", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cadence", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Condominium", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Metamorphosis"], "correct_answer": 2, "solution": "<strong>Mendicant</strong> (noun) – A person who lives by begging; a beggar. भिखारी"}, {"id": "121666", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>O. India is not producing enough good quality jobs for its people.</p> <p>P. Worse, the seemingly low unemployment rate masks the fact that to count as employed, a person needs to have reported working for only one month in an entire year.</p> <p>Q. A good quality job provides dignity, adequate compensation, an opportunity for learning, and advancement for those who strive.</p> <p>R. Instead, many jobs are unpaid, informal, and dead end.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ROPQ", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> PRQO", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> OQRP", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ROQP"], "correct_answer": 2, "solution": "O introduces the main problem, setting the context for the discussion about the quality of jobs in India. It is a strong opening statement that outlines the issue."}, {"id": "121664", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>P. Amid laughter, nostalgia, and occasional passive-aggressive jabs, there is a persistent guest that always seems to make an appearance: patriarchy.</p> <p>Q. I’m not talking about the headline-making kind that sparks protests.</p> <p>R. As any family get-together draws near, Indian households buzz with excitement.</p> <p>S. Relatives arrive with sweets and stories, while the kitchen churns out delicacies.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> RSPQ", "<p style=\"dis ": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong><br> There was a time in men’s tennis when the defeat of a favourite, the top seed or the defending champion in the first week of a Grand Slam tournament was less of a shock and more ______1______. But over the last two decades, _____2____ Roger Federer, Rafael Nadal and Novak Djokovic have been the hegemonic forces, such bursts of surprise have been few and rare. Seen in this context, the exits of Carlos Alcaraz and Novak Djokovic — against Botic van de Zandschulp and Alexei Popyrin, respectively — in a 24-hour ______3______from the ongoing US Open appear seismic. Alcaraz is the World No.3, a four-time Major champion and a ____4______ title-contender wherever he plays. Djokovic is the World No.2, the defending champion and winner of a men’s record 24 Slams.</p> <p><strong>Select the most appropriate option to fill in blank number 4</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> bona fide", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> confident", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> all-embracing", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> comprehensive"], "correct_answer": 0, "solution": "No solution available"}, {"id": "121671", "question": "<strong>Comprehension:</strong></p> <p>In a land full of mysteries and tales, there once existed a mischievous lad, mischievous in every sense, whose adventurous heart yearned to explore lands beyond the familiar confines of his own. With a spirit restless and wild, he set off on a whimsical journey to Scotland, hoping to discover a realm starkly different from the one he knew. He envisioned landscapes that defied his understanding and a people wrapped in customs foreign and awe-inspiring. Yet, upon arrival, his heart, which had been buoyed with excitement, met the curious revelations of sameness. To his astonishment, he discovered that the ground beneath his feet resisted his weight with the same firmness, echoing the unyielding nature he had experienced back home. As he measured a yard, it stretched no more, nor any less, than what he had always known. Songs sung by merry Scottish voices were no more joyful than those that had filled the streets of his homeland. The redness of cherries he came upon seemed to burn with the same intensity, unaltered by this northern territory. Lead, in its stoic heaviness, did not waver or transform, defying any notion that this foreign land might offer a lighter burden. The numerical wonder of fourscore, being simply eighty, proved an unchanged fact, indifferent to his wanderlust-driven dreams of different mathematics. Even doors, stout and wooden, groaned and opened with familiar creaks, betraying no novelty that could astonish a traveler seeking profound differences. And so, in this realization, the boy, dressed in the same shoes that had journeyed with him, stood amidst the Scottish air, surrounded by all that was alike. Caught in a moment of disbelief, he pondered the universality of life’s simple truths. He wondered at the sameness of existence, at the unifying forces that made distant lands feel familiar. Standing there, in contemplation, he marveled at a paradox: the adventure he sought lay not in the changing of lands but perhaps within the essence of things that remained constant. With this revelation, the boy’s feet rooted firmly, and his wandering mind settled, yet brimming with the beauty of understanding he had not anticipated.<br> <strong>What is the tone of the passage?</strong>", "options": ["<p style=\"di g></p> <p>There was a time in men’s tennis when the defeat of a favourite, the top seed or the defending champion in the first week of a Grand Slam tournament was less of a shock and more awe. But over the last two decades, wherein Roger Federer, Rafael Nadal and Novak Djokovic have been the hegemonic forces, such bursts of surprise have been few and rare. Seen in this context, the exits of Carlos Alcaraz and Novak Djokovic — against Botic van de Zandschulp and Alexei Popyrin, respectively — in a 24-hour span from the ongoing US Open appear seismic. Alcaraz is the World No.3, a four-time Major champion and a bona fide title-contender wherever he plays. Djokovic is the World No.2, the defending champion and winner of a men’s record 24 Slams. The reverses could well be attributed to the draining summers, physically and emotionally, Alcaraz and Djokovic experienced. The 21-year-old Spaniard won the French Open-Wimbledon double — among the hardest feats in all sport — and fought Djokovic tooth and nail in the Paris Olympics final before settling for the silver medal. Djokovic underwent a knee surgery in early June but made the Wimbledon final in less than six weeks after that before clinching the elusive singles gold medal in Paris, the one prize that was missing from his glittering cabinet.</p> <p>In a larger sense, however, it is Djokovic’s third-round loss that can upend world tennis. Not since the 2017 Australian Open, when he lost in the second round to Denis Istomin, has the Serb gone out of a Major this early. It also means 2024 will join 2017 as the only two seasons since 2010 that have not seen him lift a Major. The failure is a telltale sign that Djokovic, at 37, will no longer be at the top of the totem pole. In fact, 2024 will be the first since 2002 without a Slam winner from among Federer, Nadal and Djokovic. World No.1 Jannik Sinner now has a golden opportunity to firmly establish the new order by adding the US Open to his 2024 Australian Open crown. The function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
