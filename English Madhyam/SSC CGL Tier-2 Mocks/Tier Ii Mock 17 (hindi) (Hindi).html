<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 17 (hindi) (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

ad.png\"/></p> Itinerant", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Impervious", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Accountable", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Chronic"], "correct_answer": 2, "solution": "Chronic: इसका अर्थ है 'दीर्घकालिक' या 'लंबे समय से चली आ रही समस्या', जो परियोजना की असफलता के लिए किसी को जिम्मेदार ठहराने के संदर्भ में सही नहीं है।"}, {"id": "127802", "question": "<strong>Select the most appropriate idiom for the underlined segment.</strong></p> <p>The teacher will <ins><strong>assess</strong> </ins>the students' performance based on their project submissions and presentations.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Bunk off", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Siphon off", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Take stock of", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Clear the deck"], "correct_answer": 2, "solution": "<strong>Bunk off (idiom)</strong> – To leave work or school without permission. काम या स्कूल से बिना अनुमति के अनुपस्थित होना"}, {"id": "127813", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>No less / than fifty audiences are sitting / in the hall and waiting for their / beloved artiste’s appearance on the stage.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> No less", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> than fifty audiences are sitting", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> in the hall and waiting for their", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> beloved artiste’s appearance on the stage"], "correct_answer": 0, "solution": "'No fewer' will be used instead of 'No less' because 'less' is used for uncountable quantities, whereas 'fewer' is used for countable numbers. Since 'audiences' refers to a countable noun, 'No fewer' is correct."}, {"id": "127807", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>His constant <ins><strong>discontentment</strong></ins> with his job drove him to search for new opportunities, reflecting his persistent dissatisfaction and lack of fulfillment", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Unhappiness", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Bourgeois", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Substantive", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sanctimonious"], "correct_answer": 0, "solution": "Synonym: <strong>Unhappiness</strong> (noun) – sadness, discontent, dissatisfaction, a state of not being happy. दुख"}, {"id": "127797", "question": "<strong>Select the option that can be used as a one-word substitute to fill in the blanks for the given group of highlighted words.</strong></p> <p>His actions revealed a deep ___________, showing <ins><strong>the quality of causing or wanting to cause harm or evil.</strong></ins>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Clemency", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Malice", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Visionary", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Bequest"], "correct_answer": 1, "solution": "<strong>Clemency (noun)</strong> – Mercy; lenience. दया, उदारता।"}, {"id": "127806", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The scientist's discovery marked a significant _________________ in cancer research, paving the way for more effective treatments.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Aberration", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ascendancy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Bastion", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Breakthrough"], "correct_answer": 3, "solution": "<strong>'Breakthrough'</strong> will be used because it means a significant advance or achievement. The sentence mentions that the scientist's discovery marked a pivotal progress in cancer research, paving the way for more effective treatments, making 'Breakthrough' the most appropriate choice. 'Aberration' means deviation or abnormality, which is unsuitable here as it contradicts the idea of progress. 'Ascendancy' means dominance or control, which doesn't align with the context of a scientific discovery. 'Bastion' means a strong defense or fortification, which doesn't convey the idea of advancement in this sentence."}, {"id": "127808", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>The manager had to <ins><strong>reprimand</strong> </ins>the employee for repeatedly missing deadlines, issuing a formal expression of disapproval.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Debilitate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Accost", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Forgo", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Admonishment"], "correct_answer": 3, "solution": "<strong>Synonym: Admonishment </strong>(noun) – A firm warning or reprimand; चेतावनी या फटकार"}, {"id": "127796", "question": "<strong>Select the option that can be used as a one-word substitute to fill in the blanks for the given group of highlighted words.</strong></p> <p>After a hectic week at work, she cherished the ______________, enjoying<ins> <strong>the state of being alone, especially when you find this pleasant.</strong></ins>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Anomaly", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Genre", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Homily", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Solitude"], "correct_answer": 3, "solution": "<strong>Anomaly</strong> (noun) – Something that deviates from what is standard, normal, or expected. असामान्यता"}, {"id": "127816", "question": "<strong>Select the option that expresses the given sentence in direct speech.</strong></p> <p>The teacher asked if everyone was present in the class that day.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The teacher said, \"Was everyone present in the class today?\"", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The teacher said, \"Is everyone present in the class that day?\"", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The teacher said, \"Is everyone present in the class today?\"", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> . The teacher said, \"Was everyone present in the class that day?\""], "correct_answer": 2, "solution": "C) </strong>The teacher said, \"Is everyone present in the class today?<br> Indirect Speech में वाक्य को Direct Speech में बदलते समय, <strong>asked if</strong> को प्रश्नवाचक वाक्य <strong>said</strong> में बदला गया। Verb <strong>was</strong> को Present Simple में <strong>is</strong> में बदला गया, और समय सूचक <strong>that day</strong> को <strong>today</strong> में परिवर्तित किया गया।<br> When converting the sentence from Indirect Speech to Direct Speech, <strong>asked if</strong> changes to <strong>said</strong> or <strong>asked</strong> as an interrogative statement. The verb <strong>was</strong> changes to <strong>is</strong> in Present Simple, and the time expression <strong>that day</strong> changes to <strong>today"}, {"id": "127805", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>Many people fall prey ______________ online scams due to a lack of awareness about cybersecurity threats.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> On", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Of", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> For"], "correct_answer": 0, "solution": "<strong>'To'</strong> is correct because 'fall prey to' is an established phrase meaning to become a victim of something. The sentence conveys that people become victims of online scams, making 'to' the appropriate choice here. <strong>'On'</strong> means being on a surface, which doesn't fit the phrase 'fall prey' in this context. <strong>Of'</strong> indicates possession or ownership, which doesn't work with the phrase 'fall prey to'. <strong>'For'</strong> implies purpose, which isn't grammatically correct in this context."}, {"id": "127823", "question": "<strong>For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the appropriate sentences for S2 and S3, respectively.</strong></p> <p><strong>S1</strong>: October 7, 2024 marked one year of Israel’s war on Gaza and its relentless bombing of the Gaza Strip killing nearly 42,000 people.</p> <p><strong>P:</strong> For this reason, they requested to use a pseudonym for their family name, but their first names are genuine.</p> <p><strong>Q</strong>: The prime victims of the heartless war have been civilians, women and children in Gaza, West Bank and now Lebanon;</p> <p><strong>R</strong>: 16,705 Palestinian children have been killed, the largest in any conflict in one year.</p> <p><strong>S:</strong> The Hassans escaped the Shia-majority southern suburbs—or Dahiyeh in Arabic—fearing Israeli airstrikes that have blanketed southern Lebanon and are now pummeling their neighborhood.</p> <p><strong>S4:</strong> This has brought out millions in mass demonstrations in the major cities of Europe, the United States and beyond, politicising a generation of people in opposition to Israel, and also making it one of the greatest issues of our time.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and Q", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Q and R", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and S", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Q and S"], "correct_answer": 1, "solution": "S1: This sentence sets the context of the war and the heavy loss of life in Gaza due to bombings"}, {"id": "127819", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>How have they been ordered by the minister?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> How have the minister ordered them?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> How did the minister order them?", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> How has the minister ordered them?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> How had the minister ordered them?"], "correct_answer": 2, "solution": "The Passive Voice sentence \"How have they been ordered by the minister?\" is in the Present Perfect Tense, where \"have been ordered\" is the passive verb form. When changing to Active Voice, \"the minister\" becomes the subject, and \"they\" becomes the object. The passive verb \"have been ordered\" changes to \"has ordered\" because \"the minister\" is a singular subject."}, {"id": "127795", "question": "<strong>Select the option that can be used as a one-word substitute to fill in the blanks for the given group of highlighted words.</strong></p> <p>She firmly advocated for an ________________ society, <ins><strong>believing in or based on the principle that all people are equal and deserve equal rights and opportunities</strong></ins>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Disparate", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Egalitarian", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Solvent", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Rapacious"], "correct_answer": 1, "solution": "<strong>Disparate</strong> (adjective) – Essentially different in kind; not allowing comparison. असमान, भिन्न"}, {"id": "127817", "question": "<strong>Select the option that expresses the given sentence in reported speech.</strong></p> <p>She said, \"The organisation was established a year ago.\"", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She said that the organisation had been established a year before.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She said that the organisation has been established a year ago.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She told that the organisation was established a year before.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She said that the organisation was established a year ago"], "correct_answer": 0, "solution": "Direct से Indirect Speech में बदलते समय, वाक्य \"The organisation was established a year ago\" में Past Simple \"was established\" को Past Perfect \"had been established\" में बदल दिया जाता है। समय-सूचक शब्द \"a year ago\" को \"a year before\" में परिवर्तित किया जाता है। Reporting verb \"said\" वैसा ही रहता है क्योंकि कोई object नहीं है।<br> While changing from Direct to Indirect Speech, the sentence \"The organisation was established a year ago\" changes the Past Simple \"was established\" to the Past Perfect \"had been established.\" The time indicator \"a year ago\" becomes \"a year before.\" The reporting verb \"said\" remains unchanged as there is no object involved."}, {"id": "127814", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>School offers many opportunities of meeting / helpful people, reading useful books / and obtain information about / a variety of public careers.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> School offers many opportunities of meeting", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> helpful people, reading useful books", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> and obtain information about", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a variety of public careers"], "correct_answer": 2, "solution": "'<strong>obtaining</strong>' will be used instead of 'obtain' because the given sentence follows a sequence of verbs in the gerund form: 'meeting,' 'reading,' and 'obtaining.' To maintain consistency, all verbs must be in the gerund form."}, {"id": "127809", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>She couldn't help but feel <ins><strong>envious</strong> </ins>of her friend's success, wishing she had achieved similar accomplishments.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Dialectical", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Despondent", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Benevolent", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Indulgent"], "correct_answer": 2, "solution": "Antonym: <strong>Benevolent</strong> (adjective) – Well-meaning and kindly; generous, compassionate, altruistic, sympathetic. परोपकारी"}, {"id": "127799", "question": "<strong>There is a spelling error in the given sentence. Select the option that contains the CORRECTLY spelt word.</strong></p> <div class=\"simple-translate-system-theme\" id=\"simple-translate\"> <div> <div class=\"simple-translate-button isShow\" style='background-image: url(\"moz-extension://ebf05c29-9dbf-457f-81fa-dde21a9fbf78/icons/512.png\"); height: 22px; width: 22px; top: 34px; left: 538px;'> </div> <div class=\"simple-translate-panel\" style=\"width: 300px; height: 200px; top: 0px; left: 0px; font-size: 13px;\"> <div class=\"simple-translate-result-wrapper\" style=\"overflow: hidden;\"> <div class=\"simple-translate-move\" draggable=\"true\"> </div> <d check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Enormous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pejorative", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Parochial"], "correct_answer": 1, "solution": "Antonym: <strong>Enormous</strong> (adjective) – Extremely large, huge, immense, colossal. विशाल"}, {"id": "127800", "question": "<strong>Select the most appropriate spelling of the underlined word in the given sentence.</strong></p> <p>The castle's architecture reflects a <ins><strong>medevil</strong> </ins>design, complete with towering walls and a drawbridge.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Medeval", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Medieval", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Mideval", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Medievel"], "correct_answer": 1, "solution": "<strong>B) </strong>The correct spelling of ‘<strong>medevil’</strong> is ‘<strong>medieval’</strong> which means “relating to the Middle Ages” मध्ययुगीन."}, {"id": "127798", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a spelling error</strong></p> <p>During tomorrow's speech, the / manager plans to address the noticable / issue of employees / being harassed at work.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> During tomorrow's speech, the", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> manager plans to address the noticable", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> issue of employees", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> being harassed at work."], "correct_answer": 1, "solution": "<strong>B)</strong> The correct spelling of ‘<strong>noticable’</strong> is ‘<strong>noticeable’</strong> which means “able to be noticed; perceptible” ध्यान देने योग्य, उल्लेखनीय"}, {"id": "127812", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>He was much / more surprised than me / to see the dancing girl / coming towards us.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He was much", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> more surprised than me", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to see the dancing girl", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> coming towards us."], "correct_answer": 1, "solution": "B) 'more surprised than me' के बदले<strong> 'more surprised than I' </strong>का प्रयोग होगा क्योंकि Comparative Degree में Pronoun के Subjective Case (I, he, she, they, etc.) का प्रयोग होता है जब इसके बाद Verb छिपी हो; जैसे— She is taller than I (am).<br> • 'more surprised than I' will be used instead of 'more surprised than me' because in Comparative Degree, the Subjective Case of Pronoun (I, he, she, they, etc.) is used when a verb is implied after it; Like— She is taller than I (am)."}, {"id": "127815", /englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> wasteful", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> feigning"], "correct_answer": 0, "solution": "No solution available"}, {"id": "127827", "question": "<strong>Comprehension:</strong></p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</strong></p> <p>Cities are the great havens for knowledge, culture, and social life. Vibrant cultures are found in cities because it takes a___1_____ population to support museums, concert halls, sports teams, and night-life districts. Cities also offer rich social opportunities. People in rural areas enjoy only limited social opportunities because ____2____ the small local population. City dwellers can choose their friends and mates from among a large number of people of ____3____ interests and inclinations. We are not likely to abandon the city as a ____4____ institution, but we need to make sure that our transport arrangements do not damage the 'city's' other functions.</p> <p><strong>Select the most appropriate option to fill in blank No. 4.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> educational", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> psychological", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> religious", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> cultural"], "correct_answer": 3, "solution": "No solution available"}, {"id": "127828", "question": "<strong>Comprehension:</strong></p> <p>The latest World Economic Outlook released by the International Monetary Fund (IMF) has some good tidings, and some ominous assessments. The good news — that largely pertains to the short term — is that a much-feared global recession has been averted, the global war against inflation ‘almost’ won, and growth is holding steady. The U.S. is likely to grow faster this year than anticipated earlier, balancing out lower estimates for some large European nations. Among developing countries, the IMF downgraded growth hopes for West Asia, sub-Saharan Africa and Central Asia as conflicts and unrest disrupt production and shipping. However, brighter prospects for emerging Asia, enhanced by higher public investments in China and India, offset those downward pressures. The IMF expects the world to grow 3.2% in 2024, as in 2023. The moderation in inflation has been partly attributed to the unwinding of shocks since the COVID-19 pandemic and the Ukraine war, but tight monetary policies played a crucial role too, it noted. With inflation returning near central banks’ targets, there is now room for pivoting monetary policy to a neutral stance and supporting economic activity. Yet, the IMF has cautioned about food price pressures again in some emerging economies, and services inflation being too high, at almost double the pre-pandemic levels.</p> <p>For India, the IMF has maintained its GDP growth estimate at 7% for 2024-25, followed by 6.5% next year, but linked the moderation in growth from last year to the exhaustion of “pent-up demand accumulated during the pandemic”. Some of this is visible in car and consumer non-durable sales, with urban demand stumbling. A Reserve Bank of India index pegs second quarter GDP growth at 6.8% — it was 6.7% in the first. The favourable monsoon and improved rural incomes could lift the tide in coming months, but may not be taken for granted yet. Of concern, however, is the IMF’s prognosis that global growth should reach a “mediocre” 3.1% in five years, underwhelming relative to pre-COVID trends, with protectionist industrial and trade policies gaining more traction. India’s economy may hinge more on domestic momentum but weaker exports and investment flows will not help. The Centre’s recent averments on the reform agenda have signalled that most work now needs to be done in the States. While that is a truism, central policymakers also need to work doubly hard to lift potential growth: be it to make India a more open economy by lowering import tariffs and FDI barriers as the World Bank has mooted, as well as undertake “ambitious’ domestic reforms to improve competition, economic integration and spur private investments, suggested by the IMF.</p> <p><strong>The IMF has attributed the moderation in inflation to ___________.</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Strict fiscal policies", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Increase in global supply chain efficiency", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Decrease in global consumption", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The unwinding of shocks from the COVID-19 pandemic and Ukraine war"], "correct_answer": 3, "solution": "No solution available"}, {"id": "127829", "question": "<strong>Comprehension:</strong></p> <p>The latest World Economic Outlook released by the International Monetary Fund (IMF) has some good tidings, and some ominous assessments. The good news — that largely pertains to the short term — is that a much-feared global recession has been averted, the global war against inflation ‘almost’ won, and growth is holding steady. The U.S. is likely to grow faster this year than anticipated earlier, balancing out lower estimates for some large European nations. Amo s.</p> <p>For India, the IMF has maintained its GDP growth estimate at 7% for 2024-25, followed by 6.5% next year, but linked the moderation in growth from last year to the exhaustion of “pent-up demand accumulated during the pandemic”. Some of this is visible in car and consumer non-durable sales, with urban demand stumbling. A Reserve Bank of India index pegs second quarter GDP growth at 6.8% — it was 6.7% in the first. The favourable monsoon and improved rural incomes could lift the tide in coming months, but may not be taken for granted yet. Of concern, however, is the IMF’s prognosis that global growth should reach a “mediocre” 3.1% in five years, underwhelming relative to pre-COVID trends, with protectionist industrial and trade policies gaining more traction. India’s economy may hinge more on domestic momentum but weaker exports and investment flows will not help. The Centre’s recent averments on the reform agenda have signalled that most work now needs to be done in the States. While that is a truism, central policymakers also need to work doubly hard to lift potential growth: be it to make India a more open economy by lowering import tariffs and FDI barriers as the World Bank has mooted, as well as undertake “ambitious’ domestic reforms to improve competition, economic integration and spur private investments, suggested by the IMF.</p> <p><strong>Why has the IMF forecasted a lower growth rate for India in the next year compared to 2024-25?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Due to excessive growth during the pandemic", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Exhaustion of pent-up demand from the pandemic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> India's exports are increasing", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Protectionist policies are reducing global growth"], "correct_answer": 1, "solution": "No solution available"}, {"id": "127832", "question": "<strong>Comprehension</strong>: </p> <p>The furore that accompanies an outbreak of a disease is seldom matched by the triumph over the cause of the disease, with some exceptions. The recent achievement India has struck with kala-azar, bringing it to the brink of elimination as a public health issue, or with eliminating bacterial eye infection trachoma, sits squat in that quarter. India will seek WHO certification for eliminating kala-azar, after it brought down the number of cases to under one in 10,000, for two consecutive years now. It is considered the second deadliest parasitic disease after malaria in India. As per figures by the Union Health Ministry, India registered 595 cases and four deaths in 2023, and 339 cases and one death so far this year. The country must retain this achievement for another year to be eligible for WHO certification. Epidemiology makes the differentiation between elimination and eradication of a disease; with elimination, a nation needs to keep the number of cases under a specified limit, which means it ceases to be a public health problem, whereas with eradication, no further cases can occur. While disease eradication is very challenging, and has been achieved only with smallpox, elimination is no cakewalk. Particularly for diseases that do not have a vaccine. Even modern armamentaria come up short while trying for a vaccine for either kala-azar, or trachoma, making the public health achievement all the more special. Kala-azar is spread by the sandfly which passes on the protozoan parasite, Leishmania donovani, and is present in only one of its forms, visceral leishmaniasis. Trachoma, caused by the bacteria, Chlamydia trachomatis, is the leading infectious cause of blindness in the world. India contributed about 11.5% of the cases of kala-azar globally and in the 1970s, trachoma was responsible for 5% of all blindness in the country.<br> Kala-azar and trachoma share other commonalities — they are classified under the category ‘neglected tropical disease’, and are caused by conditions of poverty and inadequate sanitation; it was a sustained government-run public health campaign that addressed the disease spread, and its social implications — including income, access to nutrition and health services — that finally managed to crack elimination. However, sustained surveillance, post declaration for trachoma and as India moves towards elimination for kala-azar, is key. While celebration post such a well-fought public health campaign is necessary, complacence will erode all gains, considering the disease remains in the community, below the WHO-recommended radar. Efforts to find better cures and vaccines must not be suspended because of present gains; indeed, the vigil must be eternal, or, until the disease is eradicated.<br> <strong>Which of the following is the primary difference between the elimination and eradication of a disease, as discussed in the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Elimination means the disease is completely wiped out, while eradication refers to reducing cases to a specific limit.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Elimination refers to reducing cases below a specific limit, whereas eradication means the disease no longer occurs at all.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Elimination is easier to achieve than eradication, as both involve completely eradicating the disease.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://english cination, serving as much more than mere entertainment. Folklores often centre on ordinary people who face adversity yet find ways to overcome it, reflecting everyday life’s common struggles and aspirations. This relatability comforts those who feel isolated in their struggles, showing that they are not alone and that their challenges are shared across time and place.</p> <p>One of folklore’s most significant aspects is its inherent simplicity, which makes it a powerful tool for education across generations. Folklores are often crafted to be relatable, encapsulating moral lessons or practical wisdom in a format accessible to children and adults alike. This accessibility makes folklore an effective educational medium, especially in regions where formal education might be limited.</p> <p>Through memorable characters, narratives, and morals, folklores teach honesty, bravery, kindness, and empathy lessons crucial to shaping young minds. Folklore holds a unique power: it reflects past wisdom, inspires critical thinking, and provides a mirror for self-reflection. </p> <p>Indian folklore is a repository of India’s diverse cultural heritage. They act as a unifying force in a country as diverse as India, with numerous languages, religions, and social norms. They capture the essence of various regional traditions, dialects, and beliefs, weaving together the vast and varied ethos of the country.</p> <p>Every region, from Kashmir to Kanyakumari, has tales that embody local wisdom, rituals, and social customs. Stories like those from the Panchatantra and Jataka Tales have transcended regions, becoming staples of Indian storytelling that educate on universal values while highlighting India’s unique cultural tapestry.</p> <p>Indian folklore frequently addresses social issues, challenging established norms and encouraging reflection on societal practices. For instance, the folktales of Tenali Rama, the witty advisor in the Vijayanagara Empire, often question the elite’s excesses and promote justice for the common man. Similarly, Birbal, a wise minister in the Mughal court, features in numerous tales that promote intellectual equality. These stories teach Indians to value wit, intelligence, and fairness, subtly questioning the authority of those in power.</p> <p>By embedding reformist ideas within entertaining narratives, Indian folklores provide a soft yet powerful critique of societal hierarchies, encouraging progressive thinking.</p> <p>Many Indian folklore emphasize the bond between humans and nature, imparting lessons on environmental stewardship that resonate with India’s agrarian roots. Stories about sacred rivers, protective spirits, or revered animals highlight the belief that natural entities are to be respected and cared for.</p> <p>These tales often highlight shared human experiences, bridging cultural gaps and fostering a sense of collective identity. Folklore serves as a reservoir of collective wisdom, transcending time and geography to educate and reform society. Its remarkable ability to touch hearts, prompt reflection, and inspire action makes it indispensable in both formal and informal education. In an era dominated by digital technology, folklore may seem antiquated, yet its relevance has only deepened. Modern storytellers, educators, and social reformers can adapt folklore for contemporary audiences, harnessing its emotive power to foster empathy and awareness.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Nostalgic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Persuasive", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Informative", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
