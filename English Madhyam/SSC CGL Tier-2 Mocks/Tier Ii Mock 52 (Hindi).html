<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 52 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>
    <!-- START: Unified Premium Dark Mode Overrides -->
    <style>

 "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> OQRP", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ROQP"], "correct_answer": 2, "solution": "<strong>C) OQRP<br> O:</strong>This sentence logically starts the paragraph, as it talks about the beginning of the author's academic journey after completing schooling.<br> <strong>Q:</strong> This sentence follows \"O\" because it presents the outcome of the author's experience at the engineering institute mentioned in \"O.\" The use of \"two years later\" signals the passage of time after the events in sentence \"O,\" and \"quit\" contrasts with the initial action of \"joining,\" continuing the narrative.<br> <strong>R: </strong>The sentence \"R\" follows \"Q\" because after quitting the first institute, the author moves forward to join another college. The use of \"another\" suggests that the subject had previously joined a college, reinforcing the connection with the earlier sentence.<br> <strong>P:</strong> This sentence concludes the paragraph by explaining how the author’s entry into the railway services (mentioned in \"R\") was influenced by good fortune. The use of \"also\" refers to the previous sentence about joining the prestigious railway services, providing a smooth and coherent conclusion to the paragraph."}, {"id": "117202", "question": "<strong>Select the option that expresses the given sentence in reported speech.</strong></p> <p>She said to me, \"Please lend me your bicycle.\"", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She requested her to lend me your bicycle.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She requested me to lend her your bicycle.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She requested you to lend me her bicycle.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She requested me to lend her my bicycle"], "correct_answer": 3, "solution": "Direct Speech को Indirect Speech में बदलने के लिए <strong>Reporting Verb + Pronoun Change + Tense Change</strong> और <strong>Request या Command</strong> के लिए ‘requested’ का प्रयोग किया जाता है। वाक्य में Reporting Verb ‘said to’ को ‘requested’ में बदला गया है क्योंकि यह एक विनम्र अनुरोध है। Pronouns को भी बदलना होता है, जैसे ‘me’ को ‘her’ और ‘your’ को ‘my’ में बदला गया है, क्योंकि यह Indirect Speech में आता है। इसलिए सही उत्तर <strong>(She requested me to lend her my bicycle)</strong> है।"}, {"id": "117204", "question": "<strong>Select the option that expresses the given sentence in direct speech.</strong></p> <p>I asked my mother where she kept the grocery", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I said to my mother, \"Where have you kept the grocery?\"", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I said to my mother, \"Where does she keeps the grocery?\"", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> I said to my mother, \"Where do you keep the grocery?\"", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I said to my mother, \"Where she keeps the grocery?\""], "correct_answer": 2, "solution": "Indirect Speech को Direct Speech में बदलने के लिए <strong>Reporting Verb + Pronoun Change + Tense Change</strong> के नियम का प्रयोग किया जाता है। वाक्य में ‘I asked my mother where she kept the grocery’ को Direct Speech में बदलते समय Reporting Verb ‘asked’ को ‘said to’ में बदल दिया गया है, और Pronoun ‘she’ को Direct Speech में ‘you’ में परिवर्तित किया गया है। Verb ‘kept’ को Present Simple Tense के अनुसार ‘do you keep’ में बदला गया है, क्योंकि प्रश्न पूछने के लिए Simple Present Tense का प्रयोग किया गया है। अतः सही उत्तर <strong>(I said to my mother, \"Where do you keep the grocery?\")</strong> है।"}, {"id": "117200", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>He will be made President by the people.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> People will be making him the President.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The people will make him President.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> By the people, he shall be made the President.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He will be made President by the people."], "correct_answer": 1, "solution": "Passive Voice को Active Voice में बदलते समय, कर्ता (subject) वाक्य की शुरुआत में आता है और क्रिया (verb) के साथ सीधा कार्य करता है। जैसे—"}, {"id": "117189", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The workers accidentally _____ the entire project when they failed to follow the critical instructions.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Botched-up", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Elevated", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Analyzed", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Postponed"], "correct_answer": 0, "solution": "<strong>Botched-up'</strong> will be used because it means to do something badly or carelessly, resulting in failure. The sentence indicates that the workers accidentally ruined the project by not following critical instructions, so 'botched-up' is appropriate here. Whereas: 'Elevated' means to raise or improve something, which doesn't fit the context. 'Analyzed' means to examine something, but there’s no analysis mentioned in this sentence. 'Postponed' means to delay something, which doesn't align with the meaning of the sentence."}, {"id": "117196", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>Anyone who is curious about the absurdity lengths to which the social media-fuelled pursuit of beauty can be taken, only needs to look at two recent trends.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Anyone who is curious about the absurdity length", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to which the social media-fuelled pursuit of", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> beauty can be taken,", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> only needs to look at two recent trends."], "correct_answer": 0, "solution": "'absurd' will be used instead of 'absurdity' because 'lengths' is a noun, and to qualify a noun, an adjective (absurd) is required. 'Absurdity' is a noun, and its use here is incorrect; Like— \"He went to absurd lengths to complete his work.\""}, {"id": "117199", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>The painting was admired by art enthusiasts from around the world.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The painting was being admired by art enthusiasts from around the world.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Art enthusiasts from around the world admired the painting.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Art enthusiasts from around the world have admired the painting.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The painting has been admired by art enthusiasts from around the world"], "correct_answer": 1, "solution": "'was admired' के बदले 'admired' का प्रयोग होगा। Active Voice में हमेशा 'Subject + V² [Verb का Simple Past रूप] + Object' का प्रयोग होता है, जैसे—"}, {"id": "117201", "question": "<strong>Select the option that expresses the given sentence in active voice.</strong></p> <p>The meal was not prepared by us.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> We had not prepare the meal.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> We did not prepare the meal.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> We did not preparing the meal.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> We did prepare the meal"], "correct_answer": 1, "solution": "(B) 'was not prepared' के बदले 'did not prepare' का प्रयोग होगा। Active Voice में हमेशा 'Subject + did not + V¹ [Verb का Base Form] + Object' का प्रयोग होता है, जैसे—"}, {"id": "117186", "question": "<strong>Select the most appropriate idiom to fill in the blank</strong></p> <p>She ______________ from her parents about her new dress", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> have one’s task cut out", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> took some flak", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> wallowed in Self-pity", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> backed to the drawing board"], "correct_answer": 1, "solution": "B) <strong>Took some flak</strong> (idiom) – received strong criticism कड़ी आलोचना का सामना करना"}, {"id": "117181", "question": "<strong>Select the word which means the same as the group of words underlined in the given sentence</strong></p> <p>Milk is an <ins><strong>easily-spoiled</strong></ins> item that needs to be refrigerated to prevent it from spoiling.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Decomposable", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Elusive", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Refined", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Perishable"], "correct_answer": 3, "solution": "D) <strong>Perishable</strong> (adjective) – Likely to decay or go bad quickly खराब होने वाला"}, {"id": "117187", "question": "<strong>Select the most appropriate meaning of the underlined idiom</strong></p> <p>Despite the shocking news, she did <ins><strong>not even bat an eyelid</strong></ins>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She blinked multiple times in disbelief.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> She showed no emotional reaction.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She became highly anxious and panicked.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> She was visibly confused and hesitant."], "correct_answer": 1, "solution": "B) <strong>Not even bat an eyelid</strong> (idiom) – She showed no emotional reaction (भावनात्मक प्रतिक्रिया नहीं दिखाना)"}, {"id": "117190", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The unexpected protest in the downtown area led to total _____ as people rushed to avoid the crowded streets.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Mayhem", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Composure", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Innovation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Prosperity"], "correct_answer": 0, "solution": "A) <strong>Mayhem'</strong> का use होगा क्योंकि इसका अर्थ होता है अव्यवस्था या अराजकता। वाक्य में बताया गया है कि लोग भीड़भाड़ वाली सड़कों से बचने के लिए भाग रहे हैं, जो अराजकता की स्थिति को दर्शाता है, इसलिए 'mayhem' यहाँ सही है। जबकि 'Composure' का अर्थ होता है शांति या संतुलन, 'Innovation' का अर्थ होता है नवाचार, और 'Prosperity' का अर्थ है समृद्धि, जो इस संदर्भ में सही नहीं हैं।"}, {"id": "117195", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>Ratan Tata will be remembered as the man who steered India’s largest and oldest business house / from a unwieldy domestic and commodity-centric / leviathan to a global and consumer-facing conglomerate, / cementing its eminence in the post-liberalisation era.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ratan Tata will be remembered as the man who steered India’s largest and oldest business house", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> from a unwieldy domestic and commodity-centric", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> leviathan to a global and consumer-facing conglomerate,", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> cementing its eminence in the post-liberalisation era."], "correct_answer": 1, "solution": "B) <strong>'a unwieldy'</strong> के बदले 'an unwieldy' का प्रयोग होगा क्योंकि 'unwieldy' का उच्चारण स्वर 'u' से होता है, इसलिए 'a' की जगह 'an' का प्रयोग किया जाएगा। उदाहरण— He is an honest man."}, {"id": "117194", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>She was <ins><strong>green-eyed</strong></ins> when she saw her friend's new car.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Envious", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Generous", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Content", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Jealous"], "correct_answer": 2, "solution": "Antonym: <strong>Content</strong> (adjective) – Satisfied, at peace, not desiring more. संतुष्ट"}, {"id": "117184", "question": "<strong>Select the most appropriate spelling of the underlined word in the given sentence</strong></p> <p>His <ins><strong>drunkeness</strong> </ins>was evident from his behavior.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> drunkenness", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> drunkness", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> drankeness", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> drunkeenness"], "correct_answer": 0, "solution": "A) The correct spelling of ‘<strong>drunkeness’</strong> is ‘<strong>drunkenness’</strong> which means “the state of being drunk” नशे की स्थिति."}, {"id": "117191", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>The criticism from her peers continued to <ins><strong>rankle</strong> </ins>her long after the event.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pacify", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Irritate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Soothe", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Quench"], "correct_answer": 1, "solution": "Synonym: <strong>Irritate</strong> (verb) – To make someone annoyed, angry, or impatient, aggravate, exasperate. चिढ़ाना/ परेशान करना"}, {"id": "117193", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>His <ins><strong>brash</strong> </ins>attitude during the meeting annoyed everyone present.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Timid", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Confident", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Impulsive", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Brazen"], "correct_answer": 0, "solution": "Antonym: <strong>Timid</strong> (adjective) – Showing a lack of courage or confidence, easily frightened, shy. डरपोक"}, {"id": "117182", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a spelling error</strong></p> <p>Her speech was filled with / adultary compliments / that made everyone feel valued / and appreciated.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Her speech was filled with", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> adultary compliments", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> that made everyone feel valued", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> and appreciated."], "correct_answer": 1, "solution": "B) The correct spelling of ‘<strong>adultary</strong>’ is ‘<strong>adulatory</strong>,’ which means “excessively praising or admiring someone” अत्यधिक प्रशंसा करने वाला."}, {"id": "117179", "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words</strong>.</p> <p>Tom is <ins><strong>a person who searches for and collects discarded items</strong></ins>, turning what others throw away into valuable treasures for his community.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Scavenger", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Forager", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hunter", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Gatherer"], "correct_answer": 0, "solution": "A) <strong>Scavenger</strong> (noun) – a person who searches for and collects discarded items. कचरा बीनने वाला व्यक्ति"}, {"id": "117207", "question": "<strong>Select the correct option to form a meaningful sentence.</strong><br> social standing (a)/ move the (b) / all citizens above (c)/ In a significant (d)/ Union Cabinet has approved (e) / the extension of the (f) / 70 years of age, (g) / scheme to (h) / Ayushman Bharat health insurance (i) / their income or (j) / regardless of (k)", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, c, e, f, a, i, h, g, k, j, b", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, e, k, f, i, h, b, g, j, c, a", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> d, b, e, f, i, h, c, g, k, j, a", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, e, g, f, i, h, b, k, j, a"], "correct_answer": 2, "solution": "C) <strong>d, b, e, f, i, h, c, g, k, j, a<br> d. In a significant:</strong> This part sets the tone for the sentence, introducing an important action or decision.<br> <strong>b. move the:</strong> This follows the phrase \"In a significant,\" and together they form \"In a significant move\" to describe the action being taken.<br> <strong>e. Union Cabinet has approved: </strong>This part introduces the subject, explaining who took the action. The Union Cabinet has approved something.<br> <strong>f. the extension of the:</strong> This part clarifies what the Union Cabinet has approved, i.e., the extension of a scheme.<br> <strong>i. Ayushman Bharat health insurance: </strong>This specifies the scheme that is being extended, namely the Ayushman Bharat health insurance scheme.<br> <strong>h. scheme to:</strong> This part begins to describe who will benefit from the extension of the scheme.<br> <strong>c. all citizens above:</strong> This specifies the group of citizens who will benefit from the scheme, those above a certain age."}, {"id": "117205", "question": "<strong>Q. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <strong>A</strong>. There was a time when people from a village knew each other.<br> <strong>B. </strong>Every town or every place in our country has a uniqueness in its culture, traditions, language, food habits, products produced, and even a story to tell.<br> <strong>C.</strong> A minute change in a person's behaviour shall bring to the attention of others.<br> <strong>D. </strong> Children were safe in that society.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDAC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DCBA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CADB", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ACDB"], "correct_answer": 3, "solution": "<strong> D) ACDB</strong><br> A: This sentence introduces the context of the past, focusing on a village where people were close-knit. The phrase \"There was a time\" introduces a broader concept.<br> C: This follows logically after sentence A. Since people in the village knew each other so well (as established in A), even small changes in behavior were noticed.<br> D: D comes after C as a natural consequence of a close-knit community, as explained in C. It says, “Children were safe in that society,” linking to C by showing one of the benefits of this attention and familiarity. The past continuous verb “were safe” connects to the previous sentence by highlighting the protection felt in a community where small changes were easily noticed.<br> B: B concludes the paragraph by broadening the focus, moving from the specific example of safety in D to a more general reflection: “Every town or every place in our country has a uniqueness…”<br> <strong>Option Elimination Method:</strong><br> <strong>Option A (BDAC): </strong>This option starts with B, which is too broad to begin the paragraph. The first sentence should introduce a specific idea, not a general one about every town in the country. Therefore, this option can be eliminated.<br> <strong>Option B (DCBA):</strong> This starts with D, which is problematic because it refers to \"that society\" without introducing what kind of society is being discussed. <br> <strong>Option C (CADB):</strong> Starting with C would be awkward, as it jumps directly into the effects of close-knit relationships without establishing the context of a village or society. This option can also be eliminated.<br>"}, {"id": "117188", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>Despite extensive training, the team couldn’t _____ the full extent of the complex strategy during the game.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Evade", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Consolidate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Interrupt", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Fathom"], "correct_answer": 3, "solution": "<strong>'Fathom'</strong> will be used because it means to fully understand or grasp something. The sentence mentions that despite extensive training, the team couldn’t fully grasp the complex strategy during the game, making 'fathom' the correct choice. Whereas, 'Evade' means to avoid or escape, 'Consolidate' means to strengthen or unite, and 'Interrupt' means to disrupt, which don’t fit in this context."}, {"id": "117180", "question": "<strong>Select the word which means the same as the group of words underlined in the given sentence</strong></p> <p>To stay productive, she set aside <ins><strong>a fixed period of time that you spend doing something</strong></ins> each day, such as reading or exercising", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Term", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Stint", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Spell", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Stretch"], "correct_answer": 1, "solution": "B) <strong>Stint</strong> (noun) – A fixed period of time that you spend doing something each day. कार्यावधि"}, {"id": "117192", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>The manager had no choice but to <ins><strong>sack</strong> </ins>several employees due to budget cuts.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Dismiss", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Promote", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hire", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Train"], "correct_answer": 0, "solution": "Synonym: <strong>Dismiss</strong> (verb) – To order or allow someone to leave their job, discharge, fire. बर्खास्त करना"}, {"id": "117197", "question": "<strong>Select the part of speech of the underlined word in the given below sentence</strong>.</p> <p>I pushed with all my <ins><strong>might</strong></ins>, but the rock did not move.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Adverb", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Adjective", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/ch oad.png\"/></p> beside", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> about", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> around"], "correct_answer": 0, "solution": "No solution available"}, {"id": "117212", "question": "<strong>Comprehension:</strong></p> <p>Vasuki indicus is the name given to the 47 million-year-old, 15m-long fossilised vertebrae of the now extinct longest snake that ever lived, found in a Gujarat coal mine in 2004. Study and research over the years have led scientists to conclude in 2024, that it is a new genus and species of madtsoiidsnake, ‘a relic lineage that originated in India’.<br> Vasuki is the divine serpent coiled around the neck of Shiva. Moved by his devotion, Shiva chose to wear Vasuki as an ornament. Vasuki’s brother Sheshnag, coils himself into the shape of a bed on which Vishnu reclines, protected by a hood-canopy. When devas and asuras planned to churn the ocean of milk to obtain amrit, elixir, Vasuki let them use him as the rope, wound himself around the Mandara mountain, and with devas holding onto one end and asuras the other, Samudra Manthan – churning of the ocean – became possible. In different contexts in varied cultures and mythologies, the serpent has been portrayed as good and at other times, as evil. In Biblical and other Abrahamic references, a serpent, believed to be Satan, lured and tempted Eve to eat the forbidden apple in the Garden of Eden, thereby unleashing suffering on Adam and Eve and their descendants, starting from their having to leave their idyllic home. The serpent is seen as protector and guardian. Many depictions of Gautam Buddha and Mahavir in meditative pose with eyes closed, show them guarded by a snake that forms a canopy with its hood to shelter them from the elements. Many temples have snake carvings as protectors of the treasures within.<br> < y and research over the years have led scientists to conclude in 2024, that it is a new genus and species of madtsoiidsnake, ‘a relic lineage that originated in India’.<br> Vasuki is the divine serpent coiled around the neck of Shiva. Moved by his devotion, Shiva chose to wear Vasuki as an ornament. Vasuki’s brother Sheshnag, coils himself into the shape of a bed on which Vishnu reclines, protected by a hood-canopy. When devas and asuras planned to churn the ocean of milk to obtain amrit, elixir, Vasuki let them use him as the rope, wound himself around the Mandara mountain, and with devas holding onto one end and asuras the other, Samudra Manthan – churning of the ocean – became possible. In different contexts in varied cultures and mythologies, the serpent has been portrayed as good and at other times, as evil. In Biblical and other Abrahamic references, a serpent, believed to be Satan, lured and tempted Eve to eat the forbidden apple in the Garden of Eden, thereby unleashing suffering on Adam and Eve and their descendants, starting from their having to leave their idyllic home. The serpent is seen as protector and guardian. Many depictions of Gautam Buddha and Mahavir in meditative pose with eyes closed, show them guarded by a snake that forms a canopy with its hood to shelter them from the elements. Many temples have snake carvings as protectors of the treasures within.<br> <strong>Why is the serpent portrayed as evil in Biblical and Abrahamic references?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Because it coiled around the neck of Shiva", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Because it was used as a rope in Samudra Manthan", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Because it tempted Eve to eat the forbidden apple, leading to human suffering", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Because it protects treasures in temples"], "correct_answer": 2, "solution": "No solution available"}, {"id": "117216", "question": "<strong>Comprehension: </strong><br> India’s torturous saga on the fate of genetically modified food crop made another pit stop last week with a two-judge Bench, of Justices B.V. Nagarathna and Sanjay Karol of the Supreme Court of India, delivering a split verdict on the question of allowing genetically modified (GM) mustard in farmer fields. As of today, the only GM seed permissible in India is cotton. The gain in cotton yield had prompted agricultural institutions, private and public, to develop GM seeds in food crops such as rice, wheat, tomato, brinjal and mustard though none has been released. These issues underpin the story of DMH-11, or Dhara Mustard Hybrid-11, that was developed under a publicly funded project at the Delhi University’s biotechnology department. The genes used in the plant make the crop suitable and lucrative to private seed companies for making newer hybrid varieties. For crops to be approved under India’s agricultural system, they must be sown over three seasons in different agro-climatic zones and prove themselves to be consistently better than their existing comparators. Trials conducted over three years by the Indian Council of Agricultural Research suggest that DMH-11 passed these metrics. This led the GEAC, the scientific advisory body led by the Ministry of Environment and Forests, to approve DMH-11 in October 2022, subject to certain tests. On the other hand, environmentalist groups have said that the DMH-11 is a ‘herbicide tolerant’ crop. It is genetically coded in a way that effectively forces farmers to use certain kinds of pesticide, with destructive environmental consequences; the allegations are that the developers were not transparent with this information. These findings, and the GEAC approval, have been contested in the Court by Aruna Rodrigues and the organisation, Gene Campaign. The judges disagreed among themselves whether the GEAC was correct. Justice Nagarathna said that the GEAC had violated the ‘precautionary principle’, under which any new organism or modifying technology should, by default, be caged in unless its consequences are deliberated upon. Justice Karol, however, appeared to be satisfied by the process. Therefore, the case passes on to a larger Bench led by the Chief Justice of India. However, the most significant decision was a Court order to the Centre to evolve a policy on GM crops. The dispute over GM crops is fundamentally ideological and less on the traditional agricultural yardsticks of yield and farm economics. This is amplified by India’s agricultural history where a panacea from yesteryears, hybrid seeds and synthetic fertilizer, while improving yields and productivity, have unleashed environmental harm. In their decisions, the Court and the government must remember that the good ought not to be seen as the enemy of the perfect<br> <strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neutral and Analytical", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optimistic and Encouraging", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Cautious and Critical", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Dismissive and Unconcerned"], "correct_answer": 2, "solution": "No solution available"}, {"id": "117217", "question": "<strong>Comprehension: </strong><br> India’s torturous saga on the fate of genetically modified food ficant initiative in this respect. It can extend specialised diabetes consultation to primary healthcare centres (PHCs) in rural areas.</p> <p>Studies have suggested that India’s diabetes burden — already the second highest in the world — is underreported because close to 50 per cent of patients, in both rural and urban areas, are unaware of their condition. Much time is lost before arriving at a diagnosis because the general physician at PHCs or small clinics cannot always join the dots between the diabetic’s symptoms. The software is one step towards addressing these deficits. It requires the local-level healthcare professional to feed-in patient data on risk factors like blood pressure, cholesterol, blood sugar. It then processes the information to suggest the treatment.</p> <p>All this, however, does not attenuate the significance of the attending physician. The doctor will need to adapt the software’s advice based on the patient’s lifestyle. The digital intervention’s potency, therefore, is related to the quality of analogue care. The country’s diabetes management system requires accessible PHCs run by quality professionals empowered by digital resources. The AIIMS software will also become more potent if it is synced with the electronic repository of the National Health Programme for Non-Communicable Diseases. Data portability will be in line with the Ayushman Bharat Digital Health Mission’s objective of facilitating seamless interaction between medical experts. A second caveat: Given the asymmetrical relation between patients and health service providers, the system should be insulated against data confidentiality breaches.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Cautiously hope         // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
