<title>Tier Ii Mock 35 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

(function fixPageTitle() {

  const currentTitle = document.title || '';
  const isGeneric = genericTitles.some(g => currentTitle.toLowerCase() === g.toLowerCase());
  if (isGeneric) {
    // Try to get title from welcome header h1
    document.addEventListener('DOMContentLoaded', function() {
      const h1 = document.querySelector('.welcome-header h1, .welcome-header h2');
      if (h1 && h1.textContent.trim()) {
        document.title = h1.textContent.trim().substring(0, 80);
      }
    });
  }
})();

रना"}, {"id": "29666", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong></p> <p>Neena will visit Greece in May.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Greece had been visited by Neena in May.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Greece has been visited by Neena in May.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Greece will be visited by Neena in May.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Greece will visit Neena in May."], "correct_answer": 2, "solution": "<strong>Active से Passive Voice में बदलने के लिए, </strong>Active वाक्य का Object Passive वाक्य का Subject बन जाता है। Verb को Active से Passive में बदलते समय सही Tense का प्रयोग किया जाता है। Active वाक्य में \"Neena\" Subject है, \"will visit\" Verb (Simple Future) है और \"Greece\" Object है। Passive में बदलने पर Object \"Greece\" Subject बन गया है, Verb को \"will be visited\" (Simple Future Passive) में बदला गया है और \"by Neena\" के रूप में प्रयोग किया गया है।"}, {"id": "29667", "question": "<strong>Q4. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p><strong>P. </strong>The air was still warm.</p> <p><strong>Q.</strong> The breeze touched my face, drying out the sweat on my forehead.</p> <p><strong>R.</strong> Before I could feel the hotness in the air, dark clouds gathered. Soon the warm air turned into a cold wind.</p> <p><strong>S. </strong>One day in the month of June, I stood on the balcony, enjoying the small breeze of the evening.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> SPQR", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> PQRS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QRPS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> RQPS"], "correct_answer": 0, "solution": "<strong>Options Elimination:</strong><br> <strong>Sentence S</strong> talks about a specific day and a specific action - standing on the balcony. This seems like a good opening statement, setting the scene. So, we can start with S. Based on starting with S, only option A. SPQR"}, {"id": "29668", "question": "<strong>Q5. The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</strong></p> <p>Sita spotted golden deer and requested Rama to capture it.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to capture it.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Sita spotted golden", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> deer and", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> requested Rama"], "correct_answer": 1, "solution": "B) 'Sita spotted golden' के बदले 'Sita spotted a golden' का प्रयोग होगा क्योंकि 'deer' एक गिनती योग्य संज्ञा है और इसके सामने एक अनिश्चित विशेषण 'a' का प्रयोग होना चाहिए; जैसे—Sita spotted a golden deer."}, {"id": "29669", "question": "<strong>Q6. Select the most appropriate ANTONYM of the underlined word.</strong></p> <p>One needs to be free of <ins><strong>prejudices</strong> </ins>while dealing with judicial cases.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Favours", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Discriminations", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Bigotries", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Equalities"], "correct_answer": 3, "solution": "<strong>Antonym</strong>: <strong>Equalities</strong> (noun) – The state of being equal, especially in status, rights, or opportunities, impartiality. समानता"}, {"id": "29670", "question": "<strong>Q7. Select the most appropriate ANTONYM of the underlined word in the followingsentence</strong>.</p> <p>The doctor assured the patient that the tumour was <ins><strong>benign</strong> </ins>and could be easily removed", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Favourable", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Malignant", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sterile", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Kind"], "correct_answer": 1, "solution": "<strong>Antonym</strong>: <strong>Malignant</strong> (adjective) – Harmful, cancerous, malevolent, tending to spread aggressively. अशुभ"}, {"id": "29671", "question": "<strong>Select the option that expresses the given sentence in active voice</strong></p> <p>By whom was Hindi taught to you?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> By whom were you taught Hindi?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Who teaches you Hindi?", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Who taught you Hindi?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Who were you taught Hindi by?"], "correct_answer": 2, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong>, Active वाक्य का Object Passive वाक्य का Subject बन जाता है। Verb को Active से Passive में बदलते समय सही Tense का प्रयोग किया जाता है। दिए गए वाक्य <strong>\"By whom was Hindi taught to you?\"</strong> में <strong>\"Hindi\"</strong> (Object), <strong>\"was taught\"</strong> (Verb in Past Simple Passive) और <strong>\"to you\"</strong> (Indirect Object) है। Passive से Active में बदलने के लिए, <strong>\"you\"</strong> (Indirect Object) को Active वाक्य का Subject बनाया जाता है और <strong>\"Hindi\"</strong> को Object के रूप में रखा जाता है। चूँकि वाक्य Past Simple में है, इसलिए Verb का Active रूप <strong>\"taught\"</strong> होगा।"}, {"id": "29672", "question": "<strong>Q9.</strong> <strong>For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the appropriate sentences for S2 and S3, respectively.</strong></p> <p><strong>S1</strong>: Wiser by the experience of previous summits, India took a nuanced stand in Johannesburg last week on the expansion of the BRICS group.</p> <p><strong>S4:</strong> It can be a game-changer for the international order, which is seeing convulsions that were unimagined at the dawn of this decade.</p> <p><strong>P:</strong> The strategic partnership between France and India is built on a strong foundation of people-to-people ties and a genuine friendship between the French and Indian peoples.</p> <p><strong>Q</strong>:“India fully supports the expansion of the BRICS membership. And welcomes moving forward with consensus on this,” Prime Minister Narendra Modi told the organisation’s 15th summit before the expansion was agreed on.</p> <p><strong>R</strong>: Never was this connection more evident than on July 14, when French crowds cheered the Indian armed forces’ contingent marching on the Champs Elysées, and France celebrated India as the Guest of Honour of our National Day.</p> <p><strong>S:</strong>Enlargement was the biggest challenge at the Johannesburg summit.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and Q", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and R", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> P and S", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Q and S"], "correct_answer": 3, "solution": "The correct order is S1, Q, S, and S4"}, {"id": "29673", "question": "<strong>Q10.</strong> <strong>Select the correct collocation from the options and complete the sentence</strong></p> <p>I won’t complete the assignment because of the time ___________.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Restraint", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Control", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Constraint", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Restriction"], "correct_answer": 2, "solution": "C) 'Constraint' का प्रयोग होगा क्योंकि इस संदर्भ में, sentence समय की कमी के कारण किसी कार्य को पूरा नहीं कर पाने की चर्चा कर रहाहै। \"Time constraint\" एक सामान्य तरीके से प्रयुक्त होता है जब हम समय की सीमा के कारण किसी चीज़ को पूरा नहीं कर पाने की बात करते हैं। इसलिए, \"constraint\" सबसे उपयुक्त विकल्प होगा।"}, {"id": "29674", "question": "<strong>Q11. Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>Affected by an undesirable condition or unpleasant feeling", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cancelled", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Indifferent", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Modest", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Stricken"], "correct_answer": 3, "solution": "D) <strong>Stricken</strong> (adjective) – Affected by an undesirable condition or unpleasant feeling प्रभावित/त्रस्त"}, {"id": "29675", "question": "<strong>Q12.</strong> <strong>Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>The theory or philosophy of law", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Jurisprudence", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pacifism", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cosmology", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Philia"], "correct_answer": 0, "solu rice of something” उस समान की सामान्य मूल्य में घटाव।"}, {"id": "29678", "question": "<strong>Q15. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p><strong>A.</strong> Meanwhile, gig workers, or approximately 1.3% of India’s active labour force, rarely have access to any social security benefit.</p> <p><strong>B. </strong>In effect, this means that such employees have no access to a provident fund, pension, and health care and disability insurance.</p> <p><strong>C. </strong>Another conclusion is that just 1.9% of the poorest 20% quintile of India’s workforce has access to any benefits.</p> <p><strong>D. </strong>India’s social security system is also ranked poorly; Mercer CFS ranked it at 40 out of 43 countries in 2021.</p> <p><strong>E.</strong> Around 53% of all of the salaried workforce does not have any social security benefits in India, according to the Periodic Labour Force Survey Annual Report 2021-22, and which has been cited in the media.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> EBCAD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCDEA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ACBED", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABEDC"], "correct_answer": 0, "solution": "E: The logical starting point appears to be sentence E, as it introduces the issue (lack of social security benefits for a majority of the salaried workforce) and mentions a specific source - the \"Periodic Labour Force Survey Annual Report 2021-22\"."}, {"id": "29679", "question": "<strong>Q16. Select the option that will improve the underlined part of ><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, c, b, d"], "correct_answer": 0, "solution": "<strong>a:</strong> This sentence sets the time and the environment, providing context."}, {"id": "29681", "question": "<strong>Q18. Some sentences are given below. While the first and the last sentences (1 and 2) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>1. It is fantastic to see India, the world’s largest democracy, take the global stage as host of the G-20, a vital forum for fostering international cooperation.</p> <p><strong>A.</strong> Recovered powers to forge trade deals with booming economies such as India</p> <p><strong>B. </strong>The United Kingdom has long held the belief</p> <p><strong>C.</strong> In trade as a force for growth and prosperity</p> <p><strong>D. </strong>It is why we advocate for free and fair trade at the World Trade Organization and why we are taking advantage of our newly</p> <p>2. Collaboration on issues such as global value chains resilience and digitalisation of trade documents is key to harnessing the true value of global trade.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BADC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ACDB", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BCDA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CADB"], "correct_answer": 2, "solution": "1-B: The sentence 1 praises India for taking the global stage, specifically as the host of the G-20. Following this, the next logical step is to present a view or belief from a major nation that would have an interest in global cooperation. “B. The United Kingdom has long held the belief\" provides this perspective, suggesting the UK's stance on a certain matter."}, {"id": "29682", "question": "<strong>Q19. Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p><strong>A.</strong> That day and the cash availability, bread and butter were budgeted</p> <p><strong>B.</strong> In the late 1980s and early 1990s when I was growing up, there were mom-and-pop stores for daily essential shopping</p> <p><strong>C.</strong> We did not go to the mall and buy 500 gm of butter; instead, depending on how many people were at our house</p> <p><strong>D.</strong> I remember buying half a pack of bread and 25 gm of butter, which was a quarter piece of a 100-gm pack, from our neighbourhood shop", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDAC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABD", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BCAD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABCD"], "correct_answer": 2, "solution": "B: B provides a contextual introduction about the time frame and sets the stage for the rest of the story. It provides background about the mom-and-pop stores which were prevalent during the narrator's childhood. B provides the time frame \"late 1980s and early 1990s.\""}, {"id": "29683", "question": "<strong>Q20.</strong> <strong>Select the most appropriate idiom for the following sentence</strong>.</p> <p>The government arrested the opposition leader, making the situation worse.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To cast pearls before swine", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To be on the last leg", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To add fuel to the fire", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To bite the dust"], "correct_answer": 2, "solution": "C)<strong> To add fuel to the fire</strong> – to make a situation or conflict more intense or severe. आग में घी डालना"}, {"id": "29684", "question": "<strong>Q21.</strong> <strong>Select the most appropriate synonym of the underlined word.</strong></p> <p>Caves like Ajanta lie in <ins><strong>perpetual</strong> </ins>darkness.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Permanent", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Extreme", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Brief", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Huge"], "correct_answer": 0, "solution": "A) <strong>Permanent</strong> (adjective) - lasting or intended to last or remain unchanged indefinitely. स्थायी"}, {"id": "29685", "question": "<strong>Q22. Identify the option that arranges the given parts in the correct order to form a meaningful paragraph</strong>.</p> <p><strong>P.</strong> But one of my enduring memories was the tree-filled gardens that dotted the road.</p> <p><strong>Q. </strong>We lived on Maigandhadeva Mudaliar Road (named after a prominent corporator) in Fraser Town, Benga hday will ________ on a Friday this year\" में, जन्मदिन इस साल शुक्रवार को आ रहा है, जो कि एक विशेष समय और स्थान को दर्शाता है। इसलिए, 'fall: to come at a particular time or happen in a particular place' सबसे उपयुक्त विकल्प होगा।"}, {"id": "29687", "question": "<strong>Q24.</strong> <strong>Select the correct spelling from the given options to fill in the blank</strong>.</p> <p>Jaysmita is one of the most ______________ persons I have ever met as she has many talents.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> versataile", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> versatele", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> versateile", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> versatile"], "correct_answer": 3, "solution": "D) The correct spelling to fill in the blank is ‘versatile’ which means “having many talents; capable of working in many fields.” अनेक प्रकार की क्षमताओं वाला, बहुमुखी."}, {"id": "29688", "question": "<strong>Q25.</strong> <strong>Select the option that expresses the given sentence in reported speech.</strong></p> <p>The priest said, “Death is inevitable.”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The priest said death had been inevitable.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The priest said that death is inevitable.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The priest said that death was inevitable.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmad "C) 'Precursor' का प्रयोग होगा क्योंकि \"precursor\" का अर्थ होता है किसी घटना, प्रक्रिया या चीज़ का पूर्वावलंबी यापू र्वगामी।यहाँ पर, कहा गया है कि Copenhagen सम्मेलन जिसे जून में आयोजित किया गया था, वह Jeddah सम्मेलन से पहले था। 'Aggressor', 'Conquer', और 'Opinion' इस context में सही नहीं हैं"}, {"id": "29696", "question": "<strong>Comprehension</strong>:</p> <p><strong>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank</strong>.</p> <p>The Jeddah conference on the Ukraine war, in which 42 nations participated, ______1_____ one of the most serious efforts by the world in finding a way to end the conflict. This was not a ______2_____peace conference. Russia was not invited, and the main goal of Ukraine and its western partners was to build consensus among major powers, especially in the Global South, on working towards a fair and durable peace. After the talks, diplomats said there was broad acceptance about respecting the central pillars of international law such as Ukraine’s sovereignty and territorial integrity, and that there was agreement to meet again. China had stayed away from the Copenhagen conference in June, which was a _____3______to the Jeddah talks. But with China’s participation this time, along with India and South Africa — all countries that maintain good ties with Russia despite the war — global efforts towards peace have gained much more seriousness. China, in February, had issued a position paper on the war ______4______ a “political settlement”, where it said the “sovereignty, independence and territorial integrity of all countries must be effectively upheld”, while also backing Russia’s security concerns.</p> <p><strong>Q33. Select the most appropriate option to fill in blank 4</strong>.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Calling for", "<p style=\"display ister Anthony Albanese looked forward to hosting the women’s football World Cup and 2032 Brisbane Olympics, which would run on a different revenue model over a longer period of time. Still, the country may have to deal with credibility issues in the run-up to Brisbane 2032. According to the Commonwealth Games Federation (CGF), which was given only an eight hours notice, the decision to add more sports and changed plans for venues added considerable expenses.</p> <p>Commonwealth Games Australia chief executive Craig Phillips said that the costs overrun was a gross exaggeration while Victoria’s Leader of Opposition John Pesutto termed the cancellation ‘a massive humiliation’. The development has put a question mark over the future of big-ticket multi-sport events because of the staggering financial burden involved with the hosting. While the hosts have been looking at ways of controlling cost escalation, the rising expenses have made the conduct of such games virtually a privilege for bigger economies. That only five countries have staged 18 out of 22 editions of the CWG, which began as the British Empire Games (1930), and no African nation has ever hosted the Olympics, points to this. The uncertainty surrounding the CWG will disappoint the Indian sportspersons, who have done well in these games, including in 2010 when Delhi hosted it. Thousands of athletes from 72 Commonwealth nations and territories will hope that the CGF succeeds in the onerous task of finding an alternative host. But questions will continue to be asked on the need for what many might consider an anachronistic event, a coming together of nations on the basis of shared colonial history, and not geography</p> <p><strong>Q34. Based on the passage, which of the following can be inferred regarding the challenges faced by the Commonwealth Games?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Commonwealth Games consistently exceeds its budget due to the inclusion of more sports.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Every host city for the Commonwealth Games has faced financial issues leading them to back out of hosting.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The increasing costs and financial strains make it difficult for some cities to host the Commonwealth Games.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Commonwealth Games Federation (CGF) always decides to add more sports to the event."], "correct_answer": 2, "solution": "C) The increasing costs and financial strains make it difficult for some cities to host the Commonwealth Games."}, {"id": "29698", "question": "<strong>Comprehension</strong></p> <p>Read the given passage and answer the questions that follow</p> <p>With less than three years to go, the decision of the Government of Victoria, Australia, to withdraw from the hosting of the 2026 Commonwealth Games (CWG) has come as a mighty blow to the sporting movement. After Birmingham replaced Durban for the 2022 edition, this is the second consecutive occasion when the original host city is unable to host the games due to financial issues. Victoria, which had uniquely proposed to organise the games over a region, had initially estimated a budget of AUS$2.6 billion, but its Premier, Daniel Andrews, said the costs could go beyond AUS$6 billion, which to him is too much for a 12-day sporting event. Without federal funding and with Victoria struggling due to its increasing debts, he said he could not take money out of hospitals and schools in order to fund the event. Even though the development has come as a huge embarrassment for Australia, which has hosted five CWG editions (including 2018 Gold Coast), Prime Minister Anthony Albanese looked forward to hosting the women’s football World Cup and 2032 Brisbane Olympics, which would run on a different revenue model over a longer period of time. Still, the country may have to deal with credibility issues in the run-up to Brisbane 2032. According to the Commonwealth Games Federation (CGF), which was given only an eight hours notice, the decision to add more sports and changed plans for venues added considerable expenses.</p> <p>Commonwealth Games Australia chief executive Craig Phillips said that the costs overrun was a gross exaggeration while Victoria’s Leader of Opposition John Pesutto termed the cancellation ‘a massive humiliation’. The development has put a question mark over the future of big-ticket multi-sport events because of the staggering financial burden involved with the hosting. While the hosts have been looking at ways of controlling cost escalation, the rising expenses have made the conduct of such games virtually a privilege for bigger economies. That only five countries have staged 18 out of 22 editions of the CWG, which began as the British Empire Games (1930), and no African nation has ever hosted the Olympics, points to this. The uncertainty surrounding the CWG will disappoint the Indian sportspersons, who have done well in these games, including in 2010 when Delhi hosted it. Thousands of athletes from 72 Commonwealth nations and territories will hope that the CGF succeeds in the onerous task of finding an alternative host. But questions will continue to be asked on the need for what many might consider an anachronistic event, a coming together of nations on the basis of shared colonial history, and not geography</p> <p><strong>Q35.</strong> <strong>Based on the passage, which of the following inferences can be drawn about hosting multi-sport events like the Commonwealth Games?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload d on the need for what many might consider an anachronistic event, a coming together of nations on the basis of shared colonial history, and not geography</p> <p><strong>Q37.</strong> <strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Jubilant", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Indifferent", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Critical", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sympathetic"], "correct_answer": 2, "solution": "C) Critical"}, {"id": "29701", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it.</strong></p> <p>The stated objective of the Ayushman Bharat scheme is to “reduce out of pocket expenditures on healthcare”. One of the main reasons behind the conceptualisation of the scheme was the recognition that medical emergencies often drive families to poverty. Since coming into effect five years ago, Ayushman Bharat has recorded more than 5 crore hospitalisations. The share of out-of-pocket expenditure in the total health expenses incurred in the country has also fallen appreciably — from 62 per cent in 2015 to about 47 per cent in 2020. But this progress should not detract from the loopholes in implementation of Ayushman Bharat. An investigation by this newspaper has revealed that critically-ill patients were cheated out of availing the benefits of the scheme by a neurosurgeon at Safdarjung Hospital in Delhi. The doctor is now in judicial custody and is being probed by the CBI. The racket he ran from a premier government hospital in the capital has aggravated the financial troubles of his patients and their families. This defeats the very purpose of the government’s flagship healthcare project.</p> <p>In recent months, the health ministry has used digital aids, including AI, to unearth cases of impersonation and non-genuine claims under Ayushman Bharat. But the Safdarjung Hospital fraud points to a deeper problem with the country’s healthcare system. The doctor has a near-divine status amongst a large section of patients, especially those from underprivileged sections. Medical ethics require healthcare providers to communicate to the patients the details of their ailments and treatment protocols. But this rarely happens, further skewing the asymmetrical relation between the two. Most hospitals are in any case not very assuring places for families of the seriously ill, especially if they are financially stressed. For medical migrants who can be seen squatting or sleeping on the pavements outside several hospitals, the long wait for beds and critical care can mean temporary homelessness. The Ayushman Bharat scheme offers a way out of this distressful situation. But when unscrupulous doctors — like the neurosurgeon at the Safdarjung Hospital — inform families of the grievously ill that availing benefits under the scheme could take two to three months they have little recourse other than to take up the expensive alternative.The system could become more patient-friendly if patients at empanelled hospitals are counselled by a professional about the benefits under Ayushman Bharat. The scheme needs a human touch. The Safdarjung Hospital case should be an eye-opener. </p> <p><strong>Q38.</strong> <strong>Based on the paragraph, which of the following can be inferred regarding the Ayushman Bharat scheme?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ayushman Bharat has eliminated all out-of-pocket expenditures on healthcare in India.", "<p style=\"display:none\"><img alt= f-pocket expenditures in healthcare.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The role of digital aids in healthcare.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Misuse and challenges in the implementation of Ayushman Bharat scheme."], "correct_answer": 3, "solution": "D) Misuse and challenges in the implementation of Ayushman Bharat scheme."}, {"id": "29705", "question": "<strong>Comprehension:</strong></p> <p><strong>Read the following passage and answer the questions given after it</strong>.</p> <p>The \"Happy Prince\" by Oscar Wilde tells the touching story of a golden statue and a swallow. The statue, named the Happy Prince, stands atop a tall column overlooking a city. One evening, a swallow, delayed in its migration to Egypt, decides to rest between the Prince's feet. To the bird's surprise, waterdrops fall on it. Looking up, the swallow realizes that these aren't raindrops but tears from the Happy Prince's sapphire eyes.</p> <p>The Prince reveals his sorrow for witnessing the pain, suffering, and poverty in the city below. Though once alive and living luxuriously in a palace, his current elevated position allows him to see the reality of his city's conditions. To alleviate some suffering, the Prince asks the swallow to take the ruby from his sword hilt to a poor seamstress struggling to care for her sick son. Though hesitant at first, the swallow agrees, marking the beginning of their deepening friendship and shared mission.</p> <p>Every night, the Prince asks the swallow to delay its journey to Egypt by another day to help more citizens. The Prince gives away his sapphires and, eventually, the gold leaf covering him to aid the needy. Each sacrifice brings relief and happiness to the poor, and as the Prince loses his luster, the swallow's love and admiration for him grow.</p> <p>With the approach of const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;

function ini(){
    disQ();
    strT();
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
