<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tier Ii Mock 27 (Hindi)</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

.info/public/exam-panel/img/reload.png\"/></p> Take the gauntlet"], "correct_answer": 2, "solution": "<strong>Take at face value</strong> (idiom) – To accept something as it appears without deeper investigation. सतही रूप से लेना"}, {"id": "119141", "question": "<strong>Select the option that expresses the given sentence in direct speech</strong></p> <p>Kiran says that he worked hard for a good rank.​​​​", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Kiran said, “I worked hard for a good rank”.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Kiran says, “I work hard for good rank”.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Kiran has said, “I worked hard for a good rank”.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Kiran says, “I worked hard for a good rank”."], "correct_answer": 3, "solution": "Indirect Speech को Direct Speech में बदलने के लिए <strong>Reporting Verb + Pronoun Change</strong> का नियम प्रयोग किया जाता है। चूंकि Reporting Verb ‘says’ Present Tense में है, इसका मतलब है कि कथन को वैसे ही Direct Speech में बदला जाएगा जैसा कि था। वाक्य ‘Kiran says that he worked hard for a good rank’ को Direct Speech में बदलते समय ‘he’ को ‘I’ में बदल दिया जाता है, जिससे यह दिखाया जा सके कि Kiran खुद के बारे में बात कर रहा है।"}, {"id": "119137", "question": "<strong>Select the option that expresses the given sentence in passive voice.</strong></p> <p>These girls speak English fluently", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> English was spoken fluently by these girls.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> English is spoken fluently by these girls.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> English is being spoken fluently by these girls.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> English has been spoken fluently by these girls."], "correct_answer": 1, "solution": "To convert Active Voice into Passive Voice in Simple Present Tense, the structure <strong>(Object + Auxiliary Verb + Past Participle + by + Subject)</strong> is used. In the sentence ‘These girls speak English fluently’, the object ‘English’ is placed at the beginning, and the verb ‘speak’ is changed to ‘is spoken’. The subject ‘these girls’ is placed at the end as ‘by these girls’."}, {"id": "119139", "question": "<strong>Select the correct passive form of the given sentence.</strong></p> <p>Shashi was enjoying the game", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The game was enjoying by Shashi.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The game is being enjoyed by Shashi.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The game was being enjoyed by Shashi.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The game has been enjoyed by Shashi."], "correct_answer": 2, "solution": "Active Voice को Passive Voice में बदलने के लिए <strong>(Object + Auxiliary Verb + Being + Past Participle + by + Subject)</strong> का प्रयोग किया जाता है जब वाक्य Past Continuous Tense में हो। वाक्य ‘Shashi was enjoying the game’ को Passive Voice में बदलते समय Object ‘the game’ को वाक्य की शुरुआत में रखा जाता है। Verb ‘was enjoying’ को Passive Voice में बदलकर ‘was being enjoyed’ किया जाता है, और Subject ‘Shashi’ को अंत में ‘by Shashi’ के रूप में रखा गया है।"}, {"id": "119135", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Select the option that gives their correct logical sequence.</strong></p> <p>A. October 16, 2024 is World Food Day with the theme this year being ‘right to foods for a better life and a better future’</p> <p>B. this human right, which is essential for healthy, productive lives free from hunger and malnutrition</p> <p>C. The Rome-based agencies, the Food and Agriculture Organization of the United Nations (FAO), the International Fund for Agricultural</p> <p>D. Development (IFAD) and the World Food Programme (WFP) are collaborating with the Government of India to uphold</p> <p>E. The theme highlights the importance of access to safe, nutritious, and affordable food for all", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> AECDB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DEACB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABEDC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CBEDA"], "correct_answer": 0, "solution": "<strong>Why A comes first:</strong> A introduces the main topic of the paragraph — World Food Day and its theme for the year. This sets the context and purpose for the sentences that follow."}, {"id": "119124", "question": "<strong>Select the most appropriate preposition to fill in the blank</strong></p> <p>The office is rife _____________ rumors that many of us will be fired.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> In", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Of", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> With", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to"], "correct_answer": 2, "solution": "'With' should be used because \"rife with\" means filled with something, often in a negative sense, like rumors or problems. Whereas, 'In' implies being inside, 'Of' indicates possession, and 'To' suggests direction or purpose, which don’t fit in this context."}, {"id": "119131", "question": "<strong>The following sentence has been split into segments. Identify the segment that contains a grammatical error</strong></p> <p>NCR residents have been breathing “very poor” quality air since the past four days. / The problem, as the SC pointed out, stems from / an unfortunate lack of resolve from both the Centre and state governments.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> NCR residents have been breathing “very poor” quality air since the past four days.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The problem, as the SC pointed out, stems from", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> an unfortunate lack of resolve from both the Centre and state governments.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No error"], "correct_answer": 0, "solution": "'for the past four days' will be used instead of 'since the past four days' because 'since' is used for a specific point in time, while 'for' is used to indicate a specific duration; Like— \"She has been working here for five years.\""}, {"id": "119134", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>P. Various stakeholders are up in arms — farmers are complaining of tardy purchase of their produce, rice millers need space to store the fresh paddy and arhtiyas are demanding a raise in their commission.</p> <p>Q. The paddy glut in Punjab’s grain markets not only reflects the inefficiency of procurement agencies but also the failure of the Central and state governments to work in close coordination.</p> <p>R. After all, for how long can Punjab keep ‘exporting’ its dwindling natural resource through paddy cultivation?</p> <p>S. Ironically, the entire hue and cry is regarding a crop that has wreaked havoc on the state’s water table, with desertification no longer being a remote possibility.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> SPQR", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QRSP", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QRPS", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> QPSR"], "correct_answer": 3, "solution": "<strong>Why Q comes first:</strong> Q introduces the main issue — the paddy glut in Punjab and its connection to the inefficiency of procurement agencies and lack of coordination between governments. <strong>Why P follows Q:</strong> P explains the stakeholders affected by the inefficiency mentioned in Q, detailing the issues faced by farmers, rice millers, and arhtiyas. P expands on Q by showing how the lack of coordination impacts different groups involved."}, {"id": "119136", "question": "<strong>Some sentences are given below. While the first and the last sentences (1 and 2) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>1. A new study that puts the Indian entertainment industry’s losses due to piracy in 2023 at a staggering Rs 22,400 crore does not come as a surprise.</p> <p>A. The ability to access content without paying the due amount is seen as an acquired skill, not any circumvention of law that would attract fine and punishment.</p> <p>B. A global survey on why people opt for pirated content perhaps best explains consumer behaviour.</p> <p>C. Neither does the revelation that every second consumer in the country accesses pirated content.</p> <p>D. It’s a reflection of how the weak implementation of anti-piracy regulations has lent social sanction to the illegal activity.</p> <p>2. According to it, Indians account for the largest proportion of those who say they could have paid for the services, but pirating was easier, more convenient and because everyone does it.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ADCB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ACDB", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> CDAB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CADB"], "correct_answer": 2, "solution": "<strong>Why C comes first after sentence 1:</strong> C supports the idea introduced in sentence 1 that piracy is widespread. It expands on the fact that every second consumer in India is engaging in piracy."}, {"id": "119121", "question": "<strong>Select the most appropriate idiom for the underlined segment.</strong></p> <p>Once the judge delivered the final verdict, <ins><strong>a decision had been made and could not be changed</strong></ins>, sealing the fate of the defendant.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The die is cast", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Take place", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Draw a line", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Turn the tide"], "correct_answer": 0, "solution": "<strong>Take place</strong> (idiom) – To happen or occur. होना"}, {"id": "119116", "question": "<strong>Select the word which means the same as the group of words underlined in the given sentence</strong></p> <p>His decision to hike up the treacherous mountain at night, without proper gear, was <ins><strong>contrary to reason or common sense</strong>.</ins>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Preposterous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sane", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Shrewd", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sagacious"], "correct_answer": 0, "solution": "<strong>Sane</strong> (adjective) – Having a sound mind; reasonable and sensible. समझदार"}, {"id": "119122", "question": "<strong>Select the most appropriate phrasal verb to fill in the blank</strong></p> <p>She tends to ________________ every small detail before a big presentation, even when everything is well-prepared.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Rein in", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Usher in", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Fret about", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Go rouge"], "correct_answer": 2, "solution": "<strong>Rein in</strong> (phrasal verb) – To control or limit something. काबू में रखना"}, {"id": "119125", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The researchers were able to ____________ the myth that eating carrots significantly improves night vision, proving it to be just a marketing strategy from wartime.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Bust", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Seizure", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ruin", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Search"], "correct_answer": 0, "solution": "'Bust' should be used because \"bust the myth\" means to disprove or debunk a myth. Whereas, 'Seizure' means taking control or possession, 'Ruin' means to destroy, and 'Search' implies looking for something, which don’t fit in this context."}, {"id": "119130", "question": "<strong>The following sentence has been split into segments. Identify the segment that contains a grammatical error</strong></p> <p>Prime Minister Narendra Modi’s meeting with Chinese leader, Xi Jinping and his participation in the expanded BRICS forum at Kazan, / Russia are generating expectations. But realists in Delhi are cautious / in assessing the long-term prospects of both bilateral ties with Beijing and herald a new global order with the BRICS.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Prime Minister Narendra Modi’s meeting with Chinese leader, Xi Jinping and his participation in the expanded BRICS forum at Kazan,", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Russia are generating expectations. But realists in Delhi are cautious", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> in assessing the long-term prospects of both bilateral ties with Beijing and herald a new global order with the BRICS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> No error"], "correct_answer": 2, "solution": "'and in heralding a new global order with the BRICS' will be used instead of 'and herald a new global order with the BRICS' because the conjunction 'and' requires both sides to have a parallel grammatical structure, so the 'ing' form should be used on both sides; Like— \"He is interested in reading books and in writing articles.\""}, {"id": "119129", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>Her <ins><strong>assertiveness</strong> </ins>in the boardroom allowed her to voice her opinions confidently, leading to more effective decision-making and increased respect from her colleagues.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Confidence", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Brazenness", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Insolence", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Docile"], "correct_answer": 3, "solution": "<strong>Antonym</strong>: <strong>Docile</strong> (adjective) – Easily managed or handled; submissive, compliant. आज्ञाकारी, विनम्र"}, {"id": "119119", "question": "<strong>Select the most appropriate spelling of the underlined word in the given sentence.</strong></p> <p>The <ins><strong>mischievious</strong> </ins>child played a clever prank on his friends, leaving them both surprised and amused by his playful antics.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> mischevous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> mischevious", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> mischievous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> mischiveous"], "correct_answer": 2, "solution": "<strong>C)</strong> The correct spelling of ‘mischievious’ is ‘mischievous’, which means \"showing a playful desire to cause trouble\" शरारती. The word ‘mischievous’ does not have an extra 'i' before the ‘v,’ and it follows the structure ‘-chiev-’ to form the correct spelling."}, {"id": "119126", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>She has always been a strong <ins><strong>proponent</strong></ins> of renewable energy, advocating for policies that support sustainable practices.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Opponent", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Foe", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Antagonist", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Advocate"], "correct_answer": 3, "solution": "<strong>Synonym</strong>: <strong>Advocate</strong> (noun) – Someone who publicly supports or recommends a particular cause or policy. समर्थक"}, {"id": "119128", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>The <ins><strong>import</strong> </ins>of his words became clear only after the meeting, as their true significance revealed the depth of the underlying issue.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Worthlessness", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Weight", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Meaning", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Solemnity"], "correct_answer": 0, "solution": "<strong>Antonym</strong>: <strong>Worthlessness</strong> (noun) – Lack of value or importance, insignificance. महत्वहीनता"}, {"id": "119117", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a spelling error</strong></p> <p>The famous playwright was indicted for his reckless behaviour during an occasion of public drunkeness, tarnishing his once-respected reputation.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The famous playwright was indicted for his reckless", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> behaviour during an occasion of", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> drunkeness, tarnishing", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> his once-respected reputation"], "correct_answer": 2, "solution": "<strong>c) </strong>The correct spelling of ‘drunkeness’ is ‘drunkenness’, which means \"the state of being drunk or intoxicated\" नशे की स्थिति."}, {"id": "119114", "question": "<strong>Select the option that can be used as a one-word substitute to fill in the blanks for the given group of highlighted words.</strong></p> <p>The _________________ left the once-thriving village in a state of shock and mourning, with <ins><strong>countless lives lost in the tragic event</strong>.</ins>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Assassination", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Massacre", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Slaying", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Slaughter"], "correct_answer": 1, "solution": "<strong>Assassination</strong> (noun) – The act of murdering an important person, typically for political or ideological reasons. हत्या"}, {"id": "119142", "question": "<strong>Select the option that expresses the given sentence in direct speech</strong>.</p> <p>Vicky asked them whether they wanted to join the party he had organised.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Vicky said to them, “Do you want to join the party I have organised?”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Vicky said to him, “Do you want to join the party I organised?”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Vicky said to them, “Do you want to join the party I organised?”", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Vicky said to him, “Do you want to join the party I have organised?”"], "correct_answer": 0, "solution": "Indirect Speech को Direct Speech में बदलने के लिए <strong>Reporting Verb + Pronoun Change + Tense Change</strong> का नियम प्रयोग किया जाता है। वाक्य ‘Vicky asked them whether they wanted to join the party he had organised’ को Direct Speech में बदलते समय, Reporting Verb ‘asked’ को ‘said to’ में बदला जाता है और प्रश्नवाचक संरचना को बनाए रखने के लिए ‘Do you want to join’ का उपयोग किया जाता है। Pronouns ‘they’ और ‘he’ को Direct Speech में बदलकर ‘you’ और ‘I’ किया जाता है, जिससे यह दिखाया जा सके कि Vicky खुद के बारे में बात कर रहा है।"}, {"id": "119140", "question": "<strong>Select the option that expresses the given sentence in reported speech.</strong></p> <p>The priest said, “Death is inevitable.”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The priest said death had been inevitable.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The priest said that death is inevitable.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The priest said that death was inevitable.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The priest told that death had been inevitable"], "correct_answer": 1, "solution": "When converting Direct Speech to Indirect Speech, if the sentence expresses a universal truth or general fact, no change in Tense is made. In the sentence ‘The priest said, “Death is inevitable”’, the phrase ‘Death is inevitable’ is a general truth. Therefore, the verb ‘is’ remains the same in Indirect Speech. The Indirect Speech is constructed by adding ‘that’ after the Reporting Verb ‘said’."}, {"id": "119123", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>His stress was _____________ by the fact that he had missed an important deadline, making the situation even more difficult to manage", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Fostered", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Strengthened", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Compounded", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Encouraged"], "correct_answer": 2, "solution": "'Compounded' should be used because it means to make a problem more severe or increase its complexity. Whereas, 'Fostered' means to promote or nurture, 'Strengthened' means to make stronger, and 'Encouraged' implies giving support or motivation, which don't fit in this context."}, {"id": "119115", "question": "<strong>Select the word which means the same as the group of words underlined in the given sentence</strong></p> <p>The ancient city faced <ins><strong>complete obliteration</strong></ins> after the devastating earthquake, leaving no trace of its former grandeur.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Elimination", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Abolition", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Annihilation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Purge"], "correct_answer": 2, "solution": "<strong>Elimination</strong> (noun) – The act of removing or getting rid of something, often gradually or selectively. समाप्ति"}, {"id": "119127", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>The constant <ins><strong>vilification</strong> </ins>of the artist in the media damaged his reputation, overshadowing his achievements with unfair criticism.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Approval", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Slander", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Approbation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Commendation"], "correct_answer": 1, "solution": "<strong>Synonym</strong>: <strong>Slander</strong> (noun) – The action of making false and damaging statements about someone. बदनामी"}, {"id": "119132", "question": "<strong>The following sentence has been split into segments. Identify the segment that contains a grammatical error</strong></p> <p>Friends who n:</strong></p> <p>One sunny afternoon, my grandfather summoned my brother and me and handed us a small bundle of cash. \"This is for you both,\" he said with a warm smile. \"Go and buy yourselves some books.\" Our faces lit up with joy—both of us had a deep love for reading, and this gift felt like a treasure. But a question lingered in the air: When should we go</p> <p>\"Should we leave now, while the day is young?\" my brother wondered. \"Or perhaps later in the evening when it’s cooler?</p> <p>We exchanged glances, each of us trying to gauge the other's excitement. Why wait? we thought. So, with a quick nod, we decided to leave right away.</p> <p>Next, we faced another choice: Should we head to the big, bustling market, where dozens of shops lined the streets, or should we go to the cozy little bookstore nearby?</p> <p>The smaller shop felt more like a home than a store, with shelves packed tightly with books, and the faint scent of paper filling the air. We loved the warm and welcoming atmosphere of that little place, so our decision was made.</p> <p>Inside the store, we were greeted by the friendly shopkeeper, a man who had known us since we were small. \"Ah, my favorite young readers!\" he chuckled. “Come, take your time.”</p> <p>My brother picked up a book with colorful pictures. \"Is this the right choice?\" he mused aloud. I, too, felt unsure. \"Maybe I should find a book filled with adventure stories, or maybe one about faraway lands,\" I whispered.</p> <p>The choices were overwhelming, yet thrilling. We felt like explorers, seeking treasure among the stacks. Sensing our indecision, the shopkeeper gave a knowing smile. \"Take a deep breath. Look around. You’ll find what you’re looking for,\" he reassured us.</p> <p>Rows upon rows of books surrounded us. There were tales of fierce animals, powerful machines, and distant wars. I chose a few books that tugged at my heart, and my brother did the same.</p> <p>We found ourselves a comfortable corner in the shop. My brother took a seat on a sturdy chair, and I settled down on the wooden floor. Together, with our noses buried in the pages, we got lost in the worlds that unfolded before us. Time slipped away as we read, sharing moments of wonder, laughter, and surprise.</p> <p>That day, in that tiny bookstore, surrounded by books and each other, we discovered not just stories but a lifelong love for reading.</p> <p><strong>What can be inferred about the relationship between the narrator and their grandfather?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The grandfather often gave them money for necessities.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The grandfather wanted them to invest the money wisely", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The grandfather was strict and rarely showed affection.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The grandfather shared their love for books and wanted to encourage their reading habit."], "correct_answer": 3, "solution": "No solution available"}, {"id": "119148", "question": "<strong>Comprehension:</strong></p> <p>One sunny afternoon, my grandfather summoned my brother and me and handed us a small bundle of cash. \"This is for you both,\" he said with a warm smile. \"Go and buy yourselves some books.\" Our faces lit up with joy—both of us had a deep love for reading, and this gift felt like a treasure. But a question lingered in the air: When should we go</p> <p>\"Should we leave now, while the day is young?\" my brother wondered. \"Or perhaps later in the evening when it’s cooler?</p> <p>We exchanged glances, each of us trying to gauge the other's excitement. Why wait? we thought. So, with a qui me.</p> <p>We found ourselves a comfortable corner in the shop. My brother took a seat on a sturdy chair, and I settled down on the wooden floor. Together, with our noses buried in the pages, we got lost in the worlds that unfolded before us. Time slipped away as we read, sharing moments of wonder, laughter, and surprise.</p> <p>That day, in that tiny bookstore, surrounded by books and each other, we discovered not just stories but a lifelong love for reading.</p> <p><strong>Why did the narrator and their brother choose to visit the smaller bookstore instead of the big market?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They felt the big market was too expensive.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> They preferred the cozy and welcoming atmosphere of the smaller store.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They had little time and needed to make a quick purchase.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> They knew the smaller store had cheaper books."], "correct_answer": 1, "solution": "No solution available"}, {"id": "119151", "question": "<strong>Comprehension:</strong></p> <p>The National Oceanic and Atmospheric Administration’s latest data, released on Thursday, shows that the world has experienced its hottest July ever recorded. The American institute’s measurement differs slightly from the EU’s Copernicus Observatory which clocked last month as the second hottest July on record. Some of the warming is due to El Nino and there is a distinct possibility that September will be cooler if La Nina keeps its date. However, given the staggering difference between the temperatures of the last 12 months and earlier records, there is now near unanimity on one thing: The world is entering uncharted territory on climate change. This will not only require hastening mitigation measures but also plugging knowledge gaps in diverse realms — weather reporting, making agriculture climate resilient, healthcare and urban planning.</p> <p>Climate modelling has traditionally been a slow and reactive process. While such studies are, by and large, accurate in simulating global and national trends, they tend to underestimate regional variations. This makes it difficult to plan adaptation to local weather vagaries — for example, switching to crops that can withstand higher temperatures. In recent years, scientists have faced another challenge — hyper-local weather conditions. In India, for instance, the IMD predicts weather at the state, district or city levels. Increasingly, however, it’s becoming apparent that blocks and localities within cities and districts require information on the magnitude of heat or rainfall. Delhi, for instance, witnessed its hottest July in 10 years. At the same time, parts of the city went under water after being lashed by torrential rain. Microclimate forecasting is a nascent field of study, and at most places it is heavily reliant on historical data that doesn’t account for vagaries like those experienced by Delhi.</p> <p>One solution is to increase the number of meteorological stations to monitor weather in different urban and rural zones. In India, the Centre plans to set up a weather station in each panchayat to provide granular data on rainfall, frost and humidity. Another imperative is to develop information-sharing mechanisms within countries and across national borders. Several extreme weather events — including the recent Wayanad tragedy and the Pakistan floods of 2022 — have underlined the urgency to co-relate the warming of seas with local climatic conditions. Scaling up projects under the UNFCCC’s aegis — the decade-old Lima Adaptation Knowledge Initiative for instance — could go a long way in weathering uncertainties. The world needs a better response to the growing number of floods, droughts, forest fires and glacier loss.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Cautious", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Alarmist", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neutral"], "correct_answer": 0, "solution": "No solution available"}, {"id": "119152", "question": "<strong>Comprehension:</strong></p> <p>The National Oceanic and Atmospheric Administration’s latest data, released on Thursday, shows that the world has experienced its hottest July ever recorded. The American institute’s measurement differs slightly from the EU’s Copernicus Observatory which clocked last month as the second hottest July on record. Some of the warming is due to El Nino and there is a distinct possibility that September will be cooler if La Nina keeps its date. However, given the staggering difference between the temperatures of the last 12 months and earlier records, there is now near unanimity on one thing: The world is entering uncharted territory on climate change. This will not only require hastening mitigation measures but also plugging knowledge gaps in diverse realms — weather reporting, making agriculture climate resilient, healthcare and urban planning.</p> <p>Climate modelling has traditionally been a slow and reactive process. While such studies are, by and large, accurate in simulating global and national trends, they tend to underestimate regional variations. This makes it difficult to plan a t field of study, and at most places it is heavily reliant on historical data that doesn’t account for vagaries like those experienced by Delhi.</p> <p>One solution is to increase the number of meteorological stations to monitor weather in different urban and rural zones. In India, the Centre plans to set up a weather station in each panchayat to provide granular data on rainfall, frost and humidity. Another imperative is to develop information-sharing mechanisms within countries and across national borders. Several extreme weather events — including the recent Wayanad tragedy and the Pakistan floods of 2022 — have underlined the urgency to co-relate the warming of seas with local climatic conditions. Scaling up projects under the UNFCCC’s aegis — the decade-old Lima Adaptation Knowledge Initiative for instance — could go a long way in weathering uncertainties. The world needs a better response to the growing number of floods, droughts, forest fires and glacier loss.</p> <p><strong>According to the passage, why is microclimate forecasting challenging?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> It is highly dependent on global climate models.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> It relies heavily on historical data that doesn’t account for recent weather variations.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> It is affected by the unpredictability of natural events like El Nino and La Nina.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> It requires a complete overhaul of the current forecasting technologies."], "correct_answer": 1, "solution": "No solution available"}, {"id": "119155", "question": "<strong>Comprehension:</strong></p> <p>At different points of time, come events that have the potential to shape the future. Whether these catalysts fulfil that potential to the fullest extent or not is in the hands of the people in their vortex. The Justice K. Hema Committee report that studied the issues faced by women in cinema, could well be one such catalyst. The three-member committee was constituted in 2017, based on a petition submitted by the Kerala-based Women in Cinema Collective, and submitted its report two years later. It was released last week, several paragraphs redacted, and contains unsurprising and yet disturbing revelations about the state of affairs in the film industry — discrimination, exploitation and sexual harassment of women. The term ‘casting couch’, hatched in Hollywood, has become repugnantly accepted as a euphemism for sexual favours in exchange for a role in films. Justice Hema points out that making the exchange of sexual favours the passkey for entry into the field itself, and normalising it and conflating it with consensual sexual activity, makes the industry inherently exploitative. The report deals also with other inequities that disadvantage women in the industry, including the lack of essential facilities such as toilets, changing rooms, safe transportation, and accommodation at the shooting spot which are violative of the right to privacy; and discrimination in remuneration, and a lack of binding contractual agreements. These affect the range of women across the industry — actors, technicians, make-up artists, dancers, support staff, and particularly so, women lower in the pecking order.</p> <p>The way ahead is not as murky as the hole that the film industry, here Malayalam, seems to find itself in. The government has decided to constitute a special investigation team to go into the accusations of harassment. While the government would do well to ignore the committee’s recommendation on doing away with internal complaints committees for each film project, it must act on suggestions that call for provision of essential facilities and for structural reforms within the film industry, including professionalising it. Nothing will change unless the state gets involved meaningfully in creating an equitable work space for men and women, in an industry dominated by people with great power and money, who have so far refuted the existence of such a power cartel or have remained silent. Each of the issues raised must be taken cognisance of, and acted upon. As with the #MeToo movement, Justice Hema’s report has the potential of being a catalyst to enable scores of women to speak up. It behoves the state to ensure that their complaints are not ignored, or worse still, used against them.<br> <strong>Which of the following can be inferred from the passage about the state of the film industry?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The film industry has successfully implemented reforms to support women.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Women in the film industry face systemic issues that go beyond sexual harassment.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Hema Committee report entirely solved the problems of women in cinema.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The film industry is free from exploitation and discrimination now."], "correct_answer": 1, "solution": "No solution available"}, {"id": "119156", "question": "<strong>Comprehension:</strong></p> <p>At different points of time, come events that have the potential to shape the future. Whether these catalysts fulfil that potential to the fullest extent or not is in the hands of the people in their vortex. The Justice K. Hema Committee report that studied the issues faced by women in cinema, could well be one such catalyst. The three-member committee was constituted in 2017, based on a petition submitted by the Kerala-based Women in Cinema Collective, and submitted its report two years later. It was released last week, several paragraphs redacted, and contains unsurprising and yet disturbing revelations about the state of affairs in the film industry — discrimination, exploitation and sexual harassment of women. The term ‘casting couch’, hatched in Hollywood, has become repugnantly accepted as a euphemism for sexual favours in exchange for a role in films. Justice Hema points out that making the exchange of sexual favours the passkey for entry into the field itself, and normalising it and conflating it with consensual sexual activity, makes the industry inherently exploitative. The report deals also with other inequities that disadvantage women in the industry, including the lack of essential facilities such as toilets, changing rooms, safe transportation, and accommodation at the shooting spot which are violative of the right to privacy; and discrimination in remuneration, and a lack of binding contractual agreements. These affect the range of women across the industry — actors, technicians, make-up artists, dancers, support staff, and particularly so, women lower in the pecking order.</p> <p>The way ahead is not as murky as the hole that the film industry, here Malayalam, seems to find itself in. The government has decided to constitute a special investigation team to go into the accusations of harassment. While the government would do well to ignore the committee’s recommendation on doing away with internal complaints committees for each film project, it must act on suggestions that call for provision of essential facilities and for structural reforms within the film industry, including professionalising it. Nothing will change unless the state gets involved meaningfully in c  potential of being a catalyst to enable scores of women to speak up. It behoves the state to ensure that their complaints are not ignored, or worse still, used against them.<br> <strong>Which of the following can be inferred from the passage regarding the role of the government in addressing the issues in the Malayalam film industry?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The government should fully implement all recommendations of the Hema Committee without question.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The government should ignore complaints from the film industry as they are not significant.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The government has a responsibility to create an equitable workspace and implement structural reforms in the film industry.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The government should allow the film industry to regulate itself without interference."], "correct_answer": 2, "solution": "No solution available"}, {"id": "119158", "question": "<strong>Comprehension:</strong></p> <p>At different points of time, come events that have the potential to shape the future. Whether these catalysts fulfil that potential to the fullest extent or not is in the hands of the people in their vortex. The Justice K. Hema Committee report that studied the issues faced by women in cinema, could well be one such catalyst. The three-member committee was constituted in 2017, based on a petition submitted by the Kerala-based Women in Cinema Collective, and submitted its report two years later. It was released last week, several paragraphs redacted, and contains unsurprising and yet disturbing revelations abo . It behoves the state to ensure that their complaints are not ignored, or worse still, used against them.<br> <strong>According to the passage, which of the following is a recommendation made by the Hema Committee for the Malayalam film industry?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Elimination of internal complaints committees for each film project.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Increasing the salary of film actors and actresses.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Promoting more male actors in leading roles.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Reducing the number of films produced annually in the industry."], "correct_answer": 0, "solution": "No solution available"}],ans={};

    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
