<script id="theme-toggle-handler">
(function() {
    var savedTheme = 'dark';
    try {
        savedTheme = localStorage.getItem('portal-theme') || 'dark';
    } catch (e) {}
    if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
        var observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('light-theme');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('themeToggle');
        if (btn) {
            var newBtn = btn.cloneNode(true);
            newBtn.removeAttribute('onclick');
            btn.parentNode.replaceChild(newBtn, btn);
            
            var currentTheme = 'dark';
            try {
                currentTheme = localStorage.getItem('portal-theme') || 'dark';
            } catch (e) {}
            
            var icon = newBtn.querySelector('i');
            if (icon) {
                icon.className = currentTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            newBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isLight = document.body.classList.toggle('light-theme');
                document.documentElement.classList.toggle('light-theme', isLight);
                var nextTheme = isLight ? 'light' : 'dark';
                try {
                    localStorage.setItem('portal-theme', nextTheme);
                } catch (err) {}
                
                var currentIcon = newBtn.querySelector('i');
                if (currentIcon) {
                    currentIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        }
    });
})();
</script>

<script>
/* DYNAMICALLY IDENTIFY AND ALIGN MATH EQUATIONS */
(function() {
  function processImage(img) {
    if (img.classList.contains('processed-math')) return;
    img.classList.add('processed-math');
    const hasLargeAttr = (img.getAttribute('width') && parseInt(img.getAttribute('width')) > 100) ||
                         (img.getAttribute('height') && parseInt(img.getAttribute('height')) > 60);
    const src = img.src || '';
    const isMath = src.includes('parserImages') || 
                   src.includes('equation') || 
                   img.classList.contains('eq-img') ||
                   (!hasLargeAttr && (img.align === 'bottom' || img.align === 'middle' || !img.align));
    if (isMath && !hasLargeAttr) {
      img.classList.add('math-eq');
    }
  }
  
  function initMathAligner() {
    document.querySelectorAll('img').forEach(processImage);
    const observer = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
          if (node.nodeType === Node.ELEMENT_NODE) {
            if (node.tagName === 'IMG') {
              processImage(node);
            } else {
              node.querySelectorAll('img').forEach(processImage);
            }
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMathAligner);
  } else {
    initMathAligner();
  }
})();

m.info/public/exam-panel/img/check.png\"/></p> I am being encouraged by my teacher to improve my performance in the SAT exam.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I was being encouraged by my teacher to improve my performance in the SAT exam.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I am encouraged by my teacher to improve my performance in the SAT exam."], "correct_answer": 1, "solution": "Active Voice को Passive Voice में बदलने के लिए <strong>(Object + Auxiliary Verb + Being + Past Participle + by + Subject)</strong> का प्रयोग किया जाता है, जब वाक्य Present Continuous Tense में हो। वाक्य ‘My teacher is encouraging me to improve my performance in the SAT examination’ को Passive Voice में बदलते समय Object ‘me’ को वाक्य की शुरुआत में रखा जाता है। Verb ‘is encouraging’ को Passive Voice में बदलकर ‘am being encouraged’ किया जाता है, और Subject ‘my teacher’ को अंत में ‘by my teacher’ के रूप में रखा गया है।"}, {"id": "118780", "question": "<strong>Select the most appropriate synonym of the given word.</strong></p> <p>He is <strong>perceived</strong> as a reliable leader due to his consistent decision-making and transparency.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Considered", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Stolen", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Splendid", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Authentic"], "correct_answer": 0, "solution": "<strong>A) Perceived</strong> (adjective) – Seen as, regarded as, considered, viewed, recognized धारणा"}, {"id": : ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> to him", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to her", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> from her", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> for him"], "correct_answer": 0, "solution": "<strong>to him'</strong> should be used because \"Mr. Patel\" is a male name, and the sentence specifies that you need to explain to the manager, who is Mr. Patel. Therefore, 'to him' is correct here. 'To her' and 'from her' are used for females, which are incorrect in this context since the individual is male. 'For him' also doesn't fit in this context because it implies doing something for him, not directly explaining to him"}, {"id": "118775", "question": "<strong>Select the most appropriate words to fill in the blank.</strong></p> <p>The job offer was too good for Ranjith to ______.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> turn from", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> turn back", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> turn off", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> turn down"], "correct_answer": 3, "solution": "<strong>Turn down'</strong> should be used because it means to refuse an offer or proposal. The sentence indicates that the job offer was too good for Ranjith, implying it would be hard for him to refuse it, making 'turn down' the correct choice here. 'Turn from' means to turn away from something, 'Turn back' means to retreat or go back, and 'Turn off' means to switch off or lose interest, which do not fit in this context"}, {"id": "118804", "question": "<strong>In the given question, a statement divided into different segments is given. Rearrange all the segments to form a coherent statement.</strong></p> <p>O: its first constitution</p> <p>P: and soon got himself elected</p> <p>Q: the administration of the country</p> <p>R: general Ayub Khan took over</p> <p>S: after Pakistan framed", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> POSRQ", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ROPQS", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> SORQP", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> SPORQ"], "correct_answer": 2, "solution": "S यह sentence बताता है कि “after Pakistan framed,” यानी Pakistan ने अपना पहला संविधान तैयार करने के बाद की स्थिति को introduce करता है।"}, {"id": "118802", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>a. A few months ago, I got a call from my mother at dawn and I indolently picked it up in my bed.</p> <p>b. Without any reluctance, I quickly recited the number.</p> <p>c. She asked the contact number of my school maths teacher.</p> <p>d. She told me to sleep well and I cut the call.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, b, a, c", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, a, b, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, b, c, d", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> a, c, b, d"], "correct_answer": 3, "solution": "a: The sentence starts with a time reference (\"A few months ago\") which is essential in establishing the timeline of events."}, {"id": "118784", "question": "<strong>Select the most appropriate meaning of the underlined idiom.</strong></p> <p>The boss of our organisation is considered <ins><strong>a jack of all trades</strong></ins>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Engaged in gambling", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Knowing nothing but boasting", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Doing several different jobs instead of specialising in one", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Innocence about everything"], "correct_answer": 2, "solution": "C) <strong>A jack of all trades</strong> (idiom) – Doing several different jobs instead of specialising in one कई अलग<span dir=\"RTL\">-</span><span dir=\"RTL\">अलग काम करने वाला</span>, लेकिन किसी में विशेषज्ञ नहीं"}, {"id": "118776", "question": "<strong>Select the most appropriate word to fill in the blank.</strong></p> <p>Two people were ______ to death when a bike hit a truck", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> crushed", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> fell", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> brushed", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> rushed"], "correct_answer": 0, "solution": "<strong>crushed'</strong> should be used because it means to apply such force to an object or person that it breaks into pieces. The sentence describes a scenario where a bike hits a truck, leading to the death of two people, making 'crushed' the most appropriate choice here. Whereas, 'Fell' means to drop down, 'Brushed' means to touch lightly, and 'Rushed' implies doing something hurriedly, which don't fit in this context"}, {"id": "118788", "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>The state of being unmarried by choice", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Isolation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Polygamy", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Monogamy", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Celibacy"], "correct_answer": 3, "solution": "<strong>D) Celibacy</strong> (noun) – The state of being unmarried by choice ब्रह्मचर्य"}, {"id": "118793", "question": "<strong>Select the option that expresses the given sentence in direct speech.</strong></p> <p>My supplier told me that he could see sincerity in my eyes.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My supplier said to me, \"I could see sincerity in my eyes.\"", "<p style=\"display:none\"><img alt=\"reload\" on available"}, {"id": "118813", "question": "<strong>Comprehension:</strong></p> <p>MILK is the most adulterated food item in the world. The problem is particularly acute in India, which has been the largest milk-producing country across the globe for the past over two decades. Water is easily the most innocuous of adulterants that your neighbourhood milkman probably adds every now and then. In a bid to increase the volume and shelf life of milk, which is a staple in almost every Indian household, unscrupulous elements use detergents, urea, starch, glucose and formalin. There are two key questions: Are the food safety authorities doing enough to curb the malpractice? And is there considerable awareness among consumers about this health hazard?</p> <p>Punjab, which has the highest per capita availability of milk in the country, is struggling to stem the rot. In the past three years (2021-24), nearly 18 per cent of the samples of milk and milk products collected from across the state failed to conform to the standards. Haryana, which is among the leading milk producers nationwide, fared even worse as 28 per cent of the samples did not pass the quality test. With the festival season coming up, the searches and seizures will be intensified. However, the civil and criminal cases registered against those involved in adulteration have failed to act as a deterrent, largely due to the poor conviction rate. The majority of the offenders know that they will eventually get away with it.</p> <p>Testing kits for the detection of commonly used adulterants in milk are available in the market. It is important to make these products affordable, user-friendly and foolproof so that consumers as well as dairy cooperatives and plants can check the quality of milk. At the same time, food safety agencies need to be proactive in inspecting and sampling food products and taking strict action for non-compliance with standards. Every case that falls flat emboldens miscreants to play with the tant to make these products affordable, user-friendly and foolproof so that consumers as well as dairy cooperatives and plants can check the quality of milk. At the same time, food safety agencies need to be proactive in inspecting and sampling food products and taking strict action for non-compliance with standards. Every case that falls flat emboldens miscreants to play with the health of unsuspecting people.</p> <p><strong>What is recommended to help consumers and dairy cooperatives check the quality of milk more effectively</strong>?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Increase the price of milk.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Ban the use of milk adulterants completely.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Make testing kits affordable, user-friendly, and foolproof.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Introduce new laws against milk adulteration."], "correct_answer": 2, "solution": "No solution available"}, {"id": "118817", "question": "<strong>Comprehension: </strong><br> Will the essence of storytelling — the reflection of genuine human experience — be lost in the rise of machine-generated content?</p> <p>Way back in the early 2000s, when I started writing my debut novel, it seemed like a daunting task that would take an entire lifetime to complete. Driven purely by my literary instincts and an eagerness to create something authentic, I took four years to finish the story and become an author. To be an author in those days meant a lot. Not many people ventured to do it given the time and effort that one had invested in the process. Cut to the new times, and becoming an author is as easy as blowing bubbles, thanks to the emergence of AI.</p> <p>Someone I know recently said that they have a target of publishing 10 books this year, and I wasn’t surprised. But can AI-assisted writing be a patch on creative writing that comes from the inner realms of a writer filled with genuine emotions and subjective thought? As a creative writing coach for children, I have often wondered if children will ever need to learn to write in future, and if even readers will stop caring if a piece of writing has come from AI’s backyard or the annals of original human contemplation and creativity.</p> <p>I have floated this question to people and the responses have been divided. Some believe that in a world that is pressed for time, the source of thought is not as important as the thought itself. If served in an easily, digestible manner, it doesn’t matter where it comes from – man or machine.</p> <p>While this view has resulted in the spawning of authors around the world, what remains a cardinal truth is that a story or a piece of writing can be resonant with readers only when it is generated in human consciousness. The chief purpose of art and literature is to be able to strike a chord with readers and not to just disseminate information. The reader is looking for a part of herself in the stories, a reflection of common human experiences and the books they read to be echo chambers of their own lives in parts or whole. Authentic storytelling brings with it a chunk of the writer’s soul and it seeks to merge with the soul of the readers. Anything that is generated by a vast reservoir of readymade ideas will be too perfect to evoke responses. Students may be able to produce perfect sentences and passages that will answer a question, but they will not reflect the personality and character of the writer.</p> <p>What makes a genuine piece of writing enduring and endearing is the voice of the writer and their ability to draw on personal experiences, intuition and a strong need to connect with the audience.</p> <p>No matter how the concepts are laid out in an artificial piece of story, they will be less distinctive and more formulaic and impersonal. Maybe, our hustling world needs only quick fixes, and as we discover newer methods to replicate human thought, our spirit will also capitulate and settle for the synthetic form of writing. It’s again about what the audience chooses that will determine the future of creativity. If AI can satiate the population, then why would original writers spend time and energy on creating something from the core of their hearts? It is a scary outlook to hold, as a writer and creative writing coach. While a part of me still refuses to believe the doomsday scenario, I am still betting on ethical and moral considerations to deter people from going all out and claiming themselves to be authors and writers without much intellectual investment.</p> <p>I am under no illusion that writing will remain sacrosanct as it used to be. It will soon become generic and predictable. Or maybe, going forward, AI will be able to generate stylised texts that mimic the voice of a particular writer and erase the distinction between the real and the unreal. It’s a scary and depressive scenario, but one that we, as authentic writers, must brace ourselves for.<br> <br> <strong>What can be inferred about the author’s attitude towards AI-assisted writing?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The author believes AI can enhance the authenticity of storytelling.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The author is neutral about AI's impact on writing and storytelling.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The author feels that AI-assisted writing lacks the genuine human touch essential  src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> AI will create texts that are indistinguishable from those written by genuine", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> writers AI will surpass human writers in creativity and originality.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> AI will only be able to replicate basic writing styles, not complex ones.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> AI will remain inferior to human writers in terms of authenticity."], "correct_answer": 0, "solution": "No solution available"}],ans={};
const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;
let isPaused=false;

function ini(){
    disQ();
    strT();
    document.getElementById('pauseBtn').onclick=togglePause;
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function togglePause(){
    isPaused=!isPaused;
    if(isPaused){
        clearInterval(ti);
        const pm=document.getElementById('pauseModal');
        pm.style.display='flex';
        pm.style.alignItems='center';
        pm.style.justifyContent='center';
        pm.style.position='fixed';
        pm.style.top='0';
        pm.style.left='0';
        pm.style.width='100%';
        pm.style.height='100%';
        pm.style.background='rgba(0,0,0,0.85)';
        pm.style.zIndex='10000';
        document.getElementById('pauseBtn').innerHTML='▶';
        document.getElementById('pauseBtn').title='Resume Test';
    }else{
        document.getElementById('pauseModal').style.display='none';
        document.getElementById('pauseBtn').innerHTML='⏸';
        document.getElementById('pauseBtn').title='Pause Test';
        strT();
    }
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
