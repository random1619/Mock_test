<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ctOS // DEDSEC_MOCK_VAULT</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

    :root {
      color-scheme: dark;
      --primary: #00f3ff; /* Watch Dogs Cyan */
      --secondary: #bfff00; /* Caution Yellow */
      --danger: #ff0055; /* DedSec Magenta-Red */
      --success: #00ff66; /* Neon Green */
      --bg-darker: #050608;
      --bg-dark: #0c0e14;
      --bg-panel: #131722;
      --bg-panel-hover: #1b2030;
      --border-neon: rgba(0, 243, 255, 0.15);
      --border-neon-strong: rgba(0, 243, 255, 0.5);
      --text-primary: #f1f5f9;
      --text-muted: #94a3b8;
      
      --font-header: 'Orbitron', sans-serif;
      --font-sans: 'Space Grotesk', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--primary) var(--bg-dark);
    }

    /* Custom scrollbar for premium look */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-darker);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: var(--radius);
    }

    body {
      font-family: var(--font-sans);
      color: var(--text-primary);
      background-color: var(--bg-darker);
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.03) 0%, transparent 80%),
        linear-gradient(rgba(19, 23, 34, 0.96) 50%, rgba(5, 6, 8, 0.99) 50%),
        linear-gradient(90deg, rgba(0, 243, 255, 0.01) 1px, transparent 1px),
        linear-gradient(0deg, rgba(0, 243, 255, 0.01) 1px, transparent 1px);
      background-size: 100% 100%, 4px 4px, 32px 32px, 32px 32px;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Subtle Animated Scanning HUD Line */
    .scanner-line {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      box-shadow: 0 0 12px var(--primary);
      z-index: 9999;
      animation: scan-vertical 8s linear infinite;
      pointer-events: none;
    }

    @keyframes scan-vertical {
      0% { top: 0%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    header {
      background: rgba(12, 14, 20, 0.9);
      border-bottom: 2px solid var(--border-neon-strong);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .brand-logo {
      width: 45px;
      height: 45px;
      border: 2px solid var(--primary);
      background: rgba(0, 243, 255, 0.1);
      display: grid;
      place-items: center;
      font-family: var(--font-header);
      font-size: 20px;
      font-weight: 900;
      color: var(--primary);
      text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
    }

    .brand-logo::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(transparent, rgba(0,243,255,0.2), transparent);
      top: -100%;
      animation: logo-scan 2s linear infinite;
    }

    @keyframes logo-scan {
      0% { top: -100%; }
      100% { top: 100%; }
    }

    .brand-info h1 {
      font-family: var(--font-header);
      font-size: 20px;
      letter-spacing: 2px;
      font-weight: 900;
      color: #fff;
    }

    .brand-info p {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .system-status {
      display: flex;
      align-items: center;
      gap: 20px;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--success);
      animation: pulse 1.5s infinite alternate;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .layout-container {
      display: grid;
      grid-template-columns: 320px 1fr;
      flex-grow: 1;
      min-height: calc(100vh - 78px);
    }

    /* Sidebar controls */
    aside {
      background: rgba(19, 23, 34, 0.85);
      border-right: 1px solid var(--border-neon);
      padding: 25px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 25px;
      overflow-y: auto;
      height: calc(100vh - 78px);
      position: sticky;
      top: 78px;
    }

    .panel-title {
      font-family: var(--font-header);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--secondary);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title::after {
      content: '';
      flex-grow: 1;
      height: 1px;
      background: var(--border-neon);
      margin-left: 10px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-btn {
      width: 100%;
      background: rgba(12, 14, 20, 0.5);
      border: 1px solid var(--border-neon);
      color: var(--text-primary);
      padding: 10px 15px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      text-align: left;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      background: rgba(0, 243, 255, 0.08);
      border-color: var(--primary);
    }

    .filter-btn.active {
      background: rgba(0, 243, 255, 0.15);
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
      color: var(--primary);
      font-weight: 600;
    }

    .filter-btn .badge {
      background: rgba(5, 6, 8, 0.6);
      border: 1px solid var(--border-neon);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--secondary);
    }

    .filter-btn.active .badge {
      border-color: var(--primary);
    }

    /* Main view area */
    main {
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 30px;
      overflow-y: auto;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    /* Stats HUD widget */
    .hud-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .hud-card {
      background: rgba(19, 23, 34, 0.7);
      border: 1px solid var(--border-neon);
      padding: 20px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 15px;
      position: relative;
      overflow: hidden;
    }

    .hud-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: 100%;
      background: var(--primary);
    }

    .hud-card.warning::before { background: var(--secondary); }
    .hud-card.danger::before { background: var(--danger); }
    .hud-card.success::before { background: var(--success); }

    .hud-icon {
      font-size: 24px;
      color: var(--primary);
    }
    .hud-card.warning .hud-icon { color: var(--secondary); }
    .hud-card.danger .hud-icon { color: var(--danger); }
    .hud-card.success .hud-icon { color: var(--success); }

    .hud-details h3 {
      font-family: var(--font-mono);
      font-size: 24px;
      font-weight: 700;
      line-height: 1.1;
    }

    .hud-details p {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* Toolbar search controls */
    .controls-panel {
      background: rgba(19, 23, 34, 0.9);
      border: 1px solid var(--border-neon-strong);
      padding: 20px;
      border-radius: var(--radius);
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 15px;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .search-wrapper {
      position: relative;
    }

    .search-wrapper i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--primary);
    }

    .search-wrapper input {
      width: 100%;
      background: var(--bg-darker);
      border: 1px solid var(--border-neon);
      color: var(--text-primary);
      padding: 12px 15px 12px 42px;
      border-radius: var(--radius);
      outline: none;
      font-size: 14px;
      font-family: var(--font-sans);
    }

    .search-wrapper input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
    }

    .select-wrapper select {
      background: var(--bg-darker);
      border: 1px solid var(--border-neon);
      color: var(--text-primary);
      padding: 12px 20px;
      border-radius: var(--radius);
      outline: none;
      font-size: 13px;
      font-family: var(--font-mono);
      cursor: pointer;
    }

    .select-wrapper select:focus {
      border-color: var(--primary);
    }

    .quick-launch-btn {
      background: var(--primary);
      color: var(--bg-darker);
      border: none;
      padding: 12px 25px;
      font-family: var(--font-header);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      border-radius: var(--radius);
      cursor: pointer;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .quick-launch-btn:hover {
      background: #fff;
      box-shadow: 0 0 15px rgba(255,255,255,0.4);
    }

    /* Section-wise Mocks Container */
    .sections-container {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .section-block {
      background: rgba(19, 23, 34, 0.4);
      border: 1px solid var(--border-neon);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-block-header {
      border-bottom: 1px solid var(--border-neon);
      padding-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-block-title {
      font-family: var(--font-header);
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-block-title i {
      color: var(--primary);
    }

    .section-block-meta {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--secondary);
    }

    /* Mocks Grid */
    .mocks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .mock-card {
      background: var(--bg-panel);
      border: 1px solid var(--border-neon);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      min-height: 200px;
      transition: all 0.2s ease;
    }

    .mock-card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 10px;
      height: 10px;
      border-top: 2px solid var(--primary);
      border-right: 2px solid var(--primary);
    }

    .mock-card:hover {
      border-color: var(--primary);
      background: var(--bg-panel-hover);
      box-shadow: 0 5px 20px rgba(0, 243, 255, 0.15);
      transform: translateY(-2px);
    }

    .mock-header {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mock-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 5px;
    }

    .mock-badge-group {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      font-weight: bold;
    }

    .badge.brand {
      background: rgba(0, 243, 255, 0.1);
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    .badge.timer-badge {
      background: rgba(255, 0, 85, 0.1);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .badge.soft-badge {
      background: rgba(191, 255, 0, 0.1);
      color: var(--secondary);
      border: 1px solid var(--secondary);
    }

    .badge.type-badge {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .badge.pdf-badge {
      background: rgba(255, 42, 95, 0.1);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .mock-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 15px;
      gap: 10px;
    }

    .mock-path {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .launch-btn {
      background: rgba(0, 243, 255, 0.1);
      border: 1px solid var(--primary);
      color: var(--primary);
      padding: 6px 15px;
      font-size: 12px;
      font-family: var(--font-header);
      font-weight: 700;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
      text-decoration: none;
      white-space: nowrap;
    }

    .launch-btn:hover {
      background: var(--primary);
      color: var(--bg-darker);
      box-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
    }

    .expand-btn {
      background: transparent;
      border: 1px dashed var(--border-neon);
      color: var(--primary);
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 13px;
      border-radius: var(--radius);
      cursor: pointer;
      text-align: center;
      width: 100%;
      text-transform: uppercase;
    }

    .expand-btn:hover {
      background: rgba(0, 243, 255, 0.05);
      border-color: var(--primary);
    }

    .empty-state {
      background: rgba(255, 0, 85, 0.05);
      border: 2px dashed var(--danger);
      color: var(--danger);
      padding: 40px;
      border-radius: var(--radius);
      text-align: center;
      font-family: var(--font-mono);
      font-weight: bold;
      letter-spacing: 1px;
    }

    /* Logger Terminal widget */
    .terminal-panel {
      background: #050608;
      border: 1px solid var(--border-neon-strong);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      margin-top: 15px;
    }

    .terminal-header {
      background: rgba(0, 243, 255, 0.08);
      border-bottom: 1px solid var(--border-neon-strong);
      padding: 10px 15px;
      font-family: var(--font-header);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: var(--primary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .terminal-body {
      padding: 15px;
      font-family: var(--font-mono);
      font-size: 12px;
      max-height: 150px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .terminal-line {
      display: flex;
      gap: 12px;
    }

    .terminal-time {
      color: var(--text-muted);
    }

    .terminal-msg.info { color: var(--primary); }
    .terminal-msg.warn { color: var(--secondary); }
    .terminal-msg.err { color: var(--danger); }

    @media (max-width: 1024px) {
      .layout-container {
        grid-template-columns: 1fr;
      }
      aside {
        height: auto;
        position: relative;
        top: 0;
        border-right: none;
        border-bottom: 1px solid var(--border-neon);
      }
      .hud-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      header {
        padding: 10px 15px;
        flex-direction: column;
        gap: 10px;
      }
      .hud-grid {
        grid-template-columns: 1fr;
      }
      .controls-panel {
        grid-template-columns: 1fr;
      }
      main {
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="scanner-line"></div>
  
  <header>
    <div class="brand">
      <div class="brand-logo">DS</div>
      <div class="brand-info">
        <h1>DEDSEC_VAULT</h1>
        <p>ctOS DECRYPTION SYSTEM V4.0</p>
      </div>
    </div>
    <div class="system-status">
      <span id="activeFilters">ALL CONTEXTS ACTIVE</span>
      <div class="status-indicator">
        <span class="status-dot"></span>
        <span>ONLINE</span>
      </div>
    </div>
  </header>

  <div class="layout-container">
    <aside>
      <div>
        <div class="panel-title">DOMAINS</div>
        <div class="filter-group" id="brandList"></div>
      </div>
      <div>
        <div class="panel-title">DATASETS</div>
        <div class="filter-group" id="typeList"></div>
      </div>
    </aside>

    <main>
      <!-- HUD Diagnostics -->
      <section class="hud-grid" aria-label="Library Status HUD">
        <div class="hud-card">
          <i class="fas fa-network-wired hud-icon"></i>
          <div class="hud-details">
            <h3 id="totalMocks">0</h3>
            <p>Resolved Nodes</p>
          </div>
        </div>
        <div class="hud-card success">
          <i class="fas fa-file-code hud-icon"></i>
          <div class="hud-details">
            <h3 id="htmlMocks">0</h3>
            <p>HTML Players</p>
          </div>
        </div>
        <div class="hud-card danger">
          <i class="fas fa-file-pdf hud-icon"></i>
          <div class="hud-details">
            <h3 id="pdfMocks">0</h3>
            <p>PDF Stacks</p>
          </div>
        </div>
        <div class="hud-card warning">
          <i class="fas fa-search hud-icon"></i>
          <div class="hud-details">
            <h3 id="matchingCount">0</h3>
            <p>Active Context</p>
          </div>
        </div>
      </section>

      <!-- Search and Launch bar -->
      <section class="controls-panel">
        <div class="search-wrapper">
          <i class="fas fa-terminal"></i>
          <input type="search" id="searchInput" placeholder="SEARCH NODES, TOPICS, SECTIONS, BRANDS..." autocomplete="off">
        </div>
        <div class="select-wrapper">
          <select id="sortSelect">
            <option value="name">SORT BY NAME</option>
            <option value="brand">SORT BY DOMAIN</option>
            <option value="section">SORT BY SECTION</option>
          </select>
        </div>
        <a id="randomLaunch" class="quick-launch-btn" href="#">
          <i class="fas fa-random"></i> Decrypt Random
        </a>
      </section>

      <!-- Section-wise Mocks Container -->
      <section id="sectionsContainer" class="sections-container"></section>
      <div id="emptyState" class="empty-state" style="display: none;">
        SYSTEM WARNING: NO COMPATIBLE DECRYPTION NODES MATCH SELECTIVE PARAMETERS.
      </div>

      <!-- Logging Terminal -->
      <section class="terminal-panel">
        <div class="terminal-header">
          <span>LOGGER://SYSTEM_ACTIVITY_FEED</span>
          <span class="status-indicator">
            <span class="status-dot" style="background-color: var(--secondary); box-shadow: 0 0 8px var(--secondary);"></span>
            <span>FEED ACTIVE</span>
          </span>
        </div>
        <div class="terminal-body" id="consoleLogs"></div>
      </section>
    </main>
  </div>

  <script src="./mocks-manifest.js"></script>
  <script>
    const manifest = window.MOCKS_MANIFEST || { files: [] };
    
    // Customize Brand display names
    const brandDisplayNames = {
      All: 'ALL_DOMAINS',
      Root: 'ROOT_DISPATCH',
      Pundits: 'THE_PUNDITS',
      'pundits-mocks': 'PUNDITS_ARCHIVE',
      'Mocks Wallah': 'MOCKS_WALLAH',
      'English Madhyam': 'ENGLISH_MADHYAM_PREMIUM',
      'english-madhyam': 'ENGLISH_MADHYAM_CLASSIC',
      oliveboard: 'OLIVEBOARD',
      Testbook: 'TESTBOOK',
      'Other Brands': 'OTHER_HOUSES',
      'Aman Sir': 'AMAN_SIR'
    };

    // Customize dataset types
    const typeDisplayNames = {
      All: 'ALL_DATASETS',
      Mock: 'STANDARD_MOCKS',
      Quiz: 'QUIZZES',
      'Full Mock': 'FULL_MOCKS',
      Sectional: 'SECTIONAL_TESTS',
      'Topic Concept': 'CONCEPT_TESTS',
      'Previous Year': 'PREVIOUS_YEAR_PAPERS',
      'Practice Set': 'PRACTICE_SETS',
      PDF: 'PDF_DOCUMENTS'
    };

    const state = {
      brand: 'All',
      type: 'All',
      query: '',
      sort: 'name',
      expandedSections: {} // tracks which section blocks are fully expanded
    };

    const els = {
      brandList: document.getElementById('brandList'),
      typeList: document.getElementById('typeList'),
      totalMocks: document.getElementById('totalMocks'),
      htmlMocks: document.getElementById('htmlMocks'),
      pdfMocks: document.getElementById('pdfMocks'),
      matchingCount: document.getElementById('matchingCount'),
      searchInput: document.getElementById('searchInput'),
      sortSelect: document.getElementById('sortSelect'),
      randomLaunch: document.getElementById('randomLaunch'),
      sectionsContainer: document.getElementById('sectionsContainer'),
      emptyState: document.getElementById('emptyState'),
      consoleLogs: document.getElementById('consoleLogs'),
      activeFilters: document.getElementById('activeFilters')
    };

    // Terminal Logging Helper
    function log(msg, type = 'info') {
      const now = new Date();
      const timeStr = now.toTimeString().split(' ')[0] + '.' + String(now.getMilliseconds()).padStart(3, '0');
      const line = document.createElement('div');
      line.className = 'terminal-line';
      
      let typeClass = 'info';
      let prefix = '[OK] ';
      if (type === 'warn') {
        typeClass = 'warn';
        prefix = '[SYS] ';
      } else if (type === 'err') {
        typeClass = 'err';
        prefix = '[ERR] ';
      }

      line.innerHTML = `<span class="terminal-time">[${timeStr}]</span><span class="terminal-msg ${typeClass}">${prefix}${msg}</span>`;
      els.consoleLogs.appendChild(line);
      els.consoleLogs.scrollTop = els.consoleLogs.scrollHeight;

      while (els.consoleLogs.childElementCount > 30) {
        els.consoleLogs.removeChild(els.consoleLogs.firstChild);
      }
    }

    log('Connection established. Resolving ctOS mock network...');
    log(`Database synchronized. Loaded ${manifest.files.length} active node paths.`);

    // Helper functions
    const cleanName = (name) => name
      .replace(/\.(html?|pdf)$/i, '')
      .replace(/^@/g, '')
      .replace(/\s+/g, ' ')
      .trim();

    const titleCase = (value) => value.replace(/[-_]/g, ' ').toUpperCase();
    const getBrandLabel = (value) => brandDisplayNames[value] || titleCase(value);
    const getTypeLabel = (value) => typeDisplayNames[value] || value.toUpperCase();
    const encodePath = (path) => path.split('/').map(encodeURIComponent).join('/');
    const formatNumber = (num) => new Intl.NumberFormat('en-IN').format(num);

    const inferType = (file) => {
      const text = file.toLowerCase();
      if (text.endsWith('.pdf')) return 'PDF';
      if (text.includes('previous year')) return 'Previous Year';
      if (text.includes('sectional')) return 'Sectional';
      if (text.includes('topic-concept') || text.includes('topic concept')) return 'Topic Concept';
      if (text.includes('practice')) return 'Practice Set';
      if (text.includes('full mock') || text.includes('full test') || text.includes('live mock')) return 'Full Mock';
      if (text.includes('quiz')) return 'Quiz';
      return 'Mock';
    };

    // Preprocess mock files
    const files = manifest.files.map((file, idx) => {
      const parts = file.split('/');
      const brand = parts.length > 1 ? parts[0] : 'Root';
      const section = parts.length > 2 ? parts[1] : (parts.length > 1 ? 'General Tests' : 'Unsorted');
      const name = cleanName(parts[parts.length - 1]);
      const ext = file.toLowerCase().endsWith('.pdf') ? 'PDF' : 'HTML';
      const type = inferType(file);
      
      // Look for indicators in file names for better badges
      const isSectionalTimer = file.toLowerCase().includes('sectional timer') || file.toLowerCase().includes('tierii') || file.toLowerCase().includes('tier ii');
      const isSoftSwitch = !isSectionalTimer && (file.toLowerCase().includes('tier1') || file.toLowerCase().includes('tier i') || file.toLowerCase().includes('pre'));

      const search = `${file} ${brand} ${section} ${name} ${type} ${ext}`.toLowerCase();
      return { idx, file, brand, section, name, ext, type, isSectionalTimer, isSoftSwitch, search };
    });

    log('Node type-inferenced & parsed metadata indexing maps compiled.');

    // Count statistics
    const uniqueValues = (arr) => [...new Set(arr)].sort((a,b) => a.localeCompare(b));
    const brandCounts = new Map();
    const typeCounts = new Map();

    files.forEach(f => {
      brandCounts.set(f.brand, (brandCounts.get(f.brand) || 0) + 1);
      typeCounts.set(f.type, (typeCounts.get(f.type) || 0) + 1);
    });

    const orderedBrands = ['All', ...uniqueValues(files.map(f => f.brand))];
    const orderedTypes = ['All', ...uniqueValues(files.map(f => f.type))];

    function makeFilterBtn(label, count, active, onClick) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = `filter-btn${active ? ' active' : ''}`;
      btn.innerHTML = `<span>${label}</span><span class="badge">${formatNumber(count)}</span>`;
      btn.addEventListener('click', onClick);
      return btn;
    }

    function renderFilters() {
      // Sidebar domains
      els.brandList.replaceChildren(...orderedBrands.map(b => {
        const count = b === 'All' ? files.length : brandCounts.get(b);
        return makeFilterBtn(getBrandLabel(b), count, state.brand === b, () => {
          log(`Subsystem filter update: ${getBrandLabel(b)} active.`);
          state.brand = b;
          render();
        });
      }));

      // Sidebar datasets
      els.typeList.replaceChildren(...orderedTypes.map(t => {
        const count = t === 'All' ? files.length : typeCounts.get(t);
        return makeFilterBtn(getTypeLabel(t), count, state.type === t, () => {
          log(`Subsystem filter update: ${getTypeLabel(t)} active.`);
          state.type = t;
          render();
        });
      }));
    }

    function getFilteredAndSorted() {
      const query = state.query.toLowerCase().trim();
      const tokens = query ? query.split(/\s+/) : [];

      let items = files.filter(f => {
        if (state.brand !== 'All' && f.brand !== state.brand) return false;
        if (state.type !== 'All' && f.type !== state.type) return false;
        if (tokens.length > 0) {
          return tokens.every(token => f.search.includes(token));
        }
        return true;
      });

      items.sort((a, b) => {
        if (state.sort === 'brand') return a.brand.localeCompare(b.brand) || a.name.localeCompare(b.name);
        if (state.sort === 'section') return a.section.localeCompare(b.section) || a.name.localeCompare(b.name);
        return a.name.localeCompare(b.name);
      });

      return items;
    }

    function renderHUD(items) {
      els.totalMocks.textContent = formatNumber(files.length);
      els.htmlMocks.textContent = formatNumber(files.filter(f => f.ext === 'HTML').length);
      els.pdfMocks.textContent = formatNumber(files.filter(f => f.ext === 'PDF').length);
      els.matchingCount.textContent = formatNumber(items.length);
    }

    function renderCard(item) {
      const href = `./${encodePath(item.file)}`;
      const card = document.createElement('div');
      card.className = 'mock-card';
      
      let badges = `<span class="badge brand">${getBrandLabel(item.brand)}</span>`;
      if (item.ext === 'PDF') {
        badges += `<span class="badge pdf-badge"><i class="fas fa-file-pdf"></i> PDF</span>`;
      } else {
        badges += `<span class="badge type-badge">CBT CBT</span>`;
        if (item.isSectionalTimer) {
          badges += `<span class="badge timer-badge"><i class="fas fa-clock"></i> Sectional Timer (Lock)</span>`;
        }
        if (item.isSoftSwitch) {
          badges += `<span class="badge soft-badge"><i class="fas fa-exchange-alt"></i> Soft Switching</span>`;
        }
      }

      card.innerHTML = `
        <div class="mock-header">
          <h4 class="mock-title" title="${item.name}">${item.name}</h4>
          <div class="mock-badge-group">
            ${badges}
          </div>
        </div>
        <div class="mock-actions">
          <span class="mock-path" title="${item.file}">${item.file}</span>
          <a class="launch-btn" href="${href}" target="_self">Decrypt Node</a>
        </div>
      `;

      card.querySelector('.launch-btn').addEventListener('click', () => {
        log(`Broadcasting decrypt request to payload: ${item.name}`, 'warn');
      });

      return card;
    }

    function renderSectionWise(items) {
      els.sectionsContainer.innerHTML = '';
      
      // Group by sections
      const sectionsMap = {};
      items.forEach(item => {
        const key = item.section;
        if (!sectionsMap[key]) {
          sectionsMap[key] = [];
        }
        sectionsMap[key].push(item);
      });

      const sectionKeys = Object.keys(sectionsMap).sort((a,b) => a.localeCompare(b));
      
      if (sectionKeys.length === 0) {
        els.emptyState.style.display = 'block';
        return;
      }
      els.emptyState.style.display = 'none';

      sectionKeys.forEach(secName => {
        const secItems = sectionsMap[secName];
        const block = document.createElement('div');
        block.className = 'section-block';
        
        const isExpanded = !!state.expandedSections[secName];
        const limit = 8;
        const visibleItems = isExpanded ? secItems : secItems.slice(0, limit);

        block.innerHTML = `
          <div class="section-block-header">
            <div class="section-block-title">
              <i class="fas fa-folder-open"></i>
              <span>${secName.toUpperCase()}</span>
            </div>
            <div class="section-block-meta">${secItems.length} Resolved Mocks</div>
          </div>
          <div class="mocks-grid" id="grid-${secName}"></div>
        `;

        const grid = block.querySelector(`#grid-${secName}`);
        grid.replaceChildren(...visibleItems.map(renderCard));

        if (secItems.length > limit && !isExpanded) {
          const expandBtn = document.createElement('button');
          expandBtn.className = 'expand-btn';
          expandBtn.innerHTML = `<i class="fas fa-plus"></i> Load ${secItems.length - limit} More Nodes in this Section`;
          expandBtn.addEventListener('click', () => {
            log(`Expanding block layout for section: ${secName.toUpperCase()}`);
            state.expandedSections[secName] = true;
            render();
          });
          block.appendChild(expandBtn);
        } else if (isExpanded) {
          const collapseBtn = document.createElement('button');
          collapseBtn.className = 'expand-btn';
          collapseBtn.innerHTML = `<i class="fas fa-minus"></i> Collapse Section`;
          collapseBtn.addEventListener('click', () => {
            log(`Collapsing block layout for section: ${secName.toUpperCase()}`);
            state.expandedSections[secName] = false;
            render();
          });
          block.appendChild(collapseBtn);
        }

        els.sectionsContainer.appendChild(block);
      });
    }

    function updateHeaderStatus() {
      const activeFilters = [];
      if (state.brand !== 'All') activeFilters.push(`DOMAIN: ${getBrandLabel(state.brand)}`);
      if (state.type !== 'All') activeFilters.push(`DATASET: ${getTypeLabel(state.type)}`);
      if (state.query) activeFilters.push(`QUERY: "${state.query.toUpperCase()}"`);
      
      els.activeFilters.textContent = activeFilters.length > 0 ? activeFilters.join(' | ') : 'ALL MOCKS RESOLVED';
    }

    function render() {
      renderFilters();
      
      const items = getFilteredAndSorted();
      renderHUD(items);
      renderSectionWise(items);
      updateHeaderStatus();

      // Configure random launch URL
      if (items.length > 0) {
        const rand = items[Math.floor(Math.random() * items.length)];
        els.randomLaunch.href = `./${encodePath(rand.file)}`;
      } else {
        els.randomLaunch.href = '#';
      }
    }

    // Event Listeners
    els.searchInput.addEventListener('input', (e) => {
      state.query = e.target.value;
      log(`Decoding query matrix: "${state.query.toUpperCase()}"`);
      render();
    });

    els.sortSelect.addEventListener('change', (e) => {
      state.sort = e.target.value;
      log(`Re-ordering tree indexes by sort: ${state.sort.toUpperCase()}`);
      render();
    });

    els.randomLaunch.addEventListener('click', (e) => {
      if (els.randomLaunch.getAttribute('href') === '#') {
        e.preventDefault();
        log('No decryption node maps resolved under active parameters.', 'err');
      } else {
        log('Injecting decipher stream packet into randomized host Node...', 'warn');
      }
    });

    // Initial render
    render();
  </script>
</body>
</html>
