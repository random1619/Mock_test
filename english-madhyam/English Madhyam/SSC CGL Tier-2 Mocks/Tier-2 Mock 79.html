<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mocks Wallah</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>
    <!-- START: Unified Premium Dark Mode Overrides -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

<div class="hdr">
<div class="hdr-left">
<div class="ttl">Mocks Wallah</div>
<div class="tmr" id="tmr">45:00</div>
</div>
<button class="sub" onclick="sub()" id="sub-btn">Submit</button>
</div>
<div class="main">
<div id="qc" class="qc">
<div class="qn" id="qn">Question 1</div>
<div class="qt" id="qt"></div>
<div class="opts" id="opts"></div>
<div class="sol" id="sol">
<h4>💡 Solution</h4>
<div class="sol-content" id="sol-text"></div>
</div>
</div>
</div>
<div class="nav">
<button class="nb prv" id="pb" onclick="prv()">← Previous</button>
<button class="nb nxt" id="nb" onclick="nxt()">Next →</button>
</div>
<div id="modal" class="modal">
<div class="modal-content">
<button class="close" onclick="closeModal()">×</button>
<div class="modal-header">
<h2 id="fs">Your Score</h2>
<p id="sp">Marks Obtained</p>
</div>
<div class="modal-stats">
<div class="stat"><h4>Correct</h4><p id="cor">0</p></div>
<div class="stat"><h4>Incorrect</h4><p id="inc">0</p></div>
<div class="stat"><h4>Unattempted</h4><p id="unat">0</p></div>
</div>
<div class="mark-breakdown">
<div class="mark-item">
<span class="mark-label">Correct (3.0 each)</span>
<span class="mark-value positive" id="pos-marks">+0</span>
</div>
<div class="mark-item">
<span class="mark-label">Incorrect (1.0 each)</span>
<span class="mark-value negative" id="neg-marks">0</span>
</div>
<div class="mark-item">
<span class="mark-label">Unattempted (0 each)</span>
<span class="mark-value" id="una-marks">0</span>
</div>
</div>
<div class="total-marks">
<h3 id="total-score">0 Marks</h3>
<p id="percentage">0%</p>
</div>
<div class="modal-actions">
<button class="act-btn blue" onclick="showSol()">View Solutions</button>
<button class="act-btn green" onclick="location.reload()">Retry Test</button>
</div>
</div>

<script>
const qs=[{"id": "115460", "question": "<strong>Select the correct passive form of the given sentence.</strong></p> <p>The disaster management team rescued the flood victims.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The flood victims are rescued by the disaster management team.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The flood victims are being rescued by the disaster management team.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The flood victims were rescued by the disaster management team.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The flood victims have been rescued by the disaster management team."], "correct_answer": 2, "solution": "'were rescued' का प्रयोग होगा क्योंकि मुख्य वाक्य 'rescued' Past Tense में है और यह Active Voice में है। Passive Voice में subject (the disaster management team) को object (the flood victims) बनाया जाता है और verb को 'to be' के रूप में past participle में इस्तेमाल किया जाता है। अतः वाक्य Passive Voice में बदलने पर, Verb का रूप ‘were rescued’ रहेगा; जैसे— The flood victims were rescued by the disaster management team."}, {"id": "115422", "question": "<strong>Select the most appropriate idiom for the underlined segment in the following sentence</strong></p> <p>Due to unexpected medical bills and rising living costs, the family began to <ins><strong>experience financial pressure</strong></ins>, struggling to make ends meet each month", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Taper off", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Keep liquidity tight", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Feel the squeeze", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Rear one’s head"], "correct_answer": 2, "solution": "<strong>C) Feel the squeeze</strong> (idiom) – To experience financial pressure or hardship. आर्थिक दबाव महसूस करना"}, {"id": "115463", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>“I am going to walk to the market to check which shops are open,” said Anant.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Anant said that he is going to walk to the market to check which shops were open.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Anant said that he will be going to walk to the market to check which shops were open.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Anant said that he went for a walk to the market to check which shops were open.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Anant said that he was going to walk to the market to check which shops were open"], "correct_answer": 3, "solution": "'he was going' का प्रयोग होगा क्योंकि मुख्य वाक्य 'said Anant' Past Tense में है, और वाक्य को Indirect Speech में बदलते समय, Direct Speech में प्रयोग किए गए Present Continuous Tense 'am going' को Past Continuous Tense 'was going' में बदलना होगा। 'are' को 'were' से बदलना होगा क्योंकि यह भी Past Tense के अनुसार बदला जाता है। जैसे— Anant said that he was going to walk to the market to check which shops were open."}, {"id": "115459", "question": "<strong>Select the option that expresses the given sentence in the active or passive voice.</strong></p> <p>Fifteen children were rescued from an unregistered home by the police", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The police have rescued fi fteen children from an unregistered home.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The police rescued fi fteen children from an unregistered home.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The police were rescued fi fteen children from an unregistered home.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Fifteen children rescued the police from an unregistered home."], "correct_answer": 1, "solution": "'rescued' का प्रयोग होगा क्योंकि मुख्य वाक्य में verb 'were rescued' Past Tense में है और यह Passive Voice में है। Passive Voice में object (children) को subject बनाया जाता है और verb को 'to be' के रूप में past participle में इस्तेमाल किया जाता है। Active Voice में वही क्रिया (rescued) Past Tense में रहती है, लेकिन subject (police) मुख्य भूमिका में होता है। अतः Active Voice बनाने पर भी Verb का प्रयोग Past Tense में रहेगा, जैसे— The police rescued fifteen children from an unregistered home."}, {"id": "115461", "question": "<strong>Select the correct passive form of the given sentence</strong>.</p> <p>How many languages do you learn at school?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Languages are learnt by how many at school?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> How many languages have you being learnt by you learning at school?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> How many languages will you learn at school?", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> How many languages are being learnt by you at school?"], "correct_answer": 3, "solution": "'are being learnt' का प्रयोग होगा क्योंकि मुख्य वाक्य 'do you learn' Present Continuous Tense में है और यह Active Voice में है। Passive Voice में subject (you) को object (languages) बनाया जाता है और verb को 'to be' के रूप में present participle में इस्तेमाल किया जाता है। अतः वाक्य Passive Voice में बदलने पर, Verb का रूप ‘are being learnt’ रहेगा; जैसे— How many languages are being learnt by you at school?"}, {"id": "115437", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>a. Union Finance Minister Nirmala Sitharaman’s full Union Budget speech outlined India’s plan to become an economic powerhouse or the vision of a Viksit Bharat by 2047, with a continued focus on the four major categories of the population, i.e., the poor, women, youth, and farmers. </p> <p>b. There is an emphasis on addressing immediate needs such as employment, skilling, and a focus on micro, small and medium enterprises and the middle class, with a specific focus on thematic domains that include agriculture, urban development and energy security. </p> <p>c. Overall allocation for children is ₹1,09,921 crore, which marks a 5.5% increase from the previous year; 77.3% of the child Budget is allocated to education.</p> <p>d. The overall fiscal outlay in the Union Budget 2024-25 (Budget Estimate – BE) stands at ₹4,820,512 crore, an increase of 7% over the 2023-24 (BE) and 7.3% over 2023-24 (Revised Estimate – RE).", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, b, a, c", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> c, a, b, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> b, c, d, a", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> c, b, a, d"], "correct_answer": 1, "solution": "c: (c) specific detail देता है कि बच्चों के लिए इस बार के बजट में कितना पैसा (₹1,09,921 करोड़) आवंटित किया गया है और पिछले साल के मुकाबले कितना percentage increase (5.5%) हुआ है। यह paragraph की शुरुआत के लिए एक base है"}, {"id": "115426", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The customs officers seized a large quantity of __________ that was being smuggled into the country hidden inside cargo shipments.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Artifacts", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Contraband", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Commodities", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Valuables"], "correct_answer": 1, "solution": "<strong>B) Contraband'</strong> का use होगा क्योंकि \"contraband\" का अर्थ होता है अवैध रूप से आयात या निर्यात किया जाने वाला सामान। वाक्य में बताया गया है कि कस्टम अधिकारियों ने एक बड़ी मात्रा में अवैध रूप से देश में लाई गई वस्तुओं को जब्त किया, इसलिए 'contraband' यहाँ सही है। जबकि 'Artifacts' का अर्थ है प्राचीन कलाकृतियाँ, 'Commodities' का अर्थ है वस्त्र, अनाज या अन्य उपयोगी वस्तुएं, और 'Valuables' का अर्थ है मूल्यवान वस्तुएं, जो इस संदर्भ में फिट नहीं होती हैं।"}, {"id": "115433", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>A region battered by violent conflict for the brutal October 7 attack on Israel / by Hamas last year now holds / its breath following the killing of Hassan Nasrallah, leader of / the Shiite militant group Hezbollah, in Beirut in an Israeli airstrike.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> A region battered by violent conflict for the brutal October 7 attack on Israel", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> by Hamas last year now holds", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> its breath following the killing of Hassan Nasrallah, leader of", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> the Shiite militant group Hezbollah, in Beirut in an Israeli airstrike"], "correct_answer": 0, "solution": "<strong>A)</strong> 'for' के बदले '<strong>since</strong>' का प्रयोग होगा क्योंकि 'for' का प्रयोग समय की अवधि (जो Past, Present, या Future में हो सकती है) दिखाने के लिए होता है, जबकि 'since' का प्रयोग किसी समय का जिक्र करने के लिए किया जाता है, जब कोई क्रिया Past में शुरू होकर अब तक जारी रहती है। इस वाक्य में, घटना अक्टूबर 7 के हमले के बाद शुरू होकर अभी भी जारी है, इसलिए ‘since’ का प्रयोग उचित होगा; जैसे— “The situation has been tense since the conflict began last year.”"}, {"id": "115436", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>P. Piracy in the Red Sea, the conflict in Gaza and Lebanon, and the effects of Russia’s aggression against Ukraine on agricultural and oil trade require our joint efforts to ensure a free, open, and prosperous Indo-Mediterranean.</p> <p>Q. It is also crucial for digital connectivity: the Blue-Raman submarine data cables will soon connect Genoa with Mumbai.</p> <p>R. This region is vital for global trade, especially for Italy which ranks sixth among the world’s largest exporters.</p> <p>S. In this age of ‘polycrisis’, Italy and India share common interests but also joint challenges in the Indo-Mediterranean Sea.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> SPQR", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QPRS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QRPS", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> SRQP"], "correct_answer": 3, "solution": "R: इसके बाद R आता है, जो इस क्षेत्र की global trade में भूमिका पर जोर देता है। इटली, जो दुनिया का छठा सबसे बड़ा निर्यातक (sixth-largest exporter) है, के लिए यह क्षेत्र बेहद महत्वपूर्ण है। यह sentence क्षेत्र की economic importance को रेखांकित करता है और समझाता है कि क्यों यह स्थान इतना अहम है, विशेष रूप से इटली के लिए।"}, {"id": "115439", "question": "<strong>Some sentences are given below. While the first and the last sentences (1 and 2) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>1. On September 20, 2024, Justice A.S. Chandurkar of the Bombay High Court broke a tie that emanated out of a previously split verdict and delivered a ruling in defence of the right to free speech.</p> <p>A. This law, had it been allowed to stand, would have given the Union government an Orwellian carte blanche to decide for us how any news about its operations ought to be carried on the Internet.</p> <p>B. He declared unconstitutional an amendment made to the Information Technology (Intermediary Guidelines and Digital Media Ethics Code) Rules, 2021 (IT Rules).</p> <p>C. The provision in question, Rule 3(1)(b)(v), casts an onerous obligation on intermediaries — companies that facilitate the use of the Internet, ranging from our service providers to social media platforms.</p> <p>D. If the Union government’s “Fact Check Unit” (FCU), which had been created under the amendment, identified any reporting on the government’s business as fake, false, or misleading, intermediaries were required to make reasonable efforts not to host, display, upload, or publish such information.</p> <p>2. Should they choose to ignore a directive they stood to lose their “safe harbour” — an immunity from liability which is integral to the design of the Information Technology (IT) Act, 2000 and the protections it offers both to businesses and to the larger public’s right to free expression.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BADC", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BACD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCDA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCAD"], "correct_answer": 1, "solution": "1:<strong> </strong><strong>(1)</strong> paragraph की introduction है जो बताती है कि Justice A.S. Chandurkar ने 20 सितंबर 2024 को free speech के अधिकार के पक्ष में फैसला दिया। यह starting statement है जो घटना का context देता है और बताता है कि यह फैसला किससे संबंधित है।"}, {"id": "115423", "question": "<strong>Select the most appropriate idiom to fill in the blank</strong></p> <p>When Sarah joined the new project team, she ________________ , quickly grasping the requirements and delivering results within the first week.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cleft stick", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Hit the ground running", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Err on the side of caution", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Elephant back to the forest"], "correct_answer": 1, "solution": "<strong>B)</strong> <strong>Hit the ground running</strong> (idiom) – To start a new activity or job with a lot of energy and enthusiasm, quickly achieving progress. नई गतिविधि या कार्य को बहुत ऊर्जा और उत्साह के साथ प्रारंभ करना, और तुरंत प्रगति हासिल करना।"}, {"id": "115418", "question": "<strong>Select the word which means the same as the group of words underlined in the given sentence</strong></p> <p>Honesty is <ins><strong>a quality that forms part of your character or personality</strong><del>,</del></ins> reflecting how genuine and trustworthy you are in all your interactions.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Aspect", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Feature", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Trait", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Parameter"], "correct_answer": 2, "solution": "C) <strong>Trait</strong> (noun) – A quality or characteristic that forms part of a person's nature or personality. <strong>विशेषता</strong>"}, {"id": "115424", "question": "<strong>Select the most appropriate meaning of the underlined idiom</strong></p> <p>The recent economic crisis has <ins><strong>dealt a blow</strong></ins> to the small business sector, causing many companies to shut down.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Improved the situation for", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Offered financial support to", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Caused harm or setback to", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Created new opportunities for"], "correct_answer": 2, "solution": "<strong>C) Dealt a blow</strong> (idiom) – Caused harm or setback to नुकसान या झटका पहुँचाना"}, {"id": "115427", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>The politician’s scandalous behavior threatened to ______ his otherwise spotless reputation.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> exalt", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> purify", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> taint", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> invigorate"], "correct_answer": 2, "solution": "<strong>C) 'Taint'</strong> का उपयोग होगा क्योंकि \"taint\" का अर्थ है किसी की छवि, नाम या स्थिति को दूषित करना। वाक्य में कहा गया है कि राजनेता का घोटाले वाला व्यवहार उसकी बेदाग छवि को खतरे में डाल रहा है, इसलिए 'taint' यहाँ सही है। जबकि 'Exalt' का अर्थ है महिमामंडन करना, 'Purify' का अर्थ है शुद्ध करना, और 'Invigorate' का अर्थ है सशक्त करना, जो इस संदर्भ में सही नहीं हैं।"}, {"id": "115432", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>Despite recent attempts at bolstering the public healthcare management system, 60 per cent of Indians continue / to depend on the private sector for their medical needs. / A large number of other key cogs in the healthcare wheel, / pathology centres and laboratories, is also in the private sector.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> A large number of other key cogs in the healthcare wheel,", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Despite recent attempts at bolstering the public healthcare management system, 60 per cent of Indians continue", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> to depend on the private sector for their medical needs.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> pathology centres and laboratories, is also in the private sector."], "correct_answer": 3, "solution": "<strong>D) </strong>'is' के बदले '<strong>are</strong>' का प्रयोग होगा क्योंकि “A number of” (कुछ गिनने योग्य संज्ञा) के साथ हमेशा Plural Verb का प्रयोग होता है, जबकि “The number of” (कुछ गिनने योग्य संज्ञा) के साथ हमेशा Singular Verb का प्रयोग होता है; अत: “A number of” के बाद Plural Noun ‘pathology centres and laboratories’ के साथ Plural Verb ‘are’ का प्रयोग उचित होगा। जैसे— “A number of students are participating in the event.”"}, {"id": "115431", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>The new skyscraper in the city center was so <ins><strong>conspicuous</strong> </ins>that it became a landmark within days of its completion.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Atrocious", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Unnoticeable", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Austere", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Callous"], "correct_answer": 1, "solution": "प्रकट, स्पष्ट"}, {"id": "115421", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a spelling error</strong>.</p> <p>His agression towards others / created a hostile work environment / that was hard to manage / and led to conflicts.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> His agression towards others", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> created a hostile work environment", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> that was hard to manage", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> and led to conflicts."], "correct_answer": 0, "solution": "<strong>A)</strong> The correct spelling of ‘<strong>agression</strong>’ is ‘<strong>aggression</strong>’ which means “hostile or violent behavior or attitudes” शत्रुतापूर्ण व्यवहार, आक्रामकता"}, {"id": "115428", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>The speaker's lecture was filled with nothing but <ins><strong>platitudes</strong></ins>, offering no fresh ideas or insights.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Revelation", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Banality", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Enigma", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Propensity"], "correct_answer": 1, "solution": "<strong>Synonym:</strong> <strong>Banality</strong> (noun) – Something that is boring or ordinary, lacking in originality, commonplace. साधारण, नीरस"}, {"id": "115430", "question": "<strong>Select the most appropriate ANTONYM of the underlined word</strong></p> <p>The research aims to <ins><strong>attenuate</strong> </ins>the harmful effects of air pollution on public health.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Strengthen", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Exacerbate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Expand", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Magnify"], "correct_answer": 1, "solution": "Antonym: <strong>Exacerbate</strong> (verb) – To make a problem or bad situation worse. बिगाड़ना ( किसी समस्या, बुरी स्थिति को बदतर करना)"}, {"id": "115419", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a spelling error</strong></p> <p>The new policy will have a significant / affect on all employees / improving efficiency / and productivity levels.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The new policy will have a significant", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> affect on all employees", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> improving efficiency", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> and productivity levels."], "correct_answer": 1, "solution": "<strong>B)</strong> The correct option is B – affect on all employees. The word “affect” is incorrectly used here. The correct spelling should be “effect” which means \"a change that is a result or consequence of an action or other cause\" (प्रभाव डालना)."}, {"id": "115416", "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words</strong>.</p> <p>The fact or process of being set free from legal, social, or political restrictions", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Authorisation", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Emancipation", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Statute", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Enactment"], "correct_answer": 1, "solution": "<strong>B)</strong> <strong>Emancipation</strong> (noun) – The fact or process of being set free from legal, social, or political restrictions. बन्धनमुक्ति"}, {"id": "115464", "question": "<strong>Select the option that expresses the given sentence in reported speech.</strong></p> <p>He said to his sister, “Please help me with my homework.”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> His sister told him that he should help her with her homework.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> His sister was asked by her brother that she should help him with his homework.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> He told his sister that she should help him with his homework.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> He requested his sister to help him with his homework."], "correct_answer": 3, "solution": "'requested' का प्रयोग होगा क्योंकि मुख्य वाक्य में 'Please' शब्द का प्रयोग किया गया है, जो विनती या अनुरोध (request) को व्यक्त करता है। Direct Speech में 'Please' के प्रयोग को Indirect Speech में बदलते समय, 'requested' का प्रयोग किया जाता है। 'to help him with his homework' का प्रयोग Indirect Speech में किया जाएगा क्योंकि यह 'Please help me with my homework' को Indirect Speech में बदलने का सही तरीका है। जैसे— He requested his sister to help him with his homework."}, {"id": "115462", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>Sam said, \"Pa, I am a big boy now and don't need to drink milk.\"", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sam told his father that I would be a big boy now and won't need to drink milk.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sam told his father that I am a big boy now and don't need to drink milk.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Sam told his father that he was a big boy then and didn't need to drink milk.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sam told his father that he is a big boy now and don't need to drink milk"], "correct_answer": 2, "solution": "'he was' का प्रयोग होगा क्योंकि मुख्य वाक्य 'Sam said' Past Tense में है, और वाक्य को Indirect Speech में बदलते समय, Direct Speech में प्रयोग किए गए Present Tense (am) को Past Tense (was) में बदलना होगा। 'now' को 'then' से बदलना होगा और 'don't' को 'didn't' में बदलना होगा क्योंकि यह भी Past Tense के अनुसार बदला जाता है। जैसे— Sam told his father that he was a big boy then and didn't need to drink milk."}, {"id": "115425", "question": "<strong>Select the most appropriate word to fill in the blank</strong></p> <p>During the emergency meeting, the spokesperson ________ the members to take immediate action to prevent further losses.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> implored", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> denounced", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> evaded", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> alleviated"], "correct_answer": 0, "solution": "<strong>'Implored'</strong> will be used because it means to emotionally urge or plead with someone. The sentence mentions that the spokesperson urged the members to take immediate action to prevent further losses, making 'implored' fitting here. Whereas, 'Denounced' means to criticize something, 'Evaded' means to avoid, and 'Alleviated' means to reduce or lessen a problem or suffering, which don't fit in this context"}, {"id": "115417", "question": "<strong>Select the word which means the same as the group of words underlined in the given sentence</strong></p> <p>Despite his best efforts, he found himself in <ins><strong>a state of not being able to decide what to do,</strong></ins> torn between pursuing his passion or following a stable career path.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Impasse", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Predicament", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Conundrum", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Quandary"], "correct_answer": 3, "solution": "<strong>D) Quandary</strong> (noun) – A state of perplexity or uncertainty over what to do in a difficult situation. दुविधा"}, {"id": "115429", "question": "<strong>Select the most appropriate synonym of the underlined word in the following sentence</strong></p> <p>The project team became completely <ins><strong>dysfunctional</strong> </ins>after the sudden departure of the team leader.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Impaired", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Operative", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Uniform", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Harmonious"], "correct_answer": 0, "solution": "Synonym: Impaired</strong> (adjective) – Weakened or damaged, especially in a way that affects normal functioning, defective, broken. <strong>बिगड़ा"}, {"id": "115434", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>Like in the past three years, the Delhi government (A)/ has framed an action plan to deal with the pollution (B)/ that engulf the city in the festival season (C)/ and continues almost all winter. (D)", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (D)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (B)", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> (A)", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> (C)"], "correct_answer": 3, "solution": "<strong>D)</strong> 'engulf' के बदले '<strong>engulfs</strong>' का प्रयोग होगा क्योंकि 'that' Clause में Verb का प्रयोग Antecedent ‘pollution’ के अनुसार होगा, जो Singular है। अत: Singular Verb 'engulfs' का प्रयोग उचित होगा। जैसे— “The smoke engulfs the entire city.”"}, {"id": "115420", "question": "<strong>Select the most appropriate spelling of the underlined word in the given sentence</strong>.</p> <p>The documentary was truly <ins><strong>facinating</strong></ins>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> facinaeting", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> fascinating", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> fasinating", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> fascineting"], "correct_answer": 1, "solution": "<strong>B) </strong>The correct spelling of ‘<strong>facinating</strong>’ is ‘<strong>fascinating</strong>’ which means “extremely interesting or charming” अत्यंत रोचक या आकर्षक."}, {"id": "115435", "question": "<strong>The following sentence has been split into four segments. Identify the segment that contains a grammatical error</strong></p> <p>The Reserve Bank of India has pegged the Indian economy to grow at 7.2 per cent this year./ Medium term forecasts, such as those by the IMF, expect/ the momentum to continuing over the coming years. / However, concern over the lack of quality jobs continues to persist.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The Reserve Bank of India has pegged the Indian economy to grow at 7.2 per cent this year.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Medium term forecasts, such as those by the IMF, expect", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> the momentum to continuing over the coming years.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> However, concern over the lack of quality jobs continues to persist."], "correct_answer": 2, "solution": "<strong>C)</strong> 'continuing' के बदले '<strong>continue</strong>' का प्रयोग होगा क्योंकि 'to' के बाद Verb का प्रयोग Base Form में होता है। 'To' के बाद Verb का Base Form (Infinitive) प्रयोग किया जाता है, जबकि 'continuing' Verb का Present Participle Form है। अत: 'continue' का प्रयोग सही है; जैसे— “The government expects the econ is even more difficult to get out of it. We seek bliss, divine union with the Source all our lives, but the world keeps getting in the way. There are so many inexplicable, incomprehensible ways of not coming home; a zillion distractions keep you from moving towards that goal.<br> We keep our minds alive through cravings and aversions – through should and should not. The mind must die for bliss to dawn. The abode of all the devas or divinities is bliss. Only in this physical body can you comprehend and uphold bliss.<br> Seeing our life and the universe as one unit of energy removes us from the mind’s chatter and brings us closer to our true nature. What does it mean to see everything as a unit of energy? Like the rainbow, whatever colour is there, it is still light. It doesn’t matter whether it’s blue, green, yellow, orange, or violet. In the same way, all different emotions are also part of one light, one energy.<br> Vedant, the highest knowledge, is about letting go and letting be. What are you ‘letting go’ of? The small mind. Due to ignorance, all the mental gymnastics that you go through becomes negative energy. We call them negative feelings because they restrict you. But still, it’s energy. The same energy becomes positive with wisdom. Energy with wisdom is bliss. That one field of consciousness from where everything has come, in which everything is, and which is everything, is called Brahmn. That’s what the Brahma Sutra or Vedant is all about. The Brahmn is all around us. It’s always there. This energy is wisdom and knowledge; when practised, it manifests as bliss. With ignorance, the same energy manifests as sadness, anger, rage, and jealousy.<br> <strong>What is the overall tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Persuasive", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.pn g can be inferred about achieving eternal bliss?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> It can be attained through material wealth and external achievements.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> It is achieved by overcoming the distractions of the world and uniting with the Divine.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> It is only possible for those who renounce their physical body.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> It is easy to attain once you have understood the teachings of Vedant."], "correct_answer": 1, "solution": "No solution available"}, {"id": "115451", "question": "<strong>Comprehension:</strong><br> The quadrennial confluence of the world’s finest athletes, the Olympics, is beginning in Paris from Friday. The latest edition does not have the constricting environment that preceded ‘Tokyo 2020’, held in 2021 in the wake of the COVID-19 pandemic. Yet, this arrives at a time of global churn. While Russia remains banned from the Games due to its war moves, Israel will be present despite some dissenting voices over the manner in which it has dealt with the Palestinian issue. Some individual Russians will compete under a neutral banner but the nation will miss team events. The Olympics, with its competitive spirit, will offer a level playing field featuring countries like the United States and China at one end and an island-country like Fiji at the other. Being part of the event bequeaths the title Olympian to athletes fortunate to qualify for this big bash, and winning a medal only further enhances that halo. Paris, and France at large, will be tested over the next fortnight as the Olympics, even if it vests the host with soft power, often affects the economy; indeed, there was some resistance emanating from the banks of the Seine.</p> <p>The U.S., China, Japan, Great Britain, Australia, Germany and France are the behemoths chasing glory. However, the Games is also about the lone athlete dishing out magic and garnering attention, as Usain Bolt did in the past. Veteran Rafael Nadal and the latest tennis prince, Carlos Alcaraz, getting excited to represent Spain in tennis is another glimpse of the eternal allure of the Olympics. That the Games has even incorporated breakdancing is a pointer to the entertainment industry finding a larger imprint while lines between sport and art constantly blur. With 204 countries, including India, besides neutral athletes and a refugee team, jostling for a place on the victor’s podium, the Olympics provides a space for smaller units to carve a niche and stun bigger opponents. Morocco defeating Argentina in a tempestuous football game has already added zest to the Games. Above all, the Olympics grants hope and redemption, and for a strife-ridden country like Afghanistan, the event also serves as a diversion. The 1972 Munich edition marred by a terror strike on the Israeli contingent remains a harrowing memory and in a world on the boil, security will be a concern for the organising committee. That some members of the Australian women’s water polo squad tested positive for COVID-19 is also a reality check while all eyes are on Paris.</p> <p><strong>Based on the passage, which of the following can be inferred about the impact of hosting the Olympics on Paris?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Hosting the Olympics will unequivocally boost Paris' economy.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Hosting the Olympics might have mixed economic impac const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;

function ini(){
    disQ();
    strT();
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
