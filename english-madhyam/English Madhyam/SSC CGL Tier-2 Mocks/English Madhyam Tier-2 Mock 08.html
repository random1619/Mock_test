<!DOCTYPE html>

<title>Mocks Wallah</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4361ee;--s:#3f37c9;--ok:#4cc9f0;--err:#f72585;--warn:#f8961e}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;color:#2d3436;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;width:100%;background:#fff;padding:16px 20px;z-index:100;box-shadow:0 2px 15px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:16px}
.ttl{font-weight:700;font-size:18px;color:var(--p)}
.tmr{font-family:monospace;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;font-size:14px}
.sub{background:linear-gradient(135deg,var(--err),#c1121f);border:none;color:#fff;padding:10px 20px;border-radius:25px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s ease}
.sub:active{transform:scale(.95)}
.main{margin:80px 0 90px;padding:0 20px}
.qc{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.05);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--p),var(--s))}
.qn{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:700;font-size:12px;margin-bottom:16px}
.qt{font-size:16px;line-height:1.6;margin-bottom:24px;color:#212529;font-weight:500}
.qt p{margin:8px 0}
.qt strong{font-weight:700}
.qt em{font-style:italic}
.qt u{text-decoration:underline}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:#fff;border:1px solid #e9ecef;border-radius:14px;padding:16px;cursor:pointer;transition:all .2s ease;position:relative;font-size:14px;line-height:1.4;text-align:left}
.opt p{margin:4px 0}
.opt strong{font-weight:700}
.opt em{font-style:italic}
.opt u{text-decoration:underline}
.opt:hover{border-color:var(--p)}
.opt:active{transform:scale(.98)}
.opt.sel{background-color:#edf2ff;border-color:var(--p);color:var(--p)}
.opt.cor{background-color:#ebfbee;border-color:#2b8a3e;color:#2b8a3e}
.opt.inc{background-color:#fff5f5;border-color:#c92a2a;color:#c92a2a}
.opt.unat{background:#f8f9fa;border-color:#dee2e6;color:#6c757d}
.opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;transition:all .2s ease}
.opt.sel::after{background:var(--p);content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.cor::after{background:#2b8a3e;content:'✓';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.inc::after{background:#c92a2a;content:'✗';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px}
.opt.unat::after{background:transparent;content:'○';display:flex;align-items:center;justify-content:center;color:#6c757d;font-weight:700;font-size:14px}
.sol{background:#f8f9fa;border-radius:14px;padding:16px;margin-top:16px;border-left:4px solid var(--warn);display:none}
.sol h4{color:#e67700;margin-bottom:8px;font-weight:700;font-size:14px}
.sol-content{color:#495057;font-size:14px;line-height:1.6}
.sol-content p{margin:8px 0}
.sol-content strong{font-weight:700}
.sol-content em{font-style:italic}
.sol-content u{text-decoration:underline}
.nav{position:fixed;bottom:0;width:100%;background:#fff;padding:16px 20px;display:flex;justify-content:space-between;box-shadow:0 -2px 15px rgba(0,0,0,.08)}
.nb{padding:12px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.nb:disabled{opacity:.5;cursor:not-allowed}
.nb:not(:disabled):active{transform:scale(.95)}
.nb.prv{background:linear-gradient(135deg,#adb5bd,#6c757d);color:#fff}
.nb.nxt{background:linear-gradient(135deg,var(--err),#c1121f);color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;animation:fadeIn .3s ease}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{text-align:center;padding:32px 24px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px 20px 0 0}
.modal-header h2{font-weight:700;font-size:28px;margin-bottom:8px}
.modal-header p{font-size:16px;opacity:.9}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px}
.stat{text-align:center;padding:16px}
.stat h4{color:#6c757d;font-weight:600;font-size:12px;margin-bottom:8px;text-transform:uppercase}
.stat p{color:#212529;font-weight:700;font-size:18px}
.mark-breakdown{padding:0 20px;margin-bottom:16px}
.mark-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f4}
.mark-item:last-child{border-bottom:none}
.mark-label{color:#6c757d;font-size:14px}
.mark-value{font-weight:600;color:#212529}
.mark-value.positive{color:#2b8a3e}
.mark-value.negative{color:#c92a2a}
.total-marks{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 20px;text-align:center}
.total-marks h3{color:#212529;font-size:18px;font-weight:700;margin-bottom:4px}
.total-marks p{color:#6c757d;font-size:14px}
.modal-actions{padding:0 20px 20px;display:flex;gap:12px}
.act-btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all .2s ease}
.act-btn:active{transform:scale(.98)}
.act-btn.blue{background:#edf2ff;color:var(--p)}
.act-btn.green{background:#ebfbee;color:#2b8a3e}
.close{position:absolute;top:15px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
</style>

<script>
const qs=[{"id": "126339", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>I said to Kirti, \"These plants will take about two months to flower", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I told Kirti that those plants take about two months to flower.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I told Kirti that these plants will take about two months to flower.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> I told Kirti that those plants will be taking about two months to flower.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> I told Kirti that those plants would take about two months to flower"], "correct_answer": 3, "solution": "<strong>Direct से Indirect Speech में बदलने के लिए</strong>, Reporting Verb (\"said to\") को \"told\" में बदला जाता है और Reported Speech में प्रयुक्त Pronouns और Verb Tense को बदलने के लिए नियमों का पालन किया जाता है। यदि Reporting Verb Past Tense में है, तो Reported Speech के Tense को Past में बदला जाता है। इसके अलावा, \"these\" को \"those\" में और \"will\" को \"would\" में बदला जाता है।"}, {"id": "126321", "question": "<strong>Select the most appropriate Antonym of the given word</strong>.</p> <p>The night sky was filled with <strong>countless</strong> stars, creating a breathtaking view that seemed infinite.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Function", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Few", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Anguish", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Fellow being"], "correct_answer": 1, "solution": "<strong>Antonym</strong>: <strong>Few</strong> (adjective) – A small number of, some, limited. कुछ"}, {"id": "126342", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>P. However, it also raises questions about its impact on the industrial sector, which has long benefited from lower electricity rates compared to neighbouring states.</p> <p>Q. For a state grappling with fiscal challenges, this decision underscores a necessary shift towards fiscal discipline.</p> <p>R. Himachal Pradesh has made a bold move by withdrawing power subsidies to large industries, aiming to save around Rs 700 crore annually.</p> <p>S. The state government's decision is pragmatic.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> PSQR", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QPRS", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> QRPS", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> RQPS"], "correct_answer": 3, "solution": "R: The paragraph starts with R, which introduces the main topic: This sentence sets the context and provides the basis for the subsequent discussion."}, {"id": "126338", "question": "<strong>Select the correct Indirect form of the given sentence.</strong></p> <p>“It is a fact that kids model parental behaviour,” said the researcher.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The researcher said that it is a fact that kids model parental behaviour.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The researcher says that it is a fact that kids model parental behaviour.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The researcher has said that it is a fact that kids have modeled parental behaviour.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The researcher has been saying that kids model parental behaviour."], "correct_answer": 0, "solution": "<strong>Direct से Indirect Speech में बदलने के लिए</strong>, वाक्य की Reporting Verb (\"said\") और Reported Speech के Tense का सही उपयोग किया जाता है। अगर Reporting Verb Past में है और Reported Speech का वाक्य एक Universal Truth या Fact को दर्शाता है, तो Reported Speech का Tense नहीं बदला जाता। इस वाक्य में \"It is a fact that kids model parental behaviour\" एक सत्य कथन (Universal Truth) है, इसलिए इसे Indirect Speech में बदलते समय Present Tense में ही रखा गया है।"}, {"id": "126340", "question": "<strong>Select the correct indirect form of the given sentence.</strong></p> <p>The traveller inquired, \"Will there be a shelter for strangers?”", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The traveller inquired if would there be a shelter for strangers.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The traveller inquired whether will there be a shelter for strangers.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> The traveller inquired if there would be a shelter for strangers.", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> The traveller inquired if there will be a shelter for strangers"], "correct_answer": 2, "solution": "To convert <strong>Direct Speech</strong> to <strong>Indirect Speech</strong>, we follow these rules:"}, {"id": "126336", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong>.</p> <p>Who stole my tickets?", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My tickets was stolen by whom?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My tickets got stolen by who?", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> By whom were my tickets stolen?", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> My tickets were stolen by who?"], "correct_answer": 2, "solution": "<strong>Active से Passive Voice में बदलने के लिए</strong>, Active वाक्य का Object Passive वाक्य का Subject बन जाता है। Verb को Passive में बदलते समय सही Tense का प्रयोग किया जाता है। Active वाक्य में \"Who\" Subject है, \"stole\" Verb (Past Simple Tense) है, और \"my tickets\" Object है। Passive में बदलने पर Object \"My tickets\" Subject बन गया है, Verb को \"were stolen\" (Past Simple Passive) में बदला गया है, और \"Who\" को Passive में \"By whom\" में बदला गया है।"}, {"id": "126325", "question": "<strong>Select the option that can be used as a one-word substitute for the given group of words.</strong></p> <p>During vacations, Geeta saw a <strong><ins>saltwater lake separated from the sea by rocks and sand</ins> </strong>where she did kayak for the first time.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> lagoon", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> river", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ditch", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> sea"], "correct_answer": 0, "solution": "A) <strong>Lagoon</strong> (noun) – A saltwater lake separated from the sea by rocks and sand. लैगून"}, {"id": "126332", "question": "<strong>Select the most appropriate idiom to fill in the blank.</strong></p> <p>This gun should be handled with care and ____________.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> kept at arm’s length", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> mince the matters", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> nip in the bud", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> shot for safety"], "correct_answer": 0, "solution": "A) <strong>kept at arm’s length</strong> (idiom) – to avoid being closely involved with someone or something किसी से या किसी चीज़ से करीबी रूप से शामिल होने से बचना"}, {"id": "126335", "question": "<strong>Select the option that expresses the given sentence in passive voice</strong>.</p> <p>The little boy called up his best friend on his birthday.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> His best friend has been called up by the little boy on his birthday.", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check /reload.png\"/></p> Admiral"], "correct_answer": 2, "solution": "C) <strong>Mercenary</strong> (noun) – A soldier who fights for the sake of money. पैसे के लिए लड़ने वाला सैनिक"}, {"id": "126331", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>He _________ a long distance", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> running", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> run", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> runned", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ran"], "correct_answer": 3, "solution": "• 'Ran' will be used because it is the past tense of the verb \"run,\" and the sentence needs a verb that indicates the action of covering a long distance has already happened. While 'running' indicates an ongoing action, 'run' is the base form of the verb, and 'runned' is an incorrect and nonstandard past tense, which don't fit in this context."}, {"id": "126330", "question": "<strong>Select the most appropriate option to fill in the blank.</strong></p> <p>Many developing nations are having a ___________ economy these days.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> resounding", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> boosting", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> booming", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ringing"], "correct_answer": 2, "solution": "‘<strong>Booming'</strong> should be used because in the entire context, the sentence is discussing the growth and advancement of the economy in developing nations. Here, through \"Many developing nations are having a ___________ economy these days\", it portrays that rapid progress in the economy, indicating fast development and economic improvement. Thus, \"booming\" would be the most appropriate choice."}, {"id": "126320", "question": "<strong>Select the most appropriate meaning of the given idiom.</strong></p> <p>Nip in the bud", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To publicise a long-kept secret", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To stop something from growing beyond limit", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> To complete a prolonged or unfinished work", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> To suppress something at an early stage"], "correct_answer": 3, "solution": "D) <strong>Nip in the bud</strong> (idiom) – To suppress something at an early stage शुरुआती चरण में कुछ दबा देना"}, {"id": "126327", "question": "Identify the word that is <strong>misspelt</strong>.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Immediate", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> iliterate", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> implement", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Illogical"], "correct_answer": 1, "solution": "B) </strong>The word that is misspelt is ‘<strong>iliterate’</strong>. The correct spelling of the word is ‘illiterate’, meaning <strong>अनपढ़, </strong><strong>निरक्षर"}, {"id": "126329", "question": "Select the <strong>INCORRECTLY </strong>spelt word.</p> <ol>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Greave", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Groan", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Guarentee", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Gravely"], "correct_answer": 2, "solution": "• The correct spelling of 'Guarentee' is 'Guarantee'. Hence, it is the incorrectly spelled word"}, {"id": "126318", "question": "<strong>Select the best express synonym of the highlighted Phrasal verb.</strong></p> <p>We need to <strong>ramp up</strong> production to meet the increasing demand.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Increase", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Sabotage", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Cripple", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Destroy"], "correct_answer": 0, "solution": "<strong>A) Ramp up</strong> (phrasal verb) – Increase, boost, enhance, step up, intensify बढ़ाना"}, {"id": "126315", "question": "<strong>Select the most appropriate synonym of the given word.</strong></p> <p>The <strong>rowdy</strong> crowd caused havoc at the stadium, leading to an early end to the match.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Indigenous", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Boisterous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Strenuous", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Beautiful"], "correct_answer": 1, "solution": "<strong>Indigenous</strong> (adjective) – Native, aboriginal, original, local स्वदेशी"}, {"id": "126343", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>a. The Arunachal spots — including one in the Yangtse area north-east of Tawang, where the two sides had clashed in December 2022 — have been under Indian control for decades. Delhi knows very well that if you give Beijing an inch, it will end up taking a mile.</p> <p>b. The unreasonable demand speaks volumes about China’s dubious intentions.</p> <p>c. The irony is not lost on anyone: Chinese negotiators have suggested to India that their troops be allowed to patrol in two sensitive areas along Arunachal Pradesh, even as Chinese soldiers have denied Indian troops access to four patrolling points in eastern Ladakh over the past four years.</p> <p>d. No trade-off or quid pro quo of any sort should be acceptable to India.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> d, b, a, c", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> c, a, b, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, b, c, d", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> a, c, b, d"], "correct_answer": 1, "solution": "c: The paragraph begins with c, as it introduces the topic by highlighting the irony of the Chinese suggestion. It sets the context by mentioning how Chinese negotiators proposed that their troops be allowed to patrol in sensitive areas of Arunachal Pradesh, while simultaneously denying Indian troops access to four patrolling points in eastern Ladakh. This statement establishes the background and tone for the paragraph."}, {"id": "126341", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p>A. In the United Nations calendar, September 26 is the International Day for the Total Elimination of Nuclear Weapons</p> <p>B. This year’s General Assembly agenda includes a session on the Treaty on the Prohibition of Nuclear Weapons (TPNW), or the Ban Treaty, as distinguished from the Treaty on the Non-Proliferation of Nuclear Weapons, NPT</p> <p>C. Over the Israel-Palestine conflict; and in responding to accelerating climate change and other related inequalities</p> <p>D. It will be a chance to take stock at a time when the UN is bitterly divided — over the war in Ukraine;", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDAC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCAD", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ABDC"], "correct_answer": 3, "solution": glishmadhyam.info/public/exam-panel/img/reload.png\"/></p> there"], "correct_answer": 0, "solution": "No solution available"}, {"id": "126348", "question": "<strong>Comprehension</strong></p> <p>The Cabinet Committee on Security cleared the project to design and develop the Advanced Medium Combat Aircraft (AMCA) on March 7. This aircraft will be a fifth-generation, medium-weight stealth fighter jet. The Defence Research &amp; Development Organisation (DRDO) is spearheading the project, valued at around Rs 15,000 crore. Under this project, DRDO’s Aeronautical Development Agency (ADA) will collaborate with various private and public sector agencies to develop the stealth jet and associated technology. It’s anticipated that approximately five prototypes will be built within a span of five years. The manufacturing of these prototypes will involve the public sector unit Hindustan Aeronautics Limited (HAL). This endeavour will propel India into a select group of nations either possessing or developing 5th generation fighter jets.</p> <p>A fifth-generation fighter jet possesses four primary attributes. Firstly, it boasts stealth capabilities, rendering it nearly invisible to enemy radars due to its minimized radar cross-section. Secondly, it can achieve ‘Supercruise’, enabling it to fly faster than the speed of sound without relying on fuel-intensive afterburners. Thirdly, it is equipped with advanced avionics, sensors, and network-centric operations. Increasingly, artificial intelligence is being integrated to enhance the pilot-aircraft interface, allowing a single pilot to manage both flight and combat operations. Lastly, it has the ability to outperform adversaries by detecting and engaging targets from considerable distances, facilitated by active electronically scanned array (AESA) radars. Achieving stealth involves meticulously shaping the aircraft to scatter radar waves rather than reflecting them, in addition to employing specialized materials and paints known as ‘Radar Absorbing Structures’ to further minimize radar reflectivity. In stealth mode, these fighters conceal their weapons within internal bays, relying solely on internally-carried fuel to avoid radar detection, as external weapons or fuel tanks compromise stealth by reflecting radar waves.</p> <p>The AMCA is slated for development in two phases. Phase 1 will result in the AMCA Mk-1, powered by the US GE-414 engine. Phase 2 will see the development of the AMCA Mk-2, featuring a more advanced and powerful engine. However, it’s important to note that the projected induction of the AMCA by 2035 may not result in a ‘Completely 5th-generation fighter aircraft’.</p> <p>China is poised to surpass the US in stealth aircraft production. China’s J-20A Mighty Dragon, its first fifth-generation fighter, was expected to outnumber the US Air Force’s F-22 Raptor fleet last year. Notably, the F-22 Raptor, the first operational fifth-generation fighter, has ceased production, with the US focusing on the more cost-effective F-35 Lightning II stealth fighter family. India withdrew from the Fifth Generation Fighter Aircraft program (FGFA) in April 2018, a joint effort with Russia aimed at developing an India-specific variant of the Russian Su-57 stealth fighter. Following a series of challenges, India’s indigenous LCA Tejas has been inducted by the Indian Air Force. Despite this, India’s fighter squadron strength continues to decline, falling short of the sanctioned strength of 42 squadrons. New Delhi is exploring various options to bolster squadron numbers, recognising that a few Rafale and Tejas LCA squadrons are insufficient to bridge the gap. From the Indian Air Force’s perspective, the urgency and importance of acquiring manned stealth fighters necessitate Cabinet Committee on Security approval for the AMCA project. While the project has received the much-awaited green light, it’s crucial to remain vigilant regarding potential pitfalls and the project’s impact on the Indian Air Force’s combat capabilities. With meticulous planning and execution, it could prove to be a game-changer.</p> <p><strong>Q What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Optimistic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pessimistic", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neutral", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Critical"], "correct_answer": 0, "solution": "No solution available"}, {"id": "126349", "question": "<strong>Comprehension</strong></p> <p>The Cabinet Committee on Security cleared the project to design and develop the Advanced Medium Combat Aircraft (AMCA) on March 7. This aircraft will be a fifth-generation, medium-weight stealth fighter jet. The Defence Research &amp; Development Organisation (DRDO) is spearheading the project, valued at around Rs 15,000 crore. Under this project, DRDO’s Aeronautical Development Agency (ADA) will collaborate with various private and public sector agencies to develop the stealth jet and associated technology. It’s anticipated that approximately five prototypes will be built within a span of five years. The manufacturing of these prototypes will involve the public sector unit Hindustan Aeronautics Limited (HAL). This endeavour will propel India into a select group of nations either possessing or developing 5th generation fighter jets.</p> <p>A fifth-generation fighter jet possesses four primary attributes. Firstly, it boasts stealth capabilities, rendering it nearly invisible to enemy radars due to its minimized radar cross-section. Secondly, it can achieve ‘Supercruise’, enabling it to fly faster than the speed of sound without relying on fuel- mg alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ii and iii only"], "correct_answer": 2, "solution": "No solution available"}, {"id": "126352", "question": "<strong>Comprehension:</strong></p> <p>Have you ever stared up at the night sky and wondered if we were alone? Or maybe you’ve pondered what it truly means to be “good” or “bad”? Or why do millions of birds fly in perfect unison across the sky? Philosophy isn’t some stuffy subject locked away in a library. It’s like gazing at a breathtaking sunset and questioning everything you thought you knew. Is that fiery orange glow “real” or just a trick of light? Does the beauty of a sunset exist even when no one is around to witness it? These are the kinds of questions that philosophers love to ask. Throughout history, philosophers from all corners of the globe have wrestled with these big questions. They’ve debated the nature of existence, the power of our minds and the best way to live a fulfilling life.</p> <p>The scope of philosophy is vast, encompassing various subfields such as metaphysics (the study of the nature of reality), epistemology (the study of knowledge and belief), ethics (the study of moral principles), logic (the study of valid reasoning), aesthetics (the study of beauty and art), political philosophy (the study of governance and justice) and many others. Philosophy also engages in interdisciplinary dialogue with other fields, enriching both philosophy and these other disciplines.</p> <p>The importance of philosophy in higher education is immense. The decline in the quality of higher education that we always ponder on in higher education is due to a lack of imparting philosophy in our curriculum. Students and teachers of the present generation lack an understanding of learning and teaching philosophy. Though the National Education Policy (NEP)-2020 is constructed with philosophy as the background, it fails to infiltrate the minds of students or teachers. Teaching philosophy is essential for fostering intellectual growth, ethical awareness and critical engagement with the world, ultimately enriching both individuals and society as a whole.</p> <p>Even in the PhD programme, though the degree is Doctor of Philosophy, most universities do not teach philosophy. Philosophy equips doctoral students with the intellectual toolkit needed to excel as independent researchers. Exposure to diverse philosophical perspectives cultivates open-mindedness. Doctoral students learn to consider different viewpoints, fostering intellectual curiosity and a willingness to learn from others.</p> <p>This is crucial for collaboration and navigating the ever-evolving world of academic research. For instance, a science student might explore the philosophical underpinnings of the scientific method, while a literature student might delve into the concept of truth and interpretation. Philosophy hones critical thinking skills essential for doctoral research. Students learn to analyse arguments, identify biases and evaluate evidence. They develop the ability to ask probing questions, deconstruct assumptions and construct sound arguments supporting their research. Many doctoral programs involve research with ethical considerations. Philosophy provides a framework for ethical decision-making. Students grapple with ethical dilemmas in research design, data analysis and publication, preparing them to navigate the ethical complexities of their chosen field. Students learn to articulate their research questions, defend their findings and engage in scholarly debate with colleagues.</p> <p>The absence of philosophy education in higher education centres could result in a less intellectually engaged, ethically informed and critically minded society, potentially hindering progress in academia, governance and societal development. Even when new branches of science emerge over the years, one subject that stays relevant in every society, even in a space colony, will b riticized for diverting students' attention from specialized research to theoretical discussions that have limited applicability"], "correct_answer": 0, "solution": "No solution available"}, {"id": "126356", "question": "<strong>Comprehension:</strong></p> <p>By awarding the Nobel Prize in Literature to South Korean poet and novelist Han Kang this year, the Swedish Academy has done two things. It has looked eastwards, after going with European writers Jon Fosse and Annie Ernaux in the past two years; and it celebrates an “innovator in contemporary prose”. While announcing the name, the academy lauded the 53-year-old writer, the first Korean to win the Nobel Prize in Literature, “for her intense poetic prose that confronts historical traumas and exposes the fragility of human life”. With the human condition as her muse, specifically the question why and how humanity encompasses unspeakable depravity as well as indisputable acts of dignity and kindness, Han Kang has experimented with form and style to tell her stories. Her best-known work available in English is her 2007 novel, The Vegetarian, translated by Deborah Smith, and released in 2015. Winning the International Booker Prize in 2016, a decade after it was first published in Korean, the radical story, about a woman who gives up eating meat and finds solidarity only in the plant world, paved the way for her other novels to be translated into English and many other languages. Han Kang, who was born in the South Korean city of Gwangju, moved to Seoul when she was nine years old and studied Korean literature at university.</p> <p>Growing up amid books — her father is a novelist — she decided to follow in his footsteps but her artistic forays include art and music, which she uses in her narratives and word images. This is evident, for instance, in her 2016 novel, The White Book, where an unnamed narrator talks about grief — the death of an older sister “less than two hours into life” — through white objects including snow, salt, moon-shaped rice cake, fog and breast milk. Her latest novel, We Do Not Part, to be published in English early next year, is the story of a friendship between two women in the backdrop of the 1948 massacre in South Korea’s Jeju Island. A massacre from the 1980s of students and dissenters is also the setting for her most political novel, Human Acts (2016), in which souls of the dead are allowed to “witness their own annihilation”. Ever since the prize was handed out to American singer-songwriter Bob Dylan in 2016, the academy has been trying to pull itself back to purists. By picking Han Kang, the academy has a winner who, in her experimental style, conveys the power of literature to break barriers. The prize will invariably draw more attention to Korean literature — its dramas, cinema and music have been already ruling the globe ever since South Korean singer Psy burst forth with ‘Gangnam Style’ in 2012.</p> <p><strong>What is the tone of the passage?</strong>", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Critical", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> Celebratory", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Neutral", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> Pessimistic"], "correct_answer": 1, "solution": "No solution available"}, {"id": "126357", "question": "<strong>Comprehension:</strong></p> <p>By awarding the Nobel Prize in Literature to South Korean poet and novelist Han Kang this year, the Swedish Academy has done two things. It has looked eastwards, after going with European writers Jon Fosse and Annie Ernaux in the past two years; and it celebrates an “innovator in contemporary prose”. While announcing the name, the a const posMarks=3.0, negMarks=1.0;
let ci=0,tl=45*60,ti,fin=0,solMode=0,totalTime=0;

function ini(){
    disQ();
    strT();
}

function disQ(){
    const q=qs[ci];
    document.getElementById('qn').textContent=`Question ${ci+1} of ${qs.length}`;
    document.getElementById('qt').innerHTML=q.question;
    const oc=document.getElementById('opts'),sc=document.getElementById('sol');
    oc.innerHTML='';
    
    if(solMode){
        sc.style.display='block';
        document.getElementById('sol-text').innerHTML=q.solution||'No solution provided.';
        // Hide submit button in solution mode
        document.getElementById('sub-btn').style.display='none';
    }else{
        sc.style.display='none';
        // Show submit button in test mode
        document.getElementById('sub-btn').style.display='block';
    }
    
    q.options.forEach((o,i)=>{
        const od=document.createElement('div');
        od.className='opt';
        od.innerHTML=o;
        
        if(solMode){
            if(i===q.correct_answer) {
                od.classList.add('cor');
            } else if(ans[ci]===i) {
                od.classList.add('inc');
            } else if(ans[ci]===undefined) {
                od.classList.add('unat');
            }
            od.style.pointerEvents='none';
        }else{
            od.onclick=()=>sel(i);
            if(ans[ci]===i) od.classList.add('sel');
        }
        
        oc.appendChild(od);
    });
    
    upNav();
}

function sel(i){
    // If clicking the same option, deselect it (clear response)
    if(ans[ci]===i){
        delete ans[ci];
        document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    }else{
        // Select new option
        ans[ci]=i;
        document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('sel',idx===i));
    }
}

function upNav(){
    document.getElementById('pb').disabled=ci===0;
    const nb=document.getElementById('nb');
    
    if(solMode){
        // In solution mode, show same navigation as test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=()=>{
            if(ci<qs.length-1){
                ci++;
                disQ();
            }else{
                // Exit solution mode
                solMode=0;
                ci=0;
                disQ();
            }
        };
    }else{
        // In test mode
        nb.innerHTML=ci===qs.length-1?'Finish ✓':'Next →';
        nb.onclick=nxt;
    }
}

function prv(){
    if(ci>0){
        ci--;
        disQ();
    }
}

function nxt(){
    if(ci<qs.length-1){
        ci++;
        disQ();
    }else sub();
}

function strT(){
    ti=setInterval(()=>{
        if(tl<=0){
            sub();
            return;
        }
        tl--;
        const m=Math.floor(tl/60),s=tl%60;
        document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function sub(){
    if(fin) return;
    fin=1;
    clearInterval(ti);
    totalTime=45*60-tl;
    
    // Calculate marks with proper marking system
    let correct=0, incorrect=0, unattempted=0;
    let totalMarks=0;
    
    qs.forEach((q,i)=>{
        if(ans[i]===undefined){
            // Unattempted - no marks deducted
            unattempted++;
        }else if(ans[i]===q.correct_answer){
            // Correct answer - add positive marks
            correct++;
            totalMarks += posMarks;
        }else{
            // Incorrect answer - deduct negative marks
            incorrect++;
            totalMarks -= negMarks;
        }
    });
    
    // Calculate maximum possible marks and percentage
    const maxMarks = qs.length * posMarks;
    const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
    
    const timeStr=`${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
    
    // Update modal display
    document.getElementById('fs').textContent=`${correct}/${qs.length}`;
    document.getElementById('sp').textContent=`${totalMarks} / ${maxMarks} Marks`;
    document.getElementById('cor').textContent=correct;
    document.getElementById('inc').textContent=incorrect;
    document.getElementById('unat').textContent=unattempted;
    
    // Update mark breakdown
    document.getElementById('pos-marks').textContent=`+${correct * posMarks}`;
    document.getElementById('neg-marks').textContent=`-${incorrect * negMarks}`;
    document.getElementById('una-marks').textContent=`0`;
    
    // Update total score
    document.getElementById('total-score').textContent=`${totalMarks} Marks`;
    document.getElementById('percentage').textContent=`${percentage}%`;
    
    document.getElementById('modal').classList.add('show');
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
}

function showSol(){
    closeModal();
    solMode=1;
    ci=0;
    disQ();
}

window.onload=ini;
window.addEventListener('beforeunload',e=>{
    if(!fin){
        e.preventDefault();
        e.returnValue='Test in progress';
    }
});
</script></body></html>
