<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <title>devgagan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #06b6d4;
            
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(255, 255, 255, 0.8); 
            --shadow-light: 0 4px 12px rgba(0, 0, 0, 0.1);
            --shadow-heavy: 0 8px 24px rgba(0, 0, 0, 0.15);
            
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        [data-theme="light"] {
            --bg: #ffffff;  /* Changed from gradient to solid white */
            --card-bg: #ffffff;  /* Changed from transparent to solid white */
            --text: #1a202c;
            --text-secondary: #4a5568;
            --border: rgba(0, 0, 0, 0.1);  /* Changed to darker border for contrast */
            --nav-bg: #ffffff; 
        }
        
        [data-theme="dark"] {
            --bg: #1a1a2e;  /* Changed from gradient to solid dark */
            --card-bg: #16213e;  /* Changed from transparent to solid dark */
            --text: #f7fafc;
            --text-secondary: #a0aec0;
            --border: rgba(255, 255, 255, 0.1);
            --nav-bg: #0c0c0c;  /* Changed from transparent to solid dark */
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: -1;
        }
        
        [data-theme="dark"] .logo {
            background: none;
            -webkit-text-fill-color: white; /* White text in dark mode */
            color: white; /* Fallback */
            }
        
        /* Floating particles animation */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 6s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 0.3; }
        }
        
        /* Header with glassmorphism */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            z-index: 100;
            transition: var(--transition);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .menu-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            font-size: 18px;
        }
        
        .menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }
        
        .menu-btn:active {
            transform: scale(0.95);
        }
        
        .logo {
            font-weight: 800;
            font-size: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            font-size: 20px;
        }
        
        
        .menu-btn, .theme-toggle, .nav-btn.prev, .action-btn.flag {
            background: var(--card-bg);  /* Solid background */
            backdrop-filter: none;  /* Remove blur */
        }
        .sidebar {
            background: var(--card-bg);  /* Solid background */
            backdrop-filter: none;  /* Remove blur */
        }
        
        .theme-toggle:hover {
            transform: rotate(180deg) scale(1.1);
            box-shadow: var(--shadow-light);
        }
        
        /* Advanced Timer */
        .timer-container {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .timer {
            background: linear-gradient(135deg, var(--error), #dc2626);
            color: white;
            padding: 12px 16px;
            border-radius: 16px;
            font-family: 'Inter', monospace;
            font-weight: 600;
            font-size: 14px;
            box-shadow: var(--shadow-light);
            position: relative;
            overflow: hidden;
        }
        
        .timer.warning {
            animation: pulse 1s infinite;
        }
        
        .timer.critical {
            animation: shake 0.5s infinite;
            background: linear-gradient(135deg, #dc2626, #991b1b);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }
        
        .progress-ring {
            width: 40px;
            height: 40px;
            transform: rotate(-90deg);
        }
        
        .progress-circle {
            fill: none;
            stroke: rgba(255, 255, 255, 0.3);
            stroke-width: 3;
        }
        
        .progress-circle.progress {
            stroke: var(--primary);
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease;
        }
        
        /* Main Content */
        .main {
            margin: 80px 0 100px;
            padding: 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .question-container {
            background: var(--card-bg);  /* Now uses solid color */
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--shadow-heavy);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }
        
        .question-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--info));
            background-size: 200% 100%;
            animation: gradient-flow 3s linear infinite;
        }
        
        @keyframes gradient-flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .question-number {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 12px 20px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: var(--shadow-light);
            position: relative;
        }
        
        .question-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }
        
        .question-progress {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
        }
        
        .question-marks {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .question-text {
            font-size: 18px;
            line-height: 1.7;
            margin-bottom: 32px;
            color: var(--text);
            font-weight: 500;
        }
        
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .option {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 20px 24px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
            overflow: hidden;
        }
        
        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }
        
        .option:hover::before {
            left: 100%;
        }
        
        .option:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--shadow-light);
        }
        
        .option:active {
            transform: scale(0.98);
        }
        
        .option.selected {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }
        
        .option.correct {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--success);
            color: var(--success);
        }
        
        .option.incorrect {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--error);
            color: var(--error);
        }
        
        .option.disabled {
            background: rgba(160, 174, 192, 0.1);
            border-color: var(--text-secondary);
            color: var(--text-secondary);
            cursor: not-allowed;
        }
        
        .option-indicator {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }
        
        .option.selected .option-indicator {
            background: var(--primary);
            color: white;
        }
        
        .option.correct .option-indicator {
            background: var(--success);
            color: white;
        }
        
        .option.incorrect .option-indicator {
            background: var(--error);
            color: white;
        }
        
        .option:not(.selected):not(.correct):not(.incorrect) .option-indicator {
            border: 2px solid var(--border);
        }
        
        /* Solution Panel */
        .solution-panel {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.05));
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 20px;
            padding: 24px;
            margin-top: 24px;
            backdrop-filter: blur(10px);
            transform: translateY(20px);
            opacity: 0;
            transition: var(--transition);
        }
        
        .solution-panel.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        .solution-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            color: var(--warning);
            font-weight: 700;
        }
        
        .solution-content {
            color: var(--text);
            line-height: 1.6;
            font-size: 15px;
        }
        
        /* Navigation */
        .navigation {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            z-index: 90;
        }
        
        .nav-content {
            display: flex;
            gap: 12px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .nav-btn {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        
        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s;
        }
        
        .nav-btn:hover::before {
            left: 100%;
        }
        
        .nav-btn:active {
            transform: scale(0.95);
        }
        
        .nav-btn.prev {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            backdrop-filter: blur(10px);
        }
        
        .nav-btn.next {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: var(--shadow-light);
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .nav-btn:disabled::before {
            display: none;
        }
        
        /* Question Panel Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--border);
            z-index: 200;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-heavy);
        }
        
        .sidebar.open {
            right: 0;
        }
        
        .sidebar-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .sidebar-title {
            font-weight: 800;
            font-size: 20px;
        }
        
        .close-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }
        
        .sidebar-body {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }
        
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .question-btn {
            background: var(--card-bg);
            border: 2px solid var(--border);
            color: var(--text-secondary);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            position: relative;
        }
        
        .question-btn:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-light);
        }
        
        .question-btn:active {
            transform: scale(0.95);
        }
        
        .question-btn.current {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: var(--shadow-light);
        }
        
        .question-btn.answered {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border-color: var(--success);
        }
        
        .question-btn.correct {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }
        
        .question-btn.incorrect {
            background: var(--error);
            color: white;
            border-color: var(--error);
        }
        
        .question-btn.flagged::after {
            content: '🚩';
            position: absolute;
            top: -4px;
            right: -4px;
            font-size: 10px;
        }
        
        /* Legend */
        .legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .legend-dot.current { background: var(--primary); }
        .legend-dot.answered { background: var(--success); }
        .legend-dot.unattempted { background: var(--text-secondary); }
        .legend-dot.flagged { background: var(--warning); }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .action-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }
        
        .action-btn.flag {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        
        .action-btn.submit {
            background: linear-gradient(135deg, var(--error), #dc2626);
            color: white;
            box-shadow: var(--shadow-light);
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-heavy);
        }
        
        .action-btn:active {
            transform: scale(0.98);
        }
        
        /* Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 150;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        
        .overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        /* Result Modal */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            max-width: 90vw;
            width: 480px;
            z-index: 300;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            box-shadow: var(--shadow-heavy);
            overflow: hidden;
        }
        
        .modal.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 40px 32px;
            text-align: center;
        }
        
        .modal-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        
        .modal-subtitle {
            opacity: 0.9;
            font-size: 16px;
            font-weight: 500;
        }
        
        .modal-body {
            padding: 32px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            text-align: center;
            padding: 20px 16px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            color: var(--text);
            font-size: 24px;
            font-weight: 800;
        }
        
        .final-score {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            margin-bottom: 24px;
            box-shadow: var(--shadow-light);
        }
        
        .score-text {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        
        .percentage-text {
            opacity: 0.9;
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }
        
        .modal-btn.primary {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        
        .modal-btn.success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }
        
        /* Auto-save indicator */
        .auto-save {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            transform: translateX(100px);
            opacity: 0;
            transition: var(--transition);
            z-index: 90;
        }
        
        .auto-save.show {
            transform: translateX(0);
            opacity: 1;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .header-content {
                padding: 0 4px;
            }
            
            .main {
                padding: 16px;
                margin: 70px 0 90px;
            }
            
            .question-container {

            .question-text {

        /* Touch interactions */

        /* Accessibility */

        /* Focus styles for accessibility */

        .theme-toggle:focus {

    <script>
        // Core Variables
        const questions = [{"id": "119910", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.<br> A) </strong>As of this article, the archive has just under 46,000 entries, from games to software you might have used growing up in school<br> <strong>B) </strong>The digital revolution should have made preserving the past easier, but instead, it feels to me like we’ve only lost access.<br> <strong>C) </strong> The games and programs we grew up with didn’t grow up with our computers, and now most live only in our memories. Well, unless you know where to find them.<br> <strong>D) </strong> While there may be a host of sources on the web for finding old software, there’s perhaps no collection as complete as The Internet Archive: The non-profit has a collection of CD-ROM files that span decades.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BCDA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDCA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CDAB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABD"], "correct_answer": 0, "solution": "A) BCDA</strong><br> The correct order for the sentences to form a coherent paragraph is BCDA. Here's the reasoning:<br> <br> <strong>B.</strong> The digital revolution should have made preserving the past easier, but instead, it feels to me like we’ve only lost access.<br> •<strong> This sentence sets the context, talking about the digital revolution and the perceived loss of past digital artifacts, which provides a broad introduction to the topic.</strong><br> <strong>C.</strong> The games and programs we grew up with didn’t grow up with our computers, and now most live only in our memories. Well, unless you know where to find them.<br> <strong>• This sentence continues from the previous one, further emphasizing the loss of old software and games due to technological advancement, and hinting that there might be a way to find these lost artifacts.</strong><br> <strong>D.</strong> While there may be a host of sources on the web for finding old software, there’s perhaps no collection as complete as The Internet Archive: The non-profit has a collection of CD-ROM files that span decades.<br> <strong>• This sentence introduces \"The Internet Archive,\" providing the solution to the problem mentioned in the first two sentences and directly connecting to the hint from sentence C about knowing where to find the old software and games.</strong><br> <strong>A.</strong> As of this article, the archive has just under 46,000 entries, from games to software you might have used growing up in school.<br> <strong>• This sentence gives further details about The Internet Archive, ending the paragraph on a note that ties back to the nostalgia implied in the previous sentences."}, {"id": "119911", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph</strong>.<br> <strong>A) </strong>The success of Open Network for Digital Commerce (ONDC), the government-backed online marketplace, will ultimately depend on its ability to facilitate, if not offer, end-to-end solutions from logistics and warehousing to delivery and payments.<br> <strong>B) </strong> The platforms derive their power from not just connecting sellers and buyers, but also ensuring physical fulfillment of transactions or integrating online with offline.<br> <strong>C) </strong> The likes of Amazon and Flipkart provide all these solutions, including through fulfillment centres receiving inbound products from vendors and ready for outbound dispatches whenever consumers order on their websites. That makes them, for all practical purposes, “operators” as opposed to mere online “platforms”.<br> <strong>D) </strong> E-commerce isn’t simply about placing orders for goods and services through digital platforms. Whatever is ordered online has to also be physically shipped and delivered in person to the buyer concerned.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABCD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DCAB", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> DACB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BACD"], "correct_answer": 2, "solution": "<strong>C) DACB</strong><br> •<strong> Sentence D</strong> should be the first sentence because it introduces the concept of e-commerce and emphasizes that it isn't just about placing orders online. It establishes the context for the discussion that follows.<br> •<strong> Sentence A</strong> introduces the Open Network for Digital Commerce (ONDC) and mentions its success depending on its ability to facilitate or offer end-to-end solutions. This builds upon the introductory idea presented in sentence D<strong>,</strong> emphasizing the need for physical shipment and delivery.<br> • <strong>Sentence C</strong> should follow, as it provides concrete examples of platforms (Amazon and Flipkart) that provide all these solutions. It also introduces the contrast between \"operators\" and mere online \"platforms\", which is an important aspect of the argument that is being built up.<br> • <strong>Sentence B</strong> is the final sentence because it sums up the power and function of such platforms, which is not only connecting buyers and sellers but also ensuring physical fulfillment of transactions, a concept that has been developed throughout the preceding sentences. This conclusion echoes the ideas presented in the previous sentences and ties the paragraph together."}, {"id": "119912", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.<br> A) </strong> Data released by the National Statistical Office Friday showed that retail inflation, as measured by the consumer price index, has continued to trend lower, aided by a favourable base effect<br> <strong>B) </strong> Some analysts are now projecting inflation to remain below 5 per cent over the coming few months as well,<br> <strong>C) </strong> Inflation, which had edged above the Reserve Bank of India’s inflation targeting framework in January and February, falling thereafter to 5.66 per cent in March, declined further to an 18-month low of 4.7 per cent in April.<br> <strong>D) </strong> Lower than the 5.1 per cent (for the April-June quarter) forecasted by the RBI in the last monetary policy committee meeting.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABD", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ACBD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDAC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CBDA"], "correct_answer": 1, "solution": "<strong>B) ACBD</strong><br> • The paragraph is about inflation in India, as measured by the consumer price index, and its recent trends. The context is set by statements A and C which introduce the topic. Statement A sets the stage by stating that data released by the National Statistical Office shows that retail inflation is trending lower.<br> <br> • Statement C follows naturally after A, as it provides more specific details about this trend, outlining how inflation rates have changed over recent months and emphasizing a decline to a significant 18-month low of 4.7 per cent in April.<br> <br> • After setting the stage and providing a detailed trend analysis, statement B comes next as it projects future trends based on the current situation, stating that some analysts project that inflation will remain below 5 per cent over the coming few months.<br> <br> • Finally, statement D wraps up the paragraph by offering a comparison of the current inflation rate to the previous forecast by the Reserve Bank of India, emphasizing how the current rate is lower than predicted."}, {"id": "119913", "question": "<strong>Sentences of a paragraph are given in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph<br> A) </strong>The Modi years have seen the emergence of the United States as the most important and comprehensive strategic partner of India.<br> <strong>B) </strong> Prime Minister Narendra Modi’s state visit to Washington next month is about celebrating the transformation of bilateral relations under the NDA government as well as setting a more ambitious agenda for the future.<br> <strong>C) </strong> The US is India’s largest trading partner, with commerce worth $190 billion flowing between the two nations. While trade with China is significant, Delhi’s deficit with Beijing has crossed $100 billion, while India continues to enjoy a surplus with the US.<br> <strong>D) </strong> And unlike Beijing, Washington is on India’s side when it comes to territorial integrity and terrorism.", "options": ["<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> BACD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CDAB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BADC"], "correct_answer": 0, "solution": "A) BACD</strong><br> B. \"Prime Minister Narendra Modi’s state visit to Washington next month is about celebrating the transformation of bilateral relations under the NDA government as well as setting a more ambitious agenda for the future.\"<br> <strong>• This sentence introduces the context of the paragraph and the main topic, which is Prime Minister Narendra Modi's visit to Washington.</strong><br> A. \"The Modi years have seen the emergence of the United States as the most important and comprehensive strategic partner of India.\"<br> <strong>• This sentence naturally follows sentence B as it expands on the transformation of bilateral relations under the Modi government mentioned in sentence B.</strong><br> <br> C. \"The US is India’s largest trading partner, with commerce worth $190 billion flowing between the two nations. While trade with China is significant, Delhi’s deficit with Beijing has crossed $100 billion, while India continues to enjoy a surplus with the US.\"<br> <strong>• Sentence C provides concrete evidence and details about the strategic partnership between the US and India,</strong><br> <strong>which was introduced in sentence A. It is necessary to mention this before moving on to sentence D which covers different aspects of the relationship.</strong><br> D. \"And unlike Beijing, Washington is on India’s side when it comes to territorial integrity and terrorism.\"<br> <strong>• Sentence D concludes the paragraph by contrasting the US's supportive stance towards India with Beijing's stance, which was implicitly compared in sentence C. This sentence wraps up the paragraph by emphasizing the unique strategic value of the US to India."}, {"id": "119914", "question": "<strong>Sentences of a paragraph are given below. While the first and the last sentences (S1 and S6) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.<br> S1</strong>: Bringing together a group of superheroes or putting together the scattered parts of a destroyed whole to create something unprecedented and unimaginably powerful — this is a trope found in many fantasy movies<br> <strong>A</strong>. Except that in my story, the superheroes are ordinary people with knowledge that they are keen on sharing and the “something” that they want to make unimaginably powerful is our country, India.<br> <strong>B</strong>. What comes to the mind of that little menstruator on first experiencing periods? I often find myself thinking about these things — about how far we’ve come and how much further we have to go until we reach that village.<br> <strong>C.</strong> My India at 100 is a dream-in-progress. It’s taking shape in millions of hearts, including the one beating in the remotest of villages in the country. I imagine that heart to be young and naive, but nonetheless eager to learn about the changes that take place in our bodies, especially the menstrual cycle.<br> <strong>D.</strong> I’ve seen similar things in my life as a menstrual educator too.</p> <p><strong>S6:</strong> The answer that comes from deep within says, not more than two decades.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCDA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DABC", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> DACB", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BDAC"], "correct_answer": 2, "solution": "C) DACB</strong><br> S1. Bringing together a group of superheroes or putting together the scattered parts of a destroyed whole to create something unprecedented and unimaginably powerful — this is a trope found in many fantasy movies.<br> D. I’ve seen similar things in my life as a menstrual educator too.<br> <strong>• The sentence D connects with S1 by providing a real-life example of the metaphorical 'group of superheroes' mentioned in S1. The author has seen something similar in their life as a menstrual educator.</strong><br> A. Except that in my story, the superheroes are ordinary people with knowledge that they are keen on sharing and the “something” that they want to make unimaginably powerful is our country, India.<br> <strong>• In sentence A, the author further explains who these 'superheroes' are in their narrative — ordinary people with knowledge that they're willing to share. This sentence logically follows D because it continues the author's personal narrative and provides more context to the 'superheroes' metaphor.</strong><br> <br> C. My India at 100 is a dream-in-progress. It’s taking shape in millions of hearts, including the one beating in the remotest of villages in the country. I imagine that heart to be young and naive, but nonetheless eager to learn about the changes that take place in our bodies, especially the menstrual cycle.<br> <strong>• Sentence C builds upon the idea of an empowered India that has been introduced in sentence A. It also introduces a specific topic within this broader vision: the menstrual cycle education, connecting back to sentence D where the author mentioned being a menstrual educator.</strong><br> B. What comes to the mind of that little menstruator on first experiencing periods? I often find myself thinking about these things — about how far we’ve come and how much further we have to go until we reach that village.<br> <strong>• Finally, sentence B follows C naturally as it elaborates on the topic of menstrual education in the context of rural India, which was introduced in C.</strong><br> S6. The answer that comes from deep within says, not more than two decades.<br> <strong>• The final sentence (S6) concludes the passage with a statement about the time frame in which the author hopes their vision for India will be realized, following the reflections in sentence B."}, {"id": "119915", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.<br> A) </strong>Yet, a majority of these cases unmistakably point towards the enfeeblement of our traditional family system. And, this is something that we cannot afford to ignore.<br> <strong>B) </strong> Moreover, studies conducted all over the world point to the primacy of families. An increasing number of children taking to crime also mirrors the disruptions in the age-old family system in India and elsewhere.<br> <strong>C) </strong> We celebrated the International Day of Families on May 15. The increasing cases of murders of live-in partners, news items about family feuds leading to violent attacks on spouses or other family members and suicide among aspiring youths barely in their teens present a scary scenario.<br> <strong>D) </strong> In a way, these are the symptoms of societal ill-health. Every case merits independent analysis and hence, generalisations may not be advisable.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DABC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CABD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CBAD", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> CDAB"], "correct_answer": 3, "solution": "<strong>D) CDAB</strong><br> • Sentence C: The paragraph begins with this sentence as it introduces the context – the International Day of Families. It then goes on to highlight certain disturbing societal issues related to family structures. This sentence sets the stage for the discussion that follows.<br> • Sentence D: This sentence logically follows Sentence C as it provides an interpretation of the issues mentioned in Sentence C, calling them 'symptoms of societal ill-health'. It also suggests that these cases need independent analysis, preparing the ground for the next two sentences.<br> • Sentence A: This sentence provides that analysis, stating that a majority of the cases mentioned in Sentence C point towards the weakening of the traditional family system. It also shows the gravity of the situation, saying that we can't afford to ignore this.<br> • Sentence B: This sentence concludes the paragraph by providing a global context to the issue. It states that studies around the world have shown the importance of families. It then brings the focus back to the local context (India) by stating that increasing crime among children reflects disruptions in the family system in India and elsewhere. This sentence wraps up the main point of the paragraph, tying the global and local contexts together."}, {"id": "119916", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong><br> <strong>A) </strong> Highly critical of encroachments and unlawful construction taking place right under the nose of the administration in Gurugram, the Punjab and Haryana High Court recently asked for urgent remedial measures.<br> <strong>B) </strong> Planned development, it observed, had taken a backseat and the claims of being a ‘cyber city’ lay shattered.<br> <strong>C) </strong> A survey has revealed that around 2,000 acres of land in the district, valued at Rs 4,500 crore, have been encroached upon in the form of illegal colonies, farmhouses and markets.<br> <strong>D) </strong>Gurugram tops the list of 22 Haryana districts and is followed by Faridabad.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BACD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCDA", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ABCD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABDC"], "correct_answer": 2, "solution": "C) ABCD\n\n<strong>A:</strong> This sentence talks about a problem in a place called Gurugram, where people are building things where they're not supposed to.\n\n<strong>B:</strong> This sentence continues the problem described in A. The city was supposed to be planned and developed, like a neat and organized room, but instead, it's a mess.<br> <strong>C:</strong> This sentence gives us a little more detail about the problem in A and B. It tells us how big the problem is, with lots of land being used wrongly\n\n<strong>D:</strong> Finally, this sentence tells us that Gurugram is the worst out of 22 other similar places, followed by another place, Faridabad<br> The order <strong>ABCD</strong> makes sense because it starts with stating a problem (A), explains what's gone wrong (B), gives more details (C), and finally shows us where Gurugram stands compared to other places (D)"}, {"id": "119917", "question": "<strong>Parts of a sentence/paragraph are given below. While the first and the last parts (A and F) are in the correct order, the parts in between are jumbled up. Arrange the parts in the correct order to form a meaningful and coherent sentence/paragraph.</strong></p> <p><strong>A) </strong>The world leaders who attended the G20 summit in Rome have agreed to discontinue financial support for building coal-based power plants, especially in poor countries, in a bid to facilitate the global transition to the use of clean energy.</p> <p><strong>B)</strong> Both India and China face the Herculean task of reducing their overdependence on coal, even as their use of this polluting fossil fuel is actually growing in order to meet the ever-rising demand for power.</p> <p><strong>C)</strong> Coal is a major contributor of greenhouse gas emissions, with China being the world’s top coal consumer and producer, followed by India.</p> <p><strong>D)</strong> More than 90 per cent of the 195 coal plants being built around the world are in Asia</p> <p><strong>E)</strong> Around 75 per cent of India’s total power generation is from coal-fired plants.</p> <p><strong>F) </strong>The recent electricity crisis in parts of the country had been triggered by the shortage of this fuel.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CDEB", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> CDBE", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DCBE", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> DCEB"], "correct_answer": 1, "solution": "B) CDBE\n\n<strong>Sentence A</strong> is the starting point. It talks about world leaders deciding to stop supporting coal-based power plants.\n\n<strong>C </strong>naturally follows A because it explains why the leaders made that decision - coal causes pollution and is a big source of greenhouse gases. Plus, it tells us that China and India use a lot of coal.\n\n<strong>D</strong> comes after C because it adds more information about the issue. It tells us that a lot of the new coal power plants being built are in Asia. This is related to the previous sentence that said China and India use a lot of coal.\n\n<strong>B</strong> follows D because it talks about the challenges India and China are facing - they depend on coal a lot but need to use less of it. It adds detail to sentence D which mentioned a lot of coal plants are being built in Asia.\n\n<strong>E</strong> is next because it gives more detail on how much India relies on coal - 75% of its power comes from coal plants. This adds to sentence B which mentioned India's dependence on coal.\n\n<strong>Sentence</strong><strong> F is the ending.</strong> It shows a recent problem caused by this dependence on coal - a power shortage. This concludes the paragraph by providing a real-world impact of the issues discussed."}, {"id": "119918", "question": "<strong>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</strong></p> <p><strong>A) </strong> By all accounts, Koozhangal, India’s official entry in the Best International Film Category at Oscars 2022, is an excellent movie.</p> <p><strong>B) </strong>And while such judgements are extremely subjective and often divisive, Koozhangal seems to possess great cinematic value and is a worthy candidate to be sent to the Oscars</p> <p><strong>C)</strong> Set in rural Tamil Nadu, Koozhangal — which translates to ‘pebbles’ — depicts the life of a small family going through emotional turmoil.</p> <p><strong>D) </strong> Based on a true story, Koozhangal has won praise and awards on the film festival circuit", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ADBC", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ABCD", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BACD", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> ACDB"], "correct_answer": 3, "solution": "D) ACDB\n\n<strong>A:</strong> This sentence is the first because it introduces the topic, the movie \"Koozhangal\" and its achievement.\n\n<strong>C:</strong> After introducing the movie, this sentence follows to give us more information about what the movie is about.\n\n<strong>D:</strong> This sentence connects to the previous one because it adds more details about the movie, explaining that it's based on a true story and has won awards.\n\n<strong>B:</strong> This sentence wraps up the paragraph by sharing an opinion about the movie, saying it's a good choice for the Oscars."}, {"id": "119919", "question": "<strong>Given below are four jumbled sentences. Select the option that gives their correct logical sequence.</strong></p> <p>A. When we connect this design with a wire, electricity flows.</p> <p>B. These metal strips were put in a sulphuric acid solution.</p> <p>C. He made two strips of different metals.</p> <p>D. Alessandro Volta discovered electric battery.", "options": ["<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> CBDA", "<p style=\"display:none\"><img alt=\"check\" src=\"https://englishmadhyam.info/public/exam-panel/img/check.png\"/></p> DCBA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> BCDA", "<p style=\"display:none\"><img alt=\"reload\" src=\"https://englishmadhyam.info/public/exam-panel/img/reload.png\"/></p> ACDB"], "correct_answer": 1, "solution": "B) <strong>DCBA</strong>\n\nD starts with \"Alessandro Volta discovered electric battery,\" which introduces the subject and provides the context for the rest of the paragraph.\n\nC follows D because it elaborates on what Volta did: \"He made two strips of different metals.\" This adds detail about how Volta developed the electric battery.\n\nB logically follows C because it explains what was done with the metal strips: \"These metal strips were put in a sulphuric acid solution.\" This provides the next step in the battery creation process.\n\nA concludes with \"When we connect this design with a wire, electricity flows,\" explaining the outcome or the result of connecting the metal strips with a wire — the flow of electricity. This completes the description of how Volta's invention works."}];
        const examConfig = {
            id: '6010',
            duration: 10,
            positiveMarks: 2.0,
            negativeMarks: 0.5
        };
        
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let flaggedQuestions = new Set();
        let timeLeft = examConfig.duration * 60;
        let timerInterval;
        let isTestFinished = false;
        let solutionMode = false;
        let touchStartX = 0;
        let touchStartY = 0;
        
        // Initialize app
        function initializeApp() {
            createParticles();
            generateQuestionsGrid();
            loadQuestion();
            startTimer();
            setupTouchGestures();
            setupAutoSave();
            
            // Prevent accidental page leave
            window.addEventListener('beforeunload', (e) => {
                if (!isTestFinished) {
                    e.preventDefault();
                    e.returnValue = 'Test in progress. Are you sure you want to leave?';
                }
            });
        }
        
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = window.innerWidth < 768 ? 20 : 40;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particlesContainer.appendChild(particle);
            }
        }
        
        // Load current question
        function loadQuestion() {
            const question = questions[currentQuestionIndex];
            
            // Update question info
            document.getElementById('questionNumber').textContent = `Q${currentQuestionIndex + 1}`;
            document.getElementById('questionProgress').textContent = 
                `${currentQuestionIndex + 1} of ${questions.length}`;
            document.getElementById('questionText').innerHTML = question.question;
            
            // Load options
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.innerHTML = option;
                
                const indicator = document.createElement('div');
                indicator.className = 'option-indicator';
                optionElement.appendChild(indicator);
                
                if (solutionMode) {
                    // Show solution mode styling
                    if (index === question.correct_answer) {
                        optionElement.classList.add('correct');
                        indicator.textContent = '✓';
                    } else if (userAnswers[currentQuestionIndex] === index) {
                        optionElement.classList.add('incorrect');
                        indicator.textContent = '✗';
                    } else {
                        optionElement.classList.add('disabled');
                    }
                    optionElement.style.pointerEvents = 'none';
                } else {
                    // Normal mode
                    if (userAnswers[currentQuestionIndex] === index) {
                        optionElement.classList.add('selected');
                        indicator.textContent = '✓';
                    }
                    
                    optionElement.onclick = () => selectOption(index);
                    optionElement.onkeydown = (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            selectOption(index);
                        }
                    };
                    optionElement.tabIndex = 0;
                }
                
                optionsContainer.appendChild(optionElement);
            });
            
            // Handle solution panel
            const solutionPanel = document.getElementById('solutionPanel');
            if (solutionMode && question.solution) {
                document.getElementById('solutionContent').innerHTML = question.solution;
                solutionPanel.classList.add('show');
            } else {
                solutionPanel.classList.remove('show');
            }
            
            // Update navigation
            updateNavigation();
            updateQuestionsGrid();
            updateFlagButton();
            
            // Add entrance animation
            const container = document.getElementById('questionContainer');
            container.style.transform = 'translateY(20px)';
            container.style.opacity = '0';
            setTimeout(() => {
                container.style.transform = 'translateY(0)';
                container.style.opacity = '1';
            }, 100);
        }
        
        // Select an option
        function selectOption(index) {
            if (solutionMode) return;
            
            const currentAnswer = userAnswers[currentQuestionIndex];
            
            if (currentAnswer === index) {
                // Deselect if clicking the same option
                delete userAnswers[currentQuestionIndex];
            } else {
                // Select new option
                userAnswers[currentQuestionIndex] = index;
            }
            
            // Update UI
            const options = document.querySelectorAll('.option');
            options.forEach((option, i) => {
                const indicator = option.querySelector('.option-indicator');
                if (userAnswers[currentQuestionIndex] === i) {
                    option.classList.add('selected');
                    indicator.textContent = '✓';
                } else {
                    option.classList.remove('selected');
                    indicator.textContent = '';
                }
            });
            
            updateQuestionsGrid();
            showAutoSave();
        }
        
        // Generate questions grid
        function generateQuestionsGrid() {
            const grid = document.getElementById('questionsGrid');
            grid.innerHTML = '';
            
            questions.forEach((_, index) => {
                const button = document.createElement('button');
                button.className = 'question-btn';
                button.textContent = index + 1;
                button.onclick = () => goToQuestion(index);
                button.setAttribute('aria-label', `Go to question ${index + 1}`);
                grid.appendChild(button);
            });
        }
        
        // Update questions grid styling
        function updateQuestionsGrid() {
            const buttons = document.querySelectorAll('.question-btn');
            buttons.forEach((button, index) => {
                button.className = 'question-btn';
                
                if (index === currentQuestionIndex) {
                    button.classList.add('current');
                } else if (solutionMode) {
                    if (userAnswers[index] === questions[index].correct_answer) {
                        button.classList.add('correct');
                    } else if (userAnswers[index] !== undefined) {
                        button.classList.add('incorrect');
                    }
                } else if (userAnswers[index] !== undefined) {
                    button.classList.add('answered');
                }
                
                if (flaggedQuestions.has(index)) {
                    button.classList.add('flagged');
                }
            });
        }
        
        // Navigation functions
        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }
        
        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else if (!solutionMode) {
                submitTest();
            }
        }
        
        function goToQuestion(index) {
            currentQuestionIndex = index;
            loadQuestion();
            closeSidebar();
        }
        
        function updateNavigation() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            prevBtn.disabled = currentQuestionIndex === 0;
            
            if (solutionMode) {
                nextBtn.textContent = currentQuestionIndex === questions.length - 1 ? 
                    'Finish Review' : 'Next →';
                nextBtn.onclick = currentQuestionIndex === questions.length - 1 ? 
                    finishReview : nextQuestion;
            } else {
                nextBtn.textContent = currentQuestionIndex === questions.length - 1 ? 
                    'Submit Test' : 'Next →';
                nextBtn.onclick = currentQuestionIndex === questions.length - 1 ? 
                    submitTest : nextQuestion;
            }
        }
        
        // Timer functions
        function startTimer() {
            const timerElement = document.getElementById('timer');
            const progressCircle = document.getElementById('progressCircle');
            const circumference = 2 * Math.PI * 18;
            const totalTime = examConfig.duration * 60;
            
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    submitTest();
                    return;
                }
                
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                // Update progress circle
                const progress = (totalTime - timeLeft) / totalTime;
                const offset = circumference * progress;
                progressCircle.style.strokeDashoffset = offset;
                
                // Add warning effects
                if (timeLeft <= 300) { // 5 minutes
                    timerElement.classList.add('warning');
                }
                if (timeLeft <= 60) { // 1 minute
                    timerElement.classList.add('critical');
                }
            }, 1000);
        }
        
        // Toggle question flag
        function toggleFlag() {
            if (flaggedQuestions.has(currentQuestionIndex)) {
                flaggedQuestions.delete(currentQuestionIndex);
            } else {
                flaggedQuestions.add(currentQuestionIndex);
            }
            updateFlagButton();
            updateQuestionsGrid();
        }
        
        function updateFlagButton() {
            const flagBtn = document.getElementById('flagBtn');
            if (flaggedQuestions.has(currentQuestionIndex)) {
                flagBtn.textContent = '🏴 Unflag Question';
                flagBtn.style.background = 'rgba(239, 68, 68, 0.2)';
                flagBtn.style.color = 'var(--error)';
            } else {
                flagBtn.textContent = '🚩 Flag Question';
                flagBtn.style.background = 'rgba(245, 158, 11, 0.2)';
                flagBtn.style.color = 'var(--warning)';
            }
        }
        
        // Theme toggle
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('themeBtn');
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            body.setAttribute('data-theme', newTheme);
            themeBtn.textContent = newTheme === 'light' ? '🌙' : '☀️';
            
            // Save preference
            localStorage.setItem('theme', newTheme);
        }
        
        // Sidebar functions
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }
        
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }
        
        // Touch gesture support
        function setupTouchGestures() {
            const main = document.querySelector('.main');
            
            main.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });
            
            main.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                const deltaX = touchEndX - touchStartX;
                const deltaY = touchEndY - touchStartY;
                
                // Only trigger if horizontal swipe is dominant
                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                    if (deltaX > 0 && currentQuestionIndex > 0) {
                        // Swipe right - previous question
                        previousQuestion();
                    } else if (deltaX < 0 && currentQuestionIndex < questions.length - 1) {
                        // Swipe left - next question
                        nextQuestion();
                    }
                }
            });
        }
        
        // Auto-save functionality
        function setupAutoSave() {
            // Save answers periodically
            setInterval(() => {
                if (!isTestFinished) {
                    saveProgress();
                }
            }, 30000); // Every 30 seconds
        }
        
        function saveProgress() {
            const progress = {
                answers: userAnswers,
                flagged: Array.from(flaggedQuestions),
                currentQuestion: currentQuestionIndex,
                timeLeft: timeLeft
            };
            
            // In a real implementation, this would save to a server
            console.log('Progress saved:', progress);
        }
        
        function showAutoSave() {
            const autoSave = document.getElementById('autoSave');
            autoSave.classList.add('show');
            setTimeout(() => {
                autoSave.classList.remove('show');
            }, 2000);
        }
        
        // Submit test
        function submitTest() {
            if (isTestFinished) return;
            
            isTestFinished = true;
            clearInterval(timerInterval);
            
            // Calculate results
            let correct = 0, wrong = 0, skipped = 0, totalMarks = 0;
            
            questions.forEach((question, index) => {
                if (userAnswers[index] === undefined) {
                    skipped++;
                } else if (userAnswers[index] === question.correct_answer) {
                    correct++;
                    totalMarks += examConfig.positiveMarks;
                } else {
                    wrong++;
                    totalMarks -= examConfig.negativeMarks;
                }
            });
            
            const maxMarks = questions.length * examConfig.positiveMarks;
            const percentage = Math.max(0, Math.round((totalMarks / maxMarks) * 100));
            
            // Show results
            document.getElementById('resultTitle').textContent = 
                `${correct}/${questions.length} Correct`;
            document.getElementById('resultSubtitle').textContent = 
                `You scored ${totalMarks} out of ${maxMarks} marks`;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = wrong;
            document.getElementById('skippedCount').textContent = skipped;
            document.getElementById('finalScore').textContent = `${totalMarks} Marks`;
            document.getElementById('finalPercentage').textContent = `${percentage}%`;
            
            document.getElementById('resultModal').classList.add('show');
            closeSidebar();
        }
        
        // View solutions
        function viewSolutions() {
            document.getElementById('resultModal').classList.remove('show');
            solutionMode = true;
            currentQuestionIndex = 0;
            loadQuestion();
        }
        
        // Finish review
        function finishReview() {
            solutionMode = false;
            currentQuestionIndex = 0;
            loadQuestion();
        }
        
        // Retake test
        function retakeTest() {
            if (confirm('Are you sure you want to retake the test? All progress will be lost.')) {
                location.reload();
            }
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (solutionMode) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    previousQuestion();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    nextQuestion();
                    break;
                case 'f':
                case 'F':
                    if (e.ctrlKey || e.metaKey) {
                        e.preventDefault();
                        toggleFlag();
                    }
                    break;
                case 'm':
                case 'M':
                    if (e.ctrlKey || e.metaKey) {
                        e.preventDefault();
                        toggleSidebar();
                    }
                    break;
                case '1':
                case '2':
                case '3':
                case '4':
                    if (!e.ctrlKey && !e.metaKey) {
                        e.preventDefault();
                        const optionIndex = parseInt(e.key) - 1;
                        if (optionIndex < questions[currentQuestionIndex].options.length) {
                            selectOption(optionIndex);
                        }
                    }
                    break;
            }
        });
        
        // Initialize when DOM is loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
        
        // Load saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.body.setAttribute('data-theme', savedTheme);
            document.getElementById('themeBtn').textContent = savedTheme === 'light' ? '🌙' : '☀️';
        }
    </script>
</body>
</html>
