                questions.push({
                    id: "45",
                    section: "6",
                    question_en: "<p>45. <span style=\"font-family: Roboto;\">Which of the following pairs of numbers and signs , when their positions are interchanged , will correctly solve the given mathematical equation? </span></p>\r\n<p><span style=\"font-family: Roboto;\">17 &times; </span><span style=\"font-family: Roboto;\">15 + 3 - 11/3&nbsp;= 45</span></p>\n",
                    question_hi: "<p>45.<span style=\"font-family: Palanquin;\"> &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2340;&#2341;&#2366; &#2330;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306; &#2325;&#2375; </span><span style=\"font-family: Palanquin;\">&#2344;&#2367;&#2350;&#2381;&#2344;</span><span style=\"font-family: Palanquin;\"> &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2375; &#2346;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2366; ? </span></p>\r\n<p><span style=\"font-family: Roboto;\">17 &times; </span><span style=\"font-family: Roboto;\">15 + 3 - 11/3</span><span style=\"font-family: Roboto;\"> = 45</span></p>\n",
                    options_en: ["<p>15 and 11, + and <span style=\"font-family: Roboto;\">&times;</span></p>\n", "<p>17 and 3 , - and /</p>\n", 
                                "<p>15 and 11, - and <span style=\"font-family: Roboto;\">&times;</span></p>\n", "<p>15 and 11, + and -</p>\n"],
                    options_hi: ["<p>15 and 11, + and &times;</p>\n", "<p>17 and 3 , - and /</p>\n",
                                "<p>15 and 11, - and &times;</p>\n", "<p>15 and 11, + and -</p>\n"],
                    solution_en: "<p>45.(a)</p>\r\n<p><span style=\"font-family: Roboto;\">On replacing the numbers 15 and 11, </span></p>\r\n<p><span style=\"font-family: Roboto;\"> signs + and &times; we get the desired result</span></p>\r\n<p><span style=\"font-family: Roboto;\">17 &times; </span><span style=\"font-family: Roboto;\">15 + 3 -&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>11</mn><mn>3</mn></mfrac></math> &rArr;</span><span style=\"font-family: Roboto;\"> </span><span style=\"font-family: Roboto;\"> 17 + 11 &times;&nbsp;</span><span style=\"font-family: Roboto;\"> 3 -&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>15</mn><mn>3</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Roboto;\">&nbsp;&rArr; </span><span style=\"font-family: Roboto;\">17 + 33 - 5 = 45</span></p>\n",
                    solution_hi: "<p>45.(a) <span style=\"font-family: Arial Unicode MS;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 15 &#2324;&#2352; 11 , &#2330;&#2367;&#2344;&#2381;&#2361; + &#2324;&#2352; &#10005; &#2325;&#2379; &#2348;&#2342;&#2354;&#2344;&#2375; &#2346;&#2352; &#2361;&#2350;&#2375;&#2306; &#2357;&#2366;&#2306;&#2331;&#2367;&#2340; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Roboto;\">17<span style=\"font-family: Arial Unicode MS;\"> &times;</span></span><span style=\"font-family: Roboto;\">15 + 3 -&nbsp;<span style=\"font-family: Arial Unicode MS;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>11</mn><mn>3</mn></mfrac></math> &rArr;</span></span><span style=\"font-family: Roboto;\">&nbsp;</span><span style=\"font-family: Roboto;\">17 + 11 <span style=\"font-family: Arial Unicode MS;\">&times;</span></span><span style=\"font-family: Roboto;\"> 3 -&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>15</mn><mn>3</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Roboto;\"> </span><span style=\"font-family: Roboto;\">17 + 33 - 5 = 45</span></p>\n",
                    correct: "a",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });
                questions.push({
                    id: "46",
                    section: "6",
                    question_en: "<p>46.<span style=\"font-family: Roboto;\">Consider the given statement to be true and decide which of the following assumptions is/are implicit in the statement.</span></p>\r\n<p><span style=\"font-family: Roboto;\"><strong>Statement</strong>:</span></p>\r\n<p><span style=\"font-family: Roboto;\">Company X announced that in their company, 10 clerical jobs will be filled, with the minimum eligibility criteria being bachelor\'s degree pass.</span></p>\r\n<p><span style=\"font-family: Roboto;\"><strong>Assumptions</strong>:</span></p>\r\n<p><span style=\"font-family: Roboto;\">1. Only those who have passed the bachelor\'s degree will apply.</span></p>\r\n<p><span style=\"font-family: Roboto;\">2. Masters can also apply.</span></p>\n",
                    question_hi: "<p>46<span style=\"font-family: Palanquin;\">. &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344; &#2325;&#2379; &#2360;&#2330; &#2350;&#2366;&#2344; &#2325;&#2352; &#2330;&#2354;&#2375;&#2306; &#2324;&#2352; &#2340;&#2351; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2342;&#2368; &#2327;&#2312; &#2343;&#2366;&#2352;&#2339;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376; ( &#2361;&#2376;&#2306; ) &#2404;</span></p>\r\n<p><span style=\"font-family: Palanquin;\"><strong>&#2325;&#2341;&#2344;</strong>:</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2325;&#2306;&#2346;&#2344;&#2368; X &#2344;&#2375; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2368; &#2325;&#2367; &#2313;&#2344;&#2325;&#2368; &#2325;&#2306;&#2346;&#2344;&#2368; &#2350;&#2375;&#2306; 10 &#2325;&#2381;&#2354;&#2352;&#2381;&#2325; &#2325;&#2368; &#2344;&#2380;&#2325;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2351;&#2379;&#2327;&#2381;&#2351;&#2340;&#2366; &#2350;&#2366;&#2344;&#2342;&#2306;&#2337; &#2360;&#2381;&#2344;&#2366;&#2340;&#2325; &#2325;&#2368; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Palanquin;\"><strong>&#2343;&#2366;&#2352;&#2339;&#2366;</strong>:</span></p>\r\n<p><span style=\"font-family: Palanquin;\">1. &#2325;&#2375;&#2357;&#2354; &#2357;&#2379; &#2354;&#2379;&#2327; &#2361;&#2368; &#2310;&#2357;&#2375;&#2342;&#2344; &#2342;&#2375;&#2306;&#2327;&#2375; &#2332;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2360;&#2381;&#2344;&#2366;&#2340;&#2325; &#2325;&#2368; &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2325;&#2368; &#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Palanquin;\">2. &#2309;&#2343;&#2367;&#2360;&#2381;&#2344;&#2366;&#2340;&#2325; &#2349;&#2368; &#2310;&#2357;&#2375;&#2342;&#2344; &#2342;&#2375; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span></p>\n",
                    options_en: ["<p>Only assumption 1 is implicit.</p>\n", "<p>Either assumption 1 or 2 is implicit.</p>\n", 
                                "<p>only assumption 2 is implicit</p>\n", "<p>Both assumptions 1 and 2 are <span style=\"font-family: Roboto;\">implicit.</span></p>\n"],
                    options_hi: ["<p>&#2325;&#2375;&#2357;&#2354; &#2343;&#2366;&#2352;&#2339;&#2366; 1 &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404;</p>\n", "<p>&#2351;&#2366; &#2340;&#2379; 1 &#2351;&#2366; 2 &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404;</p>\n",
                                "<p>&#2325;&#2375;&#2357;&#2354; &#2343;&#2366;&#2352;&#2339;&#2366; 2 &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404;</p>\n", "<p>&#2343;&#2366;&#2352;&#2339;&#2366; 1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">46.(d) <strong>Assumption 1</strong> </span><span style=\"font-family: Nova Mono;\">&rarr; According to the statement the minimum eligibility criteria is graduation pass. So only graduation pass will apply. So assumption 1 is implicit.</span></p>\r\n<p><span style=\"font-family: Roboto;\"><strong>Assumption 2</strong> </span><span style=\"font-family: Nova Mono;\"> &rarr; According to the statement minimum eligibility criteria is graduation pass. So any higher degree holder can apply for this job. So assumption is implicit. </span></p>\r\n<p><span style=\"font-family: Roboto;\">Both assumptions 1 and 2 are implicit. </span></p>\r\n<p><span style=\"font-family: Roboto;\">.</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Palanquin;\">46.(d) <strong>&#2343;&#2366;&#2352;&#2339;&#2366; 1</strong></span><span style=\"font-family: Arial Unicode MS;\"> &rarr; &#2325;&#2341;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2346;&#2366;&#2340;&#2381;&#2352;&#2340;&#2366; &#2350;&#2366;&#2344;&#2342;&#2306;&#2337; &#2360;&#2381;&#2344;&#2366;&#2340;&#2325; &#2346;&#2366;&#2360; &#2361;&#2376;&#2404; &#2311;&#2360;&#2354;&#2367;&#2319; &#2360;&#2381;&#2344;&#2366;&#2340;&#2325; &#2346;&#2366;&#2360; &#2361;&#2368; &#2310;&#2357;&#2375;&#2342;&#2344; &#2325;&#2352;&#2375;&#2306;&#2327;&#2375;&#2404; &#2340;&#2379; &#2343;&#2366;&#2352;&#2339;&#2366; 1 &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Arial Unicode MS;\"><strong>&#2343;&#2366;&#2352;&#2339;&#2366; 2 </strong>&rarr;</span><span style=\"font-family: Palanquin;\"> &#2325;&#2341;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2346;&#2366;&#2340;&#2381;&#2352;&#2340;&#2366; &#2350;&#2366;&#2344;&#2342;&#2306;&#2337; &#2360;&#2381;&#2344;&#2366;&#2340;&#2325; &#2346;&#2366;&#2360; &#2361;&#2376;&#2404; &#2340;&#2379; &#2325;&#2379;&#2312; &#2349;&#2368; &#2313;&#2330;&#2381;&#2330; &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2343;&#2366;&#2352;&#2325; &#2311;&#2360; &#2344;&#2380;&#2325;&#2352;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2375;&#2342;&#2344; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2340;&#2379; &#2343;&#2366;&#2352;&#2339;&#2366; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2343;&#2366;&#2352;&#2339;&#2366;&#2319;&#2305; 1 &#2324;&#2352; 2 &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</span></p>\n",
                    correct: "d",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });

                questions.push({
                    id: "58",
                    section: "6",
                    question_en: "<p>58.<span style=\"font-family: Roboto;\"> In the morning prayer of a school, Chanchal was 8th from the front, while Prince was 11th from the back in the same row. If they swap their positions, Chanchal becomes 22nd from the front. What is the number of students in the row ? </span></p>\n",
                    question_hi: "<p>58.<span style=\"font-family: Palanquin;\"> &#2319;&#2325; &#2360;&#2381;&#2325;&#2370;&#2354; &#2325;&#2368; &#2360;&#2369;&#2348;&#2361; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2352;&#2381;&#2341;&#2344;&#2366; &#2350;&#2375;&#2306; &#2330;&#2306;&#2330;&#2354; &#2310;&#2327;&#2375; &#2360;&#2375; 8&#2357;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2341;&#2368;, &#2332;&#2348;&#2325;&#2367; &#2346;&#2381;&#2352;&#2367;&#2306;&#2360; &#2313;&#2360;&#2368; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2346;&#2368;&#2331;&#2375; &#2360;&#2375; 11&#2357;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2341;&#2366;&#2404; &#2351;&#2342;&#2367; &#2357;&#2375; &#2309;&#2346;&#2344;&#2375; &#2346;&#2342;&#2379;&#2306; &#2325;&#2368; &#2309;&#2342;&#2354;&#2366;-&#2348;&#2342;&#2354;&#2368; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2330;&#2306;&#2330;&#2354; &#2360;&#2366;&#2350;&#2344;&#2375; &#2360;&#2375; 22&#2357;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376; ?</span></p>\n",
                    options_en: ["<p>32</p>\n", "<p>30</p>\n", 
                                "<p>31</p>\n", "<p>33</p>\n"],
                    options_hi: ["<p>32</p>\n", "<p>30</p>\n",
                                "<p>31</p>\n", "<p>33</p>\n"],
                    solution_en: "<p>58.(a)<span style=\"font-family: Roboto;\"> Chanchal = 8th (from front)</span></p>\r\n<p><span style=\"font-family: Roboto;\">Prince = 11th (from back) </span><span style=\"font-family: Roboto;\">= 22nd (from front)</span></p>\r\n<p><span style=\"font-family: Roboto;\">Therefore, total no. of students = 11 + 22 - 1 = 32</span></p>\n",
                    solution_hi: "<p>58.(a)<span style=\"font-family: Palanquin;\"> &#2330;&#2306;&#2330;&#2354; = &#2310;&#2336;&#2357;&#2366;&#2306; (&#2360;&#2366;&#2350;&#2344;&#2375; &#2360;&#2375;)</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2346;&#2381;&#2352;&#2367;&#2306;&#2360; = 11&#2357;&#2366;&#2306; (&#2346;&#2368;&#2331;&#2375; &#2360;&#2375;) </span><span style=\"font-family: Palanquin;\">= 22&#2357;&#2366;&#2306; (&#2360;&#2366;&#2350;&#2344;&#2375; &#2360;&#2375;)</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2311;&#2360;&#2354;&#2367;&#2319; &#2325;&#2369;&#2354; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = 11 + 22 - 1 = 32</span></p>\n",
                    correct: "a",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });
                questions.push({
                    id: "59",
                    section: "6",
                    question_en: "<p>59.<span style=\"font-family: Roboto;\"> Select the number that can replace the question mark(?).</span></p>\r\n<p><span style=\"font-family: Roboto;\">199 = 18, 267 = 19, 456 = 26, then 678 = ?</span></p>\n",
                    question_hi: "<p>59.<span style=\"font-family: Palanquin;\"> &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2357;&#2366;&#2330;&#2325; &#2330;&#2367;&#2344;&#2381;&#2361; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2319;&#2327;&#2368; </span></p>\r\n<p><span style=\"font-family: Roboto;\">199 = 18, 267 = 19, 456 = 26, &#2340;&#2348; 678 = ?</span></p>\n",
                    options_en: ["<p>56</p>\n", "<p>50</p>\n", 
                                "<p>52</p>\n", "<p>55</p>\n"],
                    options_hi: ["<p>56</p>\n", "<p>50</p>\n",
                                "<p>52</p>\n", "<p>55</p>\n"],
                    solution_en: "<p>59.(b)</p>\r\n<p><span style=\"font-weight: 400;\">1 &times; </span><span style=\"font-weight: 400;\">9 + 9 = 18</span></p>\r\n<p><span style=\"font-weight: 400;\">2 &times; </span><span style=\"font-weight: 400;\">6 + 7 = 19</span></p>\r\n<p><span style=\"font-weight: 400;\">4 &times; </span><span style=\"font-weight: 400;\">5 + 6 = 26</span></p>\r\n<p><span style=\"font-weight: 400;\">6 &times; </span><span style=\"font-weight: 400;\">7 + 8 = 50</span></p>\n",
                    solution_hi: "<p>59.(b)</p>\r\n<p><span style=\"font-weight: 400;\">1 &times; </span><span style=\"font-weight: 400;\">9 + 9 = 18</span></p>\r\n<p><span style=\"font-weight: 400;\">2 &times; </span><span style=\"font-weight: 400;\">6 + 7 = 19</span></p>\r\n<p><span style=\"font-weight: 400;\">4 &times; </span><span style=\"font-weight: 400;\">5 + 6 = 26</span></p>\r\n<p><span style=\"font-weight: 400;\">6 &times; </span><span style=\"font-weight: 400;\">7 + 8 = 50</span></p>\n",
                    correct: "b",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });
                questions.push({
                    id: "60",
                    section: "misc",
                    question_en: "<p>60.<span style=\"font-family: Roboto;\">Which of the following number will replace the question mark (?) in the given series to make it logically complete ?</span></p>\r\n<p><span style=\"font-family: Roboto;\">74 , 62 , 82 , 78 , 109 , 159 , 173 , ?</span></p>\n",
                    question_hi: "<p>60. <span style=\"font-family: Palanquin;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2368; &#2327;&#2312; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2319;&#2327;&#2368; ?</span></p>\r\n<p><span style=\"font-family: Roboto;\"> 74 , 62 , 82 , 78 , 109 , 159 , 173 , ?</span></p>\n",
                    options_en: ["<p>223</p>\n", "<p>375</p>\n", 
                                "<p>415</p>\n", "<p>295</p>\n"],
                    options_hi: ["<p>223</p>\n", "<p>375</p>\n",
                                "<p>415</p>\n", "<p>295</p>\n"],
                    solution_en: "<p>60.(c)</p>\r\n<p><span style=\"font-family: Roboto;\"> </span><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1689849524/word/media/image13.png\" width=\"264\" height=\"160\"></p>\n",
                    solution_hi: "<p>60.(c)<span style=\"font-family: Roboto;\"> </span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1689849524/word/media/image13.png\" width=\"264\" height=\"160\"></p>\n",
                    correct: "c",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });
            
            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();
        }
        
        // Show a specific question
        
        function formatContent(text) {
            if (!text) return '';
            return text.replace(/<img/g, '<img style="max-width:100%;height:auto;"');
        }
        
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML
            let html = `
                <div class="question-card">
                    <div class="question-text">
                        <div class="en">${formatContent(question.question_en)}</div>
                        <div class="hi" style="display:none">${formatContent(question.question_hi)} </div>
                    </div>
                    <div class="options" id="options-container">`;
            
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = '';
                let isCorrectAnswer = opt === question.correct;
                let isUserAnswer = answers[question.id] === opt;
                
                // When reviewing, add appropriate classes
                if (submitted) {
                    if (isCorrectAnswer) {
                        optionClass += ' correct-answer';
                    } else if (isUserAnswer && !isCorrectAnswer) {
                        optionClass += ' incorrect';
                    }
                }
                
                html += `
                    <div class="option-item">
                        <input class="option-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${isUserAnswer ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                       <label class="option-label${optionClass}" for="opt-${index}-${opt}">
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="solution-container">
                        <div class="solution-title">${resultText}</div>
                        <div class="solution-text">
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
            
            // Add review mode class if submitted
            if (submitted) {
                document.getElementById('options-container').classList.add('review-mode');
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
            
            // Update language button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                const box = document.getElementById(`box-${index}`);
                box.classList.add('attempted');
                box.classList.remove('unattempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { 
            if (currentQuestion > 0) showQuestion(currentQuestion - 1); 
        }
        
        function nextQuestion() { 
            if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); 
        }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const overlay = document.getElementById('nav-overlay');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                overlay.classList.add('show');
                document.body.style.overflow = 'hidden';
            } else {
                nav.classList.remove('show');
                overlay.classList.remove('show');
                document.body.style.overflow = '';
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            // Create a more modern confirmation dialog
            const confirmHtml = `
                <div style="text-align: center; padding: 20px;">
                    <h4 style="margin-bottom: 16px; color: var(--dark);">Confirm Submission</h4>
                    <p style="margin-bottom: 24px; color: var(--gray);">
                        You have attempted ${attempted} of ${questions.length} questions.<br>
                        ${remaining} questions are unattempted.
                    </p>
                    <div style="display: flex; justify-content: center; gap: 12px;">
                        <button onclick="this.closest('.modal').querySelector('.cancel-btn').click()" 
                            style="padding: 8px 20px; border: 1px solid var(--light-gray); background: white; border-radius: 8px; cursor: pointer;">
                            Cancel
                        </button>
                        <button onclick="submitTest(); this.closest('.modal').querySelector('.cancel-btn').click()" 
                            style="padding: 8px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer;">
                            Submit Test
                        </button>
                    </div>
                </div>`;
            
            // Create modal element
            const modal = document.createElement('div');
            modal.className = 'results-modal show';
            modal.innerHTML = `
                <div class="results-card" style="max-width: 400px;">
                    <button class="cancel-btn" style="position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--gray);" onclick="this.closest('.results-modal').remove()">
                        ×
                    </button>
                    ${confirmHtml}
                </div>`;
            
            document.body.appendChild(modal);
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('unattempted');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            document.getElementById('results-modal').classList.add('show');
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            submitBtn.style.backgroundColor = 'var(--success)';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            document.getElementById('results-modal').classList.remove('show');
            showQuestion(0);
        }
        
        // Close modal when clicking outside
        window.addEventListener('click', function(event) {
            if (event.target === document.getElementById('results-modal')) {
                document.getElementById('results-modal').classList.remove('show');
            }
        });
        
        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') prevQuestion();
            if (e.key === 'ArrowRight') nextQuestion();
        });
    </script>

<!-- START: Portal Dynamic Theme Handler -->
<script>
    (function() {
        const toggleBtn = document.getElementById('themeToggle');
        if (toggleBtn) {
            // Apply saved preference or default to dark theme
            const savedTheme = localStorage.getItem('portal-theme') || 'dark';
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
                const icon = toggleBtn.querySelector('i');
                if (icon) {
                    icon.className = 'fas fa-sun';
                }
            } else {
                document.body.classList.remove('light-theme');
                const icon = toggleBtn.querySelector('i');
                if (icon) {
                    icon.className = 'fas fa-moon';
                }
            }
            
            toggleBtn.onclick = function(e) {
                e.stopPropagation();
                const isLight = document.body.classList.toggle('light-theme');
                localStorage.setItem('portal-theme', isLight ? 'light' : 'dark');
                
                const icon = toggleBtn.querySelector('i');
                if (icon) {
                    icon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            };
        }
    })();
</script>
<!-- END: Portal Dynamic Theme Handler -->
