                    neg_marks: 1.0
                });
                questions.push({
                    id: "28",
                    section: "17",
                    question_en: "<p>28.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">The mean and standard deviation of 100 observations were calculated as 40 and 5.1 respectively by a student who took 50 instead of 40 for one observation. What is the correct mean and standard deviation?</span></p>",
                    question_hi: "<p>28.<span style=\"font-family: Cambria Math;\">एक</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">छात्र</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">द्वारा</span><span style=\"font-family: Cambria Math;\"> 100 </span><span style=\"font-family: Cambria Math;\">प्रेक्षणों</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">के</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">माध्य</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">और</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">मानक</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">विचलन</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">की</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">गणना</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">क्रमशः</span><span style=\"font-family: Cambria Math;\"> 40 </span><span style=\"font-family: Cambria Math;\">और</span><span style=\"font-family: Cambria Math;\"> 5.1 </span><span style=\"font-family: Cambria Math;\">के</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">रूप</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">में</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">की</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">गई</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">जिन्होंने</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">एक</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">प्रेक्षण</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">के</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">लिए</span><span style=\"font-family: Cambria Math;\"> 40 </span><span style=\"font-family: Cambria Math;\">के</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">बजाय</span><span style=\"font-family: Cambria Math;\"> 50 </span><span style=\"font-family: Cambria Math;\">लिया।</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">सही</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">माध्य</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">और</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">मानक</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">विचलन</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">क्या</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">है</span><span style=\"font-family: Cambria Math;\">?</span></p>",
                    options_en: ["<p>39.9, 5</p>", "<p>39.09, 5</p>", 
                                "<p>39.9, 50</p>", "<p>39.0, 5</p>"],
                    options_hi: ["<p>39.9, 5</p>", "<p>39.09, 5</p>",
                                "<p>39.9, 50</p>", "<p>39.0, 5</p>"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">28.(a)&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mover><mi mathvariant=\"normal\">x</mi><mo>&#175;</mo></mover></math> =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mi mathvariant=\"normal\">n</mi></mfrac></math><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><munderover><mrow><mo>&#8721;</mo><mo>&#160;</mo><msub><mi mathvariant=\"normal\">x</mi><mi mathvariant=\"normal\">i</mi></msub></mrow><mrow><mi mathvariant=\"normal\">i</mi><mo>=</mo><mn>1</mn></mrow><mi mathvariant=\"normal\">n</mi></munderover></math></span><br><span style=\"font-family: Cambria Math;\"><strong id=\"docs-internal-guid-7cf6fdef-7fff-151e-d5fc-09510d3393fc\">&Sigma;</strong>x<sub>i</sub> = n<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mover><mi mathvariant=\"normal\">x</mi><mo>&#175;</mo></mover></math> = 100 &times; 40 = 4000</span><br><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msubsup><mi mathvariant=\"normal\">&#948;</mi><mi mathvariant=\"normal\">x</mi><mn>2</mn></msubsup></math> =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mi mathvariant=\"normal\">n</mi></mfrac></math><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><munderover><mrow><mo>&#8721;</mo><mo>&#160;</mo><msubsup><mi mathvariant=\"normal\">x</mi><mi mathvariant=\"normal\">i</mi><mn>2</mn></msubsup></mrow><mrow><mi mathvariant=\"normal\">i</mi><mo>=</mo><mn>1</mn></mrow><mi mathvariant=\"normal\">n</mi></munderover></math> =&nbsp; (<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mover><mi mathvariant=\"normal\">x</mi><mo>&#175;</mo></mover></math>)<sup>2</sup> = 100(26.01 + 1600) = 162601&nbsp;</span><br><span style=\"font-family: Cambria Math;\">Corrected <strong id=\"docs-internal-guid-7cf6fdef-7fff-151e-d5fc-09510d3393fc\">&Sigma;</strong>x<sub>i</sub> = 4000 - 50 + 40 = 3990</span><br><span style=\"font-family: Cambria Math;\">Corrected <strong id=\"docs-internal-guid-7cf6fdef-7fff-151e-d5fc-09510d3393fc\">&Sigma;</strong><strong id=\"docs-internal-guid-7cf6fdef-7fff-151e-d5fc-09510d3393fc\"></strong><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msubsup><mi mathvariant=\"normal\">x</mi><mi mathvariant=\"normal\">i</mi><mn>2</mn></msubsup></math> = 16201 - (50)<sup>2</sup> + (40)<sup>2</sup> = 161701</span><br><span style=\"font-family: Cambria Math;\">So corrected mean = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3990</mn><mn>100</mn></mfrac></math>= 39.9</span><br><span style=\"font-family: Cambria Math;\">Corrected <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msubsup><mi mathvariant=\"normal\">&#948;</mi><mi mathvariant=\"normal\">x</mi><mn>2</mn></msubsup></math> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>161701</mn><mn>100</mn></mfrac></math> - (39.9)<sup>2</sup> = 25</span><br><span style=\"font-family: Cambria Math;\">Corrected standard deviation = 5</span></p>",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">28.(a)&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mover><mi mathvariant=\"normal\">x</mi><mo>&#175;</mo></mover></math> =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mi mathvariant=\"normal\">n</mi></mfrac></math><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><munderover><mrow><mo>&#8721;</mo><mo>&#160;</mo><msub><mi mathvariant=\"normal\">x</mi><mi mathvariant=\"normal\">i</mi></msub></mrow><mrow><mi mathvariant=\"normal\">i</mi><mo>=</mo><mn>1</mn></mrow><mi mathvariant=\"normal\">n</mi></munderover></math></span><br><span style=\"font-family: Cambria Math;\"><strong id=\"docs-internal-guid-7cf6fdef-7fff-151e-d5fc-09510d3393fc\">&Sigma;</strong>x<sub>i</sub> = n<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mover><mi mathvariant=\"normal\">x</mi><mo>&#175;</mo></mover></math> = 100 &times; 40 = 4000</span><br><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msubsup><mi mathvariant=\"normal\">&#948;</mi><mi mathvariant=\"normal\">x</mi><mn>2</mn></msubsup></math> =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mi mathvariant=\"normal\">n</mi></mfrac></math><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><munderover><mrow><mo>&#8721;</mo><mo>&#160;</mo><msubsup><mi mathvariant=\"normal\">x</mi><mi mathvariant=\"normal\">i</mi><mn>2</mn></msubsup></mrow><mrow><mi mathvariant=\"normal\">i</mi><mo>=</mo><mn>1</mn></mrow><mi mathvariant=\"normal\">n</mi></munderover></math> =&nbsp; (<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mover><mi mathvariant=\"normal\">x</mi><mo>&#175;</mo></mover></math>)<sup>2</sup> = 100(26.01 + 1600) = 162601&nbsp;</span><br><span style=\"font-family: Cambria Math;\">सही &Sigma;x<sub>i</sub> = 4000 - 50 + 40 = 3990</span><br><span style=\"font-family: Cambria Math;\">सही &Sigma;<strong id=\"docs-internal-guid-7cf6fdef-7fff-151e-d5fc-09510d3393fc\"></strong><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msubsup><mi mathvariant=\"normal\">x</mi><mi mathvariant=\"normal\">i</mi><mn>2</mn></msubsup></math> = 16201 - (50)<sup>2</sup> + (40)<sup>2</sup> = 161701&nbsp;</span><br><span style=\"font-family: Cambria Math;\">अतः शुद्ध माध्य =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3990</mn><mn>100</mn></mfrac></math>= 39.9</span><br><span style=\"font-family: Cambria Math;\">सही <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msubsup><mi mathvariant=\"normal\">&#948;</mi><mi mathvariant=\"normal\">x</mi><mn>2</mn></msubsup></math> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>161701</mn><mn>100</mn></mfrac></math> - (39.9)<sup>2</sup> = 25</span><br><span style=\"font-family: Cambria Math;\">सही मानक विचलन = 5</span></p>",
                    correct: "a",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });
                questions.push({
                    id: "29",
                    section: "17",
                    question_en: "<p>29. <span style=\"font-family: Cambria Math;\">In a school, there are 1000 students, out of which 430 are girls. It is known </span><span style=\"font-family: Cambria Math;\">that out of 430, 10% of the girls study in class XII. What is the probability that a student </span><span style=\"font-family: Cambria Math;\">chosen r</span><span style=\"font-family: Cambria Math;\">andomly studies in Class XII given that the chosen student is a girl ?</span></p>",
                    question_hi: "<p>29. <span style=\"font-family: Cambria Math;\">एक</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">स्कूल</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">में</span><span style=\"font-family: Cambria Math;\"> 1000 </span><span style=\"font-family: Cambria Math;\">छात्र</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">हैं</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">जिनमें</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">से</span><span style=\"font-family: Cambria Math;\"> 430 </span><span style=\"font-family: Cambria Math;\">लड़कियां</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">हैं।</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">यह</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">ज्ञात</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">है</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">कि</span><span style=\"font-family: Cambria Math;\"> 430 </span><span style=\"font-family: Cambria Math;\">में</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">से</span><span style=\"font-family: Cambria Math;\"> 10% </span><span style=\"font-family: Cambria Math;\">लड़कियां</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">बारहवीं</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">कक्षा</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">में</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">पढ़ती</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">हैं।</span><span style=\"font-family: Cambria Math;\"> क्या संभावना है कि एक छात्र जो यादृच्छिक रूप से चुना गया हो बारहवीं कक्षा में अध्ययन करता हो और और जबकि यह भी दिया हो की यह एक लड़की ही है?<br></span></p>",
                    options_en: ["<p>0.1</p>", "<p>0.01</p>", 
                                "<p>0.11</p>", "<p>0.2</p>"],
                    options_hi: ["<p>0.1</p>", "<p>0.01</p>",

                    solution_en: "<p>29.(a) <span style=\"font-family: Cambria Math;\">Let E denote the event that a student chosen randomly studies in Class XII and be the event that the randomly chosen student is a girl. We have to find P (E|F).</span><br><span style=\"font-family: Cambria Math;\">P(F) = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>430</mn><mn>1000</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\">= 0.43 and P(E <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#8745;</mo></math> </span><span style=\"font-family: Cambria Math;\">F) = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>43</mn><mn>1000</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">= 0.043 (Why?)</span><br><span style=\"font-family: Cambria Math;\">P(E|F) = </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mrow><mi mathvariant=\"normal\">P</mi><mo>(</mo><mi mathvariant=\"normal\">E</mi><mo>&#160;</mo><mo>&#8745;</mo><mo>&#160;</mo><mi mathvariant=\"normal\">F</mi><mo>)</mo></mrow><mrow><mi mathvariant=\"normal\">P</mi><mo>(</mo><mi mathvariant=\"normal\">F</mi><mo>)</mo></mrow></mfrac></mstyle></math> <span style=\"font-family: Cambria Math;\">=&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>0</mn><mo>.</mo><mn>043</mn></mrow><mrow><mn>0</mn><mo>.</mo><mn>43</mn></mrow></mfrac></math> = 0.1</span></p>",

        // Show a specific question
        
        function formatContent(text) {
            if (!text) return '';
            return text.replace(/<img/g, '<img style="max-width:100%;height:auto;"');
        }
        
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML
            let html = `
                <div class="question-card">
                    <div class="question-text">
                        <div class="en">${formatContent(question.question_en)}</div>
                        <div class="hi" style="display:none">${formatContent(question.question_hi)} </div>
                    </div>
                    <div class="options" id="options-container">`;
            
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = '';
                let isCorrectAnswer = opt === question.correct;
                let isUserAnswer = answers[question.id] === opt;
                
                // When reviewing, add appropriate classes
                if (submitted) {
                    if (isCorrectAnswer) {
                        optionClass += ' correct-answer';
                    } else if (isUserAnswer && !isCorrectAnswer) {
                        optionClass += ' incorrect';
                    }
                }
                
                html += `
                    <div class="option-item">
                        <input class="option-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${isUserAnswer ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                       <label class="option-label${optionClass}" for="opt-${index}-${opt}">
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="solution-container">
                        <div class="solution-title">${resultText}</div>
                        <div class="solution-text">
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
            
            // Add review mode class if submitted
            if (submitted) {
                document.getElementById('options-container').classList.add('review-mode');
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
            
            // Update language button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                const box = document.getElementById(`box-${index}`);
                box.classList.add('attempted');
                box.classList.remove('unattempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { 
            if (currentQuestion > 0) showQuestion(currentQuestion - 1); 
        }
        
        function nextQuestion() { 
            if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); 
        }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const overlay = document.getElementById('nav-overlay');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                overlay.classList.add('show');
                document.body.style.overflow = 'hidden';
            } else {
                nav.classList.remove('show');
                overlay.classList.remove('show');
                document.body.style.overflow = '';
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer
        function togglePause() {
    if (typeof test !== 'undefined') {
        test.isPaused = !test.isPaused;
        if (test.isPaused) {
            clearInterval(window.timerInterval);
            const pb = document.getElementById('pauseBtn');
            if (pb) {
                pb.innerHTML = '▶';
                pb.title = 'Resume Test';
            }
            const pm = document.getElementById('pauseModal');
            if (pm) {
                pm.style.display = 'flex';
                pm.style.alignItems = 'center';
                pm.style.justifyContent = 'center';
            }
        } else {
            const pm = document.getElementById('pauseModal');
            if (pm) pm.style.display = 'none';
            const pb = document.getElementById('pauseBtn');
            if (pb) {
                pb.innerHTML = '⏸';
                pb.title = 'Pause Test';
            }
            startTimer();
        }
    } else {
        window.isPaused = !window.isPaused;
        if (window.isPaused) {
            clearInterval(window.timerInterval);
            const pb = document.getElementById('pauseBtn');
            if (pb) {
                pb.innerHTML = '▶';
                pb.title = 'Resume Test';
            }
            const pm = document.getElementById('pauseModal');
            if (pm) {
                pm.style.display = 'flex';
                pm.style.alignItems = 'center';
                pm.style.justifyContent = 'center';
            }
        } else {
            const pm = document.getElementById('pauseModal');
            if (pm) pm.style.display = 'none';
            const pb = document.getElementById('pauseBtn');
            if (pb) {
                pb.innerHTML = '⏸';
                pb.title = 'Pause Test';
            }
            startTimer();
        }
    }
}

function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            window.timeLeft = typeof window.timeLeft !== 'undefined' ? window.timeLeft : (typeof test !== 'undefined' ? (test.timeLeft || test.timer) : (typeof totalTime !== 'undefined' ? totalTime : 3600));
            let timeLeft = window.timeLeft;
            
            window.timerInterval = setInterval(() => {
                window.timeLeft = timeLeft;
                if (typeof test !== 'undefined') { test.timerInterval = window.timerInterval; test.timeLeft = timeLeft; }
                const timerInterval = window.timerInterval;
                const interval = window.timerInterval;
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            // Create a more modern confirmation dialog
            const confirmHtml = `
                <div style="text-align: center; padding: 20px;">
                    <h4 style="margin-bottom: 16px; color: var(--dark);">Confirm Submission</h4>
                    <p style="margin-bottom: 24px; color: var(--gray);">
                        You have attempted ${attempted} of ${questions.length} questions.<br>
                        ${remaining} questions are unattempted.
                    </p>
                    <div style="display: flex; justify-content: center; gap: 12px;">
                        <button onclick="this.closest('.modal').querySelector('.cancel-btn').click()" 
                            style="padding: 8px 20px; border: 1px solid var(--light-gray); background: white; border-radius: 8px; cursor: pointer;">
                            Cancel
                        </button>
                        <button onclick="submitTest(); this.closest('.modal').querySelector('.cancel-btn').click()" 
                            style="padding: 8px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer;">
                            Submit Test
                        </button>
                    </div>
                </div>`;
            
            // Create modal element
            const modal = document.createElement('div');
            modal.className = 'results-modal show';
            modal.innerHTML = `
                <div class="results-card" style="max-width: 400px;">
                    <button class="cancel-btn" style="position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--gray);" onclick="this.closest('.results-modal').remove()">
                        ×
                    </button>
                    ${confirmHtml}
                </div>`;
            
            document.body.appendChild(modal);
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('unattempted');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            document.getElementById('results-modal').classList.add('show');
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            submitBtn.style.backgroundColor = 'var(--success)';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            document.getElementById('results-modal').classList.remove('show');
            showQuestion(0);
        }
        
        // Close modal when clicking outside
        window.addEventListener('click', function(event) {
            if (event.target === document.getElementById('results-modal')) {
                document.getElementById('results-modal').classList.remove('show');
            }
        });
        
        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') prevQuestion();
            if (e.key === 'ArrowRight') nextQuestion();
        });
    </script>

<!-- START: Portal Dynamic Theme Handler -->
<script>
    (function() {
        const toggleBtn = document.getElementById('themeToggle');
        if (toggleBtn) {
            // Apply saved preference or default to dark theme
            const savedTheme = localStorage.getItem('portal-theme') || 'dark';
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
                const icon = toggleBtn.querySelector('i');
                if (icon) {
                    icon.className = 'fas fa-sun';
                }
            } else {
                document.body.classList.remove('light-theme');
                const icon = toggleBtn.querySelector('i');
                if (icon) {
                    icon.className = 'fas fa-moon';
                }
            }
            
            toggleBtn.onclick = function(e) {
                e.stopPropagation();
                const isLight = document.body.classList.toggle('light-theme');
                localStorage.setItem('portal-theme', isLight ? 'light' : 'dark');
                
                const icon = toggleBtn.querySelector('i');
                if (icon) {
                    icon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            };
        }
    })();
</script>
