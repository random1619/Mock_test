            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--primary);

            background: rgba(0, 184, 148, 0.05);

        }

            border-color: var(--danger);
            background: rgba(214, 48, 49, 0.05);
            box-shadow: 0 0 0 1px var(--danger);
        }
        
        .MathJax, .mjx-chtml {
            overflow-x: auto;
            max-width: 100%;
            display: inline-block;
        }

        
        .review-mode .option-input:checked + .option-label.incorrect::after {
            background: var(--danger);
        }
        
        .review-mode .option-label.correct-answer {
            border-color: var(--success);
            background: rgba(0, 184, 148, 0.05);
            box-shadow: 0 0 0 1px var(--success);

        .solution-title {
            font-weight: 600;

            color: var(--primary);

            justify-content: center;

            box-shadow: var(--box-shadow-sm);

        .q-box.attempted {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .q-box.correct {
            background-color: var(--success);
            color: white;
            border-color: var(--success);
        }
        
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
            border-color: var(--danger);
        }
        
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);

        .q-box.unattempted {
            background-color: var(--gray);
            color: white;
            border-color: var(--gray);

        .bottom-nav {

            left: 0;

            align-items: center;

            padding: 0 16px;

        .nav-btn {

            border-radius: 12px;
            border: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;

            gap: 8px;

        .nav-btn i {

        .nav-btn-primary {

            color: white;

        .nav-btn-primary:hover {

        .nav-btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        
        .nav-btn-outline:hover {
            background: rgba(108, 92, 231, 0.1);
            transform: translateY(-2px);
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        /* Overlay when nav is open */
        .nav-overlay {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 80px;
            background: rgba(0,0,0,0.5);
            z-index: 800;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);

        .nav-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        
        /* Results Modal */
        .results-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);

            justify-content: center;
            z-index: 1100;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);

        .results-modal.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .results-card {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            transform: translateY(20px);
            transition: var(--transition);
        }
        
        .results-modal.show .results-card {
            transform: translateY(0);
        }
        
        .results-header {
            background: var(--header-bg);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .results-title {
            margin: 0;
            font-weight: 600;
        }
        
        .results-body {
            padding: 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            color: white;
            box-shadow: var(--box-shadow-sm);

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        
        .results-footer {
            padding: 16px 20px;
            display: flex;
            justify-content: center;
            border-top: 1px solid var(--light-gray);
        }
        
        /* Responsive Adjustments */
        @media (min-width: 992px) {
            .question-nav {
                transform: translateX(0);
            }
            
            .main-content {
                margin-right: 320px;
            }
            
            .nav-overlay {
                display: none;
            }
            
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));

            .q-box {

            .nav-btn {
                height: 44px;
                padding: 0 16px;
                font-size: 0.9rem;
            }
        }

                    solution_en: "<p>1.(d)</p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Total employees = 35000</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Males : Females = 4 : 3</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Then males = 20000 and females = 15000</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> Males after 30% increase = 20000 &times;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>130</mn><mn>100</mn></mfrac></math> <span style=\"font-weight: 400;\">= 26000</span></span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">And females after 37% decrease = 15000 &times;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>63</mn><mn>100</mn></mfrac></math><span style=\"font-weight: 400;\">= 9450</span></span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Total employees after increase and decrease = 26000 + 9450 = 35450</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> Required percentage =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>35450</mn><mo>-</mo><mn>35000</mn></mrow><mn>35000</mn></mfrac></math> &times; 100 = </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> 1.28%</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Short tricks :-</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">ratio &rarr;&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; male&nbsp; &nbsp; &nbsp; :&nbsp; &nbsp; &nbsp; &nbsp;female</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 4&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; :&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 3</span></p>\\r\\n<p><span style=\"font-family: Ca                     solution_hi: "<p>1.(d)</p>\\r\\n<p><span style=\"font-family: Kokila;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> = 35000</span></p>\\r\\n<p><span style=\"font-family: Kokila;\">&#2346;&#2369;&#2352;&#2369;&#2359;</span><span style=\"font-family: Cambria Math;\"> : </span><span style=\"font-family: Kokila;\">&#2350;&#2361;&#2367;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\"> = 4 : 3</span></p>\\r\\n<p><span style=\"font-family: Kokila;\">&#2340;&#2348;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2369;&#2352;&#2369;&#2359;</span><span style=\"font-family: Cambria Math;\"> = 20000 </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2361;&#2367;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\"> = 15000</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">30% </span><span style=\"font-family: Kokila;\">&#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2366;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2369;&#2352;&#2369;&#2359;</span><span style=\"font-family: Cambria Math;\"> = 20000 &times;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>130</mn><mn>100</mn></mfrac></math> <span style=\"font-weight: 400;\">=26000</span></span></p>\\r\\n<p><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 37% </span><span style=\"font-family: Kokil                     solution_en: "<p>7.(b)</p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Short trick,</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">If we want to find unit digit then divide whole equation simply by 10</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&nbsp;</mo><mo>&rArr;</mo><mfrac><mrow><msup><mn>3</mn><mn>1</mn></msup><mo>+</mo><msup><mn>3</mn><mn>2</mn></msup><mo>+</mo><msup><mn>3</mn><mn>3</mn></msup><mo>+</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>+</mo><msup><mn>3</mn><mn>32</mn></msup><mo>&nbsp;</mo></mrow><mn>10</mn></mfrac><mspace linebreak=\"newline\"></mspace><mo>&nbsp;</mo><mo>&rArr;</mo><mfrac><mrow><mn>3</mn><mo>+</mo><mn>9</mn><mo>+</mo><mn>27</mn><mo>+</mo><mn>81</mn><mo>+</mo><mn>243</mn><mo>+</mo><mn>729</mn><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>+</mo><msup><mn>3</mn><mn>32</mn></msup></mrow><mn>10</mn></mfrac><mspace linebreak=\"newline\"></mspace><mo>&nbsp;</mo><mo>&rArr;</mo><mfrac><mrow><mo>(</mo><mn>3</mn><mo>+</mo><mn>9</mn><mo>+</mo><mn>7</mn><mo>+</mo><mn>1</mn><mo>)</mo><mo>+</mo><mo>(</mo><mn>3</mn><mo>+</mo><mn>9</mn><mo>+</mo><mn>7</mn><mo>+</mo><mn>1</mn><mo>)</mo><mo>+</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>(</mo><mn>3</mn><mo>+</mo><mn>9</mn><mo>+</mo><mn>7</mn><mo>+</mo><mn>1</mn><mo>)</mo></mrow><mn>10</mn></mfrac></math></span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Here we noticed that after every 4th term remainder repeats itself</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&rArr;</mo><mfrac><mrow><mo>&nbsp;</mo><mo>(</mo><mn>3</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>8</mn><mo>)</mo><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mo>(</mo><mn>9</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>8</mn><mo>)</mo><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mo>(</mo><mn>7</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>8</mn><mo>)</mo><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mo>(</mo><mn>1</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>8</mn><mo>)</mo></mrow><mrow><mn>10</mn><mo>&nbsp;</mo></mrow></mfrac></math></span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">=</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>24</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>72</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>56</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>8</mn></mrow><mn>10</mn></mfrac><mo>=</mo><mfrac><mn>160</mn><mn>10</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> =16</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Remainder = 0 </span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Therefore, the unit digit will be 0.</span></p>\\n",

                    solution_en: "<p>8.(b)</p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> In &Delta;</span><span style=\"font-family: Cambria Math;\">ABC, D is the mid point of AC and AB = AC.</span></p>\\r\\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1696500430/word/media/image2.png\"></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Here, AD is the tangent.</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Thus, AD&sup2;</span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-family: Cambria Math;\">=<span style=\"font-weight: 400;\">AP &times; </span><span style=\"font-weight: 400;\">AB</span>&nbsp;</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>A</mi><msup><mi>B</mi><mn>2</mn></msup></mrow><mn>4</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">= <span style=\"font-weight: 400;\">AP &times; </span><span style=\"font-weight: 400;\">AB</span></span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&nbsp;</mo><mfrac><mrow><mi>A</mi><mi>B</mi></mrow><mn>4</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">= AP = 4.2</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> AB = 16.8 cm</span></p>\\n",

                    solution_en: "<p>9.(c)</p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Total surface area of a hollow hemisphere = 2&pi;</span><span style=\"font-family: Cambria Math;\">(<span style=\"font-weight: 400;\">R&sup2;</span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">+ </span><span style=\"font-weight: 400;\">r&sup2;</span></span><span style=\"font-family: Cambria Math;\">) + &pi;</span><span style=\"font-family: Cambria Math;\">(<span style=\"font-weight: 400;\">R&sup2;</span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">r&sup2;</span></span><span style=\"font-family: Cambria Math;\">)</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Here R =12 cm and r = 9 cm</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">total surface area of the vessel = 2 &times; &pi; &times; </span><span style=\"font-family: Cambria Math;\">(<span style=\"font-weight: 400;\">12&sup2;</span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">+ </span><span style=\"font-weight: 400;\">9&sup2;</span></span><span style=\"font-family: Cambria Math;\">) + &pi; &times; </span><span style=\"font-family: Cambria Math;\">(<span style=\"font-weight: 400;\">12&sup2;</span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">9&sup2;</span></span><span style=\"font-family: Cambria Math;\">)</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">= &pi; </span><span style=\"font-family: Cambria Math;\">(2</span><span style=\"font-family: Cambria Math;\">&nbsp; &times; 225 + 63) = 513&pi;</span></p>\\n",
                    solution_hi: "<p>9.(c)</p>\\r\\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2319;&#2325; &#2326;&#2379;&#2326;&#2354;&#2375; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; </span>= 2&pi;</span><span style=\"font-family: Cambria Math;\">(<span style=\"font-weight: 400;\">R&sup2;</span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">+ </span><span style=\"font-weight: 400;\">r&sup2;</span></span><span style=\"font-family: Cambria Math;\">) + &pi;</span><span style=\"font-family: Cambria Math;\">(<span style=\"font-weight: 400;\">R&sup2;</span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">r&sup2;</span></span><span style=\"font-family: Cambria Math;\">)</span></p>\\r\\n<p><span style=\"font-weight: 400;\">&#2351;&#2361;&#2366;&#2305; R =12 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; r </span><span style=\"font-weight: 400;\">=</span><span style=\"font-weight: 400;\"> 9 &#2360;&#2375;&#2350;&#2368;</span></p>\\r\\n<p><span style=\"font-weight: 400;\">&#2348;&#2352;&#2381;&#2340;&#2344; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">&nbsp;= 2 &times; &pi; &times; </span><span style=\"font-family: Cambria Math;\">(<span>12&sup2;</span><span>&nbsp;</span><span>+ </span><span>9&sup2;</span></span><span style=\"font-family: Cambria Math;\">) + &pi; &times; </span><span style=\"font-family: Cambria Math;\">(<span>12&sup2;</span><span>&nbsp;</span><span>- </span><span>9&sup2;</span></span><span style=\"font-family: Cambria Math;\">)</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">= &pi; </span><span style=\"font-family: Cambria Math;\">(2</span><span style=\"font-family: Cambria Math;\">&nbsp; &times; 225 + 63) = 513&pi;</span></p>\\n",

                questions.push({
                    id: "10",
                    section: "17",
                    question_en: "<p>10.<span style=\"font-family: Cambria Math;\"> If (a + b) : (b + c) : (c + a) = 7 : 6 : 5 and a + b + c = 36, then what will be the value of</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mi>a</mi></mfrac><mo>:</mo><mfrac><mn>1</mn><mi>b</mi></mfrac><mo>:</mo><mfrac><mn>1</mn><mi>c</mi></mfrac></math><span style=\"font-family: Cambria Math;\">? </span></p>\\n",
                    question_hi: "<p>10<span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> (a+b) : (b+c) : (c+a) = 7 : 6 : 5 </span><span style=\"font-family: Kokila;\">&#2340;&#2341;&#2366;</span><span style=\"font-family: Cambria Math;\"> a+b+c = 36 </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mi>a</mi></mfrac><mo>:</mo><mfrac><mn>1</mn><mi>b</mi></mfrac><mo>:</mo><mfrac><mn>1</mn><mi>c</mi></mfrac></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2327;&#2366;</span><span style=\"font-family: Cambria Math;\"> ? </span></p>\\n",
                    options_en: ["<p>7 : 3 : 6</p>\\n", "<p>4 : 3 : 6</p>\\n", 
                                "<p>5 : 5 : 6</p>\\n", "<p>4 : 5 : 7</p>\\n"],
                    options_hi: ["<p>7 : 3 : 6</p>\\n", "<p>4 : 3 : 6</p>\\n",
                                "<p>5 : 5 : 6</p>\\n", "<p>4 : 5 : 7</p>\\n"],
                    solution_en: "<p>10.(b)</p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Let (a + b) = 7 unit</span></p>\\r\\n<p><span style=\"font-weight: 400;\">(b + c) = 6 unit&nbsp;</span></p>\\r\\n<p><span style=\"font-weight: 400;\">(c + a) = 5 unit</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Adding all three,</span></p>\\r\\n<p><span style=\"font-weight: 400;\">(a + b) </span>+(b + c)+(c + a) = (7 + 6 + 5) unit</p>\\r\\n<p><span style=\"font-weight: 400;\">(a + b + c)</span>= 9 unit</p>\\r\\n<p><span style=\"font-family: Cambria Math;\">According to the question,</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">9 unit = 36</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">1 unit = 4</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; a = (a + b + c) - (b + c)</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> = 9 - 6 </span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> = 3 unit = 3(4) =12</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Similarly </span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">b = 16</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">And c = 8 </span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&nbsp;&rArr;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mi>a</mi></mfrac><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><mi>b</mi></mfrac><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><mi>c</mi></mfrac></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> = </span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>12</mn></mfrac><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><mn>16</mn></mfrac><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><mn>8</mn></mfrac></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">= 4 : 3 : 6</span></p>\\n",
                    solution_hi: "<p>10.(b)</p>\\r\\n<p><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> (a+b) = 7 </span><span style=\"font-family: Kokila;\">&#2311;&#2325;&#2366;&#2312;</span></p>\\r\\n<p><span style=\"font-weight: 400;\">(b+c) = 6 &#2311;&#2325;&#2366;&#2312;&nbsp;</span></p>\\r\\n<p><span style=\"font-weight: 400;\">(c+a) = 5 &#2311;&#2325;&#2366;&#2312;</span></p>\\r\\n<p><span style=\"font-weight: 400;\">&#2340;&#2368;&#2344;&#2379;&#2306; &#2325;&#2379; &#2332;&#2379;&#2396;&#2344;&#2375; &#2346;&#2352;,&nbsp;</span></p>\\r\\n<p><span style=\"font-weight: 400;\">(a + b) </span>+(b + c)+(c + a) = (7 + 6 + 5) <span style=\"font-weight: 400;\">&#2311;&#2325;&#2366;&#2312;</span></p>\\r\\n<p><span style=\"font-weight: 400;\">(a + b + c)</span>= 9 <span style=\"font-weight: 400;\">&#2311;&#2325;&#2366;&#2312;</span></p>\\r\\n<p><span style=\"font-weight: 400;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;</span></p>\\r\\n<p><span style=\"font-weight: 400;\">9 &#2311;&#2325;&#2366;&#2312; = 36</span></p>\\r\\n<p><span style=\"font-weight: 400;\">1 &#2311;&#2325;&#2366;&#2312; = 4</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; a = (a + b + c) - (b + c)</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> = 9 - 6 </span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> = 3 <span style=\"font-weight: 400;\">&#2311;&#2325;&#2366;&#2312;</span> = 3(4) =12</span></p>\\r\\n<p><span style=\"font-weight: 400;\">&#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</span></p>\\r\\n<p><span style=\"font-weight: 400;\">b = 16</span></p>\\r\\n<p><span style=\"font-weight: 400;\">&#2324;&#2352; c = 8&nbsp;</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&nbsp;&rArr;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mi>a</mi></mfrac><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><mi>b</mi></mfrac><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><mi>c</mi></mfrac></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> = </span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>12</mn></mfrac><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><mn>16</mn></mfrac><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><mn>8</mn></mfrac></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">= 4 : 3 : 6</span></p>\\n",
                    correct: "b",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });

                    question_hi: "<p>24<span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2366;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2343;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354;</span><span style=\"font-family: Cambria Math;\"> 8 </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2350;&#2368;</span><span style=\"font-family: Cambria Math;\"> 4 </span><span style=\"font-family: Kokila;\">&#2328;&#2306;&#2335;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2341;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2343;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2325;&#2370;&#2354;</span><span style=\"font-family: Cambria Math;\"> 80 </span><span style=\"font-family: Kokila;\">&#2350;&#2367;&#2344;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2340;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\                     solution_en: "<p>24.(a)</p>\\r\\n<p><span style=\"font-family: Cambria Math;\">80 minutes =<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>4</mn><mn>3</mn></mfrac></math><span style=\"font-weight: 400;\">hours</span>&nbsp;</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Let speed of boat in still water = x</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">And speed of stream = y</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> Upstream speed = x&nbsp;</span><span style=\"font-family: Cambria Math;\"> - y =<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>8</mn><mn>4</mn></mfrac></math> = 2 </span><span style=\"font-family: Cambria Math;\">and downstream = x </span><span style=\"font-family: Cambria Math;\">+&nbsp; y =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>8</mn><mn>4</mn></mfrac></math> &times; 3</span><span style=\"font-family: Cambria Math;\"> = 6</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Speed of boat in still water = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>2</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>6</mn></mrow><mn>2</mn></mfrac></math> = 4</span><span style=\"font-family: Cambria Math;\">km/hr</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> Required time = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>28</mn><mn>4</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 7</span><span style=\"font-family: Cambria Math;\">hrs</span></p>\\n",
                    solution_hi: "<p>24.(a)</p>\\r\\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">80 &#2350;&#2367;&#2344;&#2335;&nbsp; </span>&nbsp;=<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>4</mn><mn>3</mn></mfrac></math><span style=\"font-weight: 400;\">&#2328;&#2306;&#2335;&#2375;</span></span></p>\\r\\n<p><span style=\"font-weight: 400;\">&#2350;&#2366;&#2344;&#2366;, &#2358;&#2366;&#2306;&#2340; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2330;&#2366;&#2354; = </span><span style=\"font-weight: 400;\">x</span></p>\\r\\n<p><span style=\"font-weight: 400;\">&#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; = y</span></p>\\r\\n<p><span style=\"font-weight: 400;\">&#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2327;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\">&nbsp;= x&nbsp;</span><span style=\"font-family: Cambria Math;\"> - y =<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>8</mn><mn>4</mn></mfrac></math> = 2 <span style=\"font-weight: 400;\">&#2324;&#2352; <span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2325;&#2370;&#2354;</span> </span></span><span style=\"font-family: Cambria Math;\">= x </span><span style=\"font-family: Cambria Math;\">+&nbsp; y =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>8</mn><mn>4</mn></mfrac></math> &times; 3</span><span style=\"font-family: Cambria Math;\"> = 6</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2358;&#2366;&#2306;&#2340; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367;</span> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>2</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>6</mn></mrow><mn>2</mn></mfrac></math> = 4<span style=\"font-weight: 400;\">&#2325;&#2367;&#2350;                     question_en: "<p>25<span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">In an election A got 20% more votes than B but 40% less votes than C. If C got 1840 more votes than A. Find the total number of votes casted in the election ?</span></p>\\n",

;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2369;&#2319;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2311;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2369;&#2344;&#2366;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2340;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2337;&#2366;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2319;</span><span style=\"font-family: Cambria Math;\"> ? </span></p>\\n",
                    options_en: ["<p>9666</p>\\n", "<p>9665</p>\\n",

                    options_hi: ["<p>9666</p>\\n", "<p>9665</p>\\n",
                                "<p>9662</p>\\n", "<p>9660</p>\\n"],
                    solution_en: "<p>25.(d)</p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Let B has 100x&nbsp;</span><span style=\"font-family: Cambria Math;\"> votes</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Now A = 120% of 100x</span><span style=\"font-family: Cambria Math;\"> = 120x</span><span style=\"font-family: Cambria Math;\"> and C = 120x</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&times;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>100</mn><mn>60</mn></mfrac></math> <span style=\"font-weight: 400;\">=200x</span></span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Given, <span style=\"font-weight: 400;\">200</span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> - 120</span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> = 1840 &rArr;&nbsp;</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> = 23</span></span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Total votes A, B and C have = <span style=\"font-weight: 400;\">100</span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> + 120</span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> + 200</span><span style=\"font-weight: 400;\">x</span></span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">= <span style=\"font-weight: 400;\">420</span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> = 420(23) = 9660</span></span></p>\\n",
                    solution_hi: "<p>25.(d)</p>\\r\\n<p><span style=\"font-weight: 400;\">&#2350;&#2366;&#2344;&#2366;, B &#2325;&#2375; &#2346;&#2366;&#2360; 100</span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> &#2357;&#2379;&#2335; &#2361;&#2376;&#2306;</span></p>\\r\\n<p><span style=\"font-weight: 400;\">&#2309;&#2348; A = 100</span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> &#2325;&#2366; 120% = 120</span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> &#2324;&#2352; C =&nbsp; 120</span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> &times; </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>100</mn><mn>60</mn></mfrac></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">=200x</span></p>\\r\\n<p><span style=\"font-weight: 400;\">&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; , 200</span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\">- 120</span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> = 1840</span></p>\\r\\n<p><span style=\"font-weight: 400;\">&nbsp;&rArr; </span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> = 23</span></p>\\r\\n<p><span style=\"font-weight: 400;\">A, B &#2324;&#2352; C&nbsp; &#2325;&#2375; &#2325;&#2369;&#2354; &#2357;&#2379;&#2335; = 100</span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> + 120</span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> + 200</span><span style=\"font-weight: 400;\">x</span></p>\\r\\n<p><span style=\"font-weight: 400;\">= 420</span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> = 420(23) = 9660</span></p>\\n",

                    solution_en: "<p>28.(b)</p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Total work = 10 &times; </span><span style=\"font-family: Cambria Math;\">(5 + 7) = 120 units</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Work done in 8 days=&nbsp;&nbsp;</span><span style=\"font-family: Cambria Math;\"> 8 &times; </span><span style=\"font-family: Cambria Math;\">(5 + 7) = 96 unit</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Work left = 120 - </span><span style=\"font-family: Cambria Math;\">96 = 24 units</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Time taken by A of finish 80 % of remaining work =&nbsp;</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mstyle displaystyle=\"true\"><mfrac><mn>80</mn><mn>100</mn></mfrac></mstyle><mo>&times;</mo><mo>&nbsp;</mo><mn>24</mn><mo>&nbsp;</mo></mrow><mn>5</mn></mfrac></math>= 3<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>21</mn><mn>25</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> days</span></p>\\n",

                questions.push({
                    id: "29",
                    section: "17",
                    question_en: "<p>29.<span style=\"font-family: Cambria Math;\"> A shopkeeper sold two articles of the same cost price one at a profit of 20% and another at profit of 37.5%. If the difference between the selling price is Rs. 682.5 then find the total profit in the whole transaction ?</span></p>\\n",
                    question_hi: "<p>29<span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2366;&#2354;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> 20% </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2341;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2360;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> 37.5% </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2375;&#2330;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 682.5 </span><span style=\"font-family: Kokila;\">&#2352;&#2369;&#2346;&#2351;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2370;&#2352;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2375;&#2344;</span><span style=\"font-family: Cambria Math;\">-</span><span style=\"font-family: Kokila;\">&#2342;&#2375;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2339;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2404;</span><span style=\"font-family: Cambria Math;\"> </span></p>\\n",
                    options_en: ["<p>2242.2</p>\\n", "<p>2242.5</p>\\n", 
                                "<p>2242.9</p>\\n", "<p>2242.1</p>\\n"],
                    options_hi: ["<p>2242.2</p>\\n", "<p>2242.5</p>\\n",
                                "<p>2242.9</p>\\n", "<p>2242.1</p>\\n"],
                    solution_en: "<p>29.(b)</p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Let the C.P of the both articles = 100 units</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Ratio -&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;C.P&nbsp; &nbsp;:&nbsp; &nbsp;S.P</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">1st article-&nbsp; &nbsp;100&nbsp; : 120</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">2nd article - 100 : 137.5</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Difference = 137.5 - 120 = 17.5 units</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">Total profit = (120 + 137.5) - (100 + 100) = 57.5 units</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">17.5 units = 682.5 Rs.</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">57.5 units =<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>682</mn><mo>.</mo><mn>5</mn></mrow><mrow><mn>17</mn><mo>.</mo><mn>5</mn></mrow></mfrac></math> </span><span style=\"font-family: Cambria Math;\"> &times; 57.5 = 2242.5 Rs.</span></p>\\n",
                    solution_hi: "<p>29.(b)</p>\\r\\n<p>&#2350;&#2366;&#2344;&#2366; &#2325;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2366; C.P &#2361;&#2376; = 100 &#2311;&#2325;&#2366;&#2312;</p>\\r\\n<p>&#2309;&#2344;&#2369;&#2346;&#2366;&#2340; -&nbsp; &nbsp; &nbsp; <span style=\"font-weight: 400;\">&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351;</span>&nbsp; : &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351;</p>\\r\\n<p><span style=\"font-family: Cambria Math;\">&#2346;&#2361;&#2354;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; -&nbsp; &nbsp; &nbsp; &nbsp; 100&nbsp; &nbsp; &nbsp; :&nbsp; &nbsp; &nbsp;120</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">&#2342;&#2370;&#2360;&#2352;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; -&nbsp; &nbsp; &nbsp; &nbsp; &nbsp;100&nbsp; &nbsp; &nbsp;:&nbsp; &nbsp; 137.5</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">&#2309;&#2306;&#2340;&#2352; = 137.5 - 120 = 17.5 &#2311;&#2325;&#2366;&#2312;</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">&#2325;&#2369;&#2354; &#2354;&#2366;&#2349;= (120 + 137.5) - (100 + 100) = 57.5 &#2311;&#2325;&#2366;&#2312;</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">17.5 &#2311;&#2325;&#2366;&#2312; = 682.5 Rs.</span></p>\\r\\n<p><span style=\"font-family: Cambria Math;\">57.5 &#2311;&#2325;&#2366;&#2312;&nbsp; =<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>682</mn><mo>.</mo><mn>5</mn></mrow><mrow><mn>17</mn><mo>.</mo><mn>5</mn></mrow></mfrac></math> </span><span style=\"font-family: Cambria Math;\"> &times; 57.5 = 2242.5 Rs.</span></p>\\n",
                    correct: "b",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });
                questions.push({
                    id: "30",

            // Add review mode class if submitted
            if (submitted) {
                document.getElementById('options-container').classList.add('review-mode');
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
            
            // Update language button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                const box = document.getElementById(`box-${index}`);
                box.classList.add('attempted');
                box.classList.remove('unattempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { 
            if (currentQuestion > 0) showQuestion(currentQuestion - 1); 
        }
        
        function nextQuestion() { 
            if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); 
        }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const overlay = document.getElementById('nav-overlay');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                overlay.classList.add('show');
                document.body.style.overflow = 'hidden';
            } else {
                nav.classList.remove('show');
                overlay.classList.remove('show');
                document.body.style.overflow = '';
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            // Create a more modern confirmation dialog
            const confirmHtml = `
                <div style="text-align: center; padding: 20px;">
                    <h4 style="margin-bottom: 16px; color: var(--dark);">Confirm Submission</h4>
                    <p style="margin-bottom: 24px; color: var(--gray);">
                        You have attempted ${attempted} of ${questions.length} questions.<br>
                        ${remaining} questions are unattempted.
                    </p>
                    <div style="display: flex; justify-content: center; gap: 12px;">
                        <button onclick="this.closest('.modal').querySelector('.cancel-btn').click()" 
                            style="padding: 8px 20px; border: 1px solid var(--light-gray); background: white; border-radius: 8px; cursor: pointer;">
                            Cancel
                        </button>
                        <button onclick="submitTest(); this.closest('.modal').querySelector('.cancel-btn').click()" 
                            style="padding: 8px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer;">
                            Submit Test
                        </button>
                    </div>
                </div>`;
            
            // Create modal element
            const modal = document.createElement('div');
            modal.className = 'results-modal show';
            modal.innerHTML = `
                <div class="results-card" style="max-width: 400px;">
                    <button class="cancel-btn" style="position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--gray);" onclick="this.closest('.results-modal').remove()">
                        ×
                    </button>
                    ${confirmHtml}
                </div>`;
            
            document.body.appendChild(modal);
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('unattempted');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            document.getElementById('results-modal').classList.add('show');
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            submitBtn.style.backgroundColor = 'var(--success)';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            document.getElementById('results-modal').classList.remove('show');
            showQuestion(0);
        }
        
        // Close modal when clicking outside
        window.addEventListener('click', function(event) {
            if (event.target === document.getElementById('results-modal')) {
                document.getElementById('results-modal').classList.remove('show');
            }
        });
        
        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') prevQuestion();
            if (e.key === 'ArrowRight') nextQuestion();
        });
    </script>
</body>
</html>
