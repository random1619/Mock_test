            text-align: center;
        }
        
        .results-title {
            margin: 0;
            font-weight: 600;

        .results-body {

        @media (min-width: 992px) {

            document.getElementById('section-selector').innerHTML +=

                questions.push({
                    id: "1",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">1. The sum of the H.C.F. and L.C.M. of two numbers is 860 and their L.C.M. is 42 times their H.C.F. If one of the numbers is 56, then the other number is.&nbsp;</span></p>",
                    question_hi: "<p><span style=\"font-family: Nirmala UI;\"><span style=\"font-family: Cambria Math;\">1. </span>दो</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">संख्याओं</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">के</span><span style=\"font-family: Cambria Math;\"> HCF </span><span style=\"font-family: Nirmala UI;\">और</span><span style=\"font-family: Cambria Math;\"> LCM </span><span style=\"font-family: Nirmala UI;\">का</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">योग</span><span style=\"font-family: Cambria Math;\"> 860 </span><span style=\"font-family: Nirmala UI;\">है</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">और</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">उनका</span><span style=\"font-family: Cambria Math;\"> LCM </span><span style=\"font-family: Nirmala UI;\">उनके</span><span style=\"font-family: Cambria Math;\"> HCF </span><span style=\"font-family: Nirmala UI;\">का</span><span style=\"font-family: Cambria Math;\"> 42 </span><span style=\"font-family: Nirmala UI;\">गुना</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है।</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">यदि</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">एक</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">संख्या</span><span style=\"font-family: Cambria Math;\"> 56 </span><span style=\"font-family: Nirmala UI;\">है</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">तो</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">दूसरी</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">संख्या</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">ज्ञात</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">कीजिये</span><span style=\"font-family: Cambria Math;\">?</span></p>",
                    options_en: ["<p><span style=\"font-family: Cambria Math;\">164</span></p>", "<p><span style=\"font-family: Cambria Math;\">272</span></p>", 
                                "<p><span style=\"font-family: Cambria Math;\">300&nbsp;</span></p>", "<p><span style=\"font-family: Cambria Math;\">280</span></p>"],
                    options_hi: ["<p><span style=\"font-family: Cambria Math;\">164</span></p>", "<p><span style=\"font-family: Cambria Math;\">272</span></p>",
                                "<p><span style=\"font-family: Cambria Math;\">300</span></p>\n<p><span style=\"font-family: Cambria Math;\"> </span></p>", "<p><span style=\"font-family: Cambria Math;\">280</span></p>"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">1.(c) Let the HCF of these two&nbsp; numbers be H and their LCM be L.&nbsp;</span><br><span style=\"font-family: Cambria Math;\">L = 42H and, L + H = 860</span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&rArr; 42H + H = 860</span></span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&rArr; H =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>860</mn><mn>43</mn></mfrac></math> = 20</span></span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&there4; L = 42 &times; 20 = 840</span></span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&nbsp;Product of numbers = HCF &times; LCM</span></span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">other number = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>20</mn><mo>&#160;</mo><mo>&#215;</mo><mo>&#160;</mo><mn>840</mn></mrow><mn>60</mn></mfrac></math> = 280</span></span></p>\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\n<p><span style=\"font-family: Cambria Math;\"> </span></p>",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">1.(c) माना कि संख्याओं का म.स.प. (H) है और उनका ल.स.प. (L) है, तो,&nbsp;<br>L = 42H और, L + H = 860<br><span style=\"font-weight: 400;\">&rArr; 42H + H = 860</span><br><span style=\"font-weight: 400;\">&rArr; H =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>860</mn><mn>43</mn></mfrac></math> = 20</span><br><span style=\"font-weight: 400;\">&there4; L = 42 &times; 20 = 840</span>&nbsp;<br>संख्याओं का गुणनफल = HCF &times; LCM<br>अन्य संख्या <span style=\"font-weight: 400;\">= <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>20</mn><mo>&#160;</mo><mo>&#215;</mo><mo>&#160;</mo><mn>840</mn></mrow><mn>60</mn></mfrac></math> = 280</span><br></span></p>",
                    correct: "d",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });
                questions.push({
                    id: "2",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">2. The average of a collection of 20 measurements was calculated to be 56 cm, But later it was found that a mistake had occurred in one of the measurements which was recorded as 64 cm., but should have been 61 cm. The correct average must be</span></p>",
                    question_hi: "<p><span style=\"font-family: Nirmala UI;\">2. यदि</span><span style=\"font-family: Cambria Math;\"> 20 </span><span style=\"font-family: Nirmala UI;\">मापो</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">का</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">औसत</span><span style=\"font-family: Cambria Math;\"> 56 <span style=\"font-weight: 400;\">सेमी</span> </span><span style=\"font-family: Nirmala UI;\">है</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">परन्तु</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">बाद</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">में</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">पता</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">चलता</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">कि</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">सही</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">माप</span><span style=\"font-family: Cambria Math;\"> 61 <span style=\"font-weight: 400;\">सेमी </span></span><span style=\"font-family: Nirmala UI;\">के</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">स्थान</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">पर</span><span style=\"font-family: Cambria Math;\"> 64 <span style=\"font-weight: 400;\">सेमी</span> </span><span style=\"font-family: Nirmala UI;\">मापा</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">जाता</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">तो</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">बताओ</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">कि</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">सही</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">औसत</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">क्या</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है।</span></p>",
                    options_en: ["<p><span style=\"font-family: Cambria Math;\">53 cm</span></p>", "<p><span style=\"font-family: Cambria Math;\">54.5 cm&nbsp;</span></p>", 
                                "<p><span style=\"font-family: Cambria Math;\">55.85 cm&nbsp; </span></p>", "<p><span style=\"font-family: Cambria Math;\">56.15 cm</span></p>"],
                    options_hi: ["<p><span style=\"font-family: Cambria Math;\">53 cm</span></p>", "<p><span style=\"font-family: Cambria Math;\">54.5 cm&nbsp;</span></p>",
                                "<p><span style=\"font-family: Cambria Math;\">55.85 cm&nbsp; </span></p>", "<p><span style=\"font-family: Cambria Math;\">56.15 cm</span></p>"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">2.(c) <span style=\"font-weight: 400;\">Total length of 20 measurements </span><span style=\"font-weight: 400;\">= 56 &times; 20 = 1120 cm<br>Correct length of 20 measurements = 1120 - 64 + 61 = 1117 cm<br>Correct average = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>1117</mn><mn>20</mn></mfrac></mstyle></math>&nbsp;= 55.85 cm<br><strong>Alternate method :-</strong></span></span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">Average of a collection of 20 measurements = 56 cm</span></span><br><span style=\"font-family: Cambria Math;\">As per the question,</span><br><span style=\"font-family: Cambria Math;\">One measurement by mistake, decreases the average of all 20 measurements =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mrow><mn>64</mn><mo>&#160;</mo><mo>-</mo><mo>&#160;</mo><mn>61</mn></mrow><mrow><mo>&#160;</mo><mn>20</mn></mrow></mfrac></mstyle></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> = 0.15</span><br><span style=\"font-family: Cambria Math;\">Now, the correct average = 56 - 0.15 = 55.85 cm</span></p>",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">2.(c) <span style=\"font-weight: 400;\">20 मापों की कुल लंबाई&nbsp;</span><span style=\"font-weight: 400;\">= 56 &times; 20 = 1120 सेमी<br>20 मापों की सही लंबाई&nbsp;= 1120 - 64 + 61 = 1117 सेमी&nbsp;<br>सही औसत = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>1117</mn><mn>20</mn></mfrac></mstyle></math> = 55.85 सेमी&nbsp;</span></span><br><strong>वैकल्पिक विधि :-</strong><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">20 मापों के संग्रह का&nbsp; औसत = 56 सेमी.&nbsp;</span></span><br><span style=\"font-weight: 400;\">प्रश्न के अनुसार,<br><span style=\"font-family: Cambria Math;\">&nbsp;गलती से एक माप, सभी 20 मापों का औसत घटता है = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mrow><mn>64</mn><mo>&#160;</mo><mo>-</mo><mo>&#160;</mo><mn>61</mn></mrow><mrow><mo>&#160;</mo><mn>20</mn></mrow></mfrac></mstyle></math> = 0.15</span></span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">अब, सही औसत = 56 - 0.15 = 55.85 सेमी.</span></span></p>",
                    correct: "c",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });
                questions.push({
                    id: "3",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">3. If </span><span style=\"font-family: Cambria Math;\">x + y =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mi mathvariant=\"normal\">&#960;</mi><mn>2</mn></mfrac></mstyle></math> </span><span style=\"font-family: Cambria Math;\">and cot y</span><span style=\"font-family: Cambria Math;\"> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mrow><mo>&#160;</mo><mn>1</mn></mrow><mrow><mn>3</mn><mi mathvariant=\"normal\">a</mi><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>2</mn></mrow></mfrac></mstyle></math></span><span style=\"font-family: Cambria Math;\">, then find the value of cot x</span><span style=\"font-family: Cambria Math;\"> ?</span></p>",
                    question_hi: "<p>3. <span style=\"font-family: Nirmala UI;\">यदि</span><span style=\"font-family: Cambria Math;\"> x + y = </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi mathvariant=\"normal\" mathsize=\"18px\">&#960;</mi><mn mathsize=\"18px\">2</mn></mfrac></math> </span><span style=\"font-family: Nirmala UI;\">तथा</span><span style=\"font-family: Cambria Math;\"> cot y</span><span style=\"font-family: Cambria Math;\"> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo mathsize=\"18px\">&#160;</mo><mn mathsize=\"18px\">1</mn></mrow><mrow><mn mathsize=\"18px\">3</mn><mi mathvariant=\"normal\" mathsize=\"18px\">a</mi><mo mathsize=\"18px\">&#160;</mo><mo mathsize=\"18px\">+</mo><mo mathsize=\"18px\">&#160;</mo><mn mathsize=\"18px\">2</mn></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">तो </span><span style=\"font-family: Cambria Math;\">cot x</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">का</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">मान</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">ज्ञात</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">करें</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">।</span><span style=\"font-family: Cambria Math;\"> </span></p>",

                                "<p><span style=\"font-weight: 400;\">(a + 1)</span></p>", "<p><span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\">a<sup>2</sup> </span><span style=\"font-weight: 400;\">+ 1)</span></p>"],
                    options_hi: ["<p>(3a + 2)</p>", "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>(</mo><mi>a</mi><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>1</mn><mo>)</mo></mrow><mi>a</mi></mfrac></math></p>",
                                "<p><span style=\"font-weight: 400;\">(a + 1)</span></p>", "<p><span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\">a<sup>2</sup> </span><span style=\"font-weight: 400;\">+ 1)</span></p>"],
                    solution_en: "<p>3.(a) <span style=\"font-family: Cambria Math;\">Cot y =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>1</mn><mrow><mn>3</mn><mi mathvariant=\"normal\">a</mi><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>2</mn></mrow></mfrac></mstyle></math></span><span style=\"font-family: Cambria Math;\"> &hellip;&hellip;&hellip;..(1)</span><br><span style=\"font-family: Cambria Math;\">And x + y = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mi mathvariant=\"normal\">&#960;</mi><mn>2</mn></mfrac></mstyle></math></span><span style=\"font-family: Cambria Math;\"> <span style=\"font-weight: 400;\">&rArr; </span>&nbsp;y = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mi mathvariant=\"normal\">&#960;</mi><mn>2</mn></mfrac></mstyle></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> - x</span><br><span style=\"font-family: Cambria Math;\">Put the value of y in equation (1), we have</span><br><span style=\"font-family: Cambria Math;\"> cot (</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi mathvariant=\"normal\" mathsize=\"18px\">&#960;</mi><mn mathsize=\"18px\">2</mn></mfrac></math> -&nbsp; x) = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>1</mn><mrow><mn>3</mn><mi mathvariant=\"normal\">a</mi><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>2</mn></mrow></mfrac></mstyle></math></span><span style=\"font-family: Cambria Math;\"> &rArr;</span><span style=\"font-family: Cambria Math;\"> tan x = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">1</mn><mrow><mn mathsize=\"18px\">3</mn><mi mathvariant=\"normal\" mathsize=\"18px\">a</mi><mo mathsize=\"18px\">&#160;</mo><mo mathsize=\"18px\">+</mo><mo mathsize=\"18px\">&#160;</mo><mn mathsize=\"18px\">2</mn></mrow></mfrac></math></span><br><span style=\"font-family: Cambria Math;\">Therefore,&nbsp; cotx = 3a + 2 </span></p>",
                    solution_hi: "<p>3.(a)&nbsp; <span style=\"font-family: Cambria Math;\">Cot y =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>1</mn><mrow><mn>3</mn><mi mathvariant=\"normal\">a</mi><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>2</mn></mrow></mfrac></mstyle></math></span><span style=\"font-family: Cambria Math;\"> &hellip;&hellip;&hellip;..(1)</span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">और</span> x + y = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mi mathvariant=\"normal\">&#960;</mi><mn>2</mn></mfrac></mstyle></math></span><span style=\"font-family: Cambria Math;\"> <span style=\"font-weight: 400;\">&rArr; </span>y = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mi mathvariant=\"normal\">&#960;</mi><mn>2</mn></mfrac></mstyle></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> - x</span><br><span style=\"font-weight: 400;\">y का मान समीकरण (1) में रखने पर,</span><br><span style=\"font-family: Cambria Math;\"> cot (</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi mathvariant=\"normal\" mathsize=\"18px\">&#960;</mi><mn mathsize=\"18px\">2</mn></mfrac></math> -&nbsp; x) = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>1</mn><mrow><mn>3</mn><mi mathvariant=\"normal\">a</mi><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>2</mn></mrow></mfrac></mstyle></math></span><span style=\"font-family: Cambria Math;\"> &rArr;</span><span style=\"font-family: Cambria Math;\"> tanx =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">1</mn><mrow><mn mathsize=\"18px\">3</mn><mi mathvariant=\"normal\" mathsize=\"18px\">a</mi><mo mathsize=\"18px\">&#160;</mo><mo mathsize=\"18px\">+</mo><mo mathsize=\"18px\">&#160;</mo><mn mathsize=\"18px\">2</mn></mrow></mfrac></math></span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">इसलिए , </span>&nbsp;cotx = 3a + 2 </span></p>",

                questions.push({
                    id: "4",
                    section: "17",
                    question_en: "<p>4. <span style=\"font-family: Cambria Math;\">A sum of Rs. 10,000 is divided into two parts such that the simple interest on the first part for 4<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>1</mn><mn>5</mn></mfrac></mstyle></math></span><span style=\"font-family: Cambria Math;\"> years at 6<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>2</mn><mn>3</mn></mfrac></mstyle></math></span><span style=\"font-family: Cambria Math;\">% p.a. is double the simple interest on the</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">second part for 2<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>3</mn><mn>4</mn></mfrac></mstyle></math></span><span style=\"font-family: Cambria Math;\"> years at 4% p.a. What is the difference between the two parts ? </span></p>",

                    solution_en: "<p>4.(b) <span style=\"font-family: Cambria Math;\">Let the amount invested at one part = x</span><br><span style=\"font-family: Cambria Math;\">According to the question</span><br><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&nbsp;= <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"20px\"><mfrac><mrow><mi mathvariant=\"normal\">x</mi><mo>&#160;</mo><mo>&#215;</mo><mo>&#160;</mo><mstyle displaystyle=\"true\"><mfrac><mn>20</mn><mn>3</mn></mfrac></mstyle><mo>&#160;</mo><mo>&#215;</mo><mo>&#160;</mo><mstyle displaystyle=\"true\"><mfrac><mn>21</mn><mn>5</mn></mfrac></mstyle></mrow><mn>100</mn></mfrac></mstyle></math> = 2 &times;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo mathsize=\"20px\">(</mo><mn mathsize=\"20px\">10000</mn><mo mathsize=\"20px\">&#160;</mo><mo mathsize=\"20px\">-</mo><mo mathsize=\"20px\">&#160;</mo><mi mathvariant=\"normal\" mathsize=\"20px\">x</mi><mo mathsize=\"20px\">)</mo><mo mathsize=\"20px\">&#160;</mo><mo mathsize=\"20px\">&#215;</mo><mo mathsize=\"20px\">&#160;</mo><mn mathsize=\"20px\">4</mn><mo mathsize=\"20px\">&#160;</mo><mo mathsize=\"20px\">&#215;</mo><mo mathsize=\"20px\">&#160;</mo><mstyle displaystyle=\"true\" mathsize=\"20px\"><mfrac><mn>11</mn><mn>4</mn></mfrac></mstyle></mrow><mn mathsize=\"20px\">100</mn></mfrac></math></span><br><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; 14x</span><span style=\"font-family: Cambria Math;\"> = 110000 - 11x</span><br><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; 25x</span><span style=\"font-family: Cambria Math;\"> = 110000</span><br><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; x = 4400</span><br><span style=\"font-family: Cambria Math;\">Amount invested in the second part = 10000 - 4400 = 5600</span><br><span style=\"font-family: Cambria Math;\">Required difference = 5600 - 4400 = 1                     solution_en: "<p>5.(c)<br><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1689563895/word/media/image1.png\" width=\"150\" height=\"205\"><br><span style=\"font-family: Cambria Math;\">Let from the top B of the pillar AB; bird flies at an angle of 45&deg; (upward) After </span><span style=\"font-family: Cambria Math;\">a certain time the bird reaches at point C and makes 60&deg; angular elevation at the foot A.</span><br><span style=\"font-family: Cambria Math;\">Now from the figure</span><br><span style=\"font-family: Cambria Math;\">BD = AE = x</span><span style=\"font-family: Cambria Math;\">, AB = DE = h</span><br><span style=\"font-family: Cambria Math;\">From &Delta;</span><span style=\"font-family: Cambria Math;\">BCD,</span><br><span style=\"font-family: Cambria Math;\">tan45&deg; = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mi>DC</mi><mi>BD</mi></mfrac></mstyle></math> </span><span style=\"font-family: Cambria Math;\">&rArr; 1 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mi>DC</mi><mi mathvariant=\"normal\">x</mi></mfrac></mstyle></math></span><br><span style=\"font-family: Cambria Math;\">&rArr; DC = x </span><span style=\"font-family: Cambria Math;\">&hellip; &hellip; ..(i)</span><br><span style=\"font-family: Cambria Math;\">And ∆ACE,</span><br><span style=\"font-family: Cambria Math;\">tan60&deg; = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mi>CE</mi><mi>AE</mi></mfrac></mstyle></math> =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi mathsize=\"18px\">CD</mi><mo mathsize=\"18px\">&#160;</mo><mo mathsize=\"18px\">+</mo><mo mathsize=\"18px\">&#160;</mo><mi mathsize=\"18px\">DE</mi></mrow><mi mathvariant=\"normal\" mathsize=\"18px\">x</mi></mfrac></math> =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi mathvariant=\"normal\" mathsize=\"18px\">x</mi><mo mathsize=\"18px\">&#160;</mo><mo mathsize=\"18px\">+</mo><mo mathsize=\"18px\">&#160;</mo><mi mathvariant=\"normal\" mathsize=\"18px\">h</mi></mrow><mi mathvariant=\"normal\" mathsize=\"18px\">x</mi></mfrac></math></span><br><span style=\"font-family: Cambria Math;\">&rArr; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>3</mn></msqrt></math><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> &minus; </span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> = h &rArr; </span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mi mathvariant=\"normal\">h</mi><mrow><msqrt><mn>3</mn></msqrt><mo>&#160;</mo><mo>&#8722;</mo><mo>&#160;</mo><mn>1</mn></mrow></mfrac></mstyle></math></span></span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">[&there4; x =&nbsp; CD = Height of B to C]</span></span><br><strong><span style=\"font-family: Cambria Math;\">Trick:</span></strong><br><span style=\"font-family: Cambria Math;\">Height of bird from pillar = </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mi mathvariant=\"normal\">h</mi><mrow><mi>tan</mi><mn>60</mn><mo>&#176;</mo><mo>&#160;</mo><mo>&#8722;</mo><mo>&#160;</mo><mi>tan</mi><mn>45</mn><mo>&#176;</mo></mrow></mfrac></mstyle></math> =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi mathvariant=\"normal\" mathsize=\"18px\">h</mi><mrow><msqrt><mn mathsize=\"18px\">3</mn></msqrt><mo mathsize=\"18px\">&#160;</mo><mo mathsize=\"18px\">&#8722;</mo><mo mathsize=\"18px\">&#160;</mo><mn mathsize=\"18px\">1</mn></mrow></mfrac></math></span></p>",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">6.(a) 2x + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mrow><mn>3</mn><mi mathvariant=\"normal\">x</mi></mrow></mfrac></math> = &ndash; 1<br>&rArr;<strong id=\"docs-internal-guid-08c75d69-7fff-ceee-4c1e-09a8e5583e7e\"> </strong>(2x + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mrow><mn>3</mn><mi mathvariant=\"normal\">x</mi></mrow></mfrac></math>) &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>2</mn></mfrac></math> = &ndash; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>2</mn></mfrac></math><br>&rArr; <strong id=\"docs-internal-guid-08c75d69-7fff-ceee-4c1e-09a8e5583e7e\"></strong>3x + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mrow><mn>2</mn><mi mathvariant=\"normal\">x</mi></mrow></mfrac></math> = &ndash; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>2</mn></mfrac></math></span><br><span style=\"font-family: Cambria Math;\">On cubing both sides we get,&nbsp;<br>&rArr; <strong id=\"docs-internal-guid-08c75d69-7fff-ceee-4c1e-09a8e5583e7e\"></strong>27x<sup>3</sup> + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mrow><mn>8</mn><msup><mi mathvariant=\"normal\">x</mi><mn>3</mn></msup></mrow></mfrac></math> + 3 &times; 3x &times;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mrow><mn>2</mn><mi mathvariant=\"normal\">x</mi></mrow></mfrac></math> ( &ndash; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>2</mn></mfrac></math>) = &ndash; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>27</mn><mn>8</mn></mfrac></math><br>&rArr; <strong id=\"docs-internal-guid-08c75d69-7fff-ceee-4c1e-09a8e5583e7e\"></strong>27x<sup>3</sup> + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mrow><mn>8</mn><msup><mi mathvariant=\"normal\">x</mi><mn>3</                     solution_en: "<p><span style=\"font-family: Cambria Math;\">7.(b) Given, x<sup>4</sup> - 4x<sup>2</sup> - 1 = 0<br>x<sup>2</sup> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>2</mn></msup></mfrac></math> = 4<br></span><span style=\"font-family: Cambria Math;\">Cubing both sides<br>&rArr;<strong id=\"docs-internal-guid-6896386e-7fff-88fd-d082-e6aafde8bc36\"> </strong>(x<sup>2</sup> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>2</mn></msup></mfrac></math>)<sup>3</sup> = 4<sup>3</sup><br>&nbsp;&rArr; <strong id=\"docs-internal-guid-6896386e-7fff-88fd-d082-e6aafde8bc36\"></strong>x<sup>6</sup> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>6</mn></msup></mfrac></math>&nbsp; - 3 &times; x<sup>2</sup> &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>2</mn></msup></mfrac></math>(x<sup>2</sup> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>2</mn></msup></mfrac></math>) = 64&nbsp; [ ∵ (a - b)<sup>3</sup> = a<sup>3</sup> - b<sup>3</sup> - 3ab(a - b)]<br>&nbsp;&rArr; <strong id=\"docs-internal-guid-6896386e-7fff-88fd-d082-e6aafde8bc36\"></strong>x<sup>6</sup> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>6</mn></msup></mfrac></math> = 64 + 12 = 76<br></span><span style=\"font-family: Cambria Math;\">Now,&nbsp;<br><strong id=\"docs-internal-guid-cab67613-7fff-1831-28e2-1189f4a2ebe1\">= </strong>x<sup>6</sup> - 5x<sup>2</sup> + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>5</mn><msup><mi mathvariant=\"normal\">x</mi><mn>2</mn></msup></mfrac></math> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>6</mn></msup></mfrac></math> + 5<br>= (x<sup>6</sup> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>6</mn></msup></mfrac></math>) - 5(x<sup>2</sup> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>2</mn></msup></mfrac></math>) + 5&nbsp;<br>&nbsp;= 76 - 5(4) + 5 = 61<br></span></p>",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">7.(b) x<sup>4</sup> - 4x<sup>2</sup> - 1 = 0<strong> </strong>(दिया गया है)<br>x<sup>2</sup> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>2</mn></msup></mfrac></math> = 4</span><br><span style=\"font-weight: 400;\">दोनों तरफ घन करने पर</span><br><span style=\"font-family: Cambria Math;\">&rArr;<strong id=\"docs-internal-guid-6896386e-7fff-88fd-d082-e6aafde8bc36\"> </strong>(x<sup>2</sup> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>2</mn></msup></mfrac></math>)<sup>3</sup> = 4<sup>3</sup><br>&nbsp;&rArr; <strong id=\"docs-internal-guid-6896386e-7fff-88fd-d082-e6aafde8bc36\"></strong>x<sup>6</sup> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>6</mn></msup></mfrac></math>&nbsp; - 3 &times; x<sup>2</sup> &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>2</mn></msup></mfrac></math>(x<sup>2</sup> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>2</mn></msup></mfrac></math>) = 64&nbsp; [ ∵ (a - b)<sup>3</sup> = a<sup>3</sup> - b<sup>3</sup> - 3ab(a - b)]<br>&nbsp;&rArr; <strong id=\"docs-internal-guid-6896386e-7fff-88fd-d082-e6aafde8bc36\"></strong>x<sup>6</sup> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>6</mn></msup></mfrac></math> = 64 + 12 = 76</span><br><span style=\"font-weight: 400;\">अब,</span><br><span style=\"font-family: Cambria Math;\"><strong id=\"docs-internal-guid-cab67613-7fff-1831-28e2-1189f4a2ebe1\">= </strong>x<sup>6</sup> - 5x<sup>2</sup> + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>5</mn><msup><mi mathvariant=\"normal\">x</mi><mn>2</mn></msup></mfrac></math> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>6</mn></msup></mfrac></math> + 5<br>= (x<sup>6</sup> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>6</mn></msup></mfrac></math>) - 5(x<sup>2</sup> - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi mathvariant=\"normal\">x</mi><mn>2</mn></msup></mfrac></math>) + 5&nbsp;<br>= 76 - 5(4) + 5 = 61</span></p>",

                questions.push({

                    question_en: "<p><span style=\"font-family: Cambria Math;\">8. </span><span style=\"font-family: Cambria Math;\">ABCD is a cyclic quadrilateral in which length of sides are in ratio AB : BC = 5 : 8, CD : DA = 9 : 7 and AB : DA = 5 : 7. Then find the product of diagonals of cyclic quadilateral ?</span></p>",

an><span style=\"font-family: Nirmala UI;\">गुणनफल</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">ज्ञात</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">कीजिए</span><span style=\"font-family: Cambria Math;\">:</span></p>",

                    solution_en: "<p>8.(d)<br><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1689563895/word/media/image2.png\"><br><span style=\"font-family: Cambria Math;\">By Using Ptolemy theorem,</span><br><span style=\"font-family: Cambria Math;\">Product of diagonals = sum of products of opposite side of cyclic quadrilateral</span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">d<sub>1</sub> &times; d<sub>2</sub> = AB &times; CD + BC &times; DA</span></span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">d<sub>1</sub> &times; d<sub>2</sub></span> = 5 &times; 9 + 8 &times; 7 = 45 + 56 = 101 units</span></p>",

                    solution_en: "<p>9.(b) <span style=\"font-family: Cambria Math;\">Time taken by P in completing 1 work </span><span style=\"font-family: Cambria Math;\">= 10 &times;</span><span style=\"font-family: Cambria Math;\"> <span style=\"font-weight: 400;\">4</span>= 40 days;</span><br><span style=\"font-family: Cambria Math;\"> Time taken by Q in completing 1 work = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>15</mn><mo>&#160;</mo><mo>&#215;</mo><mo>&#160;</mo><mn>5</mn></mrow><mn>2</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 37.5 days;</span><br><span style=\"font-family: Cambria Math;\">Time taken by R in completing 1 work = 13 &times; </span><span style=\"font-family: Cambria Math;\">3 = 39 days;</span><br><span style=\"font-family: Cambria Math;\">time taken by S in completing 1 work </span><span style=\"font-family: Cambria Math;\">= 7 &times; </span><span style=\"font-family: Cambria Math;\">6 = 42 days;</span><br><span style=\"font-family: Cambria Math;\">Clearly, Q took the least time i.e. 37.5 days.</span></p>",

                    section: "17",
                    question_en: "<p>13. <span style=\"font-family: Cambria Math;\">A milkman uses three containers for selling milk and their capacities being 60 litres, 56 litres and 44 litres respectively. He fills 83<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>1</mn><mn>3</mn></mfrac></mstyle></math></span><span style=\"font-family: Cambria Math;\">%, 85<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">5</mn><mn mathsize=\"18px\">7</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">% and 90<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>10</mn><mn>11</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">% of the containers with a mixture of milk and water in the ratios 4 : 1, 5 : 3 and 7 : 1 respecti</span><span style=\"font-family: Cambria Math;\">vely. What is the ratio of total quantity of water to that of milk carried by him?</span></p>",
                    question_hi: "<p>13.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">एक</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">दूधवाला</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">दूध</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">बेचने</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">के</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">लिए</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">तीन</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">कंटेनरों</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">का</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">उपयोग</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">करता</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">और</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">उनकी</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">धारिता</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">क्रमश</span><span style=\"font-family: Cambria Math;\">: 60 </span><span style=\"font-family: Nirmala UI;\">लीटर</span><span style=\"font-family: Cambria Math;\">, 56 </span><span style=\"font-family: Nirmala UI;\">लीटर</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">और</span><span style=\"font-family: Cambria Math;\"> 44 </span><span style=\"font-family: Nirmala UI;\">लीटर</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है।</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">वह</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">क्र</span><span style=\"font-family: Nirmala UI;\">मशः</span><span style=\"font-family: Cambria Math;\"> 4 : 1, 5 : 3 </span><span style=\"font-family: Nirmala UI;\">और</span><span style=\"font-family: Cambria Math;\"> 7 : 1 </span><span style=\"font-family: Nirmala UI;\">के</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">अनुपात</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">में</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">दूध</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">और</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">पानी</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">के</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">मिश्रण</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">से</span><span style=\"font-family: Cambria Math;\"> 83<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>1</mn><mn>3</mn></mfrac></mstyle></math></span><span style=\"font-family: Cambria Math;\">%, 85<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>5</mn><mn>7</mn></mfrac></mstyle></math></span><span style=\"font-family: Cambria Math;\">% </span><span style=\"font-family: Nirmala UI;\">और</span><span style=\"font-family: Cambria Math;\"> 90<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">10</mn><mn mathsize=\"18px\">11</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">% </span><span style=\"font-family: Nirmala UI;\">कंटेनर</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">भरता</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है।</span><span style=\"font-family: Cambria Math;\"> उसके द्वारा ले जाए गए पानी की कुल मात्रा का दूध की कुल मात्रा से अनुपात क्या है?</span></p>",
                    options_en: ["<p>7 : 11</p>", "<p>11 : 35</p>", 
                                "<p>15 : 28</p>", "<p>9 : 7</p>"],
                    options_hi: ["<p>7 : 11</p>", "<p>11 : 35</p>",
                                "<p>15 : 28</p>", "<p>9 : 7</p>"],
                    solution_en: "<p>13.(b) <span style=\"font-family: Cambria Math;\">Quantity of the mixture in container of 60 litres = 60 &times; 83<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">1</mn><mn mathsize=\"18px\">3</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">% = 60 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">5</mn><mn mathsize=\"18px\">6</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 50 litres</span><br><span style=\"font-family: Cambria Math;\">Quantity of the mixture in container of 56 litres = 56 &times; 85<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">5</mn><mn mathsize=\"18px\">7</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">% = 56 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">6</mn><mn mathsize=\"18px\">7</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 48 litres</span><br><span style=\"font-family: Cambria Math;\">Quantity of the mixture in container of 44 litres = 44 &times; 90<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">10</mn><mn mathsize=\"18px\">11</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">% = 44 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">10</mn><mn mathsize=\"18px\">11</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 40 litr</span><span style=\"font-family: Cambria Math;\">es</span><br><span style=\"font-family: Cambria Math;\">So, the total quantity of mixture of milk and water = 50 + 48 + 40 = 138 litres</span><br><span style=\"font-family: Cambria Math;\">Now, the net quantity of milk in the mixture = 50 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">4</mn><mn mathsize=\"18px\">5</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> + 48 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">5</mn><mn mathsize=\"18px\">8</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> + 40 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">7</mn><mn mathsize=\"18px\">8</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 40 + 30 + 35 = 105 litres.</span><br><span style=\"font-family: Cambria Math;\">Now, the required ratio = 138 - 105 : 105 = 33 : 105 or 11 : 35</span></p>",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">13.(b) </span><span style=\"font-family: Cambria Math;\">60 लीटर के बर्तन में मिश्रण की मात्रा = 60 &times; 83<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">1</mn><mn mathsize=\"18px\">3</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">% = 60 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">5</mn><mn mathsize=\"18px\">6</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 50 लीटर</span><br><span style=\"font-family: Cambria Math;\">56 लीटर के बर्तन में मिश्रण की मात्रा = 56 &times; 85<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">5</mn><mn mathsize=\"18px\">7</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">% = 56 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">6</mn><mn mathsize=\"18px\">7</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 48 लीटर</span><br><span style=\"font-family: Cambria Math;\">44 लीटर के बर्तन में मिश्रण की मात्रा &nbsp;= 44 &times; 90<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">10</mn><mn mathsize=\"18px\">11</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">% = 44 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">10</mn><mn mathsize=\"18px\">11</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 40 लीटर</span><br><span style=\"font-family: Cambria Math;\">इसलिए, दूध और पानी के मिश्रण की कुल मात्रा = 50 + 48 + 40 = 138 लीटर</span><br><span style=\"font-family: Cambria Math;\">अब, मिश्रण में दूध की&nbsp; मात्रा = 50 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">4</mn><mn mathsize=\"18px\">5</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> + 48 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">5</mn><mn mathsize=\"18px\">8</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> + 40 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">7</mn><mn mathsize=\"18px\">8</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 40 + 30 + 35 = 105 लीटर</span><br><span style=\"font-family: Cambria Math;\">अब, अभीष्ट अनुपात = 138 - 105 : 105 = 33 : 105 <span style=\"font-weight: 400;\">या</span> 11 : 35</span></p>",
                    correct: "b",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });
                questions.push({
                    id: "14",
                    section: "17",
                    question_en: "<p>14.<span style=\"font-family: Cambria Math;\"> Cost of 4 fans and 7 blowers is Rs </span><span style=\"font-family: Cambria Math;\">20,000. Also the cost of 2 fans, 3 tables and 3 blowers is Rs 12,000. Cost of one table is Rs 1,000. What is the cost of 3 fans and one blower?</span></p>",
                    question_hi: "<p>14.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">4 </span><span style=\"font-family: Nirmala UI;\">पंखे</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">और</span><span style=\"font-family: Cambria Math;\"> 7 </span><span style=\"font-family: Nirmala UI;\">ब्लोअर</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">का</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">मूल्य</span><span style=\"font-family: Cambria Math;\"> 20,000 </span><span style=\"font-family: Nirmala UI;\">रुपये</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">और</span><span style=\"font-family: Cambria Math;\"> 2 </span><span style=\"font-family: Nirmala UI;\">पंखे</span><span style=\"font-family: Cambria Math;\"> ,3 </span><span style=\"font-family: Nirmala UI;\">मेज</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">और</span><span style=\"font-family: Cambria Math;\"> 3 </span><span style=\"font-family: Nirmala UI;\">ब्लोअर</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">का</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">मूल्य</span><span style=\"font-family: Cambria Math;\"> 12,000 </span><span style=\"font-family: Nirmala UI;\">रुपये</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">यदि</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">एक</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">मेज</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">का</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">मूल्य</span><span style=\"font-family: Cambria Math;\"> 1,000 </span><span style=\"font-family: Nirmala UI;\">रुपये</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">तो</span><span style=\"font-family: Cambria Math;\"> 3 </span><span style=\"font-family: Nirmala UI;\">पंखे</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">और</span><span style=\"font-family: Cambria Math;\"> 1</span><span style=\"font-family: Nirmala UI;\">ब्लोअर</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">का</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">मूल्य</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">क्या</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है।</span></p>",
                    options_en: ["<p>Rs 8,000</p>", "<p>Rs 11,000</p>", 
                                "<p>Rs 18,500</p>", "<p>None of these</p>"],
                    options_hi: ["<p>Rs 8,000</p>", "<p>Rs 11,000</p>",
                                "<p>Rs 18,500</p>", "<p><span style=\"font-family: Nirmala UI;\">इनमें</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">से</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">कोई</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">नहीं</span></p>"],
                    solution_en: "<p>14.(d) <span style=\"font-family: Cambria Math;\">Let C.P of 1 fan = Rs x</span><br><span style=\"font-family: Cambria Math;\">CP of 1 blower = Rs y</span><br><span style=\"font-family: Cambria Math;\">CP of 1 table = Rs 1000 (given)</span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&there4;&nbsp;</span>4x + 7y = 20000&hellip;&hellip;.(i)</span><br><span style=\"font-family: Cambria Math;\">2x + 3y + 3 &times;</span><span style=\"font-family: Cambria Math;\"> 1000 = 12000</span><br><span style=\"font-weight: 400;\">&rArr; 2x + 3y = 12000 - 3000 = 9000</span><br><span style=\"font-weight: 400;\">&rArr; 2x + 3y = 9000</span><span style=\"font-weight: 400;\">&hellip;&hellip;.(ii)</span><br><span style=\"font-family: Cambria Math;\">Equation (i) - (ii) &times;</span><span style=\"font-family: Cambria Math;\"> 2,&nbsp; we get</span><br><span style=\"font-family: Cambria Math;\">y = 20000 - </span><span style=\"font-family: Cambria Math;\">18000 = 2000&nbsp;</span><br><span style=\"font-family: Cambria Math;\">We get the value of x by putting the value of y in the 1st equation</span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&rArr; </span>4x = 20000 - 14000 = 6000 &rArr; <span style=\"font-weight: 400;\">x = 1500</span></span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&there4; 3x + y = 3 &times; 1500 + 2000 = Rs 6500</span></span></p>",
                    solution_hi: "<p>14.(d) <span style=\"font-weight: 400;\">मान लीजिए 1 पंखे का CP = Rs x</span><br><span style=\"font-weight: 400;\">1 ब्लोअर का CP = Rs y</span><br><span style=\"font-weight: 400;\">1 टेबल का CP = Rs 1000 (दिया गया है)</span><br><span style=\"font-weight: 400;\">&there4;</span><span style=\"font-weight: 400;\"> 4x + 7y = 20000&hellip;&hellip;.(i)</span><br><span style=\"font-family: Cambria Math;\">2x + 3y + 3 &times;</span><span style=\"font-family: Cambria Math;\"> 1000 = 12000</span><br><span style=\"font-weight: 400;\">&rArr; 2x + 3y = 12000 - 3000 = 9000</span><br><span style=\"font-weight: 400;\">&rArr; 2x + 3y = 9000</span><span style=\"font-weight: 400;\">&hellip;&hellip;.(ii)</span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">समीकरण</span> (i) - (ii) &times;</span><span style=\"font-family: Cambria Math;\"> 2</span><br><span style=\"font-family: Cambria Math;\">y = 20000 - </span><span style=\"font-family: Cambria Math;\">18000 = 2000&nbsp;</span><br><span style=\"font-family: Cambria Math;\">हम पहले प्रश्न में y का मान डालकर x का मान प्राप्त करते हैं,</span><br><span style=\"font-family: Cambria Math;\">&nbsp;<span style=\"font-weight: 400;\">&rArr; 4</span>x = 20000 - 14000 =&nbsp;</span><span style=\"font-family: Cambria Math;\">6000 &rArr; <span style=\"font-weight: 400;\">x = 1500</span></span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&there4; 3x + y = 3 &times; 1500 + 2000 = Rs 6500</span></span></p>",
                    correct: "d",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });

                    question_hi: "<p>15.<span style=\"font-family: Cambria Math;\"> 4 </span><span style=\"font-family: Nirmala UI;\">घंटियाँ</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">क्रमशः</span><span style=\"font-family: Cambria Math;\"> 30 </span><span style=\"font-family: Nirmala UI;\">मिनट</span><span style=\"font-family: Cambria Math;\">, 1 </span><span style=\"font-family: Nirmala UI;\">घंटा</span><span style=\"font-family: Cambria Math;\">, 1.5 </span><span style=\"font-family: Nirmala UI;\">घंटा</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">और</span><span style=\"font-family: Cambria Math;\"> 1 </span><span style=\"font-family: Nirmala UI;\">घंटा</span><span style=\"font-family: Cambria Math;\"> 45 </span><span style=\"font-family: Nirmala UI;\">मिनट</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">के</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">अंतराल</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">पर</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">बजती</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">हैं।</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">दोपहर</span><span style=\"font-family: Cambria Math;\"> 12 </span><span style=\"font-family: Nirmala UI;\">बजे</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">सभी</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">घंटियाँ</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">एक</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmal                     solution_en: "<p>16.(c) <span style=\"font-family: Cambria Math;\">No of ball per wicket taken by Jadeja = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>8</mn><mo>&#160;</mo><mo>&#215;</mo><mo>&#160;</mo><mn>6</mn></mrow><mn>3</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 16</span><br><span style=\"font-family: Cambria Math;\">No of ball per wicket taken by Jaspreet = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mrow><mn>6</mn><mo>&#160;</mo><mo>&#215;</mo><mo>&#160;</mo><mn>6</mn></mrow><mn>2</mn></mfrac></mstyle></math></span><span style=\"font-family: Cambria Math;\"> = 18</span><br><span style=\"font-family: Cambria Math;\">No of ball per wicket taken by Bumrah = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn mathsize=\"18px\">5</mn><mo mathsize=\"18px\">&#160;</mo><mo mathsize=\"18px\">&#215;</mo><mo mathsize=\"18px\">&#160;</mo><mn mathsize=\"18px\">6</mn></mrow><mn mathsize=\"18px\">1</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 30</span><br><span style=\"font-family: Cambria Math;\">No of ball per wicket taken by Pandya = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn mathsize=\"18px\">6</mn><mo mathsize=\"18px\">&#160;</mo><mo mathsize=\"18px\">&#215;</mo><mo mathsize=\"18px\">&#160;</mo><mn mathsize=\"18px\">4</mn></mrow><mn mathsize=\"18px\">3</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 8</span><br><span style=\"font-family: Cambria Math;\">No of ball per wicket taken by Ashwin = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn mathsize=\"18px\">6</mn><mo mathsize=\"18px\">&#160;</mo><mo mathsize=\"18px\">&#215;</mo><mo mathsize=\"18px\">&#160;</mo><mn mathsize=\"18px\">6</mn></mrow><mn mathsize=\"18px\">1</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 36</span><br><span style=\"font-family: Cambria Math;\">Cle                     question_hi: "<p>17. <span style=\"font-family: Nirmala UI;\">यदि</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">संख्याओ</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">का</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">गुनणफल</span><span style=\"font-family: Cambria Math;\"> 9375 </span><span style=\"font-family: Nirmala UI;\">रुपये</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">और</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">जब</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">बडी</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">संख्या</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">को</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">छोटी</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">संख्या</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">से</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">भाग</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">किया</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">जाता</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">तो</span><span style=\"font-family: Cambria Math;\"> </span><span                     options_hi: ["<p>395</p>", "<p>380</p>",
                                "<p>400<span style=\"font-family: Cambria Math;\"> </span></p>", "<p>425</p>"],
                    solution_en: "<p>17.(c) <span style=\"font-weight: 400;\">Let the numbers be x and y and x is greater than y.</span><br><span style=\"font-weight: 400;\">As given,</span><br><span style=\"font-weight: 400;\">xy = 9375 ..........................(i)</span><br><span style=\"font-weight: 400;\">According to the question,</span><br><span style=\"font-weight: 400;\">&rArr; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mi mathvariant=\"normal\">x</mi><mi mathvariant=\"normal\">y</mi></mfrac></mstyle></math></span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">= 15</span><br><span style=\"font-weight: 400;\">&rArr; x = 15y</span><br><span style=\"font-weight: 400;\">&there4; From equation (i), 15y &times; y = 9375</span><br><span style=\"font-weight: 400;\">&rArr; y<sup>2</sup></span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">=</span><span style=\"font-weight: 400;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>9375</mn><mn>15</mn></mfrac></mstyle></math></span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">= 625</span><br><span style=\"font-weight: 400;\">y = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>625</mn></msqrt></math></span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">= 25</span><br><span style=\"font-weight: 400;\">&there4; x = 15y = 15 &times; 25 = 375</span><br><span style=\"font-weight: 400;\">&there4; x + y = 375 + 25 = 400</span></p>\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\n<p><span style=\"font-family: Cambria Math;\"> </span></p>",
                    solution_hi: "<p>17.(c) <span style=\"font-weight: 400;\">मान लीजिए कि संख्याएँ x और y हैं तथा x, y से बड़ा है।</span><br><span style=\"font-weight: 400;\">जैसा कि दिया गया है,</span><br><span style=\"font-weight: 400;\">xy = 9375..............................(i)</span><br><span style=\"font-weight: 400;\">प्रश्न के अनुसार,</span><br><span style=\"font-weight: 400;\">&rArr; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mi mathvariant=\"normal\">x</mi><mi mathvariant=\"normal\">y</mi></mfrac></mstyle></math></span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">= 15</span><br><span style=\"font-weight: 400;\">&rArr; x = 15y</span><br><span style=\"font-weight: 400;\">&there4; समीकरण (i) , 15y &times; y = 9375</span><br><span style=\"font-weight: 400;\">&rArr; y<sup>2</sup></span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">=</span><span style=\"font-weight: 400;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">9375</mn><mn mathsize=\"18px\">15</mn></mfrac></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">= 625</span><br><span style=\"font-weight: 400;\">y = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>625</mn></msqrt></math></span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">= 25</span><br><span style=\"font-weight: 400;\">&there4; x = 15y = 15 &times; 25 = 375</span><br><span style=\"font-weight: 400;\">&there4; x + y = 375 + 25 = 400</span></p>\n<p><span style=\"font-family: Cambria Math;\"> </span></p>",

                questions.push({
                    id: "29",
                    section: "17",
                    question_en: "<p>29.In tossing three coins at a time, the probability of getting at least one heads is:</p>",
                    question_hi: "<p>29. <span style=\"font-family: Nirmala UI;\">एक</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">बार</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">में</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">तीन</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">सिक्कों</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">को</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">उछालने</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">पर</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">कम</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">से</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">कम</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">एक</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">चित</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">आने</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">की</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">प्रायिकता</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">है</span><span style=\"font-family: Cambria Math;\">:</span></p>",
                    options_en: ["<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>7</mn><mn>8</mn></mfrac></mstyle></math></p>", "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>1</mn><mn>2</mn></mfrac></mstyle></math></p>", 
                                "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><mfrac><mn>1</mn><mn>8</mn></mfrac></mstyle></math></p>", "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">3</mn><mn mathsize=\"18px\">8</mn></mfrac></math></p>"],
                    options_hi: ["<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">7</mn><mn mathsize=\"18px\">8</mn></mfrac></math></p>", "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn mathsize=\"18px\">1</mn><mn mathsize=\"18px\">2</mn></mfrac></math></p>",

                    solution_en: "<p>29.(a) <span style=\"font-family: Cambria Math;\">Total outcomes = 2 &times; <span style=\"font-weight: 400;\">2 &times; </span><span style=\"font-weight: 400;\">2 = 8</span></span><br><span style=\"font-family: Cambria Math;\">Favorable outcomes = 8 - 1(all tail) = 7</span><br><span style=\"font-family: Cambria Math;\">The probability of getting at least one heads =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>7</mn><mn mathsize=\"18px\">8</mn></mfrac></math></span></p>",

                    correct: "a",

                questions.push({

                questions.push({

                    question_en: "<p>35. <span style=\"font-family: Cambria Math;\">Find that odd number-pair.</span></p>",
                    question_hi: "<p>35. <span style=\"font-family: Nirmala UI;\">असंगत</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">संख्या</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">युग्म</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">ज्ञात</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">कीजिए।</span></p>",
                    options_en: ["<p>4 : 18</p>", "<p>16 : 6</p>", 
                                "<p>25 : 8</p>", "<p>49 : 12</p>"],
                    options_hi: ["<p>4 : 18<span style=\"font-family: Cambria Math;\"> </span></p>", "<p>16 : 6</p>",
                                "<p>25 : 8</p>", "<p>49 : 12</p>"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\"><strong>35.(a) Logic :</strong><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">n</span><span style=\"font-weight: 400;\"> : </span><span style=\"font-weight: 400;\">[<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mi mathvariant=\"normal\">n</mi></msqrt></math></span><span style=\"font-weight: 400;\">&nbsp;+ (</span><span style=\"font-weight: 400;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mi mathvariant=\"normal\">n</mi></msqrt></math></span><span style=\"font-weight: 400;\"> - 2)]</span></span><br><span style=\"font-family: Cambria Math;\">In 4 : 18, 4 : <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>4</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\">&nbsp; +&nbsp; (</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>4</mn></msqrt></math> - 2) = 4 : 2 + (2 - 2) = 4 : 2 + 0 = 4 : 2 &ne;</span><span style=\"font-family: Cambria Math;\"> 4 : 18</span><br><span style=\"font-family: Cambria Math;\">In 16 : 6, 16 : <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>16</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\">&nbsp; +&nbsp; (<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>16</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\"> - 2) = 16 : 4 + (4 - 2) = 16 : 4 + 2 = 16 : 6</span><br><span style=\"font-family: Cambria Math;\">In 25 : 8, 25 : <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>25</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\"> + (</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>25</mn></msqrt></math>- 2) = 25 : 5 + (5 - 2) = 25 : 5 + 3 = 25 : 8</span><br><span style=\"font-family: Cambria Math;\">In 49 : 12, 49 : <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>49</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\"> + (<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>49</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\"> - 2) = 49 : 7 + (7 - 2) = 49 : 7 + 5 = 49 : 12</span><br><span style=\"font-family: Cambria Math;\">Clearly, we can see that (4 : 18) is an odd one.</span></p>",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\"><strong>35.(a) तर्क :</strong><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">n</span><span style=\"font-weight: 400;\"> : </span><span style=\"font-weight: 400;\">[<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mi mathvariant=\"normal\">n</mi></msqrt></math></span><span style=\"font-weight: 400;\">&nbsp;+ (</span><span style=\"font-weight: 400;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mi mathvariant=\"normal\">n</mi></msqrt></math></span><span style=\"font-weight: 400;\"> - 2)]</span></span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">4 : 18 में</span>, 4 : <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>4</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\">&nbsp; +&nbsp; (</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>4</mn></msqrt></math> - 2) = 4 : 2 + (2 - 2) = 4 : 2 + 0 = 4 : 2 &ne;</span><span style=\"font-family: Cambria Math;\"> 4 : 18</span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">16 : 6 में</span>, 16 : <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>16</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\">&nbsp; +&nbsp; (<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>16</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\"> - 2) = 16 : 4 + (4 - 2) = 16 : 4 + 2 = 16 : 6</span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">25 : 8 में</span>, 25 : <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>25</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\"> + (</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>25</mn></msqrt></math>- 2) = 25 : 5 + (5 - 2) = 25 : 5 + 3 = 25 : 8</span><br><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">49 : 12 में</span>, 49 : <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>49</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\"> + (<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>49</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\"> - 2) = 49 : 7 + (7 - 2) = 49 : 7 + 5 = 49 : 12</span><br><span style=\"font-weight: 400;\">स्पष्ट रूप से, हम देख सकते हैं कि (4 : 18) एक विषम संख्या है।</span></p>",
                    correct: "a",

                    question_en: "<p>54.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Read the given statements and conclusions carefully. Decide which of the given conclusions is/are true based on the statements.</span><br><strong><span style=\"font-family: Cambria Math;\">Statement:</span></strong><br><span style=\"font-family: Cambria Math;\">E &ge;</span><span style=\"font-family: Cambria Math;\"> R = S &le;</span><span style=\"font-family: Cambria Math;\"> T &lt; N &gt; O = Z</span><br><strong><span style=\"font-family: Cambria Math;\">Conclusions:\\</span></strong><br><span style=\"font-family: Cambria Math;\">1.E &ge;</span><span style=\"font-family: Cambria Math;\"> S</span><br><span style=\"font-family: Cambria Math;\">2. &Tau; &ge;</span><span style=\"font-family: Cambria Math;\"> &Epsilon;</span><br><span style=\"font-family: Cambria Math;\">3. R &gt; N</span><br><span style=\"font-family: Cambria Math;\">4. T &lt; Z</span></p>",
                    question_hi: "<p>54. <span style=\"font-family: Nirmala UI;\">दिए</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">गए</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">कथनों</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">और</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">निष्कर्षों</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">को</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">ध्यानपूर्वक</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">पढ़ें।</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">तय</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">कीजिए</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">कि</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">दिए</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">गए</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">निष्कर्षों</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">में</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">से</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">कौन</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">से</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">कथन</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">के</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">आधार</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">पर</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">सत्य</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">हैं</span><span style=\"font-family: Cambria Math;\">?</span><br><strong><span style=\"font-family: Nirmala UI;\">कथन</span><span style=\"font-family: Cambria Math;\">:</span></strong><br><span style=\"font-family: Cambria Math;\">E &ge;</span><span style=\"font-family: Cambria Math;\"> R = S &le;</span><span style=\"font-family: Cambria Math;\"> T &lt; N &gt; O = Z</span><br><strong><span style=\"font-family: Nirmala UI;\">निष्कर्ष</span><span style=\"font-family: Cambria Math;\">:</span></strong><br><span style=\"font-family: Cambria Math;\">1.E &ge;</span><span style=\"font-family: Cambria Math;\"> S</span><br><span style=\"font-family: Cambria Math;\">2. &Tau; &ge;</span><span style=\"font-family: Cambria Math;\"> &Epsilon;</span><br><span style=\"font-family: Cambria Math;\">3. R &gt; N</span><br><span style=\"font-family: Cambria Math;\">4. T &lt; Z</span></p>",
                    options_en: ["<p>2</p>", "<p>3</p>",
