<!DOCTYPE html>
<html>
<head>
    <title>Error (English)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f5f6fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .error-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .error-icon {
            font-size: 3rem;
            color: #d63031;
            margin-bottom: 20px;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #2d3436;
        }
        .error-message {
            color: #636e72;
            margin-bottom: 25px;
        }
        .btn-primary {
            background: #6c5ce7;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 500;
        }
    </style>

    
    
    
    
    <!-- START: Modern Premium Style Overrides -->
    <style>
        /* Modern Premium Style Overrides */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            /* Common variables and fonts */
            --primary: #6366f1 !important;
            --primary-hover: #4f46e5 !important;
            --success: #10b981 !important;
            --danger: #ef4444 !important;
            --warning: #f59e0b !important;
            --font-sans: 'Plus Jakarta Sans', sans-serif !important;
            --radius: 12px !important;
            font-family: var(--font-sans) !important;
            transition: background 0.3s ease, color 0.3s ease !important;
        }

        body:not(.light-theme) {
            /* Dark Mode Variables */
            --bg: #0b0f19;
            --card: #111827;
            --text: #f3f4f6;
            --text-light: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            
            /* Override original variables */
            --card-bg: #111827 !important;
            --body-bg: #0b0f19 !important;
            --dark: #f3f4f6 !important;
            --gray: #9ca3af !important;
            --light-gray: rgba(255, 255, 255, 0.08) !important;
            --footer-bg: #111827 !important;
        }

        body.light-theme {
            /* Light Mode Variables */
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #2d3436;
            --text-light: #636e72;
            --border: #dfe6e9;
            
            /* Override original variables */
            --card-bg: #ffffff !important;
            --body-bg: #f5f6fa !important;
            --dark: #2d3436 !important;
            --gray: #636e72 !important;
            --light-gray: #dfe6e9 !important;
            --footer-bg: #ffffff !important;
        }
        
        /* Apply background & color overrides in dark mode */
        body:not(.light-theme) {
            background: var(--bg) !important;
            color: var(--text) !important;
        }
        body:not(.light-theme) .welcome-screen {
            background: var(--bg) !important;
        }
        
        /* Containers */
        body:not(.light-theme) .welcome-container, 
        body:not(.light-theme) .question-card, 
        body:not(.light-theme) .q-card, 
        body:not(.light-theme) .question-nav,
        body:not(.light-theme) .results-card,
        body:not(.light-theme) .modal-content {
            background: var(--card) !important;
            border-color: var(--border) !important;
        }

        body:not(.light-theme) .welcome-container, 
        body:not(.light-theme) .question-card, 
        body:not(.light-theme) .q-card, 
        body:not(.light-theme) .results-card,
        body:not(.light-theme) .modal-content {
            border-radius: var(--radius) !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2) !important;
        }
        
        /* Option labels overrides in dark mode */
        body:not(.light-theme) .option-label {
            background: var(--card) !important;
            color: var(--text) !important;
            border-color: var(--border) !important;
            border-radius: 10px !important;
        }
        body:not(.light-theme) .option-label:hover {
            border-color: var(--primary) !important;
            background: rgba(99, 102, 241, 0.04) !important;
        }
        body:not(.light-theme) .option-input:checked + .option-label {
            background: rgba(99, 102, 241, 0.1) !important;
            border-color: var(--primary) !important;
            color: #ffffff !important;
        }
        body:not(.light-theme) .option-input:checked + .option-label * {
            color: #ffffff !important;
        }
        body:not(.light-theme) .review-mode .option-input:checked + .option-label.correct,
        body:not(.light-theme) .review-mode .option-label.correct-answer {
            background: rgba(16, 185, 129, 0.08) !important;
            border-color: var(--success) !important;
            color: #10b981 !important;
        }
        body:not(.light-theme) .review-mode .option-input:checked + .option-label.incorrect {
            background: rgba(239, 68, 68, 0.08) !important;
            border-color: var(--danger) !important;
            color: #ef4444 !important;
        }
        
        /* Force color readability for nested content in dark mode */
        body:not(.light-theme) p,
        body:not(.light-theme) li,
        body:not(.light-theme) span,
        body:not(.light-theme) td,
        body:not(.light-theme) th,
        body:not(.light-theme) h1,
        body:not(.light-theme) h2,
        body:not(.light-theme) h3,
        body:not(.light-theme) h4,
        body:not(.light-theme) h5,
        body:not(.light-theme) h6,
        body:not(.light-theme) .question-text, 
        body:not(.light-theme) .q-txt, 
        body:not(.light-theme) .comprehension, 
        body:not(.light-theme) .comp, 
        body:not(.light-theme) .solution-box, 
        body:not(.light-theme) .sol, 
        body:not(.light-theme) table, 
        body:not(.light-theme) tr, 
        body:not(.light-theme) mjx-container {
            color: #f3f4f6 !important;
        }

        body:not(.light-theme) .option-text,
        body:not(.light-theme) .option-text * {
            color: #f3f4f6 !important;
        }

        body:not(.light-theme) .option-indicator {
            color: #f3f4f6 !important;
        }

        /* Unvisited legend/total badge overrides in light/dark mode */
        .bg-gray {
            background-color: var(--gray) !important;
            color: white !important;
        }
        #attempted-count {
            color: #ffffff !important;
        }

        /* Force transparent background on nested elements to prevent white-on-white text */
        body:not(.light-theme) .question-text *, 
        body:not(.light-theme) .q-txt *,
        body:not(.light-theme) .comprehension *, 
        body:not(.light-theme) .comp *,
        body:not(.light-theme) .solution-box *, 
        body:not(.light-theme) .sol *,
        body:not(.light-theme) .option-label * {
            background: transparent !important;
            background-color: transparent !important;
        }

        /* Invert math equations, graphs and formula images (black text) in dark mode */
        body:not(.light-theme) .question-text img, 
        body:not(.light-theme) .q-txt img,
        body:not(.light-theme) .option-label img, 
        body:not(.light-theme) .comprehension img, 
        body:not(.light-theme) .comp img,
        body:not(.light-theme) .solution-box img, 
        body:not(.light-theme) .sol img {
            filter: invert(1) hue-rotate(180deg) !important;
            background: transparent !important;
        }

        /* Force light text color on elements with hardcoded dark text inline styling */
        body:not(.light-theme) [style*="color: #000"], 
        body:not(.light-theme) [style*="color:#000"], 
        body:not(.light-theme) [style*="color: #111"], 
        body:not(.light-theme) [style*="color:#111"],
        body:not(.light-theme) [style*="color: #222"], 
        body:not(.light-theme) [style*="color:#222"],
        body:not(.light-theme) [style*="color: #333"], 
        body:not(.light-theme) [style*="color:#333"],
        body:not(.light-theme) [style*="color: #444"], 
        body:not(.light-theme) [style*="color:#444"],
        body:not(.light-theme) [style*="color: black"], 
        body:not(.light-theme) [style*="color:black"],
        body:not(.light-theme) [style*="color: #000000"], 
        body:not(.light-theme) [style*="color:#000000"] {
            color: #f3f4f6 !important;
        }

        /* Solution box and comprehension box overrides in dark mode */
        body:not(.light-theme) .solution-box, 
        body:not(.light-theme) .sol {
            background: rgba(16, 185, 129, 0.08) !important;
            border-left: 3px solid var(--success) !important;
        }
        body:not(.light-theme) .solution-header,
        body:not(.light-theme) .solution-header * {
            color: var(--success) !important;
        }
        body:not(.light-theme) .comprehension, 
        body:not(.light-theme) .comp {
            background: rgba(99, 102, 241, 0.08) !important;
            border-left: 3px solid var(--primary) !important;
        }

        /* Buttons overrides */
        .start-btn, .btn-next, .btn-p, .btn-sm, .nav-btn:not(.nav-btn-outline) {
            background: linear-gradient(135deg, #6366f1, #8b5cf6) !important;
            color: white !important;
            border: none !important;
            box-shadow: 0 4px 14px rgba(99,102,241,0.35) !important;
            border-radius: 8px !important;
            transition: all 0.2s !important;
        }
        .start-btn:hover, .btn-next:hover, .nav-btn:not(.nav-btn-outline):hover {
            transform: translateY(-1px) !important;
            box-shadow: 0 6px 18px rgba(99,102,241,0.5) !important;
        }
        body:not(.light-theme) .timer-box, 
        body:not(.light-theme) .timer,
        body:not(.light-theme) .timer-display {
            background: rgba(245, 158, 11, 0.1) !important;
            color: var(--warning) !important;
            border: 1px solid rgba(245, 158, 11, 0.2) !important;
            border-radius: var(--radius) !important;
        }
        
        /* Navigator boxes */
        body:not(.light-theme) .q-box {
            background: rgba(255, 255, 255, 0.03) !important;
            color: var(--text-light) !important;
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
            transition: all 0.15s ease !important;
        }
        body:not(.light-theme) .q-box:hover {
            background: rgba(255, 255, 255, 0.08) !important;
            color: var(--text) !important;
        }
        body:not(.light-theme) .q-box.active {
            border-color: var(--primary) !important;
            color: #818cf8 !important;
            background: rgba(99, 102, 241, 0.1) !important;
        }
        body:not(.light-theme) .q-box.attempted {
            background: var(--primary) !important;
            border-color: var(--primary) !important;
            color: white !important;
        }
        body:not(.light-theme) .q-box.flagged {
            background: var(--warning) !important;
            border-color: var(--warning) !important;
            color: white !important;
        }
        
        /* Desktop bottom navigation visibility and position */
        @media (min-width: 992px) {
            .bottom-nav {
                display: flex !important;
                right: 320px !important;
            }
        }
        body:not(.light-theme) .bottom-nav {
            background: var(--card) !important;
            border-color: var(--border) !important;
        }

        /* Results Modal accessibility hiding */
        .results-modal {
            visibility: hidden;
        }
        .results-modal.show {
            visibility: visible;
        }
        body:not(.light-theme) .results-modal {
            background: rgba(0, 0, 0, 0.8) !important;
        }

        /* Tables overrides */
        body:not(.light-theme) table {
            background: rgba(255, 255, 255, 0.02) !important;
            border-color: rgba(255, 255, 255, 0.12) !important;
        }
        body:not(.light-theme) table, 
        body:not(.light-theme) tr, 
        body:not(.light-theme) td, 
        body:not(.light-theme) th {
            color: #f3f4f6 !important;
        }
        body:not(.light-theme) td, 
        body:not(.light-theme) th {
            background: transparent !important;
        }
        body:not(.light-theme) th {
            background: rgba(255, 255, 255, 0.05) !important;
            color: #ffffff !important;
            font-weight: 600 !important;
        }

        /* Theme toggle button styling */
        .theme-toggle-btn {
            background: transparent !important;
            border: none !important;
            color: #ffffff !important;
            cursor: pointer !important;
            font-size: 18px !important;
            padding: 8px !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            transition: transform 0.2s ease, color 0.2s ease !important;
            margin-right: 10px !important;
        }
        .theme-toggle-btn:hover {
            transform: scale(1.1) !important;
            color: #818cf8 !important;
        }
        body.light-theme .theme-toggle-btn {
            color: #ffffff !important; /* Keep white on header since header is dark */
        }
        body.light-theme .theme-toggle-btn:hover {
            color: #818cf8 !important;
        }
        
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
    <!-- END: Modern Premium Style Overrides -->





</head>
<body>
    <div class="error-card">
        <div class="error-icon">
            <i class="fas fa-exclamation-circle"></i>
        </div>
        <h3 class="error-title">Error Loading Test</h3>
        <p class="error-message">An error occurred while generating the test interface:</p>
        <p class="text-muted mb-4">could not convert string to float: ''</p>
        <button class="btn btn-primary" onclick="history.back()">
            <i class="fas fa-arrow-left me-2"></i>Go Back
        </button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- START: Portal Dynamic Theme Handler -->
<script>
    (function() {
        const toggleBtn = document.getElementById('themeToggle');
        if (toggleBtn) {
            // Apply saved preference or default to dark theme
            const savedTheme = localStorage.getItem('portal-theme') || 'dark';
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
                const icon = toggleBtn.querySelector('i');
                if (icon) {
                    icon.className = 'fas fa-sun';
                }
            } else {
                document.body.classList.remove('light-theme');
                const icon = toggleBtn.querySelector('i');
                if (icon) {
                    icon.className = 'fas fa-moon';
                }
            }
            
            toggleBtn.onclick = function(e) {
                e.stopPropagation();
                const isLight = document.body.classList.toggle('light-theme');
                localStorage.setItem('portal-theme', isLight ? 'light' : 'dark');
                
                const icon = toggleBtn.querySelector('i');
                if (icon) {
                    icon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            };
        }
    })();
</script>
<!-- END: Portal Dynamic Theme Handler -->
</body>
</html>
