t-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2343;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2375;&#2330;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2379;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2313;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> 20% </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2369;&#2310;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2379;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> | </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2360;&#2381;&#2340;&#2369;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2352;&#2306;&#2349;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> ( </span><span style=\"font-family: Nirmala UI;\">&#2352;&#2369;&#2346;&#2351;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> ) </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2340;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> ? </span></p>\n",
                    options_en: ["<p>1992<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>1556</p>\n", 
                                "<p>2304</p>\n", "<p>2072</p>\n"],
                    options_hi: ["<p>1992<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>1556</p>\n",
                                "<p>2304</p>\n", "<p>2072</p>\n"],
                    solution_en: "<p>28.<span style=\"font-family: Cambria Math;\">(a)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the original cost price of the article be 100 units.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">At 10% loss on CP, SP is 90 units.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">If article is sold at &#8377;664 more, there is 20% profit, ie. SP = 120 units</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">120 - 90 = 30 units = &#8377; 664</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">1 unit =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>664</mn><mn>30</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Original SP = 90 units </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">=&nbsp;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>664</mn><mn>30</mn></mfrac></math> &times; 90 = <span style=\"font-weight: 400;\">Rs 1992</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><strong>Shorts Tricks</strong> :-</span><span style=\"font-family: Cambria Math;\"> percentage difference = 30% = 664</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> Original S.P. = 90% =&nbsp;</span><span style=\"font-family: Cambria Math;\">&nbsp;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>664</mn><mn>30</mn></mfrac></math> &times; 90 = <span style=\"font-weight: 400;\">Rs 1992</span></p>\n",
                    solution_hi: "<p>28.(a)</p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2360;&#2381;&#2340;&#2369;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2366;&#2327;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> 100 </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2325;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> 10% </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2366;&#2344;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> 90 </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2325;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2360;&#2381;&#2340;&#2369;</span><span style=\"font-family: Cambria Math;\"> &#8377;664 </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2343;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2375;&#2330;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2366;&#2340;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> 20% </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2379;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2352;&#2381;&#2341;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> = 120 </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2325;&#2366;&#2312;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">120-90 = 30 </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2325;&#2366;&#2311;&#2351;&#2366;&#2305;</span><span style=\"font-family: Cambria Math;\"> = &#8377; 664</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">1 <span style=\"font-family: Nirmala UI;\">&#2311;&#2325;&#2366;&#2312;</span> &nbsp;= <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>664</mn><mn>30</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> = 90 </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2325;&#2366;&#2311;&#2351;&#2366;&#2305;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">=&nbsp;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>664</mn><mn>30</mn></mfrac></math> &times; 90 = <span style=\"font-weight: 400;\">Rs 1992</span></p>\r\n<p><strong>&#2358;&#2377;&#2352;&#2381;&#2335;&#2381;&#2360; &#2335;&#2381;&#2352;&#2367;&#2325;&#2381;&#2360;:-&nbsp;</strong></p>\r\n<p><span style=\"font-weight: 400;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2309;&#2306;&#2340;&#2352; = 30% = 664</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;</span> <span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span> <span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span> = 90% = </span><span style=\"font-family: Cambria Math;\">&nbsp;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>664</mn><mn>30</mn></mfrac></math> &times; 90 = <span style=\"font-weight: 400;\">Rs 1992</span></p>\n",
                    correct: "a",

                questions.push({
                    id: "29",
                    section: "17",
                    question_en: "<p>29. <span style=\"font-family: Cambria Math;\">Find the equation of the line which has coordinates (6, 5) and is parallel to 2x + 3y = 17 ?</span></p>\n",
                    question_hi: "<p>29.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2313;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2352;&#2375;&#2326;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2350;&#2368;&#2325;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2352;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2367;&#2360;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2366;&#2306;&#2325;</span><span style=\"font-family: Cambria Math;\"> (6, 5) </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2341;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2379;</span><span style=\"font-family: Cambria Math;\"> 2x + 3y = 17 </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2404;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
                    options_en: ["<p>2x + 3y = 27<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>2x + 3y = 30</p>\n", 
                                "<p>2x + 3y = 15<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>2x + 3y = 21</p>\n"],
                    options_hi: ["<p>2x + 3y = 27<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>2x + 3y = 30</p>\n",
                                "<p>2x + 3y = 15</p>\n", "<p>2x + 3y = 21</p>\n"],
                    solution_en: "<p>29.(a)<span style=\"font-family: Cambria Math;\"> Given, 2x + 3y = 17 then </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">3y = -2x + 17 and y = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>-</mo><mfrac><mn>2</mn><mn>3</mn></mfrac></math>x</span><span style=\"font-family: Cambria Math;\"> + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>17</mn><mn>3</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> (y = mx + c where m = slope)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Therefore slope = -&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2</mn><mn>3</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Hence parallel lines have equal slope the slope of another line is also -&nbsp;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2</mn><mn>3</mn></mfrac></math></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; To find equation of another line put (6, 5) in y = mx + c</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">5 = -&nbsp;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2</mn><mn>3</mn></mfrac></math> &times; 6 + <span style=\"font-family: \'Cambria Math\';\">c</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Then c = 5 + 4 = 9</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; y = -</span><span style=\"font-family: Cambria Math;\">&nbsp;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2</mn><mn>3</mn></mfrac></math>x + 9&nbsp;<span style=\"font-family: Cambria Math;\">and 2x + 3y = 2</span><span style=\"font-family: Cambria Math;\">7</span></p>\n",
                    solution_hi: "<p>29.(a)<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> , 2x + 3y = 17 </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2379;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">3y = -2x + 17 <span style=\"font-weight: 400;\">&#2324;&#2352;</span> y = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>-</mo><mfrac><mn>2</mn><mn>3</mn></mfrac></math>x</span><span style=\"font-family: Cambria Math;\"> + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>17</mn><mn>3</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> <span style=\"font-weight: 400;\">(y = mx + c&nbsp; &#2332;&#2361;&#2366;&#2306; m = &#2338;&#2354;&#2366;&#2344;)</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2309;&#2340;&#2307; &#2338;&#2366;&#2354;</span> = - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2</mn><mn>3</mn></mfrac></math></span></p>\r\n<p><span style=\"font-weight: 400;\">&#2309;&#2340;: &#2360;&#2350;&#2366;&#2344;&#2381;&#2340;&#2352; &#2352;&#2375;&#2326;&#2366;&#2323;&#2306; &#2325;&#2366; &#2338;&#2366;&#2354; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2342;&#2370;&#2360;&#2352;&#2368; &#2352;&#2375;&#2326;&#2366; &#2325;&#2366; &#2338;&#2366;&#2354; &#2349;&#2368; &#2361;&#2376;</span><span style=\"font-weight: 400;\"> -</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2</mn><mn>3</mn></mfrac></math></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; </span><span style=\"font-weight: 400;\">y = mx + c &#2350;&#2375;&#2306; &#2337;&#2366;&#2354; &#2342;&#2368; &#2327;&#2312; &#2319;&#2325; &#2309;&#2344;&#2381;&#2351; &#2352;&#2375;&#2326;&#2366; &#2325;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; (6, 5)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">5 = -&nbsp;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2</mn><mn>3</mn></mfrac></math> &times; 6 + <span style=\"font-family: \'Cambria Math\';\">c</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2347;&#2367;&#2352;</span> c = 5 + 4 = 9</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; y = -</span><span style=\"font-family: Cambria Math;\">&nbsp;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2</mn><mn>3</mn></mfrac></math>x + 9 <span style=\"font-weight: 400;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\">&nbsp;2x + 3y = 2</span><span style=\"font-family: Cambria Math;\">7</span></p>\n",
                    correct: "a",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });
                questions.push({
                    id: "30",
                    section: "6",
                    question_en: "<p>30. <span style=\"font-family: Cambria Math;\">The average of 33 numbers is 74. The average of the first 17 numbers is 72.8 and that of the last 17 numbers is 77.2. If the 17th number is excluded, then what will be the average of the remaining numbers (correct to one decimal place)? </span></p>\n",

                    solution_en: "<p>47.(b)</p>\r\n<p><span style=\"font-family: Cambria Math;\">27 D 3 A 5 A (9 C 6) B 15 A (14 B </span><span style=\"font-family: Cambria Math;\">11) C 6</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Applying directions in above expression, we get</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">27 &divide;</span><span style=\"font-family: Cambria Math;\">3 + 5 + (9 &times;</span><span style=\"font-family: Cambria Math;\">6) - 15 + (14 - 11) &times;</span><span style=\"font-family: Cambria Math;\">6</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 27 &divide;</span><span style=\"font-family: Cambria Math;\">3 + 5 + 54 - 15 + 3&times;&nbsp;</span><span style=\"font-family: Cambria Math;\"> 6</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 9 + 5 + 54 - 15 + 18</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 86 - 15 = 71</span></p>\n",

            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();
        }
        
        // Show a specific question
        
        function formatContent(text) {
            if (!text) return '';
            return text.replace(/<img/g, '<img style="max-width:100%;height:auto;"');
        }
        
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML
            let html = `
                <div class="question-card">
                    <div class="question-text">
                        <div class="en">${formatContent(question.question_en)}</div>
                        <div class="hi" style="display:none">${formatContent(question.question_hi)} </div>
                    </div>
                    <div class="options" id="options-container">`;
            
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = '';
                let isCorrectAnswer = opt === question.correct;
                let isUserAnswer = answers[question.id] === opt;
                
                // When reviewing, add appropriate classes
                if (submitted) {
                    if (isCorrectAnswer) {
                        optionClass += ' correct-answer';
                    } else if (isUserAnswer && !isCorrectAnswer) {
                        optionClass += ' incorrect';
                    }
                }
                
                html += `
                    <div class="option-item">
                        <input class="option-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${isUserAnswer ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                       <label class="option-label${optionClass}" for="opt-${index}-${opt}">
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="solution-container">
                        <div class="solution-title">${resultText}</div>
                        <div class="solution-text">
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
            
            // Add review mode class if submitted
            if (submitted) {
                document.getElementById('options-container').classList.add('review-mode');
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
            
            // Update language button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                const box = document.getElementById(`box-${index}`);
                box.classList.add('attempted');
                box.classList.remove('unattempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { 
            if (currentQuestion > 0) showQuestion(currentQuestion - 1); 
        }
        
        function nextQuestion() { 
            if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); 
        }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const overlay = document.getElementById('nav-overlay');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                overlay.classList.add('show');
                document.body.style.overflow = 'hidden';
            } else {
                nav.classList.remove('show');
                overlay.classList.remove('show');
                document.body.style.overflow = '';
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer
        function togglePause() {
    if (typeof test !== 'undefined') {
        test.isPaused = !test.isPaused;
        if (test.isPaused) {
            clearInterval(window.timerInterval);
            const pb = document.getElementById('pauseBtn');
            if (pb) {
                pb.innerHTML = '▶';
                pb.title = 'Resume Test';
            }
            const pm = document.getElementById('pauseModal');
            if (pm) {
                pm.style.display = 'flex';
                pm.style.alignItems = 'center';
                pm.style.justifyContent = 'center';
            }
        } else {
            const pm = document.getElementById('pauseModal');
            if (pm) pm.style.display = 'none';
            const pb = document.getElementById('pauseBtn');
            if (pb) {
                pb.innerHTML = '⏸';
                pb.title = 'Pause Test';
            }
            startTimer();
        }
    } else {
        window.isPaused = !window.isPaused;
        if (window.isPaused) {
            clearInterval(window.timerInterval);
            const pb = document.getElementById('pauseBtn');
            if (pb) {
                pb.innerHTML = '▶';
                pb.title = 'Resume Test';
            }
            const pm = document.getElementById('pauseModal');
            if (pm) {
                pm.style.display = 'flex';
                pm.style.alignItems = 'center';
                pm.style.justifyContent = 'center';
            }
        } else {
            const pm = document.getElementById('pauseModal');
            if (pm) pm.style.display = 'none';
            const pb = document.getElementById('pauseBtn');
            if (pb) {
                pb.innerHTML = '⏸';
                pb.title = 'Pause Test';
            }
            startTimer();
        }
    }
}

function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            window.timeLeft = typeof window.timeLeft !== 'undefined' ? window.timeLeft : (typeof test !== 'undefined' ? (test.timeLeft || test.timer) : (typeof totalTime !== 'undefined' ? totalTime : 3600));
            let timeLeft = window.timeLeft;
            
            window.timerInterval = setInterval(() => {
                window.timeLeft = timeLeft;
                if (typeof test !== 'undefined') { test.timerInterval = window.timerInterval; test.timeLeft = timeLeft; }
                const timerInterval = window.timerInterval;
                const interval = window.timerInterval;
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            // Create a more modern confirmation dialog
            const confirmHtml = `
                <div style="text-align: center; padding: 20px;">
                    <h4 style="margin-bottom: 16px; color: var(--dark);">Confirm Submission</h4>
                    <p style="margin-bottom: 24px; color: var(--gray);">
                        You have attempted ${attempted} of ${questions.length} questions.<br>
                        ${remaining} questions are unattempted.
                    </p>
                    <div style="display: flex; justify-content: center; gap: 12px;">
                        <button onclick="this.closest('.modal').querySelector('.cancel-btn').click()" 
                            style="padding: 8px 20px; border: 1px solid var(--light-gray); background: white; border-radius: 8px; cursor: pointer;">
                            Cancel
                        </button>
                        <button onclick="submitTest(); this.closest('.modal').querySelector('.cancel-btn').click()" 
                            style="padding: 8px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer;">
                            Submit Test
                        </button>
                    </div>
                </div>`;
            
            // Create modal element
            const modal = document.createElement('div');
            modal.className = 'results-modal show';
            modal.innerHTML = `
                <div class="results-card" style="max-width: 400px;">
                    <button class="cancel-btn" style="position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--gray);" onclick="this.closest('.results-modal').remove()">
                        ×
                    </button>
                    ${confirmHtml}
                </div>`;
            
            document.body.appendChild(modal);
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('unattempted');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            document.getElementById('results-modal').classList.add('show');
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            submitBtn.style.backgroundColor = 'var(--success)';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            document.getElementById('results-modal').classList.remove('show');
            showQuestion(0);
        }
        
        // Close modal when clicking outside
        window.addEventListener('click', function(event) {
            if (event.target === document.getElementById('results-modal')) {
                document.getElementById('results-modal').classList.remove('show');
            }
        });
        
        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') prevQuestion();
            if (e.key === 'ArrowRight') nextQuestion();
        });
    </script>

<!-- START: Portal Dynamic Theme Handler -->
<script>
    (function() {
        const toggleBtn = document.getElementById('themeToggle');
        if (toggleBtn) {
            // Apply saved preference or default to dark theme
            const savedTheme = localStorage.getItem('portal-theme') || 'dark';
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
                const icon = toggleBtn.querySelector('i');
                if (icon) {
                    icon.className = 'fas fa-sun';
                }
            } else {
                document.body.classList.remove('light-theme');
                const icon = toggleBtn.querySelector('i');
                if (icon) {
                    icon.className = 'fas fa-moon';
                }
            }
            
            toggleBtn.onclick = function(e) {
                e.stopPropagation();
                const isLight = document.body.classList.toggle('light-theme');
                localStorage.setItem('portal-theme', isLight ? 'light' : 'dark');
                
                const icon = toggleBtn.querySelector('i');
                if (icon) {
                    icon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
                }
            };
        }
    })();
</script>
<!-- END: Portal Dynamic Theme Handler -->

        <div style="text-align:center;max-width:400px;width:100%;padding:32px 24px;border-radius:12px;background:var(--card,#1e1e1e);">

            <div style="display:flex;justify-content:center;margin-top:24px;">
                <button class="btn" onclick="togglePause()" style="background:var(--primary,#6c63ff);color:white;padding:12px 24px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:15px;">▶ Resume Test</button>
            </div>
        </div>
    </div>
