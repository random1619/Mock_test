<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>

t-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">की</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">अवधि</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">को</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">दर्शाने</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">के</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">लिए</span><span style=\"font-family:Cambria Math\"> ‘for’ </span><span style=\"font-family:Nirmala UI\">का</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">उपयोग</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">करते</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">हैं।</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">इसलिए</span><span style=\"font-family:Cambria Math\">, ‘For several months’ </span><span style=\"font-family:Nirmala UI\">सबसे</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">उपयुक्त</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">उत्तर</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">है।</span></p>",

                                "<p>12</p>\n", "<p>11</p>\n"],
                    solution_en: "<p>29.(d)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688457830/word/media/image7.png\"></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688457830/word/media/image8.png\" width=\"70\" height=\"41\"><span style=\"font-family: Cambria Math;\"> This type of triangles consist of 3 triangles. In figure</span><span style=\"font-family: Cambria Math;\"> 3 such types of figures are available. </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, number of triangles = 3 &times; 3 = 9</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">2 remaining triangles are (GCE, KDE).</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, total triangles = 9 + 2 = 11</span></p>\n",
                    solution_hi: "<p>29.(d)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688457830/word/media/image7.png\"></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688457830/word/media/image8.png\" width=\"69\" height=\"40\"><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2325;&#2371;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 3 </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2379;&#2340;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2306;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2330;&#2367;&#2340;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> 3 </                 questions.push({

la UI;\">&#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2367;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2370;&#2352;&#2381;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2325;&#2381;</span><span style=\"font-family: Nirmala UI;\">&#2352;&#2367;&#2351;&#2366;&#2319;&#2305;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2366;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2313;&#2342;&#2366;&#2361;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> \"13\" - 13 </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2376;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\"> 13 </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2379;&#2337;&#2364;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> / </span><span style=\"font-family: Nirmala UI;\">&#2328;&#2335;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> / </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2369;&#2339;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2352;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2325;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> 13 </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> 1 </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 3 </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2379;&#2337;&#2364;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2347;&#2367;&#2352;</span><span style=\"font-family: Cambria Math;\"> 1 </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 3 </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2339;&#2367;&#2340;&#2368;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2352;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2344;&#2369;&#2350;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2361;&#2368;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">)</span></p>\n",
                    options_en: ["<p>(405 - 400 - 395)</p>\n", "<p><span style=\"font-weight: 400;\">(700 - 690 - 685)</span></p>\n", 
                                "<p>(550 - 545 - 540)</p>\n", "<p><span style=\"font-weight: 400;\">(620 - 615 - 610)</span></p>\n"],
                    options_hi: ["<p>(405 - 400 - 395)</p>\n", "<p><span style=\"font-weight: 400;\">&nbsp;(700 - 690 - 685)</span></p>\n",
                                "<p>(550 - 545 - 540)</p>\n", "<p><span style=\"font-weight: 400;\">&nbsp;(620 - 615 - 610)</span></p>\n"],
                    solution_en: "<p>30.(b)</p>\r\n<p><strong>Logic </strong><span style=\"font-weight: 400;\">: (difference between 1st and 2nd number and difference between 2nd and 3rd number is equal.)</span></p>\r\n<p><span style=\"font-weight: 400;\">(405, 400, 395)&nbsp;</span><span style=\"font-weight: 400;\">&rArr; {(405 - 400) = (400 - 395)}</span></p>\r\n<p><span style=\"font-weight: 400;\">(700, 690, 685)&nbsp;</span><span style=\"font-weight: 400;\">&rArr; {(700 - 690) &ne;</span><span style=\"font-weight: 400;\"> (690 - 685)}</span></p>\r\n<p><span style=\"font-weight: 400;\">(550, 545, 540)&nbsp;</span><span style=\"font-weight: 400;\">&rArr; {(550 - 545) = (545 - 540)}</span></p>\r\n<p><span style=\"font-weight: 400;\">(620, 615, 610)&nbsp;</span><span style=\"font-weight: 400;\">&rArr; {(620 - 615) = (615 - 610)}</span></p>\r\n<p><span style=\"font-weight: 400;\">Hence, we can see that all of them are following the same pattern except </span><strong>(700, 690, 685).</strong></p>\n",
                    solution_hi: "<p>30.(b)&nbsp;</p>\r\n<p><strong>&#2340;&#2352;&#2381;&#2325;&nbsp; </strong><span style=\"font-weight: 400;\">: (&#2346;&#2361;&#2354;&#2368; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2368; &#2324;&#2352; &#2340;&#2368;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404;)</span></p>\r\n<p><span style=\"font-weight: 400;\">(405, 400, 395)&nbsp;</span><span style=\"font-weight: 400;\">&rArr; {(405 - 400) = (400 - 395)}</span></p>\r\n<p><span style=\"font-weight: 400;\">(700, 690, 685)&nbsp;</span><span style=\"font-weight: 400;\">&rArr; {(700 - 690) &ne;</span><span style=\"font-weight: 400;\"> (690 - 685)}</span></p>\r\n<p><span style=\"font-weight: 400;\">(550, 545, 540)&nbsp;</span><span style=\"font-weight: 400;\">&rArr; {(550 - 545) = (545 - 540)}</span></p>\r\n<p><span style=\"font-weight: 400;\">(620, 615, 610)&nbsp;</span><span style=\"font-weight: 400;\">&rArr; {(620 - 615) = (615 - 610)}</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2311;&#2360;&#2354;&#2367;&#2319;, &#2361;&#2350; &#2342;&#2375;&#2326; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367; (700, 690, 685) &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352; &#2360;&#2349;&#2368; &#2319;&#2325; &#2361;&#2368; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352; &#2352;&#2361;&#2375; &#2361;&#2376;&#2306;&#2404;</span></p>\n",
                    correct: "b",
                    pos_marks: 2.0,

                    solution_en: "<p>52.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the two numbers be 12x and 12y</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">12x &times;12y = 2160</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">144xy = 2160</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">xy = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2160</mn><mn>144</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 15 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">And, (12x</span><span style=\"font-family: Cambria Math;\"> )&sup2;+ (12y)&sup2;</span><span style=\"font-family: Cambria Math;\"> = 4896</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">144x&sup2;</span><span style=\"font-family: Cambria Math;\"> + 144y&sup2;</span><span style=\"font-family: Cambria Math;\"> = 4896</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">144(x&sup2; </span><span style=\"font-family: Cambria Math;\">+ y&sup2;</span><span style=\"font-family: Cambria Math;\">) = 4896</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">(x&sup2; </span><span style=\"font-family: Cambria Math;\">+ y&sup2;</span><span style=\"font-family: Cambria Math;\">) </span>= <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>4896</mn><mn>144</mn></mfrac></math><span style=\"font-family: Cambria Math;\"> = 34</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, (x+y) = </span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mo>(</mo><msup><mi>x</mi><mn>2</mn></msup><mo>+</mo><msup><mi>y</mi><mn>2</mn></msup><mo>)</mo><mo>&nbsp;</mo><mo>+</mo><mn>2</mn><mi>x</mi><mi>y</mi><mo>&nbsp;</mo></msqrt><mo>=</mo><mo>&nbsp;</mo><msqrt><mn>34</mn><mo>+</mo><mn>2</mn><mo>&times;</mo><mn>15</mn></msqrt><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><msqrt><mn>34</mn><mo>+</mo><mn>30</mn></msqrt><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><msqrt><mn>64</mn></msqrt><mo>&nbsp;</mo></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> = 8</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the mean of the two no&rsquo;s = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>12</mn><mo>(</mo><mi>x</mi><mo>+</mo><mi>y</mi><mo>)</mo></mrow><mn>2</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 6(x + y) = 6&times;8 = 48</span></p>\n",

                questions.push({
                    id: "58",
                    section: "17",
                    question_en: "<p>58. <span style=\"font-family: Cambria Math;\">The lengths of the diagonals of a rhombus are 10 cm and 24 cm,respectively. What is the perimeter of the&nbsp; </span><span style=\"font-family: Cambria Math;\">rhombus ?</span></p>\n",

                    options_hi: ["<p>68 cm</p>\n", "<p>76 cm</p>\n",
                                "<p>52 cm</p>\n", "<p>80 cm</p>\n"],
                    solution_en: "<p>58.(c)<span style=\"font-family: Cambria Math;\"> We know that in rhombus diagonals bisect at&nbsp; 90&deg;<br></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">By Pythagoras:</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688457830/word/media/image46.png\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; 5&sup2; + 12&sup2; = side&sup2; &rArr;</span><span style=\"font-family: Cambria Math;\"> Side&sup2; = 169</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; Side = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>169</mn></msqrt></math> &rArr;&nbsp;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> 13</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Perimeter of rhombus = 4 &times;13 = 52 cm</span></p>\n",

                    solution_en: "<p>65.(c)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688457830/word/media/image48.png\" width=\"262\" height=\"132\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">Efficiency of A= 7 unit </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Efficiency of B = 5 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Work done by (A + B) in 1 cycle i.e.2 days = 7 + 5 = 12 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Since, both work on alternate days starting with A. so, the work done in following pattern:</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">A, B, A, B , A&hellip;&hellip;.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Then, work done by (A + B) in 5 cycle i.e</span><span style=\"font-family: Cambria Math;\">.10 days = 12 &times; 5 = 60 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, the remaining work = 70 - 60 = 10 unit </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, 7 unit work is completed by A in 1 day and remaining 3 unit work is complete by B in <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>5</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">days.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Therefore, the required time = 10 + 1 + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>5</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 11<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>5</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> days</span></p>\n",

 Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2367;&#2358;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 80 km </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2366;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2340;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2350;&#2351;</span><span style=\"font-family: Cambria Math;\"> (</span><span style=\"font-family: Nirmala UI;\">&#2328;&#2306;&#2335;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">) </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2327;&#2375;&#2327;&#2366;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",

                                "<p>32</p>\n", "<p>10</p>\n"],

                                "<p>32</p>\n", "<p>1<span style=\"font-family: Cambria Math;\">0</span></p>\n"],
                    solution_en: "<p>66.(b)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the speed of stream be y km/hr</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Downstream speed = (4 + y)km/hr</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Upstream speed = (4 - y) km/hr</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>16</mn><mrow><mn>4</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>y</mi></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>4</mn><mn>5</mn></mfrac><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mfrac><mn>10</mn><mrow><mn>4</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>y</mi><mo>&nbsp;</mo></mrow></mfrac><mspace linebreak=\"newline\"></mspace><mfrac><mrow><mn>4</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>y</mi></mrow><mrow><mn>4</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>y</mi><mo>&nbsp;</mo></mrow></mfrac><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><mn>16</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>5</mn><mo>&nbsp;</mo><mo>&nbsp;</mo></mrow><mrow><mn>4</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>10</mn></mrow></mfrac><mspace linebreak=\"newline\"></mspace><mfrac><mrow><mo>&nbsp;</mo><mn>4</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>y</mi></mrow><mrow><mn>4</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>y</mi><mo>&nbsp;</mo></mrow></mfrac><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>2</mn><mn>1</mn></mfrac></math></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>4</mn><mo>&nbsp;</mo></mrow><mi>y</mi></mfrac><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><mn>2</mn><mo>+</mo><mn>1</mn><mo>&nbsp;</mo></mrow><mrow><mn>2</mn><mo>-</mo><mn>1</mn></mrow></mfrac><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>3</mn><mn>1</mn></mfrac></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> (using componendo and dividendo rule )</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">y = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>4</mn><mn>3</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> km/hr</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the time taken to cover 80 km downstream = </span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>80</mn><mrow><mn>4</mn><mo>+</mo><mo>&nbsp;</mo><mstyle displaystyle=\"true\"><mfrac><mn>4</mn><mn>3</mn></mfrac></mstyle></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>80</mn><mn>16</mn></mfrac><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>3</mn></math><span style=\"font-family: Cambria Math;\">= 15 hrs </span></p>\n",

                    options_hi: ["<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2347;&#2354;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2313;&#2330;&#2381;&#2330;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2404;</span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2360;&#2350;&#2327;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2347;&#2354;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> 50% </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2368;&#2330;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2404;</span></p>\n",

                    solution_en: "<p>67.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the total number of candidates be 1000.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">According to the question,</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688457830/word/media/image49.png\" width=\"322\" height=\"209\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">Success rate for women = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>210</mn><mn>400</mn></mfrac></math> &times;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> 100 = 52.5%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Success rate for m</span><span style=\"font-family: Cambria Math;\">en =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>336</mn><mn>600</mn></mfrac></math> &times;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> 100 = 56%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Success rate for men is greater than women, option (a) and option (d) got eliminated.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Overall success rate =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>336</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>210</mn></mrow><mn>1000</mn></mfrac></math> &times;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> 100 =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>546</mn><mn>1000</mn></mfrac></math> &times;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> 100 = 54.6%, so option (b) got eliminated.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Hence, option (c) is the correct answer.</span></p>\n",
                    solution_hi: "<p>67.(c)</p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> 1000 </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2344;&#2369;&#2360;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\">,</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688457830/word/media/image49.png\" width=\"322\" height=\"209\"></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2347;&#2354;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> =<math xm es; </span><span style=\"font-family: Cambria Math;\">100 = 54.6%, </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;</span><span style=\"font-family: Cambria Math;\"> (b) </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2350;&#2366;&#2346;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2351;&#2366;&#2404;</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2309;&#2340;</span><span style=\"font-family: Cambria Math;\">: </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;</span><span style=\"font-family: Cambria Math;\"> (c) </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2361;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2313;&#2340;&#2381;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2404;</span></p>\n",

                    id: "68",

                    question_en: "<p>68. <span style=\"font-family: Cambria Math;\">Two printers were sold for Rs.24,000 each, one at a gain of 20% and the other at a loss of 20%. Find the loss or gain in the entire transaction.</span></p>\n",
                    question_hi: "<p>68.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325;</span><span style=\"font-family: Cambria Math;\"> Rs. 24,000 </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> 20% </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2370;&#2360;&#2352;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> 20% </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2366;&#2344;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2375;&#2330;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2351;&#2366;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2370;&#2352;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2375;&#2344;</span><span style=\"font-family: Cambria Math;\">-</span><span style=\"font-family: Nirmala UI;\">&#2342;&#2375;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2366;&#2344;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span></p>\n",
                    options_en: ["<p>2.4% loss</p>\n", "<p>2.4% profit</p>\n", 
                                "<p>4% profit</p>\n", "<p>4% loss</p>\n"],
                    options_hi: ["<p>2.4% <span style=\"font-family: Nirmala UI;\">&#2361;&#2366;&#2344;&#2367;</span></p>\n", "<p>2.4% <span style=\"font-family: Nirmala UI;\">&#2354;&#2366;&#2349;</span></p>\n",
                                "<p>4% <span style=\"font-family: Nirmala UI;\">&#2354;&#2366;&#2349;</span></p>\n", "<p>4%<span style=\"font-family: Nirmala UI;\">&#2361;&#2366;&#2344;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n"],
                    solution_en: "<p>68.(d)</p>\r\n<p><span style=\"font-family: Cambria Math;\">On balancing the given ratio, we have </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; CP&nbsp; &nbsp; &nbsp; :&nbsp; &nbsp; &nbsp; &nbsp;SP</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">1st case &rarr;&nbsp;</span><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; 5&nbsp; &nbsp; &nbsp; &nbsp; :&nbsp; &nbsp; &nbsp; &nbsp; 6 )&times;2 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">2nd case &rarr;&nbsp;</span><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; 5&nbsp; &nbsp; &nbsp; &nbsp; :&nbsp; &nbsp; &nbsp; &nbsp; 4)&times; 3 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Total CP = 5&times;2 + 5&times; 3 = 10 + 15 = 25 units</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Net profit/loss = (6-5)&times;2 + (4-5)&times;3 = 2 - 3 = -1 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the required loss% = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>25</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times; 100 = 4%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Or </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">required loss% = 20 - 20 -</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>20</mn><mo>&nbsp;</mo><mo>&times;</mo><mn>20</mn></mrow><mn>100</mn></mfrac></math> = -4%</span></p>\n",
                    solution_hi: "<p>68.(d)</p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2342;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2352;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2379;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; :&nbsp; &nbsp; &nbsp;</span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2346;&#2361;&#2354;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> &nbsp;&rarr;&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span><span style=\"font-family: Cambria Math;\">5&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;:&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 6 )&times;2 </span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2342;&#2370;&#2360;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> &rarr;</span><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;5&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; :&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 4) &times; 3 </span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> = 5 &times; 2 + 5 &times; 3 = 10 + 15 = 25 </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2325;&#2366;</span><span style=\"font-family: Nirmala UI;\">&#2312;</span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2358;&#2369;&#2342;&#2381;&#2343;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">                     options_en: ["<p>&#8377;1654</p>\n", "<p>&#8377;1638</p>\n", 
                                "<p>&#8377;1660</p>\n", "<p>&#8377;1560</p>\n"],
                    options_hi: ["<p>&#8377;1654</p>\n", "<p>&#8377;1638</p>\n",
                                "<p>&#8377;1660</p>\n", "<p>&#8377;1560</p>\n"],
                    solution_en: "<p>71.(b)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Number of compounding cycles = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>24</mn><mn>8</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 3</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mroot><mn>7800</mn><mn>3</mn></mroot><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><mroot><mrow><mn>10381</mn><mo>.</mo><mn>80</mn></mrow><mn>3</mn></mroot></math> </span><span style=\"font-family: Cambria Math;\"> = 10 : 11</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Rate percent = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>11</mn><mo>-</mo><mn>10</mn></mrow><mn>10</mn></mfrac></math>&times; 100= </span><span style=\"font-family: Cambria Math;\">10% (for 8-monthly)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Rate for yearly = 10 &times;</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>12</mn><mn>8</mn></mfrac></math>= 15</span></p>\r\n<p><span style=\"font-weight: 400;\">(15 + 5)</span>% = 20%</p>\r\n<p><span style=\"font-family: Cambria Math;\">Rate for half-yearly = 10% =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>10</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Principal&nbsp; :&nbsp; Amount</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; 10&nbsp; &nbsp; &nbsp; &nbsp; &nbsp;:&nbsp; &nbsp; &nbsp; &nbsp;11</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; 10&nbsp; &nbsp; &nbsp; &nbsp; &nbsp;:&nbsp; &nbsp; &nbsp; 11</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> ____________________</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; 100&nbsp; &nbsp; &nbsp;:&nbsp; &nbsp; &nbsp; &nbsp;121</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Interest = 121 - 100 = 21 units</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Required interest = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>21</mn><mn>100</mn></mfrac></math> &times; </span><span style=\"font-family: Cambria Math;\">7800 = 1638</span></p>\n",
                    solution_hi: "<p>71.(b)</p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2330;&#2325;&#2381;&#2352;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>24</mn><mn>8</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 3</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mroot><mn>7800</mn><mn>3</mn></mroot><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><mroot><mrow><mn>10381</mn><mo>.</mo><mn>80</mn></mrow><mn>3</mn></mroot></math> </span><span style=\"font-family: Cambria Math;\"> = 10 : 11</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span><span style=\"font-family: Cambria Math;\"> =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>11</mn><mo>-</mo><mn>10</mn></mrow><mn>10</mn></mfrac></math> &times; 100 =&nbsp;</span><span style=\"font-family: Cambria Math;\"> 10% (8 </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2361;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">)</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> = 10 &times;</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>12</mn><mn>8</mn></mfrac></math>= 15</span></p>\r\n<p><span style=\"font-weight: 400;\">(15 + 5)</span>% = 20%</p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2309;&#2352;&#2381;&#2343;</span><span style=\"font-family: Cambria Math;\">-</span><span style=\"font-family: Nirmala UI;\">&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\">= 10% =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>10</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;&#2343;&#2344;&nbsp; &nbsp;</span><span style=\"font-family: Cambria Math;\">:&nbsp; &nbsp; </span><span style=\"font-family: Nirmala UI;\">&#2352;&#2366;&#2358;&#2367;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; 10&nbsp; &nbsp; &nbsp; &nbsp;:&nbsp; &nbsp; &nbsp;11</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; 10&nbsp; &nbsp; &nbsp; &nbsp;:&nbsp; &nbsp; &nbsp;11</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> ______________</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp;100&nbsp; &nbsp; &nbsp;:&nbsp; &nbsp; &nbsp;121</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\">= 121 - 100 = 21 </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2325;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2310;&#2357;&#2358;&#2381;&#2351;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>21</mn><mn>100</mn></mfrac></math>&times; </span><span style=\"font-family: Cambria Math;\">7800 = 1638</span></p>\n",

                    question_en: "<p>74.<span style=\"font-family: Cambria Math;\"> If mean is 40 and standard deviation is 5 then C.V (Coefficient of variation) is </span></p>\n",

                    solution_en: "<p>74.(d)</p>\r\n<p><span style=\"font-family: Cambria Math;\">We know, the formula of Coefficient of variation </span><span style=\"font-family: Cambria Math;\">=&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&nbsp;</mo><mfrac><mi>&sigma;</mi><mi>&mu;</mi></mfrac></math> &times;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">100</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Where &sigma;</span><span style=\"font-family: Cambria Math;\"> = standard deviation of the given data set and </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&mu; = mean of the given data set</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now mean is 40 and standard deviation is 5 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">then C.V (Coefficient of variation) is </span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mfrac><mrow><mo>&nbsp;</mo><mn>5</mn></mrow><mn>40</mn></mfrac><mo>&times;</mo><mn>100</mn><mo>%</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><mn>8</mn></mfrac><mo>&nbsp;</mo><mo>&times;</mo><mn>100</mn><mo>%</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mo>=</mo><mo>&nbsp;</mo><mn>12</mn><mo>.</mo><mn>5</mn><mo>&nbsp;</mo><mo>%</mo></math></p>\n",
                    solution_hi: "<p>74.(d)</p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2361;&#2350; &#2332;&#2366;&#2344;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2357;&#2367;&#2330;&#2352;&#2339; &#2325;&#2375; &#2327;&#2369;&#2339;&#2366;&#2306;&#2325; &#2325;&#2366; &#2360;&#2370;&#2340;&#2381;&#2352;</span> </span><span style=\"font-family: Cambria Math;\">=&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&nbsp;</mo><mfrac><mi>&sigma;</mi><mi>&mu;</mi></mfrac></math> &times;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">100</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2332;&#2361;&#2366;&#2305; </span>&sigma;</span><span style=\"font-family: Cambria Math;\"> = <span style=\"font-weight: 400;\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2337;&#2375;&#2335;&#2366; &#2360;&#2375;&#2335; &#2325;&#2366; &#2350;&#2366;&#2344;&#2325; &#2357;&#2367;&#2330;&#2354;&#2344; &#2324;&#2352;</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&mu; = <span style=\"font-weight: 400;\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2337;&#2375;&#2335;&#2366; &#2360;&#2375;&#2335; &#2325;&#2366; &#2350;&#2366;&#2343;&#2381;&#2351;</span></span></p>\r\n<p><span style=\"font-weight: 400;\">&#2309;&#2348; &#2350;&#2366;&#2343;&#2381;&#2351; 40 &#2361;&#2376; &#2324;&#2352; &#2350;&#2366;&#2344;&#2325; &#2357;&#2367;&#2330;&#2354;&#2344; 5 &#2361;&#2376;</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2340;&#2348; C.V. (&#2357;&#2367;&#2330;&#2352;&#2339; &#2325;&#2366; &#2327;&#2369;&#2339;&#2366;&#2306;&#2325;)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mfrac><mrow><mo>&nbsp;</mo><mn>5</mn></mrow><mn>40</mn></mfrac><mo>&times;</mo><mn>100</mn><mo>%</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><mn>8</mn></mfrac><mo>&nbsp;</mo><mo>&times;</mo><mn>100</mn><mo>%</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mo>=</mo><mo>&nbsp;</mo><mn>12</mn><mo>.</mo><mn>5</mn><mo>&nbsp;</mo><mo>%</mo></math></p>\n",

                    solution_hi: " <p>100.(b) </span><span style=\"font-family:Nirmala UI\">नोवाक</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">जोकोविच</span></p> <p><span style=\"font-family:Nirmala UI\">ऑस्ट्रेलियन</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">ओपन</span><span style=\"font-family:Cambria Math\"> 2023: </span><span style=\"font-family:Nirmala UI\">टेनिस</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">टूर्नामेंट</span></p> <p><span style=\"font-family:Cambria Math\">1. </span><span style=\"font-family:Nirmala UI\">पुरुष</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">एकल</span><span style=\"font-family:Cambria Math\">: </span><span style=\"font-family:Nirmala UI\">नोवाक</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">जोकोविच</span><span style=\"font-family:Cambria Math\"> (</span><span style=\"font-family:Nirmala UI\">सर्बिया</span><span style=\"font-family:Cambria Math\">) • </span><span style=\"font-family:Nirmala UI\">पराजित</span><span style=\"font-family:Cambria Math\"> → </span><span style=\"font-family:Nirmala UI\">स्टेफानोस</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">सितसिपास</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Cambria Math\">(</span><span style=\"font-family:Nirmala UI\">ग्रीस</span><span style=\"font-family:Cambria Math\">)</span></p> <p><span style=\"font-family:Cambria Math\">2. </span><span style=\"font-family:Nirmala UI\">महिला</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">एकल</span><span style=\"font-family:Cambria Math\">: </span><span style=\"font-family:Nirmala UI\">आर्यना</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">सबालेंका</span><span style=\"font-family:Cambria Math\"> (</span><span style=\"font-family:Nirmala UI\">बेलारूस</span><span style=\"font-family:Cambria Math\">) • </span><span style=\"font-family:Nirmala UI\">पराजित</span><span style=\"font-family:Cambria Math\"> → </span><span style=\"font-family:Nirmala UI\">एलेना</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">रयबाकिना</span><span style=\"font-family:Cambria Math\"> (</span><span style=\"font-family:Nirmala UI\">कजाकिस्तान</span><span style=\"font-family:Cambria Math\">)</span></p>",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
            
            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();
        }
        
        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML - more compact
            let html = `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="question-text mb-3">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        <div class="options">`;
                        
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = 'option-label';
                
                // When reviewing, highlight user's choice and correct answer
                if (submitted) {
                    if (opt === question.correct) {
                        optionClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[question.id] === opt && opt !== question.correct) {
                        optionClass += ' border-danger bg-danger bg-opacity-10';
                    }
                }
                
                html += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${answers[question.id] === opt ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <label class="form-check-label w-100 ${optionClass}" for="opt-${index}-${opt}">
                            ${submitted && opt === question.correct ? '<i class="fas fa-check-circle text-success me-1"></i>' : ''}
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const alertClass = isCorrect ? 'alert-success' : 'alert-danger';
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="alert ${alertClass} mt-3 py-2">
                        <strong>${resultText}</strong>
                        <div class="mt-1 small">
                            <strong>Solution:</strong>
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
        function nextQuestion() { if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
            
            // Update button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('main-content');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                if (window.innerWidth >= 992) {
                    content.classList.add('with-nav');
                }
            } else {
                nav.classList.remove('show');
                if (window.innerWidth >= 992) {
                    content.classList.remove('with-nav');
                }
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer - compact
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            if (confirm(`You have attempted ${attempted} of ${questions.length} questions.
${remaining} questions are unattempted.

Are you sure you want to submit?`)) {
                submitTest();
            }
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.replace('btn-light', 'btn-success');
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
        
        // Add event listener for window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                if (document.getElementById('question-nav').classList.contains('show')) {
                    document.getElementById('main-content').classList.add('with-nav');
                }
            } else {
                document.getElementById('main-content').classList.remove('with-nav');
            }
        });
    </script>
</body>
</html>
