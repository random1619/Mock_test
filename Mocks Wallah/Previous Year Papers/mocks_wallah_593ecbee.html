<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Questions data
        const questions = [];
        const sections = {};
        let currentLang = "en";
        let currentQuestion = 0;
        let answers = {};
        let submitted = false;
        let totalTime = 90 * 60;

        window.onload = function() {
            initializeTest();
            startTimer();
            resultsModal = new bootstrap.Modal(document.getElementById('results-modal'));
            
            // If on desktop, show the question navigation by default
            if (window.innerWidth >= 992) {
                document.getElementById('question-nav').classList.add('show');

                name: "Miscellaneous",

            document.getElementById('section-selector').innerHTML += 
                `<option value="misc">Miscellaneous</option>`;
            
            
                questions.push({
                    id: "1",

                    question_en: "<p>1. Spot the error in the given sentence and select the correct sentence from the options given.</p>\r\n<p><span style=\"font-family: Cambria Math;\">Rahul has passed/ his final semester exam/ two days ago. </span></p>\n",

                    options_en: ["<p>Rahul has passed</p>\n", "<p>his final semester exam</p>\n",

                    options_hi: ["<p>Rahul has passed</p>\n", "<p>his final semester exam</p>\n",
                                "<p>two days ago</p>\n", "<p>No error</p>\n"],
                    solution_en: "<p>1.(a)</p>\r\n<p><span style=\"font-family: Cambria Math;\">The given sentence is in the simple past tense(two days ago) so the verb must be used in the simple past form(</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>2</mn></msub></math><span style=\"font-family: Cambria Math;\">). Hence, &lsquo;Rahul passed(</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>2</mn></msub></math><span style=\"font-family: Cambria Math;\">)&rsquo; is the most appropriate answer.</span></p>\n",
                    solution_hi: "<p>1.(a)</p>\r\n<p><span style=\"font-family: Kokila;\">&#2342;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2366;&#2325;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> simple past tense (two days ago) </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> Verb </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> simple past form(</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>2</mn></msub></math><span style=\"font-family: Cambria Math;\">) </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, \'Rahul passed (</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>2</mn></msub></math><span style=\"font-family: Cambria Math;\">)\' </span><span style=\"font-family: Kokila;\">&#2360;&#2348;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2340;&#2381;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\n",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "2",
                    section: "7",
                    question_en: "<p>2. Select the most appropriate option to substitute the underline/Bold segment in the given sentence.</p>\r\n<p><span style=\"font-family: Cambria Math;\">No sooner did the children </span><span style=\"text-decoration: underline;\"><span style=\"font-family: Cambria Math;\">saw the gardener</span></span><span style=\"font-family: Cambria Math;\"> than they quickly ran away.</span></p>\n",

                    options_hi: ["<p>saw the gardener</p>\n", "<p>seen the gardener</p>\n",
                                "<p>see the gardener</p>\n", "<p>No substitution required</p>\n"],
                    solution_en: "<p>2.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\">We always use the first form of the verb(</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>1</mn></msub></math><span style=\"font-family: Cambria Math;\">) after &lsquo;did&rsquo;. Hence, &lsquo;see(</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>1</mn></msub></math><span style=\"font-family: Cambria Math;\">) the gardener&rsquo; is the most appropriate answer. </span></p>\n",

                questions.push({

                    options_hi: ["<p>My friend asked me what I was doing that saturday.</p>\n", "<p>My friend asked me what I am doing that saturday.</p>\n",

                    question_en: "<p><span style=\"font-family: Cambria Math;\">51.</span><span style=\"font-family: Cambria Math;\"> The sum of ten consecutive whole numbers is 1045. What is the sum of the prime numbers among these numbers?</span></p>\n",

th;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">: 100, 101, 102,.......109</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2311;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2349;&#2366;&#2332;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> = 101 + 103 + 107 + 109 = 420</span></p>\n",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">63.(a)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Let eight years ago age of Ajay be <span style=\"font-weight: 400;\">5x</span>&nbsp;</span><span style=\"font-family: Cambria Math;\"> and age of Vijay be <span style=\"font-weight: 400;\">3x</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Present age of Ajay= </span><span style=\"font-weight: 400;\">5x + 8</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Present age of Vijay= </span><span style=\"font-weight: 400;\">3x + 8</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, after 8 years,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Age of Ajay= </span><span style=\"font-weight: 400;\">5x + 8 + 8 </span><span style=\"font-weight: 400;\">= </span><span style=\"font-weight: 400;\">5x + 16</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Age of Vijay=&nbsp;</span><span style=\"font-weight: 400;\">3x + 8 + 8 </span><span style=\"font-weight: 400;\">= </span><span style=\"font-weight: 400;\">3x + 16</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">According to the question,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&rArr;</mo><mfrac><mrow><mn>5</mn><mi>x</mi><mo>+</mo><mn>16</mn></mrow><mrow><mn>3</mn><mi>x</mi><mo>+</mo><mn>16</mn></mrow></mfrac><mo>=</mo><mfrac><mn>23</mn><mn>17</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rArr;<span style=\"font-weight: 400;\">x = 6</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, present age of Ajay =</span><span style=\"font-weight: 400;\">5x+8=5 &times; 6+8=38 years</span><span style=\"font-family: Cambria Math;\">&nbsp;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Short Trick:</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; Ajay&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; Vijay</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 5&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span><span style=\"font-family: Cambria Math;\">:</span><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp;3 </span><span style=\"font-family: Cambria Math;\">)&times;6</span><span style=\"font-family: Cambria Math;\"> (8 years ago) </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;23&nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span><span style=\"font-family: Cambria Math;\">:</span><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp;17 </span><span style=\"font-family: Cambria Math;\">)&times;2</span><span style=\"font-family: Cambria Math;\"> (8 years after)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Difference between Ajay&rsquo;s age = (23 &times; 2) - </span><span style=\"font-family: Cambria Math;\">(5 &times; 6) = 16 units</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rarr;16 units = 16 years</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the present age of Ajay = 30 + 8 = 38 years.</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">63.(a) </span></p>\r\n<p><span style=\"font-weight: 400;\">&#2348;&#2340;&#2366; &#2342;&#2375;&#2306; &#2325;&#2367; &#2310;&#2336; &#2360;&#2366;&#2354; &#2346;&#2361;&#2354;&#2375; &#2309;&#2332;&#2351; &#2325;&#2368; &#2313;&#2350;&#2381;&#2352; 5x &#2324;&#2352; &#2357;&#2367;&#2332;&#2351; &#2325;&#2368; &#2313;&#2350;&#2381;&#2352; 3x &#2341;&#2368;</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2309;&#2332;&#2351; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; = </span><span style=\"font-weight: 400;\">5x + 8</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2357;&#2367;&#2332;&#2351; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; = </span><span style=\"font-weight: 400;\">3x + 8</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2309;&#2348; 8 &#2360;&#2366;&#2354; &#2348;&#2366;&#2342;,</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2309;&#2332;&#2351; &#2325;&#2368; &#2313;&#2350;&#2381;&#2352; = </span><span style=\"font-weight: 400;\">5x + 8 + 8 </span><span style=\"font-weight: 400;\">= </span><span style=\"font-weight: 400;\">5x + 16</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2357;&#2367;&#2332;&#2351; &#2325;&#2368; &#2310;&#2351;&#2369; = </span><span style=\"font-weight: 400;\">3x + 8 + 8 </span><span style=\"font-weight: 400;\">= </span><span style=\"font-weight: 400;\">3x + 16</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;,</span></p>\r\n<p><span style=\"font-weight: 400;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&rArr;</mo><mfrac><mrow><mn>5</mn><mi>x</mi><mo>+</mo><mn>16</mn></mrow><mrow><mn>3</mn><mi>x</mi><mo>+</mo><mn>16</mn></mrow></mfrac><mo>=</mo><mfrac><mn>23</mn><mn>17</mn></mfrac></math></span></p>\r\n<p><span style=\"font-weight: 400;\"><span style=\"font-family: Cambria Math;\">&rArr; x = 6</span></span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2348;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2309;&#2332;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2369;</span><span style=\"font-family: Cambria Math;\"> =</span><span style=\"font-weight: 400;\">5x + 8 = 5 &times; 6 + 8 = 38 years</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &#2358;&#2377;&#2352;&#2381;&#2335; &#2335;&#2381;&#2352;&#2367;&#2325;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp;<span style=\"font-weight: 400;\">&#2309;&#2332;&#2351;</span> &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;<span style=\"font-weight: 400;\">&#2357;&#2367;&#2332;&#2351;</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; 5&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span><span style=\"font-family: Cambria Math;\">:</span><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; 3 </span><span style=\"font-family: Cambria Math;\">)&times;6</span><span style=\"font-family: Cambria Math;\"> (8 </span><span style=\"font-family: Kokila;\">&#2360;&#2366;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2361;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\">) </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; 23&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; </span><span style=\"font-family: Cambria Math;\">:</span><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; 17</span><span style=\"font-family: Cambria Math;\">)&times;2</span><span style=\"font-family: Cambria Math;\"> (8 </span><span style=\"font-family: Kokila;\">&#2360;&#2366;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2366;&#2342;</span><span style=\"font-family: Cambria Math;\">)</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2332;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2350;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2368;&#2330;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> = (23 &times; 2) - </span><span style=\"font-family: Cambria Math;\">(5 &times; 6) = 16 </span><span style=\"font-family: Kokila;\">&#2351;&#2370;&#2344;&#2367;&#2335;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rarr;16 </span><span style=\"font-family: Kokila;\">&#2351;&#2370;&#2344;&#2367;&#2335;</span><span style=\"font-family: Cambria Math;\"> = 16 </span><span style=\"font-family: Kokila;\">&#2360;&#2366;&#2354;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2340;&#2307;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2332;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2369;</span><span style=\"font-family: Cambria Math;\"> = 30 + 8 = 38 </span><span style=\"font-family: Kokila;\">&#2360;&#2366;&#2354;</span></p>\n",

                questions.push({
                    id: "64",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">64. An amount of Rs.5,200 is divided into A, B and C such that B\'s share is&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>3</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> of A\'s share and C\'s share is 20% more than B\'s share. Find the share of A.</span></p>\n",

                    options_en: ["<p>&#8377;4,500</p>\n", "<p>&#8377;2,500</p>\n",

                    options_hi: ["<p>&#8377;4,500</p>\n", "<p>&#8377;2,500</p>\n",
                                "<p>&#8377;1,500</p>\n", "<p>&#8377;3,000</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">64.(d)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Let A&rsquo;s share be 3y. </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, B&rsquo;s share = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>3</mn></mfrac></math>&times;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> 3y = y. </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">And C&rsquo;s share = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>120</mn><mn>100</mn></mfrac></math>&times;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> y = 1.2y</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, A : B : C = 3y : y : 1.2y = (3) : (1) : (1.2)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Hence, A&rsquo;s share =<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mrow><mn>5</mn><mo>.</mo><mn>2</mn></mrow></mfrac></math>&times;&nbsp;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> 5200 = &#8377;3,000</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">64.(d)</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> A </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2367;&#2360;&#2381;&#2360;&#2366;</span><span style=\"font-family: Cambria Math;\"> 3y </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\">, B </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2367;&#2360;&#2381;&#2360;&#2366;</span><span style=\"font-family: Cambria Math;\"> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>3</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> &times; </span><span style=\"font-family: Cambria Math;\">3y = y </span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> C </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2367;&#2360;&#2381;&#2360;&#2366;</span><span style=\"font-family: Cambria Math;\"> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>120</mn><mn>100</mn></mfrac></math>&times;</span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-family: Cambria Math;\">y = 1.2y</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, A : B : C = 3y : y : 1.2y = (3) : (1) : (1.2)</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, A </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2367;&#2360;&#2381;&#2360;&#2366;</span><span style=\"font-family: Cambria Math;\"> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mrow><mn>5</mn><mo>.</mo><mn>2</mn></mrow></mfrac></math>&times;&nbsp;</span><span style=\"font-family: Cambria Math;\"> 5200 = &#8377;3,000</span></p>\n",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">69.(a)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">CP of the car for Anuj = 4,00,400 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>5</mn><mn>4</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = &#8377;5,00,500</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the CP of a car for Aman be 100 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">SP of the car for Aman = CP of the car for Anuj</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 100 &times; 80% = 80 unit which corresponds to &#8377;5,00,500</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Then, 100 unit corresponds to&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>&#8377;</mo><mn>5</mn><mo>,</mo><mn>00</mn><mo>,</mo><mn>500</mn></mrow><mn>80</mn></mfrac></math> </span><span style=\"font-family: Cambria Math;\">&times;100 = &#8377;625625</span></p>\n",

le=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> 100 </span><span style=\"font-family: Kokila;\">&#2311;&#2325;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2350;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> = </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-fam                 questions.push({
                    id: "70",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">70. In how many years will &#8377;2,500 produce an interest of &#8377;500 at the rate of 10% simple interest per annum?</span></p>\n",
                    question_hi: "<p>70.<span style=\"font-family: Cambria Math;\"> 10% </span><span style=\"font-family: Kokila;\">&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2366;&#2343;&#2366;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2340;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> &#8377;2,500 </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> &#8377;500 </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;&#2340;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2319;&#2327;&#2366;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>2</p>\n", "<p>8</p>\n", 
                                "<p>9</p>\n", "<p>5</p>\n"],
                    options_hi: ["<p>2</p>\n", "<p>8</p>\n",
                                "<p>9</p>\n", "<p>5</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">70.(a)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">SI =<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>P</mi><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mi>R</mi><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mi>T</mi></mrow><mn>100</mn></mfrac></math> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">500 =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>2500</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>10</mn><mo>&times;</mo><mi>T</mi></mrow><mn>100</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">500 = 250T</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">T =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>500</mn><mrow><mn>250</mn><mo>&nbsp;</mo></mrow></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> = 2 years</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: \'Cambria Math\';\"><span style=\"font-weight: 400;\">&#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332;&nbsp;</span> =</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>P</mi><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mi>R</mi><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mi>T</mi></mrow><mn>100</mn></mfrac></math></p>\r\n<p><span style=\"font-family: Cambria Math;\">500 =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>2500</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>10</mn><mo>&times;</mo><mi>T</mi></mrow><mn>100</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">500 = 250T</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">T =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>500</mn><mrow><mn>250</mn><mo>&nbsp;</mo></mrow></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> = 2 </span>&#2357;&#2352;&#2381;&#2359;&nbsp;</p>\n",
                    correct: "a",

                questions.push({
                    id: "71",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">71.</span><span style=\"font-family: Cambria Math;\"> If C is the compound interest on &#8377;10,000 for one year at 4% per annum when compounded quarterly, then which one of the following is correct?</span></p>\n",
                    question_hi: "<p>71. &#2351;&#2342;&#2367; &#8377;10,000 &#2346;&#2352; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; 4% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2340;&#2367;&#2350;&#2366;&#2361;&#2368; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; C &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p>\n",
                    options_en: ["<p>C&lt; &#8377;100</p>\n", "<p>&#8377;100&lt; C &lt; &#8377;200</p>\n",

                    options_hi: ["<p>C&lt; &#8377;100</p>\n", "<p>&#8377;100&lt; C &lt; &#8377;200</p>\n",
                                "<p>&#8377;20 &lt; C &lt; &#8377;400</p>\n", "<p>C &gt; &#8377;400</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">71.(d)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Rate for 1 year = 4% , rate for 3 months = 1% = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>100</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">, Time = 1 yr,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> no of cycle = 4</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">CI = P(1+<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi>R</mi><mn>100</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> )<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mrow></mrow><mrow><mo>&nbsp;</mo><mi>n</mi></mrow></msup></math>- P</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 10,000(1+</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>100</mn></mfrac></math>)<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mrow></mrow><mn>4</mn></msup></math>- 10,000</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 10,000&nbsp; &times; (1.01)<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mrow></mrow><mn>4</mn></msup></math></span><span style=\"font-family: Cambria Math;\"> - 10,000</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 10,000 &times; 1.0406 - 10,000</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 10406 - 10,000 = 406 , which is greater than &#8377;400</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the correct option is (d)</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">71.(d)</span><span style=\"font-family: Cambria Math;\">&nbsp;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">1 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; = 4%, 3 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2368; &#2342;&#2352;&nbsp;</span> = 1% = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>100</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">,&nbsp;</span><span style=\"font-weight: 400;\">&#2360;&#2350;&#2351; = 1 &#2357;&#2352;&#2381;&#2359;, </span></p>\r\n<p><span style=\"font-weight: 400;\">&#2330;&#2325;&#2381;&#2352; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = 4</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">CI = P(1+<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi>R</mi><mn>100</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> )<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mrow></mrow><mrow><mo>&nbsp;</mo><mi>n</mi></mrow></msup></math>- P</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 10,000(1+</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>100</mn></mfrac></math>)<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mrow></mrow><mn>4</mn></msup></math>- 10,000</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 10,000&nbsp; &times; (1.01)<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mrow></mrow><mn>4</mn></msup></math></span><span style=\"font-family: Cambria Math;\"> - 10,000</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 10,000 &times; 1.0406 - 10,000</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 10406 - 10,000 = 406 ,&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2332;&#2379; &#8377;400 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2311;&#2360;&#2354;&#2367;&#2319;, &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; (d) &#2361;&#2376; |&nbsp;</span></p>\n",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "72",
                    section: "17",
                    question_en: "<p>72.<span style=\"font-family: Cambria Math;\"> If the average of two numbers is 12.5 and the square root of their product is 10, then the difference between the numbers is:</span></p>\n",
                    question_hi: "<p>72.<span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2360;&#2340;</span><span style=\"font-family: Cambria Math;\"> 12.5 </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2344;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2369;&#2339;&#2344;&#2347;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2327;&#2350;&#2370;&#2354;</span><span style=\"font-family: Cambria Math;\"> 10 </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2368;&#2330;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">:</span></p>\n",
                    options_en: ["<p>15</p>\n", "<p>18</p>\n", 
                                "<p>16</p>\n", "<p>12</p>\n"],
                    options_hi: ["<p>15</p>\n", "<p>18</p>\n",
                                "<p>16</p>\n", "<p>12</p>\n"],
                    solution_en: "<p>72.(a)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the two no be x and y </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x + y = 12.5 &times; 2 = 25</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mi>x</mi><mi>y</mi></msqrt><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>10</mn><mo>&nbsp;</mo><mo>&rArr;</mo><mi>x</mi><mi>y</mi><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>100</mn></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, (x - y) = </span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><msup><mn>25</mn><mn>2</mn></msup><mo>-</mo><mn>4</mn><mo>&times;</mo><mn>100</mn></msqrt><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><msqrt><mn>625</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>400</mn></msqrt><mo>&nbsp;</mo><mo>=</mo><msqrt><mo>&nbsp;</mo><mn>225</mn></msqrt><mo>&nbsp;</mo></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> = 15 </span></p>\n",
                    solution_hi: "<p>72.(a)</p>\r\n<p><span style=\"font-weight: 400;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x + y = 12.5 &times; 2 = 25</span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mi>x</mi><mi>y</mi></msqrt><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>10</mn><mo>&nbsp;</mo><mo>&rArr;</mo><mo>&nbsp;</mo><mi>x</mi><mi>y</mi><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>100</mn></math></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2311;&#2360;&#2354;&#2367;&#2319;, (x - y)</span> = </span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><msup><mn>25</mn><mn>2</mn></msup><mo>-</mo><mn>4</mn><mo>&times;</mo><mn>100</mn></msqrt><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><msqrt><mn>625</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>400</mn></msqrt><mo>&nbsp;</mo><mo>=</mo><msqrt><mo>&nbsp;</mo><mn>225</mn></msqrt><mo>&nbsp;</mo></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> = 15</span></p>\n",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });

                                "<p>D</p>\n", "<p>C</p>\n"],
                    solution_en: "<p>73.(d)</p>\r\n<p><span style=\"font-family: Cambria Math;\">The ratio of the production of chocolate A in 2010 and 2011 = 24 : 28 = 6 : 7</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Percentage increment of A = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>7</mn><mo>-</mo><mn>6</mn></mrow><mn>6</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times;100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>100</mn><mn>6</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> =16.66 %</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">The ratio of the production of chocolate B in 2010 and 2011 = 22 : 23 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Percentage increment of B = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>23</mn><mo>-</mo><mn>22</mn></mrow><mn>22</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times;100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>100</mn><mn>22</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 4.54 %</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">The ratio of the production of chocolate C in 2010 and 2011 = 15 : 18 = 5 : 6</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Percentage increment of C = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>6</mn><mo>-</mo><mn>5</mn></mrow><mn>5</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times;100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>100</mn><mn>5</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 20%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">The ratio of the production of chocolate D in 2010 and 2011 = 20 : 22 = 10:11 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Percentage increment of D =<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>11</mn><mo>-</mo><mn>10</mn></mrow><mn>10</mn></mfrac></math> </span><span style=\"font-family: Cambria Math;\">&times;100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>100</mn><mn>10</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 10 %</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Clearly we can see that maximum percentage increment in the production of C type chocolate. </span></p>\n",

                    id: "75",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">79.(c) </span><span style=\"font-family: Cambria Math;\"><strong>People.</strong><span style=\"font-weight: 400;\"> The Constitution of India was adopted by the Constituent Assembly on </span><strong>26 November 1949</strong><span style=\"font-weight: 400;\"> and came effective on </span><strong>26 January 1950</strong><span style=\"font-weight: 400;\">. India has the world&rsquo;s lengthiest constitution with </span><strong>25</strong><span style=\"font-weight: 400;\"> parts and</span><strong> 12</strong><span style=\"font-weight: 400;\"> schedules. </span><strong>B. R. Ambedkar</strong><span style=\"font-weight: 400;\"> was the chief architect and known as the &ldquo;Father of the Indian constitution&rdquo;. At the time of commencement, it had 395 articles in 22 parts and 8 schedules.</span></span></p>\n",

                    question_hi: "<p>86. <span style=\"font-family: Kokila;\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2379;&#2344;&#2379;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2376;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2340;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2339;&#2369;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2340;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Two</p>\n", "<p>Four</p>\n", 
                                "<p>One</p>\n", "<p>Three</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2342;&#2379;</span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2330;&#2366;&#2352;</span></p>\n",
                                "<p><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2340;&#2368;&#2344;</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">86.(c) </span><span style=\"font-family: Cambria Math;\">&nbsp;<strong>One. Carbon Monoxide (CO) </strong><span style=\"font-weight: 400;\">is a colorless, poisonous, odorless, tasteless, flammable gas. It is</span><strong> created </strong><span style=\"font-weight: 400;\">by the incomplete combustion of carbon-based fuels such as gasoline, diesel, wood, etc.</span><strong> Discovered by: </strong><span style=\"font-weight: 400;\">William Cruickshank (1800). It has a</span><strong> 200-fold</strong><span style=\"font-weight: 400;\"> higher affinity for hemoglobin (form </span><strong>carboxyhemoglobin </strong><span style=\"font-weight: 400;\">- when reacts with hemoglobin) than Oxygen.</span><strong> Uses: </strong><span style=\"font-weight: 400;\">as a strong reducing agent, in infrared lasers, in the production of methanol, phosgene, detergents, and in the packaging of fresh meat products such as fish, beef, etc.&nbsp;</span></span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">86.(c)&nbsp;</span><strong>&#2319;&#2325;</strong><span style=\"font-weight: 400;\">&#2404;</span><strong> &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2350;&#2379;&#2344;&#2379;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; (CO) </strong><span style=\"font-weight: 400;\">&#2319;&#2325; &#2352;&#2306;&#2327;&#2361;&#2368;&#2344;, &#2332;&#2361;&#2352;&#2368;&#2354;&#2368;, &#2327;&#2306;&#2343;&#2361;&#2368;&#2344;, &#2360;&#2381;&#2357;&#2366;&#2342;&#2361;&#2368;&#2344;, &#2332;&#2381;&#2357;&#2354;&#2344;&#2358;&#2368;&#2354; &#2327;&#2376;&#2360; &#2361;&#2376;&#2404; &#2351;&#2361; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2312;&#2306;&#2343;&#2344; &#2332;&#2376;&#2360;&#2375; &#2327;&#2376;&#2360;&#2379;&#2354;&#2368;&#2344;, &#2337;&#2368;&#2332;&#2354;, &#2354;&#2325;&#2337;&#2364;&#2368; &#2310;&#2342;&#2367; &#2325;&#2375; &#2309;&#2343;&#2370;&#2352;&#2375; &#2342;&#2361;&#2344; &#2360;&#2375; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404; </span><strong>&#2357;&#2367;&#2354;&#2367;&#2351;&#2350; &#2325;&#2381;&#2352;&#2369;&#2325;&#2358;&#2366;&#2306;&#2325;</strong><span style=\"font-weight: 400;\"> (1800) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2326;&#2379;&#2332;&#2366; &#2327;&#2351;&#2366;&#2404; &#2311;&#2360;&#2350;&#2375;&#2306; &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2361;&#2368;&#2350;&#2379;&#2327;&#2381;&#2354;&#2379;&#2348;&#2367;&#2344; (</span><strong>&#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2325;&#2381;&#2360;&#2368;&#2361;&#2375;&#2350;&#2379;&#2327;&#2381;&#2354;&#2379;&#2348;&#2367;&#2344;</strong><span style=\"font-weight: 400;\"> - &#2332;&#2348; &#2361;&#2368;&#2350;&#2379;&#2327;&#2381;&#2354;&#2379;&#2348;&#2367;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;) &#2325;&#2375; &#2354;&#2367;&#2319; 200 &#2327;&#2369;&#2344;&#2366; &#2309;&#2343;&#2367;&#2325; &#2319;&#2347;&#2367;&#2344;&#2367;&#2335;&#2368; (affinity) &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; </span><strong>&#2313;&#2346;&#2351;&#2379;&#2327; : </strong><span style=\"font-weight: 400;\">&#2319;&#2325; &#2350;&#2332;&#2348;&#2370;&#2340; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2319;&#2332;&#2375;&#2306;&#2335; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306;, &#2311;&#2344;&#2381;&#2347;&#2381;&#2352;&#2366;&#2352;&#2375;&#2337; &#2354;&#2375;&#2332;&#2352; &#2350;&#2375;&#2306;, &#2350;&#2375;&#2341;&#2344;&#2377;&#2354;, &#2347;&#2377;&#2360;&#2381;&#2332;&#2368;&#2344;, &#2337;&#2367;&#2335;&#2352;&#2381;&#2332;&#2375;&#2306;&#2335; &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2350;&#2375;&#2306; &#2324;&#2352; &#2340;&#2366;&#2332;&#2366; &#2350;&#2366;&#2306;&#2360; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2332;&#2376;&#2360;&#2375; &#2350;&#2331;&#2354;&#2368;, &#2327;&#2379;&#2350;&#2366;&#2306;&#2360; &#2311;&#2340;&#2381;&#2351;&#2366;&#2342;&#2367; &#2325;&#2375; &#2346;&#2376;&#2325;&#2375;&#2332;&#2367;&#2306;&#2327; &#2350;&#2375;&#2306;&#2404;</span></p>\n",

                questions.push({
                    id: "87",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">87. </span><span style=\"font-family: Cambria Math;\">Which of the following is the main percussion instrument used in the performance of Mohiniyattam dance?</span></p>\n",
                    question_hi: "<p>87.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2380;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2369;&#2326;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2366;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2366;&#2342;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2306;&#2340;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2367;&#2360;&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2346;&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2379;&#2361;&#2367;&#2344;&#2368;&#2309;&#2335;&#2381;&#2335;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2371;&#2340;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",

                                "<p><span style=\"font-family: Kokila;\">&#2343;&#2369;&#2350;&#2360;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2344;&#2327;&#2366;&#2337;&#2364;&#2366;</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">87.(b) </span><span style=\"font-family: Cambria Math;\"><strong>Edakka. </strong><span style=\"font-weight: 400;\">The musical instruments used in Mohiniyattam:- Mridangam or Madhalam (barrel drum), Idakka (hourglass drum), flute, Veena, and Kuzhitalam (cymbals).</span><strong> Nagadas </strong><span style=\"font-weight: 400;\">are used in Punjabi and Rajasthani folk music. </span><strong>Dhumsa</strong><span style=\"font-weight: 400;\"> used in \'Seraikella Chhau\' dance of Orissa and \'Purulia Chhau\' dance of West Bengal. </span><strong>Sitar</strong><span style=\"font-weight: 400;\"> is used as a solo instrument with tambura (drone-lute) and tabla (drums) and in ensembles, as well as for northern Indian kathak (dance-dramas).</span></span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">87.(b)&nbsp;</span><strong>&#2319;&#2337;&#2325;&#2381;&#2325;&#2366;</strong><span style=\"font-weight: 400;\">&#2404; &#2350;&#2379;&#2361;&#2367;&#2344;&#2368;&#2309;&#2335;&#2381;&#2335;&#2350; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2357;&#2366;&#2342;&#2381;&#2351; &#2351;&#2306;&#2340;&#2381;&#2352; : - &#2350;&#2371;&#2342;&#2306;&#2327;&#2350; &#2351;&#2366; &#2350;&#2343;&#2354;&#2350; (&#2348;&#2376;&#2352;&#2354; &#2337;&#2381;&#2352;&#2350;),&nbsp; &#2319;&#2337;&#2325;&#2381;&#2325;&#2366; (&#2321;&#2357;&#2352;&#2327;&#2381;&#2354;&#2366;&#2360; &#2337;&#2381;&#2352;&#2350;), &#2348;&#2366;&#2306;&#2360;&#2369;&#2352;&#2368;, &#2357;&#2368;&#2339;&#2366;, &#2324;&#2352; &#2325;&#2369;&#2333;&#2368;&#2340;&#2366;&#2354;&#2350; (&#2333;&#2366;&#2306;&#2333;)&#2404; </span><strong>&#2344;&#2327;&#2366;&#2337;&#2364;&#2379;&#2306;</strong><span style=\"font-weight: 400;\"> &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2346;&#2306;&#2332;&#2366;&#2348;&#2368; &#2324;&#2352; &#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;&#2368; &#2354;&#2379;&#2325; &#2360;&#2306;&#2327;&#2368;&#2340; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; </span><strong>&#2343;&#2369;&#2350;&#2360;&#2366;</strong><span style=\"font-weight: 400;\"> &#2313;&#2337;&#2364;&#2368;&#2360;&#2366; &#2325;&#2375; \'&#2360;&#2352;&#2366;&#2311;&#2325;&#2375;&#2354;&#2366; &#2331;&#2314;\' &#2344;&#2371;&#2340;&#2381;&#2351; &#2324;&#2352; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2375; \'&#2346;&#2369;&#2352;&#2369;&#2354;&#2367;&#2351;&#2366; &#2331;&#2366;&#2314;\' &#2344;&#2371;&#2340;&#2381;&#2351; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; </spa                 });
                questions.push({
                    id: "88",

                                "<p><span style=\"font-family: Kokila;\">&#2350;&#2361;&#2366;&#2346;&#2369;&#2352;&#2369;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2358;&#2306;&#2325;&#2352;&#2342;&#2375;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2330;&#2376;&#2340;&#2344;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2361;&#2366;&#2346;&#2381;&#2352;&#2349;&#2369;</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">88.(c) </span><span style=\"font-family: Cambria Math;\"><strong>Mahapurusha Sankaradeva. </strong><span style=\"font-weight: 400;\">Sattriya (Assam) originated in Sattra monastery, as a part of neo-Vaishnavite movement started by Srimanta Sankardev in Assam, in the 15th Century. </span><strong>Vallabhacharya</strong><span style=\"font-weight: 400;\"> propounded the Shuddhadvaita Vedanta philosophy. </span><strong>Chaitanya Mahaprabhu</strong><span style=\"font-weight: 400;\"> was a 15th century Vedic spiritual leader. He founded Gaudiya Vaishnavism.</span></span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">88.(c)&nbsp;</span><strong>&#2350;&#2361;&#2366;&#2346;&#2369;&#2352;&#2369;&#2359; &#2358;&#2306;&#2325;&#2352;&#2342;&#2375;&#2357;</strong><span style=\"font-weight: 400;\">&#2404; &#2360;&#2340;&#2381;&#2352;&#2367;&#2351;&#2366; (&#2309;&#2360;&#2350;) &#2325;&#2368; &#2313;&#2340;&#2381;&#2346;&#2340;&#2381;&#2340;&#2367; 15&#2357;&#2368;&#2306; &#2358;&#2340;&#2366;&#2348;&#2381;&#2342;&#2368; &#2350;&#2375;&#2306; &#2309;&#2360;&#2350; &#2350;&#2375;&#2306; &#2358;&#2381;&#2352;&#2368;&#2350;&#2306;&#2340; &#2358;&#2306;&#2325;&#2352;&#2342;&#2375;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2319; &#2327;&#2319; &#2344;&#2357;-&#2357;&#2376;&#2359;&#2381;&#2339;&#2357; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2375; &#2319;&#2325; &#2349;&#2366;&#2327; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2340;&#2352;&#2366; &#2350;&#2336; &#2350;&#2375;&#2306; &#2361;&#2369;&#2312; &#2341;&#2368;&#2404; </span><strong>&#2357;&#2354;&#2381;&#2354;&#2349;&#2366;&#2330;&#2366;&#2352;&#2381;&#2351; </strong><span style=\"font-weight: 400;\">&#2344;&#2375; &#2358;&#2369;&#2342;&#2381;&#2343;&#2366;&#2342;&#2381;&#2357;&#2376;&#2340; &#2357;&#2375;&#2342;&#2366;&#2306;&#2340; &#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2346;&#2366;&#2342;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</span><strong> &#2330;&#2376;&#2340;&#2344;&#2381;&#2351; &#2350;&#2361;&#2366;&#2346;&#2381;&#2352;&#2349;&#2369; </strong><span style=\"font-weight: 400;\">15&#2357;&#2368;&#2306; &#2358;&#2340;&#2366;&#2348;&#2381;&#2342;&#2368; &#2325;&#2375; &#2357;&#2376;&#2342;&#2367;&#2325; &#2310;&#2343;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2367;&#2325; &#2344;&#2375;&#2340;&#2366; &#2341;&#2375;&#2404; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2327;&#2380;&#2337;&#2364;&#2368                     question_en: "<p><span style=\"font-family: Cambria Math;\">95. </span><span style=\"font-family: Cambria Math;\">Who among the following discovered the concept of expanding universe?</span></p>\n",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">95.(a) </span><span style=\"font-family: Cambria Math;\">&nbsp;<strong>Edwin Hubble. </strong><span style=\"font-weight: 400;\">Hubble\'s law (Hubble&ndash;Lema&icirc;tre law) is that the galaxies are moving away from Earth at speeds proportional to their distance. In other words, the farther they are, the faster they are moving away from Earth.</span><strong> Tycho Brahe</strong><span style=\"font-weight: 400;\"> in 1572 proved that the universe was not unchanging,&nbsp; when he observed a supernova. </span><strong>Charles Messier</strong><span style=\"font-weight: 400;\"> a French astronomer best known for his \"Catalog of Nebulae and Star Clusters.\"</span></span></p>\n",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">96.(b) </span><span style=\"font-family: Cambria Math;\">&nbsp;<strong>Exoplanets (extrasolar planets) </strong><span style=\"font-weight: 400;\">are the planets that orbit around other stars located outside our solar system. Most of the exoplanets discovered so far are located in the Milky way galaxy. </span><strong>Meso planets </strong><span style=\"font-weight: 400;\">are planetary-mass objects with sizes smaller than Mercury but larger than Ceres. </span><strong>Haumea </strong><span style=\"font-weight: 400;\">is a dwarf planet discovered in 2004. A</span><strong> super-Earth</strong><span style=\"font-weight: 400;\"> is any rocky planet that is bigger than Earth and smaller than Neptune.</span></span></p>\n",
