<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>

                    solution_en: "<p>48.(a) <span style=\"font-family: Cambria Math;\">Here, the pattern: (1st term &times; </span><span style=\"font-family: Cambria Math;\">2nd term) + (2nd term &times; </span><span style=\"font-family: Cambria Math;\">3rd term) + (1st term &times;</span><span style=\"font-family: Cambria Math;\"> 3rd term) = 4th term</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Given set: (3&nbsp; &nbsp; &nbsp;5&nbsp; &nbsp; &nbsp;7&nbsp; &nbsp; 71 )</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= (3 &times; </span><span style=\"font-family: Cambria Math;\">5) + (5 &times; </span><span style=\"font-family: Cambria Math;\">7) + (3 &times; </span><span style=\"font-family: Cambria Math;\">7)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 15 + 35 + 21 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 71&rarr; 4th term</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Similarly in the given set: 6&nbsp; &nbsp; 4&nbsp; &nbsp;11 ? </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= (6 &times; </span><span style=\"font-family: Cambria Math;\">4) + (4 &times; </span><span style=\"font-family: Cambria Math;\">11) + (11&times; </span><span style=\"font-family: Cambria Math;\">6)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 24 + 44 + 66 = 134</span></p>\n",

                    solution_hi: "<p>50.(d) <span style=\"font-family: Kokila;\">&#2342;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2341;&#2344;</span><span style=\"font-family: Cambria Math;\">: </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">X &lt; Z = T &gt; V &gt; P &lt; Y = O</span></p>\r\n<p><span style=\"font-weight: 400;\">(a) T &lt; X</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\"> &nbsp; &#2309;&#2360;&#2340;&#2381;&#2351; (&#2330;&#2370;&#2305;&#2325;&#2367; X &lt; Z = T)</span></p>\r\n<p><span style=\"font-weight: 400;\">(b) V &gt; Y&nbsp; &nbsp; &#2309;&#2360;&#2340;&#2381;&#2351; (&#2330;&#2370;&#2305;&#2325;&#2367; V &gt; P &lt; Y)</span></p>\r\n<p><span style=\"font-weight: 400;\">(c) T &gt; Y&nbsp; &nbsp; &#2309;&#2360;&#2340;&#2381;&#2351; (&#2330;&#2370;&#2305;&#2325;&#2367; T &gt; V &gt; P &lt; Y)</span></p>\r\n<p><span style=\"font-weight: 400;\">(d) O &gt; P</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\"> &nbsp; &#2360;&#2340;&#2381;&#2351; (&#2330;&#2370;&#2305;&#2325;&#2367; P &lt; Y = O)</span></p>\n",

                questions.push({
                    id: "51",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">51. </span><span style=\"font-family: Cambria Math;\">How many 5-letter different words can be formed using letters a, d, f, g,h when repetitions are allowed ?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">51. </span><span style=\"font-family: Kokila;\">&#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> a, d, f, g, h </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2346;&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2340;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> 5-</span><span style=\"font-family: Kokila;\">&#2309;&#2325;&#2381;&#2359;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2366;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2354;&#2327;</span><span style=\"font-family: Cambria Math;\">-</span><span style=\"font-family: Kokila;\">&#2309;&#2354;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2358;&#2348;&#2381;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2344;&#2366;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2325;&#2340;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2348;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2379;&#2361;&#2352;&#2366;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2350;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",

                                "<p>1440</p>\n", "<p>3125</p>\n"],
                    solution_en: "<p>51.(d)</p>\r\n<p><span style=\"font-family: Cambria Math;\">As repetition is allowed. So, there are 5 possibilities for each letter (a, d, f, g,h) in the word.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Hence</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">total number of possibilities is 5 &times; 5 &times; 5 &times;&nbsp; 5 &times; 5 = 3125.</span></p>\n",

#2319;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> 5 &times; 5 &times; 5 &times;&nbsp; 5 &times; 5 = 3125&nbsp; </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\n",
                    correct: "d",

                questions.push({
                    id: "55",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">55.</span><span style=\"font-family: Cambria Math;\"> The average of 2,5,12,16 and x is 9 and the average of x, 7,11, 12 and y is 9. What is the value of 2x - 3y?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">55.</span><span style=\"font-family: Cambria Math;\"> 2,5,12,16 </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> x </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2360;&#2340;</span><span style=\"font-family: Cambria Math;\"> 9 </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> x, 7,11, 12 </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> y </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2360;&#2340;</span><span style=\"font-family: Cambria Math;\"> 9 </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> 2x - 3y </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2340;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2327;&#2366;</span><span style=\"font-family: Cambria Math;\"> ?</span></p>\n",
                    options_en: ["<p>5</p>\n", "<p>3</p>\n", 
                                "<p>19</p>\n", "<p>1</p>\n"],
                    options_hi: ["<p>5</p>\n", "<p>3</p>\n",
                                "<p>19</p>\n", "<p>1</p>\n"],
                    solution_en: "<p>55.(a)</p>\r\n<p><span style=\"font-family: Cambria Math;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">2 + 5 + 12 + 16 + x = 9 &times; 5 = 45</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">35 + x = 45</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = 45 - 35 = 10</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">And, 10 + 7 + 11 + 12 + y = 9 &times; 5 = 45</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">40 + y = 45</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">y = 45 - 40 = 5</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the value of 2x - 3y = 2 &times; 10 - 3 &times; 5 = 20 - 15 = 5</span></p>\n",
                    solution_hi: "<p>55.(a)</p>\r\n<p><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2360;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\">,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">2+5 + 12 + 16 + x = 9 &times; 5 = 45</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">35 + x = 45</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = 45 - 35 = 10</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\">, 10 + 7 + 11 + 12 + y = 9 &times; 5 = 45</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">40 + y = 45</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">y = 45 - 40 = 5</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, 2x - 3y </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> = 2 &times; 10 - 3 &times; 5 = 20 - 15 = 5</span></p>\n",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });

                    question_en: "<p><span style=\"font-family: Cambria Math;\">57.</span><span style=\"font-family: Cambria Math;\"> A sum of &#8377;4,000 becomes &#8377;6,000 in 4 years at simple interest. If the rate of interest is increased by 3.5%, what will be the amount?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">57.</span><span style=\"font-family: Cambria Math;\"> &#8377;4,000 </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2343;&#2344;&#2352;&#2366;&#2358;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2366;&#2343;&#2366;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> 4 </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2359;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> &#8377;6,000 </span><span style=\"font-family: Kokila;\">&#2361;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2340;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 3.5% </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2340;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2343;&#2344;&#2352;&#2366;&#2358;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2340;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2319;&#2327;&#2368;</span><span style=\"font-family: Cambria Math;\"> ?</span></p>\n",
                    options_en: ["<p>&#8377;6,560</p>\n", "<p>&#8377;6,200</p>\n", 
                                "<p>&#8377;6,520</p>\n", "<p>&#8377;6,000</p>\n"],
                    options_hi: ["<p>&#8377;6,560</p>\n", "<p>&#8377;6,200</p>\n",
                                "<p>&#8377;6,520</p>\n", "<p>&#8377;6,000</p>\n"],
                    solution_en: "<p>57.(a)</p>\r\n<p><span style=\"font-family: Cambria Math;\">SI on principal &#8377;4,000 for 4 year when Rate is increased by 3.5% = 3.5% &times; 4 = 14% of 4000 = &#8377;560</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the required amount after 4 years = 6000 + 560 = &#8377;6560</span></p>\n",
                    solution_hi: "<p>57.(a)</p>\r\n<p><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2343;&#2344;</span><span style=\"font-family: Cambria Math;\"> &#8377;4,000 </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> 4 </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2366;&#2343;&#2366;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2348;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> 3.5% = 3.5% &times; 4 = 4000 </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> 14% = &#8377;560 </span><span style=\"font-family: Kokila;\">&#2348;&#2338;&#2364;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2340;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2340;</span><span style=\"font-family: Cambria Math;\">: 4 </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2366;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2357;&#2358;&#2381;&#2351;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2366;&#2358;&#2367;</span><span style=\"font-family: Cambria Math;\"> = 6000 + 560 = &#8377;6560</span></p>\n",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "58",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">58. Applied to a bill for Rs.4,00,000, the difference between a discount of 46% and two successive discounts of 30% and 15% is:</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">58. Rs.4,00,000 </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2367;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2327;&#2370;</span><span style=\"font-family: Cambria Math;\">, 46% </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2331;&#2370;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2341;&#2366;</span><span style=\"font-family: Cambria Math;\"> 30% </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 15% </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2350;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2331;&#2370;&#2335;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2368;&#2330;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2340;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> ?</span></p>\n",
                    options_en: ["<p>Rs. 12,500</p>\n", "<p>Rs. 12,700</p>\n", 
                                "<p>Rs. 22,000</p>\n", "<p>Rs. 12,800</p>\n"],
                    options_hi: ["<p>Rs. 12,500</p>\n", "<p>Rs. 12,700</p>\n",
                                "<p>Rs. 22,000</p>\n", "<p>Rs. 12,800</p>\n"],
                    solution_en: "<p>58.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Equivalent discount of 30% and 15% = 30 + 15 - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>30</mn><mo>&times;</mo><mn>15</mn></mrow><mn>100</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 45 - 4.5 = 40.5%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Difference between a discount of 46% and 40.5% = 5.5% = </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>5</mn><mo>.</mo><mn>5</mn></mrow><mn>100</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>11</mn><mrow><mn>200</mn><mo>&nbsp;</mo></mrow></mfrac></math> </span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the required amount = 4,00,000 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>11</mn><mn>200</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = &#8377;22,000 </span></p>\n",
                    solution_hi: "<p>58.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">30% &#2324;&#2352; 15% &#2325;&#2368; &#2360;&#2350;&#2340;&#2369;&#2354;&#2381;&#2351; &#2331;&#2370;&#2335;&nbsp; = 30 + 15&nbsp; </span>&nbsp;- <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>30</mn><mo>&times;</mo><mn>15</mn></mrow><mn>100</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 45 - 4.5 = 40.5%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">46% &#2324;&#2352; 40.5% &#2325;&#2368; &#2331;&#2370;&#2335; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352;&nbsp; </span>= 5.5% = </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>5</mn><mo>.</mo><mn>5</mn></mrow><mn>100</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>11</mn><mrow><mn>200</mn><mo>&nbsp;</mo></mrow></mfrac></math> </span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2311;&#2360;&#2354;&#2367;&#2319;, &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2352;&#2366;&#2358;&#2367; </span>= 4,00,000 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>11</mn><mn>200</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = &#8377;22,000</span></p>\n",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "59",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">59.</span><span style=\"font-family: Cambria Math;\"> By selling 55 m of jute, a shopkeeper gains an amount equal to the selling price of 11m of jute. Find the gain percentage.</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">59.</span><span style=\"font-family: Cambria Math;\"> 55 m </span><span style=\"font-family: Kokila;\">&#2346;&#2335;&#2369;&#2310;</span><span style=\"font-family: Cambria Math;\"> (</span><span style=\"font-family: Kokila;\">&#2332;&#2370;&#2335;</span><span style=\"font-family: Cambria Math;\">) </span><span style=\"font-family: Kokila;\">&#2348;&#2375;&#2330;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> 11m </span><span style=\"font-family: Kokila;\">&#2346;&#2335;&#2369;&#2310;</span><span style=\"font-family: Cambria Math;\"> (</span><span style=\"font-family: Kokila;\">&#2332;&#2370;&#2335;</span><span style=\"font-family: Cambria Math;\">) </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2352;&#2366;&#2348;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2366;&#2358;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2352;&#2381;&#2332;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2360;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span></p>\n",
                    options_en: ["<p>25%</p>\n", "<p>27%</p>\n", 
                                "<p>45%</p>\n", "<p>55%</p>\n"],
                    options_hi: ["<p>25%</p>\n", "<p>27%</p>\n",
                                "<p>45%</p>\n", "<p>55%</p>\n"],
                    solution_en: "<p>59.(a)</p>\r\n<p><span style=\"font-family: Cambria Math;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">SP of 55 m jute - CP of 55m jute = SP of 11m jute (gain)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">CP of 55 m jute = SP of 44m jute</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Let CP of each meter be &#8377;1</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Then, CP of 44m = &#8377;44</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">SP of 44m = &#8377;55</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Required profit = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>55</mn><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>44</mn></mrow><mn>44</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> &times; 100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>11</mn><mn>44</mn></mfrac><mo>&nbsp;</mo></math></span><span style=\"font-family: Cambria Math;\"> &times; 100 = 25%</span></p>\n",
                    solution_hi: "<p>59.(a)</p>\r\n<p><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2360;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\">,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">55 m </span><span style=\"font-family: Kokila;\">&#2332;&#2370;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> SP - 55 m </span><span style=\"font-family: Kokila;\">&#2332;&#2370;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> CP = 11m </span><span style=\"font-family: Kokila;\">&#2332;&#2370;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> SP (</span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\">)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">55 m </span><span style=\"font-family: Kokila;\">&#2332;&#2370;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> CP = 44 m </span><span style=\"font-family: Kokila;\">&#2332;&#2370;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> SP </span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2368;&#2332;&#2367;&#2351;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2368;&#2335;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> CP=&#8377;1 </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2340;&#2348;</span><span style=\"font-family: Cambria Math;\">, 44m </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> CP= &#8377;44</span></p>\r\n<p><span style=\"font-weight: 400;\">44m &#2325;&#2366; SP = &#8377;55</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2309;&#2346;&#2375;&#2325;&#2381;&#2359;&#2367;&#2340; &#2354;&#2366;&#2349; </span>= <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>55</mn><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>44</mn></mrow><mn>44</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> &times; 100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>11</mn><mn>44</mn></mfrac><mo>&nbsp;</mo></math></span><span style=\"font-family: Cambria Math;\"> &times; 100 = 25%</span></p>\n",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "60",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">60. </span><span style=\"font-family: Cambria Math;\">In an election contested by two candidates, one candidate got 36% of the total votes casted and lost by 2268 votes. Find the total number of votes casted. </span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">60. </span><span style=\"font-family: Kokila;\">&#2342;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2337;&#2364;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2369;&#2344;&#2366;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2340;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> 36% </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2369;&#2310;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2361;</span><span style=\"font-family: Cambria Math;\"> 2268 </span><span style=\"font-family: Kokila;\">&#2350;&#2340;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2337;&#2366;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2340;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
                    options_en: ["<p>8250</p>\n", "<p>8000</p>\n",

                    options_hi: ["<p>8250</p>\n", "<p>8000</p>\n",
                                "<p>8120</p>\n", "<p>8100</p>\n"],
                    solution_en: "<p>60.(d)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the no. of votes be x</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">No. of votes got by one candidate = 36% </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Then, no. of votes got by other candidate = 64% </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x &times; (64 - 36)% = 2268</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>28</mn><mn>100</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">= 2268</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2268</mn><mn>28</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times; 100 = 8100</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the total no of votes casted = 8100</span></p>\n",

th;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2367;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2379;&#2335;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> = 64% </span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2360;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\">,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x &times; (64 - 36)% = 2268</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>28</mn><mn>100</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">= 2268</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2268</mn><mn>28</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times; 100 = 8100</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2340;</span><span style=\"font-family: Cambria Math;\">: </span><span style=\"font-family: Kokila;\">&#2337;&#2366;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2340;&#2379;&#2306;</span><span style=                 questions.push({

an style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2375;&#2340;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2366;&#2341;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2361;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2343;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2346;&#2352;&#2368;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2367;&#2358;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 45 km </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2343;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2367;&#2358;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 78 km </span><span                                 "<p>2</p>\n", "<p>9</p>\n"],
                    solution_en: "<p>61.(d)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the speed of stream = y km/h and speed of boat in still water = x km/h</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>65</mn><mrow><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>y</mi></mrow></mfrac><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mfrac><mn>40</mn><mrow><mi>x</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>y</mi></mrow></mfrac><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>=</mo><mn>13</mn><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>(</mo><mn>1</mn><mo>)</mo><mspace linebreak=\"newline\"></mspace><mfrac><mn>78</mn><mrow><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>y</mi></mrow></mfrac><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mfrac><mn>45</mn><mrow><mi>x</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>y</mi></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mn>15</mn><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>(</mo><mn>2</mn><mo>)</mo></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Solving eq .(1) and (2) we get,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> x + y = 13&hellip;.(3) </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x - y = 5&hellip;..(4)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Adding eqn (3) and (4) we get : </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\">                     solution_hi: "<p>61.(d)</p>\r\n<p><span style=\"font-weight: 400;\">&#2350;&#2366;&#2344;&#2366;, &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2330;&#2366;&#2354; = y km/h &#2324;&#2352; &#2344;&#2366;&#2357; &#2325;&#2368; &#2330;&#2366;&#2354; = x km/h</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>65</mn><mrow><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>y</mi></mrow></mfrac><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mfrac><mn>40</mn><mrow><mi>x</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>y</mi></mrow></mfrac><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>=</mo><mn>13</mn><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>(</mo><mn>1</mn><mo>)</mo><mspace linebreak=\"newline\"></mspace><mfrac><mn>78</mn><mrow><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>y</mi></mrow></mfrac><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mfrac><mn>45</mn><mrow><mi>x</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>y</mi></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mn>15</mn><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>.</mo><mo>(</mo><mn>2</mn><mo>)</mo></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-weight: 400;\">&#2360;&#2350;&#2368;&#2325;&#2352;&#2339; (1) &#2324;&#2352; (2) &#2325;&#2379; &#2361;&#2354; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352;,&nbsp;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> x + y = 13&hellip;.(3) </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x - y = 5&hellip;..(4)</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2360;&#2350;&#2368;&#2325;&#2352;&#2339; (3) &#2324;&#2352; (4) &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2346;&#2352; &#2361;&#2350; &#2346;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;:</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>13</mn><mo>+</mo><mn>5</mn></mrow><mn>2</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>18</mn><mn>2</mn></mfrac></math> </span><span style=\"font-family: Cambria Math;\"> = 9 km/hr</span></p>\n",

                    solution_en: "<p>67.(d) <span style=\"font-family: Cambria Math;\">Let AB be the greatest side of &Delta;</span><span style=\"font-family: Cambria Math;\">ABC Since, &Delta;</span><span style=\"font-family: Cambria Math;\">ABC &sim; &Delta;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">PQR</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Then,&nbsp;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&nbsp;</mo><mfrac><mrow><mi>A</mi><mi>r</mi><mi>e</mi><mi>a</mi><mo>&nbsp;</mo><mi>o</mi><mi>f</mi><mi>A</mi><mi>B</mi><mi>C</mi></mrow><mrow><mi>A</mi><mi>r</mi><mi>e</mi><mi>a</mi><mo>&nbsp;</mo><mi>o</mi><mi>f</mi><mo>&nbsp;</mo><mi>P</mi><mi>Q</mi><mi>R</mi></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><mi>A</mi><msup><mi>B</mi><mn>2</mn></msup></mrow><mrow><mi>P</mi><msup><mi>Q</mi><mn>2</mn></msup></mrow></mfrac><mspace linebreak=\"newline\"></mspace><mo>&rArr;</mo><mfrac><mn>144</mn><mrow><mn>256</mn><mo>&nbsp;</mo></mrow></mfrac><mo>=</mo><mo>&nbsp;</mo><mfrac><msup><mn>36</mn><mn>2</mn></msup><mrow><mi>P</mi><msup><mi>Q</mi><mn>2</mn></msup></mrow></mfrac><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mo>&rArr;</mo><mo>&nbsp;</mo><mfrac><mn>12</mn><mn>16</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>36</mn><mrow><mi>P</mi><mi>Q</mi></mrow></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">PQ = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>16</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>36</mn></mrow><mn>12</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 48 cm</span></p>\n",
                    solution_hi: "<p>67.(d)</p>\r\n<p><span style=\"font-weight: 400;\">&#2350;&#2366;&#2344;&#2366; AB, &Delta;ABC &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2349;&#2369;&#2332;&#2366; &#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2330;&#2370;&#2305;&#2325;&#2367;</span>, &Delta;</span><span style=\"font-family: Cambria Math;\">ABC &sim; &Delta;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">PQR</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2340;&#2348;,</span>&nbsp;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> <math style=\"font-family:Verdana\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&nbsp;</mo><mfrac><mrow><mi>A</mi><mi>B</mi><mi>C</mi><mo>&nbsp;</mo><mi>&#2325;&#2366;</mi><mo>&nbsp;</mo><mi>&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;</mi></mrow><mrow><mi>P</mi><mi>Q</mi><mi>R</mi><mo>&nbsp;</mo><mi>&#2325;&#2366;</mi><mo>&nbsp;</mo><mi>&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;</mi></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><mi>A</mi><msup><mi>B</mi><mn>2</mn></msup></mrow><mrow><mi>P</mi><msup><mi>Q</mi><mn>2</mn></msup></mrow></mfrac><mspace linebreak=\"newline\"></mspace><mo>&rArr;</mo><mfrac><mn>144</mn><mrow><mn>256</mn><mo>&nbsp;</mo></mrow></mfrac><mo>=</mo><mo>&nbsp;</mo><mfrac><msup><mn>36</mn><mn>2</mn></msup><mrow><mi>P</mi><msup><mi>Q</mi><mn>2</mn></msup></mrow></mfrac><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mo>&rArr;</mo><mo>&nbsp;</mo><mfrac><mn>12</mn><mn>16</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>36</mn><mrow><mi>P</mi><mi>Q</mi></mrow></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">PQ = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>16</mn><mo>&nbsp;                     solution_en: "<p>71.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\">tan&theta;</span><span style=\"font-family: Cambria Math;\"> - sec&theta;&nbsp;</span><span style=\"font-family: Cambria Math;\"> = 3</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Squaring both side ,</span></p>\r\n<p><span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\">ta</span><span style=\"font-weight: 400;\">n&sup2;</span><span style=\"font-weight: 400;\"><span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\"> + </span><span style=\"font-weight: 400;\">se</span><span style=\"font-weight: 400;\">c&sup2;</span><span style=\"font-weight: 400;\"><span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\"> - 2tan<span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\">sec<span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\">) = 9</span></p>\r\n<p><span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\">ta</span><span style=\"font-weight: 400;\">n&sup2;</span><span style=\"font-weight: 400;\"><span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\"> + 1 + </span><span style=\"font-weight: 400;\">ta</span><span style=\"font-weight: 400;\">n&sup2;</span><span style=\"font-weight: 400;\"><span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\"> - 2tan<span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\">sec<span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\">) = 9</span></p>\r\n<p><span style=\"font-weight: 400;\">2</span><span style=\"font-weight: 400;\">ta</span><span style=\"font-weight: 400;\">n&sup2;</span><span style=\"font-weight: 400;\"><span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\"> - 2tan<span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\">sec<span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\"> = 8</span></p>\r\n<p><span style=\"font-weight: 400;\">2tan<span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\">(tan<span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\"> - sec<span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\">) = 8</span></p>\r\n<p><span style=\"font-weight: 400;\">2tan<span style=\"font-family: Cambria Math;\">&theta; </span></span><span style=\"font-weight: 400;\">&times; 3 = 8</span></p>\r\n<p><span style=\"font-weight: 400;\">6tan<span style=\"font-family: Cambria Math;\">&theta;</span></span><span style=\"font-weight: 400;\"> = 8</span></p>\r\n<p><span style=\"font-weight: 400;\">tan</span><span style=\"font-weight: 400;\"> = </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>8</mn><mn>6</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>4</mn><mn>3</mn></mfrac><mo>&nbsp;</mo></math></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, we get following triangle:</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1689045423/word/media/image56.png\" width=\"164\" height=\"162\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">Then, sec&theta;</span><span style=\"font-family: Cambria Math;\"> =<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>5</mn><mn>3</mn></mfrac></math> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, 9 sec&theta;</span><span style=\"font-family: Cambria Math;\"> - 3 tan&theta;</span><span style=\"font-family: Cambria Math;\"> = 9&times;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>5</mn><mn>3</mn></mfrac></math><                                 "<p><span style=\"font-family: Kokila;\">&#2346;&#2368;&#2344;&#2367;&#2351;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2381;&#2352;&#2306;&#2341;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2319;&#2337;&#2381;&#2352;&#2375;&#2344;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2381;&#2352;&#2306;&#2341;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n"],
                    solution_en: "<p>81.(b) <span style=\"font-family: Cambria Math;\"><strong>Pituitary gland</strong><span style=\"font-weight: 400;\"> controls the functioning of other endocrine glands.It is also known as master gland because it controls the activity of most other hormone secreting glands </span><strong>Pancreas</strong><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">- It is part of the digestive system and produces insulin and other important enzymes and hormones that help break down foods. </span><strong>Pineal gland</strong><span style=\"font-weight: 400;\"> - The pineal gland is a small, pea-shaped gland in the brain. It is used to regulate melatonin hormone which is responsible for regulating sleeping patterns. </span><strong>Adrenal gland</strong><span style=\"font-weight: 400;\"> - The adrenal glands are also known as suprarenal glands.They produce a variety of hormones like adrenaline,cortisol and aldosterone.</span></span></p>\n",

                    solution_en: "<p>83.(d) <span style=\"font-family: Cambria Math;\">&nbsp;<strong>Retina </strong><span style=\"font-weight: 400;\">is responsible for the conversion of the image of an object into neural signals. It has a thin layer of tissue that lines inside the back of the eye and it is </span><strong>located </strong><span style=\"font-weight: 400;\">near the </span><strong>optic nerve</strong><span style=\"font-weight: 400;\">. The purpose of the retina is to receive light that the lens has focused, convert the light into neural signals, and send these signals on to the brain for visual recognition.</span></span></p>\n",

                    solution_en: "<p>85.(b) <span style=\"font-family: Cambria Math;\">&nbsp;<strong>Malik Kafur </strong><span style=\"font-weight: 400;\">was the commander of</span><strong> Allaudin Khilji </strong><span style=\"font-weight: 400;\">(1296&ndash;1316 AD, Khilji Dynasty). </span><strong>Alauddin Khilji:</strong><span style=\"font-weight: 400;\"> titles (Amir-i-Tuzuk, Ali Gurshap), created</span><strong> Shahana-i-mandi, </strong><span style=\"font-weight: 400;\">&nbsp;established a</span><strong> Diwan-i-Muskharaj </strong><span style=\"font-weight: 400;\">(separate revenue agency), and started</span><strong> Dagh and Chehra </strong><span style=\"font-weight: 400;\">systems. </span><strong>Khusrau Khan</strong><span style=\"font-weight: 400;\"> (Tughlaq dynasty). </span><strong>Khilji Dynasty </strong><span style=\"font-weight: 400;\">- Qutb-ud-Din Mubarak Shah, Jalal-ud-Din Khilji.&nbsp;</span></span></p>\n",

                questions.push({
                    id: "86",
                    section: "18",
                    question_en: "<p>86. <span style=\"font-family: Cambria Math;\">The \'kharaj\' tax imposed by Alauddin Khalji was equal to about ______ % of a peasant\'s produce.</span></p>\n",
                    question_hi: "<p>86. <span style=\"font-family: Kokila;\">&#2309;&#2354;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2326;&#2367;&#2354;&#2332;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2327;&#2366;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> &lsquo;</span><span style=\"font-family: Kokila;\">&#2326;&#2352;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\">&rsquo; </span><span style=\"font-family: Kokila;\">&#2325;&#2352;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2360;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2346;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2327;&#2349;&#2327;</span><span style=\"font-family: Cambria Math;\"> ______ % </span><span style=\"font-family: Kokila;\">&#2361;&#2367;&#2360;&#2381;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375; </span><span style=\"font-family: Kokila;\">&#2348;&#2352;&#2366;&#2348;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </s                                 "<p>20</p>\n", "<p>50</p>\n"],
                    options_hi: ["<p>10</p>\n", "<p>25</p>\n",
                                "<p>20</p>\n", "<p>50</p>\n"],

                    question_en: "<p>98. <span style=\"font-family: Cambria Math;\">In which of the following states of India is the&nbsp;&lsquo;Ambubachi Mela&rsquo; held every year?</span></p>\n",
                    question_hi: "<p>98. <span style=\"font-family: Kokila;\">&#2349;&#2366;&#2352;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2366;&#2332;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> &lsquo;</span><span style=\"font-family: Kokila;\">&#2309;&#2350;&#2381;&#2348;&#2369;&#2348;&#2366;&#2330;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\">&rsquo; </span><span style=\"font-family: Kokila;\">&#2354;&#2327;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">? </span></p>\n",

                    solution_en: "<p>98.(a)<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"><strong>Ambubachi Mela </strong><span style=\"font-weight: 400;\">is a Hindu Mela which is held every year at </span><strong>Kamakhya temple in Guwahati, Assam.</strong><span style=\"font-weight: 400;\">This yearly mela is celebrated during the </span><strong>Monsoon</strong><span style=\"font-weight: 400;\"> season. It is the celebration of the early menstruation course of goddess Kamakhya. It is believed that the Devi&nbsp; Kamakhya the Presiding Goddess of the temple goes through the annual cycle of menstruation during this period.</span></span></p>\n",

                    solution_en: "<p>100.(a)<span style=\"font-family: Cambria Math;\"> <span style=\"font-weight: 400;\">Originated from the folk songs of ancient </span><strong>Punjab,</strong><span style=\"font-weight: 400;\"> </span><strong>\'Tappa\'</strong><span style=\"font-weight: 400;\"> often depicts the plight of a lover. </span><strong>Bhangra </strong><span style=\"font-weight: 400;\">is the most popular folk music of Punjab. It is also one of the oldest forms of music in India. The music is often accompanied by the famous Bhangra dance.</span></span></p>\n",

ath\"> </span><span style=\"font-family:Kokila\">लोकप्रिय</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">लोक</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">संगीत</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">है।</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">यह</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">भारत</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">में</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">संगीत</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">के</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">सबसे</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">पुराने</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">रूपों</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">में</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">से</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">एक</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">है।</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">संगीत</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">अक्सर</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">प्रसिद्ध</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">भांगड़ा</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">नृत्य</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">के</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">साथ</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">होता</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">है।</span></p>",

            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
