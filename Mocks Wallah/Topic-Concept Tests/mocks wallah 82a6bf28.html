<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">12:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 25</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">25</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Questions data
        const questions = [];
        const sections = {};
        let currentLang = "en";
        let currentQuestion = 0;
        let answers = {};
        let submitted = false;
        let totalTime = 12 * 60;
        let resultsModal;
        
        // Initialize the test
        window.onload = function() {
            initializeTest();
            startTimer();
            resultsModal = new bootstrap.Modal(document.getElementById('results-modal'));
            
            // If on desktop, show the question navigation by default
            if (window.innerWidth >= 992) {
                document.getElementById('question-nav').classList.add('show');
                document.getElementById('main-content').classList.add('with-nav');
            }
        };
        
        // Initialize test data
        function initializeTest() {
            // Add sections and questions
            
            sections["7"] = {
                name: "English",
                start: 0,
                end: 23
            };
            
            document.getElementById('section-selector').innerHTML += 
                `<option value="7">English</option>`;
            
            sections["misc"] = {
                name: "Miscellaneous",
                start: 24,
                end: 24
            };
            
            document.getElementById('section-selector').innerHTML += 
                `<option value="misc">Miscellaneous</option>`;
            
            
                questions.push({
                    id: "1",
                    section: "7",
                    question_en: "<p>1. Select the most appropriate word to fill in the blank.<br>The popular leader is remarkable for the way in which he ______ the qualities of a good politician and world class thinker.</p>",
                    question_hi: "<p>1. Select the most appropriate word to fill in the blank.<br>The popular leader is remarkable for the way in which he ______ the qualities of a good politician and world class thinker.</p>",
                    options_en: ["<p>shows</p>", "<p>portrait</p>", 
                                "<p>controls</p>", "<p>conditions</p>"],
                    options_hi: ["<p>shows</p>", "<p>portrait</p>",
                                "<p>controls</p>", "<p>conditions</p>"],
                    solution_en: "<p>1.(a) Shows<br>Here , the demonstration of the good qualities of a good politician and world class thinker is focussed upon.Thus, &lsquo;shows&rsquo; will be used.</p>",
                    solution_hi: "<p>1.(a) Shows<br>यहाँ, एक अच्छे राजनेता (politician) एवं विश्व स्तरीय विचारक (world class thinker) के अच्छे गुणों के प्रदर्शन पर ध्यान केंद्रित किया गया है। इसलिए, &lsquo;shows&rsquo; का प्रयोग होगा।</p>",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "2",
                    section: "7",
                    question_en: "<p>2. Select the appropriate antonym of the given word.<br>Humane</p>",
                    question_hi: "<p>2. Select the appropriate antonym of the given word.<br>Humane</p>",
                    options_en: ["<p>Sympathetic</p>", "<p>Kind</p>", 
                                "<p>Living</p>", "<p>Cruel</p>"],
                    options_hi: ["<p>Sympathetic</p>", "<p>Kind</p>",
                                "<p>Living</p>", "<p>Cruel</p>"],
                    solution_en: "<p>2.(d)<br>Cruel - wilfully causing pain or suffering to others, or feeling no concern about it.<br>Humane - having or showing compassion or benevolence.<br>Sympathetic - feeling, showing, or expressing sympathy.<br>Kind - a group of people or things having similar characteristics.<br>Living - an income sufficient to live on or the means of earning it.</p>",
                    solution_hi: "<p>2.(d)<br>Cruel (क्रूर) - wilfully causing pain or suffering to others, or feeling no concern about it.<br>Humane (मानवीय) - having or showing compassion or benevolence.<br>Sympathetic (सहानुभूतिपूर्ण) - feeling, showing, or expressing sympathy.<br>Kind (दयालु) - a group of people or things having similar characteristics.<br>Living (जीविका) - an income sufficient to live on or the means of earning it.</p>",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "3",
                    section: "7",
                    question_en: "<p>3. Select the most appropriate words which that means the same as the group of words given.<br>A building where grain is kept or stored</p>",
                    question_hi: "<p>3. Select the most appropriate words which that means the same as the group of words given.<br>A building where grain is kept or stored</p>",
                    options_en: ["<p>Greenery</p>", "<p>Granary</p>", 
                                "<p>Grandstand</p>", "<p>Grate</p>"],
                    options_hi: ["<p>Greenery</p>", "<p>Granary</p>",
                                "<p>Grandstand</p>", "<p>Grate</p>"],
                    solution_en: "<p>3.(b) <br>Granary: A building where grain is kept or stored</p>",
                    solution_hi: "<p>3.(b) <br>Granary (अन्न भण्डार) - A building where grain is kept or stored.</p>",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "4",
                    section: "7",
                    question_en: "<p>4. Select the most appropriate option to substitute the underline segment in the given sentence.If there is no need to substitute it, select no improvement.<br>Long after those five horses <span style=\"text-decoration: underline;\">finish</span> drinking water from the trough, an old horse appeared over the brow of the hill.</p>",
                    question_hi: "<p>4. Select the most appropriate option to substitute the underline segment in the given sentence.If there is no need to substitute it, select no improvement.<br>Long after those five horses&nbsp;<span style=\"text-decoration: underline;\">finish</span> drinking water from the trough, an old horse appeared over the brow of the hill.</p>",
                    options_en: ["<p>had finished</p>", "<p>have finished</p>", 
                                "<p>no improvement</p>", "<p>had been finishing</p>"],
                    options_hi: ["<p>had finished</p>", "<p>have finished</p>",
                                "<p>no improvement</p>", "<p>had been finishing</p>"],
                    solution_en: "<p>4.(a) had finished.<br>&lsquo;Had finished&rsquo; instead of &lsquo;finish&rsquo; must be used as the action occurred in the past.<br>Rules to use Has and Have in different tenses.<br>Present tense:<br>I/you/we/they = have.<br>He/she/it/proper name or title = has.<br>Past tense (simple)<br>I/you/we/they/he/she/it/proper name or title = had.<br>Future tense (simple)<br>I/you/we/they/he/she/it/proper name or title = will have.</p>",
                    solution_hi: "<p>4.(a) had finished.<br>&lsquo;Had finished&rsquo; का प्रयोग &lsquo;finish&rsquo; के स्थान पर किया जाना चाहिए क्योंकि action past में घटित हुआ था।<br>अलग-अलग tense में Has एवं Have के प्रयोग करने के नियम। <br>Present tense:<br>I/you/we/they = have.<br>He/she/it/proper name or title = has.<br>Past tense (simple)<br>I/you/we/they/he/she/it/proper name or title = had.<br>Future tense (simple)<br>I/you/we/they/he/she/it/proper name or title = will have.</p>",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "5",
                    section: "7",
                    question_en: "<p>5. Select the appropriate synonym of the given word.<br>Relief</p>",
                    question_hi: "<p>5. Select the appropriate synonym of the given word.<br>Relief</p>",
                    options_en: ["<p>Anger</p>", "<p>Aid</p>", 
                                "<p>Emotion</p>", "<p>Stress</p>"],
                    options_hi: ["<p>Anger</p>", "<p>Aid</p>",
                                "<p>Emotion</p>", "<p>Stress</p>"],
                    solution_en: "<p>5.(b)<br>Aid - help, typically of a practical nature.<br>Relief - a feeling of reassurance and relaxation following release from anxiety or distress.<br>Anger - a strong feeling of annoyance, displeasure, or hostility.<br>Emotion - a strong feeling deriving from one\'s circumstances, mood, or relationships with others.<br>Stress - pressure or tension exerted on a material object.</p>",
                    solution_hi: "<p>5.(b)<br>Aid (सहायता) - help, typically of a practical nature.<br>Relief (राहत) - a feeling of reassurance and relaxation following release from anxiety or distress.<br>Anger (क्रोध) - a strong feeling of annoyance, displeasure, or hostility.<br>Emotion (भावना) - a strong feeling deriving from one\'s circumstances, mood, or relationships with others.<br>Stress (तनाव) - pressure or tension exerted on a material object.</p>",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "6",
                    section: "7",
                    question_en: "<p>6. Select the most appropriate sequence from the given options to make a meaningful paragraph from jumbled sentences.<br>A. So, in the agrarian era, you destroy your enemy\'s productive capacity by burning his crops or fields.<br>B. Now, in the information era, destroying the enemy\'s productive capacity means destroying their information infrastructure.<br>C. You battle with your enemy by destroying the enemy\'s productive capacity, which will be different depending upon the foundation of economy.<br>D. But in the industrial era, ending productive capacity meant bombing of the factories that are located in the cities and main industrial area.</p>",
                    question_hi: "<p>6. Select the most appropriate sequence from the given options to make a meaningful paragraph from jumbled sentences.<br>A. So, in the agrarian era, you destroy your enemy\'s productive capacity by burning his crops or fields.<br>B. Now, in the information era, destroying the enemy\'s productive capacity means destroying their information infrastructure.<br>C. You battle with your enemy by destroying the enemy\'s productive capacity, which will be different depending upon the foundation of economy.<br>D. But in the industrial era, ending productive capacity meant bombing of the factories that are located in the cities and main industrial area.</p>",
                    options_en: ["<p>ACBD</p>", "<p>ACDB</p>", 
                                "<p>BDAC</p>", "<p>CADB</p>"],
                    options_hi: ["<p>ACBD</p>", "<p>ACDB</p>",
                                "<p>BDAC</p>", "<p>CADB</p>"],
                    solution_en: "<p>6.(d) CADB.<br>Option (d)&lsquo;CADB&rsquo; is the correct sequence.</p>",
                    solution_hi: "<p>6.(d) CADB.<br>Option (d)&lsquo;CADB&rsquo; में सही sequence है।</p>",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "7",
                    section: "7",
                    question_en: "<p>7. <strong>Cloze Test :</strong><br>When you enter a restaurant, you take your (7) _____ and you are served a glass of water. You take your (8) _____ to decide what you should order. When a (9) _____ appears, you ask him the routine question, \"(10) _____ do you have?\" The waiter will begin to recite (11) _____ day\'s menus, generally with nothing new in it, but you like hear it all over again.<br>Select the most appropriate option for blank no .7</p>",
                    question_hi: "<p>7. <strong>Cloze Test :</strong><br>When you enter a restaurant, you take your (7) _____ and you are served a glass of water. You take your (8) _____ to decide what you should order. When a (9) _____ appears, you ask him the routine question, \"(10) _____ do you have?\" The waiter will begin to recite (11) _____ day\'s menus, generally with nothing new in it, but you like hear it all over again.<br>Select the most appropriate option for blank no .7</p>",
                    options_en: ["<p>seat</p>", "<p>stage</p>", 
                                "<p>counter</p>", "<p>plate</p>"],
                    options_hi: ["<p>seat</p>", "<p>stage</p>",
                                "<p>counter</p>", "<p>plate</p>"],
                    solution_en: "<p>7.(a) seat<br>When you enter a restaurant, the first thing you do is find a place to sit. Hence, option (a) &lsquo;seat; is the most appropriate answer.</p>",
                    solution_hi: "<p>7.(a) seat<br>जब आप किसी restaurant में प्रवेश करते हैं, तो सबसे पहली चीज़ जो आप करते हैं वह बैठने के लिए जगह ढूँढ़ना है। अतः, option (a) &lsquo;seat; सबसे उपयुक्त उत्तर है।</p>",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "8",
                    section: "7",
                    question_en: "<p>8. <strong>Cloze Test :</strong><br>When you enter a restaurant, you take your (7) _____ and you are served a glass of water. You take your (8) _____ to decide what you should order. When a (9) _____ appears, you ask him the routine question, \"(10) _____ do you have?\" The waiter will begin to recite (11) _____ day\'s menus, generally with nothing new in it, but you like hear it all over again.<br>Select the most appropriate option for blank no .8</p>",
                    question_hi: "<p>8. <strong>Cloze Test :</strong><br>When you enter a restaurant, you take your (7) _____ and you are served a glass of water. You take your (8) _____ to decide what you should order. When a (9) _____ appears, you ask him the routine question, \"(10) _____ do you have?\" The waiter will begin to recite (11) _____ day\'s menus, generally with nothing new in it, but you like hear it all over again.<br>Select the most appropriate option for blank no .8</p>",
                    options_en: ["<p>place</p>", "<p>walle</p>", 
                                "<p>pen</p>", "<p>time</p>"],

                    neg_marks: 0.5
                });
            
            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();
        }
        
        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML - more compact
            let html = `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="question-text mb-3">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        <div class="options">`;
                        
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = 'option-label';
                
                // When reviewing, highlight user's choice and correct answer
                if (submitted) {
                    if (opt === question.correct) {
                        optionClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[question.id] === opt && opt !== question.correct) {
                        optionClass += ' border-danger bg-danger bg-opacity-10';
                    }
                }
                
                html += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${answers[question.id] === opt ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <label class="form-check-label w-100 ${optionClass}" for="opt-${index}-${opt}">
                            ${submitted && opt === question.correct ? '<i class="fas fa-check-circle text-success me-1"></i>' : ''}
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const alertClass = isCorrect ? 'alert-success' : 'alert-danger';
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="alert ${alertClass} mt-3 py-2">
                        <strong>${resultText}</strong>
                        <div class="mt-1 small">
                            <strong>Solution:</strong>
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
        function nextQuestion() { if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
            
            // Update button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('main-content');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                if (window.innerWidth >= 992) {
                    content.classList.add('with-nav');
                }
            } else {
                nav.classList.remove('show');
                if (window.innerWidth >= 992) {
                    content.classList.remove('with-nav');
                }
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer - compact
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            if (confirm(`You have attempted ${attempted} of ${questions.length} questions.
${remaining} questions are unattempted.

Are you sure you want to submit?`)) {
                submitTest();
            }
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.replace('btn-light', 'btn-success');
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
        
        // Add event listener for window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                if (document.getElementById('question-nav').classList.contains('show')) {
                    document.getElementById('main-content').classList.add('with-nav');
                }
            } else {
                document.getElementById('main-content').classList.remove('with-nav');
            }
        });
    </script>
</body>
</html>
