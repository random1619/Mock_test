<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>

pan style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> (I) </span><span style=\"font-family: Kokila;\">&#2360;&#2361;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\n",

                questions.push({
                    id: "51",
                    section: "17",
                    question_en: "<p>51. <span style=\"font-family: Cambria Math;\">What are the values of R and M, respectively, if the given number is perfectly divisible by 16 and 11 ? </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">34R05030M6</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">51.</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> 16 </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 11 </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> R </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> M </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2350;&#2358;&#2307;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;</span><span style=\"font-family: Cambria Math;\">?</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">34R05030M6</span></p>\n",
                    options_en: ["<p>4 and 6</p>\n", "<p>7 and 5</p>\n", 
                                "<p>5 and 5</p>\n", "<p>5 and 7</p>\n"],
                    options_hi: ["<p>4 <span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 6</span></p>\n", "<p>7 <span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 5</span></p>\n",
                                "<p>5 <span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 5</span></p>\n", "<p>5 <span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 7</span></p>\n"],
                    solution_en: "<p>51.(c)<span style=\"font-family: Cambria Math;\"> 3 4 R 0 5 0 3 0 M 6</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Divisibility of 11 = difference of the sum of alternate digits must be 0/11/22</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Divisibility of 16 = must be divisible by 4,8.</span></p>\r\n<p><span style=\"font-weight: 400;\">(3 + R + 5 + 3 + M) - (4 + 0 + 0 + 6) = 0/11</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">R + M = 10&hellip;&hellip;.(1)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, M cannot be 1, last 3 digit should be </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">divisible by 8 and last two digit should be divisible by 4.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, M = 5 and R = 5 </span></p>\n",
                    solution_hi: "<p>51.(c) <span style=\"font-family: Cambria Math;\">3 4 R 0 5 0 3 0 M 6</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">11 </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> = </span><span style=\"font-family: Kokila;\">&#2357;&#2376;&#2325;&#2354;&#2381;&#2346;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2325;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> 0/11/22 </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2366;&#2361;&#2367;&#2319;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">16 </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> = 4,8 </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</span></p>\r\n<p><span style=\"font-weight: 400;\">(3 + R + 5 + 3 + M) - (4 + 0 + 0 + 6) = 0/11</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">R + M = 10&hellip;&hellip;.(1)</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, M 1 </span><span style=\"font-family: Kokila;\">&#2344;&#2361;&#2368;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2325;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2340;&#2367;&#2350;</span><span style=\"font-family: Cambria Math;\"> 3 </span><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2325;</span><span style=\"font-family: Cambria Math;\"> 8 </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2366;&#2361;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2340;&#2367;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2325;</span><span style=\"font-family: Cambria Math;\"> 4 </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, M = 5 </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> R = 5</span></p>\n",
                    correct: "c",

                    neg_marks: 0.5
                });

                                "<p>45</p>\n", "<p>36</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">64.</span><span style=\"font-family: Cambria Math;\">(b)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Let , speed of boat = 7x km/h and current = x km/h</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>9</mn><mo>.</mo><mn>6</mn></mrow><mrow><mn>7</mn><mi>x</mi><mo>-</mo><mi>x</mi></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>16</mn><mn>60</mn></mfrac></math> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">6x = 36 &rarr;</span><span style=\"font-family: Cambria Math;\"> x = 6 km/h</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Time require to cover 36 km in direction of stream&nbsp;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Time = </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>48</mn><mrow><mn>7</mn><mi>x</mi><mo>+</mo><mi>x</mi></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>48</mn><mrow><mn>8</mn><mo>&times;</mo><mn>6</mn></mrow></mfrac></math> </span><span style=\"font-family: Cambria Math;\"> = 1 hr = 60 minutes </span></p>\n",

                    correct: "b",

                questions.push({

                    section: "17",

                    options_en: ["<p>15 Percent</p>\n", "<p>40 Percent</p>\n", 
                                "<p>30 Percent</p>\n", "<p>10 Percent</p>\n"],

                    options_hi: ["<p>6</p>\n", "<p>18</p>\n",

                    section: "18",
                    question_en: "<p>77.<span style=\"font-family: Cambria Math;\"> What is the other name for </span><span style=\"font-family: Cambria Math;\">Calciferol </span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    question_hi: "<p>77. <span style=\"font-family: Kokila;\">&#2325;&#2376;&#2354;&#2381;&#2360;&#2368;&#2347;&#2375;&#2352;&#2377;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2360;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2366;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Vitamin B2</p>\n", "<p>Vitamin A</p>\n", 
                                "<p>Vitamin D</p>\n", "<p>Vitamin C</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344;</span><span style=\"font-family: Cambria Math;\"> B2</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344;</span><span style=\"font-family: Cambria Math;\"> A</span></p>\n",
                                "<p><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344;</span><span style=\"font-family: Cambria Math;\"> D</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344;</span><span style=\"font-family: Cambria Math;\"> C</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">77.(c) </span><span style=\"font-family: Cambria Math;\">&nbsp;<strong>Vitamin D</strong><span style=\"font-weight: 400;\"> (Calciferol)</span><strong> </strong><span style=\"font-weight: 400;\">There are total 8 B vitamins: B1 (thiamin), B2 (riboflavin), B3 (niacin), B5 (pantothenic acid), B6 (pyridoxine), B7 (biotin), B9 (folate [folic acid]), B12 (cobalamin). </span><strong>Vitamin A </strong><span style=\"font-weight: 400;\">(Retinol), </span><strong>Vitamin C</strong><span style=\"font-weight: 400;\"> (Ascorbic acid), </span><strong>Vitamin D</strong><span style=\"font-weight: 400;\"> (Calciferol), </span><strong>Vitamin E</strong><span style=\"font-weight: 400;\"> (Tocopherol), </span><strong>Vitamin K</strong><span style=\"font-weight: 400;\"> (Phytonadione).</span></span></p>\n",
                    solution_hi: "<p>77.(c)&nbsp; <strong>&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; D (</strong><span style=\"font-weight: 400;\">&#2325;&#2376;&#2354;&#2381;&#2360;&#2368;&#2347;&#2375;&#2352;&#2377;&#2354;)</span><strong> </strong><span style=\"font-weight: 400;\">&#2325;&#2369;&#2354; 8 B &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2361;&#2376;&#2306; :&nbsp; B1 (&#2341;&#2367;&#2351;&#2366;&#2350;&#2367;&#2344;), B2 (&#2352;&#2366;&#2311;&#2348;&#2379;&#2347;&#2381;&#2354;&#2375;&#2357;&#2367;&#2344;), B3 (&#2344;&#2367;&#2351;&#2366;&#2360;&#2367;&#2344;), B5 (&#2346;&#2376;&#2306;&#2335;&#2379;&#2341;&#2375;&#2344;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337;), B6 (&#2346;&#2366;&#2311;&#2352;&#2367;&#2337;&#2379;&#2325;&#2381;&#2360;&#2367;&#2344;), B7 (&#2348;&#2366;&#2351;&#2379;&#2335;&#2367;&#2344;), B9 (&#2347;&#2379;&#2354;&#2375;&#2335; [&#2347;&#2379;&#2354;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337;]), B12 (&#2325;&#2379;&#2348;&#2366;&#2354;&#2367;&#2344;) ) </span><strong>&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; A </strong><span style=\"font-weight: 400;\">(&#2352;&#2375;&#2335;&#2367;&#2344;&#2377;&#2354;), </span><strong>&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; C</strong><span style=\"font-weight: 400;\"> (&#2319;&#2360;&#2381;&#2325;&#2377;&#2352;&#2381;&#2348;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337;), </span><strong>&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; D</strong><span style=\"font-weight: 400;\"> (&#2325;&#2376;&#2354;&#2381;&#2360;&#2368;&#2347;&#2375;&#2352;&#2377;&#2354;), &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; E (&#2335;&#2379;&#2325;&#2379;&#2347;&#2375;&#2352;&#2379;&#2354;), </span><strong>&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; K </strong><span style=\"font-weight: 400;\">(&#2347;&#2366;&#2311;&#2335;&#2379;&#2344;&#2376;&#2337;&#2367;&#2351;&#2379;&#2344;)&#2404;</span></p>\n",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "78",
                    section: "18",
                    question_en: "<p>78. <span style=\"font-family: Cambria Math;\">Who is the primary consumer in the food chain?</span></p>\n",
                    question_hi: "<p>78. <span style=\"font-family: Kokila;\">&#2326;&#2366;&#2342;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2380;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">? </span></p>\n",
                    options_en: ["<p>Snake</p>\n", "<p>Grasshopper</p>\n", 
                                "<p>Owl</p>\n", "<p>Tiger</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2360;&#2366;&#2305;&#2346;</span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2335;&#2367;&#2337;&#2337;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
                                "<p><span style=\"font-family: Kokila;\">&#2313;&#2354;&#2381;&#2354;&#2370;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2348;&#2366;&#2328;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">78.(b)</span><span style=\"font-family: Cambria Math;\"> &nbsp;<span style=\"font-weight: 400;\">The sequence of living organisms in a community in which one organism consumes another organism to transfer food energy is called a</span><strong> food chain. Example</strong><span style=\"font-weight: 400;\">- grass &rarr; grasshopper &rarr; frog &rarr; snake &rarr; eagle. It consists of</span><strong> producers, Primary consumers- Herbivores&nbsp; </strong><span style=\"font-weight: 400;\">(Grasshopper), </span><strong>Secondary consumers</strong><span style=\"font-weight: 400;\"> -Carnivore (Tiger),</span><strong> Tertiary consumers </strong><span style=\"font-weight: 400;\">(Snake), and </span><strong>Quaternary Consumers</strong><span style=\"font-weight: 400;\"> (Owls).&nbsp;</span></span></p>\n",
                    solution_hi: "<p>78.(b) <span style=\"font-weight: 400;\">&#2319;&#2325; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2350;&#2375;&#2306; &#2332;&#2368;&#2357;&#2367;&#2340; &#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2366; &#2325;&#2381;&#2352;&#2350; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2319;&#2325; &#2332;&#2368;&#2357; &#2342;&#2370;&#2360;&#2352;&#2375; &#2332;&#2368;&#2357; &#2325;&#2379; &#2326;&#2366;&#2342;&#2381;&#2351; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2349;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2313;&#2360;&#2375; </span><strong>&#2326;&#2366;&#2342;&#2381;&#2351; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366;</strong><span style=\"font-weight: 400;\"> &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; </span><strong>&#2313;&#2342;&#2366;&#2361;&#2352;&#2339;</strong><span style=\"font-weight: 400;\">- &#2328;&#2366;&#2360; &rarr; &#2335;&#2367;&#2337;&#2381;&#2337;&#2366; &rarr; &#2350;&#2375;&#2338;&#2325; &rarr; &#2360;&#2366;&#2305;&#2346; &rarr; &#2330;&#2368;&#2354;&#2404; &#2311;&#2360;&#2350;&#2375;&#2306; </span><strong>&#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;, &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;- &#2358;&#2366;&#2325;&#2366;&#2361;&#2366;&#2352;&#2368; </strong><span style=\"font-weight: 400;\">(&#2335;&#2367;&#2337;&#2381;&#2337;&#2368;), </span><strong>&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;-</strong><span style=\"font-weight: 400;\">&#2350;&#2366;&#2306;&#2360;&#2366;&#2361;&#2366;&#2352;&#2368; (&#2335;&#2366;&#2311;&#2327;&#2352;), </span><strong>&#2340;&#2371;&#2340;&#2368;&#2351;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;</strong><span style=\"font-weight: 400;\"> (&#2360;&#2366;&#2305;&#2346;) &#2324;&#2352; </span><strong>&#2330;&#2340;&#2369;&#2352;&#2381;&#2343;&#2366;&#2340;&#2369;&#2325; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;</strong><span style=\"font-weight: 400;\"> (&#2313;&#2354;&#2381;&#2354;&#2370;) &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</span></p>\n",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "79",
                    section: "18",
                    question_en: "<p>79. <span style=\"font-family: Cambria Math;\">In which year the Constituent Assembly was converted into a Provisional Parliament?</span></p>\n",
                    question_hi: "<p>79.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2349;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2360;&#2381;&#2341;&#2366;&#2351;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2360;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2370;&#2346;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2341;&#2366;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>1949</p>\n", "<p>1953</p>\n", 
                                "<p>1947</p>\n", "<p>1950</p>\n"],
                    options_hi: ["<p>1949</p>\n", "<p>1953</p>\n",
                                "<p>1947</p>\n", "<p>1950</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">79.(d) </span><span style=\"font-family: Cambria Math;\">After 26 January 1950, the Constituent Assembly became the Provisional Parliament of India until 1952. A new parliament was elected after the first general elections of 1952. The first General Elections of India started on 25th October 1951 and continued till 21st February 1952. </span></p>\n",

\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2366;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2360;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2369;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2312;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2366;&#2352;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2361;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2369;&#2344;&#2366;&#2357;</span><span style=\"font-family: Cambria Math;\"> 25 </span><span style=\"font-family: Kokila;\">&#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;</span><span style=\"font-family: Cambria Math;\"> 1951 </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2358;&#2369;&#2352;&#2370;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2369;&#2310;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 21 </span><span style=\"font-family: Kokila;\">&#2347;&#2352;&#2357;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> 1952 </span><span style=\"font-family: Kokila;\">&#2340;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2361;&#2366;&#2404;</span></p>\n",
                    correct: "d",

                questions.push({
                    id: "80",
                    section: "18",
                    question_en: "<p>80.<span style=\"font-family: Cambria Math;\"> Which state among the following had the highest membership in the Constituent Assembly of India as on 31 December 1947?</span></p>\n",
                    question_hi: "<p>80.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2366;&#2332;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> 31 </span><span style=\"font-family: Kokila;\">&#2342;&#2367;&#2360;&#2306;&#2348;&#2352;</span><span style=\"font-family: Cambria Math;\"> 1947 </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2366;&#2352;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2349;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2348;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2343;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2342;&#2360;&#2381;&#2351;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2341;&#2368;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>East Punjab</p>\n", "<p>United Provinces</p>\n", 
                                "<p>Madras</p>\n", "<p>Bombay</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2306;&#2332;&#2366;&#2348;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2366;&#2306;&#2340;</span></p>\n",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">84.(b) </span><span style=\"font-family: Cambria Math;\">&nbsp;<span style=\"font-weight: 400;\">Many scholars argue that the Mesopotamian people of Tigris- Euphrates valley called the Indus Valley Civilization Meluhha. </span><strong>Mesopotamian </strong><span style=\"font-weight: 400;\">&rarr; </span><span style=\"font-weight: 400;\">Mesopotamian civilizations (today&rsquo;s Iraq and Kuwait.) formed on the banks of the Tigris and Euphrates rivers. The </span><strong>Indus Valley Civilization</strong><span style=\"font-weight: 400;\">, also known as the Harappan Civilization, extended from modern-day northeast Afghanistan to Pakistan and northwest India.</span></span></p>\n",
                    solution_hi: "<p>84.(b)&nbsp; <span style=\"font-weight: 400;\">&#2325;&#2312; &#2357;&#2367;&#2342;&#2381;&#2357;&#2366;&#2344;&#2379;&#2306; &#2325;&#2366; &#2340;&#2352;&#2381;&#2325; &#2361;&#2376; &#2325;&#2367; &#2335;&#2366;&#2311;&#2327;&#2381;&#2352;&#2367;&#2360;-&#2351;&#2370;&#2347;&#2381;&#2352;&#2375;&#2335;&#2381;&#2360; &#2328;&#2366;&#2335;&#2368; &#2325;&#2375; &#2350;&#2375;&#2360;&#2379;&#2346;&#2379;&#2335;&#2366;&#2350;&#2367;&#2351;&#2366; &#2325;&#2375; &#2354;&#2379;&#2327; &#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2325;&#2379; &#2350;&#2375;&#2354;&#2369;&#2361;&#2366; &#2325;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; </span><strong>&#2350;&#2375;&#2360;&#2379;&#2346;&#2379;&#2335;&#2366;&#2350;&#2367;&#2351;&#2366; </strong><span style=\"font-weight: 400;\">&rarr; &#2350;&#2375;&#2360;&#2379;&#2346;&#2379;&#2335;&#2366;&#2350;&#2367;&#2351;&#2366; &#2325;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366;&#2319;&#2305; (&#2310;&#2332; &#2325;&#2366; &#2311;&#2352;&#2366;&#2325; &#2324;&#2352; &#2325;&#2369;&#2357;&#2376;&#2340;&#2404;) &#2335;&#2366;&#2311;&#2327;&#2381;&#2352;&#2367;&#2360; &#2324;&#2352; &#2351;&#2370;&#2347;&#2381;&#2352;&#2375;&#2335;&#2381;&#2360; &#2344;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2340;&#2335; &#2346;&#2352; &#2348;&#2344;&#2368; &#2361;&#2376;&#2306;&#2404; </span><strong>&#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366;</strong><span style=\"font-weight: 400;\">, &#2332;&#2367;&#2360;&#2375; &#2361;&#2337;&#2364;&#2346;&#2381;&#2346;&#2366; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2370;&#2352;&#2381;&#2357;                 questions.push({
                    id: "85",
                    section: "18",
                    question_en: "<p>85.<span style=\"font-family: Cambria Math;\"> In a photovoltaic cell which type of energy gets converted into electrical energy?</span></p>\n",
                    question_hi: "<p>85.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2347;&#2379;&#2335;&#2379;&#2357;&#2379;&#2354;&#2381;&#2335;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;&#2354;</span><span style=\"font-family: Cambria Math;\"> (photovoltaic cell) </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2314;&#2352;&#2381;&#2332;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2314;&#2352;&#2381;&#2332;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2340;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Sound<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>Light</p>\n", 
                                "<p>Chemical<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>Magnetic</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2343;&#2381;&#2357;&#2344;&#2367;</span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2358;</span></p>\n",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">85.(b)</span><span style=\"font-family: Cambria Math;\"> Light energy is converted into electrical energy in a Photovoltaic cell. </span><span style=\"font-family: Cambria Math;\">A photovoltaic cell (PV cell) is a specialized semiconductor diode that converts visible light into direct current (DC). The photovoltaic effect was discovered in 1839 by Edmond Becquerel.</span></p>\n",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">86.(a) </span><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">Protium (most abundant), </span><strong>deuterium, and tritium</strong><span style=\"font-weight: 400;\"> are isotopes of </span><strong>Hydrogen</strong><span style=\"font-weight: 400;\">. Carbon has 15 known isotopes, from (</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mmultiscripts><mi>C</mi><mprescripts></mprescripts><none></none><mn>8</mn></mmultiscripts></math><span style=\"font-weight: 400;\">) to (</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mmultiscripts><mi>C</mi><mprescripts></mprescripts><none></none><mn>22</mn></mmultiscripts></math><span style=\"font-weight: 400;\">). Uranium is composed of three major isotopes, uranium-238, uranium-235, and uranium-234. Titanium is composed of five stable isotopes; (</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mmultiscripts><mi>T</mi><mprescripts></mprescripts><none></none><mn>46</mn></mmultiscripts><mi>i</mi></math><span style=\"font-weight: 400;\">), (</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mmultiscripts><mi>T</mi><mprescripts></mprescripts><none></none><mn>47</mn></mmultiscripts><mi>i</mi></math><span style=\"font-weight: 400;\">), (</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mmultiscripts><mi>T</mi><mprescripts></mprescripts><none></none><mn>48</mn></mmultiscripts><mi>i</mi></math><span style=\"font-weight: 400;\">), (</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mmultiscripts><mi>T</mi><mprescripts></mprescripts><none></none><mn>49</mn></mmultiscripts><mi>i</mi></math><span style=\"font-weight: 400;\">), and (</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mmultiscripts><mi>T</mi><mprescripts></mprescripts><none></none><mn>50</mn></mmultiscripts><mi>i</mi></math><span style=\"font-weight: 400;\">).&nbsp;</span></span></p>\n",
                    solution_hi: "<p>86.(a)&nbsp; <span style=\"font-weight: 400;\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2367;&#2351;&#2350; (&#2360;&#2348;&#2360;&#2375; &#2346;&#2381;&#2352;&#2330;&#2369;&#2352; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306;), </span><strong>&#2337;&#2381;&#2351;&#2370;&#2335;&#2375;&#2352;&#2367;&#2351;&#2350;</strong><span style=\"font-weight: 400;\"> &#2324;&#2352; </span><strong>&#2335;&#2381;&#2352;&#2367;&#2335;&#2367;&#2351;&#2350;</strong><span style=\"font-weight: 400;\"> </span><strong>&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344;</strong><span style=\"font-weight: 400;\"> &#2325;&#2375; &#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325; (isotopes) &#2361;&#2376;&#2306;&#2404; </span><span style=\"font-weight: 400;\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2325;&#2375; 15 &#2332;&#2381;&#2334;&#2366;&#2340; &#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325; &#2361;&#2376;&#2306;,&nbsp; (</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mmultiscripts><mi>C</mi><mprescripts></mprescripts><none></none><mn>8</mn></mmultiscripts></math><span style=\"font-weight: 400;\">) &#2360;&#2375; (</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mmultiscripts><mi>C</mi><mprescripts></mprescripts><none></none><mn>22</mn></mmultiscripts></math><span style=\"font-weight: 400;\">) &#2340;&#2325;&#2404; &#2351;&#2370;&#2352;&#2375;&#2344;&#2367;&#2351;&#2350; &#2340;&#2368;&#2344; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325;&#2379;&#2306;, &#2351;&#2370;&#2352;&#2375;&#2344;&#2367;&#2351;&#2350; -238, &#2351;&#2370;&#2352;&#2375;&#2344;&#2367;&#2351;&#2350; -235 &#2324;&#2352; &#2351;&#2370;&#2352;&#2375;&#2344;&#2367;&#2351;&#2350; -234 &#2360;&#2375; &#2348;&#2344;&#2366; &#2361;&#2376;&#2404; &#2335;&#2366;&#2311;&#2335;&#2375;&#2344;&#2367;&#2351;&#2350; &#2346;&#2366;&#2306;&#2330; &#2360;&#                     question_hi: "<p>91. <span style=\"font-family: Kokila;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2380;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2366;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2361;&#2368;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Bhairav</p>\n", "<p>Hindol</p>\n", 
                                "<p>Tarana</p>\n", "<p>Deepak</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2349;&#2376;&#2352;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2361;&#2367;&#2306;&#2337;&#2379;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
                                "<p><span style=\"font-family: Kokila;\">&#2340;&#2352;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2342;&#2368;&#2346;&#2325;</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">91.(c) </span><span style=\"font-family: Cambria Math;\"><strong>Tarana -</strong><span style=\"font-weight: 400;\"> Singing Style in Hindustani Music. </span><strong>Three main pillars </strong><span style=\"font-weight: 400;\">of Indian classical music - </span><strong>Raag</strong><span style=\"font-weight: 400;\">, Taal, and Swara. Raag: the basis of </span><strong>melody</strong><span style=\"font-weight: 400;\">. Every raga has </span><strong>at least 5 </strong><span style=\"font-weight: 400;\">swaras. There are </span><strong>83</strong><span style=\"font-weight: 400;\"> total ragas. However, Indian classical vocalist </span><strong>Pandit Jasraj</strong><span style=\"font-weight: 400;\"> lists the </span><strong>six primary </strong><span style=\"font-weight: 400;\">ragas: </span><strong>Bhairav</strong><span style=\"font-weight: 400;\"> (morning raga), </span><strong>Malkauns </strong><span style=\"font-weight: 400;\">(sung after midnight), </span><strong>Deepak </strong><span style=\"font-weight: 400;\">(evening raga), </span><strong>Shri </strong><span style=\"font-weight: 400;\">(sung during the sunset),</span><strong> Megh Malhar </strong><span style=\"font-weight: 400;\">(seasonal raga), </span><strong>Hindol (</strong><span style=\"font-weight: 400;\">spring raga).</span></span></p>\n",
                    solution_hi: "<p>91.(c)&nbsp; &nbsp;<strong>&#2340;&#2352;&#2366;&#2344;&#2366; </strong><span style=\"font-weight: 400;\">- &#2361;&#2367;&#2306;&#2342;&#2369;&#2360;&#2381;&#2340;&#2366;&#2344;&#2368; &#2360;&#2306;&#2327;&#2368;&#2340; &#2350;&#2375;&#2306; &#2327;&#2366;&#2351;&#2344; &#2358;&#2376;&#2354;&#2368;&#2404; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2360;&#2306;&#2327;&#2368;&#2340; &#2325;&#2375; </span><strong>&#2340;&#2368;&#2344; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2360;&#2381;&#2340;&#2306;&#2349;</strong><span style=\"font-weight: 400;\">- </span><strong>&#2352;&#2366;&#2327;</strong><span style=\"font-weight: 400;\">, &#2340;&#2366;&#2354; &#2324;&#2352; &#2360;&#2381;&#2357;&#2352;&#2404; &#2352;&#2366;&#2327; : </span><strong>&#2352;&#2366;&#2327; </strong><span style=\"font-weight: 400;\">&#2325;&#2366; &#2310;&#2343;&#2366;&#2352;&#2404; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2352;&#2366;&#2327; &#2350;&#2375;&#2306; </span><strong>&#2325;&#2350; &#2360;&#2375; &#2325;&#2350; 5 &#2360;&#2381;&#2357;&#2352;</strong><span style=\"font-weight: 400;\"> &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2325;&#2369;&#2354; 83 &#2352;&#2366;&#2327; &#2361;&#2376;&#2306;&#2404; &#2361;&#2366;&#2354;&#2366;&#2305;&#2325;&#2367;, &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2327;&#2366;&#2351;&#2325; </span><strong>&#2346;&#2306;&#2337;&#2367;&#2340; &#2332;&#2360;&#2352;&#2366;&#2332; &#2331;&#2361; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;</strong><span style=\"font-weight: 400;\"> &#2352;&#2366;&#2327;&#2379;&#2306; &#2325;&#2368; &#2360;&#2370;&#2330;&#2368; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;: </span><strong>&#2349;&#2376;&#2352;&#2357; </strong><span style=\"font-weight: 400;\">(&#2360;&#2369;&#2348;&#2361; &#2325;&#2366; &#2352;&#2366;&#2327;), </span><strong>&#2350;&#2354;&#2325;&#2380;&#2306;&#2360; </strong><span style=\"font-weight: 400;\">(&#2310;&#2343;&#2368; &#2352;&#2366;&#2340; &#2325;&#2375; &#2348;&#2366;&#2342; &#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;), </span><strong>&#2342;&#2368;&#2346;&#2325; </strong><span style=\"font-weight: 400;\">(&#2358;&#2366;&#2350; &#2325;&#2366; &#2352;&#2366;&#2327;), </span><strong>&#2358;&#2381;&#2352;&#2368;</strong><span style=\"font-weight: 400;\"> (&#2360;&#2370;&#2352;&#2381;&#2351;&#2366;&#2360;&#2381;&#2340; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;), </span><strong>&#2350;&#2375;&#2328; &#2350;&#2354;&#2381;&#2361;&#2366;&#2352;</strong><span style=\"font-weight: 400;\"> (&#2350;&#2380;&#2360;&#2350;&#2368; &#2352;&#2366;&#2327;), </span><strong>&#2361;&#2367;&#2306;&#2337;&#2379;&#2354; </strong><span style=\"font-weight: 400;\">(&#2357;&#2360;&#2306;&#2340; &#2352;&#2366;&#2327;)&#2404;</span></p>\n",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "92",
                    section: "18",
                    question_en: "<p>92. <span style=\"font-family: Cambria Math;\">Which Gharana of classical singing did the late Pandit Bhimsen Joshi belong to?</span></p>\n",
                    question_hi: "<p>92.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2357;&#2352;&#2381;&#2327;&#2368;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2306;&#2337;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2368;&#2350;&#2360;&#2375;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2379;&#2358;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2366;&#2351;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2328;&#2352;&#2366;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2341;&#2375;</span><span style=\"font-family: Cambria Math;\"> ?</span></p>\n",
                    options_en: ["<p>Etawah</p>\n", "<p>Malhar</p>\n", 
                                "<p>Kirana</p>\n", "<p>Dhrupad</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2311;&#2335;&#2366;&#2357;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2350;&#2354;&#2381;&#2361;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
                                "<p><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2352;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2343;&#2381;&#2352;&#2369;&#2346;&#2342;</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">92.(c) </span><span style=\"font-family: Cambria Math;\">Pandit Bhimsen Gururaj Joshi was a legendary Indian vocalist and also known as the \"living superstar of the Kirana Gharana\'\'. </span></p>\n",
                    solution_hi: "<p>92.(c) <span style=\"font-family: Kokila;\">&#2346;&#2306;&#2337;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2368;&#2350;&#2360;&#2375;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2369;&#2352;&#2369;&#2352;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2379;&#2358;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> \"</span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2352;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2328;&#2352;&#2366;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2368;&#2357;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2369;&#2346;&#2352;&#2360;&#2381;&#2335;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\">\" </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2370;&#2346;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\n",
                    correct: "c",
                    pos_marks: 2.0,

                });
                questions.push({
                    id: "93",
                    section: "18",
                    question_en: "<p>93. <span style=\"font-family: Cambria Math;\">Which of the following tribes belongs to the Nilgiri Mountains?</span></p>\n",
                    question_hi: "<p>93. <span style=\"font-family: Kokila;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2344;&#2332;&#2366;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2348;&#2306;&#2343;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2368;&#2354;&#2327;&#2367;&#2352;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;&#2381;&#2357;&#2340;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Angamis</p>\n", "<p>Todas</p>\n", 
                                "<p>Jarawas</p>\n", "<p>Onges</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2327;&#2366;&#2350;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2335;&#2379;&#2337;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
                                "<p><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2352;&#2357;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2323;&#2306;&#2327;&#2375;&#2360;</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">93.(b) </span><span style=\"font-family: Cambria Math;\"><strong>Toda</strong><span style=\"font-weight: 400;\">, pastoral tribe of the N&#299;lgiri Hills of southern India (Tamil Nadu and Karnataka). The </span><strong>Angamis </strong><span style=\"font-weight: 400;\">are a major Naga ethnic group native to the state of Nagaland in North-East India. The </span><strong>Jarawas </strong><span style=\"font-weight: 400;\">are an indigenous people of the Andaman Islands in India. </span><strong>Onges</strong><span style=\"font-weight: 400;\">, most primitive tribes are inhabiting the Little Andaman Island.</span></span></p>\n",
                    solution_hi: "<p>93.(b)&nbsp; <strong>&#2335;&#2379;&#2337;&#2366;</strong><span style=\"font-weight: 400;\">, &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2349;&#2366;&#2352;&#2340; (&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2324;&#2352; &#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;) &#2325;&#2368; &#2344;&#2368;&#2354;&#2327;&#2367;&#2352;&#2368; &#2346;&#2361;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2342;&#2375;&#2361;&#2366;&#2340;&#2368; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367; &#2361;&#2376;&#2404; </span><strong>&#2309;&#2306;&#2327;&#2350;&#2368; </strong><span style=\"font-weight: 400;\">&#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2344;&#2366;&#2327;&#2366;&#2354;&#2376;&#2306;&#2337; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2350;&#2370;&#2354; &#2344;&#2367;&#2357;&#2366;&#2360;&#2368; &#2319;&#2325; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2344;&#2366;&#2327;&#2366; &#2332;&#2366;&#2340;&#2368;&#2351; &#2360;&#2350;&#2370;&#2361; &#2361;&#2376;&#2306;&#2404; </span><strong>&#2332;&#2366;&#2352;&#2357;&#2366;</strong><span style=\"font-weight: 400;\"> &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2309;&#2306;&#2337;&#2350;&#2366;&#2344; &#2342;&#2381;&#2357;&#2368;&#2346; &#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2319;&#2325; &#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2354;&#2379;&#2327; &#2361;&#2376;&#2306;&#2404; </span><strong>&#2323;&#2306;&#2327;&#2375;&#2360;</strong><span style=\"font-weight: 400;\">, &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2310;&#2342;&#2367;&#2350; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367;&#2351;&#2366;&#2305; &#2354;&#2367;&#2335;&#2367;&#2354; &#2309;&#2306;&#2337;&#2350;&#2366;&#2344; &#2342;&#2381;&#2357;&#2368;&#2346; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2366;&#2360; &#2325;&#2352; &#2352;&#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span></p>\n",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "94",
                    section: "18",
                    question_en: "<p>94. <span style=\"font-family: Cambria Math;\">Warli painting is a style of tribal art created by the people of the Warli Tribe of____________.</span></p>\n",
                    question_hi: "<p>94. <span style=\"font-family: Kokila;\">&#2357;&#2366;&#2352;&#2354;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\"> _______ </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2366;&#2352;&#2354;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2344;&#2332;&#2366;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2379;&#2327;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2342;&#2367;&#2357;&#2366;&#2360;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2358;&#2376;&#2354;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\n",
                    options_en: ["<p>Bihar</p>\n", "<p>Kerala</p>\n", 
                                "<p>Maharashtra</p>\n", "<p>Assam</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2348;&#2367;&#2361;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2325;&#2375;&#2352;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
                                "<p><span style=\"font-family: Kokila;\">&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2309;&#2360;&#2350;</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">94.(c) </span><span style=\"font-family: Cambria Math;\">&nbsp;<strong>Warli </strong><span style=\"font-weight: 400;\">painting is a form of tribal art mostly created by the tribal people from the North Sahyadri Range in Maharashtra, India. These paintings can be categorized into four groups: The Gods, The People, The Animals, and The Rights and Rituals. The </span><strong>Warli tribe</strong><span style=\"font-weight: 400;\"> is also found in Gujarat and Dadra, Nagara, Daman, and Diu Union Territory. </span><strong>Tarpa </strong><span style=\"font-weight: 400;\">dance is associated with the Warli tribe.</span></span></p>\n",
                    solution_hi: "<p>94.(c)<span style=\"font-family: Cambria Math;\"> &nbsp;</span><span style=\"font-weight: 400;\">&#2357;&#2366;&#2352;&#2354;&#2368; &#2346;&#2375;&#2306;&#2335;&#2367;&#2306;&#2327; &#2310;&#2342;&#2367;&#2357;&#2366;&#2360;&#2368; &#2325;&#2354;&#2366; &#2325;&#2366; &#2319;&#2325; &#2352;&#2370;&#2346; &#2361;&#2376; &#2332;&#2379; &#2332;&#2381;&#2351;&#2366;&#2342;&#2366;&#2340;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2340;&#2352;&#2368; &#2360;&#2361;&#2381;&#2351;&#2366;&#2342;&#2381;&#2352;&#2368; &#2352;&#2375;&#2306;&#2332; &#2325;&#2375; &#2310;&#2342;&#2367;&#2357;&#2366;&#2360;&#2368; &#2354;&#2379;&#2327;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2404; &#2311;&#2344; &#2330;&#2367;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2330;&#2366;&#2352; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;: &#2342; &#2327;&#2377;&#2337;&#2381;&#2360;, &#2342; &#2346;&#2368;&#2346;&#2354;, &#2342; &#2319;&#2344;&#2367;&#2350;&#2354;&#2381;&#2360;, &#2324;&#2352; &#2342; &#2352;&#2366;&#2311;&#2335;&#2381;&#2360; &#2319;&#2306;&#2337; &#2352;&#2367;&#2330;&#2369;&#2309;&#2354;&#2404;</span><strong> &#2357;&#2366;&#2352;&#2381;&#2354;&#2368; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367;</strong><span style=\"font-weight: 400;\"> &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2324;&#2352; &#2342;&#2366;&#2342;&#2352;&#2366;, &#2344;&#2366;&#2327;&#2352;&#2366;, &#2342;&#2350;&#2344; &#2324;&#2352; &#2342;&#2368;&#2357; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2358;&#2366;&#2360;&#2367;&#2340; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2349;&#2368; &#2346;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; </span><strong>&#2340;&#2352;&#2381;&#2346;&#2366; &#2344;&#2371;&#2340;&#2381;&#2351; &#2357;&#2366;&#2352;&#2381;&#2354;&#2368;</strong><span style=\"font-weight: 400;\"> &#2332;&#2344;&#2332;&#2366;&#2340;&#2367; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404;</span></p>\n",

                    question_hi: "<p>100. <span style=\"font-family: Kokila;\">&#2361;&#2366;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2366;&#2332;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> \'</span><span style=\"font-family: Kokila;\">&#2327;&#2379;&#2306;&#2337;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2375;&#2306;&#2335;&#2367;&#2306;&#2327;</span><span style=\"font-family: Cambria Math;\">\' </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> GI </span><span style=\"font-family: Kokila;\">&#2335;&#2376;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2367;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">100.</span><span style=\"font-family: Cambria Math;\">(c) The well-known Gond painting of Madhya Pradesh has been granted the coveted Geographical Indication (GI) tag in 2023.</span></p>\n",

mily: Kokila;\">&#2325;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\n",
                    correct: "c",
