<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

                    question_hi: "<p>1.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Spot the error in the given sentence and select the correct sentence from the options given.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">We do hope / you are enjoy / this online course / in art and craft. </span></p>\n",

                questions.push({

n style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2361;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\"> he can afford this expensive treatment because he is rich. </span><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, \'Being rich\' </span><span style=\"font-family: Kokila;\">&#2360;&#2348;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\n",

                    options_hi: ["<p>Leave</p>\n", "<p>Choose</p>\n",

                questions.push({

                    solution_en: "<p>44.(a)<span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">For each cluster, the first number is increasing by 1. The second number is increasing by 2. The third number is increasing by 3. The fourth number is increasing by 4. So, in the next term,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">first number = 4 + 1 = 5, </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">second number </span><span style=\"font-family: Cambria Math;\">= 8 + 2 = 10, </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">third number = 12 + 3 = 15, </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">fourth number = 16 + 4= 20, </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">i.e </span><span style=\"font-family: Cambria Math;\">5 - 10 - 15 - 20</span></p>\n",

                questions.push({

                    question_en: "<p>51. <span style=\"font-family: Cambria Math;\">Two dice are thrown simultaneously and the sum of the numbers appearing on them is noted. What is the probability that the sum is 11?</span></p>\n",

                    solution_en: "<p>56.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Average of 5 consecutive odd integers = 13</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Then, 3rd no must be 13. So, the 4th and 5th no = 15, 17</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Hence, the average of last three odd integers = </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>13</mn><mo>+</mo><mn>15</mn><mo>+</mo><mn>17</mn></mrow><mn>3</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mfrac><mrow><mo>&nbsp;</mo><mn>45</mn></mrow><mn>3</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 15</span></p>\n",

                    question_hi: "<p>59. <span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> &#8377;1500 </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 100 </span><span style=\"font-family: Kokila;\">&#2346;&#2375;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2366;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2375;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2326;&#2352;&#2368;&#2342;&#2375;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> &#8377;2160 </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 120 </span><span style=\"font-family: Kokila;\">&#2346;&#2375;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2366;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2375;&#2330;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2367;&#2319;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2360;&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2366;&#2344;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;&#2332;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2404;</span></p>\n",

                    solution_en: "<p>59.(b)</p>\r\n<p><span style=\"font-family: Cambria Math;\">CP of a pen at the rate of &#8377;1500 =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1500</mn><mn>100</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> = &#8377;15</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">SP of a pen at the rate of &#8377;2160 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>2160</mn><mo>&nbsp;</mo></mrow><mn>120</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = &#8377;18</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Required profit% =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>18</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>15</mn></mrow><mn>15</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> &times; 100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>15</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> &times; 100 = 20 %</span></p>\n",
                    solution_hi: "<p>59.(b)</p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#8377;1500 &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2319;&#2325; &#2325;&#2354;&#2350; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351;&nbsp; </span>= <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1500</mn><mn>100</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> = &#8377;15</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#8377;2160 &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2319;&#2325; &#2346;&#2375;&#2344; &#2325;&#2366; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; </span>= <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>2160</mn><mo>&nbsp;</mo></mrow><mn>120</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = &#8377;18</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2354;&#2366;&#2349;&nbsp; </span>% = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>18</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>15</mn></mrow><mn>15</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> &times; 100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>15</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> &times; 100 = 20 %</span></p>\n",

                questions.push({
                    id: "60",
                    section: "17",
                    question_en: "<p>60.The prices of two woolen jackets A and B are in the ratio 5 : 7. If jacket A costs &#8377;350 less than jacket B, then find the price of jacket B.</p>\n",
                    question_hi: "<p>60.<span style=\"font-family: Kokila;\">&#2342;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2314;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2376;&#2325;&#2375;&#2335;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> A </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> B </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> 5 : 7 </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2376;&#2325;&#2375;&#2335;</span><span style=\"font-family: Cambria Math;\"> A </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2332;&#2376;&#2325;&#2375;&#2335;</span><span style=\"font-family: Cambria Math;\"> B </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> &#8377;350 </span><span style=\"font-family: Kokila;\">&#2325;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2376;&#2325;&#2375;&#2335;</span><span style=\"font-family: Cambria Math;\"> B </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> (&#8377; </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">) </span><span style=\"font-family: Kokila;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;&#2332;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2404;</span></p>\n",
                    options_en: ["<p>&#8377;1680</p>\n", "<p>&#8377;1335</p>\n", 
                                "<p>&#8377;1225</p>\n", "<p>&#8377;1550</p>\n"],
                    options_hi: ["<p>&#8377;1680</p>\n", "<p>&#8377;1335</p>\n",
                                "<p>&#8377;1225</p>\n", "<p>&#8377;1550</p>\n"],
                    solution_en: "<p>60.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the price of two woolen jackets A and B be 5x and 7x respectively</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">7x - 5x = 350</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">2x = 350</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>350</mn><mn>2</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = &#8377;175</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the price of Jacket B = 7x = 7 &times; 175 = &#8377;1225</span></p>\n",
                    solution_hi: "<p>60.(c)</p>\r\n<p><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2314;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2376;&#2325;&#2375;&#2335;</span><span style=\"font-family: Cambria Math;\"> A </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> B </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;&#2350;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2350;&#2358;&#2307;</span><span style=\"font-family: Cambria Math;\"> 5x </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 7x </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2360;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\">,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">7x - 5x = 350</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">2x = 350</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>350</mn><mn>2</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = &#8377;175</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2332;&#2376;&#2325;&#2375;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;&#2350;&#2340;</span><span style=\"font-family: Cambria Math;\"> B = 7x = 7 &times; 175 = &#8377;1225</span></p>\n",
                    correct: "c",

                    neg_marks: 0.5

                    solution_en: "<p>63.(d)&nbsp;</p>\r\n<p>let tanker fill x unit/hr then total capacity of cistern = 8x unit</p>\r\n<p>So half cistern will be filled in<strong> </strong>= <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>4</mn><mi>x</mi><mo>&nbsp;</mo><mi>u</mi><mi>n</mi><mi>i</mi><mi>t</mi></mrow><mrow><mi>x</mi><mo>&nbsp;</mo><mi>u</mi><mi>n</mi><mi>i</mi><mi>t</mi><mo>/</mo><mi>h</mi><mi>r</mi></mrow></mfrac><mo>&nbsp;</mo></math>= 4 hour</p>\r\n<p><span style=\"font-weight: 400;\">remaining </span>half cistern filled in&nbsp; by&nbsp; 4 tankers<strong> </strong>=<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>4</mn><mi>x</mi><mo>&nbsp;</mo><mi>u</mi><mi>n</mi><mi>i</mi><mi>t</mi></mrow><mrow><mn>4</mn><mi>x</mi><mo>&nbsp;</mo><mi>u</mi><mi>n</mi><mi>i</mi><mi>t</mi><mo>/</mo><mi>h</mi><mi>r</mi></mrow></mfrac><mo>&nbsp;</mo></math> = 1hour</p>\r\n<p><span style=\"font-weight: 400;\">So total time taken </span><span style=\"font-weight: 400;\">to fill the cistern</span><span style=\"font-weight: 400;\"> = 4+1 =5 hour</span></p>\n",
                    solution_hi: "<p>63.(d)</p>\r\n<p><math style=\"font-family: Verdana;\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>&#2350;&#2366;&#2344;&#2366;</mi><mo>&nbsp;</mo><mi>&#2335;&#2376;&#2306;&#2325;&#2352;</mi><mo>&nbsp;</mo><mi>x</mi><mo>&nbsp;</mo><mi>&#2311;&#2325;&#2366;&#2312;</mi><mo>/</mo><mi>&#2328;&#2306;&#2335;&#2366;</mi><mo>&nbsp;</mo><mi>&#2349;&#2352;&#2340;&#2366;</mi><mo>&nbsp;</mo><mi>&#2361;&#2376;</mi><mo>&nbsp;</mo><mi>&#2340;&#2379;</mi><mo>&nbsp;</mo><mi>&#2335;&#2306;&#2325;&#2368;</mi><mo>&nbsp;</mo><mi>&#2325;&#2368;</mi><mo>&nbsp;</mo><mi>&#2325;&#2369;&#2354;</mi><mo>&nbsp;</mo><mi>&#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</mi><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>8</mn><mi>x</mi><mo>&nbsp;</mo><mi>&#2361;&#2376;</mi><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mi>&#2340;&#2379;</mi><mo>&nbsp;</mo><mi>&#2310;&#2343;&#2366;</mi><mo>&nbsp;</mo><mi>&#2335;&#2306;&#2325;&#2368;</mi><mo>&nbsp;</mo><mi>&#2349;&#2352;</mi><mo>&nbsp;</mo><mi>&#2332;&#2366;&#2319;&#2327;&#2366;</mi><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><mn>4</mn><mi>x</mi><mo>&nbsp;</mo><mi>&#2351;&#2370;&#2344;&#2367;&#2335;</mi></mrow><mrow><mi>x</mi><mo>&nbsp;</mo><mi>&#2351;&#2370;&#2344;&#2367;&#2335;</mi><mo>/</mo><mi>&#2328;&#2306;&#2335;&#2366;</mi><mo>&nbsp;</mo></mrow></mfrac><mo>=</mo><mo>&nbsp;</mo><mn>4</mn><mo>&nbsp;</mo><mi>&#2328;&#2306;&#2335;&#2366;</mi><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mi>&#2358;&#2375;&#2359;</mi><mo>&nbsp;</mo><mi>&#2310;&#2343;&#2366;</mi><mo>&nbsp;</mo><mi>&#2335;&#2306;&#2325;&#2368;</mi><mo>&nbsp;</mo><mn>4</mn><mo>&nbsp;</mo><mi>&#2335;&#2376;&#2306;&#2325;&#2352;&#2379;&#2306;</mi><mo>&nbsp;</mo><mi>&#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</mi><mo>&nbsp;</mo><mi>&#2349;&#2352;&#2366;</mi><mo>&nbsp;</mo><mi>&#2327;&#2351;&#2366;</mi><mo>&nbsp;</mo><mo>=</mo><mfrac><mrow><mn>4</mn><mi>x</mi><mo>&nbsp;</mo><mi>&#2351;&#2370;&#2344;&#2367;&#2335;</mi>                     question_en: "<p>64.<span style=\"font-family: Cambria Math;\"> A vessel contains 200 litres mixture of milk and water in the respective ratio of 22 : 3. 30 litres of the mixture is taken out from the vessel and 5.4 litres of pure milk and pure water each is added to the mixture. By what percent is the quantity of water in the final mixture less than the quantity of milk? (use approximation)</span></p>\n",

">&#2350;&#2367;&#2358;&#2381;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2325;&#2366;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2367;&#2358;&#2381;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 5.4 </span><span style=\"font-family: Kokila;\">&#2354;&#2368;&#2335;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2358;&#2369;&#2342;&#2381;&#2343;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2343;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2358;&#2369;&#2342;&#2381;&#2343;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2366;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2367;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2340;&#2367;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2367;&#2358;&#2381;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2366;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2340;&#2381;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2343;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2340;&#2381;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2340;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">? (</span><span style=\"font-family: Kokila;\">&#2360;&#2344;&#2381;&#2344;&#2367;&#2325;&#2335;&#2344;</span><span style=\"                     options_en: ["<p><span style=\"font-weight: 400;\">65.8%</span></p>\n", "<p><span style=\"font-weight: 400;\">71.5%</span><span style=\"font-weight: 400;\"><br></span></p>\n",

                    options_hi: ["<p>65.8%</p>\n", "<p><span style=\"font-weight: 400;\">71.5%</span><span style=\"font-weight: 400;\"><br></span></p>\n",
                                "<p><span style=\"font-weight: 400;\">77.6 %</span><span style=\"font-weight: 400;\"><br></span></p>\n", "<p><span style=\"font-weight: 400;\">60.5%</span></p>\n"],
                    solution_en: "<p>64.(b)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Remaining mixture in the vessel = 170 litres</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Remaining quantity of Milk = 170</span><span style=\"font-family: Cambria Math;\"> &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>22</mn><mn>25</mn></mfrac></math>=149.6 litres</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Remaining quantity of water = 170 - 149.6 = 20.4 litres</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">On adding additional milk and water, we have : </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Quantity of Milk =149.6 + 5.4 = 155 litres</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Quantity of Water =20.4 + 5.4 = 25.8 litres </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Required percentage =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>155</mn><mo>-</mo><mn>25</mn><mo>.</mo><mn>8</mn></mrow><mrow><mn>155</mn><mo>+</mo><mn>25</mn><mo>.</mo><mn>8</mn></mrow></mfrac></math> &times; </span><span style=\"font-family: Cambria Math;\">100 =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>&nbsp;</mo><mn>129</mn><mo>.</mo><mn>2</mn></mrow><mrow><mn>180</mn><mo>.</mo><mn>8</mn></mrow></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> &times;100 = 71.5%</span></p>\n",
                    solution_hi: "<p>64.(b)</p>\r\n<p><span style=\"font-family: Kokila;\">&#2348;&#2352;&#2381;&#2340;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2330;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2369;&#2310;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2367;&#2358;&#2381;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> = 170 </span><span style=\"font-family: Kokila;\">&#2354;&#2368;&#2335;&#2352;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2343;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2358;&#2375;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2340;&#2381;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> = 170 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>22</mn><mn>25</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">&nbsp;=149.6</span><span style=\"font-family: Kokila;\">&#2354;&#2368;&#2335;&#2352;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2346;&#2366;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2358;&#2375;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2340;&#2381;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> = 170 - 149.6 = 20.4 </span><span style=\"font-family: Kokila;\">&#2354;&#2368;&#2335;&#2352;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2343;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2366;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2367;&#2354;&#2366;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2361;&#2350;&#2366;&#2352;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2366;&#2360;</span><span style=\"font-family: Cambria Math;\">: </span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2343;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2340;&#2381;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\">=149.6 + 5.4 = 155 </span><span style=\"font-family: Kokila;\">&#2354;&#2368;&#2335;&#2352;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2346;&#2366;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2340;&#2381;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> =20.4 + 5.4 = 25.8 </span><span style=\"font-family: Kokila;\">&#2354;&#2368;&#2335;&#2352;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2310;&#2357;&#2358;&#2381;&#2351;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span><span style=\"font-family: Cambria Math;\"> =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>155</mn><mo>-</mo><mn>25</mn><mo>.</mo><mn>8</mn></mrow><mrow><mn>155</mn><mo>+</mo><mn>25</mn><mo>.</mo><mn>8</mn></mrow></mfrac></math> &times; </span><span style=\"font-family: Cambria Math;\">100 =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>129</mn><mo>.</mo><mn>2</mn></mrow><mrow><mn>180</mn><mo>.</mo><mn>8</mn></mrow></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> &times;100 = 71.5%</span></p>\n",
                    correct: "b",

                    question_en: "<p>66.<span style=\"font-family: Cambria Math;\"> If <span style=\"font-weight: 400;\">&nbsp;(</span><span style=\"font-weight: 400;\">m + n) :(m - n)</span><span style=\"font-weight: 400;\">= 7 : 5</span></span><span style=\"font-family: Cambria Math;\">, then find the ratio <span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\">m&sup3;</span><span style=\"font-weight: 400;\">&nbsp;+ </span><span style=\"font-weight: 400;\">n&sup3;</span><span style=\"font-weight: 400;\">) : (</span><span style=\"font-weight: 400;\">m&sup3;</span><span style=\"font-weight: 400;\">&nbsp;&ndash; </span><span style=\"font-weight: 400;\">n&sup3;</span><span style=\"font-weight: 400;\">)</span></span><span style=\"font-family: Cambria Math;\">.</span></p>\n",

                questions.push({
                    id: "67",
                    section: "17",
                    question_en: "<p>67.<span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><msup><mrow><mo>(</mo><mn>17</mn><mo>)</mo></mrow><mn>3</mn></msup><mo>+</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><mn>7</mn><mo>)</mo></mrow><mn>3</mn></msup></mrow><mrow><mo>&nbsp;</mo><mo>(</mo><msup><mn>17</mn><mn>2</mn></msup><mo>+</mo><mo>&nbsp;</mo><msup><mn>7</mn><mn>2</mn></msup><mo>-</mo><mo>&nbsp;</mo><mi>k</mi><mo>)</mo></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">= 24, then what is the value of k ?</span></p>\n",

                                "<p>24</p>\n", "<p>109</p>\n"],

                questions.push({

                    question_en: "<p>68.<span style=\"font-family: Cambria Math;\"> A chord of a circle is equal to its radius of length 10 cm. Find the angle subtended by it in major segment. </span></p>\n",

&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2326;&#2306;&#2337;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2340;&#2352;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span></p>\n",

                    options_hi: ["<p>90&deg;</p>\n", "<p>60&deg;</p>\n",
                                "<p>30&deg;</p>\n", "<p>120&deg;</p>\n"],
                    solution_en: "<p>68.(c)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688899421/word/media/image66.png\" width=\"108\" height=\"123\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">Clearly, we can see that &Delta;</span><span style=\"font-family: Cambria Math;\">AOB is an equilateral triangle. &rArr;<span style=\"font-weight: 400;\">&ang;</span></span><span style=\"font-family: Cambria Math;\"> AOB = 60&deg;.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">As we know, the angle subtended by chord at the centre is half the angle subtended by it at any point on the circle. </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, Angle subtended by it in major segment =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>60</mn><mo>&deg;</mo></mrow><mn>2</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> = 30&deg;</span></p>\n",

                questions.push({
                    id: "69",

                    question_en: "<p>69. <span style=\"font-family: Cambria Math;\">A tangent is drawn from an external point &lsquo;A&rsquo; to a circle of radius 15 cm. If the length of the tangent is 8 cm, then the distance from the centre of the circle to point &lsquo;A&rsquo; is:</span></p>\n",

                                "<p>7 cm</p>\n", "<p>13 cm</p>\n"],
                    solution_en: "<p>69.(a)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688899421/word/media/image67.png\" width=\"125\" height=\"97\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">In &Delta;</span><span style=\"font-family: Cambria Math;\">AOB, we have :</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">AO = </span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mi>B</mi><msup><mi>O</mi><mn>2</mn></msup><mo>+</mo><mi>A</mi><msup><mi>B</mi><mn>2</mn></msup></msqrt><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><msqrt><msup><mn>15</mn><mn>2</mn></msup><mo>+</mo><msup><mn>8</mn><mn>2</mn></msup></msqrt><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><msqrt><mn>225</mn><mo>+</mo><mn>64</mn></msqrt><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>289</mn><mo>&nbsp;</mo></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> = 17cm</span></p>\n",

                questions.push({
                    id: "70",
                    section: "17",
                    question_en: "<p>70.<span style=\"font-family: Cambria Math;\"> Two similar cylindrical jugs have heights 5 cm and 9 cm, respectively. If the capacity of the smaller jug is 64 </span><span style=\"font-family: Cambria Math;\">, what is the capacity (correct to 2 decimal places, in cm&sup3;</span><span style=\"font-family: Cambria Math;\">) of the larger jug? </span></p>\n",
                    question_hi: "<p>70. <span style=\"font-family: Kokila;\">&#2342;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2375;&#2354;&#2344;&#2366;&#2325;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2327;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2314;&#2305;&#2330;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2350;&#2358;&#2307;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">5 cm</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 9</span><span style=\"font-family: Cambria Math;\"> cm</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2331;&#2379;&#2335;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> 64 </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2337;&#2364;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> (2 </span><span style=\"font-family: Kokila;\">&#2342;&#2358;&#2350;&#2354;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2325;</span><span style=\"font-family: Cambria Math;\">, cm&sup3;&nbsp;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">) </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">? </span></p>\n",
                    options_en: ["<p>373.24</p>\n", "<p>302.40</p>\n", 
                                "<p>394.54</p>\n", "<p>363.84</p>\n"],
                    options_hi: ["<p>373.24</p>\n", "<p>302.40</p>\n",
                                "<p>394.54</p>\n", "<p>363.84</p>\n"],
                    solution_en: "<p>70.(a)&nbsp; If the two cylindrical figures are similar, the ratio of their volume or capacities must be equal to the ratio of the cube of their lengths (be it the base radius or height).</p>\r\n<p><span style=\"font-family: Cambria Math;\">As the ratio of height of small cylinder and large cylinder is 5 : 9 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">its volume should be in the ratio of <span style=\"font-weight: 400;\">5&sup3;</span><span style=\"font-weight: 400;\">&nbsp;: </span><span style=\"font-weight: 400;\">9&sup3;</span></span><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; 125 : 729.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">125 units &rarr;</span><span style=\"font-family: Cambria Math;\"> 64cm<span style=\"font-weight: 400;\">&sup3;</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">729 units &rarr;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>64</mn><mn>125</mn></mfrac></math> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&times; 729 = 373.24cm<span style=\"font-weight: 400;\">&sup3;</span>&nbsp;</span></p>\n",

                    solution_en: "<p>72.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688899421/word/media/image68.png\" width=\"124\" height=\"123\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">In &Delta;<span style=\"font-weight: 400;\">ABD</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">tan 45&deg; =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>A</mi><mi>B</mi></mrow><mrow><mi>B</mi><mi>D</mi></mrow></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; AB = BD = 200m &hellip;&hellip;e.q .(1)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">In &Delta;</span><span style=\"font-weight: 400;\">ABC</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">tan 30&deg; =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>A</mi><mi>B</mi></mrow><mrow><mi>B</mi><mi>C</mi></mrow></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&nbsp;&rArr;BC = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>3</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\">AB = 200<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>3</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\"> &hellip;&hellip;e.q .(2)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">from e.q .(1) and e.q .(2)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">DC = BC -&nbsp;</span><span style=\"font-family: Cambria Math;\"> BD = </span><span style=\"font-family: Cambria Math;\">200(<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>3</mn></msqrt><mo>-</mo><mn>1</mn></math>)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Speed = </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><                     solution_en: "<p>80.(c) <span style=\"font-family: Cambria Math;\"><strong>Ibrahim Lodi . </strong><span style=\"font-weight: 400;\">The Lodi dynasty (1451 - 1526, an&nbsp; Afghan dynasty&nbsp; was the fifth and final dynasty of the Delhi Sultanate. </span><strong>Bahlul Lodi </strong><span style=\"font-weight: 400;\">(1451&ndash;1489)(Founder of Lodhi dynasty).</span><strong> Sikander Lodi </strong><span style=\"font-weight: 400;\">(1489&ndash;1517). Ibrahim Lodi (1517&ndash;1526).</span><strong> Babur</strong><span style=\"font-weight: 400;\"> (1526-30AD) founded the Mughal empire after&nbsp; defeating Ibrahim Lodi in the first battle of Panipat (1526). The Battle of Khanwa (1527) was fought between Babur and the Rajput ruler of Mewar, Rana Sanga.&nbsp;</span></span></p>\n",

                                "<p><span style=\"font-family: Kokila;\">&#2326;&#2366;&#2344;&#2357;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2337;&#2364;&#2366;&#2312;</span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2328;&#2366;&#2328;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2337;&#2364;&#2366;&#2312;</span></p>\n"],
                    solution_en: "<p>81.(b) <span style=\"font-family: Cambria Math;\"><strong>First Battle of Panipat (1526) </strong><span style=\"font-weight: 400;\">was fought between Babur and Ibrahim Lodi.</span><strong> The battle of Chanderi&nbsp; (1528)</strong><span style=\"font-weight: 400;\"> was fought between Babur and Rajputs (Medini Rai). </span><strong>The Battle of Ghaghra (1529)</strong><span style=\"font-weight: 400;\"> was fought between Babur and the Sultan Nusrat Shah.</span><strong> The Battle of Khanwa (1527)</strong><span style=\"font-weight: 400;\"> was fought between Babur and the Rana Sanga.</span></span><strong>&nbsp;</strong></p>\n",
                    solution_hi: "<p>81.(b)&nbsp; <strong>&#2346;&#2366;&#2344;&#2368;&#2346;&#2340; &#2325;&#2366; &#2346;&#2381;&#2352;&#2341;&#2350; &#2351;&#2369;&#2342;&#2381;&#2343; (1526), </strong><span style=\"font-weight: 400;\">&#2348;&#2366;&#2348;&#2352; &#2324;&#2352; &#2311;&#2348;&#2381;&#2352;&#2366;&#2361;&#2367;&#2350; &#2354;&#2379;&#2342;&#2368; &#2325;&#2375; &#2348;&#2368;&#2330; &#2354;&#2337;&#2364;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404; </span><strong>&#2330;&#2306;&#2342;&#2375;&#2352;&#2368; &#2325;&#2368; &#2354;&#2337;&#2364;&#2366;&#2312; </strong><span style=\"font-weight: 400;\">(</span><strong>1528</strong><span style=\"font-weight: 400;\">), &#2348;&#2366;&#2348;&#2352; &#2324;&#2352; &#2352;&#2366;&#2332;&#2346;&#2370;&#2340;&#2379;&#2306; (&#2350;&#2375;&#2342;&#2367;&#2344;&#2368; &#2352;&#2366;&#2351;) &#2325;&#2375; &#2348;&#2368;&#2330; &#2354;&#2337;&#2364;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404; </span><strong>&#2328;&#2366;&#2328;&#2352;&#2366; &#2325;&#2368; &#2354;&#2337;&#2364;&#2366;&#2312;</strong><span style=\"font-weight: 400;\"> (</span><strong>1529</strong><span style=\"font-weight: 400;\">), &#2348;&#2366;&#2348;&#2352; &#2324;&#2352; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344; &#2344;&#2369;&#2360;&#2352;&#2340; &#2358;&#2366;&#2361; &#2325;&#2375; &#2348;&#2368;&#2330; &#2354;&#2337;&#2364;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404; </span><strong>&#2326;&#2366;&#2344;&#2357;&#2366; &#2325;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343;</strong><span style=\"font-weight: 400;\"> (</span><strong>1527</strong><span style=\"font-weight: 400;\">) &#2348;&#2366;&#2348;&#2352; &#2324;&#2352; &#2352;&#2366;&#2339;&#2366; &#2360;&#2366;&#2306;&#2327;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2354;&#2337;&#2364;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</span></p>\n",

                questions.push({
                    id: "82",
                    section: "18",
                    question_en: "<p>82. <span style=\"font-family: Cambria Math;\">Under the Rules of Lok Sabha, the \'Leader of the House\' means the ______, if he is a member of the Lok Sabha.</span></p>\n",
                    question_hi: "<p>82. <span style=\"font-family: Kokila;\">&#2354;&#2379;&#2325;&#2360;&#2349;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2351;&#2350;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2361;&#2340;</span><span style=\"font-family: Cambria Math;\">, \'</span><span style=\"font-family: Kokila;\">&#2360;&#2342;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2375;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\">\' </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2352;&#2381;&#2341;</span><span style=\"font-family: Cambria Math;\"> ______ </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2361;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2379;&#2325;&#2360;&#2349;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2342;&#2360;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#23                     options_en: ["<p>Deputy Speaker</p>\n", "<p>Speaker</p>\n", 
                                "<p>Prime Minister</p>\n", "<p>President</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2337;&#2367;&#2346;&#2381;&#2335;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2346;&#2368;&#2325;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</span></p>\n",
                                "<p><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;</span></p>\n"],
                    solution_en: "<p>82.(c) <strong>Prime Minister</strong> <span style=\"font-family: Cambria Math;\"><strong>Leader of the House in Lok Sabha</strong><span style=\"font-weight: 400;\"> is the parliamentary chairperson of the party that holds a majority in the Lok Sabha and is responsible for government business in the house. The office holder is usually the prime minister if they are a member of the chamber. In the constitution of India, the prime minister is mentioned in only four of its articles (</span><strong>articles 74, 75, 78 and 366)</strong><span style=\"font-weight: 400;\">.&nbsp;</span></span></p>\n",
                    solution_hi: "<p>82.(c) &nbsp;<span style=\"font-size: 18pt;\"><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;&nbsp; </span></span><strong>&#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2360;&#2342;&#2344; &#2325;&#2366; &#2344;&#2375;&#2340;&#2366; </strong><span style=\"font-weight: 400;\">&#2313;&#2360; &#2342;&#2354; &#2325;&#2366; &#2360;&#2306;&#2360;&#2342;&#2368;&#2351; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2366;&#2360; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2348;&#2361;&#2369;&#2350;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2357;&#2361; &#2360;&#2342;&#2344; &#2350;&#2375;&#2306; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366;&#2350;&#2325;&#2366;&#2332; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351; &#2343;&#2366;&#2352;&#2325; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2351;&#2342;&#2367; &#2357;&#2375; &#2360;&#2342;&#2344; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2366; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2313;&#2360;&#2325;&#2375; &#2325;&#2375;&#2357;&#2354; &#2330;&#2366;&#2352; &#2354;&#2375;&#2326;&#2379;&#2306; </span><strong>(&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 74, 75, 78 &#2324;&#2352; 366) </strong><span style=\"font-weight: 400;\">&#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&nbsp; &#2361;&#2376;&#2404;</span></p>\n",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "83",
                    section: "18",
                    question_en: "<p>83. <span style=\"font-family: Cambria Math;\">Who was the first speaker of the Lok Sabha ?</span></p>\n",
                    question_hi: "<p>83. <span style=\"font-family: Kokila;\">&#2354;&#2379;&#2325;&#2360;&#2349;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2341;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2380;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2341;&#2375;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p><span style=\"font-weight: 400;\">GV Mavalankar &nbsp;&nbsp;</span></p>\n", "<p><span style=\"font-weight: 400;\">N. Sanjiva Reddy</span></p>\n", 
                                "<p><span style=\"font-weight: 400;\">Somnath Chatterjee</span></p>\n", "<p><span style=\"font-weight: 400;\">Lal Bahadur Shastri</span></p>\n"],
                    options_hi: ["<p><span style=\"font-weight: 400;\">&#2332;&#2368;.&#2357;&#2368;. &#2350;&#2366;&#2357;&#2354;&#2306;&#2325;&#2352;</span></p>\n", "<p><span style=\"font-weight: 400;\">&#2319;&#2344;. &#2360;&#2306;&#2332;&#2368;&#2357; &#2352;&#2375;&#2337;&#2381;&#2337;&#2368;</span></p>\n",
                                "<p><span style=\"font-weight: 400;\">&#2360;&#2379;&#2350;&#2344;&#2366;&#2341; &#2330;&#2335;&#2352;&#2381;&#2332;&#2368;</span></p>\n", "<p><span style=\"font-weight: 400;\">&#2354;&#2366;&#2354; &#2348;&#2361;&#2366;&#2342;&#2369;&#2352; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;</span></p>\n"],
                    solution_en: "<p>83. (a) <span style=\"font-family: Cambria Math;\"><strong>Ganesh Mavlankar</strong><span style=\"font-weight: 400;\"> was the first speaker of the Lok Sabha. Ganesh Mavlankar is considered as the father of Lok Sabha. He was popularly called \'Dada Saheb\'.</span><strong>Ganesh Vasudev Mavalankar</strong><span style=\"font-weight: 400;\"> was born on 27 November 1888 at Baroda, presently part of the State of Gujarat.The First Lok Sabha was constituted on 17 April 1952 after India\'s first general election.</span></span></p>\n",
                    solution_hi: "<p>83. (a) <span style=\"font-weight: 400;\">&#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2341;&#2350; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</span><strong> &#2327;&#2339;&#2375;&#2358; &#2350;&#2366;&#2357;&#2354;&#2306;&#2325;&#2352;</strong><span style=\"font-weight: 400;\"> &#2341;&#2375;&#2404; &#2327;&#2339;&#2375;&#2358; &#2350;&#2366;&#2357;&#2354;&#2306;&#2325;&#2352; &#2325;&#2379; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2325;&#2366; &#2332;&#2344;&#2325; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; \'&#2342;&#2366;&#2342;&#2366; &#2360;&#2366;&#2361;&#2348;\' &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;&#2404; </span><strong>&#2327;&#2339;&#2375;&#2358; &#2357;&#2366;&#2360;&#2369;&#2342;&#2375;&#2357; &#2350;&#2366;&#2357;&#2354;&#2306;&#2325;&#2352;</strong><span style=\"font-weight: 400;\"> &#2325;&#2366; &#2332;&#2344;&#2381;&#2350; 27 &#2344;&#2357;&#2306;&#2348;&#2352; 1888 &#2325;&#2379; &#2348;&#2337;&#2364;&#2380;&#2342;&#2366; &#2350;&#2375;&#2306; &#2361;&#2369;&#2310; &#2341;&#2366;, &#2332;&#2379; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;&#2404;&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2310;&#2350; &#2330;&#2369;&#2344;&#2366;&#2357; &#2325;&#2375; &#2348;&#2366;&#2342; 17 &#2309;&#2346;&#2381;&#2352;&#2376;&#2354; 1952 &#2325;&#2379; &#2346;&#2361;&#2354;&#2368; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2325;&#2366; &#2327;&#2336;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366; &#2404;</span></p>\n",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "84",
                    section: "18",
                    question_en: "<p>84.<span style=\"font-family: Cambria Math;\"> How many Anglo-Indian members can be nominated to the Lok Sabha ?</span></p>\n",

                                "<p>2</p>\n", "<p>5</p>\n"],
                    options_hi: ["<p>1</p>\n", "<p>0</p>\n",
                                "<p>2</p>\n", "<p>5</p>\n"],
                    solution_en: "<p>84.(b ) 0&nbsp; : Reservation for Anglo Indian has ended on 25 Jan 2020 <span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">Article </span><strong>331</strong><span style=\"font-weight: 400;\"> (not more than two seats were reserved for the Anglo Indian Members in Lok Sabha). Article </span><strong>366</strong><span style=\"font-weight: 400;\"> (It defines Anglo-Indian). Article </span><strong>338</strong><span style=\"font-weight: 400;\"> (National Commission for SCs) - It investigates all matters relating to the Anglo-Indian community).</span></span></p>\r\n<p>&nbsp;</p>\n",
                    solution_hi: "<p>84.(b) <strong>0 </strong><span style=\"font-weight: 400;\">&#2404;</span><strong>&nbsp; &#2319;&#2306;&#2327;&#2381;&#2354;&#2379; &#2311;&#2306;&#2337;&#2367;&#2351;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; 25 &#2332;&#2344;&#2357;&#2352;&#2368; 2020 &#2325;&#2379; &#2310;&#2352;&#2306;&#2325;&#2381;&#2359;&#2339; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2361;&#2376; | &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 331<span style=\"font-weight: 400;\"> (&#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2319;&#2306;&#2327;&#2381;&#2354;&#2379; &#2311;&#2306;&#2337;&#2367;&#2351;&#2344; &#2360;&#2342;&#2360;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2379; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2360;&#2368;&#2335;&#2375;&#2306; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2341;&#2368;&#2306;)</span></strong><span style=\"font-weight: 400;\">&#2404; </span><strong>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 366 </strong><span style=\"font-weight: 400;\">(&#2351;&#2361; &#2319;&#2306;&#2327;&#2381;&#2354;&#2379;-&#2311;&#2306;&#2337;&#2367;&#2351;&#2344; &#2325;&#2379; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;)&#2404; </span><strong>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 338 </strong><span style=\"font-weight: 400;\">(SC &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351;&#2379;&#2327;) - &#2351;&#2361; &#2319;&#2306;&#2327;&#2381;&#2354;&#2379;-&#2311;&#2306;&#2337;&#2367;&#2351;&#2344; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2360;&#2349;&#2368; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2325;&#2368; &#2332;&#2366;&#2306;&#2330; &#2325;&#2352;&#2340;&#2366; &#                 });
                questions.push({

                    solution_en: "<p>88.(b) <span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">The </span><strong>Sun </strong><span style=\"font-weight: 400;\">heats the earth through </span><strong>radiation</strong><span style=\"font-weight: 400;\">. Since there is no medium (like the gas in our atmosphere) in space, radiation is the </span><strong>primary way </strong><span style=\"font-weight: 400;\">that heat travels in space. When the heat reaches the earth it warms the molecules of the atmosphere, and they warm other molecules and so on.</span></span></p>\n",
                    solution_hi: "<p>88.(b)<span style=\"font-family: Cambria Math;\"> &nbsp;</span><strong>&#2360;&#2370;&#2352;&#2381;&#2351;, &#2357;&#2367;&#2325;&#2367;&#2352;&#2339; </strong><span style=\"font-weight: 400;\">&#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2379; &#2327;&#2352;&#2381;&#2350; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;. &#2330;&#2370;&#2306;&#2325;&#2367; &#2309;&#2306;&#2340;&#2352;&#2367;&#2325;&#2381;&#2359; &#2350;&#2375;&#2306; &#2325;&#2379;&#2312; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; (&#2361;&#2350;&#2366;&#2352;&#2375; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2350;&#2375;&#2306; &#2327;&#2376;&#2360; &#2325;&#2368; &#2340;&#2352;&#2361;) &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;, </span><strong>&#2357;&#2367;&#2325;&#2367;&#2352;&#2339; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2340;&#2352;&#2368;&#2325;&#2366; </strong><span style=\"font-weight: 400;\">&#2361;&#2376; &#2332;&#2367;&#2360;&#2360;&#2375; &#2309;&#2306;&#2340;&#2352;&#2367;&#2325;&#2381;&#2359; &#2350;&#2375;&#2306; &#2327;&#2352;&#2381;&#2350;&#2368; &#2327;&#2350;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2332;&#2348; &#2314;&#2359;&#2381;&#2350;&#2366; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2346;&#2352; &#2346;&#2361;&#2369;&#2305;&#2330;&#2340;&#2368; &#2361;&#2376; &#2340;&#2379; &#2351;&#2361; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2325;&#2375; &#2309;&#2339;&#2369;&#2323;&#2306; &#2325;&#2379; &#2327;&#2352;&#2381;&#2350; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2324;&#2352; &#2357;&#2375; &#2309;&#2344;&#2381;&#2351; &#2309;&#2339;&#2369;&#2323;&#2306; &#2310;&#2342;&#2367; &#2325;&#2379; &#2327;&#2352;&#2381;&#2350; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span></p>\n",

                    solution_en: "<p>89.(d)<span style=\"font-family: Cambria Math;\"> <span style=\"font-weight: 400;\">A &lsquo;Nattuvanar&rsquo; conducts a </span><strong>Bharatanatyam </strong><span style=\"font-weight: 400;\">dance recital. The term nattuvanar connotes a man who accompanied the devadasi dance in the capacity of a dance-master, music conductor, and vocal percussionist. </span><strong>Bharatanatyam </strong><span style=\"font-weight: 400;\">- Tamil Nadu and Southern India, Kuchipudi- Andhra Pradesh, Odissi- Odisha,&nbsp; </span><strong>Kathak</strong><span style=\"font-weight: 400;\">- Uttar Pradesh.</span></span></p>\n",
                    solution_hi: "<p>89.(d) <span style=\"font-weight: 400;\">&#2319;&#2325; \'&#2344;&#2335;&#2381;&#2335;&#2369;&#2357;&#2344;&#2366;&#2352;\' </span><strong>&#2349;&#2352;&#2340;&#2344;&#2366;&#2335;&#2381;&#2351;&#2350; </strong><span style=\"font-weight: 400;\">&#2344;&#2371;&#2340;&#2381;&#2351; &#2325;&#2366; &#2310;&#2351;&#2379;&#2332;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2335;&#2381;&#2335;&#2369;&#2357;&#2344;&#2366;&#2352; &#2358;&#2348;&#2381;&#2342; &#2319;&#2325; &#2320;&#2360;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2319;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351;-&#2327;&#2369;&#2352;&#2369;, &#2360;&#2306;&#2327;&#2368;&#2340; &#2360;&#2306;&#2357;&#2366;&#2361;&#2325; &#2324;&#2352; &#2350;&#2369;&#2326;&#2352; &#2340;&#2366;&#2354;&#2357;&#2366;&#2342;&#2325; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2350;&#2375;&#2306; &#2342;&#2375;&#2357;&#2342;&#2366;&#2360;&#2368; &#2344;&#2371;&#2340;&#2381;&#2351; &#2325;&#2375; &#2360;&#2366;&#2341; &#2341;&#2366;&#2404; </span><strong>&#2349;&#2352;&#2340;&#2344;&#2366;&#2335;&#2381;&#2351;&#2350;</strong><span style=\"font-weight: 400;\">- &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2324;&#2352; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2368; &#2349;&#2366;&#2352;&#2340;, &#2325;&#2369;&#2330;&#2367;&#2346;&#2369;&#2337;&#2364;&#2368;- &#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;, &#2323;&#2337;&#2367;&#2360;&#2368;- &#2323;&#2337;&#2367;&#2358;&#2366;, </span><strong>&#2325;&#2341;&#2325;</strong><span style=\"font-weight: 400;\">- &#2313;&#2340;&#2381;&#2340;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;&#2404;</span></p>\n",
