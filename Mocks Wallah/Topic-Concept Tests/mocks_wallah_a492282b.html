<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>

            document.getElementById('section-selector').innerHTML += 
                `<option value="misc">Miscellaneous</option>`;
            
            
                questions.push({
                    id: "1",
                    section: "7",
                    question_en: "<p>1. <span style=\"font-family: Cambria Math;\">Spot the error in the given sentence and select the correct sentence from the options given.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">He has been / excused by the teacher / by the time a formal complaint / for bullying was made.</span></p>\n",
                    question_hi: "<p>1. <span style=\"font-family: Cambria Math;\">Spot the error in the given sentence and select the correct sentence from the options given.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">He has been / excused by the teacher / by the time a formal complaint / for bullying was made.</span></p>\n",
                    options_en: ["<p>excused by the teacher</p>\n", "<p>for bullying was made</p>\n",

                    options_hi: ["<p>excused by the teacher</p>\n", "<p>for bullying was made</p>\n",

                    solution_en: "<p>1.(d) <span style=\"font-family: Cambria Math;\">&ldquo;</span><span style=\"font-family: Cambria Math;\"><span style=\"text-decoration: underline;\">By the time </span>+ </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>2</mn></msub></math><span style=\"font-family: Cambria Math;\">(</span><span style=\"font-family: Cambria Math;\"><span style=\"text-decoration: underline;\">second form of the verb</span>)</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Had + </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>3</mn></msub></math><span style=\"font-family: Cambria Math;\">(</span><span style=\"font-family: Cambria Math;\"><span style=\"text-decoration: underline;\">third form of the verb</span>)</span><span style=\"font-family: Cambria Math;\">&rdquo; is grammatically the correct structure for the given sentence. Hence, &lsquo;He had been excused(</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>3</mn></msub></math><span style=\"font-family: Cambria Math;\">)&rsquo; is the most appropriate structure.</span></p>\n",
                    solution_hi: "<p>1.(d) <span style=\"font-family: Cambria Math;\">&ldquo;</span><span style=\"font-family: Cambria Math;\"><span style=\"text-decoration: underline;\">By the time</span> + </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>2</mn></msub></math><span style=\"font-family: Cambria Math;\">(</span><span style=\"font-family: Cambria Math;\"><span style=\"text-decoration: underline;\">second form of the verb</span>)</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Had + </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>3</mn></msub></math><span style=\"font-family: Cambria Math;\">(</span><span style=\"font-family: Cambria Math;\"><span style=\"text-decoration: underline;\">third form of the verb</span>)</span><span style=\"font-family: Cambria Math;\">&rdquo;- </span><span style=\"font-family: Kokila;\">&#2360;&#2361;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2366;&#2325;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2352;&#2330;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> (sentence structure) </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2327;&#2368;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, &lsquo;He had been excused(</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>3</mn></msub></math><span style=\"font-family: Cambria Math;\">)&rsquo; </span><span style=\"font-family: Kokila;\">&#2360;&#2348;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2340;&#2381;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\n",

                questions.push({
                    id: "2",

e=\"font-family: Kokila;\">&#2327;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2366;&#2325;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">&lsquo;marbles&rsquo; countable </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, &lsquo;fewer marbles&rsquo; </span><span style=\"font-family: Kokila;\">&#2360;&#2348;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\n",

                questions.push({
                    id: "3",
                    section: "7",
                    question_en: "<p>3.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Select the option that expresses the given sentence in indirect speech.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">She said, &ldquo;Is anyone there in the house?&rdquo; </span></p>\n",

                questions.push({

                    question_hi: "<p><span style=\"font-family: Cambria Math;\">52. </span><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2368;&#2332;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> p(x) =</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>x</mi><mn>4</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>1</mn><mo>,</mo><mo>&nbsp;</mo><mi>q</mi><mo>(</mo><mi>x</mi><mo>)</mo><mo>=</mo><mo>&nbsp;</mo><msup><mi>x</mi><mn>4</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>2</mn><msup><mi>x</mi><mn>3</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>3</mn><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>2</mn><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>1</mn></math><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> p(x) </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> q(x) </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2361;&#2340;&#2381;&#2340;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325;</span><span style=\"font-family: Cambria Math;\"> (GCD) <span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\"> - x + 1&nbsp;</span></span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-f                                 "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><msup><mi>x</mi><mn>4</mn></msup><mo>+</mo><msup><mi>x</mi><mn>2</mn></msup><mo>+</mo><mn>1</mn><mo>)</mo><msup><mrow><mo>(</mo><msup><mi>x</mi><mn>2</mn></msup><mo>+</mo><mi>x</mi><mo>+</mo><mn>1</mn><mo>)</mo></mrow><mn>2</mn></msup></math></p>\n", "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><msup><mi>x</mi><mn>4</mn></msup><mo>+</mo><msup><mi>x</mi><mn>2</mn></msup><mo>+</mo><mn>1</mn><mo>)</mo><msup><mrow><mo>(</mo><msup><mi>x</mi><mn>2</mn></msup><mo>-</mo><mi>x</mi><mo>+</mo><mn>1</mn><mo>)</mo></mrow><mn>2</mn></msup></math></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">52.(a)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">As HCF of p(x) and q(x) is </span><span style=\"font-family: Cambria Math;\">&nbsp;x<span style=\"font-weight: 400;\">&sup2;</span> - x+ 1. So, on dividing p(x) and q(x) by (x<span style=\"font-weight: 400;\">&sup2; </span></span><span style=\"font-family: Cambria Math;\">-x+1), we get (x<span style=\"font-weight: 400;\">&sup2;</span></span><span style=\"font-family: Cambria Math;\">+x+1) and (x<span style=\"font-weight: 400;\">&sup2; </span></span><span style=\"font-family: Cambria Math;\">-x+1) respectively.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Therefore, we get : </span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>p</mi><mo>(</mo><mi>x</mi><mo>)</mo><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><msup><mi>x</mi><mn>4</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>1</mn><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mo>(</mo><msup><mi>x</mi><mn>2</mn></msup><mo>-</mo><mi>x</mi><mo>+</mo><mn>1</mn><mo>)</mo><mo>(</mo><msup><mi>x</mi><mn>2</mn></msup><mo>+</mo><mi>x</mi><mo>+</mo><mn>1</mn><mo>)</mo><mspace linebreak=\"newline\"></mspace><mi>q</mi><mo>(</mo><mi>x</mi><mo>)</mo><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><msup><mi>x</mi><mn>4</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>2</mn><msup><mi>x</mi><mn>3</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>3</mn><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>2</mn><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>1</mn><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><msup><mi>x</mi><mn>2</mn></msup><mo>-</mo><mi>x</mi><mo>+</mo><mn>1</mn><mo>)</mo></mrow><mn>2</mn></msup></math></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, LCM of p(x) and q(x) =&nbsp;</span><span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\">x&sup2; </span><span style=\"font-weight: 400;\">- x + 1</span><span style=\"font-weight: 400;\">)&sup2;</span><span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\">x&sup2; </span><span style=\"font-weight: 400;\">+ x + 1)</span></p>\n",

                    question_hi: "<p>57. <span style=\"font-family: Cambria Math;\">12 </span><span style=\"font-family: Kokila;\">&#2360;&#2375;&#2350;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2344;&#2366;&#2352;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2336;&#2379;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2328;&#2344;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2375;&#2354;&#2344;&#2366;&#2325;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2352;&#2381;&#2340;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2366;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2370;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2352;&#2361;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2337;&#2370;&#2348;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2369;&#2310;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2367;&#2360;&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> 14 </span><span style=\"font-family: Kokila;\">&#2360;&#2375;&#2350;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2314;&#2306;&#2330;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> 32 </span><span style=\"font-family: Kokila;\">&#2360;&#2375;&#2350;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2352;&#2381;&#2340;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2366;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> 15 </span><span style=\"font-family: Kokila;\">&#2360;&#2375;&#2350;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2314;&#2306;&#2330;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2352;&#2381;&#2340;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2366;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2314;&#2305;&#2330;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2314;&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2336;&#2375;&#2327;&#2366;</span><span style=\"font-family: Cambria Math;\"> (</span><span style=\"font-family: Kokila;\">&#2360;&#2375;&#2350;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">) </span><span style=\"font-family: Kokila;\">&#2357;&#2361;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> (</span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2358;&#2350;&#2354;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2341;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=                     options_en: ["<p>0.9</p>\n", "<p>2.8</p>\n",

                    options_hi: ["<p>0.9</p>\n", "<p>2.8</p>\n",
                                "<p>1.2</p>\n", "<p>1.1</p>\n"],
                    solution_en: "<p>57.(b) <span style=\"font-family: Cambria Math;\">Volume of the cube = base area of the cylinder &times; (raised height of water)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">12 &times; 12 &times; 12 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>22</mn><mn>7</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&times; 14 &times; 14&times; h</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">h = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>12</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>12</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>12</mn><mo>&nbsp;</mo></mrow><mrow><mn>22</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>2</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>14</mn></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&asymp; 2.8 cm</span></p>\n",
                    solution_hi: "<p>57.(b) <span style=\"font-family: Kokila;\">&#2328;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2340;&#2344;</span><span style=\"font-family: Cambria Math;\"> = </span><span style=\"font-family: Kokila;\">&#2348;&#2375;&#2354;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2343;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;</span><span style=\"font-family: Cambria Math;\"> &times; (</span><span style=\"font-family: Kokila;\">&#2346;&#2366;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2314;&#2305;&#2330;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span><span style=\"font-family: Cambria Math;\">)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">12 &times; 12 &times; 12 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>22</mn><mn>7</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&times; 14 &times; 14&times; h</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">h = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>12</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>12</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>12</mn><mo>&nbsp;</mo></mrow><mrow><mn>22</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>2</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>14</mn></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&asymp; 2.8&nbsp;</span><span style=\"font-weight: 400;\">&#2360;&#2375;&#2350;&#2368;</span></p>\n",

                questions.push({
                    id: "58",
                    section: "17",
                    question_en: "<p>58. <span style=\"font-family: Cambria Math;\">The dimensions of a solid metallic cuboid are 18cm, 27 cm and 12 cm. It is melted and recast into 8 cubes of the same volume. The sum of the surface area ( in cm&sup2;</span><span style=\"font-family: Cambria Math;\">) of these 8 cubes is:</span></p>\n",
                    question_hi: "<p>58. <span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2336;&#2379;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2343;&#2366;&#2340;&#2381;&#2357;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2328;&#2344;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2350;&#2366;&#2319;&#2305;</span><span style=\"font-family: Cambria Math;\"> 18cm, 27 cm </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 12 cm </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2340;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> 8 </span><span style=\"font-family: Kokila;\">&#2328;&#2344;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2338;&#2366;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2311;&#2344;</span><span style=\"font-family: Cambria Math;\"> 8 </span><span style=\"font-family: Kokila;\">&#2328;&#2344;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;</span><span style=\"font-family: Cambria Math;\"> ( cm&sup2;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">) </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">:</span></p>\n",
                    options_en: ["<p>10368</p>\n", "<p>11664</p>\n", 
                                "<p>3728</p>\n", "<p>3888</p>\n"],
                    options_hi: ["<p>10368</p>\n", "<p>11664</p>\n",
                                "<p>3728</p>\n", "<p>3888</p>\n"],
                    solution_en: "<p>58.(d) <span style=\"font-family: Cambria Math;\">According to question,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">18 &times; </span><span style=\"font-family: Cambria Math;\">27 &times; </span><span style=\"font-family: Cambria Math;\">12 = 8 &times;&nbsp;</span><span style=\"font-family: Cambria Math;\"> (x&sup3;</span><span style=\"font-family: Cambria Math;\">)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;x&sup3; = 729 &rArr; x </span><span style=\"font-family: Cambria Math;\">= 9 cm</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">TSA of 8 cubes =&nbsp;</span><span style=\"font-weight: 400;\">8 &times;&nbsp;</span><span style=\"font-weight: 400;\">6x&sup2;</span><span style=\"font-weight: 400;\"> =&nbsp; 8 &times; </span><span style=\"font-weight: 400;\">6(9)&sup2; </span><span style=\"font-weight: 400;\">&nbsp;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 8 &times; </span><span style=\"font-family: Cambria Math;\">6 &times;&nbsp;</span><span style=\"font-family: Cambria Math;\"> 81= 3888 cm&sup2;</span></p>\n",
                    solution_hi: "<p>58.(d)&nbsp;</p>\r\n<p><span style=\"font-weight: 400;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">18 &times; </span><span style=\"font-family: Cambria Math;\">27 &times; </span><span style=\"font-family: Cambria Math;\">12 = 8 &times;&nbsp;</span><span style=\"font-family: Cambria Math;\"> (x&sup3;</span><span style=\"font-family: Cambria Math;\">)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;x&sup3; = 729 &rArr; x </span><span style=\"font-family: Cambria Math;\">= 9 cm</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">8 &#2328;&#2344;&#2379;&#2306; &#2325;&#2366;&nbsp; &#2325;&#2369;&#2354;&nbsp; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; </span>= </span><span style=\"font-weight: 400;\">8 &times;&nbsp;</span><span style=\"font-weight: 400;\">6x&sup2;</span><span style=\"font-weight: 400;\"> =&nbsp; 8 &times; </span><span style=\"font-weight: 400;\">6(9)&sup2; </span><span style=\"font-weight: 400;\">&nbsp;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 8 &times; </span><span style=\"font-family: Cambria Math;\">6 &times;&nbsp;</span><span style=\"font-family: Cambria Math;\"> 81= 3888 cm&sup2;</span></p>\n",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "59",
                    section: "17",
                    question_en: "<p>59.<span style=\"font-family: Cambria Math;\"> The length of the side of a rhombus is 29 cm and one of the diagonals was 40 cm. Find the length of the other diagonal.</span></p>\n",
                    question_hi: "<p>59. <span style=\"font-family: Kokila;\">&#2325;&#2367;&#2360;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2369;&#2332;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2306;&#2348;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> 29 </span><span style=\"font-family: Kokila;\">&#2360;&#2375;&#2306;&#2335;&#2368;&#2350;&#2368;&#2335;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2352;&#2381;&#2339;</span><span style=\"font-family: Cambria Math;\"> 40 </span><span style=\"font-family: Kokila;\">&#2360;&#2375;&#2306;&#2335;&#2368;&#2350;&#2368;&#2335;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2350;&#2381;&#2348;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2360;&#2352;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2352;&#2381;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2306;&#2348;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2375;&#2306;&#2404;</span></p>\n",
                    options_en: ["<p>16 cm</p>\n", "<p>42 cm</p>\n", 
                                "<p>32 cm</p>\n", "<p>12 cm</p>\n"],
                    options_hi: ["<p>16 <span style=\"font-family: Kokila;\">&#2360;&#2375;&#2306;&#2335;&#2368;&#2350;&#2368;&#2335;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>42 <span style=\"font-family: Kokila;\">&#2360;&#2375;&#2306;&#2335;&#2368;&#2350;&#2368;&#2335;&#2352;</span></p>\n",
                                "<p>32 <span style=\"font-family: Kokila;\">&#2360;&#2375;&#2306;&#2335;&#2368;&#2350;&#2368;&#2335;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>12 <span style=\"font-family: Kokila;\">&#2360;&#2375;&#2306;&#2335;&#2368;&#2350;&#2368;&#2335;&#2352;</span></p>\n"],
                    solution_en: "<p>59.(b)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688810938/word/media/image46.png\" width=\"160\" height=\"118\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">Let ABDC is a rhombus with side 29 cm and one diagonal 40 cm.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">From properties of rhombus,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> its diagonals bisect each other at 90&deg;.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, OD = OB = 20 cm</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">In &Delta;<span style=\"font-weight: 400;\">OCD,&nbsp;</span> </span><span style=\"font-family: Cambria Math;\">from pythagoras theorem, </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">OC =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><msup><mn>29</mn><mn>2</mn></msup><mo>-</mo><msup><mn>20</mn><mn>2</mn></msup></msqrt><mo>=</mo><msqrt><mn>441</mn></msqrt><mo>=</mo><mn>21</mn><mo>&nbsp;</mo><mi>c</mi><mi>m</mi></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, AC = 2 &times;21 = 42 cm</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Hence, the length of the other diagonal = 42 cm</span></p>\n",
                    solution_hi: "<p>59.(b)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688810938/word/media/image46.png\" width=\"186\" height=\"136\"></p>\r\n<p><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> ABCD </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2367;&#2360;&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2369;&#2332;&#2366;</span><span style=\"font-family: Cambria Math;\"> 29 cm </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2352;&#2381;&#2339;</span><span style=\"font-family: Cambria Math;\"> 40 cm </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2369;&#2339;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2360;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2352;&#2381;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2360;&#2352;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> 90&deg; </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2342;&#2381;&#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2340;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;&#2404;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2340;&#2307;</span><span style=\"font-family: Cambria Math;\">, OD = OB = 20 cm</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&Delta;<span style=\"font-weight: 400;\">OCD </span></span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2346;&#2366;&#2311;&#2341;&#2366;&#2327;&#2379;&#2352;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2350;&#2375;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\">, OD =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><msup><mn>29</mn><mn>2</mn></msup><mo>-</mo><msup><mn>20</mn><mn>2</mn></msup></msqrt><mo>=</mo><msqrt><mn>441</mn></msqrt><mo>=</mo><mn>21</mn><mo>&nbsp;</mo><mi>c</mi><mi>m</mi></math></span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2340;&#2307;</span><span style=\"font-family: Cambria Math;\">,AC = 2 &times;21 = 42 cm</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2340;&#2307;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2360;&#2352;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2352;&#2381;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2306;&#2348;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> = 42 cm</span></p>\n",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "60",

                    question_en: "<p>60.<span style=\"font-family: Cambria Math;\"> The angles of a triangle are in the ratio 3 : 2 : 1. What percentage of the total internal angle is the greatest angle?</span></p>\n",
                    question_hi: "<p>60.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;&#2339;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> 3 : 2 : 1 </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2348;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2337;&#2364;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;&#2339;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2306;&#2340;&#2352;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2340;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#                                 "<p>45%</p>\n", "<p>40%</p>\n"],
                    solution_en: "<p>60.(a)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the angles of a triangle be 3x, 2x and x</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Required % =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>3</mn><mi>x</mi></mrow><mrow><mn>3</mn><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>2</mn><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>x</mi></mrow></mfrac><mo>&nbsp;</mo></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> &times; 100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>3</mn><mi>x</mi></mrow><mrow><mn>6</mn><mi>x</mi></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&times; 100 = 50%</span></p>\n",

                questions.push({
                    id: "61",

                    question_en: "<p>61. <span style=\"font-family: Cambria Math;\">&#8710;ABC and &#8710;DEF are two triangles such that &#8710;ABC &cong; &#8710;FDE. If AB = 7 cm, &ang;B = 30&deg; and &ang;A = 80&deg;, then which of the following options is true?</span></p>\n",

                    solution_en: "<p>61.(a) <span style=\"font-family: Cambria Math;\">Since, &Delta;</span><span style=\"font-family: Cambria Math;\">ABC &cong;&nbsp;</span><span style=\"font-family: Cambria Math;\"> &Delta;</span><span style=\"font-family: Cambria Math;\">FDE (By AAS)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Then, AB = DF = 7 cm and &ang;C =&ang;E </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 70&deg;{As,&ang;C= 180&deg;&ndash; (30&deg; + 80&deg;)} = 70&deg;</span></p>\n",

                    question_en: "<p><span style=\"font-family: Cambria Math;\">65. <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>4</mn></mfrac></math> </span><span style=\"font-family: Cambria Math;\"> of a milk-water mixture was milk. There was 24 litres of the mixture. If 6 litres of water is added to it, the percentage of milk in the new mixture will be:</span></p>\n",

2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2319;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2367;&#2358;&#2381;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2343;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2327;&#2366;</span><span style=\"font-family: Cambria Math;\">:</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",

                                "<p>60</p>\n", "<p>56</p>\n"],

                questions.push({

                    solution_en: "<p>68.(d)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let man traveled x km on foot and 60 - x km on bicycle</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">According to the question,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi>x</mi><mn>8</mn></mfrac><mo>+</mo><mfrac><mrow><mn>60</mn><mo>-</mo><mi>x</mi></mrow><mn>10</mn></mfrac></math>= 10</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; x = 160 km</span></p>\n",

                questions.push({

                                "<p>7.30%</p>\n", "<p>6.30%</p>\n"],

                questions.push({
                    id: "70",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">70.A dishonest tradesman sells rice at Rs.20 per kg, which he has bought at Rs.10 per kg, </span><span style=\"font-family: Cambria Math;\">and he gives 800 gm to the customer instead of 1 kg. Find his overall profit percentage.</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">70. </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2375;&#2312;&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2366;&#2357;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> Rs. 20 </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> kg </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2375;&#2330;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2332;&#2367;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2360;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> Rs.10 </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> kg </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2326;&#2352;&#2368;&#2342;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2361;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2381;&#2352;&#2366;&#2361;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> 1 kg </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2332;&#2366;&#2351;</span><span style=\"font-family: Cambria Math;\"> 800 gm </span><span style=\"font-family: Kokila;\">&#2342;&#2375;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2360;&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;&#2332;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2404;</span></p>\n",
                    options_en: ["<p>150%</p>\n", "<p>140%</p>\n", 
                                "<p>160%</p>\n", "<p>180%</p>\n"],
                    options_hi: ["<p>150%</p>\n", "<p>140%</p>\n",

                    solution_en: "<p>70.(a)</p>\r\n<p><span style=\"font-family: Cambria Math;\">The ratio of the CP and SP of rice for shopkeeper at the rate of selling = 800&times;10 : 1000&times;20 =2:5</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Required profit% =<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>5</mn><mo>-</mo><mn>2</mn></mrow><mn>2</mn></mfrac></math> </span><span style=\"font-family: Cambria Math;\">&times;100 =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>&nbsp;</mo><mn>3</mn></mrow><mn>2</mn></mfrac></math> </span><span style=\"font-family: Cambria Math;\">&times;100 = 150%</span></p>\n",

                questions.push({

                    question_hi: "<p>79.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2358;&#2379;&#2343;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2361;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2379;&#2357;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2370;&#2352;&#2381;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2366;&#2332;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2352;&#2381;&#2332;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2341;&#2366;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",

                    solution_en: "<p>79.(a)&nbsp; <span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">The Constitution </span><strong>(56th Amendment) Act, 1987</strong><span style=\"font-weight: 400;\"> confers Statehood on Goa and forms a new Union Territory of Daman and Diu. </span><strong>52nd </strong><span style=\"font-weight: 400;\">Amendment act 1985 added The Tenth Schedule - popularly known as the Anti-Defection Act.</span><strong> 61st </strong><span style=\"font-weight: 400;\">Amendment Act, 1988 reduced the voting age from 21 to 18 years. </span><strong>71st</strong><span style=\"font-weight: 400;\"> Amendment Act of 1992 included Konkani, Manipuri, and Nepali in the Eighth Schedule of Indian Constitution.&nbsp;</span></span></p>\n",

                questions.push({
                    id: "87",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">87. </span><span style=\"font-family: Cambria Math;\">Which one of the following minerals has another name called \'brown diamond\"?</span></p>\n",

                    solution_en: "<p>87.(d) <span style=\"font-family: Cambria Math;\"><strong>Lignite </strong><span style=\"font-weight: 400;\">is lower-grade coal and contains about 40 to 55 percent carbon. Its moisture content is high (over 35 percent). Found in Palna (Rajasthan), Neyveli (Tamil Nadu), Lakhimpur (Assam), and Karewa of Jammu and Kashmir. </span><strong>Anthracite </strong><span style=\"font-weight: 400;\">(best quality of coal, contains 80 to 95 percent carbon), </span><strong>Bituminous </strong><span style=\"font-weight: 400;\">(most widely used coal), </span><strong>Peat </strong><span style=\"font-weight: 400;\">(first stage of transformation of wood into coal).&nbsp;</span></span></p>\n",
                    solution_hi: "<p>87.(d)&nbsp; <strong>&#2354;&#2367;&#2327;&#2381;&#2344;&#2366;&#2311;&#2335;</strong><span style=\"font-weight: 400;\"> &#2344;&#2367;&#2350;&#2381;&#2344; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2325;&#2366; &#2325;&#2379;&#2351;&#2354;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2350;&#2375;&#2306; &#2354;&#2327;&#2349;&#2327; 40 &#2360;&#2375; 55 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2368; &#2344;&#2350;&#2368; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2309;&#2343;&#2367;&#2325; (35 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;) &#2361;&#2376;&#2404; &#2346;&#2366;&#2354;&#2344;&#2366; (&#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;), &#2344;&#2375;&#2357;&#2375;&#2354;&#2368; (&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;), &#2354;&#2326;&#2368;&#2350;&#2346;&#2369;&#2352; (&#2309;&#2360;&#2350;) &#2324;&#2352; &#2332;&#2350;&#2381;&#2350;&#2370;-&#2325;&#2358;&#2381;&#2350;&#2368;&#2352; &#2325;&#2375; &#2325;&#2352;&#2375;&#2357;&#2366; &#2350;&#2375;&#2306; &#2346;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span><strong> &#2319;&#2344;&#2381;&#2341;&#2381;&#2352;&#2375;&#2360;&#2366;&#2311;&#2335;</strong><span style=\"font-weight: 400;\"> (&#2325;&#2379;&#2351;&#2354;&#2375; &#2325;&#2368; &#2360;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2350; &#2327;&#2369;&#2339;&#2357;&#2340;&#2381;&#2340;&#2366;, 80 &#2360;&#2375; 95 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;),</span><strong> &#2348;&#2367;&#2335;&#2369;&#2350;&#2367;&#2344;&#2360;</strong><span style=\"font-weight: 400;\"> (&#2360;&#2348;&#2360;&#2375; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2311;&#2360;&#2381;&#2340;&#2375;&#2350;&#2366;&#2354; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2325;&#2379;&#2351;&#2354;&#2366;), </span><strong>&#2346;&#2368;&#2335;</strong><span style=\"font-weight: 400;\"> (&#2325;&#2379;&#2351;&#2354;&#2375; &#2350;&#2375;&#2306; &#2354;&#2325;&#2337;&#2364;&#2368; &#2325;&#2375; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2330;&#2352;&#2339;)&#2404;</span></p>\n",
                    correct: "d",

                questions.push({
                    id: "89",
                    section: "18",
                    question_en: "<p>89.<span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-weight: 400;\">Who composed Tabaqat-i-Nasiri in the Delhi Sultanate period?</span></p>\n",
                    question_hi: "<p>89.<span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-weight: 400;\">&#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2340;&#2348;&#2366;&#2325;&#2340;-&#2319;-&#2344;&#2360;&#2367;&#2352;&#2367; &#2325;&#2368; &#2352;&#2330;&#2344;&#2366; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2368; &#2341;&#2368;?</span></p>\n",
                    options_en: ["<p><span style=\"font-weight: 400;\">Hasan Nizami</span><span style=\"font-weight: 400;\"><br></span></p>\n", "<p><span style=\"font-weight: 400;\">Amir Khusrau</span><span style=\"font-weight: 400;\"><br></span></p>\n", 
                                "<p><span style=\"font-weight: 400;\">Minhaj-us-Siraj</span><span style=\"font-weight: 400;\"><br></span></p>\n", "<p><span style=\"font-weight: 400;\">Ziauddin Barani</span><span style=\"font-weight: 400;\"><br></span></p>\n"],
                    options_hi: ["<p><span style=\"font-weight: 400;\">&#2361;&#2360;&#2344; &#2344;&#2367;&#2332;&#2366;&#2350;&#2368;</span><span style=\"font-weight: 400;\"><br></span></p>\n", "<p><span style=\"font-weight: 400;\">&#2309;&#2350;&#2368;&#2352; &#2326;&#2369;&#2360;&#2352;&#2379;</span><span style=\"font-weight: 400;\"><br></span></p>\n",
                                "<p><span style=\"font-weight: 400;\">&nbsp;&#2350;&#2367;&#2344;&#2366;&#2332; &#2313;&#2360; &#2360;&#2367;&#2352;&#2366;&#2332;</span><span style=\"font-weight: 400;\"><br></span></p>\n", "<p><span style=\"font-weight: 400;\">&#2332;&#2367;&#2351;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2348;&#2352;&#2366;&#2344;&#2368;T</span></p>\n"],
                    solution_en: "<p>89.(c ) <span style=\"font-weight: 400;\">\"Tabaqat-i-Nasiri\'\' (1260) was written by</span><strong> Minhaj-i-Siraj</strong><span style=\"font-weight: 400;\"> in Persian language. </span><strong>Hasan Nizami </strong><span style=\"font-weight: 400;\">(Persian language poet) wrote </span><strong>Tajul-Maasir (</strong><span style=\"font-weight: 400;\">the first official history of the Delhi Sultanate). Sufi poet</span><strong> Amir Khusro </strong><span style=\"font-weight: 400;\">was the court poet of Alauddin Khilji. His famous works: Tughluq Nama, Wast-ul-Hayat, Nuh Sipihr, Ashiqa, Khamsa, Baqia-Naqia. Ziauddin Barani (Muslim political thinker of Delhi Sultanate) wrote Tarikh-i-Firozshahi and Fatwa-i-Jahandari.</span></p>\n",

                questions.push({
                    id: "92",
                    section: "18",
                    question_en: "<p>92. <span style=\"font-family: Cambria Math;\">Who was the first Indian to travel to space ?</span></p>\n",

                    solution_en: "<p>92.(c) <span style=\"font-family: Cambria Math;\"><strong>Rakesh Sharma</strong><span style=\"font-weight: 400;\"> (3 April 1984). </span><strong>Kalpana Chawla</strong><span style=\"font-weight: 400;\"> was the first Indian - American astronaut and the first Indian woman in space</span><strong>. Valentina Tereshkova </strong><span style=\"font-weight: 400;\">(Soviet cosmonaut) was the first woman in space.</span></span></p>\n",
                    solution_hi: "<p>92.(c)&nbsp;<strong>&#2352;&#2366;&#2325;&#2375;&#2358; &#2358;&#2352;&#2381;&#2350;&#2366;</strong><span style=\"font-weight: 400;\"> (3 &#2309;&#2346;&#2381;&#2352;&#2376;&#2354; 1984)&#2404; </span><strong>&#2325;&#2354;&#2381;&#2346;&#2344;&#2366; &#2330;&#2366;&#2357;&#2354;&#2366;</strong><span style=\"font-weight: 400;\"> &#2346;&#2361;&#2354;&#2368; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351;-&#2309;&#2350;&#2375;&#2352;&#2367;&#2325;&#2368; &#2309;&#2306;&#2340;&#2352;&#2367;&#2325;&#2381;&#2359; &#2351;&#2366;&#2340;&#2381;&#2352;&#2368; &#2324;&#2352; &#2309;&#2306;&#2340;&#2352;&#2367;&#2325;&#2381;&#2359; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2361;&#2354;&#2368; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2361;&#2367;&#2354;&#2366; &#2341;&#2368;&#2306;&#2404; </span><strong>&#2357;&#2375;&#2354;&#2375;&#2306;&#2335;&#2368;&#2344;&#2366; &#2340;&#2375;&#2352;&#2375;&#2358;&#2381;&#2325;&#2379;&#2357;&#2366;</strong><span style=\"font-weight: 400;\"> (&#2360;&#2379;&#2357;&#2367;&#2351;&#2340; &#2325;&#2377;&#2360;&#2381;&#2350;&#2379;&#2344;&#2377;&#2335;) &#2309;&#2306;&#2340;&#2352;&#2367;&#2325;&#2381;&#2359; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2361;&#2354;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366; &#2341;&#2368;&#2306;&#2404;</span></p>\n",
                    correct: "c",

                questions.push({
                    id: "93",
                    section: "18",
                    question_en: "<p>93. <span style=\"font-family: Cambria Math;\">Which Gharana was propounded by Bade Fateh Ali Khan and Ali Baksh Jarnail Khan?</span></p>\n",

                    solution_en: "<p>93.(c) <strong>Patiala Gharana</strong>. <span style=\"font-family: Cambria Math;\">Malika Pukhraj, Gauhar Jan, Ghulam Ali are all related to Patiala Gharana. Gwalior Gharana : Ghulam Hassan Shaggan, Vasundhara Komkali, Narayanrao Bodas, Sunanda Patnaik. Agra Gharana : Yaqoob Hussain Khan, Yusuf Hussain Khan, Khurshid Hussain Khan, Shamim Ahmed Khan, Ghulam Rasool Khan. Bhendi Bazaar Gharana : Pandit Shivkumar Shukla, Ramesh Nadkarni, T.D. Janorikar. Tansen belonged to Gwalior Gharana.</span></p>\n",
                    solution_hi: "<p>93.(c)&nbsp;<strong>&#2346;&#2335;&#2367;&#2351;&#2366;&#2354;&#2366; &#2328;&#2352;&#2366;&#2344;&#2366;</strong><span style=\"font-weight: 400;\">&#2404; &#2350;&#2354;&#2367;&#2325;&#2366; &#2346;&#2369;&#2326;&#2352;&#2366;&#2332;, &#2327;&#2380;&#2361;&#2352; &#2332;&#2366;&#2344;, &#2327;&#2369;&#2354;&#2366;&#2350; &#2309;&#2354;&#2368; &#2360;&#2349;&#2368; &#2346;&#2335;&#2367;&#2351;&#2366;&#2354;&#2366; &#2328;&#2352;&#2366;&#2344;&#2375; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; </span><strong>&#2327;&#2381;&#2357;&#2366;&#2354;&#2367;&#2351;&#2352; &#2328;&#2352;&#2366;&#2344;&#2366;</strong><span style=\"font-weight: 400;\"> : &#2327;&#2369;&#2354;&#2366;&#2350; &#2361;&#2360;&#2344; &#2358;&#2327;&#2381;&#2327;&#2344;, &#2357;&#2360;&#2369;&#2306;&#2343;&#2352;&#2366; &#2325;&#2379;&#2350;&#2325;&#2354;&#2368;, &#2344;&#2366;&#2352;&#2366;&#2351;&#2339;&#2352;&#2366;&#2357; &#2348;&#2379;&#2342;&#2366;&#2360;, &#2360;&#2369;&#2344;&#2306;&#2342;&#2366; &#2346;&#2335;&#2344;&#2366;&#2351;&#2325;&#2404; </span><strong>&#2310;&#2327;&#2352;&#2366; &#2328;&#2352;&#2366;&#2344;&#2366;</strong><span style=\"font-weight: 400;\"> : &#2351;&#2366;&#2325;&#2370;&#2348; &#2361;&#2369;&#2360;&#2376;&#2344; &#2326;&#2366;&#2344;, &#2351;&#2370;&#2360;&#2369;&#2347; &#2361;&#2369;&#2360;&#2376;&#2344; &#2326;&#2366;&#2344;, &#2326;&#2369;&#2352;&#2381;&#2358;&#2368;&#2342; &#2361;&#2369;&#2360;&#2376;&#2344; &#2326;&#2366;&#2344;, &#2358;&#2350;&#2368;&#2350; &#2309;&#2361;&#2350;&#2342; &#2326;&#2366;&#2344;, &#2327;&#2369;&#2354;&#2366;&#2350; &#2352;&#2360;&#2370;&#2354; &#2326;&#2366;&#2344;&#2404; </span><strong>&#2349;&#2367;&#2306;&#2337;&#2368; &#2348;&#2366;&#2332;&#2366;&#2352; &#2328;&#2352;&#2366;&#2344;&#2366;</strong><span style=\"font-weight: 400;\"> : &#2346;&#2306;&#2337;&#2367;&#2340; &#2358;&#2367;&#2357;&#2325;&#2369;&#2350;&#2366;&#2352; &#2358;&#2369;&#2325;&#2381;&#2354;&#2366;, &#2352;&#2350;&#2375;&#2358; &#2344;&#2366;&#2337;&#2325;&#2352;&#2381;&#2339;&#2368;, &#2335;&#2368;.&#2337;&#2368; &#2332;&#2366;&#2344;&#2379;&#2352;&#2368;&#2325;&#2352;&#2404; &#2340;&#2366;&#2344;&#2360;&#2375;&#2344; &#2327;&#2381;&#2357;&#2366;&#2354;&#2367;&#2351;&#2352; &#2328;&#2352;&#2366;&#2344;&#2375; &#2325;&#2375; &#2341;&#2375;&#2404;</span></p>\n",

                questions.push({
                    id: "94",
                    section: "18",
                    question_en: "<p>94.<span style=\"font-family: Cambria Math;\"> Farmers in some parts of India celebrate the Pola festival by worshiping their _____.</span></p>\n",
                    question_hi: "<p>94.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2366;&#2352;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2369;&#2331;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2367;&#2360;&#2381;&#2360;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2360;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2346;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> _____ </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2370;&#2332;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2379;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2344;&#2366;&#2340;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;&#2404;</span></p>\n",
                    options_en: ["<p>farm tools</p>\n", "<p>ancestors</p>\n", 
                                "<p>farms</p>\n", "<p>bullocks</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2326;&#2375;&#2340;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2332;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2332;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
