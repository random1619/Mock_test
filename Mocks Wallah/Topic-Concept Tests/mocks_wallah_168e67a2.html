<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">12:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 25</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">25</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>

            document.getElementById('section-selector').innerHTML += 
                `<option value="misc">Miscellaneous</option>`;
            
            
                questions.push({
                    id: "1",
                    section: "7",
                    question_en: "<p>1. Select the correctly spelt word</p>",
                    question_hi: "<p>1. Select the correctly spelt word</p>",
                    options_en: ["<p>Agression</p>", "<p>Catalogue</p>", 
                                "<p>Temprature</p>", "<p>Millionare</p>"],
                    options_hi: ["<p>Agression</p>", "<p>Catalogue</p>",
                                "<p>Temprature</p>", "<p>Millionare</p>"],
                    solution_en: "<p>1.(b) Catalogue.<br>Catalogue is the correct spelling.</p>",
                    solution_hi: "<p>1.(b) Catalogue. <br>&lsquo;Catalogue&rsquo; सही spelling है।</p>",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "2",
                    section: "7",
                    question_en: "<p>2. Select the most appropriate option to substitute the underlined segment in the given sentence. If no substitution is required, select No improvement.<br>If he doesn\'t score forty percent in all the subjects, he <span style=\"text-decoration: underline;\">would not be</span> promoted to the next class.</p>",
                    question_hi: "<p>2. Select the most appropriate option to substitute the underlined segment in the given sentence. If no substitution is required, select No improvement.<br>If he doesn\'t score forty percent in all the subjects, he <span style=\"text-decoration: underline;\">would not be</span> promoted to the next class.</p>",
                    options_en: ["<p>was not being</p>", "<p>will not be</p>", 
                                "<p>is not being</p>", "<p>No improvement</p>"],
                    options_hi: ["<p>was not being</p>", "<p>will not be</p>",
                                "<p>is not being</p>", "<p>No improvement</p>"],
                    solution_en: "<p>2.(b) will not be.<br>The verb in the &ldquo;IF Clause&rdquo; is in the present tense. The verb in the &ldquo;main clause&rdquo; is in the simple future. It does not matter which clause comes first. In the given sentence the If clause is in present tense so in the main clause &ldquo;will&rdquo; should be used.</p>",
                    solution_hi: "<p>2.(b) will not be.<br>&ldquo;IF Clause&rdquo; में verb present tense में है। &ldquo;Main clause&rdquo; में verb simple future tense में है। इससे कोई फर्क नहीं पड़ता कि कौन सा clause पहले आता है। दिए गए sentence में IF Clause, present tense में है, इसलिए main clause में \"will\" का प्रयोग किया जाना चाहिए।</p>",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "3",
                    section: "7",
                    question_en: "<p>3. A person who attracts attention with a flashy style.</p>",
                    question_hi: "<p>3. A person who attracts attention with a flashy style.</p>",
                    options_en: ["<p>Glutton</p>", "<p>Flamboyant</p>", 
                                "<p>Jockey</p>", "<p>Vagabond</p>"],
                    options_hi: ["<p>Glutton</p>", "<p>Flamboyant</p>",
                                "<p>Jockey</p>", "<p>Vagabond</p>"],
                    solution_en: "<p>3.(b) <br><strong>Flamboyant</strong> -A person who attracts attention with a flashy style.-<br><strong>Glutton</strong> - an excessively greedy eater.<br><strong>Jockey</strong> - a person who rides in horse races, especially as a profession.<br><strong>Vagabond</strong> -a person who wanders from place to place without a home or job.</p>",
                    solution_hi: "<p>3.(b) <br><strong>Flamboyant</strong> (दिखावटी) - A person who attracts attention with a flashy style.-<br><strong>Glutton</strong> (पेटू) - an excessively greedy eater.<br><strong>Jockey</strong> (घुड़सवार) - a person who rides in horse races, especially as a profession.<br><strong>Vagabond</strong> (घुमक्कड़) - a person who wanders from place to place without a home or job.</p>",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "4",
                    section: "7",
                    question_en: "<p>4. Select the correct indirect narration of the given sentence.<br>She said,\"We visited Uttarakhand in the summer vacation\".</p>",
                    question_hi: "<p>4. Select the correct indirect narration of the given sentence.<br>She said,\"We visited Uttarakhand in the summer vacation\".</p>",
                    options_en: ["<p>She said that they will visit to Uttarakhand in the summer vacation.</p>", "<p>She said that we visited Uttarakhand in the summer vacation.</p>", 
                                "<p>She said that they have visited Uttarakhand in the summer vacation.</p>", "<p>She said that they had visited Uttarakhand in the summer vacation.</p>"],
                    options_hi: ["<p>She said that they will visit to Uttarakhand in the summer vacation.</p>", "<p>She said that we visited Uttarakhand in the summer vacation.</p>",
                                "<p>She said that they have visited Uttarakhand in the summer vacation.</p>", "<p>She said that they had visited Uttarakhand in the summer vacation.</p>"],
                    solution_en: "<p>4.(d) <br>She said that they had visited Uttarakhand in the summer vacation. (Correct)<br>(a) She said that they <span style=\"text-decoration: underline;\">will visit</span> to Uttarakhand in the summer vacation.(Incorrect Tense) <br>(b) She said that <span style=\"text-decoration: underline;\">we visited</span> Uttarakhand in the summer vacation.(Incorrect Tense, Subject) <br>(c) She said that they <span style=\"text-decoration: underline;\">have visited</span> Uttarakhand in the summer vacation.(Incorrect Tense)</p>",
                    solution_hi: "<p>4.(d) <br>She said that they had visited Uttarakhand in the summer vacation. (Correct)<br>(a) She said that they <span style=\"text-decoration: underline;\">will visit</span> to Uttarakhand in the summer vacation.(गलत Tense) <br>(b) She said that <span style=\"text-decoration: underline;\">we visited</span> Uttarakhand in the summer vacation.(गलत Tense, Subject) <br>(c) She said that they <span style=\"text-decoration: underline;\">have visited</span> Uttarakhand in the summer vacation.(गलत Tense)</p>",
                    correct: "d",

                questions.push({

                    question_en: "<p>5. Select the most appropriate word to fill in the blank.<br>The reckless young man was _______ for the debts incurred by him.</p>",
                    question_hi: "<p>5. Select the most appropriate word to fill in the blank.<br>The reckless young man was _______ for the debts incurred by him.</p>",
                    options_en: ["<p>audacious</p>", "<p>liable</p>", 
                                "<p>suspicious</p>", "<p>reliable</p>"],
                    options_hi: ["<p>audacious</p>", "<p>liable</p>",
                                "<p>suspicious</p>", "<p>reliable</p>"],
                    solution_en: "<p>5.(b) <br><strong>Liable</strong> - responsible by law<br><strong>Audacious</strong> - showing a willingness to take surprisingly bold risks.<br><strong>Suspicious</strong> - having or showing a cautious distrust of someone or something.<br><strong>Reliable</strong> - able to be trusted.</p>",
                    solution_hi: "<p>5.(b) <br><strong>Liable</strong> (उत्तरदायी) - responsible by law<br><strong>Audacious</strong> (साहसी) - showing a willingness to take surprisingly bold risks.<br><strong>Suspicious</strong> (संदिग्ध) - having or showing a cautious distrust of someone or something.<br><strong>Reliable</strong> (विश्वसनीय) - able to be trusted.</p>",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "6",
                    section: "7",
                    question_en: "<p>6. Given below are four jumbled sentences. Out of the given options pick the one that gives their correct order. <br>A. It provides training for the development of oral and aural skills and is a great supplement to classroom teaching.<br>B. Technology is growing very fast day by day and is contributing a lot towards improving communication skills.<br>C. Thus, it is the responsibility of a teacher to make the learners understand and their aim is to master the language, not the technology.<br>D. However, it can not be substitute for the conventional method of language teaching.</p>",
                    question_hi: "<p>6. Given below are four jumbled sentences. Out of the given options pick the one that gives their correct order. <br>A. It provides training for the development of oral and aural skills and is a great supplement to classroom teaching.<br>B. Technology is growing very fast day by day and is contributing a lot towards improving communication skills.<br>C. Thus, it is the responsibility of a teacher to make the learners understand and their aim is to master the language, not the technology.<br>D. However, it can not be substitute for the conventional method of language teaching.</p>",
                    options_en: ["<p>BCDA</p>", "<p>ACBD</p>",

                    options_hi: ["<p>BCDA</p>", "<p>ACBD</p>",
                                "<p>BADC</p>", "<p>DACB</p>"],
                    solution_en: "<p>6.(c) BADC<br>Sentence B says that Technology is growing very fast day by day and Sentence A states that It provides training for the development of oral and aural skills and is a great supplement to classroom teaching. A will follow B. Sentence D says that it can not be substituted for the conventional method of language teaching. D will follow A. So, Option (c) BADC is the correct sequence.</p>",
                    solution_hi: "<p>6.(c) BADC<br>Sentence B कहता है कि Technology दिन-प्रतिदिन बहुत तेजी से बढ़ रही है और Sentence A कहता है कि यह oral और aural, skill के विकास के लिए training प्रदान करता है तथा classroom teaching के लिए एक उत्कृष्ट पूरक है। इसलिए, A, B के बाद आएगा। Sentence D कहता है कि इसे language teaching के conventional method के लिए प्रतिस्थापित नहीं किया जा सकता है। इसलिए, D, A के बाद आएगा। अतः, Option (c) BADC में सही sequence है।</p>",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "7",
                    section: "7",
                    question_en: "<p>7. <strong>Cloze Test :</strong><br>Environmental pollution is a global problem and (7) ____ threat to human survival. The causes of pollution are quite (8) ____, such as contamination of water, cutting of trees and forests, emission of toxic gases etc. Due to (9) ____ factors, the flora and fauna are adversely affected. An awareness to protect the environment is everybody\'s (10) ____duty and we should collectively come forward for this noble campaign. Government is taking strong (11) ____ to check the menace of menace.&nbsp;<br>Select the most appropriate option for blank no. 7</p>",
                    question_hi: "<p>7. <strong>Cloze Test :</strong><br>Environmental pollution is a global problem and (7) ____ threat to human survival. The causes of pollution are quite (8) ____, such as contamination of water, cutting of trees and forests, emission of toxic gases etc. Due to (9) ____ factors, the flora and fauna are adversely affected. An awareness to protect the environment is everybody\'s (10) ____duty and we should collectively come forward for this noble campaign. Government is taking strong (11) ____ to check the menace of menace.&nbsp;<br>Select the most appropriate option for blank no. 7</p>",
                    options_en: ["<p>a</p>", "<p>some</p>", 
                                "<p>an</p>", "<p>the</p>"],
                    options_hi: ["<p>a</p>", "<p>some</p>",
                                "<p>an</p>", "<p>the</p>"],
                    solution_en: "<p>7.(a) a.</p>",
                    solution_hi: "<p>7.(a) a.</p>",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "8",

                    solution_en: "<p>25.(c) She behaves in a.<br>A should be removed before such in the phrase - &ldquo;She behaves in a such a cordial manner.&rdquo; &ldquo;a&rdquo; should be used after &ldquo;such&rdquo; not before it. So the correct phrase would be \"She behaves in such a cordial manner\".</p>",
                    solution_hi: "<p>25.(c) She behaves in a.<br>Phrase &ldquo;She behaves in a such a cordial manner&rdquo; में &lsquo;such&rsquo; के पहले &lsquo;a&rsquo; का प्रयोग नहीं करना चाहिए। &ldquo;a&rdquo; का प्रयोग &ldquo;such&rdquo; के बाद होना चाहिए, पहले नहीं। इसलिए सही Phrase \"She behaves in such a cordial manner\" होगा।</p>",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
            
            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();
        }
        
        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML - more compact
            let html = `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="question-text mb-3">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        <div class="options">`;
                        
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = 'option-label';
                
                // When reviewing, highlight user's choice and correct answer
                if (submitted) {
                    if (opt === question.correct) {
                        optionClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[question.id] === opt && opt !== question.correct) {
                        optionClass += ' border-danger bg-danger bg-opacity-10';
                    }
                }
                
                html += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${answers[question.id] === opt ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <label class="form-check-label w-100 ${optionClass}" for="opt-${index}-${opt}">
                            ${submitted && opt === question.correct ? '<i class="fas fa-check-circle text-success me-1"></i>' : ''}
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const alertClass = isCorrect ? 'alert-success' : 'alert-danger';
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="alert ${alertClass} mt-3 py-2">
                        <strong>${resultText}</strong>
                        <div class="mt-1 small">
                            <strong>Solution:</strong>
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
        function nextQuestion() { if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
            
            // Update button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('main-content');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                if (window.innerWidth >= 992) {
                    content.classList.add('with-nav');
                }
            } else {
                nav.classList.remove('show');
                if (window.innerWidth >= 992) {
                    content.classList.remove('with-nav');
                }
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer - compact
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            if (confirm(`You have attempted ${attempted} of ${questions.length} questions.
${remaining} questions are unattempted.

Are you sure you want to submit?`)) {
                submitTest();
            }
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.replace('btn-light', 'btn-success');
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
        
        // Add event listener for window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                if (document.getElementById('question-nav').classList.contains('show')) {
                    document.getElementById('main-content').classList.add('with-nav');
                }
            } else {
                document.getElementById('main-content').classList.remove('with-nav');
            }
        });
    </script>
</body>
</html>
