                                "<p>Dholavira</p>\n", "<p>Mohanjodaro</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2330;&#2344;&#2381;&#2361;&#2369;&#2342;&#2337;&#2364;&#2379;</span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2325;&#2366;&#2354;&#2368;&#2348;&#2306;&#2327;&#2366;</span></p>\n",
                                "<p><span style=\"font-family: Kokila;\">&#2343;&#2379;&#2354;&#2366;&#2357;&#2368;&#2352;&#2366;</span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2350;&#2379;&#2361;&#2344;&#2332;&#2379;&#2342;&#2337;&#2364;&#2379;</span></p>\n"],
                    solution_en: "<p>79.(c) <span style=\"font-family: Cambria Math;\"><strong>Dholavira (</strong><span style=\"font-weight: 400;\">Gujrat; Dholavira\'s location is on the Tropic of Cancer). Discovered in 1967 by J P Joshi. Findings : Figure of chariot tied to a pair of bullocks and driven by a nude human, Water harvesting and number of reservoirs, use of rocks for constructions. Another prominent Indus Valley&nbsp; site in Gujarat is </span><strong>Lothal</strong><span style=\"font-weight: 400;\"> (discovered by S.R.Rao in 1955. </span><strong>Chanhudaro</strong><span style=\"font-weight: 400;\"> (Pakistan: by N.G Majumdar in 1931). </span><strong>Kalibangan </strong><span style=\"font-weight: 400;\">(Rajasthan; Ghose in 1953) and </span><strong>Mohenjo Daro </strong><span style=\"font-weight: 400;\">(Pakistan; 1922 by R.D. Banerjee).</span></span></p>\n",
                    solution_hi: "<p>79.(c)<span style=\"font-family: Cambria Math;\">&nbsp;</span><strong>&#2343;&#2379;&#2354;&#2366;&#2357;&#2368;&#2352;&#2366; </strong><span style=\"font-weight: 400;\">(&#2327;&#2369;&#2332;&#2352;&#2366;&#2340;; &#2343;&#2379;&#2354;&#2366;&#2357;&#2368;&#2352;&#2366; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2352;&#2381;&#2325; &#2352;&#2375;&#2326;&#2366; &#2346;&#2352; &#2361;&#2376;)&#2404; 1967 &#2350;&#2375;&#2306; &#2332;&#2375; &#2346;&#2368; &#2332;&#2379;&#2358;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2326;&#2379;&#2332;&#2366; &#2327;&#2351;&#2366;&#2404; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;: &#2352;&#2341; &#2325;&#2368; &#2319;&#2325; &#2332;&#2379;&#2337;&#2364;&#2368; &#2348;&#2376;&#2354;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2332;&#2379;&#2337;&#2364;&#2368; &#2360;&#2375; &#2348;&#2306;&#2343;&#2375; &#2324;&#2352; &#2344;&#2327;&#2381;&#2344; &#2350;&#2366;&#2344;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2306;&#2330;&#2366;&#2354;&#2367;&#2340;, &#2332;&#2354; &#2360;&#2306;&#2330;&#2351;&#2344; &#2324;&#2352; &#2332;&#2354;&#2366;&#2358;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327;&#2404; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2350;&#2375;&#2306; &#2319;&#2325; &#2309;&#2344;&#2381;&#2351; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2381;&#2341;&#2354; </span><strong>&#2354;&#2379;&#2341;&#2354; </strong><span style=\"font-weight: 400;\">&#2361;&#2376; (1955 &#2350;&#2375;&#2306; &#2319;&#2360;.&#2310;&#2352;.&#2352;&#2366;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2326;&#2379;&#2332;&#2366; &#2327;&#2351;&#2366;&#2404; &#2330;&#2344;&#2381;&#2361;&#2369;&#2342;&#2337;&#2364;&#2379; (&#2346;&#2366;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344;: 1931 &#2350;&#2375;&#2306; &#2319;&#2344;.&#2332;&#2368;. &#2350;&#2332;&#2370;&#2350;&#2342;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366;)&#2404; </span><strong>&#2325;&#2366;&#2354;&#2368;&#2348;&#2306;&#2327;&#2344; </strong><span style=\"font-weight: 400;\">(&#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;; 1953 &#2350;&#2375;&#2306; &#2328;&#2379;&#2359;) &#2324;&#2352; &#2350;&#2379;&#2361;&#2344;&#2332;&#2379; &#2342;&#2366;&#2352;&#2379; (&#2346;&#2366;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344;; 1922 &#2310;&#2352;&#2337;&#2368; &#2348;&#2344;&#2352;&#2381;&#2332;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366;)&#2404;</span></p>\n",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "80",
                    section: "18",
                    question_en: "<p>80. <span style=\"font-family: Cambria Math;\">Which of the following Upvedas is associated with Rig Veda?</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\n",
                    question_hi: "<p>80.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2380;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2346;&#2357;&#2375;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2315;&#2327;&#2381;&#2357;&#2375;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\n",
                    options_en: ["<p>Dhanurveda</p>\n", "<p>Ayurveda</p>\n", 
                                "<p>Gandharva Veda</p>\n", "<p>Shilpa Veda</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2343;&#2344;&#2369;&#2352;&#2381;&#2357;&#2375;&#2342;</span><span style=\"font-family: Cambria Math;\">:</span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2369;&#2352;&#2381;&#2357;&#2375;&#2342;</span></p>\n",
                                "<p><span style=\"font-family: Kokila;\">&#2327;&#2306;&#2343;&#2352;&#2381;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2375;&#2342;</span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2358;&#2367;&#2354;&#2381;&#2346;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2375;&#2342;</span></p>\n"],
                    solution_en: "<p>80.(b) <span style=\"font-family: Cambria Math;\">&nbsp;<strong>Ayurveda </strong><span style=\"font-weight: 400;\">is Upveda of Rigveda. Ayurveda deals with medicine.&nbsp; </span><strong>Dhanurveda </strong><span style=\"font-weight: 400;\">is the upveda of Yajurveda which deals with archery. </span><strong>Gandharveda </strong><span style=\"font-weight: 400;\">is the upveda of Sama Veda which deals with dance and music. </span><strong>Shilpveda </strong><span style=\"font-weight: 400;\">is the upveda of Atharva Veda which deals with architecture.</span></span></p>\n",
                    solution_hi: "<p>80.(b)<span style=\"font-family: Cambria Math;\"> &nbsp;</span><strong>&#2310;&#2351;&#2369;&#2352;&#2381;&#2357;&#2375;&#2342;</strong><span style=\"font-weight: 400;\"> &#2315;&#2327;&#2381;&#2357;&#2375;&#2342; &#2325;&#2366; &#2313;&#2346;&#2357;&#2375;&#2342; &#2361;&#2376;&#2404; &#2310;&#2351;&#2369;&#2352;&#2381;&#2357;&#2375;&#2342; &#2330;&#2367;&#2325;&#2367;&#2340;&#2381;&#2360;&#2366; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; </span><strong>&#2343;&#2344;&#2369;&#2352;&#2381;&#2357;&#2375;&#2342; </strong><span style=\"font-weight: 400;\">&#2351;&#2332;&#2369;&#2352;&#2381;&#2357;&#2375;&#2342; &#2325;&#2366; &#2313;&#2346;&#2357;&#2375;&#2342; &#2361;&#2376; &#2332;&#2379; &#2343;&#2344;&#2369;&#2352;&#2381;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; </span><strong>&#2327;&#2306;&#2343;&#2352;&#2381;&#2357;&#2357;&#2375;&#2342;</strong><span style=\"font-weight: 400;\"> &#2360;&#2366;&#2350;&#2357;&#2375;&#2342; &#2325;&#2366; &#2313;&#2346;&#2357;&#2375;&#2342; &#2361;&#2376; &#2332;&#2379; &#2344;&#2371;&#2340;&#2381;&#2351; &#2324;&#2352; &#2360;&#2306;&#2327;&#2368;&#2340; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; </span><strong>&#2358;&#2367;&#2354;&#2381;&#2346;&#2357;&#2375;&#2342;</strong><span style=\"font-weight: 400;\"> &#2309;&#2341;&#2352;&#2381;&#2357;&#2357;&#2375;&#2342; &#2325;&#2366; &#2313;&#2346;&#2357;&#2375;&#2342; &#2361;&#2376; &#2332;&#2379; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2354;&#2366; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</span></p>\n",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "81",
                    section: "18",
                    question_en: "<p>81. <span style=\"font-family: Cambria Math;\">The philosophy of the eightfold path (eight types of verses) was propounded by?</span></p>\n",
                    question_hi: " <p>81. </span><span style=\"font-family:Kokila\">अष्टांगिक</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">मार्ग</span><span style=\"font-family:Cambria Math\"> (</span><span style=\"font-family:Kokila\">आठ</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">प्रकार</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">के</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">पद</span><span style=\"font-family:Cambria Math\">) </span><span style=\"font-family:Kokila\">का</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">तत्वज्ञान</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">निम्नलिखित</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">में</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">से</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">किसके</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">द्वारा</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">प्रतिपादित</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">किया</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">गया</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">था</span><span style=\"font-family:Cambria Math\">?</span></p>",
                    options_en: ["<p>Mahavir Swami</p>\n", "<p>Shankaracharya</p>\n", 
                                "<p>Gautam Buddha</p>\n", "<p>Ramanuja</p>\n"],
                    options_hi: [" <p> </span><span style=\"font-family:Kokila\">महावीर</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">स्वामी</span></p>", " <p> </span><span style=\"font-family:Kokila\">शंकराचार्य</span></p>",
                                " <p> </span><span style=\"font-family:Kokila\">गौतम</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">बुद्ध</span><span style=\"font-family:Cambria Math\">  </span></p>", " <p> </span><span style=\"font-family:Kokila\">रामानुज</span></p>"],
                    solution_en: "<p>81.(c) <span style=\"font-family: Cambria Math;\">The philosophy of the eightfold path (eight types of verses) was propounded by Goutam Buddha. </span><span style=\"font-family: Cambria Math;\">The Eightfold Path consists of eight practices: right view, right resolve, right speech, right conduct, right livelihood, right effort, right mindfulness, and right samadhi . </span></p>\n",
                    solution_hi: " <p>81.(c) </span><span style=\"font-family:Kokila\">अष्टांग</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">मार्ग</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">का</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">दर्शन</span><span style=\"font-family:Cambria Math\"> (</span><span style=\"font-family:Kokila\">आठ</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">प्रकार</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">के</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">छंद</span><span style=\"font-family:Cambria Math\">) </span><span style=\"font-family:Kokila\">गौतम</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">बुद्ध</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">द्वारा</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">प्रतिपादित</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">किया</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">गया</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">था।</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">अष्टांगिक</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">मार्ग</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">में</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">आठ</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">अभ्यास</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">होते</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">हैं</span><span style=\"font-family:Cambria Math\">: </span><span style=\"font-family:Kokila\">सम्यक</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">दृष्टि</span><span style=\"font-family:Cambria Math\">, </span><span style=\"font-family:Kokila\">सम्यक</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">संकल्प</span><span style=\"font-family:Cambria Math\">, </span><span style=\"font-family:Kokila\">सम्यक</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">वाक</span><span style=\"font-family:Cambria Math\"> , </span><span style=\"font-family:Kokila\">सम्यक</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">आचरण</span><span style=\"font-family:Cambria Math\">, </span><span style=\"font-family:Kokila\">सम्यक</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">जीविका</span><span style=\"font-family:Cambria Math\">, </span><span style=\"font-family:Kokila\">सम्यक</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">व्यायाम</span><span style=\"font-family:Cambria Math\"> , </span><span style=\"font-family:Kokila\">सम्यक</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">स्मृति</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">और</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">सम्यक</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">समाधि।</span></p>",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "82",
                    section: "18",
                    question_en: "<p>82.<span style=\"font-family: Cambria Math;\"> Who among the following was the founding chairman of the Central Social Welfare Board?</span></p>\n",
                    question_hi: "<p>82.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2380;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2354;&#2381;&#2351;&#2366;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2379;&#2352;&#2381;&#2337;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2341;&#2375;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Sarojini Naidu</p>\n", "<p>Shyama Prasad Mukherjee</p>\n", 
                                "<p>Somnath Lahiri</p>\n", "<p>Durgabai Deshmukh</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2360;&#2352;&#2379;&#2332;&#2367;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2366;&#2351;&#2337;&#2370;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2358;&#2381;&#2351;&#2366;&#2350;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2360;&#2366;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2369;&#2326;&#2352;&#2381;&#2332;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
                                "<p><span style=\"font-family: Kokila;\">&#2360;&#2379;&#2350;&#2344;&#2366;&#2341;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2361;&#2367;&#2396;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2342;&#2369;&#2352;&#2381;&#2327;&#2366;&#2348;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2375;&#2358;&#2350;&#2369;&#2326;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n"],
                    solution_en: "<p>82.(d) <span style=\"font-family: Cambria Math;\">&nbsp;<strong>The Central Social Welfare Board</strong><span style=\"font-weight: 400;\"> was established in 1953 by a Resolution of Govt. of India to carry out welfare activities for promoting voluntarism for the general welfare of families, women, and children. </span><strong>Founder Chairperson-</strong><span style=\"font-weight: 400;\"> Dr. Durgabai Deshmukh. </span><strong>Current Chairman- </strong><span style=\"font-weight: 400;\">Aastha Saxena Khatwani.&nbsp;</span></span></p>\n",
                    solution_hi: "<p>82.(d) <strong>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2360;&#2350;&#2366;&#2332; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2348;&#2379;&#2352;&#2381;&#2337; </strong><span style=\"font-weight: 400;\">&#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; 1953 &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352;&#2379;&#2306;, &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2324;&#2352; &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2381;&#2357;&#2376;&#2330;&#2381;&#2331;&#2367;&#2325;&#2340;&#2366; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339;&#2325;&#2366;&#2352;&#2368; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2319;&#2325; &#2360;&#2306;&#2325;&#2354;&#2381;&#2346; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404; </span><strong>&#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;-</strong><span style=\"font-weight: 400;\"> &#2337;&#2377;. &#2342;&#2369;&#2352;&#2381;&#2327;&#2366;&#2348;&#2366;&#2312; &#2342;&#2375;&#2358;&#2350;&#2369;&#2326;&#2404; </span><strong>&#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</strong><span style=\"font-weight: 400;\">- &#2310;&#2360;&#2381;&#2341;&#2366; &#2360;&#2325;&#2381;&#2360;&#2375;&#2344;&#2366; &#2326;&#2335;&#2357;&#2366;&#2344;&#2368;&#2404;</span></p>\n",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "83",
                    section: "18",
                    question_en: "<p>83.<span style=\"font-family: Cambria Math;\"> When was the fifth session of the Constituent Assembly held?</span></p>\n",
                    question_hi: "<p>83.<span style=\"font-family: Kokila;\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2349;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2366;&#2305;&#2330;&#2357;&#2366;&#2305;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2340;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2348;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2379;&#2332;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2341;&#2366;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>27-30 January 1948</p>\n", "<p>14-30 August 1947</p>\n", 
                                "<p>9-23 December 1946</p>\n", "<p>14-31 July 1947</p>\n"],
                    options_hi: ["<p>27-30 <span style=\"font-family: Kokila;\">&#2332;&#2344;&#2357;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> 1948 </span></p>\n", "<p>14-30 <span style=\"font-family: Kokila;\">&#2309;&#2327;&#2360;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> 1947 </span></p>\n",
                                "<p>9-23 <span style=\"font-family: Kokila;\">&#2342;&#2367;&#2360;&#2306;&#2348;&#2352;</span><span style=\"font-family: Cambria Math;\"> 1946 </span></p>\n", "<p>14-31 <span style=\"font-family: Kokila;\">&#2332;&#2369;&#2354;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> 1947 </span></p>\n"],
                    solution_en: "<p>83.(b) <span style=\"font-family: Cambria Math;\"><strong>There were 11 sessions of the Constituent Assembly. First:</strong><span style=\"font-weight: 400;\"> 9-23 December 1946, </span><strong>Second:</strong><span style=\"font-weight: 400;\">20-25 January, 1947, </span><strong>Third:</strong><span style=\"font-weight: 400;\"> 28 April &ndash; 2 May 1947,</span><strong> Fourth:</strong><span style=\"font-weight: 400;\">14-31 July, 1947, </span><strong>Fifth:</strong><span style=\"font-weight: 400;\">14-30 August, 1947,</span><strong> Sixth: </strong><span style=\"font-weight: 400;\">27 January, 1948,</span><strong> Seventh:</strong><span style=\"font-weight: 400;\"> 4 November,1948 &ndash; 8 January, 1949,</span><strong> Eighth:</strong><span style=\"font-weight: 400;\">16 May &ndash; 16 June, 1949, </span><strong>Ninth:</strong><span style=\"font-weight: 400;\"> 30 July &ndash; 18 September, 1949, </span><strong>Tenth :</strong><span style=\"font-weight: 400;\"> 6-17 October, 194 and </span><strong>Eleventh:</strong><span style=\"font-weight: 400;\"> 14-26 November, 1949</span></span></p>\n",
                    solution_hi: "<p>83.(b)&nbsp; <strong>&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2375; 11 &#2360;&#2340;&#2381;&#2352; &#2361;&#2369;&#2319;, &#2346;&#2361;&#2354;&#2366;:</strong><span style=\"font-weight: 400;\"> 9-23 &#2342;&#2367;&#2360;&#2306;&#2348;&#2352; 1946, </span><strong>&#2342;&#2370;&#2360;&#2352;&#2366;</strong><span style=\"font-weight: 400;\">: 20-25 &#2332;&#2344;&#2357;&#2352;&#2368;, 1947, </span><strong>&#2340;&#2368;&#2360;&#2352;&#2366;</strong><span style=\"font-weight: 400;\">: 28 &#2309;&#2346;&#2381;&#2352;&#2376;&#2354; &ndash; 2 &#2350;&#2312; 1947, </span><strong>&#2330;&#2380;&#2341;&#2366;</strong><span style=\"font-weight: 400;\">: 14-31 &#2332;&#2369;&#2354;&#2366;&#2312;, 1947, </span><strong>&#2346;&#2366;&#2306;&#2330;&#2357;&#2366;&#2306;</strong><span style=\"font-weight: 400;\">: 14-30 &#2309;&#2327;&#2360;&#2381;&#2340;, 1947, </span><strong>&#2331;&#2336;&#2366;</strong><span style=\"font-weight: 400;\">: 27 &#2332;&#2344;&#2357;&#2352;&#2368;, 1948 </span><strong>&#2360;&#2366;&#2340;&#2357;&#2366;&#2306;</strong><span style=\"font-weight: 400;\">: 4 &#2344;&#2357;&#2306;&#2348;&#2352;, 1948 - 8 &#2332;&#2344;&#2357;&#2352;&#2368;, 1949, </span><strong>&#2310;&#2336;&#2357;&#2366;&#2306;</strong><span style=\"font-weight: 400;\">: 16 &#2350;&#2312; - 16 &#2332;&#2370;&#2344;, 1949, </span><strong>&#2344;&#2380;&#2357;&#2366;&#2306;</strong><span style=\"font-weight: 400;\">: 30 &#2332;&#2369;&#2354;&#2366;&#2312; - 18 &#2360;&#2367;&#2340;&#2306;&#2348;&#2352;, 1949, </span><strong>&#2342;&#2360;&#2357;&#2366;&#2306;</strong><span style=\"font-weight: 400;\">: 6-17 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;, 194 &#2324;&#2352; </span><strong>&#2327;&#2381;&#2351;&#2366;&#2352;&#2361;&#2357;&#2366;&#2306;</strong><span style=\"font-weight: 400;\">: 14-26 &#2344;&#2357;&#2306;&#2348;&#2352;, 1949 .</span></p>\n",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "84",
                    section: "18",
                    question_en: "<p>84.<span style=\"font-family: Cambria Math;\"> Who was the first Indian member of British Parliament ?</span></p>\n",
                    question_hi: "<p>84. <span style=\"font-family: Kokila;\">&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2360;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2361;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2342;&#2360;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2380;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2341;&#2375;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Rustombhoi Cowasjee</p>\n", "<p>Dadabhai Naoroji</p>\n", 
                                "<p>Surendranath Banerjee</p>\n", "<p>Jamshed Nanabhoy</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2352;&#2369;&#2360;&#2381;&#2340;&#2306;&#2349;&#2379;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;&#2357;&#2366;&#2360;&#2332;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2342;&#2366;&#2342;&#2366;&#2349;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2380;&#2352;&#2379;&#2332;&#2368;</span></p>\n",
                                "<p><span style=\"font-family: Kokila;\">&#2360;&#2369;&#2352;&#2375;&#2306;&#2342;&#2381;&#2352;&#2344;&#2366;&#2341;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2344;&#2352;&#2381;&#2332;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2332;&#2350;&#2358;&#2375;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2366;&#2344;&#2366;&#2349;&#2379;&#2311;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n"],
                    solution_en: "<p>84.(b)<strong><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Dadabhai Naoroji</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>(Grand old man of India or unofficial ambassador of India) was the first Indian to be elected as a member of the British House of Commons from 1892 to 1895. He was of the view that Indians should participate in British political institutions and raise their voice in it.</span></p>\n",

                    solution_en: "<p>85.(b<span style=\"font-family: Cambria Math;\">) </span><span style=\"font-family: Cambria Math;\">&nbsp;<strong>Evaporation </strong><span style=\"font-weight: 400;\">is the process by which water changes from a liquid to a gas or vapour.&nbsp; </span><strong>Condensation </strong><span style=\"font-weight: 400;\">is the process where water vapour becomes liquid.</span><span style=\"font-weight: 400;\"> Change of solid state into liquid is called </span><strong>Melting (</strong><strong>fusion)</strong><span style=\"font-weight: 400;\">. </span><strong>Sublimation</strong><span style=\"font-weight: 400;\"> is conversion of a substance from the</span><span style=\"font-weight: 400;\"> solid to the gaseous state without its becoming liquid. </span><strong>Vaporization </strong><span style=\"font-weight: 400;\">is&nbsp; conversion of a substance from the liquid or solid phase into the gaseous (vapour) phase.</span></span></p>\n",
                    solution_hi: "<p>85.(b<span style=\"font-family: Cambria Math;\">)&nbsp;</span><span style=\"font-weight: 400;\">&nbsp;</span><strong>&#2357;&#2366;&#2359;&#2381;&#2346;&#2368;&#2325;&#2352;&#2339;</strong><span style=\"font-weight: 400;\">(</span><strong>Evaporation</strong><span style=\"font-weight: 400;\">)&#2357;&#2361; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2366;&#2344;&#2368; &#2319;&#2325; &#2340;&#2352;&#2354; &#2360;&#2375; &#2327;&#2376;&#2360; &#2351;&#2366; &#2357;&#2366;&#2359;&#2381;&#2346; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; </span><strong>&#2360;&#2306;&#2328;&#2344;&#2344; </strong><span style=\"font-weight: 400;\">&#2357;&#2361; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2332;&#2354; &#2357;&#2366;&#2359;&#2381;&#2346; &#2340;&#2352;&#2354; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2336;&#2379;&#2360; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; </span><strong>&#2360;&#2306;&#2354;&#2351;&#2344; (Melting )</strong><span style=\"font-weight: 400;\">&#2325;&#2361;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; </span><strong>&#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2346;&#2366;&#2340;&#2344;</strong><span style=\"font-weight: 400;\"> &#2325;&#2367;&#2360;&#2368; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2366; &#2348;&#2367;&#2344;&#2366; &#2342;&#2381;&#2352;&#2357; &#2348;&#2344;&#2375; &#2336;&#2379;&#2360; &#2360;&#2375; &#2327;&#2376;&#2360;&#2368;&#2351; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2361;&#2376;&#2404; </span>  Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2366;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2326;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2375;&#2342;&#2366;&#2306;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2367;&#2306;&#2342;&#2369;&#2360;&#2381;&#2340;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2367;&#2306;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2367;&#2350;&#2367;&#2335;&#2375;&#2337;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2344;&#2366;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2319;&#2327;&#2366;&#2404;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2358;&#2381;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2348;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2337;&#2364;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2335;&#2375;&#2337;&#2367;&#2351;&#2350;</span><span style=\"font-family: Cambria Math;\">: </span><span style=\"font-family: Kokila;\">&#2344;&#2352;&#2375;&#2306;&#2342;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2379;&#2342;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2335;&#2375;&#2337;&#2367;&#2351;&#2350;</span><span style=\"font-family: Cambria Math;\"> (</span><span style=\"font-family: Kokila;\">&#2327;&#2369;&#2332;&#2352;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\">)</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2360;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2348;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2337;&#2364;&#2366;</span><span style=\"font-family: Cambria Math;\">: </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2354;&#2348;&#2352;&#2381;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2381;&#2352;&#2366;&#2313;&#2306;&#2337;</span><span style=\"font-family: Cambria Math;\"> (</span><span style=\"font-family: Kokila;\">&#2321;&#2360;&#2381;&#2335;&#2381;&#2352;&#2375;&#2354;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\">)</span></p>\n",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
            
            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();
        }
        
        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML - more compact
            let html = `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="question-text mb-3">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        <div class="options">`;
                        
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = 'option-label';
                
                // When reviewing, highlight user's choice and correct answer
                if (submitted) {
                    if (opt === question.correct) {
                        optionClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[question.id] === opt && opt !== question.correct) {
                        optionClass += ' border-danger bg-danger bg-opacity-10';
                    }
                }
                
                html += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${answers[question.id] === opt ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <label class="form-check-label w-100 ${optionClass}" for="opt-${index}-${opt}">
                            ${submitted && opt === question.correct ? '<i class="fas fa-check-circle text-success me-1"></i>' : ''}
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const alertClass = isCorrect ? 'alert-success' : 'alert-danger';
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="alert ${alertClass} mt-3 py-2">
                        <strong>${resultText}</strong>
                        <div class="mt-1 small">
                            <strong>Solution:</strong>
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
        function nextQuestion() { if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
            
            // Update button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('main-content');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                if (window.innerWidth >= 992) {
                    content.classList.add('with-nav');
                }
            } else {
                nav.classList.remove('show');
                if (window.innerWidth >= 992) {
                    content.classList.remove('with-nav');
                }
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer - compact
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            if (confirm(`You have attempted ${attempted} of ${questions.length} questions.
${remaining} questions are unattempted.

Are you sure you want to submit?`)) {
                submitTest();
            }
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.replace('btn-light', 'btn-success');
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
        
        // Add event listener for window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                if (document.getElementById('question-nav').classList.contains('show')) {
                    document.getElementById('main-content').classList.add('with-nav');
                }
            } else {
                document.getElementById('main-content').classList.remove('with-nav');
            }
        });
    </script>
</body>
