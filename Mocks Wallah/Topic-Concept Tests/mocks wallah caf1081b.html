                questions.push({
                    id: "24",
                    section: "17",
                    question_en: "<p>24. An alloy contains 40% Zinc and rest Iron. When 12 kg of Zinc and 28 kg of Iron is added to it, the new ratio of Zinc to Iron becomes 3:5. Find the initial quantity of the alloy.</p>",
                    question_hi: "<p><span style=\"font-family: Baloo;\">24. किसी मिश्रधातु में 40% जस्ता और शेष लोहा है | जब इसमें 12 किलो ग्राम जस्ता और 28 किलो ग्राम लोहा मिलाया जाता है, तो जस्ता और लोहे का नया अनुपात 3 : 5 हो जाता है | इस मिश्रधातु की आरंभिक मात्रा ज्ञात करें | </span></p>",
                    options_en: ["<p>180<span style=\"font-family: Times New Roman;\"> </span></p>", "<p>150<span style=\"font-family: Times New Roman;\"> </span></p>", 
                                "<p>120<span style=\"font-family: Times New Roman;\"> </span></p>", "<p>80</p>"],
                    options_hi: ["<p><span style=\"font-family: Times New Roman;\">180</span></p>", "<p><span style=\"font-family: Times New Roman;\">150</span></p>",
                                "<p><span style=\"font-family: Times New Roman;\">120</span></p>", "<p><span style=\"font-family: Times New Roman;\">80</span></p>"],
                    solution_en: "<p><span style=\"font-family: Times New Roman;\">(c) Let the initial quantity of Zinc and Iron in the alloy be 2x kg and 3x kg, respectively.</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">According to the question, </span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>2</mn><mi mathvariant=\"normal\">x</mi><mo>+</mo><mn>12</mn></mrow><mrow><mn>3</mn><mi mathvariant=\"normal\">x</mi><mo>+</mo><mn>28</mn></mrow></mfrac><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mfrac><mn>3</mn><mn>5</mn></mfrac></math></p>\r\n<p><span style=\"font-family: Times New Roman;\">Or, 10x + 60 = 9x + 84</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Or, x = 24 kg</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Therefore, initial quantity of alloy = 2x + 3x = 5x = 120 kg</span></p>",
                    solution_hi: "<p><span style=\"font-family: Times New Roman;\">(c)माना मिश्रधातु में जिंक और आयरन की प्रारंभिक मात्रा क्रमशः 2x किग्रा और 3x किग्रा है.</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">प्रश्न के अनुसार, </span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>2</mn><mi mathvariant=\"normal\">x</mi><mo>+</mo><mn>12</mn></mrow><mrow><mn>3</mn><mi mathvariant=\"normal\">x</mi><mo>+</mo><mn>28</mn></mrow></mfrac><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mfrac><mn>3</mn><mn>5</mn></mfrac></math></p>\r\n<p><span style=\"font-family: Times New Roman;\">या&nbsp;, 10x + 60 = 9x + 84</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">या&nbsp;, x = 24 kg</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">अत: मिश्रधातु की प्रारंभिक मात्रा = 2x + 3x = 5x = 120 kg</span></p>",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "25",
                    section: "misc",
                    question_en: "<p>25. <span style=\"font-family: Times New Roman;\">What is the simplified value of&nbsp; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>sec</mi><mn>6</mn></msup><mi mathvariant=\"normal\">A</mi><mo>-</mo><msup><mi>tan</mi><mn>6</mn></msup><mi mathvariant=\"normal\">A</mi><mo>-</mo><mn>3</mn><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>.</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi></math></span><span style=\"font-family: Times New Roman;\">&nbsp;</span><span style=\"font-family: Times New Roman;\">? </span></p>",
                    question_hi: "<p><span style=\"font-family: Times New Roman;\">2</span><span style=\"font-family: Times New Roman;\">5. <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>sec</mi><mn>6</mn></msup><mi mathvariant=\"normal\">A</mi><mo>-</mo><msup><mi>tan</mi><mn>6</mn></msup><mi mathvariant=\"normal\">A</mi><mo>-</mo><mn>3</mn><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>.</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi></math></span><span style=\"font-family: Times New Roman;\">&nbsp;</span><span style=\"font-family: Baloo;\">&#2325;&#2366; &#2360;&#2352;&#2354;&#2368;&#2325;&#2371;&#2340; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; ? </span><span style=\"font-family: Times New Roman;\"> </span></p>\n",
                    options_en: ["<p>-1</p>", "<p>0</p>", 
                                "<p>1<span style=\"font-family: Times New Roman;\"> </span></p>", "<p>secA.tanA</p>"],
                    options_hi: ["<p>-1</p>\n", "<p>0</p>\n",
                                "<p>1</p>\n", "<p>secA.tanA</p>\n"],
                    solution_en: "<p><span style=\"font-family: Times New Roman;\">(c) Put A = 0 </span></p>\r\n<p><span style=\"font-family: Times New Roman;\">And we know that sec (0) = 1 and tan (0) = 0 </span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>sec</mi><mn>6</mn></msup><mi mathvariant=\"normal\">A</mi><mo>-</mo><msup><mi>tan</mi><mn>6</mn></msup><mi mathvariant=\"normal\">A</mi><mo>-</mo><mn>3</mn><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>.</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>1</mn><mo>-</mo><mn>0</mn><mo>-</mo><mn>3</mn><mo>&#215;</mo><mn>1</mn><mo>&#215;</mo><mn>0</mn><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>1</mn><mspace linebreak=\"newline\"></mspace><mi>The</mi><mo>&#160;</mo><mi>required</mi><mo>&#160;</mo><mi>value</mi><mo>&#160;</mo><mn>1</mn></math></p>\r\n<p>&nbsp;</p>",
                    solution_hi: "<p><span style=\"font-family: Times New Roman;\">(c)&nbsp;</span></p>\r\n<p><span style=\"font-family: Times New Roman;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>sec</mi><mn>6</mn></msup><mi mathvariant=\"normal\">A</mi><mo>-</mo><msup><mi>tan</mi><mn>6</mn></msup><mi mathvariant=\"normal\">A</mi><mo>-</mo><mn>3</mn><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>.</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mo>=</mo><msup><mrow><mo>(</mo><mi>s</mi><mi>e</mi><msup><mi>c</mi><mn>2</mn></msup><mi>A</mi><mo>)</mo></mrow><mn>3</mn></msup><mo>-</mo><msup><mrow><mo>(</mo><msup><mi>tan</mi><mn>2</mn></msup><mi>A</mi><mo>)</mo></mrow><mn>3</mn></msup><mo>-</mo><mn>3</mn><mo>(</mo><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mo>.</mo><mo>(</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mspace linebreak=\"newline\"></mspace><mo>=</mo><mo>(</mo><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mo>&nbsp;</mo><mo>[</mo><msup><mrow><mo>(</mo><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo></mrow><mn>2</mn></msup><mo>+</mo><mo>(</mo><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mo>.</mo><mo>(</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mo>+</mo><msup><mrow><mo>(</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo></mrow><mn>2</mn></msup><mo>]</mo><mo>-</mo><mn>3</mn><mo>(</mo><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mo>.</mo><mo>(</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mspace linebreak=\"newline\"></mspace><mo>=</mo><mn>1</mn><mo>[</mo><msup><mrow><mo>(</mo><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo></mrow><mn>2</mn></msup><mo>+</mo><mn>3</mn><mo>(</mo><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mo>.</mo><mo>(</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mo>]</mo><mo>-</mo><mn>3</mn><mo>(</mo><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mo>.</mo><mo>(</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mspace linebreak=\"newline\"></mspace><mo>=</mo><mn>1</mn><mo>+</mo><mn>3</mn><mo>(</mo><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mo>.</mo><mo>(</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mo>-</mo><mn>3</mn><mo>(</mo><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mo>.</mo><mo>(</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>)</mo><mspace linebreak=\"newline\"></mspace><mo>=</mo><mn>1</mn></math></span></p>\r\n<p><span style=\"font-family: Times New Roman;\"><strong>Alternate soln:</strong></span></p>\r\n<p><span style=\"font-family: Times New Roman;\">A = 0 &#2352;&#2326;&#2344;&#2375; ,</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">&nbsp;&#2361;&#2350; &#2332;&#2366;&#2344;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367;&nbsp; sec (0) = 1 &#2324;&#2352; tan (0) = 0 </span></p>\r\n<p><math style=\"font-family: Verdana;\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>sec</mi><mn>6</mn></msup><mi mathvariant=\"normal\">A</mi><mo>-</mo><msup><mi>tan</mi><mn>6</mn></msup><mi mathvariant=\"normal\">A</mi><mo>-</mo><mn>3</mn><msup><mi>sec</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>.</mo><msup><mi>tan</mi><mn>2</mn></msup><mi mathvariant=\"normal\">A</mi><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>1</mn><mo>-</mo><mn>0</mn><mo>-</mo><mn>3</mn><mo>&times;</mo><mn>1</mn><mo>&times;</mo><mn>0</mn><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>1</mn><mspace linebreak=\"newline\"></mspace><mi>&#2310;&#2357;&#2358;&#2381;&#2351;&#2325;</mi><mo>&nbsp;</mo><mo>&nbsp;</mo><mi>&#2350;&#2366;&#2344;</mi><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>1</mn></math></p>\r\n<p>&nbsp;</p>\n",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
            
            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();
        }
        
        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML - more compact
            let html = `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="question-text mb-3">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        <div class="options">`;
                        
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = 'option-label';
                
                // When reviewing, highlight user's choice and correct answer
                if (submitted) {
                    if (opt === question.correct) {
                        optionClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[question.id] === opt && opt !== question.correct) {
                        optionClass += ' border-danger bg-danger bg-opacity-10';
                    }
                }
                
                html += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${answers[question.id] === opt ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <label class="form-check-label w-100 ${optionClass}" for="opt-${index}-${opt}">
                            ${submitted && opt === question.correct ? '<i class="fas fa-check-circle text-success me-1"></i>' : ''}
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const alertClass = isCorrect ? 'alert-success' : 'alert-danger';
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="alert ${alertClass} mt-3 py-2">
                        <strong>${resultText}</strong>
                        <div class="mt-1 small">
                            <strong>Solution:</strong>
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
        function nextQuestion() { if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
            
            // Update button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('main-content');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                if (window.innerWidth >= 992) {
                    content.classList.add('with-nav');
                }
            } else {
                nav.classList.remove('show');
                if (window.innerWidth >= 992) {
                    content.classList.remove('with-nav');
                }
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer - compact
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            if (confirm(`You have attempted ${attempted} of ${questions.length} questions.
${remaining} questions are unattempted.

Are you sure you want to submit?`)) {
                submitTest();
            }
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.replace('btn-light', 'btn-success');
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
        
        // Add event listener for window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                if (document.getElementById('question-nav').classList.contains('show')) {
                    document.getElementById('main-content').classList.add('with-nav');
                }
            } else {
                document.getElementById('main-content').classList.remove('with-nav');
            }
        });
    </script>
</body>
</html>
