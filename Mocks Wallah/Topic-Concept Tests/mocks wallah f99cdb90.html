<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>

                questions.push({

                    question_en: "<p>25. <strong>Cloze test</strong></p>\r\n<p><span style=\"font-family: Cambria Math;\">We believe our value is in direct proportion to the value of our accomplishments. If we cannot accomplish certain results, we tend to feel (21)_____ about ourselves. Some of us try too hard and become workaholics and over-achievers. With a few genuine feelings of self-worth, we try to create some and prove that we are somebody by our successes and (22)_____. Because our desire for perfection is so great, we (23)_____ to set unrealistic goals and place unreasonable demands on ourselves. Failing, rather than encouraging us to have realistic aspirations, only leads to a mere punishing round of self-blame and a resolve to drive ourselves harder next time. If we do not finally achieve our goals, we are (24)____; despite everything we have done, we still feel (25)_____ inside.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Select the most appropriate option to fill in blank number 25</span></p>\n",

                questions.push({
                    id: "27",
                    section: "6",
                    question_en: "<p>27. <span style=\"font-family: Cambria Math;\">In a certain code language, \'DESK\' is coded as \'@#+%\' and \'RAIN\' is coded as \'<span style=\"font-weight: 400;\">$-&times;*</span></span><span style=\"font-family: Cambria Math;\">\'. How will \'RISK\' be coded in that language ?</span></p>\n",
                    question_hi: "<p>27. <span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2370;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2366;&#2359;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">, \'DESK\' </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;&#2337;</span><span style=\"font-family: Cambria Math;\"> &lsquo;@#+%&rsquo; </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> \'RAIN\' </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;&#2337;</span><span style=\"font-family: Cambria Math;\"> \'$-&times;*\' </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2311;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2370;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2366;&#2359;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> &lsquo;RISK&rsquo; </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;&#2337;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2327;&#2366;</span><span style=\"font-family: Cambria Math;\">? </span></p>\n",

                    options_hi: ["<p>$&times;+%</p>\n", "<p>+-<span style=\"font-family: Cambria Math;\">% </span></p>\n",
                                "<p>#+%@</p>\n", "<p>S#%&times;</p>\n"],
                    solution_en: "<p>27.(a) Logic <span style=\"font-family: Cambria Math;\">: Each letter is coded by a corresponding symbol.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">DESK = @#+% , RAIN = $-&times;*</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">From above, we get R = $, I = &times;, S = +,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">K = %</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Hence, we get : RISK = $&times;+%</span></p>\n",

ont-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">: R = $, I = &times;, S = +, K = %</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2361;&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2367;&#2354;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> : RISK = $&times;+%</span></p>\n",
                    correct: "a",

                questions.push({
                    id: "28",
                    section: "6",

                    question_hi: "<p>39.<span style=\"font-weight: 400;\">* &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2366;&#2344;&#2369;&#2360;&#2366;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2361;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">(<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>729</mn><mo>*</mo><mn>9</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\">) * 67 * 81 * (4 * 6) * 19</span></p>\n",

                    solution_en: "<p>39.(d) <span style=\"font-family: Cambria Math;\">In this type of question, we will check by putting options one by one and doing so option (d) gets satisfied.</span></p>\r\n<p><span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>729</mn><mo>*</mo><mo>&nbsp;</mo><mn>9</mn></msqrt></math></span><span style=\"font-weight: 400;\">)</span><span style=\"font-weight: 400;\"> * 67 * 81 *(4 * 6) * 19</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Putting values of option (d) in above expression, we get</span></p>\r\n<p><span style=\"font-weight: 400;\">(</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>729</mn><mo>&nbsp;</mo><mo>&divide;</mo><mo>&nbsp;</mo><mn>9</mn></msqrt></math><span style=\"font-weight: 400;\">) </span>+ 67 = 81 - (4 &times;&nbsp;<span style=\"font-family: Cambria Math;\"> 6) + 19</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">9 + 67 = 81 - 24 + 19</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">76 = 100 - 24 &rArr; 76 = 76 , L.H.S = R.H.S</span></p>\n",
                    solution_hi: "<p>39.(d) <span style=\"font-family: Kokila;\">&#2311;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\">-</span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2326;&#2325;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2305;&#2330;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2375;&#2306;&#2327;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2320;&#2360;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kok                     solution_en: "<p><span style=\"font-family: Cambria Math;\">51.(b) </span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Let W, B and R are White , Black and Red balls respectively. </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">We know, Total probability = 1</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">P(W) =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>&nbsp;</mo><mn>3</mn></mrow><mn>10</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> , P(B) =<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>5</mn></mfrac></math> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">P(R) = 1- </span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>10</mn></mfrac><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mfrac><mn>3</mn><mn>5</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><mn>10</mn></mfrac></math><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">P(B) &times; Total no. of balls = No. of Black balls</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>5</mn></mfrac></math>&times; (Total number of balls) = 15</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Total number of balls = 15 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>5</mn><mn>3</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 25.</span></p>\n",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">56.(d)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Rate for 1 yrs = 20% = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>5</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">, so, the rate for <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>2</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">yrs = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>20</mn><mn>2</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 10% =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>10</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Effective CI for 1.5 yrs at 20% p.a when interest is compounded annually </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 20% + 10% + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>20</mn><mo>&times;</mo><mn>10</mn></mrow><mn>100</mn></mfrac><mo>&nbsp;</mo></math></span><span style=\"font-family: Cambria Math;\"> = 30% + 2 = 32%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Effective CI for 1.5 yrs at 20%p.a when interest is compounded half yearly</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">10%+10%+10% +</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>10</mn><mo>&times;</mo><mn>10</mn><mo>&times;</mo><mn>10</mn></mrow><mrow><mn>10</mn><mo>,</mo><mn>000</mn></mrow></mfrac><mo>&nbsp;</mo><mo>+</mo><mfrac><mrow><mo>&nbsp;</mo><mn>10</mn><mo>&times;</mo><mn>10</mn><mo>+</mo><mn>10</mn><mo>&times;</mo><mn>10</mn><mo>+</mo><mn>10</mn><mo>&times;</mo><mn>10</mn></mrow><mn>100</mn></mfrac></math> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 30% + 0.1% + 3 = 33.1%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Required difference = 33.1% - 32% = 1.1% </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, 1.1% of Principal(P) = &#8377;1716</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; P = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1716</mn><mrow><mn>1</mn><mo>.</mo><mn>1</mn></mrow></mfrac></math> </span><span style=\"font-family: Cambria Math;\">&times;100 = &#8377;1,56,000&nbsp;</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">56.(d)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">1 </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> = 20%, =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>5</mn></mfrac></math> </span><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, 1<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>2</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>20</mn><mn>2</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">= 10% </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">20% p.a </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> 1.5 </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Camb                     solution_en: "<p><span style=\"font-family: Cambria Math;\">62.(d)</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688450655/word/media/image53.png\" width=\"251\" height=\"112\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">Efficiency of A = 4 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Efficiency of B = 3 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Working pattern of A and B is : A, B, A, B,......</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Work done in in 1 cycle(2 days) = 4+3 = 7 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Work done in in 17 cycle(34 days) = 7 &times; 17 = 119 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Remaining work = 120- 119 = 1 unit which is completed by A in&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&nbsp;</mo><mfrac><mn>1</mn><mn>4</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> day</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the required time = 34 +&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>4</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> = 34<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>4</mn></mfrac><mo>&nbsp;</mo></math></span><span style=\"font-family: Cambria Math;\"> days</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">62.(d)</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688450655/word/media/image54.png\" width=\"234\" height=\"121\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">A </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> = 4 </span><span style=\"font-family: Kokila;\">&#2311;&#2325;&#2366;&#2312;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">B </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> = 3 </span><span style=\"font-family: Kokila;\">&#2311;&#2325;&#2366;&#2312;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">A </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> B </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;&#2352;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2376;&#2335;&#2352;&#2381;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> : A, B, A, B,......</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">1 </span><span style=\"font-family: Kokila;\">&#2330;&#2325;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> (2 </span><span style=\"font-family: Kokila;\">&#2342;&#2367;&#2344;</span><span style=\"font-family: Cambria Math;\">) </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;&#2352;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> = 4 + 3 = 7 </span><span style=\"font-family: Kokila;\">&#2311;&#2325;&#2366;&#2312;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">17</span><span style=\"font-family: Kokila;\">&#2357;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2325;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> (34 </span><span style=\"font-family: Kokila;\">&#2342;&#2367;&#2344;</span><span style=\"font-family: Cambria Math;\">) </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;&#2352;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> = 7 &times; 17 = 119 </span><span style=\"font-family: Kokila;\">&#2311;&#2325;&#2366;&#2312;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2358;&#2375;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;&#2352;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> = 120 - 119 = 1 </span><span style=\"font-family: Kokila;\">&#2311;&#2325;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">& 379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> 2 : 3 </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> B </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> C </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2367;&#2360;&#2381;&#2360;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> 5 : 3 </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> A </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2367;&#2360;&#2381;&#2360;&#2366;</span><span style=\"font-family: Cambria Math;\"> (&#8377; </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">) </span><span style=\"font-family: Kokila;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2375;&#2306;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">64.(c)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Balancing the given ratio , we have</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">A : B = 2 : 3 ) &times; 5 = 10 : 15</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">B : C = 5 : 3 ) &times; 3 = 15 : 9</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the ratio of the share of A, B and C = 10 : 15 : 9</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">The share of A =&nbsp; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>10</mn><mrow><mn>10</mn><mo>+</mo><mn>15</mn><mo>+</mo><mn>9</mn></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times; 12988 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>10</mn><mn>34</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> &times; 12988 = &#8377;3820 </span></p>\n",

                    question_hi: "<p>66.<span style=\"font-family: Cambria Math;\"> x </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> y </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;&#2332;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> ABCD </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2366;&#2306;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2376;&#2360;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2368;&#2330;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2367;&#2340;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2332;&#2367;&#2360;&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2352;&#2381;&#2339;</span><span style=\"font-family: Cambria Math;\"> AC </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> BD, O </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2340;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> OA = 2x - 3, OB = x + 3, OC = y + 4, OD = 2y-1</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688450655/word/media/image55.png\" width=\"174\" height=\"116\"></p>\n",

                    solution_en: "<p>66.(a)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688450655/word/media/image55.png\" width=\"182\" height=\"121\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">ABCD, is a parallelogram in which AC and BD are diagonals which intersect at point O.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">we know that diagonals bisect each other so,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">0A=OC and OB=OD.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, OA=OC,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">2x - 3=y + 4</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">y=2x - 7........ (1)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">now,OB=OD</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x + 3 = 2y - 1</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x + 3 = 2(2x - 7)-1</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x + 3 = 4x - 14 - 1</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x - 4x = -18</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">-3x = -18</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x=6</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, put x =6 in (1), we get </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">y=2 &times; 6 - 7=12 - 7 =5</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">so, x=6 and y=5</span></p>\n",

e=\"font-family: Kokila;\">&#2361;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2344;&#2340;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2352;&#2381;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2360;&#2352;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2342;&#2381;&#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2340;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">0A=OC </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> OB=OD.</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2348;</span><span style=\"font-family: Cambria Math;\">, OA=OC,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">2x - 3 = y + 4</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">y=2x - 7........ (1)</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2348;</span><span style=\"font-family: Cambria Math;\">, OB = OD</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x + 3=2y - 1</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x + 3 = 2(2x - 7)-1</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x + 3 = 4x - 14 - 1</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x - 4x = -18</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">-3x = -18</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = 6</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2348;</span><span style=\"font-family: Cambria Math;\">, (1) </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> x = 6 </span><span style=\"font-family: Kokila;\">&#2352;&#2326;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2361;&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">y=2 &times; 6 - 7=12 - 7 =5</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, x=6 </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> y=5</span></p>\n",

                questions.push({
                    id: "73",
                    section: "17",
                    question_en: "<p>73.<span style=\"font-family: Cambria Math;\"> Simplify:&nbsp; </span><span style=\"font-family: Cambria Math;\">x&sup3; - 3x&sup2; + 9x - 12 - x&sup3;</span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-family: Cambria Math;\">- 7x&sup2;</span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-family: Cambria Math;\">- 8x - 16.</span></p>\n",
                    question_hi: "<p>73. <span style=\"font-family: Cambria Math;\">x&sup3; - 3x&sup2; + 9x - 12 - x&sup3;</span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-family: Cambria Math;\">- 7x&sup2;</span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-family: Cambria Math;\">- 8x - 16 </span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2352;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
                    options_en: ["<p>10 x&sup2; + x - 28</p>\n", "<p>-10 x&sup2; + x + 28</p>\n", 
                                "<p>-10 x&sup2; + x - 28</p>\n", "<p>10 x&sup2;<span style=\"font-family: Cambria Math;\">&nbsp;- x - 28</span></p>\n"],
                    options_hi: ["<p>10 x&sup2; + x - 28</p>\n", "<p>-10 x&sup2; + x + 28</p>\n",
                                "<p>-10 x&sup2; + x - 28</p>\n", "<p>10 x&sup2;<span style=\"font-family: Cambria Math;\">&nbsp;- x - 28</span></p>\n"],

                questions.push({
                    id: "74",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">74. </span><span style=\"font-family: Cambria Math;\">The LCM of the two numbers is 56 times their HCF, with the sum of their HCF and LCM being 1710. If one of the two numbers is 240, then what is the other number ?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">74. </span><span style=\"font-family: Kokila;\">&#2342;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> LCM </span><span style=\"font-family: Kokila;\">&#2313;&#2344;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> HCF </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> 56 </span><span style=\"font-family: Kokila;\">&#2327;&#2369;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2313;&#2344;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> HCF </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> LCM </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> 1710 </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> 240 </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2360;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>57</p>\n", "<p>171<span style=\"font-family: Cambria Math;\"> </span></p>\n", 
                                "<p>1680</p>\n", "<p>210</p>\n"],
                    options_hi: ["<p>57</p>\n", "<p>171<span style=\"font-family: Cambria Math;\"> </span></p>\n",
                                "<p>1680</p>\n", "<p>210</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">74.(d) </span><span style=\"font-family: Cambria Math;\">Let the LCM and HCF of the given no&rsquo;s be L and H respectively</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Then, L = 56H</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">ATQ, L + H = 1710 &rArr; 56 H + H = 1710 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; 57H = 1710 &rArr; H = 30</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">L = 56 &times;30 = 1680</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">As we know that, </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">First No. &times; Second No. = LCM &times; HCF</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">240 &times; Second no. = 1680 &times; 30</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Second no. =&nbsp; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>1680</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>30</mn></mrow><mn>240</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">= 210 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Short trick</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688450655/word/media/image58.png\" width=\"73\" height=\"106\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">8 corresponds to 240 ,1 unit = 30,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Another number will be 7 &times; </span><span style=\"font-family: Cambria Math;\">30 = 210</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">74.(d)</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> LCM </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> HCF </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2350;&#2358;&#2307;</span><span style=\"font-family: Cambria Math;\"> L </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> H </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2347;&#2367;&#2352;</span><span style=\"font-family: Cambria Math;\">, L= 56 H</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2366;&#2344;&#2369;&#2360;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> , L+H = 1710 &rArr; 56 H+H = 1710</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; 57H = 1710 &rArr; H = 30</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">L= 56 &times; 30 = 1680</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2332;&#2376;&#2360;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2344;&#2340;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\">,</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2346;&#2361;&#2354;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> &times; </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2360;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> = LCM&times; HCF</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">240&times;</span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2360;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> = 1680 &times; 30</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2360;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>1680</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>30</mn></mrow><mn>240</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> = 210 </span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2358;&#2366;&#2352;&#2381;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2335;&#2381;&#2352;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\">:</span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688450655/word/media/image58.png\" width=\"64\" height=\"93\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">8 </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2352;&#2370;&#2346;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> 240 </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\">, 1 </span><span style=\"font-family: Kokila;\">&#2311;&#2325;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> = 30,</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2360;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2327;&#2368;</span><span style=\"font-family: Cambria Math;\"> 7 &times; </span><span style=\"font-family: Cambria Math;\">30 = 210</span></p>\n",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "75",
                    section: "18",
                    question_en: "<p>75.<span style=\"font-family: Cambria Math;\"> If the sum of the squares of two positive numbers is 2426 and the square root of one number is 7, then the other is number is:</span></p>\n",
                    question_hi: "<p>75.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2327;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> 2426 </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2327;&#2350;&#2370;&#2354;</span><span style=\"font-family: Cambria Math;\"> 7 </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2360;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">:</span></p>\n",
                    options_en: ["<p>5</p>\n", "<p>8</p>\n", 
                                "<p>6</p>\n", "<p>4</p>\n"],
                    options_hi: ["<p>5</p>\n", "<p>8</p>\n",
                                "<p>6</p>\n", "<p>4</p>\n"],
                    solution_en: "<p>75.(a) <span style=\"font-family: Cambria Math;\">Let the numbers be <span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> and </span><span style=\"font-weight: 400;\">y</span></span><span style=\"font-family: Cambria Math;\">.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">According to the question,</span></p>\r\n<p><span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\">+ </span><span style=\"font-weight: 400;\">y&sup2; </span><span style=\"font-weight: 400;\">=&nbsp; 2426 &nbsp; &hellip;.(1)</span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mi>x</mi></msqrt><mo>&nbsp;</mo></math><span style=\"font-weight: 400;\">= 7 &rArr;</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">x</span><span style=\"font-weight: 400;\"> = 49 &hellip;&hellip;(2)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Putting (2) in (1), we get </span></p>\r\n<p><span style=\"font-weight: 400;\">49&sup2;</span><span style=\"font-weight: 400;\">&nbsp;+ </span><span style=\"font-weight: 400;\">y&sup2;</span><span style=\"font-weight: 400;\">&nbsp;= 2426&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">y&sup2;</span><span style=\"font-weight: 400;\">&nbsp;= 2426 - 2401 = 25 &rArr;</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">y</span><span style=\"font-weight: 400;\"> = 5&nbsp;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the other number is 5.</span></p>\n",

                    solution_en: "<p>78.(a) <span style=\"font-family: Cambria Math;\"><strong>Goods and Services Tax </strong><span style=\"font-weight: 400;\">is one indirect tax for the whole nation, which will make India one unified common market. The </span><strong>GST (Came into effect in 2017) </strong><span style=\"font-weight: 400;\">is a value-added tax levied on most goods and services sold for domestic consumption. It subsumes various taxes such as Central Excise duty, Service Tax, VAT, Entry Tax,&nbsp; Octroi, Luxury Tax, etc. The </span><strong>3 types of GST</strong><span style=\"font-weight: 400;\"> are there CGST (central level), IGST (inter-state level), and SGST (state level).</span></span></p>\n",
                    solution_hi: "<p>78.(a)&nbsp;<strong>&#2357;&#2360;&#2381;&#2340;&#2369; &#2319;&#2357;&#2306; &#2360;&#2375;&#2357;&#2366; &#2325;&#2352;</strong><span style=\"font-weight: 400;\"> &#2346;&#2370;&#2352;&#2375; &#2342;&#2375;&#2358; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; &#2361;&#2376;, &#2332;&#2379; &#2349;&#2366;&#2352;&#2340; &#2325;&#2379; &#2319;&#2325; &#2319;&#2325;&#2368;&#2325;&#2371;&#2340; &#2360;&#2366;&#2333;&#2366; &#2348;&#2366;&#2332;&#2366;&#2352; &#2348;&#2344;&#2366; &#2342;&#2375;&#2327;&#2366;&#2404; </span><strong>GST </strong><span style=\"font-weight: 400;\">(2017 &#2350;&#2375;&#2306; &#2354;&#2366;&#2327;&#2370; &#2361;&#2369;&#2310;) &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2346;&#2349;&#2379;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2375;&#2330;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2346;&#2352; &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351; &#2357;&#2352;&#2381;&#2343;&#2367;&#2340; &#2325;&#2352; &#2361;&#2376;&#2404; &#2351;&#2361; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2358;&#2369;&#2354;&#2381;&#2325;, &#2360;&#2375;&#2357;&#2366; &#2325;&#2352;, &#2357;&#2376;&#2335;, &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;, &#2330;&#2369;&#2306;&#2327;&#2368;, &#2357;&#2367;&#2354;&#2366;&#2360;&#2367;&#2340;&#2366; &#2325;&#2352;, &#2310;&#2342;&#2367; &#2332;&#2376;&#2360;&#2375; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2352;&#2379;&#2306; &#2325;&#2379; &#2360;&#2350;&#2366;&#2361;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; </span><strong>GST</strong><span style=\"font-weight: 400;\"> &#2325;&#2375; 3 &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306; CGST (&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2360;&#2381;&#2340;&#2352;), IGST (&#2309;&#2306;&#2340;&#2352;-&#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2381;&#2340;&#2352;), &#2324;&#2352; SGST (&#2352;&#2366;&#2332;&#2381;&#2351;) &#2360;&#2381;&#2340;&#2352;)&#2404;</span></p>\n",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "79",
                    section: "18",
                    question_en: "<p>79. <span style=\"font-family: Cambria Math;\">Article ______ of the Constitution of India states that the President can nominate two members of the Anglo-Indian community to the Lok Sabha if the community is not adequately represented.</span></p>\n",

h;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2379;&#2325;&#2360;&#2349;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2366;&#2350;&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2325;&#2340;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2369;&#2342;&#2366;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2404;</span></p>\n",
                    options_en: ["<p>335<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>331</p>\n", 
                                "<p>333</p>\n", "<p>337</p>\n"],
                    options_hi: ["<p>335</p>\n", "<p>331</p>\n",
                                "<p>333</p>\n", "<p>337</p>\n"],
                    solution_en: "<p>79.(b) <span style=\"font-family: Cambria Math;\"><strong>Article 331</strong><span style=\"font-weight: 400;\">:&nbsp; Representation of the Anglo-Indian community in the House of the People. </span><strong>Article 333: </strong><span style=\"font-weight: 400;\">&nbsp;Representation of the Anglo-Indian community in the Legislative Assemblies of the States. </span><strong>Article 335:</strong><span style=\"font-weight: 400;\">&nbsp; Claims of Scheduled Castes and Scheduled Tribes to services and posts. </span><strong>Article 337: </strong><span style=\"font-weight: 400;\">&nbsp;Special provision with respect to educational grants for the benefit of the Anglo-Indian Community.</span></span></p>\n",
                    solution_hi: "<p>79.(b)&nbsp; <strong>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 331:</strong><span style=\"font-weight: 400;\"> &#2354;&#2379;&#2325; &#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2310;&#2306;&#2327;&#2381;&#2354;-&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357;&#2404; </span><strong>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 333: </strong><span style=\"font-weight: 400;\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2357;&#2367;&#2343;&#2366;&#2344;&#2360;&#2349;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2319;&#2306;&#2327;&#2381;&#2354;&#2379;-&#2311;&#2306;&#2337;&#2367;&#2351;&#2344; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357;&#2404;</span><strong> &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 335:</strong><span style=\"font-weight: 400;\"> &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2324;&#2352; &#2346;&#2342;&#2379;&#2306; &#2346;&#2352; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2366;&#2340;&#2367; &#2324;&#2352; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367; &#2325;&#2375; &#2342;&#2366;&#2357;&#2375;&#2404; </span><strong>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 337:</strong><span style=\"font-weight: 400;\"> &#2310;&#2306;&#2327;&#2381;&#2354;-</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351; &#2325;&#2375; &#2354;&#2366;&#2349; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2376;&#2325;&#2381;&#2359;&#2367;&#2325; &#2309;&#2344;&#2369;&#2342;&#2366;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#23                 questions.push({
                    id: "80",
                    section: "18",

                                "<p>224</p>\n", "<p>228</p>\n"],
                    options_hi: ["<p>233</p>\n", "<p>239</p>\n",
                                "<p>224</p>\n", "<p>228</p>\n"],
                    solution_en: "<p>80.(b) <span style=\"font-family: Cambria Math;\">&nbsp;<strong>Article 239: </strong><span style=\"font-weight: 400;\">&nbsp;Administration of Union territories. </span><strong>Article 233: </strong><span style=\"font-weight: 400;\">&nbsp;Appointment of district judges. </span><strong>Article 224:</strong><span style=\"font-weight: 400;\">&nbsp; Appointment of additional and acting Judges. </span><strong>Article 228:</strong><span style=\"font-weight: 400;\">&nbsp; Transfer of certain cases to the High Court.</span></span></p>\n",
                    solution_hi: "<p>80.(b)&nbsp;<strong>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 239:</strong><span style=\"font-weight: 400;\"> &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2358;&#2366;&#2360;&#2367;&#2340; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;&#2404; </span><strong>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 233:</strong><span style=\"font-weight: 400;\"> &#2332;&#2367;&#2354;&#2366; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367;&#2404; </span><strong>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 224:</strong><span style=\"font-weight: 400;\"> &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2325; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367;&#2404; </span><strong>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 228: </strong><span style=\"font-weight: 400;\">&#2325;&#2369;&#2331; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2325;&#2379; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span></p>\n",

                questions.push({
                    id: "81",
                    section: "18",
                    question_en: "<p>81. <span style=\"font-family: Cambria Math;\">Which of the following Articles of the Constitution of India contains the provision for early childhood care and education to children below the age of 6 years?</span></p>\n",
                    question_hi: "<p>81.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 6 </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2369;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2330;&#2381;&#2330;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2366;&#2354;&#2381;&#2351;&#2366;&#2357;&#2360;&#2381;&#2341;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2375;&#2326;</span><span style=\"font-family: Cambria Math;\">-</span><span style=\"font-family: Kokila;\">&#2352;&#2375;&#2326;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2358;&#2367;&#2325;&#2381;&#2359;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2346;&#2348;&#2306;&#2343;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Article 45</p>\n", "<p>Article 35</p>\n", 
                                "<p>Article 44</p>\n", "<p>Article 53</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342;</span><span style=\"font-family: Cambria Math;\"> 45</span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342;</span><span style=\"font-family: Cambria Math;\"> 35</span></p>\n",

                    question_en: " <p>84. </span><span style=\"font-family:Cambria Math\">Which of the following features distinguishes Buddhism from Jainism?</span></p>",
                    question_hi: " <p>84.</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">निम्नलिखित</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">में</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">से</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">कौन</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">सी</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">विशेषता</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">बौद्ध</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">धर्म</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">को</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">जैन</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">धर्म</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">से</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">अलग</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">करती</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Kokila\">है</span><span style=\"font-family:Cambria Math\">?</span></p>",
