<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>

                questions.push({
                    id: "28",

                    solution_en: "<p>29.(c)&nbsp;</p>\r\n<p>Pattern:-<strong> </strong><span style=\"font-weight: 400;\">[ first letter + 1 = second letter ] and [ second letter + 3 = third letter ]</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">IJM &rArr; I + 1 = J and J + 3 = M</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">ABE &rArr; A + 1 = B and B + 3 = E</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">EFI &rArr; E + 1 = F and F + 3 = I</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">XYA &rArr; X + 1 = Y </span><span style=\"font-family: Cambria Math;\">and</span><span style=\"font-family: Cambria Math;\"> Y + 3 &ne;A (not follows)</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">29.(c)&nbsp;</span></p>\r\n<p>&#2346;&#2375;&#2335;&#2352;&#2381;&#2344;:- [ &#2346;&#2361;&#2354;&#2366; &#2309;&#2325;&#2381;&#2359;&#2352; + 1 = &#2342;&#2370;&#2360;&#2352;&#2366; &#2309;&#2325;&#2381;&#2359;&#2352; ] <span style=\"font-weight: 400;\">&#2324;&#2352; </span>[ &#2342;&#2370;&#2360;&#2352;&#2366; &#2309;&#2325;&#2381;&#2359;&#2352; + 3 = &#2340;&#2368;&#2360;&#2352;&#2366; &#2309;&#2325;&#2381;&#2359;&#2352; ]</p>\r\n<p><span style=\"font-family: Cambria Math;\">IJM &rArr; I +1 = J </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> J + 3 = M</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">ABE &rArr; A +1 = B </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> B + 3 = E</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">EFI &rArr; E + 1 = F <span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span> F + 3 = I</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">XYA &rArr; </span><span style=\"font-family: Cambria Math;\">X + 1 = Y </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> Y + 3 &ne;A (</span><span style=\"font-family: Nirmala UI;\">&#2309;&#2344;&#2369;&#2360;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2361;&#2368;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2352;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">)</span></p>\n",

                    solution_en: "<p>30.(b)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/images/mceu_40172602311689147101626.png\" width=\"301\" height=\"234\"></p>\r\n<p><span style=\"font-weight: 400;\">Total number of square in ABCD = 3 &times;4&nbsp; + 2&times; 3+ 1 &times;2 = 20</span></p>\r\n<p><span style=\"font-weight: 400;\">In&nbsp; blue color total square&nbsp; = 2 &times; 5 = 10</span></p>\r\n<p><span style=\"font-weight: 400;\">In red color common square = 1</span></p>\r\n<p><span style=\"font-weight: 400;\">Small square = 1&nbsp;</span></p>\n",
                    solution_hi: "<p>30.(b)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/images/mceu_96586697711689147207470.png\" width=\"321\" height=\"250\"></p>\r\n<p><span style=\"font-weight: 400;\">ABCD &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; =&nbsp; 3 &times;4&nbsp; + 2&times; 3+ 1 &times;2 = 20</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2344;&#2368;&#2354;&#2375; &#2352;&#2306;&#2327; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;= 2 &times; 5 = 10</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2354;&#2366;&#2354; &#2352;&#2306;&#2327; &#2350;&#2375;&#2306; &#2313;&#2349;&#2351;&#2344;&#2367;&#2359;&#2381;&#2336; &#2357;&#2352;&#2381;&#2327; = 1</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2331;&#2379;&#2335;&#2366; &#2357;&#2352;&#2381;&#2327; = 1</span></p>\r\n<p><span style=\"font-weight: 400;\">&nbsp;&#2340;&#2379; &#2325;&#2369;&#2354; &#2357;&#2352;&#2381;&#2327; = 20 + 10 + 1 + 1 = 32</span></p>\n",

                    solution_en: "<p>50.(c) Given statement :</p>\r\n<p><span style=\"font-family: Cambria Math;\">G &ge; P &gt; T &ge; S &gt;</span><span style=\"font-family: Cambria Math;\"> K = N &lt; D</span></p>\r\n<p>(a) P &gt; D = false (as <span style=\"font-family: Cambria Math;\">P &gt; T &ge; S &gt;</span><span style=\"font-family: Cambria Math;\"> K = N &lt; D</span><span style=\"font-family: Cambria Math;\">), here, there is no relation between P and D.</span></p>\r\n<p>(b) G <span style=\"font-family: Cambria Math;\">&ge;</span><span style=\"font-family: Cambria Math;\"> D = false (as G &ge; P &gt; T &ge; S &gt; K = N &lt; D</span><span style=\"font-family: Cambria Math;\">), here, there is no relation between G and D.</span></p>\r\n<p>(c) G &gt;T = true (as G <span style=\"font-family: Cambria Math;\">&ge;</span><span style=\"font-family: Cambria Math;\"> P &gt; T), </span></p>\r\n<p>(d) N &gt; T = false (as <span style=\"font-weight: 400;\">T <span style=\"font-family: Cambria Math;\">&ge;</span></span><span style=\"font-weight: 400;\"> S &gt; K = N</span><span style=\"font-family: Cambria Math;\">), here </span><span style=\"font-family: \'Cambria Math\';\">T is greater than N.</span></p>\n",

                questions.push({
                    id: "52",
                    section: "17",
                    question_en: "<p>52. <span style=\"font-family: Cambria Math;\">What is the area (in unit squares) of the triangle enclosed by the graphs of 2x +</span><span style=\"font-family: Cambria Math;\"> 3y = 14, x + y = 3 and the x-axis?</span></p>\n",
                    question_hi: "<p>52.<span style=\"font-family: Cambria Math;\"> 2x + 3y = 14 , x + y = 3 </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> x - </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2325;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2354;&#2375;&#2326;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2328;&#2367;&#2352;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;</span><span style=\"font-family: Cambria Math;\"> (</span><span style=\"font-family: Nirmala UI;\">&#2311;&#2325;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2352;&#2381;&#2327;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">) </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>22.5</p>\n", "<p>13.5</p>\n", 
                                "<p>16</p>\n", "<p>14</p>\n"],
                    options_hi: ["<p>22.5</p>\n", "<p>13.5</p>\n",
                                "<p>16</p>\n", "<p>14</p>\n"],
                    solution_en: "<p>52.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Intersection point of 2x + 3y = 14 and x + y = 3 is (-5 , 8)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Intersection point of 2x + 3y = 14 and y = 0 is (7 , 0)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Intersection point of x + y = 3 and y = 0 is (3 , 0)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Area of triangle = </span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>2</mn></mfrac><mo>[</mo><mo>&nbsp;</mo><msub><mi>x</mi><mn>1</mn></msub><mo>(</mo><msub><mi>y</mi><mn>2</mn></msub><mo>-</mo><msub><mi>y</mi><mn>3</mn></msub><mo>)</mo><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msub><mi>x</mi><mn>2</mn></msub><mo>(</mo><msub><mi>y</mi><mn>3</mn></msub><mo>-</mo><msub><mi>y</mi><mn>1</mn></msub><mo>)</mo><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msub><mi>x</mi><mn>3</mn></msub><mo>(</mo><msub><mi>y</mi><mn>1</mn></msub><mo>-</mo><msub><mi>y</mi><mn>2</mn></msub><mo>)</mo><mo>]</mo></math></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>2</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">[-5(0 &ndash; 0) +</span><span style=\"font-family: Cambria Math;\"> 7(0 &ndash; 8) + 3(8 &ndash; 0)]</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced open=\"|\" close=\"|\"><mrow><mfrac><mn>1</mn><mn>2</mn></mfrac><mo>[</mo><mo>-</mo><mn>56</mn><mo>+</mo><mn>24</mn><mo>]</mo><mo>&nbsp;</mo></mrow></mfenced><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>16</mn><mo>&nbsp;</mo><mi>c</mi><msup><mi>m</mi><mn>2</mn></msup></math> </span></p>\n",
                    solution_hi: "<p>52.(c) <span style=\"font-family: Cambria Math;\">2x + 3y = 14 </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> x + y = 3 </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2367;&#2306;&#2342;&#2369;</span><span style=\"font-family: Cambria Math;\"> (-5, 8) </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">2x + 3y = 14 </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> y = 0 </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2367;&#2306;&#2342;&#2369;</span><span style=\"font-family: Cambria Math;\"> (7 , 0) </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x + y = 3 </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> y = 0 </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2367;&#2306;&#2342;&#2369;</span><span style=\"font-family: Cambria Math;\"> (3, 0) </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;</span><span style=\"font-family: Cambria Math;\"> = </span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>2</mn></mfrac><mo>[</mo><mo>&nbsp;</mo><msub><mi>x</mi><mn>1</mn></msub><mo>(</mo><msub><mi>y</mi><mn>2</mn></msub><mo>-</mo><msub><mi>y</mi><mn>3</mn></msub><mo>)</mo><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msub><mi>x</mi><mn>2</mn></msub><mo>(</mo><msub><mi>y</mi><mn>3</mn></msub><mo>-</mo><msub><mi>y</mi><mn>1</mn></msub><mo>)</mo><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msub><mi>x</mi><mn>3</mn></msub><mo>(</mo><msub><mi>y</mi><mn>1</mn></msub><mo>-</mo><msub><mi>y</mi><mn>2</mn></msub><mo>)</mo><mo>]</mo></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> ]</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>2</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">[-5(0 &ndash; 0) +</span><span style=\"font-family: Cambria Math;\"> 7(0 &ndash; 8) + 3(8 &ndash; 0)]</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced open=\"|\" close=\"|\"><mrow><mfrac><mn>1</mn><mn>2</mn></mfrac><mo>[</mo><mo>-</mo><mn>56</mn><mo>+</mo><mn>24</mn><mo>]</mo><mo>&nbsp;</mo></mrow></mfenced><mo>&nbsp;</mo><mo>=</mo><mo>&nb                 questions.push({

                    question_en: "<p>53.&nbsp;<span style=\"font-weight: 400;\">Study the following table and answer the questions given below. </span></p>\r\n<p><span style=\"font-weight: 400;\">The table shows the items of Expenditure on Salary, food, medicine and Tax for the various years from 2001 to 2006.</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688635982/word/media/image50.png\" width=\"293\" height=\"188\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">The ratio of salary: expenditure per year during period 2003 to 2006 is</span></p>\n",

                questions.push({
                    id: "54",
                    section: "17",
                    question_en: "<p>54. <span style=\"font-family: Cambria Math;\">What is the average of the first four positive multiples of 5?</span></p>\n",
                    question_hi: "<p>54. <span style=\"font-family: Cambria Math;\">5 </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2361;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2330;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2369;&#2339;&#2332;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2360;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>8.24</p>\n", "<p>15.4</p>\n", 
                                "<p>16.4</p>\n", "<p>12.5</p>\n"],
                    options_hi: ["<p>8.24</p>\n", "<p>15.4</p>\n",
                                "<p>16.4</p>\n", "<p>12.5</p>\n"],
                    solution_en: "<p>54.(d)</p>\r\n<p><span style=\"font-weight: 400;\">Sum of first four positive multiples of 5 i.e. 5, 10&hellip;..20 </span><span style=\"font-weight: 400;\">= </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>4</mn><mn>2</mn></mfrac></math><span style=\"font-weight: 400;\">&times; (5 + 20) = 50</span></p>\r\n<p><span style=\"font-weight: 400;\">So, the required average = </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>50</mn><mn>4</mn></mfrac></math><span style=\"font-weight: 400;\"> = 12.5&nbsp;&nbsp;</span></p>\n",
                    solution_hi: "<p>54.(d)</p>\r\n<p><span style=\"font-weight: 400;\">5 &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2330;&#2366;&#2352; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2327;&#2369;&#2339;&#2332;&#2379;&#2306;&nbsp; &#2325;&#2366; &#2351;&#2379;&#2327; &#2309;&#2352;&#2381;&#2341;&#2366;&#2340; 5, 10&hellip;..20 </span><span style=\"font-weight: 400;\">= </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>4</mn><mn>2</mn></mfrac></math><span style=\"font-weight: 400;\">&times; (5 + 20) = 50</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2309;&#2340;: &#2309;&#2349;&#2368;&#2359;&#2381;&#2335; &#2324;&#2360;&#2340; = </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>50</mn><mn>4</mn></mfrac></math><span style=\"font-weight: 400;\"> = 12.5&nbsp;&nbsp;</span></p>\n",

                questions.push({
                    id: "56",
                    section: "17",
                    question_en: "<p>56. <span style=\"font-family: Cambria Math;\">The simple i</span><span style=\"font-family: Cambria Math;\">nterest on a certain sum of money at 20% per annum for 5 years and 4 years differs by Rs.200. Find the sum (in Rs.).</span></p>\n",
                    question_hi: "<p>56. <span style=\"font-family: Nirmala UI;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2343;&#2344;&#2352;&#2366;&#2358;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> 20% </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> 5 </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 4 </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2366;&#2343;&#2366;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> Rs.200 </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2306;&#2340;&#235                                 "<p>Rs.1,560</p>\n", "<p>Rs.1,200</p>\n"],
                    solution_en: "<p>56.(b)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the principal be 100%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Difference of SI on certain sum for 5yrs and 4yrs at 20% = (5 - 4)20% = 20%, which corresponds to &#8377;200</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, 100% corresponds to <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>200</mn><mn>20</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> &times; 100 = &#8377;1000</span></p>\n",
                    solution_hi: "<p>56.(b)</p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2354;&#2343;&#2344;</span><span style=\"font-family: Cambria Math;\"> 100% </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">20% </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> 5 </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 4 </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2352;&#2366;&#2358;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2366;&#2343;&#2366;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#230                     solution_en: "<p>60.(d)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Formula used: D = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>S</mi><mo>(</mo><mi>S</mi><mo>+</mo><msub><mi>S</mi><mn>1</mn></msub><mo>)</mo></mrow><msub><mi>S</mi><mn>1</mn></msub></mfrac><mo>&times;</mo><mo>&nbsp;</mo><msub><mi>t</mi><mn>1</mn></msub><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><mi>S</mi><mo>(</mo><mi>S</mi><mo>+</mo><msub><mi>S</mi><mn>2</mn></msub><mo>)</mo></mrow><msub><mi>S</mi><mn>2</mn></msub></mfrac><mo>&times;</mo><mo>&nbsp;</mo><msub><mi>t</mi><mn>2</mn></msub></math></span><span style=\"font-family: Cambria Math;\">&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">(Here, D = distance, S is original speed </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>S</mi><mn>1</mn></msub><mo>&nbsp;</mo><mi>a</mi><mi>n</mi><mi>d</mi><mo>&nbsp;</mo><msub><mi>S</mi><mn>2</mn></msub></math><span style=\"font-weight: 400;\"> are increased/decreased speed and </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>t</mi><mn>1</mn></msub><mo>&nbsp;</mo><mi>a</mi><mi>n</mi><mi>d</mi><mo>&nbsp;</mo><msub><mi>t</mi><mn>2</mn></msub></math><span style=\"font-weight: 400;\"> are changed time.)</span></p>\r\n<p>&rArr; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>S</mi><mo>(</mo><mi>S</mi><mo>+</mo><mn>10</mn><mo>)</mo></mrow><mn>10</mn></mfrac></math><span style=\"font-weight: 400;\">&times; 55</span><span style=\"font-weight: 400;\"> = </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>S</mi><mo>(</mo><mi>S</mi><mo>-</mo><mn>8</mn><mo>)</mo></mrow><mn>8</mn></mfrac></math><span style=\"font-weight: 400;\">&times; 55</span></p>\r\n<p>&rArr; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>(</mo><mi>S</mi><mo>+</mo><mn>10</mn><mo>)</mo></mrow><mn>10</mn></mfrac></math><span style=\"font-weight: 400;\"> = </span><math xmlns=\"http://ww                     question_en: "<p>65.<span style=\"font-family: Cambria Math;\"> If </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>x</mi><mrow><mn>4</mn><mo>&nbsp;</mo></mrow></msup><mo>-</mo><mo>&nbsp;</mo><mn>6</mn><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mn>1</mn></math><span style=\"font-family: Cambria Math;\">= 0, then what is the value of </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><msup><mi>x</mi><mn>6</mn></msup><mo>&ndash;</mo><mo>&nbsp;</mo><msup><mi>x</mi><mrow><mo>-</mo><mn>6</mn></mrow></msup><mo>&nbsp;</mo><mo>)</mo><mo>&nbsp;</mo><mo>&ndash;</mo><mo>&nbsp;</mo><mn>3</mn><mo>(</mo><msup><mi>x</mi><mn>4</mn></msup><mo>+</mo><mo>&nbsp;</mo><msup><mi>x</mi><mrow><mo>-</mo><mn>4</mn></mrow></msup><mo>&nbsp;</mo><mo>)</mo></math><span style=\"font-family: Cambria Math;\"> ?</span></p>\n",
                    question_hi: "<p>65.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>x</mi><mrow><mn>4</mn><mo>&nbsp;</mo></mrow></msup><mo>-</mo><mo>&nbsp;</mo><mn>6</mn><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mn>1</mn></math>= 0<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><msup><mi>x</mi><mn>6</mn></msup><mo>&ndash;</mo><mo>&nbsp;</mo><msup><mi>x</mi><mrow><mo>-</mo><mn>6</mn></mrow></msup><mo>&nbsp;</mo><mo>)</mo><mo>&nbsp;</mo><mo>&ndash;</mo><mo>&nbsp;</mo><mn>3</mn><mo>(</mo><msup><mi>x</mi><mn>4</mn></msup><mo>+</mo><mo>&nbsp;</mo><msup><mi>x</mi><mrow><mo>-</mo><mn>4</mn></mrow></msup><mo>&nbsp;</mo><mo>)</mo></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",

                    solution_en: "<p>65.(c) <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>x</mi><mn>4</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>6</mn><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>1</mn></math><span style=\"font-family: Cambria Math;\"> = 0</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">On dividing by x&sup2;</span><span style=\"font-family: Cambria Math;\">, x&sup2;</span><span style=\"font-family: Cambria Math;\">&nbsp;- <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><msup><mi>x</mi><mn>2</mn></msup></mfrac></math></span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">= 6</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">On cubing both sides,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mrow><mo>(</mo><mi>x</mi><mo>&sup2;</mo><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><msup><mi>x</mi><mn>2</mn></msup></mfrac><mo>)</mo></mrow><mn>3</mn></msup></math></span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-family: Cambria Math;\">= 6&sup3;</span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>x</mi><mn>6</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><msup><mi>x</mi><mn>6</mn></msup></mfrac><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>3</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><msup><mi>x</mi><mn>2</mn></msup></mfrac><mo>(</mo><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><msup><mi>x</mi><mn>2</mn></msup></mfrac><mo>)</mo></math><span style=\"font-family: Cambria Math;\"> = 216</span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>x</mi><mn>6</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><msup><mi>x</mi><mn>6</mn></msup></mfrac><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>3</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>6</mn><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>216</mn><mo>&nbsp;</mo><mo>&rArr;</mo><mo>&nbsp;</mo><msup><mi>x</mi><mn>6</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><msup><mi>x</mi><mn>6</mn></msup></mfrac></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">= 234</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Again,</span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><msup><mi>x</mi><mn>2</mn></msup></mfrac></math><span style=\"font-family: Cambria Math;\"> = 6 (On squaring both sides)</span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mrow><mo>(</mo><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><msup><mi>x</mi><mn>2</mn></msup></mfrac><mo>)</mo></mrow><mn>2</mn></msup></math><span style=\"font-family: Cambria Math;\"> = 6&sup2;</span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><msup><mi>x</mi><mn>4</mn></msup><mo>+</mo><mfrac><mn>1</mn><msup><mi>x</mi><mn>4</mn></msup></mfrac><mo>)</mo></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> - 2 = 36 &rArr; </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>x</mi><mn>4</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><msup><mi>x</mi><mn>4</mn></msup></mfrac></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> = 38</span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><msup><mi>x</mi><mn>6</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mfrac><mn>1</mn                     id: "66",

                    question_en: "<p>66.<span style=\"font-family: Cambria Math;\"> In a circle with centre</span><span style=\"font-family: Cambria Math;\"> O, ABDC is a cyclic quadrilateral with AB as a diameter of the circle. AC and BD produced meet at E. If &ang;CED = 85&deg;, then what is the measure of &ang;COD?</span></p>\n",
                    question_hi: "<p>66. <span style=\"font-family: Nirmala UI;\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> O </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2366;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2371;&#2340;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">, ABDC </span><span style=\"font-family: Nirmala UI;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2330;&#2325;&#2381;&#2352;&#2368;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2367;&#2360;&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> AB </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2371;&#2340;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2381;&#2351;&#2366;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2404;</span><span style=\"font-family: Cambria Math;\"> AC </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> BD </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2397;&#2366;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2379;</span><span style=\"font-family: Cambria Math;\"> E </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2367;&#2354;&#2340;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> &ang;CED = 85&deg; </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> &ang;COD </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2352;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> ?</span></p>\n",

                    options_hi: ["<p>45&deg;</p>\n", "<p>60&deg;</p>\n",

                    solution_en: "<p>66.(c)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688635982/word/media/image54.png\" width=\"132\" height=\"162\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">Given, &ang;CED = 85&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">In <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#8710;</mo></math><span style=\"font-weight: 400;\">AEB</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&ang;EAB + &ang;EBA =180&deg; - &ang;CED</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> = 180&deg;- 85&deg; = 95&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">In <span style=\"font-weight: 400;\">&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#8710;</mo></math></span><span style=\"font-weight: 400;\">AOC</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&ang;OAC = &ang;OCA</span><span style=\"font-family: Cambria Math;\">&hellip;(OC = OA = radius) </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&ang;COA = 180&deg;- (&ang;OAC + &ang;OCA)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;= 180&deg;- 2&ang;OAC</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">In <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#8710;</mo></math><span style=\"font-weight: 400;\">BOD</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&ang;OBD = &ang;ODB</span><span style=\"font-family: Cambria Math;\">&hellip;..(OD = OB = radius) </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&ang;BOD = 180&deg;- (&ang;OBD + &ang;ODB)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; = 180&deg;- 2&ang;OBD</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&ang;AOB&nbsp; = &ang;COA + &ang;BOD + &ang;COD = 180&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; &ang;COA +&ang;BOD +&ang;COD</span><span style=\"font-family: Cambria Math;\"> = 180&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; 180&deg; -&nbsp; 2&ang;OAC </span><span style=\"font-family: Cambria Math;\">+ 180&deg; - 2&ang;OBD +&nbsp; &ang;COD = 180&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; 180&deg; -&nbsp; 2&ang;OAC </span><span style=\"font-family: Cambria Math;\">+ 180&deg; -&nbsp; 2&ang;OBD + &ang;COD</span><span style=\"font-family: Cambria Math;\"> = 180&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; 180&deg; -&nbsp; (</span><span style=\"font-family: Cambria Math;\">2&ang;OAC + &ang;OBD) + &ang;COD = 0</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; 180&deg;- 2(95&deg;) + &ang;COD = 0</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; - 10&deg;+ &ang;COD = 0 &rArr; </span><span style=\"font-family: Cambria Math;\">&ang;COD = 10&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Alternate </span><span style=\"font-family: Cambria Math;\">:-</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&ang;COD = 180&deg; - 2 &times; &ang;CED</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 180&deg; - 2 &times; 85&deg; = 180&deg; - 170&deg; = 10&deg;</span></p>\n",
                    solution_hi: "<p>66.(c)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688635982/word/media/image54.png\" width=\"132\" height=\"162\"></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2342;&#2367;&#2351;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;,</span> &ang;CED = 85&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#8710;</mo></math><span style=\"font-weight: 400;\">AEB &#2350;&#2375;&#2306;, </span></span><span style=\"font-family: Cambria Math;\">&ang;EAB + &ang;EBA =180&deg; - &ang;CED</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> = 180&deg; -&nbsp; 85&deg; = 95&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#8710;</mo></math></span><span style=\"font-weight: 400;\">AOC &#2350;&#2375;&#2306;, </span></span><span style=\"font-family: Cambria Math;\">&ang;OAC = &ang;OCA</span><span style=\"font-family: Cambria Math;\">&hellip;&nbsp; &nbsp;(OC = OA = <span style=\"font-weight: 400;\">&#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;</span>) </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&ang;COA = 180&deg;- (&ang;OAC + &ang;OCA)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;= 180&deg;- 2&ang;OAC</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#8710;</mo></math><span style=\"font-weight: 400;\">BOD &#2350;&#2375;&#2306;,</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&ang;OBD = &ang;ODB</span><span style=\"font-family: Cambria Math;\">&hellip;..(OD = OB = <span style=\"font-weight: 400;\">&#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;</span>) </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&ang;BOD = 180&deg;- (&ang;OBD + &ang;ODB)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; = 180&deg;- 2&ang;OBD</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&ang;AOB&nbsp; = &ang;COA + &ang;BOD + &ang;COD = 180&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; &ang;COA +&ang;BOD +&ang;COD</span><span style=\"font-family: Cambria Math;\"> = 180&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; 180&deg; -&nbsp; 2&ang;OAC </span><span style=\"font-family: Cambria Math;\">+ 180&deg; - 2&ang;OBD +&nbsp; &ang;COD = 180&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; 180&deg; -&nbsp; 2&ang;OAC </span><span style=\"font-family: Cambria Math;\">+ 180&deg; -&nbsp; 2&ang;OBD + &ang;COD</span><span style=\"font-family: Cambria Math;\"> = 180&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; 180&deg; -&nbsp; (</span><span style=\"font-family: Cambria Math;\">2&ang;OAC + &ang;OBD) + &ang;COD = 0</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; 180&deg;- 2(95&deg;) + &ang;COD = 0</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; - 10&deg;+ &ang;COD = 0 &rArr; </span><span style=\"font-family: Cambria Math;\">&ang;COD = 10&deg;</span></p>\r\n<p><strong>&#2357;&#2376;&#2325;&#2354;&#2381;&#2346;&#2367;&#2325;</strong><span style=\"font-weight: 400;\">:-</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&ang;COD = 180&deg; - 2 &times; &ang;CED</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 180&deg; - 2 &times; 85&deg; = 180&deg; - 170&deg; = 10&deg;</span></p>\n",

                questions.push({
                    id: "68",
                    section: "17",
                    question_en: "<p>68.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Find the sum of interior angles of a polygon with </span><span style=\"font-family: Cambria Math;\">8</span><span style=\"font-family: Cambria Math;\"> sides.</span></p>\n",
                    question_hi: "<p>68.<span style=\"font-family: Cambria Math;\"> 8 </span><span style=\"font-family: Nirmala UI;\">&#2349;&#2369;&#2332;&#2366;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2366;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2361;&#2369;&#2349;&#2369;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2306;&#2340;&#2352;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;&#2339;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span></p>\n",
                    options_en: ["<p>1080&deg;<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>360&deg;</p>\n",

                    options_hi: ["<p>1080&deg;<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>360&deg;</p>\n",
                                "<p>540&deg;</p>\n", "<p>1440&deg;</p>\n"],
                    solution_en: "<p>68.(a)</p>\r\n<p><span style=\"font-weight: 400;\">Sides = 8</span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr; Sum of interior angle of polygon = (n &minus; 2)180</span></p>\r\n<p><span style=\"font-weight: 400;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; = (8 &minus; 2)180</span></p>\r\n<p><span style=\"font-weight: 400;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; = 6 &times; 180</span></p>\r\n<p><span style=\"font-weight: 400;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; = 1080</span></p>\r\n<p><span style=\"font-weight: 400;\">Hence, the answer is 1080&deg;.</span></p>\n",
                    solution_hi: "<p>68.(a)</p>\r\n<p><span style=\"font-weight: 400;\">&#2349;&#2369;&#2332;&#2366;&#2319;&#2305; = 8</span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2375; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; = (n &minus; 2)180</span></p>\r\n<p><span style=\"font-weight: 400;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;= (8 &minus; 2)180</span></p>\r\n<p><span style=\"font-weight: 400;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;= 6 &times; 180</span></p>\r\n<p><span style=\"font-weight: 400;\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;= 1080</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2309;&#2340;: &#2313;&#2340;&#2381;&#2340;&#2352; 1080&deg; &#2361;&#2376;&#2404;</span></p>\n",

                questions.push({
                    id: "74",
                    section: "17",
                    question_en: "<p>74. <span style=\"font-family: Cambria Math;\">The number <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mn>97</mn><mn>30</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mn>14</mn><mn>30</mn></msup></math></span><span style=\"font-family: Cambria Math;\"> &nbsp;</span><span style=\"font-family: Cambria Math;\">is divisible by : </span></p>\n",
                    question_hi: "<p>74. <span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mn>97</mn><mn>30</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mn>14</mn><mn>30</mn></msup></math> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2360;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">:</span></p>\n",
                    options_en: ["<p>37 but not 83</p>\n", "<p>83 but not 37</p>\n", 
                                "<p>Both 37 and 83</p>\n", "<p>Neither 37 nor 83</p>\n"],
                    options_hi: ["<p>37 <span style=\"font-family: Nirmala UI;\">&#2354;&#2375;&#2325;&#2367;&#2344;</span><span style=\"font-family: Cambria Math;\"> 83 </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2361;&#2368;&#2306;</span></p>\n", "<p>83 <span style=\"font-family: Nirmala UI;\">&#2354;&#2375;&#2325;&#2367;&#2344;</span><span style=\"font-family: Cambria Math;\"> 37 </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2361;&#2368;&#2306;</span></p>\n",
                                "<p>37 <span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 83 </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2379;&#2344;&#2379;&#2306;</span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> 37 </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2368;</span><span style=\"font-family: Cambria Math;\"> 83</span></p>\n"],
                    solution_en: "<p>74.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Concept :</span><span style=\"font-family: Cambria Math;\"> As we know that (<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><msup><mi>a</mi><mi>n</mi></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>b</mi><mi>n</mi></msup><mo>)</mo></math></span><span style=\"font-family: Cambria Math;\">&nbsp;is always divisible by (a-b)</span><span style=\"font-family: Cambria Math;\">(a+b) if n is even</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mn>97</mn><mn>30</mn></msup><mo>-</mo><msup><mn>14</mn><mn>30</mn></msup></math> </span><span style=\"font-family: Cambria Math;\"> is divisible by (97 - 14) = </span><span style=\"font-family: Cambria Math;\">83 </span><span style=\"font-family: Cambria Math;\">and (97 + 14) = 111 = </span><span style=\"font-family: Cambria Math;\">37</span><span style=\"font-family: Cambria Math;\">&times;3</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Hence, </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mn>97</mn><mn>30</mn></msup><mo>-</mo><msup><mn>14</mn><mn>30</mn></msup></math> </span><span style=\"font-family: Cambria Math;\"> is divisible by both 37 and 83.</span></p>\n",
                    solution_hi: "<p>74.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2332;&#2376;&#2360;&#2366; &#2325;&#2367; &#2361;&#2350; &#2332;&#2366;&#2344;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367;</span> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><msup><mi>a</mi><mi>n</mi></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>b</mi><mi>n</mi></msup><mo>)</mo></math></span><span style=\"font-family: Cambria Math;\"> <span style=\"font-weight: 400;\">&#2361;&#2350;&#2375;&#2358;&#2366; (a - b) &#2324;&#2352; (a + b) &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2351;&#2342;&#2367; n &#2360;&#2350; &#2361;&#2376;</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2309;&#2348;,</span> </span><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mn>97</mn><mn>30</mn></msup><mo>-</mo><msup><mn>14</mn><mn>30</mn></msup></math> ,</span><span style=\"font-family: Cambria Math;\">&nbsp;(97 - 14) = </span><span style=\"font-family: Cambria Math;\">83 <span style=\"font-weight: 400;\">&#2324;&#2352;</span></span><span style=\"font-family: Cambria Math;\">&nbsp;(97 + 14) = 111 = </span><span style=\"font-family: Cambria Math;\">37 </span><span style=\"font-family: Cambria Math;\">&times; 3 </span><span style=\"font-weight: 400;\">&#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2311;&#2360;&#2354;&#2367;&#2319;, </span>&nbsp;</span><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mn>97</mn><mn>30</mn></msup><mo>-</mo><msup><mn>14</mn><mn>30</mn></msup></math><span style=\"font-weight: 400;\">, 37 &#2324;&#2352; 83 &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2404;</span></span></p>\n",
                    correct: "c",

                });
                questions.push({
                    id: "75",
                    section: "18",
                    question_en: "<p>75. <span style=\"font-family: Cambria Math;\">Three times the second number from three consecutive odd integers is 3 more than twice the third number. The third integer is:</span></p>\n",
                    question_hi: "<p>75. <span style=\"font-family: Nirmala UI;\">&#2354;&#2327;&#2366;&#2340;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2368;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2359;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2370;&#2360;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2368;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2369;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2368;&#2360;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2379;&#2327;&#2369;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> 3 </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2343;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2368;&#2360;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">:</span></p>\n",
                    options_en: ["<p>11</p>\n", "<p>7</p>\n", 
                                "<p>5</p>\n", "<p>9</p>\n"],
                    options_hi: ["<p>11</p>\n", "<p>7</p>\n",
                                "<p>5</p>\n", "<p>9</p>\n"],
                    solution_en: "<p>75.(d) <span style=\"font-family: Cambria Math;\">Let three consecutive odd integers be x, x + 2, x + 4</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">According to the question,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">3(x + 2) = 3 + 2(x + 4)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">3x + 6 = 3 + 2x + 8 &rArr;</span><span style=\"font-family: Cambria Math;\"> x = 11 - 6 = 5</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, third integer = x + 4 = 5 + 4 = 9</span></p>\n",
                    solution_hi: "<p>75.(d) <span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2368;&#2332;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2368;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2359;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;</span><span style=\"font-family: Cambria Math;\"> x, x + 2, x + 4 </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2344;&#2369;&#2360;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\">,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">3(x + 2) = 3 + 2(x + 4)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">3x + 6 = 3 + 2x + 8 &rArr;</span><span style=\"font-family: Cambria Math;\"> x = 11 - 6 = 5</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2340;&#2379;, &#2340;&#2368;&#2360;&#2352;&#2366; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;</span> = x + 4 = 5 + 4 = 9</span></p>\n",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });

                questions.push({

                    options_hi: ["<p><span style=\"font-family: Nirmala UI;\">&#2325;&#2376;&#2354;&#2381;&#2358;&#2367;&#2351;&#2350;</span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350;</span></p>\n",
                                "<p><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2368;&#2344;</span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;</span></p>\n"],
                    solution_en: "<p>77.(d) <strong>Nitrogen</strong> <span style=\"font-family: Cambria Math;\">is an essential element used in the synthesis of proteins in plants because plants are not capable of producing nitrogen, therefore, plants obtain nitrogen with the help of </span><span style=\"font-family: Cambria Math;\">nitrogen -fixing bacteria like Rhizobium. </span></p>\n",

                    solution_en: "<p>78.(b) <strong>Revenue Expenditure</strong> <span style=\"font-family: Cambria Math;\">is that part of government expenditure that does not result in the creation of assets. Examples: Payment of salaries, wages, pensions, subsidies, and interest. Measures of government deficit are </span><span style=\"font-family: Cambria Math;\">Reve</span><span style=\"font-family: Cambria Math;\">nue </span><span style=\"font-family: Cambria Math;\">deficit = Revenue expenditure &ndash; Revenue receipts; Gross </span><span style=\"font-family: Cambria Math;\"><strong>fiscal</strong> </span><span style=\"font-family: Cambria Math;\">deficit = Net borrowing at home + Borrowing from RBI + Borrowing from abroad; Gross </span><span style=\"font-family: Cambria Math;\"><strong>primary</strong> </span><span style=\"font-family: Cambria Math;\">deficit = Gross fiscal deficit &ndash; Net interest liabilities. </span></p>\n",
