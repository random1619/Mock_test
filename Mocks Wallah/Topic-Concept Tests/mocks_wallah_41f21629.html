<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>

                questions.push({
                    id: "29",
                    section: "6",
                    question_en: "<p>29. <span style=\"font-family: Cambria Math;\">Based on the position in the English alphabetical order, three of the following letter- clusters are alike in some manner and one is different. Select the odd letter-cluster.</span></p>\n",
                    question_hi: "<p>29<span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2352;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2343;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2368;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2325;&#2381;&#2359;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2350;&#2370;&#2361;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2360;&#2368;</spa                     options_hi: ["<p>TRNH</p>\n", "<p>OMIC</p>\n",

                    solution_en: "<p>29.(d)</p>\r\n<p><span style=\"font-family: Cambria Math;\">In TRNH</span><span style=\"font-family: Cambria Math;\"> &rArr; T - 2 = R, R - 4 = N, N - 6 = H</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">In OMIC &rArr; O - 2 = M , M - 4 = I, I - 6 = C</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">In RPLF &rArr; R - 2 = P, P - 4 = L, L - 6 = F</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">In WTPK &rArr; W - 3 = T, T - 4 = P, P - 5 = K</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Hence we can see that all are following the same pattern except </span><span style=\"font-family: Cambria Math;\"><strong>WTPK</strong>.</span></p>\n",

                questions.push({
                    id: "60",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">60. A tradesman marks his goods 25% above the cost price and allows his customers 10% </span><span style=\"font-family: Cambria Math;\">reduct</span><span style=\"font-family: Cambria Math;\">ion on their bills. What percentage profit does he make? </span></p>\n",

                    options_hi: ["<p>12.6%</p>\n", "<p>12.5%</p>\n",

                questions.push({

                    question_en: "<p><span style=\"font-family: Cambria Math;\">61. </span><span style=\"font-family: Cambria Math;\">A boat takes 18 minutes to go 16.2 km upstream. The ratio of the speed of the boat in still water to that of the stream is 5 : 3. How much total time (in hours) will the boat take to go 162 km upstream and 108 km downstream?</span></p>\n",

/span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2366;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2330;&#2366;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2343;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2330;&#2366;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> 5 : 3 </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2366;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2343;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2346;&#2352;&#2368;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2367;&#2358;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 162 km </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2343;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2367;&#2358;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 108 km </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2366;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2340;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2350;&#2351;</span><span style=\"font-family: Cambria Math;\"> ( </span><span style=\"font-family: Nirmala UI;\">&#2328;&#2306;&#2335;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> ) </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2327;&#2375;&#2327;&#2366;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>2.4 <span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>2</p>\n", 
                                "<p>1.6</p>\n", "<p>3.5</p>\n"],
                    options_hi: ["<p>2.4 <span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>2</p>\n",
                                "<p>1.6</p>\n", "<p>3.5</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">61.(d) </span></p>\r\n<p><span style=\"font-weight: 400;\">Speed of the boat in upstream = </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>16</mn><mo>.</mo><mn>2</mn></mrow><mn>18</mn></mfrac></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">&times; 60 = 54 km/h</span></p>\r\n<p><span style=\"font-weight: 400;\">Ratio of speed of the boat in still water to speed of stream = 5 : 3</span></p>\r\n<p><span style=\"font-weight: 400;\">Upstream speed (5 </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">3) units&nbsp; = 2 unit ----------- 54 km/hr</span></p>\r\n<p><span style=\"font-weight: 400;\">Then, 1 unit &nbsp; -----------&nbsp; 27 km/hr</span></p>\r\n<p><span style=\"font-weight: 400;\">Downstream speed (5 + 3) unit = 8 unit = 8 &times; 27 = 216 km/hr</span></p>\r\n<p><span style=\"font-weight: 400;\">Now, total time taken by boat = </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>162</mn><mn>54</mn></mfrac></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">+</span><span style=\"font-weight: 400;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>108</mn><mn>216</mn></mfrac></math><span style=\"font-weight: 400;\"> = 3 + 0.5 = 3.5 hrs</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">61.(d)</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; = </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>16</mn><mo>.</mo><mn>2</mn></mrow><mn>18</mn></mfrac></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">&times; 60 = 54 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2358;&#2366;&#2306;&#2340; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2366; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; = 5 : 3</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; = (5 - 3) = 2 &#2311;&#2325;&#2366;&#2312; -------- 54 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2347;&#2367;&#2352;, 1 &#2311;&#2325;&#2366;&#2312; ----------- 27 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; = (5 + 3) &#2311;&#2325;&#2366;&#2312; = 8 unit = 8 &times; 27 = 216 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2309;&#2348;, &#2344;&#2366;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2369;&#2354; &#2360;&#2350;&#2351; = </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>162</mn><mn>54</mn></mfrac></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">+</span><span style=\"font-weight: 400;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>108</mn><mn>216</mn></mfrac></math><span style=\"font-weight: 400;\"> = 3 + 0.5 = 3.5 <span style=\"font-family: Nirmala UI;\">&#2328;&#2306;&#2335;&#2375;</span></span></p>\n",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5

                questions.push({
                    id: "62",
                    section: "17",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">64.(c)&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">Let the money of Arun and Ahana = 7x and 3x</span></p>\r\n<p><span style=\"font-weight: 400;\">ATQ ,</span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr; </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>7</mn><mi>x</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>12</mn></mrow><mrow><mn>3</mn><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>12</mn></mrow></mfrac></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">=</span><span style=\"font-weight: 400;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2</mn><mn>3</mn></mfrac></math><span style=\"font-weight: 400;\"> </span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr;</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">21x</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">- 36</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">=</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">6x</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">+</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">24</span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr; </span><span style=\"font-weight: 400;\">15x = 60</span><span style=\"font-weight: 400;\"> &nbsp; </span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr; </span><span style=\"font-weight: 400;\">x = 4</span></p>\r\n<p><span style=\"font-weight: 400;\">Amount of Arun initially&nbsp;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">= 7x = 7 &times; </span><span style=\"font-weight: 400;\">4 = Rs 28</span></span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">64.(c)</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2350;&#2366;&#2344;&#2366; &#2309;&#2352;&#2369;&#2339; &#2324;&#2352; &#2309;&#2361;&#2366;&#2344;&#2366; &#2325;&#2368; &#2352;&#2366;&#2358;&#2367; = 7x and 3x</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; ,</span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr; </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>7</mn><mi>x</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>12</mn></mrow><mrow><mn>3</mn><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>12</mn></mrow></mfrac></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">=</span><span style=\"font-weight: 400;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2</mn><mn>3</mn></mfrac></math><span style=\"font-weight: 400;\"> </span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr;</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">21x</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">- 36</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">=</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">6x</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">+</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">24</span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr; </span><span style=\"font-weight: 400;\">15x = 60</span><span style=\"font-weight: 400;\"> &nbsp; </span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr; </span><span style=\"font-weight: 400;\">x = 4</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2358;&#2369;&#2352;&#2370; &#2350;&#2375;&#2306; &#2309;&#2352;&#2369;&#2339; &#2325;&#2368; &#235 amily: Nirmala UI;\">&#2361;&#2376;&#2404;</span></p>\n",

                    solution_en: "<p>65.(c)&nbsp;<strong>Formula used :</strong></p>\r\n<p><strong>&nbsp;</strong>a&sup3;&nbsp;+ b&sup3;&nbsp;+ c&sup3;&nbsp;= 3abc<span style=\"font-weight: 400;\"> (when a + b + c = 0)</span></p>\r\n<p><span style=\"font-weight: 400;\">a&sup2;</span><span style=\"font-weight: 400;\">&nbsp;- </span><span style=\"font-weight: 400;\">b&sup2;</span><span style=\"font-weight: 400;\">&nbsp;= (a - b)(a + b)</span></p>\r\n<p><span style=\"font-weight: 400;\">Now, (x - y) + (y - z) + (z - x) = 0</span></p>\r\n<p><strong>&rArr; </strong><span style=\"font-weight: 400;\">(x - y</span><span style=\"font-weight: 400;\">)&sup3;</span><span style=\"font-weight: 400;\">&nbsp;+ (y - z</span><span style=\"font-weight: 400;\">)&sup3;</span><span style=\"font-weight: 400;\">&nbsp;+ (z - x</span><span style=\"font-weight: 400;\">)&sup3; </span><span style=\"font-weight: 400;\">= 3(x - y)(y - z)(z - x)&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\">x&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">y&sup2;</span><span style=\"font-weight: 400;\">) + (</span><span style=\"font-weight: 400;\">y&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">z&sup2;</span><span style=\"font-weight: 400;\">) + (</span><span style=\"font-weight: 400;\">z&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\">) = 0</span></p>\r\n<p><strong>&rArr; </strong><span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\">x&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">y&sup2;</span><span style=\"font-weight: 400;\">)&sup3;</span><span style=\"font-weight: 400;\">&nbsp;+ (</span><span style=\"font-weight: 400;\">y&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">z&sup2;</span><span style=\"font-weight: 400;\">)&sup3;</span><span style=\"font-weight: 400;\">&nbsp;+ (</span><span style=\"font-weight: 400;\">z&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\">)&sup3;</span><span style=\"font-weight: 400;\">&nbsp;= 3(</span><span style=\"font-weight: 400;\">x&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">y&sup2;</span><span style=\"font-weight: 400;\">)</span><span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\">y&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">z&sup2;</span><span style=\"font-weight: 400;\">)(</span><span style=\"font-weight: 400;\">z&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\">)</span></p>\r\n<p><span style=\"font-weight: 400;\">So, </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><msup><mrow><mo>(</mo><mi>x</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>y</mi><mo>)</mo></mrow><mn>3</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><mi>y</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>z</mi><mo>)</mo></mrow><mn>3</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><mi>z</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>x</mi><mo>)</mo></mrow><mn>3</mn></msup></mrow><mrow><msup><mrow><mo>(</mo><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>y</mi><mn>2</mn></msup><mo>)</mo></mrow><mn>3</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><msup><mi>y</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>z</mi><mn>2</mn></msup><mo>)</mo></mrow><mn>3</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><msup><mi>z</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>x</mi><mn>2</mn></msup><mo>)</mo></mrow><mn>3</mn></msup><mo>&nbsp;</mo></mrow></mfrac></math></p>\r\n<p><span style=\"font-weight: 400;\">= </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>3</mn><mo>(</mo><mi>x</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>y</mi><mo>)</mo><mo>(</mo><mi>y</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>z</mi><mo>)</mo><mo>(</mo><mi>z</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>x</mi><mo>)</mo><mo>&nbsp;</mo></mrow><mrow><mn>3</mn><mo>(</mo><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>y</mi><mn>2</mn></msup><mo>)</mo><mo>(</mo><msup><mi>y</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>z</mi><mn>2</mn></msup><mo>)</mo><mo>(</mo><msup><mi>z</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>x</mi><mn>2</mn></msup><mo>)</mo></mrow></mfrac></math><span style=\"font-weight: 400;\">&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">= </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mrow><mo>(</mo><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>y</mi><mo>)</mo><mo>(</mo><mi>y</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>z</mi><mo>)</mo><mo>(</mo><mi>z</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>x</mi><mo>)</mo></mrow></mfrac></math></p>\n",
                    solution_hi: "<p>65.(c) <strong>&#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2370;&#2340;&#2381;&#2352;:</strong></p>\r\n<p><strong>&nbsp;</strong>a&sup3;&nbsp;+ b&sup3;&nbsp;+ c&sup3;&nbsp;= 3abc<span style=\"font-weight: 400;\"> (&#2332;&#2348; a + b + c = 0)</span></p>\r\n<p><span style=\"font-weight: 400;\">a&sup2;</span><span style=\"font-weight: 400;\">&nbsp;- </span><span style=\"font-weight: 400;\">b&sup2;</span><span style=\"font-weight: 400;\">&nbsp;= (a - b)(a + b)</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2309;&#2348;, (x - y) + (y - z) + (z - x) = 0</span></p>\r\n<p><strong>&rArr; </strong><span style=\"font-weight: 400;\">(x - y</span><span style=\"font-weight: 400;\">)&sup3;</span><span style=\"font-weight: 400;\">&nbsp;+ (y - z</span><span style=\"font-weight: 400;\">)&sup3;</span><span style=\"font-weight: 400;\">&nbsp;+ (z - x</span><span style=\"font-weight: 400;\">)&sup3; </span><span style=\"font-weight: 400;\">= 3(x - y)(y - z)(z - x)&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\">x&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">y&sup2;</span><span style=\"font-weight: 400;\">) + (</span><span style=\"font-weight: 400;\">y&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">z&sup2;</span><span style=\"font-weight: 400;\">) + (</span><span style=\"font-weight: 400;\">z&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\">) = 0</span></p>\r\n<p><strong>&rArr; </strong><span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\">x&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">y&sup2;</span><span style=\"font-weight: 400;\">)&sup3;</span><span style=\"font-weight: 400;\">&nbsp;+ (</span><span style=\"font-weight: 400;\">y&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">z&sup2;</span><span style=\"font-weight: 400;\">)&sup3;</span><span style=\"font-weight: 400;\">&nbsp;+ (</span><span style=\"font-weight: 400;\">z&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\">)&sup3;</span><span style=\"font-weight: 400;\">&nbsp;= 3(</span><span style=\"font-weight: 400;\">x&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">y&sup2;</span><span style=\"font-weight: 400;\">)</span><span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\">y&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">z&sup2;</span><span style=\"font-weight: 400;\">)(</span><span style=\"font-weight: 400;\">z&sup2; </span><span style=\"font-weight: 400;\">- </span><span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\">)</span></p>\r\n<p><span style=\"font-weight: 400;\">So, </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><msup><mrow><mo>(</mo><mi>x</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>y</mi><mo>)</mo></mrow><mn>3</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><mi>y</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>z</mi><mo>)</mo></mrow><mn>3</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><mi>z</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>x</mi><mo>)</mo></mrow><mn>3</mn></msup></mrow><mrow><msup><mrow><mo>(</mo><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>y</mi><mn>2</mn></msup><mo>)</mo></mrow><mn>3</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><msup><mi>y</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>z</mi><mn>2</mn></msup><mo>)</mo></mrow><mn>3</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><msup><mi>z</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>x</mi><mn>2</mn></msup><mo>)</mo></mrow><mn>3</mn></msup><mo>&nbsp;</mo></mrow></mfrac></math></p>\r\n<p><span style=\"font-weight: 400;\">= </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>3</mn><mo>(</mo><mi>x</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>y</mi><mo>)</mo><mo>(</mo><mi>y</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>z</mi><mo>)</mo><mo>(</mo><mi>z</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>x</mi><mo>)</mo><mo>&nbsp;</mo></mrow><mrow><mn>3</mn><mo>(</mo><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>y</mi><mn>2</mn></msup><mo>)</mo><mo>(</mo><msup><mi>y</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>z</mi><mn>2</mn></msup><mo>)</mo><mo>(</mo><msup><mi>z</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msup><mi>x</mi><mn>2</mn></msup><mo>)</mo></mrow></mfrac></math><span style=\"font-weight: 400;\">&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">= </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mrow><mo>(</mo><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>y</mi><mo>)</mo><mo>(</mo><mi>y</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>z</mi><mo>)</mo><mo>(</mo><mi>z</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>x</mi><mo>)</mo></mrow></mfrac></math></p>\n",

                questions.push({
                    id: "66",
                    section: "17",
                    question_en: "<p>66. <span style=\"font-family: Cambria Math;\">In the given figure, value of <span style=\"font-weight: 400;\">&ang;AED</span> is</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688530512/word/media/image48.png\" width=\"200\" height=\"175\"></p>\n",
                    question_hi: "<p>66. <span style=\"font-family: Nirmala UI;\">&#2342;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2325;&#2371;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\"><span style=\"font-weight: 400;\">&ang;AED</span> &#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688530512/word/media/image48.png\" width=\"200\" height=\"175\"></p>\n",
                    options_en: ["<p>70&deg;</p>\n", "<p>60&deg;</p>\n", 
                                "<p>65&deg;</p>\n", "<p>55&deg;</p>\n"],
                    options_hi: ["<p>70&deg;</p>\n", "<p>60&deg;</p>\n",
                                "<p>65&deg;</p>\n", "<p>55&deg;</p>\n"],
                    solution_en: "<p>66.(d)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688530512/word/media/image48.png\" width=\"201\" height=\"177\"><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-weight: 400;\">As we can see ABCDE is a pentagon.</span></p>\r\n<p><span style=\"font-weight: 400;\">Sum of the interior angles of the pentagon ABCDE = 540&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">Now, &ang;</span><span style=\"font-weight: 400;\">DCB </span><span style=\"font-weight: 400;\">= 95&deg;, &ang;</span><span style=\"font-weight: 400;\">CBA </span><span style=\"font-weight: 400;\">= 110&deg;,&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">&ang;BAE </span><span style=\"font-weight: 400;\">= 90&deg; and </span><span style=\"font-weight: 400;\">&ang;CDE </span><span style=\"font-weight: 400;\">= 120&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr; </span><span style=\"font-weight: 400;\">&ang;AED </span><span style=\"font-weight: 400;\">= 540&deg; - (95&deg; + 110&deg; + 90&deg; + 120&deg;)&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">= 540&deg;- 415&deg; = 125&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr; &ang;AED = 180&deg;- 125&deg; = 55&deg;</span></p>\n",
                    solution_hi: "<p>66.(d)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688530512/word/media/image48.png\" width=\"201\" height=\"177\"><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-weight: 400;\">&#2332;&#2376;&#2360;&#2366; &#2325;&#2367; &#2361;&#2350; &#2342;&#2375;&#2326; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367; ABCDE &#2319;&#2325; &#2346;&#2306;&#2330;&#2349;&#2369;&#2332; &#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2346;&#2306;&#2330;&#2349;&#2369;&#2332; ABCDE &#2325;&#2375; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; =&nbsp; 540&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2309;&#2348;, &ang;</span><span style=\"font-weight: 400;\">DCB </span><span style=\"font-weight: 400;\">= 95&deg;, &ang;</span><span style=\"font-weight: 400;\">CBA </span><span style=\"font-weight: 400;\">= 110&deg;,&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">&ang;BAE </span><span style=\"font-weight: 400;\">= 90&deg; &#2324;&#2352; </span><span style=\"font-weight: 400;\">&ang;CDE </span><span style=\"font-weight: 400;\">= 120&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr; </span><span style=\"font-weight: 400;\">&ang;AED </span><span style=\"font-weight: 400;\">= 540&deg; - (95&deg; + 110&deg; + 90&deg; + 120&deg;)&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">= 540&deg;- 415&deg; = 125&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr;&ang;AED = 180&deg;- 125&deg; = 55&deg;</span></p>\n",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5

                questions.push({
                    id: "67",
                    section: "17",
                    question_en: "<p>67.<span style=\"font-family: Cambria Math;\"> The base and the altitude of a right-angled triangle are 21 cm and 20 cm respectively. What is the altitude from the opposite vertex to its hypotenuse?</span></p>\n",
                    question_hi: "<p>67.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2350;&#2325;&#2379;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2343;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2314;&#2305;&#2330;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2352;</span><span style=\"font-family: Nirmala UI;\">&#2350;&#2358;&#2307;</span><span style=\"font-family: Cambria Math;\"> 21cm </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 20cm </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2346;&#2352;&#2368;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2358;&#2368;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2313;&#2360;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2352;&#2381;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2314;&#2305;&#2330;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2340;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>17<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>29</mn></mfrac></math><span style=\"font-family: Cambria Math;\">cm</span></p>\n", "<p>13<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>7</mn><mn>29</mn></mfrac></math><span style=\"font-family: Cambria Math;\">cm</span></p>\n", 
                                "<p>14<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>14</mn><mn>29</mn></mfrac></math><span style=\"font-family: Cambria Math;\">cm</span></p>\n", "<p>17<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>11</mn><mn>29</mn></mfrac></math><span style=\"font-family: Cambria Math;\">cm</span></p>\n"],
                    options_hi: ["<p>17<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>29</mn></mfrac></math><span style=\"font-family: Cambria Math;\">cm</span></p>\n", "<p>13<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>7</mn><mn>29</mn></mfrac></math><span style=\"font-family: Cambria Math;\">cm</span></p>\n",

                    solution_en: "<p>67.(c)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688530512/word/media/image49.png\" width=\"201\" height=\"167\"></p>\r\n<p><span style=\"font-weight: 400;\">Given , </span><span style=\"font-weight: 400;\">AB = 20 cm and BC = 21 cm</span></p>\r\n<p><span style=\"font-weight: 400;\">AC = </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><msup><mrow><mo>(</mo><mi>A</mi><mi>B</mi><mo>)</mo></mrow><mn>2</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><mi>B</mi><mi>C</mi><mo>)</mo></mrow><mn>2</mn></msup></msqrt></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\"> =&nbsp; </span><span style=\"font-weight: 400;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><msup><mn>21</mn><mn>2</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mn>20</mn><mn>2</mn></msup></msqrt></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">= 29 cm</span></p>\r\n<p><span style=\"font-weight: 400;\">&nbsp;Now applying this formula , </span></p>\r\n<p><span style=\"font-weight: 400;\">AB &times; BC = AC &times; BD&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr; 20 &times; 21&nbsp; = 29 &times; BD&nbsp;&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\"> BD = 14</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>14</mn><mn>29</mn></mfrac></math><span style=\"font-weight: 400;\"> cm&nbsp;</span></p>\n",

                questions.push({
                    id: "72",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">72.</span><span style=\"font-family: Cambria Math;\"> If A, B, C are acute angles and sin(B + C - A) = sec(C + A - B) = tan(A + B - C) = 1 then what is (A + B + C) equal to ?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">72.</span><span style=\"font-family: Nirmala UI;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> A, B, C </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2381;&#2351;&#2370;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> ssin(B + C - A) = sec(C + A - B) = tan(A + B - C) = 1</span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> (A + B + C) </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2360;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2352;&#2366;&#2348;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>90&deg;</p>\n", "<p>120&deg;</p>\n", 
                                "<p>135&deg;</p>\n", "<p>150&deg;</p>\n"],
                    options_hi: ["<p>90&deg;</p>\n", "<p>120&deg;</p>\n",
                                "<p>135&deg;</p>\n", "<p>150&deg;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">72.(c)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">sin(B + C - A) = sin90&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; B + C - A = 90&deg; ------ (1)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">sec(C + A - B) = Sec0&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; C + A = B------ (2)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">tan(A + B - C) = tan45&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">A + B - C = 45&deg;------ (3)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Adding eqn (1) and (3) we have :</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">2B = 135&deg; </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; B = (<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>135</mn><mo>&deg;</mo></mrow><mn>2</mn></mfrac></math>)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Therefore, (A + C) + B = 2B = 2 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>135</mn><mo>&deg;</mo></mrow><mn>2</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">= 135&deg; (from(eq. 2))</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">72.(c)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">sin(B + C - A) = sin90&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; B + C - A = 90&deg; ------ (1)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">sec(C + A - B) = Sec0&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; C + A = B------ (2)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">tan(A + B - C) = tan45&deg;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">A + B - C = 45&deg;------ (3)</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2360;&#2350;&#2368;&#2325;&#2352;&#2339; (1) &#2324;&#2352; (3) &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2346;&#2352; &#2361;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; :</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">2B = 135&deg; </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; B = (<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>135</mn><mo>&deg;</mo></mrow><mn>2</mn></mfrac></math>)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span>, (A + C) + B = 2B = 2 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>135</mn><mo>&deg;</mo></mrow><mn>2</mn></mfrac></math> </span><span style=\"font-family: Cambria Math;\">= 135&deg;((<span style=\"font-weight: 400;\">&#2360;&#2350;&#2368;&#2325;&#2352;&#2339; </span>2) <span style=\"font-weight: 400;\">&#2360;&#2375;</span>)</span></p>\n",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });

                    solution_en: "<p>81<span style=\"font-family: Cambria Math;\">.(c) <strong>Maihar (Founder). Awards -</strong><span style=\"font-weight: 400;\"> Padma Bhushan (1958), Padma Vibhushan (1971), Sangeet Natak Akademi award (1954). Famous sarod players - Ustad Amjad Ali Khan (Sarod Samrat), Tejendra Majumdar, Ali Akbar Khan, Sharan Rani Bakliwal (India\'s first woman sarod player). Gharana Founders - Agra Rangila (Hajisujan Khan), Patiyala(Ali Baksh Khan and Fateh Ali Khan), Benaras (Pandit Ram Sahai).</span></span></p>\n",
                    solution_hi: "<p>81.(c)&nbsp;<strong>&#2350;&#2376;&#2361;&#2352; (&#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325;)&#2404; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352;</strong><span style=\"font-weight: 400;\"> - &#2346;&#2342;&#2381;&#2350; &#2349;&#2370;&#2359;&#2339; (1958), &#2346;&#2342;&#2381;&#2350; &#2357;&#2367;&#2349;&#2370;&#2359;&#2339; (1971), &#2360;&#2306;&#2327;&#2368;&#2340; &#2344;&#2366;&#2335;&#2325; &#2309;&#2325;&#2366;&#2342;&#2350;&#2368; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; (1954)&#2404; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2360;&#2352;&#2379;&#2342; &#2357;&#2366;&#2342;&#2325; - &#2313;&#2360;&#2381;&#2340;&#2366;&#2342; &#2309;&#2350;&#2332;&#2342; &#2309;&#2354;&#2368; &#2326;&#2366;&#2344; (&#2360;&#2352;&#2379;&#2342; &#2360;&#2350;&#2381;&#2352;&#2366;&#2335;), &#2340;&#2375;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2350;&#2332;&#2370;&#2350;&#2342;&#2366;&#2352;, &#2309;&#2354;&#2368; &#2309;&#2325;&#2348;&#2352; &#2326;&#2366;&#2344;, &#2358;&#2352;&#2339; &#2352;&#2366;&#2344;&#2368; &#2348;&#2366;&#2325;&#2354;&#2368;&#2357;&#2366;&#2354; (&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2346;&#2361;&#2354;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366; &#2360;&#2352;&#2379;&#2342; &#2357;&#2366;&#2342;&#2325;)&#2404; &#2328;&#2352;&#2366;&#2344;&#2375; &#2325;&#2375; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325; - &#2310;&#2327;&#2352;&#2366; &#2352;&#2306;&#2327;&#2368;&#2354;&#2366; (&#2361;&#2332;&#2368;&#2360;&#2369;&#2332;&#2366;&#2344; &#2326;&#2366;&#2344;), &#2346;&#2335;&#2367;&#2351;&#2366;&#2354;&#2366; (&#2309;&#2354;&#2368; &#2348;&#2325;&#2381;&#2358; &#2326;&#2366;&#2344; &#2324;&#2352; &#2347;&#2340;&#2375;&#2361; &#2309;&#2354;&#2368; &#2326;&#2366;&#2344;), &#2348;&#2344;&#2366;&#2352;&#2360; (&#2346;&#2306;&#2337;&#2367;&#2340; &#2352;&#2366;&#2350; &#2360;&#2361;&#2366;&#2351;)&#2404;</span></p>\n",

                questions.push({
                    id: "82",
                    section: "18",
                    question_en: "<p>82. <span style=\"font-family: Cambria Math;\">Onam is celebrated as the homecoming </span><span style=\"font-family: Cambria Math;\">of which Ausura King?</span></p>\n",
                    question_hi: "<p>82. <span style=\"font-family: Nirmala UI;\">&#2323;&#2339;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2360;&#2369;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2352;&#2366;&#2332;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2328;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2366;&#2346;&#2360;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2352;&#2370;&#2346;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2344;&#2366;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2366;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Mahabali</p>\n", "<p>Kansa</p>\n", 
                                "<p>Devadutta</p>\n", "<p>Yama</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2361;&#2366;&#2348;&#2354;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2325;&#2306;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
                                "<p><span style=\"font-family: Nirmala UI;\">&#2342;&#2375;&#2357;&#2342;&#2340;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2351;&#2350;</span></p>\n"],
                    solution_en: "<p>82.(a) <strong>Mahabali. </strong><span style=\"font-weight: 400;\">Onam is a harvest festival of Kerala. Few events performed during Onam are Vallam Kali (boat races), Pulikali (tiger dances), Pookkalam (flower rangoli), Onathappan (worship), Onam Kali, Tug of War, Thumbi Thullal (women\'s dance), Kummattikali (mask dance), Onathallu (martial arts), etc. Some other festivals are Vishu, Thrissur Pooram, Kodungallur Bharani etc.</span></p>\n",
                    solution_hi: "<p>82.(a) <strong>&#2350;&#2361;&#2366;&#2348;&#2354;&#2368;</strong><span style=\"font-weight: 400;\">&#2404; &#2323;&#2339;&#2350; &#2325;&#2375;&#2352;&#2354; &#2325;&#2366; &#2319;&#2325; &#2347;&#2360;&#2354; &#2313;&#2340;&#2381;&#2360;&#2357; &#2361;&#2376;&#2404; &#2323;&#2339;&#2350; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2325;&#2369;&#2331; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2354;&#2381;&#2354;&#2350; &#2325;&#2366;&#2354;&#2368; (&#2344;&#2380;&#2325;&#2366; &#2342;&#2380;&#2337;&#2364;), &#2346;&#2369;&#2354;&#2367;&#2325;&#2354;&#2368; (&#2348;&#2366;&#2328; &#2344;&#2371;&#2340;&#2381;&#2351;), &#2346;&#2369;&#2325;&#2381;&#2325;&#2354;&#2350; (&#2347;&#2370;&#2354;&#2379;&#2306; &#2325;&#2368; &#2352;&#2306;&#2327;&#2379;&#2354;&#2368;), &#2323;&#2344;&#2366;&#2341;&#2346;&#2381;&#2346;&#2344; (&#2346;&#2370;&#2332;&#2366;), &#2323;&#2339;&#2350; &#2325;&#2366;&#2354;&#2368;, &#2352;&#2360;&#2381;&#2360;&#2366;&#2325;&#2358;&#2368;, &#2341;&#2369;&#2350;&#2381;&#2348;&#2368; &#2341;&#2369;&#2354;&#2381;&#2354;&#2354; (&#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2366; &#2344;&#2371;&#2340;&#2381;&#2351;), &#2325;&#2369;&#2350;&#2381;&#2350;&#2335;&#2381;&#2335;&#2367;&#2325;&#2354;&#2368; (&#2350;&#2369;&#2326;&#2380;&#2335;&#2366; &#2344;&#2371;&#2340;&#2381;&#2351;), &#2323;&#2344;&#2366;&#2341;&#2354;&#2370; (&#2350;&#2366;&#2352;&#2381;&#2358;&#2354; &#2310;&#2352;&#2381;&#2335;), &#2310;&#2342;&#2367;&#2404; </span><strong>&#2325;&#2369;&#2331; &#2309;&#2344;&#2381;&#2351; &#2340;&#2381;&#2351;&#2380;&#2361;&#2366;&#2352; </strong><span style=\"font-weight: 400;\">&#2357;&#2367;&#2358;&#2369;, &#2340;&#2381;&#2352;&#2367;&#2358;&#2370;&#2352; &#2346;&#2370;&#2352;&#2350;, &#2325;&#2379;&#2337;&#2369;&#2306;&#2327;&#2354;&#2381;&#2354;&#2370;&#2352; &#2349;&#2352;&#2339;&#2368; &#2310;&#2342;&#2367; &#2361;&#2376;&#2306;&#2404;</span></p>\n",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "83",
                    section: "18",
                    question_en: "<p>83.<span style=\"font-family: Cambria Math;\"> Which of the following festivals is celebrated in Manipur to celebrate th</span><span style=\"font-family: Cambria Math;\">e onset of spring?</span></p>\n",
                    question_hi: "<p>83.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2339;&#2367;&#2346;&#2369;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2360;&#2306;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2358;&#2369;&#2352;&#2369;&#2310;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2313;&#2340;&#2381;&#2360;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2344;&#2366;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2380;&#2344;</span><span style=\"font-family: Cambria Math;\">-</span><span style=\"font-family: Nirmala UI;\">&#2360;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2344;&#2366;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2366;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> ?</span></p>\n",
                    options_en: ["<p>Kut</p>\n", "<p>Yaoshang</p>\n", 
                                "<p>Lai-Haraoba</p>\n", "<p>Gang-Ngai</p>\n"],
                    options_hi: ["<p><span style=\"font-weight: 400;\">&#2325;&#2369;&#2335; (Kut)</span></p>\n", "<p><span style=\"font-weight: 400;\">&#2351;&#2366;&#2323;&#2358;&#2366;&#2306;&#2327; (Yaoshang)</span></p>\n",
                                "<p><span style=\"font-weight: 400;\">&#2354;&#2366;&#2312; &#2361;&#2352;&#2366;&#2323;&#2348;&#2366; (Lai-Haraoba)</span></p>\n", "<p><span style=\"font-weight: 400;\">&#2327;&#2306;&#2327;-&#2327;&#2366;&#2312; (Gang-Ngai)</span></p>\n"],
                    solution_en: "<p>83.(b)<span style=\"font-weight: 400;\">&nbsp;</span><strong>Yaoshang</strong><span style=\"font-weight: 400;\"> is the spring festival of Holi celebrated by the Meitei tribe. Thabal chongba is a Manipuri folk dance of Yaoshang. Festivals of Manipur - Kut festival (Chavang Kut) - tribes of Kuki-Chin-Mizo, Lai Haraoba, Gang Ngai (Kabui Nagas tribes), Heikru Hidongba. </span></p>\n",
                    solution_hi: "<p>83.(b) <strong>&#2351;&#2366;&#2323;&#2358;&#2366;&#2306;&#2327;</strong><span style=\"font-weight: 400;\">, &#2350;&#2376;&#2340;&#2375;&#2312; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2361;&#2379;&#2354;&#2368; &#2325;&#2366; &#2357;&#2360;&#2306;&#2340; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2361;&#2376;&#2404; &#2341;&#2348;&#2354; &#2330;&#2379;&#2306;&#2327;&#2348;&#2366; &#2351;&#2379;&#2358;&#2366;&#2306;&#2327; &#2325;&#2366; &#2319;&#2325; &#2350;&#2339;&#2367;&#2346;&#2369;&#2352;&#2368; &#2354;&#2379;&#2325;&#2344;&#2371;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404; &#2350;&#2339;&#2367;&#2346;&#2369;&#2352; &#2325;&#2375; &#2340;&#2381;&#2351;&#2380;&#2361;&#2366;&#2352; - &#2325;&#2369;&#2335; &#2340;&#2381;&#2351;&#2380;&#2361;&#2366;&#2352; (&#2330;&#2357;&#2366;&#2306;&#2327; &#2325;&#2369;&#2335;) - &#2325;&#2369;&#2325;&#2368;-&#2330;&#2367;&#2344;-&#2350;&#2367;&#2332;&#2364;&#2379;, &#2354;&#2366;&#2312; &#2361;&#2352;&#2379;&#2348;&#2366;, &#2327;&#2306;&#2327; &#2344;&#2327;&#2366;&#2312; (&#2325;&#2366;&#2348;&#2369;&#2312; &#2344;&#2366;&#2327;&#2366; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367;), &#2361;&#2375;&#2311;&#2325;&#2381;&#2352;&#2370; &#2361;&#2367;&#2337;&#2379;&#2306;&#2327;&#2348;&#2366; &#2325;&#2368; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367;&#2351;&#2366;&#2305;&#2404;</span></p>\n",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "84",
                    section: "18",
                    question_en: "<p>84. <span style=\"font-family: Cambria Math;\">What are the two main minerals that make water hard?</span></p>\n",
                    question_hi: "<p>84<span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2336;&#2379;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2344;&#2366;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2366;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2350;&#2369;&#2326;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2326;&#2344;&#2367;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2380;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2306;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Iron and Sulfur</p>\n", "<p>gypsum and manganese</p>\n", 
                                "<p>Magnesium and Calcium</p>\n", "<p>sodium and potassium</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Nirmala UI;\">&#2310;&#2351;&#2352;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2354;&#2381;&#2347;&#2352;</span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2332;&#2367;&#2346;&#2381;&#2360;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2376;&#2327;&#2381;&#2344;&#2368;&#2332;</span></p>\n",
                                "<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2376;&#2327;&#2381;&#2344;&#2368;&#2358;&#2367;&#2351;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2376;&#2354;&#2381;&#2358;&#2367;&#2351;&#2350;</span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2379;&#2335;&#2375;&#2358;&#2367;&#2351;&#2350;</span></p>\n"],
                    solution_en: "<p>84.(c) <strong>Hard water</strong><span style=\"font-weight: 400;\"> is caused by a high mineral content, which is generally calcium and magnesium. This hardness is largely due to groundwater that flows over or through limestone.</span></p>\n",
                    solution_hi: "<p>84.(c) <strong>&#2325;&#2336;&#2379;&#2352; &#2332;&#2354; </strong><span style=\"font-weight: 400;\">&#2319;&#2325; &#2313;&#2330;&#2381;&#2330; &#2326;&#2344;&#2367;&#2332; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2376;&#2354;&#2381;&#2358;&#2367;&#2351;&#2350; &#2324;&#2352; &#2350;&#2376;&#2327;&#2381;&#2344;&#2368;&#2358;&#2367;&#2351;&#2350; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2361; &#2325;&#2336;&#2379;&#2352;&#2340;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2349;&#2370;&#2332;&#2354; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2332;&#2379; &#2330;&#2370;&#2344;&#2366; &#2346;&#2340;&#2381;&#2341;&#2352; &#2325;&#2375; &#2314;&#2346;&#2352; &#2351;&#2366; &#2313;&#2360;&#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2348;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404;</span></p>\n",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "85",
                    section: "18",
                    question_en: "<p>85.<span style=\"font-family: Cambria Math;\"> Which mineral is known as &lsquo;buried Sunshine&rsquo; ?</span></p>\n",
                    question_hi: "<p>85.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2326;&#2344;&#2367;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> &lsquo;</span><span style=\"font-family: Nirmala UI;\">&#2342;&#2398;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2343;&#2370;&#2346;</span><span style=\"font-family: Cambria Math;\">&rsquo; </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2366;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2366;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> ? </span></p>\n",
                    options_en: ["<p>Iron</p>\n", "<p>Bauxite</p>\n", 
                                "<p>Mica</p>\n", "<p>Coal</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Nirmala UI;\">&#2354;&#2379;&#2361;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2348;&#2377;&#2325;&#2381;&#2360;&#2366;&#2311;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",

                    solution_en: "<p>85.(d)<span style=\"font-family: Cambria Math;\"> The coal which we are using today was formed millions of years ago when giant ferns and swamps got buried under the layers of Earth. Th</span><span style=\"font-family: Cambria Math;\">erefore Coal is referred to as \'buried sunshine\'.</span></p>\n",
