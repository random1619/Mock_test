                    solution_en: "<p>88.(b)<span style=\"font-family: Cambria Math;\"> <strong>Visakhadatta </strong><span style=\"font-weight: 400;\">was a well-known playwright of Sanskrit language. Vishakhadatta\'s creations - </span><strong>Devi Chandraguptam, and Raghavananda Natakam, \'Mudrarakshas\'</strong><span style=\"font-weight: 400;\">. There are two main texts of </span><strong>Banabhatta</strong><span style=\"font-weight: 400;\">: </span><strong>Harshacharitam </strong><span style=\"font-weight: 400;\">and </span><strong>Kadambari</strong><span style=\"font-weight: 400;\">. </span><strong>Works of Kalidas </strong><span style=\"font-weight: 400;\">- Malvikagnimitram, Abhigyanshakuntalam &middot; Vikramorvashiyam &middot; Kumarasambhavam &middot; Raghuvansham &middot; Meghdootam Ritusamhar. </span><strong>Compositions of Tulsidas</strong><span style=\"font-weight: 400;\"> - Ramcharitmanas Ramlalanahchu Vairagya-Sandipani Barvai Ramayana Parvati-Mangal Janaki-Mangal.</span></span></p>\n",
                    solution_hi: "<p>88.(b)<span style=\"font-family: Cambria Math;\"> <strong>&#2357;&#2367;&#2358;&#2366;&#2326;&#2342;&#2340;&#2381;&#2340; </strong><span style=\"font-weight: 400;\">&#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340; &#2349;&#2366;&#2359;&#2366; &#2325;&#2375; &#2360;&#2369;&#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2344;&#2366;&#2335;&#2325;&#2325;&#2366;&#2352; &#2341;&#2375;&#2404; </span><strong>&#2357;&#2367;&#2358;&#2366;&#2326;&#2342;&#2340;&#2381;&#2340; &#2325;&#2368;&nbsp; &#2352;&#2330;&#2344;&#2366;&#2351;&#2375;&#2306;</strong><span style=\"font-weight: 400;\"> - &#2342;&#2375;&#2357;&#2368; &#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340;&#2350;&#2381;, &#2340;&#2341;&#2366; &#2352;&#2366;&#2328;&#2357;&#2366;&#2344;&#2344;&#2381;&#2342; &#2344;&#2366;&#2335;&#2325;&#2350;&#2381; ,&lsquo;&#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2352;&#2366;&#2325;&#2381;&#2359;&#2360;&rsquo;&#2404; </span><strong>&#2348;&#2366;&#2339;&#2349;&#2335;&#2381;&#2335; &#2325;&#2375; &#2342;&#2379; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2327;&#2381;&#2352;&#2306;&#2341;</strong><span style=\"font-weight: 400;\"> &#2361;&#2376;&#2306;: &#2361;&#2352;&#2381;&#2359;&#2330;&#2352;&#2367;&#2340;&#2350;&#2381; &#2340;&#2341;&#2366; &#2325;&#2366;&#2342;&#2350;&#2381;&#2348;&#2352;&#2368;&#2404; </span><strong>&#2325;&#2366;&#2354;&#2367;&#2342;&#2366;&#2360; &#2325;&#2368; &#2352;&#2330;&#2344;&#2366;&#2319;&#2306; </strong><span style=\"font-weight: 400;\">- &#2350;&#2366;&#2354;&#2357;&#2367;&#2325;&#2366;&#2327;&#2381;&#2344;&#2367;&#2350;&#2367;&#2340;&#2381;&#2352;&#2350;&#2381; ,&#2309;&#2349;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344;&#2358;&#2366;&#2325;&#2369;&#2344;&#2381;&#2340;&#2354;&#2350;&#2381; &middot; &#2357;&#2367;&#2325;&#2381;&#2352;&#2350;&#2379;&#2352;&#2381;&#2357;&#2358;&#2368;&#2351;&#2350;&#2381; &middot; &#2325;&#2369;&#2350;&#2366;&#2352;&#2360;&#2306;&#2349;&#2357;&#2350;&#2381; &middot; &#2352;&#2328;&#2369;&#2357;&#2306;&#2358;&#2350;&#2381; &middot; &#2350;&#2375;&#2328;&#2342;&#2370;&#2340;&#2350;&#2381; &#2315;&#2340;&#2369;&#2360;&#2306;&#2361;&#2366;&#2352; &#2404; </span><strong>&#2340;&#2369;&#2354;&#2360;&#2368;&#2342;&#2366;&#2360; &#2325;&#2368; &#2352;&#2330;&#2344;&#2366;&#2319;&#2306;</strong><span style=\"font-weight: 400;\"> - &#2352;&#2366;&#2350;&#2330;&#2352;&#2367;&#2340;&#2350;&#2366;&#2344;&#2360; &middot; &#2352;&#2366;&#2350;&#2354;&#2354;&#2366;&#2344;&#2361;&#2331;&#2370; &middot; &#2357;&#2376;&#2352;&#2366;&#2327;&#2381;&#2351;-&#2360;&#2306;&#2342;&#2368;&#2346;&#2344;&#2368; &middot; &#2348;&#2352;&#2357;&#2376; &#2352;&#2366;&#2350;&#2366;&#2351;&#2339; &middot; &#2346;&#2366;&#2352;&#2381;&#2357;&#2340;&#2368;-&#2350;&#2306;&#2327;&#2354; &middot; &#2332;&#2366;&#2344;&#2325;&#2368;-&#2350;&#2306;&#2327;&#2354;&#2404;</span></span></p>\n",
                    correct: "b",

                questions.push({
                    id: "89",
                    section: "18",
                    question_en: "<p>89<span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> Who established Nalanda Mahavihara?</span></p>\n",
                    question_hi: "<p>89.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2366;&#2354;&#2306;&#2342;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2361;&#2366;&#2357;&#2367;&#2361;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2360;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Kumargupta<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>Devgupta</p>\n", 
                                "<p>Skandgupta<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>Vedgupta</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Nirmala UI;\">&#2325;&#2369;&#2350;&#2366;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340;</span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2342;&#2375;&#2357;&#2327;&#2369;</span></p>\n",
                                "<p><span style=\"font-family: Nirmala UI;\">&#2360;&#2381;&#2325;&#2344;&#2381;&#2342;&#2327;&#2369;&#2346;&#2381;&#2340;</span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2357;&#2375;&#2342;&#2327;&#2369;&#2354;</span></p>\n"],
                    solution_en: "<p>89.(a) <strong>Nalanda </strong><span style=\"font-weight: 400;\">was a renowned </span><strong>mahavihara</strong><strong> </strong><span style=\"font-weight: 400;\">in ancient Magadha (Bihar). Considered by historians to be the </span><strong>world\'s first residential university.</strong><span style=\"font-weight: 400;\"> It was founded by </span><strong>Kumargupta I</strong><span style=\"font-weight: 400;\"> (415&ndash;455 CE) of the Gupta dynasty in 5th century CE. </span><strong>&ldquo;The Excavated Remains at Nalanda&rdquo;</strong><span style=\"font-weight: 400;\"> got inscribed as a World Heritage Site by UNESCO in 2016. In 2010, the Government of India passed a resolution to revive the famous university, and a contemporary institute, </span><strong>Nalanda University,</strong><span style=\"font-weight: 400;\"> was established at Rajgir.</span></p>\n",
                    solution_hi: "<p>89.(a)&nbsp;<strong>&#2344;&#2366;&#2354;&#2306;&#2342;&#2366;</strong><span style=\"font-weight: 400;\"> &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2350;&#2327;&#2343; (&#2348;&#2367;&#2361;&#2366;&#2352;) &#2325;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; </span><strong>&#2350;&#2361;&#2366;&#2357;&#2367;&#2361;&#2366;&#2352;</strong><span style=\"font-weight: 400;\"> &#2341;&#2366;&#2404; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360;&#2325;&#2366;&#2352;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2311;&#2360;&#2375; </span><strong>&#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2310;&#2357;&#2366;&#2360;&#2368;&#2351; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351;</strong><span style=\"font-weight: 400;\"> &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2327;&#2369;&#2346;&#2381;&#2340; &#2357;&#2306;&#2358; &#2325;&#2375; </span><strong>&#2325;&#2369;&#2350;&#2366;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2346;&#2381;&#2352;&#2341;&#2350;</strong><span style=\"font-weight: 400;\"> (415-455 CE) &#2344;&#2375; 5&#2357;&#2368;&#2306; &#2358;&#2340;&#2366;&#2348;&#2381;&#2342;&#2368; CE &#2350;&#2375;&#2306; &#2325;&#2368; &#2341;&#2368;&#2404;\"</span><strong>&#2344;&#2366;&#2354;&#2306;&#2342;&#2366; &#2350;&#2375;&#2306; &#2326;&#2369;&#2342;&#2366;&#2312; &#2325;&#2375; &#2309;&#2357;&#2358;&#2375;&#2359;\"</strong><span style=\"font-weight: 400;\"> &#2325;&#2379; 2016 &#2350;&#2375;&#2306; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2358;&#2381;&#2357; &#2357;&#2367;&#2352;&#2366;&#2360;&#2340; &#2360;&#2381;&#2341;&#2354; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2309;&#2306;&#2325;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404; 2010 &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2325;&#2379; &#2346;&#2369;&#2344;&#2352;&#2381;&#2332;&#2368;&#2357;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;, &#2324;&#2352; &#2352;&#2366;&#2332;&#2327;&#2368;&#2352; &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2350;&#2325;&#2366;&#2354;&#2368;&#2344; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344;, </span><strong>&#2344;&#2366;&#2354;&#2306;&#2342;&#2366; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351;</strong><span style=\"font-weight: 400;\"> &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368; &#2327;&#2312;&#2404;</span></p>\n",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "90",
                    section: "18",
                    question_en: "<p>90<span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">During reign of Harsha, the Kannauj assembly was held to publicise the doctrines of which of the following sects?</span></p>\n",
                    question_hi: "<p>90. <span style=\"font-family: Nirmala UI;\">&#2361;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2344;&#2381;&#2344;&#2380;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2349;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2350;</span><span style=\"font-family: Nirmala UI;\">&#2381;&#2346;&#2381;&#2352;&#2342;&#2366;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2330;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2351;&#2379;&#2332;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2341;&#2368;</span><span style=\"font-family: Cambria Math;\"> ?</span></p>\n",
                    options_en: ["<p>Hinayana</p>\n", "<p>Mahayana</p>\n", 
                                "<p>Shwetamber</p>\n", "<p>No option is correc<span style=\"font-family: Cambria Math;\">t </span></p>\n"],
                    options_hi: ["<p><span style=\"font-family: Nirmala UI;\">&#2361;&#2368;&#2344;&#2351;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2361;&#2366;&#2351;&#2366;&#2344;</span></p>\n",
                                "<p><span style=\"font-family: Nirmala UI;\">&#2358;&#2381;&#2357;&#2375;&#2340;&#2366;&#2350;&#2381;&#2348;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2361;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2361;&#2368;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span></p>\n"],
                    solution_en: "<p>90.<span style=\"font-family: Cambria Math;\">(b) <strong>Mahayana . </strong><span style=\"font-weight: 400;\">During the reign of Kanishka, Buddhism split into two major sects &ndash; </span><strong>Hinayana(Language </strong><span style=\"font-weight: 400;\">- Pali</span><strong>)</strong><span style=\"font-weight: 400;\"> and </span><strong>Mahayana</strong><span style=\"font-weight: 400;\">. </span><strong>Hinayana </strong><span style=\"font-weight: 400;\">- Follows the original teaching of Buddha. </span><strong>Mahayana </strong><span style=\"font-weight: 400;\">- Believes in idol worship. There are two main branches of </span><strong>Jainism </strong><span style=\"font-weight: 400;\">&ndash; </span><strong>Digambara </strong><span style=\"font-weight: 400;\">(They remain naked) and </span><strong>Svetambara </strong><span style=\"font-weight: 400;\">(wear white clothes).</span></span></p>\n",
                    solution_hi: "<p>90.(b)&nbsp;<strong>&#2350;&#2361;&#2366;&#2351;&#2366;&#2344;&#2404; </strong><span style=\"font-weight: 400;\">&#2325;&#2344;&#2367;&#2359;&#2381;&#2325; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344;&#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2348;&#2380;&#2342;&#2381;&#2343; &#2343;&#2352;&#2381;&#2350; &#2342;&#2379; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2360;&#2306;&#2346;&#2381;&#2352;&#2342;&#2366;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2361;&#2379; &#2327;&#2351;&#2366; - &#2361;&#2368;&#2344;&#2351;&#2366;&#2344; (&#2349;&#2366;&#2359;&#2366; - &#2346;&#2366;&#2354;&#2368;) &#2324;&#2352; &#2350;&#2361;&#2366;&#2351;&#2366;&#2344;&#2404; </span><strong>&#2361;&#2368;&#2344;&#2351;&#2366;&#2344; </strong><span style=\"font-weight: 400;\">- &#2348;&#2369;&#2342;&#2381;&#2343; &#2325;&#2368; &#2350;&#2370;&#2354; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; </span><strong>&#2350;&#2361;&#2366;&#2351;&#2366;&#2344; </strong><span style=\"font-weight: 400;\">- &#2350;&#2370;&#2352;&#2381;&#2340;&#2367; &#2346;&#2370;&#2332;&#2366; &#2350;&#2375;&#2306; &#2357;&#2367;&#2358;&#2381;&#2357;&#2366;&#2360; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2376;&#2344; &#2343;&#2352;&#2381;&#2350; &#2325;&#2368; &#2342;&#2379; &#2350;&#2369;&#2326;&#2381;&#2351; &#2358;&#2366;&#2326;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306; - </span><strong>&#2342;&#2367;&#2327;&#2306;&#2348;&#2352;</strong><span style=\"font-weight: 400;\"> (&#2357;&#2375; &#2344;&#2327;&#2381;&#2344; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;) &#2324;&#2352;</span><strong> &#2358;&#2381;&#2357;&#2375;&#2340;&#2366;&#2306;&#2348;&#2352;</strong><span style=\"font-weight: 400;\"> (&#2360;&#2347;&#2375;&#2342; &#2325;&#2346;&#2337;&#2364;&#2375; &#2346;&#2361;&#2344;&#2340;&#2375; &#2361;&#2376;&#2306;)&#2404;</span></p>\n",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });

                    solution_hi: "<p>91.(d) <strong>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 123: </strong><span style=\"font-weight: 400;\">&#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2309;&#2357;&#2325;&#2366;&#2358; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2309;&#2343;&#2381;&#2351;&#2366;&#2342;&#2375;&#2358; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2404; </span><strong>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 213:</strong><span style=\"font-weight: 400;\"> &#2357;&#2367;&#2343;&#2366;&#2344;&#2350;&#2306;&#2337;&#2354; &#2325;&#2375; &#2309;&#2357;&#2325;&#2366;&#2358; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2309;&#2343;&#2381;&#2351;&#2366;&#2342;&#2375;&#2358; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367;&#2404; </span><strong>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 113: </strong><span style=\"font-weight: 400;\">&#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2306;&#2360;&#2342; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2404; </span><strong>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 223:</strong><span style=\"font-weight: 400;\"> &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2325; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367;&#2404;</span></p>\n",

                questions.push({
                    id: "92",
                    section: "18",
                    question_en: "<p>92. <span style=\"font-family: Cambria Math;\">Which of the following articles was amended by the Constitution (Twenty-sixth A</span><span style=\"font-family: Cambria Math;\">mendment) Act, 1971?</span></p>\n",

                    solution_en: "<p>92.(d) <strong>The Constitution (26th Amendment Act), 1971:</strong><span style=\"font-weight: 400;\"> Abolished the privy purses and privileges of the former rulers of princely states. Changes were made in Article 366. Added Article 363A and Removed Articles 291 and 362.</span></p>\n",

                questions.push({
                    id: "93",
                    section: "18",
                    question_en: "<p>93.<span style=\"font-family: Cambria Math;\"> Under whose leadership was the 42nd Amendment Act passed?</span></p>\n",
                    question_hi: "<p>93.<span style=\"font-family: Cambria Math;\"> 42</span><span style=\"font-family: Nirmala UI;\">&#2357;&#2366;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2358;&#2379;&#2343;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2360;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2366;&#2352;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2369;&#2310;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2341;&#2366;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Morarji Desai <span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>Rajiv Gandhi</p>\n", 
                                "<p>Indira Gandhi <span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>Charan Singh</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2379;&#2352;&#2366;&#2352;&#2332;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2375;&#2360;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2352;&#2366;&#2332;&#2368;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2366;&#2306;&#2343;&#2368;</span></p>\n",
                                "<p><span style=\"font-family: Nirmala UI;\">&#2311;&#2306;&#2342;&#2367;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2366;&#2306;&#2343;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2330;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2367;&#2306;&#2361;</span></p>\n"],
                    solution_en: "<p>93.(c) <strong>Indira Gandhi.</strong><span style=\"font-weight: 400;\"> The Preamble has been amended by the 42nd Constitutional Amendment Act (1976) (&ldquo;Mini - Constitution&rdquo;) which added three new words&#8203;&mdash;socialist, secular and integrity. The 44th Amendment&nbsp; Act (1978)under which &lsquo;Right to property&rsquo; under Article 31 of the Constitution is removed from the fundamental rights and is made a legal right under the Government of</span><strong> Morarji Desai. Choudhary Charan Singh served </strong><span style=\"font-weight: 400;\">as the 5th Prime Minister of India. </span></p>\n",
                    solution_hi: "<p>93.(c)&nbsp;</p>\r\n<p><strong>&#2311;&#2306;&#2342;&#2367;&#2352;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368;</strong><span style=\"font-weight: 400;\">&#2404; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;&#2344;&#2366; &#2325;&#2379; 42&#2357;&#2375;&#2306; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (1976) (&ldquo;&#2354;&#2328;&#2369;-&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344;&rdquo;) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2306;&#2358;&#2379;&#2343;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2344;&#2319; &#2358;&#2348;&#2381;&#2342; &#2332;&#2379;&#2337;&#2364;&#2375; &#2327;&#2319; &#2361;&#2376;&#2306;&mdash;&#2360;&#2350;&#2366;&#2332;&#2357;&#2366;&#2342;&#2368;, &#2343;&#2352;&#2381;&#2350;&#2344;&#2367;&#2352;&#2346;&#2375;&#2325;&#2381;&#2359; &#2324;&#2352; &#2309;&#2326;&#2306;&#2337;&#2340;&#2366;&#2404; </span><span style=\"font-weight: 400;\">44&#2357;&#2366;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (1978) &#2332;&#2367;&#2360;&#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 31 &#2325;&#2375; &#2340;&#2361;&#2340; \'&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;\' &#2325;&#2379; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2360;&#2375; &#2361;&#2335;&#2366;&#2325;&#2352; </span><strong>&#2350;&#2379;&#2352;&#2366;&#2352;&#2332;&#2368; &#2342;&#2375;&#2360;&#2366;&#2312; &#2325;&#2368; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2340;&#2361;&#2340; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2348;&#2344;&#2366; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;</strong><span style=\"font-weight: 400;\">&#2404; &#2330;&#2380;&#2343;&#2352;&#2368; &#2330;&#2352;&#2339; &#2360;&#2367;&#2306;&#2361; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; 5 &#2357;&#2375;&#2306; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2351;&#2366;&#2404;</span></p>\n",
                    correct: "c",
                    pos_marks: 2.0,

                questions.push({
                    id: "94",
                    section: "18",
                    question_en: "<p>94.<span style=\"font-family: Cambria Math;\"> In the context of Economics, what does P stand for in EPF? </span></p>\n",
                    question_hi: "<p>94. <span style=\"font-family: Nirmala UI;\">&#2309;&#2352;&#2381;&#2341;&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2342;&#2352;&#2381;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">, EPF </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> P </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2352;&#2381;&#2341;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> ? </span></p>\n",

                                "<p>Promotion</p>\n", "<p>Provident</p>\n"],
                    solution_en: "<p>94.(d) <strong>Employees Provident Fund </strong><span style=\"font-weight: 400;\">(EPF) is a scheme in which retirement benefits are accumulated. For EPF, an employee contributes 12 percent of the basic salary.</span></p>\n",
                    solution_hi: "<p>94.<span style=\"font-family: Cambria Math;\">(d) <strong>&#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2368; &#2349;&#2357;&#2367;&#2359;&#2381;&#2351; &#2344;&#2367;&#2343;&#2367;</strong><span style=\"font-weight: 400;\"> (EPF) </span><strong>Employees Provident Fund&nbsp; </strong><span style=\"font-weight: 400;\">&#2319;&#2325; &#2320;&#2360;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2360;&#2375;&#2357;&#2366;&#2344;&#2367;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2354;&#2366;&#2349; &#2332;&#2350;&#2366; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; EPF &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2368; &#2350;&#2370;&#2354; &#2357;&#2375;&#2340;&#2344; &#2325;&#2366; 12 &#2347;&#2368;&#2360;&#2342;&#2368; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span></span></p>\n",

                questions.push({
                    id: "95",
                    section: "18",
                    question_en: "<p>95.<span style=\"font-family: Cambria Math;\"> Which organelle is found both in eukaryotic and prokaryotic cells?</span></p>\n",
                    question_hi: "<p>95. <span style=\"font-family: Nirmala UI;\">&#2351;&#2370;&#2325;&#2375;&#2352;&#2367;&#2351;&#2379;&#2335;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2379;&#2325;&#2376;&#2352;&#2367;&#2351;&#2379;&#2335;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2379;&#2344;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2380;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2306;&#2327;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2366;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2366;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Ribosome</p>\n", "<p>Golgi bodies</p>\n", 
                                "<p>Mitochondria</p>\n", "<p>Lysosome</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Nirmala UI;\">&#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350;</span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2327;&#2379;&#2354;&#2381;&#2327;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2367;&#2325;&#2366;&#2351;&#2379;&#2306;</span></p>\n",
                                "<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2311;&#2335;&#2379;&#2325;&#2377;&#2344;&#2381;&#2337;&#2381;&#2352;&#2367;&#2351;&#2366;</span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2354;&#2366;&#2311;&#2360;&#2379;&#2360;&#2379;&#2350;</span></p>\n"],
                    solution_en: "<p>95.(a)<span style=\"font-family: Cambria Math;\"> <strong>Organelles</strong><span style=\"font-weight: 400;\"> present both in prokaryotic and eukaryotic cells are </span><strong>cell membrane, cytoplasm,</strong><span style=\"font-weight: 400;\"> genetic material made up of </span><strong>DNA and ribosomes. </strong><span style=\"font-weight: 400;\">The </span><strong>ribosome </strong><span style=\"font-weight: 400;\">(discovered by George E. Palade in 1955) is a complex molecule made of ribosomal RNA molecules and proteins that form a factory for protein synthesis in cells.</span></span></p>\n",
                    solution_hi: "<p>95.(a) <span style=\"font-weight: 400;\">&#2346;&#2381;&#2352;&#2379;&#2325;&#2376;&#2352;&#2367;&#2351;&#2379;&#2335;&#2367;&#2325; &#2324;&#2352; &#2351;&#2370;&#2325;&#2375;&#2352;&#2367;&#2351;&#2379;&#2335;&#2367;&#2325; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2342;&#2379;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; </span><strong>&#2321;&#2352;&#2381;&#2327;&#2375;&#2344;&#2375;&#2354; </strong><span style=\"font-weight: 400;\">&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368;, &#2360;&#2366;&#2311;&#2335;&#2379;&#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;, &#2337;&#2368;&#2319;&#2344;&#2319; &#2324;&#2352; &#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350; &#2360;&#2375; &#2348;&#2344;&#2375; &#2310;&#2344;&#2369;&#2357;&#2306;&#2358;&#2367;&#2325; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2361;&#2376;&#2306;&#2404; </span><strong>&#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350; </strong><span style=\"font-weight: 400;\">(1955 &#2350;&#2375;&#2306; &#2332;&#2377;&#2352;&#2381;&#2332; &#2312;. &#2346;&#2354;&#2366;&#2337;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2326;&#2379;&#2332;&#2366; &#2327;&#2351;&#2366;) &#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350;&#2354; RNA &#2309;&#2339;&#2369;&#2323;&#2306; &#2324;&#2352; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2360;&#2375; &#2348;&#2344;&#2366; &#2319;&#2325; &#2332;&#2335;&#2367;&#2354; &#2309;&#2339;&#2369; &#2361;&#2376; &#2332;&#2379; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2360;&#2306;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2325;&#2366;&#2352;&#2326;&#2366;&#2344;&#2366; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span></p>\n",

                questions.push({
                    id: "96",
                    section: "18",
                    question_en: "<p>96. <span style=\"font-family: Cambria Math;\">Which of the following is an example of active transport?</span></p>\n",
                    question_hi: "<p>96.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2380;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2325;&#2381;&#2352;&#2367;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;&#2367;&#2357;&#2361;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2313;&#2342;&#2366;&#2361;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Iron assimilation</p>\n", "<p>Salt elimination</p>\n", 
                                "<p>Glucose transport</p>\n", "<p>Sodium and potassium pumps</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Nirmala UI;\">&#2354;&#2380;&#2361;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2350;&#2366;&#2357;&#2375;&#2358;</span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2344;&#2350;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2313;&#2344;&#2381;&#2350;&#2370;&#2354;&#2344;</span></p>\n",
                                "<p><span style=\"font-family: Nirmala UI;\">&#2327;&#2381;&#2354;&#2370;&#2325;&#2379;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;&#2367;&#2357;&#2361;&#2344;</span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2379;&#2335;&#2375;&#2358;&#2367;&#2351;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2306;&#2346;</span></p>\n"],
                    solution_en: "<p>96.(d) <span style=\"font-weight: 400;\">The </span><strong>Sodium-potassium pump</strong><span style=\"font-weight: 400;\"> present on the cell membrane is a classic example of active transport, which transports 3 sodium ions outside and 2 potassium ions inside of the cell per ATP. </span><strong>Active transport </strong><span style=\"font-weight: 400;\">(uphill transport) transports substances against the concentration gradient from lower to higher concentration.</span><strong> Glucose transporters </strong><span style=\"font-weight: 400;\">(passive transport) are a wide group of membrane proteins that facilitate the transport of glucose across the plasma membrane.</span></p>\n",
                    solution_hi: "<p>96.(d)&nbsp;</p>\r\n<p><span style=\"font-weight: 400;\">&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368; &#2346;&#2352; &#2350;&#2380;&#2332;&#2370;&#2342; </span><strong>&#2360;&#2379;&#2337;&#2367;&#2351;&#2350;-&#2346;&#2379;&#2335;&#2375;&#2358;&#2367;&#2351;&#2350; &#2346;&#2306;&#2346;</strong><span style=\"font-weight: 400;\"> &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344; &#2325;&#2366; &#2319;&#2325; &#2313;&#2340;&#2381;&#2325;&#2371;&#2359;&#2381;&#2335; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;, &#2332;&#2379; 3 &#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2310;&#2351;&#2344;&#2379;&#2306; &#2325;&#2379; &#2348;&#2366;&#2361;&#2352; &#2324;&#2352; 2 &#2346;&#2379;&#2335;&#2375;&#2358;&#2367;&#2351;&#2350; &#2310;&#2351;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367; ATP &#2360;&#2375;&#2354; &#2325;&#2375; &#2309;&#2306;&#2342;&#2352; &#2346;&#2361;&#2369;&#2306;&#2330;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; </span><strong>&#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344;</strong><span style=\"font-weight: 400;\"> (&#2314;&#2346;&#2352; &#2325;&#2368; &#2323;&#2352; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344;) &#2319;&#2325;&#2366;&#2327;&#2381;&#2352;&#2340;&#2366; &#2338;&#2366;&#2354; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2360;&#2375; &#2313;&#2330;&#2381;&#2330; &#2360;&#2366;&#2306;&#2342;&#2381;&#2352;&#2340;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; </span><strong>&#2327;&#2381;&#2354;&#2370;&#2325;&#2379;&#2332; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344;</strong><span style=\"font-weight: 400;\"> (&#2344;&#2367;&#2359;&#2                     question_hi: "<p><span style=\"font-family: Cambria Math;\">99. </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2350;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2358;&#2366;&#2361;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2358;&#2361;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2349;&#2327;&#2357;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2360;&#2357;&#2375;&#2358;&#2381;&#2357;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2366;&#2342;&#2346;&#2381;&#2352;&#2349;&#2369;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;&#2350;&#2381;&#2346;&#2375;&#2327;&#2380;&#2337;&#2364;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2370;&#2352;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2344;&#2366;&#2357;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",

                                "<p><span style=\"font-family: Nirmala UI;\">&#2330;&#2375;&#2344;&#2381;&#2344;&#2312;</span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2342;&#2352;&#2366;&#2348;&#2366;&#2342;</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">99.(a) Bengaluru</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Lord Basaveshwara : Indian 12th Philosopher, Poet &amp; Lingayat Saint</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&bull; Nadaprabhu Kempegowda : Founder Of Bengaluru City</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">99.(a) </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2375;&#2306;&#2327;&#2354;&#2369;&#2352;&#2369;</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2349;&#2327;&#2357;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2360;&#2357;&#2375;&#2358;&#2381;&#2357;&#2352;</span><span style=\"font-family: Cambria Math;\">: </span><span style=\"font-family: Nirmala UI;\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351;</span><span style=\"font-family: Cambria Math;\"> 12</span><span style=\"font-family: Nirmala UI;\">&#2357;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2366;&#2352;</span><span style=\"font-family: Nirmala UI;\">&#2381;&#2358;&#2344;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2357;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2367;&#2306;&#2327;&#2366;&#2351;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2340;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&bull; </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2366;&#2342;&#2346;&#2381;&#2352;&#2349;&#2369;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;&#2350;&#2381;&#2346;&#2375;&#2327;&#2380;&#2337;&#2364;&#2366;</span><span style=\"font-family: Cambria Math;\">: </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2375;&#2306;&#2327;&#2354;&#2369;&#2352;&#2369;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2358;&#2361;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2346;&#2325;</span></p>\n",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "100",
                    section: "misc",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">100. When is &ldquo;World Water Day&rdquo; celebrated every year ?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">100. </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> \"</span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2358;&#2381;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2367;&#2357;&#2360;</span><span style=\"font-family: Cambria Math;\">\" &#8203;&#8203;</span><span style=\"font-family: Nirmala UI;\">&#2325;&#2348;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2344;&#2366;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2366;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>20 March</p>\n", "<p>21 March</p>\n", 
                                "<p>22 March</p>\n", "<p>23 March</p>\n"],
                    options_hi: ["<p>20 <span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2352;&#2381;&#2330;</span></p>\n", "<p>21 <span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2352;&#2381;&#2330;</span></p>\n",
                                "<p>22 <span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2352;&#2381;&#2330;</span></p>\n", "<p>23 <span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2352;&#2381;&#2330;</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">100.(c) 22 March</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Theme 2023 : Accelerating Change</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">100.(c) 22 </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2352;&#2381;&#2330;</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2341;&#2368;&#2350;</span><span style=\"font-family: Cambria Math;\"> 2023: </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2381;&#2357;&#2352;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344;</span></p>\n",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
            
            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();
        }
        
        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML - more compact
            let html = `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="question-text mb-3">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        <div class="options">`;
                        
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = 'option-label';
                
                // When reviewing, highlight user's choice and correct answer
                if (submitted) {
                    if (opt === question.correct) {
                        optionClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[question.id] === opt && opt !== question.correct) {
                        optionClass += ' border-danger bg-danger bg-opacity-10';
                    }
                }
                
                html += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${answers[question.id] === opt ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <label class="form-check-label w-100 ${optionClass}" for="opt-${index}-${opt}">
                            ${submitted && opt === question.correct ? '<i class="fas fa-check-circle text-success me-1"></i>' : ''}
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const alertClass = isCorrect ? 'alert-success' : 'alert-danger';
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="alert ${alertClass} mt-3 py-2">
                        <strong>${resultText}</strong>
                        <div class="mt-1 small">
                            <strong>Solution:</strong>
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
        function nextQuestion() { if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
            
            // Update button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('main-content');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                if (window.innerWidth >= 992) {
                    content.classList.add('with-nav');
                }
            } else {
                nav.classList.remove('show');
                if (window.innerWidth >= 992) {
                    content.classList.remove('with-nav');
                }
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer - compact
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            if (confirm(`You have attempted ${attempted} of ${questions.length} questions.
${remaining} questions are unattempted.

Are you sure you want to submit?`)) {
                submitTest();
            }
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.replace('btn-light', 'btn-success');
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
        
        // Add event listener for window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                if (document.getElementById('question-nav').classList.contains('show')) {
                    document.getElementById('main-content').classList.add('with-nav');
                }
            } else {
                document.getElementById('main-content').classList.remove('with-nav');
            }
        });
    </script>
</body>
