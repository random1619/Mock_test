                    options_hi: ["<p>96</p>\n", "<p>95</p>\n",
                                "<p>93</p>\n", "<p>92</p>\n"],
                    solution_en: "<p>56.(b)</p>\r\n<p><span style=\"font-family: Palanquin Dark;\">No of students&rarr;&nbsp; &nbsp;60&nbsp; &nbsp; :&nbsp; 20 = 3 : 1</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Average&rarr;&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;100&nbsp; &nbsp; &nbsp;80</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Average score of the whole class = </span><span style=\"font-family: Palanquin Dark;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>3</mn><mo>&times;</mo><mn>100</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>1</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>80</mn></mrow><mrow><mn>3</mn><mo>+</mo><mn>1</mn></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><mn>300</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>80</mn></mrow><mn>4</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>380</mn><mn>4</mn></mfrac></math><span style=\"font-family: Palanquin Dark;\"> = 95 </span></p>\n",
                    solution_hi: "<p>56.(b)</p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &rarr; 60&nbsp; &nbsp;:&nbsp; 20 = 3 : 1</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2324;&#2360;&#2340; &rarr;&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 100&nbsp; &nbsp; &nbsp;80</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2346;&#2370;&#2352;&#2368; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2366; &#2324;&#2360;&#2340; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2366;&#2306;&#2325; = </span><span style=\"font-family: Palanquin Dark;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>3</mn><mo>&times;</mo><mn>100</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>1</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>80</mn></mrow><mrow><mn>3</mn><mo>+</mo><mn>1</mn></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><mn>300</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>80</mn></mrow><mn>4</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>380</mn><mn>4</mn></mfrac></math><span style=\"font-family: Palanquin Dark;\"> </span><span style=\"font-family: Palanquin Dark;\"> = 95 </span></p>\n",
                    correct: "b",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "57",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Palanquin Dark;\">57.</span><span style=\"font-family: Palanquin Dark;\">The compound interest on a certain sum for 2 years at 12% annum is &#8377;3,816, When the interest is compounded yearly. The sum is :</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Palanquin Dark;\">57</span><span style=\"font-family: Palanquin Dark;\"> &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2366;&#2358;&#2367; &#2346;&#2352; <span style=\"font-weight: 400;\">12% </span>&#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 2 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#8377; 3,816 &#2361;&#2376;, &#2351;&#2361; &#2348;&#2381;&#2351;&#2366;&#2332; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2352;&#2366;&#2358;&#2367; &#2361;&#2376;:</span></p>\n",
                    options_en: ["<p>&#8377;15,000</p>\n", "<p>&#8377;10,000</p>\n", 
                                "<p>&#8377; 12,500</p>\n", "<p>&#8377; 14,500</p>\n"],
                    options_hi: ["<p>&#8377;15,000</p>\n", "<p>&#8377;10,000</p>\n",
                                "<p>&#8377; 12,500</p>\n", "<p>&#8377; 14,500</p>\n"],
                    solution_en: "<p><span style=\"font-family: Palanquin Dark;\">57.(a)</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Effective CI rate for 2 years = 12 + 12 + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>12</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>12</mn></mrow><mn>100</mn></mfrac></math></span><span style=\"font-family: Palanquin Dark;\"> = 24 + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>144</mn><mn>100</mn></mfrac></math></span><span style=\"font-family: Palanquin Dark;\"> = 24 + 1.44 = 25.44%</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">25.44% corresponds to &#8377;3,816</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">So, required sum =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>3816</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mn>100</mn></mrow><mrow><mn>25</mn><mo>.</mo><mn>44</mn></mrow></mfrac></math>&nbsp;</span><span style=\"font-family: Palanquin Dark;\"> = &#8377;15,000</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Palanquin Dark;\">57.(a)</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\"><span style=\"font-weight: 400;\">2 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352;&nbsp; </span>&nbsp;= 12 + 12 + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>12</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>12</mn></mrow><mn>100</mn></mfrac></math></span><span style=\"font-family: Palanquin Dark;\"> = 24 + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>144</mn><mn>100</mn></mfrac></math></span><span style=\"font-family: Palanquin Dark;\"> = 24 + 1.44 = 25.44%</span></p>\r\n<p><span style=\"font-weight: 400;\">25.44% &#2325;&#2375; &#2340;&#2369;&#2354;&#2381;&#2351; &#2361;&#2376;&nbsp; &#8377;3,816</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2340;&#2379;, &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2352;&#2366;&#2358;&#2367; </span><span style=\"font-family: Palanquin Dark;\">= <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>3816</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mn>100</mn></mrow><mrow><mn>25</mn><mo>.</mo><mn>44</mn></mrow></mfrac></math>&nbsp;</span><span style=\"font-family: Palanquin Dark;\"> = &#8377;15,000</span></p>\n",
                    correct: "a",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "58",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Palanquin Dark;\">58. </span><span style=\"font-family: Palanquin Dark;\">Payable in two equal half yearly installments at 4% per annum simple interest. What will be the present value of Rs 2,652?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Palanquin Dark;\">58. </span><span style=\"font-family: Palanquin Dark;\">&#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; 4% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2342;&#2352; &#2360;&#2375; &#2342;&#2379; &#2360;&#2350;&#2366;&#2344; &#2331;&#2350;&#2366;&#2361;&#2368; &#2325;&#2367;&#2358;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2375;&#2351; Rs. 2,652 &#2325;&#2366; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</span></p>\n",
                    options_en: ["<p>Rs.2,575</p>\n", "<p>Rs.2,435</p>\n", 
                                "<p>Rs.2,875</p>\n", "<p>Rs.2,654</p>\r\n<p><span style=\"font-family: Palanquin Dark;\"> </span></p>\n"],
                    options_hi: ["<p>Rs.2,575</p>\n", "<p>Rs.2,435</p>\n",
                                "<p>Rs.2,875</p>\n", "<p>Rs.2,654</p>\n"],
                    solution_en: "<p><span style=\"font-family: Palanquin Dark;\">58.(a)</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Simple interest =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2652</mn><mn>2</mn></mfrac></math></span><span style=\"font-family: Palanquin Dark;\"> </span><span style=\"font-family: Palanquin Dark;\"> = 1326</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">So, principal = </span><span style=\"font-family: Palanquin Dark;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>1326</mn><mo>&times;</mo><mn>100</mn></mrow><mrow><mn>100</mn><mo>+</mo><mo>&nbsp;</mo><mstyle displaystyle=\"true\"><mfrac><mn>4</mn><mn>2</mn></mfrac></mstyle></mrow></mfrac><mo>&nbsp;</mo><mo>+</mo><mfrac><mrow><mn>1326</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>100</mn></mrow><mn>104</mn></mfrac></math></span><span style=\"font-family: Palanquin Dark;\"> =1300 +1275 =</span><span style=\"font-family: Palanquin Dark;\">Rs.</span><span style=\"font-family: Palanquin Dark;\"> 2575</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Palanquin Dark;\">58.(a)</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\"><span style=\"font-weight: 400;\">&#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332;&nbsp;</span> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2652</mn><mn>2</mn></mfrac></math></span><span style=\"font-family: Palanquin Dark;\"> </span><span style=\"font-family: Palanquin Dark;\"> = 1326</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\"><span style=\"font-weight: 400;\">&#2309;&#2340;&#2307; &#2350;&#2370;&#2354;&#2343;&#2344;&nbsp; </span>= </span><span style=\"font-family: Palanquin Dark;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>1326</mn><mo>&times;</mo><mn>100</mn></mrow><mrow><mn>100</mn><mo>+</mo><mo>&nbsp;</mo><mstyle displaystyle=\"true\"><mfrac><mn>4</mn><mn>2</mn></mfrac></mstyle></mrow></mfrac><mo>&nbsp;</mo><mo>+</mo><mfrac><mrow><mn>1326</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>100</mn></mrow><mn>104</mn></mfrac></math></span><span style=\"font-family: Palanquin Dark;\"> =1300&nbsp; + 1275 = </span><span style=\"font-family: Palanquin Dark;\">Rs.</span><span style=\"font-family: Palanquin Dark;\"> 2575</span></p>\n",
                    correct: "a",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "59",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Roboto;\">59. </span><span style=\"font-family: Roboto;\"> A wrist watch is sold for &#8377;600 at a profit per cent equal to its cost price. Find the cost price of the wrist watch. </span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">59.</span><span style=\"font-family: Palanquin;\"> &#2319;&#2325; &#2325;&#2354;&#2366;&#2312; &#2328;&#2337;&#2364;&#2368; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2346;&#2352; &#8377;600 &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2354;&#2366;&#2312; &#2328;&#2337;&#2364;&#2368; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</span></p>\n",
                    options_en: ["<p>&#8377;400</p>\n", "<p>&#8377; 350</p>\n", 
                                "<p>&#8377;250</p>\n", "<p>&#8377; 200</p>\n"],
                    options_hi: ["<p>&#8377;400</p>\n", "<p>&#8377; 350</p>\n",
                                "<p>&#8377;250</p>\n", "<p>&#8377; 200</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">59.(d)</span></p>\r\n<p><span style=\"font-family: Roboto;\">Let the CP of watch be x</span></p>\r\n<p><span style=\"font-family: Roboto;\">Then, profit on wrist watch =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>&nbsp;</mo><msup><mi>x</mi><mn>2</mn></msup></mrow><mn>100</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Roboto;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Roboto;\">SP = x +&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><msup><mi>x</mi><mn>2</mn></msup><mn>100</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Roboto;\">600 =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>100</mn><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>x</mi><mn>2</mn></mrow><mn>100</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Roboto;\">60000 = x&sup2;&nbsp;</span><span style=\"font-family: Roboto;\"> + 100x</span></p>\r\n<p><span style=\"font-family: Roboto;\">x&sup2; + 100x - 60000 = 0</span></p>\r\n<p><span style=\"font-family: Roboto;\">Solving quadratic equation we have</span></p>\r\n<p><span style=\"font-family: Roboto;\">x = 200 or -300 (negative values can&rsquo;t possible)</span></p>\r\n<p><span style=\"font-family: Roboto;\">So, CP of watch = &#8377;200</span></p>\r\n<p><span style=\"font-family: Roboto;\">Alternative method :</span></p>\r\n<p><span style=\"font-family: Roboto;\">By value putting method, we have,</span></p>\r\n<p><span style=\"font-family: Roboto;\">SP of wrist watch = 200 +&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><msup><mn>200</mn><mn>2</mn></msup><mn>100</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Roboto;\"> = &#8377;600(satisfied)</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">59.(d)</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2350;&#2366;&#2344;&#2366; &#2328;&#2337;&#2364;&#2368; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; x &#2361;&#2376;</span></p>\r\n<p><span style=\"font-family: Roboto;\"><span style=\"font-weight: 400;\">&#2340;&#2348;, &#2325;&#2354;&#2366;&#2312; &#2328;&#2337;&#2364;&#2368; &#2346;&#2352; &#2354;&#2366;&#2349;&nbsp;</span> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>&nbsp;</mo><msup><mi>x</mi><mn>2</mn></msup></mrow><mn>100</mn></mfrac></math></span></p>\r\n<p><span style=\"font-weight: 400;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;,</span></p>\r\n<p><span style=\"font-family: Roboto;\"><span style=\"font-weight: 400;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351;</span> = x + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><msup><mi>x</mi><mn>2</mn></msup><mn>100</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Roboto;\">600 =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>100</mn><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mi>x</mi><mn>2</mn></msup></mrow><mn>100</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Roboto;\">60000 = x&sup2;&nbsp;</span><span style=\"font-family: Roboto;\"> + 100x</span></p>\r\n<p><span style=\"font-family: Roboto;\">x&sup2; + 100x - 60000 = 0</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2342;&#2381;&#2357;&#2367;&#2328;&#2366;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2361;&#2354; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352;, </span></p>\r\n<p><span style=\"font-family: Palanquin;\">x = 200 &#2351;&#2366; &ndash; 300 (&#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325; &#2350;&#2366;&#2344; &#2360;&#2306;&#2349;&#2357; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379; &#2360;&#2325;&#2340;&#2375;)</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2309;&#2340;:, &#2328;&#2337;&#2364;&#2368; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; = &#8377;200</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2357;&#2376;&#2325;&#2354;&#2381;&#2346;&#2367;&#2325; &#2357;&#2367;&#2343;&#2367; :</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2357;&#2376;&#2354;&#2381;&#2351;&#2370; &#2346;&#2369;&#2335;&#2367;&#2306;&#2327; &#2357;&#2367;&#2343;&#2367; &#2360;&#2375;, &#2361;&#2350;&#2366;&#2352;&#2375; &#2346;&#2366;&#2360;,</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2325;&#2354;&#2366;&#2312; &#2328;&#2337;&#2364;&#2368; &#2325;&#2366; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; = 200 +&nbsp; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><msup><mn>200</mn><mn>2</mn></msup><mn>100</mn></mfrac></math></span><span style=\"font-family: Arial Unicode MS;\">= &#8377;600 (&#2360;&#2306;&#2340;&#2369;&#2359;&#2381;&#2335;)</span></p>\n",
                    correct: "d",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "60",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Roboto;\">60.</span><span style=\"font-family: Roboto;\">A supermarket earns 5% as discount on the total purchasing value and a bonus of <span style=\"font-weight: 400;\">1</span><span style=\"font-weight: 400;\">% </span></span><span style=\"font-family: Roboto;\">&nbsp;on sales more than Rs.20,000. What is the total sale value if it earns Rs.1,990?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">60.</span><span style=\"font-family: Palanquin;\"> &#2319;&#2325; &#2360;&#2369;&#2346;&#2352;&#2350;&#2366;&#2352;&#2381;&#2325;&#2375;&#2335; &#2325;&#2369;&#2354; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 5% &#2331;&#2370;&#2335; &#2324;&#2352; Rs.20,000 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2346;&#2352; <span style=\"font-weight: 400;\">1</span><span style=\"font-weight: 400;\">%</span></span><span style=\"font-family: Palanquin;\">&nbsp;&#2325;&#2366; &#2348;&#2379;&#2344;&#2360; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2351;&#2361; Rs.1,990 &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2369;&#2354; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;</span></p>\n",
                    options_en: ["<p>Rs.14,000</p>\n", "<p>Rs.16,000</p>\n", 
                                "<p>Rs.34,000</p>\n", "<p>Rs.36,500</p>\n"],
                    options_hi: ["<p>Rs.14,000</p>\n", "<p>Rs.16,000</p>\n",
                                "<p>Rs.34,000</p>\n", "<p>Rs.36,500</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">60.(d)</span></p>\r\n<p><span style=\"font-family: Roboto;\">If supermarket earns 6%(5</span><span style=\"font-family: Roboto;\">% + 1</span><span style=\"font-family: Roboto;\">%) on sale then, </span></p>\r\n<p><span style=\"font-family: Roboto;\">they get <span style=\"font-weight: 400;\">1</span><span style=\"font-weight: 400;\">% </span></span><span style=\"font-family: Roboto;\">&nbsp;extra benefit over 20,000</span></p>\r\n<p><span style=\"font-family: Roboto;\">Now, the total earning = 1990 + 20,000 &times;1</span><span style=\"font-family: Roboto;\">% = &#8377;2190</span></p>\r\n<p><span style=\"font-family: Roboto;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Roboto;\">Total sale &times; 6% = 2190</span></p>\r\n<p><span style=\"font-family: Roboto;\">Total sale =&nbsp; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&nbsp;</mo><mfrac><mrow><mn>2190</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>100</mn></mrow><mrow><mn>6</mn><mo>&nbsp;</mo></mrow></mfrac></math></span><span style=\"font-family: Roboto;\">= &#8377;36,500</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">60.(d)</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2351;&#2342;&#2367; &#2360;&#2369;&#2346;&#2352;&#2350;&#2366;&#2352;&#2381;&#2325;&#2375;&#2335; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2346;&#2352; 6%(5</span><span style=\"font-weight: 400;\">%+</span><span style=\"font-weight: 400;\">1</span><span style=\"font-weight: 400;\">%) &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379;,</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2313;&#2344;&#2381;&#2361;&#2375;&#2306; 20,000 &#2346;&#2352; 1% &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2354;&#2366;&#2349; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376;</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2309;&#2348;, &#2325;&#2369;&#2354; &#2325;&#2350;&#2366;&#2312; = 1990 + 20,000&times;</span><span style=\"font-weight: 400;\">1</span><span style=\"font-weight: 400;\">% = &#8377;2190</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;,</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2325;&#2369;&#2354; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &times; 6% = 2190</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2325;&#2369;&#2354; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>2190</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>100</mn></mrow><mrow><mn>6</mn><mo>&nbsp;</mo></mrow></mfrac></math></span><span style=\"font-family: Roboto;\"> = &#8377;36,500</span></p>\n",
                    correct: "d",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "61",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Roboto;\">61.</span><span style=\"font-family: Roboto;\"> The monthly income of Ramesh was Rs.16,000 and his monthly expenditure was </span><span style=\"font-family: Roboto;\">Rs.10,000. Next year\'s income increased by 30% and his expenditure increased by </span><span style=\"font-family: Roboto;\">20%. Find the percentage increase in his </span><span style=\"font-family: Roboto;\">saving</span><span style=\"font-family: Roboto;\">. </span></p>\n",
                    question_hi: "<p>61. <span style=\"font-family: Palanquin Dark;\">&#2352;&#2350;&#2375;&#2358; &#2325;&#2368; &#2350;&#2366;&#2360;&#2367;&#2325; &#2310;&#2351; Rs.16,000 &#2341;&#2368; &#2324;&#2352; &#2313;&#2360;&#2325;&#2366; &#2350;&#2366;&#2360;&#2367;&#2325; &#2326;&#2352;&#2381;&#2330; Rs.10,000 &#2341;&#2366;&#2404; &#2309;&#2327;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2313;&#2360;&#2325;&#2368; </span><span style=\"font-family: Palanquin Dark;\">&#2310;&#2351; &#2350;&#2375;&#2306; 30% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2369;&#2312; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; 20% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2369;&#2312;&#2404; &#2313;&#2360;&#2325;&#2368; &#2348;&#2330;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span></p>\n",
                    options_en: ["<p>47.5%</p>\n", "<p>46.5%</p>\n", 
                                "<p>46.6%</p>\n", "<p>48.5%</p>\n"],
                    options_hi: ["<p>47.5%</p>\n", "<p>46.5%</p>\n",
                                "<p>46.6%</p>\n", "<p>48.5%</p>\n"],
                    solution_en: "<p>61.(c)</p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Let the percentage increase in his saving be x</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">16,000 &times; 30% = 10,000 &times; 20% + 6,000 &times; x%</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">4800 = 2000 + 60x</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">2800 = 60x</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">x = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2800</mn><mn>60</mn></mfrac></math></span><span style=\"font-family: Palanquin Dark;\"> = 46.6%</span></p>\n",
                    solution_hi: "<p>61.(c)</p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2350;&#2366;&#2344;&#2366; &#2313;&#2360;&#2325;&#2368; &#2348;&#2330;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; x &#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;,</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">16,000 &times; 30% = 10,000 &times; 20% + 6,000 &times; x%</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">4800 = 2000 + 60x</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">2800 = 60x</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">x = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2800</mn><mn>60</mn></mfrac></math></span><span style=\"font-family: Palanquin Dark;\"> = 46.6%</span></p>\n",
                    correct: "c",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "62",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Palanquin Dark;\">62. </span><span style=\"font-family: Palanquin Dark;\">A boat can travel with a speed of 12 km/hr in still water. If the speed of the stream is 5 km/hr, find the time taken by the boat to go 85 km downstream.</span></p>\n",

                                "<p>4 &#2328;&#2306;&#2335;&#2375;</p>\n", "<p>5 &#2328;&#2306;&#2335;&#2375;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Palanquin Dark;\">62.(d)</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Speed of the boat in still water = 12 km/h</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Speed of the stream = 5 km/h</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Speed of the boat in downstream = 12 + 5 = 17 km/h</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Now, time taken by the boat to go 85 km downstream = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>85</mn><mn>17</mn></mfrac></math> <span style=\"font-weight: 400;\">= 5 hours.</span></span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Palanquin Dark;\">62.(d)</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2358;&#2366;&#2306;&#2340; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; = 12 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; = 5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; = 12 + 5 = 17 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2309;&#2348; &#2344;&#2366;&#2357; &#2325;&#2379; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 85 &#2325;&#2367;&#2350;&#2368; &#2332;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2366; &#2360;&#2350;&#2351; =</span><span style=\"font-family: Palanquin Dark;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>85</mn><mn>17</mn></mfrac></math>= 5 &#2328;&#2306;&#2335;&#2375;</span></p>\n",
                    correct: "d",

                    neg_marks: 0.5
                });
                questions.push({
                    id: "63",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Roboto;\">63. </span><span style=\"font-family: Roboto;\">Pipes A and B can fill a tank in 8 h and 12 h, respectively, whereas pipe C can empty the full tank in 10 h. A and B are opened for 4 h and then closed. C alone will empty the tank in (in h):</span></p>\n",

                    options_en: ["<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>5</mn><mfrac><mn>1</mn><mn>4</mn></mfrac></math><span style=\"font-family: Roboto;\"> </span></p>\n", "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>9</mn><mfrac><mn>1</mn><mn>3</mn></mfrac><mo>&nbsp;</mo></math><span style=\"font-family: Roboto;\"> </span></p>\n", 
                                "<p>9<span style=\"font-family: Roboto;\"> </span></p>\n", "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>8</mn><mfrac><mn>1</mn><mn>3</mn></mfrac></math></p>\n"],
                    options_hi: ["<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>5</mn><mfrac><mn>1</mn><mn>4</mn></mfrac></math><span style=\"font-family: Roboto;\"> </span></p>\n", "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>9</mn><mfrac><mn>1</mn><mn>3</mn></mfrac></math><span style=\"font-family: Roboto;\"> </span></p>\n",
                                "<p>9<span style=\"font-family: Roboto;\"> </span></p>\n", "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>8</mn><mfrac><mn>1</mn><mn>3</mn></mfrac></math></p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">63.(d)</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688185073/word/media/image101.png\" width=\"215\" height=\"80\"></p>\r\n<p><span style=\"font-family: Roboto;\">Work done by (A + B) in 4</span><span style=\"font-family: Roboto;\"> </span><span style=\"font-family: Roboto;\">hr = (15 + 10) &times; 4 = 25 &times; 4</span><span style=\"font-family: Roboto;\"> </span><span style=\"font-family: Roboto;\">= 100 unit</span></p>\r\n<p><span style=\"font-family: Roboto;\">So, the time taken by C alone to empty the tank = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>100</mn><mn>12</mn></mfrac></math></span><span style=\"font-family: Roboto;\"> = 8<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>3</mn></mfrac></math></span><span style=\"font-family: Roboto;\"> hrs</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">63.(d)</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688185073/word/media/image26.png\" width=\"216\" height=\"103\"></p>\r\n<p>(A + B) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 4 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; = (15 +10) &times; 4 = 25 &times; 4 = 100 &#2311;&#2325;&#2366;&#2312;</p>\r\n<p><span style=\"font-family: Palanquin;\">&#2340;&#2379;, &#2309;&#2325;&#2375;&#2354;&#2375; C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>100</mn><mn>12</mn></mfrac></math></span><span style=\"font-family: Roboto;\"> = </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>8</mn><mfrac><mn>1</mn><mn>3</mn></mfrac></math><span style=\"font-family: Palanquin;\">&#2328;&#2306;&#2335;&#2375;</span></p>\n",

                questions.push({
                    id: "64",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Palanquin;\">64.</span><span style=\"font-family: Palanquin;\"> A sum of &#8377;13200 is divided between A,B,C and D such that the ratio of shares of A and B is 4:3 ,that of B and C is 3:5 and that of C and D is 1:2. What is the difference between the shares (in &#8377;) of B and D ?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Palanquin;\">64.</span><span style=\"font-family: Arial Unicode MS;\"> &#8377;13200 &#2325;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2379; A, B, C &#2324;&#2352; D &#2325;&#2375; &#2348;&#2368;&#2330; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2325;&#2367; A &#2324;&#2352; B &#2325;&#2375; &#2361;&#2367;&#2360;&#2381;&#2360;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4 : 3 &#2361;&#2376;, B &#2324;&#2352; C &#2325;&#2375; &#2361;&#2367;&#2360;&#2381;&#2360;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3:5 &#2361;&#2376; &#2324;&#2352; C &#2324;&#2352; D &#2325;&#2375; &#2361;&#2367;&#2360;&#2381;&#2360;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 1:2 &#2361;&#2376;&#2404; B &#2324;&#2352; D &#2325;&#2375; &#2361;&#2367;&#2360;&#2381;&#2360;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; (&#8377; &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</span></p>\n",
                    options_en: ["<p>6000</p>\n", "<p>4205</p>\n", 
                                "<p>4200</p>\n", "<p>1315</p>\n"],
                    options_hi: ["<p>6000</p>\n", "<p>4205</p>\n",
                                "<p>4200</p>\n", "<p>1315</p>\n"],
                    solution_en: "<p><span style=\"font-family: Arial Unicode MS;\">64.(c)</span></p>\r\n<p><span style=\"font-family: Arial Unicode MS;\">A : B = 4 : 3</span></p>\r\n<p><span style=\"font-family: Arial Unicode MS;\">B : C = 3 : 5 </span></p>\r\n<p><span style=\"font-family: Arial Unicode MS;\">C : D = 1 : 2 or 5 : 10</span></p>\r\n<p><span style=\"font-family: Arial Unicode MS;\">So, A : B : C : D = 4 : 3 : 5 : 10</span></p>\r\n<p><span style=\"font-family: Arial Unicode MS;\">Sum of A + B + C + D = 4 + 3 + 5 + 10 = 22</span></p>\r\n<p><span style=\"font-family: Arial Unicode MS;\">As per question,</span></p>\r\n<p><span style=\"font-family: Arial Unicode MS;\">22 unit = 13200</span></p>\r\n<p><span style=\"font-family: Arial Unicode MS;\">7 unit = 4200</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Arial Unicode MS;\">64.(c)</span></p>\r\n<p><span style=\"font-family: Arial Unicode MS;\">A : B = 4 : 3</span></p>\r\n<p><span style=\"font-family: Arial Unicode MS;\">B : C = 3 : 5 </span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">C : D = 1 : 2 &#2351;&#2366; 5 : 10</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2340;&#2379;, A : B : C : D = 4 : 3 : 5 : 10</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">A + B + C + D &#2325;&#2366; &#2352;&#2366;&#2358;&#2367; = 4 + 3 + 5 + 10 = 22</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;,</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">22 &#2311;&#2325;&#2366;&#2312; = 13200</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">7 &#2311;&#2325;&#2366;&#2312; = 4200</span></p>\n",
                    correct: "c",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({

                    id: "72",

                    question_en: "<p><span style=\"font-family: Roboto;\">72.</span><span style=\"font-family: Roboto;\"> Two poles are on either side of a road. A 20 m long ladder is placed between the two poles. When the ladder rests against one pole, It makes an angle of 60&deg; with the pole and when it is turned to rest against the other pole, it makes an angle of 30&deg; with the road. Calculate the width of the road (in m) (use <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>3</mn></msqrt></math></span><span style=\"font-family: Roboto;\"> =1.732)</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">72. </span><span style=\"font-family: Arial Unicode MS;\">&#2360;&#2337;&#2364;&#2325; &#2325;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2323;&#2352; &#2342;&#2379; &#2326;&#2306;&#2349;&#2375; &#2361;&#2376;&#2306;&#2404; &#2342;&#2379; &#2326;&#2306;&#2349;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; 20 &#2350;&#2368;&#2335;&#2352; &#2354;&#2306;&#2348;&#2368; &#2360;&#2368;&#2338;&#2364;&#2368; &#2352;&#2326;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404; &#2332;&#2348; &#2360;&#2368;&#2338;&#2364;&#2368; &#2319;&#2325; &#2326;&#2306;&#2349;&#2375; &#2346;&#2352; &#2335;&#2367;&#2325;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; &#2326;&#2306;&#2349;&#2375; &#2325;&#2375; &#2360;&#2366;&#2341; 60&deg; &#2325;&#2366; &#2325;&#2379;&#2339; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2332;&#2348; &#2313;&#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2326;&#2306;&#2349;&#2375; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2350;&#2379;&#2337;&#2364;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; &#2360;&#2337;&#2364;&#2325; &#2325;&#2375; &#2360;&#2366;&#2341; 30&deg; &#2325;&#2366; &#2325;&#2379;&#2339; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2337;&#2364;&#2325; &#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; (m &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2404; (&radic;3 = 1.732 &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2368;&#2332;&#2367;&#2319;)</span></p>\n",

                    solution_en: "<p><span style=\"font-family: Roboto;\">72.(d)</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/images/mceu_14499864011690802900378.png\" width=\"251\" height=\"128\"></p>\r\n<p><span style=\"font-family: Roboto;\">In triangle ABE, sin 30&deg; =&nbsp; &nbsp;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>A</mi><mi>B</mi></mrow><mrow><mi>A</mi><mi>E</mi></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><mn>2</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><mi>A</mi><mi>B</mi></mrow><mn>20</mn></mfrac></math>&rArr;<span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">AB=10 and BE=10</span><span style=\"font-weight: 400;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>3</mn></msqrt></math></span></p>\r\n<p><span style=\"font-family: Roboto;\">In triangle CDE, sin 30&deg; = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>C</mi><mi>D</mi><mo>&nbsp;</mo></mrow><mrow><mi>C</mi><mi>E</mi></mrow></mfrac><mo>&rArr;</mo><mfrac><mn>1</mn><mn>2</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><mi>C</mi><mi>D</mi></mrow><mn>20</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Roboto;\"><span style=\"font-weight: 400;\">&nbsp;&rArr; </span><span style=\"font-weight: 400;\">CD = 10 and DE = 10</span><span style=\"font-weight: 400;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>3</mn></msqrt></math></span></span></p>\r\n<p><span style=\"font-family: Roboto;\"> </span></p>\r\n<p><span style=\"font-family: Roboto;\">So,width of the road </span></p>\r\n<p><span style=\"font-family: Roboto;\">BD = BE + DE = </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>10</mn><msqrt><mn>3</mn></msqrt><mo>&nbsp;</mo><mo>+</mo><mn>10</mn><msqrt><mn>3</mn></msqrt></math><span style=\"font-family: Roboto;\"> </span></p>\r\n<p><span style=\"font-family: Roboto;\"> =&nbsp; 20</span><spa nt-family: Roboto;\">BD = BE + DE= </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>10</mn><msqrt><mn>3</mn></msqrt><mo>&nbsp;</mo><mo>+</mo><mn>10</mn><msqrt><mn>3</mn></msqrt></math><span style=\"font-family: Roboto;\"> </span></p>\r\n<p><span style=\"font-family: Roboto;\"> = 20</span><span style=\"font-family: Roboto;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>3</mn></msqrt></math> <span style=\"font-weight: 400;\">=20 &times; 1.732=3</span><span style=\"font-weight: 400;\">4.64 </span></span>&#2350;&#2368;&#2335;&#2352;</p>\n",

                    solution_hi: "<p><span style=\"font-family: Palanquin;\">77.(d) </span><span style=\"font-family: Palanquin;\"><strong>&#2360;&#2349;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</strong><span style=\"font-weight: 400;\">&#2404; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2340;&#2341;&#2381;&#2351; - </span><strong>&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; A</strong><span style=\"font-weight: 400;\"> (&#2352;&#2375;&#2335;&#2367;&#2344;&#2379;&#2354;) - &#2342;&#2371;&#2359;&#2381;&#2335;&#2367; &#2361;&#2366;&#2344;&#2367; &#2324;&#2352; &#2309;&#2306;&#2343;&#2366;&#2346;&#2344;, </span><strong>B1</strong><span style=\"font-weight: 400;\"> (&#2341;&#2366;&#2351;&#2350;&#2367;&#2344;) - &#2348;&#2375;&#2352;&#2368;-&#2348;&#2375;&#2352;&#2368;, </span><strong>B2</strong><span style=\"font-weight: 400;\"> (&#2352;&#2366;&#2311;&#2348;&#2379;&#2347;&#2381;&#2354;&#2375;&#2357;&#2367;&#2344;) - &#2350;&#2306;&#2342; &#2357;&#2367;&#2325;&#2366;&#2360;, &#2326;&#2352;&#2366;&#2348; &#2340;&#2381;&#2357;&#2330;&#2366;, </span><strong>B12</strong><span style=\"font-weight: 400;\"> (&#2360;&#2366;&#2351;&#2344;&#2379;&#2325;&#2379;&#2348;&#2366;&#2354;&#2366;&#2350;&#2367;&#2344;) - &#2319;&#2344;&#2368;&#2350;&#2367;&#2351;&#2366;, </span><strong>C</strong><span style=\"font-weight: 400;\"> (&#2319;&#2360;&#2381;&#2325;&#2377;&#2352;&#2381;&#2348;&#2367;&#2325; &#2319;&#2360;&#2367;&#2337;) - &#2360;&#2381;&#2325;&#2352;&#2381;&#2357;&#2368;, </span><strong>D</strong><span style=\"font-weight: 400;\"> (&#2325;&#2376;&#2354;&#2381;&#2360;&#2368;&#2347;&#2375;&#2352;&#2377;&#2354;) - &#2352;&#2367;&#2325;&#2375;&#2335;&#2381;&#2360;, </span><strong>K</strong><span style=\"font-weight: 400;\"> (&#2347;&#2366;&#2311;&#2354;&#2379;&#2325;&#2381;&#2357;&#2367;&#2344;&#2379;&#2344;) - &#2352;&#2325;&#2381;&#2340; &#2325;&#2375; &#2341;&#2325;&#2381;&#2325;&#2375; &#2350;&#2375;&#2306; &#                     correct: "d",

                questions.push({
                    id: "78",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">78. </span><span style=\"font-family: Roboto;\">Which of the following is working capital in the farming sector?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">78. </span><span style=\"font-family: Palanquin;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2325;&#2371;&#2359;&#2367; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2358;&#2368;&#2354; &#2346;&#2370;&#2306;&#2332;&#2368; &#2361;&#2376; ?</span></p>\n",
                    options_en: ["<p>threshing machine</p>\n", "<p>money</p>\n", 
                                "<p>tractor<span style=\"font-family: Roboto;\"> </span></p>\n", "<p>land</p>\n"],
                    options_hi: ["<p>&#2341;&#2381;&#2352;&#2375;&#2360;&#2367;&#2306;&#2327; &#2350;&#2358;&#2368;&#2344;</p>\n", "<p>&#2346;&#2376;&#2360;&#2366;</p>\n",
                                "<p>&#2335;&#2381;&#2352;&#2376;&#2325;&#2381;&#2335;&#2352;</p>\n", "<p>&#2349;&#2370;&#2350;&#2367;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">78.(b)</span><span style=\"font-family: Roboto;\"> </span><span style=\"font-family: Roboto;\">&nbsp;<span style=\"font-weight: 400;\">Money. </span><strong>Working Capital</strong><span style=\"font-weight: 400;\"> is current assets, which can be turned to cash in one year or less, minus current liabilities due within one year. </span><strong>Working capital</strong><span style=\"font-weight: 400;\"> measures financial liquidity, which is the ability to sell assets without disrupting normal business operations.</span></span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">78.(b)</span><span style=\"font-family: Palanquin;\"> </span><span style=\"font-family: Palanquin;\"><span style=\"font-weight: 400;\">&#2346;&#2376;&#2360;&#2366; &#2404; </span><strong>&#2325;&#2366;&#2352;&#2381;&#2351;&#2358;&#2368;&#2354; &#2346;&#2370;&#2306;&#2332;&#2368;</strong><span style=\"font-weight: 400;\"> &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2351;&#2366; &#2313;&#2360;&#2360;&#2375; &#2325;&#2350; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2344;&#2325;&#2342;&#2368; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2342;&#2375;&#2351; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2342;&#2375;&#2344;&#2342;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2328;&#2335;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2404; </span><strong>&#2325;&#2366;&#2352;&#2381;&#2351;&#2358;&#2368;&#2354; &#2346;&#2370;&#2306;&#2332;&#2368;</strong><span style=\"font-weight: 400;\"> &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2340;&#2352;&#2354;&#2340;&#2366; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2357;&#2381;&#2351;&#2366;&#2357;&#2360;&#2366;&#2351;&#2367;&#2325; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2379; &#2348;&#2366;&#2343;&#2367;&#2340; &#2325;&#2367;&#2319; &#2348;&#2367;&#2344;&#2366; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2348;&#2375;&#2330;&#                 questions.push({

                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">79.</span><span style=\"font-family: Roboto;\"> Who among the following was the Secretary of the Constituent Assembly?</span></p>\n",
                    question_hi: "<p>79<span style=\"font-family: Roboto;\">.</span><span style=\"font-family: Palanquin;\"> &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2349;&#2366; &#2325;&#2375; &#2360;&#2330;&#2367;&#2357; &#2341;&#2375;?</span></p>\n",

                                "<p>&#2361;&#2369;&#2360;&#2376;&#2344; &#2311;&#2350;&#2366;&#2350;</p>\n", "<p>&#2319;&#2330;&#2360;&#2368; &#2350;&#2369;&#2326;&#2352;&#2381;&#2332;&#2368;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">79.(b) </span><span style=\"font-family: Roboto;\"><strong>HVR Iyengar</strong><span style=\"font-weight: 400;\"> was the Secretary of the Constituent Assembly.</span><strong> Dr. Rajendra Prasad</strong><span style=\"font-weight: 400;\"> was the President of the Constituent Assembly.</span><strong> HC Mookherjee</strong><span style=\"font-weight: 400;\"> was vice president of the Constituent Assembly.</span></span></p>\n",

                    correct: "b",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "80",
                    section: "18",

                    solution_hi: "<p><span style=\"font-family: Roboto;\">80.(c)</span><span style=\"font-family: Palanquin;\"> &#2358;&#2381;&#2351;&#2366;&#2350;&#2366; &#2346;&#2381;&#2352;&#2360;&#2366;&#2342; &#2350;&#2369;&#2326;&#2352;&#2381;&#2332;&#2368; - &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2324;&#2352; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;, &#2352;&#2366;&#2332;&#2325;&#2369;&#2350;&#2366;&#2352;&#2368; &#2309;&#2350;&#2371;&#2340; &#2325;&#2380;&#2352; - &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;, &#2352;&#2366;&#2332;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2360;&#2366;&#2342;- &#2326;&#2366;&#2342;&#2381;&#2351; &#2324;&#2352; &#2325;&#2371;&#2359;&#2367; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;, &#2350;&#2380;&#2354;&#2366;&#2344;&#2366; &#2309;&#2348;&#2369;&#2354; &#2325;&#2354;&#2366;&#2350; &#2310;&#2332;&#2364;&#2366;&#2342; - &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;&#2404;</span></p>\n",

                questions.push({
                    id: "81",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">81. </span><span style=\"font-family: Roboto;\">The famous Kesavananda Bharati (1973) case was associated with which of the following issues?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">81. </span><span style=\"font-family: Palanquin;\">&#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2325;&#2375;&#2358;&#2357;&#2366;&#2344;&#2306;&#2342; &#2349;&#2366;&#2352;&#2340;&#2368; (1973) &#2325;&#2366; &#2350;&#2366;&#2350;&#2354;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2350;&#2369;&#2342;&#2381;&#2342;&#2375; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2341;&#2366;?</span></p>\n",
                    options_en: ["<p>Creation of Goa as a State</p>\n", "<p>Amenability of the Preamble</p>\n", 
                                "<p>Appointment of the judges of the Supreme Court</p>\n", "<p>Abolition of Directive Principles of State Policy</p>\n"],
                    options_hi: ["<p>&#2319;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2327;&#2379;&#2357;&#2366; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339;</p>\n", "<p>&#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;&#2344;&#2366; &#2325;&#2368; &#2357;&#2381;&#2351;&#2357;&#2361;&#2366;&#2352;&#2381;&#2351;&#2340;&#2366;</p>\n",
                                "<p>&#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367;</p>\n", "<p>&#2352;&#2366;&#2332;&#2381;&#2351; &#2344;&#2368;&#2340;&#2367; &#2325;&#2375; &#2344;&#2367;&#2342;&#2375;&#2358;&#2325; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2381;&#2350;&#2370;&#2354;&#2344;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">81.(b)</span><span style=\"font-family: Roboto;\"> </span><strong><span style=\"font-family: Roboto;\">Kesavananda Bharati </span></strong><span style=\"font-family: Roboto;\">and Ors vs State of Kerala case, 1973 is known for the basic structure doctrine of the Supreme Court. The SC held that the basic structure of the Constitution could not be abrogated even by a constitutional amendment.</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Palanquin;\">81.(b) <strong>&#2325;&#2375;&#2358;&#2357;&#2366;&#2344;&#2306;&#2342; &#2349;&#2366;&#2352;&#2340;&#2368;</strong></span><span style=\"font-family: Palanquin;\"> &#2324;&#2352; &#2309;&#2344;&#2381;&#2351; &#2348;&#2344;&#2366;&#2350; &#2325;&#2375;&#2352;&#2354; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2366;&#2350;&#2354;&#2366;, 1973 &#2313;&#2330;&#2381;&#2330;&#2340;&#2350; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2350;&#2370;&#2354; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2369;&#2346;&#2381;&#2352;&#2368;&#2350; &#2325;&#2379;&#2352;&#2381;&#2335; &#2344;&#2375; &#2325;&#2361;&#2366; &#2325;&#2367; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2350;&#2370;&#2354; &#2338;&#2366;&#2306;&#2330;&#2375; &#2325;&#2379; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2349;&#2368; &#2352;&#2342;&#2381;&#2342; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span></p>\n",
                    correct: "b",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "82",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">82.</span><span style=\"font-family: Roboto;\"> The skull of a \'Homo erectus\' was found in which of the following prehistoric Indian sites?</span></p>\n",

                    correct: "b",

                questions.push({

                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">83. </span><span style=\"font-family: Roboto;\">In which state is the archaeological site of Surkotada situated ?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">83.</span><span style=\"font-family: Palanquin;\"> &#2346;&#2369;&#2352;&#2366;&#2340;&#2366;&#2340;&#2381;&#2357;&#2367;&#2325; &#2360;&#2381;&#2341;&#2354; </span><span style=\"font-family: Palanquin;\">&#2360;&#2369;&#2352;&#2325;&#2379;&#2340;&#2342;&#2366;</span><span style=\"font-family: Palanquin;\"> &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376; ?</span></p>\n",
                    options_en: ["<p>Rajasthan</p>\n", "<p>Karnataka</p>\n", 
                                "<p>Haryana</p>\n", "<p>Gujarat</p>\n"],
                    options_hi: ["<p>&#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;</p>\n", "<p>&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;</p>\n",
                                "<p>&#2361;&#2352;&#2367;&#2351;&#2366;&#2339;&#2366;</p>\n", "<p>&#2327;&#2369;&#2332;&#2352;&#2366;&#2340;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">83.(d) </span><span style=\"font-family: Roboto;\"> </span><span style=\"font-family: Roboto;\">Surkotada is an archaeological site located in Rapar Taluka of Kutch district, Gujarat, India. During 1972, the Archaeological Survey of India undertook excavation in this site by J.P.Joshi.</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">83.(d) &#2360;&#2369;&#2352;&#2325;&#2379;&#2335;&#2342;&#2366; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2325;&#2375; &#2325;&#2330;&#2381;&#2331; &#2332;&#2367;&#2354;&#2375; &#2325;&#2375; &#2352;&#2366;&#2346;&#2352; &#2340;&#2366;&#2354;&#2369;&#2325;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2319;&#2325; &#2346;&#2369;&#2352;&#2366;&#2340;&#2366;&#2340;&#2381;&#2357;&#2367;&#2325; &#2360;&#2381;&#2341;&#2354; &#2361;&#2376;&#2404; 1972 &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2369;&#2352;&#2366;&#2340;&#2340;&#2381;&#2357; &#2360;&#2352;&#2381;&#2357;&#2375;&#2325;&#2381;&#2359;&#2339; &#2344;&#2375; &#2332;&#2375;.&#2346;&#2368;. &#2332;&#2379;&#2358;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2311;&#2360; &#2360;&#2381;&#2341;&#2354; &#2346;&#2352; &#2313;&#2340;&#2381;&#2326;&#2344;&#2344; &#2325;&#2352;&#2366;&#2351;&#2366;&#2404;</span></p>\n",
                    correct: "d",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "84",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">84.</span><span style=\"font-family: Roboto;\"> In which Indian state is the Gola Dhora site related to the Indus Valley Civilization located?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">84. </span><span style=\"font-family: Palanquin;\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2327;&#2379;&#2354;&#2366; &#2343;&#2379;&#2352;&#2379;<span style=\"font-weight: 400;\"> </span>&#2360;&#2381;&#2341;&#2354; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;? </span></p>\n",
                    options_en: ["<p>Gujarat</p>\n", "<p>Rajasthan</p>\n", 
                                "<p>Haryana</p>\n", "<p>Punjab</p>\n"],
                    options_hi: ["<p>&#2327;&#2369;&#2332;&#2352;&#2366;&#2340;</p>\n", "<p>&#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;</p>\n",
                                "<p>&#2361;&#2352;&#2367;&#2351;&#2366;&#2339;&#2366;</p>\n", "<p>&#2346;&#2306;&#2332;&#2366;&#2348;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">84.(a) <strong>Gola Dhoro</strong></span><span style=\"font-family: Roboto;\"> is an archaeological site belonging to the Indus Valley civilization, situated at the head of the Gulf of Kutch, near Bagasara in the Kutch district of Gujarat.</span><span style=\"font-family: Roboto;\"> <strong>Gola Dhoro</strong></span><span style=\"font-family: Roboto;\"> specialized in the production of shell bangles and semi-precious stone beads as well as objects of copper and faience.</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">84.(a)</span><span style=\"font-family: Roboto;\"> </span><strong><span style=\"font-family: Palanquin;\">&#2327;&#2379;&#2354;&#2366; &#2343;&#2379;&#2352;&#2379;</span></strong><span style=\"font-family: Palanquin;\"> &#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2319;&#2325; &#2346;&#2369;&#2352;&#2366;&#2340;&#2366;&#2340;&#2381;&#2357;&#2367;&#2325; &#2360;&#2381;&#2341;&#2354; &#2361;&#2376;, &#2332;&#2379; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2325;&#2375; &#2325;&#2330;&#2381;&#2331; &#2332;&#2367;&#2354;&#2375; &#2350;&#2375;&#2306; &#2348;&#2327;&#2366;&#2360;&#2352;&#2366; &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2330;&#2381;&#2331; &#2325;&#2368; &#2326;&#2366;&#2337;&#2364;&#2368; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404; </span><strong><span style=\"font-family: Palanquin;\">&#2327;&#2379;&#2354;&#2366; &#2343;&#2379;&#2352;&#2379;</span></strong><span style=\"font-family: Palanquin;\"> &#2326;&#2379;&#2354; &#2330;&#2370;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2309;&#2352;&#2381;&#2343;-&#2325;&#2368;&#2350;&#2340;&#2368; &#2346;&#2340;&#2381;&#2341;&#2352; &#2325;&#2375; &#2350;&#2379;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341;-&#2360;&#2366;&#2341; &#2340;&#2366;&#2306;&#2348;&#2375; &#2324;&#2352; &#2347;&#2375;&#2319;&#2306;&#2360; &#2325;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2350;&#2375;&#2306; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2361;&#2376;&#2404;</span></p>\n",
                    correct: "a",
                    pos_marks: 1.0,
                    neg_marks: 0.5

                questions.push({
                    id: "85",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">85. </span><span style=\"font-family: Roboto;\">The Sun is visible to us approximately _______ minutes before the sunrise because of atmospheric refraction.</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">85.</span><span style=\"font-family: Roboto;\"> &nbsp;</span><span style=\"font-family: Palanquin;\">&#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354;&#2368;&#2351; &#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2360;&#2370;&#2352;&#2381;&#2351; &#2360;&#2370;&#2352;&#2381;&#2351;&#2379;&#2342;&#2351; &#2360;&#2375; &#2354;&#2327;&#2349;&#2327; _______ &#2350;&#2367;&#2344;&#2335; &#2346;&#2361;&#2354;&#2375; &#2361;&#2350;&#2375;&#2306; &#2342;&#2367;&#2326;&#2366;&#2312; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</span></p>\n",
                    options_en: ["<p>9</p>\n", "<p>2</p>\n", 
                                "<p>10</p>\n", "<p>13</p>\n"],
                    options_hi: ["<p>9</p>\n", "<p>2</p>\n",
                                "<p>10</p>\n", "<p>13</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">85.(b) </span><span style=\"font-family: Roboto;\">Due to the continuous refraction of light rays at each layer, it follows a curved path and reaches the eye of the observer. As a result, the Sun becomes visible 2 mins before it rises above the horizon in the morning. </span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">85.(b)</span><span style=\"font-family: Palanquin;\"> &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2352;&#2340; &#2346;&#2352; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2367;&#2352;&#2339;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2352;&#2306;&#2340;&#2352; &#2309;&#2346;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339;, &#2351;&#2361; &#2319;&#2325; &#2357;&#2325;&#2381;&#2352; &#2346;&#2341; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2325; &#2325;&#2368; &#2310;&#2306;&#2326; &#2340;&#2325; &#2346;&#2361;&#2369;&#2306;&#2330;&#2340;&#2368; &#2361;&#2376;&#2404; &#2344;&#2340;&#2368;&#2332;&#2340;&#2344;, &#2360;&#2369;&#2348;&#2361; &#2325;&#2381;&#2359;&#2367;&#2340;&#2367;&#2332; &#2360;&#2375; &#2314;&#2346;&#2352; &#2313;&#2336;&#2344;&#2375; &#2360;&#2375; 2 &#2350;&#2367;&#2344;&#2335; &#2346;&#2361;&#2354;&#2375; &#2360;&#2370;&#2352;&#2381;&#2351; &#2342;&#2367;&#2326;&#2366;&#2312; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;</span></p>\n",
                    correct: "b",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "86",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">86. </span><span style=\"font-family: Roboto;\">Which of the following is not a characteristic of \'Solid\'?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">86. </span><span style=\"font-family: Palanquin;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368;, &lsquo;&#2336;&#2379;&#2360;&rsquo; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</span></p>\n",
                    options_en: ["<p>A solid has a fixed volume.</p>\n", "<p>Solids can be easily compressed.</p>\n", 
                                "<p>A solid may break when subjected to <span style=\"font-family: Roboto;\">a force.</span></p>\n", "<p>It is difficult to change the shape of <span style=\"font-family: Roboto;\">solids, hence they are hard.</span></p>\n"],
                    options_hi: ["<p>&#2336;&#2379;&#2360; &#2325;&#2366; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2310;&#2351;&#2340;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p>\n", "<p>&#2336;&#2379;&#2360; &#2325;&#2379; &#2310;&#2360;&#2366;&#2344;&#2368; &#2360;&#2375; &#2360;&#2306;&#2346;&#2368;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; <span style=\"font-family: Palanquin;\">&#2361;&#2376;&#2404;</span></p>\n",
                                "<p>&#2348;&#2354; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2336;&#2379;&#2360; &#2335;&#2370;&#2335; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p>\n", "<p>&#2336;&#2379;&#2360; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2325;&#2379; &#2348;&#2342;&#2354;&#2344;&#2366; &#2350;&#2369;&#2358;&#2381;&#2325;&#2367;&#2354; &#2361;&#2376;, <span style=\"font-family: Palanquin;\">&#2311;&#2360;&#2354;&#2367;&#2319; &#2357;&#2375; &#2325;&#2336;&#2379;&#2352; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">86.(b) <strong>Characteristics of Solids</strong> </span><span style=\"font-family: Roboto;\">: They have a fixed shape and a fixed volume, They </span><span style=\"font-family: Roboto;\"><strong>cannot</strong> </span><span style=\"font-family: Roboto;\">be compressed, They have high density, force of attraction between the particles is very strong, the space between the particles of solids is negligible.</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Palanquin;\">86.(b) <strong>&#2336;&#2379;&#2360; &#2325;&#2375; &#2309;&#2349;&#2367;&#2354;&#2325;&#2381;&#2359;&#2339; </strong></span><span style=\"font-family: Palanquin;\">: &#2311;&#2344;&#2325;&#2366; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2310;&#2325;&#2366;&#2352; &#2324;&#2352; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2310;&#2351;&#2340;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2311;&#2344;&#2381;&#2361;&#2375;&#2306; &#2360;&#2306;&#2346;&#2368;&#2337;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366;, &#2311;&#2344;&#2325;&#2366; &#2328;&#2344;&#2340;&#2381;&#2357; &#2313;&#2330;&#2381;&#2330; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2325;&#2339;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2310;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2348;&#2361;&#2369;&#2340; &#2346;&#2381;&#2352;&#2348;&#2354; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2336;&#2379;&#2360; &#2325;&#2375; &#2325;&#2339;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344; &#2344;&#2327;&#2339;&#2381;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; </span></p>\n",
                    correct: "b",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "87",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">87.</span><span style=\"font-family: Roboto;\"> Which of the following is the traditional dress worn by the men and women of Kashmir?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">87.</span><span style=\"font-family: Palanquin;\"> &#2325;&#2358;&#2381;&#2350;&#2368;&#2352; &#2325;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2361;&#2344;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2346;&#2379;&#2358;&#2366;&#2325; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2361;&#2376;?</span></p>\n",
                    options_en: ["<p>Rikutu gamcha</p>\n", "<p>Fanek</p>\n", 
                                "<p>Mekhla chadar</p>\n", "<p>Feran</p>\n"],
                    options_hi: ["<p>&#2352;&#2367;&#2325;&#2369;&#2340;&#2369; &#2327;&#2350;&#2331;&#2366;</p>\n", "<p>&#2347;&#2366;&#2344;&#2375;&#2325;</p>\n",
                                "<p>&#2350;&#2375;&#2326;&#2354;&#2366; &#2330;&#2366;&#2342;&#2352;</p>\n", "<p>&#2347;&#2375;&#2352;&#2344;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">87.(d) </span><span style=\"font-family: Roboto;\"><strong>Feran </strong><span style=\"font-weight: 400;\">&nbsp;is the traditional dress worn by the men and women of Kashmir. Traditional costume for men in Tripura is a towel, which is known as </span><strong>Rikutu Gamcha</strong><span style=\"font-weight: 400;\">. </span><strong>Fanek </strong><span style=\"font-weight: 400;\">is a traditional dress of Manipur. </span><strong>Mekhla chadar</strong><span style=\"font-weight: 400;\"> is a traditional dress of Assam.</span>&nbsp;</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Palanquin;\">87.(d)&nbsp;</span><strong>&#2347;&#2375;&#2352;&#2344; </strong><span style=\"font-weight: 400;\">&#2325;&#2358;&#2381;&#2350;&#2368;&#2352; &#2325;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2361;&#2344;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2346;&#2379;&#2358;&#2366;&#2325; &#2361;&#2376;&#2404; &#2340;&#2381;&#2352;&#2367;&#2346;&#2369;&#2352;&#2366; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2346;&#2379;&#2358;&#2366;&#2325; &#2319;&#2325; &#2340;&#2380;&#2354;&#2367;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; </span><strong>&#2352;&#2367;&#2325;&#2369;&#2340;&#2369; &#2327;&#2350;&#2331;&#2366;</strong><span style=\"font-weight: 400;\"> &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; </span><strong>&#2347;&#2366;&#2344;&#2375;&#2325;</strong><span style=\"font-weight: 400;\"> &#2350;&#2339;&#2367;&#2346;&#2369;&#2352; &#2325;&#2368; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2346;&#2379;&#2358;&#2366;&#2325; &#2361;&#2376;&#2404; </span><strong>&#2350;&#2375;&#2326;&#2354;&#2366; &#2330;&#2366;&#2342;&#2352;</strong><span style=\"font-weight: 400;\"> &#2309;&#2360;&#2350; &#2325;&#2368;&nbsp; </span><span style=\"font-weight: 400;\">&#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2346;&#2379;&#2358;&#2366;&#2325; &#2361;&#2376;&#2404;</span></p>\n",
                    correct: "d",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({

                    section: "18",

                    correct: "a",
