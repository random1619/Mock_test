<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Questions data
        const questions = [];
        const sections = {};
        let currentLang = "en";
        let currentQuestion = 0;
        let answers = {};
        let submitted = false;
        let totalTime = 90 * 60;
        let resultsModal;
        
        // Initialize the test
        window.onload = function() {
            initializeTest();
            startTimer();
            resultsModal = new bootstrap.Modal(document.getElementById('results-modal'));
            
            // If on desktop, show the question navigation by default
            if (window.innerWidth >= 992) {
                document.getElementById('question-nav').classList.add('show');
                document.getElementById('main-content').classList.add('with-nav');
            }
        };
        
        // Initialize test data
        function initializeTest() {
            // Add sections and questions
            
            sections["7"] = {
                name: "English",
                start: 0,
                end: 23
            };
            
            document.getElementById('section-selector').innerHTML += 
                `<option value="7">English</option>`;
            
            sections["6"] = {
                name: "Reasoning",
                start: 24,
                end: 48
            };
            
            document.getElementById('section-selector').innerHTML += 
                `<option value="6">Reasoning</option>`;
            
            sections["17"] = {
                name: "Quantitative Aptitude",
                start: 49,
                end: 73
            };
            
            document.getElementById('section-selector').innerHTML += 
                `<option value="17">Quantitative Aptitude</option>`;
            
            sections["18"] = {
                name: "General Awareness",
                start: 74,
                end: 98
            };
            
            document.getElementById('section-selector').innerHTML += 
                `<option value="18">General Awareness</option>`;
            
            sections["misc"] = {
                name: "Miscellaneous",
                start: 99,
                end: 99
            };
            
            document.getElementById('section-selector').innerHTML += 
                `<option value="misc">Miscellaneous</option>`;
            
            
                questions.push({
                    id: "1",
                    section: "7",
                    question_en: "<p>1. Spot the error in the given sentence and select the correct sentence from the options given.</p>\r\n<p>Until he does not stop/ telling lies to others/ he cannot become a reliable person.</p>\n",
                    question_hi: "<p>1. Spot the error in the given sentence and select the correct sentence from the options given.</p>\r\n<p>Until he does not stop/ telling lies to others/ he cannot become a reliable person.</p>\n",
                    options_en: ["<p>Until he does not stop</p>\n", "<p>telling lies to others</p>\n", 
                                "<p>he cannot become a reliable person</p>\n", "<p>No error</p>\n"],
                    options_hi: ["<p>Until he does not stop</p>\n", "<p>telling lies to others</p>\n",
                                "<p>he cannot become a reliable person</p>\n", "<p>No error</p>\n"],
                    solution_en: "<p>1.(a)</p>\r\n<p>We cannot write two negative words &lsquo;until&rsquo; &amp; &lsquo;not&rsquo; together in a sentence as it becomes a case of superfluousness(exceeding what is necessary). Hence, &lsquo;not&rsquo; will be removed from the sentence &amp; &lsquo;Until he stops&rsquo; becomes the most appropriate answer.</p>\n",
                    solution_hi: "<p>1.(a)</p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2361;&#2350; &#2319;&#2325; Sentence &#2350;&#2375;&#2306; two negative words \'until\' &#2324;&#2352; \'not\' &#2319;&#2325; &#2360;&#2366;&#2341; &#2344;&#2361;&#2368;&#2306; &#2354;&#2367;&#2326; &#2360;&#2325;&#2340;&#2375; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2351;&#2361; superfluousness(&#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;) &#2348;&#2344; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360;&#2354;&#2367;&#2319;, &#2357;&#2366;&#2325;&#2381;&#2351; &#2360;&#2375; \'Not\' &#2361;&#2335;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366; &#2324;&#2352; \'Until he stops\' &#2360;&#2348;&#2360;&#2375; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2313;&#2340;&#2381;&#2340;&#2352; &#2348;&#2344; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span></p>\n",
                    correct: "a",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "2",
                    section: "7",
                    question_en: "<p>2. Select the most appropriate option to substitute the underline/Bold segment in the given sentence.</p>\r\n<p><span style=\"text-decoration: underline;\"><span style=\"font-family: Palanquin Dark;\">I was not able to meeting</span></span><span style=\"font-family: Palanquin Dark;\"> my friend on the way because of the heavy traffic jam. </span></p>\n",
                    question_hi: "<p>2. Select the most appropriate option to substitute the underline/Bold segment in the given sentence.</p>\r\n<p><span style=\"text-decoration: underline;\"><span style=\"font-family: Palanquin Dark;\">I was not able to meeting</span></span><span style=\"font-family: Palanquin Dark;\"> my friend on the way because of the heavy traffic jam. </span></p>\n",
                    options_en: ["<p>I was not able to meet</p>\n", "<p>I was not able for meet</p>\n", 
                                "<p>I was not able of meeting</p>\n", "<p>No substitution required</p>\n"],
                    options_hi: ["<p>I was not able to meet</p>\n", "<p>I was not able for meet</p>\n",
                                "<p>I was not able of meeting</p>\n", "<p>No substitution required</p>\n"],
                    solution_en: "<p>2.(a)</p>\r\n<p><span style=\"font-family: Palanquin Dark;\">We generally use the first form of the verb(</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>1</mn></msub></math><span style=\"font-family: Palanquin Dark;\">) after the preposition &lsquo;to&rsquo;. Hence, &lsquo;I was not able to meet(</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>1</mn></msub></math><span style=\"font-family: Palanquin Dark;\">)&rsquo; is the most appropriate answer.</span></p>\n",
                    solution_hi: "<p>2.(a)</p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2361;&#2350; &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352; preposition \'to\' &#2325;&#2375; &#2348;&#2366;&#2342; verb &#2325;&#2375; first form (</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>1</mn></msub></math><span style=\"font-family: Palanquin Dark;\">) &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2311;&#2360;&#2354;&#2367;&#2319;, \'I was not able to meet (</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>V</mi><mn>1</mn></msub></math><span style=\"font-family: Palanquin Dark;\">)\' &#2360;&#2348;&#2360;&#2375; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2313;&#2340;&#2381;&#2340;&#2352; &#2361;&#2376;&#2404;</span></p>\n",
                    correct: "a",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "3",
                    section: "7",
                    question_en: "<p><span style=\"font-family: Roboto;\">3. </span><span style=\"font-family: Roboto;\">Select the option that expresses the given sentence in indirect speech.</span></p>\r\n<p><span style=\"font-family: Roboto;\">He said, \"Let us wait for the award\".</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">3. </span><span style=\"font-family: Roboto;\">Select the option that expresses the given sentence in indirect speech.</span></p>\r\n<p><span style=\"font-family: Roboto;\">He said, \"Let us wait for the award\".</span></p>\n",
                    options_en: ["<p>He proposed that they should wait for the award.</p>\n", "<p>He said that he should wait for the award.</p>\n", 
                                "<p>He proposed that he should wait for the award.</p>\n", "<p>He said that they should waited for the award.</p>\n"],
                    options_hi: ["<p>He proposed that they should wait for the award.</p>\n", "<p>He said that he should wait for the award.</p>\n",
                                "<p>He proposed that he should wait for the award.</p>\n", "<p>He said that they should waited for the award.</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">3.(a)</span><span style=\"font-family: Roboto;\"> He proposed that they should wait for the award.</span></p>\r\n<p><span style=\"font-family: Roboto;\"><span style=\"font-weight: 400;\">(b) He said that </span><span style=\"text-decoration: underline;\"><span style=\"font-weight: 400;\">he</span></span><span style=\"font-weight: 400;\"> should wait for the award. (Incorrect pronoun)</span></span></p>\r\n<p><span style=\"font-family: Roboto;\"><span style=\"font-weight: 400;\">(c) He proposed that </span><span style=\"text-decoration: underline;\"><span style=\"font-weight: 400;\">he</span></span><span style=\"font-weight: 400;\"> should wait for the award. (Incorrect Pronoun)</span></span></p>\r\n<p><span style=\"font-family: Roboto;\"><span style=\"font-weight: 400;\">(d) He </span><span style=\"text-decoration: underline;\"><span style=\"font-weight: 400;\">said</span></span><span style=\"font-weight: 400;\"> that they should waited for the award. (Incorrect Reporting Verb)</span></span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">3.(a)</span><span style=\"font-family: Roboto;\"> He proposed that they should wait for the award.</span></p>\r\n<p><span style=\"font-weight: 400;\">(b) He said that </span><span style=\"text-decoration: underline;\"><span style=\"font-weight: 400;\">he</span></span><span style=\"font-weight: 400;\"><span style=\"text-decoration: underline;\"> </span>should wait for the award. (&#2327;&#2354;&#2340; Pronoun)</span></p>\r\n<p><span style=\"font-weight: 400;\">(c) He proposed that </span><span style=\"text-decoration: underline;\"><span style=\"font-weight: 400;\">he</span></span><span style=\"font-weight: 400;\"> should wait for the award. (&#2327;&#2354;&#2340; Pronoun)</span></p>\r\n<p><span style=\"font-weight: 400;\">(d) He </span><span style=\"text-decoration: underline;\"><span style=\"font-weight: 400;\">said</span></span><span style=\"font-weight: 400;\"><span style=\"text-decoration: underline;\"> </span>that they should waited for the award. (&#2327;&#2354;&#2340; Reporting Verb)</span></p>\n",
                    correct: "a",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "4",
                    section: "7",
                    question_en: "<p><span style=\"font-family: Roboto;\">4. Select the option that expresses the given sentence in the Active/Passive voice.</span></p>\r\n<p><span style=\"font-family: Roboto;\">The citizens have chosen that man as their leader.</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">4. Select the option that expresses the given sentence in the Active/Passive voice.</span></p>\r\n<p><span style=\"font-family: Roboto;\">The citizens have chosen that man as their leader.</span></p>\n",
                    options_en: ["<p>That man had been chosen by the citizens as their leader.</p>\n", "<p>That man has been chosen by the citizens as their leader.</p>\n", 
                                "<p>That man is chosen by the citizens as their leader.</p>\n", "<p>That man was chosen by the citizens as their leader.</p>\n"],
                    options_hi: ["<p>That man had been chosen by the citizens as their leader.</p>\n", "<p>That man has been chosen by the citizens as their leader.</p>\n",

                questions.push({
                    id: "27",
                    section: "6",
                    question_en: "<p><span style=\"font-family: Roboto;\">27. </span><span style=\"font-family: Roboto;\">In a certain code language, \'SO\' is written as &lsquo;34&rsquo; and \'BED\' is written as &lsquo;11&rsquo;. How will &lsquo;MOAN\' be written in that language ?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">27.</span><span style=\"font-family: Palanquin;\"> &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2370;&#2335; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, \'SO\' &#2325;&#2379; \'34\' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; \'BED\' &#2325;&#2379; \'11\' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2368; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; \'MOAN\' &#2325;&#2376;&#2360;&#2375; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</span></p>\n",
                    options_en: ["<p>43</p>\n", "<p>99</p>\n", 
                                "<p>86</p>\n", "<p>23</p>\n"],
                    options_hi: ["<p>43</p>\n", "<p>99</p>\n",
                                "<p>86</p>\n", "<p>23</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">27.(a) Logic used:- </span><span style=\"font-family: Roboto;\">sum of alphabetical position of each letter.</span></p>\r\n<p><span style=\"font-family: Nova Mono;\">&lsquo;SO&rsquo; &rArr; 19 + 15 = 34</span></p>\r\n<p><span style=\"font-family: Nova Mono;\">&lsquo;BED&rsquo; &rArr; 2 + 5 + 4 = 11</span></p>\r\n<p><span style=\"font-family: Roboto;\">Similarly,</span></p>\r\n<p><span style=\"font-family: Nova Mono;\">&lsquo;MOAN&rsquo; &rArr; 13 + 15 + 1 + 14 = 43 </span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Palanquin;\">27.(a) &#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2340;&#2352;&#2381;&#2325;:- </span><span style=\"font-family: Palanquin;\">&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2368; &#2357;&#2352;&#2381;&#2339;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2366; &#2351;&#2379;&#2327;</span></p>\r\n<p><span style=\"font-family: Nova Mono;\">&lsquo;SO&rsquo; &rArr; 19 + 15 = 34</span></p>\r\n<p><span style=\"font-family: Nova Mono;\">&lsquo;BED&rsquo; &rArr; 2 + 5 + 4=11</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2311;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;,</span></p>\r\n<p><span style=\"font-family: Nova Mono;\">&lsquo;MOAN&rsquo; &rArr; 13 + 15 + 1 + 14 = 43 </span></p>\n",
                    correct: "a",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "28",
                    section: "6",
                    question_en: "<p><span style=\"font-family: Roboto;\">28. </span><span style=\"font-family: Roboto;\">Read the given statements and conclusions carefully. Assuming that the information given in the statements is true, even if it appears to be at variance with the commonly known facts, decide which of the given conclusions logically follow(s) from the statements.</span></p>\r\n<p><strong><span style=\"font-family: Roboto;\">Statements:</span></strong></p>\r\n<p><span style=\"font-family: Roboto;\">Some pencils are pens.</span></p>\r\n<p><span style=\"font-family: Roboto;\">No pen is a sharpener</span></p>\r\n<p><span style=\"font-family: Roboto;\">All sharpeners are staplers</span></p>\r\n<p><strong><span style=\"font-family: Roboto;\">Conclusions:</span></strong></p>\r\n<p><span style=\"font-family: Roboto;\">I. At least some staplers are pens.</span></p>\r\n<p><span style=\"font-family: Roboto;\">II. All pencils are pens.</span></p>\n",

                    question_en: "<p><span style=\"font-family: Roboto;\">29. </span><span style=\"font-family: Roboto;\">Four letter-clusters have been given out of which three are alike in some manner and one is different. Select the one that is different.</span></p>\n",

                    solution_hi: "<p><span style=\"font-family: Roboto;\">29.(a) </span></p>\r\n<p><span style=\"font-family: Palanquin;\">VXZ &#2350;&#2375;&#2306; </span><span style=\"font-family: Roboto;\">:- </span><span style=\"font-family: Roboto;\">V + 2 = X , X + 2 = Z</span></p>\r\n<p><span style=\"font-family: Palanquin;\">CEH &#2350;&#2375;&#2306; :- C + 2 = E, E + 3 = H</span></p>\r\n<p><span style=\"font-family: Palanquin;\">PRU &#2350;&#2375;&#2306; :- P + 2 = R , R + 3 = U</span></p>\r\n<p><span style=\"font-family: Palanquin;\">JLO &#2350;&#2375;&#2306; :- J + 2 = L, L + 3 = O </span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2311;&#2360;&#2354;&#2367;&#2319;, </span><span style=\"font-family: Palanquin;\">&#2361;&#2350; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2342;&#2375;&#2326; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367;, </span><span style=\"font-family: Roboto;\">VXZ</span><span style=\"font-family: Palanquin;\"> &#2313;&#2360;&#2368; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404;</span></p>\n",

                    question_en: "<p><span style=\"font-family: Roboto;\">32. </span><span style=\"font-family: Roboto;\">Three different positions of the same dice are shown. Find the number on the face opposite the face showing \'3\'..</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688185073/word/media/image108.png\" width=\"180\" height=\"71\"></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">32.</span><span style=\"font-family: Palanquin;\"> &#2319;&#2325; &#2361;&#2368; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2340;&#2368;&#2344; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; \'3\' &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;?</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688185073/word/media/image77.png\" width=\"188\" height=\"80\"></p>\n",
                    options_en: ["<p>5</p>\n", "<p>2</p>\n", 
                                "<p>1</p>\n", "<p>4</p>\n"],
                    options_hi: ["<p>5</p>\n", "<p>2</p>\n",
                                "<p>1</p>\n", "<p>4</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">32.(c)</span><span style=\"font-family: Roboto;\">In the dice given in the question, we can see that the numbers 1 to 6 are shown.</span></p>\r\n<p><span style=\"font-family: Roboto;\">Figure: (i) and (iii), </span></p>\r\n<p><span style=\"font-family: Roboto;\">If two dice have two digits in common, </span></p>\r\n<p><span style=\"font-family: Roboto;\">then the remaining digits are opposite to each other.</span></p>\r\n<p><span style=\"font-family: Roboto;\">Therefore</span><span style=\"font-family: Roboto;\">, </span><span style=\"font-family: Roboto;\"> the number that will be on the face opposite to the one showing &lsquo;3&rsquo; is &lsquo;1&rsquo;.</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">32.(c) </span><span style=\"font-family: Palanquin;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2366;&#2360;&#2375; &#2350;&#2375;&#2306; &#2361;&#2350; &#2342;&#2375;&#2326; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367; 1 &#2360;&#2375; 6 &#2340;&#2325; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404;</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2330;&#2367;&#2340;&#2381;&#2352;: (i) &#2324;&#2352; (iii),</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2351;&#2342;&#2367; &#2342;&#2379; &#2346;&#2366;&#2360;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2379; &#2309;&#2306;&#2325; &#2313;&#2349;&#2351;&#2344;&#2367;&#2359;&#2381;&#2336; &#2361;&#2376;&#2306;,</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2340;&#2379; &#2358;&#2375;&#2359; &#2309;&#2306;&#2325; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2361;&#2376;&#2306;&#2404;</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2309;&#2340;: \'3\' &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2332;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2368; &#2357;&#2361; \'1\' &#2361;&#2376;&#2404;</span></p>\n",
                    correct: "c",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "33",
                    section: "6",
                    question_en: "<p><span style=\"font-family: Roboto;\">33.</span><span style=\"font-family: Roboto;\"> Select the word-pair that best represents a similar relationship to the one expressed in the pair of words given below.</span></p>\r\n<p><span style=\"font-family: Roboto;\"><span style=\"font-weight: 400;\">(The words must be considered as meaningful English words and must NOT be related to each other based on the number of letters/number of consonants/vowels in the word)</span></span></p>\r\n<p><span style=\"font-family: Roboto;\">Riyal : Saudi Arabia</span></p>\n",

                    solution_en: "<p><span style=\"font-family: Roboto;\">33.(c) </span><span style=\"font-family: Roboto;\">Riyal is the currency of Saudi Arabia , similarly Lira is the currency of Turkey.</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">33.(c)</span><span style=\"font-family: Palanquin;\"> &#2352;&#2367;&#2351;&#2366;&#2354;, &#2360;&#2314;&#2342;&#2368; &#2309;&#2352;&#2348; &#2325;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2361;&#2376;, &#2311;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2354;&#2368;&#2352;&#2366;, &#2340;&#2369;&#2352;&#2381;&#2325;&#2368; &#2325;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2361;&#2376;&#2404;</span></p>\n",

                questions.push({
                    id: "34",
                    section: "6",
                    question_en: "<p><span style=\"font-family: Roboto;\">34.</span><span style=\"font-family: Roboto;\"> Select the set in which the numbers are related in the same way as are the numbers of the given sets.</span></p>\r\n<p><span style=\"font-family: Roboto;\">(NOTE : Operations should be performed on the whole numbers, without breaking </span><span style=\"font-family: Roboto;\">down the numbers into its constituent digits. E.g. 13 &ndash; Operations on 13 such as adding /subtracting /multiplying etc. to 13 can be performed. Breaking down 13 into 1 and 3 and then performing mathematical operations on 1 and 3 is NOT allowed)</span></p>\r\n<p><span style=\"font-weight: 400;\">(67, 63, 64)</span></p>\r\n<p><span style=\"font-weight: 400;\">(24, 17, 343)</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">34.</span><span style=\"font-family: Palanquin;\"> &#2313;&#2360; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306; &#2332;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; (&#2344;&#2379;&#2335;: &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2328;&#2335;&#2325; &#2309;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2319; &#2348;&#2367;&#2344;&#2366;, &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2346;&#2352; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2375; &#2340;&#2380;&#2352; &#2346;&#2352; 13 - &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2332;&#2376;&#2360;&#2375; &#2325;&#2367; &#2332;&#2379;&#2337;&#2364;&#2344;&#2366; / &#2328;&#2335;&#2366;&#2344;&#2366; / &#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2344;&#2366; &#2310;&#2342;&#2367; &#2346;&#2370;&#2352;&#2381;&#2339; 13 &#2346;&#2352; &#2325;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; 13 &#2325;&#2379; 1 &#2324;&#2352; 3 &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2325;&#2375; &#2324;&#2352; &#2347;&#2367;&#2352; 1 &#2324;&#2352; 3 &#2346;&#2352; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;)</span></p>\r\n<p><span style=\"font-weight: 400;\">(67, 63, 64)</span></p>\r\n<p><span style=\"font-weight: 400;\">(24, 17, 343)</span></p>\n",
                    options_en: ["<p><span style=\"font-weight: 400;\">(75, 69, 216)</span><span style=\"font-weight: 400;\"> </span></p>\n", "<p><span style=\"font-weight: 400;\">&nbsp;(27, 22, 120)</span></p>\n", 
                                "<p><span style=\"font-weight: 400;\">(46, 41, 40)</span><span style=\"font-weight: 400;\"> </span></p>\n", "<p><span style=\"font-weight: 400;\">(97, 88, 81)</span></p>\n"],
                    options_hi: ["<p><span style=\"font-weight: 400;\">(75, 69, 216)</span><span style=\"font-weight: 400;\"> </span></p>\n", "<p><span style=\"font-weight: 400;\">&nbsp;(27, 22, 120)</span></p>\n",
                                "<p><span style=\"font-weight: 400;\">&nbsp;(46, 41, 40)</span><span style=\"font-weight: 400;\"> </span></p>\n", "<p><span style=\"font-weight: 400;\">(97, 88, 81)</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">34.(a) </span><span style=\"font-family: Roboto;\">Logic: 1st term - 2nd term = n &rArr;(n)&sup3;</span><span style=\"font-family: Roboto;\">&nbsp; =3rd term</span></p>\r\n<p><span style=\"font-weight: 400;\">In: (67, 63, 64) &rArr;&nbsp;</span><span style=\"font-weight: 400;\"> 67 - 63 = 4&rArr; (</span><span style=\"font-weight: 400;\">4)<span style=\"font-family: Roboto;\">&sup3;</span><span style=\"font-family: Roboto;\">&nbsp;</span></span><span style=\"font-weight: 400;\">&nbsp;= 64</span></p>\r\n<p><span style=\"font-weight: 400;\">In: (24, 17, 343) &rArr;</span><span style=\"font-weight: 400;\"> 24 - 17 = 7&nbsp; </span><span style=\"font-weight: 400;\">&rArr; </span><span style=\"font-weight: 400;\">(7)<span style=\"font-family: Roboto;\">&sup3;</span><span style=\"font-family: Roboto;\">&nbsp;</span></span><span style=\"font-weight: 400;\">&nbsp;= 343</span></p>\r\n<p><strong>Similarly</strong></p>\r\n<p><strong>In: (75, 69, 216) <span style=\"font-weight: 400;\">&rArr;&nbsp;</span></strong><span style=\"font-weight: 400;\"> 75 - 69 = 6,&nbsp; </span><span style=\"font-weight: 400;\">&rArr;(6)<span style=\"font-family: Roboto;\">&sup3;</span><span style=\"font-family: Roboto;\">&nbsp;</span></span><span style=\"font-weight: 400;\">&nbsp;= 216</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">34.(a) </span><span style=\"font-family: Palanquin;\">&#2340;&#2352;&#2381;&#2325;: &#2346;&#2361;&#2354;&#2366; &#2346;&#2342; - &#2342;&#2370;&#2360;&#2352;&#2366; &#2346;&#2342; = n </span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\"> &rArr; (</span><span style=\"font-weight: 400;\">n)<span style=\"font-family: Roboto;\">&sup3;</span><span style=\"font-family: Roboto;\">&nbsp;</span></span><span style=\"font-weight: 400;\">&nbsp;= &#2340;&#2368;&#2360;&#2352;&#2366; &#2346;&#2342;</span></p>\r\n<p><span style=\"font-weight: 400;\">(67, 63, 64) &#2350;&#2375;&#2306; &rArr;&nbsp;</span><span style=\"font-weight: 400;\"> 67 - 63 = 4&rArr; (</span><span style=\"font-weight: 400;\">4)<span style=\"font-family: Roboto;\">&sup3;</span><span style=\"font-family: Roboto;\">&nbsp;</span></span><span style=\"font-weight: 400;\">&nbsp;= 64</span></p>\r\n<p><span style=\"font-weight: 400;\">(24, 17, 343)&#2350;&#2375;&#2306; &rArr;</span><span style=\"font-weight: 400;\"> 24 - 17 = 7&nbsp;</span><span style=\"font-weight: 400;\">&rArr; </span><span style=\"font-weight: 400;\">(7)<span style=\"font-family: Roboto;\">&sup3;</span><span style=\"font-family: Roboto;\">&nbsp;</span></span><span style=\"font-weight: 400;\">&nbsp;= 343</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</span></p>\r\n<p><strong>(75, 69, 216) <span style=\"font-weight: 400;\">&#2350;&#2375;&#2306; </span><span style=\"font-weight: 400;\">&rArr;&nbsp;</span></strong><span style=\"font-weight: 400;\"> 75 - 69 = 6,&nbsp;</span><span style=\"font-weight: 400;\">&rArr;(6)<span style=\"font-family: Roboto;\">&sup3;</span><span style=\"font-family: Roboto;\">&nbsp;</span></span><span style=\"font-weight: 400;\">&nbsp;= 216</span></p>\n",
                    correct: "a",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "35",
                    section: "6",
                    question_en: "<p><span style=\"font-family: Roboto;\">35. </span><span style=\"font-family: Roboto;\">Select the option that is related to the third term in the same way as the second term is related to the first term and sixth term is related to fifth term.</span></p>\r\n<p><span style=\"font-family: Roboto;\">3 : 8 :: 6 : ? :: 11 : 1000</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">35.</span><span style=\"font-family: Palanquin;\"> &#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2340;&#2368;&#2360;&#2352;&#2375; &#2346;&#2342; &#2360;&#2375; &#2336;&#2368;&#2325; &#2357;&#2361;&#2368; &#2360;&#2306;&#2348;&#2306;&#2343; &#2361;&#2376;, &#2332;&#2379; &#2360;&#2306;&#2348;&#2306;&#2343; &#2342;&#2370;&#2360;&#2352;&#2375; &#2346;&#2342; &#2325;&#2366; &#2346;&#2361;&#2354;&#2375; &#2346;&#2342; &#2360;&#2375; &#2361;&#2376; &#2324;&#2352; &#2357;&#2361;&#2368; &#2360;&#2306;&#2348;&#2306;&#2343; &#2331;&#2336;&#2375; &#2346;&#2342; &#2325;&#2366; &#2346;&#2366;&#2305;&#2330;&#2357;&#2375;&#2306; &#2346;&#2342; &#2360;&#2375; &#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Roboto;\">3 : 8 :: 6 : ? :: 11 : 1000</span></p>\n",
                    options_en: ["<p>216</p>\n", "<p>512</p>\n", 
                                "<p>125</p>\n", "<p>729</p>\n"],
                    options_hi: ["<p>216</p>\n", "<p>512</p>\n",
                                "<p>125</p>\n", "<p>729</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">35.(c)&nbsp; </span><strong>Logic: </strong><span style=\"font-weight: 400;\">a : (a - 1</span><span style=\"font-weight: 400;\">)&sup3;</span></p>\r\n<p><span style=\"font-weight: 400;\">In 3 : 8 ; 3 : (3 - 1</span><span style=\"font-weight: 400;\">)&sup3;</span><span style=\"font-weight: 400;\">= 8</span></p>\r\n<p><span style=\"font-weight: 400;\">In 6 : </span><strong>125 ; </strong><span style=\"font-weight: 400;\">6 : (6 - 1</span><span style=\"font-weight: 400;\">)&sup3;</span><span style=\"font-weight: 400;\">&nbsp;= 125</span></p>\r\n<p><span style=\"font-weight: 400;\">In 11 : 1000 ; 11 : (11 - 1</span><span style=\"font-weight: 400;\">)&sup3;</span><span style=\"font-weight: 400;\">&nbsp;= 1000</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Palanquin;\">35.(c)</span></p>\r\n<p><math style=\"font-family:Verdana\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&nbsp;</mo><mi>&#2340;&#2352;&#2381;&#2325;</mi><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><mi>a</mi><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><mi>a</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>1</mn><mo>)</mo></mrow><mo>&sup3;</mo></msup><mo>&nbsp;</mo><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mn>3</mn><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><mn>8</mn><mo>&nbsp;</mo><mi>&#2350;&#2375;&#2306;</mi><mo>&nbsp;</mo><mo>;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mn>3</mn><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><mn>3</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>1</mn><mo>)</mo></mrow><mo>&sup3;</mo></msup><mo>=</mo><mo>&nbsp;</mo><mn>8</mn><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mn>6</mn><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><mn>125</mn><mo>&nbsp;</mo><mi>&#2350;&#2375;&#2306;</mi><mo>&nbsp;</mo><mo>;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mn>6</mn><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><mn>6</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>1</mn><mo>)</mo></mrow><mrow><mo>&sup3;</mo><mo>&nbsp;</mo></mrow></msup><mo>=</mo><mo>&nbsp;</mo><mn>125</mn><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mn>11</mn><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><mn>1000</mn><mo>&nbsp;</mo><mi>&#2350;&#2375;&#2306;</mi><mo>&nbsp;</mo><mo>;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mn>11</mn><mo>&nbsp;</mo><mo>:</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><mn>11</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>1</mn><mo>)</mo></mrow><mn>3</mn></msup><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>1000</mn></math></p>\n",
                    correct: "c",

                });

                    id: "36",

                    question_en: "<p><span style=\"font-family: Roboto;\">39.</span><span style=\"font-family: Roboto;\"> If A denotes +, B denotes &times;</span><span style=\"font-family: Roboto;\">, C denotes &ndash;, and D denotes &divide;, then what will come in place of \"?\" in the following equation?</span></p>\r\n<p><span style=\"font-family: Nova Mono;\">48 D 12 A (&radic;36 B3) C19A 24 = ?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">39. </span><span style=\"font-family: Palanquin;\">&#2351;&#2342;&#2367; A &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; + , B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &times; </span><span style=\"font-family: Palanquin;\">, C &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; -, &#2324;&#2352; D &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &divide; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306; \"?\" &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2310;&#2319;&#2327;&#2366;? </span></p>\r\n<p><span style=\"font-family: Nova Mono;\">48 D 12 A (&radic;36 B3) C19A 24 =?</span></p>\n",

                                "<p>35</p>\n", "<p>22</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">39.(b) </span></p>\r\n<p><span style=\"font-family: Nova Mono;\">48 D 12 A (&radic;36 B3) C19A 24 =?</span></p>\r\n<p><span style=\"font-family: Roboto;\">After arranging the signs, as per given instructions we get,</span></p>\r\n<p><span style=\"font-family: Roboto;\">48 &divide;</span><span style=\"font-family: Nova Mono;\">12 + (&radic;36 &times; 3) &ndash; 19 + 24</span></p>\r\n<p><span style=\"font-family: Roboto;\">= 4 + (6 <span style=\"font-family: Nova Mono;\">&times;</span> 3) &ndash; 19 + 24</span></p>\r\n<p><span style=\"font-family: Roboto;\">= 4 + 18 - 19 + 24</span></p>\r\n<p><span style=\"font-family: Roboto;\">= 46 - 19 = </span><span style=\"font-family: Roboto;\">27</span></p>\n",

                    question_hi: "<p><span style=\"font-family: Roboto;\">50. </span><span style=\"font-family: Palanquin Dark;\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2324;&#2352; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2346;&#2338;&#2364;&#2375;&#2306;&#2404; &#2340;&#2351; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2342;&#2367;&#2319; &#2327;&#2319; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;?</span><span style=\"font-family: Roboto;\"> </span></p>\r\n<p><strong><span style=\"font-family: Palanquin;\">&#2325;&#2341;&#2344;: </span></strong></p>\r\n<p><span style=\"font-family: Roboto;\">$ &lt; # = &amp; &le;&nbsp;</span><span style=\"font-family: Roboto;\"> @ &gt; * = !</span></p>\r\n<p><strong><span style=\"font-family: Palanquin;\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</span></strong><span style=\"font-family: Roboto;\"> </span></p>\r\n<p><span style=\"font-family: Roboto;\">I. * &gt; &amp;</span></p>\r\n<p><span style=\"font-family: Roboto;\">II. # &lt; !</span></p>\n",

                    options_hi: ["<p>&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</p>\n", "<p>&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</p>\n",
                                "<p>&#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;</p>\n", "<p>&#2344; &#2340;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; &#2344; &#2361;&#2368; II &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">50.(d) Given statement :</span><span style=\"font-family: Roboto;\"> </span></p>\r\n<p><span style=\"font-family: Roboto;\">$ &lt; # = &amp; &le; </span><span style=\"font-family: Arial Unicode MS;\">@ &gt; &#10033; = !</span></p>\r\n<p><span style=\"font-family: Roboto;\">I. * &gt; &amp; = false (as &amp; &le;&nbsp;</span><span style=\"font-family: Arial Unicode MS;\"> @ &gt; &#10033;)</span></p>\r\n<p><span style=\"font-family: Roboto;\">Here, we can&rsquo;t define @.</span></p>\r\n<p><span style=\"font-family: Roboto;\">II. # &lt; ! = false (as # = &amp; &le;&nbsp;</span><span style=\"font-family: Arial Unicode MS;\"> @ &gt; &#10033; = !)</span></p>\r\n<p><span style=\"font-family: Roboto;\">Here, we can&rsquo;t define @.</span></p>\r\n<p><span style=\"font-family: Roboto;\">Hence, Neither conclusion I nor II is true.</span></p>\n",

                questions.push({
                    id: "51",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Roboto;\">51.</span><span style=\"font-family: Roboto;\"> What is the value of 13 + 23 + ...... 93 ?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">51.</span><span style=\"font-family: Palanquin;\"> 13 + 23+........93 &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span></p>\n",
                    options_en: ["<p>477</p>\n", "<p>565</p>\n", 
                                "<p>675</p>\n", "<p>776</p>\n"],
                    options_hi: ["<p>477</p>\n", "<p>565</p>\n",
                                "<p>675</p>\n", "<p>776</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">51.(a)</span></p>\r\n<p><span style=\"font-family: Roboto;\">13 + 23 + ...... 93, This series is in A.P.</span></p>\r\n<p><span style=\"font-family: Roboto;\">So, <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>a</mi><mi>n</mi></msub><mo>=</mo><mo>&nbsp;</mo><mi>a</mi><mo>&nbsp;</mo><mo>+</mo><mo>(</mo><mi>n</mi><mo>-</mo><mn>1</mn><mo>)</mo><mi>d</mi><mo>&nbsp;</mo></math></span><span style=\"font-family: Roboto;\"> where&nbsp; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>a</mi><mi>n</mi></msub></math></span><span style=\"font-family: Roboto;\">is nth term, a is first term, n is no. of terms, d is the difference between two consecutive terms.</span></p>\r\n<p><span style=\"font-family: Roboto;\"> </span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr; 93 = 13 + (n - 1)10 &rArr;</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">n=9</span></p>\r\n<p><span style=\"font-weight: 400;\">Sum = </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi>n</mi><mn>2</mn></mfrac></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">(2a + (n - 1)d) </span></p>\r\n<p><span style=\"font-weight: 400;\">=&nbsp; </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>9</mn><mn>2</mn></mfrac></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">[2 &times; 13 + (9 - 1)10)</span><span style=\"font-weight: 400;\">]</span></p>\r\n<p><span style=\"font-weight: 400;\">Sum = 477.</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">51.(a)</span></p>\r\n<p><span style=\"font-family: Palanquin;\">13 + 23 + ...... 93, &#2351;&#2361; &#2358;&#2381;&#2352;&#2306;&#2326;&#2354;&#2366; A.P. &#2350;&#2375;&#2306; &#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Roboto;\"><span style=\"font-weight: 400;\">&#2340;&#2379;</span> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>a</mi><mi>n</mi></msub><mo>=</mo><mo>&nbsp;</mo><mi>a</mi><mo>&nbsp;</mo><mo>+</mo><mo>(</mo><mi>n</mi><mo>-</mo><mn>1</mn><mo>)</mo><mi>d</mi><mo>&nbsp;</mo></math></span><span style=\"font-family: Roboto;\"> <span style=\"font-weight: 400;\">&#2332;&#2361;&#2366;&#2306;&nbsp;</span> &nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>a</mi><mi>n</mi></msub></math></span><span style=\"font-weight: 400;\">= n&#2357;&#2366;&#2306; &#2346;&#2342; &#2361;&#2376;, a =&#2346;&#2361;&#2354;&#2366; &#2346;&#2342; &#2361;&#2376;, n =&#2346;&#2342;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;, d </span><span style=\"font-weight: 400;\">= &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; &#2342;&#2379; &#2346;&#2342;&#2379;&#2306; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Roboto;\"> </span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr; 93 = 13 + (n - 1)10 &rArr;</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">n=9</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2351;&#2379;&#2327;&nbsp; = </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi>n</mi><mn>2</mn></mfrac></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">(2a + (n - 1)d) </span></p>\r\n<p><span style=\"font-weight: 400;\">=&nbsp; </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>9</mn><mn>2</mn></mfrac></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">[2 &times; 13 + (9 - 1)10)</span><span style=\"font-weight: 400;\">]</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2351;&#2379;&#2327; = 477.</span></p>\n",
                    correct: "a",
                    pos_marks: 1.0,
                    neg_marks: 0.5

                    solution_en: "<p><span style=\"font-family: Palanquin Dark;\">52.(a) </span><span style=\"font-family: Palanquin Dark;\">It is given that P(A) = 2P(B) = 4P(A <span style=\"font-family: Palanquin;\">&cap;&nbsp;</span></span><span style=\"font-family: Palanquin Dark;\"> B) = 0.12. Hence, </span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">P(A) = 0.12, 2P(B) = 0.12 &rArr;&nbsp;</span><span style=\"font-family: Palanquin Dark;\"> P(B) = 0.06</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">4P(A <span style=\"font-family: Palanquin;\">&cap;</span>&nbsp;</span><span style=\"font-family: Palanquin Dark;\"> B) = 0.12 &rArr;&nbsp;</span><span style=\"font-family: Palanquin Dark;\"> P(A <span style=\"font-family: Palanquin;\">&cap; </span></span><span style=\"font-family: Palanquin Dark;\">B) = 0.03</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">So, P(A&rsquo; <span style=\"font-family: Palanquin;\">&cap;</span>&nbsp;</span><span style=\"font-family: Palanquin Dark;\"> B&rsquo;) = P(A &cup;</span><span style=\"font-family: Palanquin Dark;\"> B)&rsquo; = 1 - P(A &cup;&nbsp;</span><span style=\"font-family: Palanquin Dark;\"> B) = 1 - [P(A) + P(B) - P(A <span style=\"font-family: Palanquin;\">&cap; </span></span><span style=\"font-family: Palanquin Dark;\">B)] </span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\"> P(A&rsquo; &nbsp;<span style=\"font-family: Palanquin;\">&cap; </span></span><span style=\"font-family: Palanquin Dark;\">B&rsquo;) = 1 - [0.12 + 0.06 - 0.03] = 1 - 0.21 = 0.79</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Palanquin Dark;\">52.(a)</span><span style=\"font-family: Palanquin Dark;\">&nbsp;</span><span style=\"font-family: Palanquin Dark;\">P(A) = 2P(B) = 4P(A <span style=\"font-family: Palanquin;\">&cap;&nbsp;</span></span><span style=\"font-family: Palanquin Dark;\"> B) = 0.12.&nbsp;</span><span style=\"font-weight: 400;\">&#2342;&#2367;&#2351;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;.&nbsp;</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\"><span style=\"font-weight: 400;\">&#2309;&#2348; </span>P(A) = 0.12, 2P(B) = 0.12 &rArr;&nbsp;</span><span style=\"font-family: Palanquin Dark;\"> P(B) = 0.06</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">4P(A <span style=\"font-family: Palanquin;\">&cap;</span>&nbsp;</span><span style=\"font-family: Palanquin Dark;\"> B) = 0.12 &rArr;&nbsp;</span><span style=\"font-family: Palanquin Dark;\"> P(A <span style=\"font-family: Palanquin;\">&cap; </span></span><span style=\"font-family: Palanquin Dark;\">B) = 0.03</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\"><span style=\"font-weight: 400;\">&#2309;&#2340;&#2307;</span>, P(A&rsquo; <span style=\"font-family: Palanquin;\">&cap;</span>&nbsp;</span><span style=\"font-family: Palanquin Dark;\"> B&rsquo;) = P(A &cup;</span><span style=\"font-family: Palanquin Dark;\"> B)&rsquo; = 1 - P(A &cup;&nbsp;</span><span style=\"font-family: Palanquin Dark;\"> B) = 1 - [P(A) + P(B) - P(A <span style=\"font-family: Palanquin;\">&cap; </span></span><span style=\"font-family: Palanquin Dark;\">B)] </span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\"> P(A&rsquo; &nbsp;<span style=\"font-family: Palanquin;\">&cap; </span></span><span style=\"font-family: Palanquin Dark;\">B&rsquo;) = 1 - [0.12 + 0.06 - 0.03] = 1 - 0.21 = 0.79</span></p>\n",
                    correct: "a",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "53",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Roboto;\">53.</span><span style=\"font-family: Roboto;\"> A class of 68 students made a mean score of 60 marks and another class of 32 </span><span style=\"font-family: Roboto;\">students made it exactly 52.5. What is the overall mean score?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">53.</span><span style=\"font-family: Palanquin;\"> 68 &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351; &#2309;&#2306;&#2325; 60 &#2361;&#2376;&#2306; &#2324;&#2352; 32 &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351; &#2309;&#2306;&#2325; 52.5 &#2361;&#2376;&#2404; &#2325;&#2369;&#2354; &#2350;&#2366;&#2343;&#2381;&#2351; &#2309;&#2306;&#2325; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2306;&#2327;&#2375;?</span></p>\n",
                    options_en: ["<p>53.5</p>\n", "<p>56.2</p>\n", 
                                "<p>54.3</p>\n", "<p>57.6</p>\n"],
                    options_hi: ["<p>53.5</p>\n", "<p>56.2</p>\n",
                                "<p>54.3</p>\n", "<p>57.6</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">53.(d) </span><span style=\"font-family: Roboto;\">average score of 68 students = 60 marks</span></p>\r\n<p><span style=\"font-family: Roboto;\">So total score of whole class = 68 &times; 60 = 4080 marks</span></p>\r\n<p><span style=\"font-family: Roboto;\">Average score of another class of 32 students = 52.5 marks</span></p>\r\n<p><span style=\"font-family: Roboto;\">So total score of another whole class = 52.5 &times; 32 = 1680 marks</span></p>\r\n<p><span style=\"font-family: Roboto;\">Overall mean score = </span><span style=\"font-family: Roboto;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>4080</mn><mo>+</mo><mn>1680</mn></mrow><mrow><mn>68</mn><mo>&nbsp;</mo><mo>+</mo><mn>32</mn></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>5760</mn><mn>100</mn></mfrac></math> </span><span style=\"font-family: Roboto;\"> = 57.6</span></p>\r\n<p><span style=\"font-family: Roboto;\">Short Tricks:- </span></p>\r\n<p><span style=\"font-family: Roboto;\">Through weighted average :- </span></p>\r\n<p><span style=\"font-family: Roboto;\">&nbsp;</span><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688185073/word/media/image110.png\" width=\"269\" height=\"119\"></p>\r\n<p><span style=\"font-family: Roboto;\">Overall mean = 52.5 + 5.1 = 57.6 </span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">53.(d) </span><span style=\"font-family: Palanquin;\">68 &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; = 60 &#2309;&#2306;&#2325; </span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2340;&#2379; &#2346;&#2370;&#2352;&#2368; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2325;&#2369;&#2354; &#2309;&#2306;&#2325; = 68 &times; 60 = 4080 &#2309;&#2306;&#2325; </span></p>\r\n<p><span style=\"font-family: Palanquin;\">32 &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2324;&#2352; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; = 52.5 &#2309;&#2306;&#2325; </span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2346;&#2370;&#2352;&#2368; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2366; &#2325;&#2369;&#2354; &#2309;&#2306;&#2325; = 52.5 &times; 32 = 1680 &#2309;&#2306;&#2325; </span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2325;&#2369;&#2354; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; = </span><span style=\"font-family: Roboto;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>4080</mn><mo>+</mo><mn>1680</mn></mrow><mrow><mn>68</mn><mo>&nbsp;</mo><mo>+</mo><mn>32</mn></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>5760</mn><mn>100</mn></mfrac></math> </span><span style=\"font-family: Roboto;\"> = 57.6</span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2358;&#2366;&#2352;&#2381;&#2335; &#2335;&#2381;&#2352;&#2367;&#2325; :- </span></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2357;&#2375;&#2335;&#2375;&#2337; &#2319;&#2357;&#2352;&#2375;&#2332; &#2351;&#2366; &#2324;&#2360;&#2340; &#2360;&#2375; :- </span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688185073/word/media/image110.png\" width=\"269\" height=\"119\"></p>\r\n<p><span style=\"font-family: Palanquin;\">&#2325;&#2369;&#2354; &#2350;&#2366;&#2343;&#2381;&#2351; &#2309;&#2306;&#2325; = 52.5&nbsp; +&nbsp; 5.1 = 57.6 </span></p>\n",
                    correct: "d",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "54",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Palanquin;\">54. </span><span style=\"font-family: Palanquin;\">The GDP for a year is as follows.</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/images/mceu_95034892711688198990995.png\" width=\"135\" height=\"226\"></p>\r\n<p><span style=\"font-family: Palanquin;\">Jan-March, Apr-June, July-Sept, Oct-Dec are 4 parts of the year. </span></p>\r\n<p><span style=\"font-family: Palanquin;\">Which part of the year was the average GDP minimum in ?</span></p>\n",

                    solution_en: "<p>54.(c)</p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Average GDP of Jan-March =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>4</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>3</mn><mo>.</mo><mn>6</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>5</mn></mrow><mn>3</mn></mfrac></math> <span style=\"font-weight: 400;\">= 4.2</span></span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Average GDP of Apr-June = </span><span style=\"font-family: Palanquin Dark;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>4</mn><mo>+</mo><mn>4</mn><mo>.</mo><mn>2</mn><mo>+</mo><mn>6</mn></mrow><mn>3</mn></mfrac></math>= <span style=\"font-weight: 400;\">4.7</span><span style=\"font-weight: 400;\">3</span></span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Average GDP of July-Sept = </span><span style=\"font-family: Palanquin Dark;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>5</mn><mo>+</mo><mn>3</mn><mo>+</mo><mn>3</mn><mo>.</mo><mn>6</mn></mrow><mn>3</mn></mfrac></math> = </span><span style=\"font-weight: 400;\">3.86</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Average GDP of Oct-Dec =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>3</mn><mo>.</mo><mn>8</mn><mo>+</mo><mn>5</mn><mo>+</mo><mn>5</mn></mrow><mn>3</mn></mfrac></math><span style=\"font-weight: 400;\">= 4.6</span></span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Hence, Average GDP of July-Sept is the minimum.</span></p>\n",
                    solution_hi: "<p>54.(c)</p>\r\n<p><span style=\"font-family: Palanquin Dark;\"><span style=\"font-weight: 400;\">&#2332;&#2344;&#2357;&#2352;&#2368;-&#2350;&#2366;&#2352;&#2381;&#2330; &#2325;&#2368; &#2324;&#2360;&#2340; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368;&nbsp;</span> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>4</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>3</mn><mo>.</mo><mn>6</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>5</mn></mrow><mn>3</mn></mfrac></math> <span style=\"font-weight: 400;\">= 4.2</span></span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\"><span style=\"font-weight: 400;\">&#2309;&#2346;&#2381;&#2352;&#2376;&#2354;-&#2332;&#2370;&#2344; &#2325;&#2368; &#2324;&#2360;&#2340; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; </span>= </span><span style=\"font-family: Palanquin Dark;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>4</mn><mo>+</mo><mn>4</mn><mo>.</mo><mn>2</mn><mo>+</mo><mn>6</mn></mrow><mn>3</mn></mfrac></math>= <span style=\"font-weight: 400;\">4.7</span><span style=\"font-weight: 400;\">3</span></span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\"><span style=\"font-weight: 400;\">&#2332;&#2369;&#2354;&#2366;&#2312;-&#2360;&#2367;&#2340;&#2306;&#2348;&#2352; &#2325;&#2368; &#2324;&#2360;&#2340; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368;&nbsp; </span>&nbsp;= </span><span style=\"font-family: Palanquin Dark;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>5</mn><mo>+</mo><mn>3</mn><mo>+</mo><mn>3</mn><mo>.</mo><mn>6</mn></mrow><mn>3</mn></mfrac></math> = </span><span style=\"font-weight: 400;\">3.86</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\"><span style=\"font-weight: 400;\">&#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;-&#2342;&#2367;&#2360;&#2306;&#2348;&#2352; &#2325;&#2368; &#2324;&#2360;&#2340; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368;&nbsp;</span> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>3</mn><mo>.</mo><mn>8</mn><mo>+</mo><mn>5</mn><mo>+</mo><mn>5</mn></mrow><mn>3</mn></mfrac></math><span style=\"font-weight: 400;\">= 4.6</span></span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2311;&#2360;&#2354;&#2367;&#2319; &#2332;&#2369;&#2354;&#2366;&#2312;-&#2360;&#2367;&#2340;&#2306;&#2348;&#2352; &#2325;&#2368; &#2324;&#2360;&#2340; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2360;&#2348;&#2360;&#2375; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2361;&#2376;&#2404;</span></p>\n",

                questions.push({

                    question_hi: "<p>55. <span style=\"font-family: Palanquin Dark;\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2327;&#2381;&#2352;&#2366;&#2347; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319; &#2404;</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/images/mceu_60652381321690802254101.png\" width=\"325\" height=\"205\"></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">2016 &#2350;&#2375;&#2306; &#2325;&#2306;&#2346;&#2344;&#2368; A &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2324;&#2352; 2018 &#2350;&#2375;&#2306; &#2325;&#2306;&#2346;&#2344;&#2368; B &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2340;&#2344;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</span></p>\n",

                    solution_hi: "<p>55.(a)</p>\r\n<p><span style=\"font-family: Palanquin Dark;\">2016 &#2350;&#2375;&#2306; &#2325;&#2306;&#2346;&#2344;&#2368; A &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; = 40 &#2354;&#2366;&#2326; &#2335;&#2344;</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">2018 &#2350;&#2375;&#2306; &#2325;&#2306;&#2346;&#2344;&#2368; B &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; = 55 &#2354;&#2366;&#2326; &#2335;&#2344;</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2309;&#2306;&#2340;&#2352; = 55 - 40 = 15,00,000 &#2335;&#2344;</span></p>\n",
