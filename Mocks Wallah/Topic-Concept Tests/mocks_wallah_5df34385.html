                questions.push({
                    id: "89",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">89.</span><span style=\"font-family: Roboto;\"> Which of the following festivals is observed by the tribal people of Jharkhand?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">89. </span><span style=\"font-family: Palanquin;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2333;&#2366;&#2352;&#2326;&#2306;&#2337; &#2325;&#2375; &#2310;&#2342;&#2367;&#2357;&#2366;&#2360;&#2368; &#2354;&#2379;&#2327;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span></p>\n",
                    options_en: ["<p>Nongkrem</p>\n", "<p>Losar</p>\n", 
                                "<p>Suata</p>\n", "<p>Bhagta Parab</p>\n"],
                    options_hi: ["<p>&#2344;&#2379;&#2306;&#2327;&#2325;&#2381;&#2352;&#2375;&#2350;</p>\n", "<p>&#2354;&#2379;&#2360;&#2352;</p>\n",
                                "<p>&#2360;&#2369;&#2310;&#2335;&#2366;</p>\n", "<p>&#2349;&#2327;&#2340;&#2366; &#2346;&#2352;&#2348;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">89.(d) </span><span style=\"font-family: Roboto;\"><strong>Bhagta Parab</strong><span style=\"font-weight: 400;\"> is best known as the worship of Budha Baba. </span><strong>Suata</strong><span style=\"font-weight: 400;\"> festival is famous in Bundelkhand region. Marking the beginning of the Tibetan new year, </span><strong>Losar</strong><span style=\"font-weight: 400;\"> is an important festival of Ladakh, it is also celebrated in Arunachal Pradesh. </span><strong>Nongkrem</strong><span style=\"font-weight: 400;\"> is celebrated by the people of the Khasi tribe (Meghalaya) in the month of November to honor the goddess Ka Blei Synshar worshipped by the tribe.</span></span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Palanquin;\">89.(d) &nbsp;<strong>&#2349;&#2327;&#2340;&#2366; </strong></span><strong>&#2346;&#2352;&#2348;</strong><span style=\"font-weight: 400;\"> &#2325;&#2379; &#2348;&#2369;&#2342;&#2381;&#2343; &#2348;&#2366;&#2348;&#2366; &#2325;&#2368; &#2346;&#2370;&#2332;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2348;&#2369;&#2306;&#2342;&#2375;&#2354;&#2326;&#2306;&#2337; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; </span><strong>&#2360;&#2369;&#2310;&#2340;&#2366;</strong><span style=\"font-weight: 400;\"> &#2346;&#2352;&#2381;&#2357; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2376;&#2404; &#2340;&#2367;&#2348;&#2381;&#2348;&#2340;&#2368; &#2344;&#2357; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2379; &#2330;&#2367;&#2344;&#2381;&#2361;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2354;&#2379;&#2360;&#2352; &#2354;&#2342;&#2381;&#2342;&#2366;&#2326; &#2325;&#2366; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2361;&#2376;, &#2351;&#2361; &#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2349;&#2368; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; </span><strong>&#2344;&#2379;&#2306;&#2327;&#2325;&#2381;&#2352;&#2375;&#2350; </strong><span style=\"font-weight: 400;\">&#2326;&#2366;&#2360;&#2368; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367; (&#2350;&#2375;&#2328;&#2366;&#2354;&#2351;) &#2325;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2357;&#2306;&#2348;&#2352; &#2325;&#2375; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2370;&#2332;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2342;&#2375;&#2357;&#2368; &#2325;&#2366; &#2348;&#2381;&#2354;&#2368; &#2360;&#2367;&#2306;&#2358;&#2352; &#2325;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span></p>\n",
                    correct: "d",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "90",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">90. </span><span style=\"font-family: Roboto;\">What type of musical instruments is the banjo?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">90. </span><span style=\"font-family: Palanquin;\">&#2348;&#2376;&#2306;&#2332;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2357;&#2366;&#2342;&#2381;&#2351; &#2351;&#2306;&#2340;&#2381;&#2352; &#2361;&#2376;?</span></p>\n",
                    options_en: ["<p>Wind instrument</p>\n", "<p>Percussion instrument</p>\n", 
                                "<p>String instrument</p>\n", "<p>Brass instrument</p>\n"],
                    options_hi: ["<p>&#2361;&#2357;&#2366; &#2313;&#2346;&#2325;&#2352;&#2339;</p>\n", "<p>&#2340;&#2348;&#2354;&#2366; &#2357;&#2366;&#2342;&#2381;&#2351;</p>\n",
                                "<p>&#2360;&#2381;&#2335;&#2381;&#2352;&#2367;&#2306;&#2327; &#2313;&#2346;&#2325;&#2352;&#2339;</p>\n", "<p>&#2346;&#2368;&#2340;&#2354; &#2325;&#2375; &#2351;&#2306;&#2340;&#2381;&#2352;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">90.(c) <strong>The banjo</strong></span><span style=\"font-family: Roboto;\"><strong> </strong>is a stringed instrument with a thin membrane stretched over a frame or cavity to form a resonator. It is of African origin. Some other string instruments in India are Sitar, Violin, Tanpura, Sarod, Santoor, Sarangi, Dilruba, Esraj etc. </span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">90.(c)</span><span style=\"font-family: Roboto;\"> </span><strong><span style=\"font-family: Palanquin;\">&#2348;&#2376;&#2306;&#2332;&#2379; </span></strong><span style=\"font-family: Palanquin;\">&#2319;&#2325; &#2352;&#2375;&#2332;&#2364;&#2379;&#2344;&#2375;&#2335;&#2352; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2347;&#2381;&#2352;&#2375;&#2350; &#2351;&#2366; &#2327;&#2369;&#2361;&#2366; &#2346;&#2352; &#2347;&#2376;&#2354;&#2368; &#2319;&#2325; &#2346;&#2340;&#2354;&#2368; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368; &#2325;&#2375; &#2360;&#2366;&#2341; &#2319;&#2325; &#2340;&#2366;&#2352; &#2357;&#2366;&#2354;&#2366; &#2357;&#2366;&#2342;&#2381;&#2351; &#2351;&#2306;&#2340;&#2381;&#2352; &#2361;&#2376;&#2404; &#2351;&#2361; &#2309;&#2347;&#2381;&#2352;&#2368;&#2325;&#2368; &#2350;&#2370;&#2354; &#2325;&#2366; &#2361;&#2376;&#2404; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2309;&#2344;&#2381;&#2351; &#2340;&#2366;&#2352; &#2357;&#2366;&#2342;&#2381;&#2351;&#2351;&#2306;&#2340;&#2381;&#2352; &#2360;&#2367;&#2340;&#2366;&#2352;, &#2357;&#2366;&#2351;&#2354;&#2367;&#2344;, &#2340;&#2366;&#2344;&#2346;&#2369;&#2352;&#2366;, &#2360;&#2352;&#2379;&#2342;, &#2360;&#2306;&#2340;&#2370;&#2352;, &#2360;&#2366;&#2352;&#2306;&#2327;&#2368;, &#2342;&#2367;&#2354;&#2352;&#2369;&#2348;&#2366;, &#2319;&#2360;&#2352;&#2366;&#2332; &#2310;&#2342;&#2367; &#2361;&#2376;&#2306;&#2404;</span></p>\n",
                    correct: "c",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "91",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">91.</span><span style=\"font-family: Roboto;\"> Annapurna Devi, the legendary musician awarded with Padma Bhushan in 1977, was associated with which of the following musical instruments?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">91.</span><span style=\"font-family: Palanquin;\"> 1977 &#2350;&#2375;&#2306; &#2346;&#2342;&#2381;&#2350; &#2349;&#2370;&#2359;&#2339; &#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2360;&#2306;&#2327;&#2368;&#2340;&#2325;&#2366;&#2352; &#2309;&#2344;&#2381;&#2344;&#2346;&#2370;&#2352;&#2381;&#2339;&#2366; &#2342;&#2375;&#2357;&#2368;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2306;&#2327;&#2368;&#2340; &#2357;&#2366;&#2342;&#2381;&#2351;&#2351;&#2306;&#2340;&#2381;&#2352; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2368; &#2341;&#2368;&#2306;?</span></p>\n",
                    options_en: ["<p>Flute</p>\n", "<p>Violin</p>\n", 
                                "<p>Surbahar</p>\n", "<p>Veena</p>\n"],
                    options_hi: ["<p>&#2348;&#2366;&#2306;&#2360;&#2369;&#2352;&#2368;</p>\n", "<p>&#2357;&#2366;&#2351;&#2354;&#2367;&#2344;</p>\n",
                                "<p>&#2360;&#2369;&#2352;&#2348;&#2361;&#2366;&#2352;&#2368;</p>\n", "<p>&#2357;&#2368;&#2339;&#2366;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">91.(c)</span><span style=\"font-family: Roboto;\"> Annapurna Devi, the legendary musician awarded with Padma Bhushan in 1977, was associated with Surbahar musical instruments. Hariprasad Chaurasia- Flute Player, Asad Ali Khan- Veena Player, Athira Krishna - Violin player.</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">91.(c) </span><span style=\"font-family: Palanquin;\">&#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2360;&#2306;&#2327;&#2368;&#2340;&#2325;&#2366;&#2352; &#2309;&#2344;&#2381;&#2344;&#2346;&#2370;&#2352;&#2381;&#2339;&#2366; &#2342;&#2375;&#2357;&#2368;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; 1977 &#2350;&#2375;&#2306; &#2346;&#2342;&#2381;&#2350; &#2349;&#2370;&#2359;&#2339; &#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;, &#2360;&#2369;&#2352;&#2348;&#2361;&#2366;&#2352; &#2360;&#2306;&#2327;&#2368;&#2340; &#2357;&#2366;&#2342;&#2381;&#2351;&#2351;&#2306;&#2340;&#2381;&#2352;&#2379;&#2306; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2368; &#2341;&#2368;&#2306;&#2404; &#2361;&#2352;&#2367;&#2346;&#2381;&#2352;&#2360;&#2366;&#2342; &#2330;&#2380;&#2352;&#2360;&#2367;&#2351;&#2366;- &#2348;&#2366;&#2306;&#2360;&#2369;&#2352;&#2368; &#2357;&#2366;&#2342;&#2325;, &#2309;&#2360;&#2342; &#2309;&#2354;&#2368; &#2326;&#2366;&#2344;- &#2357;&#2368;&#2339;&#2366; &#2357;&#2366;&#2342;&#2325;, &#2309;&#2341;&#2367;&#2352;&#2366; &#2325;&#2371;&#2359;&#2381;&#2339;&#2366; - &#2357;&#2366;&#2351;&#2354;&#2367;&#2344; &#2357;&#2366;&#2342;&#2325;&#2404;</span></p>\n",
                    correct: "c",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "92",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">92. </span><span style=\"font-family: Roboto;\">The \'Dhenka\' of the state of Odisha is a popular __________instrument.</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">92.</span><span style=\"font-family: Palanquin;\"> &#2323;&#2337;&#2367;&#2358;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; \'&#2343;&#2375;&#2344;&#2325;&#2366; (Dhenka)\' &#2319;&#2325; &#2354;&#2379;&#2325;&#2346;&#2381;&#2352;&#2367;&#2351; __________ &#2357;&#2366;&#2342;&#2381;&#2351;&#2351;&#2306;&#2340;&#2381;&#2352; &#2361;&#2376;&#2404;</span></p>\n",
                    options_en: ["<p>Idiophone</p>\n", "<p>Chordophone</p>\n", 
                                "<p>Aerophone</p>\n", "<p>Membranophone</p>\n"],
                    options_hi: ["<p><span style=\"font-weight: 400;\">&#2311;&#2337;&#2367;&#2351;&#2379;&#2347;&#2364;&#2379;&#2344; (idiophone)</span></p>\n", "<p><span style=\"font-weight: 400;\">&#2325;&#2379;&#2352;&#2381;&#2337;&#2379;&#2347;&#2364;&#2379;&#2344; (chordophone)</span></p>\n",
                                "<p><span style=\"font-weight: 400;\">&nbsp;&#2319;&#2352;&#2379;&#2347;&#2364;&#2379;&#2344; (aerophone)</span></p>\n", "<p><span style=\"font-weight: 400;\">&#2350;&#2375;&#2350;&#2381;&#2348;&#2381;&#2352;&#2375;&#2344;&#2379;&#2347;&#2364;&#2379;&#2344; (membranophone)</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">92.(b) <strong>The chordophones</strong><span style=\"font-weight: 400;\"> (stringed musical instruments) like Veena, Kendra, Sarangi, Ektara, Behela, and </span><strong>Dhenka </strong><span style=\"font-weight: 400;\">are well-known throughout Odisha. According to the Hornbostel&ndash;Sachs system, four categories of musical instruments are </span><strong>chordophones </strong><span style=\"font-weight: 400;\">(string instruments), aerophones (wind instruments), membranophones (drums), and idiophones (non-drum percussion instruments).</span></span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Roboto;\">92.(b)&nbsp; </span><span style=\"font-weight: 400;\">&#2357;&#2368;&#2339;&#2366;, &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;, &#2360;&#2366;&#2352;&#2306;&#2327;&#2368;, &#2319;&#2325;&#2340;&#2366;&#2352;&#2366;, &#2348;&#2375;&#2361;&#2354;&#2366; &#2324;&#2352; </span><strong>&#2343;&#2375;&#2344;&#2325;&#2366; (Dhenka) </strong><span style=\"font-weight: 400;\">&#2332;&#2376;&#2360;&#2375; </span><strong>&#2325;&#2377;&#2352;&#2381;&#2337;&#2379;&#2347;&#2379;&#2344;</strong><span style=\"font-weight: 400;\"> (&#2340;&#2366;&#2352; &#2357;&#2366;&#2354;&#2375; &#2360;&#2306;&#2327;&#2368;&#2340; &#2357;&#2366;&#2342;&#2381;&#2351;&#2351;&#2306;&#2340;&#2381;&#2352;) &#2346;&#2370;&#2352;&#2375; &#2323;&#2337;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2376;&#2306;&#2404; &#2361;&#2377;&#2352;&#2381;&#2344;&#2348;&#2379;&#2360;&#2381;&#2335;&#2375;&#2354;-&#2360;&#2330;&#2381;&#2360; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2360;&#2306;&#2327;&#2368;&#2340; &#2357;&#2366;&#2342;&#2381;&#2351;&#2351;&#2306;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2330;&#2366;&#2352; &#2358;&#2381;&#2352;&#2375;&#2339;&#2367;&#2351;&#2366;&#2306; &#2361;&#2376;&#2306; &#2325;&#2377;&#2352;&#2381;&#2337;&#2379;&#2347;&#2379;&#2344;&#2381;&#2360; (&#2360;&#2381;&#2335;&#2381;&#2352;&#2367;&#2306;&#2327; &#2311;&#2306;&#2360;&#2381;&#2335;&#2381;&#2352;&#2370;&#2350;&#2375;&#2306;&#2335;&#2381;&#2360;), &#2319;&#2352;&#2379;&#2347;&#2379;&#2344;&#2381;&#2360; (&#2346;&#2357;&#2344; &#2357;&#2366;&#2342;&#2381;&#2351;&#2351;&#2306;&#2340;&#2381;&#2352;), &#2350;&#2375;&#2350;&#2381;&#2348;&#2381;&#2352;&#2366;&#2344;&#2379;&#2347;&#2379;&#2344;&#2381;&#2360; (&#2337;&#2381;&#2352;&#2350;), &#2324;&#2352; &#2311;&#2337;&#2367;&#2351;&#2379;&#2347;&#2379;&#2344;&#2381;&#2360; (&#2344;&#2377;&#2344;-&#2337;&#2381;&#2352;&#2350; &#2346;&#2352;&#2381;&#2325;&#2381;&#2351;&#2370;&#2358;&#2344; &#2311;&#2306;&#2360;&#2381;&#2335;&#2381;&#2352;&#2370;&#2350;&#2375;&#2306;&#2335;&#2381;&#2360;)&#2404;</span></p>\n",
                    correct: "b",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "93",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">93.</span><span style=\"font-family: Roboto;\"> The famous musician Satyadev Pawar is associated with which musical instrument?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">93.</span><span style=\"font-family: Palanquin;\"> &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2360;&#2306;&#2327;&#2368;&#2340;&#2325;&#2366;&#2352; &#2360;&#2340;&#2381;&#2351;&#2342;&#2375;&#2357; &#2346;&#2357;&#2366;&#2352; &#2325;&#2367;&#2360; &#2357;&#2366;&#2342;&#2381;&#2351; &#2351;&#2306;&#2340;&#2381;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;?</span></p>\n",
                    options_en: ["<p>Violin</p>\n", "<p>Shehnai</p>\n", 
                                "<p>Veena</p>\n", "<p>Sitar</p>\n"],
                    options_hi: ["<p>&#2357;&#2366;&#2351;&#2354;&#2367;&#2344;</p>\n", "<p>&#2358;&#2361;&#2344;&#2366;&#2312;</p>\n",
                                "<p>&#2357;&#2368;&#2339;&#2366;</p>\n", "<p>&#2360;&#2367;&#2340;&#2366;&#2352;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">3.(a) <strong>Violin</strong>. </span><span style=\"font-family: Roboto;\">Other Violin Players - Lalgudi Jayaraman - {Padma Shri (1963), Padam Bhusan (1994), Sangeet Natak Akademi (2010)}, L. Subramaniam { Padma Shri (1998) Padma Bhushan (2001), Balabhaskar, M. S Gopalakrishnan {Padma Shri (1975), Sangeet Natak Akademi Award (1982), Padma Bhushan (2012)}.</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Palanquin;\">93.(a) <strong>&#2357;&#2366;&#2351;&#2354;&#2367;&#2344;</strong>&#2404;</span><span style=\"font-family: Palanquin;\"> &#2309;&#2344;&#2381;&#2351; &#2357;&#2366;&#2351;&#2354;&#2367;&#2344; &#2357;&#2366;&#2342;&#2325; - &#2354;&#2366;&#2354;&#2327;&#2369;&#2337;&#2368; &#2332;&#2351;&#2352;&#2366;&#2350;&#2344; - {&#2346;&#2342;&#2381;&#2350; &#2358;&#2381;&#2352;&#2368; (1963), &#2346;&#2342;&#2350; &#2349;&#2370;&#2359;&#2339; (1994), &#2360;&#2306;&#2327;&#2368;&#2340; &#2344;&#2366;&#2335;&#2325; &#2309;&#2325;&#2366;&#2342;&#2350;&#2368; (2010)}, &#2319;&#2354;. &#2360;&#2369;&#2348;&#2381;&#2352;&#2350;&#2339;&#2381;&#2351;&#2350; { &#2346;&#2342;&#2381;&#2350; &#2358;&#2381;&#2352;&#2368; (1998) &#2346;&#2342;&#2381;&#2350; &#2349;&#2370;&#2359;&#2339; (2001), &#2348;&#2366;&#2354;&#2366;&#2349;&#2366;&#2360;&#2381;&#2325;&#2352;, &#2319;&#2350;. &#2319;&#2360;. &#2327;&#2379;&#2346;&#2366;&#2354;&#2325;&#2371;&#2359;&#2381;&#2339;&#2344; { &#2346;&#2342;&#2381;&#2350; &#2358;&#2381;&#2352;&#2368; (1975), &#2360;&#2306;&#2327;&#2368;&#2340; &#2344;&#2366;&#2335;&#2325; &#2309;&#2325;&#2366;&#2342;&#2350;&#2368; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; (1982), &#2346;&#2342;&#2381;&#2350; &#2349;&#2370;&#2359;&#2339; (2012)}&#2404;</span></p>\n",
                    correct: "a",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "94",
                    section: "18",
                    question_en: "<p><span style=\"font-family: Roboto;\">94.</span><span style=\"font-family: Roboto;\"> Which of the following folk dances is performed holding a sword in one hand and a shield in the other?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Roboto;\">94.</span><span style=\"font-family: Palanquin;\"> &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2354;&#2379;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351; &#2319;&#2325; &#2361;&#2366;&#2341; &#2350;&#2375;&#2306; &#2340;&#2354;&#2357;&#2366;&#2352; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2361;&#2366;&#2341; &#2350;&#2375;&#2306; &#2338;&#2366;&#2354; &#2354;&#2375;&#2325;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span></p>\n",
                    options_en: ["<p>Santhal</p>\n", "<p>Jadur</p>\n", 
                                "<p>Karma</p>\n", "<p>Paika</p>\n"],
                    options_hi: ["<p>&#2360;&#2306;&#2341;&#2366;&#2354;</p>\n", "<p>&#2332;&#2366;&#2342;&#2369;&#2352;</p>\n",
                                "<p>&#2325;&#2352;&#2381;&#2350;&#2366;</p>\n", "<p>&#2346;&#2366;&#2311;&#2325;&#2366;</p>\n"],
                    solution_en: "<p><span style=\"font-family: Roboto;\">94.(d) </span><span style=\"font-family: Nova Mono;\">&nbsp;<strong>Paika Dance</strong><span style=\"font-weight: 400;\"> &rarr; performed by a tribal community of Jharkhand, symbolishes battle-art. The dancing artist holds a shield (Dhal) in his left hand and a two edged sword in his right hand. performed to welcome special respected guests or during religious procession (Shobha Yatra). </span><strong>Santhal Dance</strong><span style=\"font-weight: 400;\"> &rarr; West Bengal. </span><strong>Jadur dance</strong><span style=\"font-weight: 400;\"> &rarr; Bihar. </span><strong>Karma dance</strong><span style=\"font-weight: 400;\"> &rarr; Chhattisgarh, Jharkhand, Madhya Pradesh, Odisha and West Bengal.</span></span></p>\n",

                questions.push({

                    question_hi: "<p><span style=\"font-family: Roboto;\">96. </span><span style=\"font-family: Palanquin;\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2346;&#2352; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2325;&#2369;&#2354; &#2332;&#2354; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2350;&#2368;&#2336;&#2366; &#2332;&#2354; &#2361;&#2376;?</span></p>\n",

                    solution_en: "<p><span style=\"font-family: Roboto;\">96.(d) <strong>2.7 Percent</strong>.</span><span style=\"font-family: Roboto;\"> Water covers about 71% of the earth\'s surface. 97% of the earth\'s water is found in the oceans (too salty for drinking, growing crops, and most industrial uses except cooling). 3% of the earth\'s water is fresh. Fresh water can be defined as water with less than 500 parts per million (ppm) of dissolved salts.</span><span style=\"font-family: Roboto;\"> </span><span style=\"font-family: Roboto;\">The Antarctic ice sheet holds about 90 percent of the fresh water that exists on the Earth\'s surface. </span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Palanquin;\">96.(d) <strong>2.7 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</strong></span><span style=\"font-family: Palanquin;\">&#2404; &#2346;&#2366;&#2344;&#2368; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2368; &#2360;&#2340;&#2361; &#2325;&#2366; &#2354;&#2327;&#2349;&#2327; 71% &#2325;&#2357;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2366; 97% &#2346;&#2366;&#2344;&#2368; &#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; (&#2346;&#2368;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2361;&#2369;&#2340; &#2344;&#2350;&#2325;&#2368;&#2344;, &#2347;&#2360;&#2354; &#2313;&#2327;&#2366;&#2344;&#2375; &#2324;&#2352; &#2336;&#2306;&#2337;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2313;&#2346;&#2351;&#2379;&#2327;)&#2404; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2366; 3% &#2332;&#2354; &#2340;&#2366;&#2332;&#2366; &#2361;&#2376;&#2404; &#2340;&#2366;&#2332;&#2375; &#2346;&#2366;&#2344;&#2368; &#2325;&#2379; &#2346;&#2366;&#2344;&#2368; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; 500 &#2349;&#2366;&#2327; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2367;&#2354;&#2367;&#2351;&#2344; (ppm) &#2360;&#2375; &#2325;&#2350; &#2328;&#2369;&#2354;&#2367;&#2340; &#2354;&#2357;&#2339; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2309;&#2306;&#2335;&#2366;&#2352;&#2381;&#2325;&#2335;&#2367;&#2325; &#2348;&#2352;&#2381;&#2347; &#2325;&#236                     question_hi: "<p><span style=\"font-family: Palanquin Dark;\">100. \"&#2346;&#2381;&#2352;&#2367;&#2340;&#2381;&#2332;&#2364;&#2325;&#2352; &#2310;&#2352;&#2381;&#2325;&#2367;&#2335;&#2375;&#2325;&#2381;&#2330;&#2352; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; 2023\" &#2325;&#2367;&#2360;&#2344;&#2375; &#2332;&#2368;&#2340;&#2366;?</span></p>\n",
                    options_en: ["<p><span style=\"font-family: Roboto;\"> David Chipperfield</span></p>\n", "<p><span style=\"font-family: Roboto;\"> Philip Johnson</span></p>\n", 
                                "<p><span style=\"font-family: Roboto;\"> Di&eacute;b&eacute;do Francis K&eacute;r&eacute;</span></p>\n", "<p><span style=\"font-family: Roboto;\"> None Of These</span></p>\n"],
                    options_hi: ["<p><span style=\"font-family: Palanquin Dark;\"> &#2337;&#2375;&#2357;&#2367;&#2337; &#2330;&#2367;&#2346;&#2352;&#2347;&#2364;&#2368;&#2354;&#2381;&#2337;</span></p>\n", "<p><span style=\"font-family: Palanquin Dark;\">&#2347;&#2367;&#2354;&#2367;&#2346; &#2332;&#2377;&#2344;&#2360;&#2344;</span></p>\n",
                                "<p><span style=\"font-family: Palanquin Dark;\"> &#2337;&#2367;&#2348;&#2375;&#2337;&#2379; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2367;&#2360; &#2325;&#2375;&#2352;&#2375;</span></p>\n", "<p><span style=\"font-family: Palanquin Dark;\"> &#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Palanquin Dark;\">100.(a) David Chipperfield</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">Pritzker Architecture Prize 2023</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&bull; Winner : David Chipperfield (UK)</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&bull; 2022 Winner ?: Di&eacute;b&eacute;do Francis K&eacute;r&eacute; (Burkina Faso)</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Palanquin Dark;\">100.(a) &#2337;&#2375;&#2357;&#2367;&#2337; &#2330;&#2367;&#2346;&#2352;&#2347;&#2364;&#2368;&#2354;&#2381;&#2337;</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&#2346;&#2381;&#2352;&#2367;&#2340;&#2381;&#2332;&#2364;&#2325;&#2352; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2354;&#2366; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; 2023</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&bull; &#2357;&#2367;&#2332;&#2375;&#2340;&#2366;: &#2337;&#2375;&#2357;&#2367;&#2337; &#2330;&#2367;&#2346;&#2352;&#2347;&#2364;&#2368;&#2354;&#2381;&#2337; (&#2351;&#2370;&#2325;&#2375;)</span></p>\r\n<p><span style=\"font-family: Palanquin Dark;\">&bull; 2022 &#2357;&#2367;&#2332;&#2375;&#2340;&#2366; <span style=\"font-weight: 400;\">&#127942; </span>: &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2367;&#2360; &#2325;&#2375;&#2352;&#2375; (&#2348;&#2369;&#2352;&#2381;&#2325;&#2367;&#2344;&#2366; &#2347;&#2366;&#2360;&#2379;)</span></p>\n",
                    correct: "a",
                    pos_marks: 1.0,
                    neg_marks: 0.5
                });
            
            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();
        }
        
        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML - more compact
            let html = `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="question-text mb-3">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        <div class="options">`;
                        
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = 'option-label';
                
                // When reviewing, highlight user's choice and correct answer
                if (submitted) {
                    if (opt === question.correct) {
                        optionClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[question.id] === opt && opt !== question.correct) {
                        optionClass += ' border-danger bg-danger bg-opacity-10';
                    }
                }
                
                html += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${answers[question.id] === opt ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <label class="form-check-label w-100 ${optionClass}" for="opt-${index}-${opt}">
                            ${submitted && opt === question.correct ? '<i class="fas fa-check-circle text-success me-1"></i>' : ''}
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const alertClass = isCorrect ? 'alert-success' : 'alert-danger';
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="alert ${alertClass} mt-3 py-2">
                        <strong>${resultText}</strong>
                        <div class="mt-1 small">
                            <strong>Solution:</strong>
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
        function nextQuestion() { if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
            
            // Update button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('main-content');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                if (window.innerWidth >= 992) {
                    content.classList.add('with-nav');
                }
            } else {
                nav.classList.remove('show');
                if (window.innerWidth >= 992) {
                    content.classList.remove('with-nav');
                }
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer - compact
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            if (confirm(`You have attempted ${attempted} of ${questions.length} questions.
${remaining} questions are unattempted.

Are you sure you want to submit?`)) {
                submitTest();
            }
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.replace('btn-light', 'btn-success');
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
        
        // Add event listener for window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                if (document.getElementById('question-nav').classList.contains('show')) {
                    document.getElementById('main-content').classList.add('with-nav');
                }
            } else {
                document.getElementById('main-content').classList.remove('with-nav');
            }
        });
    </script>
</body>
</html>
