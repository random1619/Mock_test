                questions.push({
                    id: "74",
                    section: "17",
                    question_en: "<p>74. <span style=\"font-family: Cambria Math;\">Let m and n be natural numbers. What is the minimum value of (m + n) such that 33m + 22n is divisible by 121?</span></p>\n",
                    question_hi: "<p>74. <span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> m </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> n </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2306;&#2404;</span><span style=\"font-family: Cambria Math;\"> (m + n) </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2340;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\"> 33m +22n, 121 </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2379;</span><span style=\"font-family: Cambria Math;\"> ?</span></p>\n",
                    options_en: ["<p>3</p>\n", "<p>4</p>\n", 
                                "<p>5</p>\n", "<p>10</p>\n"],
                    options_hi: ["<p>3</p>\n", "<p>4</p>\n",
                                "<p>5</p>\n", "<p>10</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">74.(b)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">33m + 22n = 11(3m + 2n), which is divisible by 121.</span></p>\r\n<p>&rArr; (3m + 2n) = 11</p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, For minimum value of (m + n), the value of m and n should be 3 and 1 respectively</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, 3 &times; </span><span style=\"font-family: Cambria Math;\">3</span><span style=\"font-family: Cambria Math;\"> + 2 &times; </span><span style=\"font-family: Cambria Math;\">1 </span><span style=\"font-family: Cambria Math;\">= 9 + 2 = 11</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Hence, m + n = 3 + 1 = 4</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">74.(b)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">33m + 22n = 11(3m + 2n), </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2379;</span><span style=\"font-family: Cambria Math;\"> 121 </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2404;</span></p>\r\n<p>&rArr; (3m + 2n) = 11</p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2309;&#2348;</span><span style=\"font-family: Cambria Math;\">, (m +n) </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, m </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> n </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2352;&#2350;&#2358;&#2307;</span><span style=\"font-family: Cambria Math;\"> 3 </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 1 </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2379;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2330;&#2366;&#2361;&#2367;&#2319;</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, 3 &times; </span><span style=\"font-family: Cambria Math;\">3</span><span style=\"font-family: Cambria Math;\"> + 2 &times; </span><span style=\"font-family: Cambria Math;\">1 </span><span style=\"font-family: Cambria Math;\">= 9 + 2 = 11</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2309;&#2340;&#2307;</span><span style=\"font-family: Cambria Math;\">, m + n = 3 + 1 = 4</span></p>\n",

                    question_hi: " <p>77.</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">निम्न</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">में</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">से</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">किस</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">रोग</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">को</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">दुनियाभर</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">में</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">समाप्त</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">कर</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">दिया</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">गया</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">है</span><span style=\"font-family:Cambria Math\"> ? </span></p>",

                questions.push({

                    section: "18",
                    question_en: "<p>82.<span style=\"font-family: Cambria Math;\"> The role assigned to Jain institutions is described in the Chola inscriptions as __________.</span></p>\n",
                    question_hi: " <p>82.</span><span style=\"font-family:Cambria Math\">   </span><span style=\"font-family:Nirmala UI\">जैन</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">संस्थाओं</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">को</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">दान</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">की</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">गई</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">भूमिका</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">चोल</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">शिलालेखों</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">में</span><span style=\"font-family:Cambria Math\">__________ </span><span style=\"font-family:Nirmala UI\">के</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">रूप</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">में</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">वर्णन</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">किया</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">गया</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">है।</span></p>",

                    solution_en: "<p>82.(d) <span style=\"font-family: Cambria Math;\">Chola chronicles mention various types of lands; some of them were Vellanvagai (landholding of non-Brahman peasants), Brahmadeya (land donated to brahmans), Shalabhoga (land for the maintenance of a school), and Pallichchhandam (land donations to Jaina institutions).</span></p>\n",

                questions.push({
                    id: "84",
                    section: "18",
                    question_en: "<p>84. <span style=\"font-family: Cambria Math;\">Shravanabelagola is situated in :</span></p>\n",
                    question_hi: "<p>84. <span style=\"font-family: Nirmala UI;\">&#2358;&#2381;&#2352;&#2357;&#2339;&#2348;&#2375;&#2354;&#2327;&#2379;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2361;&#2366;&#2305;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2381;&#2341;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> :</span></p>\n",
                    options_en: ["<p>Punjab</p>\n", "<p>Karnataka</p>\n", 
                                "<p>Kerala</p>\n", "<p>Tamil Nadu</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Nirmala UI;\">&#2346;&#2306;&#2332;&#2366;&#2348;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",

                    solution_en: "<p>84.(b) <strong>Karnataka.</strong><span style=\"font-family: Cambria Math;\"> Shravanabelagola has an<strong> </strong></span><span style=\"font-family: Cambria Math;\"><strong>18 meter</strong> </span><span style=\"font-family: Cambria Math;\">high idol of</span><span style=\"font-family: Cambria Math;\"> <strong>Lord</strong> <strong>Gomateshwara.</strong> </span><span style=\"font-family: Cambria Math;\">Shravanabelagola is the holy place where Bahubali, the son of Lord Rishabhdev, the first Tirthankara attained salvation. Shravanabelagola is situated between two hills -<strong> </strong></span><span style=\"font-family: Cambria Math;\"><strong>Vindhyagiri</strong> </span><span style=\"font-family: Cambria Math;\">and </span><strong><span style=\"font-family: Cambria Math;\">Chandragiri</span></strong><span style=\"font-family: Cambria Math;\"><strong>.</strong> Shravanabelagola is a famous<strong> </strong></span><strong><span style=\"font-family: Cambria Math;\">Jain pilgrimage</span></strong><span style=\"font-family: Cambria Math;\">. According to Jain texts, at the end of his life, </span><span style=\"font-family: Cambria Math;\"><strong>Chandragupta Maurya</strong> </span><span style=\"font-family: Cambria Math;\">left his body at Shravanabelagola according to Jain tradition.</span></p>\n",

e=\"font-family:Nirmala UI\">किसान</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">कल्याण</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">मंत्रालय</span></p>",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "100",
                    section: "misc",
                    question_en: " <p>100. Which Country Hosted 42nd ‘ASEAN Summit 2023’ ?</span></p>",
                    question_hi: " <p>100. 42</span><span style=\"font-family:Nirmala UI\">वें</span><span style=\"font-family:Cambria Math\"> \'</span><span style=\"font-family:Nirmala UI\">आसियान</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">शिखर</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">सम्मेलन</span><span style=\"font-family:Cambria Math\"> 2023\' </span><span style=\"font-family:Nirmala UI\">की</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">मेजबानी</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">किस</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">देश</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">ने</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">की</span><span style=\"font-family:Cambria Math\">?</span></p>",
                    options_en: [" <p> India</span></p>", " <p> Malaysia</span></p>", 
                                " <p> Indonesia</span></p>", " <p> Laos</span></p>"],
                    options_hi: [" <p> </span><span style=\"font-family:Nirmala UI\">भारत</span></p>", " <p> </span><span style=\"font-family:Nirmala UI\">मलेशिया</span></p>",
                                " <p> </span><span style=\"font-family:Nirmala UI\">इंडोनेशिया</span></p>", " <p> </span><span style=\"font-family:Nirmala UI\">लाओस</span></p>"],
                    solution_en: " <p><span style=\"font-family:Cambria Math\">100.(c) Indonesia</span></p> <p><span style=\"font-family:Cambria Math\">42nd ‘ASEAN Summit 2023’ held at Labuan Bajo,Indonesia.</span></p> <p><span style=\"font-family:Cambria Math\">• Theme : ASEAN Matters: Epicentrum Of Growth</span></p> <p><span style=\"font-family:Cambria Math\">• Host Leader : Joko Widodo {President – Indonesia}</span></p>",
                    solution_hi: " <p><span style=\"font-family:Cambria Math\">100.(c) </span><span style=\"font-family:Nirmala UI\">इंडोनेशिया</span></p> <p><span style=\"font-family:Cambria Math\">42</span><span style=\"font-family:Nirmala UI\">वां</span><span style=\"font-family:Cambria Math\"> \'</span><span style=\"font-family:Nirmala UI\">आसियान</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">शिखर</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">सम्मेलन</span><span style=\"font-family:Cambria Math\"> 2023\' </span><span style=\"font-family:Nirmala UI\">इंडोनेशिया</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">के</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">लाबुआन</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">बाजो</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">में</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">आयोजित</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">हुआ।</span></p> <p><span style=\"font-family:Cambria Math\">• </span><span style=\"font-family:Nirmala UI\">थीम</span><span style=\"font-family:Cambria Math\">: </span><span style=\"font-family:Nirmala UI\">आसियान</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">मामले</span><span style=\"font-family:Cambria Math\">: </span><span style=\"font-family:Nirmala UI\">विकास</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">का</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">केंद्र</span></p> <p><span style=\"font-family:Cambria Math\">• </span><span style=\"font-family:Nirmala UI\">मेजबान</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">नेता</span><span style=\"font-family:Cambria Math\">: </span><span style=\"font-family:Nirmala UI\">जोको</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">विडोडो</span><span style=\"font-family:Cambria Math\"> {</span><span style=\"font-family:Nirmala UI\">राष्ट्रपति</span><span style=\"font-family:Cambria Math\"> - </span><span style=\"font-family:Nirmala UI\">इंडोनेशिया</span><span style=\"font-family:Cambria Math\">}</span></p>",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
            
            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();
        }
        
        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML - more compact
            let html = `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="question-text mb-3">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        <div class="options">`;
                        
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = 'option-label';
                
                // When reviewing, highlight user's choice and correct answer
                if (submitted) {
                    if (opt === question.correct) {
                        optionClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[question.id] === opt && opt !== question.correct) {
                        optionClass += ' border-danger bg-danger bg-opacity-10';
                    }
                }
                
                html += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${answers[question.id] === opt ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <label class="form-check-label w-100 ${optionClass}" for="opt-${index}-${opt}">
                            ${submitted && opt === question.correct ? '<i class="fas fa-check-circle text-success me-1"></i>' : ''}
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const alertClass = isCorrect ? 'alert-success' : 'alert-danger';
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="alert ${alertClass} mt-3 py-2">
                        <strong>${resultText}</strong>
                        <div class="mt-1 small">
                            <strong>Solution:</strong>
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
        function nextQuestion() { if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
            
            // Update button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('main-content');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                if (window.innerWidth >= 992) {
                    content.classList.add('with-nav');
                }
            } else {
                nav.classList.remove('show');
                if (window.innerWidth >= 992) {
                    content.classList.remove('with-nav');
                }
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer - compact
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            if (confirm(`You have attempted ${attempted} of ${questions.length} questions.
${remaining} questions are unattempted.

Are you sure you want to submit?`)) {
                submitTest();
            }
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.replace('btn-light', 'btn-success');
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
        
        // Add event listener for window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                if (document.getElementById('question-nav').classList.contains('show')) {
                    document.getElementById('main-content').classList.add('with-nav');
                }
            } else {
                document.getElementById('main-content').classList.remove('with-nav');
            }
        });
    </script>
