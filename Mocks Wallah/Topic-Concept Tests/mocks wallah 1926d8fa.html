<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>

                    solution_en: "<p>55.(b)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688701712/word/media/image50.png\" width=\"166\" height=\"208\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">From the given diagram we can write</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi>x</mi><mrow><mn>12</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>x</mi></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mi>sin</mi><mo>&nbsp;</mo><mo>&nbsp;</mo><mn>60</mn><mo>&deg;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&rArr;</mo><mo>&nbsp;</mo><mfrac><mi>x</mi><mrow><mn>12</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>x</mi></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><msqrt><mn>3</mn></msqrt><mn>2</mn></mfrac><mspace linebreak=\"newline\"></mspace><mo>&rArr;</mo><mi>x</mi><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><mn>12</mn><msqrt><mn>3</mn></msqrt></mrow><mrow><mn>2</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msqrt><mn>3</mn></msqrt></mrow></mfrac><mo>&nbsp;</mo><mo>&rArr;</mo><mi>x</mi><mo>=</mo><mn>12</mn><msqrt><mn>3</mn></msqrt><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mo>(</mo><mn>2</mn><mo>-</mo><msqrt><mn>3</mn></msqrt><mo>)</mo><mo>=</mo><mo>(</mo><mn>24</mn><msqrt><mn>3</mn></msqrt><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>36</mn><mo>)</mo></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, At the height from the bottom where the tree is broken by the wind is </span></p>\r\n<p>(<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>24</mn><msqrt><mn>3</mn></msqrt><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>36</mn></math>)m.</p>\r\n<p><span style=\"font-family: Cambria Math;\">Alternate Method:</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Angle&rarr;&nbsp;</span><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; 30&nbsp; &nbsp; &nbsp; &nbsp;:&nbsp; &nbsp; &nbsp; 60&nbsp; &nbsp; &nbsp;:&nbsp; &nbsp; &nbsp; 90</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Ratio&rarr;&nbsp;</span><span style=\"font-family: Cambria Math;\">&nbsp; &nbsp; &nbsp; &nbsp;1&nbsp; &nbsp; &nbsp; &nbsp; &nbsp;:&nbsp; &nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>3</mn></msqrt><mo>&nbsp;</mo><mo>&nbsp;</mo></math>&nbsp; &nbsp;</span><span style=\"font-family: Cambria Math;\">:&nbsp; &nbsp; &nbsp; &nbsp;2</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, in triangle OAC,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>3</mn><mo>&nbsp;</mo></msqrt></math></span><span style=\"font-family: Cambria Math;\">unit = x</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, 2 unit =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>2</mn><mi>x</mi></mrow><mrow><msqrt><mn>3</mn></msqrt><mo>&nbsp;</mo></mrow></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, </span><span style=\"font-family: Cambria Math;\">c</span><span style=\"font-family: Cambria Math;\"> = 12 - x &rArr;&nbsp; x=&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>12</mn><msqrt><mn>3</mn></msqrt><mo>&nbsp;</mo></mrow><mrow><mn>2</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msqrt><mn>3</mn></msqrt><mo>&nbsp;</mo></mrow></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">On rationalisation, we get,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>12</mn><msqrt><mn>3</mn></msqrt><mo>&times;</mo><mo>(</mo><mn>2</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msqrt><mn>3</mn></msqrt><mo>)</mo></mrow><mrow><mo>(</mo><mn>2</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msqrt><mn>3</mn></msqrt><mo>)</mo><mo>(</mo><mn>2</mn><mo>-</mo><msqrt><mn>3</mn></msqrt><mo>)</mo><mo>&nbsp;</mo></mrow></mfrac></math>=(</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>24</mn><msqrt><mn>3</mn></msqrt><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mn>36</mn></math><span style=\"font-family: Cambria Math;\">)m</span></p>\n",
                    solution_hi: "<p>55.(b)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688701712/word/media/image50.png\" width=\"175\" height=\"219\"></p>\r\n<p><span style=\"font-weight: 400;\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2310;&#2352;&#2375;&#2326; &#2360;&#2375; &#2361;&#2350; &#2354;&#2367;&#2326; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi>x</mi><mrow><mn>12</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>x</mi></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mi>sin</mi><mo>&nbsp;</mo><mo>&nbsp;</mo><mn>60</mn><mo>&deg;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>&rArr;</mo><mo>&nbsp;</mo><mfrac><mi>x</mi><mrow><mn>12</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>x</mi></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><msqrt><mn>3</mn></msqrt><mn>2</mn></mfrac><mspace linebreak=\"newline\"></mspace><mo>&rArr;</mo><mi>x</mi><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><mn>12</mn><msqrt><mn>3</mn></msqrt></mrow><mrow><mn>2</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msqrt><mn>3</mn></msqrt></mrow></mfrac><mo>&nbsp;</mo><mo>&rArr;</mo><mi>x</mi><mo>=</mo><mn>12</mn><msqrt><mn>3</mn></msqrt><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mo>(</mo><mn>2</mn><mo>-</mo><msqrt><mn>3</mn></msqrt><mo>)</mo><mo>=</mo><mo>(</mo><mn>24</mn><msqrt><mn>3</mn></msqrt><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>36</mn><mo>)</mo></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-weight: 400;\">&#2340;&#2379;, &#2344;&#2368;&#2330;&#2375; &#2360;&#2375; &#2314;&#23                 questions.push({
                    id: "61",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">61. </span><span style=\"font-family: Cambria Math;\">If a, b and c are positive integers such that <span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">a&sup2;</span><span style=\"font-weight: 400;\">&nbsp;+ </span><span style=\"font-weight: 400;\">b&sup2;</span><span style=\"font-weight: 400;\">&nbsp;= 82 </span></span><span style=\"font-family: Cambria Math;\">&nbsp;and <span style=\"font-weight: 400;\">b&sup2;</span><span style=\"font-weight: 400;\">&nbsp;+ </span><span style=\"font-weight: 400;\">c&sup2;</span><span style=\"font-weight: 400;\">&nbsp;= 65</span></span><span style=\"font-family: Cambria Math;\">, then the value of 2a + 7b - 3c is:</span></p>\n",

amily: Kokila;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2375;&#2306;&#2404;</span></p>\n",
                    options_en: ["<p>2</p>\n", "<p>5</p>\n", 
                                "<p>49</p>\n", "<p>1</p>\n"],
                    options_hi: ["<p>2</p>\n", "<p>5</p>\n",
                                "<p>49</p>\n", "<p>1</p>\n"],
                    solution_en: "<p>61.(d) <span style=\"font-family: Cambria Math;\">Putting b = 1, we have ;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;a<span style=\"font-weight: 400;\">&sup2; </span>= 82 - 1 = 81 &rArr;&nbsp;</span><span style=\"font-family: Cambria Math;\"> a = 9</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">and c<span style=\"font-weight: 400;\">&sup2;</span></span><span style=\"font-family: Cambria Math;\"> = 65 - 1 = 64&rArr;&nbsp;</span><span style=\"font-family: Cambria Math;\"> c = 8</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now , 2a + 7b - 3c = 2 &times; 9 + 7 &times; 1 - 3 &times; 8 = 18 + 7 - 24 = 1</span></p>\n",

                questions.push({

                questions.push({
                    id: "66",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">66. </span><span style=\"font-family: Cambria Math;\">Excluding stoppages, the speed of a bus is 30 km/h and including stoppages, it is 21 km/h. For how many minutes does the bus stop per hour?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">66. </span><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2335;&#2377;&#2346;&#2375;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2331;&#2379;&#2337;&#2364;&#2325;&#2352;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> 30 km/h </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2335;&#2377;&#2346;&#2375;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2361;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2351;&#2361;</span><span style=\"font-family: Cambria Math;\"> 21 km/h </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2328;&#2306;&#2335;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2340;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2367;&#2344;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2369;&#2325;&#2340;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",

                    options_hi: ["<p>12</p>\n", "<p>18</p>\n",
                                "<p>9</p>\n", "<p>10</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">66.(b)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Distance traveled by bus including stoppage = 21km</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Distance traveled by bus excluding stoppage = 30 km</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Difference in distance = 30 - 21 = 9 km</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Because of the stoppage, 9 km less traveled.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the stoppage time per hour = </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>9</mn><mn>30</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>3</mn><mn>10</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 18 min</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">66.(b)</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2335;&#2377;&#2346;&#2375;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2361;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> = 21 km</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2335;&#2377;&#2346;&#2375;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2331;&#2379;&#2337;&#2364;&#2325;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> = 30 km</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2342;&#2370;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> = 30 - 21 = 9 km</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2335;&#2377;&#2346;&#2375;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> 9 km </span><span style=\"font-family: Kokila;\">&#2325;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2347;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2337;&#2364;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2328;&#2306;&#2335;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2336;&#2361;&#2352;&#2366;&#2357;</span><span style=\"font-family: Cambria Math;\"> <                     section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">68. </span><span style=\"font-family: Cambria Math;\">By selling an ornament for Rs.480, Chaitra loses 20%. At what price should she sell it </span><span style=\"font-family: Cambria Math;\">in order to gain 25%?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">68.</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2349;&#2370;&#2359;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> Rs.480 </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2375;&#2330;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2376;&#2340;&#2381;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> 20% </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2366;&#2344;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2340;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> 25% </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2311;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2349;&#2370;&#2359;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2375;&#2330;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2366;&#2361;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Rs.800.00</p>\n", "<p>Rs.745.20</p>\n", 
                                "<p>Rs.750.00</p>\n", "<p>Rs.920.00</p>\n"],
                    options_hi: ["<p>Rs.800.00</p>\n", "<p>Rs.745.20</p>\n",
                                "<p>Rs.750.00</p>\n", "<p>Rs.920.00</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">68.(c)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the CP of ornament be 100%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">ATQ,</span></p>\r\n<p><span style=\"font-weight: 400;\">(100 - 20) </span>% = &#8377; 480</p>\r\n<p><span style=\"font-family: Cambria Math;\">80% = 480</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">1% =&nbsp; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>480</mn><mn>80</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">= 6</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Then, CP of ornament = &#8377;600</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, In order to sell the ornament to gain 25% = 600 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>5</mn><mn>4</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = &#8377;750</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">68.(c)</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2349;&#2370;&#2359;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> 100% </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> , </span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2360;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\">,</span></p>\r\n<p><span style=\"font-weight: 400;\">(100 - 20)</span>% = &#8377; 480</p>\r\n<p><span style=\"font-family: Cambria Math;\">80% = 480</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">1% =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>480</mn><mn>80</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> = 6</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2310;&#2349;&#2370;&#2359;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> = &#8377;600</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2310;&#2349;&#2370;&#2359;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2375;&#2330;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> 25% </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> = 600 &times; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>5</mn><mn>4</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = &#8377;750</span></p>\n",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "69",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">69.</span><span style=\"font-family: Cambria Math;\"> A person sold his book for &#8377;1200 and got a percentage profit equal to the cost price of </span><span style=\"font-family: Cambria Math;\">the book. The cost price of the book is:</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">69</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2346;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2369;&#2360;&#2381;&#2340;&#2325;</span><span style=\"font-family: Cambria Math;\"> &#8377;1200 </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2375;&#2330;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2369;&#2360;&#2381;&#2340;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2352;&#2366;&#2348;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2369;&#2310;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2369;&#2360;&#2381;&#2340;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2375;&#2306;&#2404;</span></p>\n",
                    options_en: ["<p>&#8377;300</p>\n", "<p>&#8377;400</p>\n", 
                                "<p>&#8377;350</p>\n", "<p>&#8377;550</p>\n"],
                    options_hi: ["<p>&#8377;300</p>\n", "<p>&#8377;400</p>\n",
                                "<p>&#8377;350</p>\n", "<p>&#8377;550</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">69.(a)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the CP of book be x</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Then, profit =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><msup><mi>x</mi><mn>2</mn></msup><mn>100</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>&nbsp;</mo><msup><mi>x</mi><mn>2</mn></msup></mrow><mrow><mn>100</mn><mo>&nbsp;</mo></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 1200</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">100x&nbsp; + x&sup2;</span><span style=\"font-family: Cambria Math;\"> = 120000</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;x&sup2; + 100x - 120000 = 0</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Solving the given equation, we have :</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = -400 or 300 (x can\'t take negative value)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, CP of a book = &#8377;300</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Short trick:</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Putting the values of x from the given options one by one and doing so,we find that x= 300 gets satisfied.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">SP = x + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><msup><mi>x</mi><mn>2</mn></msup><mn>100</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 1200</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">300 + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><msup><mn>300</mn><mn>2</mn></msup><mrow><mn>100</mn><mo>&nbsp;</mo></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 1200</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">300 + 900 = 1200</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">1200=1200</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">LHS = RHS</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">69.(a)</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2369;&#2360;&#2381;&#2340;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> x </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2340;&#2379;, &#2354;&#2366;&#2349;&nbsp;</span> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><msup><mi>x</mi><mn>2</mn></msup><mn>100</mn></mfrac></math></span></p>\r\n<p><span style=\"font-weight: 400;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>&nbsp;</mo><msup><mi>x</mi><mn>2</mn></msup></mrow><mrow><mn>100</mn><mo>&nbsp;</mo></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 1200</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">100x&nbsp; + x&sup2;</span><span style=\"font-family: Cambria Math;\"> = 120000</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;x&sup2; + 100x - 120000 = 0</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2361;&#2354; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352;,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = -400 or 300&nbsp;</span><span style=\"font-weight: 400;\">&nbsp;(x &#2325;&#2366; &#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325; &#2350;&#2366;&#2344; &#2344;&#2361;&#2368;&#2306; &#2354;&#2375; &#2360;&#2325;&#2340;&#2375; )</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2309;&#2340;: &#2319;&#2325; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351;&nbsp;</span> = &#8377;300</span></p>\r\n<p><strong>&#2358;&#2377;&#2352;&#2381;&#2335; &#2335;&#2381;&#2352;&#2367;&#2325;:</strong></p>\r\n<p><span style=\"font-weight: 400;\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; x &#2325;&#2366; &#2350;&#2366;&#2344; &#2319;&#2325;-&#2319;&#2325; &#2325;&#2352;&#2325;&#2375; &#2352;&#2326;&#2344;&#2375; &#2346;&#2352; &#2361;&#2350; &#2346;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367; x = 300 &#2360;&#2306;&#2340;&#2369;&#2359;&#2381;&#2335; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351;&nbsp; </span>&nbsp;= x + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><msup><mi>x</mi><mn>2</mn></msup><mn>100</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 1200</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">300 + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><msup><mn>300</mn><mn>2</mn></msup><mrow><mn>100</mn><mo>&nbsp;</mo></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 1200</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">300 + 900 = 1200</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">1200=1200</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">LHS = RHS</span></p>\n",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });

                    solution_en: "<p>77.(c) <span style=\"font-family: Cambria Math;\">&nbsp;<strong>Sperm. Prokaryotic cells</strong><span style=\"font-weight: 400;\"> - do not have a true nucleus and membrane-bound organelles - single-celled microorganisms. Examples - Bacteria and Archaea, </span><strong>Mycoplasma </strong><span style=\"font-weight: 400;\">(Pleuropneumonia-like organism, a genus of bacteria), Blue-green algae (cyanobacteria). </span><strong>Eukaryotic cells</strong><span style=\"font-weight: 400;\"> - contain membrane-bound organelles. Examples - Human, Plant and Animal cells. </span><strong>Robert Hooke </strong><span style=\"font-weight: 400;\">discovered cells in 1665.</span></span></p>\n",
                    solution_hi: "<p>77.(c)<span style=\"font-family: Cambria Math;\">&nbsp;</span><strong>&#2358;&#2369;&#2325;&#2381;&#2352;&#2366;&#2339;&#2369; &#2404;</strong><span style=\"font-weight: 400;\"> </span><strong>&nbsp;&#2346;&#2381;&#2352;&#2366;&#2325;&#2381;&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2325;&#2368; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2319;&#2306;</strong><span style=\"font-weight: 400;\"> (Prokaryotic cells) - &#2319;&#2325; &#2360;&#2330;&#2381;&#2330;&#2375; &#2344;&#2366;&#2349;&#2367;&#2325; &#2324;&#2352; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368;-&#2348;&#2366;&#2313;&#2306;&#2337; &#2321;&#2352;&#2381;&#2327;&#2375;&#2344;&#2375;&#2354; - &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325;&#2354;-&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2357;&#2366;&#2354;&#2375; &#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350;&#2332;&#2368;&#2357;&#2404; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; - &#2348;&#2376;&#2325;&#2381;&#2335;&#2368;&#2352;&#2367;&#2351;&#2366; &#2324;&#2352; &#2310;&#2352;&#2381;&#2325;&#2367;&#2351;&#2366;, </span><strong>&#2350;&#2366;&#2311;&#2325;&#2379;&#2346;&#2381;&#2354;&#2366;&#2332;&#2364;&#2381;&#2350;&#2366; </strong><span style=\"font-weight: 400;\">(&#2346;&#2381;&#2354;&#2381;&#2351;&#2370;&#2352;&#2379;&#2346;&#2379;&#2344;&#2381;&#2351;&#2370;&#2350;&#2379;&#2344;&#2367;&#2351;&#2366; &#2332;&#2376;&#2360;&#2366; &#2332;&#2368;&#2357;, &#2348;&#2376;&#2325;&#2381;&#2335;&#2368;&#2352;&#2367;&#2351;&#2366; &#2325;&#2368; &#2319;&#2325; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;), &#2344;&#2368;&#2354;&#2366;-&#2361;&#2352;&#2366; &#2358;&#2376;&#2357;&#2366;&#2354; (&#2360;&#2366;&#2351;&#2344;&#2379;&#2348;&#2376;&#2325;&#2381;&#2335;&#2368;&#2352;&#2367;&#2351;&#2366;)&#2404; </span><strong>&#2360;&#2369;&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2325;&#2368; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2319;&#2306;</strong><span                 questions.push({

                    section: "18",

                    solution_en: "<p>78.(d)<span style=\"font-family: Cambria Math;\">&nbsp;<strong>Cell. Robert Hooke </strong><span style=\"font-weight: 400;\">(1665) discovered Cell. There are two distinct types of cells:</span><strong> prokaryotic cells</strong><span style=\"font-weight: 400;\"> (do not have a nucleus, Ex : Bacteria and Archaea) and </span><strong>eukaryotic cells</strong><span style=\"font-weight: 400;\"> (Having nucleus, Ex : plants, animals, protists, fungi).</span></span></p>\n",

                    solution_en: "<p>79.(d) <span style=\"font-family: Cambria Math;\"><strong>Power of Parliament for constitution amendment. </strong><span style=\"font-weight: 400;\">Power of issuance of writ by judiciary - </span><strong>Article 226</strong><span style=\"font-weight: 400;\"> (High Courts),</span><strong> Article 32</strong><span style=\"font-weight: 400;\"> (Supreme Court). </span><strong>Article 358</strong><span style=\"font-weight: 400;\"> (Suspension of provisions of article 19 during emergencies). </span><strong>Article 352 </strong><span style=\"font-weight: 400;\">(Proclamation of Emergency). </span><strong>Article 360 </strong><span style=\"font-weight: 400;\">(Provisions as to financial emergency).</span><strong> Article 356 </strong><span style=\"font-weight: 400;\">(President\'s Rule).</span></span></p>\n",

                questions.push({

                    question_en: "<p>80.<span style=\"font-family: Cambria Math;\"> The Judges of the Supreme Court are appointed by the President under Article_____of the Constitution of India.</span></p>\n",

                    solution_en: "<p>82.(b) <span style=\"font-family: Cambria Math;\"><strong>Dravidian. Shore temple</strong><span style=\"font-weight: 400;\"> (Seven Pagodas, Jalashayana) was built in </span><strong>700 - 728 AD</strong><span style=\"font-weight: 400;\"> during the reign of</span><strong> the Pallava dynasty </strong><span style=\"font-weight: 400;\">(Narasimhavarman II) in Chennai (Tamil Nadu). </span><strong>Features: </strong><span style=\"font-weight: 400;\">Pyramidal structure, has </span><strong>3 temples </strong><span style=\"font-weight: 400;\">(Kshatriyasimha Pallavesvara, Rajasimha Pallavesvara, Vishnu temple) in the complex, dedicated to Lord Shiva and Lord Vishnu),</span><strong> UNESCO World Heritage Site </strong><span style=\"font-weight: 400;\">(1984).&nbsp;</span></span></p>\n",

                boxesContainer.appendChild(box);

            // Show first question

            updateProgress();

        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML - more compact
            let html = `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="question-text mb-3">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        <div class="options">`;
                        
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = 'option-label';
                
                // When reviewing, highlight user's choice and correct answer
                if (submitted) {
                    if (opt === question.correct) {
                        optionClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[question.id] === opt && opt !== question.correct) {
                        optionClass += ' border-danger bg-danger bg-opacity-10';
                    }
                }
                
                html += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${answers[question.id] === opt ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <label class="form-check-label w-100 ${optionClass}" for="opt-${index}-${opt}">
                            ${submitted && opt === question.correct ? '<i class="fas fa-check-circle text-success me-1"></i>' : ''}
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const alertClass = isCorrect ? 'alert-success' : 'alert-danger';
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="alert ${alertClass} mt-3 py-2">
                        <strong>${resultText}</strong>
                        <div class="mt-1 small">
                            <strong>Solution:</strong>
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
        function nextQuestion() { if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
            
            // Update button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('main-content');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                if (window.innerWidth >= 992) {
                    content.classList.add('with-nav');
                }
            } else {
                nav.classList.remove('show');
                if (window.innerWidth >= 992) {
                    content.classList.remove('with-nav');
                }
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer - compact
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            if (confirm(`You have attempted ${attempted} of ${questions.length} questions.
${remaining} questions are unattempted.

Are you sure you want to submit?`)) {
                submitTest();
            }
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.replace('btn-light', 'btn-success');
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
        
        // Add event listener for window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                if (document.getElementById('question-nav').classList.contains('show')) {
                    document.getElementById('main-content').classList.add('with-nav');
                }
            } else {
                document.getElementById('main-content').classList.remove('with-nav');
            }
        });
    </script>
