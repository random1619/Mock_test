<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

nt-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2379;&#2327;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2404; &#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, \'&lsquo;co</span><span style=\"font-family: Cambria Math;\">uld have been&rdquo;&rsquo; </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2348;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2313;&#2340;&#2381;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2404;</span></p>\n",

                    question_hi: "<p>3.<span style=\"font-family: Cambria Math;\"> Select the most appropriate SYNONYM of the word given in </span><span style=\"font-family: Cambria Math;\">Bold/Underline .</span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><strong><span style=\"font-family: Cambria Math;\">ROYAL </span></strong></p>\n",
                    options_en: ["<p>Lowly</p>\n", "<p>Minor</p>\n", 
                                "<p>Kingly</p>\n", "<p>Poorly</p>\n"],
                    options_hi: ["<p>Lowly</p>\n", "<p>Minor</p>\n",

                questions.push({

                    question_hi: "<p>47. <span style=\"font-weight: 400;\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2324;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2379; &#2313;&#2360;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2357;&#2366;&#2330;&#2325; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2375;&#2404;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2346;&#2361;&#2354;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2306;&#2325;&#2381;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\">:&nbsp; &nbsp; &nbsp; 18,&nbsp; &nbsp; &nbsp;9,&nbsp; &nbsp; &nbsp;27</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2370;&#2360;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2306;&#2325;&#2381;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\">:&nbsp; &nbsp; &nbsp; &nbsp;40,&nbsp; &nbsp; 36,&nbsp; &nbsp;140</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2368;&#2360;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2306;&#2325;&#2                                 "<p>25</p>\n", "<p>45</p>\n"],

                questions.push({
                    id: "49",
                    section: "6",

                    question_hi: "<p>51. <span style=\"font-family: Cambria Math;\">AUSTRALIA </span><span style=\"font-family: Nirmala UI;\">&#2358;&#2348;&#2381;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2340;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2325;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>72</p>\n", "<p>144</p>\n", 
                                "<p>60,480</p>\n", "<p>720</p>\n"],
                    options_hi: ["<p>72</p>\n", "<p>144</p>\n",
                                "<p>60,480</p>\n", "<p>720</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">51.(c) </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Total number of letter in &lsquo;AUSTRALIA &rsquo; = 9 but this letter includes 3 A&rsquo;s.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the number of ways &lsquo;AUSTRALIA&rsquo; can arranged = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>9</mn><mo>!</mo></mrow><mrow><mn>3</mn><mo>!</mo></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>9</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>8</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>7</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mn>6</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>5</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>4</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>3</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>2</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>1</mn></mrow><mrow><mn>3</mn><mo>&times;</mo><mn>2</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>1</mn></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 60,480.</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">51.(c)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">\'AUSTRALIA\' </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> = 9 </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2375;&#2325;&#2367;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2325;&#2381;&#2359;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 3 A </span><span style=\"font-family: Nirmala UI;\">&#2358;&#2366;&#2350;&#2367;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2306;&#2404;</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">, \'AUSTRALIA\' </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2340;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2352;&#2368;&#2325;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2325;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> =</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>9</mn><mo>!</mo></mrow><mrow><mn>3</mn><mo>!</mo></mrow></mfrac></math>=<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>9</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>8</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>7</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>6</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>5</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>4</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>3</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>2</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>1</mn></mrow><mrow><mn>3</mn><mo>&times;</mo><mn>2</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>1</mn></mrow></mfrac></math> </span><span style=\"font-family: Cambria Math;\"> = 60,480</span></p>\n",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "52",
                    section: "17",
                    question_en: "<p>52. <span style=\"font-family: Cambria Math;\">Find the sum of the mean and median of the given data.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">12,10,16,18, 20, 26,14, 28</span></p>\n",
                    question_hi: "<p>52.<span style=\"font-family: Nirmala UI;\">&#2342;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2305;&#2325;&#2337;&#2364;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2343;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2343;&#2381;&#2351;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;&#2332;&#2367;&#2319;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">12,10,16,18, 20, 26,</span><span style=\"font-family: Cambria Math;\">14, 28</span></p>\n",

                    options_hi: ["<p>18</p>\n", "<p>44</p>\n",
                                "<p>17</p>\n", "<p>35</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">52.(d)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Firstly arrange in ascending order &rarr;</span><span style=\"font-family: Cambria Math;\">10,12,14,16,18, 20, 26, 28</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Mean&rarr;&nbsp;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">=</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>10</mn><mo>+</mo><mn>12</mn><mo>+</mo><mn>14</mn><mo>+</mo><mn>16</mn><mo>+</mo><mn>18</mn><mo>+</mo><mn>20</mn><mo>+</mo><mn>26</mn><mo>+</mo><mn>28</mn></mrow><mn>8</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mfrac><mn>144</mn><mn>8</mn></mfrac></math><span style=\"font-family: Cambria Math;\"> = 18</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Median &rarr;</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>16</mn><mo>&nbsp;</mo><mo>+</mo><mn>18</mn></mrow><mn>2</mn></mfrac><mo>&nbsp;</mo></math>= 17</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now , sum of the mean and median = 18+17 =35</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">52.(d)</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2360;&#2348;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2361;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2352;&#2379;&#2361;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2352;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2352;&#2375;&#2306; <span style=\"font-family: Cambria Math;\">&rarr;</span></span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">10,12,14,16,18, 20, 26, 28</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2343;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> &rarr; </span><span style=\"font-family: Cambria Math;\"> =<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>10</mn><mo>+</mo><mn>12</mn><mo>+</mo><mn>14</mn><mo>+</mo><mn>16</mn><mo>+</mo><mn>18</mn><mo>+</mo><mn>20</mn><mo>+</mo><mn>26</mn><mo>+</mo><mn>28</mn></mrow><mn>8</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mfrac><mn>144</mn><mn>8</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">= 18</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> &rarr; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>16</mn><mo>+</mo><mn>18</mn></mrow><mn>2</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 17</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2309;&#2348;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2343;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> = 18 + 17 =35</span></p>\n",
                    correct: "d",

                questions.push({
                    id: "53",
                    section: "17",
                    question_en: "<p>53.<span style=\"font-family: Cambria Math;\"> The bar graph given below shows the saving and expenditure of 5 companies D, E, F, G and H.</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1689048704/word/media/image49.png\" width=\"408\" height=\"207\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">Income = Expenditure + Savings</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">The total income of all the companies is what percent of the total expenditure?</span></p>\n",
                    question_hi: "<p>53. <span style=\"font-family: Nirmala UI;\">&#2344;&#2368;&#2330;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2306;&#2337;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2354;&#2375;&#2326;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 5 </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> D, E, F, G </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> H </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2330;&#2340;</span><span style=\"font-family: Cambria Math;\"> (saving) </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2381;&#2351;&#2351;</span><span style=\"font-family: Cambria Math;\"> (expenditure) </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;&#2404;</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1689048704/word/media/image50.png\" width=\"405\" height=\"205\"></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2310;&#2351;</span><span style=\"font-family: Cambria Math;\"> = </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2381;&#2351;&#2351;</span><span style=\"font-family: Cambria Math;\"> + </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2330;&#2340;</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2360;&#2349;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2351;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2381;&#2351;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2340;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>213.33 %</p>\n", "<p>166.73 %</p>\n", 
                                "<p>233.33 %</p>\n", "<p>1<span style=\"font-family: Cambria Math;\">99.66 %</span></p>\n"],
                    options_hi: ["<p>213.33 %</p>\n", "<p>166.73 %</p>\n",
                                "<p>233.33 %</p>\n", "<p>199.66 %</p>\n"],
                    solution_en: "<p>53.(a)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Total income of all 5 companies</span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= (500+300) + (1000+600) + (800+500) + (500+ 400) + (600+1200) = Rs. 6400</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Total Expenditure = 300 + 600 + 500 + 400 + 1200 = 3000</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&nbsp;&rarr; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>6400</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>100</mn></mrow><mn>3000</mn></mfrac></math>= 213.33%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Therefore, total income is 213.33% of total expenditure.</span></p>\n",

                questions.push({
                    id: "54",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">55.(b)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Sum of the given no&rsquo;s = 2+5+8+11+13+t+15 = 7t </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">7t = 54 + t</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">6t = 54</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">t = 9</span></p>\n",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">58</span><span style=\"font-family: Cambria Math;\">.(b)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the CP of an article = 100 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Then, SP of an article = 100 &times; 95% = 95</span><span style=\"font-family: Cambria Math;\"> unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">New CP = 100 &times; 110% = 110 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">110 - 95 = 15% corresponds to &#8377;150</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">120% corresponds to <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>150</mn><mn>15</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> &times; 120 = &#8377;1,200</span></p>\n",

y: Nirmala UI;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> = 100 &times; 110% = 110 </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2325;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">110 - 95 = 15% </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2379;</span><span style=\"font-family: Cambria Math;\"> &#8377;150 </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2369;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">120% </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2379;</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>150</mn><mn>15</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> &times; 120 = &#8377;1,200 </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2369;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span></p>\n",

                questions.push({

                questions.push({
                    id: "61",
                    section: "17",
                    question_en: "<p>61.<span style=\"font-family: Cambria Math;\"> A student </span><span style=\"font-family: Cambria Math;\">travelled a distance of 20 km in 4 hours, partly on foot at a speed of 2 km/h and the remaining on a bicycle at a speed of 6 km/h. The ratio of the distance travelled on foot and that travelled on the bicycle is:</span></p>\n",
                    question_hi: "<p>61. <span style=\"font-family: Nirmala UI;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2331;&#2366;&#2340;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> 4 </span><span style=\"font-family: Nirmala UI;\">&#2328;&#2306;&#2335;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 20 </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2350;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2370;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2306;&#2358;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2352;&#2370;&#2346;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> 2 </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2350;&#2368;</span><span style=\"font-family: Cambria Math;\"> / </span><span style=\"font-family: Nirmala UI;\">&#2328;&#2306;&#2335;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span st ont-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2366;&#2311;&#2325;&#2367;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2370;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>2 : 3</p>\n", "<p>3 : 5</p>\n",

                    options_hi: ["<p>2 : 3</p>\n", "<p>3 : 5</p>\n",
                                "<p>4 : 5</p>\n", "<p>1 : 9</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">61.(d)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the distance be 2x and the distance traveled on foot and bicycle be a and b respectively </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Then, a + b = 20 &mdash; (1)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi>a</mi><mn>2</mn></mfrac><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mfrac><mi>b</mi><mn>6</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>4</mn><mspace linebreak=\"newline\"></mspace><mfrac><mrow><mn>3</mn><mi>a</mi><mo>+</mo><mi>b</mi></mrow><mn>6</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>4</mn></math></p>\r\n<p><span style=\"font-family: Cambria Math;\">3a + b = 24 &mdash; (2)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Subtracting eq . (1) from (2), we have :</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">2a = 4</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">a = 2 so, b = 18</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the required ratio of distance = 2 : 18 = 1 : 9</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">61.(d)</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2370;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> 2x </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2376;&#2342;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2366;&#2311;&#2325;&#2367;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2327;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2370;&#2352;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2352;&#2350;&#2358;&#2307;</span><span style=\"font-family: Cambria Math;\"> a </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> b </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2340;&#2348;</span><span style=\"font-family: Cambria Math;\">, a + b = 20 &mdash; (1)</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2366;&#2344;&#2369;&#2360;&#2366;&#2352;,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi>a</mi><mn>2</mn></mfrac><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mfrac><mi>b</mi><mn>6</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>4</mn><mspace linebreak=\"newline\"></mspace><mfrac><mrow><mn>3</mn><mi>a</mi><mo>+</mo><mi>b</mi></mrow><mn>6</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>4</mn></math></p>\r\n<p><span style=\"font-family: Cambria Math;\">3a + b = 24 &mdash; (2)</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2360;&#2350;&#2368;&#2325;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> (1) </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2350;&#2368;&#2325;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> (2) </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2328;&#2335;&#2366;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2379;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\                                 "<p>5 : 6</p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2311;&#2344;&#2350;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2349;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2361;&#2368;&#2306;</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">63.(a) </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Let capacity of jar of liquid be 8 units then jar of honey will be of 24 units</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><msup><mn>1</mn><mrow><mi>t</mi><mi>h</mi></mrow></msup><mn>4</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> of a jar of honey = 8 &times;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>4</mn></mfrac></math> <span style=\"font-weight: 400;\">= 2 units</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><msup><mn>1</mn><mrow><mi>t</mi><mi>h</mi></mrow></msup><mn>4</mn></mfrac></math>of a jar of liquid = 24 &times;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>4</mn></mfrac></math> <span style=\"font-weight: 400;\">=6 units</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Concentration of honey = </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2</mn><mrow><mn>2</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>6</mn></mrow></mfrac><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>2</mn><mn>8</mn></mfrac><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>1</mn><mn>4</mn></mfrac></math> </span></p>\n",

                    solution_en: "<p>65.(a) Formula used :<span style=\"font-family: Cambria Math;\"> <span style=\"font-weight: 400;\">x&sup3;</span><span style=\"font-weight: 400;\">+ </span><span style=\"font-weight: 400;\">y&sup3;</span></span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-family: Cambria Math;\">= (x + y)[<span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\">+</span><span style=\"font-weight: 400;\">y&sup2; </span><span style=\"font-weight: 400;\">- xy</span>]</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><msup><mrow><mo>(</mo><msqrt><mn>7</mn></msqrt><mi>x</mi><mo>)</mo></mrow><mn>3</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><msqrt><mn>5</mn></msqrt><mi>y</mi><mo>)</mo></mrow><mn>3</mn></msup></mrow><mrow><msqrt><mn>7</mn></msqrt><mi>x</mi><mo>+</mo><msqrt><mn>5</mn></msqrt><mi>y</mi></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mi>A</mi><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>B</mi><msup><mi>y</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>C</mi><mi>x</mi><mi>y</mi><mspace linebreak=\"newline\"></mspace><mfrac><mrow><mo>(</mo><msqrt><mn>7</mn></msqrt><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msqrt><mn>5</mn></msqrt><mi>y</mi><mo>)</mo><mo>(</mo><mn>7</mn><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>5</mn><msup><mi>y</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msqrt><mn>35</mn></msqrt><mi>x</mi><mi>y</mi><mo>)</mo></mrow><mrow><msqrt><mn>7</mn></msqrt><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msqrt><mn>5</mn></msqrt><mi>y</mi></mrow></mfrac></math></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-weight: 400;\">= A</span><span style=\"font-weight: 400;\">x<span style=\"font-family: Cambria Math;\">&sup2;</span></span><span style=\"font-weight: 400;\">&nbsp;+ B</span><span style=\"font-weight: 400;\">y<span style=\"font-family: Cambria Math;\">&sup2;</span></span><span style=\"font-weight: 400;\">&nbsp;+ Cxy</span></p>\r\n<p><span style=\"font-weight: 400;\">7</span><span style=\"font-weight: 400;\">x<span style=\"font-family: Cambria Math;\">&sup2;</span>&nbsp;</span><span style=\"font-weight: 400;\">&nbsp;+ 5</span><span style=\"font-weight: 400;\">y<span style=\"font-family: Cambria Math;\">&sup2;</span>&nbsp;</span><span style=\"font-weight: 400;\">&nbsp;-</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&nbsp;</mo><msqrt><mn>35</mn></msqrt></math><span style=\"font-weight: 400;\">xy = A</span><span style=\"font-weight: 400;\">x<span style=\"font-family: Cambria Math;\">&sup2;</span></span><span style=\"font-weight: 400;\">&nbsp;+ B</span><span style=\"font-weight: 400;\">y<span style=\"font-family: Cambria Math;\">&sup2;</span></span><span style=\"font-weight: 400;\">&nbsp;+ Cxy</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Comparing both side, we get :</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">A =7, B = 5, C = -&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>35</mn></msqrt></math></span></p>\r\n<p><span style=\"font-weight: 400;\">4A + 6B + </span><span style=\"font-weight: 400;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>35</mn></msqrt></math></span><span style=\"font-weight: 400;\">C = 4 &times; 7 + 6 &times; 5 - </span><span style=\"font-weight: 400;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>35</mn></msqrt></math></span><span style=\"font-weight: 400;\"> &times; </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>35</mn></msqrt></math><span style=\"font-weight: 400;\">= 28 + 30 - 35 = 23</span></p>\n",
                    solution_hi: "<p>65.(a)</p>\r\n<p><strong>&#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2370;&#2340;&#2381;&#2352;</strong>:<span style=\"font-family: Cambria Math;\"> <span style=\"font-weight: 400;\">x&sup3;</span><span style=\"font-weight: 400;\">+ </span><span style=\"font-weight: 400;\">y&sup3;</span></span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-family: Cambria Math;\">= (x + y)[<span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\">+</span><span style=\"font-weight: 400;\">y&sup2; </span><span style=\"font-weight: 400;\">- xy</span>]</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><msup><mrow><mo>(</mo><msqrt><mn>7</mn></msqrt><mi>x</mi><mo>)</mo></mrow><mn>3</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msup><mrow><mo>(</mo><msqrt><mn>5</mn></msqrt><mi>y</mi><mo>)</mo></mrow><mn>3</mn></msup></mrow><mrow><msqrt><mn>7</mn></msqrt><mi>x</mi><mo>+</mo><msqrt><mn>5</mn></msqrt><mi>y</mi></mrow></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mi>A</mi><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>B</mi><msup><mi>y</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>C</mi><mi>x</mi><mi>y</mi><mspace linebreak=\"newline\"></mspace><mfrac><mrow><mo>(</mo><msqrt><mn>7</mn></msqrt><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msqrt><mn>5</mn></msqrt><mi>y</mi><mo>)</mo><mo>(</mo><mn>7</mn><msup><mi>x</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>5</mn><msup><mi>y</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><msqrt><mn>35</mn></msqrt><mi>x</mi><mi>y</mi><mo>)</mo></mrow><mrow><msqrt><mn>7</mn></msqrt><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><msqrt><mn>5</mn></msqrt><mi>y</mi></mrow></mfrac></math></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-weight: 400;\">= A</span><span style=\"font-weight: 400;\">x<span style=\"font-family: Cambria Math;\">&sup2;</span></span><span style=\"font-weight: 400;\">&nbsp;+ B</span><span style=\"font-weight: 400;\">y<span style=\"font-family: Cambria Math;\">&sup2;</span></span><span style=\"font-weight: 400;\">&nbsp;+ Cxy</span></p>\r\n<p><span style=\"font-weight: 400;\">7</span><span style=\"font-weight: 400;\">x<span style=\"font-family: Cambria Math;\">&sup2;</span>&nbsp;</span><span style=\"font-weight: 400;\">&nbsp;+ 5</span><span style=\"font-weight: 400;\">y<span style=\"font-family: Cambria Math;\">&sup2;</span>&nbsp;</span><span style=\"font-weight: 400;\">&nbsp;-</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&nbsp;</mo><msqrt><mn>35</mn></msqrt></math><span style=\"font-weight: 400;\">xy = A</span><span style=\"font-weight: 400;\">x<span style=\"font-family: Cambria Math;\">&sup2;</span></span><span style=\"font-weight: 400;\">&nbsp;+ B</span><span style=\"font-weight: 400;\">y<span style=\"font-family: Cambria Math;\">&sup2;</span></span><span style=\"font-weight: 400;\">&nbsp;+ Cxy</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2340;&#2369;&#2354;&#2344;&#2366; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352;, &#2361;&#2350; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376; &#2325;&#2367;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">A =7, B = 5, C = -&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>35</mn></msqrt></math></span></p>\r\n<p><span style=\"font-weight: 400;\">4A + 6B + </span><span style=\"font-weight: 400;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>35</mn></msqrt></math></span><span style=\"font-weight: 400;\">C = 4 &times; 7 + 6 &times; 5 - </span><span style=\"font-weight: 400;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>35</mn></msqrt></math></span><span style=\"font-weight: 400;\"> &times; </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>35</mn></msqrt></math><span style=\"font-weight: 400;\">= 28 + 30 - 35 = 23</span></p>\n",

                questions.push({
                    id: "66",
                    section: "17",
                    question_en: "<p>66.<span style=\"font-family: Cambria Math;\"> In the following figure, if PT = 18 cm and PB = 48 cm, then find AB.</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1689048704/word/media/image54.png\" width=\"195\" height=\"123\"></p>\n",
                    question_hi: "<p>66. <span style=\"font-family: Nirmala UI;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2310;&#2325;&#2371;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> PT = 18 cm </span><span style=\"font-family: Nirmala UI;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> PB = 48 cm </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> AB </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1689048704/word/media/image54.png\" width=\"162\" height=\"102\"></p>\n",
                    options_en: ["<p>24.8 cm</p>\n", "<p>41.25 cm</p>\n", 
                                "<p>16.5 cm</p>\n", "<p>12.6 cm</p>\n"],
                    options_hi: ["<p>24.8 cm</p>\n", "<p>41.25 cm</p>\n",
                                "<p>16.5 cm</p>\n", "<p>12.6 cm</p>\n"],
                    solution_en: "<p>66.(b) <span style=\"font-family: Cambria Math;\">Using tangent secant theorem , we have : &rArr;&nbsp;</span><span style=\"font-weight: 400;\">P</span><span style=\"font-weight: 400;\">T&sup2; </span><span style=\"font-weight: 400;\">= PA &times; PB</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;<span style=\"font-weight: 400;\">1</span><span style=\"font-weight: 400;\">8&sup2;</span><span style=\"font-weight: 400;\">&nbsp;</span>= PA &times; 48 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">PA = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>324</mn><mn>48</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 6.75 cm</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">AB = PB - PA </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 48 - 6.75 = 41.25cm</span></p>\n",
                    solution_hi: "<p>66.(b)</p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2331;&#2375;&#2342;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2350;&#2375;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2313;&#2346;&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2352;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2350;&#2366;&#2352;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2366;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">:</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr;&nbsp;</span><span style=\"font-weight: 400;\">P</span><span style=\"font-weight: 400;\">T&sup2; </span><span style=\"font-weight: 400;\">= PA &times; PB</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;<span style=\"font-weight: 400;\">1</span><span style=\"font-weight: 400;\">8&sup2;</span><span style=\"font-weight: 400;\">&nbsp;</span>= PA &times; 48 <br></span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> PA = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>324</mn><mn>48</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> = 6.75 cm</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">AB = PB - PA </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 48 - 6.75 = 41.25cm</span></p>\n",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });

                    solution_en: "<p>85.(c) <strong>Living beings </strong><span style=\"font-weight: 400;\">does not&nbsp; </span><strong>inhale metals </strong><span style=\"font-weight: 400;\">during respiration. Humans get the </span><strong>oxygen </strong><span style=\"font-weight: 400;\">they need by breathing through their nose and mouth into their lungs. </span><strong>Respiration</strong><span style=\"font-weight: 400;\"> is the process in which organisms exchange gases between their body cells and the environment. </span><strong>Normal respiration</strong><span style=\"font-weight: 400;\"> rates for an adult person at rest range from 12 to 16 breaths per minute.</span></p>\n",
                    solution_hi: "<p>85.(c) <span style=\"font-family: Cambria Math;\"><strong>&#2358;&#2381;&#2357;&#2360;&#2344; </strong><span style=\"font-weight: 400;\">&#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2332;&#2368;&#2357;&#2367;&#2340; &#2346;&#2381;&#2352;&#2366;&#2339;&#2368; &#2343;&#2366;&#2340;&#2369;&#2323;&#2306; &#2325;&#2379; </span><strong>&#2309;&#2306;&#2342;&#2352; &#2344;&#2361;&#2368;&#2306; &#2354;&#2375;&#2340;&#2375; </strong><span style=\"font-weight: 400;\">&#2361;&#2376;&#2306;&#2404; &#2350;&#2344;&#2369;&#2359;&#2381;&#2351; &#2309;&#2346;&#2344;&#2375; &#2344;&#2366;&#2325; &#2324;&#2352; &#2350;&#2369;&#2306;&#2361; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2309;&#2346;&#2344;&#2375; &#2347;&#2375;&#2347;&#2337;&#2364;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2366;&#2306;&#2360; &#2354;&#2375;&#2344;&#2375; &#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; </span><strong>&#2358;&#2381;&#2357;&#2360;&#2344; </strong><span style=\"font-weight: 400;\">&#2357;&#2361; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2332;&#2368;&#2357; &#2309;&#2346;&#2344;&#2375; &#2358;&#2352;&#2368;&#2352; &#2325;&#2368; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2324;&#2352; &#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339; &#2325;&#2375; &#2348;&#2368;&#2330; &#2327;&#2376;&#2360;&#2379;&#2306; &#2325;&#2366; &#2310;&#2342;&#2366;&#2344;-&#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325;</span><strong> &#2357;&#2351;&#2360;&#2381;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;</strong><span style=\"font-weight: 400;\"> &#2325;&#2                 questions.push({
                    id: "86",

                    question_en: "<p>86. <span style=\"font-family: Cambria Math;\">What is</span><span style=\"font-family: Cambria Math;\"> the network of air tubes for gas exchange in insects? </span></p>\n",

                    solution_en: "<p>86.(c) <span style=\"font-family: Cambria Math;\"><strong>Tracheae </strong><span style=\"font-weight: 400;\">is the network of air tubes for gas exchange in insects. </span><strong>Gills</strong><span style=\"font-weight: 400;\"> are evaginated respiratory surfaces used for breathing in water. The diaphragm, located below the lungs, is the major muscle of respiration. Spiracles are the small opening on the lateral side of the body through which air enters the tracheal system.</span></span></p>\n",

                    question_en: "<p>87. <span style=\"font-family: Cambria Math;\">Which of the following animals have a single opening in their digestive system that serves both as a mouth and an anus?</span></p>\n",

                    solution_en: "<p>87.(c) <strong>Platyhelminthes. </strong><span style=\"font-weight: 400;\">These are also known as&nbsp; </span><strong>flatworms </strong><span style=\"font-weight: 400;\">belonging to Animalia Kingdom and they include many free-living and parasitic life forms. The term </span><strong>arachnid </strong><span style=\"font-weight: 400;\">refers to a class of animals that includes spiders, scorpions, mites, and ticks. </span><strong>Echinoderms </strong><span style=\"font-weight: 400;\">are a phylum of marine invertebrates that include starfish, brittle stars, sea cucumbers, sea urchins, sand dollars, and crinoids. </span><strong>Arthropods </strong><span style=\"font-weight: 400;\">are invertebrate animals with an exoskeleton, a segmented body, and paired jointed appendages.</span></p>\n",
                    solution_hi: "<p>87.(c)<strong>&#2346;&#2381;&#2354;&#2376;&#2341;&#2367;&#2354;&#2381;&#2350;&#2367;&#2344;&#2381;&#2341;&#2375;&#2360;</strong><span style=\"font-weight: 400;\">&#2404; &#2311;&#2344;&#2381;&#2361;&#2375;&#2306; &#2319;&#2344;&#2367;&#2350;&#2375;&#2354;&#2367;&#2351;&#2366; &#2325;&#2367;&#2306;&#2327;&#2337;&#2350; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2347;&#2381;&#2354;&#2376;&#2335;&#2357;&#2352;&#2381;&#2350; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2344;&#2350;&#2375;&#2306; &#2325;&#2312; &#2350;&#2369;&#2325;&#2381;&#2340;-&#2332;&#2368;&#2357;&#2367;&#2340; &#2324;&#2352; &#2346;&#2352;&#2332;&#2368;&#2357;&#2368; &#2332;&#2368;&#2357;&#2344; &#2352;&#2370;&#2346; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404; </span><strong>&#2309;&#2352;&#2330;&#2367;&#2344;&#2381;&#2337; </strong><span style=\"font-weight: 400;\">(</span><strong>arachnid</strong><span style=\"font-weight: 400;\">) &#2358;&#2348;&#2381;&#2342; &#2332;&#2366;&#2344;&#2357;&#2352;&#2379;&#2306; &#2325;&#2375; &#2319;&#2325; &#2357;&#2352;&#2381;&#2327; &#2325;&#2379; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2350;&#2325;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306;, &#2348;&#2367;&#2330;&#2381;&#2331;&#2370;, &#2328;&#2369;&#2344; &#2324;&#2352; &#2335;&#2367;&#2325; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404; </span><strong>&#2311;&#2330;&#2367;&#2344;&#2379;&#2337;&#2352;&#2381;&#2350; (Echinoderms)</strong><span style=\"font-weight: 400;\"> &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2368; &#2309;&#2325;&#2358;&#2375;&#2352;&#2370;&#2325;&#2368;&#2351; &#2325;&#2366; &#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2                     solution_en: "<p>88.(d)<span style=\"font-family: Cambria Math;\"> <span style=\"font-weight: 400;\">The demand for a commodity or service which is a consequence of the demand for something else is called </span><strong>derived demand. </strong><span style=\"font-weight: 400;\">For example if the demand of the printer increases then the demand of the paper will also increase, The increase in the demand of the paper due to the increase in the demand of the printer is known as derived demand.</span></span></p>\n",

                questions.push({

                    section: "18",
                    question_en: "<p>90. <span style=\"font-family: Cambria Math;\">Who among the following won a Padma Vibhushan award in year 1971?</span></p>\n",

                                "<p>Devjani Chaliha</p>\n", "<p>Uday Shankar</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Nirmala UI;\">&#2352;&#2366;&#2332;&#2368;&#2357;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2366;&#2352;&#2366;&#2351;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Nirmala UI;\">&#2319;&#2360;</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2381;&#2357;&#2366;&#2350;&#2368;&#2344;&#2366;&#2341;&#2344;</span></p>\n",

                    solution_en: "<p>90.(d) <span style=\"font-family: Cambria Math;\">&nbsp;<strong>Uday Shankar</strong><span style=\"font-weight: 400;\"> (fusion style) was the father of modern dance in India. He created the dance form </span><strong>(Hi-dance)</strong><span style=\"font-weight: 400;\">. </span><strong>Awards and honours:</strong><span style=\"font-weight: 400;\"> Sangeet Natak Akademi award (1960), Sangeet Natak Akademi Fellowship (1962), Padma Vibhushan (1971), Desikottama, Visva-Bharati University (1975).</span></span></p>\n",
                    solution_hi: "<p>90.(d)&nbsp; <strong>&#2313;&#2342;&#2351; &#2358;&#2306;&#2325;&#2352;</strong><span style=\"font-weight: 400;\"> (&#2347;&#2381;&#2351;&#2370;&#2332;&#2344; &#2358;&#2376;&#2354;&#2368;) &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351; &#2325;&#2375; &#2332;&#2344;&#2325; &#2341;&#2375;&#2404; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2337;&#2366;&#2306;&#2360; &#2347;&#2377;&#2352;&#2381;&#2350; (</span><strong>HI-&#2337;&#2366;&#2306;&#2360;</strong><span style=\"font-weight: 400;\">) &#2360;&#2371;&#2332;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</span><strong> &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2324;&#2352; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;</strong><span style=\"font-weight: 400;\">: &#2360;&#2306;&#2327;&#2368;&#2340; &#2344;&#2366;&#2335;&#2325; &#2309;&#2325;&#2366;&#2342;&#2350;&#2368; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; (1960), &#2360;&#2306;&#2327;&#2368;&#2340; &#2344;&#2366;&#2335;&#2325; &#2309;&#2325;&#2366;&#2342;&#2350;&#2368; &#2347;&#2375;&#2354;&#2379;&#2358;&#2367;&#2346; (1962), &#2346;&#2342;&#2381;&#2350; &#2357;&#2367;&#2349;&#2370;&#2359;&#2339; (1971), &#2342;&#2375;&#2360;&#2368;&#2325;&#2379;&#2340;&#2381;&#2340;&#2350;&#2366;, &#2357;&#2367;&#2358;&#2381;&#2357;-&#2349;&#2366;&#2352;&#2340;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; (1975)&#2404;</span></p>\n",
                    correct: "d",

                questions.push({
