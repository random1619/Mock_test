<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

                    solution_en: "<p>10.(c)<span style=\"font-family: Cambria Math;\"> Extravagant</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Prodigal -</span><span style=\"font-family: Cambria Math;\"> Spending money or using resources freely and recklessly.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Extravagant -</span><span style=\"font-family: Cambria Math;\"> Lacking restraint in spending money or using resources.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Economical -</span><span style=\"font-family: Cambria Math;\"> Giving good value or return in relation to the money, time spent.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Scrimping - </span><span style=\"font-family: Cambria Math;\">To save money by spending less than is necessary.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Conserving -</span><span style=\"font-family: Cambria Math;\"> To avoid wasteful or destructive use of something.</span></p>\n",

                    solution_en: "<p>58.(c) <span style=\"font-family: Cambria Math;\">Perimeter of an equilateral triangle = 63 units</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">3a = 63 &rArr;</span><span style=\"font-family: Cambria Math;\"> a =<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>63</mn><mn>3</mn></mfrac></math> </span><span style=\"font-family: Cambria Math;\"> = 21</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Area of an equilateral triangle </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mo>&nbsp;</mo><mfrac><msqrt><mn>3</mn></msqrt><mn>4</mn></mfrac><msup><mi>a</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><msqrt><mn>3</mn></msqrt><mn>4</mn></mfrac><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><msup><mn>21</mn><mn>2</mn></msup><mo>&nbsp;</mo></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>441</mn><mn>4</mn></mfrac><msqrt><mn>3</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\"> square units</span></p>\n",
                    solution_hi: "<p>58.(c)</p>\r\n<p><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2348;&#2366;&#2361;&#2369;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;&#2367;&#2350;&#2366;&#2346;</span><span style=\"font-family: Cambria Math;\"> = 63 </span><span style=\"font-family: Kokila;\">&#2311;&#2325;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">3a = 63 &rArr;</span><span style=\"font-family: Cambria Math;\"> a =<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>63</mn><mn>3</mn></mfrac></math> </span><span style=\"font-family: Cambria Math;\"> = 21</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mo>&nbsp;</mo><mfrac><msqrt><mn>3</mn></msqrt><mn>4</mn></mfrac><msup><mi>a</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><msqrt><mn>3</mn></msqrt><mn>4</mn></mfrac><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><msup><mn>21</mn><mn>2</mn></msup><mo>&nbsp;</mo></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>441</mn><mn>4</mn></mfrac><msqrt><mn>3</mn></msqrt></math></span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-weight: 400;\">&#2357;&#2352;&#2381;&#2327; &#2311;&#2325;&#2366;&#2312;&nbsp;</span></p>\n",

                questions.push({
                    id: "59",
                    section: "17",
                    question_en: "<p>59.<span style=\"font-family: Cambria Math;\"> PT is a tangent at the point R on a circle with centre O. SQ is a diameter. Which when produced meets the tangent PT at P. If <span style=\"font-weight: 400;\">&ang;SPT = </span><span style=\"font-weight: 400;\">35</span><span style=\"font-weight: 400;\">&deg;</span></span><span style=\"font-family: Cambria Math;\">, then what will be the measure of &nbsp;<span style=\"font-weight: 400;\">&ang;QRP </span></span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">59.</span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-weight: 400;\">PT &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2357;&#2366;&#2354;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; R &#2346;&#2352; &#2319;&#2325; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366; &#2361;&#2376; &#2404; SQ &#2357;&#2381;&#2351;&#2366;&#2360; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2375; &#2348;&#2397;&#2366;&#2344;&#2375; &#2346;&#2352; &#2351;&#2361; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366; PT &#2360;&#2375; P &#2346;&#2352; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376; &#2404; &#2351;&#2342;&#2367; </span><span style=\"font-weight: 400;\">&ang;SPT = </span><span style=\"font-weight: 400;\">35</span><span style=\"font-weight: 400;\">&deg;</span><span style=\"font-weight: 400;\"> &#2361;&#2376;, &#2340;&#2379; &#2325;&#2379;&#2339; QRP &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366; ?&nbsp;&nbsp;</span></p>\n",

                    options_hi: ["<p><span style=\"font-weight: 400;\">&nbsp;32</span><span style=\"font-weight: 400;\">&deg;</span><span style=\"font-weight: 400;\">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></p>\n", "<p><span style=\"font-weight: 400;\">&nbsp;58.6</span><span style=\"font-weight: 400;\">&deg;</span><span style=\"font-weight: 400;\">&nbsp; </span></p>\n",
                                "<p><span style=\"font-weight: 400;\">30.5</span><span style=\"font-weight: 400;\">&deg;</span><span style=\"font-weight: 400;\"> &nbsp; &nbsp; </span></p>\n", "<p><span style=\"font-weight: 400;\">27.5</span><span style=\"font-weight: 400;\">&deg;</span></p>\n"],
                    solution_en: "<p>59.(d)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688375754/word/media/image44.png\" width=\"168\" height=\"120\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">We know that OR is the radius of the circle that is perpendicular to the tangent PT.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">&ang;ORP = 90&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">In &Delta;</span><span style=\"font-weight: 400;\">ORQ</span><span style=\"font-weight: 400;\"> , OR= OQ = r</span></p>\r\n<p><span style=\"font-weight: 400;\">&ang;ORQ = &ang;OQR</span></p>\r\n<p><span style=\"font-weight: 400;\">In rt &nbsp;&Delta;</span><span style=\"font-weight: 400;\">ORP</span></p>\r\n<p><span style=\"font-weight: 400;\">&ang;ORP = 90&deg;</span><span style=\"font-weight: 400;\">&nbsp; , </span><span style=\"font-weight: 400;\">&ang;RPO = 35&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">&ang;ROP = 55&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">Thus, In &Delta;</span><span style=\"font-weight: 400;\">ORQ</span></p>\r\n<p><span style=\"font-weight: 400;\">&ang;ORQ = &ang;OQR= </span><span style=\"font-weight: 400;\"> 62.5&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">&ang;QRP = 90-62.5 = 27.5</span><span style=\"font-weight: 400;\">&deg;</span></p>\n",
                    solution_hi: "<p>59.(d)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688375754/word/media/image44.png\" width=\"237\" height=\"169\"></p>\r\n<p><span style=\"font-family: Kokila;\">&#2361;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2366;&#2344;&#2340;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\"> OR </span><span style=\"font-family: Kokila;\">&#2357;&#2371;&#2340;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2346;&#2352;&#2381;&#2358;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2375;&#2326;&#2366;</span><span style=\"font-family: Cambria Math;\"> PT </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2306;&#2348;&#2357;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-weight: 400;\">&ang;ORP = 90&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">&Delta;</span><span style=\"font-weight: 400;\">ORQ &#2350;&#2375;&#2306;</span><span style=\"font-weight: 400;\"> , OR= OQ = r</span></p>\r\n<p><span style=\"font-weight: 400;\">&ang;ORQ = &ang;OQR</span></p>\r\n<p><span style=\"font-weight: 400;\">&Delta;ORP &#2350;&#2375;&#2306;, </span><span style=\"font-weight: 400;\">&ang;ORP = 90&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">&ang;RPO = 35&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">&ang;ROP = 55&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">&Delta;ORQ</span><span style=\"font-weight: 400;\"> &#2350;&#2375;&#2306;, &ang;ORQ = &ang;OQR= </span><span style=\"font-weight: 400;\"> 62.5&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">&ang;QRP = 90 - 62.5 = 27.5</span><span style=\"font-weight: 400;\">&deg;</span></p>\n",
                    correct: "d",

                questions.push({
                    id: "60",
                    section: "17",
                    question_en: "<p>60.<span style=\"font-family: Cambria Math;\"> A circle is inscribed in a quadrilateral ABCD touching AB, BC, CD and AD at the points P,Q,R and S, respectively, <span style=\"font-weight: 400;\">&ang;</span><span style=\"font-weight: 400;\">B=</span><span style=\"font-weight: 400;\">90</span>&deg;</span><span style=\"font-family: Cambria Math;\">. If AD = 28 cm, AB=30 cm and DR = 8cm, then what is the circumference of the circle ? </span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">60.</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2371;&#2340;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332;</span><span style=\"font-family: Cambria Math;\"> ABCD </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2368;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2341;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376; </span><span style=\"font-family: Kokila;\">&#2332;&#2379;</span><span style=\"font-family: Cambria Math;\"> AB, BC, CD </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> AD </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2350;&#2358;&#2307;</span><span style=\"font-family: Cambria Math;\"> P, Q, R </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> S </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2346;&#2352;&#2381;&#2358;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> <span style=\"font-weight: 400;\">&ang;</span><span style=\"font-weight: 400;\">B = </span><span style=\"font-weight: 400;\">90&deg;</span></span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> AD = 28 </span><span style=\"font-family: Kokila;\">&#2360;&#2375;&#2350;&#2368;</span><span style=\"font-family: Cambria Math;\">, AB = 30 </span><span style=\"font-family: Kokila;\">&#2360;&#2375;&#2350;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> DR = 8 </span><span style=\"font-family: Kokila;\">&#2360;&#2375;&#2350;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2371;&#2340;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;&#2367;&#2343;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2404;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
                    options_en: ["<p>20&pi;<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>18&pi;<span style=\"font-family: Cambria Math;\"> </span></p>\n", 
                                "<p>15&pi;<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>12&pi;</p>\n"],
                    options_hi: ["<p>20&pi;<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>18&pi;<span style=\"font-family: Cambria Math;\"> </span></p>\n",
                                "<p>15&pi;<span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>12&pi;</p>\n"],
                    solution_en: "<p>60.(a) <span style=\"font-family: Cambria Math;\">Given, <span style=\"font-weight: 400;\">&ang;</span><span style=\"font-weight: 400;\">B=</span><span style=\"font-weight: 400;\">90</span>&deg;</span><span style=\"font-family: Cambria Math;\">. If AD = 28 cm, AB=30 cm and DR = 8 cm</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688375754/word/media/image45.png\" width=\"162\" height=\"168\"></p>\r\n<p><span style=\"font-weight: 400;\">DR = DS = 8 cm</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\"> &hellip;..(tangents)</span></p>\r\n<p><span style=\"font-weight: 400;\">AS = AD-DS &nbsp; &nbsp; = 28-8 = 20cm</span></p>\r\n<p><span style=\"font-weight: 400;\">AS = AP = 20 cm&nbsp; &nbsp; &hellip;..(tangents)</span></p>\r\n<p><span style=\"font-weight: 400;\">PB = AB - AP &nbsp; = 30-20 = 10 cm</span></p>\r\n<p><span style=\"font-weight: 400;\">OP&perp;</span><span style=\"font-weight: 400;\">AB</span><span style=\"font-weight: 400;\">, OQ&perp;</span><span style=\"font-weight: 400;\">BC</span><span style=\"font-weight: 400;\">&nbsp; &hellip;...(angle made by radius on tangent)</span></p>\r\n<p><span style=\"font-weight: 400;\">In quadrilateral OPQB</span></p>\r\n<p><span style=\"font-weight: 400;\">&ang;</span><span style=\"font-weight: 400;\">B = </span><span style=\"font-weight: 400;\">90&deg;</span><span style=\"font-weight: 400;\">, </span><span style=\"font-weight: 400;\">&ang;</span><span style=\"font-weight: 400;\">OQB = </span><span style=\"font-weight: 400;\">90&deg;</span><span style=\"font-weight: 400;\">, </span><span style=\"font-weight: 400;\">&ang;</span><span style=\"font-weight: 400;\">OPB=</span><span style=\"font-weight: 400;\">90&deg;</span></p>\r\n<p><span style=\"font-weight: 400;\">&nbsp;&rArr;</span><span style=\"font-weight: 400;\">&ang;</span><span style=\"font-weight: 400;\">POQ=</span><span style=\"font-weight: 400;\">90&deg;&rArr;</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">PB = BQ</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">&nbsp; &hellip;..(tangents)</span></p>\r\n<p><span style=\"font-weight: 400;\">&rArr;OPBQ is a square</span></p>\r\n<p><span style=\"font-weight: 400;\">PB = BQ = OP = OQ = 10 cm</span></p>\r\n<p><span style=\"font-weight: 400;\">Perimeter of the circle = </span><span style=\"font-weight: 400;\">2&pi;</span><span style=\"font-weight: 400;\">r</span></p>\r\n<p><span style=\"font-weight: 400;\">= </span><span style=\"font-weight: 400;\">2&nbsp; &times; &pi; &times; </span><span style=\"font-weight: 400;\">10</span><span style=\"font-weight: 400;\"> = 20&pi;</span></p>\n",
                    solution_hi: "<p>60.(b) <span style=\"font-family: Kokila;\">&#2342;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, <span style=\"font-weight: 400;\">&ang;</span><span style=\"font-weight: 400;\">B = </span><span style=\"font-weight: 400;\">90&deg; </span></span><span style=\"font-family: Cambria Math;\">. <span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span>&nbsp; AD = 28 cm, AB=30 cm </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> DR = 8cm</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688375754/word/media/image45.png\" width=\"160\" height=\"166\"></p>\r\n<p><span style=\"font-weight: 400;\">DR = DS = 8 cm</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\"> &hellip;..(&#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366;)</span></p>\r\n<p><span style=\"font-weight: 400;\">AS = AD - DS &nbsp; &nbsp; = 28 - 8 = 20cm</span></p>\r\n<p><span style=\"font-weight: 400;\">AS = AP = 20 cm&nbsp; &nbsp; &hellip;..(&#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366;)</span></p>\r\n<p><span style=\"font-weight: 400;\">PB = AB - AP &nbsp; = 30 - 20 = 10 cm</span></p>\r\n<p><span style=\"font-weight: 400;\">OP&perp;</span><span style=\"font-weight: 400;\">AB</span><span style=\"font-weight: 400;\">, OQ&perp;</span><span style=\"font-weight: 400;\">BC</span><span style=\"font-weight: 400;\">&nbsp; &hellip;...</span><span style=\"font-weight: 400;\">(&#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366; &#2346;&#2352; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &# ont-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2344;&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2369;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2340;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2327;&#2366;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>35</p>\n", "<p>38</p>\n", 
                                "<p>40</p>\n", "<p>32</p>\n"],
                    options_hi: ["<p>35</p>\n", "<p>38</p>\n",
                                "<p>40</p>\n", "<p>32</p>\n"],
                    solution_en: "<p>63.(d)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let 10 years ago age of A be x and age of B be 2x</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">After 10 years,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Age of A&rsquo;s present age = x+10</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Age of B,s present age = 2x+10</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, according to the question,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>10</mn></mrow><mrow><mn>2</mn><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>10</mn></mrow></mfrac><mo>=</mo><mfrac><mn>7</mn><mn>9</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rArr; x = 4 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, Present age of A = x+10 = 4 + 10 = 14</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Present age of B =2x + 10 = 2 &times; 4 +10= 18</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, total of their present ages = 14 + 18 = 32 years.</span></p>\n",
                    solution_hi: "<p>63.(d)</p>\r\n<p><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> 10 </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2361;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\"> A </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2369;</span><span style=\"font-family: Cambria Math;\"> x </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> B </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2369;</span><span style=\"font-family: Cambria Math;\"> 2x </span><span style=\"font-family: Kokila;\">&#2341;&#2368;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">10 </span><span style=\"font-family: Kokila;\">&#2360;&#2366;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2366;&#2342;</span><span style=\"font-family: Cambria Math;\">,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">A </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2369;</span><span style=\"font-family: Cambria Math;\"> = x+10</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">B </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2369;</span><span style=\"font-family: Cambria Math;\"> = 2x+10</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2348;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2360;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\">,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>10</mn></mrow><mrow><mn>2</mn><mi>x</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mn>10</mn></mrow></mfrac><mo>=</mo><mfrac><mn>7</mn><mn>9</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;&rArr;x=4 </span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2309;&#2348;</span><span style=\"font-family: Cambria Math;\">, A </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2369;</span><span style=\"font-family: Cambria Math;\"> = x+10 = 4+ 10 = 14</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">B </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2369;</span><span style=\"font-family: Cambria Math;\"> =2x + 10 = 2 &times; 4 +10= 18</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2313;&#2344;&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2369;</span><span style=\"font-family: Cambria Math;\"> = 14 + 18 = 32 years.</span></p>\n",

                    solution_en: "<p>64.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let present ages of P and Q are = 2x</span><span style=\"font-family: Cambria Math;\"> and 3x</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Five years ago,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Age of P=2</span><span style=\"font-family: Cambria Math;\">x- 5</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Age of Q=3x</span><span style=\"font-family: Cambria Math;\"> - 5</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Acc. to the ques.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>2</mn><mi>x</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>5</mn></mrow><mrow><mn>3</mn><mi>x</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>5</mn></mrow></mfrac><mo>=</mo><mfrac><mn>11</mn><mn>19</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr;x = 8</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Present age of P= 2x</span><span style=\"font-family: Cambria Math;\"> = 2 &times; 8 = 16 yrs</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Present age of Q = 3x</span><span style=\"font-family: Cambria Math;\"> = 3 &times; 8 = 24 yrs</span></p>\n",

                    question_hi: "<p><span style=\"font-family: Cambria Math;\">68.</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2360;&#2381;&#2340;&#2369;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> 10% </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2366;&#2342;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2313;&#2360;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2375;&#2326;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span><span style=\"font-family: Cambria Math;\"> 5% </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> 10% </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2342;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2351;&#2366;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span><span style=\"font-family: Cambria Math;\"> _________</span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\n",
                    options_en: ["<p>20%</p>\n", "<p>10%<span style=\"font-family: Cambria Math;\"> </span></p>\n", 
                                "<p>15%</p>\n", "<p>5%</p>\n"],
                    options_hi: ["<p>20%</p>\n", "<p>10%</p>\n",
                                "<p>15%</p>\n", "<p>5%</p>\n"],
                    solution_en: "<p>68.(d)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let selling price = 100 units </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">New selling price after 10% increase = 110 units</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">When selling price is increased by 10% then profit percentage is 10% that means CP = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>&nbsp;</mo><mn>110</mn></mrow><mn>110</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times;100 = 100 units </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Before increment profit percentage is 5% that means CP =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>100</mn><mn>105</mn></mfrac></math> </span><span style=\"font-family: Cambria Math;\">&times;100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2000</mn><mn>21</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> units </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Percentage increase in cost price =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>100</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mstyle displaystyle=\"true\"><mfrac><mrow><mn>2000</mn><mo>&nbsp;</mo></mrow><mn>21</mn></mfrac></mstyle></mrow><mstyle displaystyle=\"true\"><mfrac><mn>2000</mn><mn>21</mn></mfrac></mstyle></mfrac></math> </span><span style=\"font-family: Cambria Math;\">&times;100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>2100</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>2000</mn></mrow><mrow><mn>2000</mn><mo>&nbsp;</mo></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times;100 = 5%</span></p>\n",
                    solution_hi: "<p>68.(d)</p>\r\n<p><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> = 100 &#2311;&#2325;&#2366;&#2312;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">10% </span><span style=\"font-family: Kokila;\">&#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2366;&#2342;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> = 110 &#2311;&#2325;&#2366;&#2312;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2332;&#2348; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2350;&#2375;&#2306; 15% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2340;&#2379; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; 15% &#2309;&#2352;&#2381;&#2341;&#2366;&#2340; CP</span> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>&nbsp;</mo><mn>110</mn></mrow><mn>110</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times;100 = 100 &#2311;&#2325;&#2366;&#2312;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; 5% &#2361;&#2376; &#2309;&#2352;&#2381;&#2341;&#2366;&#2340; CP&nbsp;</span> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>100</mn><mn>105</mn></mfrac></math> </span><span style=\"font-family: Cambria Math;\">&times;100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>2000</mn><mn>21</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> &#2311;&#2325;&#2366;&#2312;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;&nbsp;</span> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>100</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mstyle displaystyle=\"true\"><mfrac><mrow><mn>2000</mn><mo>&nbsp;</mo></mrow><mn>21</mn></mfrac></mstyle></mrow><mstyle displaystyle=\"true\"><mfrac><mn>2000</mn><mn>21</mn></mfrac></mstyle></mfrac></math> </span><span style=\"font-family: Cambria Math;\">&times;100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>2100</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>2000</mn></mrow><mrow><mn>2000</mn><mo>&nbsp;</mo></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times;100 = 5%</span></p>\n",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "69",
                    section: "17",
                    question_en: "<p>69.<span style=\"font-family: Cambria Math;\"> By selling 25 items, a shopkeeper gains the selling price of 5 items. His gain percentage is:</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">69.</span><span style=\"font-family: Cambria Math;\">25 </span><span style=\"font-family: Kokila;\">&#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2305;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2375;&#2330;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> 5 </span><span style=\"font-family: Kokila;\">&#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2352;&#2366;&#2348;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2360;&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2327;&#2366;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>16</mn><mfrac><mn>1</mn><mn>3</mn></mfrac><mo>%</mo><mo>&nbsp;</mo></math><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>25%</p>\n", 
                                "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>33</mn><mfrac><mn>1</mn><mn>3</mn></mfrac><mo>%</mo><mo>&nbsp;</mo></math><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&nbsp;</mo><mn>16</mn><mfrac><mn>2</mn><mn>3</mn></mfrac><mo>%</mo></math></p>\n"],
                    options_hi: ["<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>16</mn><mfrac><mn>1</mn><mn>3</mn></mfrac><mo>%</mo><mo>&nbsp;</mo></math><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>25%</p>\n",
                                "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>33</mn><mfrac><mn>1</mn><mn>3</mn></mfrac><mo>%</mo></math></p>\n", "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>16</mn><mfrac><mn>2</mn><mn>3</mn></mfrac><mo>%</mo></math></p>\n"],
                    solution_en: "<p>69.(b)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Profit = S.P-C.P</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">5 S.P = 25 S.P - 25 C.P</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">25 C.P = 20 S.P</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>S</mi><mo>.</mo><mi>P</mi></mrow><mrow><mi>C</mi><mo>.</mo><mi>P</mi></mrow></mfrac><mo>=</mo><mfrac><mn>25</mn><mn>20</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Profit % =&nbsp;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>5</mn><mn>20</mn></mfrac></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">&times; 100=25%</span></p>\n",
                    solution_hi: "<p>69.(b)</p>\r\n<p><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> = </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> - </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">5 </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> = 25 </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> - 25 </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">25 </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> = 20 </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2370;&#2354;&#2381;&#2351;</span></p>\r\n<p><span style=\"font-family: Kokila;\"><math style=\"font-family: Verdana;\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>&#2357;&#2367;&#2325;&#2381;&#2352;&#2351;</mi><mo>&nbsp;</mo><mi>&#2350;&#2370;&#2354;&#2381;&#2351;</mi></mrow><mrow><mi>&#2325;&#2381;&#2352;&#2351;</mi><mo>&nbsp;</mo><mi>&#2350;&#2370;&#2354;&#2381;&#2351;</mi></mrow></mfrac><mo>=</mo><mfrac><mn>25</mn><mn>20</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2349;</span><span style=\"font-family: Cambria Math;\"> % =&nbsp;</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>5</mn><mn>20</mn></mfrac></math><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">&times; 100=25%</span></p>\n",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "70",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">70.</span><span style=\"font-family: Cambria Math;\"> The simple interest on Rs.7,500 at 15% p.a. from 28 April to 4 November, </span><span style=\"font-family: Cambria Math;\">approximately is:</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Cambria Math;\">70.</span><span style=\"font-family: Cambria Math;\"> Rs.7,500 </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> 15% </span><span style=\"font-family: Kokila;\">&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> 28 </span><span style=\"font-family: Kokila;\">&#2309;&#2346;&#2381;&#2352;&#2376;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> 4 </span><span style=\"font-family: Kokila;\">&#2344;&#2357;&#2306;&#2348;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2366;&#2343;&#2366;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2327;&#2349;&#2327;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2340;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2379;&#2327;&#2366;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Rs.750.00</p>\n", "<p>Rs.585.6</p>\n", 
                                "<p>Rs.1,095.00</p>\n", "<p>Rs.570.00</p>\n"],
                    options_hi: ["<p>Rs.750.00</p>\n", "<p>Rs.585.6</p>\n",

                    solution_en: "<p>70.(b)</p>\r\n<p><span style=\"font-family: Cambria Math;\">SI on Rs.7,500 at 15% for 6 months and 10 days i.e. 190 days </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 7500 &times; </span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>15</mn><mn>100</mn></mfrac><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mfrac><mn>190</mn><mn>365</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>213750</mn><mn>365</mn></mfrac></math><span style=\"font-family: Cambria Math;\"> = &#8377;585.6</span></p>\n",

#2369;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",

                    options_hi: ["<p>83 <span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2359;</span></p>\n", "<p>76 <span style=\"font-family: Kokila;\">&#2357;&#2352;&#2381;&#2359;</span></p>\n",

                    solution_en: "<p>72.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Average age of 20 students and 1 teacher = 25</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Total sum of the ages of the 20 students and 1 teacher = 25&times;21 = 525</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Sum of the ages of 20 students = 20 &times; 22 = 440</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, age of the teacher = 525 - 440 = 85 years</span></p>\n",
                    solution_hi: "<p>72.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\">20 </span><span style=\"font-family: Kokila;\">&#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 1 </span><span style=\"font-family: Kokila;\">&#2358;&#2367;&#2325;&#2381;&#2359;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2360;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2369;</span><span style=\"font-family: Cambria Math;\"> = 25</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">20 </span><span style=\"font-family: Kokila;\">&#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> 1 </span><span style=\"font-family: Kokila;\">&#2358;&#2367;&#2325;&#2381;&#2359;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2351;&#2369;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2369;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2351;&#2379;&#2327;</span><span style=\"font-family: Cambria Math;\"> = 25&times;21 = 525</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">20 </span><span style=\"font-family: Kokila;\">&#2331;&#2366;                                 "<p>2007</p>\n", "<p>2009</p>\n"],
                    solution_en: "<p>78.(d) <span style=\"font-family: Cambria Math;\"><strong>Suresh Tendulkar Committee </strong><span style=\"font-weight: 400;\">- Expert group constituted by the Planning Commission to review methodology for poverty estimation. Submitted its report in </span><strong>2009</strong><span style=\"font-weight: 400;\">. </span><strong>Other committees on Poverty estimation</strong><span style=\"font-weight: 400;\"> - National Planning Committee (1938), The Bombay Plan (1944), Planning Commission Expert Group (1962), VM Dandekar and N Rath (1971), Alagh Committee (1979), Lakdawala Committee (1993), C Rangarajan Committee (2012).</span></span></p>\n",

                questions.push({
                    id: "81",

                    question_en: "<p>81.<span style=\"font-family: Cambria Math;\"> Which of the following Articles of the Constitution of India is related to the promotion of co-operative societies?</span></p>\n",

                                "<p>31A</p>\n", "<p>31B</p>\n"],

                questions.push({
                    id: "82",
                    section: "18",
                    question_en: "<p>82.<span style=\"font-family: Cambria Math;\"> What was symbolized by hand with a wheel on the palm in Jainism?</span></p>\n",
                    question_hi: "<p>82. <span style=\"font-family: Kokila;\">&#2332;&#2376;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2343;&#2352;&#2381;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2341;&#2375;&#2354;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2325;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2366;&#2341;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2366;&#2341;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2367;&#2360;&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2340;&#2368;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2341;&#2366;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Ahimsa</p>\n", "<p>Dharma</p>\n", 
                                "<p>Prakriti</p>\n", "<p>Nirvana</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2309;&#2361;&#2367;&#2306;&#2360;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2343;&#2352;&#2381;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
                                "<p><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2339;</span></p>\n"],
                    solution_en: "<p>82.(a) <span style=\"font-family: Cambria Math;\"><strong>hand with a wheel</strong><span style=\"font-weight: 400;\"> on the palm </span><strong>symbolizes Ahimsa</strong><span style=\"font-weight: 400;\"> in Jainism. The word in the middle is \"ahi&#7747;s&#257;\" (non-violence). The wheel represents the </span><strong>dharmachakra</strong><span style=\"font-weight: 400;\">, which stands for the resolve to halt the sa&#7747;s&#257;ra through the relentless pursuit of Ahimsa. </span><strong>Jainism </strong><span style=\"font-weight: 400;\">- 24 tirthankaras (supreme preachers of </span><em><span style=\"font-weight: 400;\">Dharma</span></em><span style=\"font-weight: 400;\">) - 1st was </span><strong>Rishabhadeva</strong><strong> </strong><span style=\"font-weight: 400;\">&amp; last was</span><span style=\"font-weight: 400;\"> </span><strong>Mahavira</strong><span style=\"font-weight: 400;\">.&nbsp;</span></span></p>\n",
                    solution_hi: "<p>82.(a)&nbsp; <strong>&#2361;&#2341;&#2375;&#2354;&#2368; &#2346;&#2352; &#2330;&#2325;&#2381;&#2352;</strong><span style=\"font-weight: 400;\"> &#2357;&#2366;&#2354;&#2366; &#2361;&#2366;&#2341; &#2332;&#2376;&#2344; &#2343;&#2352;&#2381;&#2350; &#2350;&#2375;&#2306; </span><strong>&#2309;&#2361;&#2367;&#2306;&#2360;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; </strong><span style=\"font-weight: 400;\">&#2361;&#2376;&#2404; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2358;&#2348;&#2381;&#2342; \"&#2309;&#2361;&#2367;&#2306;&#2360;&#2366;\"&nbsp; &#2361;&#2376;&#2404; &#2346;&#2361;&#2367;&#2351;&#2366; </span><strong>&#2343;&#2352;&#2381;&#2350;&#2330;&#2325;&#2381;&#2352;</strong><span style=\"font-weight: 400;\"> &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2309;&#2361;&#2367;&#2306;&#2360;&#2366; &#2325;&#2368; &#2309;&#2341;&#2325; &#2326;&#2379;&#2332; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2360;&#2306;&#2360;&#2366;&#2352; &#2325;&#2379; &#2352;&#2379;&#2325;&#2344;&#2375; &#2325;&#2366; &#2360;&#2306;&#2325;&#2354;&#2381;&#2346; &#2404;</span></p>\r\n<p><strong>&nbsp;&#2332;&#2376;&#2344; &#2343;&#2352;&#2381;&#2350;</strong><span style=\"font-weight: 400;\"> - 24 &#2340;&#2368;&#2352;&#2381;&#2341;&#2306;&#2325;&#2352; (&#2343;&#2352;&#2381;&#2350; &#2325;&#2375; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2346;&#2381;&#2352;&#2330;&#2366;&#2352;&#2325;) - &#2346;&#2381;&#2352;&#2341;&#2350; </span><strong>&#2315;&#2359;&#2349;&#2342;&#2375;&#2357; </strong><span style=\"font-weight: 400;\">&amp; &#2309;&#2306;&#2340;&#2367;&#2350; </span><strong>&#2350;&#2361;&#2366;&#2357;&#2368;&#2352;</strong><span style=\"font-weight: 400;\"> &#2341;&#2375;&#2404;</span></p>\n",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "83",
                    section: "18",
                    question_en: "<p>83.<span style=\"font-family: Cambria Math;\"> Where did Buddha give the last sermon before his Mahanirvana?</span></p>\n",
                    question_hi: "<p>83. <span style=\"font-family: Kokila;\">&#2350;&#2361;&#2366;&#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2361;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2369;&#2342;&#2381;&#2343;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2306;&#2340;&#2367;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2313;&#2346;&#2342;&#2375;&#2358;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2361;&#2366;&#2305;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2341;&#2366;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Vaishali</p>\n", "<p>Sarnath</p>\n", 
                                "<p>Lumbini</p>\n", "<p>Kushinagar</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Kokila;\">&#2357;&#2376;&#2358;&#2366;&#2354;&#2368;</span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2360;&#2366;&#2352;&#2344;&#2366;&#2341;</span></p>\n",

                    solution_en: "<p>83.(a) <span style=\"font-family: Cambria Math;\">The Buddha delivered his last sermon at </span><span style=\"font-family: Cambria Math;\"><strong>Vaishali</strong> </span><span style=\"font-family: Cambria Math;\">and announced his Nirvana here. Kushinagar- Buddha delivered his last sermon, attained Mahaparinirvana (salvation) in 483 BC and was cremated at Rambhar Stupa. </span><strong><span style=\"font-family: Cambria Math;\">Sarnath</span></strong><span style=\"font-family: Cambria Math;\">, Vaishali, Bihar is the deer park where Gautama Buddha delivered his first sermon or Dhammachakra Pravartan Sutta.</span></p>\n",
