<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>

                                "<p>111</p>\n", "<p>113</p>\n"],
                    solution_en: "<p>.47.(b) Logic : <span style=\"font-family: Cambria Math;\">In the elements of the first column , digits are added to each other until a single digit is obtained, then it is added to the number in the next column, then the result is multiplied by</span><span style=\"font-family: Cambria Math;\"> 11</span></p>\r\n<p><span style=\"font-family: Kohinoor Devanagari;\"><span style=\"font-weight: 400;\">(23, 5, 110) &rArr;</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">2 + 3 + 5 (single digit) </span></span><span style=\"font-family: Cambria Math;\">5 + 5 <span style=\"font-family: Kohinoor Devanagari;\"><span style=\"font-weight: 400;\">&rArr; </span></span></span><span style=\"font-family: Cambria Math;\">10 &times; </span><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\"> = 110 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">( 56 , 9 , 121 )</span><span style=\"font-family: Cambria Math;\">&nbsp;<span style=\"font-family: Kohinoor Devanagari;\"><span style=\"font-weight: 400;\">&rArr; </span></span>5 + 6 = 11 <span style=\"font-family: Kohinoor Devanagari;\"><span style=\"font-weight: 400;\">&rArr;</span></span></span><span style=\"font-family: Cambria Math;\"> 1 + 1 = 2 </span><span style=\"font-family: Kohinoor Devanagari;\"><span style=\"font-weight: 400;\">(single digit) </span></span>+ 9 = 11 &times; <span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\"> = 121</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&nbsp;<span style=\"font-weight: 400;\">(49, 3, </span><strong>77</strong><span style=\"font-weight: 400;\"> ) <span style=\"font-family: Kohinoor Devanagari;\">&rArr;</span> </span>4 + 9 = 13 <span style=\"font-family: Kohinoor Devanagari;\"><span style=\"font-weight: 400;\">&rArr;</span></span></span><span style=\"font-family: Cambria Math;\"> 1 + 3 = 4 (<span style=\"font-weight: 400;\">single digit</span></span><span style=\"font-family: Cambria Math;\">) <span style=\"font-family: Kohinoor Devanagari;\"><span style=\"font-weight: 400;\">&rArr;</span></span></span><span style=\"font-family: Cambria Math;\"> 4 + 3 = 7 &times; </span><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\"> = </span><span style=\"font-family: Cambria Math;\">77</span></p>\n",

                    solution_en: "<p>50. (b) <strong>Given statement:</strong></p>\r\n<p><span style=\"font-family: Cambria Math;\"> V &gt; R &gt; N = U = H &gt; C &lt; G</span></p>\r\n<p><span style=\"font-weight: 400;\">(a) </span>U &gt; G = false (as U = H &gt; C &lt; G) here, there is no relationship between U and G.</p>\r\n<p><span style=\"font-weight: 400;\">(b) N = H = true (as N = U = H)</span></p>\r\n<p><span style=\"font-weight: 400;\">(c) </span>N &gt; V = false (as V &gt; R &gt; N) here, V is <span style=\"font-family: \'Cambria Math\';\">greater than N.</span></p>\r\n<p><span style=\"font-weight: 400;\">(d) </span>R = H = false (as R &gt; N = U = H) here, R is greater than H.</p>\r\n<p><span style=\"font-family: Cambria Math;\">Hence we can say that only option (b) is true.</span></p>\n",

: Kohinoor Devanagari;\"><span style=\"font-weight: 400;\">(b) N = H &rArr; &#2360;&#2340;&#2381;&#2351; (&#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; N = U = H) </span></span></p>\r\n<p>(c) N &gt; V &rArr; <span style=\"font-family: Kohinoor Devanagari;\">&#2309;&#2360;&#2340;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> (</span><span style=\"font-family: Kohinoor Devanagari;\">&#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\"> V &gt; R &gt; N) </span><span style=\"font-family: Kohinoor Devanagari;\">&#2351;&#2361;&#2366;&#2305;</span><span style=\"font-family: Cambria Math;\">, V, N </span><span style=\"font-family: Kohinoor Devanagari;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2348;&#2337;&#2364;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2361;&#2376;&#2404;</span></p>\r\n<p>(d) R = H &rArr; <span style=\"font-family: Kohinoor Devanagari;\">&#2309;&#2360;&#2340;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> (</span><span style=\"font-family: Kohinoor Devanagari;\">&#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\"> R &gt; N = U = H)&nbsp; </span><span style=\"font-family: Kohinoor Devanagari;\">&#2351;&#2361;&#2366;&#2305;</span><span style=\"font-family: Cambria Math;\">, R, H </span><span style=\"font-family: Kohinoor Devanagari;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2348;&#2337;&#2364;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2361;&#2376;</span></p>\r\n<p><span style=\"font-family: Kohinoor Devanagari;\">&#2311;&#2360;&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"                 questions.push({
                    id: "55",
                    section: "17",
                    question_en: "<p><span style=\"font-family: Cambria Math;\">55.</span><span style=\"font-family: Cambria Math;\"> If the average of the following five observations: x + 1, x + 3, x + 5, x + 7 and x + 9 is 20, what is the average of the first three observations?</span></p>\n",
                    question_hi: "<p>55. <span style=\"font-family: Kohinoor Devanagari;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2344;&#2367;&#2350;&#2381;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2346;&#2366;&#2305;&#2330;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> x + 1, x + 3, x + 5, x + 7 </span><span style=\"font-family: Kohinoor Devanagari;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> x + 9 </span><span style=\"font-family: Kohinoor Devanagari;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2324;&#2360;&#2340;</span><span style=\"font-family: Cambria Math;\"> 20 </span><span style=\"font-family: Kohinoor Devanagari;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kohinoor Devanagari;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2346;&#2381;&#2352;&#2341;&#2350;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2340;&#2368;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2324;&#2360;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2325;&#2367;&#2340;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>35</p>\n", "<p>20</p>\n", 
                                "<p>18</p>\n", "<p>16</p>\n"],
                    options_hi: ["<p>35</p>\n", "<p>20</p>\n",
                                "<p>18</p>\n", "<p>16</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">55.(c)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">ATQ,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x + 1 + x + 3 + x + 5 + x + 7 + x + 9 = 20 &times; 5 = 100</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">5x + 25 = 100</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">5x = 100 - 25 = 75</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = 15</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Now, the average of first three observations = </span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>x</mi><mo>+</mo><mn>1</mn><mo>+</mo><mi>x</mi><mo>+</mo><mn>3</mn><mo>+</mo><mi>x</mi><mo>+</mo><mn>5</mn></mrow><mn>3</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><mn>3</mn><mi>x</mi><mo>+</mo><mn>9</mn></mrow><mn>3</mn></mfrac></math> </span><span style=\"font-family: Cambria Math;\"> = x + 3 = 15 + 3 = 18</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">55.(c)</span></p>\r\n<p><span style=\"font-family: Kohinoor Devanagari;\">&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2309;&#2344;&#2369;&#2360;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\">,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x + 1 + x + 3 + x + 5 + x + 7 + x + 9 = 20 &times; 5 = 100</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">5x + 25 = 100</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">5x = 100 - 25 = 75</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = 15</span></p>\r\n<p><span style=\"font-family: Kohinoor Devanagari;\">&#2309;&#2348;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kohinoor Devanagari;\">&#2346;&#2361;&#2354;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2340;&#2368;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2324;&#2360;&#2340;</span><span style=\"font-family: Cambria Math;\"> =</span><span style=\"font-family: Cambria Math;\"> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>x</mi><mo>+</mo><mn>1</mn><mo>+</mo><mi>x</mi><mo>+</mo><mn>3</mn><mo>+</mo><mi>x</mi><mo>+</mo><mn>5</mn></mrow><mn>3</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><mn>3</mn><mi>x</mi><mo>+</mo><mn>9</mn></mrow><mn>3</mn></mfrac></math> </span><span style=\"font-family: Cambria Math;\"> = x + 3 = 15 + 3 = 18</span></p>\n",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({

#2340;&#2368;&#2360;&#2352;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2330;&#2380;&#2341;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2309;&#2306;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2332;&#2381;&#2334;&#2366;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2325;&#2352;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> | </span></p>\n",

                                "<p>Rs 221.80</p>\n", "<p>Rs 215.40</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">56.(b)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">10% =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>10</mn></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the principal = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mn>10</mn><mn>4</mn></msup></math></span><span style=\"font-family: Cambria Math;\">= 10000</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688876158/word/media/image42.png\" width=\"189\" height=\"262\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">Difference between 4th year and 3rd year CI = 100 + 10 + 10 + 1 = 121 units</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">According to the question</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">10000 units = 18000 Rs.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">1 unit = 1.8 Rs.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">121 units = 217.8 Rs.</span></p>\n",

                    solution_en: "<p>65.(b) <strong>Formula used</strong> :</p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">x&sup3;</span><span style=\"font-weight: 400;\">&nbsp;+ </span><span style=\"font-weight: 400;\">y&sup3; </span><span style=\"font-weight: 400;\">+ </span><span style=\"font-weight: 400;\">z&sup3;</span></span><span style=\"font-family: Cambria Math;\">&nbsp;- 3xyz </span><span style=\"font-family: Cambria Math;\">= (x + y + z)[ <span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\">&nbsp;+ </span><span style=\"font-weight: 400;\">y&sup2; </span><span style=\"font-weight: 400;\">+ </span><span style=\"font-weight: 400;\">z&sup2; - (xy + yz + xz)]</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">(x + y + z)&sup2; = [ x&sup2; + y&sup2; + z&sup2; +2(xy + yz + xz)]</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">Now</span>, </span><span style=\"font-family: Cambria Math;\"> </span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>x</mi><mi>y</mi><mo>+</mo><mi>y</mi><mi>z</mi><mo>+</mo><mi>x</mi><mi>z</mi><mo>&nbsp;</mo><mo>=</mo><mfrac><mrow><mo>&nbsp;</mo><mn>100</mn><mo>-</mo><mn>30</mn></mrow><mn>2</mn></mfrac><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mn>70</mn><mn>2</mn></mfrac><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>35</mn></math><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span></p>\r\n<p><span style=\"font-weight: 400;\">&nbsp;So<span style=\"font-family: Cambria Math;\">,&nbsp; </span></span><span style=\"font-weight: 400;\">x&sup3; </span><span style=\"font-weight: 400;\">+ </span><span style=\"font-weight: 400;\">y&sup3; </span><span style=\"font-weight: 400;\">+ </span><span style=\"font-weight: 400;\">z&sup3;</span><span style=\"font-weight: 400;\"> - 3xyz = 10[</span><span style=\"font-w                     solution_en: "<p>88.(a) <strong>Terrace farming</strong><span style=\"font-family: Cambria Math;\"> aided soil conservation. It is a method of growing crops on the sides of hills or mountains by planting on graduated terraces built into the slope. </span><span style=\"font-family: Cambria Math;\"><strong>Nomadic</strong> </span><span style=\"font-family: Cambria Math;\">farming is farming adapted by people who are not permanent residents of an area and who keep on moving. Planting rows of trees on one side of an area prevents the wind from eroding the soil, are called </span><span style=\"font-family: Cambria Math;\"><strong>shelter belts. Hydroponic farming</strong> </span><span style=\"font-family: Cambria Math;\">is a system of growing crops without soil, often called soilless farming.</span></p>\n",

tyle=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2351;&#2361;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2330;&#2367;&#2340;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><strong><span style=\"font-family: Kohinoor Devanagari;\">&#2352;&#2366;&#2332;&#2366;</span></strong><span style=\"font-family: Cambria Math;\"> </span><strong><span style=\"font-family: Kohinoor Devanagari;\">&#2344;&#2366;&#2352;&#2366;</span></strong><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2346;&#2340;&#2381;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2342;&#2350;&#2351;&#2306;&#2340;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2324;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2346;&#2381;&#2352;&#2375;&#2350;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2346;&#2325;&#2381;&#2359;&#2368;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kohinoor Devanagari;\">&#2357;&#2352;&#2381;&#2350;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2340;&#2375;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2310;&#2343;&#2366;&#2352;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2350;&#2361;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2350;&#2361;&#2366;&#2325;&#2366;&#2357;&#2381;&#2351;</span><span style=\"font-family: Cambria Math;\"> \"</span><span style=\"font-family: Kohinoor Devanagari;\">&#2350;&#2361;&#2366;&#2349;&#2366;&#2352;&#2340;</span><span style=\"font-family: Cambria Math;\">\" </span><span style=\"font-family: Kohinoor Devanagari;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2342;&#2367;&#2326;&#2366;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kohinoor Devanagari;\">&#2361;&#2376;&#2404;</span></p>\n",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
            
            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();
        }
        
        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML - more compact
            let html = `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="question-text mb-3">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        <div class="options">`;
                        
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = 'option-label';
                
                // When reviewing, highlight user's choice and correct answer
                if (submitted) {
                    if (opt === question.correct) {
                        optionClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[question.id] === opt && opt !== question.correct) {
                        optionClass += ' border-danger bg-danger bg-opacity-10';
                    }
                }
                
                html += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${answers[question.id] === opt ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <label class="form-check-label w-100 ${optionClass}" for="opt-${index}-${opt}">
                            ${submitted && opt === question.correct ? '<i class="fas fa-check-circle text-success me-1"></i>' : ''}
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const alertClass = isCorrect ? 'alert-success' : 'alert-danger';
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="alert ${alertClass} mt-3 py-2">
                        <strong>${resultText}</strong>
                        <div class="mt-1 small">
                            <strong>Solution:</strong>
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
        function nextQuestion() { if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
            
            // Update button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('main-content');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                if (window.innerWidth >= 992) {
                    content.classList.add('with-nav');
                }
            } else {
                nav.classList.remove('show');
                if (window.innerWidth >= 992) {
                    content.classList.remove('with-nav');
                }
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer - compact
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            if (confirm(`You have attempted ${attempted} of ${questions.length} questions.
${remaining} questions are unattempted.

Are you sure you want to submit?`)) {
                submitTest();
            }
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.replace('btn-light', 'btn-success');
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
        
        // Add event listener for window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                if (document.getElementById('question-nav').classList.contains('show')) {
                    document.getElementById('main-content').classList.add('with-nav');
                }
            } else {
                document.getElementById('main-content').classList.remove('with-nav');
            }
        });
    </script>
</body>
</html>
