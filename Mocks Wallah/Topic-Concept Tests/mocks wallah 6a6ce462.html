<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">22:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 25</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">25</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Questions data
        const questions = [];
        const sections = {};
        let currentLang = "en";
        let currentQuestion = 0;
        let answers = {};
        let submitted = false;
        let totalTime = 22 * 60;
        let resultsModal;
        
        // Initialize the test
        window.onload = function() {
            initializeTest();
            startTimer();
            resultsModal = new bootstrap.Modal(document.getElementById('results-modal'));
            
            // If on desktop, show the question navigation by default
            if (window.innerWidth >= 992) {
                document.getElementById('question-nav').classList.add('show');
                document.getElementById('main-content').classList.add('with-nav');
            }
        };
        
        // Initialize test data
        function initializeTest() {
            // Add sections and questions
            
            sections["17"] = {
                name: "Quantitative Aptitude",
                start: 0,
                end: 23
            };
            
            document.getElementById('section-selector').innerHTML += 
                `<option value="17">Quantitative Aptitude</option>`;
            
            sections["misc"] = {
                name: "Miscellaneous",
                start: 24,
                end: 24
            };
            
            document.getElementById('section-selector').innerHTML += 
                `<option value="misc">Miscellaneous</option>`;
            
            
                questions.push({
                    id: "1",
                    section: "17",
                    question_en: "<p>Directions(1-4): The given table shows the number (in %)of employees working in different departments of an organization.The table also shows the ratio of males and females and ratio of employees living in city Z and employees living in city Y. The total number of employees in the organization are 80000.</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1626503650/word/media/image1.png\" /></p>\r\n<p><span style=\"font-family: Times New Roman;\">Q1. How many employees of department A and C together are living in city Z? </span></p>",
                    question_hi: "<p><span style=\"font-family: Baloo;\">दिशा निर्देश (1-4): दी गई तालिका में एक संगठन के विभिन्न विभागों में कार्य कर रहे कर्मचारियों की संख्या (प्रतिशत में) को दर्शाया गया है | यह तालिका पुरुषों तथा महिलाओं के अनुपात को तथा शहर Z में रह रहे कर्मचारियों तथा शहर Y में रह रहे कर्मचारियों के अनुपात को भी दर्शाती है | संगठन में कुल कर्मचारियों की संख्या 80000 है| </span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1626503650/word/media/image1.png\" /></p>\r\n<p><span style=\"font-family: Baloo;\">1. विभाग A तथा C के कितने कर्मचारी,शहर Z में साथ मिलकर रह रहे हैं?</span></p>",
                    options_en: ["<p>9000</p>", "<p>9200</p>", 
                                "<p>8800</p>", "<p>8200</p>"],
                    options_hi: ["<p>9000</p>", "<p>9200</p>",
                                "<p>8800</p>", "<p>8200</p>"],
                    solution_en: "<p><span style=\"font-family: Times New Roman;\">(c) 8800</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Employees of dept. A living in Z = 80000<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mfrac><mn>10</mn><mn>100</mn></mfrac><mo>&#215;</mo><mfrac><mn>1</mn><mn>10</mn></mfrac></math> </span><span style=\"font-family: Times New Roman;\"> = 800</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Employees of dept. C living in Z = 80000<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mfrac><mn>12</mn><mn>100</mn></mfrac><mo>&#215;</mo><mfrac><mn>5</mn><mn>6</mn></mfrac></math> </span><span style=\"font-family: Times New Roman;\"> = 8000</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Total = 800 + 8000 = 8800</span></p>",
                    solution_hi: "<p><span style=\"font-family: Times New Roman;\">(c) 8800</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">विभाग A का&nbsp; कर्मचारी Z में रहने वाला= 80000<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mfrac><mn>10</mn><mn>100</mn></mfrac><mo>&#215;</mo><mfrac><mn>1</mn><mn>10</mn></mfrac></math> </span><span style=\"font-family: Times New Roman;\"> = 800</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">विभाग C का&nbsp; कर्मचारी Z में रहने वाला = 80000<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mfrac><mn>12</mn><mn>100</mn></mfrac><mo>&#215;</mo><mfrac><mn>5</mn><mn>6</mn></mfrac></math> </span><span style=\"font-family: Times New Roman;\"> = 8000</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">कुल= 800 + 8000 = 8800</span></p>",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "2",
                    section: "17",
                    question_en: "<p>Directions(1-4): The given table shows the number (in %)of employees working in different departments of an organization.The table also shows the ratio of males and females and ratio of employees living in city Z and employees living in city Y. The total number of employees in the organization are 80000.</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1626503650/word/media/image1.png\" /></p>\r\n<p><span style=\"font-family: Times New Roman;\">Q2. Male employees of department E is what percent of the employees living in city Z from department A? </span></p>",
                    question_hi: "<p><span style=\"font-family: Baloo;\">दिशा निर्देश (1-4): दी गई तालिका में एक संगठन के विभिन्न विभागों में कार्य कर रहे कर्मचारियों की संख्या (प्रतिशत में) को दर्शाया गया है | यह तालिका पुरुषों तथा महिलाओं के अनुपात को तथा शहर Z में रह रहे कर्मचारियों तथा शहर Y में रह रहे कर्मचारियों के अनुपात को भी दर्शाती है | संगठन में कुल कर्मचारियों की संख्या 80000 है| </span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1626503650/word/media/image1.png\" /></p>\r\n<p><span style=\"font-family: Baloo;\">2. विभाग E के पुरुष कर्मचारी,विभाग A से शहर Z में रह रहे कर्मचारियों का कितने प्रतिशत है?</span></p>",
                    options_en: ["<p>1600</p>", "<p>2400</p>", 
                                "<p>3200</p>", "<p>4200</p>"],
                    options_hi: ["<p>1600</p>", "<p>2400</p>",
                                "<p>3200</p>", "<p>4200</p>"],
                    solution_en: "<p><span style=\"font-family: Times New Roman;\">(c) 3200</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Male employees of dept E =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>80000</mn><mo>&#215;</mo><mfrac><mn>8</mn><mn>9</mn></mfrac><mo>&#215;</mo><mfrac><mn>36</mn><mn>100</mn></mfrac><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>25</mn><mo>,</mo><mn>600</mn><mspace linebreak=\"newline\"/></math></span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Employees of dept. A living in Z = 80000<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mfrac><mn>10</mn><mn>100</mn></mfrac><mo>&#215;</mo><mfrac><mn>1</mn><mn>10</mn></mfrac></math> </span><span style=\"font-family: Times New Roman;\"> = 800</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Percentage =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>25600</mn><mn>800</mn></mfrac><mo>&#215;</mo><mn>100</mn></math> = 3200</span></p>",
                    solution_hi: "<p><span style=\"font-family: Times New Roman;\">(c) 3200</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">विभाग&nbsp; E के पुरुष कर्मचारी= <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>80000</mn><mo>&#215;</mo><mfrac><mn>8</mn><mn>9</mn></mfrac><mo>&#215;</mo><mfrac><mn>36</mn><mn>100</mn></mfrac><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>25</mn><mo>,</mo><mn>600</mn><mspace linebreak=\"newline\"></mspace></math></span></p>\r\n<p><span style=\"font-family: Times New Roman;\">विभाग A का&nbsp; कर्मचारी Z में रहने वाला = 80000<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mfrac><mn>10</mn><mn>100</mn></mfrac><mo>&#215;</mo><mfrac><mn>1</mn><mn>10</mn></mfrac></math> </span><span style=\"font-family: Times New Roman;\"> = 800</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">प्रतिशत = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>25600</mn><mn>800</mn></mfrac><mo>&#215;</mo><mn>100</mn></math> = 3200</span></p>",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "3",
                    section: "17",
                    question_en: "<p>Directions(1-4): The given table shows the number (in %)of employees working in different departments of an organization.The table also shows the ratio of males and females and ratio of employees living in city Z and employees living in city Y. The total number of employees in the organization are 80000.</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1626503650/word/media/image1.png\" /></p>\r\n<p><span style=\"font-family: Times New Roman;\">Q3. What is the ratio of male employee working in department B and D together to female employee working in department A and E together? </span></p>",
                    question_hi: "<p><span style=\"font-family: Baloo;\">दिशा निर्देश (1-4): दी गई तालिका में एक संगठन के विभिन्न विभागों में कार्य कर रहे कर्मचारियों की संख्या (प्रतिशत में) को दर्शाया गया है | यह तालिका पुरुषों तथा महिलाओं के अनुपात को तथा शहर Z में रह रहे कर्मचारियों तथा शहर Y में रह रहे कर्मचारियों के अनुपात को भी दर्शाती है | संगठन में कुल कर्मचारियों की संख्या 80000 है| </span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1626503650/word/media/image1.png\" /></p>\r\n<p><span style=\"font-family: Baloo;\">3. विभाग B तथा D को मिलाकर कार्य कर रहे पुरुष कर्मचारियों का विभाग A तथा E को मिलाकर कार्य कर रही महिला कर्मचारियों से क्या अनुपात है?</span></p>",
                    options_en: ["<p>13 : 8</p>", "<p>25 : 7</p>", 
                                "<p>23 : 9</p>", "<p>7 : 9</p>"],

#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332;</mi><mo>&#160;</mo><mi>&#2325;&#2368;</mi><mo>&#160;</mo><mi>&#2314;&#2305;&#2330;&#2366;&#2312;</mi><mspace linebreak=\"newline\"></mspace><mfrac><mn>5</mn><mn>7</mn></mfrac><mo>=</mo><mo>&#160;</mo><mfrac><mrow><mfrac><mn>1</mn><mn>2</mn></mfrac><mo>&#215;</mo><msub><mi>b</mi><mn>1</mn></msub><mo>&#215;</mo><mn>7</mn></mrow><mrow><mfrac><mn>1</mn><mn>2</mn></mfrac><mo>&#215;</mo><msub><mi>b</mi><mn>2</mn></msub><mo>&#215;</mo><mn>9</mn></mrow></mfrac><mspace linebreak=\"newline\"></mspace><msub><mi>b</mi><mn>1</mn></msub><mo>:</mo><msub><mi>b</mi><mn>2</mn></msub><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>45</mn><mo>&#160;</mo><mo>:</mo><mo>&#160;</mo><mn>49</mn></math></span></p>",

                questions.push({
                    id: "9",
                    section: "17",
                    question_en: "<p>9. If a + b + c = 15 and ab + bc + ca = 71, <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>a</mi><mn>3</mn></msup><mo>+</mo><msup><mi>b</mi><mn>3</mn></msup><mo>+</mo><msup><mi>c</mi><mn>3</mn></msup><mo>-</mo><mn>3</mn><mi>a</mi><mi>b</mi><mi>c</mi></math> <span style=\"font-family: Times New Roman;\">is equal to: </span></p>\n",
                    question_hi: "<p><span style=\"font-family: Baloo;\">9. यदि a + b + c = 15 है और ab + bc + ca = 71 है, तो <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>a</mi><mn>3</mn></msup><mo>+</mo><msup><mi>b</mi><mn>3</mn></msup><mo>+</mo><msup><mi>c</mi><mn>3</mn></msup><mo>-</mo><mn>3</mn><mi>a</mi><mi>b</mi><mi>c</mi></math></span><span style=\"font-family: Baloo;\"> का मान क्या होगा ? </span></p>",
                    options_en: ["<p>165</p>\n", "<p>170</p>\n", 
                                "<p>180</p>\n", "<p>195</p>\n"],
                    options_hi: ["<p>165</p>", "<p>170</p>",
                                "<p>180</p>", "<p>195</p>"],
                    solution_en: "<p><span style=\"font-family: Times New Roman;\">(c) Put </span></p>\r\n<p><span style=\"font-family: Times New Roman;\">a=7, b=5 and c=3</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">a+b+c = 15 </span><span style=\"font-family: Times New Roman;\">7+5+3=15</span></p>\r\n<p><span style=\"font-family: Times New Roman;\"> </span><span style=\"font-family: Times New Roman;\">15 = 15</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">ab + bc + ca = 71</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">(7<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&times;</mo><mn>5</mn></math></span><span style=\"font-family: Times New Roman;\">)+(5<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&times;</mo><mn>3</mn></math></span><span style=\"font-family: Times New Roman;\">)+(3<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&times;</mo><mn>7</mn></math></span><span style=\"font-family: Times New Roman;\">) = 71</span></p>\r\n<p><span style=\"font-family: Times New Roman;\"> </span><span style=\"font-family: Times New Roman;\">71 = 71</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Both the conditions are satisfied. </span></p>\r\n<p><span style=\"font-family: Times New Roman;\"> </span><span style=\"font-family: Times New Roman;\">&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>a</mi><mn>3</mn></msup><mo>+</mo><msup><mi>b</mi><mn>3</mn></msup><mo>+</mo><msup><mi>c</mi><mn>3</mn></msup><mo>-</mo><mn>3</mn><mi>a</mi><mi>b</mi><mi>c</mi><mo>&nbsp;</mo><mo>&rArr;</mo><msup><mn>7</mn><mn>3</mn></msup><mo>+</mo><msup><mn>5</mn><mn>3</mn></msup><mo>+</mo><msup><mn>3</mn><mn>3</mn></msup><mo>-</mo><mn>3</mn><mo>(</mo><mn>7</mn><mo>&times;</mo><mn>5</mn><mo>&times;</mo><mn>3</mn><mo>)</mo><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>180</mn></math></span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Alternate :</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">We know that, </span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mrow><mo>(</mo><mi>a</mi><mo>+</mo><mi>b</mi><mo>+</mo><mi>c</mi><mo>)</mo></mrow><mn>2</mn></msup><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><msup><mi>a</mi><mn>2</mn></msup><mo>+</mo><msup><mi>b</mi><mn>2</mn></msup><mo>+</mo><msup><mi>c</mi><mn>2</mn></msup><mo>+</mo><mo>&nbsp;</mo><mn>2</mn><mo>&nbsp;</mo><mo>(</mo><mi>a</mi><mi>b</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>b</mi><mi>c</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>c</mi><mi>a</mi><mo>)</mo><mo>&nbsp;</mo><mo>&hellip;</mo><mo>.</mo><mo>.</mo><mo>(</mo><mn>1</mn><mo>)</mo><mspace linebreak=\"newline\"></mspace><msup><mi>a</mi><mn>3</mn></msup><mo>+</mo><msup><mi>b</mi><mn>3</mn></msup><mo>+</mo><msup><mi>c</mi><mn>3</mn></msup><mo>-</mo><mn>3</mn><mi>a</mi><mi>b</mi><mi>c</mi><mo>&nbsp;</mo><mo>=</mo><mo>=</mo><mo>&nbsp;</mo><mo>[</mo><mi>a</mi><mo>+</mo><mi>b</mi><mo>+</mo><mi>c</mi><mo>]</mo><mo>[</mo><mo>&#119886;</mo><mn>2</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mo>&#119887;</mo><mn>2</mn><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mo>&#119888;</mo><mn>2</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>a</mi><mi>b</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>b</mi><mi>c</mi><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mi>c</mi><mi>a</mi><mo>)</mo><mo>]</mo><mo>&nbsp;</mo><mo>&hellip;</mo><mo>.</mo><mo>(</mo><mn>2</mn><mo>)</mo><mspace linebreak=\"newline\"></mspace><mi>P</mi><mi>u</mi><mi>t</mi><mo>&nbsp;</mo><mi>t</mi><mi>h</mi><mi>e</mi><mo>&nbsp;</mo><mi>g</mi><mi>i</mi><mi>v</mi><mi>e</mi><mi>n</mi><mo>&nbsp;</mo><mi>v</mi><mi>a</mi><mi>l</mi><mi>u</mi><mi>e</mi><mi>s</mi><mo>&nbsp;</mo><mi>i</mi><mi>n</mi><mo>&nbsp;</mo><mi>e</mi><mi>q</mi><mo>&nbsp;</mo><mo>(</mo><mn>1</mn><mo>)</mo><mspace linebreak=\"newline\"></mspace><msup><mrow><mo>(</mo><mi>a</mi><mo>+</mo><mi>b</mi><mo>+</mo><mi>c</mi><mo>)</mo></mrow><mn>2</mn></msup><mo>=</mo><msup><mi>a</mi><mrow><mn>2</mn></mrow></msup><mo>+</mo><msup><mi>b</mi><mrow><mn>2</mn></mrow></msup><mo>+</mo><msup><mi>c</mi><mn>2</mn></msup><mo>+</mo><mn>2</mn><mo>(</mo><mi>a</mi><mi>b</mi><mo>+</mo><mi>b</mi><mi>c</mi><mo>+</mo><mi>c</mi><mi>a</mi><mo>)</mo><mo>&rArr;</mo><mspace linebreak=\"newline\"></mspace><msup><mn>15</mn><mn>2</mn></msup><mo>=</mo><msup><mi>a</mi><mn>2</mn></msup><mo>+</mo><msup><mi>b</mi><mn>2</mn></msup><mo>+</mo><msup><mi>c</mi><mn>2</mn></msup><mo>+</mo><mn>2</mn><mo>(</mo><mn>71</mn><mo>)</mo><mspace linebreak=\"newline\"></mspace><msup><mi>a</mi><mn>2</mn></msup><mo>+</mo><msup><mi>b</mi><mn>2</mn></msup><mo>+</mo><msup><mi>c</mi><mn>2</mn></msup><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>83</mn><mspace linebreak=\"newline\"></mspace><mi>N</mi><mi>o</mi><mi>w</mi><mo>&nbsp;</mo><mi>p</mi><mi>u</mi><mi>t</mi><mo>&nbsp;</mo><mi>t</mi><mi>h</mi><mi>e</mi><mo>&nbsp;</mo><mi>g</mi><mi>i</mi><mi>v</mi><mi>e</mi><mi>n</mi><mo>&nbsp;</mo><mi>v</mi><mi>a</mi><mi>l</mi><mi>u</mi><mi>e</mi><mi>s</mi><mo>&nbsp;</mo><mi>i</mi><mi>n</mi><mo>&nbsp;</mo><mi>e</mi><mi>q</mi><mo>&nbsp;</mo><mo>(</mo><mn>2</mn><mo>)</mo><mspace linebreak=\"newline\"></mspace><msup><mi>a</mi><mn>3</mn></msup><mo>+</mo><msup><mi>b</mi><mn>3</mn></msup><mo>+</mo><msup><mi>c</mi><mn>3</mn></msup><mo>-</mo><mn>3</mn><mi>a</mi><mi>b</mi><mi>c</mi><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mo>[</mo><mn>15</mn><mo>]</mo><mo>[</mo><mn>83</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mn>71</mn><mo>]</mo><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mo>&rArr;</mo><msup><mi>a</mi><mn>3</mn></msup><mo>+</mo><msup><mi>b</mi><mn>3</mn></msup><mo>+</mo><msup><mi>c</mi><mn>3</mn></msup><mo>-</mo><mn>3</mn><mi>a</mi><mi>b</mi><mi>c</mi><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mo>(</mo><mn>15</mn><mo>)</mo><mo>(</mo><mn>12</mn><mo>)</mo><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>180</mn><mspace linebreak=\"newline\"></mspace></math></p>\n",
                    solution_hi: "<p><span style=\"font-family: Times New Roman;\">(c)&nbsp;</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">a=7, b=5 और&nbsp; c=3,रखने पर&nbsp;</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">a+b+c = 15 </span><span style=\"font-family: Times New Roman;\">7+5+3=15</span></p>\r\n<p><span style=\"font-family: Times New Roman;\"> </span><span style=\"font-family: Times New Roman;\">15 = 15</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">ab + bc + ca = 71</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">(7<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mn>5</mn></math></span><span style=\"font-family: Times New Roman;\">)+(5<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mn>3</mn></math></span><span style=\"font-family: Times New Roman;\">)+(3<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mn>7</mn></math></span><span style=\"font-family: Times New Roman;\">) = 71</span></p>\r\n<p><span style=\"font-family: Times New Roman;\"> </span><span style=\"font-family: Times New Roman;\">71 = 71</span></p>\r\n<p>दोनों शर्तें संतुष्ट हैं।</p>\r\n<p><span style=\"font-family: Times New Roman;\"> </span><span style=\"font-family: Times New Roman;\">&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>a</mi><mn>3</mn></msup><mo>+</mo><msup><mi>b</mi><mn>3</mn></msup><mo>+</mo><msup><mi>c</mi><mn>3</mn></msup><mo>-</mo><mn>3</mn><mi>a</mi><mi>b</mi><mi>c</mi><mo>&#160;</mo><mo>&#8658;</mo><msup><mn>7</mn><mn>3</mn></msup><mo>+</mo><msup><mn>5</mn><mn>3</mn></msup><mo>+</mo><msup><mn>3</mn><mn>3</mn></msup><mo>-</mo><mn>3</mn><mo>(</mo><mn>7</mn><mo>&#215;</mo><mn>5</mn><mo>&#215;</mo><mn>3</mn><mo>)</mo><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>180</mn></math></span></p>\r\n<p>वैकल्पिक</p>\r\n<p>हम जानते हैं कि,</p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mrow><mo>(</mo><mi>a</mi><mo>+</mo><mi>b</m                     correct: "c",

                questions.push({
                    id: "10",
                    section: "17",
                    question_en: "<p>10. While selling a watch, a shopkeeper gives a discount of 15%. If he gives a discount of 20%, he earns Rs. 51 less as profit. What is the original price of the watch?</p>",
                    question_hi: "<p><span style=\"font-family: Baloo;\">10. घड़ी बेचते समय, एक दुकानदार 15% की छूट देता है। यदि वह 20% की छूट देता है, तो वह लाभ के रूप में 51 रूपये कम कमाता है। घड़ी का वास्तविक मूल्य क्या है?</span></p>",
                    options_en: ["<p>Rs. 920</p>", "<p>Rs. 985</p>", 
                                "<p>Rs. 1125</p>", "<p>Rs. 1020</p>"],
                    options_hi: ["<p>Rs. 920</p>", "<p>Rs. 985</p>",
                                "<p>Rs. 1125</p>", "<p>Rs. 1020</p>"],
                    solution_en: "<p><span style=\"font-family: Times New Roman;\">(d) Let the marked price be Rs. x</span><span style=\"font-family: Times New Roman;\">.\'. </span></p>\r\n<p><span style=\"font-family: Times New Roman;\">First S.P. = 85% of Rs. </span><span style=\"font-family: Times New Roman;\">x = Rs. 0.85x</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Second S.P. = 80% of Rs. x = Rs, 0.8x</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">According to the question,</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">0.85x- 0.8x = 51 = x = 51/0.05 = Rs.1020</span></p>",
                    solution_hi: "<p><span style=\"font-family: Times New Roman;\">(d)माना अंकित मूल्य&nbsp; = x</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">विक्रय मूल्य. = 85% का&nbsp; Rs. </span><span style=\"font-family: Times New Roman;\">x = Rs. 0.85x</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">विक्रय मूल्य = 80% का&nbsp; Rs. x = Rs, 0.8x</span></p>\r\n<p>प्रश्न के अनुसार</p>\r\n<p><span style=\"font-family: Times New Roman;\">0.85x- 0.8x = 51 = x = 51/0.05 = Rs.1020</span></p>",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "11",
                    section: "17",
                    question_en: "<p>11. In a school there are 250 students out of whom 12 percent are girls. Each girl\'s monthly fee is Rs.450 and each boy&rsquo;s monthly fee is 24 percent more than a girl. What is the total monthly fee of girls and boys together?</p>",
                    question_hi: "<p><span style=\"font-family: Baloo;\">11. एक विद्यालय में 250 छात्र हैं जिनमें से 12 प्रतिशत लड़कियां हैं | प्रत्येक लड़की का </span><span style=\"font-family: Baloo;\">मासिक</span><span style=\"font-family: Baloo;\"> शुल्क 450 रुपये है और प्रत्येक लड़के का </span><span style=\"font-family: Baloo;\">मासिक</span><span style=\"font-family: Baloo;\"> शुल्क एक लड़की के </span><span style=\"font-family: Baloo;\">मासिक</span><span style=\"font-family: Baloo;\"> शुल्क से 24 प्रतिशत अधिक है | लड़के एवं लड़कियों को मिलाकर कुल </span><span style=\"font-family: Baloo;\">मासिक</span><span style=\"font-family: Baloo;\"> शुल्क ज्ञात करें | </span></p>",
                    options_en: ["<p>Rs.136620</p>", "<p>Rs.136260</p>", 
                                "<p>Rs.132660</p>", "<p>Rs.132460</p>"],
                    options_hi: ["<p>Rs.136620</p>", "<p>Rs.136260</p>",
                                "<p>Rs.132660</p>", "<p>Rs.132460</p>"],
                    solution_en: "<p><span style=\"font-family: Times New Roman;\">(b) Number of students = 250<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mfrac><mn>12</mn><mn>100</mn></mfrac></math></span><span style=\"font-family: Times New Roman;\">= 30</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Number of boys = 250-30 = 220</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Monthly fee of a boy = 450<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mfrac><mn>124</mn><mn>100</mn></mfrac></math></span><span style=\"font-family: Times New Roman;\">= 558</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Total monthly fee of all the students = 30<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mn>450</mn><mo>+</mo><mn>220</mn><mo>&#215;</mo><mn>558</mn></math> </span><span style=\"font-family: Times New Roman;\">= 136260</span></p>",
                    solution_hi: "<p><span style=\"font-family: Times New Roman;\">(b) छात्रों की संख्या 250<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mfrac><mn>12</mn><mn>100</mn></mfrac></math></span><span style=\"font-family: Times New Roman;\">= 30</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">लड़कों की संख्या = 250-30 = 220</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">लड़के की मासिक फीस = 450<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mfrac><mn>124</mn><mn>100</mn></mfrac></math></span><span style=\"font-family: Times New Roman;\">= 558</span></p>\r\n<p><span style=\"font-family: Times New Roman;\"><br />सभी विद्यार्थियों की कुल मासिक फीस= 30<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo><mn>450</mn><mo>+</mo><mn>220</mn><mo>&#215;</mo><mn>558</mn></math> </span><span style=\"font-family: Times New Roman;\">= 136260</span></p>",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "12",
                    section: "17",
                    question_en: "<p>12. in a circle, chords AB and CD intersect each other at E. If CD = 16 cm, DE = 4 cm and AE = 12 cm, then BE = ?</p>",
                    question_hi: "<p><span style=\"font-family: Baloo;\">12. एक वृत्त में, जीवाएँ AB और CD एक-दूसरे को E पर काटती हैं | यदि CD = 16 सेमी, DE = 4 सेमी और AE = 12 सेमी है, तो BE = ? </span></p>",
                    options_en: ["<p>6 cm</p>", "<p>5 cm</p>",

                    options_hi: ["<p>6 cm</p>", "<p>5 cm</p>",
                                "<p>4.5 cm</p>", "<p>4 cm</p>"],
                    solution_en: "<p><span style=\"font-family: Times New Roman;\">(d) Given, CD = 16 cm, DE = 4 cm and AE = 12 cm</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">CE = CD - DE = 16-4 = 12 cm</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1626503650/word/media/image3.png\" /></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>W</mi><mi>e</mi><mo>&#160;</mo><mi>k</mi><mi>n</mi><mi>o</mi><mi>w</mi><mo>&#160;</mo><mi>t</mi><mi>h</mi><mi>a</mi><mi>t</mi><mo>&#160;</mo><mo>&#160;</mo><mspace linebreak=\"newline\"/><mi>A</mi><mi>E</mi><mo>&#215;</mo><mi>E</mi><mi>B</mi><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mi>C</mi><mi>E</mi><mo>&#215;</mo><mi>E</mi><mi>D</mi><mo>&#160;</mo><mo>&#160;</mo><mspace linebreak=\"newline\"/><mn>12</mn><mo>&#215;</mo><mi>E</mi><mi>B</mi><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>12</mn><mo>&#215;</mo><mn>4</mn><mo>&#160;</mo><mo>&#160;</mo><mspace linebreak=\"newline\"/><mi>E</mi><mi>B</mi><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>4</mn><mo>&#160;</mo><mi>c</mi><mi>m</mi></math></p>",
                    solution_hi: "<p><span style=\"font-family: Times New Roman;\">(d) दिया है , CD = 16 cm, DE = 4 cm और&nbsp; AE = 12 cm</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">CE = CD - DE = 16-4 = 12 cm</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1626503650/word/media/image3.png\" /></p>\r\n<p><math style=\"font-family:Verdana\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>&#2361;&#2350;</mi><mo>&#160;</mo><mi>&#2332;&#2366;&#2344;&#2340;&#2375;</mi><mo>&#160;</mo><mi>&#2361;&#2376;&#2306;</mi><mo>&#160;</mo><mi>&#2325;&#2367;</mi><mo>&#160;</mo><mspace linebreak=\"newline\"/><mi>A</mi><mi>E</mi><mo>&#215;</mo><mi>E</mi><mi>B</mi><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mi>C</mi><mi>E</mi><mo>&#215;</mo><mi>E</mi><mi>D</mi><mo>&#160;</mo><mo>&#160;</mo><mspace linebreak=\"newline\"/><mn>12</mn><mo>&#215;</mo><mi>E</mi><mi>B</mi><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>12</mn><mo>&#215;</mo><mn>4</mn><mo>&#160;</mo><mo>&#160;</mo><mspace linebreak=\"newline\"/><mi>E</mi><mi>B</mi><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>4</mn><mo>&#160;</mo><mi>c</mi><mi>m</mi></math></p>",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "13",
                    section: "17",
                    question_en: "<p>13. The ratio of square of a number and the reciprocal of its cube is&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1024</mn><mn>59049</mn></mfrac></math> <span style=\"font-family: Times New Roman;\">. What is the number. </span></p>",
                    question_hi: "<p><span style=\"font-family: Baloo;\">13. किसी संख्या के वर्ग तथा इसके घन के पारस्परिक ( reciprocal ) का अनुपात&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1024</mn><mn>59049</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Baloo;\"> है | यह संख्या कौन सी है ? </span></p>",
                    options_en: ["<p>9/4</p>", "<p><span style=\"font-family: Times New Roman;\">7/3</span></p>",

                    options_hi: ["<p>96</p>", "<p>110</p>",

                    solution_en: "<p><span style=\"font-family: Times New Roman;\">(d) Let the given triangle is </span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1626503650/word/media/image4.png\" /></p>\r\n<p><span style=\"font-family: Times New Roman;\">Here, AD is perpendicular drawn to the side BC</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Let other two sides (AB=AC) = S</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">According to question</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">18+2S = 48</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">S= 15</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">BD </span><span style=\"font-family: Times New Roman;\">= 9, AD =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><msup><mn>15</mn><mn>2</mn></msup><mo>-</mo><msup><mn>9</mn><mn>2</mn></msup></msqrt><mo>=</mo><mn>12</mn></math></span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Area of ABC =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>2</mn></mfrac><mo>&#215;</mo><mi>A</mi><mi>D</mi><mo>&#215;</mo><mi>B</mi><mi>C</mi><mo>=</mo><mfrac><mn>1</mn><mn>2</mn></mfrac><mo>&#215;</mo><mn>12</mn><mo>&#215;</mo><mn>18</mn><mo>=</mo><mn>108</mn><mo>&#160;</mo><mi>c</mi><mi>m</mi></math></span></p>",

                questions.push({
                    id: "25",
                    section: "misc",
                    question_en: "<p>25. Mohan starts walking at 8 kmph and after 3.5 hours, Vishal starts cycling from the same point as that of Mohan, in the same direction at 13 kmph. After how much distance from the starting point will Vishal catch up with Mohan (correct to one decimal places)?</p>",
                    question_hi: "<p><span style=\"font-family: Baloo;\">25. मोहन 8 किमी/घंटा की चाल से चलना शुरू करता है तथा 3.5 घंटे बाद, विशाल मोहन के ही आरंभिक बिंदु से उसी दिशा में 13 किमी/घंटा की चाल से साइकिल चलाना शुरू करता है | विशाल मोहन से आरंभिक बिंदु से कितनी दूरी के बाद मिलेगा ? ( दशमलव के एक स्थान तक ) </span></p>",

                    solution_en: "<p>(a)<span style=\"font-family: Times New Roman;\"> Distance travelled by Mohan in 3.5 hours = 8 x 3.5 = 28 km</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Relative speed = (13-8) km/h</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Time taken by Vishal to catch Mohan =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>28</mn><mrow><mn>13</mn><mo>-</mo><mn>8</mn></mrow></mfrac></math> </span><span style=\"font-family: Times New Roman;\">= 5.6 </span><span style=\"font-family: Times New Roman;\">h</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Distance covered by Vishal before catching Mohan = 5.6 x 13 = 72.8 km</span></p>",
                    solution_hi: "<p>(a)मोहन द्वारा 3.5 घंटे में तय की गई दूरी<span style=\"font-family: Times New Roman;\">&nbsp;= 8 x 3.5 = 28 km</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">सापेक्ष गति= (13-8) km/h</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">विशाल को मोहन को पकड़ने में लगा समय = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>28</mn><mrow><mn>13</mn><mo>-</mo><mn>8</mn></mrow></mfrac></math> </span><span style=\"font-family: Times New Roman;\">= 5.6 </span><span style=\"font-family: Times New Roman;\">h</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">मोहन को पकड़ने से पहले विशाल द्वारा तय की गई दूरी = 5.6 x 13 = 72.8 km</span></p>",

        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML - more compact
            let html = `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="question-text mb-3">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        <div class="options">`;
                        
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = 'option-label';
                
                // When reviewing, highlight user's choice and correct answer
                if (submitted) {
                    if (opt === question.correct) {
                        optionClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[question.id] === opt && opt !== question.correct) {
                        optionClass += ' border-danger bg-danger bg-opacity-10';
                    }
                }
                
                html += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${answers[question.id] === opt ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <label class="form-check-label w-100 ${optionClass}" for="opt-${index}-${opt}">
                            ${submitted && opt === question.correct ? '<i class="fas fa-check-circle text-success me-1"></i>' : ''}
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const alertClass = isCorrect ? 'alert-success' : 'alert-danger';
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="alert ${alertClass} mt-3 py-2">
                        <strong>${resultText}</strong>
                        <div class="mt-1 small">
                            <strong>Solution:</strong>
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
        function nextQuestion() { if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
            
            // Update button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('main-content');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                if (window.innerWidth >= 992) {
                    content.classList.add('with-nav');
                }
            } else {
                nav.classList.remove('show');
                if (window.innerWidth >= 992) {
                    content.classList.remove('with-nav');
                }
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer - compact
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            if (confirm(`You have attempted ${attempted} of ${questions.length} questions.
${remaining} questions are unattempted.

Are you sure you want to submit?`)) {
                submitTest();
            }
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.replace('btn-light', 'btn-success');
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
        
        // Add event listener for window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                if (document.getElementById('question-nav').classList.contains('show')) {
                    document.getElementById('main-content').classList.add('with-nav');
                }
            } else {
                document.getElementById('main-content').classList.remove('with-nav');
            }
        });
    </script>
</body>
</html>
