                    solution_en: "<p><span style=\"font-family: Cambria Math;\">71.(b)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Effective discount for the scheme = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mrow><mn>7</mn><mo>+</mo><mn>3</mn></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times; 100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>10</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times; 100 = 30%</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">71.(b)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2331;&#2370;&#2335;</span> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mrow><mn>7</mn><mo>+</mo><mn>3</mn></mrow></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times; 100 = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>10</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times; 100 = 30%</span></p>\n",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5

                questions.push({
                    id: "72",
                    section: "17",
                    question_en: "<p>72. <span style=\"font-family: Cambria Math;\"> What annual installment will discharge a debt of Rs.3,270 due in 3 years at 9% per annum simple interest ?</span></p>\n",
                    question_hi: "<p>72. <span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2340;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2343;&#2344;&#2352;&#2366;&#2358;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2366;&#2354;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2358;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> 9% </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2366;&#2343;&#2366;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> 3 </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2352;&#2381;&#2359;&#2379;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2375;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Rs.3,270 </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2315;&#2339;</span><span                     options_hi: ["<p>Rs.1,075</p>\n", "<p>Rs.1,050</p>\n",
                                "<p>Rs.1,090</p>\n", "<p>Rs.1,000</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">72.(d)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Rate </span><span style=\"font-family: Cambria Math;\"> 9% = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>9</mn><mn>100</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> , Time = 3 years , Debt = &#8377;3,270</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">We know,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Annual installment =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mi>d</mi><mi>u</mi><mi>e</mi><mo>&nbsp;</mo><mi>d</mi><mi>e</mi><mi>b</mi><mi>t</mi><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>100</mn></mrow><mrow><mn>100</mn><mo>&nbsp;</mo><mi>t</mi><mo>&nbsp;</mo><mo>+</mo><mo>&nbsp;</mo><mi>r</mi><mo>&nbsp;</mo><mi>t</mi><mo>&nbsp;</mo><mo>(</mo><mi>t</mi><mo>-</mo><mn>1</mn><mo>)</mo></mrow></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">&rArr; Let the annual installment be 100 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Debt = 100 &times; 3 + 9(1 + 2)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 300 + 27 = 327 unit which correspond to &#8377;3,270</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, 100 units correspond to <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3270</mn><mn>327</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times; 100 = &#8377;1000</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">72.(d)</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> 9% = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>9</mn><mn>100</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> , </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2350;&#2351;</span><span style=\"font-family: Cambria Math;\"> = 3 </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2315;&#2339;</span><span style=\"font-family: Cambria Math;\"> = &#8377;3,270</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2367;&#2360;&#2381;&#2340;</span><span style=\"font-family: Cambria Math;\"> 100 </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2325;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;</span><span style=\"font-family: Nirmala UI;\">&#2376;</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2315;&#2339;</span><span style=\"font-family: Cambria Math;\"> = 100 &times; 3 + 9(1 + 2)</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 300 + 27 = 327 </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2325;&#2366;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2332;&#2379;</span><span style=\"font-family: Cambria Math;\"> &#8377;3,270 </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2352;&#2366;&#2348;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> |</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">&#2340;&#2379;, 100&nbsp; &#2311;&#2325;&#2366;&#2312;</span> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3270</mn><mn>327</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\">&times; 100 = &#8377;1000&nbsp;</span><span style=\"font-weight: 400;\">&#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376; |</span></p>\n",
                    correct: "d",

                questions.push({
                    id: "73",
                    section: "17",
                    question_en: "<p>73.<span style=\"font-family: Cambria Math;\"> Khan lends an amount of Rs 10,000 to Irfan at 10% per annum compound interest for 5 years, compounded annually. What is the</span><span style=\"font-family: Cambria Math;\"> compound interest accrued for the&nbsp; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mn>4</mn><mrow><mi>t</mi><mi>h</mi></mrow></msup></math></span><span style=\"font-family: Cambria Math;\">year?</span></p>\n",
                    question_hi: "<p>73. <span style=\"font-family: Nirmala UI;\">&#2326;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2311;&#2352;&#2347;&#2364;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2379;</span><span style=\"font-family: Cambria Math;\"> 10,000 </span><span style=\"font-family: Nirmala UI;\">&#2352;&#2369;&#2346;&#2351;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2352;&#2366;&#2358;&#2367;</span><span style=\"font-family: Cambria Math;\"> 5 </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2366;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> 10% </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2340;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2352;&#2370;&#2346;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2368;&#2404;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2330;&#2380;&#2341;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2352;&#2381;&#2359;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2309;&#2352;&#2381;&#2332;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2361;</span><span style=\"font-family: Nirmala UI;\">&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>1762&nbsp;</p>\n", "<p><span style=\"font-weight: 400;\">1331</span></p>\n", 
                                "<p><span style=\"font-weight: 400;\">1745</span><span style=\"font-weight: 400;\"><br></span></p>\n", "<p><span style=\"font-weight: 400;\">1540</span></p>\n"],
                    options_hi: ["<p>1762</p>\n", "<p>1331</p>\n",
                                "<p>1745</p>\n", "<p>1540</p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">73.(b) </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Short trick:-</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Effective interest rate in 4 year = 46.41%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Effective interest rate in 3 year = 33.1%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">4th year interest = 46.41 - 33.1 = 13.31%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Compound interest for the 4th year = 13.31% of 10,000 = 1331</span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">73.(b)</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2358;&#2366;&#2352;&#2381;&#2335;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2335;&#2381;&#2352;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> :-</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">4 </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2366;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> = 46.41%</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">3 </span><span style=\"font-family: Nirmala UI;\">&#2360;&#2366;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2348;&#2381;&#2351;&#2366;&#2332;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2342;&#2352;</span><span style=\"font-family: Cambria Math;\"> = 33.1%</span></p>\r\n<p><span style=\"font-family: Nirmala UI;\">&#2330;&#2380;&#2341;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Nirmala UI;\">&#2357;&#2352;&#2381;&#2359;</span><                     solution_en: "<p>83.(c) <strong>Vedangas</strong>. <span style=\"font-family: Cambria Math;\">These are 6 in number :- 1.Siksha: Pronunciation of the words;. 2. Nirukta: Origin of the words 3.Chhanda: Metrics used in Sanskrit verses 4.Jyotish: Understanding of astronomy 5.Vyakaran: Sanskrit grammar 6.Kalpa: Knowledge of rituals (Dharmasutras). </span><strong><span style=\"font-family: Cambria Math;\">Aran</span></strong><span style=\"font-family: Cambria Math;\"><strong>yakas</strong> </span><span style=\"font-family: Cambria Math;\">(forest books)- Explains metaphysics &amp; symbolism of sacrifice. </span><strong><span style=\"font-family: Cambria Math;\">Upanishads</span></strong><span style=\"font-family: Cambria Math;\"> or books on philosophy or deeper knowledge about &lsquo;aatma&rsquo;, &lsquo;brahma&rsquo; etc. </span><strong><span style=\"font-family: Cambria Math;\">Puranas</span></strong><span style=\"font-family: Cambria Math;\"> mention four ages: Satyuga, Tretayuga, Dwaparayuga, Kaliyuga .</span></p>\n",

                    question_hi: " <p><span style=\"font-family:Cambria Math\">100 </span><span style=\"font-family:Nirmala UI\">भारत</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">में</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">एप्पल</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">का</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">पहला</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">स्टोर</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">किस</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">शहर</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">में</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">खोला</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">गया</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">है</span><span style=\"font-family:Cambria Math\">?</span></p>",
                    options_en: [" <p> </span><span style=\"font-family:Cambria Math\">Mumbai</span></p>", " <p> </span><span style=\"font-family:Cambria Math\">Surat</span></p>", 
                                " <p> </span><span style=\"font-family:Cambria Math\">Indore</span></p>", " <p> </span><span style=\"font-family:Cambria Math\">Chennai</span></p>"],
                    options_hi: [" <p> </span><span style=\"font-family:Nirmala UI\">मुंबई</span></p>", " <p> </span><span style=\"font-family:Nirmala UI\">सूरत</span></p>",
                                " <p> </span><span style=\"font-family:Nirmala UI\">इंदौर</span></p>", " <p> </span><span style=\"font-family:Nirmala UI\">चेन्नई</span></p>"],
                    solution_en: " <p><span style=\"font-family:Cambria Math\">100.(a) Mumbai</span></p> <p><span style=\"font-family:Cambria Math\">CEO - Tim Cook</span></p> <p><span style=\"font-family:Cambria Math\">Founded - 1 April 1976</span></p> <p><span style=\"font-family:Cambria Math\">Founders: Steve Jobs, Steve Wozniak, Ronald Wayne</span></p>",
                    solution_hi: " <p><span style=\"font-family:Cambria Math\">100.(a) </span><span style=\"font-family:Nirmala UI\">मुंबई</span></p> <p><span style=\"font-family:Nirmala UI\">सीईओ</span><span style=\"font-family:Cambria Math\"> - </span><span style=\"font-family:Nirmala UI\">टिम</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">कुक</span></p> <p><span style=\"font-family:Nirmala UI\">स्थापना</span><span style=\"font-family:Cambria Math\"> - 1 </span><span style=\"font-family:Nirmala UI\">अप्रैल</span><span style=\"font-family:Cambria Math\"> 1976</span></p> <p><span style=\"font-family:Nirmala UI\">संस्थापक</span><span style=\"font-family:Cambria Math\">: </span><span style=\"font-family:Nirmala UI\">स्टीव</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">जॉब्स</span><span style=\"font-family:Cambria Math\">, </span><span style=\"font-family:Nirmala UI\">स्टीव</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">वोज्नियाक</span><span style=\"font-family:Cambria Math\">, </span><span style=\"font-family:Nirmala UI\">रोनाल्ड</span><span style=\"font-family:Cambria Math\"> </span><span style=\"font-family:Nirmala UI\">वेन</span></p>",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
            
            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();
        }
        
        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML - more compact
            let html = `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="question-text mb-3">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        <div class="options">`;
                        
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = 'option-label';
                
                // When reviewing, highlight user's choice and correct answer
                if (submitted) {
                    if (opt === question.correct) {
                        optionClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[question.id] === opt && opt !== question.correct) {
                        optionClass += ' border-danger bg-danger bg-opacity-10';
                    }
                }
                
                html += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${answers[question.id] === opt ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <label class="form-check-label w-100 ${optionClass}" for="opt-${index}-${opt}">
                            ${submitted && opt === question.correct ? '<i class="fas fa-check-circle text-success me-1"></i>' : ''}
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const alertClass = isCorrect ? 'alert-success' : 'alert-danger';
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="alert ${alertClass} mt-3 py-2">
                        <strong>${resultText}</strong>
                        <div class="mt-1 small">
                            <strong>Solution:</strong>
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
        function nextQuestion() { if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
            
            // Update button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('main-content');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                if (window.innerWidth >= 992) {
                    content.classList.add('with-nav');
                }
            } else {
                nav.classList.remove('show');
                if (window.innerWidth >= 992) {
                    content.classList.remove('with-nav');
                }
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer - compact
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            if (confirm(`You have attempted ${attempted} of ${questions.length} questions.
${remaining} questions are unattempted.

Are you sure you want to submit?`)) {
                submitTest();
            }
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.replace('btn-light', 'btn-success');
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
        
        // Add event listener for window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                if (document.getElementById('question-nav').classList.contains('show')) {
                    document.getElementById('main-content').classList.add('with-nav');
                }
            } else {
                document.getElementById('main-content').classList.remove('with-nav');
            }
        });
    </script>
</body>
</html>
