                questions.push({
                    id: "23",
                    section: "17",
                    question_en: "<p>23. 301 is divided into three parts a,b and c in such a way that&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi>a</mi><mi>b</mi></mfrac><mo>=</mo><mfrac><mi>b</mi><mi>c</mi></mfrac></math> <span style=\"font-family: Times New Roman;\">. If b=42 and a is smaller than c, then find the value of a:b:c?</span></p>\n",
                    question_hi: "<p><span style=\"font-family: Baloo;\">23. 301 &#2325;&#2379; &#2340;&#2368;&#2344; &#2361;&#2367;&#2360;&#2381;&#2360;&#2379;&#2306; a, b &#2324;&#2352; c &#2350;&#2375;&#2306; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi>a</mi><mi>b</mi></mfrac><mo>=</mo><mfrac><mi>b</mi><mi>c</mi></mfrac></math>&nbsp;</span><span style=\"font-family: Baloo;\"> &#2361;&#2376; | &#2351;&#2342;&#2367; b = 42 &#2361;&#2376; &#2324;&#2352; a, c &#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2361;&#2376;, &#2340;&#2379; a : b : c &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306; |</span></p>\n",
                    options_en: ["<p>5 : 6 : 36</p>\n", "<p>1 : 8 : 36</p>\n", 
                                "<p>7 : 6 : 3</p>\n", "<p>1 : 6 : 36</p>\n"],
                    options_hi: ["<p>5 : 6 : 36</p>\n", "<p>1 : 8 : 36</p>\n",
                                "<p>7 : 6 : 3</p>\n", "<p>1 : 6 : 36</p>\n"],
                    solution_en: "<p><span style=\"font-family: Times New Roman;\">(d) </span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Given, b=42 and a+b+c = 301, b&sup2;=ac</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">a+c = 301-42=259 &hellip;&hellip;.(1)</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">then </span><span style=\"font-family: Times New Roman;\"> </span><span style=\"font-family: Times New Roman;\">ac = b&sup2; = (42)&sup2;=1764</span><span style=\"font-family: Times New Roman;\"> &hellip;&hellip;(2)</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">From 1 and 2 eqn,</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">a&sup2;-259a+1764=0</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">a&sup2;-252a-7a+1764=0</span></p>\r\n<p><span style=\"font-family: Times New Roman;\"> </span></p>\r\n<p><span style=\"font-family: Times New Roman;\">a(a-252)-7(a-252) = 0</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">(a-7)(a-252)=0</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">&rArr;a=7,252</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">Since a is smaller than c, we have</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">a=7, b=42, c=252</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">required ratio = 7:42:252 = 1 : 6 : 36 </span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Times New Roman;\">(d) </span></p>\r\n<p><span style=\"font-family: Times New Roman;\">&#2342;&#2367;&#2351;&#2366; &#2361;&#2376; , b=42 &nbsp;&#2324;&#2352;&nbsp; a+b+c = 301, b&sup2;=ac</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">a+c = 301-42=259 &hellip;&hellip;.(1)</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">&nbsp;&#2340;&#2348; , </span><span style=\"font-family: Times New Roman;\">ac = b&sup2; = (42)&sup2;=1764 &hellip;&hellip;(2)</span></p>\r\n<p>1 &#2324;&#2352; 2 &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2375;,</p>\r\n<p><span style=\"font-family: Times New Roman;\">a&sup2;-259a+1764=0</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">a&sup2;-252a-7a+1764=0</span></p>\r\n<p><span style=\"font-family: Times New Roman;\"> </span></p>\r\n<p><span style=\"font-family: Times New Roman;\">a(a-252)-7(a-252) = 0</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">(a-7)(a-252)=0</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">&rArr;a=7,252</span></p>\r\n<p>&#2330;&#2370;&#2305;&#2325;&#2367; a, c&nbsp; &#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2361;&#2376;</p>\r\n<p><span style=\"font-family: Times New Roman;\">a=7, b=42, c=252</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">&#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; = 7:42:252 = 1 : 6 : 36 </span></p>\n",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "24",
                    section: "17",
                    question_en: "<p>24. If <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>x</mi><mn>4</mn></msup><mo>+</mo><msup><mi>y</mi><mn>4</mn></msup><mo>=</mo><msup><mi>z</mi><mn>4</mn></msup></math><span style=\"font-family: Times New Roman;\">, then find the value of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><msup><mi>x</mi><mn>12</mn></msup><mo>+</mo><msup><mi>y</mi><mn>12</mn></msup><mo>-</mo><msup><mi>z</mi><mn>12</mn></msup><mo>]</mo><mo>&#247;</mo><mo>(</mo><msup><mi>x</mi><mn>4</mn></msup><msup><mi>y</mi><mn>4</mn></msup><msup><mi>z</mi><mn>4</mn></msup><mo>)</mo></math></span></p>",
                    question_hi: "<p><span style=\"font-family: Baloo;\">24. यदि <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>x</mi><mn>4</mn></msup><mo>+</mo><msup><mi>y</mi><mn>4</mn></msup><mo>=</mo><msup><mi>z</mi><mn>4</mn></msup></math></span><span style=\"font-family: Baloo;\"> है, तो <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><msup><mi>x</mi><mn>12</mn></msup><mo>+</mo><msup><mi>y</mi><mn>12</mn></msup><mo>-</mo><msup><mi>z</mi><mn>12</mn></msup><mo>]</mo><mo>&#247;</mo><mo>(</mo><msup><mi>x</mi><mn>4</mn></msup><msup><mi>y</mi><mn>4</mn></msup><msup><mi>z</mi><mn>4</mn></msup><mo>)</mo></math></span><span style=\"font-family: Baloo;\">&nbsp;का मान ज्ञात करें | </span></p>",
                    options_en: ["<p>-3</p>", "<p>3</p>", 
                                "<p>2</p>", "<p>-2</p>"],
                    options_hi: ["<p>-3</p>", "<p>3</p>",
                                "<p>2</p>", "<p>-2</p>"],
                    solution_en: "<p><span style=\"font-family: Times New Roman;\">(a)</span></p>\r\n<p><span style=\"font-family: Times New Roman;\"> We know that is a+b+c = 0 then&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>a</mi><mn>3</mn></msup><mo>+</mo><msup><mi>b</mi><mn>3</mn></msup><mo>+</mo><msup><mi>c</mi><mn>3</mn></msup><mo>=</mo><mn>3</mn><mi>a</mi><mi>b</mi><mi>c</mi></math></span></p>\r\n<p><span style=\"font-family: Times New Roman;\">&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>S</mi><mi>i</mi><mi>m</mi><mi>i</mi><mi>l</mi><mi>a</mi><mi>r</mi><mi>l</mi><mi>y</mi><mo>,</mo><mo>&#160;</mo><msup><mi>x</mi><mn>4</mn></msup><mo>+</mo><msup><mi>y</mi><mn>4</mn></msup><mo>=</mo><msup><mi>z</mi><mn>4</mn></msup><mo>,</mo><mo>&#160;</mo><msup><mi>x</mi><mn>4</mn></msup><mo>+</mo><msup><mi>y</mi><mn>4</mn></msup><mo>-</mo><msup><mi>z</mi><mn>4</mn></msup><mo>=</mo><mn>0</mn><mspace linebreak=\"newline\"></mspace><mo>&#8658;</mo><msup><mi>x</mi><mn>12</mn></msup><mo>+</mo><msup><mi>y</mi><mn>12</mn></msup><mo>-</mo><msup><mi>z</mi><mn>12</mn></msup><mo>=</mo><mo>&#160;</mo><mo>-</mo><mn>3</mn><msup><mi>x</mi><mn>4</mn></msup><msup><mi>y</mi><mn>4</mn></msup><msup><mi>z</mi><mn>4</mn></msup><mspace linebreak=\"newline\"></mspace><mo>&#8658;</mo><mfrac><mrow><msup><mi>x</mi><mn>12</mn></msup><mo>+</mo><msup><mi>y</mi><mn>12</mn></msup><mo>-</mo><msup><mi>z</mi><mn>12</mn></msup></mrow><mrow><msup><mi>x</mi><mn>4</mn></msup><msup><mi>y</mi><mn>4</mn></msup><msup><mi>z</mi><mn>4</mn></msup></mrow></mfrac><mo>=</mo><mo>&#160;</mo><mo>-</mo><mn>3</mn></math></span></p>\r\n<p><span style=\"font-family: Times New Roman;\"> </span></p>",
                    solution_hi: "<p><span style=\"font-family: Times New Roman;\">(a)</span></p>\r\n<p><span style=\"font-family: Times New Roman;\">हम जानते हैं कि&nbsp; a+b+c = 0 तो&nbsp; <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>a</mi><mn>3</mn></msup><mo>+</mo><msup><mi>b</mi><mn>3</mn></msup><mo>+</mo><msup><mi>c</mi><mn>3</mn></msup><mo>=</mo><mn>3</mn><mi>a</mi><mi>b</mi><mi>c</mi></math></span></p>\r\n<p><span style=\"font-family: Times New Roman;\">&nbsp;<math style=\"font-family:Verdana\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>&#2313;&#2360;&#2368;</mi><mo>&#160;</mo><mo>&#160;</mo><mi>&#2346;&#2381;&#2352;&#2325;&#2366;&#2352;</mi><mo>,</mo><mo>&#160;</mo><msup><mi>x</mi><mn>4</mn></msup><mo>+</mo><msup><mi>y</mi><mn>4</mn></msup><mo>=</mo><msup><mi>z</mi><mn>4</mn></msup><mo>,</mo><mo>&#160;</mo><msup><mi>x</mi><mn>4</mn></msup><mo>+</mo><msup><mi>y</mi><mn>4</mn></msup><mo>-</mo><msup><mi>z</mi><mn>4</mn></msup><mo>=</mo><mn>0</mn><mspace linebreak=\"newline\"/><mo>&#8658;</mo><msup><mi>x</mi><mn>12</mn></msup><mo>+</mo><msup><mi>y</mi><mn>12</mn></msup><mo>-</mo><msup><mi>z</mi><mn>12</mn></msup><mo>=</mo><mo>&#160;</mo><mo>-</mo><mn>3</mn><msup><mi>x</mi><mn>4</mn></msup><msup><mi>y</mi><mn>4</mn></msup><msup><mi>z</mi><mn>4</mn></msup><mspace linebreak=\"newline\"/><mo>&#8658;</mo><mfrac><mrow><msup><mi>x</mi><mn>12</mn></msup><mo>+</mo><msup><mi>y</mi><mn>12</mn></msup><mo>-</mo><msup><mi>z</mi><mn>12</mn></msup></mrow><mrow><msup><mi>x</mi><mn>4</mn></msup><msup><mi>y</mi><mn>4</mn></msup><msup><mi>z</mi><mn>4</mn></msup></mrow></mfrac><mo>=</mo><mo>&#160;</mo><mo>-</mo><mn>3</mn></math></span></p>\r\n<p><span style=\"font-family: Times New Roman;\"> </span></p>",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                questions.push({
                    id: "25",
                    section: "misc",
                    question_en: "<p>25. B is a point outside the circle from which a tangent BA is drawn on circle and from point B a secant is drawn which cut the circle on C and D. O is the centre of a circle of radius 16 and OB = 20 cm. CD-BC = 12 cm. Find the length of BD?</p>",
                    question_hi: "<p><span style=\"font-family: Baloo;\">25. B वृत्त से बाहर स्थित एक बिंदु है जिससे वृत्त पर एक स्पर्श रेखा BA खींची जाती है तथा बिंदु C से एक छेदक रेखा खींची जाती है जो वृत्त को C एवं D पर काटती है | O, वृत्त का केंद्र है जिसकी त्रिज्या 16 है एवं OB = 20 सेमी है | CD-BC = 12 सेमी है | BD की लंबाई ज्ञात करें | </span></p>",
                    options_en: ["<p>18</p>", "<p>20</p>", 
                                "<p>24</p>", "<p>26</p>"],
                    options_hi: ["<p>18</p>", "<p>20</p>",
                                "<p>24</p>", "<p>26</p>"],
                    solution_en: "<p><span style=\"font-family: Times New Roman;\">(c)</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1626513198/word/media/image4.png\" /></p>\r\n<p><span style=\"font-family: Times New Roman;\">Given , radius = 16 and OB = 20 cm. CD-BC = 12 cm</span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#8658;</mo><msup><mrow><mi>O</mi><mi>B</mi></mrow><mn>2</mn></msup><mo>=</mo><msup><mrow><mi>O</mi><mi>A</mi></mrow><mn>2</mn></msup><mo>+</mo><msup><mrow><mi>A</mi><mi>B</mi></mrow><mn>2</mn></msup><mo>,</mo><mo>&#160;</mo><mi>O</mi><mi>A</mi><mo>=</mo><msqrt><msup><mn>20</mn><mn>2</mn></msup><mo>-</mo><msup><mn>16</mn><mn>2</mn></msup></msqrt><mo>=</mo><mn>12</mn><mo>&#160;</mo><mi>c</mi><mi>m</mi><mspace linebreak=\"newline\"></mspace><mo>&#8658;</mo><msup><mrow><mi>A</mi><mi>B</mi></mrow><mn>2</mn></msup><mo>=</mo><mi>B</mi><mi>C</mi><mo>&#215;</mo><mi>B</mi><mi>D</mi><mo>&#160;</mo><mo>(</mo><mi>tan</mi><mi>g</mi><mi>e</mi><mi>n</mi><mi>t</mi><mo>&#160;</mo><mi>s</mi><mi>e</mi><mi>c</mi><mi>a</mi><mi>n</mi><mi>t</mi><mo>&#160;</mo><mi>t</mi><mi>h</mi><mi>e</mi><mi>o</mi><mi>r</mi><mi>e</mi><mi>m</mi><mo>)</mo><mspace linebreak=\"newline\"></mspace><mo>&#8658;</mo><msup><mn>12</mn><mn>2</mn></msup><mo>=</mo><mn>144</mn><mo>=</mo><mi>B</mi><mi>C</mi><mo>&#215;</mo><mi>B</mi><mi>D</mi><mspace linebreak=\"newline\"></mspace><mi>G</mi><mi>i</mi><mi>v</mi><mi>e</mi><mi>n</mi><mo>,</mo><mi>C</mi><mi>D</mi><mo>-</mo><mi>B</mi><mi>C</mi><mo>=</mo><mn>12</mn><mi>c</mi><mi>m</mi><mo>&#8658;</mo><mi>B</mi><mi>D</mi><mo>-</mo><mi>B</mi><mi>C</mi><mo>-</mo><mi>B</mi><mi>C</mi><mo>=</mo><mn>12</mn><mspace linebreak=\"newline\"></mspace><mo>&#8658;</mo><mfrac><mn>144</mn><mrow><mi>B</mi><mi>C</mi></mrow></mfrac><mo>-</mo><mn>2</mn><mi>B</mi><mi>C</mi><mo>=</mo><mn>12</mn><mo>,</mo><mo>&#160;</mo><msup><mrow><mi>B</mi><mi>C</mi></mrow><mn>2</mn></msup><mo>+</mo><mn>12</mn><mi>B</mi><mi>C</mi><mo>-</mo><mn>144</mn><mo>&#160;</mo><mo>=</mo><mn>0</mn><mspace linebreak=\"newline\"></mspace><mn>2</mn><mi>B</mi><mi>C</mi><mo>(</mo><mi>B</mi><mi>C</mi><mo>-</mo><mn>6</mn><mo>)</mo><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>24</mn><mo>(</mo><mi>B</mi><mi>C</mi><mo>-</mo><mn>6</mn><mo>)</mo><mo>&#160;</mo><mspace linebreak=\"newline\"></mspace><mo>(</mo><mi>B</mi><mi>C</mi><mo>-</mo><mn>6</mn><mo>)</mo><mo>(</mo><mn>2</mn><mi>B</mi><mi>C</mi><mo>+</mo><mn>24</mn><mo>)</mo><mo>=</mo><mn>0</mn><mspace linebreak=\"newline\"></mspace><mi>B</mi><mi>C</mi><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>6</mn><mo>&#160;</mo><mi>c</mi><mi>m</mi><mo>&#160;</mo><mi>a</mi><mi>n</mi><mi>d</mi><mo>&#160;</mo><mi>C</mi><mi>D</mi><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>12</mn><mo>+</mo><mn>6</mn><mo>=</mo><mn>18</mn><mo>&#160;</mo><mi>c</mi><mi>m</mi><mspace linebreak=\"newline\"></mspace><mi>B</mi><mi>D</mi><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>18</mn><mo>+</mo><mn>6</mn><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>24</mn><mo>&#160;</mo><mi>c</mi><mi>m</mi><mspace linebreak=\"newline\"></mspace></math></p>\r\n<p>&nbsp;</p>",
                    solution_hi: "<p><span style=\"font-family: Times New Roman;\">(c)</span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1626513198/word/media/image4.png\" /></p>\r\n<p><span style=\"font-family: Times New Roman;\">दिया है , ,&nbsp;त्रिज्या= 16 and OB = 20 cm. CD-BC = 12 cm</span></p>\r\n<p><math style=\"font-family:Verdana\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#8658;</mo><msup><mrow><mi>O</mi><mi>B</mi></mrow><mn>2</mn></msup><mo>=</mo><msup><mrow><mi>O</mi><mi>A</mi></mrow><mn>2</mn></msup><mo>+</mo><msup><mrow><mi>A</mi><mi>B</mi></mrow><mn>2</mn></msup><mo>,</mo><mo>&#160;</mo><mi>O</mi><mi>A</mi><mo>=</mo><msqrt><msup><mn>20</mn><mn>2</mn></msup><mo>-</mo><msup><mn>16</mn><mn>2</mn></msup></msqrt><mo>=</mo><mn>12</mn><mo>&#160;</mo><mi>c</mi><mi>m</mi><mspace linebreak=\"newline\"/><mo>&#8658;</mo><msup><mrow><mi>A</mi><mi>B</mi></mrow><mn>2</mn></msup><mo>=</mo><mi>B</mi><mi>C</mi><mo>&#215;</mo><mi>B</mi><mi>D</mi><mo>&#160;</mo><mo>(</mo><mi>&#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366;</mi><mo>&#160;</mo><mi>&#2331;&#2375;&#2342;&#2325;</mi><mo>&#160;</mo><mi>&#2346;&#2381;&#2352;&#2350;&#2375;&#2351;</mi><mo>)</mo><mspace linebreak=\"newline\"/><mo>&#8658;</mo><msup><mn>12</mn><mn>2</mn></msup><mo>=</mo><mn>144</mn><mo>=</mo><mi>B</mi><mi>C</mi><mo>&#215;</mo><mi>B</mi><mi>D</mi><mspace linebreak=\"newline\"/><mi>&#2342;&#2367;&#2351;&#2366;</mi><mo>&#160;</mo><mi>&#2361;&#2376;</mi><mo>&#160;</mo><mo>,</mo><mo>,</mo><mi>C</mi><mi>D</mi><mo>-</mo><mi>B</mi><mi>C</mi><mo>=</mo><mn>12</mn><mi>c</mi><mi>m</mi><mo>&#8658;</mo><mi>B</mi><mi>D</mi><mo>-</mo><mi>B</mi><mi>C</mi><mo>-</mo><mi>B</mi><mi>C</mi><mo>=</mo><mn>12</mn><mspace linebreak=\"newline\"/><mo>&#8658;</mo><mfrac><mn>144</mn><mrow><mi>B</mi><mi>C</mi></mrow></mfrac><mo>-</mo><mn>2</mn><mi>B</mi><mi>C</mi><mo>=</mo><mn>12</mn><mo>,</mo><mo>&#160;</mo><msup><mrow><mi>B</mi><mi>C</mi></mrow><mn>2</mn></msup><mo>+</mo><mn>12</mn><mi>B</mi><mi>C</mi><mo>-</mo><mn>144</mn><mo>&#160;</mo><mo>=</mo><mn>0</mn><mspace linebreak=\"newline\"/><mn>2</mn><mi>B</mi><mi>C</mi><mo>(</mo><mi>B</mi><mi>C</mi><mo>-</mo><mn>6</mn><mo>)</mo><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>24</mn><mo>(</mo><mi>B</mi><mi>C</mi><mo>-</mo><mn>6</mn><mo>)</mo><mo>&#160;</mo><mspace linebreak=\"newline\"/><mo>(</mo><mi>B</mi><mi>C</mi><mo>-</mo><mn>6</mn><mo>)</mo><mo>(</mo><mn>2</mn><mi>B</mi><mi>C</mi><mo>+</mo><mn>24</mn><mo>)</mo><mo>=</mo><mn>0</mn><mspace linebreak=\"newline\"/><mi>B</mi><mi>C</mi><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>6</mn><mo>&#160;</mo><mi>c</mi><mi>m</mi><mo>&#160;</mo><mi>&#2324;&#2352;</mi><mo>&#160;</mo><mo>&#160;</mo><mi>C</mi><mi>D</mi><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>12</mn><mo>+</mo><mn>6</mn><mo>=</mo><mn>18</mn><mo>&#160;</mo><mi>c</mi><mi>m</mi><mspace linebreak=\"newline\"/><mi>B</mi><mi>D</mi><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>18</mn><mo>+</mo><mn>6</mn><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mn>24</mn><mo>&#160;</mo><mi>c</mi><mi>m</mi><mspace linebreak=\"newline\"/></math></p>\r\n<p>&nbsp;</p>",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
            
            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();
        }
        
        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML - more compact
            let html = `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="question-text mb-3">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        <div class="options">`;
                        
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = 'option-label';
                
                // When reviewing, highlight user's choice and correct answer
                if (submitted) {
                    if (opt === question.correct) {
                        optionClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[question.id] === opt && opt !== question.correct) {
                        optionClass += ' border-danger bg-danger bg-opacity-10';
                    }
                }
                
                html += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${answers[question.id] === opt ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <label class="form-check-label w-100 ${optionClass}" for="opt-${index}-${opt}">
                            ${submitted && opt === question.correct ? '<i class="fas fa-check-circle text-success me-1"></i>' : ''}
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const alertClass = isCorrect ? 'alert-success' : 'alert-danger';
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="alert ${alertClass} mt-3 py-2">
                        <strong>${resultText}</strong>
                        <div class="mt-1 small">
                            <strong>Solution:</strong>
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
        function nextQuestion() { if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
            
            // Update button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('main-content');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                if (window.innerWidth >= 992) {
                    content.classList.add('with-nav');
                }
            } else {
                nav.classList.remove('show');
                if (window.innerWidth >= 992) {
                    content.classList.remove('with-nav');
                }
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer - compact
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            if (confirm(`You have attempted ${attempted} of ${questions.length} questions.
${remaining} questions are unattempted.

Are you sure you want to submit?`)) {
                submitTest();
            }
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.replace('btn-light', 'btn-success');
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
        
        // Add event listener for window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                if (document.getElementById('question-nav').classList.contains('show')) {
                    document.getElementById('main-content').classList.add('with-nav');
                }
            } else {
                document.getElementById('main-content').classList.remove('with-nav');
            }
        });
    </script>
</body>
</html>
