<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #7209b7;
            --secondary: #4361ee;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --light: #f8f9fa;
            --dark: #212529;
        }
        body {
            background-color: #f0f2f5;
            font-size: 16px;
            padding-bottom: 60px; /* Space for fixed navigation */
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
            margin-right: 0;
        }
        .navbar .container-fluid {
            justify-content: space-between;
        }
        .controls-group {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }
        .timer-display {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(0,0,0,.1);
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            white-space: nowrap;
        }
        .nav-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            margin-left: 0.25rem;
        }
        .question-nav {
            position: fixed;
            top: 56px;
            right: 0;
            height: calc(100vh - 56px);
            width: 280px;
            transform: translateX(280px);
            transition: transform .3s;
            z-index: 100;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,.1);
        }
        .question-nav.show {
            transform: translateX(0);
        }
        .main-content {
            transition: margin .3s;
            min-height: calc(100vh - 116px);
        }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 6px;
        }
        .q-box {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            transition: all .2s;
        }
        .q-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 5px rgba(0,0,0,.1);
        }
        .q-box.attempted {
            background-color: var(--secondary);
            color: white;
        }
        .q-box.correct {
            background-color: var(--success);
            color: white;
        }
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
        }
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.15);
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .option-label {
            border-radius: 8px;
            transition: all .2s;
            border: 1px solid #dee2e6;
            padding: 0.75rem 1rem;
            font-size: 1rem;
        }
        .option-label:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,.05);
        }
        .form-check-input:checked + .option-label {
            border-color: var(--primary);
            background-color: rgba(114,9,183,.05);
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        /* Bottom fixed navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 10px rgba(0,0,0,.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            z-index: 90;
        }
        
        @media (min-width: 992px) {
            .main-content.with-nav {
                margin-right: 280px;
            }
            .question-nav {
                transform: translateX(0);
            }
            .nav-toggle-btn {
                display: none;
            }
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            }
            .option-label {
                padding: 0.625rem 0.875rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .navbar-brand {
                font-size: 1rem;
            }
            .timer-display {
                font-size: 0.8125rem;
                padding: 0.2rem 0.6rem;
            }
            .nav-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.8125rem;
            }
            .container {
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header navbar -->
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-2">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-1"></i>Mocks Wallah</a>
            
            <div class="controls-group">
                <!-- Timer -->
                <div class="timer-display me-1 fw-bold" id="timer">
                    <i class="far fa-clock me-1"></i><span id="timer-display">90:00</span>
                </div>
                
                <!-- Submit button -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="btn btn-light btn-sm nav-btn me-1" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="btn btn-light btn-sm nav-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main content -->
    <div class="main-content" id="main-content">
        <div class="container py-3">
            <!-- Question counter -->
            <div class="fw-bold text-center mb-3" id="question-counter">Question 1 of 100</div>
            
            <!-- Questions will be displayed here -->
            <div id="questions-container"></div>
        </div>
    </div>
    
    <!-- Bottom navigation for mobile -->
    <div class="bottom-nav d-lg-none">
        <button class="btn btn-outline-primary px-3" onclick="prevQuestion()">
            <i class="fas fa-chevron-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-primary px-3" onclick="nextQuestion()">
            Next <i class="fas fa-chevron-right ms-1"></i>
        </button>
    </div>
    
    <!-- Question navigation sidebar -->
    <div class="question-nav" id="question-nav">
        <div class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">Questions</h5>
                <div>
                    <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                    <span class="badge bg-secondary" id="total-count">100</span>
                    <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleNav()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Section selector moved here -->
            <div class="mb-3">
                <label for="section-selector" class="form-label small text-muted">Jump to Section</label>
                <select class="form-select form-select-sm" id="section-selector" onchange="switchSection(this.value)">
                    <option value="all">All Sections</option>
                </select>
            </div>
            
            <div class="question-grid" id="question-boxes"></div>
        </div>
    </div>
    
    <!-- Results modal -->
    <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-0" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white">
                    <h5 class="modal-title">Test Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row text-center g-2">
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#4361ee,#3a0ca3);color:white">
                                <h3 id="score-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Score</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#06d6a0,#1b9aaa);color:white">
                                <h3 id="correct-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Correct</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#ef476f,#f72585);color:white">
                                <h3 id="incorrect-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Incorrect</div>
                            </div>
                        </div>
                        <div class="col-6 mt-2">
                            <div class="p-3 rounded shadow-sm" style="background:linear-gradient(135deg,#6c757d,#495057);color:white">
                                <h3 id="unattempted-value" class="mb-0 fw-bold">0</h3>
                                <div class="small">Unattempted</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\n",

pan style=\"font-family: Kokila;\">&#2313;&#2340;&#2381;&#2340;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\n",

                questions.push({
                    id: "52",
                    section: "17",
                    question_en: "<p>52. <span style=\"font-family: Cambria Math;\">if (x + k) is the HCF of <span style=\"font-weight: 400;\">x&sup2; </span><span style=\"font-weight: 400;\">+ px + q and </span><span style=\"font-weight: 400;\">x&sup2; </span><span style=\"font-weight: 400;\">+ qx&nbsp; +&nbsp; p,</span></span><span style=\"font-family: Cambria Math;\"> where p &ne;&nbsp;</span><span style=\"font-family: Cambria Math;\">q then what is the value of k?</span></p>\n",
                    question_hi: "<p>52. <span style=\"font-family: Kokila;\">&#2351;&#2342;&#2367;</span><span style=\"font-family: Cambria Math;\"> (x + k), <span style=\"font-weight: 400;\">x&sup2; </span><span style=\"font-weight: 400;\">+ px + q &#2324;&#2352;&nbsp; </span><span style=\"font-weight: 400;\">x&sup2; </span><span style=\"font-weight: 400;\">+ qx&nbsp; +&nbsp; p </span></span><span style=\"font-family: Cambria Math;\">&nbsp;</span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> HCF </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2332;&#2361;&#2366;&#2305;</span><span style=\"font-family: Cambria Math;\"> p</span><span style=\"font-family: Cambria Math;\"> &ne; q </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\"> k </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>-1</p>\n", "<p>0</p>\n", 
                                "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>2</mn></mfrac></math><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>1</p>\n"],
                    options_hi: ["<p>-1</p>\n", "<p>0</p>\n",
                                "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>2</mn></mfrac><mo>&nbsp;</mo></math><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p>1</p>\n"],
                    solution_en: "<p>52.(a)</p>\r\n<p><span style=\"font-weight: 400;\">P(x) =&nbsp; </span><span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">+ px + q</span></p>\r\n<p><span style=\"font-weight: 400;\">Q(x) = </span><span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">+ qx + p</span></p>\r\n<p><span style=\"font-weight: 400;\">Since, (x + k) is the HCF of P(x) and Q(x)</span></p>\r\n<p><span style=\"font-weight: 400;\">&nbsp;&rArr; P(-k) = 0</span></p>\r\n<p><span style=\"font-weight: 400;\">k&sup2;</span><span style=\"font-weight: 400;\">&nbsp;- kp + q = 0</span></p>\r\n<p><span style=\"font-weight: 400;\">k&sup2;</span><span style=\"font-weight: 400;\">&nbsp;= kp - q ------- (1)</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2342;&#2379;&#2348;&#2366;&#2352;&#2366; , Q(-k) = 0</span></p>\r\n<p><span style=\"font-weight: 400;\">k&sup2;</span><span style=\"font-weight: 400;\">- kq + p = 0</span></p>\r\n<p><span style=\"font-weight: 400;\">k&sup2;</span><span style=\"font-weight: 400;\">&nbsp;= kq - p ------- (2)</span></p>\r\n<p><span style=\"font-weight: 400;\">From eqn(1) and (2), we have :&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">kp - q = kq - p&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">kp - kq = q - p</span></p>\r\n<p><span style=\"font-weight: 400;\">-k(q - p) = q - p</span></p>\r\n<p><span style=\"font-weight: 400;\">k = -1</span></p>\n",
                    solution_hi: "<p>52.(a)</p>\r\n<p><span style=\"font-weight: 400;\">P(x) =&nbsp; </span><span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">+ px + q</span></p>\r\n<p><span style=\"font-weight: 400;\">Q(x) = </span><span style=\"font-weight: 400;\">x&sup2;</span><span style=\"font-weight: 400;\">&nbsp;</span><span style=\"font-weight: 400;\">+ qx + p</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2330;&#2370;&#2306;&#2325;&#2367;, (x +k),&nbsp; P(x) &#2324;&#2352; Q(x) &#2325;&#2366; HCF &#2361;&#2376;</span></p>\r\n<p><span style=\"font-weight: 400;\">&nbsp;&rArr; P(-k) = 0</span></p>\r\n<p><span style=\"font-weight: 400;\">k&sup2;</span><span style=\"font-weight: 400;\">&nbsp;- kp + q = 0</span></p>\r\n<p><span style=\"font-weight: 400;\">k&sup2;</span><span style=\"font-weight: 400;\">&nbsp;= kp - q ------- (1)</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2347;&#2367;&#2352; &#2360;&#2375;, Q(-k) = 0</span></p>\r\n<p><span style=\"font-weight: 400;\">k&sup2;</span><span style=\"font-weight: 400;\">- kq + p = 0</span></p>\r\n<p><span style=\"font-weight: 400;\">k&sup2;</span><span style=\"font-weight: 400;\">&nbsp;= kq - p ------- (2)</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2360;&#2350;&#2368;&#2325;&#2352;&#2339; (1) &#2324;&#2352; (2) &#2360;&#2375; &#2361;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; :</span></p>\r\n<p><span style=\"font-weight: 400;\">kp - q = kq - p&nbsp;</span></p>\r\n<p><span style=\"font-weight: 400;\">kp - kq = q - p</span></p>\r\n<p><span style=\"font-weight: 400;\">-k(q - p) = q - p</span></p>\r\n<p><span style=\"font-weight: 400;\">k = -1</span></p>\n",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });

                    question_en: "<p>55.<span style=\"font-family: Cambria Math;\"> In any triangle ABC, a + b + c = 2s with usual notation,<span style=\"font-weight: 400;\">&nbsp;then find the value of</span> sin(<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi>A</mi><mn>2</mn></mfrac></math>) ?<br></span></p>\n",

                    solution_en: "<p>55.(b)</p>\r\n<p><span style=\"font-family: Cambria Math;\">a + b + c = 2s</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">a + b = 2s - c</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">a + c = 2s - b</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">From cosine rule </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Cos A =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><msup><mi>b</mi><mn>2</mn></msup><mo>+</mo><msup><mi>c</mi><mn>2</mn></msup><mo>-</mo><msup><mi>a</mi><mn>2</mn></msup></mrow><mrow><mn>2</mn><mi>b</mi><mi>c</mi></mrow></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">2<span style=\"font-weight: 400;\">sin&sup2;</span><span style=\"font-weight: 400;\">(</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi>A</mi><mn>2</mn></mfrac></math><span style=\"font-weight: 400;\">)&nbsp;</span> </span><span style=\"font-family: Cambria Math;\">= 1 - cos A(using half angle identity)</span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&rArr;</mo><mn>2</mn><mo>&nbsp;</mo><msup><mi>sin</mi><mn>2</mn></msup><mo>(</mo><mfrac><mi>A</mi><mn>2</mn></mfrac><mo>)</mo><mo>=</mo><mo>&nbsp;</mo><mn>1</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mo>(</mo><mfrac><mrow><msup><mi>b</mi><mn>2</mn></msup><mo>+</mo><msup><mi>c</mi><mn>2</mn></msup><mo>-</mo><msup><mi>a</mi><mn>2</mn></msup></mrow><mrow><mn>2</mn><mi>b</mi><mi>c</mi></mrow></mfrac><mo>)</mo><mo>&nbsp;</mo><mo>=</mo><mfrac><mrow><mo>&nbsp;</mo><msup><mi>a</mi><mn>2</mn></msup><mo>+</mo><mn>2</mn><mi>b</mi><mi>c</mi><mo>-</mo><msup><mi>b</mi><mn>2</mn></msup><mo>-</mo><msup><mi>c</mi><mn>2</mn></msup></mrow><mrow><mn>2</mn><mi>b</mi><mi>c</mi></mrow></mfrac><mo>&nbsp;</mo><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mfrac><mrow><msup><mi>a</mi><mn>2</mn></msup><mo>-</mo><msup><mrow><mo>(</mo><mi>b</mi><mo>-</mo><mi>c</mi><mo>)</mo></mrow><mn>2</mn></msup></mr                     solution_hi: "<p>55.(b)</p>\r\n<p><span style=\"font-family: Cambria Math;\">a + b + c = 2s</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">a + b = 2s - c</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">a + c = 2s - b</span></p>\r\n<p><span style=\"font-weight: 400;\">&#2325;&#2379;&#2360;&#2366;&#2311;&#2344; &#2344;&#2367;&#2351;&#2350; &#2360;&#2375;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Cos A =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><msup><mi>b</mi><mn>2</mn></msup><mo>+</mo><msup><mi>c</mi><mn>2</mn></msup><mo>-</mo><msup><mi>a</mi><mn>2</mn></msup></mrow><mrow><mn>2</mn><mi>b</mi><mi>c</mi></mrow></mfrac></math></span></p>\r\n<p><span style=\"font-family: Cambria Math;\">2<span style=\"font-weight: 400;\">sin&sup2;</span><span style=\"font-weight: 400;\">(</span><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mi>A</mi><mn>2</mn></mfrac></math><span style=\"font-weight: 400;\">)&nbsp;</span> </span><span style=\"font-family: Cambria Math;\">= 1 - cos A</span><span style=\"font-weight: 400;\">(</span><span style=\"font-weight: 400;\">&#2309;&#2352;&#2381;&#2343;-&#2325;&#2379;&#2339; &#2360;&#2370;&#2340;&#2381;&#2352; </span><span style=\"font-weight: 400;\">&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375;)</span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&rArr;</mo><mn>2</mn><mo>&nbsp;</mo><msup><mi>sin</mi><mn>2</mn></msup><mo>(</mo><mfrac><mi>A</mi><mn>2</mn></mfrac><mo>)</mo><mo>=</mo><mo>&nbsp;</mo><mn>1</mn><mo>&nbsp;</mo><mo>-</mo><mo>&nbsp;</mo><mo>(</mo><mfrac><mrow><msup><mi>b</mi><mn>2</mn></msup><mo>+</mo><msup><mi>c</mi><mn>2</mn></msup><mo>-</mo><msup><mi>a</mi><mn>2</mn></msup></mrow><mrow><mn>2</mn><mi>b</mi><mi>c</mi></mrow></mfrac><mo>)</mo><mo>&nbsp;</mo><mo>=</mo><mfrac><mrow><mo>&nbsp;</mo><msup><mi>a</mi><mn>2</mn></msup><mo>+</mo><mn>2</mn><mi>b</mi><mi>c</mi><mo>-</mo><msup><mi>b                     solution_en: "<p>58.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let, the height of water in drum = H</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">According to the question,</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Volume of frustum = volume of water in cylindrical drum</span></p>\r\n<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>3</mn></mfrac><mi>&pi;</mi><mi>h</mi><mo>&nbsp;</mo><mo>(</mo><mo>&nbsp;</mo><msubsup><mi>r</mi><mn>1</mn><mrow><mo>&nbsp;</mo><mn>2</mn></mrow></msubsup><mo>+</mo><mo>&nbsp;</mo><msubsup><mi>r</mi><mn>2</mn><mrow><mo>&nbsp;</mo><mn>2</mn></mrow></msubsup><mo>+</mo><msub><mi>r</mi><mn>1</mn></msub><mo>&times;</mo><mo>&nbsp;</mo><msub><mi>r</mi><mn>2</mn></msub><mo>)</mo><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mi>&pi;</mi><msup><mi>R</mi><mn>2</mn></msup><mi>H</mi><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mfrac><mn>1</mn><mn>3</mn></mfrac><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mn>35</mn><mo>&nbsp;</mo><mo>(</mo><msup><mn>12</mn><mn>2</mn></msup><mo>+</mo><msup><mn>16</mn><mn>2</mn></msup><mo>+</mo><mn>12</mn><mo>&times;</mo><mn>16</mn><mo>)</mo><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><msup><mn>20</mn><mn>2</mn></msup><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mi>H</mi><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mfrac><mn>1</mn><mrow><mn>3</mn><mo>&nbsp;</mo></mrow></mfrac><mo>&times;</mo><mo>&nbsp;</mo><mn>35</mn><mo>(</mo><mn>144</mn><mo>+</mo><mn>256</mn><mo>+</mo><mn>192</mn><mo>)</mo><mo>=</mo><mo>&nbsp;</mo><mn>400</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mi>H</mi><mo>&nbsp;</mo><mspace linebreak=\"newline\"></mspace><mfrac><mn>1</mn><mn>3</mn></mfrac><mo>&times;</mo><mo>&nbsp;</mo><mo>&nbsp;</mo><mn>35</mn><mo>&nbsp;</mo><mo>(</mo><mn>592</mn><mo>)</mo><mo>&nbsp;</mo><mo>=</mo><mo>&nbsp;</mo><mn>400</mn><mo>&nbsp;</mo><mo>&times;</mo><mo>&nbsp;</mo><mi>H</mi></math></                     question_en: "<p><span style=\"font-family: Cambria Math;\">63. </span><span style=\"font-family: Cambria Math;\">In a train, the ratio of the passengers in the second AC and those in the sleeper class is 2 : 3. The ratio of the fares of the second AC and sleeper class is 15 : 12. If the total amount collected from all the passengers is &#8377;13,310, then how much amount (in &#8377;) is collected from the sleeper class.</span></p>\n",

<span style=\"font-family: Kokila;\">&#2352;&#2366;&#2358;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">= 2&times;15 : 3&times;12 &rArr;</span><span style=\"font-family: Cambria Math;\"> 30 : 36 = 5 : 6</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2360;&#2381;&#2354;&#2368;&#2346;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2354;&#2366;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2360;&#2370;&#2354;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2327;&#2312;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2366;&#2358;&#2367;</span><span style=\"font-family: Cambria Math;\"> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>5</mn><mrow><mn>5</mn><mo>+</mo><mn>6</mn></mrow></mfrac></math>&times; </span><span style=\"font-family: Cambria Math;\">13,310 = 6,050</span></p>\n",

                    question_en: "<p>64. <span style=\"font-family: Cambria Math;\">A, B and C agree to pay their total telephone bill in the proportion 2 : 3 : 5. A pays the first month&rsquo;s bill of Rs. 200, B pays the second month&rsquo;s bill of Rs. 100 and C pays the third day&rsquo;s bill of Rs. 800. How much amount (in Rs.) should B pay to settle the accounts?</span></p>\n",

h;\">) </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2369;&#2327;&#2340;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2330;&#2366;&#2361;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",

                                "<p>150</p>\n", "<p>140</p>\n"],
                    options_hi: ["<p>120</p>\n", "<p>130</p>\n",
                                "<p>150</p>\n", "<p>140</p>\n"],
                    solution_en: "<p>64.(d)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Let the telephone bill of A, B, C be 2x , 3x, 5x respectively</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">10x = 800</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = 80</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Bill payment by B = 3x = 3 &times; 80 = 240</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the required amount of B to settle the amount = 240 - 100 = &#8377;140</span></p>\n",
                    solution_hi: "<p>64.(d)</p>\r\n<p><span style=\"font-family: Kokila;\">&#2350;&#2366;&#2344;&#2366;</span><span style=\"font-family: Cambria Math;\"> A, B, C </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2335;&#2375;&#2354;&#2368;&#2347;&#2379;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2367;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2352;&#2350;&#2358;&#2307;</span><span style=\"font-family: Cambria Math;\"> 2x, 3x, 5x </span><span style=\"font-family: Kokila;\">&#2361;&#2376;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">10x = 800</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">x = 80</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">B </span><span style=\"font-family: Kokila;\">&#2342;&#2381;&#2357;&#2366;&#2352;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2348;&#2367;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2349;&#2369;&#2327;&#2340;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> = 3x = 3 &times; 80 = 240</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2340;&#2379;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2352;&#2366;&#2358;&#2367;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2346;&#2335;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2352;&#2344;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2354;&#2367;&#2319;</span><span style=\"font-family: Cambria Math;\"> B </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2357;&#2358;&#2381;&#2351;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2352;&#2366;&#2358;&#2367;</span><span style=\"font-family: Cambria Math;\"> = 240 - 100 = &#8377;140</span></p>\n",

                    solution_en: "<p>65.(a)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688975020/word/media/image41.png\"></p>\r\n<p><span style=\"font-family: Cambria Math;\">Efficiency of Shikha = 5 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Efficiency of Ruchika = 4 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Since, they work on alternate days with following manner :</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">S, R, S, R&hellip;&hellip;</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the total work done in 1 cycle(2hrs) = 5+4 = 9 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Work done in 11 cycle (22 hrs) = 9&times;11 = 99 unit</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Remaining work = 100 - 99 = 1 which is done by Shikha in <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>5</mn></mfrac></math></span><span style=\"font-family: Cambria Math;\"> hours</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">So, the total time taken to complete the whole work = 22 +</span><span style=\"font-family: Cambria Math;\">&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>5</mn></mfrac></math> = 22.2 hrs</span></p>\n",
                    solution_hi: "<p>65.(a)</p>\r\n<p><img src=\"https://ssccglpinnacle.com/admin/resources/qdocs/test-1-EN-1/1688975020/word/media/image41.png\"></p>\r\n<p><span style=\"font-family: Kokila;\">&#2358;&#2367;&#2326;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> = 5 </span><span style=\"font-family: Kokila;\">&#2311;&#2325;&#2366;&#2312;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2352;&#2369;&#2330;&#2367;&#2325;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2359;&#2350;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> = 4 </span><span style=\"font-family: Kokila;\">&#2311;&#2325;&#2366;&#2312;</span></p>\r\n<p><span style=\"font-family: Kokila;\">&#2330;&#2370;&#2306;&#2325;&#2367;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Kokila;\">&#2357;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2340;&#2352;&#2368;&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2376;&#2325;&#2354;&#2381;&#2346;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2342;&#2367;&#2344;&#2379;&#2306;</span><span style=\"font-family:                     solution_en: "<p>66.(c)</p>\r\n<p><span style=\"font-family: Cambria Math;\">Distance in first 1.5 hours = 70 &times; 1.5 = 105 km</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Remaining distance = 240 - 105 = 135 km</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Time to cover the remaining distance =&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>135</mn><mn>50</mn></mfrac></math>&nbsp;</span><span style=\"font-family: Cambria Math;\"> = 2.7 hours or 2 hours 42 minute</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Total time = 1 hour 30 min + 2 hour 42 min = 4 hour 12 min</span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Required time = 4 : 20 a.m. + 4 : 12 hour = 8 : 32 am</span></p>\n",

                    question_en: "<p>94.<span style=\"font-family: Cambria Math;\"> Who was the first musician to receive Bharat Ratna ?</span></p>\n",

                    solution_en: "<p>94.(b)<span style=\"font-family: Cambria Math;\">&nbsp;<strong>Madurai Shanmukhavadivu Subbulakshmi</strong><span style=\"font-weight: 400;\"> was an Indian Carnatic music singer from Madurai, Tamil Nadu. In </span><strong>1998</strong><span style=\"font-weight: 400;\">, she was the </span><strong>first musician to be awarded the Bharat Ratna,</strong><span style=\"font-weight: 400;\"> India\'s highest civilian honour. He was followed by </span><strong>Pandit Ravi Shankar in 1999,</strong><span style=\"font-weight: 400;\"> </span><strong>Ustad Bismillah Khan </strong><span style=\"font-weight: 400;\">and </span><strong>Ms. Lata Mangeshkar in 2001</strong><span style=\"font-weight: 400;\"> and </span><strong>Pandit Bhimsen Joshi in 2009.</strong></span></p>\n",

                                "<p><span style=\"font-family: Kokila;\">&#2354;&#2366;&#2357;&#2339;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span></p>\n", "<p><span style=\"font-family: Kokila;\">&#2348;&#2367;&#2361;&#2369;</span></p>\n"],
                    solution_en: "<p>95.(d)<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"><strong>Bihu </strong><span style=\"font-weight: 400;\">(Bihu Geet) is folk dance of</span><strong> Assam</strong><span style=\"font-weight: 400;\">. It is celebrated by</span><strong> tribes</strong><span style=\"font-weight: 400;\"> of Kaivarttas, Deoris, Sonowal Kacharis,&nbsp; etc. </span><strong>Forms</strong><span style=\"font-weight: 400;\"> of Bihu - Rongali (Bohag Bihu, April), Kongali (Kati Bihu, October), and Bhogali (Magh Bihu, January).</span><strong> Folk dance </strong><span style=\"font-weight: 400;\">(Assam) - Jhumar, Bagurumba, Sattriya, Deodhani, Ali -Ai Ligang. </span><strong>Ghoomar</strong><span style=\"font-weight: 400;\"> (Rajasthan).</span><strong> Garba </strong><span style=\"font-weight: 400;\">(Gujarat). </span><strong>Lavani </strong><span style=\"font-weight: 400;\">(Maharashtra).</span></span></p>\n",
                    solution_hi: "<p>95.(d)&nbsp;<strong>&#2348;&#2367;&#2361;&#2370;</strong><span style=\"font-weight: 400;\"> (&#2348;&#2367;&#2361;&#2370; &#2327;&#2368;&#2340;) </span><strong>&#2309;&#2360;&#2350; </strong><span style=\"font-weight: 400;\">&#2325;&#2366; &#2354;&#2379;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404; &#2351;&#2361; &#2325;&#2376;&#2357;&#2352;&#2381;&#2340;, &#2342;&#2375;&#2323;&#2352;&#2368;, &#2360;&#2379;&#2344;&#2379;&#2357;&#2366;&#2354; &#2325;&#2330;&#2366;&#2352;&#2368;,&nbsp; &#2310;&#2342;&#2367; </span><strong>&#2332;&#2344;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; </strong><span style=\"font-weight: 400;\">&#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2348;&#2367;&#2361;&#2370; &#2325;&#2375; </span><strong>&#2352;&#2370;&#2346;</strong><span style=\"font-weight: 400;\"> - &#2352;&#2379;&#2306;&#2327;&#2366;&#2354;&#2368; (&#2348;&#2379;&#2361;&#2366;&#2327; &#2348;&#2367;&#2361;&#2370;, &#2309;&#2346;&#2381;&#2352;&#2376;&#2354;), &#2325;&#2379;&#2306;&#2327;&#2366;&#2354;&#2368; (&#2325;&#2366;&#2335;&#2368; &#2348;&#2367;&#2361;&#2370;, &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;), &#2324;&#2352; &#2349;&#2379;&#2327;&#2354;&#2368; (&#2350;&#2366;&#2328; &#2348;&#2367;&#2361;&#2370;, &#2332;&#2344;&#2357;&#2352;&#2368;)&#2404; </span><strong>&#2354;&#2379;&#2325;&#2344;&#2371;&#2340;&#2381;&#2351; </strong><span style=\"font-weight: 400;\">(&#2309;&#2360;&#2350;) - &#2333;&#2370;&#2350;&#2352;, &#2348;&#2327;&#2369;&#2352;&#2369;&#2306;&#2348;&#2366;, &#2360;&#2340;&#2381;&#2352;&#2367;&#2351;&#2366;, &#2342;&#2375;&#2357;&#2343;&#2366;&#2344;&#2368;, &#2309;&#2354;&#2368;-&#2320; &#2354;&#2367;&#2327;&#2306;&#2327;&#2404; </span><strong>&#2328;&#2370;&#2350;&#2352; </strong><span style=\"font-weight: 400;\">(&#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;)&#2404; </span><strong>&#2327;&#2                     solution_en: "<p>96.(d) <span style=\"font-family: Cambria Math;\"><span style=\"font-weight: 400;\">The </span><strong>dendritic pattern</strong><span style=\"font-weight: 400;\"> develops where the river channel follows the slope of the terrain. The stream with its tributaries resembles the branches of a tree, thus the name dendritic. Other drainage patterns are &rarr; </span><strong>Trellis pattern</strong><span style=\"font-weight: 400;\"> (A river joined by its tributaries, at approximately right angles), Radial pattern (streams flow in different directions from a central peak), </span><strong>Rectangular pattern</strong><span style=\"font-weight: 400;\"> (develops on a strongly joined rocky terrain), </span><strong>Parallel pattern</strong><span style=\"font-weight: 400;\"> (Tributary streams tend to stretch out in a parallel-like fashion following the slope of the surface).</span></span></p>\n",
                    solution_hi: "<p>96.(d) <strong>&#2357;&#2371;&#2325;&#2381;&#2359; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; </strong><span style=\"font-weight: 400;\">&#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2361;&#2366;&#2306; &#2344;&#2342;&#2368; &#2330;&#2376;&#2344;&#2354; &#2311;&#2354;&#2366;&#2325;&#2375; &#2325;&#2375; &#2338;&#2354;&#2366;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2343;&#2366;&#2352;&#2366; &#2319;&#2325; &#2346;&#2375;&#2337;&#2364; &#2325;&#2368; &#2358;&#2366;&#2326;&#2366;&#2323;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2340;&#2368; &#2332;&#2369;&#2354;&#2340;&#2368; &#2361;&#2376;, &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2311;&#2360;&#2325;&#2366; &#2344;&#2366;&#2350; &#2357;&#2371;&#2325;&#2381;&#2359; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2404; &#2309;&#2344;&#2381;&#2351; &#2332;&#2354; &#2344;&#2367;&#2325;&#2366;&#2360;&#2368; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2361;&#2376;&#2306; &rarr; </span><strong>&#2335;&#2381;&#2352;&#2375;&#2354;&#2367;&#2360; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344;</strong><span style=\"font-weight: 400;\"> (&#2354;&#2327;&#2349;&#2327; &#2360;&#2350;&#2325;&#2379;&#2339; &#2346;&#2352; &#2309;&#2346;&#2344;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2368; &#2319;&#2325; &#2344;&#2342;&#2368;), &#2352;&#2375;&#2337;&#2367;&#2351;&#2354; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; (&#2319;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2358;&#2367;&#2326;&#2352; &#2360;&#2375; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2342;&#2367;&#2358;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2366;&#2319;&#2306; &#2348;&#2361;&#2340;&#2368; &#2361;&#2376;&#2306;), </span><strong>&#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344;</strong><span style=\"font-weight: 400;\"> (&#2319;&#2325; &#2342;&#2371;&#2338;&#2364;&#2340;&#2366; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344;&#2368; &#2311;&#2354;&#2366;&#2325;&#2375; &#2346;&#2352; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;),</span><strong> &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344;</strong><span style=\"font-weight: 400;\"> ( &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2367;&#2351;&#2366;&#2305; &#2319;&#2325; &#2346;&#2366;&#2352; &#2350;&#2375;&#2306; &#2347;&#2376;&#2354;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2352;&#2326;&#2340;&#2368; &#2361;&#2376;&#2306;</span></p>\n",

                questions.push({
                    id: "97",
                    section: "18",
                    question_en: "<p>97.<span style=\"font-family: Cambria Math;\"> _______ is a system of equitable </span><span style=\"font-family: Cambria Math;\">distribution of water in the command area of the canal outlet.</span></p>\n",
                    question_hi: "<p>97.<span style=\"font-family: Cambria Math;\"> _______, </span><span style=\"font-family: Kokila;\">&#2344;&#2361;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2344;&#2367;&#2352;&#2381;&#2327;&#2350;</span><span style=\"font-family: Cambria Math;\"> (</span><span style=\"font-family: Kokila;\">&#2325;&#2376;&#2344;&#2366;&#2354;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2310;&#2313;&#2335;&#2354;&#2375;&#2335;</span><span style=\"font-family: Cambria Math;\">) </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\">-</span><span style=\"font-family: Kokila;\">&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2350;&#2375;&#2306;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2366;&#2344;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2360;&#2350;&#2366;&#2344;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2357;&#2367;&#2340;&#2352;&#2339;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2325;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2319;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Kokila;\">&#2361;&#2376;&#2404;</span></p>\n",
                    options_en: ["<p>Flow</p>\n", "<p>Lift</p>\n", 
                                "<p>Warabandi</p>\n", "<p>Harvesting</p>\n"],

                    solution_en: "<p>97.(c) <span style=\"font-family: Cambria Math;\"><strong>Warabandi </strong><span style=\"font-weight: 400;\">is a system of rotation of supply of water according to a&nbsp; predetermined schedule as per area and crop needs specifying the day, time and duration of supply to each holding to ensure equitable water distribution among farmers of an outlet command. </span><strong>Flow irrigation system</strong><span style=\"font-weight: 400;\"> &rarr; Water is headed up upstream of Head works and thereby diverted to the canal system. The water is conveyed to the field by gravity only.</span><strong> Lift irrigation system </strong><span style=\"font-weight: 400;\">&rarr; Lift irrigation is a method of irrigation in which water is not transported by natural flow, but is lifted with pumps or surge pools etc.&nbsp;</span></span></p>\n",

            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');

                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);

            // Show first question
            showQuestion(0);

        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML - more compact
            let html = `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="question-text mb-3">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        <div class="options">`;
                        
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = 'option-label';
                
                // When reviewing, highlight user's choice and correct answer
                if (submitted) {
                    if (opt === question.correct) {
                        optionClass += ' border-success bg-success bg-opacity-10';
                    }
                    if (answers[question.id] === opt && opt !== question.correct) {
                        optionClass += ' border-danger bg-danger bg-opacity-10';
                    }
                }
                
                html += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${answers[question.id] === opt ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                        <label class="form-check-label w-100 ${optionClass}" for="opt-${index}-${opt}">
                            ${submitted && opt === question.correct ? '<i class="fas fa-check-circle text-success me-1"></i>' : ''}
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const alertClass = isCorrect ? 'alert-success' : 'alert-danger';
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="alert ${alertClass} mt-3 py-2">
                        <strong>${resultText}</strong>
                        <div class="mt-1 small">
                            <strong>Solution:</strong>
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
        function nextQuestion() { if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
            
            // Update button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('main-content');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                if (window.innerWidth >= 992) {
                    content.classList.add('with-nav');
                }
            } else {
                nav.classList.remove('show');
                if (window.innerWidth >= 992) {
                    content.classList.remove('with-nav');
                }
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer - compact
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            if (confirm(`You have attempted ${attempted} of ${questions.length} questions.
${remaining} questions are unattempted.

Are you sure you want to submit?`)) {
                submitTest();
            }
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.classList.replace('btn-light', 'btn-success');
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
        
        // Add event listener for window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 992) {
                if (document.getElementById('question-nav').classList.contains('show')) {
                    document.getElementById('main-content').classList.add('with-nav');
                }
            } else {
                document.getElementById('main-content').classList.remove('with-nav');
            }
        });
    </script>
</body>
</html>
