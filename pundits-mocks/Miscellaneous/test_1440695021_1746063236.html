<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Test Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        .question-nav{position:fixed;top:70px;right:0;height:calc(100vh - 70px);width:320px;transition:all .3s;z-index:100;display:flex;flex-direction:column}
        .question-content{margin-right:0;transition:all .3s}
        .question-box{width:40px;height:40px;margin:5px;cursor:pointer}
        .attempted{background-color:#3498db!important;color:white}
        .correct{background-color:#2ecc71!important;color:white}
        .incorrect{background-color:#e74c3c!important;color:white}
        .current{border:3px solid #f39c12!important}
        #question-boxes{overflow-y:auto;max-height:calc(100vh - 150px);padding-bottom:15px}
        @media (max-width:768px){.question-nav{width:100%;right:-100%}.question-content{margin-right:0}}
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <!-- Header with controls -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <i class="fas fa-graduation-cap me-2"></i>Smart Test
                </a>
                
                <!-- Section selector -->
                <div class="navbar-nav me-auto section-tabs">
                    <select class="form-select" id="section-selector" onchange="switchSection(this.value)">
                        <option value="all">All Sections</option>
                    </select>
                </div>
                
                <div class="d-flex align-items-center">
                    <!-- Timer -->
                    <div class="bg-light text-primary rounded px-3 py-2 me-2 fw-bold" id="timer">
                        <i class="far fa-clock me-2"></i><span id="timer-display">60:00</span>
                    </div>
                    
                    <!-- Submit button -->
                    <button class="btn btn-success me-2" id="submit-btn" onclick="submitTest()">
                        <i class="fas fa-check me-1"></i> Submit
                    </button>
                    
                    <!-- Language toggle -->
                    <button class="btn btn-light me-2" id="lang-btn" onclick="toggleLanguage()">
                        <i class="fas fa-language"></i>
                    </button>
                    
                    <!-- Menu toggle for mobile -->
                    <button class="btn btn-light d-lg-none" id="menu-toggle" onclick="toggleMenu()">
                        <i class="fas fa-th"></i>
                    </button>
                </div>
            </div>
        </nav>
        
        <div class="row m-0">
            <!-- Main content area -->
            <div class="col p-0 question-content" id="question-content">
                <div class="container py-4">
                    <!-- Question navigation -->
                    <div class="d-flex justify-content-between mb-4">
                        <button class="btn btn-outline-primary" onclick="prevQuestion()">
                            <i class="fas fa-chevron-left me-1"></i> Previous
                        </button>
                        <div class="fw-bold" id="question-counter">Question 1 of 100</div>
                        <button class="btn btn-outline-primary" onclick="nextQuestion()">
                            Next <i class="fas fa-chevron-right ms-1"></i>
                        </button>
                    </div>
                    
                    <!-- Questions will be displayed here -->
                    <div id="questions-container"></div>
                </div>
            </div>
            
            <!-- Question navigation sidebar -->
            <div class="bg-light question-nav" id="question-nav">
                <div class="p-3">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="m-0">Questions</h5>
                        <div>
                            <span class="badge bg-secondary me-1" id="attempted-count">0</span>
                            <span class="badge bg-secondary" id="total-count">100</span>
                            <button class="btn btn-sm btn-outline-secondary ms-2 d-lg-none" onclick="toggleMenu()">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="d-flex flex-wrap" id="question-boxes"></div>
                </div>
            </div>
        </div>
        
        <!-- Results modal -->
        <div class="modal fade" id="results-modal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title">Test Results</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row text-center">
                            <div class="col-6 mb-3">
                                <div class="p-3 bg-primary bg-opacity-10 rounded">
                                    <h3 id="score-value">0</h3>
                                    <div class="small text-muted">Score</div>
                                </div>
                            </div>
                            <div class="col-6 mb-3">
                                <div class="p-3 bg-success bg-opacity-10 rounded">
                                    <h3 id="correct-value">0</h3>
                                    <div class="small text-muted">Correct</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="p-3 bg-danger bg-opacity-10 rounded">
                                    <h3 id="incorrect-value">0</h3>
                                    <div class="small text-muted">Incorrect</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="p-3 bg-secondary bg-opacity-10 rounded">
                                    <h3 id="unattempted-value">0</h3>
                                    <div class="small text-muted">Unattempted</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-primary" onclick="reviewTest()">Review Test</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>

                questions.push({
                    id: "1",
                    section: "6",
                    question_en: "<p>1. Select the option that represents the letters that when placed from left to right in the blanks below will complete the given letter series.<br>P Q _ S _ P P Q P _ A P P Q _ S A P _ Q</p>",
                    question_hi: "<p>1. उस विकल्प का चयन करें जो उन अक्षरों को निरूपित करता है जिन्&zwj;हें नीचे दिए गए रिक्त स्थानों में बाएँ से दाएँ रखे जाने पर दी गई अक्षर श्रृंखला पूरी हो जाएगी।<br>P Q _ S _ P P Q P _ A P P Q _ S A P _ Q</p>",
                    options_en: [
                        "<p>QPASP</p>",
                        "<p>PQSAP</p>",
                        "<p>PASPP</p>",
                        "<p>QSPAP</p>"
                    ],
                    options_hi: [
                        "<p>QPASP</p>",

                        "<p>PASPP</p>",
                        "<p>QSPAP</p>"
                    ],
                    solution_en: "<p>1.(c) P Q <span style=\"text-decoration: underline;\"><strong>P</strong></span> S <span style=\"text-decoration: underline;\"><strong>A</strong></span> P/ P Q P <strong><span style=\"text-decoration: underline;\">S</span></strong> A P/ P Q <span style=\"text-decoration: underline;\"><strong>P</strong></span> S A P/ <span style=\"text-decoration: underline;\"><strong>P</strong></span> Q</p>",
                    solution_hi: "<p>1.(c) P Q <span style=\"text-decoration: underline;\"><strong>P</strong></span> S <span style=\"text-decoration: underline;\"><strong>A</strong></span> P/ P Q P <strong><span style=\"text-decoration: underline;\">S</span></strong> A P/ P Q <span style=\"text-decoration: underline;\"><strong>P</strong></span> S A P/ <span style=\"text-decoration: underline;\"><strong>P</strong></span> Q</p>",
                    correct: "c",
                    pos_marks: 2.0,

                });
                
                questions.push({
                    id: "2",
                    section: "6",
                    question_en: "<p>2. Select the set in which the numbers are related in the same way as are the numbers of the following sets. <br>(<strong>NOTE : </strong>Operations should be performed on the whole numbers, without breaking down the numbers into its constituent digits. E.g. 13 &ndash; Operations on 13 such as adding /deleting /multiplying etc. to 13 can be performed. Breaking down 13 into 1 and 3 and then performing mathematical operations on 1 and 3 is not allowed.) <br>(19, 456, 6) <br>(16, 320, 5)</p>",
                    question_hi: "<p>2. उस समुच्चय का चयन करें जिसमें दी गई संख्याएँ आपस में उसी प्रकार संबंधित हैं, जिस प्रकार प्रश्न में दिए गए समुच्चय की संख्याएँ आपस में संबंधित हैं।<br>(<strong>ध्यान दें : </strong>संख्याओं को उनके घटक अंकों में तोड़े बिना, पूर्ण संख्याओं पर गणितीय संक्रियाएँ की जानी चाहिए। जैसे, 13 के मामले में - 13 पर की जाने वाली विभिन्न गणितीय संक्रियाएँ जैसे जोड़ना / घटाना / गुणा करना आदि केवल 13 के साथ की जा सकती हैं। लेकिन 13 को 1 और 3 में तोड़ने और फिर 1 और 3 पर गणितीय संक्रियाएँ करने की अनुमति नहीं है।)<br>(19, 456, 6) <br>(16, 320, 5)</p>",
                    options_en: [
                        "<p>(18, 378, 7)</p>",
                        "<p>(14, 210, 5)</p>",
                        "<p>(21, 504, 8)</p>",
                        "<p>(18, 648, 9)</p>"
                    ],
                    options_hi: [
                        "<p>(18, 378, 7)</p>",
                        "<p>(14, 210, 5)</p>",
                        "<p>(21, 504, 8)</p>",
                        "<p>(18, 648, 9)</p>"
                    ],
                    solution_en: "<p>2.(d)<strong> Logic :-</strong> (1st number &times; 3rd number) &times; 4 = 2nd number<br>(19, 456, 6) :- (19 &times; 6) &times; 4 &rArr; (114) &times; 4 = 456<br>(16, 320,5):- (16 &times; 5) &times; 4 &rArr; (80) &times; 4 = 320<br>Similarly,<br>(18, 648, 9) :- (18 &times; 9) &times; 4 &rArr; (162) &times; 4 = 648</p>",
                    solution_hi: "<p>2.(d)<strong> तर्क :- </strong>(पहली संख्या &times; तीसरी संख्या) &times; 4 = दूसरी संख्या<br>(19, 456, 6) :- (19 &times; 6) &times; 4 &rArr; (114) &times; 4 = 456<br>(16, 320,5):- (16 &times; 5) &times; 4 &rArr; (80) &times; 4 = 320<br>इसी प्रकार,<br>(18, 648, 9) :- (18 &times; 9) &times; 4 &rArr; (162) &times; 4 = 648</p>",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                
                questions.push({
                    id: "3",
                    section: "6",
                    question_en: "<p>3. Select the option figure that will replace the question mark (?) in the figure given below to complete the pattern.<br><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794923020.png\" alt=\"rId4\" width=\"97\" height=\"93\"></p>",
                    question_hi: "<p>3. उस विकल्प आकृति का चयन कीजिए, जो पैटर्न को पूरा करने के लिए नीचे दी गई आकृति में प्रश्न-चिह्न (?) के स्थान पर आएगी।<br><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794923020.png\" alt=\"rId4\" width=\"97\" height=\"93\"></p>",
                    options_en: [
                        "<p><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794923159.png\" alt=\"rId5\" width=\"74\" height=\"72\"></p>",
                        "<p><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794923256.png\" alt=\"rId6\" width=\"74\" height=\"70\"></p>",
                        "<p><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794923362.png\" alt=\"rId7\" width=\"74\" height=\"71\"></p>",
                        "<p><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794923480.png\" alt=\"rId8\" width=\"75\" height=\"71\"></p>"
                    ],
                    options_hi: [
                        "<p><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794923159.png\" alt=\"rId5\" width=\"74\" height=\"72\"></p>",
                        "<p><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794923256.png\" alt=\"rId6\" width=\"74\" height=\"70\"></p>",
                        "<p><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794923362.png\" alt=\"rId7\" width=\"74\" height=\"71\"></p>",
                        "<p><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794923480.png\" alt=\"rId8\" width=\"74\" height=\"70\"></p>"
                    ],
                    solution_en: "<p>3.(d)<br><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794923480.png\" alt=\"rId8\" width=\"74\" height=\"70\"></p>",
                    solution_hi: "<p>3.(d)<br><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794923480.png\" alt=\"rId8\" width=\"74\" height=\"70\"></p>",
                    correct: "d",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                
                questions.push({
                    id: "4",
                    section: "6",
                    question_en: "<p>4. 19 is related to 209 following a certain logic. Following the same logic, 27 is related to 297. To which of the following is 61 related, following the same logic? <br>(<strong>NOTE :</strong> Operations should be performed on the whole numbers, without breaking down the numbers into its constituent digits. E.g. 13 &ndash; Operations on 13 such as adding /deleting /multiplying etc. to 13 can be performed. Breaking down 13 into 1 and 3 and then performing mathematical operations on 1 and 3 is not allowed)</p>",
                    question_hi: "<p>4. एक निश्चित तर्क का अनुसरण करते हुए 19, 209 से संबंधित है। उसी तर्क का अनुसरण करते हुए, 27, 297 से संबंधित है। उसी तर्क का अनुसरण करते हुए, 61 निम्नलिखित में से किससे संबंधित है ?&nbsp;<br>(<strong>नोट:</strong> संख्याओं को उसके घटक अंकों में तोड़े बिना, पूर्ण संख्याओं पर संक्रियाएं की जानी चाहिए। उदाहरण के लिए संख्या 13 को लें - 13 पर संक्रियाएं, जैसे कि 13 में जोड़ना/घटाना/गुणा करना आदि, की जा सकती हैं। 13 को 1 और 3 में तोड़ने और फिर 1 और 3 पर गणितीय संक्रियाएं करने की अनुमति नहीं है)</p>",
                    options_en: [
                        "<p>653</p>",
                        "<p>671</p>",
                        "<p>571</p>",
                        "<p>600</p>"
                    ],
                    options_hi: [
                        "<p>653</p>",
                        "<p>671</p>",
                        "<p>571</p>",
                        "<p>600</p>"
                    ],
                    solution_en: "<p>4.(b)<strong> Logic:- </strong>1st number &times; 11 = 2nd number<br>(19, 209) :- 19 &times; 11 = 209<br>(27, 297) :- 27 &times; 11 = 297<br>Similarly,<br>(61 , 671) :- 61&times; 11 = 671</p>",
                    solution_hi: "<p>4.(b) <strong>तर्क:-</strong> पहली संख्या &times; 11 = दूसरी संख्या<br>(19, 209) :- 19 &times; 11 = 209<br>(27, 297) :- 27 &times; 11 = 297<br>इसी प्रकार,<br>(61 , 671) :- 61 &times; 11 = 671</p>",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                
                questions.push({
                    id: "5",
                    section: "6",
                    question_en: "<p>5. In a certain code language,<br>A + B means \'A is the Brother\'s Wife of B\'<br>A - B means \'A is the Sister of B\'<br>A ✕ B means \'A is the Wife of B\'<br>A &divide; B means \'A is the Daughter of B\'<br>Based on the above, how is G related to Q if \'G + K - L &divide; M ✕ Q\' ?</p>",
                    question_hi: "<p>5. एक निश्चित कूट भाषा में,<br>A+B का अर्थ है \'A, B के भाई की पत्नी है,<br>A - B का अर्थ है \'A, B की बहन है,<br>A ✕ B का अर्थ है \'A, B की पत्नी है\',<br>A &divide; B का अर्थ है \'A, B की पुत्री है\'।<br>उपरोक्त के आधार पर, यदि \'G + K - L &divide; M ✕ Q\' है तो G, Q से किस प्रकार संबंधित है ?</p>",
                    options_en: [
                        "<p>Son\'s wife</p>",
                        "<p>Sister</p>",
                        "<p>Wife\'s Sister</p>",
                        "<p>Daughter</p>"
                    ],
                    options_hi: [
                        "<p>पुत्रवधू</p>",
                        "<p>बहन</p>",
                        "<p>साली</p>",
                        "<p>पुत्री</p>"
                    ],
                    solution_en: "<p>5.(a)<br><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794923631.png\" alt=\"rId9\" width=\"207\" height=\"74\"><br>G is the son&rsquo;s wife of Q</p>",
                    solution_hi: "<p>5.(a)<br><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794923631.png\" alt=\"rId9\" width=\"207\" height=\"74\"><br>G, Q के बेटे की पत्नी (पुत्रवधू) है</p>",
                    correct: "a",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                
                questions.push({
                    id: "6",
                    section: "6",
                    question_en: "<p>6. What will come in the place of the question mark (?) in the following equation, if &lsquo;+&rsquo; and &lsquo;&minus;&rsquo; are interchanged and &lsquo;&times;&rsquo; and &lsquo;&divide;&rsquo; are interchanged ?<br>101 &divide; 48 &minus; 13013 &times; 13 + 12 = ?</p>",
                    question_hi: "<p>6. यदि \'+\' और \'&minus;\' को आपस में बदल दिया जाए, और \'&times;\' और \'&divide;\' को आपस में बदल दिया जाए, तो निम्नलिखित समीकरण में प्रश्न-चिन्ह (?) के स्थान पर क्या आयेगा ?<br>101 &divide; 48 &minus; 13013 &times; 13 + 12 = ?</p>",
                    options_en: [
                        "<p>5836</p>",
                        "<p>5835</p>",
                        "<p>5837</p>",
                        "<p>5834</p>"
                    ],
                    options_hi: [
                        "<p>5836</p>",
                        "<p>5835</p>",
                        "<p>5837</p>",
                        "<p>5834</p>"
                    ],
                    solution_en: "<p>6.(c) <strong>Given:</strong> 101 &divide; 48 &minus; 13013 &times; 13 + 12<br>As per instructions given in the question, after interchanging the symbol &lsquo;&times;&rsquo; and &lsquo;&divide;&rsquo; and &lsquo;+&rsquo; and &lsquo;&minus;&rsquo; we get.<br>101 &times; 48 + 13013 &divide; 13 - 12<br>101 &times; 48 + 1001 - 12<br>4848 + 1001 - 12<br>5849 - 12 = 5837</p>",
                    solution_hi: "<p>6.(c) <strong>दिया गया है: </strong>101 &divide; 48 &minus; 13013 &times; 13 +12<br>प्रश्न में दिए गए निर्देशों के अनुसार, प्रतीक \'&times;\' और \'&divide;\' तथा \'+\' और \'-\' को आपस में बदलने पर हमें प्राप्त होता है।<br>101 &times; 48 + 13013 &divide; 13 - 12<br>101 &times; 48 + 1001 - 12<br>4848 + 1001 - 12<br>5849 - 12 = 5837</p>",
                    correct: "c",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });
                
                questions.push({
                    id: "7",

                questions.push({
                    id: "12",
                    section: "6",
                    question_en: "<p>12. If &lsquo;+&rsquo; means &lsquo;&ndash;&rsquo; , &lsquo;&ndash;&rsquo; means &lsquo;&times;&rsquo; , &lsquo;&times;&rsquo; means &lsquo;&divide;&rsquo;, &lsquo;&divide;&rsquo; means &lsquo;+&rsquo;, what will come in place of the question mark (?) in the following equation ?<br>42 &times; 3 &ndash; 16 &divide; 9 + 11 = ?</p>",
                    question_hi: "<p>12 यदि &lsquo;<math display=\"inline\"><mo>+</mo></math>&rsquo; का अर्थ &lsquo;-&rsquo; हो,\'-&rsquo; का अर्थ \'&times;\' हो, \'&times;\' का अर्थ \'&divide;\' हो, \'&divide;\' का अर्थ \'+\' हो, तो निम्नलिखित समीकरण में प्रश्नचिह्न (?) के स्थान पर क्या आएगा ?<br>42 &times; 3 &ndash; 16 &divide; 9 + 11 = ?</p>",

                        "<p>222</p>",
                        "<p>240</p>",
                        "<p>232</p>",
                        "<p>227</p>"
                    ],
                    options_hi: [

                        "<p>232</p>",
                        "<p>227</p>"
                    ],
                    solution_en: "<p>12.(a) <strong>Given :- </strong>42 &times; 3 - 16 <math display=\"inline\"><mo>&#247;</mo></math> 9 + 11<br>As per given instruction after interchanging the sign we get,<br>42 <math display=\"inline\"><mo>&#247;</mo></math> 3 &times; 16 + 9 - 11<br>14 &times; 16 + 9 - 11<br>224 + 9 -11<br>233 - 11 = 222</p>",
                    solution_hi: "<p>12.(a) <strong>दिया गया :- </strong>42 &times; 3 - 16<math display=\"inline\"><mo>&#247;</mo></math> 9 + 11<br>दिए गए निर्देश के अनुसार चिह्न को आपस में बदलने पर हमें मिलता है , <br>42 <math display=\"inline\"><mo>&#247;</mo></math> 3 &times; 16 + 9 - 11<br>14 &times; 16 + 9 - 11<br>224 + 9 -11<br>233 - 11 = 222</p>",
                    correct: "a",

                });

                    ],
                    solution_en: "<p>26.(c)<strong> Ladakh. </strong>Losar, the Tibetan New Year, is a key festival in Tibetan Buddhism celebrated primarily in Tibet, Bhutan, Nepal (as Lhochhar), and parts of India, including Arunachal Pradesh, Sikkim, and Ladakh. It marks the start of the new year in Tibet and Ladakh, beginning on the new moon that ushers in the first day of the Tibetan calendar&rsquo;s first month. The festival is celebrated over 15 days. Other festivals of Ladakh - Tak-Thok Tse-Chu, Yuru Kabgyat, Matho Nagrang, Dosmoche, Hemis, and Sindhu Darshan.</p>",
                    solution_hi: "<p>26.(c)<strong> लद्दाख।</strong> लोसर, तिब्बती नव वर्ष, तिब्बती बौद्ध धर्म का एक प्रमुख त्योहार है जिसे मुख्य रूप से तिब्बत, भूटान, नेपाल (लोछार के रूप में) और भारत के कुछ हिस्सों में मनाया जाता है, जिसमें अरुणाचल प्रदेश, सिक्किम और लद्दाख शामिल हैं। यह तिब्बत और लद्दाख में नए वर्ष की शुरुआत का प्रतीक है, जो तिब्बती कैलेंडर के पहले महीने के पहले दिन अमावस्या से शुरू होता है। यह त्योहार 15 दिनों तक मनाया जाता है। लद्दाख के अन्य त्योहार - टक-टोक त्से-चू, युरु कबग्यात, माथो नागरंग, दोस्मोचे, हेमिस और सिंधु दर्शन।</p>",

                    question_en: "<p>30. The chemical compound present in turmeric is:</p>",
                    question_hi: "<p>30. हल्दी में निम्नलिखित में से कौन-सा रासायनिक यौगिक मौजूद होता है ?</p>",

                    solution_en: "<p>30.(a) <strong>Curcumin </strong>(Diferuloylmethane), found in turmeric and Curcuma Xanthorrhiza oil, has antibacterial, anti-inflammatory, hypoglycemic, and antioxidant properties. It is effective in managing conditions like diabetes, arthritis, and oxidative stress. Studies also highlight its wound-healing and antimicrobial effects. As a pleiotropic molecule, curcumin influences various biological pathways, offering therapeutic potential in combating inflammation and promoting health.</p>",
                    solution_hi: "<p>30.(a) <strong>करक्यूमिन </strong>(डाइफेरूलोइलमीथेन) जो हल्दी और करक्यूमा जैन्थोरिजा तेल में पाए जाते हैं, इसमे जीवाणुरोधी, सूजनरोधी, हाइपोग्लाइसेमिक और एंटीऑक्सीडेंट गुण होते हैं। यह मधुमेह, गठिया और ऑक्सीडेटिव तनाव जैसी स्थितियों के प्रबंधन में प्रभावी है। अध्ययनों में इसके घाव भरने और रोगाणुरोधी प्रभावों में भी मदद करता है। एक बहुल अणु के रूप में, करक्यूमिन विभिन्न जैविक मार्गों को प्रभावित करता है, यह सूजन निवारण और स्वास्थ्य को बढ़ावा देने में चिकित्सीय क्षमता प्रदान करता है।</p>",

                    solution_en: "<p>31.(d) Pietra Dura is a decorative art style involving inlaying semi-precious stones into marble to create intricate floral or geometric designs. It is famously used in Mughal architecture, especially the Taj Mahal, along with arabesque, calligraphy, relief carving, and jalis. Lapis lazuli was often used in interiors and canopies, adding to the elegance of the structures.</p>",

                    ],
                    solution_en: "<p>35.(c) <strong>Purvanchal. </strong>The Patkai Bum hills are located in the Eastern part of India. Assam, Manipur, Meghalaya, Mizoram and Nagaland. These mountains, also known as the Eastern Hills. These hills are located in northeastern India, mainly in Nagaland, Arunachal Pradesh, and Myanmar, forming a natural boundary between India and Myanmar. Western Ghats are locally known by different names such as Sahyadri in Maharashtra, Nilgiri hills in Karnataka and Tamil Nadu and Anaimalai hills and Cardamom hills in Kerala. The Western Ghats are higher and more continuous than the Eastern Ghats. &lsquo;Anaimudi&rsquo; (2,695 m), the highest peak of the Peninsular plateau, is located on the Anaimalai hills of the Western Ghats followed by Dodabetta (2,637 m) on the Nilgiri hills.</p>",
                    solution_hi: "<p>35.(c) <strong>पूर्वांचल। </strong>पटकाई बम पहाड़ियाँ भारत के पूर्वी भाग, असम, मणिपुर, मेघालय, मिजोरम और नागालैंड में स्थित हैं। इन पर्वतों को पूर्वी पहाड़ियों के नाम से भी जाना जाता है। ये पहाड़ियाँ पूर्वोत्तर भारत में स्थित हैं, मुख्य रूप से नागालैंड, अरुणाचल प्रदेश और म्यांमार में, जो भारत और म्यांमार के बीच एक प्राकृतिक सीमा बनाती हैं। पश्चिमी घाट को स्थानीय रूप से अलग-अलग नामों से जाना जाता है जैसे महाराष्ट्र में सह्याद्री, कर्नाटक और तमिलनाडु में नीलगिरी पहाड़ियाँ तथा केरल में अन्नामलाई पहाड़ियाँ एवं कार्डमम पहाड़ियाँ। पश्चिमी घाट पूर्वी घाट की तुलना में अधिक ऊँची एवं निरंतर श्रृंखला है। \'अनाइमुडी\' (2,695 मीटर), प्रायद्वीपीय पठार की सबसे ऊंची चोटी, पश्चिमी घाट की अनाईमलाई पहाड़ियों पर स्थित है, जिसके बाद नीलगिरी पहाड़ियों पर दोड्डाबेट्टा (2,637 मीटर) है।</p>",

                questions.push({
                    id: "36",
                    section: "18",
                    question_en: "<p>36. Calculate the revenue receipts from the following information.<br>Revenue deficit = 2.80% of GDP Revenue expenditure = 10.80% of GDP</p>",
                    question_hi: "<p>36. निम्नलिखित जानकारी से राजस्व प्राप्तियों की गणना कीजिए।<br>राजस्व घाटा = जी . डी . पी . का 2.80% राजस्व व्यय = जी . डी . पी . का 10.80%</p>",
                    options_en: [
                        "<p>12.80</p>",
                        "<p>8.00</p>",
                        "<p>13.60</p>",
                        "<p>2.70</p>"
                    ],
                    options_hi: [
                        "<p>12.80</p>",
                        "<p>8.00</p>",
                        "<p>13.60</p>",
                        "<p>2.70</p>"
                    ],
                    solution_en: "<p>36.(b) <strong>8.00.</strong> To calculate the Revenue Receipts, we need to use the given information about the Revenue Deficit and Revenue Expenditure as percentages of GDP. <br>Formula for Revenue Deficit : Revenue Deficit = Revenue Expenditure &minus; Revenue Receipts<br>Given :<br>Revenue Deficit = 2.80% of GDP<br>Revenue Expenditure = 10.80% of GDP<br>Now, We can set up an equation:<br>2.80% = 10.80% - Revenue Receipts<br>To find Revenue Receipts:<br>Revenue Receipts = 10.80% - 2.80% = 8.00%</p>",
                    solution_hi: "<p>36.(b) <strong>8.00। </strong>राजस्व प्राप्तियों की गणना करने के लिए, हमें GDP के प्रतिशत के रूप में राजस्व घाटा और राजस्व व्यय के बारे में दी गई जानकारी का उपयोग करने की आवश्यकता है।<br>राजस्व घाटे का सूत्र : राजस्व घाटा = राजस्व व्यय - राजस्व प्राप्तियाँ<br>दिया गया :<br>राजस्व घाटा = GDP का 2.80%<br>राजस्व व्यय = GDP का 10.80%<br>अब, हम एक समीकरण बना सकते हैं:<br>2.80% = 10.80% - राजस्व प्राप्तियाँ<br>राजस्व प्राप्तियाँ ज्ञात करने के लिए:<br>राजस्व प्राप्तियाँ = 10.80% - 2.80% = 8.00%</p>",
                    correct: "b",
                    pos_marks: 2.0,
                    neg_marks: 0.5
                });

                    solution_en: "<p>42.(d) <strong>Destruction of the Forty.</strong> Balban (ruled from 1266 to 1287), also known as Ghiyas ud-Din Balban, was the ninth Sultan of the Delhi Sultanate. His rule is associated with the downfall of a group known as \"the Forty,\" a group of influential nobles. His rule was characterized by a military approach, which was referred to as the \"policy of blood and iron. He faced numerous Mongol invasions. He established the office of the Diwan-i-Ariz (military department).</p>",

                    solution_en: "<p>46.(b) <strong>Government of India Act, 1858</strong> transferred control of India from the East India Company to the British Crown, marking the start of the British Raj. The 1919 Act codified the Montag-Chelmsford reforms. The Charter Act of 1853 renewed the East India Company&rsquo;s charter, while the 1833 Act, also known as the Saint Helena Act, restructured British India\'s governance.</p>",

                    solution_hi: "<p>49.(a) <strong>जल भंडारण एवं पुनर्भरण। </strong>बावरी या सीढ़ीदार कुएं भारत में पारंपरिक संरचनाएं हैं जिन्हें पीने के पानी और वर्षा जल संचयन के लिए बनाया गया है, खासकर शुष्क क्षेत्रों में। खानाबदोशों द्वारा निर्मित, ये कुएं कम वाष्पीकरण दर के कारण लंबे समय तक जल बनाए रखते हैं। इन्हें सूखे की समस्याओं को दूर करने के लिए बनाया गया था और इन्हें विभिन्न क्षेत्रों में वाव, वावड़ी, बावरी, बावली और बावड़ी जैसे विभिन्न नामों से जाना जाता है। भारत में प्रसिद्ध बावरियाँ: चांद बावरी (राजस्थान), रानी की वाव (गुजरात), अग्रसेन की बावली (नई दिल्ली)।</p>",

                    solution_en: "<p>50.(a) <strong>18 years. </strong>Universal adult franchise allows all adults to vote. Article 325 of the Constitution ensures universal suffrage, prohibiting exclusion from electoral rolls based on religion, race, caste, or sex. Under this principle, all citizens aged 18 and above, regardless of social or economic background, have the right to vote. The 61st Amendment Act of 1988 lowered the voting age from 21 to 18, receiving presidential assent on 28th March 1989 from President R. Venkataraman.</p>",
                    solution_hi: "<p>50.(a) <strong>18 वर्ष। </strong>सार्वभौमिक वयस्क मताधिकार सभी वयस्कों को मतदान करने की अनुमति देता है। संविधान के अनुच्छेद 325 सार्वभौमिक मताधिकार सुनिश्चित करता है, धर्म, नस्ल, जाति या लिंग के आधार पर मतदाता सूची से बहिष्कार को रोकता है। इस सिद्धांत के तहत, 18 वर्ष या उससे अधिक आयु के सभी नागरिकों को, चाहे उनकी सामाजिक या आर्थिक पृष्ठभूमि कुछ भी हो, मतदान का अधिकार है। 1988 के 61वें संशोधन अधिनियम ने मतदान की आयु 21 वर्ष से घटाकर 18 वर्ष कर दी, जिसे 28 मार्च 1989 को राष्ट्रपति आर. वेंकटरमण से स्वीकृति मिली।</p>",

                questions.push({
                    id: "54",

                    question_en: "<p>54. If x&sup2; + 7x + 8 = 0, then find the value of <math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>4</mn><mi>x</mi></mrow><mrow><msup><mi>x</mi><mn>2</mn></msup><mo>-</mo><mn>5</mn><mi>x</mi><mo>+</mo><mn>8</mn></mrow></mfrac></math></p>",

                        "<p><math display=\"inline\"><mfrac><mrow><mn>1</mn></mrow><mrow><mn>6</mn></mrow></mfrac></math></p>"
                    ],
                    solution_en: "<p>54.(c)<br><math display=\"inline\"><msup><mrow><mi>x</mi></mrow><mrow><mn>2</mn></mrow></msup></math> + 7x + 8 = 0<br>On dividing by <math display=\"inline\"><mi>x</mi></math> we get,<br><math display=\"inline\"><mi>x</mi></math> + 7 + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>8</mn><mi>x</mi></mfrac></math> = 0<br><math display=\"inline\"><mi>x</mi></math> + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>8</mn><mi>x</mi></mfrac></math> = -7 &hellip;. (i)<br>Now,<br><math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>4</mn><mi>x</mi></mrow><mrow><msup><mi>x</mi><mn>2</mn></msup><mo>-</mo><mn>5</mn><mi>x</mi><mo>+</mo><mn>8</mn></mrow></mfrac></math><br>On dividing by <math display=\"inline\"><mi>x</mi></math> we get,<br><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>4</mn><mrow><mi>x</mi><mo>+</mo><mfrac><mn>8</mn><mi>x</mi></mfrac><mo>-</mo><mn>5</mn></mrow></mfrac></math><br><math display=\"inline\"><mfrac><mrow><mn>4</mn></mrow><mrow><mo>-</mo><mn>7</mn><mo>-</mo><mn>5</mn></mrow></mfrac></math> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>4</mn><mrow><mo>-</mo><mn>12</mn></mrow></mfrac></math> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>-</mo><mn>1</mn></mrow><mn>3</mn></mfrac></math></p>",
                    solution_hi: "<p>54.(c)<br><math display=\"inline\"><msup><mrow><mi>x</mi></mrow><mrow><mn>2</mn></mrow></msup></math> + 7x + 8 = 0<br><math display=\"inline\"><mi>x</mi></math> से भाग देने पर हमें प्राप्त होता है,<br><math display=\"inline\"><mi>x</mi></math> + 7 + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>8</mn><mi>x</mi></mfrac></math> = 0<br><math display=\"inline\"><mi>x</mi></math> + <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>8</mn><mi>x</mi></mfrac></math> = -7 &hellip;. (i)<br>अब,<br><math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>4</mn><mi>x</mi></mrow><mrow><msup><mi>x</mi><mn>2</mn></msup><mo>-</mo><mn>5</mn><mi>x</mi><mo>+</mo><mn>8</mn></mrow></mfrac></math><br>x से भाग देने पर हमें प्राप्त होता है,<br><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>4</mn><mrow><mi>x</mi><mo>+</mo><mfrac><mn>8</mn><mi>x</mi></mfrac><mo>-</mo><mn>5</mn></mrow></mfrac></math><br><math display=\"inline\"><mfrac><mrow><mn>4</mn></mrow><mrow><mo>-</mo><mn>7</mn><mo>-</mo><mn>5</mn></mrow></mfrac></math> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>4</mn><mrow><mo>-</mo><mn>12</mn></mrow></mfrac></math> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>-</mo><mn>1</mn></mrow><mn>3</mn></mfrac></math></p>",

                questions.push({
                    id: "58",
                    section: "17",
                    question_en: "<p>58. A cistern can be filled by two pipes in 8 minutes and 10 minutes, separately. Both the pipes are opened together for a certain time, but due to an obstruction, only <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>5</mn><mn>8</mn></mfrac></math> of the full quantity of water flowed through the former pipe and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>5</mn></mfrac></math>&nbsp;through the latter pipe. However, the obstruction was suddenly removed, and the cistern was filled in 3 minutes from that moment. How long did it take before the full flow began ?</p>",
                    question_hi: "<p>58. एक टंकी दो पाइपों द्वारा स्वतंत्र रूप से 8 मिनट और 10 मिनट में भरी जा सकती है। दोनों पाइपों को एक साथ कुछ समय के लिए खोला जाता है, लेकिन किसी अवरोध के कारण, पहले पाइप से जल की पूरी मात्रा का केवल <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>5</mn><mn>8</mn></mfrac></math> भाग और दूसरे पाइप से <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>3</mn><mn>5</mn></mfrac></math> भाग प्रवाहित होता है। हालांकि, अवरोध अचानक निकल जाता है, और उस क्षण से 3 मिनट में टंकी भर जाती है। पूर्ण प्रवाह शुरू होने से पहले कितना समय लगा?</p>",
                    options_en: [

                        "<p>2<math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>6</mn><mn>17</mn></mfrac></math>minutes</p>",
                        "<p>9<math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>6</mn><mn>7</mn></mfrac></math>minutes</p>",
                        "<p>2<math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>30</mn><mn>37</mn></mfrac></math>minutes</p>"

                    options_hi: [
                        "<p>3<math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mn>16</mn></mfrac></math> मिनट</p>",
                        "<p>2<math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>6</mn><mn>17</mn></mfrac></math> मिनट</p>",

                    ],
                    solution_en: "<p>58.(b)<br><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794929093.png\" alt=\"rId55\" width=\"172\" height=\"179\"><br>Water filled by Pipe A and Pipe B in 3 min. <br>= (5 + 4) <math display=\"inline\"><mo>&#215;</mo></math> 3 = 27 unit<br>Remaining water to be filled <br>= 40 - 27 = 13 unit<br>Due to blockage- <br>Efficiency of Pipe A = (5 &times; <math display=\"inline\"><mfrac><mrow><mn>5</mn></mrow><mrow><mn>8</mn></mrow></mfrac></math>) = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>25</mn><mn>8</mn></mfrac></math>unit&nbsp;<br>Efficiency of Pipe B = (4 &times; <math display=\"inline\"><mfrac><mrow><mn>3</mn></mrow><mrow><mn>5</mn></mrow></mfrac></math>) = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>12</mn><mn>5</mn></mfrac></math> unit <br>Time taken by to fill remaining water when there was blockage = <math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>13</mn><mrow><mo>(</mo><mfrac><mn>25</mn><mn>8</mn></mfrac><mo>+</mo><mfrac><mn>12</mn><mn>5</mn></mfrac><mo>)</mo></mrow></mfrac></math> <br>= <math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>13</mn><mo>&#215;</mo><mn>40</mn></mrow><mrow><mn>125</mn><mo>+</mo><mn>96</mn></mrow></mfrac></math> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>520</mn><mn>221</mn></mfrac></math> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>40</mn><mn>17</mn></mfrac></math> = 2<math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>6</mn><mn>7</mn></mfrac></math>minutes</p>",
                    solution_hi: "<p>58.(b)<br><img src=\"https://d2jnyx7x72uicf.cloudfront.net/image_1744794929244.png\" alt=\"rId56\" width=\"154\" height=\"159\"><br>पाइप A और पाइप B द्वारा 3 मिनट में भरा गया पानी <br>= (5 + 4) <math display=\"inline\"><mo>&#215;</mo></math> 3 = 27 इकाई<br>भरा जाने वाला शेष जल = 40 - 27 = 13 इकाई<br>अवरोध के कारण- <br>पाइप A की दक्षता = (5 &times; <math display=\"inline\"><mfrac><mrow><mn>5</mn></mrow><mrow><mn>8</mn></mrow></mfrac></math>) = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>25</mn><mn>8</mn></mfrac></math> इकाई&nbsp;<br>पाइप B की दक्षता = (4 &times; <math display=\"inline\"><mfrac><mrow><mn>3</mn></mrow><mrow><mn>5</mn></mrow></mfrac></math>) = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>12</mn><mn>5</mn></mfrac></math> इकाई <br>अवरोध के कारण बचा हुआ पानी भरने में लगा समय = <math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>13</mn><mrow><mo>(</mo><mfrac><mn>25</mn><mn>8</mn></mfrac><mo>+</mo><mfrac><mn>12</mn><mn>5</mn></mfrac><mo>)</mo></mrow></mfrac></math> = <math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>13</mn><mo>&#215;</mo><mn>40</mn></mrow><mrow><mn>125</mn><mo>+</mo><mn>96</mn></mrow></mfrac></math> <br>= <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>520</mn><mn>221</mn></mfrac></math> = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>40</mn><mn>17</mn></mfrac></math> = 2<math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>6</mn><mn>7</mn></mfrac></math>&nbsp;मिनट</p>",
                    correct: "b",

                questions.push({
                    id: "59",
                    section: "17",
                    question_en: "<p>59. A dishonest dealer claims to sell his products at 24% loss on the cost price but uses 100 g weight instead of 200 g weight. His profit percentage is:</p>",

                        "<p>40%</p>",
                        "<p>48%</p>",
                        "<p>55%</p>"
                    ],
                    solution_en: "<p>59.(a)<br>Ratio&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&rarr;&nbsp; C.P.&nbsp; :&nbsp; &nbsp;S.P.<br>Due to loss&nbsp; &nbsp; &nbsp;&rarr;&nbsp; &nbsp;25&nbsp; &nbsp; :&nbsp; &nbsp;19<br>Due to weight &rarr;&nbsp; 100&nbsp; &nbsp;:&nbsp; &nbsp;200<br>-------------------------------------------<br>Overall&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&rarr; 2500&nbsp; :&nbsp; 3800</p>\n<p>Profit % =&nbsp;<math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>(</mo><mn>3800</mn><mo>-</mo><mn>2500</mn><mo>)</mo></mrow><mn>2500</mn></mfrac></math> &times; 100</p>\n<p>=&nbsp;<math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1300</mn><mn>2500</mn></mfrac></math> &times; 100&nbsp;</p>\n<p>= 13 &times; 4 = 52 %</p>",
                    solution_hi: "<p>59.(a)<br>अनुपात&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&rarr;&nbsp; C.P.&nbsp; :&nbsp; S.P.<br>हानि के कारण&nbsp; &rarr;&nbsp; 25&nbsp; &nbsp; :&nbsp; 19<br>वजन के कारण &rarr;&nbsp; 100&nbsp; :&nbsp; 200<br>------------------------------------------<br>कुल मिलाकर&nbsp; &rarr;&nbsp; 2500 :&nbsp; 3800</p>\n<p>लाभ % = <math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mo>(</mo><mn>3800</mn><mo>-</mo><mn>2500</mn><mo>)</mo></mrow><mn>2500</mn></mfrac></math> &times; 100</p>\n<p>=&nbsp;<math display=\"inline\" xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1300</mn><mn>2500</mn></mfrac></math> &times; 100&nbsp;</p>\n<p>= 13 &times; 4 = 52 %</p>",
                    correct: "a",

                    neg_marks: 0.5
                });
                
                questions.push({
                    id: "60",
                    section: "17",
                    question_en: "<p>60. A flask is full of 20% sulphuric acid solution. A part of this 20% sulphuric acid solution is replaced by a 4% sulphuric acid solution and in this process 10% sulphuric acid solution is obtained. What fraction of 20% sulphuric acid solution is replaced from the flask ?</p>",
                    question_hi: "<p>60. एक फ्लास्क 20% सल्फ्यूरिक अम्ल के विलयन से भरा हुआ है। इस 20% सल्फ्यूरिक अम्ल के विलयन के कुछ भाग को 4% सल्फ्यूरिक अम्ल के विलयन से बदल दिया जाता है और इस प्रक्रिया में 10% सल्फ्यूरिक अम्ल का विलयन प्राप्त होता है। फ्लास्क से 20% सल्फ्यूरिक अम्ल के विलयन का कितना भाग बदला जाता है ?</p>",
                    options_en: [
                        "<p><math display=\"inline\"><mfrac><mrow><mn>3</mn></mrow><mrow><mn>5</mn></mrow></mfrac></math></p>",
                        "<p><math display=\"inline\"><mfrac><mrow><mn>2</mn></mrow><mrow><mn>5</mn></mrow></mfrac></math></p>",
                        "<p><math display=\"inline\"><mfrac><mrow><mn>7</mn></mrow><mrow><mn>8</mn></mrow></mfrac></math></p>",
                        "<p><math display=\"inline\"><mfrac><mrow><mn>5</mn></mrow><mrow><mn>8</mn></mrow></mfrac></math></p>"

                    options_hi: [

                        "<p><math display=\"inline\"><mfrac><mrow><mn>7</mn></mrow><mrow><mn>8</mn></mrow></mfrac></math></p>",
                        "<p><math display=\"inline\"><mfrac><mrow><mn>5</mn></mrow><mrow><mn>8</mn></mrow></mfrac></math></p>"
                    ],
                    solution_en: "<p>60.(d) <br>Let x be the fraction of 20% sulphuric acid solution replaced.<br>Using the equation:<br>&rArr; (1 &minus; x) &times; 20 + x &times; 4 = 10<br>&rArr; 20 &minus; 20x + 4x = 10<br>&rArr; 20 &minus; 16x = 10<br>&rArr; 16x = 10<br>&rArr; x = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>10</mn><mn>16</mn></mfrac></math> = <math display=\"inline\"><mfrac><mrow><mn>5</mn></mrow><mrow><mn>8</mn></mrow></mfrac></math></p>",
                    solution_hi: "<p>60.(d) मान लीजिए &lsquo;x&rsquo; 20% सल्फ्यूरिक अम्ल का वह भाग है जिसे बदल दिया जाता है।<br>समीकरण का उपयोग करते हुए:<br>&rArr; (1 &minus; x) &times; 20 + x &times; 4 = 10<br>&rArr; 20 &minus; 20x + 4x = 10<br>&rArr; 20 &minus; 16x = 10<br>&rArr; 16x = 10<br>&rArr; x = <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>10</mn><mn>16</mn></mfrac></math> = <math display=\"inline\"><mfrac><mrow><mn>5</mn></mrow><mrow><mn>8</mn></mrow></mfrac></math></p>",

                questions.push({
                    id: "63",
                    section: "17",
                    question_en: "<p>63. An oil dealer had three types of oil. 403 litres of the first kind, 434 litres of the second kind and 465 litres of the third kind. Find the maximum volume of oil, filled in each barrel, if equal number of barrels are filled.</p>",
                    question_hi: "<p>63. एक तेल व्यापारी के पास तीन प्रकार का तेल था। पहले प्रकार का तेल 403 लीटर, दूसरे प्रकार का 434 लीटर और तीसरे प्रकार का तेल 465 लीटर। यदि समान संख्या में बैरल भरे जाएं, तो प्रत्येक बैरल में भरे हुए तेल की अधिकतम मात्रा ज्ञात कीजिए।</p>",
                    options_en: [
                        "<p>52 litres</p>",
                        "<p>48 litres</p>",
                        "<p>31 litres</p>",
                        "<p>41 litres</p>"

                    options_hi: [

                        "<p>31 लीटर</p>",
                        "<p>41 लीटर</p>"
                    ],
                    solution_en: "<p>63.(c) Factor of first type of oil (403 l) = 13 &times; 31<br>Factor of second type of oi<math display=\"inline\"><mi>l</mi></math> (434 l) = 2 &times; 21 &times; 31<br>Factor of third type of oil&nbsp;(465 l) = 3 &times; 5 &times; 31<br>HCF of (403, 434 and 465) = 31 l<br>Hence, the maximum vo<math display=\"inline\"><mi>l</mi></math>ume of oil to fill each barrel = 31 l</p>",
                    solution_hi: "<p>63.(c) (403 लीटर) पहले प्रकार के तेल का गुणनखंड = 13 &times; 31<br>(434 लीटर) दूसरे प्रकार के तेल का गुणनखंड = 2 &times; 21 &times; 31<br>(465 लीटर) तीसरे प्रकार के तेल का गुणनखंड = 3 &times; 5 &times; 31<br>(403, 434 और 465) का HCF = 31 लीटर<br>अतः, प्रत्येक बैरल में भरने के लिए तेल की अधिकतम मात्रा = 31 लीटर</p>",
                    correct: "c",

                questions.push({

                    solution_en: "<p>72.(a)<br>Let the CP of A and B be 300 and 100 respectively<br>SP of A = 300 &times; 90% = 270<br>SP of B = 100 &times; <math display=\"inline\"><mfrac><mrow><mn>5</mn></mrow><mrow><mn>4</mn></mrow></mfrac></math> = 125<br>According to the question,<br>(270 - 125) = 145 unit = ₹5800<br>Then, 300 unit = <math display=\"inline\"><mfrac><mrow><mn>5800</mn></mrow><mrow><mn>145</mn></mrow></mfrac></math> &times; 300 = ₹12,000<br>Then, CP of A = ₹12000</p>",

            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'question-box d-flex align-items-center justify-content-center border rounded';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();

        // Show a specific question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.question-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML
            const html = `
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <div class="question-text mb-4">
                            <div class="en">${question.question_en}</div>
                            <div class="hi" style="display:none">${question.question_hi}</div>
                        </div>
                        
                        <div class="options">
                            ${['a', 'b', 'c', 'd'].map((opt, i) => `
                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="radio" name="q${index}" 
                                        id="opt-${index}-${opt}" value="${opt}" 
                                        ${answers[question.id] === opt ? 'checked' : ''}
                                        onclick="selectAnswer('${question.id}', '${opt}')">
                                    <label class="form-check-label w-100 py-2 px-3 rounded hover-bg-light" for="opt-${index}-${opt}">
                                        <div class="en">${question.options_en[i]}</div>
                                        <div class="hi" style="display:none">${question.options_hi[i]}</div>
                                    </label>
                                </div>
                            `).join('')}
                        </div>
                        
                        ${submitted ? `
                            <div class="alert ${answers[question.id] === question.correct ? 'alert-success' : 'alert-danger'} mt-3">
                                ${answers[question.id] ? (answers[question.id] === question.correct ? 'Correct!' : 'Incorrect!') : 'Not attempted'}
                                <div class="mt-2">
                                    <strong>Solution:</strong>
                                    <div class="en">${question.solution_en}</div>
                                    <div class="hi" style="display:none">${question.solution_hi}</div>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
            
            // If in mobile view, close the menu
            if (window.innerWidth < 768) {
                toggleMenu(false);
            }
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                document.getElementById(`box-${index}`).classList.add('attempted');
            }
        }
        
        // Navigate to previous question
        function prevQuestion() {
            if (currentQuestion > 0) {
                showQuestion(currentQuestion - 1);
            }
        }
        
        // Navigate to next question
        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                showQuestion(currentQuestion + 1);
            }
        }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) {
                showQuestion(section.start);
            }
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
            
            // Update button text
            document.getElementById('lang-btn').innerHTML = currentLang === 'en' ? 
                '<i class="fas fa-language"></i> हिंदी' : 
                '<i class="fas fa-language"></i> English';
        }
        
        // Toggle menu for mobile
        function toggleMenu(show) {
            const nav = document.getElementById('question-nav');
            const content = document.getElementById('question-content');
            
            if (show === undefined) {
                show = nav.style.right === '-100%' || nav.style.right === '';
            }
            
            if (show) {
                nav.style.right = '0';
                if (window.innerWidth >= 768) {
                    content.style.marginRight = '320px';
                }
            } else {
                nav.style.right = window.innerWidth < 768 ? '-100%' : '0';
                content.style.marginRight = window.innerWidth < 768 ? '0' : '320px';
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
            document.getElementById('total-count').textContent = questions.length;
        }
        
        // Start timer
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.remove('attempted');
                    box.classList.add('bg-secondary', 'text-white');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.remove('attempted');
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.remove('attempted');
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            resultsModal.show();
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-check-circle me-1"></i> Submitted';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            resultsModal.hide();
            showQuestion(0);
        }
    </script>
